postsubmits:
  openshift/origin:
  - agent: kubernetes
    always_run: true
    branches:
    - ^release-3\.11$
    cluster: build03
    decorate: true
    decoration_config:
      sparse_checkout_files:
      - .ci-operator.yaml
      - images/base/Dockerfile
      - images/builder/docker/docker-builder/Dockerfile
      - images/cli/Dockerfile
      - images/deployer/Dockerfile
      - images/egress/dns-proxy/Dockerfile
      - images/egress/http-proxy/Dockerfile
      - images/egress/router/Dockerfile
      - images/hyperkube/Dockerfile
      - images/hypershift/Dockerfile
      - images/ipfailover/keepalived/Dockerfile
      - images/node/Dockerfile
      - images/origin/Dockerfile
      - images/pod/Dockerfile
      - images/recycler/Dockerfile
      - images/router/f5/Dockerfile
      - images/router/haproxy/Dockerfile
      - images/template-service-broker/Dockerfile
      - images/tests/Dockerfile
    labels:
      ci-operator.openshift.io/is-promotion: "true"
      ci.openshift.io/generator: prowgen
    max_concurrency: 1
    name: branch-ci-openshift-origin-release-3.11-images
    spec:
      containers:
      - args:
        - --gcs-upload-secret=/secrets/gcs/service-account.json
        - --image-import-pull-secret=/etc/pull-secret/.dockerconfigjson
        - --image-mirror-push-secret=/etc/push-secret/.dockerconfigjson
        - --promote
        - --report-credentials-file=/etc/report/credentials
        - --target=[images]
        - --target=artifacts
        - --target=base
        command:
        - ci-operator
        image: quay-proxy.ci.openshift.org/openshift/ci:ci_ci-operator_latest
        imagePullPolicy: Always
        name: ""
        resources:
          requests:
            cpu: 10m
        volumeMounts:
        - mountPath: /secrets/gcs
          name: gcs-credentials
          readOnly: true
        - mountPath: /secrets/manifest-tool
          name: manifest-tool-local-pusher
          readOnly: true
        - mountPath: /etc/pull-secret
          name: pull-secret
          readOnly: true
        - mountPath: /etc/push-secret
          name: push-secret
          readOnly: true
        - mountPath: /etc/report
          name: result-aggregator
          readOnly: true
      serviceAccountName: ci-operator
      volumes:
      - name: manifest-tool-local-pusher
        secret:
          secretName: manifest-tool-local-pusher
      - name: pull-secret
        secret:
          secretName: registry-pull-credentials
      - name: push-secret
        secret:
          secretName: registry-push-credentials-ci-central
      - name: result-aggregator
        secret:
          secretName: result-aggregator
