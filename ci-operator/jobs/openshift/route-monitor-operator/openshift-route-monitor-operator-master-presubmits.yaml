presubmits:
  openshift/route-monitor-operator:
  - agent: kubernetes
    always_run: true
    branches:
    - ^master$
    - ^master-
    cluster: build03
    context: ci/prow/coverage
    decorate: true
    decoration_config:
      sparse_checkout_files:
      - .ci-operator.yaml
      - Dockerfile
    labels:
      ci.openshift.io/generator: prowgen
      job-release: "4.21"
      pj-rehearse.openshift.io/can-be-rehearsed: "true"
    name: pull-ci-openshift-route-monitor-operator-master-coverage
    rerun_command: /test coverage
    spec:
      containers:
      - args:
        - --gcs-upload-secret=/secrets/gcs/service-account.json
        - --image-import-pull-secret=/etc/pull-secret/.dockerconfigjson
        - --report-credentials-file=/etc/report/credentials
        - --secret-dir=/secrets/route-monitor-operator-codecov-token
        - --target=coverage
        command:
        - ci-operator
        env:
        - name: HTTP_SERVER_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        image: quay-proxy.ci.openshift.org/openshift/ci:ci_ci-operator_latest
        imagePullPolicy: Always
        name: ""
        ports:
        - containerPort: 8080
          name: http
        resources:
          requests:
            cpu: 10m
        volumeMounts:
        - mountPath: /secrets/gcs
          name: gcs-credentials
          readOnly: true
        - mountPath: /secrets/manifest-tool
          name: manifest-tool-local-pusher
          readOnly: true
        - mountPath: /etc/pull-secret
          name: pull-secret
          readOnly: true
        - mountPath: /etc/report
          name: result-aggregator
          readOnly: true
        - mountPath: /secrets/route-monitor-operator-codecov-token
          name: route-monitor-operator-codecov-token
          readOnly: true
      serviceAccountName: ci-operator
      volumes:
      - name: manifest-tool-local-pusher
        secret:
          secretName: manifest-tool-local-pusher
      - name: pull-secret
        secret:
          secretName: registry-pull-credentials
      - name: result-aggregator
        secret:
          secretName: result-aggregator
      - name: route-monitor-operator-codecov-token
        secret:
          secretName: route-monitor-operator-codecov-token
    trigger: (?m)^/test( | .* )coverage,?($|\s.*)
