presubmits:
  openshift/kueue-operator:
  - agent: kubernetes
    always_run: true
    branches:
    - ^release-1\.4$
    - ^release-1\.4-
    cluster: build07
    context: ci/prow/upgrade-from-4.18-e2e-upgrade-4-18-to-4-19-kueue-1-4
    decorate: true
    decoration_config: {}
    labels:
      ci-operator.openshift.io/cloud: aws
      ci-operator.openshift.io/cloud-cluster-profile: openshift-org-aws
      ci-operator.openshift.io/variant: upgrade-from-4.18
      ci.openshift.io/generator: prowgen
      job-release: "4.19"
      pj-rehearse.openshift.io/can-be-rehearsed: "true"
    name: pull-ci-openshift-kueue-operator-release-1.4-upgrade-from-4.18-e2e-upgrade-4-18-to-4-19-kueue-1-4
    optional: true
    rerun_command: /test upgrade-from-4.18-e2e-upgrade-4-18-to-4-19-kueue-1-4
    spec:
      containers:
      - args:
        - --gcs-upload-secret=/secrets/gcs/service-account.json
        - --image-import-pull-secret=/etc/pull-secret/.dockerconfigjson
        - --lease-server-credentials-file=/etc/boskos/credentials
        - --report-credentials-file=/etc/report/credentials
        - --secret-dir=/secrets/ci-pull-credentials
        - --target=e2e-upgrade-4-18-to-4-19-kueue-1-4
        - --variant=upgrade-from-4.18
        command:
        - ci-operator
        env:
        - name: HTTP_SERVER_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        image: quay-proxy.ci.openshift.org/openshift/ci:ci_ci-operator_latest
        imagePullPolicy: Always
        name: ""
        ports:
        - containerPort: 8080
          name: http
        resources:
          requests:
            cpu: 10m
        volumeMounts:
        - mountPath: /etc/boskos
          name: boskos
          readOnly: true
        - mountPath: /secrets/ci-pull-credentials
          name: ci-pull-credentials
          readOnly: true
        - mountPath: /secrets/gcs
          name: gcs-credentials
          readOnly: true
        - mountPath: /secrets/manifest-tool
          name: manifest-tool-local-pusher
          readOnly: true
        - mountPath: /etc/pull-secret
          name: pull-secret
          readOnly: true
        - mountPath: /etc/report
          name: result-aggregator
          readOnly: true
      serviceAccountName: ci-operator
      volumes:
      - name: boskos
        secret:
          items:
          - key: credentials
            path: credentials
          secretName: boskos-credentials
      - name: ci-pull-credentials
        secret:
          secretName: ci-pull-credentials
      - name: manifest-tool-local-pusher
        secret:
          secretName: manifest-tool-local-pusher
      - name: pull-secret
        secret:
          secretName: registry-pull-credentials
      - name: result-aggregator
        secret:
          secretName: result-aggregator
    trigger: (?m)^/test( | .* )upgrade-from-4.18-e2e-upgrade-4-18-to-4-19-kueue-1-4,?($|\s.*)
