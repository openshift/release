postsubmits:
  openshift/ci-tools:
  - agent: kubernetes
    always_run: true
    branches:
    - ^main$
    cluster: build07
    decorate: true
    decoration_config:
      sparse_checkout_files:
      - .ci-operator.yaml
      - images/applyconfig/Dockerfile
      - images/auto-config-brancher/Dockerfile
      - images/auto-peribolos-sync/Dockerfile
      - images/auto-testgrid-generator/Dockerfile
      - images/autoowners/Dockerfile
      - images/autopublicizeconfig/Dockerfile
      - images/blocking-issue-creator/Dockerfile
      - images/bugzilla-backporter/Dockerfile
      - images/check-cluster-profiles-config/Dockerfile
      - images/check-gh-automation/Dockerfile
      - images/ci-operator-checkconfig/Dockerfile
      - images/ci-operator-config-mirror/Dockerfile
      - images/ci-operator-configresolver/Dockerfile
      - images/ci-operator-minimal/Dockerfile
      - images/ci-operator-prowgen/Dockerfile
      - images/ci-operator/Dockerfile
      - images/ci-secret-bootstrap/Dockerfile
      - images/ci-secret-generator/Dockerfile
      - images/cluster-init/Dockerfile
      - images/clusterimageset-updater/Dockerfile
      - images/config-brancher/Dockerfile
      - images/config-change-trigger/Dockerfile
      - images/cvp-trigger/Dockerfile
      - images/determinize-ci-operator/Dockerfile
      - images/determinize-prow-config/Dockerfile
      - images/dptp-3312-hypershift-leaks-cleaner/Dockerfile
      - images/dptp-controller-manager/Dockerfile
      - images/entrypoint-wrapper/Dockerfile
      - images/generate-registry-metadata/Dockerfile
      - images/gsm-secret-sync/Dockerfile
      - images/job-run-aggregator/Dockerfile
      - images/multi-arch-builder-controller/Dockerfile
      - images/multi-pr-prow-plugin/Dockerfile
      - images/ocp-build-data-enforcer/Dockerfile
      - images/payload-testing-ui/Dockerfile
      - images/pj-rehearse/Dockerfile
      - images/pod-scaler/Dockerfile
      - images/private-org-peribolos-sync/Dockerfile
      - images/private-org-sync/Dockerfile
      - images/private-prow-configs-mirror/Dockerfile
      - images/prow-job-dispatcher/Dockerfile
      - images/registry-replacer/Dockerfile
      - images/repo-brancher/Dockerfile
      - images/repo-init/Dockerfile
      - images/result-aggregator/Dockerfile
      - images/sanitize-prow-jobs/Dockerfile
      - images/serviceaccount-secret-rotation-trigger/Dockerfile
      - images/slack-bot/Dockerfile
      - images/sprint-automation/Dockerfile
      - images/testgrid-config-generator/Dockerfile
      - images/tide-config-manager/Dockerfile
    labels:
      capability/arm64: arm64
      ci-operator.openshift.io/is-promotion: "true"
      ci.openshift.io/generator: prowgen
    max_concurrency: 1
    name: branch-ci-openshift-ci-tools-main-images
    reporter_config:
      slack:
        channel: '#ops-testplatform'
        job_states_to_report:
        - failure
        - error
        report_template: ':failed: Job *{{.Spec.Job}}* ended with *{{.Status.State}}*.
          <{{.Status.URL}}|View logs> {{end}}'
    spec:
      containers:
      - args:
        - --gcs-upload-secret=/secrets/gcs/service-account.json
        - --image-import-pull-secret=/etc/pull-secret/.dockerconfigjson
        - --image-mirror-push-secret=/etc/push-secret/.dockerconfigjson
        - --promote
        - --report-credentials-file=/etc/report/credentials
        - --target=[images]
        command:
        - ci-operator
        image: quay-proxy.ci.openshift.org/openshift/ci:ci_ci-operator_latest
        imagePullPolicy: Always
        name: ""
        resources:
          requests:
            cpu: 10m
        volumeMounts:
        - mountPath: /secrets/gcs
          name: gcs-credentials
          readOnly: true
        - mountPath: /secrets/manifest-tool
          name: manifest-tool-local-pusher
          readOnly: true
        - mountPath: /etc/pull-secret
          name: pull-secret
          readOnly: true
        - mountPath: /etc/push-secret
          name: push-secret
          readOnly: true
        - mountPath: /etc/report
          name: result-aggregator
          readOnly: true
      serviceAccountName: ci-operator
      volumes:
      - name: manifest-tool-local-pusher
        secret:
          secretName: manifest-tool-local-pusher
      - name: pull-secret
        secret:
          secretName: registry-pull-credentials
      - name: push-secret
        secret:
          secretName: registry-push-credentials-ci-central
      - name: result-aggregator
        secret:
          secretName: result-aggregator
