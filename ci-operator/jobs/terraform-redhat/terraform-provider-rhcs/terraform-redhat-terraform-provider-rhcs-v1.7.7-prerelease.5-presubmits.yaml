presubmits:
  terraform-redhat/terraform-provider-rhcs:
  - agent: kubernetes
    always_run: true
    branches:
    - ^v1\.7\.7-prerelease\.5$
    - ^v1\.7\.7-prerelease\.5-
    cluster: build01
    context: ci/prow/e2e-images
    decorate: true
    decoration_config:
      sparse_checkout_files:
      - .ci-operator.yaml
      - build/ci-tf-e2e.Dockerfile
    labels:
      ci-operator.openshift.io/variant: e2e
      ci.openshift.io/generator: prowgen
      pj-rehearse.openshift.io/can-be-rehearsed: "true"
    name: pull-ci-terraform-redhat-terraform-provider-rhcs-v1.7.7-prerelease.5-e2e-images
    rerun_command: /test e2e-images
    spec:
      containers:
      - args:
        - --gcs-upload-secret=/secrets/gcs/service-account.json
        - --image-import-pull-secret=/etc/pull-secret/.dockerconfigjson
        - --report-credentials-file=/etc/report/credentials
        - --target=[images]
        - --variant=e2e
        command:
        - ci-operator
        image: quay-proxy.ci.openshift.org/openshift/ci:ci_ci-operator_latest
        imagePullPolicy: Always
        name: ""
        resources:
          requests:
            cpu: 10m
        volumeMounts:
        - mountPath: /secrets/gcs
          name: gcs-credentials
          readOnly: true
        - mountPath: /secrets/manifest-tool
          name: manifest-tool-local-pusher
          readOnly: true
        - mountPath: /etc/pull-secret
          name: pull-secret
          readOnly: true
        - mountPath: /etc/report
          name: result-aggregator
          readOnly: true
      serviceAccountName: ci-operator
      volumes:
      - name: manifest-tool-local-pusher
        secret:
          secretName: manifest-tool-local-pusher
      - name: pull-secret
        secret:
          secretName: registry-pull-credentials
      - name: result-aggregator
        secret:
          secretName: result-aggregator
    trigger: (?m)^/test( | .* )e2e-images,?($|\s.*)
