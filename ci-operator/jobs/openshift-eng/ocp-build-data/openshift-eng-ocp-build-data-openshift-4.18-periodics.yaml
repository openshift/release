periodics:
- agent: kubernetes
  cluster: build06
  cron: 0 8 * * 1
  decorate: true
  decoration_config:
    skip_cloning: true
  extra_refs:
  - base_ref: openshift-4.18
    org: openshift-eng
    repo: ocp-build-data
  labels:
    capability/intranet: intranet
    ci-operator.openshift.io/variant: periodics
    ci.openshift.io/generator: prowgen
    pj-rehearse.openshift.io/can-be-rehearsed: "true"
  name: periodic-ci-openshift-eng-ocp-build-data-openshift-4.18-periodics-art-konflux-delivery-repo-check
  reporter_config:
    slack:
      channel: '#art-release'
      job_states_to_report:
      - failure
      - error
      report_template: |
        ':red_jenkins_circle: Job *{{.Spec.Job}}* ended with *{{.Status.State}}*. <{{.Status.URL}}|View logs>'
  spec:
    containers:
    - args:
      - --gcs-upload-secret=/secrets/gcs/service-account.json
      - --image-import-pull-secret=/etc/pull-secret/.dockerconfigjson
      - --lease-server-credentials-file=/etc/boskos/credentials
      - --report-credentials-file=/etc/report/credentials
      - --target=art-konflux-delivery-repo-check
      - --variant=periodics
      command:
      - ci-operator
      env:
      - name: HTTP_SERVER_IP
        valueFrom:
          fieldRef:
            fieldPath: status.podIP
      image: quay-proxy.ci.openshift.org/openshift/ci:ci_ci-operator_latest
      imagePullPolicy: Always
      name: ""
      ports:
      - containerPort: 8080
        name: http
      resources:
        requests:
          cpu: 10m
      volumeMounts:
      - mountPath: /etc/boskos
        name: boskos
        readOnly: true
      - mountPath: /secrets/gcs
        name: gcs-credentials
        readOnly: true
      - mountPath: /secrets/manifest-tool
        name: manifest-tool-local-pusher
        readOnly: true
      - mountPath: /etc/pull-secret
        name: pull-secret
        readOnly: true
      - mountPath: /etc/report
        name: result-aggregator
        readOnly: true
    serviceAccountName: ci-operator
    volumes:
    - name: boskos
      secret:
        items:
        - key: credentials
          path: credentials
        secretName: boskos-credentials
    - name: manifest-tool-local-pusher
      secret:
        secretName: manifest-tool-local-pusher
    - name: pull-secret
      secret:
        secretName: registry-pull-credentials
    - name: result-aggregator
      secret:
        secretName: result-aggregator
