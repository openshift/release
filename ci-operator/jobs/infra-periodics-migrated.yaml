- agent: kubernetes
  cluster: core-ci
  cron: 0 8 * * 2-5
  decorate: true
  labels:
    ci.openshift.io/role: infra
  name: periodic-sprint-automation
  spec:
    containers:
    - args:
      - --jira-endpoint=https://redhat.atlassian.net
      - --jira-username=aos-team-dp-testplatform@redhat.com
      - --jira-password-file=/etc/jira/password
      - --slack-token-path=/etc/slack/oauth_token
      - --pager-duty-token-file=/etc/pagerduty/token
      - --kubeconfig-dir=/etc/build-farm-credentials
      - --kubeconfig-suffix=config
      command:
      - /usr/bin/sprint-automation
      image: quay-proxy.ci.openshift.org/openshift/ci:ci_sprint-automation_latest
      imagePullPolicy: Always
      name: ""
      resources:
        requests:
          cpu: 500m
      volumeMounts:
      - mountPath: /etc/slack
        name: slack
        readOnly: true
      - mountPath: /etc/jira
        name: jira
        readOnly: true
      - mountPath: /etc/pagerduty
        name: pagerduty
        readOnly: true
      - mountPath: /etc/build-farm-credentials
        name: build-farm-credentials
        readOnly: true
    volumes:
    - name: slack
      secret:
        secretName: slack-credentials-dptp-bot
    - name: jira
      secret:
        secretName: jira-token-dptp-bot
    - name: pagerduty
      secret:
        secretName: pagerduty
    - name: build-farm-credentials
      secret:
        secretName: sprint-automation
- agent: kubernetes
