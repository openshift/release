postsubmits:
  openshift-online/rosa-service-log:
  - agent: kubernetes
    always_run: true
    branches:
    - ^master$
    cluster: build06
    decorate: true
    decoration_config:
      skip_cloning: true
    labels:
      capability/nested-podman: nested-podman
      ci.openshift.io/generator: prowgen
    max_concurrency: 1
    name: branch-ci-openshift-online-rosa-service-log-master-publish-coverage
    spec:
      containers:
      - args:
        - --gcs-upload-secret=/secrets/gcs/service-account.json
        - --image-import-pull-secret=/etc/pull-secret/.dockerconfigjson
        - --oauth-token-path=/usr/local/github-credentials/oauth
        - --report-credentials-file=/etc/report/credentials
        - --secret-dir=/secrets/openshift-online-osl-secrets
        - --secret-dir=/secrets/rosa-service-log-codecov
        - --target=publish-coverage
        command:
        - ci-operator
        env:
        - name: HTTP_SERVER_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        image: quay-proxy.ci.openshift.org/openshift/ci:ci_ci-operator_latest
        imagePullPolicy: Always
        name: ""
        ports:
        - containerPort: 8080
          name: http
        resources:
          requests:
            cpu: 10m
        volumeMounts:
        - mountPath: /secrets/gcs
          name: gcs-credentials
          readOnly: true
        - mountPath: /usr/local/github-credentials
          name: github-credentials-openshift-ci-robot-private-git-cloner
          readOnly: true
        - mountPath: /secrets/manifest-tool
          name: manifest-tool-local-pusher
          readOnly: true
        - mountPath: /secrets/openshift-online-osl-secrets
          name: openshift-online-osl-secrets
          readOnly: true
        - mountPath: /etc/pull-secret
          name: pull-secret
          readOnly: true
        - mountPath: /etc/report
          name: result-aggregator
          readOnly: true
        - mountPath: /secrets/rosa-service-log-codecov
          name: rosa-service-log-codecov
          readOnly: true
      serviceAccountName: ci-operator
      volumes:
      - name: github-credentials-openshift-ci-robot-private-git-cloner
        secret:
          secretName: github-credentials-openshift-ci-robot-private-git-cloner
      - name: manifest-tool-local-pusher
        secret:
          secretName: manifest-tool-local-pusher
      - name: openshift-online-osl-secrets
        secret:
          secretName: openshift-online-osl-secrets
      - name: pull-secret
        secret:
          secretName: registry-pull-credentials
      - name: result-aggregator
        secret:
          secretName: result-aggregator
      - name: rosa-service-log-codecov
        secret:
          secretName: rosa-service-log-codecov
