periodics:
- agent: kubernetes
  cluster: build03
  cron: 0 4 * * 1-5
  decorate: true
  name: periodic-red-hat-data-services-fips-compliance-scan-trigger
  spec:
    containers:
    - command:
      - /bin/bash
      - -c
      - |
        GITHUB_TOKEN=$(cat /var/run/secrets/github/token)
        curl -sf -X POST \
          -H "Authorization: token $GITHUB_TOKEN" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/repos/red-hat-data-services/fips-compliance/actions/workflows/fips-scan.yml/dispatches \
          -d '{"ref": "main"}'
        echo "GitHub workflow dispatch triggered successfully"
      image: registry.ci.openshift.org/ci/cli:latest
      imagePullPolicy: Always
      name: ""
      resources:
        requests:
          cpu: 10m
      volumeMounts:
      - mountPath: /var/run/secrets/github
        name: github-token
        readOnly: true
    volumes:
    - name: github-token
      secret:
        secretName: fips-compliance-github-token
