presubmits:
  osac-project/osac-test-infra:
  - agent: kubernetes
    always_run: true
    branches:
    - ^OSAC-914$
    - ^OSAC-914-
    cluster: build10
    context: ci/prow/parallel-e2e-tests-e2e-metal-vmaas-parallel
    decorate: true
    decoration_config:
      sparse_checkout_files:
      - Containerfile
    labels:
      capability/intranet: intranet
      ci-operator.openshift.io/variant: parallel-e2e-tests
      ci.openshift.io/generator: prowgen
      job-release: "4.20"
      pj-rehearse.openshift.io/can-be-rehearsed: "true"
    name: pull-ci-osac-project-osac-test-infra-OSAC-914-parallel-e2e-tests-e2e-metal-vmaas-parallel
    optional: true
    rerun_command: /test parallel-e2e-tests-e2e-metal-vmaas-parallel
    spec:
      containers:
      - args:
        - --gcs-upload-secret=/secrets/gcs/service-account.json
        - --image-import-pull-secret=/etc/pull-secret/.dockerconfigjson
        - --lease-server-credentials-file=/etc/boskos/credentials
        - --report-credentials-file=/etc/report/credentials
        - --secret-dir=/secrets/ci-pull-credentials
        - --target=e2e-metal-vmaas-parallel
        - --variant=parallel-e2e-tests
        command:
        - ci-operator
        env:
        - name: HTTP_SERVER_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        image: quay-proxy.ci.openshift.org/openshift/ci:ci_ci-operator_latest
        imagePullPolicy: Always
        name: ""
        ports:
        - containerPort: 8080
          name: http
        resources:
          requests:
            cpu: 10m
        volumeMounts:
        - mountPath: /etc/boskos
          name: boskos
          readOnly: true
        - mountPath: /secrets/ci-pull-credentials
          name: ci-pull-credentials
          readOnly: true
        - mountPath: /secrets/gcs
          name: gcs-credentials
          readOnly: true
        - mountPath: /secrets/manifest-tool
          name: manifest-tool-local-pusher
          readOnly: true
        - mountPath: /etc/pull-secret
          name: pull-secret
          readOnly: true
        - mountPath: /etc/report
          name: result-aggregator
          readOnly: true
      serviceAccountName: ci-operator
      volumes:
      - name: boskos
        secret:
          items:
          - key: credentials
            path: credentials
          secretName: boskos-credentials
      - name: ci-pull-credentials
        secret:
          secretName: ci-pull-credentials
      - name: manifest-tool-local-pusher
        secret:
          secretName: manifest-tool-local-pusher
      - name: pull-secret
        secret:
          secretName: registry-pull-credentials
      - name: result-aggregator
        secret:
          secretName: result-aggregator
    trigger: (?m)^/test( | .* )parallel-e2e-tests-e2e-metal-vmaas-parallel,?($|\s.*)
  - agent: kubernetes
    always_run: true
    branches:
    - ^OSAC-914$
