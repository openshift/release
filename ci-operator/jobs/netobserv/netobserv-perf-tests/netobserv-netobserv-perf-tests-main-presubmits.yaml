presubmits:
  netobserv/netobserv-perf-tests:
  - agent: kubernetes
    always_run: true
    branches:
    - ^main$
    - ^main-
    cluster: build11
    context: ci/prow/netobserv-aws-4.22-nightly-x86-images
    decorate: true
    decoration_config:
      skip_cloning: true
    labels:
      ci-operator.openshift.io/variant: netobserv-aws-4.22-nightly-x86
      ci.openshift.io/generator: prowgen
      job-release: "4.22"
      pj-rehearse.openshift.io/can-be-rehearsed: "true"
    name: pull-ci-netobserv-netobserv-perf-tests-main-netobserv-aws-4.22-nightly-x86-images
    rerun_command: /test netobserv-aws-4.22-nightly-x86-images
    spec:
      containers:
      - args:
        - --gcs-upload-secret=/secrets/gcs/service-account.json
        - --image-import-pull-secret=/etc/pull-secret/.dockerconfigjson
        - --report-credentials-file=/etc/report/credentials
        - --target=[images]
        - --variant=netobserv-aws-4.22-nightly-x86
        command:
        - ci-operator
        image: quay-proxy.ci.openshift.org/openshift/ci:ci_ci-operator_latest
        imagePullPolicy: Always
        name: ""
        resources:
          requests:
            cpu: 10m
        volumeMounts:
        - mountPath: /secrets/gcs
          name: gcs-credentials
          readOnly: true
        - mountPath: /secrets/manifest-tool
          name: manifest-tool-local-pusher
          readOnly: true
        - mountPath: /etc/pull-secret
          name: pull-secret
          readOnly: true
        - mountPath: /etc/report
          name: result-aggregator
          readOnly: true
      serviceAccountName: ci-operator
      volumes:
      - name: manifest-tool-local-pusher
        secret:
          secretName: manifest-tool-local-pusher
      - name: pull-secret
        secret:
          secretName: registry-pull-credentials
      - name: result-aggregator
        secret:
          secretName: result-aggregator
    trigger: (?m)^/test( | .* )netobserv-aws-4.22-nightly-x86-images,?($|\s.*)
