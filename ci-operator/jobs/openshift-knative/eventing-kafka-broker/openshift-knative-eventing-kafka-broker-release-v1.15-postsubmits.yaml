postsubmits:
  openshift-knative/eventing-kafka-broker:
  - agent: kubernetes
    always_run: true
    branches:
    - ^release-v1\.15$
    cluster: build03
    decorate: true
    decoration_config:
      sparse_checkout_files:
      - openshift/ci-operator/knative-images/event_display/Dockerfile
      - openshift/ci-operator/knative-images/heartbeats/Dockerfile
      - openshift/ci-operator/knative-images/kafka-controller/Dockerfile
      - openshift/ci-operator/knative-images/kafka-source-controller/Dockerfile
      - openshift/ci-operator/knative-images/migrate/Dockerfile
      - openshift/ci-operator/knative-images/post-install/Dockerfile
      - openshift/ci-operator/knative-images/webhook-kafka/Dockerfile
      - openshift/ci-operator/knative-test-images/committed-offset/Dockerfile
      - openshift/ci-operator/knative-test-images/consumer-group-lag-provider-test/Dockerfile
      - openshift/ci-operator/knative-test-images/event-sender/Dockerfile
      - openshift/ci-operator/knative-test-images/eventshub/Dockerfile
      - openshift/ci-operator/knative-test-images/kafka-consumer/Dockerfile
      - openshift/ci-operator/knative-test-images/logs-exporter/Dockerfile
      - openshift/ci-operator/knative-test-images/print/Dockerfile
      - openshift/ci-operator/knative-test-images/recordevents/Dockerfile
      - openshift/ci-operator/knative-test-images/request-sender/Dockerfile
      - openshift/ci-operator/knative-test-images/watch-cm/Dockerfile
      - openshift/ci-operator/knative-test-images/wathola-fetcher/Dockerfile
      - openshift/ci-operator/knative-test-images/wathola-forwarder/Dockerfile
      - openshift/ci-operator/knative-test-images/wathola-receiver/Dockerfile
      - openshift/ci-operator/knative-test-images/wathola-sender/Dockerfile
      - openshift/ci-operator/source-image/Dockerfile
      - openshift/ci-operator/static-images/dispatcher/Dockerfile
      - openshift/ci-operator/static-images/receiver/Dockerfile
    labels:
      ci-operator.openshift.io/is-promotion: "true"
      ci-operator.openshift.io/variant: "414"
      ci.openshift.io/generator: prowgen
    max_concurrency: 1
    name: branch-ci-openshift-knative-eventing-kafka-broker-release-v1.15-414-images
    spec:
      containers:
      - args:
        - --gcs-upload-secret=/secrets/gcs/service-account.json
        - --image-import-pull-secret=/etc/pull-secret/.dockerconfigjson
        - --image-mirror-push-secret=/etc/push-secret/.dockerconfigjson
        - --promote
        - --report-credentials-file=/etc/report/credentials
        - --target=[images]
        - --target=src
        - --variant=414
        command:
        - ci-operator
        image: quay-proxy.ci.openshift.org/openshift/ci:ci_ci-operator_latest
        imagePullPolicy: Always
        name: ""
        resources:
          requests:
            cpu: 10m
        volumeMounts:
        - mountPath: /secrets/gcs
          name: gcs-credentials
          readOnly: true
        - mountPath: /secrets/manifest-tool
          name: manifest-tool-local-pusher
          readOnly: true
        - mountPath: /etc/pull-secret
          name: pull-secret
          readOnly: true
        - mountPath: /etc/push-secret
          name: push-secret
          readOnly: true
        - mountPath: /etc/report
          name: result-aggregator
          readOnly: true
      serviceAccountName: ci-operator
      volumes:
      - name: manifest-tool-local-pusher
        secret:
          secretName: manifest-tool-local-pusher
      - name: pull-secret
        secret:
          secretName: registry-pull-credentials
      - name: push-secret
        secret:
          secretName: registry-push-credentials-ci-central
      - name: result-aggregator
        secret:
          secretName: result-aggregator
