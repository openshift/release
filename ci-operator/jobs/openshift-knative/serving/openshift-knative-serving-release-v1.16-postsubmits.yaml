postsubmits:
  openshift-knative/serving:
  - agent: kubernetes
    always_run: true
    branches:
    - ^release-v1\.16$
    cluster: build05
    decorate: true
    decoration_config:
      sparse_checkout_files:
      - openshift/ci-operator/knative-images/activator/Dockerfile
      - openshift/ci-operator/knative-images/autoscaler-hpa/Dockerfile
      - openshift/ci-operator/knative-images/autoscaler/Dockerfile
      - openshift/ci-operator/knative-images/cleanup/Dockerfile
      - openshift/ci-operator/knative-images/controller/Dockerfile
      - openshift/ci-operator/knative-images/default-domain/Dockerfile
      - openshift/ci-operator/knative-images/migrate/Dockerfile
      - openshift/ci-operator/knative-images/queue/Dockerfile
      - openshift/ci-operator/knative-images/webhook/Dockerfile
      - openshift/ci-operator/knative-test-images/autoscale/Dockerfile
      - openshift/ci-operator/knative-test-images/failing/Dockerfile
      - openshift/ci-operator/knative-test-images/grpc-ping/Dockerfile
      - openshift/ci-operator/knative-test-images/hellohttp2/Dockerfile
      - openshift/ci-operator/knative-test-images/hellovolume/Dockerfile
      - openshift/ci-operator/knative-test-images/helloworld/Dockerfile
      - openshift/ci-operator/knative-test-images/httpproxy/Dockerfile
      - openshift/ci-operator/knative-test-images/pizzaplanetv1/Dockerfile
      - openshift/ci-operator/knative-test-images/pizzaplanetv2/Dockerfile
      - openshift/ci-operator/knative-test-images/readiness/Dockerfile
      - openshift/ci-operator/knative-test-images/revisionfailure/Dockerfile
      - openshift/ci-operator/knative-test-images/runtime/Dockerfile
      - openshift/ci-operator/knative-test-images/servingcontainer/Dockerfile
      - openshift/ci-operator/knative-test-images/sidecarcontainer/Dockerfile
      - openshift/ci-operator/knative-test-images/singlethreaded/Dockerfile
      - openshift/ci-operator/knative-test-images/slowstart/Dockerfile
      - openshift/ci-operator/knative-test-images/timeout/Dockerfile
      - openshift/ci-operator/knative-test-images/volumes/Dockerfile
      - openshift/ci-operator/knative-test-images/wsserver/Dockerfile
      - openshift/ci-operator/source-image/Dockerfile
    labels:
      ci-operator.openshift.io/is-promotion: "true"
      ci-operator.openshift.io/variant: "414"
      ci.openshift.io/generator: prowgen
    max_concurrency: 1
    name: branch-ci-openshift-knative-serving-release-v1.16-414-images
    spec:
      containers:
      - args:
        - --gcs-upload-secret=/secrets/gcs/service-account.json
        - --image-import-pull-secret=/etc/pull-secret/.dockerconfigjson
        - --image-mirror-push-secret=/etc/push-secret/.dockerconfigjson
        - --promote
        - --report-credentials-file=/etc/report/credentials
        - --target=[images]
        - --target=src
        - --variant=414
        command:
        - ci-operator
        image: quay-proxy.ci.openshift.org/openshift/ci:ci_ci-operator_latest
        imagePullPolicy: Always
        name: ""
        resources:
          requests:
            cpu: 10m
        volumeMounts:
        - mountPath: /secrets/gcs
          name: gcs-credentials
          readOnly: true
        - mountPath: /secrets/manifest-tool
          name: manifest-tool-local-pusher
          readOnly: true
        - mountPath: /etc/pull-secret
          name: pull-secret
          readOnly: true
        - mountPath: /etc/push-secret
          name: push-secret
          readOnly: true
        - mountPath: /etc/report
          name: result-aggregator
          readOnly: true
      serviceAccountName: ci-operator
      volumes:
      - name: manifest-tool-local-pusher
        secret:
          secretName: manifest-tool-local-pusher
      - name: pull-secret
        secret:
          secretName: registry-pull-credentials
      - name: push-secret
        secret:
          secretName: registry-push-credentials-ci-central
      - name: result-aggregator
        secret:
          secretName: result-aggregator
