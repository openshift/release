postsubmits:
  openshift-knative/eventing:
  - agent: kubernetes
    always_run: true
    branches:
    - ^release-v1\.21$
    cluster: build04
    decorate: true
    decoration_config:
      sparse_checkout_files:
      - openshift/ci-operator/knative-images/apiserver_receive_adapter/Dockerfile
      - openshift/ci-operator/knative-images/appender/Dockerfile
      - openshift/ci-operator/knative-images/auth_proxy/Dockerfile
      - openshift/ci-operator/knative-images/channel_controller/Dockerfile
      - openshift/ci-operator/knative-images/channel_dispatcher/Dockerfile
      - openshift/ci-operator/knative-images/controller/Dockerfile
      - openshift/ci-operator/knative-images/event_display/Dockerfile
      - openshift/ci-operator/knative-images/filter/Dockerfile
      - openshift/ci-operator/knative-images/heartbeats/Dockerfile
      - openshift/ci-operator/knative-images/heartbeats_receiver/Dockerfile
      - openshift/ci-operator/knative-images/ingress/Dockerfile
      - openshift/ci-operator/knative-images/jobsink/Dockerfile
      - openshift/ci-operator/knative-images/migrate/Dockerfile
      - openshift/ci-operator/knative-images/mqttsource/Dockerfile
      - openshift/ci-operator/knative-images/mtchannel_broker/Dockerfile
      - openshift/ci-operator/knative-images/mtping/Dockerfile
      - openshift/ci-operator/knative-images/pong/Dockerfile
      - openshift/ci-operator/knative-images/requestreply/Dockerfile
      - openshift/ci-operator/knative-images/schema/Dockerfile
      - openshift/ci-operator/knative-images/webhook/Dockerfile
      - openshift/ci-operator/knative-images/websocketsource/Dockerfile
      - openshift/ci-operator/knative-test-images/event-sender/Dockerfile
      - openshift/ci-operator/knative-test-images/eventshub/Dockerfile
      - openshift/ci-operator/knative-test-images/print/Dockerfile
      - openshift/ci-operator/knative-test-images/recordevents/Dockerfile
      - openshift/ci-operator/knative-test-images/request-sender/Dockerfile
      - openshift/ci-operator/knative-test-images/wathola-fetcher/Dockerfile
      - openshift/ci-operator/knative-test-images/wathola-forwarder/Dockerfile
      - openshift/ci-operator/knative-test-images/wathola-receiver/Dockerfile
      - openshift/ci-operator/knative-test-images/wathola-sender/Dockerfile
      - openshift/ci-operator/source-image/Dockerfile
    labels:
      ci-operator.openshift.io/is-promotion: "true"
      ci-operator.openshift.io/variant: "416"
      ci.openshift.io/generator: prowgen
    max_concurrency: 1
    name: branch-ci-openshift-knative-eventing-release-v1.21-416-images
    spec:
      containers:
      - args:
        - --gcs-upload-secret=/secrets/gcs/service-account.json
        - --image-import-pull-secret=/etc/pull-secret/.dockerconfigjson
        - --image-mirror-push-secret=/etc/push-secret/.dockerconfigjson
        - --promote
        - --report-credentials-file=/etc/report/credentials
        - --target=[images]
        - --target=src
        - --variant=416
        command:
        - ci-operator
        image: quay-proxy.ci.openshift.org/openshift/ci:ci_ci-operator_latest
        imagePullPolicy: Always
        name: ""
        resources:
          requests:
            cpu: 10m
        volumeMounts:
        - mountPath: /secrets/gcs
          name: gcs-credentials
          readOnly: true
        - mountPath: /secrets/manifest-tool
          name: manifest-tool-local-pusher
          readOnly: true
        - mountPath: /etc/pull-secret
          name: pull-secret
          readOnly: true
        - mountPath: /etc/push-secret
          name: push-secret
          readOnly: true
        - mountPath: /etc/report
          name: result-aggregator
          readOnly: true
      serviceAccountName: ci-operator
      volumes:
      - name: manifest-tool-local-pusher
        secret:
          secretName: manifest-tool-local-pusher
      - name: pull-secret
        secret:
          secretName: registry-pull-credentials
      - name: push-secret
        secret:
          secretName: registry-push-credentials-ci-central
      - name: result-aggregator
        secret:
          secretName: result-aggregator
