    context: ci/prow/test-step-all
    decorate: true
    decoration_config:
      skip_cloning: true
      timeout: 24h0m0s
    labels:
      capability/intranet: intranet
      ci-operator.openshift.io/variant: test-step
      ci.openshift.io/generator: prowgen
      job-release: "4.22"
      pj-rehearse.openshift.io/can-be-rehearsed: "true"
    name: pull-ci-redhat-performance-benchmark-runner-main-test-step-all
