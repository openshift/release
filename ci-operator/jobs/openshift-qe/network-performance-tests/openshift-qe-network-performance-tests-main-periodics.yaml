periodics:
- agent: kubernetes
  cluster: build03
  cron: 0 8 * * 0  # Weekly on Sundays at 8 AM UTC  
  decorate: true
  decoration_config:
    skip_cloning: true
  extra_refs:
  - base_ref: main
    org: openshift-qe
    repo: network-performance-tests
  interval: ""
  labels:
    ci-operator.openshift.io/variant: ""
    job-env: aws
    job-release: "4.21"
    job-test: ocp-61589-max-nodes-post-network-expansion
    prow.k8s.io/can-be-retried: "false"
  max_concurrency: 1
  name: periodic-ci-openshift-qe-network-performance-tests-main-ocp-61589-max-nodes-post-network-expansion
  reporter_config:
    slack:
      channel: '#forum-ocp-testplatform'
      job_states_to_report:
      - failure
      - error
      report_template: Job *{{.Spec.Job}}* ended with *{{.Status.State}}*. <{{.Status.URL}}|View logs>.
  spec:
    containers:
    - args:
      - --gcs-upload-secret=/secrets/gcs/service-account.json
      - --image-import-pull-secret=/etc/pull-secret/.dockerconfigjson
      - --report-credentials-file=/etc/report/credentials
      - --target=ocp-61589-max-nodes-post-network-expansion
      command:
      - ci-operator
      env:
      - name: CONFIG_SPEC
        valueFrom:
          configMapKeyRef:
            key: openshift-qe-network-performance-tests-main.yaml
            name: ci-operator-main-configs
      image: ci-operator:latest
      imagePullPolicy: Always
      name: ""
      resources:
        requests:
          cpu: 10m
      volumeMounts:
      - mountPath: /etc/boskos
        name: boskos
        readOnly: true
      - mountPath: /secrets/gcs
        name: gcs-credentials
        readOnly: true
      - mountPath: /secrets/manifest-tool
        name: manifest-tool-local-pusher
        readOnly: true
      - mountPath: /etc/pull-secret
        name: pull-secret
        readOnly: true
      - mountPath: /etc/report
        name: result-aggregator
        readOnly: true
    serviceAccountName: ci-operator
    volumes:
    - name: boskos
      secret:
        items:
        - key: credentials
          path: credentials
        secretName: boskos-credentials
    - name: gcs-credentials
      secret:
        secretName: gce-sa-credentials-gcs-publisher
    - name: manifest-tool-local-pusher
      secret:
        secretName: manifest-tool-local-pusher
    - name: pull-secret
      secret:
        secretName: registry-pull-credentials
    - name: result-aggregator
      secret:
        secretName: result-aggregator