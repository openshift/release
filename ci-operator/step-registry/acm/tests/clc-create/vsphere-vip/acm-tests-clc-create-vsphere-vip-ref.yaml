ref:
  as: acm-tests-clc-create-vsphere-vip
  from: clc-ui-e2e
  commands: acm-tests-clc-create-vsphere-vip-commands-v2.sh
  timeout: 28800s
  resources:
    requests:
      cpu: '2'
      memory: 6Gi
  credentials:
    - namespace: test-credentials
      name: opp-acm-clc-credentials
      mount_path: /tmp/secrets/clc-interop
    - namespace: test-credentials
      name: acm-clc-credentials
      mount_path: /tmp/secrets/clc
    - namespace: test-credentials
      name: acm-ci-credentials
      mount_path: /tmp/secrets/ci
  env:
  - name: VSPHERE_API_VIP
    default: ""
    documentation: |-
      Optional: Specific API VIP for managed cluster on vSphere.
      If not set, vSphere will auto-assign a VIP from the network range.
      Must be accessible via proxy if running in restricted network environment.
  - name: VSPHERE_INGRESS_VIP
    default: ""
    documentation: |-
      Optional: Specific Ingress VIP for managed cluster on vSphere.
      If not set, vSphere will auto-assign a VIP from the network range.
  - name: VSPHERE_FOLDER
    default: "/Datacenter/vm/ci-clusters"
    documentation: |-
      vSphere folder path for VM placement. Default is /Datacenter/vm/ci-clusters.
  - name: CYPRESS_OC_IDP
    default: "kube:admin"
    documentation: |-
      Identity
  - name: CYPRESS_OPTIONS_HUB_USER
    default: "kubeadmin"
    documentation: |-
      Hub cluster username
  - name: CYPRESS_SPOKE_CLUSTER
    default: ""
    documentation: |-
      Identify spoke clusters
  - name: BROWSER
    default: "chrome"
    documentation: |-
      Set browser for cypress
  - name: CUSTOMER_TAGS
    default: ""
    documentation: |-
      Freestyle tags for cypress
  - name: CYPRESS_CLC_OC_IDP
    default: "clc-e2e-htpasswd"
    documentation: |-
      Serves tests RBAC settings
  - name: CYPRESS_CLC_RBAC_PASS
    default: "test-RBAC-4-e2e"
    documentation: |-
      Serves tests RBAC settings
  - name: CYPRESS_CLC_OCP_IMAGE_REGISTRY
    default: "quay.io/openshift-release-dev/ocp-release"
    documentation: |-
      Image registry
  - name: CYPRESS_ACM_NAMESPACE
    default: "ocm"
    documentation: |-
      Acm namespace
  - name: CYPRESS_MCE_NAMESPACE
    default: "multicluster-engine"
    documentation: |-
      Mce namespace
  - name: IMPORT_KUBERNETES_CLUSTERS
    default: ""
    documentation: |-
      Comma separated list of imports
  documentation: |-
    Enhanced version of acm-tests-clc-create that automatically configures vSphere connection
    parameters from CI lease system. All vSphere infrastructure details (vCenter, credentials,
    datacenter, datastore, cluster, network, resource pool, base domain) are dynamically
    populated from the allocated lease resources.

    Optionally supports specifying API and Ingress VIPs for proxy accessibility in restricted
    network environments.

    This step works in both standard environments (AWS/Azure) and vSphere environments,
    automatically detecting the platform and applying appropriate configuration.
