ref:
  as: acm-interop-p2p-submariner-verify
  from: cli
  commands: acm-interop-p2p-submariner-verify-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 250Mi
  timeout: 45m0s
  grace_period: 10m0s
  env:
    - name: ACM_SPOKE_CLUSTER_COUNT
      default: "2"
      documentation: Number of ACM spoke clusters to verify Submariner connectivity for.
    - name: SUBMARINER_VERIFY_DEBUG_MODE
      default: "false"
      documentation: |-
        When true, a verify failure is logged but does not fail the job.
        Set to "true" during active debugging to allow the job to proceed
        past this step even when Submariner connectivity is not healthy.
    - name: SUBMARINER_RUN_SUBCTL_VERIFY
      default: "false"
      documentation: |-
        When true, installs subctl and runs 'subctl verify --only connectivity,service-discovery'
        between each spoke pair. Set to "false" (default) when using acm-interop-p2p-submariner-addon
        (ACM-native install) to avoid downloading subctl. The oc-native gateway and tunnel checks
        run regardless of this setting.
    - name: SUBMARINER_VERIFY_HUB_SPOKE
      default: "false"
      documentation: |-
        When true, also verifies hub (KUBECONFIG) ↔ each spoke Submariner connectivity:
          - Asserts no Globalnet subnets on hub gateways
          - Probes bidirectional CCLM sync TCP (port SUBMARINER_CCLM_SYNC_PORT) hub↔spoke
        Set to "true" when acm-interop-p2p-submariner-addon enrolled local-cluster (hub)
        in the Submariner mesh — required for hub↔spoke CCLM migration.
    - name: SUBMARINER_VERIFY_CCLM_SYNC
      default: "true"
      documentation: |-
        When true, probe TCP port SUBMARINER_CCLM_SYNC_PORT between virt-synchronization-controller
        pod IPs on each cluster pair (KubeVirt CCLM sync path). Hub↔spoke probes run when
        SUBMARINER_VERIFY_HUB_SPOKE=true.
    - name: SUBMARINER_CCLM_CNV_NAMESPACE
      default: "openshift-cnv"
      documentation: CNV namespace where virt-synchronization-controller runs.
    - name: SUBMARINER_CCLM_SYNC_PORT
      default: "8443"
      documentation: KubeVirt cross-cluster sync controller TCP port.
    - name: SUBMARINER_CCLM_SYNC_PROBE_TIMEOUT
      default: "10"
      documentation: Seconds to wait for each CCLM sync TCP probe.
  documentation: |-
    Submariner connectivity verification step (usable after both subctl-based and
    ACM-addon-based Submariner installation).

    What this step does:
      1. Shows initial gateway tunnel status on each spoke (oc-native, no subctl needed).
         Also shows hub status when SUBMARINER_VERIFY_HUB_SPOKE=true.
      2. Waits for all IPsec tunnels to reach "connected" state (up to 600s) via oc.
      3. Asserts remote subnets are pod CIDRs (not Globalnet 242.x) via oc gateway status.
         Also checks hub when SUBMARINER_VERIFY_HUB_SPOKE=true.
      4. Pre-warms Lighthouse service discovery between each spoke pair.
      5. Optionally runs 'subctl verify' between spoke pairs (requires
         SUBMARINER_RUN_SUBCTL_VERIFY=true; subctl is downloaded only when set).
      6. Probes bidirectional TCP SUBMARINER_CCLM_SYNC_PORT between
         virt-synchronization-controller pod IPs on spoke↔spoke pairs.
         When SUBMARINER_VERIFY_HUB_SPOKE=true, also probes hub↔spoke pairs —
         required for hub↔spoke CCLM migration.

    subctl dependency:
      - Default (SUBMARINER_RUN_SUBCTL_VERIFY=false): no subctl downloaded or needed.
        All checks use oc and native gateway CRs. Use when acm-interop-p2p-submariner-addon
        was used for installation.
      - When SUBMARINER_RUN_SUBCTL_VERIFY=true: subctl is installed to /tmp/bin/ at step
        start and used for ShowConnections and subctl verify. Use when the legacy
        cloud-prepare + broker-join chain was used.

    Submariner is deployed without Globalnet; remote subnets must be pod CIDRs
    (not 242.x) for KubeVirt CCLM sync traffic (raw pod IPs) to work.
