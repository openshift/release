ref:
  as: acm-interop-p2p-cluster-upgrade
  from_image:
    namespace: ocp
    name: cli-jq
    tag: latest
  commands: acm-interop-p2p-cluster-upgrade-commands.sh
  timeout: 6h0m0s
  resources:
    requests:
      cpu: '1'
      memory: 500Mi
  env:
  - name: TARGET_CHANNEL
    default: ""
  - name: ACM_UPGRADE_TIMEOUT_SECONDS
    default: "7200"
    documentation: Seconds to wait for clusterversion to reach Completed state (default 2 hours).
  - name: ACM_UPGRADE_POLL_INTERVAL
    default: "30"
    documentation: Seconds between clusterversion poll attempts.
  documentation: |-
    Upgrades Hub cluster to latest RC version