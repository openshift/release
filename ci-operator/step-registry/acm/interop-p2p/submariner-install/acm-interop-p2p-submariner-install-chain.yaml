chain:
  as: acm-interop-p2p-submariner-install
  steps:
    - ref: acm-interop-p2p-submariner-addon
    - ref: acm-interop-p2p-submariner-verify
  documentation: |-
    Installs and verifies Submariner for a 1-hub + N-spoke cluster topology
    without Globalnet (non-overlapping pod CIDRs per spoke) using ACM's native
    ManagedClusterAddon and SubmarinerConfig CRs. No subctl required for installation.

    This chain sequences two steps:

      1. acm-interop-p2p-submariner-addon (replaces cloud-prepare + broker-join)
         Creates AWS credentials Secrets, SubmarinerConfig (globalnetEnabled=false,
         gateways=1, libreswan), and ManagedClusterAddon/submariner in each managed
         cluster namespace on the hub — including local-cluster (hub itself).
         ACM's Submariner addon controller handles automatically:
           - Cloud preparation (AWS security groups, dedicated gateway MachineSet)
           - Submariner broker deployment on the hub
           - Cluster join for each enrolled cluster (hub + all spokes)
           - submariner-operator, gateway, routeagent, lighthouse, coredns install
         Waits for ManagedClusterAddon/submariner Available on all clusters.
         Asserts globalnetEnabled=false on all SubmarinerConfig CRs.

         Key improvement over subctl approach:
           The ACM hub (local-cluster) is enrolled as a Submariner participant —
           enabling hub↔spoke pod-to-pod connectivity for CCLM migration.
           The former subctl broker-join only joined spokes, leaving the hub
           without direct pod network connectivity to any spoke.

      2. acm-interop-p2p-submariner-verify
         Waits for IPsec tunnels to reach connected state (oc-native gateway CRs),
         asserts no Globalnet subnets (242.x) on all clusters including hub,
         pre-warms Lighthouse service discovery between spoke pairs,
         optionally runs subctl verify (SUBMARINER_RUN_SUBCTL_VERIFY=true), and
         probes CCLM sync TCP between virt-synchronization-controller pod IPs on
         spoke↔spoke and hub↔spoke pairs (SUBMARINER_VERIFY_HUB_SPOKE=true).

    Requires acm-interop-p2p-cluster-install ResolveSpokeCidrs so each spoke
    has unique pod/machine/service CIDRs — required for KubeVirt CCLM sync on
    raw pod IPs.

    The legacy subctl-based steps (acm-interop-p2p-submariner-cloud-prepare and
    acm-interop-p2p-submariner-broker-join) are preserved as individual refs for
    workflows that still use the subctl path.
