ref:
  as: acm-policies-openshift-plus
  from: cli-with-git
  commands: acm-policies-openshift-plus-commands.sh
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
  env:
  - name: IGNORE_SECONDARY_POLICIES
    default: "false"
    documentation: |-
      flag that disables policy compliance validation for some components to allow limited testing to proceed.
  - name: QUAY_OPERATOR_CHANNEL
    default: ""
    documentation: |-
      When set, overrides the Quay operator subscription channel in the policy-collection
      policy template before deploying. Use to pin a specific channel (e.g. stable-3.17)
      when the catalog default channel is incorrect or outdated.
  documentation: |-
    Setup and apply the openshift-plus policyset.
