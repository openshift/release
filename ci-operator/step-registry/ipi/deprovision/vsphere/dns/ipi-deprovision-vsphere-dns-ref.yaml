ref:
  as: ipi-deprovision-vsphere-dns
  from: vsphere-ci-python
  commands: ipi-deprovision-vsphere-dns-commands.py
  run_as_script: true
  env:
  - name: VSPHERE_ADDITIONAL_CLUSTER
    default: "false"
    documentation: >-
      When true, also deletes DNS records for the spoke cluster provisioned by hive e2e.
  resources:
    requests:
      cpu: 1000m
      memory: 100Mi
  credentials:
  - namespace: test-credentials
    name: ci-route-53
    mount_path: /var/run/vault/vsphere
  documentation: >-
    Deletes Route53 DNS records created by the ipi-conf-vsphere-dns step.
    Reconstructs the record set from ${SHARED_DIR}/vips.txt and environment
    variables, then issues a DELETE change batch via the Route53 API.
