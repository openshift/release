ref:
  as: ipi-deprovision-gcp-aws-route53
  from_image:
    namespace: ocp
    name: "4.15"
    tag: upi-installer
  commands: ipi-deprovision-gcp-aws-route53-commands.sh
  resources:
    requests:
      cpu: 1000m
      memory: 100Mi
  credentials:
  - namespace: ci
    name: cluster-secrets-aws-qe
    mount_path: /var/run/vault/gcp
  documentation: >-
    Delete DNS records via `${SHARED_DIR}/hosted-zone.txt` and `${SHARED_DIR}/dns-delete.json`. 
    The IP addresses were collected with the ipi-conf-gcp-aws-route53 step.
