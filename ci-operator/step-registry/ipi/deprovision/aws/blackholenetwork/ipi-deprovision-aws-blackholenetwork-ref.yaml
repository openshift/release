ref:
  as: ipi-deprovision-aws-blackholenetwork
  from_image:
    namespace: ocp
    name: "4.5"
    tag: upi-installer
  grace_period: 10m
  commands: ipi-deprovision-aws-blackholenetwork-commands.sh
  resources:
    requests:
      cpu: 300m
      memory: 300Mi
  env:
  - name: AWS_REGION_OVERWRITE
    default: ""
    documentation: |-
      AWS region override. When set, takes precedence over LEASED_RESOURCE.
      Required for cluster profiles whose leases are not region names.
  documentation: |-
    The deprovision step tears down the blackholenetwork by destroying its stack.
