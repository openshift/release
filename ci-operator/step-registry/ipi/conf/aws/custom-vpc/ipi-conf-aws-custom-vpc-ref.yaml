ref:
  as: ipi-conf-aws-custom-vpc
  from_image:
    namespace: ocp
    name: "4.18"
    tag: upi-installer
  grace_period: 10m
  commands: ipi-conf-aws-custom-vpc-commands.sh
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
  env:
  - name: ADD_ZONES
    default: "yes"
    documentation: |-
      Add AZs to the install-config.yaml
  - name: PUBLISH
    default: ""
    documentation: |-
      This field represents the Cluster publish strategy
  - name: ASSIGN_ROLES_TO_SUBNETS
    default: "no"
    documentation: |-
      If assign roles to subnets.
  - name: SUBNET_ROLES
    default: ""
    documentation: |-
      json format. e.g.

      [
        [
          {
            "priv": "F,G,H",
            "pub": "H,I"
          },
          {
            "priv": "A,B,C",
            "pub": "D"
          }
        ],
        [
          {
            "priv": "AA,BB,CC",
            "pub": "DD,EE"
          }
        ]
      ]
  - name: OPENSHIFT_INSTALL_AWS_PUBLIC_ONLY
    default: ""
    documentation: |-
      Whether to use only public subnets for AWS.
  documentation: |-
    Generate configurations for custom VPC.
