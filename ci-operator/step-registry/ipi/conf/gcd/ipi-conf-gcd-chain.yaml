chain:
  as: ipi-conf-gcd
  steps:
  - ref: ipi-conf
  - ref: ipi-conf-telemetry
  - ref: ipi-conf-gcd-creds
  - ref: ipi-conf-gcp
  - ref: ipi-conf-gcp-osimage
  - ref: ipi-conf-gcp-zones
  - ref: ipi-install-monitoringpvc
  documentation: >-
    This chain generates an install-config.yaml configured to run clusters
    on Google Cloud Dedicated (GCD). Validates credentials before
    configuring GCP-specific install-config fields.
