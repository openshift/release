ref:
  as: ipi-conf-vsphere-zones
  from: upi-installer
  commands: ipi-conf-vsphere-zones-commands.sh
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
  credentials:
  - namespace: test-credentials
    name: vsphere-vmc
    mount_path: /var/run/vault/vsphere
  - namespace: test-credentials
    name: ci-ibmcloud
    mount_path: /var/run/vault/ibmcloud
  documentation: >-
    DEPRECATED: This step is no longer invoked by the ipi-conf-vsphere-zones chain.
    Zone configuration is now generated dynamically by ipi-conf-vsphere-vcm, which
    derives failure domain names from the VCM-managed platform.json.  The number of
    zones is controlled by the POOLS env var on the ipi-conf-vsphere-zones chain.
    Jobs still referencing this step directly should migrate to the ipi-conf-vsphere-zones
    chain with the vsphere-elastic cluster profile.

