ref:
  as: ipi-conf-gcp-private-dns-zone
  from_image:
   namespace: ocp
   name: "4.12"
   tag: upi-installer
  commands: ipi-conf-gcp-private-dns-zone-commands.sh
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
  env:
  - name: PRIVATE_ZONE_PROJECT_TYPE
    default: "service-project"
    documentation: |-
      The DNS private zone will be in host project, service project, or a third project.
      Valid values: "service-project" (default), "host-project", "third-project".
  documentation: >-
    The IPI configure step updates install-config.yaml to insert privateDNSZone settings. The file "cluster-pvtz-project" must exist in SHARED_DIR beforehand.
