ref:
  as: ipi-conf-gcp-aws-route53
  from_image:
    namespace: ocp
    name: "4.15"
    tag: upi-installer
  commands: ipi-conf-gcp-aws-route53-commands.sh
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
  credentials:
  - namespace: ci
    name: cluster-secrets-aws-qe
    mount_path: /var/run/vault/gcp
  documentation: >-
    Create route53 dns records for API server and INGRESS server.
    Saves batch job to delete DNS records to ${SHARED_DIR}/dns-delete.json for use in deprovisioning, with the hosted zone ID in ${SHARED_DIR}/hosted-zone.txt.
