ref:
  as: ipi-conf-gcp-gpu-on-host-maintenance
  from_image:
    namespace: ocp
    name: "4.12"
    tag: upi-installer
  commands: ipi-conf-gcp-gpu-on-host-maintenance-commands.sh
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
  env:
  - name: CONTROL_PLANE_NODE_TYPE
    default: ""
    documentation: |-
      The instance size of the control plane nodes (e.g., Standard_D8s_v3)
  - name: COMPUTE_NODE_TYPE
    default: ""
    documentation: |-
      The instance size of the compute nodes (e.g., Standard_D4s_v3)
  documentation: |-
    The IPI configure step updates install-config.yaml with with host maintenance to Terminate for gpu node.
