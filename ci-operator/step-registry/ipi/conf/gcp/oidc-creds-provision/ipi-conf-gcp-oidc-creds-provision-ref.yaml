ref:
  as: ipi-conf-gcp-oidc-creds-provision
  from: cloud-credential-operator
  cli: latest
  commands: ipi-conf-gcp-oidc-creds-provision-commands.sh
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
  dependencies:
  - name: "release:latest"
    env: RELEASE_IMAGE_LATEST_FROM_BUILD_FARM
  env:
  - name: ENABLE_MIN_PERMISSION_FOR_STS
    default: "false"
    documentation: |-
      Assign minimal permissions for provisioning workload identity related resources by ccoctl.
  - name: FEATURE_SET
    default: ""
    documentation: |-
      Add --enable-tech-preview option to ccoctl, allow ccoctl process tech-preview CRs
  - name: EXTRACT_MANIFEST_INCLUDED
    default: "false"
    documentation: |-
      Determine whether to exclude manifests that are not expected to be included in the cluster when extracting.
  - name: CUSTOM_OPENSHIFT_INSTALL_RELEASE_IMAGE_OVERRIDE
    default: ""
    documentation: |-
      When set, `oc adm release extract --credentials-requests` uses this payload image instead of
      release:initial / RELEASE_IMAGE_LATEST_FROM_BUILD_FARM, aligning CredentialsRequests with the
      same image used for cluster installation (see ipi-install-install).
  - name: CCOCTL_RELEASE_IMAGE
    default: ""
    documentation: |-
      When set, extract the ccoctl binary from this OpenShift release payload image using
      `oc adm release extract -a "${CLUSTER_PROFILE_DIR}/pull-secret" --command=ccoctl --to=...`
      and prepend it to PATH, instead of using the ccoctl bundled in the cloud-credential-operator step image.
  documentation: |-
    The IPI oidc-creds-provision configure step adds a authentications.config.openshift.io/cluster object
    and secrets for each operator.
