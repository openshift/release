ref:
  as: ipi-conf-azure-allowsharedkeyaccess
  from_image:
    namespace: ocp
    name: "4.18"
    tag: upi-installer
  grace_period: 10m
  commands: ipi-conf-azure-allowsharedkeyaccess-commands.sh
  env:
  - name: AZURE_ALLOW_SHARED_KEY_ACCESS
    default: "" 
    documentation: Specify if shared access key should be enabled for the storage account.
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
  documentation: |-
    The IPI configure step updates install-config.yaml to set allowsharedkeyaccess in azure
