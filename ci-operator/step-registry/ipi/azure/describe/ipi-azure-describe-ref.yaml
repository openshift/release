ref:
  as: ipi-azure-describe
  from_image:
    namespace: ocp
    name: "4.16"
    tag: upi-installer
  commands: ipi-azure-describe-commands.sh
  best_effort: true
  timeout: 10m
  resources:
    requests:
      cpu: 100m
      memory: 100Mi
  documentation: |-
    Post-install step that queries Azure Resource Graph for all resources in the
    cluster resource group and writes the full inventory to artifacts. Sensitive
    fields (SSH keys, passwords, secrets) are stripped from the output.
