ref:
  as: ipi-install-libvirt-install
  from: libvirt-installer
  # Inject oc for console.url / worker.ign persistence; libvirt-installer has no oc.
  cli: latest
  grace_period: 30m
  commands: ipi-install-libvirt-install-commands.sh
  env:
  - name: ARCH
  - name: BRANCH
  - name: INSTALLER
    default: "libvirt"
    documentation: |-
      The installation target for the job. Valid values are ['libvirt', 'powervs']
  - name: MASTER_REPLICAS
    default: "3"
  - name: MASTER_MEMORY
    default: "32768"
  - name: MASTER_DISK
    default: "42949672960"
  - name: WORKER_REPLICAS
    default: "2"
  - name: WORKER_MEMORY
    default: "16384"
  - name: WORKER_DISK
    default: "42949672960"
  - name: NODE_TUNING
    default: "false"
  - name: FIPS_ENABLED
    default: "false"
    documentation: "Indicates a FIPS-enabled cluster, to disable FIPS host checks in the installer."
  - name: OPENSHIFT_INSTALL_EXPERIMENTAL_DISABLE_IMAGE_POLICY
    default: "true"
    documentation: "Set to true to disable the Sigstore image signature policy to allow the installation of an unsigned release image. This is for internal CI testing only"
  - name: IPI_LIBVIRT_S390X_ACPI_XSLT_PATCH
    default: "false"
    documentation: |-
      When "true" and ARCH is s390x, wraps install-dir/terraform/bin/terraform to run a patch
      script before each terraform init/apply in the module working directory (unpackAndInit has
      no gap for a parallel poller).       The patch injects xml.xslt on libvirt_domain resources to strip
      <acpi/> (RHEL 9 QEMU s390-ccw-virtio-rhel9.*). The provider runs xsltproc; this step installs
      libxslt (EL9 RPM unpack from public mirrors as UID 1000 via cpio or python3 newc unpack, or package managers when root) when needed. Fragile across installer versions; prefer a
      provider fix or hypervisor hook for production.
  - name: LIBVIRT_POOL_NAME
    default: ""
    documentation: |-
      When set (e.g. multiarch-ci-pool), do not let openshift-install create a per-cluster dir pool
      under /var/lib/libvirt/openshift-images. Instead reuse the named existing libvirt pool for
      terraform volumes/ignition and machine-api poolName. Leave empty for default installer
      behavior (Power and hosts with a large FS mounted at the installer path).
  - name: LIBVIRT_IMAGE_PATH
    default: "/home/libvirt/openshift-images"
    documentation: |-
      Directory used only if LIBVIRT_POOL_NAME is set and the pool must be created on the hypervisor
      (same semantics as upi-install-libvirt). Ignored when LIBVIRT_POOL_NAME is empty.
  resources:
    requests:
      cpu: 1000m
      memory: 2Gi
    limits:
      memory: 6Gi
  dnsConfig:
    nameservers:
    - 172.30.38.188
    searches:
    - "bastion-z.svc.cluster.local"
    - "bastion-ppc64le-libvirt.svc.cluster.local"
  dependencies:
  - name: "release:latest"
    env: OPENSHIFT_INSTALL_RELEASE_IMAGE_OVERRIDE
  - name: "release:latest"
    env: RELEASE_IMAGE_LATEST
  documentation: |-
    The libvirt IPI install step runs the OpenShift Installer in order to bring
    up an OpenShift cluster.
