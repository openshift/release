workflow:
  as: ipi-aws-ovn-custom-network
  steps:
    pre:
    - chain: ipi-conf-aws
    - ref: ipi-install-config-network-custom
    - ref: ovn-conf
    - chain: ipi-install
    post:
    - chain: gather-core-dump
    - chain: ipi-aws-post
  documentation: |-
    The IPI AWS OVN Custom Network workflow executes the common IPI AWS workflow
    with custom network configuration optimized for large scale testing.
    
    This workflow configures:
    - OVN-Kubernetes as the network type
    - Custom cluster network CIDR (10.128.0.0/20) 
    - Custom service network CIDR (172.30.0.0/16)
    - Custom machine network CIDR (10.0.0.0/16)
    - Host prefix of 23 bits for node subnets
    
    It includes monitoring PVC setup and RBAC configuration for extended
    cluster testing scenarios.