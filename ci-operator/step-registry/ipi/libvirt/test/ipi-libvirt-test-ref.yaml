ref:
  as: ipi-libvirt-test
  from: tests
  commands: ipi-libvirt-test-commands.sh
  resources:
    requests:
      cpu: "3"
      memory: 600Mi
    limits:
      memory: 2Gi
  dnsConfig:
    searches:
      - "coredns-z"
  documentation: |-
    The LIBVIRT test step executes the common end-to-end test suite.
