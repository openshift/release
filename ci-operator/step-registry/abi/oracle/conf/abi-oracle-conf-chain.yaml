chain:
  as: abi-oracle-conf
  steps:
#   - ref: abi-oracle-conf-download-cli
#   - ref: abi-oracle-conf-set-vars
    - ref: abi-oracle-conf-prepare-files
    - ref: abi-oracle-conf-create-iso
    - ref: abi-oracle-conf-provision
  documentation: |-
    The abi-oracle-conf chain executes all the steps that provision the common configuration for OpenShift
    clusters to install via the agent install on Oracle Cloud. Workflows and other chains will be responsible
    for specific configurations and patches of the installation manifests, and to actually start the clusters rendering.
    This chain is not meant to be used directly by users, but is needed as a dependency of any other step that creates
    the agent-install.yaml and install-config.yaml
