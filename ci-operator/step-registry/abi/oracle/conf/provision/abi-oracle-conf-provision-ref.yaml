ref:
  as: abi-oracle-conf-provision
  from_image:
    namespace: ci
    name: "baremetal-qe-base"
    tag: latest
  commands: abi-oracle-conf-provision-commands.sh
  resources:
    requests:
      cpu: '1'
      memory: 128Mi
  credentials:
  - namespace: test-credentials # this entry injects the custom credential
    name: oci-secret-compartment
    mount_path: /var/run/oci-secret-compartment
  - namespace: test-credentials # this entry injects the custom credential
    name: oci-secret-tenancy
    mount_path: /var/run/oci-secret-tenancy
  documentation: |-
    The abi-oracle-conf-provision provisions required infrastructure and objects on OCI

