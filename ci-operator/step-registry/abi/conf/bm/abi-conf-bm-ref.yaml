ref:
  as: abi-conf-bm
  from_image:
    namespace: ci
    name: "baremetal-qe-base"
    tag: latest
  commands: abi-conf-bm-commands.sh
  resources:
    requests:
      cpu: "1"
      memory: 256Mi
  grace_period: 5m
  credentials:
    - namespace: test-credentials
      name: registry-pull-credentials
      mount_path: /var/run/secrets/registry-pull--build-farms
  env:
    - name: OCP__ABI__CLUSTER_DIR
      default: ocpClusterDir
      documentation: |-
        The `openshift-install` workspace path (preferred: relative to the Step's CWD); must match **abi-install-bmc** when overriding.
    - name: OCP__ABI__BM__CLS_NAME
      documentation: |-
        Required (no default). The Cluster name to be deployed.
    - name: OCP__ABI__BM__BASE_DOM
      documentation: |-
        Required (no default). The Cluster DNS Base Domain.
    - name: OCP__ABI__INSTLR_LOG_LEVEL
      default: "info"
      documentation: |-
        Log level for `openshift-install` (`--log-level`).
    - name: OCP__ABI__DAY0_SCRIPTS_YAML
      default: "Scripts: []"
      documentation: |-
        Phase Customization Script for Day-0 (see [Phase Customization Scripts](https://github.com/RedHatQE/OpenShift-LP-QE--Tools/blob/main/ci-operator/step-registry/abi/README.md#phase-customization-scripts)).
    - name: OCP__ABI__DAY1_SCRIPTS_YAML
      default: "Scripts: []"
      documentation: |-
        Phase Customization Script for Day-1 (see [Phase Customization Scripts](https://github.com/RedHatQE/OpenShift-LP-QE--Tools/blob/main/ci-operator/step-registry/abi/README.md#phase-customization-scripts)).
    - name: OCP__ABI__MIN_ISO
      default: "1"
      documentation: |-
        When non-zero, patches `agent-config.yaml` with `.minimalISO=true` and `.bootArtifactsBaseURL` (boot artifacts served via Chisel tunnel) before `agent create image`. Set to `0` to embed all artifacts in the ISO.
    - name: OCP__ABI__TUN_SVC__DP_BASE_URL
      documentation: |-
        Required when OCP__ABI__MIN_ISO is non-zero. BMC-facing HTTPS prefix for boot artifacts on the data plane (no trailing slash), e.g. `https://<svcFQDN>/dp`.
    - name: OCP__ABI__TUN_SVC__DP_PORT
      documentation: |-
        Required when OCP__ABI__MIN_ISO is non-zero. Server-side data-plane port in the Chisel reverse tunnel for serving boot artifacts.
  documentation: |-
    The `${CLUSTER_PROFILE_DIR}/` MUST contain files: `pull-secret`, `ssh-publickey`, `cred--bmc--usr`, `cred--bmc--pwd`, and `ocp--abi--cfg.yaml`.

    See [ABI overview](../../README.md) for details.

    The Container Image [ci/baremetal-qe-base:latest](https://github.com/openshift-eng/baremetal-qe-infra/blob/master/images/prow-image/Dockerfile) is used
    because it provides `nmstatectl`.
