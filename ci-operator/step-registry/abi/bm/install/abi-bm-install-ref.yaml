ref:
  as: abi-bm-install
  from_image:
    namespace: ci
    name: "baremetal-qe-base"
    tag: latest
  commands: abi-bm-install-commands.sh
  resources:
    requests:
      cpu: "1"
      memory: 512Mi
  grace_period: 120
  credentials:
    - namespace: test-credentials
      name: chisel-creds
      mount_path: /secret/chisel
  env:
    - name: OCP__ABI__CLUSTER_DIR
      default: ocpClusterDir
      documentation: |-
        `openshift-install` workspace path relative to the step working directory; must match **abi-bm-conf** output layout.
    - name: OCP__ABI__INSTLR_LOG_LEVEL
      default: "info"
      documentation: |-
        Log level for `openshift-install` (`--log-level`).
    - name: OCP__ABI__TEAM_NAME
      documentation: |-
        Required (no default). Vault-synced Chisel basic-auth files under `/secret/chisel` use this value as the filename suffix (`chisel-usr--…`, `chisel-pwd--…`).
    - name: OCP__ABI__TUN_SVC__DP_BASE_URL
      documentation: |-
        Required (no default). BMC-facing HTTPS prefix for the install ISO on the data plane (no trailing slash), e.g. `https://<svcFQDN>/dp`. The served ISO URL is this prefix, the data-plane port, and the ISO basename.
    - name: OCP__ABI__TUN_SVC__DP_PORT
      documentation: |-
        Required (no default). Server-side data-plane port in the Chisel reverse tunnel and in the ISO URL path. Each Cluster Under Test must reserve a distinct port when several jobs share one Chisel server (see the ops port table in the Chisel/NGINX reference).
    - name: OCP__ABI__TUN_SVC__CP_URL
      documentation: |-
        Required (no default). Control-plane URL for `chisel client` (e.g. `https://<svcFQDN>/cp`).
    - name: OCP__ABI__MIN_ISO
      default: "1"
      documentation: |-
        When non-zero, patches `agent-config.yaml` with `.minimalISO=true` and `.bootArtifactsBaseURL` (boot artifacts served via Chisel tunnel) before `agent create image`. Set to `0` to embed all artifacts in the ISO.
    - name: OCP__ABI__WAIT__BOOTSTRAP__H
      default: "2"
      documentation: |-
        Maximum attempts for `openshift-install agent wait-for bootstrap-complete` (each attempt is still subject to the installer's internal timeout).
    - name: OCP__ABI__WAIT__CLUSTER__H
      default: "2"
      documentation: |-
        Maximum attempts for `openshift-install agent wait-for install-complete`.
    - name: OCP__ABI__DAY2_SCRIPTS_YAML
      default: "Scripts: []"
      documentation: |-
        Phase Customization Script for Day-2 (see [Phase Customization Scripts](https://github.com/RedHatQE/OpenShift-LP-QE--Tools/blob/main/ci-operator/step-registry/abi/README.md#phase-customization-scripts)).
  documentation: |-
    The `${CLUSTER_PROFILE_DIR}/` MUST contain files: `ocp--abi--cfg.yaml`.

    See [ABI overview](../../README.md) for details.

    The shared **Chisel** service and **NGINX** in front of it must be built so configurable data-plane port forwarding works, as described in
    [WebApp Services — Chisel Tunneling Service](https://redhat.atlassian.net/wiki/spaces/MPEXIENG/pages/254804070/WebApp+Services#Chisel-Tunneling-Service).
    Required tunnel-related parameters are documented on their respective Env. Var. entries above. Do not change URL or port semantics without that reference.
