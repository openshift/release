ref:
  as: abi-bm-conf
  from_image:
    namespace: ci
    name: "baremetal-qe-base"
    tag: latest
  commands: abi-bm-conf-commands.sh
  resources:
    requests:
      cpu: "1"
      memory: 256Mi
  grace_period: 120
  env:
    - name: OCP__ABI__CLUSTER_DIR
      default: ocpClusterDir
      documentation: |-
        `openshift-install` workspace path relative to the step working directory (not **SHARED_DIR**); must match **abi-bm-install** when overriding.
    - name: OCP__ABI__BM__CLS_NAME
      documentation: |-
        Required (no default). **metadata.name** in the initial **install-config**.
    - name: OCP__ABI__BM__BASE_DOM
      documentation: |-
        Required (no default). **baseDomain** for **install-config**.
    - name: OCP__ABI__INSTLR_LOG_LEVEL
      default: "info"
      documentation: |-
        Log level for `openshift-install` (`--log-level`).
    - name: OCP__ABI__DAY0_SCRIPTS_YAML
      default: "Scripts: []"
      documentation: |-
        Customization YAML after **install-config** / **agent-config** scaffolding and before **bmc--info.json** (passed to BuildCustomScriptsFromYAML). Default is an empty script list. Schema: [BuildCustomScriptsFromYAML.sh](https://github.com/RedHatQE/OpenShift-LP-QE--Tools/blob/HEAD/libs/bash/common/BuildCustomScriptsFromYAML.sh).
    - name: OCP__ABI__DAY1_SCRIPTS_YAML
      default: "Scripts: []"
      documentation: |-
        Customization YAML after **cluster-manifests** are generated, before the workspace is archived for **abi-bm-install**. Default is an empty script list. Schema: [BuildCustomScriptsFromYAML.sh](https://github.com/RedHatQE/OpenShift-LP-QE--Tools/blob/HEAD/libs/bash/common/BuildCustomScriptsFromYAML.sh).
  documentation: |-
    Step input parameters are documented on each **`env`** entry above.

    **CLUSTER_PROFILE_DIR** (provided by CI; not an `env` field here) must contain **pull-secret**, **ssh-publickey**, **cred--bmc--usr**, and **cred--bmc--pwd**.

    ABI overview: [`abi/README.md`](../../README.md).

    **`from_image`:** **`ci/baremetal-qe-base:latest`** is built from [openshift-eng/baremetal-qe-infra](https://github.com/openshift-eng/baremetal-qe-infra) (`images/prow-image/Dockerfile`) and promoted to **`ci`**. The image installs the **`nmstate`** RPM (provides **`nmstatectl`**). This step runs **`EnsureReqs yq`** and expects **`jq`** on **`PATH`**.
