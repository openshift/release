ref:
  as: abi-install-bmc
  from_image:
    namespace: ci
    name: baremetal-qe-base
    tag: latest
  cli: latest
  commands: abi-install-bmc-commands.sh
  resources:
    requests:
      cpu: '1'
      memory: 512Mi
  grace_period: 5m
  credentials:
    - namespace: test-credentials
      name: chisel-creds
      mount_path: /var/run/secrets/chisel
    - namespace: test-credentials
      name: ieng--vault--bit-warden
      mount_path: /var/run/secrets/vault--bit-warden
    - namespace: test-credentials
      name: registry-pull-credentials
      mount_path: /var/run/secrets/registry-pull--build-farms
  env:
    - name: OCP__ABI__CLUSTER_DIR
      default: ocpClusterDir
      documentation: |-
        The `openshift-install` workspace path (preferred: relative to the Step's CWD); must match the corresponding conf. Step, e.g., **abi-conf-bm**,
        when overriding.
    - name: OCP__ABI__CFG_FN
      default: ocp--abi--cfg.yaml
      documentation: |-
        The ABI configuration file Base Name under `${CLUSTER_PROFILE_DIR}/`; must match the corresponding conf. Step, e.g., **abi-conf-bm**, when
        overriding. See
        [OCP__ABI__CFG_FN](https://github.com/openshift/release/blob/main/ci-operator/step-registry/abi/README.md#ocp__abi__cfg_fn) for details.
    - name: OCP__ABI__INSTLR_LOG_LEVEL
      default: 'debug'
      documentation: |-
        Log level for `openshift-install` (`--log-level`).
    - name: OCP__ABI__TEAM_NAME
      documentation: |-
        Required (no default). Vault-synced Chisel basic-auth files under `/secret/chisel` use this value as the filename suffix (`chisel-usr--…`,
        `chisel-pwd--…`).
    - name: OCP__ABI__TUN_SVC__DP_BASE_URL
      documentation: |-
        Required (no default). BMC-facing HTTPS prefix for the install ISO on the data plane (no trailing slash), e.g. `https://<svcFQDN>/dp`.
    - name: OCP__ABI__TUN_SVC__DP_PORT
      documentation: |-
        Required (no default). Server-side data-plane port in the Chisel reverse tunnel and in the ISO URL path. Each Cluster Under Test must reserve a
        distinct port when several jobs share one Chisel server (see
        [tunneling information](https://github.com/openshift/release/blob/main/ci-operator/step-registry/abi/README.md#tunneling--chisel) for details). The
        served ISO URL is `${OCP__ABI__TUN_SVC__DP_BASE_URL}/${OCP__ABI__TUN_SVC__DP_PORT}/<isoBaseName>`.
    - name: OCP__ABI__TUN_SVC__CP_URL
      documentation: |-
        Required (no default). Control-plane URL for `chisel client` (e.g. `https://<svcFQDN>/cp`).
    - name: OCP__ABI__WAIT__NODE_READY__M
      default: '20'
      documentation: |-
        Maximum wait time (in min.) for the Node to be ready (reachable by SSH). When this time has elapsed, it is assumed that the Node is stuck at booting
        phase.
        Recommended value:
          - 2 * AverageNodeBootTimeInMin
          - AverageNodeBootTimeInMin=10 -> 20
    - name: OCP__ABI__WAIT__BOOTSTRAP__TRY
      default: '3'
      documentation: |-
        Maximum attempts for `openshift-install agent wait-for bootstrap-complete` (each attempt is subject to the installer's internal timeout, currently
        about 60 min.).

        Recommended value:
          - RoundUp((1.5 * AverageNodeBootTimeInMin) * NumOfNodes / InstallerTimeOutInMin) + 1
          - AverageNodeBootTimeInMin=10, NumOfNodes=6, InstallerTimeOutInMin=60 -> 3
    - name: OCP__ABI__WAIT__CLUSTER__TRY
      default: '3'
      documentation: |-
        Maximum attempts for `openshift-install agent wait-for install-complete`.

        Currently `agent wait-for install-complete` does the following:
          - Wait for `bootstrap` to complete (max. 60 min.).
          - Cluster initialization to complete (max. 40 min.).
          - Cluster Operators to be completely deployed (max. 30 min.).

        Since the Step Script calls this AFTER `wait-for bootstrap-complete`, this means the first loop max. may wait up to 40 min. (the Cluster did not get
        initialized in this attempt) or up to 70 min. However, most likely the Cluster initialization is completed in the 1st attempt. The maximum wait time
        for all Cluster Operators to stabilize depends on the Node hardware.

        Expected completion time, based on Node hardware:
          - Bare Metals:
              - Cluster Operator `baremetal`:
                  - Dell PowerEdge R6615 | AMD EPYC 9634 84-Core Processor: < 1 h (6 Nodes)

        Recommended value:
          - RoundUp(ExpectedCOstableTimeInMin / 30) + 1

    - name: OCP__ABI__DAY2_SCRIPTS_YAML
      default: 'Scripts: []'
      documentation: |-
        Phase Customization Script for Day-2
        (see [Phase Customization Scripts](https://github.com/openshift/release/blob/main/ci-operator/step-registry/abi/README.md#phase-customization-scripts)).
    - name: BW__OBJ_NAME
      default: ''
      documentation: |-
        Name of the BitWarden Object (Login, Note, etc.) to attach the `KUBECONFIG`. If set to empty string, the `KUBECONFIG` is not uploaded and will be lost
        after the test is completed and the CUT (Cluster Under Test) will not be reachable at all.
  documentation: |-
    The `${CLUSTER_PROFILE_DIR}/` MUST contain files: `ssh-privatekey` and `${OCP__ABI__CFG_FN}`.

    See [ABI overview](https://github.com/openshift/release/blob/main/ci-operator/step-registry/abi/README.md) for details.

    The **Chisel** tunnel service must be exclusively used by one test at a time, hence it must support configurable data-plane port forwarding via URL path
    (see `OCP__ABI__TUN_SVC__DP_PORT`); refer to
    [tunneling information](https://github.com/openshift/release/blob/main/ci-operator/step-registry/abi/README.md#tunneling--chisel) for details. The
    required tunnel-related parameters are documented on their respective Env. Var. entries.
