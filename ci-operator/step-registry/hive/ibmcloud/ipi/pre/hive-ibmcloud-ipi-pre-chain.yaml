chain:
  as: hive-ibmcloud-ipi-pre
  steps:
  - chain: ipi-conf-ibmcloud
  - chain: ipi-install
  - ref: hive-ibmcloud-ipi-pre-install-hive
  - ref: hive-ibmcloud-ipi-pre-prepare-spoke-secrets
  documentation: |-
    Provisions the hub IBM Cloud cluster using standard IPI workflow,
    installs the Hive operator from the built HIVE_IMAGE, and prepares
    secrets required for spoke cluster deployment via ClusterDeployment.
