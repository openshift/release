ref:
  as: hive-ibmcloud-ipi-pre-install-hive
  from: cli
  cli: latest
  grace_period: 10m
  timeout: 45m
  commands: hive-ibmcloud-ipi-pre-install-hive-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  dependencies:
  - name: hive
    env: HIVE_IMAGE
  documentation: |-
    Installs the Hive operator on the hub cluster using the HIVE_IMAGE
    built from the current PR. Creates the HiveConfig resource and waits
    for all Hive components to be ready.
