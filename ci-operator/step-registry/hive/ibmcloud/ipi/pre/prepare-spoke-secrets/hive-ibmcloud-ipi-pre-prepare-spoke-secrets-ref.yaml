ref:
  as: hive-ibmcloud-ipi-pre-prepare-spoke-secrets
  from: cli
  cli: latest
  grace_period: 5m
  timeout: 15m
  commands: hive-ibmcloud-ipi-pre-prepare-spoke-secrets-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  env:
  - name: SPOKE_BASE_DOMAIN
    default: "ci-ibmcloud.devcluster.openshift.com"
    documentation: Base domain for the spoke cluster
  - name: SPOKE_WORKERS
    default: "2"
    documentation: Number of worker nodes for the spoke cluster
  documentation: |-
    Creates a namespace for the spoke cluster and prepares all required
    secrets (IBM Cloud credentials, pull-secret, SSH keys, install-config)
    that will be referenced by the ClusterDeployment.
