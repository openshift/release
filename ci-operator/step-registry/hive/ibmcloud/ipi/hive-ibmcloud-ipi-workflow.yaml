workflow:
  as: hive-ibmcloud-ipi
  steps:
    pre:
    - chain: hive-ibmcloud-ipi-pre
    test:
    - chain: hive-ibmcloud-ipi-test
    post:
    - chain: hive-ibmcloud-ipi-post
  documentation: |-
    The hive-ibmcloud-ipi workflow provisions a hub IBM Cloud cluster, installs
    the Hive operator built from the latest commit, creates a spoke cluster via
    ClusterDeployment on IBM Cloud, validates the spoke cluster installation,
    and cleans up both clusters irrespective of results.
