ref:
  as: hive-ibmcloud-ipi-post-deprovision-spoke
  from: cli
  cli: latest
  grace_period: 10m
  timeout: 90m
  commands: hive-ibmcloud-ipi-post-deprovision-spoke-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  best_effort: true
  documentation: |-
    Deprovisions the spoke cluster by deleting the ClusterDeployment.
    Hive will automatically clean up the IBM Cloud resources.
    This step is best-effort to ensure cleanup happens even if tests fail.
