ref:
  as: hive-ibmcloud-ipi-test-create-clusterimageset
  from: cli
  cli: latest
  grace_period: 5m
  timeout: 10m
  commands: hive-ibmcloud-ipi-test-create-clusterimageset-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 100Mi
  env:
  - name: SPOKE_RELEASE_IMAGE
    default: ""
    documentation: |-
      Override for the spoke cluster release image. If not specified,
      uses the RELEASE_IMAGE from dependencies (OCP 4.20 nightly).
      For 4.22 nightly, set this explicitly.
  dependencies:
  - name: "release:latest"
    env: RELEASE_IMAGE
  documentation: |-
    Creates a ClusterImageSet resource that references the OpenShift
    release image to be used for spoke cluster installation.
