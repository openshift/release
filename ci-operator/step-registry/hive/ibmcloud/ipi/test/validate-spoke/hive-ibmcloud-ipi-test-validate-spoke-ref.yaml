ref:
  as: hive-ibmcloud-ipi-test-validate-spoke
  from: cli
  cli: latest
  grace_period: 15m
  timeout: 120m
  commands: hive-ibmcloud-ipi-test-validate-spoke-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  env:
  - name: SPOKE_INSTALL_TIMEOUT
    default: "90m"
    documentation: |-
      Timeout for spoke cluster installation. Default is 90 minutes.
  documentation: |-
    Waits for the spoke cluster to be provisioned by Hive and validates
    that the cluster is accessible and healthy. This step determines the
    success or failure of the test job.
