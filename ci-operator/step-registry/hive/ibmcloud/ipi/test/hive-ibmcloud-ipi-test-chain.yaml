chain:
  as: hive-ibmcloud-ipi-test
  steps:
  - ref: hive-ibmcloud-ipi-test-create-clusterimageset
  - ref: hive-ibmcloud-ipi-test-create-clusterdeployment
  - ref: hive-ibmcloud-ipi-test-validate-spoke
  documentation: |-
    Creates a ClusterImageSet pointing to the OCP release, creates a
    ClusterDeployment to provision the spoke cluster on IBM Cloud via Hive,
    and validates that the spoke cluster is successfully provisioned and accessible.
