ref:
  as: hive-ibmcloud-ipi-test-create-clusterdeployment
  from: cli
  cli: latest
  grace_period: 5m
  timeout: 15m
  commands: hive-ibmcloud-ipi-test-create-clusterdeployment-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 100Mi
  documentation: |-
    Creates a ClusterDeployment resource that instructs Hive to provision
    a spoke cluster on IBM Cloud. The ClusterDeployment references the
    secrets and ClusterImageSet created in previous steps.
