ref:
  as: aro-classic-test-persistent
  from: aro-classic-e2e
  commands: aro-classic-test-persistent-commands.sh
  credentials:
    - namespace: test-credentials
      name: cluster-secrets-aro-classic-dev
      mount_path: /var/run/aro-classic-dev
    - namespace: test-credentials
      name: cluster-secrets-aro-classic-int
      mount_path: /var/run/aro-classic-int
    - namespace: test-credentials
      name: cluster-secrets-aro-classic-stg
      mount_path: /var/run/aro-classic-stg
    - namespace: test-credentials
      name: cluster-secrets-aro-classic-prod
      mount_path: /var/run/aro-classic-prod
  resources:
    requests:
      cpu: 1000m
      memory: 1Gi
  env:
    - name: VAULT_SECRET_PROFILE
      default: "dev"
      documentation: |-
        Selects which environment's cluster secrets to use (dev, int, stg, prod).
    - name: LOCATION
      default: ""
      documentation: |-
        Azure region to create resources in.  For example, "uksouth".
        This is intentionally not the standard AZURE_REGION_LOCATION so that Azure library doesn't automatically select it.
        That way we can have tets that choose different locations.
    - name: MULTISTAGE_PARAM_OVERRIDE_LOCATION
      default: ""
      documentation: Overrides LOCATION via Gangway API.
  documentation: |-
    Run the Azure/ARO-RP/e2e binary.
