ref:
  as: ovn-conf-ipsec-manifest
  from_image:
    name: cli-yq
    namespace: ocp
    tag: latest
  env:
  - name: IPSEC_MODE
    default: "Full"
    documentation: |-
      Defines the behaviour of the ipsec configuration within the platform.
  commands: ovn-conf-ipsec-manifest-commands.sh
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
  documentation: |-
    The ovn ipsec manifest step adds the configuration for ipsec to set of manifests for installation
