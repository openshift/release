ref:
  as: redhat-performance-benchmark-runner-05-backup
  from_image:
    namespace: ci
    name: benchmark-runner
    tag: latest
  commands: redhat-performance-benchmark-runner-05-backup-commands.sh
  credentials:
    - namespace: test-credentials
      name: benchmark-runner-perfci-config
      mount_path: /secret
  env: []
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  documentation: |-
    Deploy CI infrastructure pod (Elasticsearch, Kibana, Grafana,
    JupyterLab for summary reports) and back up artifacts to
    Google Drive. SSHes to the provisioner and runs existing
    deployment and backup scripts.
  timeout: 3600s
  grace_period: 30s
