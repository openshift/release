chain:
  as: medik8s-setup
  steps:
  - ref: medik8s-lib
  - ref: medik8s-catalogsource
  - ref: medik8s-operator-subscribe
  documentation: |-
    Sets up the medik8s Konflux FBC catalog and subscribes
    to the requested operators via OLM. Bundles three steps
    in the correct order:
    1. medik8s-lib: shared shell functions to SHARED_DIR
    2. medik8s-catalogsource: resolves FBC, applies IDMS,
       creates CatalogSource
    3. medik8s-operator-subscribe: creates namespace,
       OperatorGroup, and Subscriptions
    Use this chain instead of referencing individual steps.
