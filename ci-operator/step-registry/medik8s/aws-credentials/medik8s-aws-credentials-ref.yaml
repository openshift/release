ref:
  as: medik8s-aws-credentials
  from_image:
    namespace: ocp
    name: "4.17"
    tag: upi-installer
  cli: latest
  grace_period: 10m
  commands: medik8s-aws-credentials-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 100Mi
  env:
  - name: INSTALL_NAMESPACE
    documentation: Namespace where the AWS credentials Secret will be created.
    default: "openshift-workload-availability"
  - name: CREDENTIALS_SECRET_NAME
    documentation: >-
      Name of the Secret that CCO will create
      with AWS access key and secret key.
    default: "aws-cloud-fencing-credentials-secret"
  documentation: |-
    Creates a CredentialsRequest for AWS EC2
    fencing operations (fence_aws). CCO provisions
    an IAM user with ec2 permissions and stores
    the credentials in a Kubernetes Secret. Used
    by FAR destructive tests on AWS.
