ref:
  as: medik8s-lib
  from: cli
  commands: medik8s-lib-commands.sh
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
  documentation: |-
    Writes shared shell functions to ${SHARED_DIR}/medik8s-lib.sh for use by
    subsequent medik8s steps. Provides: logging (log, run), proxy configuration
    (set_proxy), FBC commit resolution (resolve_commit_sha, verify_fbc_image),
    MCP rollout detection (wait_for_mcp_rollout), marketplace namespace setup
    (ensure_marketplace), and CatalogSource readiness polling
    (wait_for_catalogsource).
    This step is bundled into the medik8s-setup chain, which is the recommended
    way to consume it. Do not reference this step directly in CI configs.
