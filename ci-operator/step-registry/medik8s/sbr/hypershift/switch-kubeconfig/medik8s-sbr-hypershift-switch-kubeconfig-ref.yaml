ref:
  as: medik8s-sbr-hypershift-switch-kubeconfig
  from_image:
    namespace: ocp
    name: "4.1"
    tag: cli
  commands: medik8s-sbr-hypershift-switch-kubeconfig-commands.sh
  resources:
    requests:
      cpu: 10m
      memory: 50Mi
  documentation: |-
    Switches KUBECONFIG from the HyperShift management cluster to the hosted
    cluster by overwriting ${SHARED_DIR}/kubeconfig with nested_kubeconfig.
    Run first in the test phase so all subsequent refs target the hosted cluster.
