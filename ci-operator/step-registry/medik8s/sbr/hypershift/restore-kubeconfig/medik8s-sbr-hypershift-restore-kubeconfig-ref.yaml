ref:
  as: medik8s-sbr-hypershift-restore-kubeconfig
  from_image:
    namespace: ocp
    name: "4.1"
    tag: cli
  commands: medik8s-sbr-hypershift-restore-kubeconfig-commands.sh
  resources:
    requests:
      cpu: 10m
      memory: 50Mi
  documentation: |-
    Restores ${SHARED_DIR}/kubeconfig to the management cluster kubeconfig saved by
    medik8s-sbr-hypershift-switch-kubeconfig. Run as the first post step so that
    hypershift-dump and hypershift-aws-destroy target the management cluster.
