ref:
  as: dra-dra-example-driver-install
  from: cli
  cli: latest
  commands: dra-dra-example-driver-install-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  documentation: |-
    Installs the dra-example-driver from kubernetes-sigs/dra-example-driver
    via Helm. This provides a vendor-neutral DRA driver for validating that
    Kueue's DRA support works with non-NVIDIA drivers.
