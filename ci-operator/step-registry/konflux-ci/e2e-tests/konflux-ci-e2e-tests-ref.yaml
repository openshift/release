ref:
  as: konflux-ci-e2e-tests
  cli: latest
  commands: konflux-ci-e2e-tests-commands.sh
  from: src
  timeout: 1h
  grace_period: 1m
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  env:
  - name: KONFLUX_REF
    default: ""
    documentation: |-
      Git ref (tag, branch, or commit SHA) to checkout before running.
      If set, the script will checkout this ref to align test code
      with a specific release. Used for release gating via Gangway.
      Can be overridden via MULTISTAGE_PARAM_OVERRIDE_KONFLUX_REF.
  credentials:
  - mount_path: /usr/local/ci-secrets/konflux-ci-konflux-ci-e2e-tests-credentials
    name: konflux-ci-konflux-ci-e2e-tests-credentials
    namespace: test-credentials
  documentation: |-
    Deploys test resources and runs E2E conformance test suite from
    konflux-ci/konflux-ci. Run after konflux-ci-install-operator.

