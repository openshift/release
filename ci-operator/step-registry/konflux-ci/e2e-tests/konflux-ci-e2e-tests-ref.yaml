ref:
  as: konflux-ci-e2e-tests
  cli: latest
  commands: konflux-ci-e2e-tests-commands.sh
  from: src
  timeout: 1h
  grace_period: 1m
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  env:
  - name: GOTOOLCHAIN
    default: auto
    documentation: |-
      Override the RHEL golang builder default (GOTOOLCHAIN=local) so Go can
      download a newer toolchain when go.mod requires it. Remove once konflux-ci
      build_root uses rhel-9-release-golang-1.26-openshift-*.
  - name: MULTISTAGE_PARAM_OVERRIDE_OPERATOR_IMAGE
    default: ""
    documentation: |-
      Gangway API override for OPERATOR_IMAGE. When set, the script derives
      KONFLUX_REF from the image tag to checkout the matching git ref.
      Required for release gating.
  credentials:
  - mount_path: /usr/local/ci-secrets/konflux-ci-konflux-ci-e2e-tests-credentials
    name: konflux-ci-konflux-ci-e2e-tests-credentials
    namespace: test-credentials
  documentation: |-
    Deploys test resources and runs E2E conformance test suite from
    konflux-ci/konflux-ci. Run after konflux-ci-install-operator.

