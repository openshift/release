ref:
  as: konflux-ci-install-konflux
  commands: konflux-ci-install-konflux-commands.sh
  credentials:
  - mount_path: /usr/local/konflux-ci-secrets-new/redhat-appstudio-qe
    name: konflux-ci-secrets-new
    namespace: test-credentials
  documentation: |-
    Installs Konflux on an OpenShift cluster using infra-deployments bootstrap scripts.
    Deploys ArgoCD, bootstraps host/member clusters, and runs preview mode deployment.
    Also creates required secrets and registers with SprayProxy for webhook forwarding.
  from: e2e-test-runner
  grace_period: 1m0s
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  timeout: 1h0m0s
