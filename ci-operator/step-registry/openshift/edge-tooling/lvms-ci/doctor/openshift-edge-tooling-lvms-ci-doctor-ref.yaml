ref:
  as: openshift-edge-tooling-lvms-ci-doctor
  from_image:
    namespace: ci
    name: edge-tooling-ai-helpers
    tag: latest
  commands: openshift-edge-tooling-lvms-ci-doctor-commands.sh
  credentials:
  - namespace: test-credentials
    name: sa-claude-openshift-ci
    mount_path: /var/run/claude-code-service-account
  env:
  - name: CLAUDE_CODE_USE_VERTEX
    default: "1"
  - name: CLOUD_ML_REGION
    default: "global"
  - name: ANTHROPIC_VERTEX_PROJECT_ID
    default: "itpc-gcp-hybrid-pe-eng-claude"
  - name: GOOGLE_APPLICATION_CREDENTIALS
    default: "/var/run/claude-code-service-account/token"
  - name: CLAUDE_MODEL
    default: "claude-opus-4-6"
  - name: RELEASE_VERSIONS
    default: "main"
  resources:
    requests:
      cpu: 2000m
      memory: 4Gi
  timeout: 1h0m0s
  grace_period: 10m0s
  documentation: |-
    Analyzes LVMS periodic jobs using Claude AI.
    Runs the lvms-ci:doctor command to analyze failed jobs.
    Generates a HTML report consolidating all results.
