workflow:
  as: openshift-edge-tooling-microshift-release-evaluation
  steps:
    test:
    - ref: openshift-edge-tooling-microshift-release-evaluation
  documentation: |-
    Evaluates upcoming OCP z-stream releases for MicroShift participation
    using the microshift-release:pre-check AI skill. Resolves scheduled
    versions from Red Hat Product Pages, runs the pre-check evaluation,
    and saves results to artifacts. Slack notifications are handled by
    Prow reporter_config in the job config.
