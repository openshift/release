ref:
  as: openshift-edge-tooling-ci-monitor-send-slack
  commands: openshift-edge-tooling-ci-monitor-send-slack-commands.sh
  from_image:
    namespace: ci
    name: claude-ai-helpers
    tag: latest
  best_effort: true
  timeout: 2m
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
  credentials:
  - namespace: test-credentials
    name: edge-tooling-ci-monitor-slack-webhook
    mount_path: /var/run/slack-webhook
  documentation: |-
    Sends a Slack notification with blocking and informing job counts
    extracted by the CI monitor step. Reads failing-jobs.txt from
    SHARED_DIR (pre-extracted pipe-delimited entries prefixed BLOCKING|
    or INFORMING|) and posts a summary with per-version aggregated
    counts to the configured Slack channel via webhook.
