ref:
  as: openshift-windows-setup-wmco-konflux-disconnected
  from: upi-installer
  commands: openshift-windows-setup-wmco-konflux-disconnected-commands.sh
  credentials:
  - namespace: test-credentials
    name: openshift-custom-mirror-registry
    mount_path: /var/run/vault/mirror-registry
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  grace_period: 10m
  documentation: |-
    Mirrors Konflux WMCO FBC catalog and related operator images to the bastion mirror registry
    for disconnected environments. Creates ImageDigestMirrorSet and CatalogSource pointing to
    the bastion-mirrored images. This step implements the manual Konflux mirroring process from
    the disconnected Windows recipe.
