ref:
  as: openshift-windows-setup-wmco-konflux
  from: cli
  commands: openshift-windows-setup-wmco-konflux-commands.sh
  env:
  - name: WMCO_INDEX_IMAGE
    default: ""
    documentation: |-
      Optional override for the WMCO FBC index image. If set, this image will be used
      instead of the auto-detected latest image for the cluster's OCP version.
      Example: quay.io/redhat-user-workloads/windows-machine-conf-tenant/windows-machine-config-operator-fbc/windows-machine-config-operator-fbc-release-4-17@sha256:abc123
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  documentation: |
    Dynamically fetches the latest Konflux WMCO image and sets up the ImageDigestMirrorSet
    and CatalogSource required for WMCO installation. This replaces the dependency on
    qe-app-registry for Windows operator testing in OpenShift 4.18+.
    Optionally accepts WMCO_INDEX_IMAGE to pin a specific image.

