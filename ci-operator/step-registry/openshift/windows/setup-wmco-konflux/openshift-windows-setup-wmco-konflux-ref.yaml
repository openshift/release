ref:
  as: openshift-windows-setup-wmco-konflux
  from: cli
  commands: openshift-windows-setup-wmco-konflux-commands.sh
  env:
  - name: WMCO_INDEX_IMAGE
    default: ""
    documentation: |-
      Optional. Override the WMCO FBC index image used to create the CatalogSource.
      If empty, the latest image for the cluster's OCP version is used automatically.
      Example: quay.io/redhat-user-workloads/.../windows-machine-config-operator-fbc-release-4-17@sha256:...
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  documentation: |
    Dynamically fetches the latest Konflux WMCO image and sets up the ImageDigestMirrorSet
    and CatalogSource required for WMCO installation. This replaces the dependency on
    qe-app-registry for Windows operator testing in OpenShift 4.18+.
    Set WMCO_INDEX_IMAGE to pin a specific FBC index image instead of using the latest.

