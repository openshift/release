workflow:
  as: openshift-microshift-claude-ci-doctor
  steps:
    test:
    - ref: openshift-microshift-claude-ci-doctor
    post:
    - ref: openshift-microshift-claude-post
    - ref: openshift-claude-post
  documentation: |-
    Analyzes MicroShift periodic jobs and pull requests using Claude AI.
    Runs the microshift-ci:doctor command to analyze the releases and pull requests.
    Generates a HTML report consolidating all results.
