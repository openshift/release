workflow:
  as: openshift-e2e-ibmz-eco-kueue-operator-e2e
  documentation: |-
    The OpenShift E2E IBM Z Ecosystem Kueue Operator workflow creates an ephemeral 
    HyperShift cluster on IBM Z (s390x) architecture and executes the Kueue operator 
    end-to-end test suite to validate operator functionality on the IBM Z platform.
  steps:
    pre:
      - ref: hypershift-mce-ibmz-create-s390xmgmt
        cli: latest
      - ref: openshift-e2e-ibmz-eco-kueue-operator-sanity
        cli: latest
    post:
      - ref: hypershift-mce-ibmz-destroy-s390x-mgmt
    env:
      CLUSTER_NAME_PREFIX: kueue-operator-s390x
      VSI_IMAGE_NAME: "ubuntu-s390x-image"
      IC_REGION: 'br-sao'
      CONTROL_NODE_PROFILE: bz2-8x32
      COMPUTE_NODE_PROFILE: bz2-8x32
      CONTROL_NODE_COUNT: 3
      COMPUTE_NODE_COUNT: 2
      REGION: 'Sao Paulo'
      RESOURCE_GROUP: 'hypershift'
      IC_CLI_VERSION: '2.36.0'
      CLUSTER_VERSION: "4.21"
