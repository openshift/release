ref:
  as: openshift-e2e-ibmz-eco-kueue-operator-sanity
  cli: latest
  commands: openshift-e2e-ibmz-eco-kueue-operator-sanity-commands.sh
  from: tests
  grace_period: 59m0s
  resources:
    requests:
      cpu: 100m
      memory: 100Mi
  timeout: 15m0s
  credentials:
    - mount_path: /etc/hypershift-agent-ibmz-credentials
      name: hypershift-agent-ibmz-credentials
      namespace: test-credentials
  documentation: |-
    This step performs a sanity check on the s390x cluster by running a test pod
    to verify basic connectivity and cluster health before running full e2e tests.

