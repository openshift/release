workflow:
  as: openshift-e2e-aws-techpreview-post-install
  steps:
    pre:
    - ref: ipi-conf
    - ref: ipi-conf-telemetry
    - ref: ipi-conf-aws
    - chain: ipi-install
    - ref: ipi-install-post-featureset
    - ref: openshift-oc-wait-for-stable-cluster
    test:
    - ref: openshift-e2e-test
    post:
    - chain: gather-core-dump
    - chain: ipi-aws-post
  documentation: |-
    The Openshift E2E AWS workflow executes the common end-to-end test suite
    on AWS after enabling TechPreviewNoUpgrade post-install. The cluster is
    installed with default settings, then the FeatureGate is patched and the
    workflow waits for the cluster to stabilize before running tests.
