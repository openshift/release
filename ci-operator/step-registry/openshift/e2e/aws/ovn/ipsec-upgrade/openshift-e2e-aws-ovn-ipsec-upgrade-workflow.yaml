workflow:
  as: openshift-e2e-aws-ovn-ipsec-upgrade
  steps:
    allow_best_effort_post_steps: true
    pre:
    - chain: ipi-conf-aws
    - ref: ovn-conf
    - ref: ovn-conf-ipsec-manifest
    - chain: ipi-install
    test:
    - ref: openshift-e2e-test
    post:
    - ref: openshift-e2e-test-capabilities-check
    - chain: ipi-aws-post
    dependencies:
      OPENSHIFT_INSTALL_RELEASE_IMAGE_OVERRIDE: "release:initial"
      OPENSHIFT_UPGRADE_RELEASE_IMAGE_OVERRIDE: "release:latest"
    env:
      TEST_TYPE: upgrade
      TEST_UPGRADE_SUITE: none
      TEST_UPGRADE_OPTIONS: ""
      TEST_ARGS: --cluster-stability Disruptive --disable-monitor="additional-events-collector,alert-summary-serializer,api-unreachable-from-client-metrics,apiserver-availability,apiserver-new-disruption-invariant,audit-log-analyzer,azure-metrics-collector,cluster-info-serializer,clusteroperator-collector,disruption-summary-serializer,e2e-test-analyzer,etcd-log-analyzer,event-collector,external-aws-cloud-service-availability,external-azure-cloud-service-availability,external-gcp-cloud-service-availability,external-service-availability,faulty-load-balancer,generation-analyzer,graceful-shutdown-analyzer,image-registry-availability,ingress-availability,initial-and-final-operator-log-scraper,interval-serializer,known-image-checker,kubelet-log-collector,lease-checker,legacy-authentication-invariants,legacy-cvo-invariants,legacy-etcd-invariants,legacy-kube-apiserver-invariants,legacy-networking-invariants,legacy-node-invariants,legacy-storage-invariants,legacy-test-framework-invariants,machine-lifecycle,metrics-api-availability,metrics-endpoints-down,monitoring-statefulsets-recreation,node-lifecycle,node-state-analyzer,on-prem-haproxy,operator-state-analyzer,pathological-event-analyzer,pod-lifecycle,pod-network-avalibility,required-scc-annotation-checker,service-type-load-balancer-availability,termination-message-policy,timeline-serializer,tracked-resources-serializer,watch-namespaces,watch-request-counts-collector"
  documentation: |-
    The Openshift E2E AWS IPsec upgrade workflow executes the upgrade end-to-end test suite on AWS cluster configuration and Loki as log collector, exercising an cluster upgrade during the process.
