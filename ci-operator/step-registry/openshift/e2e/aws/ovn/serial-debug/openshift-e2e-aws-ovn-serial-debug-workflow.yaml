workflow:
  as: openshift-e2e-aws-ovn-serial-debug
  steps:
    allow_best_effort_post_steps: true
    pre:
    - chain: ipi-conf-aws
    - ref: ovn-conf
    - ref: ovn-conf-multi-network-policy-manifest
    - ref: rhcos-conf-osstream
    - chain: ipi-install
    test:
    - ref: openshift-e2e-test-multi-iteration
    post:
      - chain: gather-network
      - chain: gather-core-dump
      - chain: ipi-deprovision
    env:
      TEST_SUITE: openshift/conformance/serial
  documentation: |-
    The Openshift E2E AWS serial debug workflow executes a specific test multiple times
    on AWS with the OVNKubernetes network plugin with useMultiNetworkPolicy set to true.
    This workflow is designed for reproducing intermittent test failures.
