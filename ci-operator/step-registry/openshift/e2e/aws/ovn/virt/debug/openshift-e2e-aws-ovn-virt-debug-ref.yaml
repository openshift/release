ref:
  as: openshift-e2e-aws-ovn-virt-debug
  from: cli
  grace_period: 10m
  commands: openshift-e2e-aws-ovn-virt-debug-commands.sh
  timeout: 9h
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  documentation: |-
    Sleep for 8 hours to allow manual debugging of the cluster.
    The cluster remains accessible during this period for investigation.
