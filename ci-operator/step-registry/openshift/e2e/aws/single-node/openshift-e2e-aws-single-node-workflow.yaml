workflow:
  as: openshift-e2e-aws-single-node
  steps:
    env:
      FEATURE_SET: TechPreviewNoUpgrade
#     CUSTOM_OPENSHIFT_INSTALL_RELEASE_IMAGE_OVERRIDE: registry.build10.ci.openshift.org/ci-ln-rykht42/release:latest
    pre:
    - chain: ipi-conf-aws
    - ref: single-node-conf-aws
    - ref: single-node-conf-e2e
    - ref: rhcos-conf-osstream
    - chain: ipi-install
    test:
    - ref: single-node-e2e-test
    post:
    - chain: gather-network
    - chain: gather-core-dump
    - chain: ipi-deprovision
    - ref: aws-deprovision-security-group
    - ref: aws-deprovision-stacks
    - ref: aws-deprovision-s3buckets
  documentation: |-
    The Openshift E2E Single Node workflow executes the common end-to-end test suite with the a single node cluster.
