workflow:
  as: openshift-e2e-aws-single-node-install
  steps:
    allow_best_effort_post_steps: true
    pre:
    - chain: ipi-conf-aws
    - ref: single-node-conf-aws
    - ref: single-node-conf-e2e
    - ref: ipi-conf-cpu-partitioning
    - chain: ipi-install
    - ref: ipi-conf-cpu-partitioning-performance-profile
    post:
    - chain: ipi-aws-post
  documentation: |-
    Provides a workflow for doing an install of SNO on AWS only, allowing callers to override or ignore the test stanza.
