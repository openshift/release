chain:
  as: openshift-e2e-test-netobserv-qe
  env:
  - name: TEST_SCENARIOS
    default: Network_Observability
    documentation: |-
      Select the test case. It's a RE pattern and is passed to the 'grep -E'
  - name: TEST_FILTERS
    default: NonPreRelease;Serial;Disruptive
    documentation: |
      It filters to select case based on some case attribution which is in case title.
  - name: TEST_TIMEOUT
    default: "35"
    documentation: Time-out duration for each test-case execution in minutes.
  - name: CYPRESS_GREP_TAGS
    default: "@Network_Observability"
    documentation: |
      Cypress grep tags to filter which frontend tests to run.
  - name: CYPRESS_NOO_CATALOG_SOURCE
    default: ""
    documentation: Network Observability CatalogSource to use.
  - name: CYPRESS_SKIP_NOO_INSTALL
    default: "false"
    documentation: Skip Network Observability operator installation in Cypress tests since netobserv-install-operator handles it.
  - name: MULTISTAGE_PARAM_OVERRIDE_CYPRESS_NOO_CS_IMAGE
    default: ""
    documentation: Override the Network Observability CatalogSource image for z-stream testing.
  steps:
  - ref: openshift-extended-test
  - ref: netobserv-frontend-tests
  - ref: openshift-e2e-test-qe-report
  documentation: |-
    Execute e2e tests for Network Observability, including golang and Cypress frontend tests.
