ref:
  as: openshift-e2e-test-multi-iteration
  from: tests
  grace_period: 10m
  commands: openshift-e2e-test-multi-iteration-commands.sh
  timeout: 14400s
  env:
  - name: TEST_FOCUS
    default: ""
    documentation: |-
      Regular expression pattern to match specific tests to run.
      Used with 'openshift-tests run <suite> --run <pattern>'.
  - name: TEST_ITERATIONS
    default: "1"
    documentation: |-
      Number of times to run the focused test(s). Default is 1.
  - name: TEST_SUITE
    default: openshift/conformance/serial
    documentation: The test suite to run. Use 'openshift-tests run --help' to list available suites.
  - name: TEST_SKIPS
    default: ""
    documentation: |-
      Regular expression (POSIX basic regular expression) of tests to skip.
  - name: FEATURE_SET
    default: ""
    documentation: |-
      The feature set to enable on the cluster (e.g., TechPreviewNoUpgrade).
  dependencies:
  - name: "release:latest"
    env: OPENSHIFT_UPGRADE_RELEASE_IMAGE_OVERRIDE
  resources:
    requests:
      cpu: "3"
      memory: 600Mi
    limits:
      memory: 10Gi
  documentation: |-
    The Openshift E2E Multi-Iteration step runs a focused test multiple times
    for reproducing intermittent test failures.
