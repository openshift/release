chain:
  as: openshift-e2e-test-qe-longduration
  steps:
  - chain: cucushift-installer-check-cluster-health
  - ref: idp-htpasswd
  - ref: fips-check-fips-or-die
  - ref: fips-check-node-scan
  - ref: cucushift-pre
  - ref: openshift-extended-test-longduration
  - ref: cucushift-e2e
  - ref: openshift-extended-web-tests
  - ref: openshift-extended-test-supplementary
  - ref: openshift-e2e-test-clusterinfra-qe
  - ref: openshift-e2e-test-qe-report
  documentation: |-
    Execute all e2e tests from QE with extended timeout. Identical to openshift-e2e-test-qe but uses
    openshift-extended-test-longduration (22h timeout) instead of openshift-extended-test (8h timeout)
    to allow more tests to complete before the step is killed.
