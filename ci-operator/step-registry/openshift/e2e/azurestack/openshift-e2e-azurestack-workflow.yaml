workflow:
  as: openshift-e2e-azurestack
  steps:
    env:
      # Azure Stack Hub clusters do not support the Azure File CSI driver,
      # and AllowedTopologies is not supported by the Azure Disk CSI driver.
      TEST_SKIPS: '\[Driver: azure-file\]\|\[Driver: azure-disk\].*AllowedTopologies'
    pre:
    - chain: ipi-azurestack-pre
    test:
    - ref: openshift-e2e-test
    post:
    - chain: gather-core-dump
    - chain: ipi-azurestack-post
  documentation: |-
    The Openshift E2E Azure workflow executes the common end-to-end test suite on Azure with a default cluster configuration.
