workflow:
  as: openshift-e2e-gcd
  steps:
    allow_best_effort_post_steps: true
    pre:
    - chain: ipi-gcd-pre
    test:
    - ref: openshift-e2e-test
    post:
    - chain: gather-core-dump
    - chain: ipi-gcp-post
    - ref: gcp-deprovision-bastionhost
    - ref: gcp-deprovision-vpc
  documentation: |-
    The OpenShift E2E GCD workflow executes the common end-to-end test
    suite on a private cluster on Google Cloud Dedicated with WIF
    authentication.
