workflow:
  as: openshift-e2e-azure-ovn-bastion
  steps:
    allow_best_effort_post_steps: true
    pre:
    - chain: ipi-conf-azure
    - ref: ovn-conf
    - ref: rhcos-conf-osstream
    - chain: ipi-install
    - ref: ipi-azure-rbac
    - chain: azure-provision-bastionhost
    test:
    - ref: azure-validate-bastionhost
    - ref: openshift-e2e-test
    post:
    - chain: gather-network
    - chain: gather-core-dump
    - chain: ipi-deprovision
    env:
      FAIL_ON_CORE_DUMP: "false"
  documentation: |-
    The Openshift E2E OVN workflow with bastion host validation.
    Provisions a bastion host, validates SSH access, then executes the common end-to-end test suite with the OVNKubernetes network plugin.
