ref:
  as: openshift-e2e-test-iterations
  from: tests
  grace_period: 10m
  commands: openshift-e2e-test-iterations-commands.sh
  timeout: 14400s
  env:
  - name: TEST_ARGS
    default: ""
    documentation: |-
      Additional arguments to be passed to 'openshift-test'
  - name: SHARD_ARGS
    default: ""
    documentation: |-
      Arguments to be passed to 'openshift-test' regarding the sharding parameters of this run
  - name: TEST_SUITE
    default: openshift/conformance/parallel
    documentation: The test suite to run.  Use 'openshift-test run --help' to list available suites.
  - name: TEST_ITERATIONS
    default: "1"
    documentation: |-
      Number of times to run the test suite. Useful for stress testing or reproducing flaky tests.
  dependencies:
  - name: "release:latest"
    env: OPENSHIFT_UPGRADE_RELEASE_IMAGE_OVERRIDE
  resources:
    requests:
      cpu: "3"
      memory: 600Mi
    limits:
      memory: 10Gi
  documentation: |-
    The Openshift E2E test iterations step executes the common end-to-end test suite multiple times.
    This is useful for stress testing or reproducing intermittent failures.
