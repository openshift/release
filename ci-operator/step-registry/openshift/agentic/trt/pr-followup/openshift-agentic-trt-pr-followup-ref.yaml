ref:
  as: openshift-agentic-trt-pr-followup
  from: sippy-agentic-dev
  commands: openshift-agentic-trt-pr-followup-commands.sh
  credentials:
  - namespace: test-credentials
    name: trt-agent-gh-app
    mount_path: /var/run/github-token
  env:
  - name: UPSTREAM_REPO
  - name: FORK_REPO
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
  timeout: 5m0s
  documentation: |-
    Finds the PR for a Jira issue, checks out the branch, and writes
    the PR number to SHARED_DIR for the review-responder step.
