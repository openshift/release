workflow:
  as: openshift-upgrade-nutanix
  steps:
    pre:
    - chain: ipi-nutanix-pre-stableinitial
    test:
    - ref: openshift-e2e-test
    post:
    - chain: ipi-nutanix-post
    dependencies:
      OPENSHIFT_INSTALL_RELEASE_IMAGE_OVERRIDE: "release:initial"
      OPENSHIFT_UPGRADE_RELEASE_IMAGE_OVERRIDE: "release:latest"
    env:
      TEST_TYPE: upgrade
      TEST_SUITE: ""
      TEST_UPGRADE_OPTIONS: ""
  documentation: |-
    The Openshift E2E Nutanix workflow executes the upgrade end-to-end test
    suite on Nutanix with a default configuration, exercising an upgrade
    during the process.
