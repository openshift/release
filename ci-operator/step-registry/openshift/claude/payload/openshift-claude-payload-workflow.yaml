workflow:
  as: openshift-claude-payload
  steps:
    test:
    - ref: openshift-claude-payload-agent
    post:
    - ref: openshift-claude-post
  documentation: |-
    Analyzes rejected release payloads using Claude AI. Runs the payload
    agent to identify root causes and optionally stage reverts, then
    generates a continue-session HTML page in artifacts if a session
    archive is available.
