ref:
  as: openshift-claude-agent-eval
  from: latest
  commands: openshift-claude-agent-eval-commands.sh
  credentials:
  - namespace: test-credentials
    name: sa-claude-openshift-ci
    mount_path: /var/run/claude-code-service-account
  - namespace: test-credentials
    name: claude-payload-agent-github-token
    mount_path: /var/run/github-token
  env:
  - name: EVAL_CONFIG
    default: "eval.yaml"
  - name: EVAL_MODEL
    default: "claude-opus-4-6"
  - name: EVAL_BASELINE
    default: ""
  - name: EVAL_PARALLELISM
    default: "1"
  - name: EVAL_CASES
    default: ""
  - name: EVAL_EXTRA_ARGS
    default: ""
  - name: EVAL_SETUP_SCRIPT
    default: ""
  - name: EVAL_MAX_TURNS
    default: "100"
  - name: CLAUDE_MODEL
    default: "claude-opus-4-6"
  - name: CLAUDE_CODE_USE_VERTEX
    default: "1"
  - name: CLOUD_ML_REGION
    default: "global"
  - name: ANTHROPIC_VERTEX_PROJECT_ID
    default: "itpc-gcp-hybrid-pe-eng-claude"
  - name: GOOGLE_APPLICATION_CREDENTIALS
    default: "/var/run/claude-code-service-account/token"
  - name: GITHUB_TOKEN_PATH
    default: "/var/run/github-token/token"
  resources:
    requests:
      cpu: 1000m
      memory: 4Gi
  timeout: 3h0m0s
  grace_period: 1m0s
  documentation: |-
    Runs skill evaluations using the agent-eval-harness. Installs the
    eval harness plugin, runs /eval-run with the specified config and
    model, and produces JUnit XML + artifacts. Eval traces and reports
    are archived for download.
