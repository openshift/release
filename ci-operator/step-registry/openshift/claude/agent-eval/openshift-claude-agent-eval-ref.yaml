ref:
  as: openshift-claude-agent-eval
  from_image:
    namespace: ci
    name: claude-ai-helpers
    tag: latest
  commands: openshift-claude-agent-eval-commands.sh
  credentials:
  - namespace: test-credentials
    name: sa-claude-openshift-ci
    mount_path: /var/run/claude-code-service-account
  env:
  - name: EVAL_SKILLS
    default: ""
  - name: EVAL_MODEL
    default: "claude-sonnet-4-6"
  - name: EVAL_JUDGE_MODEL
    default: "claude-sonnet-4-6"
  - name: EVAL_CONFIG
    default: "eval.yaml"
  - name: EVAL_BASELINE
    default: ""
  - name: EVAL_EXTRA_ARGS
    default: ""
  - name: MLFLOW_PORT
    default: "5000"
  - name: CLAUDE_CODE_USE_VERTEX
    default: "1"
  - name: CLOUD_ML_REGION
    default: "global"
  - name: ANTHROPIC_VERTEX_PROJECT_ID
    default: "itpc-gcp-hybrid-pe-eng-claude"
  - name: GOOGLE_APPLICATION_CREDENTIALS
    default: "/var/run/claude-code-service-account/token"
  - name: CLAUDE_MODEL
    default: "claude-sonnet-4-6"
  resources:
    requests:
      cpu: 1000m
      memory: 2Gi
  timeout: 2h0m0s
  grace_period: 1m0s
  documentation: |-
    Runs skill evaluations using the agent-eval-harness against Claude
    Code skills checked out in $PWD. Installs the eval harness plugin,
    starts a local MLflow server, detects changed skills on presubmits,
    runs /eval-run and /eval-mlflow, then generates an HTML summary
    report in artifacts.
