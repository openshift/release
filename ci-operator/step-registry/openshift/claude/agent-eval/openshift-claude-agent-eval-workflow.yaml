workflow:
  as: openshift-claude-agent-eval
  steps:
    test:
    - ref: openshift-claude-agent-eval
    post:
    - ref: openshift-claude-post
  documentation: |-
    Runs skill evaluations using the agent-eval-harness against Claude
    Code skills. Evaluates skills, logs results to MLflow, generates
    an HTML summary report, and produces a continue-session page in
    artifacts for resuming the session locally.
