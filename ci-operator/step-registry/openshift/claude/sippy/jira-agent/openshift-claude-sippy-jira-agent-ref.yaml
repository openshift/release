ref:
  as: openshift-claude-sippy-jira-agent
  from: sippy-agentic-dev
  commands: openshift-claude-sippy-jira-agent-commands.sh
  credentials:
  - namespace: test-credentials
    name: hypershift-team-claude-prow
    mount_path: /var/run/claude-code-service-account
  - namespace: test-credentials
    name: trt-agent-gh-app
    mount_path: /var/run/github-token
  env:
  - name: JIRA_ISSUE_KEY
    default: "TRT-2660"
    documentation: |-
      Jira issue key to process (e.g., "TRT-1234"). Required — the job
      will exit with an error if not provided.
      TODO: Remove default before merge — set only for rehearsal testing.
  - name: MULTISTAGE_PARAM_OVERRIDE_JIRA_ISSUE_KEY
    default: ""
    documentation: |-
      Gangway API override for JIRA_ISSUE_KEY. When triggering this job
      via the Gangway API, pass it as:
      "pod_spec_options": {
        "envs": {
          "MULTISTAGE_PARAM_OVERRIDE_JIRA_ISSUE_KEY": "TRT-1234"
        }
      }
  - name: CLAUDE_CODE_USE_VERTEX
    default: "1"
  - name: CLOUD_ML_REGION
    default: "global"
  - name: ANTHROPIC_VERTEX_PROJECT_ID
    default: "itpc-gcp-hybrid-pe-eng-claude"
  - name: GOOGLE_APPLICATION_CREDENTIALS
    default: "/var/run/claude-code-service-account/claude-prow"
  - name: CLAUDE_MODEL
    default: "claude-opus-4-6"
  - name: SIPPY_FORK_REPO
    default: "openshift-trt/sippy"
    documentation: |-
      GitHub fork repo to push branches to.
      The PR is created from this fork against openshift/sippy.
      Must be a fork owned by the account behind the GitHub token.
  resources:
    requests:
      cpu: 1000m
      memory: 2Gi
  nested_podman: true
  timeout: 2h0m0s
  grace_period: 1m0s
  documentation: |-
    Processes a single Jira issue for the sippy repo using Claude AI.
    Fetches the issue details, clones the sippy repo, runs Claude
    to implement a fix, and opens a draft PR. Triggered on-demand
    via Gangway API with a specific issue key.
