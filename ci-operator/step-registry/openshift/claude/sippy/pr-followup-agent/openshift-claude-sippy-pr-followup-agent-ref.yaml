ref:
  as: openshift-claude-sippy-pr-followup-agent
  from: sippy-ci-dev
  commands: openshift-claude-sippy-pr-followup-agent-commands.sh
  credentials:
  - namespace: test-credentials
    name: hypershift-team-claude-prow
    mount_path: /var/run/claude-code-service-account
  - namespace: test-credentials
    name: trt-agent-gh-app
    mount_path: /var/run/github-token
  env:
  - name: JIRA_ISSUE_KEY
    default: ""
    documentation: |-
      Jira issue key to follow up on (e.g., "TRT-1234"). Required —
      the job will find the associated PR and address unresolved
      review comments.
  - name: MULTISTAGE_PARAM_OVERRIDE_JIRA_ISSUE_KEY
    default: ""
    documentation: |-
      Gangway API override for JIRA_ISSUE_KEY. When triggering this job
      via the Gangway API, pass it as:
      "pod_spec_options": {
        "envs": {
          "MULTISTAGE_PARAM_OVERRIDE_JIRA_ISSUE_KEY": "TRT-1234"
        }
      }
  - name: CLAUDE_CODE_USE_VERTEX
    default: "1"
  - name: CLOUD_ML_REGION
    default: "global"
  - name: ANTHROPIC_VERTEX_PROJECT_ID
    default: "itpc-gcp-hybrid-pe-eng-claude"
  - name: GOOGLE_APPLICATION_CREDENTIALS
    default: "/var/run/claude-code-service-account/claude-prow"
  - name: CLAUDE_MODEL
    default: "claude-opus-4-6"
  - name: GITHUB_TOKEN_PATH
    default: "/var/run/github-token/token"
  - name: SIPPY_FORK_REPO
    default: "openshift-trt/sippy"
    documentation: |-
      GitHub fork repo where the PR branch lives.
  nested_podman: true
  resources:
    requests:
      cpu: 1000m
      memory: 2Gi
  timeout: 2h0m0s
  grace_period: 1m0s
  documentation: |-
    Follows up on an existing PR for a Jira issue in the sippy repo.
    Finds the PR associated with the issue (via GitHub search), checks
    out the branch, addresses unresolved review comments using Claude,
    and pushes fixes. Triggered on-demand via Gangway API.
