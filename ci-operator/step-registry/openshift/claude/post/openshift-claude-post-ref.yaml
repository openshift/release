ref:
  as: openshift-claude-post
  from_image:
    namespace: ci
    name: claude-ai-helpers
    tag: latest
  best_effort: true
  commands: openshift-claude-post-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
  timeout: 1m0s
  documentation: |-
    Post step that generates a continue-session HTML page in the artifact
    directory when a Claude session archive is present. The page provides
    a one-click copy command for resuming the CI session locally using
    the ai-helpers marketplace.
