ref:
  as: openshift-oc-wait-for-stable-cluster
  from: cli
  commands: openshift-oc-wait-for-stable-cluster-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 100Mi
  env:
  - name: MINIMUM_STABLE_PERIOD
    default: "2m"
    documentation: |-
      Minimum duration the cluster must remain stable before the check passes.
  - name: TIMEOUT
    default: "30m"
    documentation: |-
      Maximum time to wait for the cluster to become stable before failing.
  documentation: |-
    Wait for all cluster operators to become stable using oc adm wait-for-stable-cluster.
    The step succeeds when every cluster operator has been Available=True,
    Progressing=False and Degraded=False for at least MINIMUM_STABLE_PERIOD.
