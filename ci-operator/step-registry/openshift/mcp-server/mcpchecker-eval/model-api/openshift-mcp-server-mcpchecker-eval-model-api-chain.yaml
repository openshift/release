chain:
  as: openshift-mcp-server-mcpchecker-eval-model-api
  steps:
  - ref: openshift-mcp-server-mcpchecker-eval-credentials-setup
  - ref: openshift-mcp-server-mcpchecker-eval
  documentation: |-
    Runs mcpchecker evaluations against the openshift-mcp-server on a live OCP cluster
    using model API credentials from the openshift-mcp-server-mcpchecker-credentials secret.
    Set EVAL_CONFIG, EVAL_LABEL_SELECTOR, TASK_PASS_RATE, and ASSERTION_PASS_RATE
    via steps.env.
