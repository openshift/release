chain:
  as: openshift-mcp-server-mcpchecker-eval-vertex
  steps:
  - ref: openshift-mcp-server-mcpchecker-eval-vertex-setup
  - ref: openshift-mcp-server-mcpchecker-eval
  documentation: |-
    Runs mcpchecker evaluations against the openshift-mcp-server on a live OCP cluster
    using Vertex AI credentials from the ocp-mcp secret.
    Set EVAL_CONFIG, EVAL_LABEL_SELECTOR, GOOGLE_CLOUD_LOCATION, GOOGLE_CLOUD_PROJECT,
    and either GEMINI_USE_VERTEX or ANTHROPIC_USE_VERTEX via steps.env.
