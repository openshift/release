ref:
  as: openshift-mcp-server-mcpchecker-eval-vertex-setup
  from: src
  commands: openshift-mcp-server-mcpchecker-eval-vertex-setup-commands.sh
  credentials:
  - mount_path: /var/run/ocp-mcp
    name: ocp-mcp
    namespace: test-credentials
  resources:
    requests:
      cpu: 100m
      memory: 100Mi
  documentation: |-
    Writes Vertex AI credential env vars to ${SHARED_DIR}/mcpchecker-creds.env for
    consumption by the openshift-mcp-server-mcpchecker-eval step.
    GOOGLE_CLOUD_LOCATION, GOOGLE_CLOUD_PROJECT, and provider flags
    (GEMINI_USE_VERTEX / ANTHROPIC_USE_VERTEX) must be set via steps.env in the
    calling CI config.
