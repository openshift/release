ref:
  as: openshift-mcp-server-mcpchecker-eval-credentials-setup
  from: src
  commands: openshift-mcp-server-mcpchecker-eval-credentials-setup-commands.sh
  credentials:
  - mount_path: /var/run/openai-token
    name: openai-token
    namespace: test-credentials
  resources:
    requests:
      cpu: 100m
      memory: 100Mi
  documentation: |-
    Copies the OpenAI API token from the openai-token secret into
    ${SHARED_DIR}/mcpchecker-creds.env for consumption by the
    openshift-mcp-server-mcpchecker-eval step. Agent, model, and judge
    selection are driven by the in-repo eval config (EVAL_CONFIG).
