ref:
  as: openshift-api-eval
  from: claude-ai-helpers
  commands: openshift-api-eval-commands.sh
  no_kubeconfig: true
  timeout: 1h30m0s
  env:
  - name: CLAUDE_CODE_USE_VERTEX
    default: "1"
    documentation: Enable Vertex AI for Claude Code.
  - name: CLOUD_ML_REGION
    default: "global"
    documentation: Google Cloud region for Vertex AI.
  - name: ANTHROPIC_VERTEX_PROJECT_ID
    default: "itpc-gcp-hybrid-pe-eng-claude"
    documentation: Google Cloud project ID for Vertex AI.
  - name: GOOGLE_APPLICATION_CREDENTIALS
    default: "/var/run/claude-code-service-account/claude-prow"
    documentation: Path to GCP service account JSON key for Vertex AI.
  - name: EVAL_RUNS
    default: "1"
    documentation: Number of times to run each eval test case.
  - name: EVAL_THRESHOLD
    default: "0.8"
    documentation: Minimum pass rate (0.0-1.0).
  - name: EVAL_GOLDEN_MODEL
    default: "sonnet"
    documentation: Claude model for golden (single-issue) tests.
  - name: EVAL_INTEGRATION_MODEL
    default: "opus"
    documentation: Claude model for integration (multi-issue) tests.
  - name: EVAL_JUDGE_MODEL
    default: "haiku"
    documentation: Claude model for the LLM judge.
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
  credentials:
  - namespace: test-credentials
    name: hypershift-team-claude-prow
    mount_path: /var/run/claude-code-service-account
  documentation: |-
    Runs the API review eval suite against the PR source.
    Uses Claude to review test patches and an LLM judge to
    verify the review output matches expected issues.
