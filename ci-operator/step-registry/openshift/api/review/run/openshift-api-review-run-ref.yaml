ref:
  as: openshift-api-review-run
  from: claude-ai-helpers
  commands: openshift-api-review-run-commands.sh
  no_kubeconfig: true
  timeout: 30m0s
  env:
  - name: CLAUDE_CODE_USE_VERTEX
    default: "1"
    documentation: Enable Vertex AI for Claude Code.
  - name: CLOUD_ML_REGION
    default: "global"
    documentation: Google Cloud region for Vertex AI.
  - name: ANTHROPIC_VERTEX_PROJECT_ID
    default: "itpc-gcp-hybrid-pe-eng-claude"
    documentation: Google Cloud project ID for Vertex AI.
  - name: GOOGLE_APPLICATION_CREDENTIALS
    default: "/var/run/claude-code-service-account/claude-prow"
    documentation: Path to GCP service account JSON key for Vertex AI.
  - name: REVIEW_MODEL
    default: "claude-opus-4-6"
    documentation: Claude model for the review.
  - name: INLINE_MODEL
    default: "claude-sonnet-4-6"
    documentation: Claude model for posting inline review comments.
  - name: EVAL_SKIP_LINT
    default: "1"
    documentation: Skip make lint (KAL already runs as a separate presubmit).
  - name: TARGET_PULL_NUMBER
    default: ""
    documentation: Override PULL_NUMBER for rehearsal runs. When set, the job reviews this openshift/api PR instead of the triggering PR.
  resources:
    requests:
      cpu: 500m
      memory: 8Gi
  credentials:
  - namespace: test-credentials
    name: hypershift-team-claude-prow
    mount_path: /var/run/claude-code-service-account
  - namespace: test-credentials
    name: api-review-bot-github-app
    mount_path: /var/run/api-review-bot-github-app
  documentation: |-
    Run step for the OpenShift API review job.
    Clones openshift/api, checks out the PR, runs /api-review,
    posts the review as a PR comment, and manages the ai/api-review-pass label.
