workflow:
  as: openshift-api-review
  steps:
    pre:
    - ref: openshift-api-eval-setup
    test:
    - ref: openshift-api-review-run
  documentation: |-
    OpenShift API review workflow.
    1. Setup: Verifies Claude Code CLI and Go toolchain are available
    2. Run: Clones openshift/api, checks out the PR, runs /api-review,
       posts the review as a PR comment, and manages the ai/api-review-pass label.
