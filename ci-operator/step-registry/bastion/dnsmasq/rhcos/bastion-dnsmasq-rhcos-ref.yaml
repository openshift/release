ref:
  as: bastion-dnsmasq-rhcos
  from_image:
    namespace: ocp
    name: "4.16"
    tag: upi-installer
  grace_period: 10m
  commands: bastion-dnsmasq-rhcos-commands.sh
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
  documentation: |-
    The step is used to enable the dnsmasq on the bastion host provisioned with rhcos and create the necessary DNS records for the cluster
