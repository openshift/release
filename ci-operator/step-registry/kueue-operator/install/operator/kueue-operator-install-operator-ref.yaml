ref:
  as: kueue-operator-install-operator
  from: upi-installer
  cli: latest
  commands: kueue-operator-install-operator-commands.sh
  resources:
    requests:
      memory: 1Gi
      cpu: 100m
    limits:
      memory: 2Gi
      cpu: 200m
  documentation: |-
    This step installs the kueue-operator using operator-sdk run bundle.
    It uses the mirrored bundle image from the catalog step in disconnected environments.