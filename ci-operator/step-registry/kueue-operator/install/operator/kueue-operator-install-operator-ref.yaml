ref:
  as: kueue-operator-install-operator
  from: upi-installer
  cli: latest
  commands: kueue-operator-install-operator-commands.sh
  resources:
    requests:
      memory: 1Gi
      cpu: 100m
    limits:
      memory: 2Gi
      cpu: 200m
  env:
  - name: CHANNEL
    default: stable-v0.2
  - name: TARGET_NAMESPACES
    default: "" 