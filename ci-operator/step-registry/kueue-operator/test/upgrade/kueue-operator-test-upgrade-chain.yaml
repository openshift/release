chain:
  as: kueue-operator-test-upgrade
  steps:
  - ref: kueue-operator-test-upgrade-ocp
  - ref: jobset-install-operator
  - ref: leader-worker-set-install-operator
  - as: e2e-kueue
    cli: latest
    commands: |
      source "${SHARED_DIR}/env"
      make e2e-ci-test
    from: kueue-operator-src
    resources:
      requests:
        cpu: "4"
        memory: "4Gi"
  documentation: |-
    Performs a minimal OCP cluster upgrade and then runs the
    downstream kueue e2e test suite to verify the operator
    works correctly after the upgrade.
