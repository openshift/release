ref:
  as: kueue-operator-test-upgrade-smoke
  from: cli
  commands: kueue-operator-test-upgrade-smoke-commands.sh
  grace_period: 60s
  resources:
    requests:
      cpu: 200m
      memory: 300Mi
  documentation: |-
    Runs a minimal smoke test to verify kueue admission works after an
    OCP cluster upgrade. Creates a ResourceFlavor, ClusterQueue, LocalQueue,
    and a simple Job, then verifies the job is admitted and completes.
