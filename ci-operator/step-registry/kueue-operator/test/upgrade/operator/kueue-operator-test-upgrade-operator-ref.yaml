ref:
  as: kueue-operator-test-upgrade-operator
  from: src-with-oc-and-kubectl
  commands: kueue-operator-test-upgrade-operator-commands.sh
  timeout: 900s
  resources:
    requests:
      cpu: 200m
      memory: 300Mi
  documentation: |-
    Upgrades the kueue operator from the previously installed release to
    the current CI-built version. Deletes the existing OLM Subscription,
    then installs the CI bundle via operator-sdk run bundle with CSV
    patching fallback. Requires BUNDLE_IMAGE and OPERATOR_IMAGE in
    SHARED_DIR/env (set by kueue-operator-image-env-setup).
