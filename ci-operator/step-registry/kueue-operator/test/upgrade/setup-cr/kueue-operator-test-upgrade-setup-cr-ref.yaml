ref:
  as: kueue-operator-test-upgrade-setup-cr
  from: cli
  commands: kueue-operator-test-upgrade-setup-cr-commands.sh
  timeout: 900s
  resources:
    requests:
      cpu: 200m
      memory: 300Mi
  documentation: |-
    Patches the operator CSV with the CI-built image, creates the
    default Kueue CR, and waits for all kueue CRDs to be available.
    Run after kueue-operator-test-upgrade-install-bundle.
