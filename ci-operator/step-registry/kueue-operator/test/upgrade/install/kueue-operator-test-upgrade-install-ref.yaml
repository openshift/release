ref:
  as: kueue-operator-test-upgrade-install
  from: cli
  commands: kueue-operator-test-upgrade-install-commands.sh
  timeout: 900s
  env:
  - name: KUEUE_CHANNEL
    default: "stable-v1.2"
    documentation: OLM subscription channel for the kueue operator.
  resources:
    requests:
      cpu: 200m
      memory: 300Mi
  documentation: |-
    Installs the kueue operator via OLM Subscription from the
    redhat-operators catalog and creates the default Kueue CR.
