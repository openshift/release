ref:
  as: kueue-operator-test-upgrade-install-previous
  from: cli
  commands: kueue-operator-test-upgrade-install-previous-commands.sh
  timeout: 900s
  env:
  - name: KUEUE_PREVIOUS_CHANNEL
    default: "stable-v1.3"
    documentation: OLM subscription channel for the previous kueue operator release.
  resources:
    requests:
      cpu: 200m
      memory: 300Mi
  documentation: |-
    Installs the previous release of the kueue operator via OLM Subscription
    from the redhat-operators catalog and creates the default Kueue CR.
    Used in upgrade tests to establish a baseline before upgrading the
    operator to the current CI-built version.
