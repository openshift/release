ref:
  as: kueue-operator-test-upgrade-ocp
  from: cli
  commands: kueue-operator-test-upgrade-ocp-commands.sh
  timeout: 7800s
  resources:
    requests:
      cpu: 200m
      memory: 300Mi
  dependencies:
  - name: "release:latest"
    env: OPENSHIFT_UPGRADE_RELEASE_IMAGE_OVERRIDE
  documentation: |-
    Performs a minimal OCP cluster upgrade and waits for completion.
