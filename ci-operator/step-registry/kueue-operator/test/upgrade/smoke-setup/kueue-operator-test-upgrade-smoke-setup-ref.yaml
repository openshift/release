ref:
  as: kueue-operator-test-upgrade-smoke-setup
  from: cli
  commands: kueue-operator-test-upgrade-smoke-setup-commands.sh
  grace_period: 60s
  resources:
    requests:
      cpu: 200m
      memory: 300Mi
  documentation: |-
    Creates Kueue resources (ResourceFlavor, ClusterQueue, LocalQueue, Job)
    before an OCP upgrade to verify they survive the upgrade. The post-upgrade
    smoke test then creates new resources to verify Kueue still works.
