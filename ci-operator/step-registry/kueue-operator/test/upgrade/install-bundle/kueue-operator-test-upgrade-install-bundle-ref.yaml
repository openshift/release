ref:
  as: kueue-operator-test-upgrade-install-bundle
  from: src-with-oc-and-kubectl
  commands: kueue-operator-test-upgrade-install-bundle-commands.sh
  timeout: 900s
  resources:
    requests:
      cpu: 200m
      memory: 300Mi
  documentation: |-
    Installs the kueue operator from a CI-built bundle image using
    operator-sdk run bundle and creates the default Kueue CR.
    Used for pre-release testing when the FBC catalog channel
    does not yet exist.
