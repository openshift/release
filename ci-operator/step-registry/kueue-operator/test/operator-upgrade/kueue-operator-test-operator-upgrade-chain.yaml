chain:
  as: kueue-operator-test-operator-upgrade
  steps:
  - ref: kueue-operator-test-upgrade-operator
  - as: e2e-kueue
    cli: latest
    commands: |
      source "${SHARED_DIR}/env"
      make e2e-ci-test
    from: kueue-operator-src
    resources:
      requests:
        cpu: "4"
        memory: "4Gi"
  documentation: |-
    Upgrades the kueue operator from the previous release to the
    CI-built version, then runs the downstream kueue e2e test suite
    to verify the operator works correctly after the upgrade.
