ref:
  as: kueue-operator-disconnected-compute
  from: kueue-operator-src
  commands: kueue-operator-disconnected-compute-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  documentation: |-
    This step computes the bundle and must-gather images for the kueue-operator using skopeo.
    It sets BUNDLE_IMAGE and MUST_GATHER_IMAGE environment variables for use in disconnected environments.