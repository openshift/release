ref:
  as: redhat-appstudio-conformance-tests
  commands: redhat-appstudio-conformance-tests-commands.sh
  credentials:
  - mount_path: /usr/local/konflux-ci-secrets-new/redhat-appstudio-qe
    name: konflux-ci-secrets-new
    namespace: test-credentials
  documentation: |-
    Runs Konflux conformance tests from the konflux-ci/konflux-ci repository.
    Tests are executed using Ginkgo v2 against a pre-installed Konflux instance.
  env:
  - default: upstream-konflux
    documentation: Ginkgo label filter for selecting which tests to run
    name: GINKGO_LABEL_FILTER
  from: e2e-test-runner
  grace_period: 1m0s
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  timeout: 2h0m0s
