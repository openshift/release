ref:
  as: redhat-appstudio-operator-overlay-install
  cli: latest
  commands: redhat-appstudio-operator-overlay-install-commands.sh
  credentials:
  - mount_path: /usr/local/konflux-ci-secrets-new/redhat-appstudio-qe
    name: konflux-ci-secrets-new
    namespace: test-credentials
  documentation: |-
    Bootstraps infra-deployments development-operator overlay on a claimed OpenShift cluster.
    Clones infra-deployments (including PR content), prepares the cluster, then runs install.sh
    via OVERLAY_E2E_SCRIPT_NAME.
    Runs in the unified CI image built from infra-deployments (task-runner + ubi10/go-toolset);
    see components/konflux-operator/ci/openshift-overlay-e2e/Dockerfile.
  env:
  - default: install.sh
    documentation: Phase script under openshift-overlay-e2e (install.sh or run-e2e.sh)
    name: OVERLAY_E2E_SCRIPT_NAME
  from: konflux-overlay-install
  grace_period: 1m0s
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  timeout: 1h0m0s
