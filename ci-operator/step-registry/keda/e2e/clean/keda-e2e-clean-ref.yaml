ref:
  as: keda-e2e-clean
  cli: latest
  commands: keda-e2e-clean-commands.sh
  from: custom-metrics-autoscaler-tests
  resources:
    requests:
      cpu: 100m
  env:
  - name: E2E_INSTALL_KEDA
    default: "true"
    documentation: |-
      Whether this step should clean up a KEDA installation. Set to
      "false" when the CMA operator handles teardown.
  documentation: |-
    Cleans up the KEDA e2e test environment on an OpenShift cluster.
