chain:
  as: keda-e2e
  steps:
  - ref: keda-e2e-setup
  - ref: keda-e2e-run
  - ref: keda-e2e-clean
  env:
  - name: E2E_TEST_CONFIG
    default: openshift-e2e.yaml
  documentation: |-
    Sets up, runs, and cleans up the KEDA e2e OpenShift test suite.
    Deploys KEDA from built images and executes the tests defined
    in the downstream openshift-e2e.yaml config.
