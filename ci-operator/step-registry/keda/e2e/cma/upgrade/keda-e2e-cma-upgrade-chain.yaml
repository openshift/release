chain:
  as: keda-e2e-cma-upgrade
  steps:
  - ref: keda-e2e-cma-upgrade-install-previous
  - ref: keda-e2e-cma-upgrade-pre
  - ref: keda-e2e-cma-upgrade-apply
  - ref: keda-e2e-cma-upgrade-post
  - ref: keda-e2e-cma-teardown
  documentation: |-
    Runs the upstream KEDA e2e upgrade test on an OpenShift cluster.
    Installs the previous Custom Metrics Autoscaler operator version from
    a bundle built in this CI run from the second most recent release
    manifests in the operator repository, deploys workloads, upgrades the
    operator to the current bundle via operator-sdk run bundle-upgrade,
    verifies the workloads survive the upgrade, and finally removes the
    operator.
