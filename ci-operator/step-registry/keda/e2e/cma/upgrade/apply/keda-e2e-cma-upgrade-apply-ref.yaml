ref:
  as: keda-e2e-cma-upgrade-apply
  cli: latest
  commands: keda-e2e-cma-upgrade-apply-commands.sh
  from: operator-sdk
  resources:
    requests:
      cpu: 100m
  dependencies:
  - env: OO_BUNDLE
    name: custom-metrics-autoscaler-operator-bundle
  documentation: |-
    Upgrades the Custom Metrics Autoscaler operator to the bundle built in
    this CI run using operator-sdk run bundle-upgrade, then waits for the
    operator deployment to become available again.
