ref:
  as: keda-e2e-cma-upgrade-post
  cli: latest
  commands: keda-e2e-cma-upgrade-post-commands.sh
  from: src
  resources:
    requests:
      cpu: 100m
  documentation: |-
    Runs the post-upgrade phase of the upstream KEDA e2e upgrade test
    (TestKedaUpgradeVerify via 'make e2e-upgrade-test-post') against the
    OpenShift cluster after the operator has been upgraded to the current
    build. Verifies the pre-upgrade ScaledObject is still active with a
    working HPA.
