ref:
  as: keda-e2e-cma-upgrade-pre
  cli: latest
  commands: keda-e2e-cma-upgrade-pre-commands.sh
  from: src
  resources:
    requests:
      cpu: 100m
  documentation: |-
    Runs the pre-upgrade phase of the upstream KEDA e2e upgrade test
    (TestKedaUpgradeSetup via 'make e2e-upgrade-test-pre') against the
    OpenShift cluster running the previous operator version. Deploys a
    ScaledObject with a CPU trigger and the workload it scales.
