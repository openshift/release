ref:
  as: keda-e2e-cma-upgrade-install-previous
  cli: latest
  commands: keda-e2e-cma-upgrade-install-previous-commands.sh
  from: operator-sdk
  grace_period: 1m0s
  resources:
    requests:
      cpu: 100m
  dependencies:
  - env: OO_PREVIOUS_BUNDLE
    name: custom-metrics-autoscaler-operator-previous-bundle
  documentation: |-
    Installs the previous version of the Custom Metrics Autoscaler operator
    using operator-sdk run bundle. The OO_PREVIOUS_BUNDLE bundle image is
    built in this CI run from the second most recent release manifests under
    keda/ in the operator repository (bundle-previous.Dockerfile.ci), so it
    shares the 'keda' OLM package with the current bundle and provides a
    valid upgrade edge for 'operator-sdk run bundle-upgrade'. The keda
    namespace is annotated to skip auto-creation of the default
    KedaController so the upgrade test controls the CR lifecycle explicitly.
