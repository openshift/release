chain:
  as: keda-e2e-cma
  steps:
  - ref: keda-e2e-cma-install
  - ref: keda-e2e-cma-apply-kc
  - ref: keda-e2e-setup
  - ref: keda-e2e-run
  - ref: keda-e2e-clean
  - ref: keda-e2e-cma-teardown
  env:
  - name: E2E_INSTALL_KEDA
    default: "false"
  - name: E2E_TEST_CONFIG
    default: openshift-e2e.yaml
  documentation: |-
    Installs the CMA operator, applies a KedaController CR, runs the
    shared KEDA e2e test suite, and tears down the operator. The
    setup/run/clean steps are shared with the keda-e2e chain; this
    chain overrides E2E_INSTALL_KEDA.
