ref:
  as: keda-e2e-cma-apply-kc
  cli: latest
  commands: keda-e2e-cma-apply-kc-commands.sh
  from: src
  resources:
    requests:
      cpu: 100m
  documentation: |-
    Runs 'make e2e-cma-setup' which applies the e2e test fixture
    KedaController CR (with file-based auth configured) and waits
    for all KEDA deployments to become available.
