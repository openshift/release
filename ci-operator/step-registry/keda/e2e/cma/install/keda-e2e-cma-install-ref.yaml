ref:
  as: keda-e2e-cma-install
  cli: latest
  commands: keda-e2e-cma-install-commands.sh
  from: operator-sdk
  resources:
    requests:
      cpu: 100m
  dependencies:
  - env: OO_BUNDLE
    name: custom-metrics-autoscaler-operator-bundle
  documentation: |-
    Installs the Custom Metrics Autoscaler operator on an OpenShift
    cluster using operator-sdk bundle run.
