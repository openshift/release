ref:
  as: keda-e2e-setup
  cli: latest
  commands: keda-e2e-setup-commands.sh
  from: custom-metrics-autoscaler-tests
  resources:
    requests:
      cpu: 100m
  dependencies:
  - env: IMAGE_CONTROLLER
    name: custom-metrics-autoscaler
  - env: IMAGE_ADAPTER
    name: custom-metrics-autoscaler-adapter
  - env: IMAGE_WEBHOOKS
    name: custom-metrics-autoscaler-webhooks
  env:
  - name: E2E_INSTALL_KEDA
    default: "true"
    documentation: |-
      Whether this step should install KEDA from built images. Set to
      "false" when the CMA operator handles installation.
  documentation: |-
    Sets up the KEDA e2e test environment on an OpenShift cluster.
    When E2E_INSTALL_KEDA is true, deploys KEDA from the built images.
    When used via the keda-e2e-cma chain, image dependencies are
    overridden and KEDA installation is skipped.
