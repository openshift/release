ref:
  as: keda-e2e-run
  cli: latest
  commands: keda-e2e-run-commands.sh
  from: custom-metrics-autoscaler-tests
  resources:
    requests:
      cpu: 100m
  env:
  - name: E2E_TEST_CONFIG
    default: openshift-e2e.yaml
    documentation: |-
      Path to the e2e test config YAML file that controls which test
      categories and individual tests are run. Override this to use a
      different config, e.g. openshift-e2e-gcp.yaml for GCP-specific tests.
  documentation: |-
    Runs the KEDA e2e OpenShift test suite. Shared by both the
    kedacore-keda and CMA operator CI configurations. The test config
    file can be overridden via the E2E_TEST_CONFIG env variable.
