ref:
  as: trusted-execution-clusters-ref-operator-test
  from: kubevirt-test-image
  commands: trusted-execution-clusters-ref-operator-test-commands.sh
  dependencies:
  - name: operator
    env: OPERATOR_IMAGE
  - name: compute-pcrs
    env: RELATED_IMAGE_COMPUTE_PCRS
  - name: register-server
    env: RELATED_IMAGE_REGISTRATION_SERVER
  - name: attestation-key-register
    env: RELATED_IMAGE_ATTESTATION_KEY_REGISTER
  resources:
    requests:
      cpu: 500m
      memory: 500Mi
  documentation: |-
    Runs KubeVirt integration tests for the trusted-execution-clusters operator
    on an OpenShift cluster with CNV installed.

    Prerequisites:
    - OpenShift cluster provisioned and accessible via KUBECONFIG
    - KubeVirt/CNV operator installed on the cluster (use kubevirt-install ref)
    - Operator images built and available as dependencies
