ref:
  as: telcov10n-sno-spoke-cluster-install
  commands: telcov10n-sno-spoke-cluster-install-commands.sh
  from: src
  resources:
    requests:
      cpu: 1000m
      memory: 500Mi
  env:
  - name: SSH_PUB_KEY
    default: ""
    documentation: |-
      TBD
  - name: SPOKE_CLUSTER_NAME
    default: ""
    documentation: |-
      TBD
  - name: SPOKE_BASE_DOMAIN
    default: ""
    documentation: |-
      TBD
  - name: CLUSTER_IMG_SET_REF
    default: ""
    documentation: |-
      TBD
  - name: INSTALL_CONFIG_OVERRIDES
    default: ""
    documentation: |-
      TBD
  - name: DU_PROFILE
    default: ""
    documentation: |-
      TBD
  - name: NTP_SRC
    default: ""
    documentation: |-
      TBD
  - name: NODE_NIC
    default: ""
    documentation: |-
      TBD
  - name: NODE_MAC
    default: ""
    documentation: |-
      TBD
  - name: BOOT_MAC
    default: ""
    documentation: |-
      TBD
  - name: GLOBAL_IGNITION_CONF_OVERRIDE
    default: ""
    documentation: |-
      TBD
  - name: NODE_IGNITION_CONF_OVERRIDE
    default: ""
    documentation: |-
      TBD
  - name: SHARED_HUB_CLUSTER_PROFILE
    default: "ztp-hub-preserved-prod-cluster_profile_dir"
    documentation: |-
      This ENV var will be the symbolic link that points to the folder that contains all relevant Hub cluster files
      so that it can be known from another later job during Spoke deployment.
      You will be able to consume the content of that folder from a later job, by ssh-ing or rsyncing from the
      shared file located at AUX_HOST host
  - name: GITEA_HELPER_IMG
    default: "quay.io/ccardenosa/sno-spoke-helper"
    documentation: |-
      Gitea helper image to connect to the Git repo via SSH
  - name: AUX_HOST
    default: ""
  # credentials:
  # - namespace: test-credentials
  #   name: telcov10n-ztp-left-shifting
  #   mount_path: /var/run/telcov10n/ztp-left-shifting
  documentation: |-
    This step allows to setup the artifacts need to deploy a SNO Spoke cluster 
