workflow:
  as: telcov10n-system-telco-kpis-deploy-ztp-infra
  steps:
    pre:
    - ref: telcov10n-system-telco-kpis-common-functions-generator
    - ref: telcov10n-system-telco-kpis-deploy-vm-bastion
    - chain: telcov10n-system-telco-kpis-hub-deployment
    - chain: telcov10n-system-telco-kpis-spoke-deployment
    - ref: telcov10n-system-telco-kpis-mirror-ran-test-images
    post:
    - ref: telcov10n-system-telco-kpis-wait-to-debug
    env:
      PR_ONLY: "true"
      TIMEOUT: +10 min
  documentation: |-
    Deploys the ZTP infrastructure required for telco-kpis testing. Sets up a VM-based bastion host,
    deploys an OpenShift hub cluster, mirrors spoke operators and RAN test container images to the
    disconnected registry. This workflow prepares the infrastructure layer so that spoke clusters
    can be provisioned and tests executed by the telcov10n-system-telco-kpis-tests workflow.
