ref:
  as: telcov10n-system-telco-kpis-common-functions-generator
  from_image:
    namespace: telcov10n-ci
    name: eco-ci-cd
    tag: eco-ci-cd
  commands: telcov10n-system-telco-kpis-common-functions-generator-commands.sh
  grace_period: 30s
  timeout: 5m
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  documentation: |-
    Generates shared bash functions for telco-kpis Prow steps and writes them
    to ${SHARED_DIR}/telco-kpis-common-functions.sh. Subsequent steps source
    this file to get: setup_ssh_jump(), process_inventory(),
    setup_ansible_inventory(), export_env_vars_from_json(),
    setup_continue_on_fail(), and the ANSIBLE_REMOTE_TMP export.
