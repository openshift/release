ref:
  as: telcov10n-system-telco-kpis-hub-deployment-setup-spoke-hub-connectivity
  from: root
  commands: telcov10n-system-telco-kpis-hub-deployment-setup-spoke-hub-connectivity-commands.sh
  timeout: 30m
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  env:
    - name: SPOKE_CLUSTER
      default: "spree-01"
      documentation: Spoke cluster to connect to hub
    - name: HUB_CLUSTER
      default: "kni-qe-70"
      documentation: Hub cluster managing the spoke
    - name: INFRA_SETTINGS
      default: '{}'
      documentation: >-
        JSON object for per-step infrastructure configuration overrides from CI config.
        Values here take precedence over INFRA_SETTINGS_DEFAULTS.
    - name: INFRA_SETTINGS_DEFAULTS
      default: |-
        {
          "setup_spoke_hub_connectivity": {
            "skip": false,
            "debug_on_fail": false,
            "action": "setup",
            "update_dns": true,
            "update_provisioning_cr": true,
            "debug": false
          }
        }
      documentation: >-
        JSON object for per-step infrastructure configuration. The "setup_spoke_hub_connectivity" key supports:
        skip (bool) - when true, skip this step entirely and exit 0;
        action (str) - action to perform (setup, remove, check-only, list-interconnections);
        update_dns (bool) - update DNS records for spoke-hub connectivity;
        update_provisioning_cr (bool) - update provisioning CR with spoke network configuration;
        debug (bool) - when true, enables Ansible -vvv verbose output.
        Values are exported as uppercase env vars.
  credentials:
    # Common hypervisor (shared across all spokes)
    - namespace: test-credentials
      name: telcov10n-ansible-hypervisors-hv6
      mount_path: /var/host_variables/common/hypervisor

    # Common group variables
    - namespace: test-credentials
      name: telcov10n-ansible-group-all
      mount_path: /var/group_variables/common/all
    - namespace: test-credentials
      name: telcov10n-ansible-group-bastions
      mount_path: /var/group_variables/common/bastions
    - namespace: test-credentials
      name: telcov10n-ansible-group-hypervisors
      mount_path: /var/group_variables/common/hypervisors

    # Spoke spree-01 credentials
    - namespace: test-credentials
      name: telcov10n-ansible-spree-01-master0
      mount_path: /var/host_variables/spree-01/master0
    - namespace: test-credentials
      name: telcov10n-ansible-group-spree-01-masters
      mount_path: /var/group_variables/spree-01/masters
    - namespace: test-credentials
      name: telcov10n-ansible-group-spree-01-nodes
      mount_path: /var/group_variables/spree-01/nodes

    # Spoke spree-02 credentials
    - namespace: test-credentials
      name: telcov10n-ansible-spree-02-master0
      mount_path: /var/host_variables/spree-02/master0
    - namespace: test-credentials
      name: telcov10n-ansible-group-spree-02-masters
      mount_path: /var/group_variables/spree-02/masters
    - namespace: test-credentials
      name: telcov10n-ansible-group-spree-02-nodes
      mount_path: /var/group_variables/spree-02/nodes

    # Spoke spree-03 credentials
    - namespace: test-credentials
      name: telcov10n-ansible-spree-03-master0
      mount_path: /var/host_variables/spree-03/master0
    - namespace: test-credentials
      name: telcov10n-ansible-group-spree-03-masters
      mount_path: /var/group_variables/spree-03/masters
    - namespace: test-credentials
      name: telcov10n-ansible-group-spree-03-nodes
      mount_path: /var/group_variables/spree-03/nodes

    # Spoke spree-04 credentials
    - namespace: test-credentials
      name: telcov10n-ansible-spree-04-master0
      mount_path: /var/host_variables/spree-04/master0
    - namespace: test-credentials
      name: telcov10n-ansible-group-spree-04-masters
      mount_path: /var/group_variables/spree-04/masters
    - namespace: test-credentials
      name: telcov10n-ansible-group-spree-04-nodes
      mount_path: /var/group_variables/spree-04/nodes

    # Spoke cnfdg46 credentials
    - namespace: test-credentials
      name: telcov10n-ansible-cnfdg46-master0
      mount_path: /var/host_variables/cnfdg46/master0
    - namespace: test-credentials
      name: telcov10n-ansible-group-cnfdg46-masters
      mount_path: /var/group_variables/cnfdg46/masters
    - namespace: test-credentials
      name: telcov10n-ansible-group-cnfdg46-nodes
      mount_path: /var/group_variables/cnfdg46/nodes

    # Hub kni-qe-70 credentials
    - namespace: test-credentials
      name: telcov10n-ansible-kni-qe-70-bastion
      mount_path: /var/host_variables/kni-qe-70/bastion

    # Hub kni-qe-71 credentials
    - namespace: test-credentials
      name: telcov10n-ansible-kni-qe-71-bastion
      mount_path: /var/host_variables/kni-qe-71/bastion

    # Hub dev-kpi-01 credentials
    - namespace: test-credentials
      name: telcov10n-ansible-dev-kpi-01-bastion
      mount_path: /var/host_variables/dev-kpi-01/bastion

    # Hub dev-kpi-02 credentials
    - namespace: test-credentials
      name: telcov10n-ansible-dev-kpi-02-bastion
      mount_path: /var/host_variables/dev-kpi-02/bastion

    # Hub dev-kpi-03 credentials
    - namespace: test-credentials
      name: telcov10n-ansible-dev-kpi-03-bastion
      mount_path: /var/host_variables/dev-kpi-03/bastion

    # Hub dev-kpi-04 credentials
    - namespace: test-credentials
      name: telcov10n-ansible-dev-kpi-04-bastion
      mount_path: /var/host_variables/dev-kpi-04/bastion
  documentation: |-
    Configure iptables DNAT rules on the hypervisor for spoke-hub network
    connectivity. Runs playbooks/telco-kpis/setup-spoke-hub-connectivity.yml
    on hosts: bastion, which delegates iptables/firewalld/dnsmasq operations
    to the hypervisor via spoke_hub_connectivity role.

    Creates three sets of DNAT rules:
    1. BMC → hub cluster (spoke BMC access to hub API/ingress)
    2. Cluster → hub cluster (spoke nodes to hub API/ingress)
    3. Cluster → hub bastion registry (spoke nodes to hub mirror registry)

    The "hypervisor" extra var is set to "hypervisor" (the Prow inventory
    host name created by setup_ansible_inventory), not an FQDN.

    Supports actions: setup, remove, check-only, list-interconnections.

    Default spoke-hub mappings:
      spree-01 → kni-qe-70
      spree-02 → kni-qe-71
      spree-03 → dev-kpi-02
      spree-04 → dev-kpi-01
      cnfdg46  → dev-kpi-04
    These are defaults only — all combinations are possible. A spoke can
    be connected to any hub, and multiple hubs can be connected to the
    same spoke (e.g., spree-01 → kni-qe-70 + spree-01 → dev-kpi-01).

    Jenkins equivalent: telco-kpis-setup-spoke-hub-connectivity job
