    # Hub dev-kpi-03 credentials
    - namespace: test-credentials
      name: telcov10n-ansible-dev-kpi-03-bastion
      mount_path: /var/host_variables/dev-kpi-03/bastion
    - namespace: test-credentials
      name: telcov10n-ansible-dev-kpi-03-master0
      mount_path: /var/host_variables/dev-kpi-03/master0
    - namespace: test-credentials
      name: telcov10n-ansible-group-dev-kpi-03-masters
      mount_path: /var/group_variables/dev-kpi-03/masters
    - namespace: test-credentials
      name: telcov10n-ansible-group-dev-kpi-03-nodes
      mount_path: /var/group_variables/dev-kpi-03/nodes

    # Hub dev-kpi-04 credentials
    - namespace: test-credentials
      name: telcov10n-ansible-dev-kpi-04-bastion
      mount_path: /var/host_variables/dev-kpi-04/bastion
    - namespace: test-credentials
      name: telcov10n-ansible-dev-kpi-04-master0
      mount_path: /var/host_variables/dev-kpi-04/master0
    - namespace: test-credentials
      name: telcov10n-ansible-group-dev-kpi-04-masters
      mount_path: /var/group_variables/dev-kpi-04/masters
    - namespace: test-credentials
      name: telcov10n-ansible-group-dev-kpi-04-nodes
      mount_path: /var/group_variables/dev-kpi-04/nodes
  documentation: |-
    Configure hub cluster for ZTP spoke deployments. Runs 4 sequential
    playbooks from playbooks/ran/:

    1. hub-sno-configure-lvm-storage.yml — LVM volume group + LocalVolume CRs
       on master0 (runs on hosts: masters, needs master0 credentials)
    2. hub-sno-configure-acm.yml — MultiClusterHub, AgentServiceConfig,
       metal3, siteconfig enablement (runs on hosts: bastion)
    3. hub-sno-configure-kustomize-plugin.yml — ZTP kustomize plugin for
       ArgoCD with ztp-site-generator image mirroring (runs on hosts: bastion)
    4. hub-sno-configure-gitops.yml — ArgoCD GitLab CA trust, connectivity
       verification, ClusterInstance whitelist (runs on hosts: bastion)

    CREDENTIAL DESIGN: Hub clusters mount bastion, master0, and masters/nodes
    group credentials. master0 is required by the LVM storage playbook which
    creates logical volumes directly on the master node.

    Jenkins equivalent: telco-kpis-hub-config job
