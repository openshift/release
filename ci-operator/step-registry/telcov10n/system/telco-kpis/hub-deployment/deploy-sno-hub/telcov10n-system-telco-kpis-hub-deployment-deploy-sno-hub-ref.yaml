ref:
  as: telcov10n-system-telco-kpis-hub-deployment-deploy-sno-hub
  from: root
  commands: telcov10n-system-telco-kpis-hub-deployment-deploy-sno-hub-commands.sh
  timeout: 3h
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  env:
    - name: HUB_CLUSTER
      default: "kni-qe-70"
      documentation: Hub cluster name to deploy (dev-kpi-01, dev-kpi-02, dev-kpi-03, dev-kpi-04, kni-qe-70, kni-qe-71)
    - name: INFRA_SETTINGS
      default: '{}'
      documentation: >-
        JSON object for per-step infrastructure configuration overrides from CI config.
        Values here take precedence over INFRA_SETTINGS_DEFAULTS.
    - name: INFRA_SETTINGS_DEFAULTS
      default: |-
        {
          "deploy_sno_hub": {
            "skip": false,
            "version": "4.21",
            "ocp_release_image": "",
            "hub_lockdown_uri": "",
            "architecture": "x86_64",
            "disable_insights": true,
            "debug": false
          }
        }
      documentation: >-
        JSON object for per-step infrastructure configuration. The "deploy_sno_hub" key supports:
        skip (bool) - when true, skip this step entirely and exit 0;
        version (str) - OpenShift version to deploy (fallback when no lockdown or release image);
        ocp_release_image (str) - optional OCP release pull spec (overrides version, overridden by lockdown);
        hub_lockdown_uri (str) - optional URL to hub lockdown JSON. When provided, the OCP release
        image tag is extracted from .hub.ocp.pull_spec.tag and used as the release. This takes
        highest priority over ocp_release_image and version. Recommended defaults (symlinks to
        latest verified lockdowns):
        x86_64: https://gitlab.cee.redhat.com/ran/dev-kpi-pipeline/-/raw/prow-lockdowns/hub/defaults/lockdown-hub-x86_64.json
        arm64: https://gitlab.cee.redhat.com/ran/dev-kpi-pipeline/-/raw/prow-lockdowns/hub/defaults/lockdown-hub-arm64.json
        Version-specific URLs are also available (e.g. lockdown-hub-4.21-x86_64.json).
        Empty string disables lockdown;
        architecture (str) - target architecture (x86_64 or arm64);
        disable_insights (bool) - disable Red Hat Insights operator;
        debug (bool) - when true, enables Ansible -vvv verbose output.
        Values are exported as uppercase env vars.
  credentials:
    # Common hypervisor (shared across all spokes)
    - namespace: test-credentials
      name: telcov10n-ansible-hypervisors-hv6
      mount_path: /var/host_variables/common/hypervisor

    # Common group variables
    - namespace: test-credentials
      name: telcov10n-ansible-group-all
      mount_path: /var/group_variables/common/all
    - namespace: test-credentials
      name: telcov10n-ansible-group-bastions
      mount_path: /var/group_variables/common/bastions
    - namespace: test-credentials
      name: telcov10n-ansible-group-hypervisors
      mount_path: /var/group_variables/common/hypervisors

    # Spoke spree-01 credentials
    - namespace: test-credentials
      name: telcov10n-ansible-spree-01-master0
      mount_path: /var/host_variables/spree-01/master0
    - namespace: test-credentials
      name: telcov10n-ansible-group-spree-01-masters
      mount_path: /var/group_variables/spree-01/masters
    - namespace: test-credentials
      name: telcov10n-ansible-group-spree-01-nodes
