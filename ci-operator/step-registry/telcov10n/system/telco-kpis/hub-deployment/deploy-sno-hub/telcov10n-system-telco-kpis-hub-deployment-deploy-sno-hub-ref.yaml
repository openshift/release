    # Hub dev-kpi-03 credentials
    - namespace: test-credentials
      name: telcov10n-ansible-dev-kpi-03-bastion
      mount_path: /var/host_variables/dev-kpi-03/bastion
    - namespace: test-credentials
      name: telcov10n-ansible-dev-kpi-03-master0
      mount_path: /var/host_variables/dev-kpi-03/master0
    - namespace: test-credentials
