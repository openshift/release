      mount_path: /var/group_variables/dev-kpi-04/nodes
  documentation: |-
    Deploy Single Node OpenShift (SNO) hub cluster using assisted installer.
    Creates hub cluster that will manage spoke deployments via ZTP.

    Uses setup_ansible_inventory(HUB_CLUSTER, HUB_CLUSTER) to populate
    inventories/ocp-deployment/ with the hub's own master0, bastion, and
    hypervisor host_vars plus common/hub-specific group_vars.

    OCP release resolution priority:
    1. hub_lockdown_uri — download lockdown JSON, extract .hub.ocp.pull_spec.tag
    2. ocp_release_image — explicit pull spec
    3. version — OCP minor version (e.g., "4.21")

    Jenkins equivalent: telco-kpis-deploy-sno-hub job

    CREDENTIAL DESIGN: Hub clusters mount bastion, master0, and masters/nodes
    group credentials (needed for OCP deployment). Other infra steps that only
    need SSH access to the bastion mount bastion credentials only.
