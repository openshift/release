workflow:
  as: telcov10n-system-telco-kpis-hub-deployment
  steps:
    env:
      UPDATE_DNS: "true"
      UPDATE_PROVISIONING_CR: "true"
    pre:
    - chain: telcov10n-system-telco-kpis-hub-deployment-deploy-hub
    post:
    - ref: wait
  documentation: |-
    Deploy and configure a hub cluster for Telco KPIs testing infrastructure.

    This workflow provisions a Single Node OpenShift (SNO) hub cluster and configures
    it to manage spoke clusters via Zero Touch Provisioning (ZTP). The hub cluster runs
    Red Hat Advanced Cluster Management (RHACM), Topology Aware Lifecycle Manager (TALM),
    and GitOps operators to orchestrate spoke deployments and configurations.

    Workflow steps:
    1. Deploy SNO hub cluster (OCP 4.18+ via assisted installer)
    2. Install hub operators (ACM, TALM, GitOps, OpenShift Operators)
    3. Setup spoke-hub connectivity (import managed clusters, configure networking)
    4. Configure hub cluster (policies, placement rules, application sets)

    Environment variables:
    - HUB_CLUSTER: Hub cluster name (dev-kpi-01, dev-kpi-02, kni-qe-70, kni-qe-71)
    - VERSION: OpenShift version (default: 4.18)
    - DISABLE_INSIGHTS: Disable Red Hat Insights (default: true)

    Use cases:
    - Fresh hub cluster deployment for ZTP testing
    - Hub cluster rebuild after teardown
    - Hub cluster version upgrades with operator reconfiguration
