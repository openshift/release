chain:
  as: telcov10n-system-telco-kpis-hub-deployment
  env:
  - name: UPDATE_DNS
    default: "true"
  - name: UPDATE_PROVISIONING_CR
    default: "true"
  steps:
  - ref: telcov10n-system-telco-kpis-hub-deployment-deploy-sno-hub
  - ref: telcov10n-system-telco-kpis-hub-deployment-install-hub-operators
  - ref: telcov10n-system-telco-kpis-hub-deployment-setup-spoke-hub-connectivity
  - ref: telcov10n-system-telco-kpis-hub-deployment-hub-config
  documentation: |-
    The telco-kpis-hub-deployment chain orchestrates hub cluster deployment
    and configuration for Telco KPIs testing infrastructure.

    Steps:
    1. Deploy SNO hub cluster using assisted installer
    2. Install hub operators (ACM, TALM, GitOps, Topology Aware Lifecycle Manager)
    3. Setup spoke-hub connectivity (import managed clusters, configure network)
    4. Configure hub cluster (policies, placement rules, application sets)

    This chain prepares the hub cluster to manage spoke deployments via ZTP.
