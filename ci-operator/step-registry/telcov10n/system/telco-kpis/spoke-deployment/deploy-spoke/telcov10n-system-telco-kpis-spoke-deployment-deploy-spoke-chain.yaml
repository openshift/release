chain:
  as: telcov10n-system-telco-kpis-spoke-deployment-deploy-spoke
  steps:
  - ref: telcov10n-system-telco-kpis-spoke-deployment-mirror-spoke-operators
  - ref: telcov10n-system-telco-kpis-spoke-deployment-deploy-spoke-ztp
  documentation: |-
    The telco-kpis-spoke-deployment-deploy-spoke chain orchestrates spoke cluster
    deployment for Telco KPIs testing infrastructure using Zero Touch Provisioning (ZTP).

    Steps:
    1. Mirror spoke operators to disconnected registry
    2. Deploy spoke cluster via ZTP (using RHACM and GitOps from hub)

    This chain deploys managed spoke clusters that are configured and tested by
    the Telco KPIs testing framework.
