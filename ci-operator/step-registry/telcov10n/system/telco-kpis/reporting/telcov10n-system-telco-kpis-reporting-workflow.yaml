workflow:
  as: telcov10n-system-telco-kpis-reporting
  steps:
    env:
      DEVELOPMENT_MODE: "false"
      OUTPUT_FILENAME: ""
      TEST_FILTER: ""
    post:
    - chain: telcov10n-system-telco-kpis-reporting
  documentation: |-
    Generate comprehensive reports for Telco KPIs test results.

    This workflow aggregates test artifacts (node info, test results, BIOS validation,
    RDS comparison, ZTP timeline) into comprehensive Markdown reports. Reports can be
    published to Gitea repository when DEVELOPMENT_MODE is enabled.

    Workflow steps:
    1. Generate comprehensive report from all test artifacts

    Environment variables:
    - DEVELOPMENT_MODE: Enable Gitea publishing (default: false)
    - OUTPUT_FILENAME: Custom report filename (default: auto-generated)
    - TEST_FILTER: Filter tests to include (default: include all)

    Use cases:
    - Post-test report generation
    - CI pipeline result aggregation
    - Manual report generation from artifacts
