ref:
  as: telcov10n-performance
  from: src
  commands: telcov10n-performance-commands.sh
  grace_period: 4h
  timeout: 24h0m0s
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  credentials:
    - namespace: test-credentials
      name: bastion307
      mount_path: /var/run/bastion1
    - namespace: test-credentials
      name: telcov10n-ansible-group-all
      mount_path: /var/run/telcov10n
