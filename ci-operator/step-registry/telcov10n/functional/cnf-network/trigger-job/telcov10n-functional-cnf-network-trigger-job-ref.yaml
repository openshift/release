ref:
  as: telcov10n-functional-cnf-network-trigger-job
  from_image:
    namespace: telcov10n-ci
    name: eco-ci-cd
    tag: eco-ci-cd
  commands: telcov10n-functional-cnf-network-trigger-job-commands.sh
  timeout: 4h
  resources:
    requests:
      cpu: 100m
  credentials:
  - namespace: test-credentials
    name: telcov10n-prow-trigger-token
    mount_path: /var/prow-trigger-token
  env:
    - name: JOB_NAME
      default: ""
      documentation: The name of the prow job
    - name: JOB_TYPE
      default: ""
      documentation: The type of job
    - name: MULTISTAGE_PARAM_OVERRIDE_SKIP_CHAIN_TRIGGER
      default: "false"
      documentation: Set to 'true' to skip triggering the next job (JOB_NAME) in the version chain (for curl triggers)
