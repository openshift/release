ref:
  as: telcov10n-functional-dast-test-new
  from: cli
  commands: telcov10n-functional-dast-test-new-commands.sh
  timeout: 4h
  env:
    - name: OPERATOR_NAME
      documentation: Short name for the operator, used to label result directories and RapiDAST shortName.
    - name: OPERATOR_API_PATH
      documentation: Path suffix for the operator's OpenAPI endpoint. Concatenated with the internal API server base URL.
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
