ref:
  as: telcov10n-functional-dast-talm-prereq-crds
  from: cli
  commands: telcov10n-functional-dast-talm-prereq-crds-commands.sh
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
  documentation: |-
    Applies minimal stub CRDs for ACM/MCE API groups required by the TALM
    (topology-aware-lifecycle-manager) controller-manager to start successfully.
    TALM registers these types in its controller-runtime scheme at startup and
    crashes if the API groups are not discoverable in the cluster. This step
    must run before install-operators when TALM is included in the operator list.
