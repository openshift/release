ref:
  as: telcov10n-functional-dast-tests
  from: cli
  commands: telcov10n-functional-dast-tests-commands.sh
  timeout: 4h
  credentials:
  - namespace: test-credentials
    name: telco-dast-rapidast-gcs
    mount_path: /var/run/telco-dast/rapidast-gcs
  env:
    - name: OPERATORS_DAST
      default: |
        nrop openapi/v3/apis/nodetopology.openshift.io/v1
        ptp openapi/v3/apis/ptp.openshift.io/v1
        lca openapi/v3/apis/lca.openshift.io/v1
        talm openapi/v3/apis/ran.openshift.io/v1alpha1
      documentation: |
        Multiline list of operators to scan. Each line contains two space-separated fields:
        <short-name> <openapi-path>
        Example: nrop openapi/v3/apis/nodetopology.openshift.io/v1
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
