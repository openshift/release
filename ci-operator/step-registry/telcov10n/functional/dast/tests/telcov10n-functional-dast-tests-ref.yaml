ref:
  as: telcov10n-functional-dast-tests
  from: distributed-tracing-tests-runner-telco
  commands: telcov10n-functional-dast-tests-commands.sh
  timeout: 4h
  env:
  - name: DAST_TEST_REPO
    default: https://github.com/openshift-kni/eco-ci-cd.git
    documentation: Git repository URL to clone DAST test files from
  - name: DAST_TEST_BRANCH
    default: main
    documentation: Git branch to clone DAST test files from
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
