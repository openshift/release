ref:
  as: telcov10n-functional-cnf-compute-nto-cleanup-old-clusters
  from_image:
    namespace: telcov10n-ci
    name: eco-ci-cd
    tag: eco-ci-cd
  commands: telcov10n-functional-cnf-compute-nto-cleanup-old-clusters-commands.sh
  timeout: 1h0m0s
  resources:
    requests:
      cpu: 200m
  env:
