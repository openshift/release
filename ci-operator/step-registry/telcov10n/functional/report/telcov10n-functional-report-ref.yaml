ref:
  as: telcov10n-functional-report
  from_image:
    namespace: telcov10n-ci
    name: eco-ci-cd
    tag: eco-ci-cd  
  commands: telcov10n-functional-report-commands.sh
  documentation: |-
    Upload reports to polarion and report portal
  grace_period: 10s
  timeout: 4h0m0s
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  env:
  - name: REPORTER_TEMPLATE_NAME
    default: "Telco 5G RAN Regression build - 4.19 - automated"
    documentation: Template name for Report Portal
  - name: REPORTPORTAL_FILES
    default: ".reportportal_url_3node"
    documentation: Report Portal file to upload
  - name: UPLOAD_TO_REPORT_PORTAL
    default: "true"
    documentation: Whether to upload reports to Report Portal
  - name: REPORTER_LAUNCH_NAME
    default: "telco-ft-ran-standard"
    documentation: Report Portal launch name
  - name: CLUSTER_NAME
    default: "kni-qe-99"
    documentation: Hub cluster name
  - name: METRICS_LIST
    default: ""
    documentation: Comma-separated list of metrics to collect (e.g. spoke_general_ocp,acm,gitops)

