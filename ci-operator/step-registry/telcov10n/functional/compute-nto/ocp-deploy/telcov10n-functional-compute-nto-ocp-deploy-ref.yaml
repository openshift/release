ref:
  as: telcov10n-functional-compute-nto-ocp-deploy
  from_image:
    namespace: telcov10n-ci
    name: eco-ci-cd
    tag: eco-ci-cd
  commands: telcov10n-functional-compute-nto-ocp-deploy-commands.sh
  timeout: 3h0m0s
  resources:
    requests:
      cpu: 500m
  env:
  - name: VERSION 
    default: "4.18"
    documentation: OCP version to deploy
  - name: CLUSTER_NAME 
    default: ""
    documentation: BM Cluster name
  - name: OCP_VERSION_RELEASE_TYPE
    default: "stable"
    documentation: OCP release type (nightly, engineering-candidate, release-candidate, stable)
  - name: OCP_VERSION_RELEASE_AGE_MAX_DAYS
    default: "365"
    documentation: |-
      Maximum age in days for OCP release (default: 365 days)
  credentials:
  - namespace: test-credentials
    name: telcov10n-ansible-group-all
    mount_path: /var/group_variables/common/all
  - namespace: test-credentials
    name: telcov10n-ansible-group-bastions
    mount_path: /var/group_variables/common/bastions
  - namespace: test-credentials
    name: telcov10n-ansible-group-hypervisors
    mount_path: /var/group_variables/common/hypervisors
# cluster hlxcl15
  - namespace: test-credentials
    name: telcov10n-ansible-group-hlxcl15-masters
    mount_path: /var/group_variables/hlxcl15/masters
  - namespace: test-credentials
    name: telcov10n-ansible-group-hlxcl15-workers
    mount_path: /var/group_variables/hlxcl15/workers
  - namespace: test-credentials
    name: telcov10n-ansible-group-hlxcl15-nodes
    mount_path: /var/group_variables/hlxcl15/nodes
  - namespace: test-credentials
    name: telcov10n-ansible-hlxcl15-bastion
    mount_path: /var/host_variables/hlxcl15/bastion
  - namespace: test-credentials
    name: telcov10n-ansible-hlxcl15-master0
    mount_path: /var/host_variables/hlxcl15/master0
  - namespace: test-credentials
    name: telcov10n-ansible-hlxcl15-master1
    mount_path: /var/host_variables/hlxcl15/master1
  - namespace: test-credentials
    name: telcov10n-ansible-hlxcl15-master2
    mount_path: /var/host_variables/hlxcl15/master2
  - namespace: test-credentials
    name: telcov10n-ansible-hlxcl15-worker0
    mount_path: /var/host_variables/hlxcl15/worker0
  - namespace: test-credentials
    name: telcov10n-ansible-hlxcl15-worker1
    mount_path: /var/host_variables/hlxcl15/worker1
  - namespace: test-credentials
    name: telcov10n-ansible-hypervisors-ocp-edge91
    mount_path: /var/host_variables/hlxcl15/hypervisor
# cluster helix17
  - namespace: test-credentials
    name: telcov10n-ansible-group-helix17-masters
    mount_path: /var/group_variables/helix17/masters
  - namespace: test-credentials
    name: telcov10n-ansible-group-helix17-workers
    mount_path: /var/group_variables/helix17/workers
  - namespace: test-credentials
    name: telcov10n-ansible-group-helix17-nodes
    mount_path: /var/group_variables/helix17/nodes
  - namespace: test-credentials
    name: telcov10n-ansible-helix17-bastion
    mount_path: /var/host_variables/helix17/bastion
  - namespace: test-credentials
    name: telcov10n-ansible-helix17-master0
    mount_path: /var/host_variables/helix17/master0
  - namespace: test-credentials
    name: telcov10n-ansible-helix17-master1
    mount_path: /var/host_variables/helix17/master1
  - namespace: test-credentials
    name: telcov10n-ansible-helix17-master2
    mount_path: /var/host_variables/helix17/master2
  - namespace: test-credentials
    name: telcov10n-ansible-helix17-worker0
    mount_path: /var/host_variables/helix17/worker0
  - namespace: test-credentials
    name: telcov10n-ansible-helix17-worker1
    mount_path: /var/host_variables/helix17/worker1
  - namespace: test-credentials
    name: telcov10n-ansible-hypervisors-ocp-edge92
    mount_path: /var/host_variables/helix17/hypervisor