ref:
  as: telcov10n-functional-compute-nto-ocp-operators
  from_image:
    namespace: telcov10n-ci
    name: eco-ci-cd
    tag: eco-ci-cd
  commands: telcov10n-functional-compute-nto-ocp-operators-commands.sh
  timeout: 4h
  resources:
    requests:
      cpu: 100m
  env:
  - name: CLUSTER_NAME
    default: ""
    documentation: BM Cluster name
  - name: OPERATORS
    default: '[]'
    documentation: OCP operators to deploy (empty list for compute-nto by default)