ref:
  as: telcov10n-functional-cnf-ran-ibu-target-hub-deploy
  from_image:
    namespace: telcov10n-ci
    name: eco-ci-cd
    tag: eco-ci-cd
  commands: telcov10n-functional-cnf-ran-ibu-target-hub-deploy-commands.sh
  timeout: 4h
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  env:
    - name: TARGET_HUB_VERSION
      default: "4.18"
      documentation: OCP version to deploy on the target hub (the upgrade source version — the version spokes currently run and will upgrade FROM)
    - name: TARGET_CLUSTER_NAME
      default: "kni-qe-109"
      documentation: BM cluster name for the IBU target hub
    - name: DISABLE_INSIGHTS
      default: "false"
      documentation: Set to "true" to remove cloud.openshift.com from pull secret, disabling Insights and Telemetry
  credentials:
    - namespace: test-credentials
      name: telcov10n-ansible-group-all
      mount_path: /var/group_variables/common/all
    - namespace: test-credentials
      name: telcov10n-ansible-group-bastions
      mount_path: /var/group_variables/common/bastions
    - namespace: test-credentials
      name: telcov10n-ansible-group-hypervisors
      mount_path: /var/group_variables/common/hypervisors
    # kni-qe-109 (target hub)
    - namespace: test-credentials
      name: telcov10n-ansible-kni-qe-109-master0
      mount_path: /var/host_variables/kni-qe-109/master0
    - namespace: test-credentials
      name: telcov10n-ansible-kni-qe-109-bastion
      mount_path: /var/host_variables/kni-qe-109/bastion
    - namespace: test-credentials
      name: telcov10n-ansible-group-kni-qe-109-nodes
      mount_path: /var/group_variables/kni-qe-109/nodes
    - namespace: test-credentials
      name: telcov10n-ansible-group-kni-qe-109-masters
      mount_path: /var/group_variables/kni-qe-109/masters
    - namespace: test-credentials
      name: telcov10n-ansible-hypervisors-helix89
      mount_path: /var/host_variables/kni-qe-109/hypervisor
  documentation: |-
    Deploy IBU target hub (kni-qe-109).
    The target hub manages the spoke clusters that will be upgraded via IBU.
