ref:
  as: telcov10n-functional-cnf-ran-ibu-target-mirror-ocp
  from_image:
    namespace: telcov10n-ci
    name: eco-ci-cd
    tag: eco-ci-cd
  commands: telcov10n-functional-cnf-ran-ibu-target-mirror-ocp-commands.sh
  timeout: 4h
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  env:
    - name: TARGET_SPOKE_VERSION
      default: "4.18"
      documentation: OCP version to mirror to the target hub's disconnected registry (the spoke upgrade source version)
  documentation: |-
    Mirror OCP release images for TARGET_SPOKE_VERSION to the IBU target hub (kni-qe-109)
    disconnected registry.
