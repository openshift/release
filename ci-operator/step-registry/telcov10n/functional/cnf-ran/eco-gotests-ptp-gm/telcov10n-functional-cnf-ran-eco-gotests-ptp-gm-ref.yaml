ref:
  as: telcov10n-functional-cnf-ran-eco-gotests-ptp-gm
  from_image:
    namespace: telcov10n-ci
    name: eco-ci-cd
    tag: eco-ci-cd
  commands: telcov10n-functional-cnf-ran-eco-gotests-ptp-gm-commands.sh
  documentation: |-
    Run eco-gotests on PTP Grand Master spoke cluster
  grace_period: 10s
  timeout: 24h0m0s
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  env:
  - name: CLUSTER_NAME
    default: ""
    documentation: Hub cluster name
  - name: SPOKE_CLUSTER_LABEL_SELECTOR
    default: ""
    documentation: Label selector to identify the spoke PTP GM cluster (e.g. sites=helix48)
  - name: BMC_USER
    default: ""
    documentation: BMC username for node power management tests
  - name: BMC_PASSWORD
    default: ""
    documentation: BMC password for node power management tests
  - name: ECO_GOTESTS_LABELS
    default: "!no-container"
    documentation: Ginkgo label filter for eco-gotests (e.g. '!no-container')
  - name: PTP_CYCLE_CONFIGS
    default: ""
    documentation: JSON array of PTP cycle configurations, each with a name and list of policy YAML URLs
  - name: ECO_CNF_RAN_TEST_IMAGE
    default: "registry.access.redhat.com/ubi9/ubi:latest"
    documentation: |-
      Container image used as ECO_CNF_RAN_TEST_IMAGE in eco-gotests.
      Overrides the default quay.io/openshift-kni/cnf-tests:4.8 which may not be mirrored in all environments.
      In disconnected environments the playbook mirrors this image to the local registry and overrides this value automatically.
  - name: MIRROR_REGISTRY
    default: "disconnected.registry.local:5000"
    documentation: Internal disconnected registry hostname:port (e.g. disconnected.registry.local:5000). When set, triggers mirroring of PTP images to this registry and passes ECO_CNF_RAN_PTP_EVENT_CONSUMER_IMAGE to eco-gotests.
  credentials:
  - namespace: test-credentials
    name: telcov10n-ansible-group-all
    mount_path: /var/group_variables/common/all
  - namespace: test-credentials
    name: telcov10n-ansible-group-bastions
    mount_path: /var/group_variables/common/bastions
  - namespace: test-credentials
    name: telcov10n-ansible-kni-qe-111-bastion
    mount_path: /var/host_variables/kni-qe-111/bastion
