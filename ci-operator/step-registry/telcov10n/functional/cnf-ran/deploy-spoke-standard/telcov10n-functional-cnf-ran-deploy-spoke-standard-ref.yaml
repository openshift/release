ref:
  as: telcov10n-functional-cnf-ran-deploy-spoke-standard
  from_image:
    namespace: telcov10n-ci
    name: eco-ci-cd
    tag: eco-ci-cd
  commands: telcov10n-functional-cnf-ran-deploy-spoke-standard-commands.sh
  documentation: |-
    Deploy spoke cluster via ZTP for CNF RAN (kni-qe-26)
  timeout: 5h
  resources:
    requests:
      cpu: 100m
  env:
    - name: VERSION
      default: "4.19"
      documentation: OCP version; must match ztp-site-configs-ci path siteconfigs/<VERSION>/<SPOKE_CLUSTER>/
    - name: SPOKE_CLUSTER
      default: "kni-qe-26"
      documentation: Spoke standard cluster name
    - name: ZTP_GIT_REPO
      default: "https://gitlab.cee.redhat.com/telcov10n/ztp-site-configs-ci.git"
      documentation: ZTP site configs repo
    - name: ZTP_GIT_BRANCH
      default: "standard"
      documentation: Branch to use
    - name: BMC_SECRET_NAME
      default: "kni-qe-26-bmc-secret"
      documentation: BMC secret name
    - name: MASTERS_SECRET_NAME
      default: "kni-qe-26-bmc-secret"
      documentation: Masters secret name
  credentials:
    - namespace: test-credentials
      name: telcov10n-ansible-group-all
      mount_path: /var/group_variables/common/all
    - namespace: test-credentials
      name: telcov10n-ansible-group-bastions
      mount_path: /var/group_variables/common/bastions
    - namespace: test-credentials
      name: telcov10n-ansible-kni-qe-99-bastion
      mount_path: /var/host_variables/kni-qe-99/bastion
    - namespace: test-credentials
      name: telcov10n-ansible-group-kni-qe-26-masters
      mount_path: /var/group_variables/kni-qe-26/masters
    - namespace: test-credentials
      name: telcov10n-ansible-group-kni-qe-26-workers
      mount_path: /var/group_variables/kni-qe-26/workers
