ref:
  as: telcov10n-functional-cnf-ran-cnf-tests-sno-worker
  from_image:
    namespace: telcov10n-ci
    name: eco-ci-cd
    tag: eco-ci-cd
  commands: telcov10n-functional-cnf-ran-cnf-tests-sno-worker-commands.sh
  documentation: |-
    Run cnf-tests on a spoke SNO cluster after day-2 worker expansion.
    Uses deploy-run-cnf-tests-script.yaml to prepare and execute cnf-tests
    against the spoke cluster.
  grace_period: 10s
  timeout: 24h0m0s
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  env:
  - name: CLUSTER_NAME
    default: ""
    documentation: Hub cluster name (used to derive hub clusterconfigs path)
  - name: SPOKE_CLUSTER
    default: ""
    documentation: "Spoke SNO cluster name (array format, e.g. \"['kni-qe-107']\")"
  - name: DISCONNECTED
    default: "false"
    documentation: Whether the environment is disconnected/airgapped (enables mirror registry)
  - name: CNF_TESTS_FEATURES
    default: "reboot"
    documentation: Space-separated list of cnf-test features to run (e.g. reboot)
  - name: CNF_TESTS_LABELS
    default: ""
    documentation: Label filter for cnf-tests (passed to the features labels parameter)
  credentials:
  - namespace: test-credentials
    name: telcov10n-ansible-group-all
    mount_path: /var/group_variables/common/all
