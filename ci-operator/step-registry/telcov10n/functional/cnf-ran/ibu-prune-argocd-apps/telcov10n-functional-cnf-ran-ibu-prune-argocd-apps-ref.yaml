ref:
  as: telcov10n-functional-cnf-ran-ibu-prune-argocd-apps
  from_image:
    namespace: telcov10n-ci
    name: eco-ci-cd
    tag: eco-ci-cd
  commands: telcov10n-functional-cnf-ran-ibu-prune-argocd-apps-commands.sh
  timeout: 30m
  resources:
    requests:
      cpu: 100m
  env:
    - name: CLUSTER_NAME
      default: "kni-qe-108"
      documentation: Seed hub cluster name (used to resolve kubeconfig path on the bastion)
    - name: SPOKE_CLUSTER
      default: "ibu-seed"
      documentation: Seed spoke cluster (managed cluster) name to remove
  documentation: |-
    Patch ArgoCD apps (clusters, policies) to remove finalizers, delete them,
    and remove the seed ManagedCluster from the seed hub (kni-qe-108).
    Runs against the seed hub inventory (flat SHARED_DIR files).
