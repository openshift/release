ref:
  as: telcov10n-functional-cnf-ran-ibu-restore-seed-inventory
  from_image:
    namespace: telcov10n-ci
    name: eco-ci-cd
    tag: eco-ci-cd
  commands: telcov10n-functional-cnf-ran-ibu-restore-seed-inventory-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 100Mi
  documentation: |-
    Restores seed hub (kni-qe-108) flat inventory files in SHARED_DIR.
    hub-deploy saves seed-{bastion,hypervisor,master0,all,bastions,hypervisors,nodes,masters}
    alongside the flat copies. This step copies them back to the flat names, which
    ibu-target-hub-deploy overwrote with kni-qe-109 data. Must run immediately before
    any step that reads flat inventory from SHARED_DIR and must operate on the seed hub.
