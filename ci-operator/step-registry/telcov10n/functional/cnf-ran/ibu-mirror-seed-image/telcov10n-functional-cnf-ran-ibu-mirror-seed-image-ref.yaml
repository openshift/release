ref:
  as: telcov10n-functional-cnf-ran-ibu-mirror-seed-image
  from_image:
    namespace: telcov10n-ci
    name: eco-ci-cd
    tag: eco-ci-cd
  commands: telcov10n-functional-cnf-ran-ibu-mirror-seed-image-commands.sh
  documentation: |-
    Mirror the IBU seed image from the seed bastion's local registry to the
    target bastion's disconnected registry, making it available for eco-gotests IBU upgrade.
  timeout: 60m
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  env:
  - name: TARGET_REGISTRY_HOST
    default: "10.6.184.4"
    documentation: IP or hostname of the target bastion's disconnected registry
