ref:
  as: telcov10n-functional-cnf-ran-deploy-spoke-sno
  from_image:
    namespace: telcov10n-ci
    name: eco-ci-cd
    tag: eco-ci-cd
  commands: telcov10n-functional-cnf-ran-deploy-spoke-sno-commands.sh
  documentation: |-
    Deploy sno spoke cluster via ZTP for CNF RAN
  timeout: 5h
  resources:
    requests:
      cpu: 100m
  env:
    - name: VERSION
      default: "4.19"
      documentation: OCP version; must match ztp-site-configs-ci path siteconfigs/<VERSION>/<SPOKE_CLUSTER>/
    - name: CLUSTER_NAME
      default: ""
      documentation: Hub cluster name
    - name: SPOKE_CLUSTER
      default: ""
      documentation: Spoke compact cluster name
    - name: ZTP_GIT_REPO
      default: "https://gitlab.cee.redhat.com/telcov10n/ztp-site-configs-ci.git"
      documentation: ZTP site configs repo 
    - name: ZTP_GIT_BRANCH
      default: "main"
      documentation: Branch to use 
