workflow:
  as: telcov10n-functional-cnf-ran-ibu
  documentation: |-
    IBU (Image Based Upgrade) workflow for CNF RAN testing.
    Pre: deploy seed hub (kni-qe-108) and target hub (kni-qe-109) at VERSION, install operators on both, 
         mirrors operators and OCP release images to target bastion's disconnected registry, 
         deploy MinIO on target bastion, deploy spoke master VMs for both seed and target hubs.
    Test: run IBU upgrade and post-upgrade eco-gotests, report results.
    Post: notify Slack, trigger next job in chain.
  steps:
    pre:
    # Seed hub setup — kni-qe-108 deployed at VERSION
    - ref: telcov10n-functional-cnf-ran-hub-deploy
    - ref: telcov10n-functional-cnf-ran-hub-config
    - ref: telcov10n-functional-cnf-ran-mirror-spoke-operators
    # Target hub setup — kni-qe-109 deployed at VERSION
    - ref: telcov10n-functional-cnf-ran-ibu-target-hub-deploy
    - ref: telcov10n-functional-cnf-ran-ibu-target-hub-config
    - ref: telcov10n-functional-cnf-ran-ibu-target-mirror-spoke-operators
    - ref: telcov10n-functional-cnf-ran-ibu-target-mirror-ocp
    - ref: telcov10n-functional-cnf-ran-ibu-target-deploy-minio
    - ref: telcov10n-functional-cnf-ran-ibu-deploy-spoke-master-vms
    post: []

