ref:
  as: telcov10n-functional-cnf-ran-eco-gotests-ptp-sno
  from_image:
    namespace: telcov10n-ci
    name: eco-ci-cd
    tag: eco-ci-cd
  commands: telcov10n-functional-cnf-ran-eco-gotests-ptp-sno-commands.sh
  grace_period: 10s
  timeout: 24h0m0s
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  env:
  - name: MIRROR_REGISTRY
    default: ""
    documentation: Disconnected registry URL (host:port) used to pull the eco-gotests image on the bastion
  - name: CLUSTER_NAME
    default: ""
    documentation: Hub cluster name
  - name: SPOKE_CLUSTER
    default: ""
    documentation: Spoke SNO cluster name as JSON array e.g. ["helix56"]
  - name: SPOKE_CLUSTER_NAME
    default: ""
    documentation: Spoke SNO cluster name as plain string e.g. helix56
  - name: PTP_CONFIGS
    default: ""
    documentation: |
      Single-line JSON array passed to deploy-run-eco-gotests-ptp.yaml. Must have no newlines.
      Each entry has a name (label) and a urls list (one or more files to oc apply).
      Example: '[{"name":"oc-2-port","urls":["https://...yaml"]},{"name":"t-bc","urls":["https://...Rx.yaml","https://...Tx.yaml"]}]'
  credentials:
  - namespace: test-credentials
    name: telcov10n-ansible-group-all
    mount_path: /var/group_variables/common/all
