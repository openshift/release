ref:
  as: telcov10n-functional-cnf-ran-ibu-report
  from_image:
    namespace: telcov10n-ci
    name: eco-ci-cd
    tag: eco-ci-cd
  commands: telcov10n-functional-cnf-ran-ibu-report-commands.sh
  documentation: |-
    Collect IBU lane metrics and upload reports to Polarion and Report Portal.
    Targets the IBU target hub (kni-qe-109). Identical logic to the standard
    report step but with credentials and defaults configured for the IBU lane.
  grace_period: 10s
  timeout: 4h0m0s
  resources:
    requests:
      cpu: 100m
      memory: 200Mi

  env:
  - name: REPORTER_TEMPLATE_NAME
    default: "Telco 5G RAN IBU 4_20 - Telco 5G RAN IBU"
    documentation: Template name for Report Portal
  - name: REPORTPORTAL_FILES
    default: ".reportportal_url_ibu"
    documentation: Report Portal file to upload
  - name: UPLOAD_TO_REPORT_PORTAL
    default: "true"
    documentation: Whether to upload reports to Report Portal
  - name: REPORTS_PORTAL_ATTRIBUTES_ENV
    default: ""
    documentation: Additional Report Portal attributes in key:value;key:value format, appended to metrics-based attributes
  - name: REPORTER_LAUNCH_NAME
    default: "telco-ft-ran-ibu"
    documentation: Report Portal launch name and ci_lane identifier for metrics
  - name: TARGET_CLUSTER_NAME
    default: "kni-qe-109"
    documentation: IBU target hub cluster name (must match mounted credential path)
  - name: SPOKE_CLUSTER
    default: "ibu-target"
    documentation: Target spoke cluster name
  - name: RAN_METRICS_LIST
    default: "hub_general_ocp,spoke_general_ocp,acm,talm"
    documentation: Comma-separated list of metrics to collect (e.g. hub_general_ocp,spoke_general_ocp,acm,talm)
  credentials:
  - namespace: test-credentials
    name: telcov10n-ansible-group-all
    mount_path: /var/group_variables/common/all
  - namespace: test-credentials
    name: telcov10n-ansible-group-bastions
    mount_path: /var/group_variables/common/bastions
  # kni-qe-109 (IBU target hub)
  - namespace: test-credentials
    name: telcov10n-ansible-kni-qe-109-bastion
    mount_path: /var/host_variables/kni-qe-109/bastion
