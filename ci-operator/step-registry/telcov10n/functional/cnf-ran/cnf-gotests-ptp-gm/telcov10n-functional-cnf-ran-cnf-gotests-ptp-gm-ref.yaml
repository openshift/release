ref:
  as: telcov10n-functional-cnf-ran-cnf-gotests-ptp-gm
  from_image:
    namespace: telcov10n-ci
    name: eco-ci-cd
    tag: eco-ci-cd
  commands: telcov10n-functional-cnf-ran-cnf-gotests-ptp-gm-commands.sh
  documentation: |-
    Run cnf-gotests downstream tests on PTP Grand Master spoke cluster (helix48)
  grace_period: 10s
  timeout: 24h0m0s
  resources:
    requests:
      cpu: 100m
      memory: 200Mi

  env:
  - name: SPOKE_CLUSTER
    default: "helix48"
    documentation: Spoke PTP Grand Master cluster name
  - name: HUB_CLUSTER
    default: "kni-qe-111"
    documentation: Hub cluster name
  - name: CNF_GOTESTS_FEATURES
    default: "reboot workloadpartitioning"
    documentation: Space-separated list of cnf-gotests features to run
  - name: MIRROR_REGISTRY
    default: "disconnected.registry.local:5000"
    documentation: Disconnected mirror registry hostname (e.g. disconnected.registry.local:5000). When set, workload images are mirrored here before tests run.
  - name: DOWNSTREAM_TEST_REPO
    default: "https://gitlab.cee.redhat.com/cnf/cnf-gotests/"
    documentation: Git URL of the cnf-gotests downstream test repository
  - name: BMC_USER
    default: ""
    documentation: BMC username for node power management / power cycle tests
  - name: BMC_PASSWORD
    default: ""
    documentation: BMC password for node power management / power cycle tests
  - name: BMC_HOSTS
    default: ""
    documentation: BMC host address (IP or hostname) for node power cycle tests
  credentials:
  - namespace: test-credentials
    name: telcov10n-ansible-group-all
    mount_path: /var/group_variables/common/all
  - namespace: test-credentials
    name: telcov10n-ansible-group-bastions
    mount_path: /var/group_variables/common/bastions
  - namespace: test-credentials
    name: telcov10n-ansible-group-hypervisors
    mount_path: /var/group_variables/common/hypervisors
  - namespace: test-credentials
    name: telcov10n-ansible-group-kni-qe-111-nodes
    mount_path: /var/group_variables/kni-qe-111/nodes
  - namespace: test-credentials
    name: telcov10n-ansible-group-kni-qe-111-masters
    mount_path: /var/group_variables/kni-qe-111/masters
  - namespace: test-credentials
    name: telcov10n-ansible-kni-qe-111-bastion
    mount_path: /var/host_variables/kni-qe-111/bastion
  - namespace: test-credentials
    name: telcov10n-ansible-kni-qe-111-master0
    mount_path: /var/host_variables/kni-qe-111/master0
  - namespace: test-credentials
    name: telcov10n-ansible-hypervisors-hv16
    mount_path: /var/host_variables/kni-qe-111/hypervisor
