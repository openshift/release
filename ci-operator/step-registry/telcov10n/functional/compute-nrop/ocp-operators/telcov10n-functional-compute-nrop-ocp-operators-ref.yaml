ref:
  as: telcov10n-functional-compute-nrop-ocp-operators
  from_image:
    namespace: telcov10n-ci
    name: eco-ci-cd
    tag: eco-ci-cd
  commands: telcov10n-functional-compute-nrop-ocp-operators-commands.sh
  timeout: 2h
  resources:
    requests:
      cpu: 500m
  env:
  - name: VERSION 
    default: ""
    documentation: OCP version to deploy
  - name: CLUSTER_NAME 
    default: ""
    documentation: BM Cluster name
  - name: OPERATORS 
    default: ""
    documentation: OCP operators to deploy
  - name: DISCONNECTED 
    default: "false"
    documentation: Install operators in disconnected mode
  - name: TEST_ENV
    default: "prod"
    documentation: Env to deploy operators
