ref:
  as: telcov10n-functional-compute-nrop-nrop-gather-pod
  from_image:
    namespace: telcov10n-ci
    name: eco-ci-cd
    tag: eco-ci-cd
  commands: telcov10n-functional-compute-nrop-nrop-gather-pod-commands.sh
  timeout: 2h
  resources:
    requests:
      cpu: 500m
  env:
  - name: CLUSTER_NAME
    default: ""
    documentation: BM Cluster name
  - name: TEST_ENV
    default: "prod"
    documentation: Test environment to run tests in
  - name: SCOPE
    default: "pod"
    documentation: Scope of the tests to run
