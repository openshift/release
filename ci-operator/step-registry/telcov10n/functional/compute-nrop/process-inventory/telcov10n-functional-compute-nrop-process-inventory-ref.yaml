ref:
  as: telcov10n-functional-compute-nrop-process-inventory
  from_image:
    namespace: telcov10n-ci
    name: eco-ci-cd
    tag: eco-ci-cd
  commands: telcov10n-functional-compute-nrop-process-inventory-commands.sh
  resources:
    requests:
      cpu: 100m
  env:
  - name: CLUSTER_NAME 
    default: ""
    documentation: BM Cluster name for OCP deployment
  credentials:
  - namespace: test-credentials
    name: telcov10n-ansible-group-all
    mount_path: /var/group_variables/common/all
  - namespace: test-credentials
    name: telcov10n-ansible-group-bastions
    mount_path: /var/group_variables/common/bastions
  - namespace: test-credentials
    name: telcov10n-ansible-group-hypervisors
    mount_path: /var/group_variables/common/hypervisors

  - namespace: test-credentials
    name: telcov10n-ansible-group-helix47-masters
    mount_path: /var/group_variables/helix47/masters
  - namespace: test-credentials
    name: telcov10n-ansible-group-helix47-workers
    mount_path: /var/group_variables/helix47/workers
  - namespace: test-credentials
    name: telcov10n-ansible-group-helix47-nodes
    mount_path: /var/group_variables/helix47/nodes
  - namespace: test-credentials
    name: telcov10n-ansible-helix47-bastion
    mount_path: /var/host_variables/helix47/bastion
  - namespace: test-credentials
    name: telcov10n-ansible-helix47-master0
    mount_path: /var/host_variables/helix47/master0
  - namespace: test-credentials
    name: telcov10n-ansible-helix47-master1
    mount_path: /var/host_variables/helix47/master1
  - namespace: test-credentials
    name: telcov10n-ansible-helix47-master2
    mount_path: /var/host_variables/helix47/master2
  - namespace: test-credentials
    name: telcov10n-ansible-helix47-worker0
    mount_path: /var/host_variables/helix47/worker0
  - namespace: test-credentials
    name: telcov10n-ansible-helix47-worker1
    mount_path: /var/host_variables/helix47/worker1
  - namespace: test-credentials
    name: telcov10n-ansible-hypervisors-ocp-helix47
    mount_path: /var/host_variables/helix47/hypervisor