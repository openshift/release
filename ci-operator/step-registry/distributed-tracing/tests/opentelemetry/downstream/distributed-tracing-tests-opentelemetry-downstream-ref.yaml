ref:
  as: distributed-tracing-tests-opentelemetry-downstream
  from: obs-tests-runner
  timeout: 3h0m0s
  commands: distributed-tracing-tests-opentelemetry-downstream-commands.sh
  grace_period: 2m0s
  resources:
    requests:
      cpu: "1"
      memory: 3Gi
  env:
  - name: SKIP_TESTS
    default: ""
    documentation: "Space seperated test cases to skip from the test run. Example tests/e2e/smoke-targetallocator tests/e2e/prometheus-config-validation"
  - name: MULTISTAGE_PARAM_OVERRIDE_OTEL_TESTS_BRANCH
    default: "rhosdt-3.10"
    documentation: |-
      The branch to checkout from os-observability/opentelemetry-operator for running downstream tests.
      This parameter must be set either in the job config steps.env or via Gangway API pod_spec_options.
      The job will fail if left empty.
  documentation: |-
    The distributed-tracing-tests-opentelemetry-downstream step executes the OpenTelemetry Operator Downstream tests.
