ref:
  as: rosa-pool-health
  from: rosa-aws-cli
  grace_period: 5m
  commands: rosa-pool-health-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 300Mi
  timeout: 30m0s
  credentials:
  - namespace: test-credentials
    name: rosa-pool-manager
    mount_path: /etc/rosa-pool-manager
  env:
  - name: POOL_NAMESPACE
    default: "rosa-pool"
    documentation: Namespace on the pool host cluster where pool ConfigMaps live.
  - name: OCM_LOGIN_ENV
    default: "staging"
    documentation: OCM environment for cluster health checks.
  - name: STALE_LEASE_HOURS
    default: "4"
    documentation: Hours after which an in-use lease is considered stale and force-released.
  documentation: |-
    Periodic health check for the ROSA cluster standby pool.

    For each pool cluster, checks OCM cluster status, API server
    reachability via OCM kubeconfig, and node health. Detects stale leases
    (clusters stuck in-use beyond STALE_LEASE_HOURS) and force-releases
    them. Marks unhealthy clusters as status=error.

    Run as a periodic Prow job (e.g. every 30 minutes) to keep the
    pool healthy and recover from job crashes.
