ref:
  as: rosa-cluster-wait-ready-operators
  from: rosa-aws-cli
  grace_period: 10m
  commands: rosa-cluster-wait-ready-operators-commands.sh
  env:
  - name: HOSTED_CP
    default: "false"
    documentation: Enable the use of hosted control planes (HyperShift).
  resources:
    requests:
      cpu: 100m
      memory: 100Mi
  documentation: |-
    Wait for all cluster operators to finish progressing, verify they are Available and not Degraded
    in a rosa cluster.
