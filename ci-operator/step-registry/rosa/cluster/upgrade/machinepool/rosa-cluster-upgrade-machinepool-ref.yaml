ref:
  as: rosa-cluster-upgrade-machinepool
  from: rosa-aws-cli
  grace_period: 10m
  commands: rosa-cluster-upgrade-machinepool-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 300Mi
  timeout: 2h0m0s
  env:
  - name: OCM_LOGIN_ENV
    default: "staging"
    documentation: The environment for rosa login. The supported values are [production, staging, integration].
  - name: NP_UPGRADE_TIMEOUT
    default: "7200"
    documentation: Set to number of seconds for the nodepool upgrade to timeout if it's not ready.
  - name: UPGRADED_TO_VERSION
    default: ""
    documentation: The openshift version to upgrade machinepools to. If not specified, machinepools are upgraded to the current control plane version.
  documentation: |-
    Using rosa cli to upgrade the rosa HCP machinepools to the specified openshift version.
