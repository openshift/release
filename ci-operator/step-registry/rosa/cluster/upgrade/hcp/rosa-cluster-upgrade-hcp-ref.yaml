ref:
  as: rosa-cluster-upgrade-hcp
  from: rosa-aws-cli
  grace_period: 10m
  commands: rosa-cluster-upgrade-hcp-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 300Mi
  timeout: 10h0m0s
  env:
  - name: OCM_LOGIN_ENV
    default: "staging"
    documentation: The environment for rosa login. The supported values are [production, staging, integration].
  - name: CP_UPGRADE_TIMEOUT
    default: "14400"
    documentation: Set to number of seconds for the control plane upgrade to timeout if it's not ready.
  - name: UPGRADED_TO_VERSION
    default: ""
    documentation: upgrade ROSA HCP control plane to the specified version. Like 4.18
  - name: HOLD_TIME_BEFORE_UPGRADE
    default: ""
    documentation: Set to number of seconds before cluster upgrade action
  - name: Z_STREAM_UPGRADE
    default: "false"
    documentation: When set to "true", performs a Z stream upgrade (latest patch within the current Y stream). When "false" (default), performs a Y stream upgrade to UPGRADED_TO_VERSION.
  - name: UPGRADE_CHANNEL
    default: ""
    documentation: The target upgrade channel (e.g., candidate-4.22, stable-4.22). When set, the cluster channel is changed to this value before performing the upgrade. If empty and Z_STREAM_UPGRADE is false, auto-derived as UPGRADE_CHANNEL_PREFIX-{next Y-stream}.
  - name: UPGRADE_CHANNEL_PREFIX
    default: "candidate"
    documentation: Prefix used to auto-derive UPGRADE_CHANNEL when it is not explicitly set (e.g., 'candidate' produces 'candidate-4.19').
  documentation: |-
    Using rosa cli to upgrade the rosa HCP control plane to the specified openshift version.
