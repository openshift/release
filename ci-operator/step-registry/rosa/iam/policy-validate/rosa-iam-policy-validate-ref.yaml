ref:
  as: rosa-iam-policy-validate
  from: src
  grace_period: 10m
  commands: rosa-iam-policy-validate-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  env:
  - name: LEASED_RESOURCE
    default: "us-east-1"
    documentation: AWS region to use for IAM API calls.
  - name: RELEASE_VERSION
    default: "4.17.0"
    documentation: OCP release version to validate managed policies against.
  documentation: |-
    This step validates that ROSA managed IAM policies grant all permissions
    required by OCP components. It uses osdctl iampermissions simulate to
    auto-fetch managed policies from managed-cluster-config for the given
    release version, extract CredentialsRequests from the release image, and
    run SimulateCustomPolicy for each matched policy/CR pair.

    The step:
    1. Fetches managed STS policies from managed-cluster-config for the version
    2. Extracts CredentialsRequests from the OCP release image
    3. Matches policies to CRs using the naming convention
    4. Runs SimulateCustomPolicy for each action/context combination
    5. Produces JUnit XML results in ${ARTIFACT_DIR}/iam-policy-validation/

    Requires AWS credentials with iam:SimulateCustomPolicy permissions.
