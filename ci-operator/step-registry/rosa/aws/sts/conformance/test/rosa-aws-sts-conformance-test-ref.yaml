ref:
  as: rosa-aws-sts-conformance-test
  from: tests
  grace_period: 10m
  commands: rosa-aws-sts-conformance-test-commands.sh
  timeout: 14400s
  env:
  - name: TEST_ARGS
    default: ""
    documentation: |-
      Additional arguments to be passed to 'openshift-test'
  - name: TEST_SUITE
    default: openshift/conformance/parallel
    documentation: The test suite to run.
  - name: TEST_SKIPS
    default: ""
    documentation: |
      Regular expression (POSIX basic regular expression) of tests to skip.
  - name: SKIP_MONITOR_TEST
    default: ""
    documentation: |-
      If non-empty, ignores job failure caused by a MonitorTest failure.
      All conformance test cases must still pass.
  resources:
    requests:
      cpu: "3"
      memory: 600Mi
    limits:
      memory: 10Gi
  documentation: |-
    Runs openshift-tests conformance for ROSA Classic STS clusters with
    optional MonitorTest failure override via SKIP_MONITOR_TEST.
