ref:
  as: rosa-synthetics-e2e-setup
  from: src
  grace_period: 5m
  commands: rosa-synthetics-e2e-setup-commands.sh
  credentials:
  - namespace: ci
    name: cluster-secrets-rosa-e2e-01
    mount_path: /usr/local/rosa-e2e-credentials
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  timeout: 15m0s
  env:
  - name: OCM_LOGIN_ENV
    default: production
    documentation: OCM environment to login to.
  - name: RHOBS_CLUSTER_ID
    default: 2j86vnk0b06v43684hhsdkmkt7aln933
    documentation: OCM cluster ID for the RHOBS integration cell (rhobsi01uw2).
  documentation: |-
    Creates an ephemeral namespace on the RHOBS integration cell
    and writes the namespace name and API URL to SHARED_DIR for
    downstream steps. Uses OCM backplane for cluster access.
    The test agent uses the real synthetics-api already running
    on the cell.
