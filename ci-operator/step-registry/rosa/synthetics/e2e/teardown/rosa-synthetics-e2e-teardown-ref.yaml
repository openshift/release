ref:
  as: rosa-synthetics-e2e-teardown
  from: src
  best_effort: true
  grace_period: 5m
  commands: rosa-synthetics-e2e-teardown-commands.sh
  credentials:
  - namespace: ci
    name: cluster-secrets-rosa-e2e-01
    mount_path: /usr/local/rosa-e2e-credentials
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  timeout: 10m0s
  env:
  - name: OCM_LOGIN_ENV
    default: production
    documentation: OCM environment to login to.
  - name: RHOBS_CLUSTER_ID
    default: 2j86vnk0b06v43684hhsdkmkt7aln933
    documentation: OCM cluster ID for the RHOBS integration cell (rhobsi01uw2).
  documentation: |-
    Deletes the ephemeral namespace created by the setup step. Runs as
    best_effort so cleanup happens even when earlier steps fail.
