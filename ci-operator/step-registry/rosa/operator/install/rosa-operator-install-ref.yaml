ref:
  as: rosa-operator-install
  from: operator-e2e
  grace_period: 5m
  commands: rosa-operator-install-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 300Mi
  timeout: 15m0s
  env:
  - name: OPERATOR_NAME
    default: ""
    documentation: Short name of the operator (e.g. aws-vpce-operator).
  - name: OPERATOR_PKO_IMAGE
    default: ""
    documentation: Full pullspec of the PKO package image.
  - name: OPERATOR_IMAGE
    default: ""
    documentation: Full pullspec of the operator image.
  - name: OPERATOR_NAMESPACE
    default: ""
    documentation: Namespace for the operator. Defaults to openshift-<OPERATOR_NAME>.
  - name: OPERATOR_CRD_DIR
    default: ""
    documentation: Path to directory containing CRD manifests to pre-apply. Optional.
  documentation: |-
    Installs an operator via PKO ClusterPackage on the target cluster.
    Creates the namespace, optionally applies CRDs, creates the ClusterPackage
    CR, and waits for the operator deployment to be available.
