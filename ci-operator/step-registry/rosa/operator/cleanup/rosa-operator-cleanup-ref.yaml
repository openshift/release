ref:
  as: rosa-operator-cleanup
  from: rosa-aws-cli
  best_effort: true
  grace_period: 2m
  commands: rosa-operator-cleanup-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 300Mi
  timeout: 5m0s
  documentation: |-
    Removes the test operator ClusterPackage and namespace created by
    rosa-operator-install. Reads the ClusterPackage name and namespace
    from SHARED_DIR files written by the install step. Safe to run as
    best_effort in post since cleanup failure should not fail the job.
