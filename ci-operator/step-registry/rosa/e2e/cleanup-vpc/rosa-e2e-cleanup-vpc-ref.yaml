ref:
  as: rosa-e2e-cleanup-vpc
  from: rosa-aws-cli
  grace_period: 5m
  commands: rosa-e2e-cleanup-vpc-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 300Mi
  documentation: |-
    Cleans up leftover AWS resources (ENIs, security groups, load balancers)
    in the VPC before CloudFormation stack deletion. Works around the AVO
    cleanup race condition where VPC endpoints hold references that prevent
    stack deletion.
