workflow:
  as: rosa-e2e-capa
  steps:
    pre:
      - chain: ipi-conf-aws
      - chain: ipi-install
    test:
      - ref: rosa-e2e-capa
    post:
      - chain: ipi-deprovision
        best_effort: true
  documentation: |-
    Provisions an OCP cluster on AWS via IPI, runs the stolostron/rosa-hcp-e2e-test suite.
    The cluster is deprovisioned after testing completes.
