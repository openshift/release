ref:
  as: aws-deprovision-secureboot
  from_image:
    namespace: ocp
    name: "4.18"
    tag: upi-installer
  commands: aws-deprovision-secureboot-commands.sh
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
  best_effort: true
  timeout: 10m
  documentation: |-
    This step cleans up the custom Secure Boot AMI and copied snapshot
    created by the ipi-conf-aws-secureboot step. It is a no-op if no
    Secure Boot resources were created.
