ref:
  as: aws-provision-iam-user
  from_image:
    namespace: ocp
    name: "4.14"
    tag: upi-installer
  cli: latest
  grace_period: 10m
  commands: aws-provision-iam-user-commands.sh
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
  env:
    - name: SKIP_CREATE_POLICY
      default: ""
      documentation: |-
        Set to "yes" to skip the policy creation. It requires the variable POLICY_ARN to be set.
    - name: POLICY_ARN
      default: ""
      documentation: |-
        Defines the Policy ARN when the SKIP_CREATE_POLICY is set to "yes", preventing the
        step to create an Policy, using a custom provided by the job level.
  documentation: |-
    Create AWS IAM user with the permissions from:
    * aws-permissions-policy-creds.json for installer
    * aws-permissions-policy-creds-ccoctl.json for ccoctl tool
