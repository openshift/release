ref:
  as: aws-provision-bastionhost
  from_image:
    namespace: ocp
    name: "4.12"
    tag: upi-installer
  grace_period: 10m
  commands: aws-provision-bastionhost-commands.sh
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
  credentials:
  - namespace: test-credentials
    name: qe-proxy-creds
    mount_path: /var/run/vault/proxy
  - namespace: test-credentials
    name: openshift-custom-mirror-registry
    mount_path: /var/run/vault/mirror-registry
  env:
  - name: BASTION_INSTANCE_TYPE
    default: ""
    documentation: |-
      Override the default EC2 instance type for the bastion host.
      When set, this value is used directly, bypassing the per-region
      defaults (t2.medium, t3a.medium for us-gov-east-1, m6id.large
      for eusc-de-east-1). Use for workloads that need more resources,
      e.g. m6i.xlarge for OMR v2 which requires at least 8 GB RAM.
  - name: BASTION_HOST_AMI
    default: ""
    documentation: |-
      BYO AMI for bastion host
  - name: CUSTOM_PROXY_CREDENTIAL
    default: ""
    documentation: Use the customized proxy credential or not, set to 'true' to enable it
  - name: REGION
    default: ""
    documentation: Use a specific AWS region, overriding the LEASED_RESOURCE environment variable in the cluster_profile.
  - name: IP_FAMILY
    default: ""
    documentation: enable ipv6 stack or not. "" (default) means IPv4 only;
      "DualStackIPv6Primary" or "DualStackIPv4Primary" means enabling IPv6.
  documentation: |-
    Create a bastion host on AWS for proxy and mirror registry.
