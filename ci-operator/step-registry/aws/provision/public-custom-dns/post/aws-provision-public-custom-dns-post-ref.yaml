ref:
  as: aws-provision-public-custom-dns-post
  from_image:
    namespace: ocp
    name: "4.18"
    tag: upi-installer
  grace_period: 10m
  commands: aws-provision-public-custom-dns-post-commands.sh
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
  env:
  - name: BASE_DOMAIN
    default: ""
    documentation: |-
      The base domain.
  - name: GCP_NEW_PUBLIC_DNS_RECORD_WAITING_TIME
    default: "1800"
    documentation: Wait for dns record propagation.
  documentation: >-
    As a post-installation step, add public DNS information to ${SHARED_DIR}/public_custom_dns.json
    User can create external DNS based on public_custom_dns.json
