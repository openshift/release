ref:
  as: gcp-hcp-terraform-plan
  from: src
  commands: gcp-hcp-terraform-plan-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
  timeout: 10m0s
  documentation: |-
    Runs terraform plan on the gcp-hcp-infra e2e config using WIF authentication.
    Requires ${SHARED_DIR}/wif-cred.json written by the hypershift-gcp-wif-auth step.
    The cluster profile must contain ci-folder-id and billing-account-id.
