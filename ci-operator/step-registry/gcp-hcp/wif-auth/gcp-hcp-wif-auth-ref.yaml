ref:
  as: gcp-hcp-wif-auth
  from: src
  commands: gcp-hcp-wif-auth-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 100Mi
  timeout: 2m0s
  documentation: |-
    Generates a GCP Workload Identity Federation credential config for the
    current build cluster and writes it to ${SHARED_DIR}/wif-cred.json.
    Must run as the first pre step. Uses only base64 and jq (no gcloud).
    The cluster profile must contain wif-config.json with fields:
    project_number, pool_id, service_account, and issuer_map.
