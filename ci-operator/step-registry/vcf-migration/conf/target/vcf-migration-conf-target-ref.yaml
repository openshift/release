ref:
  as: vcf-migration-conf-target
  from: upi-installer
  commands: vcf-migration-conf-target-commands.sh
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
  credentials:
  - namespace: test-credentials
    name: vsphere-ibmcloud-ci
    mount_path: /var/run/vault/vsphere-ibmcloud-ci
  - namespace: test-credentials
    name: vsphere-ibmcloud-config
    mount_path: /var/run/vault/vsphere-ibmcloud-config
  - namespace: test-credentials
    name: ci-ibmcloud
    mount_path: /var/run/vault/ibmcloud
  - namespace: test-credentials
    name: ci-ibmcloud-2
    mount_path: /var/run/vault/ibmcloud-2
  documentation: |-
    Derives the migration target artifacts from the vSphere VCM lease while
    keeping the install pinned to the authoritative source pool selected by
    ipi-conf-vsphere-check-vcm.
