chain:
  as: vcf-migration-conf
  steps:
  - ref: ipi-conf-vsphere-check
  - ref: ipi-conf-vsphere-check-vcm
  - ref: vcf-migration-conf-target
  - ref: ipi-conf-vsphere-vips
  - ref: ipi-conf-vsphere-vips-vcm
  - ref: ipi-conf-vsphere-dns
  - ref: ipi-conf
  - ref: ipi-conf-telemetry
  - ref: ipi-conf-vsphere
  - ref: ipi-conf-vsphere-vcm
  - ref: ipi-install-monitoringpvc
  documentation: |-
    Generates a vSphere install configuration from a multi-pool VCM lease but
    rewrites the shared platform artifacts so the cluster installs on only the
    authoritative source vCenter.
