ref:
  as: vcf-migration-csi-remove
  from: upi-installer
  commands: vcf-migration-csi-remove-commands.sh
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
  env:
  - name: CSI_MANAGEMENT_REMOVED
    default: "false"
    documentation: |-
      Specifies if cluster should modify the CSI driver operator's management
      state to be "Removed".
  documentation: |-
    Patches the vSphere CSI driver to set managementState to "Removed", which
    disables CSI driver management. This is appropriate for migration testing
    where storage backends are being migrated between vCenters.
