ref:
  as: vcf-migration-deploy
  from: src
  commands: vcf-migration-deploy-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 300Mi
  timeout: 20m0s
  dependencies:
  - name: "pipeline:vcf-migration-operator"
    env: VCF_MIGRATION_OPERATOR_IMAGE
  documentation: |-
    Installs the vcf-migration-operator CRDs and deploys the controller by using
    the source repository checked out into the src image plus the CI-built
    operator image pullspec injected by ci-operator.
