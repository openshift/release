ref:
  as: vcf-migration-execute
  from: upi-installer
  commands: vcf-migration-execute-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  timeout: 130m0s
  env:
  - name: VCF_MIGRATION_TIMEOUT
    default: "7200"
    documentation: Timeout in seconds for the migration to reach Ready=True.
  documentation: |-
    Creates the migration CR, waits for the controller to move through each
    migration condition, and emits debug information if the migration stalls or
    fails.
