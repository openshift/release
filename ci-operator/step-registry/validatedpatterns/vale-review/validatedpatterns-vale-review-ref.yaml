ref:
  as: validatedpatterns-vale-review
  commands: validatedpatterns-vale-review-commands.sh
  credentials:
  - mount_path: /tmp/vault/validatedpatterns-vale-github-secret
    name: validatedpatterns-vale-github-secret
    namespace: test-credentials
  resources:
    requests:
      cpu: 100m
      memory: 100Mi
  from: src
  env:
  - name: GITHUB_AUTH_TOKEN
    default: ""
  documentation: |-
    Automated GitHub comments for Vale alerts on added/modified content in a PR.