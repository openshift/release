ref:
  as: cri-o-setup-test
  from: crio-crio-base-src
  grace_period: 10m
  commands: cri-o-setup-test-commands.sh
  resources:
    requests:
      cpu: "3"
      memory: 600Mi
    limits:
      memory: 2Gi
  env:
    - name: IMAGE_FAMILY
      default: "crio-setup"
      documentation: |-
        The GCP image family name used for creating and managing base images.
        Use "crio-setup" for RHEL-based and "crio-setup-fedora" for Fedora-based images.
  documentation: |-
    The assisted agent test step executes the subsystem test suite.
