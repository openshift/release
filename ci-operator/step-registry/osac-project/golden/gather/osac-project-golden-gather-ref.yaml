ref:
  as: osac-project-golden-gather
  from: dev-scripts
  best_effort: true
  grace_period: 10m
  timeout: 15m0s
  commands: osac-project-golden-gather-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  documentation: |-
    Collects OSAC component logs, CR status, events, and cluster state
    from the golden image hub and virt clusters. Runs as a best-effort
    post step so logs are collected even when tests fail.
