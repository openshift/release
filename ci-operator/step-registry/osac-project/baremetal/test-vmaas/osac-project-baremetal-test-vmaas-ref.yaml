ref:
  as: osac-project-baremetal-test-vmaas
  from: dev-scripts
  dependencies:
  - name: osac-test-infra
    env: OSAC_TEST_IMAGE
  grace_period: 10m
  timeout: 3h0m0s
  commands: osac-project-baremetal-test-vmaas-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  env:
  - name: E2E_NAMESPACE
    default: "osac-e2e-ci"
    documentation: The namespace to use for the e2e tests
  - name: E2E_VM_TEMPLATE
    default: "osac.templates.ocp_virt_vm"
    documentation: The VM template to use for the e2e tests
  documentation: |-
    Runs the full VMaaS e2e test suite (tests/vmaas/) in a single environment.
    All tests run sequentially against a single provisioned OSAC instance.
