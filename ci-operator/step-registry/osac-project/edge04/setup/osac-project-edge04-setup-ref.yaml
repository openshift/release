ref:
  as: osac-project-edge04-setup
  from: dev-scripts
  grace_period: 5m
  timeout: 10m0s
  commands: osac-project-edge04-setup-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  credentials:
  - namespace: test-credentials
    name: edge04-sshkey
    mount_path: /var/run/osac-edge04-ssh-key
  env:
  - name: EDGE04_HOST
    default: "edge-04.edge.lab.eng.rdu2.redhat.com"
    documentation: FQDN or IP of the edge-04 server
  - name: EDGE04_USER
    default: "root"
    documentation: SSH user on edge-04
  documentation: |-
    Sets up SSH connectivity to the dedicated edge-04 server.
    Writes ssh_config so subsequent steps can reach it as ci_machine.
