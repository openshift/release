ref:
  as: osac-project-notify
  best_effort: true
  from: dev-scripts
  timeout: 5m0s
  commands: osac-project-notify-commands.sh
  credentials:
  - namespace: test-credentials
    name: osac-slack-webhook
    mount_path: /var/run/vault/osac-slack-webhook
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  env:
  - name: NOTIFY_LABEL
    default: ""
    documentation: Custom label for the Slack notification header. If empty, uses JOB_NAME.
  documentation: |-
    Sends a Slack notification with the job result and a link to the Prow logs.
