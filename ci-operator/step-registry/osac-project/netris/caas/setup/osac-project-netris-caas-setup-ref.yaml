ref:
  as: osac-project-netris-caas-setup
  from: dev-scripts
  grace_period: 5m
  timeout: 45m0s
  commands: osac-project-netris-caas-setup-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
    limits:
      memory: 2Gi
  documentation: |-
    Sets up CaaS infrastructure on the Netris lab: creates InfraEnv,
    boots discovery VMs, waits for agents to register, labels agents
    with resource class and Netris server name, and registers the
    host type in the fulfillment service.
