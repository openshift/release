ref:
  as: osac-project-netris-caas-gather
  from: dev-scripts
  best_effort: true
  grace_period: 5m
  timeout: 30m0s
  commands: osac-project-netris-caas-gather-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
    limits:
      memory: 2Gi
  documentation: |-
    Collects CaaS diagnostic artifacts from the Netris lab environment
    including fulfillment API state, hosted cluster status, agent
    conditions, and OSAC CaaS resource state via the netris-test-infra
    gather-caas playbook.
