ref:
  as: osac-project-netris-caas-deploy
  from: dev-scripts
  grace_period: 10m
  timeout: 1h30m0s
  commands: osac-project-netris-caas-deploy-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
    limits:
      memory: 2Gi
  documentation: |-
    Creates a CaaS cluster via the fulfillment API using the osac
    CLI and waits for it to reach READY state.
