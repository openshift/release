ref:
  as: osac-project-netris-lab-cleanup-dns
  from: dev-scripts
  best_effort: true
  grace_period: 5m
  timeout: 10m0s
  commands: osac-project-netris-lab-cleanup-dns-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
    limits:
      memory: 2Gi
  documentation: |-
    Deletes Route 53 DNS records created for this lab's OCP cluster
    to avoid stale records from CI runs. Runs as a best-effort
    post step.
