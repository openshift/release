ref:
  as: osac-project-netris-lab-deploy
  from: dev-scripts
  grace_period: 10m
  timeout: 1h30m0s
  commands: osac-project-netris-lab-deploy-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
    limits:
      memory: 2Gi
  documentation: |-
    Deploys the Netris Spectrum-X GPU cluster lab on the OFCIR
    bare-metal host by running make deploy-lab. Assumes the setup
    step has already installed prerequisites and cloned the repo.
