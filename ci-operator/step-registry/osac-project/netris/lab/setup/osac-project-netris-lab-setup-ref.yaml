ref:
  as: osac-project-netris-lab-setup
  from: dev-scripts
  grace_period: 5m
  timeout: 30m0s
  commands: osac-project-netris-lab-setup-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
    limits:
      memory: 2Gi
  credentials:
  - namespace: test-credentials
    name: osac-installer-aap
    mount_path: /var/run/osac-installer-aap
  env:
    - name: NETRIS_TEST_INFRA_REPO
      default: "https://github.com/danmanor/netris-test-infra.git"
      documentation: Git repository URL for the netris-test-infra project
    - name: NETRIS_TEST_INFRA_BRANCH
      default: "main"
      documentation: Git branch or tag to use
  documentation: |-
    Installs system packages (ansible, make), clones netris-test-infra,
    copies the Netris license, pull secret, and AAP license to the
    remote host, and runs make setup to install all prerequisites.
