ref:
  as: osac-project-netris-lab-snapshot
  from: dev-scripts
  grace_period: 10m
  timeout: 3h0m0s
  commands: osac-project-netris-lab-snapshot-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
    limits:
      memory: 2Gi
  dependencies:
  - name: osac-installer
    env: OSAC_INSTALLER_IMAGE
  - name: osac-operator-image
    env: OSAC_OPERATOR_IMAGE
  - name: fulfillment-service-image
    env: FULFILLMENT_SERVICE_IMAGE
  - name: osac-aap-ee-image
    env: OSAC_AAP_EE_IMAGE
  documentation: |-
    Restores a pre-installed OCP + OSAC snapshot with all prerequisites.
    Runs recert to revive cluster certificates and update the IP, then
    refreshes OSAC component images to the versions under test via
    deploy-osac.
