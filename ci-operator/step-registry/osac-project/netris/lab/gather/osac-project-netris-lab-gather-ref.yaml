ref:
  as: osac-project-netris-lab-gather
  from: dev-scripts
  best_effort: true
  grace_period: 5m
  timeout: 30m0s
  commands: osac-project-netris-lab-gather-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
    limits:
      memory: 2Gi
  documentation: |-
    Collects lab infrastructure diagnostic artifacts including host
    state, networking, libvirt VMs, K3s/Netris controller, DNS,
    assisted installer, OCP cluster, and OSAC deployment state via
    the netris-test-infra gather-lab playbook.
