ref:
  as: osac-project-installer
  from: dev-scripts
  dependencies:
  - name: osac-installer
    env: OSAC_INSTALLER_IMAGE
  grace_period: 10m
  timeout: 3h0m0s
  commands: osac-project-installer-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  credentials:
  - namespace: test-credentials
    name: osac-installer-aap
    mount_path: /var/run/osac-installer-aap
  env:
  - name: E2E_NAMESPACE
    default: "osac-e2e-ci"
    documentation: The namespace to use for the e2e tests
  - name: E2E_KUSTOMIZE_OVERLAY
    default: "vmaas-ci"
    documentation: The kustomize overlay to use for the e2e tests
  - name: E2E_VM_TEMPLATE
    default: "osac.templates.ocp_virt_vm"
    documentation: The template to use for the e2e tests
  - name: MCE_SERVICE
    default: "false"
    documentation: Whether to enable MCE service
  - name: STORAGE_SERVICE
    default: "false"
    documentation: Whether to enable storage service
  - name: INGRESS_SERVICE
    default: "false"
    documentation: Whether to enable ingress service
  - name: OSAC_CLUSTER_TEMPLATE
    default: ""
    documentation: The cluster template to use for CaaS e2e tests
