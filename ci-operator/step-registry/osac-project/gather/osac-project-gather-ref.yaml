ref:
  as: osac-project-gather
  best_effort: true
  from: dev-scripts
  timeout: 20m0s
  commands: osac-project-gather-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  env:
  - name: E2E_NAMESPACE
    default: "osac-e2e-ci"
    documentation: The namespace where OSAC components are deployed
