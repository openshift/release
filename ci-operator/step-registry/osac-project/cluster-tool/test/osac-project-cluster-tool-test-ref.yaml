ref:
  as: osac-project-cluster-tool-test
  from: dev-scripts
  dependencies:
  - name: osac-test-infra
    env: OSAC_TEST_IMAGE
  grace_period: 10m
  timeout: 1h30m0s
  commands: osac-project-cluster-tool-test-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  env:
  - name: MAKE_TARGET
    default: "test-vmaas"
    documentation: The make target to run (e.g. test-vmaas, test-vmaas-parallel)
  - name: TEST
    default: ""
    documentation: The test file to run when using the test make target
  - name: E2E_NAMESPACE
    default: "osac-e2e-ci"
    documentation: The namespace to use for the e2e tests
  - name: E2E_VM_TEMPLATE
    default: "osac.templates.ocp_virt_vm"
    documentation: The VM template to use for vmaas tests
  - name: E2E_CLUSTER_TEMPLATE
    default: "osac.templates.ocp_4_17_small"
    documentation: The cluster template to use for CaaS tests
  documentation: |-
    Runs vmaas e2e tests on a cluster-tool booted cluster.
    Supports MAKE_TARGET to select test suite (default: test-vmaas, use test-vmaas-parallel for parallel execution).
    Produces JUnit XML for per-test reporting in Prow.
