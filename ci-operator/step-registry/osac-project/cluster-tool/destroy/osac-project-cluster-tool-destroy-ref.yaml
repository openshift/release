ref:
  as: osac-project-cluster-tool-destroy
  from: dev-scripts
  best_effort: true
  grace_period: 5m
  timeout: 10m0s
  commands: osac-project-cluster-tool-destroy-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  env:
  - name: CLUSTER_TOOL_FLAVOR_NAME
    default: "vmaas-kustomize"
    documentation: Name of the cluster-tool clone instance to destroy
  documentation: |-
    Best-effort cleanup of a cluster-tool clone. Runs in post steps.
