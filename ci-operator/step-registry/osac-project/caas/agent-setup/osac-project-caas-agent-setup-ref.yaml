ref:
  as: osac-project-caas-agent-setup
  from: dev-scripts
  dependencies:
  - name: osac-installer
    env: OSAC_INSTALLER_IMAGE
  grace_period: 10m
  timeout: 30m0s
  commands: osac-project-caas-agent-setup-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  env:
  - name: AGENT_NAMESPACE
    default: "hardware-inventory"
    documentation: The namespace for the agent
  - name: AGENT_RESOURCE_CLASS
    default: "ci-worker"
    documentation: The resource class label for the agent
  - name: AGENT_VM_MEMORY
    default: "16384"
    documentation: Memory in MiB for the agent VM
  - name: AGENT_VM_VCPUS
    default: "4"
    documentation: Number of vCPUs for the agent VM
  - name: AGENT_VM_DISK_SIZE
    default: "120G"
    documentation: Disk size for the agent VM
