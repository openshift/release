ref:
  as: osac-project-caas-test
  from: dev-scripts
  grace_period: 10m
  timeout: 3h0m0s
  commands: osac-project-caas-test-commands.sh
  dependencies:
  - name: osac-test-infra
    env: OSAC_TEST_INFRA_IMAGE
  env:
  - name: E2E_NAMESPACE
    default: osac-e2e-ci
    documentation: The OSAC namespace
  - name: TEST
    default: ""
    documentation: Pytest -k filter for test selection
  - name: OSAC_CLUSTER_TEMPLATE
    default: osac.templates.ocp_ci_small
    documentation: The cluster template for CaaS tests
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  documentation: |-
    Runs OSAC CaaS E2E tests from the osac-test-infra container image.
