ref:
  as: osac-project-caas-installer
  from: dev-scripts
  grace_period: 10m
  timeout: 3h0m0s
  commands: osac-project-caas-installer-commands.sh
  credentials:
  - mount_path: /var/run/osac-installer-aap
    name: osac-installer-aap
    namespace: test-credentials
  dependencies:
  - name: osac-installer
    env: OSAC_INSTALLER_IMAGE
  env:
  - name: E2E_NAMESPACE
    default: osac-e2e-ci
    documentation: The namespace to deploy OSAC into
  - name: E2E_KUSTOMIZE_OVERLAY
    default: caas-ci
    documentation: The kustomize overlay to use
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  documentation: |-
    Installs OSAC with MCE, LVMS, and MetalLB on the bare metal cluster
    for CaaS E2E testing.
