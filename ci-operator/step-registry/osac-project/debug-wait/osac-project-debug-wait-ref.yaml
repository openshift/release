ref:
  as: osac-project-debug-wait
  from: dev-scripts
  grace_period: 10m
  timeout: 3h0m0s
  commands: osac-project-debug-wait-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  documentation: |-
    Debug wait step using dev-scripts image (has SSH). Pauses the job for up to
    3 hours so the user can oc rsh into this pod and SSH to ci_machine to run
    tests manually. Touch /tmp/debug.done inside the pod to exit early.
