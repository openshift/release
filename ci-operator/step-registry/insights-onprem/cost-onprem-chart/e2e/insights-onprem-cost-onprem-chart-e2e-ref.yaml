ref:
  as: insights-onprem-cost-onprem-chart-e2e
  from: cost-onprem-test
  commands: insights-onprem-cost-onprem-chart-e2e-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  credentials:
  - namespace: test-credentials
    name: insights-qe-secrets
    mount_path: /tmp/secrets/ci
  env:
  - name: DEPLOY_S4
    default: "true"
    documentation: "Set to 'true' to deploy S4 storage. When false, storage is handled externally or not required."
  - name: S4_NAMESPACE
    default: ""
    documentation: "Namespace for S4 deployment when DEPLOY_S4=true. Defaults to same namespace as application if not specified."
  - name: COST_MGMT_CHANNEL
    default: "stable"
    documentation: "OLM channel for Cost Management Operator (stable, alpha, etc.)"
  - name: COST_MGMT_SOURCE
    default: "redhat-operators"
    documentation: "CatalogSource for Cost Management Operator"
  - name: OPERATOR_INSTALL_TIMEOUT
    default: "300"
    documentation: "Maximum time in seconds to wait for Cost Management Operator to install"
  - name: SKIP_COST_MGMT_INSTALL
    default: "false"
    documentation: "Set to 'true' to skip Cost Management Operator installation"
  - name: VERBOSE
    default: "true"
    documentation: "Enable verbose output from deployment script"
  - name: RUN_IQE
    default: "false"
    documentation: "Set to 'true' to run IQE cost-management tests after deployment"
  - name: IQE_PROFILE
    default: "smoke"
    documentation: "IQE test profile: smoke (~17min), extended (~33min), stable (~40min), full (~60min)"
  - name: LISTENER_CPU
    default: "max"
    documentation: "CPU limit for listener during IQE tests (e.g., 500m, 1000m, or 'max' for dynamic)"
  - name: CHART_REF
    default: ""
    documentation: "Chart source for testing: 'release' (Helm repo latest stable), 'rc' (Helm repo with --devel). Empty uses local source (PR testing)."
  documentation: |-
    This step runs the cost-onprem e2e tests by executing the
    deploy-test-cost-onprem.sh script from the cost-onprem-chart repository.
    
    It handles:
    - Dependency installation (yq, kubectl, helm, oc)
    - S4 object storage deployment (when DEPLOY_S4=true, via --deploy-s4 flag)
    - Cost Management Operator installation (without hardcoded version)
    - RHBK deployment, Strimzi/Kafka setup, Helm chart installation
    - TLS configuration and JWT authentication testing
    - IQE cost-management tests (when RUN_IQE=true)
    
    Set DEPLOY_S4=true to deploy S4 storage. By default, S4 is deployed to 
    the same namespace as the application to ensure storage credentials are 
    accessible. Set S4_NAMESPACE to override. When DEPLOY_S4=false, storage 
    is handled externally or not required.
    
    Set RUN_IQE=true to run IQE cost-management tests after deployment.
    The IQE_PROFILE controls test scope: smoke (~17min), extended (~33min),
    stable (~40min), or full (~60min). Requires insights-qe-secrets for
    pulling the IQE container image from Quay.
    
    For nightly/periodic jobs, set CHART_REF to control chart source:
    - 'release': Install from Helm repo (latest stable release)
    - 'rc': If deploy script supports --devel, uses Helm repo with pre-release.
            Otherwise, checks out latest RC git tag and uses local chart.
    
    For PR presubmit jobs, leave CHART_REF empty to use local source.