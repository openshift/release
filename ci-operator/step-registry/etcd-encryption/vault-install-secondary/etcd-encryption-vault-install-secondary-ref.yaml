ref:
  as: etcd-encryption-vault-install-secondary
  from: cli
  commands: etcd-encryption-vault-install-secondary-commands.sh
  credentials:
  - namespace: test-credentials
    name: tests-private-account
    mount_path: /var/run/vault/tests-private-account
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  env:
  - name: VAULT_VERSION
    default: "2.0.0-ent"
  - name: VAULT_CHART_VERSION
    default: "0.28.1"
  - name: VAULT_NAMESPACE
    default: "vault-kms-secondary"
  - name: VAULT_CONFIGMAP
    default: "vault-ca-bundle-2"
  - name: VAULT_IMAGE_REPOSITORY
    default: "docker.io/hashicorp/vault-enterprise"
  documentation: |-
    Installs HashiCorp Vault Enterprise (Secondary instance) in vault-kms-secondary namespace.
    This is a wrapper around the vault-install script with different default values.
