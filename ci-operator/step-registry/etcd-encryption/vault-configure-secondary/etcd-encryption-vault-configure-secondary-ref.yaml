ref:
  as: etcd-encryption-vault-configure-secondary
  from: cli
  commands: etcd-encryption-vault-configure-secondary-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  env:
  - name: VAULT_NAMESPACE
    default: "vault-kms-secondary"
  - name: VAULT_KMS_KEY_NAME
    default: "kms-key"
  documentation: |-
    Configures HashiCorp Vault Enterprise (Secondary instance) for KMS encryption.
    This is a wrapper around the vault-configure script with different default namespace.
