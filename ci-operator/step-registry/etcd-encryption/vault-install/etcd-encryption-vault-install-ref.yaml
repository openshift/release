ref:
  as: etcd-encryption-vault-install
  from: tests
  commands: etcd-encryption-vault-install-commands.sh
  credentials:
  - namespace: test-credentials
    name: tests-private-account
    mount_path: /var/run/vault/tests-private-account
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  env:
  - name: VAULT_VERSION
    default: "2.0.0-ent"
    documentation: |-
      Version of Vault Enterprise to install via Helm.
      Check https://hub.docker.com/r/hashicorp/vault-enterprise/tags for available versions.
  - name: VAULT_CHART_VERSION
    default: "0.28.1"
    documentation: |-
      Version of the Vault Helm chart to use.
      Check https://github.com/hashicorp/vault-helm/releases for available versions.
  - name: VAULT_NAMESPACE
    default: "vault-kms"
    documentation: |-
      Namespace where Vault Enterprise will be installed.
  - name: VAULT_IMAGE_REPOSITORY
    default: "quay.io/openshifttest/vault-enterprise"
    documentation: |-
      Container image repository for Vault Enterprise.
      Mirrored from docker.io/hashicorp/vault-enterprise
      (docker.io is blocked in CI due to rate limiting and CI is not accessible in disconnected environments.)
      On baremetalds jobs the image is mirrored to the dev-scripts local registry
      before Helm install.
  - name: VAULT_SECONDARY_NAMESPACE
    default: "vault-kms-secondary"
    documentation: |-
      Namespace where the second Vault Enterprise instance will be installed.
  - name: VAULT_KMS_PLUGIN_VERSION
    default: "0.0.1"
    documentation: |-
      Tag of the vault-kube-kms KMS plugin image used by encryption-kms tests.
      On baremetalds jobs the image is mirrored from VAULT_KMS_PLUGIN_IMAGE_SOURCE
      to the dev-scripts local registry and an ImageContentSourcePolicy redirects node pulls.
  - name: VAULT_KMS_PLUGIN_IMAGE_SOURCE
    default: "registry.ci.openshift.org/control-plane-custom-builds/vault-kube-kms:0.0.1"
    documentation: |-
      Source image for the vault-kube-kms KMS plugin mirrored on baremetalds jobs.
      Update this when the KMS plugin image changes.
  - name: VAULT_KMS_PLUGIN_ICSP_SOURCE
    default: "registry.ci.openshift.org/control-plane-custom-builds/vault-kube-kms"
    documentation: |-
      Upstream repository redirected by ImageContentSourcePolicy on baremetalds jobs.
      Update this when the KMS plugin image repository changes.
  documentation: |-
    Installs HashiCorp Vault Enterprise via Helm.

    This step:
    - Installs Helm if not present
    - Adds HashiCorp Helm repository
    - Creates vault namespace with appropriate SCC (restricted)
    - Creates vault-license secret from mounted credential (if available)
    - Mirrors Vault Enterprise and vault-kube-kms plugin images to the dev-scripts local registry on baremetalds jobs (SSH oc image mirror with retry)
    - Applies ImageContentSourcePolicy/vault-mirror so cluster nodes pull both images from the local mirror
    - Installs Vault Enterprise using Helm chart
    - Waits for Vault pod to be ready
    - Installs a second instance in VAULT_SECONDARY_NAMESPACE

    Prerequisites:
    - OpenShift cluster with adequate resources
    - Vault Enterprise license secret named 'tests-private-account' in test-credentials namespace
      (automatically mounted at /var/run/vault/tests-private-account/)

    Outputs:
    - Vault service available at: vault.${VAULT_NAMESPACE}.svc:8200
    - Vault pod: vault-0 (Ready state)
    - CA ConfigMap: vault-ca-bundle (openshift-config namespace)
    - Second Vault service at: vault-secondary.${VAULT_SECONDARY_NAMESPACE}.svc:8200
    - Second Vault pod: vault-secondary-0 (Ready state)
    - CA ConfigMap: vault-ca-bundle-secondary (openshift-config namespace)

    Next step:
    - Run etcd-encryption-vault-configure to initialize and configure Vault for KMS
