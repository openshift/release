ref:
  as: stargz-download
  from_image:
    namespace: origin
    name: centos
    tag: '8'
  commands: stargz-download-commands.sh
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
  env:
  - name: STARGZ_VERSION
    default: "v0.18.2"
    documentation: |-
      Version of stargz-snapshotter to download from GitHub releases.
  documentation: |-
    The stargz-download step installs the stargz-store binary on worker nodes by injecting
    an installer manifest containing a MachineConfig. The MachineConfig creates a systemd
    oneshot unit that downloads the stargz-snapshotter tarball from GitHub and extracts the
    stargz-store binary to /usr/local/bin at first boot.
