ref:
  as: rosa-regional-platform-doc-update-process
  from: claude-ai-helpers
  commands: rosa-regional-platform-doc-update-process-commands.sh
  timeout: 2h
  env:
  - name: CLAUDE_CODE_USE_VERTEX
    default: "1"
    documentation: |-
      Enable Vertex AI for Claude Code.
  - name: CLOUD_ML_REGION
    default: "global"
    documentation: |-
      Google Cloud region for Vertex AI.
  - name: ANTHROPIC_VERTEX_PROJECT_ID
    default: "itpc-gcp-hybrid-pe-eng-claude"
    documentation: |-
      Google Cloud project ID for Vertex AI authentication.
  - name: GOOGLE_APPLICATION_CREDENTIALS
    default: "/var/run/claude-code-service-account/claude-prow"
    documentation: |-
      Path to the Google Cloud service account JSON key file for Vertex AI authentication.
  - name: CLAUDE_MODEL
    default: "claude-sonnet-4-5"
    documentation: |-
      Claude model to use for documentation analysis.
  - name: LOOKBACK_HOURS
    default: "168"
    documentation: |-
      Number of hours to look back for merged PRs (default: 7 days for weekly run).
  - name: STALE_PR_DAYS
    default: "3"
    documentation: |-
      Close documentation PRs older than this many days.
  - name: INCLUDE_INTERNAL_REPO
    default: "false"
    documentation: |-
      Include rosa-regional-platform-internal repository in analysis.
      Set to "true" only if the job has access to the private/internal repository.
      Default is "false" for public Prow CI.
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
  credentials:
  - namespace: test-credentials
    name: rosa-regional-platform-claude-prow
    mount_path: /var/run/claude-code-service-account
  documentation: |-
    Process step for the rosa-regional-platform documentation update periodic job.
    This step:
    - Generates GitHub App tokens for fork and upstream access
    - Clones rosa-regional-platform repositories from fork (public repos by default):
      * rosa-regional-platform (main platform with architecture docs)
      * rosa-regional-platform-api (API server)
      * rosa-regional-platform-cli (CLI tool)
      * rosa-regional-platform-internal (OPTIONAL - only if INCLUDE_INTERNAL_REPO=true)
    - Auto-closes stale documentation PRs across all accessible repos (older than STALE_PR_DAYS)
    - Queries GitHub for recently merged PRs in all accessible repositories
    - Invokes Claude with documentation-updater agent to analyze cross-repo doc impact
    - Creates documentation update PRs in each affected repository via fork
    - Uses best-effort processing: skips inaccessible repos, exits gracefully if no work needed
    - Uses Vertex AI for Claude authentication via GCP service account

    Note: rosa-regional-platform-internal is a private repository. By default it is excluded
    since the public Prow CI cluster cannot access private repositories. Set INCLUDE_INTERNAL_REPO=true
    only if running in an environment with access to private repositories.
