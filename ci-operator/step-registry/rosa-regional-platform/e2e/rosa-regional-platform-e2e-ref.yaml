ref:
  as: rosa-regional-platform-e2e
  from_image:
    namespace: ci
    name: rosa-regional-platform-ci
    tag: latest
  commands: rosa-regional-platform-e2e-commands.sh
  timeout: 3600s
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  credentials:
  - namespace: test-credentials
    name: rosa-regional-platform-ephemeral-creds
    mount_path: /var/run/rosa-credentials
  env:
  - name: ROSA_REGIONAL_PLATFORM_REF
    default: "main"
    documentation: |-
      Git ref of openshift-online/rosa-regional-platform to clone for e2e tests.
  - name: ROSA_REGIONAL_E2E_REF
    default: ""
    documentation: |-
      Git ref of the e2e test repo to clone. Passed to ci/e2e-tests.sh as
      E2E_REF. If empty and triggered from rosa-regional-platform-api, the
      PR branch and fork repo are auto-detected via the GitHub API.
      Defaults to "main" otherwise.
  - name: ROSA_REGIONAL_E2E_REPO
    default: ""
    documentation: |-
      Git URL of the repo containing e2e tests. Passed to ci/e2e-tests.sh as
      E2E_REPO. If empty and triggered from rosa-regional-platform-api, the
      fork's clone URL is auto-detected. Defaults to
      openshift-online/rosa-regional-platform-api otherwise.
  documentation: |-
    Runs e2e tests from rosa-regional-platform against a provisioned ephemeral
    environment. Clones rosa-regional-platform and executes ./ci/e2e-tests.sh.
    Reads the API URL from terraform outputs or credentials in SHARED_DIR.
