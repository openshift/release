ref:
  as: baremetalds-sno-test
  from: tests
  grace_period: 10m
  commands: baremetalds-sno-test-commands.sh
  env:
  - name: TEST_FUNC
    default: ""
    documentation: Optional test function name passed by callers (e.g. test_bip_add_worker).
  resources:
    requests:
      cpu: "3"
      memory: 600Mi
    limits:
      memory: 10Gi
  env:
  - name: TEST_FUNC
    default: ""
    documentation: |-
      The test function to execute in the SNO BIP test script.
  dependencies:
  - name: "tests"
    env: OPENSHIFT_TESTS_IMAGE
  documentation: |-
    The Baremtal DS E2E single-node step executes the common end-to-end test suite.
