chain:
  as: baremetalds-ofcir-no-overlay-pre
  steps:
  - ref: ofcir-acquire
  - ref: baremetalds-e2e-ovn-bgp-no-overlay
  - ref: baremetalds-e2e-ovn-bgp-nftables-pre
  - ref: ipi-install-rbac
  - ref: baremetalds-devscripts-ibm
  - ref: baremetalds-devscripts-proxy
  - ref: ipi-install-hosted-loki
  - ref: rhcos-conf-osstream
  - ref: baremetalds-devscripts-setup
  documentation: |-
    The Baremetald IPI setup chain with NoOverlay configuration contains all steps 
    that provision an OpenShift cluster with NoOverlay network transport on bare metal.
    This chain differs from baremetalds-ofcir-pre by inserting no-overlay manifest 
    creation and nftables configuration steps after packet server acquisition but 
    before cluster installation.
