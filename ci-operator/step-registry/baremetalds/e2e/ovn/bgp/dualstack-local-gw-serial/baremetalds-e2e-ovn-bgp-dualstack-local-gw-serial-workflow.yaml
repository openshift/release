workflow:
  as: baremetalds-e2e-ovn-bgp-dualstack-local-gw-serial
  steps:
    cluster_profile: equinix-ocp-metal
    env:
      DEVSCRIPTS_CONFIG: |
        IP_STACK=v4v6
        # https://issues.redhat.com/browse/OCPBUGS-52194
        DHCP_LEASE_EXPIRY=0
        NUM_EXTRA_WORKERS=1
        APPLY_EXTRA_WORKERS=true
      EXTRA_MG_ARGS: --host-network
      EXTRA_NETWORK_CONFIG: |
        EXTRA_NETWORK_NAMES="extranet"
        EXTRANET_NETWORK_SUBNET_V4='192.168.221.0/24'
        EXTRANET_NETWORK_SUBNET_V6='fd2e:6f44:5dd8:ca56::/120'
      KONFLUX_TARGET_OPERATORS: nmstate
      TEST_SUITE: openshift/conformance/serial
      TEST_SKIPS: Services should fallback to local terminating endpoints when there
        are no ready endpoints with externalTrafficPolicy=Local\|CPU Partitioning
        cluster platform workloads should be annotated correctly for Deployments\|should
        validate the communication matrix ports match the node's listening ports\|Managed
        cluster should grow and decrease when scaling different machineSets simultaneously
    pre:
      - ref: baremetalds-devscripts-conf-featureset
      - ref: baremetalds-devscripts-conf-extranetwork
      - chain: baremetalds-ofcir-pre
      - ref: ovn-shared-to-local-gateway-mode-migration
      - ref: deploy-konflux-operator
      - ref: baremetalds-e2e-ovn-bgp-pre
      - ref: baremetalds-e2e-ovn-debug-enable-console
    test:
      - chain: baremetalds-ipi-test
    post:
      - ref: baremetalds-e2e-ovn-debug-console-gather
      - chain: baremetalds-ofcir-post
  documentation: |-
    Like baremetalds-e2e-ovn-bgp-dualstack-local-gw, but runs openshift/conformance/serial
    with extra workers and serial-specific TEST_SKIPS. The cluster advertises the default
    network with BGP in local gateway mode, configures an additional machine network, and
    installs the nmstate operator for VRF-Lite test cases.
