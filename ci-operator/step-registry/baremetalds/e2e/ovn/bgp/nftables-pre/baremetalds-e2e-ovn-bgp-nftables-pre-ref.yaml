ref:
  as: baremetalds-e2e-ovn-bgp-nftables-pre
  from: src
  commands: baremetalds-e2e-ovn-bgp-nftables-pre-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 100Mi
  grace_period: 5m
  env:
  - name: NO_OVERLAY_OUTBOUND_SNAT
    default: "Enabled"
    documentation: |-
      Controls outbound SNAT for NoOverlay mode. When "Disabled", nftables rules are 
      configured to allow direct pod-to-external communication. When "Enabled", the 
      default nftables rules are sufficient and this step can be skipped.
  documentation: |-
    This step configures nftables rules to support NoOverlay networking and BGP
    routing before cluster installation. It ensures proper forwarding rules for
    BGP traffic and cluster network access.
