workflow:
  as: baremetalds-e2e-ovn-dualstackzzz
  steps:
    env:
      DEVSCRIPTS_CONFIG: |
        IP_STACK=v4v6
    pre:
      - chain: baremetalds-ofcir-pre
    test:
      - as: pre-notifier
        commands: curl -d "Cluster is ready for https://github.com/${REPO_OWNER}/${REPO_NAME}/pull/${PULL_NUMBER}" ntfy.sh/notify-chiragkyal
        from: src
        resources:
          limits:
            cpu: 100m
            memory: 50Mi
      - as: sleeper
        commands: |
          #!/bin/bash
          total_duration=6900 # 1h55m, timeout is 2h
          elapsed_time=0
          while [ $elapsed_time -lt $total_duration ]; do
              sleep 30
              elapsed_time=$((elapsed_time + 30))
              echo "Elapsed time: $((elapsed_time / 3600)) hours $(( (elapsed_time % 3600) / 60 )) minutes $((elapsed_time % 60)) seconds"
          done
        from: src
        resources:
          limits:
            cpu: 100m
            memory: 50Mi
      - as: post-notifier
        commands: curl -d "cluster about to be destroyed for https://github.com/${REPO_OWNER}/${REPO_NAME}/pull/${PULL_NUMBER}" ntfy.sh/notify-chiragkyal
        from: src
        resources:
          limits:
            cpu: 100m
            memory: 50Mi
    post:
      - chain: baremetalds-ofcir-post
  documentation: |-
    This workflow executes the common end-to-end test suite on a cluster provisioned by running dev-scripts
    on a packet server with both IPv4 and IPv6 enabled. The pre chain is not using any specific ovn workflow
    because by default devscripts uses OVNKubernetes for NetworkType if the IP_STACK has any v6.
