workflow:
  as: baremetalds-two-node-fencing-assisted
  steps:
    allow_best_effort_post_steps: true
    cluster_profile: equinix-edge-enablement
    pre:
      - chain: baremetalds-ofcir-pre
      - ref: baremetalds-two-node-fencing-assisted
    test:
      - chain: baremetalds-ipi-test
    post:
      - chain: baremetalds-ofcir-post
    env:
      DEVSCRIPTS_CONFIG: |
        IP_STACK=v4
        NUM_MASTERS=2
        MASTER_MEMORY=32768
        MASTER_DISK=100
        NUM_WORKERS=0
        BMC_DRIVER=redfish
        VM_EXTRADISKS=true
        VM_EXTRADISKS_LIST="vda vdb"
        VM_EXTRADISKS_SIZE=10G
      ENABLE_HYPERVISOR_SSH_CONFIG: "true"
  documentation: |-
    Deploys a Two Node with Fencing (TNF) hub cluster using dev-scripts,
    then deploys a spoke TNF cluster on the same host via ACM/assisted
    installer using the two-node-toolbox. Tests target the spoke cluster.
