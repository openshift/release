ref:
  as: baremetalds-two-node-fencing-cnv-vm-ha
  from: cli
  cli: latest
  commands: baremetalds-two-node-fencing-cnv-vm-ha-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  env:
  - name: CNV_STORAGE_CLASS
    default: "ocs-storagecluster-ceph-rbd-virtualization"
    documentation: ODF storage class for the test VM (must support RWX)
  timeout: 60m0s
  documentation: |-
    Test VM HA on a 2-node TNF cluster with ODF storage.
    Creates a Fedora VM with evictionStrategy LiveMigrate on an RWX PVC,
    fences the node running the VM using pcs stonith, verifies the VM
    migrates to the surviving node, then recovers the fenced node and
    validates cluster health.
