ref:
  as: baremetalds-two-node-fencing-custom-os-layer
  from: installer
  commands: baremetalds-two-node-fencing-custom-os-layer-commands.sh
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
  env:
  - name: OS_IMAGE_URL
    default: ""
    documentation: |-
      The custom OS image URL to set in the MachineConfig osImageURL field.
      If empty, this step is a no-op.
  - name: OS_EXTENTION_URL
    default: ""
    documentation: |-
      Optional OS extensions container image URL to set in the MachineConfig
      baseOSExtensionsContainerImage field. Only included when non-empty.
  documentation: |-
    Generates a MachineConfig manifest in SHARED_DIR that configures a custom OS layer
    for master nodes. Skipped when OS_IMAGE_URL is not set.
