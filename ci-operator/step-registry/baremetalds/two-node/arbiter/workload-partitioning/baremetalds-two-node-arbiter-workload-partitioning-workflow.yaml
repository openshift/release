workflow:
  as: baremetalds-two-node-arbiter-workload-partitioning
  steps:
    allow_best_effort_post_steps: true
    cluster_profile: equinix-edge-enablement
    pre:
      - chain: baremetalds-ofcir-pre
      - ref: openshift-cluster-bot-rbac
      - ref: ipi-conf-cpu-partitioning-performance-profile
    test:
      - chain: baremetalds-ipi-test
    post:
      - chain: baremetalds-ofcir-post
    env:
      RESERVED_CORES: "0-3"
      ISOLATED_CORES: "4-5"
      # Inherit the base baremetalds-e2e-test skips and add workload-partitioning-specific ones.
      #
      # [sig-node] Pod InPlace Resize Container: kubelet rejects all InPlace resize for Guaranteed
      # pods when cpuManagerPolicy=static is active (set by the PerformanceProfile applied in this
      # lane), even for milliCPU pods (cpu: 20m) that run on the shared CPU pool and hold no
      # exclusive CPU Manager state. This is a kubelet bug — the static policy docs state milliCPU
      # Guaranteed pods use the shared pool like Burstable pods.
      # Track: https://redhat.atlassian.net/browse/OCPBUGS-98106
      #
      # [sig-node] Node Lifecycle [Conformance]: the OpenShift workload-partitioning admission
      # webhook (triggered by cpuPartitioningMode=AllNodes) requires workload.openshift.io/cores in
      # node status.capacity, but the upstream test creates a fake Unschedulable node without it.
      # Also fails in other cpu-partitioning lanes (e.g. e2e-aws-ovn-cpu-partitioning).
      # Skipping for now.
      TEST_SKIPS: |-
        \[sig-auth\] \[Feature:NodeAuthenticator\] The kubelet can delegate ServiceAccount tokens to the API server
        \[sig-auth\] \[Feature:NodeAuthenticator\] The kubelet's main port 10250 should reject requests with no credentials
        \[sig-network\] Conntrack should be able to preserve UDP traffic when server pod cycles for a ClusterIP service
        \[sig-network\] Conntrack should be able to preserve UDP traffic when server pod cycles for a NodePort service
        \[sig-network\] DNS should provide /etc/hosts entries for the cluster
        \[sig-network\] DNS should provide DNS for ExternalName services
        \[sig-network\] DNS should provide DNS for pods for Hostname
        \[sig-network\] DNS should provide DNS for pods for Subdomain
        \[sig-network\] DNS should provide DNS for services
        \[sig-network\] DNS should provide DNS for the cluster
        \[sig-network\] DNS should resolve DNS of partial qualified names for services
        \[sig-network\] DNS should resolve DNS of partial qualified names for the cluster
        \[sig-storage\] In-tree Volumes \[Driver: nfs\] \[Testpattern: Dynamic PV (default fs)\] provisioning should provision storage with mount options
        \[sig-network-edge\]\[Conformance\]\[Area:Networking\]\[Feature:Router\] The HAProxy router should be able to connect to a service that is idled because a GET on the route will unidle it
        \[sig-node\] Pod InPlace Resize Container
        \[sig-node\] Node Lifecycle should run through the lifecycle of a node
      DEVSCRIPTS_CONFIG: |
        IP_STACK=v4
        NUM_MASTERS=2
        MASTER_MEMORY=32768
        NUM_ARBITERS=1
        ARBITER_MEMORY=16384
        NUM_WORKERS=0
        MASTER_VCPU=8
        ENABLE_WORKLOAD_PARTITIONING=1
  documentation: |-
    This workflow executes and enables workload partitioning on a Two Node OpenShift with Arbiter (TNA) cluster installation
