ref:
  as: baremetalds-devscripts-proxy
  from: dev-scripts
  grace_period: 10m
  commands: baremetalds-devscripts-proxy-commands.sh
  resources:
    requests:
      cpu: 1000m
      memory: 500Mi
  env:
  - name: PACKET_PLAN
    default: ""
    documentation: Added for arm64 provisioning in equinix. To be removed when arm64 hosts can be provisioned in ofcir
  - name: CLUSTERTYPE
    default: virt
    documentation: Type of environment to run CI test on "virt" or "baremetal"
  documentation: |-
    Installs and configures a squid proxy server for use with dev-scripts.
