ref:
  as: kubernetes-nmstate-e2e-install
  from: src-with-oc-and-kubectl
  commands: kubernetes-nmstate-e2e-install-commands.sh
  dependencies:
  - env: OPERATOR_IMAGE
    name: pipeline:kubernetes-nmstate-operator
  - env: HANDLER_IMAGE
    name: pipeline:kubernetes-nmstate-handler
  env:
  - name: SKIP_IMAGE_BUILD
  - name: IMAGE_BUILDER
  - name: HANDLER_NAMESPACE
    default: openshift-nmstate
  - name: OPERATOR_NAMESPACE
    default: openshift-nmstate
  - name: MONITORING_NAMESPACE
    default: openshift-monitoring
  timeout: 30m0s
  resources:
    requests:
      cpu: "2"
      memory: 1Gi
  documentation: |-
    Installs the kubernetes-nmstate operator and creates the NMState CR without
    running any handler e2e tests. Use this step before running conformance or
    other test suites that require kubernetes-nmstate to be deployed.
