ref:
  as: redhat-developer-rhdh-release-1.3-nightly
  cli: latest
  commands: "redhat-developer-rhdh-release-1.3-nightly-commands.sh"
  credentials:
    - mount_path: /tmp/secrets
      name: rhdh
      namespace: test-credentials
  env:
    - name: OC_CLIENT_VERSION
      default: stable-4.16
    - name: RHDH_E2E_RUNNER_IMAGE
      default: registry.ci.openshift.org/ci/rhdh-e2e-runner:latest
  from: ${RHDH_E2E_RUNNER_IMAGE}
  resources:
    limits:
      memory: 6Gi
      cpu: "2"
    requests:
      cpu: "2"
      memory: 6Gi
