ref:
  as: post-merge-push
  cli: latest
  commands: "post-merge-push.sh"
  from: ${RHDH_E2E_RUNNER_IMAGE}
  resources:
    limits:
      memory: 2Gi
      cpu: "1"
    requests:
      cpu: "500m"
      memory: 1Gi
  env:
    - name: RHDH_E2E_RUNNER_IMAGE
      default: registry.ci.openshift.org/ci/rhdh-e2e-runner:latest
