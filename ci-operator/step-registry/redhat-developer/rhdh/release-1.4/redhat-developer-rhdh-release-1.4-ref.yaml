ref:
  as: redhat-developer-rhdh-release-1.4
  cli: latest
  commands: "redhat-developer-rhdh-release-1.4-commands.sh"
  credentials:
  - mount_path: /tmp/secrets
    name: rhdh
    namespace: test-credentials
  from: ${RHDH_E2E_RUNNER_IMAGE}
  grace_period: 5m
  resources:
    limits:
      memory: 6Gi
      cpu: "2"
    requests:
      cpu: "2"
      memory: 6Gi
  env:
    - name: RHDH_E2E_RUNNER_IMAGE
      default: registry.ci.openshift.org/ci/rhdh-e2e-runner:latest

