ref:
  as: redhat-developer-rhdh
  cli: latest
  commands: "redhat-developer-rhdh-commands.sh"
  credentials:
  - mount_path: /tmp/secrets
    name: rhdh
    namespace: test-credentials
  from: quay.io/rhdh-community/rhdh-e2e-runner:latest
  resources:
    limits:
      memory: 6Gi
      cpu: "2"
    requests:
      cpu: "2"
      memory: 6Gi
