ref:
  as: redhat-developer-rhdh-eks-mapt-create
  commands: redhat-developer-rhdh-eks-mapt-create-commands.sh
  credentials:
  - mount_path: /tmp/secrets
    name: rhdh-mapt-aws
    namespace: test-credentials
  env:
  - documentation: Kubernetes version to use for the EKS cluster
    name: MAPT_KUBERNETES_VERSION
  from_image:
    name: mapt
    namespace: ci
    tag: v0.13.0
  grace_period: 30m
  resources:
    limits:
      cpu: "2"
      memory: 6Gi
    requests:
      cpu: "2"
      memory: 6Gi
