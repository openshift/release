ref:
  as: redhat-developer-rhdh-send-alert
  commands: redhat-developer-rhdh-send-alert-commands.sh
  credentials:
  - mount_path: /tmp/secrets
    name: rhdh-send-alert
    namespace: test-credentials
  env:
  - name: MULTISTAGE_PARAM_OVERRIDE_SKIP_SEND_ALERT
    default: ""
    documentation: Optional. Set to "true" to skip sending Slack alerts via Gangway API.
  from_image:
    name: rhdh-e2e-runner
    namespace: ci
    tag: main
  resources:
    requests:
      cpu: 100m
      memory: 100Mi
