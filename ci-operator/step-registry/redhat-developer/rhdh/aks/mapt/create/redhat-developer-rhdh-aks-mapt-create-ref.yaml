ref:
  as: redhat-developer-rhdh-aks-mapt-create
  commands: redhat-developer-rhdh-aks-mapt-create-commands.sh
  credentials:
  - mount_path: /tmp/secrets
    name: rhdh-mapt-azure
    namespace: test-credentials
  env:
  - documentation: Kubernetes version to use for the AKS cluster
    name: MAPT_KUBERNETES_VERSION
  from_image:
    name: mapt
    namespace: ci
    tag: v0.11.1
  grace_period: 20m
  resources:
    limits:
      cpu: "2"
      memory: 6Gi
    requests:
      cpu: "2"
      memory: 6Gi
