ref:
  as: redhat-developer-rhdh-osd-gcp-cluster-create
  cli: latest
  commands: "redhat-developer-rhdh-osd-gcp-cluster-create-commands.sh"
  credentials:
    - mount_path: /tmp/secrets/osd
      name: rhdh-osd
      namespace: test-credentials
  env:
    - name: OSD_VERSION
      default: 4.17.10
  from: showcase-e2e-runner
  resources:
    limits:
      memory: 6Gi
      cpu: "1"
    requests:
      cpu: "1"
      memory: 2Gi