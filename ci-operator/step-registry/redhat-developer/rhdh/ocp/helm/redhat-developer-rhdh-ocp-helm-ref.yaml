ref:
  as: redhat-developer-rhdh-ocp-helm
  cli: latest
  commands: "redhat-developer-rhdh-ocp-helm-commands.sh"
  credentials:
  - mount_path: /tmp/secrets
    name: rhdh
    namespace: test-credentials
  env:
    - name: QUAY_REPO
      default: ""
    - name: GITHUB_ORG_NAME
      default: ""
    - name: GITHUB_REPOSITORY_NAME
      default: ""
    - name: RELEASE_BRANCH_NAME
      default: ""
    - name: GIT_PR_NUMBER
      default: ""
    - name: TAG_NAME
      default: ""
  from_image:
    name: rhdh-e2e-runner
    namespace: ci
    tag: main
  resources:
    limits:
      cpu: "10"
      memory: 5Gi
    requests:
      cpu: "1"
      memory: 1Gi
