ref:
  as: redhat-developer-rhdh-plugin-export-overlays-ocp-helm
  cli: latest
  commands: "redhat-developer-rhdh-plugin-export-overlays-ocp-helm-commands.sh"
  credentials:
    - mount_path: /tmp/secrets
      name: rhdh-plugin-export-overlays
      namespace: test-credentials
  grace_period: 5m
  from_image:
    name: rhdh-e2e-runner
    namespace: ci
    tag: main
  timeout: 3h30m0s
  resources:
    limits:
      memory: 8Gi
      cpu: "4"
    requests:
      cpu: "2"
      memory: 6Gi
