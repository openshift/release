ref:
  as: redhat-developer-rhdh-plugin-export-overlays-send-data-router
  commands: redhat-developer-rhdh-plugin-export-overlays-send-data-router-commands.sh
  credentials:
  - mount_path: /tmp/secrets
    name: rhdh-send-data-router
    namespace: test-credentials
  env:
    - name: MULTISTAGE_PARAM_OVERRIDE_GITHUB_ORG_NAME
      default: ""
      documentation: Optional. Overrides GITHUB_ORG_NAME via Gangway API.
    - name: MULTISTAGE_PARAM_OVERRIDE_GITHUB_REPOSITORY_NAME
      default: ""
      documentation: Optional. Overrides GITHUB_REPOSITORY_NAME via Gangway API.
    - name: MULTISTAGE_PARAM_OVERRIDE_RELEASE_BRANCH_NAME
      default: ""
      documentation: Optional. Overrides RELEASE_BRANCH_NAME via Gangway API.
    - name: MULTISTAGE_PARAM_OVERRIDE_GIT_PR_NUMBER
      default: ""
      documentation: Optional. Overrides GIT_PR_NUMBER via Gangway API.
    - name: MULTISTAGE_PARAM_OVERRIDE_CATALOG_INDEX_IMAGE
      default: ""
      documentation: Optional. Overrides CATALOG_INDEX_IMAGE via Gangway API (e.g. quay.io/rhdh/plugin-catalog-index:1.5).
    - name: MULTISTAGE_PARAM_OVERRIDE_PLAYWRIGHT_VERSION
      default: ""
      documentation: Optional. Overrides PLAYWRIGHT_VERSION via Gangway API for Playwright browser installation.
  from_image:
    name: droute
    namespace: dno
    tag: latest
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
