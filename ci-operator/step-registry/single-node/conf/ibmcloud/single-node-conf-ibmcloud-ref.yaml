ref:
  as: single-node-conf-ibmcloud
  from: installer
  commands: single-node-conf-ibmcloud-commands.sh
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
  env:
  - name: NETWORK_TYPE
    default: "OVNKubernetes"
    documentation: |-
      Network type to use, the default OVNKubernetes
  - name: SINGLE_NODE_IBMCLOUD_INSTANCE_TYPE
    default: "bx3d-8x40"
    documentation: |-
        IBMCloud instance type of single node, default value is for amd64.
  documentation: |-
    Modifies install-config.yaml to use a single control-plane node and without any workers.
