
workflow:
  as: idp-external-oidc-entraid-baremetal-ipv6
  steps:
    pre:
      - chain: baremetal-lab-agent-conf-ipv6
      - ref: baremetal-lab-agent-conf-dynamic
      - chain: baremetal-lab-agent-install
      - chain: idp-external-oidc-entraid
    post:
      - ref: idp-external-oidc-entraid-console-app-redirect-uri-remove
      - chain: baremetal-lab-post
      - ref: junit2reportportal
    env:
      CLUSTER_WIDE_PROXY: "true"
      ipv4_enabled: "false"
      ipv6_enabled: "true"
      DISCONNECTED: "false"
  documentation: |-
    This workflow creates and later destroy cluster on ipv6 baremetal using entraid entexternal OIDC.
