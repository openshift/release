ref:
  as: lvms-zstream-trigger
  from_image:
    namespace: ocp
    name: cli-jq
    tag: latest
  commands: lvms-zstream-trigger-commands.sh
  env:
  - name: LVMS_ZSTREAM_RELEASES
    documentation: Comma-separated list of OCP releases to check for z-stream PRs (e.g. "4.18,4.19,4.20,4.21")
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  credentials:
  - mount_path: /etc/gangway
    name: mce-prow-gangway-credentials
    namespace: test-credentials
  documentation: |-
    Triggers LVMS z-stream e2e tests via Gangway API.
    For each configured release, checks GitHub for open z-stream PRs on
    openshift/lvm-operator, resolves catalog image digests from quay.io,
    and triggers nightly e2e jobs with MULTISTAGE_PARAM_OVERRIDE_LVM_INDEX_IMAGE
    set to the resolved digest. Skips releases where the digest hasn't changed
    since the last run.
