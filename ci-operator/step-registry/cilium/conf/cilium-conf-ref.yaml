ref:
  as: cilium-conf
  from: cli
  commands: cilium-conf-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 100Mi
  env:
  - name: CILIUM_VERSION
    default: "1.19.4"
    documentation: |-
      Cilium version to install.
  - name: CILIUM_CLI_VERSION
    default: "0.19.2"
    documentation: |-
      Cilium CLI version used to generate installation manifests.
  - name: HUBBLE
    default: "true"
    documentation: |-
      This var will default to true, however users can override to disable hubble.
  - name: ENDPOINT_ROUTES
    default: "true"
    documentation: |-
      This var will default to true, however users can override to disable endpoint routes.
  documentation: |-
    This step generates Cilium CNI manifests using cilium install --dry-run for day-0 cluster installation.
