ref:
  as: hypershift-disable-guest
  from: cli
  grace_period: 5m
  cli: latest
  commands: hypershift-disable-guest-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 100Mi
  documentation: |-
    disable Hypershift hostedcluster in cluster.
    hypershift-disable-guest needs to be used in conjunction with hypershift-enable-guest
