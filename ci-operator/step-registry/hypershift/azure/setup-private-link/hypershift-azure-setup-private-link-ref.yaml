ref:
  as: hypershift-azure-setup-private-link
  cli: latest
  commands: hypershift-azure-setup-private-link-commands.sh
  credentials:
    - mount_path: /etc/hypershift-ci-jobs-self-managed-azure
      name: hypershift-ci-jobs-self-managed-azure
      namespace: test-credentials
  env:
    - default: ${SHARED_DIR}/management_cluster_kubeconfig
      name: KUBECONFIG
      documentation: "Path to the management cluster kubeconfig, written by the nested management cluster setup step."
  from: hypershift-tests
  grace_period: 5m0s
  resources:
    requests:
      cpu: 100m
      memory: 100Mi
  timeout: 10m0s
