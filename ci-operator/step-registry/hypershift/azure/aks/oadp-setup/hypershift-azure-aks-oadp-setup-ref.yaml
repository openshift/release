ref:
  as: hypershift-azure-aks-oadp-setup
  from: upi-installer
  cli: latest
  commands: hypershift-azure-aks-oadp-setup-commands.sh
  resources:
    requests:
      cpu: 300m
      memory: 300Mi
  credentials:
  - mount_path: /etc/hypershift-ci-jobs-azurecreds
    name: hypershift-ci-jobs-azurecreds
    namespace: test-credentials
  - mount_path: /etc/ci-pull-credentials
    name: ci-pull-credentials
    namespace: test-credentials
  env:
  - name: OADP_AZURE_BUCKET_NAME
    documentation: |-
      The Azure blob storage bucket name for OADP backups.
      If empty, a bucket will be created using the cluster name.
    default: ""
  - name: VELERO_VERSION
    documentation: The version of Velero to install.
    default: v1.18.0
  - name: OADP_HYPERSHIFT_PLUGIN_IMAGE
    documentation: The image of the OADP HyperShift plugin.
    default: quay.io/redhat-user-workloads/ocp-art-tenant/oadp-hypershift-oadp-plugin-main:main
  - name: OADP_AZURE_PLUGIN_IMAGE
    documentation: The image of the OADP Azure plugin.
    default: quay.io/konveyor/velero-plugin-for-microsoft-azure:oadp-1.5
  documentation: |-
    Sets up OADP for HyperShift backup/restore tests on AKS.
