ref:
  as: hypershift-azure-aks-oadp-destroy
  from: upi-installer
  cli: latest
  commands: hypershift-azure-aks-oadp-destroy-commands.sh
  best_effort: true
  timeout: 5m
  resources:
    requests:
      cpu: 300m
      memory: 300Mi
  credentials:
  - mount_path: /etc/hypershift-ci-jobs-azurecreds
    name: hypershift-ci-jobs-azurecreds
    namespace: test-credentials
  documentation: |-
    Cleans up Azure OADP resources created by hypershift-azure-aks-oadp-setup.
    Deletes the dynamically created storage account used for OADP backups.
