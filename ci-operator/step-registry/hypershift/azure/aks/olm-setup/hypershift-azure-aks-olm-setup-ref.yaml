ref:
  as: hypershift-azure-aks-olm-setup
  from: upi-installer
  cli: latest
  commands: hypershift-azure-aks-olm-setup-commands.sh
  resources:
    requests:
      cpu: 300m
      memory: 300Mi
  env:
  - name: OLM_VERSION
    documentation: |-
      The version of OLM to install on the AKS cluster.
    default: v0.31.0
  documentation: |-
    Installs OLM and labels nodes on an AKS cluster. AKS clusters do not have
    OLM pre-installed, so this step installs OLM and labels nodes with
    master/worker roles.
