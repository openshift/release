ref:
  as: hypershift-azure-run-e2e-self-managed
  cli: latest
  commands: hypershift-azure-run-e2e-self-managed-commands.sh
  credentials:
    - mount_path: /etc/ci-pull-credentials
      name: ci-pull-credentials
      namespace: test-credentials
    - mount_path: /etc/hypershift-additional-pull-secret
      name: hypershift-additional-pull-secret
      namespace: test-credentials
    - mount_path: /etc/hypershift-kubeconfig-azure
      name: azure-hypershift-ci
      namespace: test-credentials
    - mount_path: /etc/hypershift-ci-jobs-self-managed-azure
      name: hypershift-ci-jobs-self-managed-azure
      namespace: test-credentials
    - mount_path: /etc/hypershift-ci-jobs-self-managed-azure-e2e
      name: hypershift-ci-jobs-self-managed-azure-e2e
      namespace: test-credentials
    - mount_path: /etc/hypershift-ci-jobs-azurecreds
      name: hypershift-ci-jobs-azurecreds
      namespace: test-credentials
  dependencies:
    - env: OCP_IMAGE_LATEST
      name: release:latest
    - env: OCP_IMAGE_PREVIOUS
      name: release:initial
    - env: OCP_IMAGE_N1
      name: release:latest
    - env: OCP_IMAGE_N2
      name: release:latest
  env:
    - default: ${SHARED_DIR}/management_cluster_kubeconfig
      name: KUBECONFIG
    - default: ${SHARED_DIR}/management_cluster_name
      name: MGMT_HC_NAME
    - default: ${SHARED_DIR}/management_cluster_namespace
      name: MGMT_HC_NAMESPACE
    - default: /etc/hypershift-kubeconfig-azure/hypershift-ops-admin.kubeconfig
      name: MGMT_PARENT_KUBECONFIG
    - default: "centralus"
      name: HYPERSHIFT_AZURE_LOCATION
    - default: ""
      name: HYPERSHIFT_EXTERNAL_DNS_DOMAIN
    - default: ""
      name: CI_TESTS_RUN
    - default: ""
      name: HYPERSHIFT_AZURE_ZONES
      documentation: "Comma-separated list of Azure availability zones for hosted clusters (e.g., '1,2,3'). Passed as --e2e.availability-zones."
    - default: ""
      name: HYPERSHIFT_ETCD_STORAGE_CLASS
      documentation: "Storage class for etcd persistent volumes (e.g., 'managed-csi-premium'). Passed as --e2e.etcd-storage-class."
    - default: ""
      name: AZURE_PRIVATE_CREDS_FILE
      documentation: "Path to Azure credentials file for managing Private Link Service resources. Passed as --e2e.azure-private-credentials-file."
    - default: ""
      name: AZURE_PLS_RESOURCE_GROUP
      documentation: "Azure resource group of the management cluster where Private Link Services reside. Passed as --e2e.azure-pls-resource-group."
    - default: ""
      name: AZURE_PRIVATE_NAT_SUBNET_ID
      documentation: "Azure resource ID of the NAT subnet for Private Link Service. Exported as env var for TestAzurePrivateTopology."
    - default: ""
      name: E2E_RESOURCE_REQUEST_OVERRIDES
      documentation: "Set to '1' to add CPU resource request override annotations to e2e HostedClusters, preventing scheduler over-packing on management nodes."
  from: hypershift-tests
  grace_period: 30m0s
  resources:
    requests:
      cpu: 100m
      memory: 100Mi
  timeout: 2h0m0s
