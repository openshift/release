ref:
  as: hypershift-hostedcluster-fips-check
  from: cli
  commands: hypershift-hostedcluster-fips-check-commands.sh
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
  documentation: >-
    This step checks that FIPS is enabled on all nodes of the HyperShift hosted cluster.
    It uses the nested_kubeconfig from SHARED_DIR to connect to the hosted cluster.
