chain:
  as: hypershift-hostedcluster-create
  steps:
  - ref: hypershift-hostedcluster-create-hostedcluster
  - ref: hypershift-hostedcluster-create-wait-for-olm
  env:
    - name: HYPERSHIFT_NODE_COUNT
      default: "1"
    - name: GUEST_FEATURE_SET
      default: ""
      documentation: "This field sets the cluster feature set. This is used to enable custom features such as tech preview features. Supported options: '', 'TechPreviewNoUpgrade', 'DevPreviewNoUpgrade', 'CustomNoUpgrade'"
