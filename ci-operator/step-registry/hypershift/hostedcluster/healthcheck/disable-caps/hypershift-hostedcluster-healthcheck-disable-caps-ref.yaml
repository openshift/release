ref:
  as: hypershift-hostedcluster-healthcheck-disable-caps
  cli: latest
  env:
  - name: HC_DISABLED_CAPS
    default: ""
    documentation: "Disabling Capabilities health check in Hosted Cluster, detail see https://issues.redhat.com/browse/MGMT-20628"
  commands: hypershift-hostedcluster-healthcheck-disable-caps-commands.sh
  from_image:
    namespace: ci
    name: "hypershift-cli"
    tag: "latest"
  grace_period: 5m0s
  resources:
    requests:
      cpu: 100m
      memory: 100Mi
  documentation: |
    Checking disable capability list for Hosted Cluster from ENV var HC_DISABLE_CAPS, pass it into the workflow using env expansion in Prow
