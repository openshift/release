chain:
  as: hypershift-e2e-backuprestore
  steps:
  - as: tests
    cli: latest
    commands: |-
      export KUBECONFIG="${SHARED_DIR}/kubeconfig"
      export E2E_HOSTED_CLUSTER_NAME=$(cat ${SHARED_DIR}/cluster-name)
      export E2E_HOSTED_CLUSTER_NAMESPACE=${E2E_HOSTED_CLUSTER_NAMESPACE:-clusters}
      bin/test-backuprestore \
        --ginkgo.v \
        --ginkgo.junit-report=${ARTIFACT_DIR}/junit_backuprestore_report.xml \
        --ginkgo.label-filter="backup-restore && agent" \
        --ginkgo.fail-fast=true \
        --ginkgo.timeout=2h \
        --ginkgo.no-color=true
    timeout: 2h30m
    grace_period: 5m
    from: hypershift-tests
    env:
    - name: E2E_HOSTED_CLUSTER_NAMESPACE
      default: clusters
      documentation: "The namespace where the hosted cluster is created."
    resources:
      requests:
        cpu: "1"
        memory: 200Mi
  documentation: |-
    Runs the HyperShift backup/restore E2E test suite using the pre-built
    hypershift-tests image. The test binary auto-detects the hosted cluster
    platform (AWS or Agent) and runs platform-specific backup/restore logic,
    including inclusion of the Agent namespace in backup/restore scope for
    Agent-based clusters.

    Requires OADP to be already set up (DPA, BSL, VSL) before this chain runs.
    For bare-metal Agent clusters, use hypershift-mce-agent-oadp-v2-setup.
    For AWS clusters, use hypershift-aws-oadp-setup.
