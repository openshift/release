ref:
  as: hypershift-jira-agent-setup
  from: hypershift-jira-agent
  commands: hypershift-jira-agent-setup-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  env:
  - name: CLAUDE_CODE_USE_VERTEX
    default: "1"
    documentation: |-
      Enable Vertex AI for Claude Code.
  - name: CLOUD_ML_REGION
    default: "us-east5"
    documentation: |-
      Google Cloud region for Vertex AI.
  - name: ANTHROPIC_VERTEX_PROJECT_ID
    default: "openshift-ci-data-analysis"
    documentation: |-
      Google Cloud project ID for Vertex AI authentication.
  - name: GOOGLE_APPLICATION_CREDENTIALS
    default: "/var/run/claude-code-service-account/json"
    documentation: |-
      Path to the Google Cloud service account JSON key file for Vertex AI authentication.
  credentials:
  - namespace: test-credentials
    name: ci-claude-code-service-account
    mount_path: /var/run/claude-code-service-account
  - namespace: test-credentials
    name: hypershift-jira-agent-github-token
    mount_path: /var/run/vault/hypershift-jira-agent-github-token
  - namespace: test-credentials
    name: hypershift-jira-agent-jira-token
    mount_path: /var/run/vault/hypershift-jira-agent-jira-token
  documentation: |-
    Setup step for the HyperShift Jira agent periodic job.
    This step:
    - Clones the HyperShift repository
    - Configures git credentials for creating commits
    - Sets up GitHub CLI authentication
    - Verifies Claude Code CLI is available
    - Configures authentication via Vertex AI
