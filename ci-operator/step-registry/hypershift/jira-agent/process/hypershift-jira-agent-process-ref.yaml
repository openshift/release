ref:
  as: hypershift-jira-agent-process
  from: hypershift-jira-agent
  commands: hypershift-jira-agent-process-commands.sh
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
  env:
  - name: JIRA_AGENT_MAX_ISSUES
    default: "1"
    documentation: |-
      Maximum number of Jira issues to process per run.
  - name: CLAUDE_CODE_USE_VERTEX
    default: "1"
    documentation: |-
      Enable Vertex AI for Claude Code.
  - name: CLOUD_ML_REGION
    default: "us-east5"
    documentation: |-
      Google Cloud region for Vertex AI.
  - name: ANTHROPIC_VERTEX_PROJECT_ID
    default: "openshift-ci-data-analysis"
    documentation: |-
      Google Cloud project ID for Vertex AI authentication.
  - name: GOOGLE_APPLICATION_CREDENTIALS
    default: "/var/run/claude-code-service-account/json"
    documentation: |-
      Path to the Google Cloud service account JSON key file for Vertex AI authentication.
  credentials:
  - namespace: test-credentials
    name: ci-claude-code-service-account
    mount_path: /var/run/claude-code-service-account
  - namespace: test-credentials
    name: hypershift-jira-agent-github-token
    mount_path: /var/run/vault/hypershift-jira-agent-github-token
  - namespace: test-credentials
    name: hypershift-jira-agent-jira-token
    mount_path: /var/run/vault/hypershift-jira-agent-jira-token
  documentation: |-
    Process step for the HyperShift Jira agent periodic job.
    This step:
    - Queries Jira for issues with label 'issue-for-agent'
    - Loads state from ConfigMap to avoid reprocessing issues
    - For each unprocessed issue, runs the /jira:solve command (from ai-helpers plugin) non-interactively
    - Records success/failure in state
    - Updates ConfigMap with processed issues
    - Implements rate limiting between issues
