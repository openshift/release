ref:
  as: hypershift-aws-oadp-destroy
  from: upi-installer
  cli: latest
  commands: hypershift-aws-oadp-destroy-commands.sh
  best_effort: true
  timeout: 5m
  resources:
    requests:
      cpu: 300m
      memory: 300Mi
  credentials:
  - mount_path: /etc/hypershift-ci-jobs-awscreds
    name: hypershift-ci-jobs-awscreds
    namespace: test-credentials
  env:
  - name: OADP_AWS_REGION
    documentation: |-
      The AWS region for the S3 bucket.
    default: us-east-1
  documentation: |-
    Cleans up AWS OADP resources created by hypershift-aws-oadp-setup.
    Deletes the S3 bucket used for OADP backup storage.
