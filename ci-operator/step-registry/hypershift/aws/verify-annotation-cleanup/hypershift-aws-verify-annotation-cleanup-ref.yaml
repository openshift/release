ref:
  as: hypershift-aws-verify-annotation-cleanup
  cli: latest
  from_image:
    namespace: ci
    name: "hypershift-cli"
    tag: "latest"
  env:
  - name: HYPERSHIFT_AWS_REGION
    default: "us-east-1"
    documentation: "The AWS region for the HostedCluster."
  - name: HYPERSHIFT_BASE_DOMAIN
    default: ""
    documentation: "A fully-qualified domain or subdomain name."
  - name: HYPERSHIFT_GUEST_INFRA_OCP_ACCOUNT
    default: "false"
    documentation: "Whether to use the generic CI account or the HyperShift OSD account for the guest clusters infra."
  commands: hypershift-aws-verify-annotation-cleanup-commands.sh
  timeout: 45m0s
  credentials:
  - mount_path: /etc/hypershift-ci-jobs-awscreds
    name: hypershift-ci-jobs-awscreds
    namespace: test-credentials
  resources:
    requests:
      cpu: 100m
      memory: 100Mi
