ref:
  as: hypershift-aws-verify-annotation-cleanup
  cli: latest
  from: hypershift-operator
  env:
  - name: HYPERSHIFT_NODE_COUNT
    default: "2"
    documentation: "The number of nodes for the HostedCluster."
  - name: HYPERSHIFT_AWS_REGION
    default: "us-east-1"
    documentation: "The AWS region for the HostedCluster."
  - name: HYPERSHIFT_BASE_DOMAIN
    default: ""
    documentation: "A fully-qualified domain or subdomain name."
  commands: hypershift-aws-verify-annotation-cleanup-commands.sh
  credentials:
  - mount_path: /etc/hypershift-ci-jobs-awscreds
    name: hypershift-ci-jobs-awscreds
    namespace: test-credentials
  - mount_path: /etc/ci-pull-credentials
    name: ci-pull-credentials
    namespace: test-credentials
  dependencies:
  - name: "release:latest"
    env: RELEASE_IMAGE_LATEST
  timeout: 90m0s
  resources:
    requests:
      cpu: 100m
