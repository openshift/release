workflow:
  as: hypershift-aws-verify-annotation-cleanup
  documentation: |-
    Verifies OCPBUGS-78979: referenced-resource annotations on secrets and
    configmaps are properly cleaned up when a HostedCluster is deleted,
    regardless of whether the HostedControlPlane is deleted first.

    Uses the standard hypershift-aws-create chain to provision a HostedCluster,
    then verifies annotations are set, destroys the cluster, and confirms all
    annotations are removed. The hypershift-aws-destroy chain in post serves
    as a safety net for cleanup.
  steps:
    pre:
    - ref: ipi-install-rbac
    - chain: hypershift-setup-nested-management-cluster
    - ref: hypershift-install
    - chain: hypershift-aws-create
    post:
    - chain: hypershift-dump
    - chain: hypershift-aws-destroy
    - chain: hypershift-destroy-nested-management-cluster
    test:
    - ref: hypershift-aws-verify-annotation-cleanup
