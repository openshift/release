workflow:
  as: hypershift-aws-e2e-spot
  documentation: |-
    The HyperShift AWS spot instance e2e workflow verifies the spot instance
    feature (OCPSTRAT-1677 / CNTRLPLANE-1388). It creates a management cluster,
    sets up SQS infrastructure, creates a HostedCluster with a spot NodePool,
    and runs comprehensive verification checks.
  steps:
    pre:
    - ref: ipi-install-rbac
    - chain: hypershift-setup-nested-management-cluster
    - ref: hypershift-install
    - ref: hypershift-aws-spot-sqs-setup
    - chain: hypershift-aws-create
    - ref: hypershift-aws-spot-setup
    test:
    - ref: hypershift-aws-spot-verify
    post:
    - ref: hypershift-aws-spot-sqs-cleanup
    - chain: hypershift-aws-destroy
    - chain: hypershift-destroy-nested-management-cluster
