workflow:
  as: hypershift-aws-e2e-external-cntrlplane-2914
  documentation: |-
    The HyperShift AWS e2e workflow for testing CNTRLPLANE-2914 with custom
    HyperShift operator and control plane operator images.

    This workflow uses custom images:
    - HyperShift Operator: quay.io/wangke19/hypershift:CNTRLPLANE-2914
    - Control Plane Operator: quay.io/wangke19/hypershift:CNTRLPLANE-2914-control-plane
  steps:
    post:
    - chain: hypershift-destroy-nested-management-cluster
    test:
    - ref: hypershift-aws-run-e2e-external-cntrlplane-2914
    pre:
    - ref: ipi-install-rbac
    - chain: hypershift-setup-nested-management-cluster
    - ref: hypershift-install-cntrlplane-2914
