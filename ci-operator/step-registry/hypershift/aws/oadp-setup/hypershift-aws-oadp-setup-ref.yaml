ref:
  as: hypershift-aws-oadp-setup
  from: upi-installer
  cli: latest
  commands: hypershift-aws-oadp-setup-commands.sh
  resources:
    requests:
      cpu: 300m
      memory: 300Mi
  credentials:
  - mount_path: /etc/hypershift-ci-jobs-awscreds
    name: hypershift-ci-jobs-awscreds
    namespace: test-credentials
  env:
  - name: OADP_S3_BUCKET_NAME
    documentation: |-
      The S3 bucket name used for OADP backup storage.
      If empty, a bucket will be created using the cluster name.
    default: ""
  - name: OADP_AWS_REGION
    documentation: |-
      The AWS region for the S3 bucket and volume snapshot location.
    default: us-east-1
  documentation: |-
    Sets up AWS-specific OADP prerequisites for HyperShift backup/restore tests:
    creates an S3 bucket, AWS credentials secret, DataProtectionApplication,
    BackupStorageLocation, and VolumeSnapshotLocation.
