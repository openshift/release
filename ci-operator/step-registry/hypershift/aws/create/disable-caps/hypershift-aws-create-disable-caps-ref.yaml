ref:
  as: hypershift-aws-create-disable-caps
  cli: latest
  env:
  - name: HC_DISABLED_CAPS
    default: ""
    documentation: "Disabling Capabilities in Hosted Cluster,format: 'Console,ImageRegistry...' detail see https://issues.redhat.com/browse/MGMT-20628"
  commands: hypershift-aws-create-disable-caps-commands.sh
  from: hypershift-operator
  grace_period: 5m0s
  resources:
    requests:
      cpu: 100m
      memory: 100Mi
  documentation: |
    Dynamically generate a valid Disable capability list for Hosted Cluster and save it into var HC_DISABLE_CAPS, pass it into the workflow using env expansion in Prow