ref:
  as: hypershift-aws-create-cluster-byoi
  from: hypershift-operator
  cli: latest
  commands: hypershift-aws-create-cluster-byoi-commands.sh
  timeout: 35m0s
  grace_period: 5m0s
  credentials:
  - mount_path: /etc/hypershift-ci-jobs-awscreds
    name: hypershift-ci-jobs-awscreds
    namespace: test-credentials
  - mount_path: /etc/ci-pull-credentials
    name: ci-pull-credentials
    namespace: test-credentials
  dependencies:
  - name: "release:latest"
    env: RELEASE_IMAGE_LATEST
  - name: hypershift-operator
    env: HYPERSHIFT_RELEASE_LATEST
  resources:
    requests:
      cpu: 100m
      memory: 100Mi
  env:
  - name: HYPERSHIFT_NODE_COUNT
    default: "3"
    documentation: "The number nodes to automatically create and join to the cluster."
  - name: HYPERSHIFT_BASE_DOMAIN
    default: ""
    documentation: "The cluster's FQDN will be a subdomain of the base domain."
  - name: HYPERSHIFT_AWS_REGION
    default: "us-east-1"
    documentation: "Specifies the AWS region for the cluster."
  - name: HYPERSHIFT_INSTANCE_TYPE
    default: "m5.xlarge"
    documentation: "Instance type for the cluster nodes"
  - name: HYPERSHIFT_GUEST_INFRA_OCP_ACCOUNT
    default: "false"
    documentation: "Whether to use the generic CI account or the HyperShift OSD account."
  - name: HYPERSHIFT_HC_RELEASE_IMAGE
    default: ""
    documentation: "Release image used for the HostedCluster. Empty by default it will use release:latest"
  - name: ENDPOINT_ACCESS
    default: "Public"
    documentation: "Access for control plane endpoints (Public, PublicAndPrivate, Private)"
  - name: HYPERSHIFT_CP_AVAILABILITY_POLICY
    default: "SingleReplica"
    documentation: "Availability policy for hosted cluster components. Supported options: SingleReplica, HighlyAvailable"
  - name: HYPERSHIFT_INFRA_AVAILABILITY_POLICY
    default: "SingleReplica"
    documentation: "Availability policy for infrastructure services in guest cluster. Supported options: SingleReplica, HighlyAvailable"
  documentation: |-
    The hypershift-aws-create-cluster-byoi step creates a HostedCluster using pre-created AWS infrastructure
    and IAM resources from previous steps (hypershift-aws-create-infra and hypershift-aws-create-iam).

    This step uses the 'hypershift create cluster aws' command with the --infra-json and --iam-json flags
    to consume the infrastructure created separately, enabling testing of infrastructure creation as a
    distinct step from cluster creation.

    Requires:
    - ${SHARED_DIR}/aws_infra_output.json - Infrastructure resource IDs
    - ${SHARED_DIR}/aws_iam_output.json - IAM resource identifiers
    - ${SHARED_DIR}/cluster-name - Cluster name

    Outputs:
    - ${SHARED_DIR}/nested_kubeconfig - Guest cluster kubeconfig
