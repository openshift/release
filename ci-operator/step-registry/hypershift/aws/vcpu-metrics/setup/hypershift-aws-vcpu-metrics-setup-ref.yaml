ref:
  as: hypershift-aws-vcpu-metrics-setup
  from: hypershift-operator
  cli: latest
  env:
  - name: OVERRIDE_HO_IMAGE
    default: ""
    documentation: "If set, patches the hypershift-operator deployment to use this image after installation"
  commands: hypershift-aws-vcpu-metrics-setup-commands.sh
  grace_period: 1m0s
  resources:
    requests:
      cpu: 100m
      memory: 100Mi
  timeout: 10m0s
  documentation: |-
    Patches the hypershift-operator deployment with a custom image (if OVERRIDE_HO_IMAGE is set)
    and creates the rosa-cpus-instance-types-config ConfigMap for vCPU metrics verification.
