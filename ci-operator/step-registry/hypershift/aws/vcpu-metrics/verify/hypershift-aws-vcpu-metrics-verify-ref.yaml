ref:
  as: hypershift-aws-vcpu-metrics-verify
  from: hypershift-operator
  cli: latest
  best_effort: true
  commands: hypershift-aws-vcpu-metrics-verify-commands.sh
  grace_period: 1m0s
  resources:
    requests:
      cpu: 100m
      memory: 100Mi
  timeout: 15m0s
