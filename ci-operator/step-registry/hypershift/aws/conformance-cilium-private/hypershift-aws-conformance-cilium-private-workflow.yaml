workflow:
  as: hypershift-aws-conformance-cilium-private
  documentation: |-
    The HyperShift AWS conformance Cilium private workflow executes conformance tests
    against an ephemeral private HyperShift cluster with Cilium CNI installed.
  steps:
    env:
      HYPERSHIFT_NETWORK_TYPE: "Other"
      HYPERSHIFT_FEATURE_SET: TechPreviewNoUpgrade
      CNI_PROVIDER: "cilium"
      # NLB tests: DNS resolution failure for VPC endpoints in HyperShift (OCPBUGS-74537)
      # CCO tests: broken test binary missing testdata/credentials_request.yaml (OCPBUGS-84630)
      TEST_SKIPS: Netpol NetworkPolicy between server and client should allow egress
        access to server in CIDR block\|
        Netpol NetworkPolicy between server and client should ensure an IP
        overlapping both IPBlock.CIDR and IPBlock.Except is allowed\|
        Services should serve endpoints on same port and different protocols \[Conformance\]\|
        Netpol NetworkPolicy between server and client should enforce
        except clause while egress access to server in CIDR block\|
        Netpol NetworkPolicy between server and client should deny ingress access to updated pod\|
        Unidling \[apigroup:apps.openshift.io\]\[apigroup:route.openshift.io\]
        should work with UDP\|
        Unidling with Deployments \[apigroup:route.openshift.io\]
        should work with TCP (when fully idled)\|
        Unidling \[apigroup:apps.openshift.io\]\[apigroup:route.openshift.io\]
        should work with TCP (when fully idled)\|
        Unidling with Deployments \[apigroup:route.openshift.io\] should work with UDP\|
        DNS should answer queries using the local DNS endpoint\|
        loadbalancer NLB internal should be reachable with hairpinning traffic\|
        loadbalancer NLB should be reachable with target-node-labels\|
        Critical-CCO-based flow for olm managed operators and AWS STS\|
        NonHyperShiftHOST-High-CCO metrics endpoint validation\|
        Services should fallback to local terminating endpoints when there are no ready endpoints with externalTrafficPolicy=Local\|
        Services should be rejected when no endpoints exist\|
        Services should be rejected for evicted pods\|
        HAProxy router should pass the http2 tests\|
        \[DRA\] kubelet\|
        \[ovn-kubernetes-ote\]
    pre:
    - chain: cucushift-installer-rehearse-aws-ipi-ovn-hypershift-private-provision
    - ref: cucushift-hypershift-extended-cilium
    - ref: cucushift-hypershift-extended-cilium-network-policies
    - ref: cucushift-hypershift-extended-cilium-health-check
    - chain: cucushift-hypershift-extended-enable-qe-catalogsource
    - ref: cucushift-hypershift-extended-enable-guest
    - ref: cucushift-installer-reportportal-marker
    test:
    - chain: hypershift-conformance
    post:
    - ref: cucushift-hypershift-extended-disable-guest
    - chain: cucushift-installer-rehearse-aws-ipi-ovn-hypershift-private-deprovision
    - ref: send-results-to-reportportal
