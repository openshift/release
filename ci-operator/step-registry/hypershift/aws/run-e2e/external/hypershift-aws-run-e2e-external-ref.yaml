ref:
  as: hypershift-aws-run-e2e-external
  cli: latest
  commands: hypershift-aws-run-e2e-external-commands.sh
  credentials:
    - mount_path: /etc/hypershift-pool-aws-credentials
      name: hypershift-pool-aws-credentials
      namespace: test-credentials
    - mount_path: /etc/ci-pull-credentials
      name: ci-pull-credentials
      namespace: test-credentials
    - mount_path: /etc/hypershift-additional-pull-secret
      name: hypershift-additional-pull-secret
      namespace: test-credentials
  dependencies:
    - env: OCP_IMAGE_LATEST
      name: release:latest
    - env: OCP_IMAGE_PREVIOUS
      name: release:initial
    - env: OCP_IMAGE_N1
      name: release:latest
    - env: OCP_IMAGE_N2
      name: release:latest
    - env: OCP_IMAGE_N3
      name: release:latest
    - env: OCP_IMAGE_N4
      name: release:latest
  env:
    - default: "false"
      name: DISABLE_PKI_RECONCILIATION
    - default: ${SHARED_DIR}/kubeconfig
      name: KUBECONFIG
    - default: "^(TestCreateCluster|TestUpgradeControlPlane)$"
      name: CI_TESTS_RUN
    - default: "false"
      name: AWS_MULTI_ARCH
    - default: "false"
      name: REQUEST_SERVING_COMPONENT_TEST
    - default: "0"
      name: TEST_CPO_OVERRIDE
    - default: ""
      name: OAUTH_EXTERNAL_OIDC_PROVIDER
      documentation: "supported value: keycloak, azure"
  from: hypershift-tests
  grace_period: 30m0s
  resources:
    requests:
      cpu: 100m
      memory: 100Mi
  timeout: 2h0m0s
