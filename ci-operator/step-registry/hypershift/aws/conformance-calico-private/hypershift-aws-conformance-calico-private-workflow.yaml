workflow:
  as: hypershift-aws-conformance-calico-private
  documentation: |-
    Provisions a private HyperShift hosted cluster on AWS with Calico CNI
    and runs OpenShift conformance tests against it.
  steps:
    env:
      HYPERSHIFT_NETWORK_TYPE: "Other"
      HYPERSHIFT_FEATURE_SET: TechPreviewNoUpgrade
      CNI_PROVIDER: "calico"
      TEST_ARGS: --disable-monitor=apiserver-incluster-availability
      TEST_SKIPS: The default cluster RBAC policy should have correct RBAC rules\|
        balancer healthcheck port and path should be 10256/healthz\| Prometheus \[apigroup:image.openshift.io\]
        when installed on the cluster should provide named network metrics\| Unidling
        \[apigroup:apps.openshift.io\]\[apigroup:route.openshift.io\] should work
        with UDP\| Unidling with Deployments \[apigroup:route.openshift.io\] should
        work with TCP (when fully idled)\| Unidling \[apigroup:apps.openshift.io\]\[apigroup:route.openshift.io\]
        should work with TCP (when fully idled)\| Unidling with Deployments \[apigroup:route.openshift.io\]
        should work with UDP\|pod should not start for sysctls not on whitelist \[apigroup:k8s.cni.cncf.io\]
        net.ipv4.conf.IFNAME.arp_filter\| pod should not start for sysctls not on
        whitelist \[apigroup:k8s.cni.cncf.io\] net.ipv4.conf.all.send_redirects\|
        sysctl allowlist update should start a pod with custom sysctl only when the
        sysctl is added to whitelist\|Ensure HTTPRoute object is created\| loadbalancer
        NLB internal should be reachable with hairpinning traffic\| loadbalancer NLB
        should be reachable with target-node-labels\| Critical-CCO-based flow for
        olm managed operators and AWS STS\|The HAProxy router should pass the http2
        tests
    pre:
    - chain: hypershift-aws-private-provision
    - ref: hypershift-calico-install
    - ref: hypershift-calico-health-check
    - chain: hypershift-enable-qe-catalogsource
    - ref: hypershift-enable-guest
    test:
    - chain: hypershift-conformance
    post:
    - ref: hypershift-disable-guest
    - chain: hypershift-aws-private-deprovision
