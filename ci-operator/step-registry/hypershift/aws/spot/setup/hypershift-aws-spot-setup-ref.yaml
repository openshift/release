ref:
  as: hypershift-aws-spot-setup
  cli: latest
  commands: hypershift-aws-spot-setup-commands.sh
  from: hypershift-tests
  env:
    - default: "us-east-1"
      name: AWS_REGION
      documentation: "AWS region for the cluster"
  grace_period: 5m0s
  resources:
    requests:
      cpu: 100m
      memory: 100Mi
  timeout: 15m0s
  documentation: |-
    Patches a HostedCluster with terminationHandlerQueueURL and annotates
    the existing NodePool with enable-spot. Waits for the spot
    MachineHealthCheck and NTH deployment to be created.
