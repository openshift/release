ref:
  as: hypershift-aws-spot-verify
  commands: hypershift-aws-spot-verify-commands.sh
  credentials:
    - mount_path: /etc/hypershift-pool-aws-credentials
      name: hypershift-pool-aws-credentials
      namespace: test-credentials
  env:
    - default: ${SHARED_DIR}/management_cluster_kubeconfig
      name: KUBECONFIG
    - default: "us-east-1"
      name: AWS_REGION
      documentation: "AWS region for verification checks"
  from: hypershift-tests
  grace_period: 10m0s
  resources:
    requests:
      cpu: 100m
      memory: 100Mi
  timeout: 15m0s
