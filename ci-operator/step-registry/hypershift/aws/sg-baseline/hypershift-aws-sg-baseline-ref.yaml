ref:
  as: hypershift-aws-sg-baseline
  cli: latest
  commands: hypershift-aws-sg-baseline-commands.sh
  credentials:
    - mount_path: /etc/hypershift-pool-aws-credentials
      name: hypershift-pool-aws-credentials
      namespace: test-credentials
  env:
    - name: HYPERSHIFT_AWS_REGION
      default: "us-east-1"
      documentation: "The AWS region to check for security groups."
  from: upi-installer
  grace_period: 1m0s
  resources:
    requests:
      cpu: 100m
      memory: 100Mi
  timeout: 5m0s
