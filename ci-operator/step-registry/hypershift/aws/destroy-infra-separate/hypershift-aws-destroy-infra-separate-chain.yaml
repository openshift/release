chain:
  as: hypershift-aws-destroy-infra-separate
  steps:
  - chain: hypershift-dump
  - chain: hypershift-aws-destroy
  - ref: hypershift-aws-destroy-infra
  documentation: |-
    The hypershift-aws-destroy-infra-separate chain cleans up a HyperShift cluster
    and its separately-created AWS infrastructure.

    This chain:
    1. Dumps cluster artifacts for debugging
    2. Destroys the HostedCluster
    3. Destroys the AWS infrastructure (VPC, IAM, etc.) created via hypershift-aws-create-infra
