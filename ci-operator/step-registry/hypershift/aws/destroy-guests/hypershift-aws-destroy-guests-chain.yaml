chain:
  as: hypershift-aws-destroy-guests
  steps:
  - as: destroy-guests
    best_effort: true
    cli: latest
    env:
    - name: HYPERSHIFT_AWS_REGION
      default: "us-east-1"
      documentation: "AWS region for the hosted clusters."
    - name: HYPERSHIFT_PLATFORM
      default: ""
      documentation: "The cloud platform for the clusters (e.g. aws). Set in the workflow env block."
    commands: |-
      set -xuo pipefail
      export KUBECONFIG="${SHARED_DIR}/management_cluster_kubeconfig"
      export HYPERSHIFT_BINARY="${HYPERSHIFT_BINARY:-/hypershift/bin/hypershift}"
      export AWS_SHARED_CREDENTIALS_FILE="/etc/hypershift-ci-jobs-awscreds/credentials"
      /hypershift/bin/destroy-guests
    from: hypershift-tests
    grace_period: 5m0s
    resources:
      requests:
        cpu: 100m
        memory: 100Mi
    timeout: 2h0m0s
    credentials:
    - mount_path: /etc/hypershift-ci-jobs-awscreds
      name: hypershift-ci-jobs-awscreds
      namespace: test-credentials
