ref:
  as: hypershift-aws-verify-ocm-controllers
  cli: latest
  env:
  - name: HYPERSHIFT_NODE_COUNT
    default: "2"
    documentation: "The number nodes to automatically create and join to the cluster."
  - name: HYPERSHIFT_BASE_DOMAIN
    default: ""
    documentation: "The base domain for the HostedCluster. If empty, reads from cluster profile baseDomain file."
  - name: HYPERSHIFT_AWS_REGION
    default: "us-east-1"
    documentation: "The AWS region of the cluster."
  - name: HYPERSHIFT_HC_RELEASE_IMAGE
    default: ""
    documentation: "Release image used for the HostedCluster. Empty by default it will use release:latest"
  - name: CPO_IMAGE
    default: ""
    documentation: "Control plane operator image override. When set, the HostedCluster will use this CPO image instead of the one from the release payload."
  commands: hypershift-aws-verify-ocm-controllers-commands.sh
  from_image:
    namespace: ci
    name: "hypershift-cli"
    tag: "latest"
  grace_period: 5m0s
  leases:
    - resource_type: hypershift-hive-quota-slice
      env: HYPERSHIFT_HIVE_LEASED_RESOURCE
  resources:
    requests:
      cpu: 100m
      memory: 100Mi
  timeout: 90m0s
  best_effort: true
  credentials:
  - mount_path: /etc/hypershift-ci-jobs-awscreds
    name: hypershift-ci-jobs-awscreds
    namespace: test-credentials
  - mount_path: /etc/ci-pull-credentials
    name: ci-pull-credentials
    namespace: test-credentials
  - mount_path: /etc/registry-pull-credentials
    name: registry-pull-credentials
    namespace: test-credentials
  - mount_path: /var/run/hypershift-workload-credentials
    name: hypershift-workload-credentials
    namespace: test-credentials
  dependencies:
  - name: "release:latest"
    env: RELEASE_IMAGE_LATEST
  - name: "stable:hypershift"
    env: HYPERSHIFT_RELEASE_LATEST
