ref:
  as: hypershift-aws-verify-cvo-manifests
  cli: latest
  commands: hypershift-aws-verify-cvo-manifests-commands.sh
  env:
    - name: EXPECTED_FEATURE_SET
      default: "Default"
      documentation: "The expected feature set for the hosted cluster (e.g., Default, TechPreviewNoUpgrade)"
  from: hypershift-operator
  grace_period: 1m0s
  resources:
    requests:
      cpu: 100m
      memory: 100Mi
  timeout: 10m0s
