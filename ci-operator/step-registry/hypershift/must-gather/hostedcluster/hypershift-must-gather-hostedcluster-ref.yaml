ref:
  as: hypershift-must-gather-hostedcluster
  optional_on_success: true
  from: cli
  commands: hypershift-must-gather-hostedcluster-commands.sh
  env:
  - name: KUBECONFIG
    default: ${SHARED_DIR}/nested_kubeconfig
    documentation: Kubeconfig for the hosted cluster.
  - name: MUST_GATHER_TIMEOUT
    default: "15m"
    documentation: A timeout for oc adm must-gather command.
  - name: MUST_GATHER_IMAGE
    default: ""
    documentation: Override the must-gather image.
  - name: EXTRA_MG_ARGS
    default: ""
    documentation: Extra args to pass to the must-gather command.
  resources:
    requests:
      cpu: 300m
      memory: 300Mi
  timeout: 2h
  documentation: |-
    Runs must-gather against the hosted cluster to collect diagnostic artifacts.
