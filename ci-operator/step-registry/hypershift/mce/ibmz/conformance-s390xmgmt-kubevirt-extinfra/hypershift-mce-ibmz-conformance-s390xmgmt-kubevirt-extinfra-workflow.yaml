workflow:
  as: hypershift-mce-ibmz-conformance-s390xmgmt-kubevirt-extinfra
  documentation: |-
    Phase 1 workflow that provisions two ephemeral OpenShift clusters on libvirt:
    a management cluster and an external infrastructure (infra) cluster. This is the
    foundation for HyperShift KubeVirt on external infrastructure testing.
  steps:
    allow_best_effort_post_steps: true
    leases:
    - resource_type: libvirt-s390x-quota-slice
      env: LEASED_RESOURCE          # mgmt cluster host
    - resource_type: libvirt-s390x-quota-slice
      env: LEASED_RESOURCE_INFRA    # infra cluster host
    pre:
    # ── Management cluster (CLUSTER_ROLE=mgmt, uses $LEASED_RESOURCE) ────
    - ref: upi-libvirt-cleanup-pre
    - chain: upi-conf-libvirt
    - ref: ipi-debug-missing-static-pod-controller-degraded
    - ref: ipi-conf-etcd-on-ramfs
    - chain: upi-install-libvirt

    # ── Infra cluster (CLUSTER_ROLE=infra, uses $LEASED_RESOURCE_INFRA) ──
    - ref: upi-libvirt-cleanup-pre-infra
    - chain: upi-conf-libvirt-infra
    - ref: ipi-debug-missing-static-pod-controller-degraded-infra
    - ref: ipi-conf-etcd-on-ramfs-infra
    - chain: upi-install-libvirt-infra
    test:
    - ref: hypershift-mce-ibmz-conformance-s390xmgmt-kubevirt-extinfra-test-print
    post:
    - ref: ipi-conf-debug-kdump-gather-logs
    - chain: gather
    - ref: upi-libvirt-cleanup-post
    - ref: upi-libvirt-cleanup-post-infra
