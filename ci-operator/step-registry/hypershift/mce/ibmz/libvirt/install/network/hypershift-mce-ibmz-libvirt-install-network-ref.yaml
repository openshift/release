ref:
  as: hypershift-mce-ibmz-libvirt-install-network
  from: libvirt-installer
  commands: hypershift-mce-ibmz-libvirt-install-network-commands.sh
  env:
  - name: CLUSTER_ROLE
    default: "mgmt"
  - name: CLUSTER_SUFFIX
    default: "-mgmt"
  - name: LEASE_PATH_PREFIX
    default: ""
  - name: INFRA_LEASED_RESOURCE
    default: ""
  - name: USE_EXTERNAL_DNS
    default: 'false'
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
  documentation: |-
    Creates the libvirt network for a single cluster in a dual libvirt UPI workflow.
