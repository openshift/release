chain:
  as: hypershift-mce-ibmz-libvirt-conf-infra
  steps:
  - ref: upi-conf-libvirt-network
  - ref: upi-conf-libvirt
  env:
  - name: CLUSTER_ROLE
    default: "infra"
  - name: CLUSTER_SUFFIX
    default: "-infra"
  - name: LEASE_PATH_PREFIX
    default: "infra."
  documentation: |-
    Prepares the external infrastructure cluster using existing UPI libvirt conf steps.
