chain:
  as: hypershift-mce-ibmz-libvirt-conf-infra
  steps:
  - ref: hypershift-mce-ibmz-libvirt-conf-network
  - ref: hypershift-mce-ibmz-libvirt-conf
  env:
  - name: CLUSTER_ROLE
    default: "infra"
  - name: CLUSTER_SUFFIX
    default: "-infra"
  - name: LEASE_PATH_PREFIX
    default: "infra."
    documentation: |-
      When both clusters share a lease, infra network and node metadata live under
      the infra.* keys in the lease file. Ignored when INFRA_LEASED_RESOURCE is set.
  documentation: |-
    Prepares configuration artifacts for the external infrastructure libvirt cluster.
