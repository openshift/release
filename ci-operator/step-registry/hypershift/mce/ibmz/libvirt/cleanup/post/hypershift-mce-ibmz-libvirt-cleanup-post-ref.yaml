ref:
  as: hypershift-mce-ibmz-libvirt-cleanup-post
  from: libvirt-installer
  grace_period: 10m
  best_effort: true
  commands: hypershift-mce-ibmz-libvirt-cleanup-post-commands.sh
  env:
  - name: POOL_NAME
    default: "multiarch-ci-pool"
  - name: HTTPD_POOL_NAME
    default: "httpd"
  - name: INFRA_LEASED_RESOURCE
    default: ""
  resources:
    requests:
      cpu: 1000m
      memory: 300Mi
  dnsConfig:
    nameservers:
    - 172.30.38.188
    searches:
    - "bastion-z.svc.cluster.local"
    - "bastion-ppc64le-libvirt.svc.cluster.local"
  documentation: |-
    Cleans libvirt resources for both mgmt and infra clusters after the job completes.
