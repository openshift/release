ref:
  as: hypershift-mce-ibmz-libvirt-conf
  from: libvirt-installer
  commands: hypershift-mce-ibmz-libvirt-conf-commands.sh
  env:
  - name: ARCH
  - name: CLUSTER_ROLE
    default: "mgmt"
  - name: CLUSTER_SUFFIX
    default: "-mgmt"
  - name: LEASE_PATH_PREFIX
    default: ""
  - name: INFRA_LEASED_RESOURCE
    default: ""
  - name: CONTROL_COUNT
    default: '3'
  - name: COMPUTE_COUNT
    default: '2'
  - name: FIPS_ENABLED
    default: "false"
  - name: FEATURE_SET
    default: ""
  - name: NODE_TUNING
    default: "false"
  - name: USE_EXTERNAL_DNS
    default: 'false'
  - name: OS_IMAGE_STREAM
    default: ""
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
  documentation: |-
    Creates install-config.yaml for a single cluster in a dual libvirt UPI workflow.
