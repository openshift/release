ref:
  as: hypershift-mce-ibmz-libvirt-conf-network
  from: libvirt-installer
  commands: hypershift-mce-ibmz-libvirt-conf-network-commands.sh
  env:
  - name: CLUSTER_ROLE
    default: "mgmt"
    documentation: Cluster role identifier used for artifact paths (mgmt or infra).
  - name: CLUSTER_SUFFIX
    default: "-mgmt"
    documentation: Suffix appended to the lease name for cluster and libvirt resource naming.
  - name: LEASE_PATH_PREFIX
    default: ""
    documentation: |-
      Optional prefix for lease YAML keys when both clusters share one lease.
      Use "infra." for the infra cluster network entries under the same lease.
  - name: INFRA_LEASED_RESOURCE
    default: ""
    documentation: Optional second lease name for the infra cluster.
  - name: INSTALLER_TYPE
    default: 'default'
  - name: USE_EXTERNAL_DNS
    default: 'false'
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
  documentation: |-
    Prepares a per-cluster network.xml for dual libvirt UPI installs.
