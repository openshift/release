chain:
  as: hypershift-mce-ibmz-libvirt-install-mgmt
  steps:
  - chain: upi-install-libvirt
  env:
  - name: ARCH
  - name: BRANCH
  - name: CLUSTER_ROLE
    default: "mgmt"
  - name: CLUSTER_SUFFIX
    default: "-mgmt"
  documentation: |-
    Installs the management cluster using the existing UPI libvirt install chain.
