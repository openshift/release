chain:
  as: hypershift-mce-ibmz-libvirt-install-mgmt
  steps:
  - ref: hypershift-mce-ibmz-libvirt-install-network
  - ref: rhcos-conf-osstream
  - ref: hypershift-mce-ibmz-libvirt-install
  env:
  - name: ARCH
  - name: BRANCH
  - name: CLUSTER_ROLE
    default: "mgmt"
  - name: CLUSTER_SUFFIX
    default: "-mgmt"
  - name: LEASE_PATH_PREFIX
    default: ""
  documentation: |-
    Installs the management OpenShift cluster on libvirt.
