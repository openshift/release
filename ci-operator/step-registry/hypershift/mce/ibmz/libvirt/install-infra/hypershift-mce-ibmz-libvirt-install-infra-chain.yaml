chain:
  as: hypershift-mce-ibmz-libvirt-install-infra
  steps:
  - ref: hypershift-mce-ibmz-libvirt-install-network
  - ref: rhcos-conf-osstream
  - ref: hypershift-mce-ibmz-libvirt-install
  env:
  - name: ARCH
  - name: BRANCH
  - name: CLUSTER_ROLE
    default: "infra"
  - name: CLUSTER_SUFFIX
    default: "-infra"
  - name: LEASE_PATH_PREFIX
    default: "infra."
  - name: INFRA_LEASED_RESOURCE
    default: ""
  documentation: |-
    Installs the external infrastructure OpenShift cluster on libvirt.
