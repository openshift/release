chain:
  as: hypershift-mce-ibmz-libvirt-install-infra
  steps:
  - chain: upi-install-libvirt
  env:
  - name: ARCH
  - name: BRANCH
  - name: CLUSTER_ROLE
    default: "infra"
  - name: CLUSTER_SUFFIX
    default: "-infra"
  - name: LEASE_PATH_PREFIX
    default: "infra."
  - name: INFRA_LEASED_RESOURCE
    default: ""
  documentation: |-
    Installs the external infrastructure cluster using the existing UPI libvirt install chain.
