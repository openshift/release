ref:
  as: hypershift-mce-ibmz-openshift-extended-test-s390x
  from_image:
    namespace: ci
    name: tests-private-s390x
    tag: "4.22-s390x"
  grace_period: 10m
  commands: hypershift-mce-ibmz-openshift-extended-test-s390x-commands.sh
  cli: latest
  timeout: 8h0m0s
  credentials:
    - namespace: test-credentials
      name: tests-private-account
      mount_path: /var/run/vault/tests-private-account
  env:
  - name: KUBEADMIN_REMOVED
    default: "false"
    documentation: "remove kubeadmin user if set true"
  - name: TEST_SCENARIOS
    default: |
        MCO|ETCD|PSAP|SDN|STORAGE|API_Server|Authentication|Cluster_Operator
        Cluster_Infrastructure|OLM|Network_Edge|Operator_SDK
        Workloads|Image_Registry|Container_Engine_Tools|INSTALLER_GENERAL
        NODE|OTA|PerfScale|Cluster_Observability|Security_and_Compliance|LOGGING|OAP|Network_Observability.*Critical
    documentation: |-
      Select the test case. It's a RE pattern and is passed to the 'grep -E'
  - name: TEST_ADDITIONAL
    default: ""
    documentation: |
      It is additional scenario to combine the TEST_SCENARIOS to make final scenarios.
  - name: TEST_FILTERS
    default: "~ChkUpgrade&;~NonPreRelease&;~Serial&;~Disruptive&;~DisconnectedOnly&;~HyperShiftMGMT&;~MicroShiftOnly&"
    documentation: |
      It is filters to select case based on some case attribution which is in case title.
  - name: FILTERS_ADDITIONAL
    default: "~CPaasrunOnly&;~StressTest&"
    documentation: |
      It is additional filters to combine the TEST_FILTERS to make final filters.
  - name: MODULE_FILTERS
    default: ""
    documentation: |
      After test filsters are executed, it is filters to select case for certain moudle.
  - name: TEST_IMPORTANCE
    default: ""
    documentation: it means case IMPORTANCE.
  - name: TEST_TIMEOUT
    default: "15"
    documentation: it means the duration of one case execution.
  - name: TEST_PARALLEL
    default: "6"
    documentation: it means the number of case execution in parallel.
  - name: TEST_ROSA_LOGIN_ENV
    default: "staging"
    documentation: The environment for rosa login. The supported values are [production, staging].
  - name: FORCE_SUCCESS_EXIT
    default: "yes"
    documentation: |-
      Setting this to 'yes' will allow some statements in the scripts not to let the step fail.
  - name: IS_ACTIVE_CLUSTER_OPENSHIFT
    default: "true"
    documentation: |-
      Indicates if the active cluster is an OpenShift cluster or a derivative (e.g., Hypershift, Microshift).
  - name: SHARD_ARGS
    default: ""
    documentation: |-
      Arguments to be passed to 'extended-platform-tests' regarding the sharding parameters of this run
  - name: MULTISTAGE_PARAM_OVERRIDE_NETOBSERV_CS_IMAGE
    default: ""
    documentation: |-
      Specific to Network Observability, to specify CatalogSource Image for NOO
  resources:
    requests:
      cpu: "1"
      memory: 4Gi
    limits:
      memory: 6Gi
  documentation: |-
    openshift-extended-test using tests-private-s390x built by openshift-tests-private images-s390x ci-operator variant.
