workflow:
  as: hypershift-mce-ibmz-openshift-e2e-test-s390xmgmt-kubevirt
  documentation: |-
    The HyperShift mce ibmz openshift e2e test workflow executes tests against a new ephemeral Hypershift kubevirt cluster
    created on ibmz Nodes to validate the cluster creation reaches completed state.
  steps:
    pre:
      - ref: hypershift-mce-ibmz-create-s390xmgmt
      - ref: hypershift-mce-install
      - ref: hypershift-mce-ibmz-install-metallb
      - ref: hypershift-mce-ibmz-install-secondarydisk
      - ref: hypershift-kubevirt-install
      - ref: hypershift-mce-ibmz-install-lso
      - ref: hypershift-kubevirt-install-odf
      - ref: hypershift-mce-ibmz-create-hcpvirt

    test:
      - chain: hypershift-mce-ibmz-test
      #- ref: openshift-extended-test
      #- ref: openshift-extended-web-tests
      #- ref: openshift-e2e-test-qe-report
      #Override the openshift-extended-test step with your custom image
      - as: openshift-extended-test-s390x
        from_image:
          namespace: ci
          name: quay.io/rh-ee-smuthuku/openshift-tests-s390x
          tag: latest
        commands: openshift-extended-test-commands.sh
        credentials:
        - mount_path: /var/run/vault/tests-private-account
          name: tests-private-account
          namespace: test-credentials
        dependencies:
        - env: OPENSHIFT_INSTALL_RELEASE_IMAGE_OVERRIDE
          name: release:latest
        env:
        - name: KUBEADMIN_REMOVED
          default: "false"
        - name: TEST_SCENARIOS
          default: |
              MCO|ETCD|PSAP|SDN|STORAGE|API_Server|Authentication|Cluster_Operator
              Cluster_Infrastructure|OLM|Network_Edge|Operator_SDK
              Workloads|Image_Registry|Container_Engine_Tools|INSTALLER_GENERAL
              NODE|OTA|PerfScale|Cluster_Observability|Security_and_Compliance|LOGGING|OAP|Network_Observability.*Critical
        - name: TEST_ADDITIONAL
          default: ""
        - name: TEST_FILTERS
          default: "~ChkUpgrade&;~NonPreRelease&;~Serial&;~Disruptive&;~DisconnectedOnly&;~HyperShiftMGMT&;~MicroShiftOnly&"
        - name: FILTERS_ADDITIONAL
          default: "~CPaasrunOnly&;~StressTest&"
        - name: MODULE_FILTERS
          default: ""
        - name: TEST_IMPORTANCE
          default: ""
        - name: TEST_TIMEOUT
          default: "15"
        - name: TEST_PARALLEL
          default: "6"
        - name: TEST_ROSA_LOGIN_ENV
          default: "staging"
        - name: FORCE_SUCCESS_EXIT
          default: "yes"
        - name: IS_ACTIVE_CLUSTER_OPENSHIFT
          default: "true"
        - name: SHARD_ARGS
          default: ""
        - name: MULTISTAGE_PARAM_OVERRIDE_NETOBSERV_CS_IMAGE
          default: ""
        resources:
          requests:
            cpu: "1"
            memory: 4Gi
        timeout: 1h0m0s
      #- ref: cucushift-hypershift-extended-health-check
      #- ref: idp-htpasswd
      #- ref: cucushift-pre
      #- ref: cucushift-e2e

    post:
      - chain: hypershift-mce-kubevirt-destroy
      - ref: hypershift-mce-ibmz-destroy-s390x-mgmt
    env:
      HYPERSHIFT_BASEDOMAIN: 'hcpci.com'
      HYPERSHIFT_NODE_COUNT: 2
      IC_CLI_VERSION: '2.36.0'
      IC_API_KEY_FILE: '/etc/hypershift-agent-ibmz-credentials/ibmcloud-zcomm-apikey'
      VSI_IMAGE_NAME: "ubuntu-s390x-image"
      IC_REGION: 'br-sao' #'eu-gb' 
      HC_NS: 'virt-ibmz'
      CONTROL_NODE_COUNT: 3
      COMPUTE_NODE_COUNT: 0
      CONTROL_NODE_PROFILE: "bz2e-16x64"
      COMPUTE_NODE_PROFILE: "bz2e-16x64"
      REGION: 'Sao Paulo'
      RESOURCE_GROUP: 'hypershift'
      ENABLE_NESTED_VIRT: "true"
      CREATE_STORAGE_CLASS: "false"
      ODF_BACKEND_STORAGE_CLASS: 'local-block-ocs'
      CNV_SUBSCRIPTION_SOURCE: 'redhat-operators'