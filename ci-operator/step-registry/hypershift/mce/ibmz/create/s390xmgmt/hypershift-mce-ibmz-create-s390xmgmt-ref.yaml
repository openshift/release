ref:
  as: hypershift-mce-ibmz-create-s390xmgmt 
  cli: latest
  env:
    - name: CLUSTER_NAME_PREFIX
      documentation: "Desired cluster name prefix"
      default: "hcp-s390x-mgmt-ci"
    - name: CLUSTER_VERSION
      documentation: "Desired openshift cluster version"
    - name: CONTROL_NODE_COUNT
      documentation: "Desired number of master / control nodes for the openshift cluster"
    - name: COMPUTE_NODE_COUNT
      documentation: "Desired number of worker / compute nodes for the openshift cluster"
    - name: REGION
      documentation: "IBM Cloud region name to create the cluster"
    - name: RESOURCE_GROUP
      documentation: "Your resource group name in IBM Cloud, which is already created and has access"
    - name: AGENT_IBMZ_CREDENTIALS
      default: /etc/hypershift-agent-ibmz-credentials
    - name: OCP_ADDONS_CREDENTIALS
      default: /etc/ocp-addons
    - name: IC_CLI_VERSION
      documentation: "Your IC CLI VERSION will be the IBM Cloud CLI version"
    - name: CONTROL_NODE_PROFILE
      documentation: "Desired control node profile"
      default: "cz2-16x32"
    - name: COMPUTE_NODE_PROFILE
      documentation: "Desired compute node profile"
      default: "cz2-16x32"
    - name: VSI_IMAGE_NAME
      documentation: "The image to bring up the VSI created in IBM cloud"
      default: "ubuntu-s390x-image"
    - name: ENABLE_NESTED_VIRT 
      documentation: "Enables nested virtualisation on IBM cloud cluster"
      default: "false"
    - name: CREATE_STORAGE_CLASS 
      documentation: "Creates a storage class after cluster installation"
      default: "true"
    - name: OPENSHIFT_INSTALL_EXPERIMENTAL_DISABLE_IMAGE_POLICY
      documentation: "Disables image policy for experimental features"
      default: "true"
    - name: RUN_REHEARSAL_TESTS
      documentation: >-
        Draft/rehearsal only. Set to "1" to run mock scripts in the create step without IBM API calls.
    - name: TEST_IBM_PROVISIONING_RETRY
      documentation: >-
        Draft/rehearsal only. Set to "1" to simulate one transient IBM instance-create failure and retry.
    - name: IBM_INSTANCE_CREATE_RETRY_SLEEP_SEC
      documentation: >-
        Draft/rehearsal only. Seconds to sleep before the simulated instance-create retry.
      default: "5"
  commands: hypershift-mce-ibmz-create-s390xmgmt-commands.sh
  from: dev-scripts
  grace_period: 59m0s
  resources:
    requests:
      cpu: 100m
      memory: 100Mi
  timeout: 2h
  credentials:
    - mount_path: /etc/hypershift-agent-ibmz-credentials
      name: hypershift-agent-ibmz-credentials
      namespace: test-credentials
    - mount_path: /etc/ocp-addons
      name: ocp-addons-key
      namespace: test-credentials
  dependencies:
    - env: OCP_RELEASE_IMAGE
      name: release:s390x-latest