ref:
  as: hypershift-mce-dump
  from: hypershift-operator
  grace_period: 5m0s
  timeout: 45m0s
  cli: latest
  commands: hypershift-mce-dump-commands.sh
  env:
  - name: DUMP_GUEST_CLUSTER
    default: "true"
    documentation: Should we dump the guest cluster.
  resources:
    requests:
      cpu: 100m
      memory: 100Mi
