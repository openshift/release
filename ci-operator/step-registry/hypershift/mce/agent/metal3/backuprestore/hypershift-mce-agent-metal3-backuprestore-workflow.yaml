workflow:
  as: hypershift-mce-agent-metal3-backuprestore
  documentation: |-
    The HyperShift MCE agent backup/restore workflow executes OADP backup and restore
    tests against a new ephemeral HyperShift cluster using the metal3 installation method.

    The control plane is hosted on a dedicated standalone OCP cluster provisioned
    via dev-scripts and is destroyed after tests complete.

    Learn more about HyperShift here: https://github.com/openshift/hypershift

    Track HyperShift's development here: https://issues.redhat.com/projects/HOSTEDCP
  steps:
    allow_best_effort_post_steps: true
    allow_skip_on_success: true
    pre:
    - chain: baremetalds-ofcir-pre
    - ref: enable-qe-catalogsource
    - ref: deploy-konflux-operator
    - chain: hypershift-mce-agent-lvm
    - ref: hypershift-mce-install
    - chain: hypershift-mce-agent-metal3-create
    test:
    - ref: hypershift-mce-agent-minio
    - ref: operatorhub-subscribe-oadp-operator
    - ref: hypershift-mce-agent-oadp-v2-setup
    - chain: hypershift-e2e-backuprestore
    post:
    - ref: wait
    - ref: hypershift-mce-agent-info
    - ref: hypershift-mce-dump
    - chain: hypershift-mce-agent-destroy
    - chain: baremetalds-ofcir-post
    env:
      TEST_SKIPS: >-
        etcd leader changes are not excessive\|
        check registry.redhat.io is available and samples operator can import sample imagestreams
      AGENT_NAMESPACE: hypershift-agents
      CLUSTERTYPE: host_384gb_el9
      IP_STACK: v4
      LVM_OPERATOR_SUB_SOURCE: lvm-catalogsource
      KONFLUX_DEPLOY_OPERATORS: "false"
      KONFLUX_DEPLOY_CATALOG_SOURCE: "false"
      KONFLUX_DEPLOY_SUBSCRIPTION: "false"
      KONFLUX_TARGET_OPERATORS: metallb
      METALLB_OPERATOR_SUB_SOURCE: qe-app-registry
      OADP_OPERATOR_SUB_SOURCE: qe-app-registry
      OADP_OPERATOR_SUB_CHANNEL: stable
      E2E_HOSTED_CLUSTER_NAMESPACE: local-cluster
      HYPERSHIFT_NP_AUTOREPAIR: "true"
      TEST_SUITE: openshift/conformance/parallel/minimal
      TIMEOUT: "+5 hours"
      DEVSCRIPTS_CONFIG: |
        IP_STACK=v4
        NETWORK_TYPE=OVNKubernetes
        NUM_WORKERS=4
        WORKER_MEMORY=32768
        WORKER_VCPU=8
        VM_EXTRADISKS=true
        VM_EXTRADISKS_LIST=vda
        VM_EXTRADISKS_SIZE=500G
        NUM_EXTRA_WORKERS=3
        PROVISIONING_NETWORK_PROFILE=Disabled
        REDFISH_EMULATOR_IGNORE_BOOT_DEVICE=True
