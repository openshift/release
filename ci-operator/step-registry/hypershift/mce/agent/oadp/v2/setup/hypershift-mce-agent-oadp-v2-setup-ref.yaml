ref:
  as: hypershift-mce-agent-oadp-v2-setup
  from: dev-scripts
  cli: latest
  grace_period: 10m
  commands: hypershift-mce-agent-oadp-v2-setup-commands.sh
  resources:
    requests:
      cpu: 1000m
      memory: 500Mi
  timeout: 20m0s
  documentation: |-
    Set up OADP infrastructure (DPA, BSL, VSL) on a HyperShift bare-metal
    management cluster using Minio as the backend storage.

    Creates the oadp-helper deployment, cloud-credentials secret,
    DataProtectionApplication (with hypershift-oadp-plugin), BackupStorageLocation,
    and VolumeSnapshotLocation. Does not create Backup/Restore objects — use
    the hypershift-e2e-backuprestore chain for that.
