ref:
  as: hypershift-mce-agent-oadp-v2-setup
  from: dev-scripts
  cli: latest
  grace_period: 10m
  commands: hypershift-mce-agent-oadp-v2-setup-commands.sh
  env:
  - name: AGENT_NAMESPACE
    default: ""
    documentation: "namespace of the agent. If the default is an empty string, it will be HOSTED_CONTROL_PLANE_NAMESPACE."
  - name: OADP_HYPERSHIFT_PLUGIN_IMAGE
    documentation: |-
      The image to use for the hypershift OADP plugin in the DataProtectionApplication.
    default: quay.io/redhat-user-workloads/ocp-art-tenant/oadp-hypershift-oadp-plugin-main:main
  resources:
    requests:
      cpu: 1000m
      memory: 500Mi
  timeout: 20m0s
  documentation: |-
    Setup OADP infrastructure (DPA, BSL, VSL) on HyperShift cluster on BM.
    Does not create Backup/Restore objects - use hypershift-e2e-backuprestore chain for that.
