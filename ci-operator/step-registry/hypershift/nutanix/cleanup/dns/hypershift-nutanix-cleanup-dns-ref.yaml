ref:
  as: hypershift-nutanix-cleanup-dns
  from: tools
  commands: hypershift-nutanix-cleanup-dns-commands.sh
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
  credentials:
  - namespace: test-credentials
    name: ci-route-53-nutanix
    mount_path: /var/run/vault/nutanix-dns
  timeout: 10m0s
  optional_on_success: false
  best_effort: true
  documentation: |-
    Delete Route 53 DNS records created for HyperShift hosted cluster on Nutanix.

    This step:
    1. Reads delete batch from ${SHARED_DIR}/hosted-dns-delete.json
    2. Deletes Route 53 DNS records
    3. Waits for deletion to complete

    Note: Uses best_effort to avoid failing the job if cleanup has issues.
