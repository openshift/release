workflow:
  as: hypershift-nutanix-agent-conformance-dynamic
  documentation: |-
    The HyperShift Nutanix Agent conformance workflow with dynamic VM creation.

    This workflow provisions a complete HyperShift environment on Nutanix:
    - Nutanix IPI management cluster
    - Dynamically created Nutanix worker VMs
    - HyperShift hosted cluster using Agent-based installation
    - Conformance testing

    Architecture:
      Management Cluster: OpenShift on Nutanix (IPI)
      Worker VMs: Dynamically created Nutanix VMs
      Hosted Cluster: HyperShift with Agent-based workers

    Flow:
      1. Provision Nutanix management cluster
      2. Install HyperShift and Assisted Service
      3. Dynamically create Nutanix worker VMs
      4. Create hosted cluster with Agent ISO
      5. Run conformance tests
      6. Cleanup (including dynamically created VMs)

    Difference from hypershift-nutanix-agent-conformance:
      This workflow creates VMs dynamically, while the base workflow expects
      pre-created VMs to be provided via NUTANIX_WORKER_VM_UUIDS.

  steps:
    allow_best_effort_post_steps: true
    allow_skip_on_success: true
    pre:
    # Management cluster provision
    - chain: hypershift-nutanix-agent-provision

    # Hosted cluster creation with dynamic VMs
    - chain: hypershift-nutanix-agent-create-dynamic

    post:
    # Cleanup (will delete dynamically created VMs)
    - chain: hypershift-nutanix-agent-deprovision
