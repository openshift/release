workflow:
  as: hypershift-nutanix-agent-conformance-debug
  steps:
    pre:
    # Skip provision - assume management cluster already exists
    # You need to manually set KUBECONFIG or extract it from a running job
    - chain: hypershift-nutanix-agent-create
    test:
    - chain: hypershift-conformance
    post:
    - chain: hypershift-nutanix-agent-deprovision
  documentation: |-
    Debug workflow for Nutanix HyperShift Agent conformance tests.

    This workflow SKIPS the management cluster provision phase, allowing you to:
    1. Create a long-running management cluster manually or via a separate job
    2. Extract the KUBECONFIG from that cluster
    3. Run only the test steps quickly for iteration

    Prerequisites:
    - A Nutanix management cluster must already exist
    - KUBECONFIG must be available in ${SHARED_DIR}/kubeconfig
    - Nutanix context must be available in ${SHARED_DIR}/nutanix_context.sh

    Usage:
    1. First, create a management cluster (one-time or long-running):
       - Run a provision job or use an existing cluster

    2. Extract artifacts from the provision job:
       - kubeconfig
       - nutanix_context.sh

    3. Run this debug workflow with those artifacts pre-populated

    Benefits:
    - Provision takes ~45 minutes
    - Debug iterations take ~20 minutes
    - Can iterate multiple times on same management cluster
