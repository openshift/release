workflow:
  as: hypershift-nutanix-agent-conformance
  documentation: |-
    The HyperShift Nutanix Agent conformance workflow provisions a Nutanix IPI
    management cluster, installs HyperShift, creates a hosted cluster using
    Agent-based installation with Nutanix worker VMs, and runs conformance tests.

    Architecture:
      Management Cluster: OpenShift on Nutanix (IPI)
      Hosted Cluster: HyperShift with Agent-based workers on Nutanix VMs

    Flow:
      1. Provision Nutanix management cluster (IPI)
      2. Install HyperShift operator
      3. Install Assisted Service (for Agent support)
      4. Create hosted cluster control plane
      5. Provision Nutanix worker VMs using Agent ISO
      6. Run conformance tests
      7. Cleanup all resources

  steps:
    allow_best_effort_post_steps: true
    allow_skip_on_success: true

    pre:
    # Management cluster provision
    - chain: hypershift-nutanix-agent-provision

    # Hosted cluster creation
    - chain: hypershift-nutanix-agent-create

    test:
    # Run conformance tests on the hosted cluster
    - chain: hypershift-conformance

    post:
    # Cleanup
    - chain: hypershift-nutanix-agent-deprovision

  env:
    # Nutanix Management Cluster Configuration
    # These will be provided by the cluster_profile or test configuration
    # NUTANIX_ENDPOINT: ""
    # NUTANIX_PORT: "9440"
    # NUTANIX_USERNAME: ""
    # NUTANIX_PASSWORD: ""
    # NUTANIX_CLUSTER: ""

    # Nutanix Worker VM Configuration
    NUM_EXTRA_WORKERS: "3"
    NUTANIX_WORKER_VCPU: "8"
    NUTANIX_WORKER_MEMORY: "16384"  # MB
    NUTANIX_WORKER_DISK: "120"      # GB

    # Pre-created Nutanix VM UUIDs (optional)
    # If empty, VMs will be created dynamically or searched by name pattern
    NUTANIX_WORKER_VM_UUIDS: ""

    # VM naming pattern for automatic discovery
    NUTANIX_WORKER_VM_PREFIX: "hypershift-worker"

    # HyperShift Configuration
    HYPERSHIFT_CLUSTER_NAME: "test-cluster"
    HYPERSHIFT_BASE_DOMAIN: "nutanix.example.com"
    HYPERSHIFT_NODE_POOL_REPLICAS: "3"
    HYPERSHIFT_RELEASE_IMAGE: ""  # Use latest if empty

    # Network Configuration
    HYPERSHIFT_EXTERNAL_DNS_DOMAIN: ""

    # MetalLB IP Pool (adjust based on Nutanix network)
    METALLB_IP_RANGE: "192.168.1.200-192.168.1.210"

    # Agent/Assisted Service Configuration
    AGENT_TIMEOUT: "30m"

    # Conformance test configuration
    CONFORMANCE_MINIMAL: "false"  # Set to "true" for faster testing
