chain:
  as: hypershift-nutanix-agent-provision
  steps:
  - chain: ipi-conf-nutanix
  - chain: nutanix-provision-bastionhost
  - chain: ipi-install
  - chain: ipi-install-nutanix
  documentation: |-
    Provision a Nutanix IPI management cluster and install HyperShift operator.

    This chain:
    1. Configures Nutanix IPI installation
    2. Provisions bastion host (if proxy/disconnected)
    3. Installs OpenShift management cluster on Nutanix
    4. Validates Nutanix-specific components (CSI, etc.)
    5. Enables QE catalog sources
    6. Installs HyperShift operator on the management cluster
