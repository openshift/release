chain:
  as: hypershift-nutanix-agent-deprovision
  steps:
  - ref: hypershift-nutanix-cleanup-dns
  - ref: hypershift-nutanix-destroy
  - chain: cucushift-installer-rehearse-nutanix-ipi-deprovision
  - ref: nutanix-deprovision-bastionhost
  documentation: |-
    Clean up the HyperShift hosted cluster and Nutanix management cluster.

    This chain:
    1. Cleans up Route 53 DNS records
    2. Destroys the hosted cluster and Nutanix worker VMs
    3. Destroys the Nutanix management cluster
    4. Deprovisions the bastion host (if used)
