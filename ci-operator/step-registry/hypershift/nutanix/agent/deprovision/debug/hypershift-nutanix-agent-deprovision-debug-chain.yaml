chain:
  as: hypershift-nutanix-agent-deprovision-debug
  steps:
  - ref: hypershift-nutanix-cleanup-dns
  - ref: hypershift-nutanix-destroy
  documentation: |-
    Clean up the HyperShift hosted cluster for debug workflow.

    This chain only cleans up the hosted cluster resources, preserving the
    management cluster for reuse in subsequent test runs.

    This chain:
    1. Cleans up Route 53 DNS records
    2. Destroys the hosted cluster and Nutanix worker VMs

    NOT cleaned up (preserved for reuse):
    - Management cluster
    - Bastion host
    - MCE installation
    - AgentServiceConfig

    This allows fast iteration by reusing the same management cluster
    across multiple test runs.
