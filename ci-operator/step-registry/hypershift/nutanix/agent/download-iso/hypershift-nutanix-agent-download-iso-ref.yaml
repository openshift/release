ref:
  as: hypershift-nutanix-agent-download-iso
  from: tools
  commands: hypershift-nutanix-agent-download-iso-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  documentation: |-
    Download Agent ISO from Assisted Service for HyperShift hosted cluster.

    This step:
    1. Waits for InfraEnv to generate the ISO (condition=ImageCreated)
    2. Gets the ISO download URL from InfraEnv.status.isoDownloadURL
    3. Downloads the ISO to ${SHARED_DIR}/agent-worker.iso
    4. Saves the local path for the Terraform step

    The downloaded ISO is required by Terraform's nutanix_image resource,
    which only accepts local file paths (not URLs).
