chain:
  as: hypershift-nutanix-agent-create-dynamic
  steps:
  - ref: hypershift-mce-install
  - ref: hypershift-mce-conf-os-images
  - ref: hypershift-mce-agent-create-agentserviceconfig
  - ref: hypershift-nutanix-conf-workers
  - ref: hypershift-mce-agent-create-hostedcluster
  - ref: hypershift-agent-create-add-worker-nutanix
  documentation: |-
    Create a HyperShift hosted cluster on Nutanix using Agent-based installation
    with dynamically created worker VMs.

    This chain is similar to hypershift-nutanix-agent-create but includes the
    hypershift-nutanix-conf-workers step to automatically create Nutanix VMs
    instead of requiring pre-created VMs.

    Workflow:
    1. Install MCE with Assisted Service
    2. Configure OS images for the hosted cluster
    3. Deploy AgentServiceConfig
    4. Create Nutanix worker VMs dynamically
    5. Create HostedCluster and NodePool CRs
    6. Provision workers using Agent ISO

    Note: DNS configuration is handled by the Nutanix IPI workflow
    (ipi-conf-nutanix-dns) in the provision chain.
