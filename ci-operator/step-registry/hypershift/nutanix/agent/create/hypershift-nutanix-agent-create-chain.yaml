chain:
  as: hypershift-nutanix-agent-create
  steps:
  - ref: hypershift-mce-conf-os-images
  - ref: hypershift-mce-agent-create-agentserviceconfig
  - ref: hypershift-agent-create-config-dns
  - ref: hypershift-mce-agent-create-hostedcluster
  - ref: hypershift-agent-create-add-worker-nutanix
  documentation: |-
    Create a HyperShift hosted cluster on Nutanix using Agent-based installation.

    This chain:
    1. Configures OS images for the hosted cluster
    2. Deploys Assisted Service (AgentServiceConfig)
    3. Configures DNS for the hosted cluster
    4. Creates the HostedCluster and NodePool CRs
    5. Provisions Nutanix worker VMs using Agent ISO
