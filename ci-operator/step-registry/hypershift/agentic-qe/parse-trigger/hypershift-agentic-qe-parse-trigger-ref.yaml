ref:
  as: hypershift-agentic-qe-parse-trigger
  from: cli
  commands: hypershift-agentic-qe-parse-trigger-commands.sh
  timeout: 5m0s
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
  documentation: |-
    Parses the /test trigger comment on the PR for optional parameters.
    Supports RELEASE_IMAGE=<image> to override the HostedCluster release image.
    Writes overrides to SHARED_DIR for consumption by downstream create steps.

    Example trigger: /test agentic-qe-azure-self-managed RELEASE_IMAGE=quay.io/openshift-release-dev/ocp-release:4.18.0-x86_64
