workflow:
  as: hypershift-agentic-qe-azure-self-managed
  steps:
    pre:
    - ref: ipi-install-rbac
    - chain: hypershift-setup-nested-management-cluster
    - ref: hypershift-azure-setup-private-link
    - ref: hypershift-install
    - chain: hypershift-azure-create
    test:
    - ref: hypershift-agentic-qe-process
    post:
    - ref: hypershift-agentic-qe-report
    - chain: hypershift-dump
    - chain: hypershift-azure-destroy
    - chain: hypershift-destroy-nested-management-cluster
    env:
      CLOUD_PROVIDER: "Azure"
      HYPERSHIFT_NODE_COUNT: "2"
      HYPERSHIFT_AZURE_LOCATION: "centralus"
      AZURE_SELF_MANAGED: "true"
      HYPERSHIFT_EXTERNAL_DNS_DOMAIN: "aks-e2e.hypershift.azure.devcluster.openshift.com"
      TECH_PREVIEW_NO_UPGRADE: "true"
  documentation: |-
    HyperShift Agentic QE workflow for AI-driven test plan execution on Azure self-managed.

    This workflow provisions a self-managed Azure management cluster with HyperShift operator
    installed from the PR under test, creates a HostedCluster, then uses
    Claude to execute test plans from the test-plan/ directory against
    the live environment.

    Pre phase:
    1. Provisions a nested management cluster via IPI
    2. Sets up Azure Private Link
    3. Installs the HyperShift operator built from the PR
    4. Creates a HostedCluster on Azure

    Test phase:
    1. Discovers test plan files changed/added by the PR
    2. Runs Claude to execute each test plan against the HostedCluster

    Post phase:
    1. Generates an HTML report with test results and token usage
    2. Dumps cluster artifacts for debugging
    3. Destroys the HostedCluster
    4. Destroys the management cluster infrastructure
