ref:
  as: hypershift-agentic-qe-report
  from: claude-ai-helpers
  commands: hypershift-agentic-qe-report-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
  documentation: |-
    Generates an HTML report from the agentic-qe test plan execution.
    Parses stream-json output from Claude and produces a readable report
    with token usage, cost, and test plan output in ${ARTIFACT_DIR}.
