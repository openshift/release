ref:
  as: hypershift-gcp-gke-deprovision
  from_image:
    namespace: ocp
    name: "4.22"
    tag: upi-installer
  commands: hypershift-gcp-gke-deprovision-commands.sh
  env:
    - name: HYPERSHIFT_GCP_CI_PROJECT
      default: ""
      documentation: "GCP project ID for persistent HyperShift CI resources (ExternalDNS SA, DNS zone)"
    - name: HYPERSHIFT_GCP_CI_DNS_ZONE
      default: ""
      documentation: "Cloud DNS zone name for HyperShift CI DNS records"
    - name: HYPERSHIFT_GCP_CI_DNS_DOMAIN
      default: ""
      documentation: "DNS domain for HyperShift CI hosted clusters"
    - name: GKE_REGION
      default: "us-central1"
      documentation: "GCP region for the GKE cluster (used as fallback when SHARED_DIR is unavailable)"
  resources:
    requests:
      cpu: 100m
      memory: 100Mi
  timeout: 30m0s
  best_effort: true
  grace_period: 10m0s
  documentation: |-
    This step destroys the GKE cluster and cleans up GCP projects created by hypershift-gcp-gke-provision.

    Cleanup order:
    1. Delete Hosted Cluster project (removes cross-project PSC references)
    2. Delete GKE cluster with async polling (prevents liens on Control Plane project)
    3. Delete Control Plane project

    GKE clusters can place liens on their project, blocking deletion. By explicitly
    deleting the cluster first and waiting for completion, we ensure the Control Plane
    project can be deleted cleanly.

    Reads from ${SHARED_DIR} (when available):
    - control-plane-project-id: Control Plane project ID
    - hosted-cluster-project-id: Hosted Cluster project ID (optional)
    - control-plane-cluster-name: GKE cluster name
    - gcp-region: GCP region

    If SHARED_DIR files are missing (e.g. provision step was aborted before
    the Kubernetes Secret backing SHARED_DIR was synced), resource names are
    reconstructed from NAMESPACE and UNIQUE_HASH env vars using the same
    naming logic as hypershift-gcp-gke-provision.