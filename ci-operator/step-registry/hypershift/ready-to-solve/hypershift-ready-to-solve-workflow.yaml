workflow:
  as: hypershift-ready-to-solve
  steps:
    test:
    - ref: hypershift-ready-to-solve-process
  documentation: |-
    Validates Jira issue readiness for /jira:solve using the ready-to-solve skill.
    Queries OCPBUGS and CNTRLPLANE projects for Hypershift issues without readiness
    labels, runs deterministic and AI qualitative checks on each issue's description,
    and applies ready-to-solve or not-ready-to-solve labels accordingly.
