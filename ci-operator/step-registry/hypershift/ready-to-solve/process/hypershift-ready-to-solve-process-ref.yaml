ref:
  as: hypershift-ready-to-solve-process
  from: claude-ai-helpers
  commands: hypershift-ready-to-solve-process-commands.sh
  timeout: 7200s
  grace_period: 1m0s
  env:
  - name: CLAUDE_CODE_USE_VERTEX
    default: "1"
    documentation: |-
      Enable Vertex AI for Claude Code.
  - name: CLOUD_ML_REGION
    default: "global"
    documentation: |-
      Google Cloud region for Vertex AI.
  - name: ANTHROPIC_VERTEX_PROJECT_ID
    default: "itpc-gcp-hybrid-pe-eng-claude"
    documentation: |-
      Google Cloud project ID for Vertex AI authentication.
  - name: GOOGLE_APPLICATION_CREDENTIALS
    default: "/var/run/claude-code-service-account/claude-prow"
    documentation: |-
      Path to the Google Cloud service account JSON key file for Vertex AI authentication.
  - name: JIRA_AGENT_ISSUE_KEY
    default: ""
    documentation: |-
      Optional override to validate a specific Jira issue instead of querying.
      When set (e.g., "OCPBUGS-12345"), skips the JQL query and validates
      only this issue. Leave empty for normal JQL-based discovery.
  - name: MULTISTAGE_PARAM_OVERRIDE_JIRA_AGENT_ISSUE_KEY
    default: ""
    documentation: |-
      Gangway API override for JIRA_AGENT_ISSUE_KEY. When triggering
      this job via the Gangway API, pass it as:
      "pod_spec_options": {
        "envs": {
          "MULTISTAGE_PARAM_OVERRIDE_JIRA_AGENT_ISSUE_KEY": "OCPBUGS-12345"
        }
      }
  - name: JIRA_AGENT_MAX_ISSUES
    default: "50"
    documentation: |-
      Maximum number of Jira issues to validate per run.
  - name: CLAUDE_MODEL
    default: "claude-opus-4-6"
    documentation: |-
      Claude model to use for qualitative assessment.
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
  credentials:
  - namespace: test-credentials
    name: hypershift-team-claude-prow
    mount_path: /var/run/claude-code-service-account
  documentation: |-
    Validates Jira issue readiness for /jira:solve using the ready-to-solve skill.
    Queries OCPBUGS and CNTRLPLANE via the Jira REST API for unresolved issues in
    New/To Do status that either have no readiness label or have not-ready-to-solve
    (so previously failing issues get re-evaluated and can be flipped to ready-to-solve).
    Runs deterministic and AI qualitative checks on each issue's description.
    On pass, applies the 'ready-to-solve' label. On fail, applies 'not-ready-to-solve'.
    Results are written to SHARED_DIR for reporting. Uses Vertex AI for Claude authentication.
