ref:
  as: hypershift-analyze-e2e-failure
  from: claude-ai-helpers
  best_effort: true
  commands: hypershift-analyze-e2e-failure-commands.sh
  timeout: 30m0s
  grace_period: 30s
  env:
  - name: CLAUDE_CODE_USE_VERTEX
    default: "1"
    documentation: |-
      Enable Vertex AI for Claude Code.
  - name: CLOUD_ML_REGION
    default: "us-east5"
    documentation: |-
      Google Cloud region for Vertex AI.
  - name: ANTHROPIC_VERTEX_PROJECT_ID
    default: "itpc-gcp-hybrid-pe-eng-claude"
    documentation: |-
      Google Cloud project ID for Vertex AI authentication.
  - name: GOOGLE_APPLICATION_CREDENTIALS
    default: "/var/run/claude-code-service-account/claude-prow"
    documentation: |-
      Path to the Google Cloud service account JSON key file for Vertex AI authentication.
  - name: CLAUDE_MODEL
    default: "claude-opus-4-6"
    documentation: |-
      Claude model to use for test failure analysis.
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
  credentials:
  - namespace: test-credentials
    name: hypershift-team-claude-prow
    mount_path: /var/run/claude-code-service-account
  documentation: |-
    Post-step that uses Claude to analyze e2e test failures.
    Only runs when test failures are detected (checks for JUnit XML failures
    or build-log error patterns). On success (no test failures), exits early
    with no cost. Produces an HTML analysis report in ARTIFACT_DIR.
