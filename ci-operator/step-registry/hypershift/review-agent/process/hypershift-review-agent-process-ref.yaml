ref:
  as: hypershift-review-agent-process
  from: claude-ai-helpers
  commands: hypershift-review-agent-process-commands.sh
  env:
  - name: CLAUDE_CODE_USE_VERTEX
    default: "1"
    documentation: |-
      Enable Vertex AI for Claude Code.
  - name: CLOUD_ML_REGION
    default: "global"
    documentation: |-
      Google Cloud region for Vertex AI.
  - name: ANTHROPIC_VERTEX_PROJECT_ID
    default: "itpc-gcp-hybrid-pe-eng-claude"
    documentation: |-
      Google Cloud project ID for Vertex AI authentication.
  - name: GOOGLE_APPLICATION_CREDENTIALS
    default: "/var/run/claude-code-service-account/claude-prow"
    documentation: |-
      Path to the Google Cloud service account JSON key file for Vertex AI authentication.
  - name: MULTISTAGE_PARAM_OVERRIDE_REVIEW_AGENT_TARGET_PR
    default: ""
    documentation: |-
      Gangway API override for REVIEW_AGENT_TARGET_PR. When triggering
      this job via the Gangway API, pass it as:
      "pod_spec_options": {
        "envs": {
          "MULTISTAGE_PARAM_OVERRIDE_REVIEW_AGENT_TARGET_PR": "1234"
        }
      }
  - name: CLAUDE_MODEL
    default: "claude-opus-4-6"
    documentation: |-
      Claude model to use for processing PR review comments.
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
  credentials:
  - namespace: test-credentials
    name: hypershift-team-claude-prow
    mount_path: /var/run/claude-code-service-account
  documentation: |-
    Process step for the HyperShift Review Agent.
    Uses the /openshift-developer:address-review-pr skill to address
    review comments on a single PR. Designed for presubmit use:
    PULL_NUMBER is provided by the Prow presubmit context.
