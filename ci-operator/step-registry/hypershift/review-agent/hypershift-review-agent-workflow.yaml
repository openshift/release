workflow:
  as: hypershift-review-agent
  steps:
    pre:
      - ref: jira-agent-github-app-auth
      - ref: review-agent-setup
    test:
      - ref: review-agent-process
    post:
      - ref: review-agent-report
    env:
      REVIEW_AGENT_FORK_REPO: "https://github.com/hypershift-community/hypershift"
      REVIEW_AGENT_AUTH_MODE: "app"
      REVIEW_AGENT_UPSTREAM_REPO: "openshift/hypershift"
  documentation: |-
    HyperShift-specific wrapper for the generic review-agent workflow.

    Delegates to the generic review-agent steps with HyperShift-specific
    configuration (fork repo, upstream repo).

    Credentials: Uses hypershift-team-claude-prow (configured in generic step refs).
