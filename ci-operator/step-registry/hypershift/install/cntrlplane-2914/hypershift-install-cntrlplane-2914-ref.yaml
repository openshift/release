ref:
  as: hypershift-install-cntrlplane-2914
  from: hypershift-operator
  cli: latest
  env:
  - name: ENABLE_HYPERSHIFT_CERT_ROTATION_SCALE
    default: "false"
    documentation: "Whether to shorten the certificate rotation scale"
  commands: hypershift-install-cntrlplane-2914-commands.sh
  credentials:
  - mount_path: /etc/hypershift-pool-aws-credentials
    name: hypershift-pool-aws-credentials
    namespace: test-credentials
  - mount_path: /etc/hypershift-aks-e2e-dns-credentials
    name: hypershift-aks-e2e-dns-credentials
    namespace: test-credentials
  - mount_path: /etc/ci-pull-credentials
    name: ci-pull-credentials
    namespace: test-credentials
  grace_period: 1m0s
  resources:
    requests:
      cpu: 100m
      memory: 100Mi
  documentation: |-
    Custom HyperShift install step for CNTRLPLANE-2914 that uses hardcoded
    operator image: quay.io/wangke19/hypershift:CNTRLPLANE-2914
