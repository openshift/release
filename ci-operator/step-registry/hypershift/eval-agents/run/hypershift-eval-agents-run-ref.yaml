ref:
  as: hypershift-eval-agents-run
  from: claude-ai-helpers
  commands: hypershift-eval-agents-run-commands.sh
  env:
  - name: CLAUDE_CODE_USE_VERTEX
    default: "1"
    documentation: |-
      Enable Vertex AI for Claude Code.
  - name: CLOUD_ML_REGION
    default: "global"
    documentation: |-
      Google Cloud region for Vertex AI.
  - name: ANTHROPIC_VERTEX_PROJECT_ID
    default: "itpc-gcp-hybrid-pe-eng-claude"
    documentation: |-
      Google Cloud project ID for Vertex AI authentication.
  - name: GOOGLE_APPLICATION_CREDENTIALS
    default: "/var/run/claude-code-service-account/claude-prow"
    documentation: |-
      Path to the Google Cloud service account JSON key file.
  - name: EVAL_MODEL
    default: "claude-opus-4-6"
    documentation: |-
      Claude model for agent invocation.
  - name: EVAL_JUDGE_MODEL
    default: "claude-opus-4-6"
    documentation: |-
      Claude model for judging agent output.
  - name: EVAL_RUNS
    default: "1"
    documentation: |-
      Number of trials per scenario.
  - name: EVAL_THRESHOLD
    default: "0.8"
    documentation: |-
      Minimum pass rate (0.0-1.0).
  - name: EVAL_FOCUS
    default: ""
    documentation: |-
      Ginkgo focus filter to run a subset of scenarios.
  - name: MULTISTAGE_PARAM_OVERRIDE_EVAL_FOCUS
    default: ""
    documentation: |-
      Gangway API override for EVAL_FOCUS.
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
  credentials:
  - namespace: test-credentials
    name: hypershift-team-claude-prow
    mount_path: /var/run/claude-code-service-account
  documentation: |-
    Run step for the HyperShift eval-agents job.
    Executes make eval-agents to test agent definitions and
    AGENTS.md conventions using an LLM judge framework.
