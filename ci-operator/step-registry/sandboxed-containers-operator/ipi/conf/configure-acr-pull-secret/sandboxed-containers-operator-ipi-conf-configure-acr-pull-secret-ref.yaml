ref:
  as: sandboxed-containers-operator-ipi-conf-configure-acr-pull-secret
  from_image:
    namespace: ci
    name: tests-private-base
    tag: latest
  cli: latest
  grace_period: 10m
  commands: sandboxed-containers-operator-ipi-conf-configure-acr-pull-secret-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  documentation: |-
    Configures the cluster's global pull secret with ACR credentials.
    Expects sandboxed-containers-operator-provision-acr-endpoint to have
    already created ${SHARED_DIR}/new_pull_secret with ACR authentication.
    Updates the cluster pull secret and waits for MachineConfigPool to apply.
