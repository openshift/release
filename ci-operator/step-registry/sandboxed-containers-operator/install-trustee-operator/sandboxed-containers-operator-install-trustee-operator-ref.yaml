ref:
  as: sandboxed-containers-operator-install-trustee-operator
  from_image:
    name: rhdh-e2e-runner # provides helm, oc, git, jq
    namespace: ci
    tag: main
  grace_period: 10m
  commands: sandboxed-containers-operator-install-trustee-operator-commands.sh
  resources:
    requests:
      cpu: 1000m
      memory: 2000Mi
  env:
  - name: TRUSTEE_INSTALL
    default: "false"
    documentation: |-
      Whether to install the trustee operator. Set to "true" to enable installation.
      If not true, the step is skipped and no further actions are taken.
  - name: TRUSTEE_NAMESPACE
    default: "trustee-operator-system"
    documentation: |-
      The namespace where the trustee operator will be installed
  - name: TRUSTEE_CATALOG_SOURCE_IMAGE
    default: ""
    documentation: |-
      The container image for a custom trustee operator CatalogSource.
      If empty (default), uses existing "redhat-operators" catalog.
      If set, helm chart creates a new CatalogSource named "trustee-operator-dev-catalog" with this image.
      Note: The CatalogSource name is hardcoded in the helm chart and cannot be overridden.
  - name: TRUSTEE_CHARTS_REPO
    default: "https://github.com/confidential-devhub/charts.git"
    documentation: |-
      The git repository URL for trustee Helm charts.
  - name: TRUSTEE_CHARTS_REF
    default: "main"
    documentation: |-
      The git ref (branch/tag/commit) to use from the charts repository
  - name: KBS_CLIENT_TAG
    default: "v0.19.0"
    documentation: |-
      The kbs-client image tag to use the connectivity test.
  documentation: |-
    If TRUSTEE_INSTALL=true, installs the trustee operator and operands on the cluster using helm charts.
    If TRUSTEE_INSTALL=false, the step is skipped and no further actions are taken.

    Charts are cloned from TRUSTEE_CHARTS_REPO and helm is used to install the operator and operands.
    After installation, retrieves the Trustee KBS service URL and tests the connectivity.

    INITDATA is created for confidential containers and saved to ${SHARED_DIR}.
    osc-config ConfigMap is updated with the generated TRUSTEE_URL and INITDATA values.
