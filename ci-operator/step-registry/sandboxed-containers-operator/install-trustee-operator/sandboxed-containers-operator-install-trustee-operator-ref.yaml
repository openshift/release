ref:
  as: sandboxed-containers-operator-install-trustee-operator
  from: upi-installer
  grace_period: 10m
  commands: sandboxed-containers-operator-install-trustee-operator-commands.sh
  resources:
    requests:
      cpu: 1000m
      memory: 2000Mi
  env:
  - name: TRUSTEE_INSTALL
    default: "false"
    documentation: |-
      Whether to install the trustee operator. Set to "true" to enable installation.
  - name: TRUSTEE_NAMESPACE
    default: "trustee-operator-system"
    documentation: |-
      The namespace where the trustee operator will be installed
  - name: TRUSTEE_CATALOG_SOURCE_IMAGE
    default: ""
    documentation: |-
      The container image for a custom trustee operator CatalogSource.
      If empty (default), uses existing "redhat-operators" catalog.
      If set, helm chart creates a new CatalogSource named "trustee-operator-dev-catalog" with this image.
      Note: The CatalogSource name is hardcoded in the helm chart and cannot be overridden.
      Example: "quay.io/redhat-user-workloads/ose-osc-tenant/trustee-test-fbc:1.1.0-1776506656"
  - name: TRUSTEE_CHARTS_REPO
    default: "https://gitlab.cee.redhat.com/osc/midstream/charts.git"
    documentation: |-
      The git repository URL for trustee Helm charts.
  - name: TRUSTEE_CHARTS_REF
    default: "main"
    documentation: |-
      The git ref (branch/tag/commit) to use from the charts repository
  - name: KBS_CLIENT_TAG
    default: ""
    documentation: |-
      The kbs-client image tag to use for connectivity testing. If empty, automatically
      discovers the latest v.X.Y.Z tag using skopeo. Override to pin a specific version
      (e.g., "v0.19.0"). Fallback is v0.19.0 if skopeo lookup fails.
  documentation: |-
    Installs the trustee operator and operands on the cluster using helm charts.
    Charts are cloned from TRUSTEE_CHARTS_REPO (defaults to internal GitLab).
    Helm is installed at runtime from get.helm.sh.
