workflow:
  as: sandboxed-containers-operator-e2e-azure-disconnected
  steps:
    env:
      RESTRICTED_NETWORK: "yes"
      PUBLISH: "Internal"
      USER_PROVISIONED_DNS: "yes"
      REGISTER_MIRROR_REGISTRY_DNS: "yes"
      BASTION_BOOT_IMAGE: "azureopenshift:aro4:aro_417:417.94.20240701"
      BASTION_VM_SIZE: "Standard_D4s_v3"
      COMPUTE_NODE_REPLICAS: "1"
      ENALBE_DNSMASQ_METHOD: "NetworkManager"
      OPERATORS_TO_MIRROR: "sandboxed-containers-operator"
      SLEEP_DURATION: 3h
      TEST_PARALLEL: 1
      FORCE_SUCCESS_EXIT: "no"
      MUST_GATHER_IMAGE: "registry.redhat.io/openshift-sandboxed-containers/osc-must-gather-rhel9:latest"
      MUST_GATHER_TIMEOUT: "35m"
      ENABLE_MUST_GATHER: "false"
      MUST_GATHER_ON_FAILURE_ONLY: "true"
      TEST_FILTERS: ~Disruptive&
    pre:
    - ref: azure-provision-resourcegroup
    - ref: azure-provision-vnet
    - chain: azure-provision-bastionhost
    - ref: proxy-config-generate
    - ref: openshift-cluster-bot-rbac
    - ref: sandboxed-containers-operator-provision-acr-endpoint
    - ref: ipi-install-rbac
    - chain: ipi-conf-azure
    - ref: sandboxed-containers-operator-ipi-conf-acr-mirror
    - ref: ipi-conf-azure-provisionednetwork
    - chain: azure-provision-service-principal-minimal-permission
    - ref: ipi-install-install-in-bastion
    - ref: azure-provision-private-custom-dns
    - ref: bastion-dnsmasq
    - ref: sandboxed-containers-operator-mirror-operator
    - chain: sandboxed-containers-operator-pre
    - ref: sandboxed-containers-operator-install-trustee-operator
    test:
    - ref: openshift-extended-test
    post:
    - ref: cucushift-installer-wait
      timeout: 12h10m0s
      best_effort: true
      optional_on_success: true
    - ref: sandboxed-containers-operator-gather-must-gather
    - chain: cucushift-installer-rehearse-azure-ipi-disconnected-deprovision
  documentation: |-
    Run openshift-extended-test on a disconnected Azure IPI cluster
    with sandboxed containers deployed. Uses cucushift disconnected
    infrastructure chains for provisioning and the OSC pre chain for
    operator setup.
