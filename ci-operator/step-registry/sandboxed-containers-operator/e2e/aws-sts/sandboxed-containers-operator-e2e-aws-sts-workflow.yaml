workflow:
  as: sandboxed-containers-operator-e2e-aws-sts
  steps:
    env:
      IDENTITY_MODE: "sts"
      TEST_PARALLEL: 1
      COMPUTE_NODE_TYPE: "t3a.xlarge"
      CONTROL_PLANE_INSTANCE_TYPE: "t3a.xlarge"
      CONTROL_PLANE_REPLICAS: 3
      SPOT_INSTANCES: "false"
      FORCE_SUCCESS_EXIT: "no"
      MUST_GATHER_IMAGE: "registry.redhat.io/openshift-sandboxed-containers/osc-must-gather-rhel9:latest"
      MUST_GATHER_TIMEOUT: "35m"
      ENABLE_MUST_GATHER: "true"
      MUST_GATHER_ON_FAILURE_ONLY: "true"
      TEST_FILTERS: ~DisconnectedOnly&;~Disruptive&
    pre:
    - chain: sandboxed-containers-operator-ipi-aws-sts-pre
    - chain: sandboxed-containers-operator-pre
    test:
    - ref: openshift-extended-test
    post:
    - ref: cucushift-installer-wait
      timeout: 12h10m0s
      best_effort: true
      optional_on_success: true
    - ref: sandboxed-containers-operator-gather-must-gather
    - ref: sandboxed-containers-operator-post
    - chain: ipi-aws-post-manual-oidc-sts
  documentation: |-
    This workflow runs openshift-extended-test on an AWS cluster with
    workload identity (STS/IRSA) and sandboxed containers deployed.
    It creates the cluster using ccoctl with an OIDC provider and IAM roles
    for core operators, then creates an additional IRSA role for the OSC
    operator's service account with the EC2 permissions needed for peer-pods.
