workflow:
  as: confidential-containers-bare-metal-e2e-sno
  steps:
    env:
      SLEEP_DURATION: 3h
      TEST_PARALLEL: 1
      FORCE_SUCCESS_EXIT: no
    pre:
    - ref: coco-bm-sno-setup
    - ref: coco-bm-coco-setup
    post:
    - ref: sandboxed-containers-operator-gather-must-gather
    test:
    - ref: openshift-extended-test
  documentation: |-
    This workflow run openshift-extented-test on a bare metal SNO cluster with
    confidential containers deployed.
