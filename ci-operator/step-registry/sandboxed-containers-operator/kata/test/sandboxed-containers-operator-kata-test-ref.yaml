ref:
  as: sandboxed-containers-operator-kata-test
  from: cli
  commands: sandboxed-containers-operator-kata-test-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 100Mi
  env:
  - name: WORKLOAD_TO_TEST
    default: "kata"
    documentation: |-
      Configures which workload to test; this step only runs when
      set to "kata"; supported values: "kata", "peer-pods" or "coco"
  - name: KATA_TESTS_FILTER
    default: ""
    documentation: |-
      Optional regex to select a subset of upstream kata-containers
      bats tests (e.g. "k8s-exec|k8s-env").
  - name: KATA_TESTS_FAIL_FAST
    default: "no"
    documentation: |-
      When set to "yes", stop execution at the first failed test.
  - name: KATA_REPO
    default: "https://github.com/openshift/kata-containers.git"
    documentation: |-
      Git repository URL for kata-containers.
  - name: KATA_BRANCH
    default: "osc-release"
    documentation: |-
      Branch to clone from the kata-containers repository.
  documentation: |-
    Runs kata-containers upstream integration tests (bats) from the
    openshift/kata-containers repository against an OpenShift cluster
    with OpenShift Sandboxed Containers installed. Only executes when
    WORKLOAD_TO_TEST is set to "kata".
