ref:
  as: sandboxed-containers-operator-peerpods-param-cm
  # Provides az cli
  from: upi-installer
  commands: sandboxed-containers-operator-peerpods-param-cm-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 100Mi
  env:
  - name: ENABLEPEERPODS
    default: "false"
    documentation: |-
      When "true" it does the preparation steps to allow installing OSC
      operator with peer-pods enabled (networking setup, firewall rules,
      secrets, ...) and generates "peerpods-param-cm.yaml" to be
      consumed by openshift-tests-private [sig-kata] tests.
  - name: PODVM_INSTANCE_TYPES
    default: "t3.small,t3.medium,t3.large,t3.xlarge,g4dn.2xlarge,g5.2xlarge"
    documentation: |-
      Comma-separated list of AWS instance types to populate
      PODVM_INSTANCE_TYPES in peerpods-param-cm. CAA validates all
      entries at startup so only include types available in the target
      region.
  - name: IDENTITY_MODE
    default: "cco"
    documentation: |-
      Identity mode for cloud provider authentication. Options: "cco" (Cloud
      Credential Operator - default), "manual" (create secrets manually), "sts"
      (workload identity/federated credentials). For STS mode on Azure, creates
      a managed identity for OSC operator with federated credential and
      osc-identity ConfigMap. For manual mode, creates peerpods-param-secret.
      For CCO mode, no secret or identity is created.
