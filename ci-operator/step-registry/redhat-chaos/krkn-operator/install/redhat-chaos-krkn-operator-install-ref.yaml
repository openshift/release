ref:
  as: redhat-chaos-krkn-operator-install
  from_image:
    namespace: chaos
    name: prow-scripts
    tag: latest
  commands: redhat-chaos-krkn-operator-install-commands.sh
  credentials:
  - namespace: test-credentials
    name: cluster-secrets-aws-chaos
    mount_path: /secret/telemetry
  - namespace: test-credentials
    name: chaos-es-creds
    mount_path: /secret/es
  env:
    - name: TARGET_NAMESPACE
      default: "krkn-operator-system"
    - name: KRKN_OPERATOR_VERSION
      default: '0.3.0-beta'
  resources:
    requests:
      cpu: 100m
      memory: 100Mi
  documentation: >-
    This workflow runs the krkn-hub config workload in the deployed cluster and introduces network latency, packet loss, bandwidth restriction in the egress traffic of a Node's interface using the tc and Netem.
