ref:
  as: dpf-setup-image-registry
  cli: latest
  from: cli
  commands: dpf-setup-image-registry-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  documentation: |-
    Patch the image registry to Managed with emptyDir storage. On bare-metal
    clusters the registry operator bootstraps as Removed (no platform storage),
    which disables the serviceaccount-pull-secrets controller and causes
    conformance tests to time out waiting for dockercfg secrets.
