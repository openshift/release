ref:
  as: dpf-hypervisor-load-kubeconfig
  commands: dpf-hypervisor-load-kubeconfig-commands.sh
  credentials:
  - mount_path: /var/run/dpf-ci
    name: dpf-ci
    namespace: test-credentials
  documentation: |-
    SSH into the DPF hypervisor bastion host, locate the kubeconfig from the
    last openshift-dpf install directory, and copy it to
    ${SHARED_DIR}/kubeconfig for use by subsequent steps (e.g.
    openshift-e2e-test).

    This step:
    1. Sets up SSH access to the hypervisor using the Vault private key
    2. Reads the last openshift-dpf install dir location from the hypervisor
    3. Copies the cluster kubeconfig from that directory to the local pod
    4. Writes the resulting kubeconfig to ${SHARED_DIR}/kubeconfig

    Required Vault secrets:
    - private-key: SSH key for hypervisor

    Use this for quick validation on doca8 or other existing clusters.
    Does NOT create or destroy any cluster resources.
  env:
  - default: "10.6.135.45"
    name: REMOTE_HOST
    documentation: |-
      The hypervisor bastion host to SSH into.
  from: dpf-ci
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  timeout: 15m0s
