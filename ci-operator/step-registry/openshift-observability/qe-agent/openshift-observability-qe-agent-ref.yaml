ref:
  as: openshift-observability-qe-agent
  from: obs-tests-runner
  best_effort: true
  commands: openshift-observability-qe-agent-commands.sh
  timeout: 1h30m0s
  grace_period: 2m0s
  env:
  - name: AGENT_SKILL
    documentation: |-
      Name of the skill file to load from the step's skills/ directory.
      Must match a file at ci-operator/step-registry/openshift-observability/qe-agent/skills/<name>.md
      in the openshift/release repository. Only alphanumeric characters, hyphens, and underscores
      are allowed. The step is skipped if this variable is unset or the skill file does not exist.
      Example: RHOSDT
  - name: CLAUDE_CODE_USE_VERTEX
    default: "1"
    documentation: |-
      Enable Vertex AI for Claude Code.
  - name: CLOUD_ML_REGION
    default: "global"
    documentation: |-
      Google Cloud region for Vertex AI.
  - name: ANTHROPIC_VERTEX_PROJECT_ID
    default: "itpc-gcp-hcm-pe-eng-claude"
    documentation: |-
      Google Cloud project ID for Vertex AI authentication.
  - name: GOOGLE_APPLICATION_CREDENTIALS
    default: "/var/run/claude-code-service-account/claude-prow"
    documentation: |-
      Path to the Google Cloud service account JSON key file for Vertex AI authentication.
  - name: CLAUDE_MODEL
    default: "claude-opus-4-6"
    documentation: |-
      Claude model to use for test failure analysis.
  resources:
    requests:
      cpu: "1"
      memory: 3Gi
  credentials:
  - namespace: test-credentials
    name: dt-secrets
    mount_path: /var/run/claude-code-service-account
  documentation: |-
    Agentic post-step for OpenShift Observability teams that autonomously triages e2e test failures using Claude Code CLI.
    See ci-operator/step-registry/openshift-observability/qe-agent/README.md for full setup and usage documentation.
