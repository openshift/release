ref:
  as: openshift-observability-inject-ci-registry-auth
  from: cli
  commands: openshift-observability-inject-ci-registry-auth-commands.sh
  cli: latest
  grace_period: 1m
  timeout: 10m0s
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  documentation: |-
    Injects the CI build cluster registry credentials into the target cluster's
    global pull secret. This allows the cluster to pull images from the CI
    registry (registry.build*.ci.openshift.org), which is required when using
    operator-sdk run bundle with CI-built bundle images on clusters that are
    not provisioned by the CI infrastructure (e.g., baremetal lab clusters).
