ref:
  as: openshift-logging-enable-cluster-logging
  from: tests-private
  grace_period: 10m
  commands: openshift-logging-enable-cluster-logging-commands.sh
  cli: latest
  timeout: 12h0m0s
  env:
  - name: CLF_NAME
    default: "collector"
    documentation: The operator channel to be deployed
  - name: CLF_NAMESPACE
    default: "openshift-logging"
    documentation: The namespace where clf is deployed
  - name: LOKI_NAME
    default: "logging-loki"
    documentation: The operator channel to be deployed
  - name: LOKI_NAMESPACE
    default: "openshift-logging"
    documentation: The namespace where lokistack is deployed
  - name: MINIO_NAMESPACE
    default: "openshift-logging-minio"
    documentation: The namespace for minio
  - name: MINIO_BUCKET
    default: "logging-loki"
    documentation: the bucket name for lokistack
  - name: SIZE
    default: "1x.demo"
    documentation: The operator channel to be deployed
  - name: INPUTS
    default: "application,infrastructure"
    documentation: the input source collected by cluster-logging. 
  - name: CREATE_DATA
    default: "true"
    documentation: Create applications and logging alerts if enabled
  resources:
    requests:
      cpu: "1"
      memory: 1Gi
    limits:
      memory: 2Gi
  documentation: |-
    Deploy lokistack and send logs to lokistack for test purpose.  minio is used as backend storage.  Logging UI is enabled if COO is avaible. the test data(application and alerts) are configured
