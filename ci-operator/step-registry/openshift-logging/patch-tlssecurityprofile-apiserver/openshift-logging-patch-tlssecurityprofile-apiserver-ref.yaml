ref:
  as: openshift-logging-patch-tlssecurityprofile-apiserver
  from: tests-private
  grace_period: 10m
  commands: openshift-logging-patch-tlssecurityprofile-apiserver-commands.sh
  cli: latest
  timeout: 1h0m0s
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
  env:
    - name: LOGGING_TLS_PROFILE_CONFIG
      default: ""
      documentation: |
        Custom tlsSecurityProfile configuration that needs to be applied on the apiserver cluster. Include custom ciphers and TLS versions.
  documentation: |-
    This step patches a custom tlsSecurityProfile configuration on the apiserver cluster.
