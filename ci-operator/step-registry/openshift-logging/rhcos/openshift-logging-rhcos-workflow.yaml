workflow:
  as: openshift-logging-rhcos
  steps:
    allow_best_effort_post_steps: true
    pre:
    - chain: ipi-conf-aws
    - ref: rhcos-conf-osstream
    - chain: ipi-install
    post:
    - chain: gather-network
    - chain: gather-core-dump
    - chain: ipi-deprovision
    env:
      FAIL_ON_CORE_DUMP: "false"
  documentation: |-
    The Openshift Logging workflow installs an AWS cluster with configurable RHCOS version for testing cluster logging operator. Set OSSTREAM env var to "rhel-10" for RHCOS 10 or "rhel-9" for RHCOS 9.
