ref:
  as: openshift-logging-install-operators-from-bundles
  from_image:
    namespace: ocp
    name: cli-operator-sdk
    tag: v1.39.2
  grace_period: 10m
  commands: openshift-logging-install-operators-from-bundles-commands.sh
  resources:
    requests:
      cpu: "1"
      memory: 3Gi
  env:
  - name: MULTISTAGE_PARAM_OVERRIDE_LOGGING_TEST_VERSION
    default: ""
    documentation: |-
      The version of logging which will be tested, used for creating the ICSP.
      The var can be set when using the Gangway API, pass it as:
      "pod_spec_options": {
        "envs": {
          "MULTISTAGE_PARAM_OVERRIDE_LOGGING_TEST_VERSION": "6.3"
        }
      }
  - name: MULTISTAGE_PARAM_OVERRIDE_LOGGING_BUNDLES
    default: ""
    documentation: |-
      The bundle images used to install operators.
      The var can be set when using the Gangway API, pass it as:
      "pod_spec_options": {
        "envs": {
          "MULTISTAGE_PARAM_OVERRIDE_LOGGING_BUNDLES": "quay.io/example/clo-bundle:latest,quay.io/example/lo-bundle:latest"
        }
      }
  documentation: |-
    Install logging operators from bundles.
