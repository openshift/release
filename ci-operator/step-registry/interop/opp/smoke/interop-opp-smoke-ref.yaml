ref:
  as: interop-opp-smoke
  from: cli
  grace_period: 30s
  commands: interop-opp-smoke-commands.sh
  timeout: 30m
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  documentation: |-
    Runs post-upgrade smoke tests against OPP bundle components
    (ACM, ACS, ODF, Quay) to verify cluster health, operator CSV
    status, ACM managed-cluster connectivity, ACS sensor status,
    and Quay registry reachability.  Produces JUnit XML for
    Prow / Sippy / TestGrid consumption.
