ref:
  as: odf-apply-storage-cluster
  from_image:
    namespace: ocp
    name: cli-jq
    tag: latest
  commands: odf-apply-storage-cluster-commands.sh
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
  env:
    - name: ODF__INSTALL_NAMESPACE
      default: openshift-storage
    - name: ODF__STORAGE_CLASS
      default: gp3-csi
    - name: ODF__STORAGE_CLAIM
      default: 100Gi
    - name: ODF__TEST_PLATFORM
      default: "aws"
    - name: ODF__STORAGE_CLUSTER_WAIT_TIMEOUT
      default: "10m"
      documentation: How long to wait for the StorageCluster to reach Available condition.
  documentation: |-
    Apply Storage Cluster in order to complete ODF operator installation