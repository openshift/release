ref:
  as: odf-apply-storage-cluster
  from_image:
    namespace: ocp
    name: cli-jq
    tag: latest
  commands: odf-apply-storage-cluster-commands.sh
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
  env:
    - name: ODF_INSTALL_NAMESPACE
      default: openshift-storage
    - name: ODF_STORAGE_CLASS
      default: gp3-csi
    - name: ODF_STORAGE_CLAIM
      default: 100Gi
    - name: TEST_PLATFORM
      default: aws
    - name: SC_WAIT_TIMEOUT
      default: "10m"
      documentation: Timeout for waiting for the StorageCluster to become Available. Increase for slower environments (e.g. HyperShift).
    - name: ODF_SC_AVAILABLE_FALLBACK
      default: "false"
      documentation: When "true", fall back to OSD deployment readiness if StorageCluster Available condition is not met. Set only in HyperShift jobs where OCSInitialization prevents the condition from being set.
  documentation: |-
    Apply Storage Cluster in order to complete ODF operator installation