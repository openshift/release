ref:
  as: upi-conf-libvirt
  from: libvirt-installer
  commands: upi-conf-libvirt-commands.sh
  env:
  - name: ARCH
  - name: CONTROL_COUNT
    default: '3'
  - name: COMPUTE_COUNT
    default: '2'
  - name: FIPS_ENABLED
    default: "false"
    documentation: |-
      Enable FIPS:
      * "false" (default) - do not enable FIPS
      * "true" - enable FIPS
  - name: FEATURE_SET
    default: ""
    documentation: |-
      This field sets the cluster feature set. This is used to enable custom features such as tech preview features.
  - name: NODE_TUNING
    default: "false"
  - name: USE_EXTERNAL_DNS
    default: 'false'
  - name: OS_IMAGE_STREAM
    default: ""
    documentation: |-
      Sets the OS Image Stream to be used for all machines in the cluster..
  - name: CLUSTER_ROLE
    default: ""
    documentation: |-
      Optional cluster role for dual-cluster workflows. When set, artifacts are stored
      under ${SHARED_DIR}/${CLUSTER_ROLE} and cluster names include CLUSTER_SUFFIX.
  - name: CLUSTER_SUFFIX
    default: ""
    documentation: |-
      Optional suffix appended to the lease name for cluster and libvirt resource naming.
  - name: LEASE_PATH_PREFIX
    default: ""
    documentation: |-
      Optional prefix for lease YAML keys when multiple clusters share one lease (e.g. infra.).
  - name: INFRA_LEASED_RESOURCE
    default: ""
    documentation: |-
      Optional second lease name used when CLUSTER_ROLE is infra.
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
  documentation: |-
    This step will create setup configuration files like the install-config and ignition files for a upi
    deployment.
