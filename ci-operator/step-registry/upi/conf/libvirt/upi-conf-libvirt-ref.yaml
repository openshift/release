ref:
  as: upi-conf-libvirt
  from: libvirt-installer
  commands: upi-conf-libvirt-commands.sh
  env:
  - name: ARCH
  - name: CONTROL_COUNT
    default: '3'
  - name: COMPUTE_COUNT
    default: '2'
  - name: FIPS_ENABLED
    default: "false"
    documentation: |-
      Enable FIPS:
      * "false" (default) - do not enable FIPS
      * "true" - enable FIPS
  - name: FEATURE_SET
    default: ""
    documentation: |-
      This field sets the cluster feature set. This is used to enable custom features such as tech preview features.
  - name: NODE_TUNING
    default: "false"
  - name: USE_EXTERNAL_DNS
    default: 'false'
  - name: IPV6_SINGLESTACK
    default: 'false'
    documentation: |-
      When "true", replace install-config networking with IPv6 single-stack (machine, cluster, and
      service networks from the lease) and emit IPv6-only libvirt network.xml. Requires ipv6.* and
      per-node .ipv6 fields in the cluster lease (see upi-conf-libvirt-network). Not supported with
      INSTALLER_TYPE=agent.
  - name: OS_IMAGE_STREAM
    default: ""
    documentation: |-
      Sets the OS Image Stream to be used for all machines in the cluster..
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
  documentation: |-
    This step will create setup configuration files like the install-config and ignition files for a upi
    deployment.
