ref:
  as: upi-conf-libvirt-network-infra
  from: libvirt-installer
  commands: upi-conf-libvirt-network-infra-commands.sh
  env:
  - name: CLUSTER_ROLE
    default: "infra"
    documentation: |-
      Fixed to "infra": uses $LEASED_RESOURCE_INFRA / $SHARED_DIR/infra/.
  - name: INSTALLER_TYPE
    documentation: The type of installer to use for deployment. Supported values are [agent, default]
    default: 'default'
  - name: USE_EXTERNAL_DNS
    default: 'false'
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
  documentation: |-
    Infra-cluster variant of upi-conf-libvirt-network. CLUSTER_ROLE is fixed to
    "infra" so the network.xml is written to $SHARED_DIR/infra/ using $LEASED_RESOURCE_INFRA.
