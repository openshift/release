ref:
  as: upi-conf-libvirt-infra-install-config
  from: libvirt-installer
  commands: upi-conf-libvirt-infra-install-config-commands.sh
  env:
  - name: CLUSTER_ROLE
    default: "infra"
    documentation: |-
      Fixed to "infra": uses $LEASED_RESOURCE_INFRA / $SHARED_DIR/infra/.
  - name: ARCH
  - name: CONTROL_COUNT
    default: '3'
  - name: COMPUTE_COUNT
    default: '2'
  - name: FIPS_ENABLED
    default: "false"
  - name: FEATURE_SET
    default: ""
  - name: NODE_TUNING
    default: "false"
  - name: USE_EXTERNAL_DNS
    default: 'false'
  - name: OS_IMAGE_STREAM
    default: ""
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
  documentation: |-
    Infra-cluster variant of upi-conf-libvirt (install-config generation). CLUSTER_ROLE
    is fixed to "infra" so files are written to $SHARED_DIR/infra/ using $LEASED_RESOURCE_INFRA.
