ref:
  as: upi-conf-libvirt-agent-infra
  from: libvirt-installer
  commands: upi-conf-libvirt-agent-infra-commands.sh
  env:
  - name: CLUSTER_ROLE
    default: "infra"
    documentation: |-
      Fixed to "infra": uses $LEASED_RESOURCE_INFRA / $SHARED_DIR/infra/.
  - name: USE_EXTERNAL_DNS
    default: "false"
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
  documentation: |-
    Infra-cluster variant of upi-conf-libvirt-agent. CLUSTER_ROLE is fixed to
    "infra" so agent-config.yaml is written to $SHARED_DIR/infra/ using $LEASED_RESOURCE_INFRA.
