ref:
  as: upi-libvirt-infra-debug-static-pod
  from_image:
    namespace: origin
    name: centos
    tag: '8'
  commands: upi-libvirt-infra-debug-static-pod-commands.sh
  resources:
    requests:
      cpu: 10m
      memory: 10Mi
    limits:
      memory: 200Mi
  env:
  - name: CLUSTER_ROLE
    default: "infra"
    documentation: Fixed to "infra". Uses $LEASED_RESOURCE_INFRA / $SHARED_DIR/infra/.
  - name: IGNITIONVERSION
    default: "3.2.0"
  - name: STATIC_POD_CHECK_WORKAROUND
    default: "false"
  documentation: Infra variant of ipi-debug-missing-static-pod-controller-degraded.
