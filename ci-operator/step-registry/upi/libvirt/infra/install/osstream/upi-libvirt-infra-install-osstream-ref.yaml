ref:
  as: upi-libvirt-infra-install-osstream
  from: installer
  commands: upi-libvirt-infra-install-osstream-commands.sh
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
  env:
  - name: CLUSTER_ROLE
    default: "infra"
    documentation: Fixed to "infra". Causes the script to write manifests to $SHARED_DIR/infra/.
  - name: OSSTREAM
    default: ""
  - name: OS_IMAGE_STREAM_MCP_MASTER
    default: ""
  - name: OS_IMAGE_STREAM_MCP_WORKER
    default: ""
  documentation: Infra variant of rhcos-conf-osstream. Writes manifests to $SHARED_DIR/infra/.
