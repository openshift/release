ref:
  as: upi-libvirt-infra-install-install
  from: libvirt-installer
  grace_period: 30m
  commands: upi-libvirt-infra-install-install-commands.sh
  env:
  - name: CLUSTER_ROLE
    default: "infra"
    documentation: Fixed to "infra". Uses $LEASED_RESOURCE_INFRA / $SHARED_DIR/infra/.
  - name: ARCH
  - name: BRANCH
  - name: COMPUTE_COUNT
    default: '2'
  - name: CONTROL_COUNT
    default: '3'
  - name: DOMAIN_MEMORY
    default: '24567'
  - name: DOMAIN_VCPUS
    default: '10'
  - name: INSTALLER_TYPE
    default: 'default'
  - name: LIBVIRT_IMAGE_PATH
    default: '/var/lib/libvirt/openshift-images'
  - name: VIRT_INSTALL_OSINFO
    default: 'rhel9-unknown'
  - name: POOL_NAME
    default: 'multiarch-ci-pool'
  - name: HTTPD_POOL_NAME
    default: 'httpd'
  - name: VOLUME_CAPACITY
    default: '60G'
  - name: FIPS_ENABLED
    default: 'false'
  - name: ETCD_DISK_SPEED
    default: 'standard'
  - name: USE_EXTERNAL_DNS
    default: 'false'
  - name: OPENSHIFT_INSTALL_EXPERIMENTAL_DISABLE_IMAGE_POLICY
    default: "true"
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
  dependencies:
    - name: "release:latest"
      env: OPENSHIFT_INSTALL_TARGET
  documentation: Infra variant of upi-install-libvirt. Provisions infra cluster VMs via remote libvirt (upi-libvirt-infra-install-install).
