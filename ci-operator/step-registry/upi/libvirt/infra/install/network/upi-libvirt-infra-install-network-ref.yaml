ref:
  as: upi-libvirt-infra-install-network
  from: libvirt-installer
  commands: upi-libvirt-infra-install-network-commands.sh
  env:
  - name: CLUSTER_ROLE
    default: "infra"
    documentation: Fixed to "infra". Uses $LEASED_RESOURCE_INFRA / $SHARED_DIR/infra/.
  - name: ARCH
  - name: USE_EXTERNAL_DNS
    default: 'false'
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
  dnsConfig:
    nameservers:
    - 172.30.38.188
    searches:
    - "bastion-z.svc.cluster.local"
    - "bastion-ppc64le-libvirt.svc.cluster.local"
  documentation: Infra variant of upi-install-libvirt-network. Creates virsh network for the infra cluster.
