chain:
  as: upi-libvirt-infra-install
  steps:
  - ref: upi-libvirt-infra-install-network
  - ref: upi-libvirt-infra-install-osstream
  - ref: upi-libvirt-infra-install
  env:
  - name: ARCH
  - name: BRANCH
  documentation: |-
    Infra-cluster install chain. All steps use uniquely-named infra refs (upi-libvirt-infra-*)
    so they coexist with mgmt steps in one workflow. Every ref has CLUSTER_ROLE=infra so
    scripts use $LEASED_RESOURCE_INFRA and write to $SHARED_DIR/infra/.
