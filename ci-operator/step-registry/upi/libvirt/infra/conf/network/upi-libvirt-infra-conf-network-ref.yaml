ref:
  as: upi-libvirt-infra-conf-network
  from: libvirt-installer
  commands: upi-libvirt-infra-conf-network-commands.sh
  env:
  - name: CLUSTER_ROLE
    default: "infra"
    documentation: Fixed to "infra". Uses $LEASED_RESOURCE_INFRA / $SHARED_DIR/infra/.
  - name: INSTALLER_TYPE
    default: 'default'
  - name: USE_EXTERNAL_DNS
    default: 'false'
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
  documentation: Infra variant of upi-conf-libvirt-network. Writes network.xml to $SHARED_DIR/infra/.
