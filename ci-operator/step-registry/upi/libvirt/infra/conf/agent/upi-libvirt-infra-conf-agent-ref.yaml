ref:
  as: upi-libvirt-infra-conf-agent
  from: libvirt-installer
  commands: upi-libvirt-infra-conf-agent-commands.sh
  env:
  - name: CLUSTER_ROLE
    default: "infra"
    documentation: Fixed to "infra". Uses $LEASED_RESOURCE_INFRA / $SHARED_DIR/infra/.
  - name: USE_EXTERNAL_DNS
    default: "false"
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
  documentation: Infra variant of upi-conf-libvirt-agent. Writes agent-config.yaml to $SHARED_DIR/infra/.
