ref:
  as: upi-libvirt-infra-conf-etcd-ramfs
  from_image:
    namespace: origin
    name: centos
    tag: '8'
  commands: upi-libvirt-infra-conf-etcd-ramfs-commands.sh
  resources:
    requests:
      cpu: 10m
      memory: 10Mi
    limits:
      memory: 200Mi
  env:
  - name: CLUSTER_ROLE
    default: "infra"
    documentation: Fixed to "infra". Uses $LEASED_RESOURCE_INFRA / $SHARED_DIR/infra/.
  - name: IGNITIONVERSION
    default: "3.1.0"
  - name: USE_RAMFS
    default: "false"
  documentation: Infra variant of ipi-conf-etcd-on-ramfs.
