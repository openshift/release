ref:
  as: upi-libvirt-infra-conf-kdump
  from: cli
  commands: upi-libvirt-infra-conf-kdump-commands.sh
  resources:
    requests:
      cpu: 300m
      memory: 300Mi
  env:
  - name: CLUSTER_ROLE
    default: "infra"
    documentation: Fixed to "infra". Uses $LEASED_RESOURCE_INFRA / $SHARED_DIR/infra/.
  - name: APPLY_NODE_ROLE
    default: "worker"
  - name: ARCH
    default: amd64
  - name: BUTANE_RELEASE
    default: "4.15.0"
  - name: KDUMP_COMMANDLINE_REMOVE
    default: "hugepages hugepagesz slub_debug quiet log_buf_len swiotlb"
  - name: KDUMP_COMMANDLINE_APPEND
    default: "irqpoll nr_cpus=1 reset_devices cgroup_disable=memory mce=off numa=off udev.children-max=2 panic=10 rootflags=nofail acpi_no_memhotplug transparent_hugepage=never nokaslr novmcoredd hest_disable"
  - name: KDUMP_KEXEC_ARGS
    default: "--dt-no-old-root -s"
  - name: KDUMP_IMG
    default: "vmlinuz"
  - name: LOG_PATH
    default: "/var/crash"
  - name: CRASH_KERNEL_MEMORY
    default: "256M"
  documentation: Infra variant of ipi-conf-debug-kdump-configure-logs.
