ref:
  as: upi-libvirt-infra-conf-install-config
  from: libvirt-installer
  commands: upi-libvirt-infra-conf-install-config-commands.sh
  env:
  - name: CLUSTER_ROLE
    default: "infra"
    documentation: Fixed to "infra". Uses $LEASED_RESOURCE_INFRA / $SHARED_DIR/infra/.
  - name: ARCH
  - name: CONTROL_COUNT
    default: '3'
  - name: COMPUTE_COUNT
    default: '0'
  - name: FIPS_ENABLED
    default: "false"
  - name: FEATURE_SET
    default: ""
  - name: NODE_TUNING
    default: "false"
  - name: USE_EXTERNAL_DNS
    default: 'false'
  - name: OS_IMAGE_STREAM
    default: ""
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
  documentation: Infra variant of upi-conf-libvirt. Writes install-config.yaml to $SHARED_DIR/infra/.
