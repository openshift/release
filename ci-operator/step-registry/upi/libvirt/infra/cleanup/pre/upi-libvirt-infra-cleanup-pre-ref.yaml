ref:
  as: upi-libvirt-infra-cleanup-pre
  from: libvirt-installer
  grace_period: 10m
  commands: upi-libvirt-infra-cleanup-pre-commands.sh
  env:
  - name: CLUSTER_ROLE
    default: "infra"
    documentation: Fixed to "infra". Causes the script to use $LEASED_RESOURCE_INFRA.
  - name: POOL_NAME
    default: "multiarch-ci-pool"
  - name: HTTPD_POOL_NAME
    default: "httpd"
  resources:
    requests:
      cpu: 1000m
      memory: 300Mi
  dnsConfig:
    nameservers:
    - 172.30.38.188
    searches:
    - "bastion-z.svc.cluster.local"
    - "bastion-ppc64le-libvirt.svc.cluster.local"
  documentation: |-
    Infra variant of upi-libvirt-cleanup-pre. Cleans up infra cluster libvirt resources
    identified by $LEASED_RESOURCE_INFRA before installation begins.
