ref:
  as: upi-libvirt-cleanup-pre-infra
  from: libvirt-installer
  grace_period: 10m
  commands: upi-libvirt-cleanup-pre-infra-commands.sh
  env:
  - name: POOL_NAME
    default: "multiarch-ci-pool"
  - name: HTTPD_POOL_NAME
    default: "httpd"
  resources:
    requests:
      cpu: 1000m
      memory: 300Mi
  dnsConfig:
    nameservers:
    - 172.30.38.188
    searches:
    - "bastion-z.svc.cluster.local"
    - "bastion-ppc64le-libvirt.svc.cluster.local"
  documentation: |-
    Runs the same libvirt pre-cleanup as upi-libvirt-cleanup-pre but targets the
    infra cluster host identified by $LEASED_RESOURCE_INFRA instead of $LEASED_RESOURCE.
