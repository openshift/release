chain:
  as: upi-install-libvirt
  steps:
  - ref: upi-install-libvirt-network
  - ref: rhcos-conf-osstream
  - ref: upi-install-libvirt
  env:
  - name: CLUSTER_ROLE
    default: "mgmt"
    documentation: |-
      Which cluster this chain is installing.
      "mgmt" (default) uses $LEASED_RESOURCE and writes to $SHARED_DIR.
      "infra" uses $LEASED_RESOURCE_INFRA and writes to $SHARED_DIR/infra/.
  - name: ARCH
  - name: BRANCH
  documentation: |-
    The UPI libvirt install chain prepares an UPI installation by setting up privileges for the
    cluster against the build farm and then runs the actuall cluster installation via remote libvirt
    tunnel.