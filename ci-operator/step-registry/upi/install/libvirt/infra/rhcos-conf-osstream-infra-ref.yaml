ref:
  as: rhcos-conf-osstream-infra
  from: installer
  commands: rhcos-conf-osstream-infra-commands.sh
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
  env:
  - name: OSSTREAM
    default: ""
    documentation: The OS Image Stream for the infra cluster. Valid values are "rhel-9" or "rhel-10". If empty, no configuration is applied.
  - name: OS_IMAGE_STREAM_MCP_MASTER
    default: ""
  - name: OS_IMAGE_STREAM_MCP_WORKER
    default: ""
  documentation: |-
    Infra-cluster variant of rhcos-conf-osstream. Generates the same osImageStream
    manifests for the infra cluster.
