chain:
  as: upi-install-libvirt-infra
  steps:
  - ref: upi-install-libvirt-network-infra
  - ref: rhcos-conf-osstream-infra
  - ref: upi-install-libvirt-infra
  env:
  - name: ARCH
  - name: BRANCH
  documentation: |-
    Infra-cluster variant of upi-install-libvirt. All steps use -infra wrapper refs
    (unique as: names) so they can coexist with the mgmt cluster steps in one workflow.
    Every wrapper ref declares CLUSTER_ROLE=infra, causing scripts to use
    $LEASED_RESOURCE_INFRA and write to $SHARED_DIR/infra/.
