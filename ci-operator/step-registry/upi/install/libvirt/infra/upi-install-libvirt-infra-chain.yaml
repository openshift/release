chain:
  as: upi-install-libvirt-infra
  steps:
  - ref: upi-install-libvirt-network
  - ref: rhcos-conf-osstream
  - ref: upi-install-libvirt
  env:
  - name: CLUSTER_ROLE
    default: "infra"
    documentation: |-
      Fixed to "infra": uses $LEASED_RESOURCE_INFRA and writes to $SHARED_DIR/infra/.
  - name: ARCH
  - name: BRANCH
  documentation: |-
    Infra-cluster variant of upi-install-libvirt. Identical steps but CLUSTER_ROLE
    defaults to "infra" so every script redirects to $LEASED_RESOURCE_INFRA and
    writes install artifacts into $SHARED_DIR/infra/.
