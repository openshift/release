ref:
  as: ipi-debug-missing-static-pod-controller-degraded-infra
  from_image:
    namespace: origin
    name: centos
    tag: '8'
  commands: ipi-debug-missing-static-pod-controller-degraded-infra-commands.sh
  resources:
    requests:
      cpu: 10m
      memory: 10Mi
    limits:
      memory: 200Mi
  env:
    - name: CLUSTER_ROLE
      default: "infra"
      documentation: |-
        Fixed to "infra": uses $LEASED_RESOURCE_INFRA / $SHARED_DIR/infra/.
    - name: IGNITIONVERSION
      default: "3.2.0"
      documentation: ignition version to use for mco.
    - name: STATIC_POD_CHECK_WORKAROUND
      default: "false"
      documentation: |-
        Use ramfs:
        * "true" - Create a utility which monitors the state of static pod containers,
                   triggering a restart of kubelet.service if any given pod is deemed
                   unhealthy for too long.
        * "false" (default) - Do not create the pods.
  documentation: >-
    Infra-cluster variant of ipi-debug-missing-static-pod-controller-degraded.
    CLUSTER_ROLE is fixed to "infra" so manifest files are written to $SHARED_DIR/infra/.
