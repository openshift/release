ref:
  as: upi-install-libvirt-network-infra
  from: libvirt-installer
  commands: upi-install-libvirt-network-infra-commands.sh
  env:
  - name: CLUSTER_ROLE
    default: "infra"
    documentation: |-
      Fixed to "infra": uses $LEASED_RESOURCE_INFRA / $SHARED_DIR/infra/.
  - name: ARCH
  - name: USE_EXTERNAL_DNS
    default: 'false'
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
  dnsConfig:
    nameservers:
    - 172.30.38.188
    searches:
    - "bastion-z.svc.cluster.local"
    - "bastion-ppc64le-libvirt.svc.cluster.local"
  documentation: |-
    Infra-cluster variant of upi-install-libvirt-network. CLUSTER_ROLE is fixed to
    "infra" so virsh creates the infra cluster network using $LEASED_RESOURCE_INFRA.
