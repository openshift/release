ref:
  as: ipi-conf-etcd-on-ramfs-infra
  from_image:
    namespace: origin
    name: centos
    tag: '8'
  commands: ipi-conf-etcd-on-ramfs-infra-commands.sh
  resources:
    requests:
      cpu: 10m
      memory: 10Mi
    limits:
      memory: 200Mi
  env:
    - name: CLUSTER_ROLE
      default: "infra"
      documentation: |-
        Fixed to "infra": uses $LEASED_RESOURCE_INFRA / $SHARED_DIR/infra/.
    - name: IGNITIONVERSION
      default: "3.1.0"
      documentation: ignition version to use for mco.
    - name: USE_RAMFS
      default: "false"
      documentation: |-
        Use ramfs:
        * "true" - configure etcd to use ramfs. NOTE: For upgrade testing,
                   where ramfs will go away due to rebooting, do not use ramfs.
        * "false" (default) - Do not use ramfs.
  documentation: >-
    Infra-cluster variant of ipi-conf-etcd-on-ramfs. CLUSTER_ROLE is fixed to
    "infra" so manifest files are written to $SHARED_DIR/infra/.
