ref:
  as: upi-install-gcp-by-infra-manager
  from: upi-installer
  grace_period: 10m
  commands: upi-install-gcp-by-infra-manager-commands.sh
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
  env:
  - name: OCP_ARCH
    default: "amd64"
    documentation: |-
      The architecture of the control plane nodes (e.g., amd64, arm64)
  - name: CONTROL_PLANE_NODE_TYPE
    default: "n2-standard-4"
    documentation: |-
      GCP machine type for control plane (master) nodes
  - name: COMPUTE_NODE_TYPE
    default: "n2-standard-2"
    documentation: |-
      GCP machine type for worker (compute) nodes
  - name: BOOTSTRAP_NODE_TYPE
    default: "n2-standard-4"
    documentation: |-
      GCP machine type for the temporary bootstrap node
  - name: PUBLISH
    default:  ""
    documentation: |-
      This field represents how to expose the user-facing endpoints like the Kubernetes API, OpenShift routes of the cluster
  - name: OPENSHIFT_INSTALL_EXPERIMENTAL_DISABLE_IMAGE_POLICY
    default: "true"
    documentation: "Set to true to disable the Sigstore image signature policy to allow the installation of an unsigned release image. This is for internal CI testing only"
  documentation: >-
    This step deploys a UPI cluster to the CI GCP project.
    It requires properly configured Ignition, metadata.json, and kubeconfig files to exist in the shared directory.
    These files are used to deploy a cluster to the GCP project using the UPI workflow.
