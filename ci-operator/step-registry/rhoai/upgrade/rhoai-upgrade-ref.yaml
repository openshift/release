ref:
  as: rhoai-upgrade
  from: rhoai-tests
  commands: rhoai-upgrade-commands.sh
  resources:
    requests:
      cpu: '1'
      memory: 500Mi
  env:
    - name: TEST_SUITE
      default: "Post-Upgrade"
    - name: UPGRADE_VERSION
      default: "2.18"
      documentation: OpenShift AI version to upgrade  
  credentials:
  - namespace: test-credentials
    name: rhoai-quay-token
    mount_path: /tmp/secrets/ci
  documentation: >-
    This step upgrade RHOAI version and run the post upgrade tests.
