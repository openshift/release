ref:
  as: rhoai-dashboard-tests
  from: rhoai-branch-tests
  commands: rhoai-dashboard-tests-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  env:
    - name: OPERATOR_NAME
      default: rhods-operator
    - name: TEST_SUITE
      default: "Dashboard"
  credentials:
  - namespace: test-credentials
    name: rhoai-qe-bucket
    mount_path: /tmp/secrets/ci
  - namespace: test-credentials
    name: dashboard-repo-token
    mount_path: /tmp/secrets/ci
  documentation: >-
    This step runs RHOAI dashboard tests.