chain:
  as: mco-test-e2e-upgrade-ocl-aws
  steps:
    - ref: cucushift-pre
    - ref: cucushift-upgrade-prepare
    - ref: cucushift-upgrade-prehealthcheck
    - ref: mco-conf-day2-add-mcoqe-robot-to-pull-secret
