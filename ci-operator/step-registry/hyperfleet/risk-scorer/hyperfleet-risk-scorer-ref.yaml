ref:
  as: hyperfleet-risk-scorer
  commands: hyperfleet-risk-scorer-commands.sh
  from: src
  grace_period: 1m0s
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  credentials:
  - namespace: test-credentials
    name: hyperfleet-ci-bot
    mount_path: /etc/hyperfleet-ci-bot
  env:
  - name: GITHUB_APP_ID
    default: "3716712"
    documentation: |-
      The GitHub App ID for hyperfleet-ci-bot.
  - name: GITHUB_APP_INSTALLATION_ID
    default: "132416558"
    documentation: |-
      The GitHub App installation ID for the openshift-hyperfleet organization.
  - name: GITHUB_APP_PRIVATE_KEY_FILE
    default: "/etc/hyperfleet-ci-bot/private-key"
    documentation: |-
      Path to the GitHub App private key file.
  timeout: 5m0s
  documentation: |-
    Computes a deterministic risk score for a pull request based on diff size,
    sensitive path changes, and test coverage. Applies a risk/low, risk/medium,
    or risk/high label and posts a score breakdown comment.
