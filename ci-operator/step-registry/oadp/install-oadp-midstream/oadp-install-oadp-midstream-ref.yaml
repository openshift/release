ref:
  as: oadp-install-oadp-midstream
  from: oadp-runner
  commands: oadp-install-oadp-midstream-commands.sh
  resources:
    requests:
      cpu: '1'
      memory: 500Mi
  env:
  - name: OWNER
    default: openshift
    documentation: GitHub org/owner for oadp-operator repo
  - name: OADP_DEPLOY_BY_UPSTREAM_COMMIT
    default: oadp-dev
    documentation: Branch or commit to deploy from upstream
  documentation: |-
    This step deploys the OADP operator from upstream (midstream) using deploy_latest_upstream.sh.
