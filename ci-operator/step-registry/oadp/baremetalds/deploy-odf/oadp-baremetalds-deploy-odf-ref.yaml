ref:
  as: oadp-baremetalds-deploy-odf
  from_image:
    namespace: ocp
    name: cli-jq
    tag: latest
  commands: oadp-baremetalds-deploy-odf-commands.sh
  timeout: 3h0m0s
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  credentials:
    - namespace: test-credentials
      name: odf-quay-credentials
      mount_path: /tmp/secrets/odf-quay-credentials
  documentation: |-
    Deploy ODF on a baremetalds cluster using LSO localblock storage as backend.
    This is an OADP-specific variant of interop-tests-deploy-odf that defaults
    to localblock storage class instead of gp2-csi.
  env:
  - name: ODF_VERSION_MAJOR_MINOR
    documentation: The ODF major.minor version
    default: "4.13"
  - name: ODF_OPERATOR_CHANNEL
    documentation: The odf operator channel
    default: "stable-4.11"
  - name: ODF_SUBSCRIPTION_NAME
    documentation: The ODF/OCS subscription name
    default: "odf-operator"
  - name: ODF_STORAGE_CLUSTER_NAME
    documentation: The ODF storage cluster name
    default: "ocs-storagecluster"
  - name: ODF_VOLUME_SIZE
    documentation: The size of the ODF volume in Gi
    default: "50"
  - name: ODF_BACKEND_STORAGE_CLASS
    documentation: The storage class used as backend for ODF. Defaults to localblock for baremetalds LSO-based deployments.
    default: "localblock"
