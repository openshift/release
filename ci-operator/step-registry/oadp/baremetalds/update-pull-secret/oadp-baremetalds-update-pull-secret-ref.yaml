ref:
  as: oadp-baremetalds-update-pull-secret
  from_image:
    namespace: ocp
    name: cli-jq
    tag: latest
  commands: oadp-baremetalds-update-pull-secret-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 100Mi
  documentation: |-
    Merges the cluster profile pull secret (CLUSTER_PROFILE_DIR/pull-secret) into the
    cluster-wide pull secret in openshift-config/pull-secret and waits for all
    MachineConfigPools to finish rolling out the update. This ensures nodes can pull
    images from registry.redhat.io when the cluster is installed with INSTALLER_PROXY=true
    and no local image mirroring (MIRROR_IMAGES is not set).
