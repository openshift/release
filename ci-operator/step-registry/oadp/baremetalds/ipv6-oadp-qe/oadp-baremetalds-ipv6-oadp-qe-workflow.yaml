workflow:
  as: oadp-baremetalds-ipv6-oadp-qe
  steps:
    cluster_profile: equinix-ocp-metal
    env:
      DEBUG_WAIT_TIMEOUT: "36000"
      DEVSCRIPTS_CONFIG: |
        IP_STACK=v6
        NETWORK_TYPE=OVNKubernetes
        INSTALLER_PROXY=true
        NUM_WORKERS=3
        NUM_MASTERS=3
        WORKER_VCPU=8
        WORKER_MEMORY=32768
        VM_EXTRADISKS=true
        VM_EXTRADISKS_LIST=vda
        VM_EXTRADISKS_SIZE=250G
      REDHAT_OPERATORS_INDEX_TAG: v4.21
      ODF_OPERATOR_SUB_CHANNEL: stable-4.21
      CCS_OPERATOR_PACKAGES: odf-operator,ocs-operator,mcg-operator,odf-csi-addons-operator
      CCS_OPERATOR_CHANNELS: stable-4.21,stable-4.21,stable-4.21,stable-4.21
      DISCONNECTED: "false"
    pre:
    - chain: baremetalds-ofcir-pre
    - ref: oadp-baremetalds-update-pull-secret
    - chain: hypershift-kubevirt-baremetalds-odf
    test:
    - ref: oadp-debug-wait
      timeout: 10h0m0s
    post:
    - chain: baremetalds-ofcir-post
  documentation: |-
    Workflow that provisions a single-stack IPv6 bare metal cluster on Equinix Metal using dev-scripts.
