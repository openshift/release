ref:
  as: oadp-baremetalds-lso-localvolume
  from: cli
  commands: oadp-baremetalds-lso-localvolume-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  env:
  - name: LSO_DEVICE_PATH
    default: "/dev/vda"
    documentation: Block device path on each ODF node to provision as a LocalVolume PV.
  documentation: |-
    Labels cluster nodes for ODF storage and creates an LSO LocalVolume using the
    specified block device. Masters are made schedulable so Ceph mons/mgrs can spread
    across all nodes. Run after the Local Storage Operator is installed and before
    the ODF StorageCluster is created.
