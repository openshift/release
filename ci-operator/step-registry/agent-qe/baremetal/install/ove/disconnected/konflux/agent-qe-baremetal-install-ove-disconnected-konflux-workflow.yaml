    pre:
      - chain: agent-qe-baremetal-install-ove-disconnected-konflux
    post:
      - ref: agent-qe-baremetal-install-ove-disconnected-konflux-delete-iso
      #- ref: baremetal-lab-post-disable-vnc
    #  - chain: baremetal-lab-agent-post
