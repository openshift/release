ref:
  as: agent-qe-baremetal-install-ove-disconnected-konflux-check-snapshot-id
  from_image:
    namespace: ci
    name: "agent-qe-base"
    tag: latest
  commands: agent-qe-baremetal-install-ove-disconnected-konflux-check-snapshot-id-commands.sh
  resources:
    requests:
      cpu: '1'
      memory: 128Mi
  grace_period: 600
  env:
    - name: SNAPSHOT
      default: ""
      documentation: "The snapshot ID of the OVE image generated by Konflux"
  documentation: |-
    Konflux-Prow integration only works with periodic jobs so we defined the CI job as periodic but we will only trigger it when a new release is available on Konflux
    The agent-qe-baremetal-install-ove-disconnected-konflux-check-snapshot-id is a workaround to skip the job execution if no snapshot ID is provided by Konflux.