ref:
  as: agent-qe-baremetal-install-ove-disconnected-konflux-extract-iso
  from_image:
    namespace: ci
    name: "baremetal-qe-base"
    tag: latest
  commands: agent-qe-baremetal-install-ove-disconnected-konflux-extract-iso-commands.sh
  resources:
    requests:
      cpu: '1'
      memory: 256Mi
  grace_period: 6000
  env:
    - name: AUX_HOST
      default: ""
      documentation: ""
    - name: SNAPSHOT
      default: ""
      documentation: "The snapshot ID of the OVE image generated by Konflux"
  documentation: |-
    The agent-qe-baremetal-install-ove-disconnected-konflux-extract-iso extracts the OVE ISO given a konflux snapshot ID