ref:
  as: agent-qe-baremetal-install-ove-disconnected-collect-validation-results
  from_image:
    namespace: ci
    name: tests-private-base
    tag: latest
  cli: latest
  grace_period: 15m
  commands: agent-qe-baremetal-install-ove-disconnected-collect-validation-results-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 100Mi
  documentation: |-
    Collect ocp-virt-validation-checkup test artifacts from the cluster PVC.
    Uses the validation image's get_results command to deploy an nginx
    pvc-reader pod, then downloads all results via wget and copies JUnit
    XMLs to ARTIFACT_DIR for Prow reporting. This step reads TIMESTAMP
    and image path from SHARED_DIR (saved by run-validation-checkup).
