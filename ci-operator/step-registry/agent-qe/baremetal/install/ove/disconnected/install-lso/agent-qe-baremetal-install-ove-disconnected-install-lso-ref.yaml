ref:
  as: agent-qe-baremetal-install-ove-disconnected-install-lso
  from_image:
    namespace: ci
    name: tests-private-base
    tag: latest
  cli: latest
  grace_period: 10m
  commands: agent-qe-baremetal-install-ove-disconnected-install-lso-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 100Mi
  env:
  - name: CATALOGSOURCE_NAME
    default: redhat-operators-full
    documentation: |-
      Name of the CatalogSource to subscribe the local-storage-operator from.
  documentation: |-
    Install local-storage-operator from a CatalogSource.
