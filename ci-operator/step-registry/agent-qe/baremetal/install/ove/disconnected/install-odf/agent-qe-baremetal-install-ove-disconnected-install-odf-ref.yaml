ref:
  as: agent-qe-baremetal-install-ove-disconnected-install-odf
  from_image:
    namespace: ci
    name: tests-private-base
    tag: latest
  cli: latest
  grace_period: 10m
  commands: agent-qe-baremetal-install-ove-disconnected-install-odf-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 100Mi
  env:
  - name: CATALOGSOURCE_NAME
    default: redhat-operators-full
    documentation: |-
      Name of the CatalogSource to subscribe the odf-operator from.
  - name: ODF_SUBSCRIPTION_CHANNEL
    default: stable-4.21
    documentation: |-
      ODF operator subscription channel.
  - name: OSD_STORAGE_CLASS
    default: localblock-sc
    documentation: |-
      StorageClass for OSD block volumes in the StorageCluster.
  - name: MON_STORAGE_CLASS
    default: localblock-mon
    documentation: |-
      StorageClass for Ceph MON volumes in the StorageCluster.
  documentation: |-
    Install ODF operator and create a StorageCluster.
