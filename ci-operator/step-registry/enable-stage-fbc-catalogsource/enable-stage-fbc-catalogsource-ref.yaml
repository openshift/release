ref:
  as: enable-stage-fbc-catalogsource
  from_image:
    namespace: ocp
    name: "4.18"
    tag: upi-installer
  cli: latest
  grace_period: 10m
  commands: enable-stage-fbc-catalogsource-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 100Mi
  credentials:
  - namespace: test-credentials
    name: deploy-konflux-operator-art-image-share
    mount_path: /var/run/vault/deploy-konflux-operator-art-image-share
  documentation: |-
    Enable the stage FBC CatalogSource in a connected environment.
    Merges quay.io/openshift-art pull credentials into the cluster
    global pull-secret, creates a version-gated mirror policy
    (ICSP for OCP 4.12, IDMS for 4.13+), and creates a CatalogSource
    using quay.io/openshift-art/stage-fbc-fragments:ocp-<X.Y>.
