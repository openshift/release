ref:
  as: review-agent-process
  from: claude-ai-helpers
  commands: review-agent-process-commands.sh
  env:
  - name: CLAUDE_CODE_USE_VERTEX
    default: "1"
    documentation: |-
      Enable Vertex AI for Claude Code.
  - name: CLOUD_ML_REGION
    default: "global"
    documentation: |-
      Google Cloud region for Vertex AI.
  - name: ANTHROPIC_VERTEX_PROJECT_ID
    default: "itpc-gcp-hybrid-pe-eng-claude"
    documentation: |-
      Google Cloud project ID for Vertex AI authentication.
  - name: GOOGLE_APPLICATION_CREDENTIALS
    default: "/var/run/claude-code-service-account/claude-prow"
    documentation: |-
      Path to the Google Cloud service account JSON key file for Vertex AI authentication.
  - name: REVIEW_AGENT_AUTH_MODE
    default: "app"
    documentation: |-
      Authentication mode: "app" (GitHub App, default) or "pat" (classic PAT).
      In "pat" mode, a single classic PAT handles fork creation, push, and PR
      operations against any public repo. Requires REVIEW_AGENT_FORK_ORG.
  - name: REVIEW_AGENT_FORK_ORG
    default: ""
    documentation: |-
      GitHub org or user account to fork repos into (PAT mode only).
      Example: "jira-solve-bot"
  - name: REVIEW_AGENT_PAT_KEY
    default: "gh-pat"
    documentation: |-
      Key name in the credential secret for the GitHub classic PAT (PAT mode only).
  - name: REVIEW_AGENT_FORK_REPO
    default: ""
    documentation: |-
      Fork repo URL to clone and push to (e.g. https://github.com/hypershift-community/hypershift).
      Required in App mode. In PAT mode, auto-derived from REVIEW_AGENT_FORK_ORG
      and the upstream repo name.
  - name: REVIEW_AGENT_UPSTREAM_REPO
    default: ""
    documentation: |-
      Upstream owner/repo for gh CLI PR operations (e.g. openshift/hypershift).
      Required in both App and PAT modes. Set by the team's wrapper workflow.
  - name: REVIEW_AGENT_TARGET_PR
    default: ""
    documentation: |-
      Explicit PR number to process. When set, overrides PULL_NUMBER from the
      presubmit context. Useful for periodic jobs triggered via gangway.
  - name: MULTISTAGE_PARAM_OVERRIDE_REVIEW_AGENT_TARGET_PR
    default: ""
    documentation: |-
      Gangway API override for REVIEW_AGENT_TARGET_PR. When triggering
      this job via the Gangway API, pass it as:
      "pod_spec_options": {
        "envs": {
          "MULTISTAGE_PARAM_OVERRIDE_REVIEW_AGENT_TARGET_PR": "1234"
        }
      }
  - name: CLAUDE_MODEL
    default: "claude-opus-4-6"
    documentation: |-
      Claude model to use for processing PR review comments.
  resources:
    requests:
      cpu: "4"
      memory: 8Gi
  credentials:
  - namespace: test-credentials
    name: hypershift-team-claude-prow
    mount_path: /var/run/claude-code-service-account
  documentation: |-
    Process step for the generic Review Agent.
    Uses the /openshift-developer:address-review-pr skill to address
    review comments on a single PR. Designed for presubmit use:
    PULL_NUMBER is provided by the Prow presubmit context.

    App mode (default): requires REVIEW_AGENT_FORK_REPO and
    REVIEW_AGENT_UPSTREAM_REPO to be set by the wrapper workflow.

    PAT mode: requires REVIEW_AGENT_AUTH_MODE="pat",
    REVIEW_AGENT_FORK_ORG, and REVIEW_AGENT_UPSTREAM_REPO.
    REVIEW_AGENT_FORK_REPO is auto-derived from FORK_ORG and the
    upstream repo name.
