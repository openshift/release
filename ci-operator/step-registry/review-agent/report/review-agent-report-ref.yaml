ref:
  as: review-agent-report
  from: claude-ai-helpers
  commands: review-agent-report-commands.sh
  env:
  - name: REVIEW_AGENT_UPSTREAM_REPO
    default: ""
    documentation: |-
      Upstream owner/repo for PR links in the report (e.g. openshift/hypershift).
      Set by the team's wrapper workflow.
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
  documentation: |-
    Generates an HTML report from the review-agent processing output.
    Parses stream-json output from Claude and produces a readable report
    in ${ARTIFACT_DIR} with token usage, cost estimates, tool calls, and errors.

    Uses REVIEW_AGENT_UPSTREAM_REPO for PR link URLs and report footer.
