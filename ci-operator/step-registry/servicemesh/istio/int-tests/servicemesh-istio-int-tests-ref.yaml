ref:
  as: servicemesh-istio-int-tests
  from: src
  commands: servicemesh-istio-int-tests-commands.sh
  resources:
    requests:
      cpu: '1'
      memory: 500Mi
  timeout: 3h0m0s
  env:
  - name: MAISTRA_NAMESPACE
    default: "maistra-e2e-test"
    documentation: |-
      The namespace where the test pod is running
  - name: AMBIENT
    default: "false"
    documentation: |-
      Set to true when running ambient tests.
  - name: CONTROL_PLANE_SOURCE
    default: "istio"
    documentation: |-
      Set to 'istio|sail' to use default CP installation or CP installation via sail operator.
  - name: INSTALL_SAIL_OPERATOR
    default: "false"
    documentation: |-
      Set to true to deploy sail operator via 'deploy' make target.
  - name: TEST_SUITE
    documentation: |-
      Which test suite should be run: 'ambient|security|telemetry|pilot|helm'
  - name: SMOKE_TEST
    default: "false"
    documentation: |-
      Set to true when you want to run only smoke tests. (/prow/skip_tests/skip_tests_smoke.yaml file will be used for determining which tests to skip)
  - name: TEST_HUB
    default: "image-registry.openshift-image-registry.svc:5000/istio-images"
    documentation: |-
      Registry from which go test pulls Istio images. Set to quay.io/sail-dev
      when using the servicemesh-istio-images-build step.
  documentation: |-
    Runs Istio integration tests directly from the step container using the kubeconfig in
    SHARED_DIR. Images must be pre-built and pushed to TEST_HUB by the
    servicemesh-istio-images-build step before this step runs.
