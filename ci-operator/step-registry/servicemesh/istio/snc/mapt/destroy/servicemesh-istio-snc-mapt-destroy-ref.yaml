ref:
  as: servicemesh-istio-snc-mapt-destroy
  commands: servicemesh-istio-snc-mapt-destroy-commands.sh
  credentials:
  - mount_path: /tmp/secrets
    name: cluster-secrets-ossm-aws
    namespace: ci
  from_image:
    name: mapt
    namespace: ci
    tag: v0.9.6
  grace_period: 30m
  resources:
    limits:
      cpu: "1"
      memory: 4Gi
    requests:
      cpu: "1"
      memory: 4Gi
  documentation: |-
    Destroys the OpenShift Single Node Cluster (SNC) created for OSSM Istio testing.

    Reads the bucket name from ${SHARED_DIR}/mapt-s3-bucket-name (written by the create step).
    If the file is absent (create never completed), the step logs a warning and exits 0 cleanly.

    S3 cleanup uses paginated listing of all object versions and delete markers
    (NextKeyMarker/NextVersionIdMarker) to handle versioned buckets with >1000 objects,
    followed by aws s3 rb to remove the bucket. On MAPT destroy failure, best-effort
    bucket cleanup is still attempted before exiting with a non-zero status.

    Uses AWS credentials from the existing vault system (cluster-secrets-ossm-aws).