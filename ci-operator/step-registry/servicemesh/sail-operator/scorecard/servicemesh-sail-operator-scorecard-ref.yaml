ref:
  as: servicemesh-sail-operator-scorecard
  from: src
  resources:
    requests:
      cpu: 100m
      memory: 100Mi
  timeout: 2h0m0s
  commands: servicemesh-sail-operator-scorecard-commands.sh
  env:
  - name: MAISTRA_NAMESPACE
    documentation: |-
      Namespace where the scorecard Job and workdir PVC run
  - name: MAISTRA_BUILDER_IMAGE
    documentation: |-
      Builder image for the scorecard Job container
  - name: MAISTRA_WORKDIR_PVC
    default: "maistra-workdir"
    documentation: |-
      PVC name prepared by servicemesh-common-prepare-job-workdir (mounted at /work)
  - name: MAISTRA_KUBECONFIG_SECRET
    default: "ci-kubeconfig"
    documentation: |-
      Secret name prepared by servicemesh-common-prepare-job-workdir
  - name: SCORECARD_JOB_NAME
    default: "sail-scorecard"
    documentation: |-
      Name of the batch/v1 Job that runs scorecard tests
  - name: MAISTRA_JOB_WAIT_TIMEOUT
    default: "100m"
    documentation: |-
      Timeout passed to oc wait --for=condition=complete for the scorecard Job
  - name: MAISTRA_JOB_TTL_SECONDS
    default: "3600"
    documentation: |-
      ttlSecondsAfterFinished so the Job pod remains for log/artifact collection
  - name: XDG_CACHE_HOME
    documentation: |-
      Cache directory for build tools
  - name: SCORECARD_COMMAND
    default: "make test.scorecard"
    documentation: |-
      The make command to execute for scorecard tests (OCP=true is set via Job env)
  documentation: |-
    Executes sail operator scorecard tests as a batch/v1 Job on the cluster under
    test. Requires servicemesh-common-prepare-job-workdir to have created the
    workdir PVC (source at /work) and kubeconfig Secret.
