ref:
  as: servicemesh-sail-operator-sync-upstream
  from: src
  resources:
    requests:
      cpu: 200m
      memory: 200Mi
  timeout: 20m0s
  commands: servicemesh-sail-operator-sync-upstream-commands.sh
  env:
  - name: TARGET_ORG
    default: "openshift-service-mesh"
    documentation: |-
      The target organization for the sync operation
  - name: TARGET_REPO
    default: "sail-operator"
    documentation: |-
      The target repository for the sync operation
  - name: TARGET_BRANCH
    default: "main"
    documentation: |-
      The target branch for the sync operation
  - name: TEST_INFRA_BRANCH
    default: "main"
    documentation: |-
      The branch of maistra/test-infra repository to use
  - name: PR_TITLE
    default: "Automator: merge upstream changes to $AUTOMATOR_ORG/$AUTOMATOR_REPO@$AUTOMATOR_BRANCH"
    documentation: |-
      The title for the pull request created by the automator
  - name: PR_LABELS
    default: "auto-merge,tide/merge-method-merge"
    documentation: |-
      Labels to apply to the pull request
  - name: MODIFIER
    default: "merge_upstream_main"
    documentation: |-
      The modifier to use for the automator operation
  - name: MERGE_SCRIPT
    default: "./ossm/merge_upstream.sh"
    documentation: |-
      The script to execute for merging upstream changes
  documentation: |-
    Syncs upstream changes from the main repository to the target repository using the maistra automator tool.
    Requires a GitHub token secret to be mounted at /creds-github.