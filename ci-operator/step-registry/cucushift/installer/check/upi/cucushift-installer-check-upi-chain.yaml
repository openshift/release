chain:
  as: cucushift-installer-check-upi
  steps:
  - ref: cucushift-installer-check-operators
  - ref: cucushift-installer-check-info
  - ref: cucushift-installer-check-capability
  - ref: cucushift-installer-check-realtime
  - ref: cucushift-installer-check-compact
  - ref: cucushift-installer-check-fips
  documentation: |-
    This chain is for UPI installer post-install health check.

    Excludes control-plane-machinesets check since UPI clusters use platform=none
    which does not support ControlPlaneMachineSets.
