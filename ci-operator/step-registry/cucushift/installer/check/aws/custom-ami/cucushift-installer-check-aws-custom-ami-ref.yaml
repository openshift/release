ref:
  as: cucushift-installer-check-aws-custom-ami
  from: upi-installer
  commands: cucushift-installer-check-aws-custom-ami-commands.sh
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
  env:
  - name: OCP_ARCH
    default: "amd64"
    documentation: |-
      The architecture of the control plane nodes (e.g., amd64, arm64), same as install-config
  documentation: >-
    Check AWS cluster AMIs.
    This step support ONE of the following configs:
    1. platform.aws.amiID is none, controlPlane.platform.aws.amiID or/and compute[0].platform.aws.amiID is set.
    2. platform.aws.amiID is set, controlPlane.platform.aws.amiID and compute[0].platform.aws.amiID is none.
    3. no amiID is set in install-config.