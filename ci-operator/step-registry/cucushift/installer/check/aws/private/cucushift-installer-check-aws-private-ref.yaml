ref:
  as: cucushift-installer-check-aws-private
  from_image:
   namespace: ocp
   name: "4.16"
   tag: upi-installer
  grace_period: 10m
  commands: cucushift-installer-check-aws-private-commands.sh
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
  env:
  - name: BASE_DOMAIN
    default: "origin-ci-int-aws.dev.rhcloud.com"
    documentation: |-
      The base domain is used to get the public hostedzone on AWS.
  - name: USER_PROVISIONED_DNS
    default: "no"
    documentation: |-
      Allow users to select the user provisioned dns option for AWS installations during configuration. Valid options are "yes" and "no". When "yes", the
      configuration will enable the user provisioned dns option through the install configuration file.
  documentation: >-
    Verify AWS private cluster
