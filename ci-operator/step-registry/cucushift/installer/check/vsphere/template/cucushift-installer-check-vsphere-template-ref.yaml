ref:
  as: cucushift-installer-check-vsphere-template
  from_image:
   namespace: ocp
   name: "4.14"
   tag: upi-installer
  commands: cucushift-installer-check-vsphere-template-commands.sh
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
  env:
  - name: FEATURE_SET
    default: ""
    documentation: |-
      Add --enable-tech-preview option to support cpms.
  documentation: |-
    Check that CPMS failureDomain setting. Available on 4.15+.
