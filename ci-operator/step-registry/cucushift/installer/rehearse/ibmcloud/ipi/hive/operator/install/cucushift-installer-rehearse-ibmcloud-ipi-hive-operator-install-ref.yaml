ref:
  as: cucushift-installer-rehearse-ibmcloud-ipi-hive-operator-install
  from: upi-installer
  grace_period: 5m0s
  timeout: 45m0s
  cli: latest
  env:
  - name: MCE_VERSION
    default: "2.2"
    documentation: "version of the mce.(2.2, 2.3)"
  - name: MCE_QE_CATALOG
    default: "false"
    documentation: If true, the QE catalog will be used to create MCE
  commands: cucushift-installer-rehearse-ibmcloud-ipi-hive-operator-install-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 100Mi
  credentials:
  - mount_path: /etc/acm-d-mce-quay-pull-credentials
    name: acm-d-mce-quay-credentials
    namespace: test-credentials
  documentation: |-
    Install Hive operator via MCE (Multi Cluster Engine) for IBM Cloud ClusterDeployment testing.

    This step deploys the MCE operator which includes Hive components. It is specifically
    configured for use with IBM Cloud Hive ClusterDeployment workflows. The step:
    - Installs MCE operator from catalog
    - Creates MultiClusterEngine resource
    - Waits for Hive operator and controllers to be ready

    This is a variant of the hive-mce-install step customized for the IBM Cloud
    ClusterDeployment rehearsal workflow.
