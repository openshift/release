chain:
  as: cucushift-installer-rehearse-ibmcloud-ipi-hive-ibmcloud-clusterdeployment
  steps:
  - ref: cucushift-installer-rehearse-ibmcloud-ipi-hive-ibmcloud-clusterdeployment-create
  - ref: cucushift-installer-rehearse-ibmcloud-ipi-hive-ibmcloud-clusterdeployment-validate
  documentation: |-
    This chain creates a Hive ClusterDeployment for IBM Cloud platform,
    waits for provisioning to complete, and validates the spoke cluster.
    Cleanup is handled in the post phase via hive-ibmcloud-clusterdeployment-deprovision.
