ref:
  as: cucushift-installer-rehearse-ibmcloud-ipi-hive-ibmcloud-clusterdeployment-deprovision
  from: upi-installer
  grace_period: 5m0s
  timeout: 35m0s
  best_effort: true
  cli: latest
  commands: cucushift-installer-rehearse-ibmcloud-ipi-hive-ibmcloud-clusterdeployment-deprovision-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 100Mi
  documentation: |-
    Cleans up the Hive ClusterDeployment and spoke cluster resources.
    Deletes the ClusterDeployment, which triggers Hive to deprovision the IBM Cloud cluster,
    and waits for the namespace to be deleted. This step is marked as best_effort to ensure
    cleanup issues don't fail the overall job.
