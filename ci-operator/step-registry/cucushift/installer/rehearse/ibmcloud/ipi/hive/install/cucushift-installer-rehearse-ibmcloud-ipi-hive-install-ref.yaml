ref:
  as: cucushift-installer-rehearse-ibmcloud-ipi-hive-install
  from: src
  grace_period: 5m0s
  timeout: 30m0s
  cli: latest
  commands: cucushift-installer-rehearse-ibmcloud-ipi-hive-install-commands.sh
  dependencies:
  - name: hive
    env: HIVE_IMAGE
  resources:
    requests:
      cpu: 100m
      memory: 100Mi
  documentation: |-
    Install standalone Hive operator using the pipeline-built image.

    This step deploys Hive directly from the image built in the current pipeline
    (e.g., from a PR being tested), rather than from a catalog. This is intended
    for use in Hive repository presubmit jobs to test Hive changes against
    real cluster provisioning scenarios like IBM Cloud ClusterDeployment.
