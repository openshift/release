ref:
  as: cucushift-installer-rehearse-ibmcloud-ipi-hive-ibmcloud-clusterdeployment-create
  from: upi-installer
  grace_period: 5m0s
  timeout: 15m0s
  cli: latest
  env:
  - name: BASE_DOMAIN
    documentation: Base domain for the spoke cluster
  - name: SPOKE_CLUSTER_TIMEOUT
    default: "90m"
    documentation: Timeout for ClusterDeployment provisioning
  commands: cucushift-installer-rehearse-ibmcloud-ipi-hive-ibmcloud-clusterdeployment-create-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 100Mi
  documentation: |-
    Creates a Hive ClusterDeployment resource with IBM Cloud platform configuration.
    This step creates the necessary secrets (credentials, install-config, CCO manifests, pull secret),
    creates a ClusterImageSet, and then creates the ClusterDeployment that will trigger Hive
    to provision an IBM Cloud cluster.
