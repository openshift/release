ref:
  as: cucushift-installer-rehearse-ibmcloud-ipi-hive-ibmcloud-clusterdeployment-validate
  from: upi-installer
  grace_period: 5m0s
  timeout: 100m0s
  cli: latest
  env:
  - name: SPOKE_CLUSTER_TIMEOUT
    default: "90m"
    documentation: Timeout for ClusterDeployment provisioning
  commands: cucushift-installer-rehearse-ibmcloud-ipi-hive-ibmcloud-clusterdeployment-validate-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 100Mi
  documentation: |-
    Waits for the Hive ClusterDeployment to be provisioned, extracts the spoke cluster
    kubeconfig, and validates that the spoke cluster is accessible and healthy.
    This includes waiting for all cluster operators to become Available.
