ref:
  as: cucushift-installer-rehearse-ibmcloud-cases-clusters-provision-config
  from: upi-installer
  grace_period: 10m
  commands: cucushift-installer-rehearse-ibmcloud-cases-clusters-provision-config-commands.sh
  timeout: 10m
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
  dependencies:
  - name: "release:latest"
    env: OPENSHIFT_INSTALL_RELEASE_IMAGE_OVERRIDE
  env:
  - name: BASE_DOMAIN
    default: "ibmcloud.qe.devcluster.openshift.com"
  - name: TEST_OBJECT
    default: "Regions"
    documentation: |-
      Valid options: Regions, InstanceTypes 
  documentation: >-
    Create the install-config.yaml of the IBMCloud cluster with specific TEST_OBJECT parameters, e.g. region.
