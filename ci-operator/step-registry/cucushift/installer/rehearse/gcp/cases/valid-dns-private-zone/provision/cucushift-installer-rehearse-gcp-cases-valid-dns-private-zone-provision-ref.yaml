ref:
  as: cucushift-installer-rehearse-gcp-cases-valid-dns-private-zone-provision
  from: upi-installer
  grace_period: 10m
  commands: cucushift-installer-rehearse-gcp-cases-valid-dns-private-zone-provision-commands.sh
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
  env:
  - name: OPENSHIFT_INSTALL_EXPERIMENTAL_DISABLE_IMAGE_POLICY
    default: "true"
    documentation: "Set to true to disable the Sigstore image signature policy to allow the installation of an unsigned release image. This is for internal CI testing only"
  documentation: >-
    Validate DNS private zone in separate project, of Shared VPC (XPN) installations.
