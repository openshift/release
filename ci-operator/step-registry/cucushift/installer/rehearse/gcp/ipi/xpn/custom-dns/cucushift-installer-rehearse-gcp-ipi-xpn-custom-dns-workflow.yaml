workflow:
  as: cucushift-installer-rehearse-gcp-ipi-xpn-custom-dns
  steps:
    env:
      BASE_DOMAIN: qe1.devcluster.openshift.com
    pre:
      - chain: cucushift-installer-rehearse-gcp-ipi-xpn-custom-dns-provision
      - ref: cucushift-installer-reportportal-marker
    post:
      - chain: cucushift-installer-rehearse-gcp-ipi-deprovision
      - ref: aws-deprovision-route53-public-record-sets
      - ref: send-results-to-reportportal
  documentation: |-
    The IPI workflow provides provision- and deprovision- steps that provision and deprovision 
    an OpenShift cluster into Shared VPC (XPN) on GCP with user-provisioned-dns, allowing job 
    authors to inject their own end-to-end test logic.
