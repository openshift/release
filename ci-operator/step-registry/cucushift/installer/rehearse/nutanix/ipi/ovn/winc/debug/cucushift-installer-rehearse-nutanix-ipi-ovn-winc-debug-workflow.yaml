workflow:
  as: cucushift-installer-rehearse-nutanix-ipi-ovn-winc-debug
  steps:
    env:
      SUB_CHANNEL: stable
      SUB_INSTALL_NAMESPACE: openshift-windows-machine-config-operator
      SUB_PACKAGE: windows-machine-config-operator
      SUB_TARGET_NAMESPACES: "!install"
      SUB_SOURCE: "wmco"
      WINDOWS_NODE_REPLICAS: 2
    cluster_profile: nutanix-qe
    pre:
      - chain: cucushift-installer-rehearse-nutanix-ipi-ovn-winc-provision
      - ref: cucushift-installer-reportportal-marker
    post:
      - chain: cucushift-installer-rehearse-nutanix-ipi-ovn-winc-deprovision
  documentation: |-
    Debug workflow for Nutanix IPI Windows Containers testing.
    Unlike the base workflow, wait is NOT in post - it should be added to the job's
    test section so it only runs when the cluster is successfully provisioned.
