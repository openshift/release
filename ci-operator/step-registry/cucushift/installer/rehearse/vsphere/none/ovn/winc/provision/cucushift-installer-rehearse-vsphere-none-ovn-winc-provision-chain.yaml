chain:
  as: cucushift-installer-rehearse-vsphere-none-ovn-winc-provision
  steps:
  - chain: upi-vsphere-platform-none-ovn-pre
  - ref: enable-qe-catalogsource
  - ref: openshift-windows-setup-wmco-konflux
  - ref: windows-conf-operator
  - chain: upi-vsphere-windows-pre
  - ref: cucushift-winc-prepare-byoh
  - chain: cucushift-installer-check-upi
  documentation: |-
    Create a UPI cluster (platform=none) on vSphere with OVN hybrid overlay and Windows BYOH workers for QE e2e tests.

    This provisions Windows nodes via vSphere VM provisioning. Platform "none" does not support MachineSets.
