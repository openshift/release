workflow:
  as: cucushift-installer-rehearse-baremetalds-assisted-hypershift-agent-mce-prepared
  steps:
    pre:
      - chain: cucushift-installer-rehearse-baremetalds-assisted-hypershift-agent-mce-preprovision
      - ref: cucushift-installer-reportportal-marker
    post:
      - chain: cucushift-installer-rehearse-baremetalds-assisted-hypershift-agent-mce-deprovision
      - ref: send-results-to-reportportal
    env:
      CLUSTERTYPE: host_384gb_el9
      LVM_OPERATOR_SUB_SOURCE: lvm-catalogsource
      DEVSCRIPTS_CONFIG: |
        IP_STACK=v4
        NUM_WORKERS=3
        MASTER_MEMORY=32768
        WORKER_MEMORY=32768
        WORKER_VCPU=16
        NETWORK_TYPE=OVNKubernetes
        VM_EXTRADISKS=true
        VM_EXTRADISKS_LIST=vda
        VM_EXTRADISKS_SIZE=256G
        NUM_EXTRA_WORKERS=5
        PROVISIONING_NETWORK_PROFILE=Disabled
        REDFISH_EMULATOR_IGNORE_BOOT_DEVICE=False
        MODIFY_VM_XML='if [[ "$VM_NAME" == *"extra"* ]]; then
          TARGET_ISO="/var/lib/libvirt/images/mce-discovery.iso";
          sed -i "/<boot dev=/d" $VM_XML;
          sed -i "s|<boot order=.*/>||g" $VM_XML;
          sed -i "/device='\''cdrom'\''/ s|/>|>\n      <source file='\''$TARGET_ISO'\''/>\n      <boot order='\''1'\''/>|g" $VM_XML;
          sed -i "s|<bootmenu enable=.*/>|<bootmenu enable='\''yes'\'' timeout='\''10000'\''/>|g" $VM_XML;
          (sleep 5; virsh destroy $VM_NAME) &
        fi'
  documentation: |-
    This is the workflow to trigger Prow's rehearsal test when submitting installer steps/chain/workflow
