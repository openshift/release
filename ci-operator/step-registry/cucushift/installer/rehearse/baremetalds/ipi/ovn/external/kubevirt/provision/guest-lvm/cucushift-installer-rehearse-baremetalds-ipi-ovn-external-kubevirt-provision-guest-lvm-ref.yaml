ref:
  as: cucushift-installer-rehearse-baremetalds-ipi-ovn-external-kubevirt-provision-guest-lvm
  from_image:
    namespace: ocp
    name: "4.19"
    tag: upi-installer
  cli: latest
  grace_period: 5m0s
  timeout: 30m0s
  commands: cucushift-installer-rehearse-baremetalds-ipi-ovn-external-kubevirt-provision-guest-lvm-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 100Mi
  env:
  - name: LVM_OPERATOR_SUB_SOURCE
    default: "lvm-catalogsource"
    documentation: "Catalog source for the LVM operator subscription"
  - name: LVM_OPERATOR_SUB_INSTALL_NAMESPACE
    default: "openshift-lvm-storage"
    documentation: "Namespace for the LVM operator installation"
  documentation: |-
    Installs LVM operator on the guest cluster (Cluster A) and creates an LVMCluster
    using /dev/vdb for KubeVirt VM root disk storage. This is a self-contained step
    that handles catalogsource creation, operator subscription, and LVMCluster setup.
    KUBECONFIG must point to Cluster A when this step runs.
