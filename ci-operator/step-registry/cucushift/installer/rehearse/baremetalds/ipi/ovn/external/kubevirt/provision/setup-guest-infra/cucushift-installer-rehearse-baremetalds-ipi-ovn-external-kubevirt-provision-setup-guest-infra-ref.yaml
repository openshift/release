ref:
  as: cucushift-installer-rehearse-baremetalds-ipi-ovn-external-kubevirt-provision-setup-guest-infra
  cli: latest
  from: cli
  grace_period: 5m0s
  commands: cucushift-installer-rehearse-baremetalds-ipi-ovn-external-kubevirt-provision-setup-guest-infra-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 100Mi
  env:
  - name: EXTERNAL_INFRA_NS
    default: "guest-external-infra-ns"
    documentation: "Namespace on the infra cluster (Cluster A) for external infra resources"
  documentation: |-
    Creates the external infrastructure kubeconfig on Cluster A (the guest/infra cluster).
    Sets up a service account with restricted RBAC permissions needed for KubeVirt external
    infrastructure, and saves the restricted kubeconfig to ${SHARED_DIR}/external_infra_kubeconfig.
    KUBECONFIG must point to Cluster A when this step runs.
