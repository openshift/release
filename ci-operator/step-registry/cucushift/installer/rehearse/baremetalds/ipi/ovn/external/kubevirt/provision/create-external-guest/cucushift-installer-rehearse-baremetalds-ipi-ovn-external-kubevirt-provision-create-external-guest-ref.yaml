ref:
  as: cucushift-installer-rehearse-baremetalds-ipi-ovn-external-kubevirt-provision-create-external-guest
  from: dev-scripts
  cli: latest
  grace_period: 5m0s
  timeout: 1h30m0s
  commands: cucushift-installer-rehearse-baremetalds-ipi-ovn-external-kubevirt-provision-create-external-guest-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 100Mi
  credentials:
    - mount_path: /etc/ci-pull-credentials
      name: ci-pull-credentials
      namespace: test-credentials
  dependencies:
    - name: "release:latest"
      env: RELEASE_IMAGE_LATEST
  env:
  - name: HYPERSHIFT_NODE_COUNT
    default: "2"
    documentation: "Number of worker nodes for the external infra guest cluster (Cluster B)"
  - name: HYPERSHIFT_NODE_MEMORY
    default: "12"
    documentation: "Memory in Gi for each Cluster B worker node"
  - name: HYPERSHIFT_NODE_CPU_CORES
    default: "4"
    documentation: "CPU cores for each Cluster B worker node"
  - name: EXTERNAL_INFRA_NS
    default: "guest-external-infra-ns"
    documentation: "Namespace on Cluster A for external infra resources"
  - name: ETCD_STORAGE_CLASS
    default: ""
    documentation: "Storage class for etcd on the hosted control plane"
  - name: HYPERSHIFT_HC_RELEASE_IMAGE
    default: ""
    documentation: "Release image for the HostedCluster. Empty uses release:latest"
  documentation: |-
    Creates the second KubeVirt HostedCluster (Cluster B) using external infrastructure
    from Cluster A. Downloads the hcp CLI from MCE's ConsoleCLIDownload.
    The infra-kubeconfig-file and infra-namespace flags direct worker VMs to Cluster A.
