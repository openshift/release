workflow:
  as: cucushift-installer-rehearse-azure-hypershift-private
  steps:
    pre:
      - chain: cucushift-installer-rehearse-azure-hypershift-private-provision
      - ref: cucushift-installer-reportportal-marker
    post:
      - ref: wait
      - chain: cucushift-installer-rehearse-azure-hypershift-deprovision
      - ref: send-results-to-reportportal
  documentation: |-
    Installs the Hypershift Operator and creates a Private topology hosted cluster in Azure, runs tests on the management cluster, then destroys the hosted cluster and management cluster.
