workflow:
  as: cucushift-installer-rehearse-azure-hypershift-private-guest
  steps:
    pre:
      - chain: cucushift-installer-rehearse-azure-hypershift-private-provision
      - ref: cucushift-hypershift-extended-enable-guest
      - ref: cucushift-installer-reportportal-marker
    post:
      - ref: cucushift-hypershift-extended-disable-guest
      - chain: cucushift-installer-rehearse-azure-hypershift-deprovision
      - ref: send-results-to-reportportal
  documentation: |-
    Installs the Hypershift Operator and creates a Private topology hosted cluster in Azure, runs tests on the guest cluster, then destroys the hosted cluster and management cluster.
