workflow:
  as: cucushift-installer-rehearse-azure-hypershift-publicandprivate
  steps:
    pre:
      - chain: cucushift-installer-rehearse-azure-hypershift-publicandprivate-provision
      - ref: cucushift-installer-reportportal-marker
    post:
      - chain: cucushift-installer-rehearse-azure-hypershift-deprovision
