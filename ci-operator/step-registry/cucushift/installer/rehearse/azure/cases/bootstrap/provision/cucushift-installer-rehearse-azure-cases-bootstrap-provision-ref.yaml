ref:
  as: cucushift-installer-rehearse-azure-cases-bootstrap-provision
  from: upi-installer
  grace_period: 10m
  commands: cucushift-installer-rehearse-azure-cases-bootstrap-provision-commands.sh
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
  dependencies:
  - name: "release:latest"
    env: OPENSHIFT_INSTALL_RELEASE_IMAGE_OVERRIDE
  env:
  - name: OPENSHIFT_INSTALL_EXPERIMENTAL_DISABLE_IMAGE_POLICY
    default: "true"
    documentation: "Set to true to disable to disable the Sigstore image signature policy to allow the installation of an unsigned release image. This is for internal CI testing only"
  documentation: |-
    Create an IPI cluster, stop installer and check
    * Restrict all clients on bootstrap host to localhost for k8s API access
    * openshift-install destroy bootstrap
