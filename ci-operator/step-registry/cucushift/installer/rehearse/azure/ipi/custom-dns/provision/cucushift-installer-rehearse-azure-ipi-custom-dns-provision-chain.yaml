chain:
  as: cucushift-installer-rehearse-azure-ipi-custom-dns-provision
  steps:
  - chain: ipi-conf-azure
  - chain: azure-provision-service-principal-minimal-permission
  - chain: ipi-install
  - ref: azure-provision-public-custom-dns
  - ref: aws-provision-route53-public-record-sets
  - ref: enable-qe-catalogsource
  - chain: cucushift-installer-check
  env:
  - name: USER_PROVISIONED_DNS
    default: "yes"
  - name: BASE_DOMAIN
    default: "qe1.devcluster.openshift.com"
  documentation: |-
    Create an IPI cluster on Azure for QE e2e tests, enable custom dns.
