workflow:
  as: cucushift-installer-rehearse-azure-ipi-custom-dns
  steps:
    pre:
      - chain: cucushift-installer-rehearse-azure-ipi-custom-dns-provision
      - ref: cucushift-installer-reportportal-marker
    post:
      - ref: azure-provision-public-custom-dns-post
      - chain: cucushift-installer-rehearse-azure-ipi-deprovision
      - ref: aws-deprovision-route53-public-record-sets
      - ref: send-results-to-reportportal
    env:
      BASE_DOMAIN: "qe1.devcluster.openshift.com"
      AWS_NEW_PUBLIC_DNS_RECORD_WAITING_TIME: "600"
  documentation: |-
    This is the workflow to trigger Prow's rehearsal test when submitting installer steps/chain/workflow
