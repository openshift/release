workflow:
  as: cucushift-installer-rehearse-aws-ipi-mno-lvms
  steps:
    pre:
      - chain: cucushift-installer-rehearse-aws-ipi-provision
      - ref: storage-create-aws-extra-disks
      - chain: storage-conf-csi-optional-topolvm
    post:
      - chain: cucushift-installer-rehearse-aws-ipi-deprovision
    env:
      LVM_CLUSTER_AUTO_SELECT_AVAILABLE_DEVICES: "true"
      EXTRA_DISKS_COUNT: "2"
  documentation: "The IPI workflow provides chains that provision and deprovision a Multi-Node OpenShift (MNO) cluster with a default configuration on AWS and install the LVMS operator, allowing job authors to inject their own end-to-end test logic."
