workflow:
  as: cucushift-installer-rehearse-aws-ipi-stage-testing
  steps:
    allow_best_effort_post_steps: true
    pre:
    - chain: cucushift-installer-rehearse-aws-ipi-provision
    - ref: enable-stage-fbc-catalogsource
    test:
    - ref: openshift-extended-test
    - ref: openshift-e2e-test-qe-report
    post:
    - chain: cucushift-installer-rehearse-aws-ipi-deprovision
    env:
      TEST_SCENARIOS: Stagerun
  documentation: |-
    Stage testing workflow for OCP releases. Provisions an AWS IPI cluster, runs openshift-extended-test with Stagerun scenario filters and reports results via openshift-e2e-test-qe-report.
