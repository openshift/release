workflow:
  as: cucushift-installer-rehearse-aws-ipi-ovn-winc-debug
  steps:
    env:
      SUB_CHANNEL: stable
      SUB_INSTALL_NAMESPACE: openshift-windows-machine-config-operator
      SUB_PACKAGE: windows-machine-config-operator
      SUB_TARGET_NAMESPACES: '!install'
      SUB_SOURCE: "wmco"
      WINDOWS_NODE_REPLICAS: 2
    pre:
      - chain: cucushift-installer-rehearse-aws-ipi-ovn-winc-provision
      - ref: cucushift-installer-reportportal-marker
    post:
      - ref: wait
      - chain: cucushift-installer-rehearse-aws-ipi-deprovision
      - ref: send-results-to-reportportal
  documentation: |-
    This is the debug workflow for AWS IPI Windows Containers testing.
    It keeps the cluster alive after test completion for debugging purposes.
    The cluster is deprovisioned automatically after the wait timeout.
