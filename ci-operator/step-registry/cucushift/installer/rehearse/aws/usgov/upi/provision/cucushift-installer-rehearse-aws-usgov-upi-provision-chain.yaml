chain:
  as: cucushift-installer-rehearse-aws-usgov-upi-provision
  steps:
    - ref: ipi-install-rbac
    - ref: openshift-cluster-bot-rbac
    - chain: ipi-conf-aws
    - ref: aws-provision-vpc-shared
    - chain: aws-provision-bastionhost
    - ref: ipi-conf-aws-custom-vpc
    - ref: proxy-config-generate
    - ref: upi-install-aws-usgov-private-cluster
    - ref: cucushift-installer-check-reboot-nodes
    - ref: aws-provision-tags-for-byo-vpc
    - ref: enable-qe-catalogsource
    - chain: cucushift-installer-check
  env:
    - name: PUBLISH
      default: "Internal"
  documentation: |-
    Provision a private AWS GovCloud UPI cluster for QE e2e tests.
    VPC is created by aws-provision-vpc-shared, bastion host provides
    HAProxy for DNS resolution of private hosted zone records.
