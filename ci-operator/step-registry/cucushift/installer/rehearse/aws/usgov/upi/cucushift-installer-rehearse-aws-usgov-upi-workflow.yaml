workflow:
  as: cucushift-installer-rehearse-aws-usgov-upi
  steps:
    pre:
      - chain: cucushift-installer-rehearse-aws-usgov-upi-provision
      - ref: cucushift-installer-reportportal-marker
    post:
      - chain: cucushift-installer-rehearse-aws-usgov-upi-deprovision
      - ref: send-results-to-reportportal
  documentation: |-
    Provision and deprovision a private OpenShift cluster on AWS GovCloud
    using User Provisioned Infrastructure (UPI) with CloudFormation.
    All cluster resources use internal-only networking with no external
    API load balancer or public DNS records.
