chain:
  as: cucushift-installer-rehearse-aws-usgov-upi-deprovision
  steps:
  - chain: gather
  - ref: gather-aws-console
  - ref: aws-deprovision-stacks
  - ref: aws-deprovision-s3buckets
  - ref: upi-deprovision-aws
  - ref: ipi-deprovision-deprovision
  - ref: upi-deprovision-aws-check-destroy
  documentation: |-
    Destroy a private AWS GovCloud UPI cluster.
    aws-deprovision-stacks and -s3buckets remove the bastion host only.
    Cluster stacks are destroyed by upi-deprovision-aws.
