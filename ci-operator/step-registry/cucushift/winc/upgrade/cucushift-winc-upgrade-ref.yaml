ref:
  as: cucushift-winc-upgrade
  from_image:
    namespace: ocp
    name: cli-jq
    tag: latest
  commands: cucushift-winc-upgrade-commands.sh
  timeout: 60m0s
  resources:
    requests:
      cpu: 100m
      memory: 100Mi
  documentation: >-
    This step upgrades WMCO by creating a Konflux FBC CatalogSource and
    ImageDigestMirrorSet, patching the subscription, verifying CSV change,
    and waiting for Windows nodes to be reconfigured.
