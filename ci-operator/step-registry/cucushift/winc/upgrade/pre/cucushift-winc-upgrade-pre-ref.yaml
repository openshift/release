ref:
  as: cucushift-winc-upgrade-pre
  from_image:
    namespace: ocp
    name: cli-jq
    tag: latest
  commands: cucushift-winc-upgrade-pre-commands.sh
  timeout: 5m0s
  resources:
    requests:
      cpu: 100m
      memory: 100Mi
  documentation: >-
    This step captures the current WMCO CSV name before the cluster upgrade
    and saves it to SHARED_DIR for post-upgrade verification.
