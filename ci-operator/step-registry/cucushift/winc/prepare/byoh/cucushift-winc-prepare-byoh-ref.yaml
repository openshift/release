ref:
  as: cucushift-winc-prepare-byoh
  from: cli
  commands: cucushift-winc-prepare-byoh-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  documentation: |-
    Prepares Windows test environment for BYOH (Bring Your Own Host) workflows.

    This is the BYOH/UPI equivalent of cucushift-winc-prepare, adapted for
    clusters that use platform=none and do not have Windows MachineSets.

    This step:
    1. Gets Windows OS image ID from SHARED_DIR (saved by provision step)
    2. Detects Windows container image version from node OS
    3. Creates winc-test namespace and workloads (win-webserver, linux-webserver)
    4. Creates winc-test-config ConfigMap for test consumption

    Assumes Windows nodes are already provisioned and Ready (verified by
    windows-byoh-provision step).

    Does NOT query MachineSets (they don't exist for BYOH/UPI).
