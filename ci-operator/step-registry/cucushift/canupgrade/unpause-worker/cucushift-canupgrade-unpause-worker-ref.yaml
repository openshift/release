ref:
  as: cucushift-canupgrade-unpause-worker
  from_image:
    namespace: ci
    name: verification-tests
    tag: latest
  timeout: 1h10m
  grace_period: 10m
  commands: cucushift-canupgrade-unpause-worker-commands.sh
  cli: latest
  env:
    - name: PAUSED_MCP_LABEL
      default: "mcpfoo"
      documentation: "the label of mcp which will not be paused"
  resources:
    limits:
      cpu: "1"
    requests:
      cpu: 350m
      memory: 1Gi
