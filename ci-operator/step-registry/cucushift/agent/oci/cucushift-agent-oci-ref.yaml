ref:
  as: cucushift-agent-oci
  from: upi-installer
  grace_period: 10m
  commands: cucushift-agent-oci-commands.sh
  credentials:
    - namespace: test-credentials
      name: cluster-secrets-oci-agent-qe
      mount_path: /var/run/vault/secrets
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
  documentation: >-
    Creates the files necessary to deploy an OCI agent based installation (ABI).
    It uses install-config.yaml and agent-config.yaml to generate the ISO, .openshift_install_state.json,
    and kubeconfig files with the modifications required to support the OCI ABI workflow.
    These files are copied to the shared directory for future consumption.
