ref:
  as: cucushift-e2e
  from_image:
    namespace: ci
    name: verification-tests
    tag: latest
  grace_period: 1m
  timeout: 16h
  commands: cucushift-e2e-commands.sh
  cli: latest
  resources:
    limits:
      ci-operator.openshift.io/shm: 2G
      cpu: "2"
      memory: 6Gi
    requests:
      ci-operator.openshift.io/shm: 2G
      cpu: 800m
      memory: 1Gi
  env:
  - name: E2E_RUN_TAGS
    default: ""
    documentation: "Executed cucumber tags"
  - name: E2E_TEST_TYPE
    default: "default"
    documentation: |-
      The kind of test we will execute.
      Allowed values ['default', 'destructive', 'longduration', 'ui']
        * 'default' - All the test cases, exclude destructive/longduration
        * 'destructive' - Test cases with destructive tag
        * 'longduration' - Test cases with long-duration tag
        * 'ui' - Test cases with console tag
  - name: CUCUSHIFT_FORCE_SKIP_TAGS
    default: ""
    documentation: |-
      Override the default force-skip cucumber tags. When empty, the default
      exclusions apply (not @customer, not @flaky, not @inactive, not @prod-only,
      not @qeci, not @security, not @stage-only, not @upgrade-check, not @upgrade-prepare).
      Set this to customize which tags are excluded, e.g. to include @stage-only tests
      for stage environment testing.
  - name: PARALLEL
    default: "11"
    documentation: The number of parallel process to run cucushift tests.
      If set to 0 or 1, then run the tests in serial.
