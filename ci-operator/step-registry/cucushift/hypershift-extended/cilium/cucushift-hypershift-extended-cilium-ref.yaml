ref:
  as: cucushift-hypershift-extended-cilium
  from_image:
    namespace: ocp
    name: "4.12"
    tag: upi-installer
  grace_period: 5m
  cli: latest
  commands: cucushift-hypershift-extended-cilium-commands.sh
  env:
  - name: CILIUM_VERSION
    default: "1.19.4"
  - name: CILIUM_CLI_VERSION
    default: "0.19.2"
    documentation: |-
      The Cilium CLI version to download from GitHub releases.
  resources:
    requests:
      cpu: 100m
      memory: 100Mi
  documentation: |-
    This step installs Cilium CNI using the Cilium CLI (https://github.com/cilium/cilium-cli)
