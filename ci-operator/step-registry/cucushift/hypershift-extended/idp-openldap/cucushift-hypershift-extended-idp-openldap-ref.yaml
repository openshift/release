ref:
  as: cucushift-hypershift-extended-idp-openldap
  from_image:
    namespace: ci
    name: verification-tests
    tag: latest
  grace_period: 20m
  cli: latest
  env:
  - name: HYPERSHIFT_NAMESPACE
    default: "clusters"
    documentation: "The Namespace where to create the HostedCluster and NodePools"
  commands: cucushift-hypershift-extended-idp-openldap-commands.sh
  resources:
    requests:
      cpu: 500m
      memory: 500Mi
  documentation: |-
    add user in guest cluster with openldap.