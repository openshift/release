ref:
  as: cucushift-hypershift-extended-capacity-reservation-create
  from: tools
  commands: cucushift-hypershift-extended-capacity-reservation-create-commands.sh
  grace_period: 10m0s
  resources:
    requests:
      cpu: 100m
  env:
  - name: ADDITIONAL_HYPERSHIFT_NODE_COUNT
    default: "1"
    documentation: "Specifies the number of capacity reservation instances"
  - name: OPERATING_SYSTEM
    default: "Linux/UNIX"
    documentation: "Capacity reservation operating system."
  - name: HYPERSHIFT_HC_ZONES
    default: "us-east-1a"
    documentation: |
      Specifies the AWS AZs to create the capacity reservation instances.
  - name: ADDITIONAL_HYPERSHIFT_INSTANCE_TYPE
    default: "m5.large"
    documentation: "Instance type for the cluster nodes"
  documentation: |-
    This step to create on-demand capacity reservation, 
    so we can use the capacity reservation to create nodepool. 
