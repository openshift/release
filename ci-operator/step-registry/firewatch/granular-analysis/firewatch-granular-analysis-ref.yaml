ref:
  as: firewatch-granular-analysis
  from_image:
    namespace: firewatch
    name: firewatch
    tag: main
  commands: firewatch-granular-analysis-commands.sh
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
  env:
  - name: FIREWATCH_GRANULAR_ARTIFACT_SUBDIR
    default: ""
    documentation: >-
      Subdirectory under ARTIFACT_DIR to search for JUnit XML files.
      If empty, searches ARTIFACT_DIR directly (including a junit/
      subdirectory if present).
  best_effort: true
  documentation: |-
    Parses JUnit XML test results from CI artifacts and extracts granular
    metadata (operator names, component names, file locations) as Jira
    labels. Writes labels to ${SHARED_DIR}/firewatch-additional-labels
    for consumption by firewatch-report-issues.
    Place in the post chain BEFORE firewatch-report-issues.
