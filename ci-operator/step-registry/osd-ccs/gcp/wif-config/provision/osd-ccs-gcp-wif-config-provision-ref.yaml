ref:
  as: osd-ccs-gcp-wif-config-provision
  from: ocm-cli
  grace_period: 10m
  commands: osd-ccs-gcp-wif-config-provision-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 300Mi
  timeout: 30m
  env:
  - name: OCM_LOGIN_ENV
    default: "staging"
    documentation: The environment for ocm login. The supported values are [production, staging].
  - name: WIF_CONFIG_NAME
    default: ""
    documentation: The name of the WIF config to create. If empty, a name will be auto-generated.
  - name: GCP_PROJECT_ID
    default: ""
    documentation: The GCP project ID for the WIF config. If empty, it will be extracted from the osd-ccs-gcp.json credentials file.
  documentation: |-
    Creates a GCP WIF (Workload Identity Federation) config using ocm cli.
    The WIF config ID is written to SHARED_DIR/wif-config-id for use by subsequent steps.
