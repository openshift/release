ref:
  as: ibm-fusion-access-configure-aws-security-groups
  from: upi-installer
  commands: ibm-fusion-access-configure-aws-security-groups-commands.sh
  timeout: 30m0s
  best_effort: true
  credentials:
  - namespace: test-credentials
    name: fusion-access-operator
    mount_path: /var/run/secrets
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  env:
  - name: FA__CUSTOM_SECURITY_GROUP_PORTS
    documentation: Comma-separated ports or port ranges for IBM Storage Scale and related ingress rules
    default: "12345,1191,60000-61000"
  - name: FA__CUSTOM_SECURITY_GROUP_PROTOCOLS
    documentation: Comma-separated protocols (e.g. tcp, udp) matching the ports configuration
    default: "tcp,udp"
  - name: FA__CUSTOM_SECURITY_GROUP_SOURCES
    documentation: Optional extra source specification for custom rules (empty for default worker SG self-referencing behavior)
    default: ""
  documentation: |-
    Configure AWS security groups for IBM Fusion Access Operator and IBM Storage Scale testing.
    This step configures the necessary ports for IBM Storage Scale communication and shared storage access.
    Ports configured by default:
    - 12345: IBM Storage Scale NSD (Network Shared Disk)
    - 1191: IBM Storage Scale GUI
    - 60000-61000: IBM Storage Scale dynamic ports
    This step is optional and will not block the test if it fails.
