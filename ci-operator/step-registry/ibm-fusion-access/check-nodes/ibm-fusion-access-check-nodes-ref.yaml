ref:
  as: ibm-fusion-access-check-nodes
  from: cli
  commands: ibm-fusion-access-check-nodes-commands.sh
  timeout: 5m0s
  grace_period: 15s
  best_effort: true
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  env:
  - name: MAP_TESTS
    documentation: When true, annotate JUnit XML for ReportPortal component readiness mapping
    default: "false"
  - name: REPORTPORTAL_CMP
    documentation: ReportPortal component name applied to the testsuite when MAP_TESTS is true
    default: "Fusion-access-lp-interop"
  documentation: |-
    Check worker node availability for IBM Storage Scale deployment.
    This step verifies that sufficient worker nodes are available for IBM Storage Scale
    quorum requirements (minimum 3 nodes). It provides detailed node information and
    recommendations for optimal deployment configuration. This is an optional diagnostic
    step that helps ensure proper cluster sizing for IBM Storage Scale.

    Emits JUnit XML under ARTIFACT_DIR (and SHARED_DIR when set). Set MAP_TESTS to true
    to add ReportPortal testsuite metadata using REPORTPORTAL_CMP. The step fails if fewer
    than three workers are present.

