workflow:
  as: capz-test-kind-e2e
  steps:
    test:
    - ref: capz-test-kind-e2e
    post:
    - ref: capz-test-summary
  documentation: |-
    Runs the full CAPZ e2e test suite using a Kind management cluster
    created inside the test pod via podman-in-podman (no IPI provisioning
    needed). Saves ~40 minutes compared to the IPI-based capz-test-e2e
    workflow. Requires the nested-podman capability for podman and Kind
    to operate.
