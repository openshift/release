workflow:
  as: capz-test-k3s-e2e
  steps:
    test:
    - ref: capz-test-k3s-e2e
    post:
    - ref: capz-test-summary
    - ref: capz-test-teardown
  documentation: |-
    Runs the full CAPZ e2e test suite using a k3s management cluster
    started inside the test pod (no IPI provisioning needed). Saves
    ~40 minutes compared to the IPI-based capz-test-e2e workflow.
    Requires the nested-podman capability for k3s to operate.
