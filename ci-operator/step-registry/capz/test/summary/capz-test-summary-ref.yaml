ref:
  as: capz-test-summary
  from: src
  commands: capz-test-summary-commands.sh
  best_effort: true
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  timeout: 5m
  documentation: |-
    Aggregates JUnit XML results from all CAPZ test phases and generates
    a summary.txt artifact. Runs as a post step so it always executes,
    capturing partial results even when test steps fail.
