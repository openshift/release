ref:
  as: capz-test-generate-yamls
  from: src
  commands: capz-test-generate-yamls-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  env:
  - name: WORKLOAD_CLUSTER_NAMESPACE
    default: ""
    documentation: |-
      Fixed namespace for workload cluster resources. When set, all steps
      use this value instead of generating a timestamp-based namespace.
  timeout: 20m
  documentation: |-
    Runs CAPZ test suite Phase 04 (generate YAMLs) to produce
    credential and cluster YAML manifests for deployment.
