ref:
  as: capz-arohcp-aks-provision
  from: root
  commands: capz-arohcp-aks-provision-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 100Mi
  timeout: 30m
  grace_period: 5m
  env:
  - name: LOCATION
    default: "uksouth"
    documentation: Azure region for the AKS cluster.
  - name: AKS_NODE_COUNT
    default: "1"
    documentation: Number of nodes for the AKS management cluster.
  - name: AKS_NODE_VM_SIZE
    default: "Standard_D4s_v3"
    documentation: VM size for AKS management cluster nodes.
  - name: AKS_K8S_VERSION
    default: ""
    documentation: |-
      Kubernetes version for the AKS cluster. When empty, uses the
      latest non-preview version available in the region.
  documentation: |-
    Provisions a minimal AKS cluster for use as a CAPZ management cluster.
    Writes the kubeconfig to ${SHARED_DIR}/kubeconfig, the cluster name to
    ${SHARED_DIR}/cluster-name, and the resource group to
    ${SHARED_DIR}/resourcegroup_aks.
