ref:
  as: capz-arohcp-cleanup-msi-roleassignments
  from: root
  commands: capz-arohcp-cleanup-msi-roleassignments-commands.sh
  best_effort: true
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  timeout: 15m
  documentation: |-
    Safety-net cleanup for RoleAssignments created on shared/leased MSI
    identities. Lists all RoleAssignments scoped to MSI_RESOURCEGROUPNAME
    and deletes them. This prevents RA accumulation across Boskos lease
    cycles when ASO's normal delete fails.
