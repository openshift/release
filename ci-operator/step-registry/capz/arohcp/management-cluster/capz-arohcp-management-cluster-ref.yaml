ref:
  as: capz-arohcp-management-cluster
  from: root
  commands: capz-arohcp-management-cluster-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  env:
  - name: DEPLOY_CHARTS
    default: "false"
    documentation: |-
      When "true", deploys CAPI/CAPZ/ASO controllers to the cluster
      via deploy-charts.sh instead of expecting pre-installed controllers.
  - name: USE_KIND
    default: "false"
    documentation: |-
      When "true", deploy-charts.sh uses -kind suffixed Helm charts
      designed for vanilla Kubernetes clusters (AKS, Kind) instead of
      OpenShift-specific charts.
  - name: WORKLOAD_CLUSTER_NAMESPACE
    default: ""
    documentation: |-
      Fixed namespace for workload cluster resources. When set, all steps
      use this value instead of generating a timestamp-based namespace.
  timeout: 45m
  documentation: |-
    Validates the management cluster (AKS or IPI-provisioned) and deploys
    CAPI/CAPZ/ASO controllers via DEPLOY_CHARTS=true using deploy-charts.sh.
