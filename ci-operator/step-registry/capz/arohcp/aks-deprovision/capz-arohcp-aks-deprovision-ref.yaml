ref:
  as: capz-arohcp-aks-deprovision
  from: root
  commands: capz-arohcp-aks-deprovision-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 100Mi
  timeout: 30m
  grace_period: 5m
  best_effort: true
  documentation: |-
    Tears down the AKS management cluster and its resource group.
    Reads the resource group name from ${SHARED_DIR}/resourcegroup_aks.
