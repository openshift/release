ref:
  as: capz-arohcp-write-env
  from: cli
  commands: capz-arohcp-write-env-commands.sh
  credentials:
  - namespace: test-credentials
    name: cluster-secrets-aro-hcp-int
    mount_path: /var/run/aro-hcp-int
  - namespace: test-credentials
    name: cluster-secrets-aro-hcp-stg
    mount_path: /var/run/aro-hcp-stg
  - namespace: test-credentials
    name: cluster-secrets-aro-hcp-prod
    mount_path: /var/run/aro-hcp-prod
  - namespace: test-credentials
    name: stolostron-capi-tests-quay-credentials
    mount_path: /etc/quay-pull-credentials
  resources:
    requests:
      cpu: 100m
      memory: 100Mi
  env:
  - name: VAULT_SECRET_PROFILE
    default: "stg"
    documentation: |-
      Selects which environment's cluster secrets to resolve (int, stg, prod).
  - name: ARO_REPO_URL
    default: "https://github.com/stolostron/cluster-api-installer.git"
    documentation: Git URL for the cluster-api-installer repository.
  - name: ARO_REPO_BRANCH
    default: "main"
    documentation: Branch of the cluster-api-installer repository to clone.
  - name: ARO_REPO_DIR
    default: "/tmp/cluster-api-installer-pro"
    documentation: Directory to clone the cluster-api-installer repository into.
  timeout: 1m0s
  documentation: |-
    Resolves Azure credentials from mounted secrets and writes all CAPZ
    environment variables to ${SHARED_DIR}/capz-test-env.sh. Subsequent
    steps source this file instead of mounting secrets directly.
