ref:
  as: pr-debugging
  from: src
  grace_period: 5m
  timeout: 72h0m0s
  env:
  - name: PR_DEBUG_MODE_TIMEOUT
    default: "+1 min"
    documentation: |-
      Set the amount of time, the step must wait at most, before unconditionally forcing the workflow to continue
      with the next steps (default: "1 min", MAX: "72 hours").
  commands: pr-debugging-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 100Mi
  documentation: |-
    This step allows users to keep their workflows for deployment.
    It only works if you are in a Pull-Request.
