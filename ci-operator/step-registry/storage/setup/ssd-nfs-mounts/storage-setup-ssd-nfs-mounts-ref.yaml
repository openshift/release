ref:
  as: storage-setup-ssd-nfs-mounts
  from_image:
    namespace: ocp
    name: "4.22"
    tag: upi-installer
  cli: latest
  commands: storage-setup-ssd-nfs-mounts-commands.sh
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
  documentation: |-
    Sets up SSD and NFS mounts for testing Additional Storage Configurations.
    Creates an EBS volume, formats it as XFS, mounts at /mnt/ssd-artifacts.
    Configures NFS server and mounts at /mnt/nfs-artifacts.
