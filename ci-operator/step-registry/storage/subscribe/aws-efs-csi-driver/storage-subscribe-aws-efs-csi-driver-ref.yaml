ref:
  as: storage-subscribe-aws-efs-csi-driver
  from: cli
  commands: storage-subscribe-aws-efs-csi-driver-commands.sh
  resources:
    requests:
      cpu: 300m
      memory: 300Mi
  env:
  - name: SUB_CHANNEL
    default: stable
    documentation: The channel from which to install the aws-efs-csi-driver-operator.
  - name: SUB_INSTALL_NAMESPACE
    default: openshift-cluster-csi-drivers
    documentation: The namespace into which the operator will be installed.
  documentation: |-
    Subscribes the aws-efs-csi-driver-operator from the redhat-operators catalog,
    injecting the IRSA role ARN from ${SHARED_DIR}/efs-csi-driver-operator-role-arn
    into the operator deployment config via spec.config.env. The OperatorGroup is
    created only if one does not already exist in the target namespace.
    Must be preceded by storage-create-csi-aws-efs-sts-operator-role.
