ref:
  as: storage-create-csi-shared-aws-efs
  from_image:
    namespace: ocp
    name: "4.18"
    tag: upi-installer
  cli: latest
  commands: storage-create-csi-shared-aws-efs-commands.sh
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
  env:
  - name: ENABLE_SHARED_EFS
    default: "yes"
    documentation: |-
      Create EFS volume in a separate account. 
  documentation: |-
    The storage-create-csi-shared-aws-efs step creates cross account efs volume.
    It also creates ${SHARED_DIR}/${TEST_CSI_DRIVER_MANIFEST} and
    ${TEST_OCP_CSI_DRIVER_MANIFEST}, which is consumed by openshift-e2e-test step to
    run CSI driver certification suite.
