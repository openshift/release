ref:
  as: openshift-hyperfleet-e2e-setup
  from: hyperfleet-e2e
  grace_period: 10m
  commands: openshift-hyperfleet-e2e-setup-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 300Mi
  timeout: 1h0m0s
  env:
  - name: NAMESPACE_PREFIX
    default: "e2e"
    documentation: The CLM deployed namespace prefix in shared cluster.
  - name: CLUSTER_NAME
    default: "hyperfleet-dev-prow"
    documentation: The shared cluster name.
  - name: REGION
    default: "us-central1-a"
    documentation: The shared cluster region.
  - name: API_CHART_REPO
    default: "https://github.com/openshift-hyperfleet/hyperfleet-api.git"
    documentation: The Helm chart repository URL for the API component.
  - name: API_CHART_REF
    default: "main"
    documentation: The git reference (branch/tag/commit) for the API chart repository.
  - name: API_CHART_PATH
    default: "charts"
    documentation: The path to the charts directory within the API chart repository.
  - name: ADAPTER_CHART_REPO
    default: "https://github.com/openshift-hyperfleet/hyperfleet-adapter.git"
    documentation: The Helm chart repository URL for the Adapter component.
  - name: ADAPTER_CHART_REF
    default: "main"
    documentation: The git reference (branch/tag/commit) for the Adapter chart repository.
  - name: ADAPTER_CHART_PATH
    default: "charts"
    documentation: The path to the charts directory within the Adapter chart repository.
  - name: SENTINEL_CHART_REPO
    default: "https://github.com/openshift-hyperfleet/hyperfleet-sentinel.git"
    documentation: The Helm chart repository URL for the Sentinel component.
  - name: SENTINEL_CHART_REF
    default: "main"
    documentation: The git reference (branch/tag/commit) for the Sentinel chart repository.
  - name: SENTINEL_CHART_PATH
    default: "charts"
    documentation: The path to the charts directory within the Sentinel chart repository.
  - name: IMAGE_REGISTRY
    default: "registry.ci.openshift.org"
    documentation: The container image registry to pull images from.
  - name: API_IMAGE_REPO
    default: "ci/hyperfleet-api"
    documentation: The image repository path for the API component.
  - name: API_IMAGE_TAG
    default: "latest"
    documentation: The image tag for the API component.
  - name: ADAPTER_IMAGE_REPO
    default: "ci/hyperfleet-adapter"
    documentation: The image repository path for the Adapter component.
  - name: ADAPTER_IMAGE_TAG
    default: "latest"
    documentation: The image tag for the Adapter component.
  - name: SENTINEL_IMAGE_REPO
    default: "ci/hyperfleet-sentinel"
    documentation: The image repository path for the Sentinel component.
  - name: SENTINEL_IMAGE_TAG
    default: "latest"
    documentation: The image tag for the Sentinel component.
  credentials:
  - collection: ""
    namespace: test-credentials
    name: hyperfleet-e2e
    mount_path: /var/run/hyperfleet-e2e
  documentation: |-
    Hyperfleet e2e test step.
