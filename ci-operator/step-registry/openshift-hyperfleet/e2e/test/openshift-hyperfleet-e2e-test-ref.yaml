ref:
  as: openshift-hyperfleet-e2e-test
  from: hyperfleet-e2e
  grace_period: 10m
  commands: openshift-hyperfleet-e2e-test-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 300Mi
  timeout: 1h0m0s
  env:
  - name: LABEL_FILTER
    default: ""
    documentation: The label filter for the e2e tests.
  - name: ADAPTER_CHART_REPO
    default: "https://github.com/openshift-hyperfleet/hyperfleet-adapter.git"
    documentation: The Helm chart repository URL for the Adapter component.
  - name: ADAPTER_CHART_REF
    default: "main"
    documentation: The git reference (branch/tag/commit) for the Adapter chart repository.
  - name: ADAPTER_CHART_PATH
    default: "charts"
    documentation: The path to the charts directory within the Adapter chart repository.
  - name: IMAGE_REGISTRY
    default: "registry.ci.openshift.org"
    documentation: The container image registry to pull images from.
  - name: ADAPTER_IMAGE_REPO
    default: "ci/hyperfleet-adapter"
    documentation: The image repository path for the Adapter component.
  - name: ADAPTER_IMAGE_TAG
    default: "latest"
    documentation: The image tag for the Adapter component.
  - name: API_CHART_REPO
    default: "https://github.com/openshift-hyperfleet/hyperfleet-api.git"
    documentation: The Helm chart repository URL for the API component.
  - name: API_CHART_REF
    default: "main"
    documentation: The git reference (branch/tag/commit) for the API chart repository.
  - name: API_CHART_PATH
    default: "charts"
    documentation: The path to the charts directory within the API chart repository.
  credentials:
  - collection: ""
    namespace: test-credentials
    name: hyperfleet-e2e
    mount_path: /var/run/hyperfleet-e2e
  documentation: |-
    Hyperfleet e2e test step.
