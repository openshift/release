ref:
  as: cluster-api-actuator-pkg-extension
  from: tests
  commands: cluster-api-actuator-pkg-extension-commands.sh
  timeout: 3h0m0s
  env:
  - name: EXTENSION_IMAGE
    default: ""
    documentation: |-
      The cluster-api-actuator-pkg extension test image to use
  - name: TEST_SUITE
    default: "mapi/e2e"
    documentation: |-
      Test suite to run. Available options:
        - mapi/e2e: Machine API e2e tests
        - capi/e2e: Cluster API e2e tests
  - name: EXTENSION_NAMESPACE
    default: "test-extensions"
    documentation: |-
      Namespace to create for test extension ImageStream
  resources:
    requests:
      cpu: "3"
      memory: 600Mi
    limits:
      memory: 10Gi
  documentation: |-
    Sets up and runs the cluster-api-actuator-pkg out-of-payload extension tests.
