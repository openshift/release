ref:
  as: stackrox-stackrox-perf-scale-post
  from: test-bin
  commands: stackrox-stackrox-perf-scale-post-commands.sh
  credentials:
  - mount_path: /tmp/vault/stackrox-stackrox-e2e-tests
    name: stackrox-stackrox-e2e-tests
    namespace: test-credentials
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  timeout: 20m0s
  grace_period: 5m
  documentation: |-
    Collects diagnostics after performance/scale tests complete.
    Runs roxctl commands to collect debug dumps and diagnostic bundles from Central.
