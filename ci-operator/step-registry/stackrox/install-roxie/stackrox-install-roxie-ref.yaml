ref:
  as: stackrox-install-roxie
  from: test-bin
  grace_period: 20m
  commands: stackrox-install-roxie-commands.sh
  resources:
    requests:
      cpu: 2000m
      memory: 4000Mi
  env:
  - name: ROXIE_VERSION
    default: "0.4.2"
  documentation: |-
    A step that installs RHACS(stackrox) via roxie
