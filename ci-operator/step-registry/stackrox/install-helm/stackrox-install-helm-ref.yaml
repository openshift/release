ref:
  as: stackrox-install-helm
  from_image:
    namespace: ocp
    name: cli-jq
    tag: latest
  grace_period: 20m
  commands: stackrox-install-helm-commands.sh
  resources:
    requests:
      cpu: 2000m
      memory: 4000Mi
  env:
  - name: ROX_SCANNER_V4_ENABLED
    default: "true"
  - name: SCANNER_V4_MATCHER_READINESS
    default: "database"
  - name: SCANNER_V4_MATCHER_READINESS_MAX_WAIT
    default: "3600"
  - name: ACS_IMAGE_TAG
    default: ""
    documentation: |-
      Override ACS image tag (e.g., 4.11.x-688-g405c8cf703). If empty, uses PR image tag or latest nightly.
  documentation: |-
    A step that installs RHACS(stackrox) via Helm
