ref:
  as: baremetal-lab-pre-enable-vnc
  from_image:
    namespace: ci
    name: "baremetal-qe-base"
    tag: latest
  commands: baremetal-lab-pre-enable-vnc-commands.sh
  resources:
    requests:
      cpu: '1'
      memory: 128Mi
  grace_period: 600
  credentials:
  - namespace: test-credentials # this entry injects the custom credential
    name: oink-vnc-secret
    mount_path: /var/run/idrac-vnc-password
  documentation: |-
    The baremetal-lab-pre-enable-vnc enables the VNC server on the host
