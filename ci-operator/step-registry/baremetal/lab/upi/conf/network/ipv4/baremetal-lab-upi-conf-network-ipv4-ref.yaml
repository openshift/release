ref:
  as: baremetal-lab-upi-conf-network-ipv4
  from_image:
    namespace: ci
    name: "baremetal-qe-base"
    tag: latest
  commands: baremetal-lab-upi-conf-network-ipv4-commands.sh
  resources:
    requests:
      cpu: '1'
      memory: 128Mi
  env:
    - name: INTERNAL_NET_CIDR
      default: "192.168.80.0/22"
  documentation: |-
    This step will use the QE baremetal host service to setup the install-config networking section 
    for IPv4 BM UPI installations on infrastructure leveraging the self managed network topology.
