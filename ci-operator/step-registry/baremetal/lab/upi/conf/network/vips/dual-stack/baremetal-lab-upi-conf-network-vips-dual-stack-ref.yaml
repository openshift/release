ref:
  as: baremetal-lab-upi-conf-network-vips-dual-stack
  from_image:
    namespace: ci
    name: "baremetal-qe-base"
    tag: latest
  commands: baremetal-lab-upi-conf-network-vips-dual-stack-commands.sh
  resources:
    requests:
      cpu: '1'
      memory: 128Mi
  env:
    - name: AGENT_PLATFORM_TYPE
      default: ""
      documentation: |-
        The platform type to use for the installation. Valid values are "none" and "" (baremetal). Default is "".
  documentation: |-
    This step will use the QE baremetal host service to setup the install-config networking section 
    for Dual Stack BM UPI installations on infrastructure leveraging the self managed network topology.
