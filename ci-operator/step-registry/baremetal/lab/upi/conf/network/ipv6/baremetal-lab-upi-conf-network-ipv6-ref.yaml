ref:
  as: baremetal-lab-upi-conf-network-ipv6
  from_image:
    namespace: ci
    name: "baremetal-qe-base"
    tag: latest
  commands: baremetal-lab-upi-conf-network-ipv6-commands.sh
  resources:
    requests:
      cpu: '1'
      memory: 128Mi
  env:
    - name: INTERNAL_NET_V6_CIDR
      default: "fd99:2222:3456::/64"
  documentation: |-
    This step will use the QE baremetal host service to setup the install-config networking section 
    for IPv6 BM UPI installations on infrastructure leveraging the self managed network topology.
