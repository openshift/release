ref:
  as: baremetal-lab-ipi-conf-network-vips-ipv4
  from_image:
    namespace: ci
    name: "baremetal-qe-base"
    tag: latest
  commands: baremetal-lab-ipi-conf-network-vips-ipv4-commands.sh
  resources:
    requests:
      cpu: '1'
      memory: 128Mi
  env:
    - name: AGENT_PLATFORM_TYPE
      default: ""
      documentation: |-
        The platform type to use for the installation. Valid values are "none" and "" (baremetal). Default is "".
    - name: masters
      default: "3"
  documentation: |-
    This step will use the QE baremetal host service to setup the install-config baremetal platform's vips section
    for IPv4 BM installations on infrastructure leveraging the self managed network topology.
