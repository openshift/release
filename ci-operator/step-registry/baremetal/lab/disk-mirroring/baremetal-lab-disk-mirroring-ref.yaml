ref:
  as: baremetal-lab-disk-mirroring
  from_image:
    namespace: ci
    name: "baremetal-qe-base"
    tag: latest
  grace_period: 10m
  commands: baremetal-lab-disk-mirroring-commands.sh
  resources:
    requests:
      cpu: '1'
      memory: 128Mi
  env:
    - name: AUX_HOST
      default: ""
    - name: ENABLE_DISK_MIRRORING
      default: "false"
    - name: architecture
      default: ""
  documentation: |-
    Generate manifest file for disk-mirroring.
