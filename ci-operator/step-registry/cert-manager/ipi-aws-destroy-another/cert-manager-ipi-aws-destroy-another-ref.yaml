ref:
  as: cert-manager-ipi-aws-destroy-another
  from: installer
  best_effort: true
  grace_period: 10m
  commands: cert-manager-ipi-aws-destroy-another-commands.sh
  timeout: 60m
  resources:
    requests:
      cpu: 1000m
      memory: 300Mi
  documentation: |-
    Destroys the second AWS IPI cluster provisioned by
    cert-manager-ipi-aws-install-another. Reads metadata-cluster2.json from
    SHARED_DIR to identify the cluster resources to tear down.
