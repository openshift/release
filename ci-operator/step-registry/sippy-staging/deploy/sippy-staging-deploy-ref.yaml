ref:
  as: sippy-staging-deploy
  cli: latest
  from: cli
  commands: sippy-staging-deploy-commands.sh
  timeout: 30m
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  credentials:
  - namespace: test-credentials
    name: registry-pull-credentials
    mount_path: /var/run/registry-pull-credentials-all
  env:
  - name: DOCKERCONFIGJSON
    default: "/var/run/registry-pull-credentials-all/.dockerconfigjson"
    documentation: Path to Docker config for image pull credentials.
  - name: STAGING_IMAGE
    default: ""
    documentation: Image reference for the sippy staging pod (devcontainer + binary).
  dependencies:
  - name: "pipeline:sippy-staging-dev"
    env: STAGING_IMAGE
  documentation: |-
    Deploy a sippy staging environment on the claimed cluster.
    Deploys postgres, redis, and the sippy devcontainer with seed data.
    Exposes sippy via an HTTPS route and prints the public URL.
