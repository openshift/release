ref:
  as: sippy-staging-deploy
  from: sippy-staging-dev
  commands: sippy-staging-deploy-commands.sh
  timeout: 2h0m0s
  resources:
    requests:
      cpu: "2"
      memory: 4Gi
  nested_podman: true
  env:
  - name: STAGING_TIMEOUT
    default: "3600"
    documentation: How long (in seconds) to keep the staging environment alive.
  documentation: |-
    Deploy a sippy staging environment inside the CI build pod using nested-podman.
    Runs hack/agentic_setup.sh to start postgres/redis, build sippy, and seed the
    database with synthetic data. Starts the sippy server and exposes it via a
    cloudflared tunnel with a public HTTPS URL.
