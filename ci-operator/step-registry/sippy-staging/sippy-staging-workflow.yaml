workflow:
  as: sippy-staging
  steps:
    test:
    - ref: sippy-staging-deploy
  documentation: |-
    Deploy a sippy staging environment using nested-podman in the CI build pod.
    Starts postgres, redis, and sippy using the devcontainer setup scripts,
    then exposes a public URL via cloudflared tunnel.
    The environment stays up for a configurable duration (default: 1 hour)
    controlled by the STAGING_TIMEOUT env var.
