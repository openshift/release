workflow:
  as: sippy-staging
  steps:
    pre:
    - ref: ipi-install-rbac
    test:
    - ref: sippy-staging-deploy
    - ref: wait
    post:
    - chain: gather
  documentation: |-
    Deploy a sippy staging environment on a claimed cluster with a public URL.
    Uses the devcontainer-based staging image with the PR-built sippy binary.
    The environment stays up for a configurable duration (default: 1 hour)
    controlled by the TIMEOUT env var passed to the wait step.
