ref:
  as: ingress-ai-analyze
  from_image:
    namespace: ci
    name: claude-ai-helpers
    tag: latest
  commands: ingress-ai-analyze-commands.sh
  timeout: 2h0m0s
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
  credentials:
    - namespace: test-credentials
      name: sa-claude-openshift-ci
      mount_path: /var/run/vertex-ai-creds
    - namespace: test-credentials
      name: trt-agent-gh-app
      mount_path: /var/run/github-app-creds
  env:
    - name: CLAUDE_CODE_USE_VERTEX
      default: "1"
    - name: CLOUD_ML_REGION
      default: "global"
    - name: ANTHROPIC_VERTEX_PROJECT_ID
      default: "itpc-gcp-hybrid-pe-eng-claude"
    - name: CLAUDE_MODEL
      default: "claude-opus-4-6"
