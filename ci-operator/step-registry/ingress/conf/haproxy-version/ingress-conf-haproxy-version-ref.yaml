ref:
  as: ingress-conf-haproxy-version
  from: cli
  commands: ingress-conf-haproxy-version-commands.sh
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
  env:
  - name: HAPROXY_VERSION
    default: ""
    documentation: |-
      The HAProxy version to use as the default for all IngressControllers
      (e.g. "2.8"). This value is set as an unsupported annotation on
      ingresses.config.openshift.io/cluster, which the ingress operator
      reads to override the compiled default HAProxy version.
  documentation: |-
    Configures the cluster-wide default HAProxy version by annotating
    ingresses.config.openshift.io/cluster with an unsupported override.
    This affects all IngressControllers that do not have an explicit
    spec.haproxyVersion set, including those created by tests. This step
    must run after cluster installation (after ipi-install).
