ref:
  as: verify-stage-csv-versions
  from_image:
    namespace: ocp
    name: "4.18"
    tag: upi-installer
  cli: latest
  commands: verify-stage-csv-versions-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 100Mi
  env:
  - name: CATALOGSOURCE_NAME
    default: qe-app-registry
    documentation: Name of the CatalogSource to verify CSV versions against.
  documentation: |-
    Verify that CSV versions of optional operators in the stage
    CatalogSource match the OCP cluster version. Fails the job if
    any operator CSV version does not match the expected major.minor.
