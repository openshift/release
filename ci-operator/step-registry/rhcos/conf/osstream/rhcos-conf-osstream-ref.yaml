ref:
  as: rhcos-conf-osstream
  from: installer
  commands: rhcos-conf-osstream-commands.sh
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
  env:
  - name: OSSTREAM
    default: ""
    documentation: The OS image stream to configure for master and worker MachineConfigPools. Valid values are "rhel-9" or "rhel-10". If empty, no configuration is applied.
  - name: ADD_ARBITER
    default: "false"
    documentation: Whether to add an arbiter MachineConfigPool. Valid values are "true" or "false". If empty, no configuration is applied.
  documentation: |-
    Creates manifests for worker and master to set osImageStream to the specified RHCOS version. Only applies configuration if OSSTREAM is set to "rhel-9" or "rhel-10".
    If ADD_ARBITER is set to "true", it will also create a manifest for the arbiter MachineConfigPool.
