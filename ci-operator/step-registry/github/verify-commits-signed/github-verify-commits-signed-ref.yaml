ref:
  as: github-verify-commits-signed
  from: cli
  commands: github-verify-commits-signed-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 100Mi
  timeout: 5m0s
  grace_period: 30s
  documentation: |-
    Verifies that all commits in a pull request are GPG-signed (GitHub "Verified" badge).
    Uses the GitHub API to check the commit.verification.verified field for each commit.
    Fails with exit 1 if any commit is not cryptographically signed.
    Intended for presubmit jobs only — requires REPO_OWNER, REPO_NAME, and PULL_NUMBER
    environment variables injected by Prow.
