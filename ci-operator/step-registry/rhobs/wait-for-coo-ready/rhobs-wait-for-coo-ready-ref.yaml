ref:
  as: rhobs-wait-for-coo-ready
  from: cli
  cli: latest
  commands: rhobs-wait-for-coo-ready-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  env:
  - name: COO_NAMESPACE
    default: coo
    documentation: Namespace where the Cluster Observability Operator is installed.
  documentation: |-
    Waits for all COO deployments (observability-operator,
    obo-prometheus-operator, obo-prometheus-operator-admission-webhook)
    to be Available before proceeding with tests.
