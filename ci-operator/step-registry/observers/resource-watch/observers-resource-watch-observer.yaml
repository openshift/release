observer:
  name: observers-resource-watch
  from: tests
  commands: observers-resource-watch-commands.sh
  resources:
    requests:
      cpu: 500m
      memory: 500Mi
  env:
  - name: RESOURCE_WATCH_ENABLED
    default: "false"
    documentation: |-
      Set to "true" to enable the resource watch observer. When "false", the observer
      exits immediately without collecting any data.
  timeout: 24h
  grace_period: 1h
  documentation: |-
    An observer to watch all changes to a defined set of cluster resources throughout the
    life of the cluster, and record them to a git repository.
