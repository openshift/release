ref:
  as: block-copyfail-deploy
  from: src
  cli: latest
  commands: block-copyfail-deploy-commands.sh
  dependencies:
  - name: mitigation-loader
    env: MITIGATION_LOADER_IMAGE
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
  timeout: 10m0s
  documentation: |-
    Deploys the block-copyfail BPF LSM DaemonSet to the test cluster using the
    CI-built mitigation-loader image. Waits for all pods to become ready.
