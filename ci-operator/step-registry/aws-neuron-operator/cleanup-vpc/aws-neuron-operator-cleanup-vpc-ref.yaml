ref:
  as: aws-neuron-operator-cleanup-vpc
  from_image:
    namespace: ocp
    name: "4.18"
    tag: upi-installer
  grace_period: 10m
  commands: aws-neuron-operator-cleanup-vpc-commands.sh
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
  env:
  - name: REGION
    default: ""
    documentation: AWS region for the VPC stack. Overrides LEASED_RESOURCE.
  documentation: |-
    Cleans up any pre-existing VPC CloudFormation stack left over from a
    previous failed run. This prevents AlreadyExistsException when
    aws-provision-vpc-shared tries to create the stack.
