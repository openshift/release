ref:
  as: aws-neuron-operator-deprovision-stacks
  from_image:
    namespace: ocp
    name: "4.12"
    tag: upi-installer
  best_effort: true
  timeout: 30m
  grace_period: 10m
  commands: aws-neuron-operator-deprovision-stacks-commands.sh
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
  env:
  - name: REGION
    default: ""
    documentation: Use a specific AWS region, overriding the LEASED_RESOURCE environment variable in the cluster_profile.
  documentation: |-
    Delete AWS CloudFormation stacks for Neuron CI. Identical to aws-deprovision-stacks
    but marked best_effort so cleanup failures do not fail the overall job.
    Stale stacks are also handled by the cleanup-vpc pre step on the next run.
