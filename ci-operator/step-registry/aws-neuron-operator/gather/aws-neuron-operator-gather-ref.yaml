ref:
  as: aws-neuron-operator-gather
  best_effort: true
  optional_on_success: true
  from: eco-gotests
  commands: aws-neuron-operator-gather-commands.sh
  timeout: 15m
  grace_period: 60s
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  documentation: |-
    Collects Neuron operator, KMM, and device plugin diagnostic data
    after test execution. Captures operator logs, Module CRs, pod status,
    DaemonSets, events, and node images to help debug device plugin
    deployment failures.
