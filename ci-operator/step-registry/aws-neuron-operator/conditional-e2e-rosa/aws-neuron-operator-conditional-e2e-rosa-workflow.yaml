workflow:
  as: aws-neuron-operator-conditional-e2e-rosa
  steps:
    env:
      HOSTED_CP: "true"
      ENABLE_BYOVPC: "true"
      ZONES_COUNT: "1"
      COMPUTE_MACHINE_TYPE: "inf2.8xlarge"
      REPLICAS: "2"
      OCM_LOGIN_ENV: "production"
      REGION: "us-west-2"
    pre:
    # Clean up stale VPC stack from previous failed runs, then provision
    - ref: aws-neuron-operator-cleanup-vpc
    - ref: aws-provision-vpc-shared
    - ref: aws-provision-tags-for-byo-vpc-ocm-pre
    # OIDC and account roles setup
    - chain: rosa-sts-oidc-config-create
    # Custom cluster provision step that handles "zero egress" CLI bug
    - ref: aws-neuron-operator-rosa-cluster-provision
    - ref: rosa-cluster-wait-ready-cluster
    - ref: rosa-cluster-notify-error
    - ref: rosa-conf-idp-htpasswd
    - ref: rosa-cluster-wait-ready-nodes
    - ref: rosa-cluster-wait-ready-operators
    - ref: aws-provision-tags-for-byo-vpc
    # Additional configuration
    - ref: osd-ccs-conf-idp-htpasswd-multi-users
    # Install operators before tests so eco-gotests detects them as pre-existing
    - ref: aws-neuron-operator-install-operators
    test:
    - ref: aws-neuron-operator-test
    post:
    - ref: aws-neuron-operator-gather
    # Custom deprovision step with retry logic for STS resource deletion.
    # The standard rosa-cluster-deprovision has a race condition where
    # operator-roles deletion fails because OCM still reports the cluster
    # as "uninstalling" after it disappears from the API.
    - ref: aws-neuron-operator-rosa-cluster-deprovision
      best_effort: true
    - chain: rosa-sts-oidc-config-delete
      best_effort: true
    - ref: aws-deprovision-stacks
      best_effort: true
  documentation: |-
    This workflow provisions a ROSA HCP cluster with 2x AWS Inferentia (inf2.8xlarge)
    compute nodes, then runs the AWS Neuron operator E2E tests conditionally
    based on kernel changes.

    Uses a custom provision step to work around the ROSA CLI "zero egress" bug
    where the CLI returns exit code 1 after successfully creating the cluster.
