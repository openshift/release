ref:
  as: aws-neuron-operator-install-operators
  from: neuron-ci
  commands: aws-neuron-operator-install-operators-commands.sh
  env:
  - name: ECO_HWACCEL_NEURON_DRIVERS_IMAGE
    default: ""
    documentation: Neuron kernel module driver image (fetched from latest release if empty)
  - name: ECO_HWACCEL_NEURON_DRIVER_VERSION
    default: ""
    documentation: Neuron driver version string (fetched from latest release if empty)
  - name: ECO_HWACCEL_NEURON_DEVICE_PLUGIN_IMAGE
    default: ""
    documentation: Neuron device plugin image (fetched from latest release if empty)
  - name: ECO_HWACCEL_NEURON_NODE_METRICS_IMAGE
    default: ""
    documentation: Neuron node metrics exporter image (fetched from latest release if empty)
  - name: ECO_HWACCEL_NEURON_SCHEDULER_IMAGE
    default: ""
    documentation: Custom kube-scheduler image for Neuron-aware scheduling (fetched from latest release if empty)
  - name: ECO_HWACCEL_NEURON_SCHEDULER_EXTENSION_IMAGE
    default: ""
    documentation: Neuron scheduler extension image (fetched from latest release if empty)
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  documentation: |-
    Installs AWS Neuron Operator and dependencies (NFD, KMM) on an
    already-provisioned ROSA HCP cluster.  Runs make cluster-operators
    which orchestrates the full operator installation flow: OLM installs,
    NodeFeatureDiscovery, NodeFeatureRule, DeviceConfig, and waits for
    Neuron device resources.
