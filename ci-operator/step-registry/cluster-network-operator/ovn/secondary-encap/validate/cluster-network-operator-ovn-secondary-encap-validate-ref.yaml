ref:
  as: cluster-network-operator-ovn-secondary-encap-validate
  from: cli
  commands: cluster-network-operator-ovn-secondary-encap-validate-commands.sh
  grace_period: 10m
  timeout: 30m
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
  documentation: |-
    Capture ovs-vsctl show output from ovnkube-node and verify the live OVN
    encapsulation IP matches the secondary interface IP injected through
    openshift-ovn-kubernetes/env-overrides.
