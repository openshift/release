ref:
  as: cluster-network-operator-ovn-secondary-encap-pre
  from: cli
  commands: cluster-network-operator-ovn-secondary-encap-pre-commands.sh
  grace_period: 10m
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
  env:
  - name: EXTRANET_NETWORK_SUBNET_V4
    default: 192.168.221.0/24
    documentation: |-
      IPv4 subnet used to discover the secondary interface address that should be
      injected into openshift-ovn-kubernetes/env-overrides for OVN_ENCAP_IP.
  documentation: |-
    Discover the secondary interface IPv4 address on each ovnkube-node pod and
    apply openshift-ovn-kubernetes/env-overrides with a node-specific
    OVN_ENCAP_IP entry for encapsulation validation.
