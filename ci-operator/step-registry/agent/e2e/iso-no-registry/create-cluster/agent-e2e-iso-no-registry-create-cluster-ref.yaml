ref:
  as: agent-e2e-iso-no-registry-create-cluster
  from: dev-scripts
  timeout: 3h0m0s
  grace_period: 10m
  commands: agent-e2e-iso-no-registry-create-cluster-commands.sh
  resources:
    requests:
      cpu: 1000m
      memory: 500Mi
  env:
  - name: DEVSCRIPTS_CONFIG
    default: ""
    documentation: Additional dev-scripts configuration. See https://github.com/openshift-metal3/dev-scripts/blob/master/README.md for more details.
  documentation: |-
    Run the agent-based cluster creation step (06_agent_create_cluster.sh) on a
    pre-configured host. This step is separated from baremetalds-devscripts-setup
    to allow a longer timeout for UI-driven ISO_NO_REGISTRY installations.
