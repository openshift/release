workflow:
  as: agent-e2e-generic-conformance-iso-no-registry
  steps:
    allow_best_effort_post_steps: true
    allow_skip_on_success: true
    env:
      DEVSCRIPTS_TARGET: agent_requirements requirements configure agent_build_installer
        agent_prepare_release agent_configure
    pre:
      - chain: agent-pre
      - ref: agent-e2e-iso-no-registry-create-cluster
    test:
      - ref: agent-e2e-compact-ipv4-iso-no-registry-validation
      - chain: agent-test-conformance-iso-no-registry
    post:
      - chain: agent-post
  documentation: |-
    This workflow is a generic conformance one to deploy a no registry cluster provisioned by running agent installer, and it
    will require to set the env variable DEVSCRIPTS_CONFIG to work properly.
