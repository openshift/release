ref:
  as: interop-tests-custom-ibm-must-gather
  best_effort: true
  optional_on_success: true
  from: cli
  commands: interop-tests-custom-ibm-must-gather-commands.sh
  timeout: 1h0m0s
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  documentation: |-
    Collect IBM Spectrum Scale must-gather for debugging
  env:
  - name: MUST_GATHER_IMAGE
    documentation: IBM Spectrum Scale must-gather image
    default: "icr.io/cpopen/ibm-spectrum-scale-must-gather:v5.2.3.1"
  - name: ARTIFACT_DIR
    documentation: Directory for must-gather artifacts
    default: "/tmp/artifacts"
