ref:
  as: interop-tests-custom-ibm-must-gather
  from: fusion-access-test-runner
  commands: interop-tests-custom-ibm-must-gather-commands.sh
  timeout: 1h0m0s
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  credentials:
    - namespace: test-credentials
      name: ibm-entitlement-credentials
      mount_path: /tmp/secrets/ibm-entitlement-credentials
  documentation: |-
    Collect IBM Spectrum Scale must-gather for debugging
  env:
  - name: MUST_GATHER_IMAGE
    documentation: IBM Spectrum Scale must-gather image
    default: "icr.io/cpopen/ibm-spectrum-scale-must-gather:latest"
  - name: ARTIFACT_DIR
    documentation: Directory for must-gather artifacts
    default: "/tmp/artifacts"
