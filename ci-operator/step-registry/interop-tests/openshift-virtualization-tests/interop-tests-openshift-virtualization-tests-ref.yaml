ref:
  as: interop-tests-openshift-virtualization-tests
  documentation: |-
    Run Verification tests for Openshift Virtualization
  from: openshift-virtualization-tests-sshpass
  commands: interop-tests-openshift-virtualization-tests-commands.sh
  timeout: 4h0m0s
  grace_period: 2h
  cli: latest
  credentials:
    - name: cluster-secrets-aws-interop-qe
      namespace: test-credentials
      mount_path: /secrets
    - name: cnv-ci-brew-pull-secret
      namespace: test-credentials
      mount_path: /var/run/cnv-ci-brew-pull-secret
    - name: openshift-virtualization-tests-credentials
      namespace: test-credentials
      mount_path: /bw
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  dependencies:
    - name: "release:latest"
      env: OPENSHIFT_UPGRADE_RELEASE_IMAGE_OVERRIDE
  env:
  - name: BW_PATH
    default: "/bw"
    documentation: Bitwarden folder
  - name: OCP_VERSION
    default: "4.13"
    documentation: |-
      OpenShift Version
  - default: '|7820aea2-0d75-11e7-9259-28d244ea5a6d.hhav.f63e13'
    name: BREW_IMAGE_REGISTRY_USERNAME
  - default: /var/run/cnv-ci-brew-pull-secret/token
    name: BREW_IMAGE_REGISTRY_TOKEN_PATH
  - default: v0.59.0-alpha.0
    name: KUBEVIRT_RELEASE
  - default: "4.13"
    name: OCP_VERSION
  - default: /tmp/artifacts
    name: ARTIFACTS_DIR
  - default: openshift-cnv
    name: TARGET_NAMESPACE
  - name: MAP_TESTS
    default: "false"
    documentation: Specify whether to update the test suite name for reporting tools
  - name: CNV_TESTS_UPGRADE_ONLY
    default: "false"
    documentation: |-
      When true, require managed-cluster-kubeconfig and run OCP upgrade tests only
      Set ORIGINAL_RELEASE_IMAGE_LATEST for --ocp-image. When false, use default kubeconfig and smoke tests;
      mapTestsForComponentReadiness still runs when MAP_TESTS=true.
