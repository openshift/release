ref:
  as: interop-tests-openshift-virtualization-upgrade-prep
  documentation: |-
    Prepares the ACM spoke cluster for CNV upgrade tests. Runs before
    interop-tests-openshift-virtualization-upgrade-tests.
    Resolves CNV_TARGET_VERSION from the spoke packagemanifest and writes it to
    ${SHARED_DIR}/cnv-target-version. Configures storage class, ODF snapshot class,
    CDI StorageProfile RWX, restarts ODF/HPP CSI to flush stale locks, waits for boot
    image DataImportCrons, prepares OLM install plans for the target CSV, and slows
    down HCO workload update so VMIs remain outdated for observability metric tests.
  from: cli
  commands: interop-tests-openshift-virtualization-upgrade-prep-commands.sh
  timeout: 2h30m0s
  grace_period: 5m
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  env:
  - name: CNV_TARGET_MAJOR_MINOR
    default: "4.21"
    documentation: |-
      When set, resolves the actual upgrade target version from OLM's pending install plan
      for the hco-operatorhub subscription on the spoke and sets CNV_TARGET_VERSION. This
      reflects the real OLM upgrade graph (replaces/skipRange edges) rather than the lowest
      catalog entry, so it correctly handles cases where OLM skips z-stream versions via
      skipRange (e.g. v4.21.z -> v4.22.2 directly). The plan is left unapproved so the
      upgrade-tests step controls when the actual upgrade happens. Leave empty to use
      CNV_TARGET_VERSION as-is.
  - name: CNV_TARGET_VERSION
    default: "4.21.0"
    documentation: Target CNV version for the upgrade. Overridden when CNV_TARGET_MAJOR_MINOR is set.
  - name: CNV_CHANNEL
    default: "stable"
    documentation: |-
      Kept for backwards compatibility. No longer used by the upgrade-prep step itself;
      the target version is now resolved from OLM's actual pending install plan.
      Previously used to filter packagemanifest entries by channel name.
  - name: CNV_TARGET_STORAGE_CLASS
    default: "ocs-storagecluster-ceph-rbd-virtualization"
    documentation: |-
      StorageClass for CNV boot images. Must match deploy-odf ODF_DEFAULT_STORAGE_CLASS.
      deploy-odf must complete before this step.
  - name: CNV_DV_NAMESPACE_PVC_WAIT_TIMEOUT
    default: "600"
    documentation: Max seconds to wait for openshift-virtualization-os-images PVCs to reach Bound/idle.
  - name: CNV_DV_NAMESPACE_PVC_RETRY_WAIT_TIMEOUT
    default: "300"
    documentation: Max seconds to retry PVC idle wait after force-deleting stuck PVCs in boot image prep.
  - name: CNV_BOOT_IMPORT_CRON_UPTODATE_WAIT_TIMEOUT
    default: "20m"
    documentation: Max wait per DataImportCron UpToDate condition during boot image prep.
