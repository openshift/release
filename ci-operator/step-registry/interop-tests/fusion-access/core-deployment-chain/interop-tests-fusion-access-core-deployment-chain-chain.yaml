chain:
  as: interop-tests-fusion-access-core-deployment-chain
  steps:
  - ref: interop-tests-fusion-access-create-namespaces
  - ref: interop-tests-fusion-access-create-pull-secrets
  - ref: interop-tests-fusion-access-configure-aws-security-groups
  - ref: interop-tests-fusion-access-install-fusion-access-operator
  - ref: interop-tests-fusion-access-create-fusionaccess-resource
  - ref: interop-tests-fusion-access-check-crds
  - ref: interop-tests-fusion-access-check-nodes
  - ref: interop-tests-fusion-access-label-nodes
  - ref: interop-tests-fusion-access-create-cluster
  documentation: |-
    Core Fusion Access Operator deployment chain that orchestrates the deployment
    workflow from prerequisites through IBM Storage Scale cluster creation.
    
    This chain includes:
    - Prerequisites: Namespace creation and pull secret setup
    - Network configuration: AWS security groups for IBM Storage Scale
    - Operator installation: Fusion Access Operator deployment
    - Resource creation: FusionAccess custom resource initialization
    - Diagnostics: Optional CRD and node validation steps
    - Node preparation: Worker node labeling for storage
    - Storage deployment: IBM Storage Scale cluster creation
    
    The chain provides the core deployment workflow for Fusion Access Operator
    with IBM Storage Scale. Filesystem creation is handled by separate storage-
    specific chains (e.g., EBS filesystem chain).
