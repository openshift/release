chain:
  as: interop-tests-fusion-access-ebs-deployment
  steps:
  - chain: interop-tests-fusion-access-core-deployment-chain
  - ref: interop-tests-fusion-access-create-ebs-filesystem
  - ref: interop-tests-fusion-access-verify-ebs-filesystem
  - ref: interop-tests-fusion-access-verify-cluster
  - ref: interop-tests-fusion-access-tests
  documentation: |-
    Complete end-to-end Fusion Access Operator deployment chain with EBS filesystem.
    
    This chain orchestrates the full deployment and testing workflow:
    - Core deployment: Prerequisites through IBM Storage Scale cluster creation
    - EBS filesystem: EBS-based filesystem creation and configuration
    - Verification: Filesystem and cluster status validation
    - Testing: Functional testing of the deployed system
    
    The chain includes:
    1. Core deployment chain:
       - Prerequisites: Namespace creation and pull secret setup
       - Network configuration: AWS security groups for IBM Storage Scale
       - Operator installation: Fusion Access Operator deployment
       - Resource creation: FusionAccess custom resource initialization
       - Diagnostics: Optional CRD and node validation steps
       - Node preparation: Worker node labeling for storage
       - Storage deployment: IBM Storage Scale cluster creation
    
    2. EBS filesystem creation:
       - EBS filesystem creation: Direct EBS volume configuration
       - Storage setup: Multi-node access configuration
       - Filesystem initialization: Shared storage for IBM Storage Scale
    
    3. Verification and testing:
       - Filesystem verification: Validate EBS filesystem status and health
       - Cluster verification: Validate IBM Storage Scale cluster status
       - Functional testing: Run comprehensive tests on deployed system
    
    This provides a complete, ready-to-use end-to-end workflow for Fusion Access
    Operator with IBM Storage Scale on AWS infrastructure using EBS storage,
    including full deployment, verification, and testing.
    
    Prerequisites:
    - AWS cluster with sufficient worker nodes (minimum 3 for quorum)
    - EBS volumes available on worker nodes
    - Proper AWS security group configuration
