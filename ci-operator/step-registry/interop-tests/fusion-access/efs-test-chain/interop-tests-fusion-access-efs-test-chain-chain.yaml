chain:
  as: interop-tests-fusion-access-efs-test-chain
  steps:
  - ref: interop-tests-fusion-access-create-ebs-filesystem
  - ref: interop-tests-fusion-access-verify-ebs-filesystem
  - ref: interop-tests-fusion-access-verify-cluster
  - ref: interop-tests-fusion-access-tests
  documentation: |-
    EFS test chain for Fusion Access testing with EFS (Elastic File System) storage.
    
    This chain provides the EFS-specific components for Fusion Access testing:
    - EFS filesystem creation: EFS volume configuration for multi-node access
    - Filesystem verification: Validate EFS filesystem status and health
    - Cluster verification: Validate IBM Storage Scale cluster status
    - Functional testing: Run comprehensive tests on deployed system
    
    This chain should be used after the environment setup chain to complete
    the EFS-based Fusion Access deployment and testing.
    
    Note: EFS is built on AWS EBS infrastructure, so this chain reuses the
    existing EBS filesystem steps which are compatible with EFS.
    
    Prerequisites:
    - Environment setup chain must complete successfully
    - IBM Storage Scale cluster must be ready
    - EFS volumes must be available on worker nodes
    - AWS EFS service must be accessible from the cluster
