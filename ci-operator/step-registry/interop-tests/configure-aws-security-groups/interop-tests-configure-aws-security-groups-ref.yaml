ref:
  as: interop-tests-configure-aws-security-groups
  from: fusion-access-test-runner
  commands: interop-tests-configure-aws-security-groups-commands.sh
  timeout: 30m0s
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  documentation: |-
    Configure AWS security groups for Fusion Access Operator testing
  env:
  - name: CUSTOM_SECURITY_GROUP_PORTS
    documentation: Comma-separated list of ports for security group configuration
    default: "12345,1191,60000-61000"
  - name: CUSTOM_SECURITY_GROUP_PROTOCOLS
    documentation: Comma-separated list of protocols (tcp, udp, icmp)
    default: "tcp"
  - name: CUSTOM_SECURITY_GROUP_SOURCES
    documentation: Comma-separated list of source security groups or CIDR blocks (defaults to worker security group)
    default: ""
