chain:
  as: openstack-test-e2e
  steps:
  - ref: openshift-e2e-test
  - ref: openstack-test-openstack
  env:
  - name: TEST_ARGS
    default: --disable-monitor=termination-message-policy
    documentation: |-
      Disable the termination-message-policy monitor test which fails on
      OpenStack due to how the openstack-tests binary is built.
  documentation: |-
    This chain runs the e2e test suites for OpenShift on OpenStack.
