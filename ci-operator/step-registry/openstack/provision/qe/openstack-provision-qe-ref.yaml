ref:
  as: openstack-provision-qe
  from: openstack-installer
  grace_period: 5m
  commands: openstack-provision-qe-commands.sh
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
  env:
    - name: OCP_TESTING
      default: "ci"
      documentation: "Name of the QE job endpoint"
    - name: OPENSHIFT_RELEASE
      default: ""
      documentation: "QE job OpenShift release"
    - name: TEST_CONFIG_FILE
      default: ""
      documentation: "QE job config type"
  credentials:
  - namespace: test-credentials
    name: cluster-secrets-openstack-rhoso
    mount_path: /var/run/cluster-secrets/openstack-rhoso
  documentation: |-
   Provide the QE job number