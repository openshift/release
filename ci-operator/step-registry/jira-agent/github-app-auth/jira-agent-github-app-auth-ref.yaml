ref:
  as: jira-agent-github-app-auth
  from: claude-ai-helpers
  commands: jira-agent-github-app-auth-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  credentials:
  - namespace: test-credentials
    name: hypershift-team-claude-prow
    mount_path: /var/run/claude-code-service-account
  documentation: |-
    Writes the github-app-auth.sh shell library to SHARED_DIR.
    This library provides generate_github_token() for creating
    short-lived GitHub App installation access tokens via RS256 JWT.
