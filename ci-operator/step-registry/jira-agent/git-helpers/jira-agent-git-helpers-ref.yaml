ref:
  as: jira-agent-git-helpers
  from: claude-ai-helpers
  commands: jira-agent-git-helpers-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  credentials:
  - namespace: test-credentials
    name: hypershift-team-claude-prow
    mount_path: /var/run/claude-code-service-account
  documentation: |-
    Writes the git-helpers.sh shell library to SHARED_DIR.
    This library provides functions for GitHub App credential loading,
    token generation/refresh, fork synchronization, and branch change detection.
