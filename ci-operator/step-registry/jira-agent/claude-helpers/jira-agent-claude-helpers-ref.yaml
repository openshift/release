ref:
  as: jira-agent-claude-helpers
  from: claude-ai-helpers
  commands: jira-agent-claude-helpers-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  credentials:
  - namespace: test-credentials
    name: hypershift-team-claude-prow
    mount_path: /var/run/claude-code-service-account
  documentation: |-
    Writes the claude-helpers.sh shell library to SHARED_DIR.
    This library provides functions for running Claude CLI phases,
    extracting output artifacts, token usage metrics, and phase durations.
