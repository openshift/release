ref:
  as: jira-agent-jira-helpers
  from: claude-ai-helpers
  commands: jira-agent-jira-helpers-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  credentials:
  - namespace: test-credentials
    name: hypershift-team-claude-prow
    mount_path: /var/run/claude-code-service-account
  documentation: |-
    Writes the jira-helpers.sh shell library to SHARED_DIR.
    This library provides functions for Jira API operations (transitions,
    assignee), credential loading (Jira, Slack, GitHub-to-Slack mapping),
    issue querying, and post-processing.
