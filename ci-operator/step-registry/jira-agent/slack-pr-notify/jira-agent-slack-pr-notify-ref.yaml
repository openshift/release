ref:
  as: jira-agent-slack-pr-notify
  from: claude-ai-helpers
  commands: jira-agent-slack-pr-notify-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  credentials:
  - namespace: test-credentials
    name: hypershift-team-claude-prow
    mount_path: /var/run/claude-code-service-account
  documentation: |-
    Writes the slack-pr-notify.sh shell library to SHARED_DIR.
    This library provides send_slack_notification() for posting
    Slack messages when the jira-agent creates pull requests.
