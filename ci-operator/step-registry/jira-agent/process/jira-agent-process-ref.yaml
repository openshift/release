ref:
  as: jira-agent-process
  from: claude-ai-helpers
  commands: jira-agent-process-commands.sh
  timeout: 14400s
  env:
  - name: CLAUDE_CODE_USE_VERTEX
    default: "1"
    documentation: |-
      Enable Vertex AI for Claude Code.
  - name: CLOUD_ML_REGION
    default: "global"
    documentation: |-
      Google Cloud region for Vertex AI.
  - name: ANTHROPIC_VERTEX_PROJECT_ID
    default: "itpc-gcp-hybrid-pe-eng-claude"
    documentation: |-
      Google Cloud project ID for Vertex AI authentication.
  - name: GOOGLE_APPLICATION_CREDENTIALS
    default: "/var/run/claude-code-service-account/claude-prow"
    documentation: |-
      Path to the Google Cloud service account JSON key file for Vertex AI authentication.
  - name: JIRA_AGENT_AUTH_MODE
    default: "app"
    documentation: |-
      Authentication mode: "app" (GitHub App, default) or "pat" (classic PAT).
      In "app" mode, separate fork/upstream GitHub App installation tokens are used.
      In "pat" mode, a single classic PAT handles fork creation, push, and PR creation
      against any public repo. PAT mode requires JIRA_AGENT_FORK_ORG and JIRA_AGENT_PAT_KEY.
  - name: JIRA_AGENT_FORK_ORG
    default: ""
    documentation: |-
      GitHub org or user account to fork repos into (PAT mode only).
      Example: "jira-solve-bot"
      In PAT mode, if JIRA_AGENT_FORK_REPO is not set, it is derived as
      JIRA_AGENT_FORK_ORG/<repo-name-from-upstream>.
      Ignored in App mode (JIRA_AGENT_FORK_REPO is used directly).
  - name: JIRA_AGENT_PAT_KEY
    default: "gh-pat"
    documentation: |-
      Key name in the credential secret for the GitHub classic PAT (PAT mode only).
      The PAT must have the "public_repo" scope for fork creation, push, and PR
      creation against public repositories.
  - name: JIRA_AGENT_COMPONENT_REPO_MAP
    default: ""
    documentation: |-
      Optional JSON object mapping Jira component names to upstream repos.
      When set, JIRA_AGENT_UPSTREAM_REPO is resolved per-issue from the issue's
      Jira component. A fresh clone/fork/sync is performed for each issue.
      Example: '{"HyperShift":"openshift/hypershift","Installer / openshift-installer":"openshift/installer"}'
      When empty, JIRA_AGENT_UPSTREAM_REPO is used for all issues (static mode).
  - name: JIRA_AGENT_FORK_REPO
    default: ""
    documentation: |-
      Fork repository in org/repo format (e.g., "my-team/my-repo").
      The agent clones this repo and pushes branches to it.
      Required in App mode. Optional in PAT mode (derived from JIRA_AGENT_FORK_ORG
      and JIRA_AGENT_UPSTREAM_REPO if not set).
  - name: JIRA_AGENT_UPSTREAM_REPO
    default: ""
    documentation: |-
      Required. Upstream repository in org/repo format (e.g., "openshift/my-repo").
      The agent creates pull requests against this repo.
  - name: JIRA_AGENT_JQL
    default: ""
    documentation: |-
      Required. JQL query for finding Jira issues to process.
      Example: 'project = MYPROJ AND resolution = Unresolved AND status in (New, "To Do") AND labels = issue-for-agent AND labels != agent-processed'
  - name: JIRA_AGENT_TARGET_STATUS
    default: ""
    documentation: |-
      Optional JSON map of Jira project prefix to target status after processing.
      Example: '{"OCPBUGS":"ASSIGNED","CNTRLPLANE":"Code Review"}'
      Leave empty to skip status transitions.
  - name: JIRA_AGENT_ASSIGNEE
    default: ""
    documentation: |-
      Optional display name to search for when setting assignee on processed issues.
      Example: "my-automation-user"
      Leave empty to skip assignee updates.
  - name: JIRA_AGENT_UPSTREAM_INSTALLATION_ID_KEY
    default: "o-h-installation-id"
    documentation: |-
      Key name in the Vault secret for the upstream GitHub App installation ID.
      Only used in App auth mode.
  - name: JIRA_AGENT_FORK_INSTALLATION_ID_KEY
    default: "installation-id"
    documentation: |-
      Key name in the Vault secret for the fork GitHub App installation ID.
      Only used in App auth mode.
  - name: JIRA_AGENT_TOOL_SETUP_SCRIPT
    default: ""
    documentation: |-
      Optional inline shell commands to install project-specific tools.
      Example: "GOFLAGS='' go install golang.org/x/tools/gopls@v0.21.0"
  - name: JIRA_AGENT_REVIEW_LANGUAGE
    default: "go"
    documentation: |-
      Language for the code-review plugin (Phase 2).
  - name: JIRA_AGENT_REVIEW_PROFILE
    default: ""
    documentation: |-
      Optional profile name for the code-review plugin (Phase 2).
  - name: JIRA_AGENT_SLACK_WEBHOOK_KEY
    default: "slack-webhook-url"
    documentation: |-
      Key name in the credential secret for the Slack incoming webhook URL.
      Teams can add their own webhook URL as a separate key in the shared
      credential secret and set this env var to point to it.
      Example: "installer-slack-webhook-url"
  - name: JIRA_AGENT_SLACK_EMOJI
    default: ":robot:"
    documentation: |-
      Slack emoji used in notification messages.
  - name: JIRA_AGENT_ISSUE_KEY
    default: ""
    documentation: |-
      Optional override to process a specific Jira issue instead of querying.
      When set (e.g., "MYPROJ-123"), skips the JQL query and processes only this issue.
  - name: MULTISTAGE_PARAM_OVERRIDE_JIRA_AGENT_ISSUE_KEY
    default: ""
    documentation: |-
      Gangway API override for JIRA_AGENT_ISSUE_KEY.
  - name: JIRA_AGENT_MAX_ISSUES
    default: "1"
    documentation: |-
      Maximum number of Jira issues to process per run.
  - name: CLAUDE_MODEL
    default: "claude-opus-4-6"
    documentation: |-
      Claude model to use for processing Jira issues.
  - name: CLAUDE_CODE_SUBAGENT_MODEL
    default: "claude-opus-4-6"
    documentation: |-
      Claude Code CLI environment variable that overrides the model used by
      subagents spawned via the Agent tool. Without this, agent types like
      Explore default to haiku. Setting it ensures all subagents use the
      same model as the parent session.
      See: https://docs.anthropic.com/en/docs/claude-code/settings#environment-variables
  - name: JIRA_BASE_URL
    default: "https://redhat.atlassian.net"
    documentation: |-
      Base URL for the Jira instance.
  - name: JIRA_AGENT_REPORT_STEP
    default: "jira-agent-report"
    documentation: |-
      CI step name for the report step, used to generate correct artifact
      cross-links in the transcript HTML. Override when a team-specific
      workflow uses a different step name (e.g., "hypershift-jira-agent-report").
  resources:
    requests:
      cpu: "4"
      memory: 8Gi
  credentials:
  - namespace: test-credentials
    name: hypershift-team-claude-prow
    mount_path: /var/run/claude-code-service-account
  documentation: |-
    Generic process step for the Jira agent periodic job.
    This step runs a four-phase pipeline for each issue:
    Phase 1 - Solve: Runs /jira-solve to implement changes, commit, and push the branch
    Phase 2 - Review: Runs /code-review:pre-commit-review for code quality (read-only)
    Phase 3 - Fix: Addresses review findings by editing code, committing, and pushing fixes
    Phase 4 - PR Creation: Creates a draft PR via gh CLI after review is complete

    Supports two auth modes:
    - "app" (default): GitHub App with separate fork/upstream installation tokens.
      Required: JIRA_AGENT_FORK_REPO, JIRA_AGENT_UPSTREAM_REPO
    - "pat": Classic PAT for fork creation, push, and PR creation against any public repo.
      Required: JIRA_AGENT_UPSTREAM_REPO, JIRA_AGENT_FORK_ORG

    Teams onboarding this workflow should create team-specific ref YAMLs (or use a shared
    credential name), because the credential secret name is defined in the ref.
