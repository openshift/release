ref:
  as: quay-tests-provisioning-omr-disconnected
  cli: latest
  from_image:
    name: quay-test-omr
    namespace: ci
    tag: latest
  commands: quay-tests-provisioning-omr-disconnected-commands.sh
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
  credentials:
  - namespace: test-credentials
    name: quay-qe-omr-secret
    mount_path: /var/run/quay-qe-omr-secret
  - namespace: test-credentials
    name: quay-qe-brew-secret
    mount_path: /var/run/quay-qe-brew-secret
  - namespace: test-credentials
    name: registry-pull-credentials
    mount_path: /var/run/ci-credentials/registry
  documentation: |-
    Deploy Quay OMR in Disconnect AWS VPC
  env:
  - name: OMR_RELEASE
    documentation: Test Released OMR or Unreleased OMR
    default: "false"
  - name: MULTISTAGE_PARAM_OVERRIDE_OMR_IMAGE
    documentation: Unreleased OMR Image
    default: "brew.registry.redhat.io/rh-osbs/openshift-mirror-registry-rhel8:v2.0.1-5"
  - name: OMR_FROM_SOURCE
    documentation: When true, extract mirror-registry.tar.gz from the CI-built pipeline
      image via oc image extract instead of pulling from brew registry on the EC2 instance.
      Set via ci-operator config for build-from-source jobs.
    default: "false"
