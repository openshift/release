    default: "image-rbac-proxy.apps.stone-prd-rh01.pg1f.p1.openshiftapps.com/redhat-user-workloads/quay-eng-tenant/quay-builder-qemu-v3-17@sha256:21060dc6e40b9ab6a2f309a11d9f32000d7cd05e86d8a1a420050eb9af8d4e30"

