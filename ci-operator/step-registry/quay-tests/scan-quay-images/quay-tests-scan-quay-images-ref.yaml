ref:
  as: quay-tests-scan-quay-images
  cli: latest
  from_image:
    name: quay-test-omr
    namespace: ci
    tag: latest
  commands: quay-tests-scan-quay-images-commands.sh
  resources:
    requests:
      cpu: "1"
      memory: 2Gi
  documentation: |-
    Scan Quay Images to report Vulnerabilities in Quay SDL Testing
  credentials:
  - namespace: test-credentials
    name: quay-qe-omr-secret
    mount_path: /var/run/quay-qe-omr-secret
  - namespace: test-credentials
    name: konflux-quay-pull-auth
    mount_path: /var/run/konflux-quay-pull-auth
  env:
  - name: QUAY_IMAGE
    documentation: Target Quay App Image
    default: "image-rbac-proxy.apps.stone-prd-rh01.pg1f.p1.openshiftapps.com/redhat-user-workloads/quay-eng-tenant/quay-quay-v3-17@sha256:868c9b7e551424a28bf470ea11caa56f94df6912bdc285df4492a1966d81e39c"
  - name: QUAY_OPERATOR_IMAGE
    documentation: Target Quay Operator Image
    default: "image-rbac-proxy.apps.stone-prd-rh01.pg1f.p1.openshiftapps.com/redhat-user-workloads/quay-eng-tenant/quay-operator-v3-17@sha256:6de67314c7ec0d3a288be134060ed0e07fcbb4cb2e1ec288e901e38d19a8b4e0"
  - name: QUAY_CLAIR_IMAGE
    documentation: Target Clair App Image
    default: "image-rbac-proxy.apps.stone-prd-rh01.pg1f.p1.openshiftapps.com/redhat-user-workloads/quay-eng-tenant/quay-clair-v3-17@sha256:e73a9048e4037757e1fd7ba1369b426fe23c968932b27433b768e9013fd476b8"
  - name: QUAY_BRIDGE_OPERATOR_IMAGE
    documentation: Target Quay Brdige Operator Image
    default: "image-rbac-proxy.apps.stone-prd-rh01.pg1f.p1.openshiftapps.com/redhat-user-workloads/quay-eng-tenant/quay-bridge-operator-v3-17@sha256:ac14db74c41b58dabf7f748d51e2d1025e21dc170269fb21f87869aebcc74163"
  - name: QUAY_CONTAINER_SECURITY_OPERATOR_IMAGE
    documentation: Target Quay Container Security Operator Image
    default: "image-rbac-proxy.apps.stone-prd-rh01.pg1f.p1.openshiftapps.com/redhat-user-workloads/quay-eng-tenant/container-security-operator-v3-17@sha256:9de525b568fc35589eea8a75db784be918e0fce6ebef2a17c8143ace934ed9c1"
  - name: QUAY_BUILDER_IMAGE
