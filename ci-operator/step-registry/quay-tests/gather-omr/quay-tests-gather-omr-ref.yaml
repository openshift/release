ref:
  as: quay-tests-gather-omr
  from: upi-installer
  best_effort: true
  timeout: 15m0s
  grace_period: 10m
  commands: quay-tests-gather-omr-commands.sh
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
  documentation: |-
    Gather diagnostic logs from a Quay OMR (mirror-registry) EC2 instance.
    SSHs to the OMR host using the quaybuilder key from terraform.tgz
    and the hostname from OMR_HOST_NAME (both saved by the provisioning
    step). Collects container status, quay-app/postgres/redis logs,
    system resource stats, and network listeners.
