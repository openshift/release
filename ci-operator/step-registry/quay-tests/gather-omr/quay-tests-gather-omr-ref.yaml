ref:
  as: quay-tests-gather-omr
  from: upi-installer
  best_effort: true
  timeout: 15m0s
  grace_period: 10m
  commands: quay-tests-gather-omr-commands.sh
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
  documentation: |-
    Gather diagnostic logs from a Quay OMR (mirror-registry) instance
    running on the bastion host. Collects Quay service status, container
    logs (quay-app, quay-postgres, quay-redis), host resource usage,
    network listeners, and a health check against the registry endpoint.
