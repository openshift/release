ref:
  as: quay-tests-mirror-images-oc-mirror
  from: upi-installer
  cli: latest
  commands: quay-tests-mirror-images-oc-mirror-commands.sh
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
  timeout: 240m0s
  grace_period: 10m
  credentials:
  - namespace: test-credentials
    name: openshift-custom-mirror-registry
    mount_path: /var/run/vault/mirror-registry
  dependencies:
  - name: "release:latest"
    env: OPENSHIFT_INSTALL_RELEASE_IMAGE_OVERRIDE
  env:
  - name: OMR_FROM_SOURCE
    default: "false"
    documentation: |-
      When true, runs oc-mirror ON the bastion host via SSH (bastion-local mode)
      instead of from the CI pod. This avoids network bottlenecks by mirroring
      directly to the local OMR at localhost:8443.
  documentation: |-
    Mirror OCP release image to Quay OMR using oc-mirror v2.
    Generates IDMS manifests and install-config patches for disconnected installs.
    For OCP 4.22+, oc-mirror v2 properly handles sigstore signature mirroring.
    When OMR_FROM_SOURCE=true, oc-mirror runs on the bastion host via SSH.
