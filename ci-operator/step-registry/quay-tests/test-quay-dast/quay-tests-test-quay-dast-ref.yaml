ref:
  as: quay-tests-test-quay-dast
  cli: latest
  from: quay-test-dast
  commands: quay-tests-test-quay-dast-commands.sh
  resources:
        requests:
          cpu: "2"
          memory: 4Gi
  timeout: 1h0m0s
  grace_period: 15m0s
  documentation: |-
    Execute Quay DAST testing
  env:
  - name: QUAY_ENV
    default: "QUAY"
    documentation: Target Quay environment for DAST scanning
  - name: QUAY_VERSION
    default: ""
    documentation: Quay version being tested
  credentials:
  - namespace: test-credentials
    name: quay-qe-quay-secret
    mount_path: /var/run/quay-qe-quay-secret
  - namespace: test-credentials
    name: quay-qe-dast-gcs-secret
    mount_path: /var/run/quay-qe-dast-gcs-secret
