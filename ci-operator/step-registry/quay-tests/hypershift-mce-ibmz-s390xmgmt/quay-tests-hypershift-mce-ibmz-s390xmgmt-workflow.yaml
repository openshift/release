workflow:
  as: quay-tests-hypershift-mce-ibmz-s390xmgmt
  documentation: |-
    Provisions an ephemeral management cluster and HyperShift hosted control plane on IBM Cloud
    using IBM Z VSIs (same pre/post as hypershift-mce-ibmz-conformance-s390xmgmt), then runs only
    the test steps supplied by the ci-operator test configuration (e.g. Quay operator install and QE).

    IBM Cloud access uses the credential bundle mounted by the hypershift IBM Z steps: create a
    Secret named "hypershift-agent-ibmz-credentials" in the "test-credentials" namespace on the CI
    cluster, with the files expected by those steps (for example ibmcloud-apikey, abi-pull-secret,
    and httpd-vsi-key). Replace or mirror that Secret with your own API key material for your tenant.

    This workflow intentionally does not run hypershift-conformance or hypershift-mce-ibmz-test.
  steps:
    pre:
      - ref: hypershift-mce-ibmz-create-s390xmgmt
      - ref: hypershift-mce-install
      - ref: hypershift-mce-conf-os-images
      - ref: hypershift-mce-ibmz-create-hcp
      - ref: hypershift-mce-ibmz-create-zvsicomputes390x
      - ref: hypershift-mce-ibmz-install-lso
      - ref: hypershift-kubevirt-install-odf
    post:
      - ref: hypershift-mce-ibmz-destroy-hcp
      - ref: hypershift-mce-ibmz-destroy-zvsi-computes390x
      - ref: hypershift-mce-ibmz-destroy-s390x-mgmt
    env:
      CLUSTER_VERSION: "4.21"
      MCE_VERSION: "2.11"
      HYPERSHIFT_BASEDOMAIN: 'hcpci.com'
      HYPERSHIFT_NODE_COUNT: 2
      IC_CLI_VERSION: '2.36.0'
      ZVSI_IMAGE: 'ibm-ubuntu-22-04-5-minimal-s390x-7'
      IC_REGION: 'eu-de'
      HC_NS: 'agent-ibmz'
      CONTROL_NODE_COUNT: 3
      COMPUTE_NODE_COUNT: 3
      REGION: 'Frankfurt'
      RESOURCE_GROUP: 'hypershift'
