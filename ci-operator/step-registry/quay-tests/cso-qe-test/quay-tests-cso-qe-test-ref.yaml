ref:
  as: quay-tests-cso-qe-test
  cli: latest
  from_image:
    name: quay-test-console
    namespace: ci
    tag: latest
  commands: quay-tests-cso-qe-test-commands.sh
  resources:
        requests:
          cpu: "2"
          memory: 4Gi
  timeout: 1h0m0s
  grace_period: 15m0s
  credentials:
  - namespace: test-credentials
    name: quayio-pull-robot
    mount_path: /var/run/quayio-pull-robot
  documentation: |-
    Execute CSO QE testing
  env:
  - name: DR__RP__CR_COMP_NAME
    default: "lp-ocp-compat--Quay"
    documentation: ReportPortal Component Readiness component name for junit remapping
  - name: MAP_TESTS
    default: "false"
    documentation: Specify whether to update the test suite name for reporting tools
  - name: CSO_CHANNEL
    documentation: The container security operator channel
    default: "stable-3.8"
  - name: CSO_SOURCE
    documentation: The container security operator source
    default: "redhat-operators"
