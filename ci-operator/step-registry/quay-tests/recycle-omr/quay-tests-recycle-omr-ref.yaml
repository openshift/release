ref:
  as: quay-tests-recycle-omr
  cli: latest
  from_image:
    name: quay-test-omr
    namespace: ci
    tag: latest
  commands: quay-tests-recycle-omr-commands.sh
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
  credentials:
  - namespace: test-credentials
    name: quay-qe-omr-secret
    mount_path: /var/run/quay-qe-omr-secret
  documentation: |-
    Recycle Quay OMR
  env:
  - name: OMR_FROM_SOURCE
    documentation: When true, OMR was installed on the bastion host and there
      is no separate EC2 instance to destroy via Terraform.
    default: "false"
