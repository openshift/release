ref:
  as: redhat-lp-chaos-lp-cnv-windows-vm-create
  from_image:
    namespace: ci
    name: benchmark-runner
    tag: latest
  commands: redhat-lp-chaos-lp-cnv-windows-vm-create-commands.sh
  credentials:
  - namespace: test-credentials
    name: lp-chaos-windows-vm-temp
    mount_path: /var/run/secrets/windows-vm
  env:
  - name: WORKLOAD
    default: windows_vm
    documentation: Benchmark workload to run. Must be windows_vm for this step.
  - name: SCALE
    default: "1"
    documentation: Number of Windows VMs to create.
  - name: WINDOWS_IMAGE
    default: windows10
    documentation: Windows image type (windows11, windows_server_2019, windows_server_2022, windows_server_2025). Used to label the VM.
  grace_period: 30s
  timeout: 2h0m0s
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  documentation: >-
    Creates a Windows VM in the benchmark-runner namespace using the benchmark-runner
    container image. Mirrors the Windows disk image from the Red Hat internal PaaS
    registry (images.paas.redhat.com) into the cluster's internal image registry using
    oc image mirror, then creates a CDI DataVolume with source.registry so that CDI
    imports the image directly from the cluster-internal registry into an
    ocs-storagecluster-ceph-rbd-virtualization PVC. Requires the lp-chaos-windows-vm-temp
    secret to contain paas-username and paas-password keys with credentials for
    images.paas.redhat.com. Sets CREATE_VMS_ONLY=True so benchmark-runner creates the
    VM and exits without running a benchmark workload. The VM is left running for
    downstream chaos steps.
