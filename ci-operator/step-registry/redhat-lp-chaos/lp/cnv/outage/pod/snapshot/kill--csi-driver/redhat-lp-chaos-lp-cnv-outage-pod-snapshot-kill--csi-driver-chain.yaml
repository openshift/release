chain:
  as: redhat-lp-chaos-lp-cnv-outage-pod-snapshot-kill--csi-driver
  env:
  - name: TARGET_NAMESPACE
    default: openshift-cluster-csi-drivers
    documentation: "Namespace of the csi-snapshot-controller pod."
  - name: POD_LABEL
    default: app=csi-snapshot-controller
    documentation: "Label selector for the csi-snapshot-controller pod."
  - name: LPC_LP_CNV__TS_NAME
    default: lp-chaos--cnv--snapshot--kill--csi-driver
    documentation: "JUnit test suite name."
  steps:
  - ref: redhat-lp-chaos-lp-cnv-vm-create
  - ref: redhat-chaos-pod-scenarios-custom
  - ref: redhat-lp-chaos-lp-cnv-vm-snapshot
  - ref: redhat-lp-chaos-lp-cnv-vm-snapshot-restore
  - ref: redhat-lp-chaos-lp-cnv-vm-snapshot-delete
  - ref: redhat-lp-chaos-lp-cnv-vm-clean
  documentation: |-
    Creates VMs, kills csi-snapshot-controller pods, then tests snapshot create, restore, and delete.
