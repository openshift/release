chain:
  as: redhat-lp-chaos-lp-cnv-outage-pod-snapshot-kill--controller
  env:
  - name: TARGET_NAMESPACE
    default: openshift-cnv
    documentation: "Namespace of the virt-snapshot-controller pod."
  - name: POD_LABEL
    default: kubevirt.io=virt-snapshot-controller
    documentation: "Label selector for the virt-snapshot-controller pod."
  - name: LPC_LP_CNV__TS_NAME
    default: lp-chaos--cnv--snapshot--kill--controller
    documentation: "JUnit test suite name."
  steps:
  - ref: redhat-lp-chaos-lp-cnv-vm-create
  - ref: redhat-chaos-pod-scenarios-custom
  - ref: redhat-lp-chaos-lp-cnv-vm-snapshot
  - ref: redhat-lp-chaos-lp-cnv-vm-snapshot-restore
  - ref: redhat-lp-chaos-lp-cnv-vm-snapshot-delete
  - ref: redhat-lp-chaos-lp-cnv-vm-clean
  documentation: |-
    Creates VMs, kills virt-snapshot-controller pods, then tests snapshot create, restore, and delete.
