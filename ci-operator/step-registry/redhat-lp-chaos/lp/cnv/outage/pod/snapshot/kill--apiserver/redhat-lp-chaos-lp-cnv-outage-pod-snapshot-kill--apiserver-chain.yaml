chain:
  as: redhat-lp-chaos-lp-cnv-outage-pod-snapshot-kill--apiserver
  env:
  - name: LPC_LP_CNV__TS_NAME
    default: lp-chaos--cnv--snapshot--kill--apiserver
    documentation: "JUnit test suite name."
  steps:
  - ref: redhat-lp-chaos-lp-cnv-vm-create
  - ref: redhat-chaos-pod-scenarios-kube-apiserver-disruption
  - ref: redhat-lp-chaos-lp-cnv-vm-snapshot
  - ref: redhat-lp-chaos-lp-cnv-vm-snapshot-restore
  - ref: redhat-lp-chaos-lp-cnv-vm-snapshot-delete
  - ref: redhat-lp-chaos-lp-cnv-vm-clean
  documentation: |-
    Creates VMs, kills kube-apiserver pods, then tests snapshot create, restore, and delete.
    Uses the pre-configured kube-apiserver-disruption Krkn step (no TARGET_NAMESPACE/POD_LABEL needed).
