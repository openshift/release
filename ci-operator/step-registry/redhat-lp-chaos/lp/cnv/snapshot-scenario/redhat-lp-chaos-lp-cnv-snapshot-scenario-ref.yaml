ref:
  as: redhat-lp-chaos-lp-cnv-snapshot-scenario
  from: cli-plus-tools
  commands: redhat-lp-chaos-lp-cnv-snapshot-scenario-commands.sh
  grace_period: 10m
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  env:
  - name: OPERATION
    default: "create"
    documentation: "Snapshot operation: create, restore, or delete."
  - name: TARGET_COMPONENT
    default: "snapshot-controller"
    documentation: "Component to kill: snapshot-controller, apiserver, virt-api, csi-driver, etc."
  - name: TARGET_LABEL
    default: "kubevirt.io=virt-snapshot-controller"
    documentation: "Label selector to identify target pods."
  - name: TARGET_NAMESPACE
    default: ""
    documentation: "Optional: Target pod namespace. Auto-inferred if empty."
  - name: WAIT_TIMEOUT
    default: "15m"
    documentation: "Max wait time for recovery after chaos injection."
  documentation: |-
    Executes a CNV snapshot operation and injects chaos by killing a target component mid-operation 
    to verify system self-healing and eventual completion.