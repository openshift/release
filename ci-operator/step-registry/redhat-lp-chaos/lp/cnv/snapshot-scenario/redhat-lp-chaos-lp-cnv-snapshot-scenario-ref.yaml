ref:
  as: redhat-lp-chaos-lp-cnv-snapshot-scenario
  from: lp-chaos--ocp-test
  commands: redhat-lp-chaos-lp-cnv-snapshot-scenario-commands.sh
  grace_period: 20m
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  env:
  - name: OPERATION
    default: ""
    documentation: "The snapshot operation phase: create | restore | delete. Must be set by the caller."
  - name: TARGET_COMPONENT
    default: ""
    documentation: "The CNV component pod to kill. Must be set by the caller."
  - name: TARGET_LABEL
    default: ""
    documentation: "Label selector for the target pod. Must be set by the caller."
  - name: TARGET_NAMESPACE
    default: ""
    documentation: "Namespace of the target component. Must be set by the caller."
  - name: WAIT_TIMEOUT
    default: 15m
    documentation: "Maximum time to wait for snapshot operations to complete."
  - name: LPC_LP_CNV__VM__NS
    default: "lp-chaos--cnv--test"
    documentation: "Namespace where the target VMs are running."
  - name: LPC_LP_CNV__RPT_NAME
    default: lp-chaos--cnv
    documentation: "Name of the report."
  - name: LPC_LP_CNV__TS_NAME
    default: lp-chaos--cnv--snapshot
    documentation: "Name of the Test Suite."
  - name: LPC_LP_CNV__TC_NAME
    default: ''
    documentation: "Name of the Test Case. Must be set by the caller."
  documentation: "Shared base ref for CNV snapshot chaos scenarios. Not referenced by any chain — the specific kill-*-on-* refs are used instead. This ref exists so the registry validator can resolve the shared commands.sh file."
