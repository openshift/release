ref:
  as: redhat-lp-chaos-lp-cnv-snapshot-scenario-kill-controller-on-restore
  from: lp-chaos--ocp-test
  commands: redhat-lp-chaos-lp-cnv-snapshot-scenario-kill-controller-on-restore-commands.sh
  grace_period: 20m
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  env:
  - name: OPERATION
    default: restore
  - name: TARGET_COMPONENT
    default: snapshot-controller
  - name: TARGET_LABEL
    default: kubevirt.io=virt-snapshot-controller
  - name: TARGET_NAMESPACE
    default: openshift-cnv
  - name: WAIT_TIMEOUT
    default: 15m
    documentation: "Maximum time to wait for snapshot operations to complete."
  - name: LPC_LP_CNV__VM__NS
    default: lp-chaos--cnv--test
    documentation: "Namespace where the target VMs are running."
  - name: LPC_LP_CNV__RPT_NAME
    default: lp-chaos--cnv
    documentation: "Name of the report."
  - name: LPC_LP_CNV__TS_NAME
    default: lp-chaos--cnv--snapshot
    documentation: "Name of the Test Suite."
  - name: LPC_LP_CNV__TC_NAME
    default: 'Kill snapshot-controller on snapshot restore.'
    documentation: "Name of the Test Case."
  documentation: "Kills virt-snapshot-controller while a VM snapshot restore operation is in flight and verifies recovery."
