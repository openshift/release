ref:
  as: redhat-lp-chaos-lp-cnv-snapshot-scenario-kill-virt-api-on-delete
  from: lp-chaos--ocp-test
  commands: redhat-lp-chaos-lp-cnv-snapshot-scenario-kill-virt-api-on-delete-commands.sh
  grace_period: 20m
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  env:
  - name: OPERATION
    default: delete
  - name: TARGET_COMPONENT
    default: virt-api
  - name: TARGET_LABEL
    default: kubevirt.io=virt-api
  - name: TARGET_NAMESPACE
    default: openshift-cnv
  - name: WAIT_TIMEOUT
    default: 15m
    documentation: "Maximum time to wait for snapshot operations to complete."
  - name: LPC_LP_CNV__VM__NS
    default: lp-chaos--cnv--test
    documentation: "Namespace where the target VMs are running."
  - name: LPC_LP_CNV__RPT_NAME
    default: lp-chaos--cnv
    documentation: "Name of the report."
  - name: LPC_LP_CNV__TS_NAME
    default: lp-chaos--cnv--snapshot
    documentation: "Name of the Test Suite."
  - name: LPC_LP_CNV__TC_NAME
    default: 'Kill virt-api on snapshot delete.'
    documentation: "Name of the Test Case."
  documentation: "Kills virt-api while a VM snapshot delete operation is in flight and verifies recovery."
