ref:
  as: redhat-lp-chaos-lp-cnv-odf-apply-storage-cluster
  from_image:
    namespace: ocp
    name: cli-jq
    tag: latest
  commands: redhat-lp-chaos-lp-cnv-odf-apply-storage-cluster-commands.sh
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
  env:
    - name: ODF_INSTALL_NAMESPACE
      default: openshift-storage
    - name: ODF_STORAGE_CLASS
      default: gp3-csi
    - name: ODF_STORAGE_CLAIM
      default: 100Gi
  documentation: |-
    Applies ODF StorageCluster and waits up to 25 minutes for it to become Available.
    Mirrors the upstream odf-apply-storage-cluster step with an extended timeout to
    handle ODF stable-4.21 versions that require longer Ceph cluster initialization on AWS.
