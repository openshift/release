ref:
  as: redhat-lp-chaos-lp-cnv-vm-check
  from: lp-chaos--ocp-test
  grace_period: 60s
  commands: redhat-lp-chaos-lp-cnv-vm-check-commands.sh
  env:
  - name: LPC_LP_CNV__VM__NS
    default: lp-chaos--cnv--test
  - name: LPC_LP_CNV__RPT_NAME
    default: lp-chaos--cnv
    documentation: "Name of the report."
  - name: LPC_LP_CNV__TS_NAME
    default: lp-chaos--cnv--vm-check
    documentation: "Name of the Test Suite."
  - name: LPC_LP_CNV__TC_NAME
    default: 'VM running status and IP connectivity check.'
    documentation: "Name of the Test Case."
  resources:
    requests:
      cpu: 100m
      memory: 100Mi
  documentation: >-
    This step is to validates that all target KubeVirt VMs are in the ready state and have functional SSH connectivity before chaos execution
