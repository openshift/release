ref:
  as: redhat-lp-chaos-lp-cnv-vm-snapshot-delete
  from: lp-chaos--ocp-test
  grace_period: 60s
  commands: redhat-lp-chaos-lp-cnv-vm-snapshot-delete-commands.sh
  env:
    - name: LPC_LP_CNV__VM__SNAPSHOT__OPERATION
      default: delete
      documentation: "Hardcoded to delete for this ref."
    - name: LPC_LP_CNV__SNAPSHOT_NAME
      default: chaos-snapshot
    - name: LPC_LP_CNV__VM__NS
      default: "lp-chaos--cnv--test"
    - name: LPC_LP_CNV__SNAPSHOT_TIMEOUT
      default: 10m
    - name: LPC_LP_CNV__RPT_NAME
      default: lp-chaos--cnv
      documentation: "Name of the report."
    - name: LPC_LP_CNV__TS_NAME
      default: lp-chaos--cnv--vm-snapshot
      documentation: "Name of the Test Suite."
    - name: LPC_LP_CNV__TC_NAME
      default: 'Snapshot delete.'
      documentation: "Name of the Test Case."
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  documentation: |-
    Deletes a VM snapshot. Reads the snapshot name written to SHARED_DIR by the create step.
