chain:
  as: redhat-lp-chaos-lp-cnv-odf-windows-vm-create
  steps:
  - ref: odf-prepare-cluster
  - ref: install-operators
  - ref: odf-apply-storage-cluster
  - ref: redhat-lp-chaos-lp-cnv-windows-vm-create
  env:
  - name: OPERATORS
    default: '[{"name": "odf-operator", "install_namespace": "openshift-storage", "channel": "!default", "target_namespaces": "!install", "operator_group": "openshift-storage-operator-group"}]'
    documentation: >-
      JSON list of operators for install-operators. Defaults to ODF from redhat-operators
      with auto-detected channel. Override channel in the config env to pin a version,
      e.g. "channel": "stable-4.21".
  - name: ODF_INSTALL_NAMESPACE
    default: "openshift-storage"
    documentation: Namespace for ODF installation, shared by odf-prepare-cluster and odf-apply-storage-cluster.
  - name: ODF_STORAGE_CLASS
    default: "gp3-csi"
    documentation: Storage class for ODF backend PVCs. Defaults to gp3-csi for AWS clusters.
  - name: ODF_STORAGE_CLAIM
    default: "100Gi"
    documentation: Size of each ODF storage device PVC.
  documentation: |-
    Deploys ODF onto the cluster and then creates a Windows VM in the benchmark-runner
    namespace. Uses the standard odf-prepare-cluster + install-operators +
    odf-apply-storage-cluster pattern — no mastersSchedulable side effects.
    Sets ocs-storagecluster-ceph-rbd as the default storage class; Windows VM
    DataVolumes will use this for block storage. Then runs
    redhat-lp-chaos-lp-cnv-windows-vm-create to provision the VM and leave it running
    for downstream chaos steps.
