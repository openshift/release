ref:
  as: openshift-tests-extension-admission-crd-install
  from: tests
  grace_period: 5m
  commands: openshift-tests-extension-admission-crd-install-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  documentation: |-
    This step installs the TestExtensionAdmission CRD which is used to control
    which ImageStreams are permitted to provide extension test binaries outside
    the main OpenShift release payload.

    Individual jobs can create TestExtensionAdmission resources after this step
    to permit specific ImageStreams before running tests.
