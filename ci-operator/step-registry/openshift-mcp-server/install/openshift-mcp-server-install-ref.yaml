ref:
  as: openshift-mcp-server-install
  from: cli
  dependencies:
  - env: MCP_SERVER_IMAGE
    name: openshift-mcp-server
  grace_period: 5m0s
  timeout: 30m0s
  commands: openshift-mcp-server-install-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  documentation: |-
    Installs the MCP Lifecycle Operator and an MCPServer for OpenShift.