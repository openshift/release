workflow:
  as: openshift-mcp-server-aws-gateway
  steps:
    allow_best_effort_post_steps: true
    pre:
    - chain: ipi-conf-aws
    - ref: ovn-conf
    - ref: rhcos-conf-osstream
    - chain: ipi-install
    - ref: openshift-mcp-server-install-gateway
    post:
    - chain: gather-network
    - chain: gather-core-dump
    - chain: ipi-deprovision
    env:
      FAIL_ON_CORE_DUMP: "false"
  documentation: |-
    Provisions an AWS IPI OVN cluster and installs MCPServer behind the gateway.
