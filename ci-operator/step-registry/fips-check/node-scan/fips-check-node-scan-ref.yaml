ref:
  as: fips-check-node-scan
  from: cli
  commands: fips-check-node-scan-commands.sh
  dependencies:
  - env: PULL_SPEC_TLS_SCANNER_TOOL
    name: tls-scanner-tool
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
  grace_period: 180s
  timeout: 4h30m0s
  documentation: >-
    This step checks if the rpms on nodes are built correctly.
    It also launches the TLS scanner in parallel to scan all cluster
    pod TLS ports for cipher suite and protocol version compliance.
    The TLS scanner image is provided via the tls-scanner-tool dependency.
