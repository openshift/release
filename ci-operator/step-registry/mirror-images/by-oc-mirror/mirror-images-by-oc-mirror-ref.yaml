ref:
  as: mirror-images-by-oc-mirror
  from: oc-mirror
  cli: latest
  grace_period: 10m
  commands: mirror-images-by-oc-mirror-commands.sh
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
  env:
  - name: CUSTOM_OPENSHIFT_INSTALL_RELEASE_IMAGE_OVERRIDE
    default: ""
    documentation: "Used to overwrite OPENSHIFT_INSTALL_RELEASE_IMAGE_OVERRIDE to a customized payload"
  - name: USE_ORIGINAL_OPENSHIFT_INSTALL_RELEASE_IMAGE_OVERRIDE
    default: "false"
    documentation: "Use original payload image url from OPENSHIFT_INSTALL_RELEASE_IMAGE_OVERRIDE instead of a build farm imagestream url"
  - name: MIRROR_BIN
    default: "oc-mirror"
  credentials:
  - namespace: test-credentials
    name: openshift-custom-mirror-registry
    mount_path: /var/run/vault/mirror-registry
  dependencies:
  - name: "release:latest"
    env: OPENSHIFT_INSTALL_RELEASE_IMAGE_OVERRIDE
  documentation: |-
    Mirror release image to local image registry.
