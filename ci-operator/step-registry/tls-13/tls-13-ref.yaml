ref:
  as: tls-13
  from_image:
    namespace: ocp
    name: cli-jq
    tag: latest
  commands: tls-13-commands.sh
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
  env:
    - name: TLS_13_ENABLE_TLS_ADHERENCE
      default: "false"
      documentation: |-
        When true, enable the TLSAdherence feature gate (if not already active for the desired payload)
        and set spec.tlsAdherence on apiservers/cluster. Defaults to false so existing tls-13 workflows
        keep prior behavior unless a job opts in (set to true on payloads that ship the TLSAdherence API).
    - name: TLS_13_TLS_ADHERENCE_POLICY
      default: "StrictAllComponents"
      documentation: |-
        Value for apiservers/cluster spec.tlsAdherence when TLS_13_ENABLE_TLS_ADHERENCE is true.
        Must be LegacyAdheringComponentsOnly or StrictAllComponents.
  documentation: |
    Sets the cluster's API server configuration to use the TLS modern profile and wait for stabilization.
    Optionally (TLS_13_ENABLE_TLS_ADHERENCE=true) enables the TLSAdherence feature gate and sets
    spec.tlsAdherence; by default TLS adherence is off.
