ref:
  as: deploy-konflux-operator
  from: tests
  grace_period: 30m
  commands: deploy-konflux-operator-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 100Mi
  env:
  - name: DEPLOY_KONFLUX_OPERATORS
    documentation: |-
      Comma separated list of operators to install (i.e "sriov,metallb,nmstate")
  documentation: |-
     Deploy Konflux-built operators using https://github.com/ajaggapa/deploy-konflux-operator