ref:
  as: rosa-hyperfleet-e2e
  from_image:
    namespace: ci
    name: rosa-hyperfleet-ci
    tag: latest
  commands: rosa-hyperfleet-e2e-commands.sh
  timeout: 3600s
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  credentials:
  - namespace: test-credentials
    name: rosa-hyperfleet-ephemeral-creds
    mount_path: /var/run/rosa-credentials
  env:
  - name: AWS_CONFIG_FILE
    default: "/var/run/rosa-credentials/aws_config"
    documentation: |-
      Path to the AWS CLI config file with named profiles from the mounted
      credential secret.
  - name: ROSA_HYPERFLEET_REF
    default: "main"
    documentation: |-
      Git ref of openshift-online/rosa-hyperfleet to clone for e2e tests.
  - name: ROSA_REGIONAL_E2E_REF
    default: ""
    documentation: |-
      Git ref of the e2e test repo to clone. Passed to ci/e2e-tests.sh as
      E2E_REF. If empty and triggered from rosa-hyperfleet-api, the
      PR branch and fork repo are auto-detected via the GitHub API.
      Defaults to "main" otherwise.
  - name: ROSA_REGIONAL_E2E_REPO
    default: ""
    documentation: |-
      Git URL of the repo containing e2e tests. Passed to ci/e2e-tests.sh as
      E2E_REPO. If empty and triggered from rosa-hyperfleet-api, the
      fork's clone URL is auto-detected. Defaults to
      openshift-online/rosa-hyperfleet-api otherwise.
  documentation: |-
    Runs e2e tests from rosa-hyperfleet against a provisioned ephemeral
    environment. Clones rosa-hyperfleet and executes ./ci/e2e-tests.sh.
    Reads the API URL from terraform outputs or credentials in SHARED_DIR.
