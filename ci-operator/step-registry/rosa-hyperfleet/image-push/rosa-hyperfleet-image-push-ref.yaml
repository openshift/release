ref:
  as: rosa-hyperfleet-image-push
  from_image:
    namespace: ocp
    name: "4.21"
    tag: cli
  commands: rosa-hyperfleet-image-push-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  credentials:
  - namespace: test-credentials
    name: rosa-regional-platform-dev-ci-quay-push
    mount_path: /var/run/quay-push-credentials
  dependencies:
  - name: src
    env: CI_COMPONENT_IMAGE
  env:
  - name: ROSA_REGIONAL_QUAY_DEST_REPO
    default: ""
    documentation: |-
      Quay.io destination repository for the primary component image
      (e.g., quay.io/rrp-dev-ci/platform-api).
  - name: ROSA_REGIONAL_EXTRA_COMPONENTS
    default: ""
    documentation: |-
      YAML list of additional component images to push. Each entry
      has 'env' (CI dependency env var holding the source image) and
      'repo' (quay.io destination). All images share the same CI tag.
      The same env var is read by the provision step for helm overrides.
      Example:
        - env: CI_OPERATOR_IMAGE
          repo: quay.io/rrp-dev-ci/hyperfleet-operator
          target: argocd/config/regional-cluster/hyperfleet-operator/values.yaml
          override:
            hyperfleetOperator:
              image:
                repository: IMAGE_REPO
                tag: IMAGE_TAG
  documentation: |-
    Copies CI-built component images to public quay.io repositories so
    that ephemeral EKS clusters can pull them without CI registry
    credentials. Always pushes CI_COMPONENT_IMAGE to
    ROSA_REGIONAL_QUAY_DEST_REPO and writes the reference to
    SHARED_DIR/component-image-override. Additional images listed in
    ROSA_REGIONAL_EXTRA_COMPONENTS are also pushed with the same tag.
