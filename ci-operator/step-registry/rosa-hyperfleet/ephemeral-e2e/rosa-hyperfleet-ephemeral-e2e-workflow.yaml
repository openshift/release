workflow:
  as: rosa-hyperfleet-ephemeral-e2e
  steps:
    allow_best_effort_post_steps: true
    pre:
    - ref: rosa-hyperfleet-image-push
    - ref: rosa-hyperfleet-provision
    test:
    - ref: rosa-hyperfleet-e2e
    post:
    - ref: rosa-hyperfleet-teardown
  documentation: |-
    Provisions an ephemeral rosa-hyperfleet environment with an optional
    component image override, runs e2e tests, and tears down the environment.

    When triggered from rosa-hyperfleet-api, the e2e step auto-detects
    the PR's fork repo and branch via the GitHub API, so test changes in the
    PR are picked up automatically (including from forks).

    Usage from a CI config:
      tests:
      - as: rosa-regionality-compatibility-e2e
        steps:
          workflow: rosa-hyperfleet-ephemeral-e2e
          dependencies:
            CI_COMPONENT_IMAGE: <pipeline-image-name>
          env:
            ROSA_REGIONAL_COMPONENT_NAME: "<component-name>"
            ROSA_REGIONAL_HELM_OVERRIDE_YAML: |
              <yaml-fragment-with-IMAGE_REPO-and-IMAGE_TAG-placeholders>
            ROSA_REGIONAL_HELM_VALUES_FILE: "argocd/config/regional-cluster/<component-name>/values.yaml"
            ROSA_REGIONAL_QUAY_DEST_REPO: "quay.io/rrp-dev-ci/<component>"
