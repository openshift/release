ref:
  as: kuadrant-s390x-run-testsuite
  from: kuadrant-testsuite
  cli: latest
  commands: kuadrant-s390x-run-testsuite-commands.sh
  grace_period: 1m0s
  resources:
    requests:
      cpu: "2"
      memory: 4Gi
    limits:
      memory: 8Gi
  timeout: 3h0m0s
  env:
  - name: TESTSUITE_S390X_IMAGE
    default: "quay.io/vray_rh/rhcl-testsuite:stablev1"
    documentation: |-
      s390x-native Kuadrant testsuite image run as an in-cluster Job on an s390x
      worker node. Running on the cluster network is what lets the test client
      resolve *.COREDNS_ZONE (CoreDNS ClusterIP) and reach the Gateway MetalLB
      IPs directly, unlike the amd64 build-farm step pod.
  - name: TESTSUITE_RUN_AS_USER
    default: "65532"
    documentation: |-
      UID/GID used for the in-cluster Job securityContext (runAsUser/runAsGroup/
      fsGroup). Must match the image USER and file ownership so `make` can write
      stamp files under WORKDIR. The step also grants anyuid to the namespace
      default ServiceAccount so this explicit UID is allowed.
  - name: TEST_RUNNER_NAMESPACE
    default: "kuadrant-testrunner"
    documentation: |-
      Namespace created on the target cluster to host the test-runner Job, its
      config Secret (dynaconf settings + admin kubeconfig) and resolver ConfigMap.
  - name: JOB_ACTIVE_DEADLINE
    default: "10200"
    documentation: |-
      activeDeadlineSeconds for the test-runner Job (default ~2h50m, kept under
      the step timeout so results/diagnostics can still be collected).
  - name: PYTEST_FLAGS
    default: "-n1"
    documentation: |-
      Extra pytest flags passed to make targets via the `flags` variable (e.g. "-n1" for serial execution on s390x).
  - name: RUN_SMOKE
    default: "true"
    documentation: |-
      When "true", run `make smoke` before the single-cluster tests.
  - name: RUN_KUADRANT
    default: "false"
    documentation: |-
      When "true", run `make kuadrant` (single-cluster Kuadrant tests, excludes
      ui/playwright) inside the same in-cluster Job as smoke.
  - name: HTTPBIN_IMAGE
    default: "quay.io/vray_rh/rhcl_testsuite_dependencies:httpbin-s390x"
    documentation: |-
      httpbin image referenced in the generated testsuite config (deployed by the testsuite per test).
  - name: MOCKSERVER_IMAGE
    default: "quay.io/vray_rh/rhcl_testsuite_dependencies:mockserver-s390x-fixed"
    documentation: |-
      Mockserver image referenced in the generated testsuite config.
  - name: LLM_SIM_IMAGE
    default: "quay.io/vray_rh/rhcl_testsuite_dependencies:llm-d-inference-sim-s390x-v091-fixed"
    documentation: |-
      LLM simulator image referenced in the generated testsuite config.
  - name: SPICEDB_IMAGE
    default: "quay.io/vray_rh/rhcl_testsuite_dependencies:spicedb-s390x"
    documentation: |-
      SpiceDB image referenced in the generated testsuite config.
  - name: DNS_PROVIDER_SECRET_NAME
    default: "coredns-credentials"
    documentation: |-
      DNS provider Secret name written into control_plane.provider_secret in the config.
  - name: COREDNS_ZONE
    default: "k.example.com"
    documentation: |-
      CoreDNS zone used for DNSPolicy hostnames. Overridden by
      SHARED_DIR/kuadrant-coredns-zone when present (written by install-coredns).
  - name: COREDNS_NAMESPACE
    default: "kuadrant-coredns"
    documentation: |-
      Namespace of the kuadrant-coredns Service. Its ClusterIP is passed to the
      in-cluster Job so *.COREDNS_ZONE lookups resolve against CoreDNS directly.
      Overridden by SHARED_DIR/kuadrant-coredns-namespace when present.
  - name: CLUSTER_ISSUER_NAME
    default: "selfsigned-cluster-issuer"
    documentation: |-
      cert-manager ClusterIssuer name written into the testsuite config for TLSPolicy tests.
  - name: KUADRANT_NAMESPACE
    default: "kuadrant-system"
    documentation: |-
      Namespace where the Kuadrant CR resides (service_protection.system_project).
  - name: TOOLS_NAMESPACE
    default: "tools"
    documentation: |-
      Namespace where testing tools are deployed (tools.project).
  - name: KEYCLOAK_ADMIN_USERNAME
    default: "admin"
    documentation: |-
      Keycloak admin username written into the testsuite config.
  - name: KEYCLOAK_ADMIN_PASSWORD
    default: "admin"
    documentation: |-
      Keycloak admin password written into the testsuite config.
  documentation: |-
    Runs the Kuadrant end-to-end testsuite as an in-cluster Job on the s390x
    cluster instead of from the amd64 build-farm step pod. The step pod lives on
    a different network than the leased cluster, so it cannot resolve the private
    CoreDNS zone (*.k.example.com) nor reach the Gateway MetalLB IPs; that is why
    DNSPolicy/TLSPolicy tests failed with "Name or service not known" while the
    public *.apps ingress tests passed. This mirrors the working m42lp36 bastion
    topology by running the test client on the cluster network.

    The step (running on the build farm) generates dynaconf settings and a small
    getaddrinfo resolver plugin, mounts them plus the admin kubeconfig into a Job
    that uses TESTSUITE_S390X_IMAGE on an s390x worker node, streams the Job logs
    into ARTIFACT_DIR, recovers JUnit reports from the log stream, and collects
    istio-proxy / DNS diagnostics from the cluster concurrently. The OpenShift
    CLI is injected via cli: latest.
