ref:
  as: kuadrant-s390x-run-testsuite
  from: kuadrant-testsuite
  cli: latest
  commands: kuadrant-s390x-run-testsuite-commands.sh
  resources:
    requests:
      cpu: "2"
      memory: 4Gi
    limits:
      memory: 8Gi
  timeout: 3h0m0s
  env:
  - name: TESTSUITE_DIR
    default: "/opt/workdir/kuadrant-testsuite"
    documentation: |-
      Path to the Kuadrant testsuite already present in the kuadrant-testsuite
      image (FROM quay.io/kuadrant/testsuite). Sources and Poetry deps are baked
      in at image build time. The step runs from this path (no clone/copy) so
      Poetry reuses the image virtualenv under /opt/workdir/virtualenvs.
  - name: PYTEST_FLAGS
    default: "-n1"
    documentation: |-
      Extra pytest flags passed to make targets via the `flags` variable (e.g. "-n1" for serial execution on s390x).
  - name: RUN_SMOKE
    default: "true"
    documentation: |-
      When "true", run `make smoke` before the single-cluster tests.
  - name: RUN_KUADRANT
    default: "false"
    documentation: |-
      When "true", run `make kuadrant` (single-cluster Kuadrant tests, excludes
      ui/playwright). Uses the same CoreDNS getaddrinfo bridge as smoke.
  - name: HTTPBIN_IMAGE
    default: "quay.io/vray_rh/rhcl_testsuite_dependencies:httpbin-s390x"
    documentation: |-
      httpbin image referenced in the generated testsuite config (deployed by the testsuite per test).
  - name: MOCKSERVER_IMAGE
    default: "quay.io/vray_rh/rhcl_testsuite_dependencies:mockserver-s390x-fixed"
    documentation: |-
      Mockserver image referenced in the generated testsuite config.
  - name: LLM_SIM_IMAGE
    default: "quay.io/vray_rh/rhcl_testsuite_dependencies:llm-d-inference-sim-s390x-v091-fixed"
    documentation: |-
      LLM simulator image referenced in the generated testsuite config.
  - name: SPICEDB_IMAGE
    default: "quay.io/vray_rh/rhcl_testsuite_dependencies:spicedb-s390x"
    documentation: |-
      SpiceDB image referenced in the generated testsuite config.
  - name: DNS_PROVIDER_SECRET_NAME
    default: "coredns-credentials"
    documentation: |-
      DNS provider Secret name written into control_plane.provider_secret in the config.
  - name: COREDNS_ZONE
    default: "k.example.com"
    documentation: |-
      CoreDNS zone used for DNSPolicy hostnames. Overridden by
      SHARED_DIR/kuadrant-coredns-zone when present (written by install-coredns).
  - name: COREDNS_NAMESPACE
    default: "kuadrant-coredns"
    documentation: |-
      Namespace of the kuadrant-coredns Service port-forwarded for client DNS
      resolution during smoke (avoids rewriting /etc/resolv.conf).
  - name: CLUSTER_ISSUER_NAME
    default: "selfsigned-cluster-issuer"
    documentation: |-
      cert-manager ClusterIssuer name written into the testsuite config for TLSPolicy tests.
  - name: KUADRANT_NAMESPACE
    default: "kuadrant-system"
    documentation: |-
      Namespace where the Kuadrant CR resides (service_protection.system_project).
  - name: TOOLS_NAMESPACE
    default: "tools"
    documentation: |-
      Namespace where testing tools are deployed (tools.project).
  - name: KEYCLOAK_ADMIN_USERNAME
    default: "admin"
    documentation: |-
      Keycloak admin username written into the testsuite config.
  - name: KEYCLOAK_ADMIN_PASSWORD
    default: "admin"
    documentation: |-
      Keycloak admin password written into the testsuite config.
  documentation: |-
    Runs the Kuadrant end-to-end testsuite from the kuadrant-testsuite pipeline
    image (FROM quay.io/kuadrant/testsuite). That image already contains the
    testsuite sources and Poetry dependencies, so this step does not clone or
    copy the repo. It runs from the baked-in WORKDIR to reuse the image
    virtualenv, writes dynaconf overrides to SECRETS_FOR_DYNACONF on a writable
    path (tool Routes + s390x workload images), runs smoke tests (make kuadrant
    and polish-junit are temporarily disabled while stabilizing), streams
    gateway istio-proxy logs concurrently into ARTIFACT_DIR during smoke (pods
    are deleted by fixtures before a post-dump can see them), streams DNS
    operator / DNSPolicy / DNSRecord diagnostics during smoke, dumps
    Kuadrant/WasmPlugin/RateLimitPolicy/Limitador diagnostics to ARTIFACT_DIR,
    and copies reports to ${ARTIFACT_DIR}. The OpenShift CLI is injected via
    cli: latest. The image ENTRYPOINT is overridden by ci-operator; make
    targets are invoked explicitly.
