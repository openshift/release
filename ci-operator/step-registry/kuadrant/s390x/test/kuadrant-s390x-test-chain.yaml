chain:
  as: kuadrant-s390x-test
  steps:
  - ref: kuadrant-s390x-install-ossm
  - ref: kuadrant-s390x-install-metallb
  - ref: kuadrant-s390x-install-coredns
  - ref: kuadrant-s390x-verify-gateway
  - ref: kuadrant-s390x-install-operator
  - ref: kuadrant-s390x-deploy-tools
  - ref: kuadrant-s390x-run-testsuite
  documentation: |-
    Installs the full Kuadrant (RHCL) stack on a provisioned s390x OCP cluster and
    runs the Kuadrant end-to-end testsuite. Order:
      1. kuadrant-s390x-install-ossm     - Gateway API CRDs + OpenShift Service Mesh 3.x (Sail/Istio)
      2. kuadrant-s390x-install-metallb  - Red Hat MetalLB operator + lease-derived L2 IP pool
      3. kuadrant-s390x-install-coredns   - kuadrant-coredns + dedicated MetalLB pool (m42lp36/mc1 pattern)
      4. kuadrant-s390x-verify-gateway   - fail-fast Gateway Programmed probe + diagnostics
      5. kuadrant-s390x-install-operator - cert-manager, Kuadrant operator (+ Authorino, Limitador, DNS operators) and the Kuadrant CR
      6. kuadrant-s390x-deploy-tools     - testing tools (Keycloak, Mockserver, Jaeger) using s390x images
      7. kuadrant-s390x-run-testsuite    - generate config, run smoke tests then `make kuadrant`, collect JUnit reports
    Component and cluster cleanup are handled by the post phase of the
    kuadrant-s390x workflow.
