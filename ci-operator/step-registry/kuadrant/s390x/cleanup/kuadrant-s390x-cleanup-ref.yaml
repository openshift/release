ref:
  as: kuadrant-s390x-cleanup
  from_image:
    namespace: ocp
    name: cli-jq
    tag: latest
  commands: kuadrant-s390x-cleanup-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  timeout: 15m0s
  env:
  - name: KUADRANT_NAMESPACE
    default: "kuadrant-system"
    documentation: |-
      Namespace where the Kuadrant operator is installed.
  - name: TOOLS_NAMESPACE
    default: "tools"
    documentation: |-
      Namespace where testing tools were deployed.
  documentation: |-
    Best-effort cleanup of Kuadrant testing components (Kuadrant CR, test namespaces,
    testing tools and operator subscriptions) after the testsuite run. Cluster
    deprovisioning is handled separately by upi-libvirt-cleanup-post in the workflow post
    phase.
