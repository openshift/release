ref:
  as: openshift-extended-test-keep-alive
  from_image:
    namespace: ocp
    name: "4.22"
    tag: cli
  grace_period: 10m
  commands: openshift-extended-test-keep-alive-commands.sh
  timeout: 12h0m0s
  resources:
    requests:
      cpu: 100m
      memory: 100Mi
  documentation: |-
    Keeps the cluster alive for 12 hours for debugging.
    To destroy early: oc create configmap stop-preserving -n default
