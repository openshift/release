ref:
  as: openshift-extended-logging-test
  from: tests-private
  grace_period: 10m
  commands: openshift-extended-enable-cluster-logging-commands.sh
  cli: latest
  timeout: 12h0m0s
  env:
  - name: CATALOG
    default: "openshift-operators"
    documentation: the namespace for lokistack and clusterloggingforwarder
  - name: CHANNEL
    default: ""
    documentation: The operator channel to be deployed
  - name: SIZE
    default: "1x.demo"
    documentation: The operator channel to be deployed
  - name: INPUTS
    default: "application,infrastructure"
    documentation: the input source collected by cluster-logging
  - name: FORCE_SUCCESS_EXIT
    default: "no"
    documentation: |-
      Setting this to 'yes' will allow some statements in the scripts not to let the step fail, and further steps can
      run. Setting it to 'no' will disable this behavior, letting any of those optional to succeed statements 
      to stop the job and trigger the deprovisioning steps. Default: yes.
      See https://docs.ci.openshift.org/docs/architecture/step-registry/#workflow
  resources:
    requests:
      cpu: "1"
      memory: 1Gi
    limits:
      memory: 2Gi
  documentation: |-
    Deploy Openshift-Logging solution(vector to lokistack) in the cluster for the test purpose. limit resources are used. minio is used as backend storage.
