chain:
  as: release-qe-tests-stage-testing
  steps:
  - ref: openshift-extended-test
    env:
    - name: TEST_SCENARIOS
      default: Stagerun
    - name: TEST_IMPORTANCE
      default: all
    - name: TEST_FILTERS
      default: ~DisconnectedOnly&;~Disruptive&;Stagerun&;~ProdrunOnly&;~VMonly&;~CPaasrunOnly&;~MicroShiftOnly&
    - name: FILTERS_ADDITIONAL
      default: ""
    - name: TEST_TIMEOUT
      default: "35"
  - ref: openshift-extended-test-disruptive
    env:
    - name: TEST_SCENARIOS
      default: Stagerun
    - name: TEST_IMPORTANCE
      default: all
    - name: TEST_FILTERS
      default: ~DisconnectedOnly&;Disruptive&;Stagerun&;~ProdrunOnly&;~VMonly&;~CPaasrunOnly&;~MicroShiftOnly&
    - name: FILTERS_ADDITIONAL
      default: ""
    - name: TEST_TIMEOUT
      default: "35"
  documentation: |-
    Stage testing chain. Runs normal and disruptive ginkgo tests sequentially on the same cluster.
