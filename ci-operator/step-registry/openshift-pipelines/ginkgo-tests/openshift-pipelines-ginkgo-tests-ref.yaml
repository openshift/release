ref:
  as: openshift-pipelines-ginkgo-tests
  from: openshift-pipelines-ginkgo-runner
  commands: openshift-pipelines-ginkgo-tests-commands.sh
  grace_period: 10m
  resources:
    requests:
      cpu: '1'
      memory: 500Mi
  credentials:
    - namespace: test-credentials
      name: aws-osp-qe
      mount_path: /var/run/openshift-pipelines/osp-ci-secrets
  env:
    - name: GINKGO_LABEL_FILTER
      default: "e2e && !disconnected"
      documentation: |-
        Ginkgo label filter expression used to select which tests to run.
        Defaults to all e2e tests excluding disconnected scenarios.
        Examples: "sanity", "smoke", "e2e", "e2e && !disconnected", "pipelines || triggers".
    - name: TEST_TIMEOUT
      default: "4h"
      documentation: |-
        Timeout passed to ginkgo for the full test run (e.g. 60m, 2h, 4h).
    - name: GINKGO_PROCS
      default: "4"
      documentation: |-
        Number of parallel Ginkgo processes used to run the test suite.
  documentation: |-
    Runs OpenShift Pipelines e2e tests using the Ginkgo-based
    release-tests-ginkgo test suite (./tests/...) by invoking ginkgo run directly.
    The test image (openshift-pipelines-ginkgo-runner) is built from Dockerfile.CI
    and has ginkgo, oc, and tkn pre-installed under /tmp/release-tests-ginkgo.
    Use GINKGO_LABEL_FILTER to select specific test subsets (e.g. sanity, smoke, e2e).
