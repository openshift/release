ref:
  as: azure-validate-bastionhost
  from_image:
    namespace: ocp
    name: "4.13"
    tag: upi-installer
  commands: azure-validate-bastionhost-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  documentation: |-
    Validates SSH access and basic functionality of an Azure bastion host.

    Verifies that the bastion host is accessible via SSH and can execute basic commands.
    This ref should only be called from workflows that provision a bastion host.
