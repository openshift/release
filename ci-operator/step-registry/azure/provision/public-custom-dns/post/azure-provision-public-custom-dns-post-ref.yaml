ref:
  as: azure-provision-public-custom-dns-post
  from_image:
    namespace: ocp
    name: "4.18"
    tag: upi-installer
  grace_period: 10m
  commands: azure-provision-public-custom-dns-post-commands.sh
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
  env:
  - name: BASE_DOMAIN
    default: ""
    documentation: |-
      The base domain of custom dns
  - name: AWS_NEW_PUBLIC_DNS_RECORD_WAITING_TIME
    default: "600"
    documentation: Wait for dns record propagation.
  documentation: |-
    This step used to create custom dns on AWS route53 in post stage if any failure during installation
    so that gather-extral and gather-must-gather can run well.
