ref:
  as: azure-provision-vault-key-self-managed
  from_image:
    namespace: ocp
    name: "4.16"
    tag: upi-installer
  timeout: 15m
  grace_period: 5m
  commands: azure-provision-vault-key-self-managed-commands.sh
  env:
  - name: HYPERSHIFT_AZURE_LOCATION
    default: ""
    documentation: The Azure location of the key vault.
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
  credentials:
    - mount_path: /etc/hypershift-ci-jobs-self-managed-azure
      name: hypershift-ci-jobs-self-managed-azure
      namespace: test-credentials
  documentation: |-
    This step creates a Key Vault in the "${SHARED_DIR}/resourcegroup".
    It grants the appropriate permissions on the newly created Key Vault to the current Service Principal. 
    It then creates a key in the Key Vault.
