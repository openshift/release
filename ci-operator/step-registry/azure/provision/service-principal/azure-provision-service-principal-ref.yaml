ref:
  as: azure-provision-service-principal
  from_image:
    namespace: ocp
    name: "4.14"
    tag: upi-installer
  grace_period: 10m
  commands: azure-provision-service-principal-commands.sh
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
  dependencies:
  - name: "release:latest"
    env: RELEASE_IMAGE_LATEST_FROM_BUILD_FARM
  env:
  - name: AZURE_PERMISSION_FOR_CLUSTER_SP
    default: ""
    documentation: |-
      Define permission assigned to cluster service principal.
  documentation: |-
    Provision a service principal assigned role "Contributor" and other role defined in ENV AZURE_PERMISSION_FOR_CLUSTER_SP
