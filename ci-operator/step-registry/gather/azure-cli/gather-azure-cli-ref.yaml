ref:
  as: gather-azure-cli
  best_effort: true
  cli: latest
  from_image:
   namespace: azure
   name: ci-base
   tag: latest
  commands: gather-azure-cli-commands.sh
  # Boot diagnostics + metrics for many nodes can exceed 5m on loaded clusters.
  timeout: 15m0s
  resources:
    requests:
      cpu: 100m
      memory: 100Mi
  documentation: |-
    Runs various az cli commands to gather data about the cluster prior to destroy.
