ref:
  as: capi-extension
  from: tests
  commands: capi-extension-commands.sh
  timeout: 3600s
  env:
  - name: EXTENSION_IMAGE
    default: "quay.io/sgoeddel/cluster-api-actuator-pkg:latest"
    documentation: |-
      The cluster-api extension test image to use
  resources:
    requests:
      cpu: "3"
      memory: 600Mi
    limits:
      memory: 10Gi
  documentation: |-
    Sets up and runs the cluster-api-actuator-pkg out-of-payload extension tests
