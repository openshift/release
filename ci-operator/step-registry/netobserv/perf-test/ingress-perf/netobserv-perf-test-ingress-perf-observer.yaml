observer:
  name: netobserv-perf-test-ingress-perf
  from_image:
    namespace: ci
    name: ocp-qe-perfscale-ci
    tag: latest
  commands: netobserv-perf-test-ingress-perf-commands.sh
  env:
  - name: E2E_VERSION
    default: "v2.3.1"
    documentation: |-
      Override the e2e version
  - name: INGRESS_PERF_VERSION
    default: "default"
    documentation: |-
      Override the ingress-perf version
  - name: CONFIG
    default: "config/standard.yml"
    documentation: |-
      Defaults to "config/standard.yml"
  - name: LOG_LEVEL
    default: "info"
    documentation: |-
      Default LOG_LEVEL is set info
  - name: ITERATIONS
    default: "5"
    documentation: |-
      Defaults to 5 Iterations
  - name: ADDITIONAL_PARAMS
    default: ""
    documentation: |-
      JSON value to upload additonal metadata to ES index
  timeout: 9h
  resources:
    requests:
      cpu: 100m
      memory: 100Mi
  grace_period: 200s
  documentation: |-
        parallel ingress-perf to run as observer
