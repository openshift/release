ref:
  as: netobserv-perf-test-deploy
  from: src
  cli: latest
  commands: netobserv-perf-test-deploy-commands.sh
  env:
    - name: INSTALLATION_SOURCE
      default: "Source"
      documentation: "Source to install netobserv from, Source = upstream, Internal = downstream"
    - name: CATALOGSOURCE_IMAGE
      default: ""
      documentation: Specify catalogsource image to use for NOO; default will use quay.io/netobserv/network-observability-operator-catalog:v0.0.0-main for INSTALLATION_SOURCE=Source and quay.io/redhat-user-workloads/ocp-network-observab-tenant/netobserv-operator/network-observability-operator-fbc:1.8 for INSTALLATION_SOURCE=Internal
    - name: LOKI_OPERATOR
      default: ""
      documentation: "Loki Operator catalogsource, values could be 'Unreleased' = using qe-app-registry, other values uses redhat-operators"
    - name: LOKISTACK_SIZE
      default: "1x.extra-small"
      documentation: "Defines LokiStack size, 1x.small for node-density-heavy and 1x.medium for cluster-density-v2 workloads"
    - name: TOPIC_PARTITIONS
      default: "48"
      documentation: "Kafka Topic Partitions"
    - name: KAFKA_CONSUMER_REPLICAS
      default: "3"
      documentation: "FLP Kafka consumer replicas"
    - name: WORKLOAD
      default: "None"
      documentation: Set the workload name
  timeout: 2h0m0s
  resources:
    requests:
      cpu: 100m
      memory: 100Mi
  documentation: |-
    This workflow will deploy network observability stack for perf test.
