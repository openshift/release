ref:
  as: netobserv-perf-test-envdata
  from: netobserv-perfscale-opm
  cli: latest
  commands: netobserv-perf-test-envdata-commands.sh
  env:
  - name: INSTALLATION_SOURCE
    default: "Source"
    documentation: "Source that netobserv was installed from: Source or Internal"
  timeout: 1h0m0s
  resources:
    requests:
      cpu: 100m
      memory: 100Mi
  documentation: |-
    This workflow will deploy network observability stack for perf test.
