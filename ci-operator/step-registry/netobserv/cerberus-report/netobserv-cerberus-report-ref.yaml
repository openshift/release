ref:
  as: netobserv-cerberus-report
  from: cli
  commands: netobserv-cerberus-report-commands.sh
  timeout: 10m0s
  resources:
    requests:
      cpu: 100m
      memory: 100Mi
  env:
  - name: TEST_NAMESPACE
    default: "cerberus"
    documentation: |-
      Namespace where the Cerberus pod is running. The step will collect the test.json file from this pod.
  - name: CERBERUS_REPORT_FILE
    default: "cerberus_failures.json"
    documentation: |-
      Name to save the Cerberus failure report JSON file as in ARTIFACT_DIR after copying from the pod.
  documentation: |-
    This step collects Cerberus failure reports from a pod, analyzes them, creates a summary grouped by component,
    and fails the test if any component starting with 'netobserv' has failures.