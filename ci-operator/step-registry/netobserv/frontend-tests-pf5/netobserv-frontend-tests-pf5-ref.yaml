ref:
  as: netobserv-frontend-tests-pf5
  from: e2e-integration-tests-pf5
  commands: netobserv-frontend-tests-pf5-commands.sh
  timeout: 2h0m0s
  resources:
    requests:
      cpu: 2000m
      memory: 4Gi
  env:
  - name: CYPRESS_GREP_TAGS
    default: "@Network_Observability"
    documentation: |-
      Cypress grep tags to filter which tests to run. Default runs all Network Observability tests.
  - name: CYPRESS_LOGIN_IDP
    default: "kube:admin"
    documentation: |-
      Identity provider name to use for login. Default is kube:admin.
  - name: CYPRESS_NOO_CATALOG_SOURCE
    default: "upstream"
    documentation: |-
      Network Observability CatalogSource to use. Default is upstream.
  - name: CYPRESS_SKIP_NOO_INSTALL
    default: "true"
    documentation: |-
      Skip Network Observability operator installation in Cypress tests. Default is true
      since the netobserv-install-operator step handles installation.
  - name: MULTISTAGE_PARAM_OVERRIDE_CYPRESS_NOO_CS_IMAGE
    default: ""
    documentation: |-
      Override the Network Observability CatalogSource image used by Cypress tests.
      Useful for z-stream testing against a specific catalog image.
  documentation: |-
    Runs Cypress E2E integration tests for the Network Observability web console plugin
    using the PF5 (PatternFly 5) test image, targeting OCP 4.16-4.21.
