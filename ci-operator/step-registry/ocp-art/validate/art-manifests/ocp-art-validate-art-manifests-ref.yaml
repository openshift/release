ref:
  as: ocp-art-validate-art-manifests
  from: src
  commands: ocp-art-validate-art-manifests-commands.sh
  env:
  - name: RELEASE_BRANCH
    default: ""
    documentation: |-
      Optional OCP release branch (release-4.y or release-5.y) for R2 and templated art.yaml.
      When unset, OCP rules run only if such a branch is detected from CI metadata or git.
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
  documentation: |-
    Validates operator image-references pullspecs against the ClusterServiceVersion (R1)
    and art.yaml search strings (R3). When a release-4.y or release-5.y branch is detected,
    also checks registry.redhat.io namespace/tag rules (R2) and OCP template placeholders
    in art.yaml. Layered product branches (oadp-1.6, release-0.9, etc.) run R1 and R3 only.
    Failures print a grouped report. Repos without image-references are skipped.
