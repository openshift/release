ref:
  as: ocp-art-validate-art-manifests
  from: src
  commands: ocp-art-validate-art-manifests-commands.sh
  env:
  - name: RELEASE_BRANCH
    default: ""
    documentation: |-
      Target release branch for registry/tag rules (e.g. release-4.23, release-5.0).
      When unset, derived from JOB_SPEC refs.base_ref.
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
  documentation: |-
    Validates operator image-references pullspecs against the ClusterServiceVersion and
    checks branch-aware registry.redhat.io namespace/tag rules plus art.yaml search strings.
    This catches silent Doozer no-ops before rebase/CVP/Conforma. Repos without
    image-references are skipped.
