ref:
  as: ocp-art-validate-schema
  from: art-build-data-validator
  commands: ocp-art-validate-schema-commands.sh
  grace_period: 2m0s
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  timeout: 10m0s
  documentation: |-
    Runs the art-tools ocp-build-data-validator (validate-ocp-build-data CLI)
    against the group.yml/streams.yml/releases.yml/bug.yml/images/*.yml/rpms/*.yml
    files changed in this PR. Clones openshift-eng/art-tools at HEAD so the
    validator always reflects the latest schema/validation logic, matching the
    behavior of the ocp-build-data GitHub Actions validate workflow.
