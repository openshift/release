ref:
  as: ofcir-acquire
  from: dev-scripts
  grace_period: 1m0s
  commands: ofcir-acquire-commands.sh
  resources:
    requests:
      cpu: 1000m
      memory: 600Mi
    limits:
      memory: 2Gi
  env:
  - name: CLUSTERTYPE
    default: virt
    documentation: Type of environment to run CI test on "virt", "virt-arm64" or "baremetal"
  - name: PACKET_METRO
    default: da
    documentation: Target packet metro
  - name: PACKET_PLAN
    default: "m3.large.x86"
    documentation: Plan to use in Packet when creating a testing machine.
  - name: PACKET_PROVISION_WAIT
    default: "1200"
    documentation: Wait time in seconds for the Packet machine to be provisioned and active.
  - name: PACKET_OS
    default: "rocky_8"
  documentation: |-
    This step performs the acquire of the ofcir server
