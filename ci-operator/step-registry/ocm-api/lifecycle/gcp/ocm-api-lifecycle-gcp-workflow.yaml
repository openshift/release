workflow:
  as: ocm-api-lifecycle-gcp
  steps:
    pre:
    - ref: ocm-api-setup-gcp
    - ref: osd-ccs-cluster-provision-gcp
    - ref: osd-ccs-conf-idp-htpasswd
    - ref: osd-ccs-conf-idp-htpasswd-multi-users
    - ref: osd-ccs-cluster-operators-wait-ready
    post:
    - chain: gather
    - ref: osd-ccs-cluster-deprovision
  documentation: |-
    This workflow installs a GCP cluster by profile.It will only wait for cluster ready without checking nodes/operators.
    After finish testing, the cluster will be deprovsioned.
