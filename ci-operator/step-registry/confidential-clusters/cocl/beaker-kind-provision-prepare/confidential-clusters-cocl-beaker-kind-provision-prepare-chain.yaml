  steps:
  - ref: confidential-clusters-ref-cocl-beaker-kind-provision
  documentation: |-
    This chain prepares the Beaker bare metal environment for Kind cluster deployment.
    It verifies connectivity between Prow CI and the Beaker machine, and sets up all
    necessary dependencies for cocl-operator Kind cluster testing.

    The chain currently includes:
    - cocl-beaker-kind-provision: Prepares environment, installs dependencies, and verifies connectivity

    This is a minimal chain designed for quick connectivity verification during development.
