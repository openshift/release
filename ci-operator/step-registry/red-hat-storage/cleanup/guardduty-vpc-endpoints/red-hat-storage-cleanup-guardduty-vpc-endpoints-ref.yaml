ref:
  as: red-hat-storage-cleanup-guardduty-vpc-endpoints
  best_effort: true
  from_image:
    namespace: ocp
    name: "4.20"
    tag: upi-installer
  grace_period: 5m
  commands: red-hat-storage-cleanup-guardduty-vpc-endpoints-commands.sh
  timeout: 5m0s
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
  documentation: |-
    Deletes GuardDuty-managed VPC endpoints from the current cluster VPC before
    deprovisioning. Workaround for untagged GuardDuty endpoints blocking cluster
    teardown (OCPBUGS-93627) until the installer destroy fix is available in the
    target OpenShift release.
