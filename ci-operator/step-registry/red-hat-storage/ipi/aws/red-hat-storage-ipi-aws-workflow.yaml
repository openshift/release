workflow:
  as: red-hat-storage-ipi-aws
  steps:
    allow_best_effort_post_steps: true
    pre:
    - chain: ipi-aws-pre
    post:
    - ref: red-hat-storage-cleanup-guardduty-vpc-endpoints
    - chain: ipi-aws-post
  documentation: |-
    Extension of ipi-aws for red-hat-storage AWS jobs. Removes GuardDuty-managed VPC
    endpoints from the cluster VPC before deprovisioning, as a workaround until
    the installer destroy fix in OCPBUGS-93627 is available in the target release.
