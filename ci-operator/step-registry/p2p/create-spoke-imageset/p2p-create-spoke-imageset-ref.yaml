ref:
  as: p2p-create-spoke-imageset
  from: cli
  commands: p2p-create-spoke-imageset-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 250Mi
  env:
  - name: ACM_SPOKE_CLUSTER_INITIAL_VERSION
    default: "4.23"
    documentation: |-
      Target OCP version for spoke clusters (e.g. "4.23"). Used to query the
      release controller for the latest accepted nightly at that version, and
      to derive the ClusterImageSet name as img<nightly-tag>-x86-64.
  documentation: |-
    Creates a Hive ClusterImageSet on the hub cluster pointing to the latest
    accepted nightly OCP release from the official release controller
    (registry.ci.openshift.org/ocp/release).

    This step is needed when ACM_SPOKE_CLUSTER_INITIAL_VERSION targets a
    pre-GA OCP version (e.g. 4.23 nightly) for which no GA ClusterImageSet
    is registered in the hub's Hive instance. Without this step, the
    acm-interop-p2p-cluster-install step exits with:
      "No cluster image set found for version '<version>'"

    Why RELEASE_IMAGE_LATEST is NOT used:
      RELEASE_IMAGE_LATEST resolves to an ephemeral CI build-namespace mirror
      (registry.build*.ci.openshift.org). The openshift-install binary treats
      this as an "unknown architecture" release image override, and the bootstrap
      machines spawned by Hive cannot reliably pull all cluster operator images
      from that internal registry. This causes the bootkube cb-bootstrap stage
      to time out (observed failure mode: BootstrapFailed after 45 min timeout).

    How it works:
      1. Installs jq via EnsureReqs (not present in the cli base image).
      2. Queries the release controller API for the latest accepted nightly:
           https://amd64.ocp.releases.ci.openshift.org/api/v1/releasestream/<version>.0-0.nightly/latest
         This returns the pull spec at registry.ci.openshift.org/ocp/release,
         which is the official release image with proper architecture metadata,
         accessible from bootstrap machines via the cluster profile pull secret.
      3. Creates the ClusterImageSet named img<nightly-tag>-x86-64 via
         jq + oc apply -f - (JSON accepted directly), idempotent across re-runs.
      4. Verifies the ClusterImageSet is discoverable using the same
         img<version>.* prefix search performed by acm-interop-p2p-cluster-install.

    Prerequisites:
      - ACM MultiClusterHub must be installed and Available (acm-mch step).
      - Hive CRDs (ClusterImageSet) must be present on the hub cluster.
      - Network access to amd64.ocp.releases.ci.openshift.org (available in CI).

    Must run after: acm-mch
    Must run before: acm-interop-p2p-cluster-install
