ref:
  as: p2p-acm-cnv-additional-test-setup
  timeout: 3h0m0s
  from_image:
    namespace: ocp
    name: cli-jq
    tag: latest
  commands: p2p-acm-cnv-additional-test-setup-commands.sh
  resources:
    requests:
      cpu: '1'
      memory: 500Mi
  env:
    - name: BASE_DOMAIN
      default: "cspilp.interop.ccitredhat.com"
      documentation: |-
        A fully-qualified domain or subdomain name. The base domain of the cloud provider is used for setting baseDomain variable of the install configuration of the cluster.
  documentation: |-
    Populates the additional labels file for firewatch tickets created during the Product to Product interop pipeline.