ref:
  as: openshift-qe-ocpbugs-77510-e2e-test
  from_image:
    namespace: ci
    name: ocp-qe-perfscale-ci
    tag: latest
  cli: latest
  commands: openshift-qe-ocpbugs-77510-e2e-test-commands.sh
  timeout: 50m
  grace_period: 5m0s
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  env:
  - name: TEST_SCALE
    default: "small"
    documentation: |-
      Test scale configuration. Options:
      - small: 10 pods (2 services × 5 pods each)
      - medium: 50 pods (10 services × 5 pods each) 
      - large: 200 pods (40 services × 5 pods each)
      - progressive: Run all scales sequentially on same cluster
  documentation: |-
    Executes an end-to-end test for OCPBUGS-77510, which validates TCP RST storm
    behavior during kube-apiserver rollouts and OVN-Kubernetes restarts. This test
    reproduces a critical OpenShift networking bug where API server or OVN restarts
    trigger massive TCP RST storms affecting application connections.

    The test creates a production-like workload with multiple services and
    continuously running clients, then triggers OVN-Kubernetes or API server restarts
    while monitoring for TCP RST packets using a privileged DaemonSet. The test also
    tracks application-layer connection failures as a secondary indicator.

    Monitoring improvements:
    - Uses DaemonSet-based tcpdump for reliable packet capture (instead of oc debug)
    - Verifies monitoring is actually running before declaring test results
    - Collects connection failure statistics from application pods
    - Validates that triggers (OVN/API restart) actually completed successfully

    Success is determined by capturing a sufficient number of RST packets, indicating
    the bug is present. The test provides clear indication when monitoring fails,
    preventing false negatives.

    This test is designed to validate both unfixed clusters (where the bug manifests)
    and fixed clusters (where RST storms are prevented). Test results are only
    considered valid if monitoring is confirmed to be active.