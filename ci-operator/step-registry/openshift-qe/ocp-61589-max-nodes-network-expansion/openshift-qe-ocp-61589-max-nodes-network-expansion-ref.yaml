ref:
  as: openshift-qe-ocp-61589-max-nodes-network-expansion
  from: cli
  commands: openshift-qe-ocp-61589-max-nodes-network-expansion-commands.sh
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
  env:
  - name: EXPECTED_READY_NODES
    default: "512"
  - name: TOTAL_SCALE_NODES
    default: "520"
  - name: MAX_NODES_TARGET
    default: "520"
    documentation: "Maximum number of nodes to scale to during the test"
  - name: TEST_TIMEOUT
    default: "2h"
    documentation: "Maximum time to wait for test completion"
  - name: EXPANSION_TARGET_CIDR
    default: "10.128.0.0/14"
  documentation: |-
    This step implements the OCP-61589 test case for maximum nodes post cluster network expansion.
    It validates that after expanding cluster network CIDR from /20 to /14, approximately 512 nodes 
    can become Ready before hitting subnet exhaustion, with additional nodes staying NotReady.