chain:
  as: openshift-qe-cudn-density-with-sos
  steps:
  - ref: openshift-qe-cudn-density
  - ref: openshift-qe-sosreport
  documentation: |-
    This chain executes cudn-density workload using kube-burner ocp wrapper,
    followed by sos-report collection for CPU analysis (CORENET-7217).

    The sosreport step collects host-level OVS process data that is not
    captured by must-gather, including:
    - OVS process CPU/memory usage (ovs-vswitchd, ovsdb-server)
    - systemd service status
    - cgroups CPU allocation
    - Process priority and affinity settings
