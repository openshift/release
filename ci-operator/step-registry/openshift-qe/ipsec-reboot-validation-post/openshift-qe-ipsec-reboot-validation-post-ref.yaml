ref:
  as: openshift-qe-ipsec-reboot-validation-post
  from_image:
    namespace: ci
    name: ocp-qe-perfscale-ci
    tag: latest
  cli: latest
  env:
  - name: PHASE
    default: "post-reboot"
    documentation: |-
      Which phase this validation runs in: pre-reboot or post-reboot
  commands: openshift-qe-ipsec-reboot-validation-post-commands.sh
  timeout: 2h0m0s
  resources:
    requests:
      cpu: 100m
      memory: 100Mi
  documentation: >-
    Post-reboot IPsec tunnel health and libreswan version validation for OCPBUGS-86429.
    Checks libreswan version, tunnel count, pluto crashes, and connectivity after node reboot.
