ref:
  as: openshift-qe-coredump-setup
  from_image:
    namespace: ci
    name: ocp-qe-perfscale-ci
    tag: latest
  cli: latest
  commands: openshift-qe-coredump-setup-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 100Mi
  documentation: |-
    Enables coredump collection on all worker nodes for pluto crash investigation.
    Uses MachineConfig to set kernel.core_pattern and create coredump directory.
