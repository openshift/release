ref:
  as: openshift-qe-security-tooling-dast
  from_image:
    namespace: ci
    name: ocp-qe-perfscale-ci
    tag: latest
  commands: openshift-qe-security-tooling-dast-commands.sh
  credentials:
  - namespace: test-credentials # this entry injects the custom credential
    name: ocp-qe-perfscale-es
    mount_path: /secret
  resources:
    requests:
      cpu: 100m
      memory: 100Mi
  env:
  - name: DAST_IMAGE
    default: quay.io/redhatproductsecurity/rapidast
    documentation:  |-
      Image to use as the base for running zap.
  - name: DAST_IMAGE_TAG
    default: latest
    documentation:  |-
      Image tag to use as the base for running zap.
  - name: DAST_TOOL_URL
    default: https://github.com/RedHatProductSecurity/rapidast.git
    documentation:  |-
      Rapidast tool github url
  - name: DAST_TOOL_BRANCH
    default: development
    documentation:  |-
      Rapdiast tool github barnch to checkout.
  - name: API_URL_LIST
    default: admissionregistration.k8s.io/v1
    documentation:  |-
      List of api files to scan against.Api docs you can find using <b>kubectl api-versions
  - name: POLICY_FILE
    default: API-scan-minimal
    documentation:  |-
      List of policies to check apis against.
  documentation: >-
    This step runs the perfscale security-tooling-dast workload in the deployed cluster
