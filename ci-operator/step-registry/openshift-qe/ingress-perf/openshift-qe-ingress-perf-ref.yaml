ref:
  as: openshift-qe-ingress-perf
  from_image:
    namespace: ci
    name: ocp-qe-perfscale-ci
    tag: latest
  cli: latest
  commands: openshift-qe-ingress-perf-commands.sh
  credentials:
  - namespace: test-credentials # this entry injects the custom credential
    name: ocp-qe-perfscale-es
    mount_path: /secret
  env:
  - name: E2E_VERSION
    default: "default"
    documentation: |-
      Override the e2e version
  - name: INGRESS_PERF_VERSION
    default: "default"
    documentation: |-
      Override the ingress-perf version
  - name: CONFIG
    default: "config/standard.yml"
    documentation: |-
      Defaults to "config/standard.yml"
  - name: ES_METADATA_INDEX
    default: "perf_scale_ci"
    documentation: |-
      Elasticsearch metadata index
  - name: LOG_LEVEL
    default: "info"
    documentation: |-
      Default LOG_LEVEL is set info
  - name: ITERATIONS
    default: "5"
    documentation: |-
      Defaults to 5 Iterations
  - name: ADDITIONAL_PARAMS
    default: '{}'
    documentation: |-
      JSON value to upload additonal metadata to the fingerprint
  - name: GATEWAY_API
    default: "false"
    documentation: |-
      Ingress-perf is compatible with the OpenShift implementation of the Gateway API, provided by OpenShift Service Mesh. To enable this, set it to "true".
  - name: SERVICE_MESH
    default: ""
    documentation: |-
      Define the service mesh mode to use: sidecar or ambient, no service mesh is used by default
  - name: BASE_DOMAIN
    default: ""
    documentation: |-
      Base domain for the cluster
  - name: COMPUTE_NODE_TYPE
    default: ""
    documentation: |-
      Instance type for compute nodes
  - name: OPENSHIFT_INFRA_NODE_INSTANCE_TYPE
    default: ""
    documentation: |-
      Instance type for infrastructure nodes
  - name: SET_ENV_BY_PLATFORM
    default: ""
    documentation: |-
      Platform specific environment settings
  - name: ZONES_COUNT
    default: ""
    documentation: |-
      Number of availability zones
  - name: LOKI_USE_SERVICEMONITOR
    default: "false"
    documentation: |-
      Whether to use ServiceMonitor for Loki
  timeout: 4h
  resources:
    requests:
      cpu: 100m
      memory: 100Mi
  documentation: >-
    This step runs the PerfScale's ingress-perf workload in the deployed cluster
