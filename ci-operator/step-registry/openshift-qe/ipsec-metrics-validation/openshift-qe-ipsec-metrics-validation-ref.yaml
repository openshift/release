ref:
  as: openshift-qe-ipsec-metrics-validation
  from_image:
    namespace: ocp
    name: "4.22"
    tag: cli
  commands: openshift-qe-ipsec-metrics-validation-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 100Mi
  documentation: |-
    Validates IPsec Child SA state metrics from ovn-kubernetes PR #3259.

    Tests performed:
    1. Verifies IPsec is enabled on the cluster
    2. Checks ovnkube-controller pods are running
    3. Validates new metric ovnkube_controller_ipsec_tunnel_ike_child_sa_state exists
    4. Verifies metric has correct labels (node, remote_ip, local_ip)
    5. Checks IPsec Child SA tunnel states (INSTALLED, REKEYED, etc.)
    6. Runs N×N pod-to-pod connectivity matrix test across all worker nodes
    7. Reports test results and tunnel health
