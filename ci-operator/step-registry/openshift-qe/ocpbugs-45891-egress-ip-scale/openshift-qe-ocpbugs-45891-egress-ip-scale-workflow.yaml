workflow:
  as: openshift-qe-ocpbugs-45891-egress-ip-scale
  steps:
    test:
    - ref: openshift-qe-ocpbugs-45891-egress-ip-scale
  documentation: |-
    This workflow tests OCPBUGS-45891: EgressIP scale testing with minimal AWS cluster configuration.
    
    The test validates egress IP assignment capacity using 2 m6a.16xlarge worker nodes,
    creates 100 EgressIP objects, and verifies that 98 are successfully assigned.
    
    This workflow should be used with an AWS cluster that has:
    - Exactly 2 worker nodes with m6a.16xlarge instance type
    - OVNKubernetes network type
    - Sufficient AWS egress IP capacity
    
    Success criteria:
    - 98 out of 100 EgressIP objects successfully assigned
    - Even load distribution across both worker nodes (49 each)
    - CloudPrivateIPConfig count matches assigned EgressIPs
    
    Based on validated egress IP testing methodology for OCPBUGS-45891.