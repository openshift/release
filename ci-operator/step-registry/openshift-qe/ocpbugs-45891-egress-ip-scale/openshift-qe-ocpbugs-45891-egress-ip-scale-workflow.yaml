workflow:
  as: openshift-qe-ocpbugs-45891-egress-ip-scale
  steps:
    test:
    - ref: openshift-qe-ocpbugs-45891-egress-ip-scale
  documentation: |-
    This workflow tests OCPBUGS-45891: EgressIP scale testing with minimal AWS cluster configuration.
    
    FIXED: Updated to use specific IP assignment instead of auto-assignment to work
    around OpenShift 4.22+ auto-assignment bug where egressIPs: [] fails to assign.
    
    The test validates egress IP assignment capacity using 2+ m6a.16xlarge worker nodes,
    creates 100 EgressIP objects with explicit IP addresses, and verifies that 98 
    are successfully assigned.
    
    This workflow should be used with an AWS cluster that has:
    - At least 2 worker nodes with m6a.16xlarge instance type (3 recommended)
    - OVNKubernetes network type
    - Sufficient AWS egress IP capacity (49 IPs per m6a.16xlarge node)
    - Proper cloud.network.openshift.io/egress-ipconfig annotations
    
    Success criteria:
    - 98 out of 100 EgressIP objects successfully assigned
    - Even load distribution across worker nodes
    - CloudPrivateIPConfig count matches assigned EgressIPs
    - All assignments complete within 30 minutes (much faster with fixed version)
    
    Technical Implementation:
    - Automatically generates specific IP addresses from node network ranges
    - Uses explicit egressIPs: ["x.x.x.x"] specification for reliable assignment
    - Distributes IPs optimally across available egress-assignable nodes
    - Works reliably with OpenShift 4.22+ where auto-assignment is broken
    
    Based on validated egress IP testing methodology for OCPBUGS-45891.