ref:
  as: openshift-qe-ocpbugs-45891-egress-ip-scale
  from_image:
    namespace: ocp
    name: "4.22"
    tag: cli
  commands: openshift-qe-ocpbugs-45891-egress-ip-scale-commands.sh
  env:
  - name: EXPECTED_WORKER_NODES
    default: "2"
    documentation: Expected number of worker nodes
  - name: WORKER_VM_TYPE
    default: m6a.16xlarge
    documentation: Expected worker VM type
  - name: TOTAL_EGRESSIP_OBJECTS
    default: "100"
    documentation: Number of EgressIP objects to create
  - name: EXPECTED_ASSIGNED_EGRESSIPS
    default: "98"
    documentation: Expected number of assigned EgressIPs
  - name: EGRESSIP_NAME_PREFIX
    default: egressip-45891
    documentation: Prefix for EgressIP object names
  - name: TEST_TIMEOUT
    default: 30m
    documentation: Maximum time to wait for assignments
  resources:
    requests:
      cpu: 1000m
      memory: 2Gi
  documentation: |-
    Tests OCPBUGS-45891: EgressIP scale testing with minimal AWS cluster using large VMs.
    
    This test validates the maximum egress IP capacity with 2+ m6a.16xlarge worker nodes,
    creating 100 EgressIP objects and verifying that 98 are successfully assigned with
    optimal load distribution.
    
    FIXED: Updated to use specific IP assignment instead of auto-assignment to work
    around OpenShift 4.22 auto-assignment bug where egressIPs: [] fails to assign.
    
    The test follows Jean's validation methodology:
    - Verifies node egress IP configuration and capacity
    - Labels worker nodes as egress-assignable
    - Generates specific IP addresses from node network ranges
    - Creates 100 EgressIP objects with explicit IP assignment
    - Validates 98 successful assignments
    - Verifies CloudPrivateIPConfig count matches assigned EgressIPs
    - Checks load balancing across nodes
    
    Technical Notes:
    - Uses specific egressIPs: ["x.x.x.x"] instead of egressIPs: []
    - Auto-generates IPs from node annotations to avoid conflicts
    - Distributes IPs optimally across available worker nodes
    - Works reliably with OpenShift 4.22+ where auto-assignment is broken
    
    Environment variables:
    - EXPECTED_WORKER_NODES: Expected number of worker nodes (default: 2)
    - WORKER_VM_TYPE: Expected worker VM type (default: m6a.16xlarge)
    - TOTAL_EGRESSIP_OBJECTS: Number of EgressIP objects to create (default: 100)
    - EXPECTED_ASSIGNED_EGRESSIPS: Expected number of assigned EgressIPs (default: 98)
    - EGRESSIP_NAME_PREFIX: Prefix for EgressIP object names (default: egressip-45891)
    - TEST_TIMEOUT: Maximum time to wait for assignments (default: 30m)