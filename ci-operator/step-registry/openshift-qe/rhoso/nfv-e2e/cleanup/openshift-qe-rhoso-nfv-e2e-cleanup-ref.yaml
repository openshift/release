ref:
  as: openshift-qe-rhoso-nfv-e2e-cleanup
  from_image:
    namespace: ci
    name: ocp-qe-perfscale-ci
    tag: latest
  env:
  - name: SCENARIO
    default: "sriov"
    documentation: |-
      NFV scenario: sriov or ovs-dpdk.
  commands: openshift-qe-rhoso-nfv-e2e-cleanup-commands.sh
  timeout: 1h0m0s
  resources:
    requests:
      cpu: 100m
      memory: 100Mi
  documentation: |-
    Cleans up the NFV E2E environment on the automation host. Uses 2-hop
    SSH: Prow pod -> jumphost -> zuul@automation-host. Runs: make e2e-clean
    SCENARIO=$SCENARIO. Removes tenant VMs, undeploys OpenStack operators,
    and runs Ansible deepscrub/purge on the EDPM compute node.
