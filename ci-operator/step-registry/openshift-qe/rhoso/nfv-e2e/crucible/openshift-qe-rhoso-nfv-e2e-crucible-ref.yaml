ref:
  as: openshift-qe-rhoso-nfv-e2e-crucible
  from_image:
    namespace: ci
    name: ocp-qe-perfscale-ci
    tag: latest
  env:
  - name: SCENARIO
    default: "sriov"
    documentation: |-
      NFV scenario: sriov or ovs-dpdk.
  commands: openshift-qe-rhoso-nfv-e2e-crucible-commands.sh
  timeout: 6h0m0s
  resources:
    requests:
      cpu: 100m
      memory: 100Mi
  documentation: |-
    Runs Crucible/TRex binary search benchmark against testpmd in the
    NFV tenant VM. Uses 2-hop SSH: Prow pod -> jumphost ->
    zuul@automation-host. Runs: make e2e-crucible SCENARIO=$SCENARIO.
    Results collection (e2e-results.json), OpenSearch indexing (nfv-e2e-*
    index), and NFS archival are automatic via the e2e-run.sh exit
    handler.
