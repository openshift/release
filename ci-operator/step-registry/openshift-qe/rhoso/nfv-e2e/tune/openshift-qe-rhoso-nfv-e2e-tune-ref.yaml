ref:
  as: openshift-qe-rhoso-nfv-e2e-tune
  from_image:
    namespace: ci
    name: ocp-qe-perfscale-ci
    tag: latest
  env:
  - name: SCENARIO
    default: "sriov"
    documentation: |-
      NFV scenario: sriov or ovs-dpdk.
  commands: openshift-qe-rhoso-nfv-e2e-tune-commands.sh
  timeout: 1h0m0s
  resources:
    requests:
      cpu: 100m
      memory: 100Mi
  documentation: |-
    Tunes NFV tenant VM for DPDK dataplane testing on the automation
    host. Uses 2-hop SSH: Prow pod -> jumphost -> zuul@automation-host.
    Runs: make e2e-tune SCENARIO=$SCENARIO. Auto-discovers VM IPs via
    OpenStack and PCI devices on the EDPM compute node. Applies tuned
    profiles, DPDK vfio-pci bindings, and reboots the VM.
