ref:
  as: openshift-qe-rhoso-browbeat-run
  from_image:
    namespace: ci
    name: ocp-qe-perfscale-ci
    tag: latest
  env:
  - name: WORKLOAD
    default: ""
    documentation: |-
      Browbeat workload to run (e.g., nova). Required.
  - name: WORKLOAD_TYPE
    default: "rally"
    documentation: |-
      Browbeat workload type to run (rally, shaker, workflow). Defaults to rally.
  commands: openshift-qe-rhoso-browbeat-run-commands.sh
  timeout: 4h0m0s
  resources:
    requests:
      cpu: 100m
      memory: 100Mi


