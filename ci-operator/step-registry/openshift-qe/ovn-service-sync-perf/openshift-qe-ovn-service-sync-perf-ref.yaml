ref:
  as: openshift-qe-ovn-service-sync-perf
  from_image:
    namespace: ocp
    name: "4.22"
    tag: cli
  commands: openshift-qe-ovn-service-sync-perf-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  env:
  - name: EXPECTED_WORKER_NODES
    default: "5"
    documentation: |-
      Number of worker nodes expected for the test
  - name: LOADBALANCER_SERVICES
    default: "500"
    documentation: |-
      Number of LoadBalancer services to create for testing OVN service sync
  - name: BACKEND_PODS
    default: "1000"
    documentation: |-
      Number of backend pods to create for the services
  - name: SYNC_TIME_THRESHOLD
    default: "10"
    documentation: |-
      Maximum acceptable time in seconds for OVN service sync completion
  - name: TEST_TIMEOUT
    default: "45m"
    documentation: |-
      Maximum time to wait for the entire test to complete
  - name: TEST_NAMESPACE
    default: "ovn-sync-test"
    documentation: |-
      Namespace to use for test resources
  documentation: |-
    Test OVN service synchronization performance by creating large numbers of LoadBalancer services
    and measuring how quickly ovnkube-node can sync the service configuration after pod restarts.
    This validates that OVN can handle service scaling scenarios efficiently.