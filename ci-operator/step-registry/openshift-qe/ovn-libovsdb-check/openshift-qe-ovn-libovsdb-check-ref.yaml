ref:
  as: openshift-qe-ovn-libovsdb-check
  from_image:
    namespace: ci
    name: ocp-qe-perfscale-ci
    tag: latest
  cli: latest
  commands: openshift-qe-ovn-libovsdb-check-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 100Mi
  documentation: |-
    Pre-check for OCPBUGS-98252 verification. Captures OVN-K image version,
    checks for libovsdb migration presence, and records baseline ovs-vsctl
    process count and ovnkube-controller CPU before the workload runs.
