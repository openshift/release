ref:
  as: openshift-qe-network-perf
  from_image:
    namespace: ci
    name: ocp-qe-perfscale-ci
    tag: latest
  cli: latest
  env:
  - name: E2E_VERSION
    default: "default"
    documentation: |-
      Override the e2e version
  - name: NETPERF_VERSION
    default: "default"
    documentation: |-
      Override the k8s netperf
  - name: VM
    default: "false"
    documentation:
      To run netperf on VMs
  - name: USE_VIRTCTL
    default: "true"
    documentation:
      To use virtctl to connect to the VM, instead of ssh
  - name: TOLERANCE
    default: "90"
    documentation: |-
      Tolerance of delta from hostNetwork to podNetwork - single stream
  - name: EXTERNAL_SERVER_ADDRESS
    default: ""
    documentation: |-
      External netserver address hosted on bastion node
  - name: ES_METADATA_INDEX
    default: "perf_scale_ci"
    documentation: |-
      Elasticsearch metadata index
  - name: LOCAL
    default: "false"
    documentation: |-
      Run network performance tests with Server-Pods/Client-Pods on the same Node
  - name: WORKLOAD
    default: "full-run.yaml"
    documentation: |-
      The workload to run, defaults to full-run.yaml
  - name: ADDITIONAL_PARAMS
    default: '{}'
    documentation: |-
      JSON value to upload additonal metadata to the fingerprint
  - name: CLEAN_UP
    default: "true"
    documentation: |-
      Clean up the test namespace before and after the test. Defaults to true.
  - name: BASE_DOMAIN
    default: ""
    documentation: |-
      Base domain for the cluster
  - name: COMPUTE_NODE_TYPE
    default: ""
    documentation: |-
      Instance type for compute nodes
  - name: OPENSHIFT_INFRA_NODE_INSTANCE_TYPE
    default: ""
    documentation: |-
      Instance type for infrastructure nodes
  - name: SET_ENV_BY_PLATFORM
    default: ""
    documentation: |-
      Platform specific environment settings
  - name: ZONES_COUNT
    default: ""
    documentation: |-
      Number of availability zones
  - name: LOKI_USE_SERVICEMONITOR
    default: "false"
    documentation: |-
      Whether to use ServiceMonitor for Loki
  commands: openshift-qe-network-perf-commands.sh
  timeout: 4h
  credentials:
  - namespace: test-credentials # this entry injects the custom credential
    name: ocp-qe-perfscale-es
    mount_path: /secret
  resources:
    requests:
      cpu: 100m
      memory: 100Mi
  documentation: >-
    This step runs the perfscale network-perf workload in the deployed cluster
