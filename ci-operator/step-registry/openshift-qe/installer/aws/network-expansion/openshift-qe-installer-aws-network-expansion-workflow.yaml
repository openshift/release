workflow:
  as: openshift-qe-installer-aws-network-expansion
  steps: 
    post:
    - chain: ipi-aws-post
    pre:
    - chain: ipi-aws-pre
    - chain: create-infra-move-ingress-monitoring-registry
    - ref: ipi-install-config-network-custom
  documentation: |-
    This workflow configures AWS clusters for network expansion testing with 
    a custom initial network CIDR (10.128.0.0/20) that can be expanded to 
    accommodate maximum node capacity testing.
    
    The workflow uses the ipi-install-config-network-custom step to configure
    the initial cluster network with the smaller CIDR range before expansion.