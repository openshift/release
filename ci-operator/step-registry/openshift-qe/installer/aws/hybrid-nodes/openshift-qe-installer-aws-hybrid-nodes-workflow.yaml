workflow:
  as: openshift-qe-installer-aws-hybrid-nodes
  steps:
    env: 
      REMOVE_RHCOS_WORKER: "no"
      PLATFORM_VERSION: "8.9"
      SSH_KEY_NAME: "openshift-qe"
    pre:
    - chain: ipi-aws-pre-workers-rhel
    - chain: create-infra-move-ingress-monitoring-registry
    post:
    - chain: ipi-aws-post
  documentation: |-
    The OpenShift E2E AWS workflow executes the common end-to-end test suite on AWS with RHEL workers.