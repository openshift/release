ref:
  as: openshift-qe-installer-bm-poweroff
  from_image:
    namespace: ci
    name: ocp-qe-perfscale-ci
    tag: latest
  cli: latest
  commands: openshift-qe-installer-bm-poweroff-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 100Mi
  env:
    - name: OCP_INVENTORY_OVERRIDE
      default: "false"
      documentation: |-
        Override lab ocpinventory json file

