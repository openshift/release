ref:
  as: openshift-qe-installer-bm-day2-metallb
  from_image:
    namespace: ci
    name: ocp-qe-perfscale-ci
    tag: latest
  cli: latest
  commands: openshift-qe-installer-bm-day2-metallb-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 100Mi
  env:
    - name: OPERATOR_SOURCE_INDEX
      default: "redhat-operators"
      documentation: |-
        Operator source index will be "redhat-operators" for GA builds and "prega-operator-index" for Dev builds (nightly)

