ref:
  as: openshift-qe-installer-bm-day2-prega-operators
  from_image:
    namespace: ci
    name: ocp-qe-perfscale-ci
    tag: latest
  cli: latest
  commands: openshift-qe-installer-bm-day2-prega-operators-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 100Mi
  env:
    - name: OCP_BUILD
      default: "dev"
      documentation: |-
        Whether the build should use 'dev' (nightly builds) or 'ga' for Generally Available version of OpenShift 

