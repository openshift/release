ref:
  as: openshift-qe-orion-cudn-density
  from_image:
    namespace: ci
    name: ocp-qe-perfscale-ci
    tag: latest
  cli: latest
  env:
  - name: ORION_REPO
    default: "https://github.com/cloud-bulldozer/orion.git"
    documentation: |-
      Orion github repository
  - name: TAG
    default: "latest"
    documentation: |-
      Override branch of orion
  - name: ES_BENCHMARK_INDEX
    default: "ripsaw-kube-burner-*"
    documentation:
      Index which contains benchmark results
  - name: ES_METADATA_INDEX
    default: "perf_scale_ci-*"
    documentation:
      Index which contains metadata about runs.
  - name: ACK_FILE
    default: ""
    documentation:
      Optional ACK file for CUDN density workload.
  - name: ES_TYPE
    default: "qe"
    documentation: |-
      Set es type to internal or qe for getting data
  - name: UUID
    default: ""
    documentation: |-
      Default is blank, which means the uuid will not be applied to the command line args
  - name: VERSION
    default: ""
    documentation:
      Version of OCP to run Orion against, ex 4.18
  - name: IGNORE_JOB_ITERATIONS
    default: "false"
    documentation:
      Set orion's --node-count argument
  - name: OUTPUT_FORMAT
    default: "TEXT"
    documentation:
      Export in desired output format
  - name: LOOKBACK
    default: "15"
    documentation:
      Number of days orion should lookback at results.
  - name: RUN_ORION
    default: "false"
    documentation:
      Determine if we should run Orion or not. Must be set to true per job.
  - name: ORION_CONFIG
    default: ""
    documentation:
      Orion config for CUDN density workload. Must be set per job via env override.
  - name: LOOKBACK_SIZE
    default: ""
    documentation:
      Number of samples orion should consider for results.
  - name: COLLAPSE
    default: "false"
    documentation:
      Flag to regulate displaying only changepoints vs the entire output.
  - name: ORION_ENVS
    default: ""
    documentation:
      Comma separated list of envs that needs to exported in runtime for templated configurations.
  - name: DISPLAY
    default: ""
    documentation:
      Display custom metadata fields, like ocpVirtVersion, osImage, etc.
  - name: CHANGE_POINT_REPOS
    default: "kube-burner/kube-burner,kube-burner/kube-burner-ocp,cloud-bulldozer/e2e-benchmarking,openshift/release"
    documentation:
      Comma separated list of repositories to monitor before and after change points.
  - name: ORION_WORKLOAD_TYPE
    default: ""
    documentation:
      Workload type suffix for auto-selecting ORION_CONFIG based on worker node count.
  commands: openshift-qe-orion-cudn-density-commands.sh
  timeout: 6h
  credentials:
  - namespace: test-credentials
    name: ocp-qe-perfscale-es
    mount_path: /secret/qe
  - namespace: test-credentials
    name: ocp-perfscale-es-creds
    mount_path: /secret/internal
  resources:
    requests:
      cpu: 100m
      memory: 100Mi
  documentation: >-
    This step runs Orion change detection for the cudn-density workload.
