chain:
  as: openshift-qe-orion-node-density
  env:
  - name: ES_BENCHMARK_INDEX
    default: "ripsaw-kube-burner-*"
    documentation:
      Index which contains benchmark results
  - name: ES_METADATA_INDEX
    default: "perf_scale_ci-*"
    documentation:
      Index which contains metadata about runs.
  - name: ACK_FILE
    default: node-density_ack.yaml
    documentation:
      File will be prefixed with the version
  - name: ES_TYPE
    default: "qe"
    documentation: |-
      Set es type to internal or qe for getting data
  - name: ORION_CONFIG
    default: "https://raw.githubusercontent.com/cloud-bulldozer/orion/refs/heads/main/examples/trt-external-payload-node-density.yaml"
    documentation:
      Var used to tell the step which workload is calling Orion, like cluster-density, node-density, etc.
  - name: LOOKBACK_SIZE
    default: ""
    documentation:
      Number of samples orion should consider for results.
  - name: CHANGE_POINT_REPOS
    default: "kube-burner/kube-burner,kube-burner/kube-burner-ocp,cloud-bulldozer/e2e-benchmarking,openshift/release"
    documentation:
      Comma separated list of repositories to monitor before and after change points.
