ref:
  as: openshift-qe-ipsec-reboot-validation
  from_image:
    namespace: ci
    name: ocp-qe-perfscale-ci
    tag: latest
  cli: latest
  env:
  - name: PHASE
    default: "pre-reboot"
    documentation: |-
      Which phase this validation runs in: pre-reboot or post-reboot
  commands: openshift-qe-ipsec-reboot-validation-commands.sh
  timeout: 2h0m0s
  resources:
    requests:
      cpu: 100m
      memory: 100Mi
  documentation: >-
    Validates IPsec tunnel health and libreswan version for OCPBUGS-86429 libreswan unpinning test.
    Checks libreswan version, tunnel count, pluto crashes, and connectivity.
