ref:
  as: cli-manager-test-extension
  from: tests
  commands: cli-manager-test-extension-commands.sh
  timeout: 3600s
  env:
  - name: TEST_SUITE
    default: "openshift/cli-manager-operator/operator/serial"
    documentation: |-
      The OTE test suite to run
  dependencies:
  - name: cli-manager-operator
    env: EXTENSION_IMAGE
  resources:
    requests:
      cpu: "3"
      memory: 600Mi
    limits:
      memory: 10Gi
  documentation: |-
    Sets up and runs the cli-manager-operator out-of-payload OTE extension tests.
    Creates a TestExtensionAdmission CR and ImageStream to allow openshift-tests
    to discover and execute the extension binary from the operator image.
