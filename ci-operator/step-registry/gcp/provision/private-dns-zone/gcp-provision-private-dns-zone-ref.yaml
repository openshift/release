ref:
  as: gcp-provision-private-dns-zone
  from_image:
    namespace: ocp
    name: "4.15"
    tag: upi-installer
  grace_period: 10m
  commands: gcp-provision-private-dns-zone-commands.sh
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
  env:
  - name: PRIVATE_ZONE_PROJECT_TYPE
    default: "service-project"
    documentation: |-
      The DNS private zone will be in host project, service project, or a third project.
      Valid values: "service-project" (default), "host-project", "third-project".
  - name: PRE_CREATE_PRIVATE_ZONE
    default: "yes"
    documentation: |-
      Whether to pre-create the DNS private zone in the interested project.
  documentation: |-
    The step generates private DNS zone settings. 
