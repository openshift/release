ref:
  as: gcp-provision-bastionhost
  from_image:
    namespace: ocp
    name: "5.0"
    tag: upi-installer
  grace_period: 10m
  commands: gcp-provision-bastionhost-commands.sh
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
  credentials:
  - namespace: test-credentials
    name: qe-proxy-creds
    mount_path: /var/run/vault/proxy
  env:
  - name: NETWORK
    default: ""
  - name: CONTROL_PLANE_SUBNET
    default: ""
  - name: REGISTER_MIRROR_REGISTRY_DNS
    default: "no"
    documentation: |-
      Register DNS for mirror registry.
  - name: ATTACH_BASTION_SA
    default: ""
    documentation: The service-account to be attached to the bastion host, along with specifying scopes.
  - name: OSD_QE_PROJECT_AS_SERVICE_PROJECT
    default: "no"
    documentation: Whether to use OSD QE's project as the service project. The supported values are [no, yes].
  - name: BASTION_MACHINE_TYPE
    default: ""
    documentation: |-
      The GCP machine type for the bastion host. If empty, defaults to
      n2-standard-2.
  - name: BASTION_IMAGE_NAME
    default: ""
    documentation: |-
      The GCP image name for the bastion host. If empty, defaults to a
      Fedora CoreOS image.
  - name: BASTION_IMAGE_PROJECT
    default: ""
    documentation: |-
      The GCP project hosting the bastion image. If empty, defaults to
      fedora-coreos-cloud.
  documentation: |-
    The step launches Linux bastion host within the CONTROL_PLANE_SUBNET.
