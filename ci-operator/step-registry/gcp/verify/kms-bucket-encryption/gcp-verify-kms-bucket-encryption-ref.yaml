ref:
  as: gcp-verify-kms-bucket-encryption
  from_image:
    namespace: ocp
    name: "4.18"
    tag: upi-installer
  grace_period: 10m
  commands: gcp-verify-kms-bucket-encryption-commands.sh
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
  documentation: |-
    Verifies that GCS buckets created during installation are encrypted with
    the customer-managed KMS key configured in install-config. Checks both
    the bootstrap ignition bucket (if still present) and the image registry
    bucket for proper KMS encryption configuration. Also verifies that the
    ImageRegistry CR has the correct keyID configured.
