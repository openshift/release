ref:
  as: gcp-validate-bastionhost
  from_image:
    namespace: ocp
    name: "4.15"
    tag: upi-installer
  grace_period: 2m
  commands: gcp-validate-bastionhost-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  documentation: |-
    Validates SSH access and basic functionality of a GCP bastion host.

    Includes SSH key format conversion attempts (OpenSSH to PEM) to handle varying
    key formats across GCP cluster profiles. Verifies that the bastion host is
    accessible via SSH and can execute basic commands.

    This ref should only be called from workflows that provision a bastion host.
