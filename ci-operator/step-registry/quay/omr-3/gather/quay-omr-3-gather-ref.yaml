ref:
  as: quay-omr-3-gather
  from: cli
  commands: quay-omr-3-gather-commands.sh
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
  timeout: 10m0s
  grace_period: 1m0s
  documentation: |-
    Best-effort collection of OMR service, container, socket, disk, and health
    diagnostics from the standard bastion. The step does not read credentials,
    pull secrets, SSH keys, kubeconfig, or the complete shared directory.
