ref:
  as: quay-omr-3-install
  from: upi-installer
  cli: latest
  commands: quay-omr-3-install-commands.sh
  dependencies:
  - name: "pipeline:quay-mirror"
    env: OMR_IMAGE
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
  timeout: 45m0s
  grace_period: 5m0s
  documentation: |-
    Export the PR-built OMR image and installer binary, install them on the
    standard disconnected AWS bastion on port 8443, and publish the endpoint,
    credential, and CA certificate runtime files for downstream steps.
