ref:
  as: quay-test-mirror-image
  from_image:
    namespace: ocp
    name: "4.20"
    tag: cli
  commands: quay-test-mirror-image-commands.sh
  env:
  - name: QUAY_USERNAME
    default: "admin"
    documentation: Username to authenticate with Quay
  - name: QUAY_PASSWORD
    default: ""
    documentation: Password to authenticate with Quay. If empty, reads from SHARED_DIR/quay-admin-password.
  - name: SOURCE_IMAGE
    default: "registry.access.redhat.com/ubi9/ubi-micro:latest"
    documentation: Image to mirror into Quay
  - name: DEST_REPO
    default: "admin/smoke-test:latest"
    documentation: Destination repository path in Quay (e.g., admin/smoke-test:latest)
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  documentation: |-
    Mirrors an image into a Quay registry as a smoke test.
    Authenticates using credentials from SHARED_DIR or env vars,
    then mirrors SOURCE_IMAGE to DEST_REPO with retry logic.
