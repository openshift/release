ref:
  as: quay-omr-v3-mirror
  from: upi-installer
  commands: quay-omr-v3-mirror-commands.sh
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
  timeout: 240m0s
  grace_period: 10m
  dependencies:
  - name: "release:latest"
    env: OPENSHIFT_INSTALL_RELEASE_IMAGE_OVERRIDE
  documentation: |-
    Download and verify the latest oc-mirror client, mirror the selected
    OpenShift release into runtime OMR v3 from the AWS bastion with oc-mirror
    v2, and publish generated installer mappings with the ci-operator release
    source alias, release signatures, and atomic validation proofs.
