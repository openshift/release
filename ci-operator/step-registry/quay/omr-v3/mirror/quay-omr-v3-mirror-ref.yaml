ref:
  as: quay-omr-v3-mirror
  from: upi-installer
  commands: quay-omr-v3-mirror-commands.sh
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
  timeout: 240m0s
  grace_period: 10m
  dependencies:
  - name: "release:latest"
    env: OPENSHIFT_INSTALL_RELEASE_IMAGE_OVERRIDE
  documentation: |-
    Download and verify the latest oc-mirror client, mirror the selected
    OpenShift release into the runtime OMR host with oc-mirror v2, preferring a
    dedicated OMR host when one is provisioned and otherwise using the AWS
    bastion. Publish installer mappings, release signatures, and validation
    proofs atomically.
