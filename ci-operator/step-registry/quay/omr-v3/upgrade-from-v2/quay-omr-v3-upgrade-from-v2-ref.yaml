ref:
  as: quay-omr-v3-upgrade-from-v2
  from_image:
    namespace: ci
    name: tests-private-base
    tag: "4.22"
  cli: latest
  commands: quay-omr-v3-upgrade-from-v2-commands.sh
  dependencies:
  - name: "pipeline:quay-mirror"
    env: OMR_IMAGE
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
  timeout: 90m0s
  grace_period: 5m0s
  documentation: |-
    Export the PR-built OMR v3 image and binary, migrate the populated rootless
    OMR v2 installation on the dedicated RHEL host, clean up the v2 services,
    and verify that the endpoint, CA, credentials, and registry health survive.
