ref:
  as: quay-omr-v3-gather
  from_image:
    namespace: ci
    name: tests-private-base
    tag: "4.22"
  cli: latest
  commands: quay-omr-v3-gather-commands.sh
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
  timeout: 10m0s
  grace_period: 1m0s
  documentation: |-
    Best-effort collection of OMR AWS provisioning, cloud-init, service,
    container, socket, disk, and health diagnostics. A dedicated rootless host
    is preferred when present, including both v2 and v3 user services; the
    standard bastion remains supported. The step does not read credentials,
    sensitive config, or the complete shared directory.
