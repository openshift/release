ref:
  as: quay-omr-v3-ipi-conf-mirror
  from: upi-installer
  commands: quay-omr-v3-ipi-conf-mirror-commands.sh
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
  grace_period: 10m
  env:
  - name: IDMS_SOURCE_POLICY
    default: NeverContactSource
    documentation: Source policy applied to every OMR imageDigestSources entry.
  documentation: |-
    Configure the disconnected IPI install with the runtime OMR credential,
    CA certificate, IDMS mappings, and a source policy that prevents fallback
    to the upstream registries by default.
