ref:
  as: quay-omr-v3-validate-migration-sentinel
  from: upi-installer
  commands: quay-omr-v3-validate-migration-sentinel-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
  timeout: 30m0s
  grace_period: 2m0s
  documentation: |-
    Verify that the OMR v2 sentinel tag and digest survived migration, pull its
    unique marker layer on every OpenShift node, then append and pull a second
    marker layer to prove that migrated OMR v3 is writable and readable.
