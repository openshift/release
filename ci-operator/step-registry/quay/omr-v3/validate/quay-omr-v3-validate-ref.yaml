ref:
  as: quay-omr-v3-validate
  from: upi-installer
  commands: quay-omr-v3-validate-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
  timeout: 20m0s
  grace_period: 2m0s
  dependencies:
  - name: "release:latest"
    env: OPENSHIFT_INSTALL_RELEASE_IMAGE_OVERRIDE
  documentation: |-
    Applies the generated oc-mirror release signatures, then validates cluster
    availability, non-degraded operators, Ready nodes, both OpenShift IDMS
    mappings, a pod started from the mirrored CLI digest, and the resulting OMR
    request. A dedicated rootless OMR host is preferred when present.
