workflow:
  as: quay-pr-smoke
  steps:
    allow_best_effort_post_steps: true
    pre:
    - chain: ipi-aws-pre
    - ref: quay-pr-smoke-s3-provision
    - as: install-operator
      cli: latest
      commands: |
        set -euo pipefail
        operator_namespace="openshift-operators"
        if [[ "${QUAY_OPERATOR_BUNDLE}" != *@sha256:* ]]; then
          echo "QUAY_OPERATOR_BUNDLE was not resolved to an immutable digest: ${QUAY_OPERATOR_BUNDLE}" >&2
          exit 1
        fi
        echo "Installing promoted Quay Operator bundle ${QUAY_OPERATOR_BUNDLE}"
        operator-sdk run bundle --timeout=10m --security-context-config restricted \
          -n "${operator_namespace}" "${QUAY_OPERATOR_BUNDLE}"
        oc wait --timeout=10m --for=condition=Available \
          -n "${operator_namespace}" deployment/quay-operator-tng
      dependencies:
      - env: QUAY_OPERATOR_BUNDLE
        name: quay-operator-bundle
      from: operator-sdk
      resources:
        requests:
          cpu: 100m
          memory: 200Mi
    - ref: quay-pr-smoke-deploy
    test:
    - ref: quay-pr-smoke-test
    post:
    - ref: quay-gather
    - ref: quay-pr-smoke-s3-deprovision
    - chain: ipi-aws-post
    - ref: quay-pr-smoke-result
  documentation: |-
    Provisions a conventional AWS IPI cluster and an ephemeral S3 bucket,
    installs a promoted Quay Operator bundle, deploys the pull-request Quay
    image with operator-managed PostgreSQL, and runs the pull-request
    Playwright runner. Quay diagnostics, the standard IPI gather, and S3 and
    cluster cleanup run unconditionally.
