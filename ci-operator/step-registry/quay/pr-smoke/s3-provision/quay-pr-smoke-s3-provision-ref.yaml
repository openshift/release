ref:
  as: quay-pr-smoke-s3-provision
  from: upi-installer
  commands: quay-pr-smoke-s3-provision-commands.sh
  credentials:
  - namespace: test-credentials
    name: quay-qe-aws-secret
    mount_path: /var/run/quay-qe-aws-secret
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  timeout: 10m0s
  documentation: |-
    Creates the ephemeral AWS S3 bucket used by the pr-quay-smoke control and
    stores only its name and region in SHARED_DIR for deployment and cleanup.
