ref:
  as: quay-pr-smoke-test
  from: quay-playwright-runner
  commands: quay-pr-smoke-test-commands.sh
  resources:
    requests:
      cpu: "2"
      memory: 4Gi
  timeout: 2h0m0s
  grace_period: 15m0s
  documentation: |-
    Runs Quay Playwright tests tagged smoke, critical, or container while
    excluding webhook tests. It writes real JUnit, HTML, JSON, trace,
    screenshot, video, and console artifacts directly to ARTIFACT_DIR. The
    result is deferred so unconditional cleanup can finish.
