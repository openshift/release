ref:
  as: quay-pr-smoke-s3-deprovision
  from: upi-installer
  commands: quay-pr-smoke-s3-deprovision-commands.sh
  credentials:
  - namespace: test-credentials
    name: quay-qe-aws-secret
    mount_path: /var/run/quay-qe-aws-secret
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  timeout: 15m0s
  documentation: |-
    Empties and deletes the ephemeral pr-quay-smoke S3 bucket before cluster
    teardown, and fails visibly if the bucket still exists.
