ref:
  as: quay-omr-v2-validate
  from: upi-installer
  commands: quay-omr-v2-validate-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
  timeout: 20m0s
  grace_period: 2m0s
  dependencies:
  - name: "release:latest"
    env: OPENSHIFT_INSTALL_RELEASE_IMAGE_OVERRIDE
  documentation: |-
    Prove that the disconnected cluster installed through OMR v2 is healthy,
    uses the expected digest mirror mappings, can pull the mirrored CLI digest,
    and recorded that pull while all rootless v2 services are active.
