ref:
  as: quay-omr-v2-host-provision
  from_image:
    namespace: ci
    name: tests-private-base
    tag: "4.22"
  cli: latest
  commands: quay-omr-v2-host-provision-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
  timeout: 30m0s
  grace_period: 2m0s
  env:
  - name: OMR_V2_AMI_ID
    default: ""
    documentation: Optional explicit RHEL 9 AMI ID. The newest official Red Hat RHEL 9 x86_64 gp3 AMI is discovered when empty.
  - name: OMR_V2_INSTANCE_TYPE
    default: m6i.2xlarge
    documentation: EC2 instance type for the dedicated OMR migration host.
  - name: OMR_V2_ROOT_VOLUME_SIZE
    default: "500"
    documentation: Size in GiB of the dedicated host gp3 root volume.
  documentation: |-
    Provision a dedicated large RHEL 9 host in the disconnected cluster VPC,
    authorize the cluster profile SSH key, install rootless Podman prerequisites,
    and register its CloudFormation stack for the standard AWS teardown chain.
