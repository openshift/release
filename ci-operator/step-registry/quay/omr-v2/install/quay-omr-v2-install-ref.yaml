ref:
  as: quay-omr-v2-install
  from_image:
    namespace: ci
    name: tests-private-base
    tag: "4.22"
  cli: latest
  commands: quay-omr-v2-install-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
  timeout: 60m0s
  grace_period: 5m0s
  env:
  - name: OMR_V2_DOWNLOAD_URL
    default: https://mirror.openshift.com/pub/cgw/mirror-registry/latest/mirror-registry-amd64.tar.gz
    documentation: Floating official OMR v2 archive URL. The step rejects any extracted artifact whose semantic major version is not 2.
  documentation: |-
    Download the official floating OMR v2 artifact on the dedicated RHEL host,
    verify that it is still major version 2, install it rootlessly with explicit
    storage paths, and atomically publish its endpoint, credentials, and CA.
