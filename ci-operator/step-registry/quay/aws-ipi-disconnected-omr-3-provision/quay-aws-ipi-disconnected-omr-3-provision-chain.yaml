chain:
  as: quay-aws-ipi-disconnected-omr-3-provision
  steps:
  - ref: aws-provision-vpc-disconnected
  - chain: aws-provision-bastionhost
  - ref: quay-omr-3-install
  - ref: ipi-install-rbac
  - ref: mirror-images-by-oc-adm-in-bastion
  - ref: ipi-conf
  - ref: ipi-conf-telemetry
  - ref: ipi-conf-aws-custom-vpc
  - ref: ipi-conf-manual-creds
  - ref: ipi-conf-aws
  - ref: ipi-conf-mirror
  - ref: ipi-install-monitoringpvc
  - ref: proxy-config-generate
  - ref: aws-provision-cco-manual-users-static
  - ref: ipi-conf-manual-creds-remove-unnecessary-creds
  - ref: ipi-install-install-aws
  - ref: ipi-install-times-collection
  - ref: aws-provision-tags-for-byo-vpc
  env:
  - name: CONTROL_PLANE_INSTANCE_TYPE
    default: "m6i.xlarge"
    documentation: Instance type for control plane nodes.
  - name: COMPUTE_NODE_TYPE
    default: "m5.xlarge"
    documentation: Instance type for compute nodes.
  - name: ADD_INGRESS_RECORDS_MANUALLY
    default: "yes"
    documentation: Create the private cluster ingress DNS record during installation.
  - name: PUBLISH
    default: "Internal"
    documentation: Cluster publish strategy for the disconnected install.
  documentation: |-
    Provisions a disconnected OpenShift cluster in AWS using the standard VPC
    and bastion, installs the PR-built OMR 3 on that bastion, mirrors the
    release through OMR, and installs with manual CCO credentials from the
    selected cluster profile.
