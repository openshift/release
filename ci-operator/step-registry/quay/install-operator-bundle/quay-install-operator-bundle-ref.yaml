ref:
  as: quay-install-operator-bundle
  from: operator-sdk
  cli: latest
  commands: quay-install-operator-bundle-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  dependencies:
  - name: quay
    env: OO_BUNDLE
  documentation: |-
    Install the quay-operator from a CI-built bundle image using operator-sdk run bundle.
