ref:
  as: quay-deploy-test-services
  cli: latest
  from_image:
    name: quay-test-console
    namespace: ci
    tag: latest
  commands: quay-deploy-test-services-commands.sh
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
  timeout: 30m0s
  documentation: |-
    Deploy Keycloak (OIDC), 389 Directory Server (LDAP), and Mailpit (email)
    into the quay-enterprise namespace for Playwright e2e tests.
    Writes $SHARED_DIR/keycloak_route with the Keycloak Route URL.
