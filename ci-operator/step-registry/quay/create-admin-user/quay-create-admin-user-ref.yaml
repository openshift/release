ref:
  as: quay-create-admin-user
  from: cli
  commands: quay-create-admin-user-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  documentation: |-
    Creates an administrator account in Quay using the initialization API.
    Writes credentials to SHARED_DIR/quay-admin-username and SHARED_DIR/quay-admin-password.
