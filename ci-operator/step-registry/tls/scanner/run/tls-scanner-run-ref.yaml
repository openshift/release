ref:
  as: tls-scanner-run
  from: src
  cli: latest
  commands: tls-scanner-run-commands.sh
  dependencies:
  - env: PULL_SPEC_TLS_SCANNER_TOOL
    name: tls-scanner-tool
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  grace_period: 5m0s
  documentation: |-
    Runs the TLS scanner against a target cluster.
    This step provisions a temporary namespace, configures node-level firewall rules (nftables/iptables) 
    to allow traffic on scanner ports, deploys the scanner job, and collects artifacts.

