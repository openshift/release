ref:
  as: tls-scanner-run
  from: src
  cli: latest
  commands: tls-scanner-run-commands.sh
  dependencies:
  - env: PULL_SPEC_TLS_SCANNER_TOOL
    name: tls-scanner-tool
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  timeout: 4h0m0s
  grace_period: 5m0s
  env:
  - name: SCANNER_MEMORY_REQUEST
    default: "50Mi"
    documentation: |-
      Memory request for the scanner job pod. Set low due to cluster pool saturation.
  - name: SCANNER_MEMORY_LIMIT
    default: "256Mi"
    documentation: |-
      Memory limit for the scanner job pod.
  - name: SCANNER_CPU_REQUEST
    default: "50m"
    documentation: |-
      CPU request for the scanner job pod.
  - name: SCANNER_CPU_LIMIT
    default: "250m"
    documentation: |-
      CPU limit for the scanner job pod.
  documentation: |-
    Runs the TLS scanner against a target cluster.
    This step provisions a temporary namespace, configures node-level firewall rules (nftables/iptables) 
    to allow traffic on scanner ports, deploys the scanner job, and collects artifacts.

