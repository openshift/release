ref:
  as: tls-scanner-run
  from: src
  cli: latest
  commands: tls-scanner-run-commands.sh
  env:
  - name: SCAN_NAMESPACE
    default: ""
    documentation: "Comma-separated list of namespaces to scan. Empty means scan all namespaces."
  - name: PQC_CHECK
    default: "false"
    documentation: "Set to 'true' to enable post-quantum cryptography readiness checks (TLS 1.3 and mlkem/mlkem25519 support)."
  - name: SCAN_LIMIT_IPS
    default: ""
    documentation: "Max IPs to scan (empty/0 = no limit). Bounds actual TLS scans after full endpoint discovery."
  - name: SCANNER_CPU
    default: "4"
    documentation: "CPU request/limit for the scanner pod."
  - name: SCANNER_MEMORY
    default: "4Gi"
    documentation: "Memory request/limit for the scanner pod."
  dependencies:
  - env: RELEASE_IMAGE_LATEST
    name: release:latest
  - env: OPENSHIFT_UPGRADE_RELEASE_IMAGE_OVERRIDE
    name: release:latest
  - env: OPENSHIFT_INSTALL_RELEASE_IMAGE_OVERRIDE
    name: release:latest
  - env: PULL_SPEC_TLS_SCANNER_TOOL
    name: tls-scanner-tool
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
  timeout: 4h0m0s
  grace_period: 5m0s
  documentation: |-
    Runs the TLS scanner against all pods in the target cluster.
    The scanner runs with cluster-admin privileges and full host access.
    Set PQC_CHECK=true to enable post-quantum cryptography readiness checks.
