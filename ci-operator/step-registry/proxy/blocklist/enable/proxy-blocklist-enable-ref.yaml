ref:
  as: proxy-blocklist-enable
  from: upi-installer
  grace_period: 10m
  commands: proxy-blocklist-enable-commands.sh
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
  env:
  - name: PROXY_BLOCKLIST
    default: ""
    documentation: |-
      Additional domains to block via the proxy, space-separated (e.g. "domain1.com domain2.com").
  documentation: |-
    Enable proxy blocklist mode by configuring squid proxy to deny access to specified domains.
    The blocklist is configured in the squid.conf file on the bastion host.
