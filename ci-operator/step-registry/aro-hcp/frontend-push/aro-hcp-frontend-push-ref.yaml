ref:
  as: aro-hcp-frontend-push
  from: src
  commands: aro-hcp-frontend-push-commands.sh
  grace_period: 1m0s
  timeout: 15m0s
  env:
  - name: DEPLOY_ENV
    default: "dev"
    documentation: The ARO HCP deploy environment used to resolve ACR image coordinates via templatize.
  dependencies:
  - name: aro-hcp-frontend
    env: ARO_HCP_FRONTEND
  resources:
    requests:
      cpu: "1"
      memory: 2Gi
  documentation: |-
    Pushes the ci-operator built aro-hcp-frontend image to ACR.
    Runs only on postsubmit (merge to main).
