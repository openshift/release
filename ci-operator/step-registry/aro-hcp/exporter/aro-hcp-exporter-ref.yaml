ref:
  as: aro-hcp-exporter
  from: nested-podman-src
  commands: aro-hcp-exporter-commands.sh
  nested_podman: true
  grace_period: 1m0s
  timeout: 15m0s
  env:
  - name: DEPLOY_ENV
    default: "dev"
    documentation: The ARO HCP deploy environment used to resolve ACR image coordinates via templatize.
  resources:
    requests:
      cpu: "3"
      memory: 4Gi
  documentation: |-
    Builds the aro-hcp-exporter container image.
    On postsubmit (merge to main), also pushes the image to ACR.
