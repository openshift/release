ref:
  as: aro-hcp-gather-observability
  from: aro-hcp-e2e-tests
  commands: aro-hcp-gather-observability-commands.sh
  resources:
    requests:
      cpu: 10m
      memory: 200Mi
  credentials:
    - namespace: test-credentials
      name: cluster-secrets-aro-hcp-dev
      mount_path: /var/run/aro-hcp-dev
  env:
    - name: VAULT_SECRET_PROFILE
      default: "dev"
      documentation: |-
        Selects which environment's cluster secrets to use (dev, int, stg, prod).
    - name: INFRA_SHARD
      default: "shard0"
      documentation: |-
        Selects the infrastructure subscription shard from Vault.
        Maps to infra-{INFRA_SHARD}-subscription-id in the cluster secret.
    - name: COMPRESS_TIMING_METADATA
      default: "true"
      documentation: Whether to compress timing metadata files with gzip.
  best_effort: true
  timeout: 5m
