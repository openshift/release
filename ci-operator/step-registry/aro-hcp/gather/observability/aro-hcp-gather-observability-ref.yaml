ref:
  as: aro-hcp-gather-observability
  from: aro-hcp-e2e-tests
  commands: aro-hcp-gather-observability-commands.sh
  resources:
    requests:
      cpu: 10m
      memory: 200Mi
  credentials:
    - namespace: test-credentials
      name: cluster-secrets-aro-hcp-dev
      mount_path: /var/run/aro-hcp-dev
  env:
    - name: VAULT_SECRET_PROFILE
      default: "dev"
      documentation: |-
        Selects which environment's cluster secrets to use.
        This gather step is "dev cloud" only because it needs access to
        infrastructure subscriptions that are not reachable from INT/STG/PROD
        customer-scoped jobs.
    - name: ARO_HCP_DEPLOY_ENV
      default: "prow"
      documentation: |-
        Dev-cloud config environment name. Used to select the infrastructure
        subscription from Vault (infra-{ARO_HCP_DEPLOY_ENV}-subscription-id)
        for this "dev cloud" only gather step.
    - name: COMPRESS_TIMING_METADATA
      default: "true"
      documentation: Whether to compress timing metadata files with gzip.
  best_effort: true
  timeout: 5m
