ref:
  as: aro-hcp-lease-release
  from: aro-hcp-e2e-tests
  commands: aro-hcp-lease-release-commands.sh
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
  env:
    - name: ARO_HCP_SLOT_MANAGER_GIT_REF
      default: ""
      documentation: |-
        Temporary opt-in override for release-side rehearsals. When set,
        the lease step fetches this ref from github.com/roivaz/ARO-HCP and
        runs `slot-manager` via `go run` instead of the built binary.
        Normal ARO-HCP PR jobs should leave this unset because the
        `aro-hcp-e2e-tests` image is already built from the PR source.
  documentation: |-
    Release the runtime Boskos leases acquired for an ARO HCP E2E workflow.
