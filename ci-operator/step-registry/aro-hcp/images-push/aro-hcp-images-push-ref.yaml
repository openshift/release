ref:
  as: aro-hcp-images-push
  from: src
  commands: aro-hcp-images-push-commands.sh
  grace_period: 1m0s
  timeout: 20m0s
  env:
  - name: DEPLOY_ENV
    default: "dev"
    documentation: The ARO HCP deploy environment used to resolve ACR image coordinates via templatize.
  dependencies:
  - name: aro-hcp-backend
    env: ARO_HCP_BACKEND
  - name: aro-hcp-frontend
    env: ARO_HCP_FRONTEND
  - name: aro-hcp-admin-api
    env: ARO_HCP_ADMIN_API
  - name: aro-hcp-sessiongate
    env: ARO_HCP_SESSIONGATE
  - name: aro-hcp-oc-mirror
    env: ARO_HCP_OC_MIRROR
  - name: aro-hcp-exporter
    env: ARO_HCP_EXPORTER
  resources:
    requests:
      cpu: "1"
      memory: 2Gi
  documentation: |-
    Pushes all ci-operator built ARO-HCP images (backend, frontend, admin-api,
    sessiongate, oc-mirror) to ACR in parallel with retry logic.
