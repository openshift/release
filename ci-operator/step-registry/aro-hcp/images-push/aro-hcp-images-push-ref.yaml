ref:
  as: aro-hcp-images-push
  from: aro-hcp-e2e-tools
  commands: aro-hcp-images-push-commands.sh
  grace_period: 1m0s
  timeout: 20m0s
  credentials:
    - namespace: test-credentials
      name: cluster-secrets-aro-hcp-dev
      mount_path: /var/run/aro-hcp-dev
  env:
  - name: VAULT_SECRET_PROFILE
    default: "dev"
    documentation: |-
      Selects which environment's cluster secrets to use (dev, int, stg, prod).
  - name: DEPLOY_ENV
    default: "dev"
    documentation: The ARO HCP deploy environment used to resolve ACR image coordinates.
  dependencies:
  - name: aro-hcp-backend
    env: ARO_HCP_BACKEND
  - name: aro-hcp-frontend
    env: ARO_HCP_FRONTEND
  - name: aro-hcp-admin-api
    env: ARO_HCP_ADMIN_API
  - name: aro-hcp-sessiongate
    env: ARO_HCP_SESSIONGATE
  - name: aro-hcp-oc-mirror
    env: ARO_HCP_OC_MIRROR
  - name: aro-hcp-exporter
    env: ARO_HCP_EXPORTER
  resources:
    requests:
      cpu: "1"
      memory: 2Gi
  documentation: |-
    Pushes all CI-built ARO-HCP images to ACR for cross-environment mirroring.
    Images are built by ci-operator and referenced as pipeline dependencies.
