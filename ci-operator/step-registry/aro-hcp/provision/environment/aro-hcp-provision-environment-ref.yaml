ref:
  as: aro-hcp-provision-environment
  from: aro-hcp-e2e-tools
  commands: aro-hcp-provision-environment-commands.sh
  grace_period: 15s
  resources:
    requests:
      cpu: 1000m
      memory: 1Gi
  credentials:
    - namespace: test-credentials
      name: cluster-secrets-aro-hcp-dev
      mount_path: /var/run/aro-hcp-dev
  env:
    - name: VAULT_SECRET_PROFILE
      default: "dev"
      documentation: |-
        Selects which environment's cluster secrets to use (dev, int, stg, prod).
    - name: LOCATION
      default: "westus3"
      documentation: Azure region to provision resources in.  For example, "westus3".
    - name: USE_OC_LOGIN_REGISTRIES
      default: ""
      documentation: Space-separated list of registries that require oc registry login for authentication
    - name: ARO_HCP_DEPLOY_ENV
      default: "ci00"
      documentation: |-
        Config environment name. Also used to select the infrastructure
        subscription from Vault (infra-{ARO_HCP_DEPLOY_ENV}-subscription-id).
    - name: ARO_HCP_PROVISION_ABORT_IF_EXISTS
      default: "true"
      documentation: |-
        When "true" (default), provisioning aborts if regional infrastructure
        already exists. Set to "false" for upgrade workflows where the
        environment was pre-provisioned from main.
    - name: COMPRESS_TIMING_METADATA
      default: "true"
      documentation: Whether to compress timing metadata files with gzip.
    - name: PROVISION_GIT_REF
      default: ""
      documentation: |-
        When set, checkout this ref before provisioning (e.g. main for upgrade jobs).
        Each ci-operator step runs in its own pod; git state does not carry over.
  dependencies:
  - name: "pipeline:aro-hcp-backend"
    env: BACKEND_IMAGE
  - name: "pipeline:aro-hcp-frontend"
    env: FRONTEND_IMAGE
  - name: "pipeline:aro-hcp-admin-api"
    env: ADMIN_API_IMAGE
  - name: "pipeline:aro-hcp-sessiongate"
    env: SESSIONGATE_IMAGE
  - name: "pipeline:aro-hcp-hcp-recovery"
    env: HCP_RECOVERY_IMAGE
  - name: "pipeline:aro-hcp-fleet"
    env: FLEET_IMAGE
  - name: "pipeline:aro-hcp-mgmt-agent"
    env: MGMT_AGENT_IMAGE
  - name: "pipeline:aro-hcp-kube-applier"
    env: KUBE_APPLIER_IMAGE
  - name: "pipeline:aro-hcp-exporter"
    env: EXPORTER_IMAGE
  documentation: |-
    Create ARO HCP development environment.
