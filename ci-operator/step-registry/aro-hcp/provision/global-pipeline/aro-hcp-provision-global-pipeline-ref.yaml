ref:
  as: aro-hcp-provision-global-pipeline
  from: aro-hcp-e2e-tools
  commands: aro-hcp-provision-global-pipeline-commands.sh
  resources:
    requests:
      cpu: 1000m
      memory: 1Gi
  env:
  - name: DEPLOY_ENV
    default: "prow"
    documentation: The ARO HCP deploy environment to target for the global pipeline.
  - name: LOCATION
    default: "westus3"
    documentation: Azure region to use when rendering config for the global pipeline.
  - name: KUSTO_LOCATION
    default: "eastus2"
    documentation: Azure region used for the Log.Infra pipeline execution.
  - name: KUSTO_RESOURCE_GROUP
    default: "hcp-kusto-us"
    documentation: Kusto resource group to mark with persist=true after deployment.
  documentation: |-
    Run shared ARO HCP global infrastructure updates (Global pipeline, ACR, Kusto).
