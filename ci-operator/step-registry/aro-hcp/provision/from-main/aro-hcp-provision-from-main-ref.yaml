ref:
  as: aro-hcp-provision-from-main
  from: aro-hcp-e2e-tools
  commands: aro-hcp-provision-from-main-commands.sh
  grace_period: 15s
  resources:
    requests:
      cpu: 1000m
      memory: 1Gi
  credentials:
    - namespace: test-credentials
      name: cluster-secrets-aro-hcp-dev
      mount_path: /var/run/aro-hcp-dev
  env:
    - name: VAULT_SECRET_PROFILE
      default: "dev"
      documentation: |-
        Selects which environment's cluster secrets to use (dev, int, stg, prod).
    - name: LOCATION
      default: "westus3"
      documentation: Azure region to provision resources in. For example, "westus3".
    - name: ARO_HCP_DEPLOY_ENV
      default: "ci00"
      documentation: |-
        Config environment name. Also used to select the infrastructure
        subscription from Vault (infra-{ARO_HCP_DEPLOY_ENV}-subscription-id).
    - name: ARO_HCP_PROVISION_ABORT_IF_EXISTS
      default: "true"
      documentation: |-
        When "true" (default), provisioning aborts if regional infrastructure
        already exists. Set to "false" for upgrade workflows where the
        environment was pre-provisioned from main.
    - name: COMPRESS_TIMING_METADATA
      default: "true"
      documentation: Whether to compress timing metadata files with gzip.
  documentation: |-
    Provision an ARO HCP baseline environment from the main branch.
    Used as the first phase of upgrade-path validation: the environment
    is created from main, then upgraded to the PR branch in a subsequent step.
    Uses the Prow-provided PULL_BASE_SHA to check out the exact base
    commit (no network fetch required). Detects rehearsal runs via the
    JOB_NAME prefix and fetches main explicitly; non-rehearsal runs
    with an invalid PULL_BASE_SHA fail immediately.
    Resolves the base commit's images in ACR (pushed by the postsubmit
    images-push job), polling until available. If the base commit's
    images never appear, walks back through recent history to find the
    newest commit with images already pushed.
