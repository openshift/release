ref:
  as: aro-hcp-upgrade-infra
  from: aro-hcp-e2e-tools
  commands: aro-hcp-upgrade-infra-commands.sh
  grace_period: 15s
  timeout: 2h0m0s
  resources:
    requests:
      cpu: 1000m
      memory: 1Gi
  credentials:
    - namespace: test-credentials
      name: cluster-secrets-aro-hcp-dev
      mount_path: /var/run/aro-hcp-dev
  env:
    - name: VAULT_SECRET_PROFILE
      default: "dev"
      documentation: |-
        Selects which environment's cluster secrets to use (dev, int, stg, prod).
    - name: ARO_HCP_DEPLOY_ENV
      default: "ci00"
      documentation: Config environment name.
  documentation: |-
    In-place Hypershift upgrade on the existing regional environment after git-checkout-head.
    Builds OVERRIDE_CONFIG_FILE from the hypershift block (operator + sharedIngressImage
    digests) in PR-head config/config.yaml, then reruns pipeline/RP.HypershiftOperator.
