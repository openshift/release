workflow:
  as: aro-hcp-provision-healthcheck
  steps:
    allow_best_effort_post_steps: true
    pre:
      - ref: aro-hcp-write-config
    test:
      - ref: aro-hcp-provision-environment
    post:
      - ref: aro-hcp-gather-provision-failure
      - ref: aro-hcp-gather-visualization
      - ref: aro-hcp-deprovision-environment
  documentation: |-
    Provision healthcheck workflow. Runs the full ARO HCP entrypoint/Region
    to validate regional provision health without executing the E2E test suite.
    Used as a periodic probe per active region.
