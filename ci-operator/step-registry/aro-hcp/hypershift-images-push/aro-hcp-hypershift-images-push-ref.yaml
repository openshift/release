ref:
  as: aro-hcp-hypershift-images-push
  from: aro-hcp-e2e-tools
  commands: aro-hcp-hypershift-images-push-commands.sh
  grace_period: 1m0s
  timeout: 20m0s
  credentials:
    - namespace: test-credentials
      name: cluster-secrets-aro-hcp-dev
      mount_path: /var/run/aro-hcp-dev
  env:
  - name: VAULT_SECRET_PROFILE
    default: "dev"
    documentation: |-
      Selects which environment's cluster secrets to use (dev, int, stg, prod).
  - name: ARO_HCP_DEPLOY_ENV
    default: "prow"
    documentation: |-
      Config environment name. Also used to select the infrastructure
      subscription from Vault (infra-{ARO_HCP_DEPLOY_ENV}-subscription-id).
  dependencies:
  - name: hypershift-operator
    env: HYPERSHIFT_OPERATOR_IMAGE
  - name: hypershift
    env: HYPERSHIFT_CPO_IMAGE
  resources:
    requests:
      cpu: "1"
      memory: 2Gi
  documentation: |-
    Pushes CI-built hypershift-operator and control-plane-operator images
    to the service ACR. Writes:
    - SHARED_DIR/hypershift-image-overrides.yaml with HO config overlay
      (hypershift.image.repository + hypershift.image.digest), merged by
      hack/ci/provision-environment.sh during provisioning
    - SHARED_DIR/hypershift-cpo-override.env with CPO_IMAGE_OVERRIDE
      env var (full ACR digest ref), sourced by aro-hcp-test-local to
      pass as an ARM resource tag on cluster creation
