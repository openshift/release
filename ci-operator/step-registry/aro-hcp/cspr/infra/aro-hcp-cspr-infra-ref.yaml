ref:
  as: aro-hcp-cspr-infra
  from: aro-hcp-e2e-tools
  commands: aro-hcp-cspr-infra-commands.sh
  timeout: 45m0s
  credentials:
    - namespace: test-credentials
      name: cluster-secrets-aro-hcp-dev
      mount_path: /var/run/aro-hcp-dev
  env:
  - name: VAULT_SECRET_PROFILE
    default: "dev"
    documentation: |-
      Selects which environment's cluster secrets to use (dev, int, stg, prod).
  - name: DEPLOY_ENV
    default: "cspr"
    documentation: The ARO HCP deploy environment for CSPR infrastructure deployment.
  resources:
    requests:
      cpu: "1"
      memory: 2Gi
  documentation: |-
    Deploys CSPR infrastructure: region, SVC cluster, MGMT cluster,
    monitoring, and CSPR-specific MSI.
