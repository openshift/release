ref:
  as: aro-hcp-cspr-services-svc
  from: aro-hcp-e2e-tools
  commands: aro-hcp-cspr-services-svc-commands.sh
  timeout: 30m0s
  credentials:
    - namespace: test-credentials
      name: cluster-secrets-aro-hcp-dev
      mount_path: /var/run/aro-hcp-dev
  env:
  - name: VAULT_SECRET_PROFILE
    default: "dev"
    documentation: |-
      Selects which environment's cluster secrets to use (dev, int, stg, prod).
  - name: DEPLOY_ENV
    default: "cspr"
    documentation: The ARO HCP deploy environment for CSPR SVC cluster service deployment.
  - name: USE_OC_LOGIN_REGISTRIES
    default: ""
    documentation: Space-separated list of registries that require oc registry login for authentication
  dependencies:
  - name: "pipeline:aro-hcp-backend"
    env: BACKEND_IMAGE
  - name: "pipeline:aro-hcp-frontend"
    env: FRONTEND_IMAGE
  - name: "pipeline:aro-hcp-admin-api"
    env: ADMIN_API_IMAGE
  - name: "pipeline:aro-hcp-sessiongate"
    env: SESSIONGATE_IMAGE
  resources:
    requests:
      cpu: "1"
      memory: 2Gi
  documentation: |-
    Deploys services to the SVC cluster: backend, frontend, admin, sessiongate
    (via CI image override + pipeline ImageMirror), maestro, tracing, and CS PR env deps.
