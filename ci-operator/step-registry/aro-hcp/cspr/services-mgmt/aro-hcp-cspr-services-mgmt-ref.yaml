ref:
  as: aro-hcp-cspr-services-mgmt
  from: aro-hcp-e2e-tools
  commands: aro-hcp-cspr-services-mgmt-commands.sh
  timeout: 30m0s
  credentials:
    - namespace: test-credentials
      name: cluster-secrets-aro-hcp-dev
      mount_path: /var/run/aro-hcp-dev
  env:
  - name: VAULT_SECRET_PROFILE
    default: "dev"
    documentation: |-
      Selects which environment's cluster secrets to use (dev, int, stg, prod).
  - name: DEPLOY_ENV
    default: "cspr"
    documentation: The ARO HCP deploy environment for CSPR MGMT cluster service deployment.
  - name: USE_OC_LOGIN_REGISTRIES
    default: ""
    documentation: Space-separated list of registries that require oc registry login for authentication
  dependencies:
  - name: "pipeline:aro-hcp-mgmt-agent"
    env: MGMT_AGENT_IMAGE
  resources:
    requests:
      cpu: "1"
      memory: 2Gi
  documentation: |-
    Deploys all services to the MGMT cluster. Mgmt-agent is deployed
    with CI image override via pipeline/ target, remaining services
    are deployed via deploy_pipeline targets.
