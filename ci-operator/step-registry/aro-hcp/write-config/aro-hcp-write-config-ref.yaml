ref:
  as: aro-hcp-write-config
  from: aro-hcp-e2e-tests
  commands: aro-hcp-write-config-commands.sh
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
  env:
    - name: ARO_HCP_CLOUD
      default: ""
      documentation: Config cloud name (dev, public).
    - name: ARO_HCP_DEPLOY_ENV
      default: ""
      documentation: Config environment name (prow, int, stg, prod).
  timeout: 5m
  documentation: |-
    Render config.yaml to SHARED_DIR using the leased slot LOCATION and
    templatize configuration render.
    Note: The rendered config is only partially accurate and won't always reflect the full production configuration.
