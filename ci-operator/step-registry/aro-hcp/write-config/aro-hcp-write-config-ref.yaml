ref:
  as: aro-hcp-write-config
  from: aro-hcp-e2e-tools
  commands: aro-hcp-write-config-commands.sh
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
  env:
    - name: LOCATION
      default: ""
      documentation: Azure region (e.g. "uksouth").
    - name: MULTISTAGE_PARAM_OVERRIDE_LOCATION
      default: ""
      documentation: Overrides LOCATION via Gangway API.
    - name: ARO_HCP_CLOUD
      default: ""
      documentation: Config cloud name (dev, public).
    - name: ARO_HCP_DEPLOY_ENV
      default: ""
      documentation: Config environment name (ci00, ci01, int, stg, prod).
  timeout: 5m
  documentation: |-
    Render config.yaml to SHARED_DIR using LOCATION, optionally overridden by
    MULTISTAGE_PARAM_OVERRIDE_LOCATION, or the runtime slot SELECTED_LOCATION
    when the slot export file is present.
    Note: The rendered config is only partially accurate and won't always reflect the full production configuration.
