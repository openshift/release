ref:
  as: aro-hcp-test-local-post-upgrade
  from: aro-hcp-e2e-tests
  commands: aro-hcp-test-local-post-upgrade-commands.sh
  credentials:
    - namespace: test-credentials
      name: aro-hcp-qe-pull-secret
      mount_path: /var/run/aro-hcp-qe-pull-secret
    - namespace: test-credentials
      name: cluster-secrets-aro-hcp-dev
      mount_path: /var/run/aro-hcp-dev
  grace_period: 30s
  timeout: 4h0m0s
  resources:
    requests:
      cpu: 1000m
      memory: 1Gi
  env:
    - name: VAULT_SECRET_PROFILE
      default: "dev"
      documentation: Selects which environment's cluster secrets to use.
    - name: AROHCP_ENV
      default: "development"
    - name: LOCATION
      default: "westus3"
      documentation: Azure region for the test environment.
    - name: POOLED_IDENTITIES
      default: "true"
      documentation: Whether to use pooled identities for the test.
    - name: ARO_HCP_DEPLOY_ENV
      default: "prow"
      documentation: Config environment name.
    - name: ARO_HCP_SUITE_NAME
      default: "upgrade/post-infra"
      documentation: |-
        Suite to run via aro-hcp-tests run-suite after the infra upgrade step.
    - name: SETUP_FILEPATH
      default: ""
      documentation: |-
        Path to e2e-setup.json written by upgrade/create in the pre-upgrade step. When
        empty, the step uses ${SHARED_DIR}/e2e-setup.json (same as pre-upgrade).
    - name: E2E_JUNIT_SHARED_NAME
      default: "junit-e2e-post-upgrade.xml.gz"
      documentation: |-
        Gzip junit artifact filename under SHARED_DIR (avoids clobbering baseline junit).
    - name: COMPRESS_TIMING_METADATA
      default: "true"
      documentation: Whether to compress timing metadata files with gzip.
  documentation: |-
    Same local e2e harness as aro-hcp-test-local, run after infra upgrade.
    Defaults to the upgrade/post-infra suite, loading e2e-setup.json from
    ${SHARED_DIR} written by the pre-upgrade step.
