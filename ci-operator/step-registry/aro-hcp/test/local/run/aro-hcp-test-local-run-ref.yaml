ref:
  as: aro-hcp-test-local-run
  from: aro-hcp-e2e-tests
  commands: aro-hcp-test-local-run-commands.sh
  credentials:
    - namespace: test-credentials
      name: aro-hcp-qe-pull-secret
      mount_path: /var/run/aro-hcp-qe-pull-secret
    - namespace: test-credentials
      name: cluster-secrets-aro-hcp-dev
      mount_path: /var/run/aro-hcp-dev
  grace_period: 30s
  resources:
    requests:
      cpu: 1000m
      memory: 1Gi
  env:
    - name: VAULT_SECRET_PROFILE
      default: "dev"
      documentation: |-
        Selects which environment's cluster secrets to use (dev, int, stg, prod).
    - name: AROHCP_ENV
      default: "development"
    - name: LOCATION
      default: "westus3"
      documentation: Azure region to create resources in.  For example, "uksouth"
    - name: POOLED_IDENTITIES
      default: "true"
      documentation: Whether to use pooled identities for the test.
    - name: INFRA_SHARD
      default: "shard0"
      documentation: |-
        Selects the infrastructure subscription shard from Vault.
        Maps to infra-{INFRA_SHARD}-subscription-id in the cluster secret.
    - name: COMPRESS_TIMING_METADATA
      default: "true"
      documentation: Whether to compress timing metadata files with gzip.
  documentation: |-
    Run the ARO HCP local e2e test suite. Fetches svc cluster kubeconfig, grants frontend ingress, then runs tests.
    Reads frontend and admin-api addresses from SHARED_DIR (written by the setup step).
