ref:
  as: aro-hcp-test-local-setup
  from: aro-hcp-e2e-tools
  commands: aro-hcp-test-local-setup-commands.sh
  credentials:
    - namespace: test-credentials
      name: aro-hcp-qe-pull-secret
      mount_path: /var/run/aro-hcp-qe-pull-secret
    - namespace: test-credentials
      name: cluster-secrets-aro-hcp-dev
      mount_path: /var/run/aro-hcp-dev
  grace_period: 30s
  resources:
    requests:
      cpu: 1000m
      memory: 1Gi
  env:
    - name: LOCATION
      default: "westus3"
      documentation: Azure region to create resources in.  For example, "uksouth"
  documentation: |-
    Set up the ARO HCP local e2e environment: get kubeconfig, discover service
    addresses, grant ingress, register subscription with the frontend. Writes
    frontend and admin-api addresses to SHARED_DIR for the run step.
