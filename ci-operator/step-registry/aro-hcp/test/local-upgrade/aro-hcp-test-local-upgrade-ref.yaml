ref:
  as: aro-hcp-test-local-upgrade
  from: aro-hcp-e2e-tests
  commands: aro-hcp-test-local-upgrade-commands.sh
  credentials:
    - namespace: test-credentials
      name: aro-hcp-qe-pull-secret
      mount_path: /var/run/aro-hcp-qe-pull-secret
    - namespace: test-credentials
      name: cluster-secrets-aro-hcp-dev
      mount_path: /var/run/aro-hcp-dev
  grace_period: 30s
  timeout: 8h0m0s
  resources:
    requests:
      cpu: 1000m
      memory: 1Gi
  env:
    - name: VAULT_SECRET_PROFILE
      default: "dev"
      documentation: Selects which environment's cluster secrets to use.
    - name: AROHCP_ENV
      default: "development"
    - name: LOCATION
      default: "westus3"
      documentation: Azure region for the test environment.
    - name: POOLED_IDENTITIES
      default: "true"
      documentation: Whether to use pooled identities for the test.
    - name: ARO_HCP_DEPLOY_ENV
      default: "ci01"
      documentation: Config environment name.
    - name: ARO_HCP_SUITE_NAME
      default: "upgrade/in-place"
      documentation: |-
        One-shot suite: create hosted cluster, run pipeline/RP.HypershiftOperator with
        OVERRIDE_CONFIG_FILE, validate node pool hash change, cleanup.
    - name: COMPRESS_TIMING_METADATA
      default: "true"
      documentation: Whether to compress timing metadata files with gzip.
  documentation: |-
    After PR-head checkout, builds a hypershift override from config/config.yaml, fetches
    svc kubeconfig for frontend discovery and mgmt kubeconfig for pipeline/RP.HypershiftOperator,
    then runs the upgrade/in-place suite. Cluster state stays in-process.
