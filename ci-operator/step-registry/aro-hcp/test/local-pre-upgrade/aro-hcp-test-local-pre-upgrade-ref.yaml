ref:
  as: aro-hcp-test-local-pre-upgrade
  from: aro-hcp-e2e-tests
  commands: aro-hcp-test-local-pre-upgrade-commands.sh
  credentials:
    - namespace: test-credentials
      name: aro-hcp-qe-pull-secret
      mount_path: /var/run/aro-hcp-qe-pull-secret
    - namespace: test-credentials
      name: cluster-secrets-aro-hcp-dev
      mount_path: /var/run/aro-hcp-dev
  grace_period: 30s
  timeout: 4h0m0s
  resources:
    requests:
      cpu: 1000m
      memory: 1Gi
  env:
    - name: VAULT_SECRET_PROFILE
      default: "dev"
      documentation: Selects which environment's cluster secrets to use.
    - name: AROHCP_ENV
      default: "development"
    - name: LOCATION
      default: "westus3"
      documentation: Azure region for the test environment.
    - name: POOLED_IDENTITIES
      default: "true"
      documentation: Whether to use pooled identities for the test.
    - name: ARO_HCP_DEPLOY_ENV
      default: "ci00"
      documentation: Config environment name.
    - name: ARO_HCP_SUITE_NAME
      default: "upgrade/create"
      documentation: |-
        Suite to run via aro-hcp-tests run-suite before the infra upgrade step.
    - name: SETUP_FILEPATH
      default: ""
      documentation: |-
        Path for upgrade/create to write e2e-setup.json. When empty, the step sets
        ${SHARED_DIR}/e2e-setup.json so upgrade/post-infra can load it in a later step.
    - name: ARO_E2E_SKIP_CLEANUP
      default: "true"
      documentation: |-
        Skip cluster cleanup after the create suite so the cluster remains for
        infra upgrade and post-upgrade validation.
    - name: E2E_JUNIT_SHARED_NAME
      default: "junit-e2e-pre-upgrade.xml.gz"
      documentation: |-
        Gzip junit artifact filename under SHARED_DIR (avoids clobbering post-upgrade junit).
    - name: COMPRESS_TIMING_METADATA
      default: "true"
      documentation: Whether to compress timing metadata files with gzip.
  documentation: |-
    Same local e2e harness as aro-hcp-test-local for the pre-upgrade phase of the
    upgrade workflow. Defaults to the upgrade/create suite, which writes
    ${SHARED_DIR}/e2e-setup.json for upgrade/post-infra.
