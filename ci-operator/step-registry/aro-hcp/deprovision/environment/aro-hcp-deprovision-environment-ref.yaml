ref:
  as: aro-hcp-deprovision-environment
  from: aro-hcp-e2e-tools
  commands: aro-hcp-deprovision-environment-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 300Mi
  env:
    - name: AZURE_TOKEN_CREDENTIALS
      default: "dev"
      documentation: Specifies which Azure credential type to use. Must be set for DefaultAzureCredential with RequireAzureTokenCredentials.
  documentation: |-
    Delete an ARO HCP development environment
