ref:
  as: aro-hcp-deprovision-kusto-role-assignments
  from: aro-hcp-e2e-tools
  commands: aro-hcp-deprovision-kusto-role-assignments-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 300Mi
  env:
    - name: AZURE_TOKEN_CREDENTIALS
      default: "dev"
      documentation: Specifies which Azure credential type to use. Must be set for DefaultAzureCredential with RequireAzureTokenCredentials.
  documentation: |-
    Clean up expired role assignments that were left by test runs. Simply deletes all stale assignments.
