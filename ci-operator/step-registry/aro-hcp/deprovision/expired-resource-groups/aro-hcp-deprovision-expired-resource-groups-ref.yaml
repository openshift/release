ref:
  as: aro-hcp-deprovision-expired-resource-groups
  from: aro-hcp-e2e-tests
  commands: aro-hcp-deprovision-expired-resource-groups-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 300Mi
  credentials:
    - namespace: test-credentials
      name: cluster-secrets-aro-hcp-dev
      mount_path: /var/run/aro-hcp-dev
    - namespace: test-credentials
      name: cluster-secrets-aro-hcp-int
      mount_path: /var/run/aro-hcp-int
    - namespace: test-credentials
      name: cluster-secrets-aro-hcp-stg
      mount_path: /var/run/aro-hcp-stg
    - namespace: test-credentials
      name: cluster-secrets-aro-hcp-prod
      mount_path: /var/run/aro-hcp-prod
  env:
  - name: VAULT_SECRET_PROFILE
    default: "dev"
    documentation: |-
      Selects which environment's cluster secrets to use (dev, int, stg, prod).
  - name: CLEANUP_MODE
    default: ""
    documentation: Cleanup mode to use.
  - name: INCLUDE_LOCATION
    default: ""
    documentation: Only include resource groups in this location. Empty string means all locations.
  - name: EXCLUDE_LOCATION
    default: ""
    documentation: Exclude resource groups in this location. Empty string means no exclusions.
  documentation: |-
    Clean up expired resource groups that were left by other test runs.
