workflow:
  as: aro-hcp-cd
  steps:
    test:
    - ref: aro-hcp-images-push
    - ref: aro-hcp-cd-infra
    - ref: aro-hcp-cd-services-svc
    - ref: aro-hcp-cd-services-mgmt
  documentation: |-
    CD workflow for CSPR environment: pushes service images to ACR,
    deploys infrastructure, then deploys services to SVC and MGMT clusters.
    Steps execute sequentially in the order listed.
