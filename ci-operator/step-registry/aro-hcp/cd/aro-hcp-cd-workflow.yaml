workflow:
  as: aro-hcp-cd
  steps:
    test:
    - ref: aro-hcp-cd-infra
    - ref: aro-hcp-cd-services-svc
    - ref: aro-hcp-cd-services-mgmt
  documentation: |-
    CD workflow for CSPR environment: deploys infrastructure,
    then deploys services to SVC and MGMT clusters.
    CI-built images are consumed directly via pipeline dependencies
    and mirrored to ACR by each service's ImageMirror pipeline step.
