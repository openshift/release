ref:
  as: aro-hcp-cd-infra
  from: aro-hcp-e2e-tools
  commands: aro-hcp-cd-infra-commands.sh
  timeout: 45m0s
  env:
  - name: DEPLOY_ENV
    default: "cspr"
    documentation: The ARO HCP deploy environment for CSPR infrastructure deployment.
  resources:
    requests:
      cpu: "1"
      memory: 2Gi
  documentation: |-
    Deploys CSPR infrastructure: region, SVC cluster, MGMT cluster,
    monitoring, and CSPR-specific MSI.
