ref:
  as: aro-hcp-cd-services-mgmt
  from: aro-hcp-e2e-tools
  commands: aro-hcp-cd-services-mgmt-commands.sh
  timeout: 30m0s
  credentials:
    - namespace: test-credentials
      name: cluster-secrets-aro-hcp-dev
      mount_path: /var/run/aro-hcp-dev
  env:
  - name: VAULT_SECRET_PROFILE
    default: "dev"
    documentation: |-
      Selects which environment's cluster secrets to use (dev, int, stg, prod).
  - name: DEPLOY_ENV
    default: "cspr"
    documentation: The ARO HCP deploy environment for CSPR MGMT cluster service deployment.
  resources:
    requests:
      cpu: "1"
      memory: 2Gi
  documentation: |-
    Deploys all services to the MGMT cluster using the mgmt.deployall
    composite target.
