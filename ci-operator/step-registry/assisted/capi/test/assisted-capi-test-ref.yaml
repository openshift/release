ref:
  as: assisted-capi-test
  from: src
  grace_period: 10m
  timeout: 5h0m0s
  commands: assisted-capi-test-commands.sh
  credentials:
  - namespace: test-credentials
    name: capi-versioning-app-credentials
    mount_path: /var/run/vault/capi-versioning-app-credentials
  resources:
    requests:
      cpu: "3"
      memory: 600Mi
    limits:
      memory: 2Gi
  env:
  - name: DRY_RUN
    default: "false"
  - name: TEST_TARGET
    default: "e2e-test"
  - name: CLUSTER_TOPOLOGY
    default: "multinode"
    documentation: Cluster topology to deploy. Valid values are "sno" or "multinode".
  - name: NUMBER_OF_NODES
    default: "7"
    documentation: Number of nodes to provision. Use "1" for SNO, "7" for multinode.
  documentation: |-
    The Baremetal DS E2E assisted step executes the common end-to-end test suite.
