ref:
  as: assisted-capi-version-discovery
  from: src
  commands: assisted-capi-version-discovery-commands.sh
  resources:
    requests:
      cpu: "3"
      memory: 600Mi
    limits:
      memory: 2Gi
  env:
  - name: DRY_RUN
    default: "false"
  credentials:
  - namespace: test-credentials
    name: capi-versioning-automation
    mount_path: /var/run/vault/capi-versioning-automation
  documentation: |-
    Discovers latest capi, capm3 and assisted versions and updates release-candidates.yaml
