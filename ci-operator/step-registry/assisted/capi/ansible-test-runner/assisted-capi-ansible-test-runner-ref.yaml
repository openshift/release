ref:
  as: assisted-capi-ansible-test-runner
  from: src
  commands: assisted-capi-ansible-test-runner-commands.sh
  resources:
    requests:
      cpu: "3"
      memory: 600Mi
    limits:
      memory: 2Gi
  documentation: |-
    This step tests the candidate versions from release-candidates.yaml
    using the existing Ansible test suite. On success, it marks the
    versions as 'successful' in the release-candidates.yaml file.
