ref:
  as: assisted-ofcir-ip-config-deploy-lca
  from: assisted-test-infra-internal
  commands: assisted-ofcir-ip-config-deploy-lca-commands.sh
  resources:
    requests:
      cpu: 1000m
      memory: 2Gi
  env:
  - name: LCA_REPO
    default: "https://github.com/openshift-kni/lifecycle-agent.git"
    documentation: |-
      Repository URL for lifecycle-agent. 
      Will be used to build the image if LCA_IMG is not provided.
  - name: LCA_BRANCH
    default: "main"
    documentation: |-
      Git branch to checkout in lifecycle-agent repository. 
      Will be used to build the image if LCA_IMG is not provided.
  - name: LCA_IMG
    default: ""
    documentation: >
      Full image reference used for deploy (e.g., quay.io/user/lifecycle-agent:tag).
      If empty, will be build from the lifecycle-agent repository / branch.
  documentation: |-
    Deploys the lifecycle-agent operator on the SNO cluster.

