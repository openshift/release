ref:
  as: assisted-ofcir-baremetal-image-registry-setup
  from: dev-scripts
  commands: assisted-ofcir-baremetal-image-registry-setup-commands.sh
  resources:
    requests:
      cpu: 1000m
      memory: 500Mi
  credentials:
  - namespace: test-credentials
    name: assisted-installer-ci
    mount_path: /var/run/vault/assisted-ci-vault
  - namespace: test-credentials
    name: edge-group-assisted-installer-bot
    mount_path: /var/run/assisted-installer-bot
  timeout: 30m0s
  documentation: |-
    Enable the internal image registry on a bare-metal cluster provisioned via OFCIR.
    Runs oc commands on ci_machine where the cluster API is reachable.
