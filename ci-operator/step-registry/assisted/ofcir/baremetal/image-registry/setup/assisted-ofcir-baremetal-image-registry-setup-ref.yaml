ref:
  as: assisted-ofcir-baremetal-image-registry-setup
  from: dev-scripts
  commands: assisted-ofcir-baremetal-image-registry-setup-commands.sh
  resources:
    requests:
      cpu: 1000m
      memory: 500Mi
  timeout: 45m0s
  documentation: |-
    Patch the installed cluster image registry to Managed with emptyDir storage on ci_machine.
    Runs after assisted-common-pre; discovers kubeconfig files under /home/assisted/build/kubeconfig
    (a directory on bare-metal installs, not a single file).
