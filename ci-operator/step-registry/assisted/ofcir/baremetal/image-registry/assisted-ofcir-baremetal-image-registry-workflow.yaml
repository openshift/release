workflow:
  as: assisted-ofcir-baremetal-image-registry
  steps:
    cluster_profile: packet-assisted
    allow_best_effort_post_steps: true
    allow_skip_on_success: true
    pre:
      - ref: ofcir-acquire
      - ref: assisted-ofcir-setup
      - chain: assisted-common-pre
      - ref: assisted-ofcir-baremetal-image-registry-setup
    test:
      - ref: assisted-baremetal-test
    post:
      - ref: assisted-common-gather
      - ref: ofcir-gather
      - ref: ofcir-release
    env:
      TEST_TYPE: none
      CLUSTERTYPE: "assisted_medium_el9"
  documentation: |-
    This workflow provisions a bare-metal cluster via assisted-installer on packet,
    enables the internal image registry (Managed with emptyDir storage), then runs tests.
