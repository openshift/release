build_root:
  project_image:
    dockerfile_literal: |
      FROM registry.access.redhat.com/ubi9:latest
      RUN dnf install -y gcc make rust-toolset rustfmt clippy git && dnf clean all
      ENV HOME="/tmp/home"
      RUN mkdir -p "${HOME}" && curl https://mise.run | sh
      ENV PATH="${HOME}/.local/bin:${PATH}"
images:
  items:
  - dockerfile_path: Dockerfile
    from: src
    to: openshell
resources:
  '*':
    requests:
      cpu: "2"
      memory: 4Gi
tests:
- as: test
  commands: mise run test
  container:
    from: src
zz_generated_metadata:
  branch: main
  org: NVIDIA
  repo: OpenShell
