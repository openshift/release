base_images:
  cli:
    name: "4.20"
    namespace: ocp
    tag: cli
build_root:
  image_stream_tag:
    name: maistra-builder
    namespace: ci
    tag: "3.2"
  use_build_cache: true
releases:
  latest:
    release:
      architecture: multi
      channel: stable
      version: "4.20"
resources:
  '*':
    requests:
      cpu: 200m
      memory: 200Mi
tests:
- as: unit
  steps:
    cluster_profile: ossm-aws
    env:
      CI: "true"
      COMPUTE_NODE_REPLICAS: "1"
      COMPUTE_NODE_TYPE: m5d.2xlarge
      MAISTRA_BUILDER_IMAGE: quay.io/maistra-dev/maistra-builder:3.2
      MAISTRA_NAMESPACE: maistra-e2e-test
      MAISTRA_SC_POD: maistra-ztunnel-test-pod
    test:
    - as: copy-src
      cli: latest
      commands: |
        tar cf - . | oc exec -i -n "${MAISTRA_NAMESPACE}" "${MAISTRA_SC_POD}" -- tar xf - -C /work/
      env:
      - name: MAISTRA_NAMESPACE
      - name: MAISTRA_SC_POD
      from: src
      resources:
        requests:
          cpu: 100m
          memory: 100Mi
      timeout: 20m0s
    - as: unit
      cli: latest
      commands: |
        oc rsh -n "${MAISTRA_NAMESPACE}" "${MAISTRA_SC_POD}" \
          sh -c \
          "export CI=${CI}; \
           cargo build --release --features tls-openssl --no-default-features"
        oc cp "${MAISTRA_NAMESPACE}"/"${MAISTRA_SC_POD}":"${ARTIFACT_DIR}"/. "${ARTIFACT_DIR}"
      env:
      - name: MAISTRA_NAMESPACE
      - name: MAISTRA_SC_POD
      - name: CI
      from: src
      resources:
        requests:
          cpu: 100m
          memory: 100Mi
      timeout: 1h0m0s
    workflow: servicemesh-ztunnel-e2e-aws
  timeout: 1h30m0s
- as: copy-artifacts-gcs
  postsubmit: true
  steps:
    cluster_profile: ossm-aws
    env:
      ARTIFACTS_GCS_PATH: gs://maistra-prow-testing/ztunnel
      CI: "true"
      COMPUTE_NODE_REPLICAS: "1"
      COMPUTE_NODE_TYPE: m5d.2xlarge
      GCS_PROJECT: maistra-prow-testing
      LOCAL_CPU_RESOURCES: "4"
      LOCAL_JOBS: "2"
      LOCAL_RAM_RESOURCES: "8192"
      MAISTRA_BUILDER_IMAGE: quay.io/maistra-dev/maistra-builder:3.2
      MAISTRA_NAMESPACE: maistra-e2e-test
      MAISTRA_SC_POD: maistra-ztunnel-test-pod
    test:
    - as: copy-src
      cli: latest
      commands: |
        # copy source
        tar cf - . | oc exec -i -n "${MAISTRA_NAMESPACE}" "${MAISTRA_SC_POD}" -- tar xf - -C /work/
        # copy gcs service-account
        TARGET=$(readlink -f /maistra-secrets/service-account.json)
        oc cp "${TARGET}" "${MAISTRA_NAMESPACE}"/"${MAISTRA_SC_POD}":/work/
      credentials:
      - collection: ""
        mount_path: /maistra-secrets
        name: gcs-credentials
        namespace: test-credentials
      env:
      - name: MAISTRA_NAMESPACE
      - name: MAISTRA_SC_POD
      from: src
      resources:
        requests:
          cpu: 100m
          memory: 100Mi
      timeout: 20m0s
    - as: copy-artifacts-gcs
      cli: latest
      commands: |
        oc rsh -n "${MAISTRA_NAMESPACE}" "${MAISTRA_SC_POD}" \
          sh -c \
          "export CI=${CI}; \
           export GOOGLE_APPLICATION_CREDENTIALS='/work/service-account.json'; \
          ./ossm/ci/post-submit.sh"
      env:
      - name: MAISTRA_NAMESPACE
      - name: MAISTRA_SC_POD
      - name: CI
      - name: GCS_PROJECT
      - name: ARTIFACTS_GCS_PATH
      from: src
      resources:
        requests:
          cpu: 100m
          memory: 100Mi
      timeout: 1h0m0s
    workflow: servicemesh-ztunnel-e2e-aws
  timeout: 2h0m0s
- as: update-istio
  commands: |
    # load test-infra automator.sh script
    export ISTIO_ZTUNNEL_BASE_URL="https://storage.googleapis.com/maistra-prow-testing/ztunnel"
    git clone https://github.com/maistra/test-infra.git
    cd test-infra
    ./tools/automator.sh \
      -o openshift-service-mesh \
      -r istio \
      -f /creds-github/token \
      "-c bin/update_ztunnel.sh ${PULL_BASE_SHA}" \
      '-t [release-1.27] Automator: Update ztunnel' \
      -m bump-ztunnel-1.27 \
      -b release-1.27
  container:
    from: src
  postsubmit: true
  secrets:
  - mount_path: /creds-github
    name: ossm-github-simple-job
  timeout: 8h0m0s
zz_generated_metadata:
  branch: release-1.27
  org: openshift-service-mesh
  repo: ztunnel
