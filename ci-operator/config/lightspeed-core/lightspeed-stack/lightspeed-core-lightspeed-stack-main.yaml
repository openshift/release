build_root:
  project_image:
    dockerfile_literal: |
      FROM registry.ci.openshift.org/ocp/ubi-python-311:9
      USER 0
      RUN dnf install -y podman
images:
- dockerfile_path: Containerfile
  to: lightspeed-stack
promotion:
  to:
  - namespace: lcore-test
    tag: latest
releases:
  latest:
    release:
      architecture: multi
      channel: stable
      version: "4.19"
resources:
  '*':
    limits:
      memory: 8Gi
    requests:
      cpu: 100m
      memory: 4Gi
tests:
- as: e2e-lcore-cluster-periodics
  cluster_claim:
    architecture: amd64
    cloud: aws
    labels:
      region: us-east-2
    owner: obs
    product: ocp
    timeout: 1h0m0s
    version: "4.19"
  cron: 10 4 * * *
  steps:
    allow_skip_on_success: true
    post:
    - ref: gather-must-gather
    test:
    - as: e2e
      cli: latest
      commands: "export HUGGING_FACE_HUB_TOKEN=$(cat /var/run/huggingface/hf-token-ces-lcore-test)\nexport
        VLLM_API_KEY=$(cat /var/run/vllm/vllm-api-key-lcore-test)\n[ -n \"$HUGGING_FACE_HUB_TOKEN\"
        ] && echo \"HUGGING_FACE_HUB_TOKEN is set\" || echo \"HUGGING_FACE_HUB_TOKEN
        is NOT set\"\n[ -n \"$VLLM_API_KEY\" ] && echo \"VLLM_API_KEY is set\" ||
        echo \"VLLM_API_KEY is NOT set\"\n\nls -A\noc version\noc whoami\noc get pods
        -A\n\necho \"===== DEPLOY vLLM ======\"\n\ngit clone https://github.com/are-ces/lightspeed-stack.git\ncd
        lightspeed-stack\ngit checkout e2e-rhoai\ncd tests/e2e-prow/rhoai\n\noc create
        namespace e2e-rhoai-dsc\n\noc create secret generic hf-token-secret \\\n    --from-literal=token=\"$HUGGING_FACE_HUB_TOKEN\"
        \\\n    -n e2e-rhoai-dsc || echo \"Secret exists\"\n\noc create secret generic
        vllm-api-key-secret \\\n    --from-literal=key=\"$VLLM_API_KEY\" \\\n    -n
        e2e-rhoai-dsc || echo \"Secret exists\"\n\ncurl -L -o tool_chat_template_llama3.2_json.jinja
        \\\n  https://raw.githubusercontent.com/vllm-project/vllm/main/examples/tool_chat_template_llama3.2_json.jinja\n
        \ \noc create configmap vllm-chat-template -n e2e-rhoai-dsc \\\n  --from-file=tool_chat_template_llama3.2_json.jinja\n\npwd\n\n./pipeline.sh\n\noc
        get pods\n\necho \"===== LCS POD =====\"\n\nls\n\nsource pod.env\n\noc wait
        --for=condition=Ready pod/$POD_NAME -n $NAMESPACE --timeout=300s\nsleep 30\n\nresponse=$(curl
        -sk -w \"%{http_code}\" \\\n  -H \"Content-Type: application/json\" \\\n  -H
        \"Authorization: Bearer $VLLM_API_KEY\" \\\n  -d '{\n      \"model\": \"meta-llama/Llama-3.2-1B-Instruct\",\n
        \     \"prompt\": \"Who won the world series in 2020?\",\n      \"max_new_tokens\":
        100\n  }' \\\n  \"$KSVC_URL/v1/completions\")\n\nhttp_code=\"${response: -3}\"\nbody=\"${response::-3}\"\n\necho
        \"Response body:\"\necho \"$body\" | jq . 2>/dev/null || echo \"$body\"\n\nif
        [[ \"$http_code\" == \"200\" && \"$body\" == *'\"object\":\"text_completion\"'*
        ]]; then\n  echo \"✅ Success: API returned 200 and a text_completion object.\"\nelse\n
        \ echo \"❌ Failed with HTTP $http_code\"\nfi\n\n\nls\n\noc create secret generic
        api-url-secret \\\n    --from-literal=key=\"$KSVC_URL\" \\\n    -n e2e-rhoai-dsc
        || echo \"Secret exists\"\n\noc create configmap llama-stack-config -n e2e-rhoai-dsc
        \\\n  --from-file=config/run.yaml\n\noc create configmap lightspeed-stack-config
        -n e2e-rhoai-dsc \\\n  --from-file=config/lightspeed-stack.yaml\n\n./pipeline-services.sh\n\noc
        get pods -n e2e-rhoai-dsc\n\noc wait pod/lightspeed-stack-service pod/llama-stack-service
        \\\n-n e2e-rhoai-dsc --for=condition=Ready --timeout=300s\n\nsleep 30\n\nexport
        LCS_IP=$(oc get pod lightspeed-stack-service -n e2e-rhoai-dsc -o jsonpath='{.status.podIP}')\necho
        \"LCS IP: $LCS_IP\"\n\noc get pods -n e2e-rhoai-dsc\noc logs llama-stack-service
        -n e2e-rhoai-dsc             \noc logs lightspeed-stack-service -n e2e-rhoai-dsc
        \            \n\n\n# HEALTH CHECK\necho \"Testing basic connectivity before
        full test suite...\"\ncurl -f http://$LCS_IP:8080/v1/models || {\n  echo \"❌
        Basic connectivity failed - showing logs before running full tests\"\n  exit
        1\n}\n\noc logs llama-stack-service -n e2e-rhoai-dsc             \noc logs
        lightspeed-stack-service -n e2e-rhoai-dsc             \n\n\n\ncd ../../..\nls\nmake
        test-e2e\n"
      credentials:
      - collection: ""
        mount_path: /var/run/huggingface
        name: hf-token
        namespace: test-credentials
      - collection: ""
        mount_path: /var/run/vllm
        name: vllm-api-key
        namespace: test-credentials
      dependencies:
      - env: LCORE_IMAGE
        name: lightspeed-stack
      from: src
      resources:
        requests:
          cpu: 100m
    workflow: generic-claim
zz_generated_metadata:
  branch: main
  org: lightspeed-core
  repo: lightspeed-stack
