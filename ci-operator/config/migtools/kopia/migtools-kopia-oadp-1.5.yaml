build_root:
  image_stream_tag:
    name: builder
    namespace: konveyor
    tag: ubi9-v1.25
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: build
  steps:
    test:
    - as: build
      commands: go build ./...
      from: src
      resources:
        requests:
          cpu: 100m
          memory: 200Mi
- as: vet
  optional: true
  steps:
    test:
    - as: vet
      commands: go vet ./...
      from: src
      resources:
        requests:
          cpu: 100m
          memory: 200Mi
zz_generated_metadata:
  branch: oadp-1.5
  org: migtools
  repo: kopia
