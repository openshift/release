build_root:
  image_stream_tag:
    name: builder
    namespace: konveyor
    tag: ubi9-v1.25
images:
  items:
  - additional_architectures:
    - arm64
    dockerfile_path: Containerfile.download
    to: oadp-vmdp
promotion:
  to:
  - name: oadp-vmdp
    namespace: konveyor
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
zz_generated_metadata:
  branch: oadp-dev
  org: migtools
  repo: oadp-vmdp
