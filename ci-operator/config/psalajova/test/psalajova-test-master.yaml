build_root:
  image_stream_tag:
    name: release
    namespace: openshift
    tag: rhel-9-release-golang-1.20-openshift-4.17
prowgen:
  enable_secrets_store_csi_driver: true
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: test-credentials
  steps:
    workflow: psalajova-test
- as: test-gsm-secrets
  commands: ls -la /var/my-secrets && cat /var/my-secrets/*
  container:
    from: src
  cron: 0 0 1 1 *
  secrets:
  - collection: psalajova-first-secret
    group: group1
    mount_path: /var/my-secrets
- as: test-gsm-secrets-mixed
  commands: |
    echo "--- collection (auto-discovery) ---"
    ls -la /var/my-secrets
    echo "--- collection (explicit field) ---"
    ls -la /var/my-secrets2
    echo "--- bundle ---"
    ls -la /var/bundle-secrets
  container:
    from: src
  cron: 0 0 1 1 *
  secrets:
  - collection: psalajova-first-secret
    group: group1
    mount_path: /var/my-secrets
  - collection: psalajova-first-secret
    field: first-secret
    group: test
    mount_path: /var/my-secrets2
  - bundle: insights-live
    mount_path: /var/bundle-secrets
zz_generated_metadata:
  branch: master
  org: psalajova
  repo: test
