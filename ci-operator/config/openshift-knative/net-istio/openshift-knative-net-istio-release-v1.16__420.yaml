base_images:
  ocp_ubi-minimal_8:
    name: ubi-minimal
    namespace: ocp
    tag: "8"
  openshift_release_rhel-8-release-golang-1.25-openshift-4.21:
    name: release
    namespace: openshift
    tag: rhel-8-release-golang-1.25-openshift-4.21
build_root:
  project_image:
    dockerfile_path: openshift/ci-operator/build-image/Dockerfile
images:
  items:
  - dockerfile_path: openshift/ci-operator/knative-images/controller/Dockerfile
    inputs:
      ocp_ubi-minimal_8:
        as:
        - $GO_RUNTIME
      openshift_release_rhel-8-release-golang-1.25-openshift-4.21:
        as:
        - $GO_BUILDER
    to: net-istio-controller
  - dockerfile_path: openshift/ci-operator/knative-images/webhook/Dockerfile
    inputs:
      ocp_ubi-minimal_8:
        as:
        - $GO_RUNTIME
      openshift_release_rhel-8-release-golang-1.25-openshift-4.21:
        as:
        - $GO_BUILDER
    to: net-istio-webhook
  - dockerfile_path: openshift/ci-operator/source-image/Dockerfile
    from: src
    to: net-istio-source-image
  skip_if_only_changed: ^.tekton/.*|^.konflux.*|^.github/.*|^rpms.lock.yaml$|^hack/(lib$|[^l].*|l[^i].*|li[^b].*|lib[^/].*)|^OWNERS.*|.*\.md
promotion:
  to:
  - additional_images:
      net-istio-src: src
    namespace: openshift
    tag: knative-v1.16
releases:
  latest:
    release:
      channel: fast
      version: "4.20"
resources:
  '*':
    requests:
      cpu: 500m
      memory: 1Gi
zz_generated_metadata:
  branch: release-v1.16
  org: openshift-knative
  repo: net-istio
  variant: "420"
