base_images:
  ocp_ubi-minimal_9:
    name: ubi-minimal
    namespace: ocp
    tag: "9"
  openshift_release_rhel-9-release-golang-1.25-openshift-4.21:
    name: release
    namespace: openshift
    tag: rhel-9-release-golang-1.25-openshift-4.21
build_root:
  project_image:
    dockerfile_path: openshift/ci-operator/build-image/Dockerfile
images:
  items:
  - dockerfile_path: openshift/ci-operator/knative-images/eventmesh/Dockerfile
    inputs:
      ocp_ubi-minimal_9:
        as:
        - $GO_RUNTIME
      openshift_release_rhel-9-release-golang-1.25-openshift-4.21:
        as:
        - $GO_BUILDER
    to: knative-backstage-plugins-eventmesh
  - dockerfile_path: openshift/ci-operator/source-image/Dockerfile
    from: src
    to: knative-backstage-plugins-source-image
  skip_if_only_changed: ^.tekton/.*|^.konflux.*|^.github/.*|^rpms.lock.yaml$|^hack/(lib$|[^l].*|l[^i].*|li[^b].*|lib[^/].*)|^OWNERS.*|.*\.md
promotion:
  to:
  - additional_images:
      backstage-plugins-src: src
    namespace: openshift
    tag: knative-v1.21
releases:
  latest:
    release:
      channel: fast
      version: "4.21"
resources:
  '*':
    requests:
      cpu: 500m
      memory: 1Gi
zz_generated_metadata:
  branch: release-v1.21
  org: openshift-knative
  repo: backstage-plugins
  variant: "421"
