base_images:
  upi-installer:
    name: "4.21"
    namespace: ocp
    tag: upi-installer
  vsphere-ci-python:
    name: vsphere-python
    namespace: ci
    tag: latest
binary_build_commands: make linux-amd64
build_root:
  image_stream_tag:
    name: release
    namespace: openshift
    tag: rhel-9-release-golang-1.25-openshift-4.23
releases:
  initial:
    integration:
      name: "4.22"
      namespace: ocp
  initial-minor:
    release:
      channel: fast
      version: "4.21"
  latest:
    candidate:
      product: ocp
      stream: nightly
      version: "4.22"
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
  upi-installer:
    requests:
      cpu: "3"
      memory: 5Gi
tests:
- as: platform-none-vsphere
  cron: 0 0 * * 3
  steps:
    cluster_profile: vsphere-elastic
    workflow: opct-test-platform-none-vsphere
- as: platform-none-vsphere-upgrade
  cron: 0 1 * * 3
  steps:
    cluster_profile: vsphere-elastic
    env:
      OPCT_RUN_MODE: upgrade
      UPGRADE_TO_CHANNEL_TYPE: candidate
    workflow: opct-test-platform-none-vsphere
- as: platform-external-vsphere
  cron: 0 2 * * 3
  steps:
    cluster_profile: vsphere-elastic
    env:
      PLATFORM_NAME: vsphere
    workflow: opct-test-platform-external-vsphere
- as: platform-external-vsphere-upgrade
  cron: 0 3 * * 3
  steps:
    cluster_profile: vsphere-elastic
    env:
      OPCT_RUN_MODE: upgrade
      UPGRADE_TO_CHANNEL_TYPE: candidate
    workflow: opct-test-platform-external-vsphere
zz_generated_metadata:
  branch: main
  org: redhat-openshift-ecosystem
  repo: opct
  variant: "4.22"
