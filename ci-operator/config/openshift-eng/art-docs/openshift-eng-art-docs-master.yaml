build_root:
  image_stream_tag:
    name: release
    namespace: openshift
    tag: rhel-9-release-golang-1.23-openshift-4.20
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: art-pre-commit-check
  optional: true
  steps:
    test:
    - ref: ocp-art-validate-pre-commit-hooks
- as: security
  optional: true
  steps:
    env:
      PROJECT_NAME: openshift-eng/art-docs
    workflow: openshift-ci-security
zz_generated_metadata:
  branch: master
  org: openshift-eng
  repo: art-docs
