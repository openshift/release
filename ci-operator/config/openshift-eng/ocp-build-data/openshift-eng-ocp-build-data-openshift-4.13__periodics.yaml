build_root:
  image_stream_tag:
    name: release
    namespace: openshift
    tag: rhel-9-release-golang-1.23-openshift-4.20
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: art-konflux-delivery-repo-check
  capabilities:
  - intranet
  cron: 0 8 * * 2
  reporter_config:
    channel: '#art-release'
    job_states_to_report:
    - failure
    - error
    report_template: |
      ':red_jenkins_circle: Job *{{.Spec.Job}}* ended with *{{.Status.State}}*. <{{.Status.URL}}|View logs>'
  restrict_network_access: false
  steps:
    env:
      OCP_VERSION: "4.13"
    workflow: ocp-art
zz_generated_metadata:
  branch: openshift-4.13
  org: openshift-eng
  repo: ocp-build-data
  variant: periodics
