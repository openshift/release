build_root:
  project_image:
    dockerfile_literal: |-
      FROM quay-proxy.ci.openshift.org/openshift/ci:ocp_ubi-python-311_9
      RUN pip install --no-cache-dir yamllint
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: yamllint
  commands: find . -name '*.yaml' -o -name '*.yml' | xargs yamllint --strict
  container:
    from: src
zz_generated_metadata:
  branch: main
  org: openshift-eng
  repo: chai-bot-config
