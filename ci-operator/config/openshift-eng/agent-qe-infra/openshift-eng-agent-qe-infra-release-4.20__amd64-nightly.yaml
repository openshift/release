base_images:
  cli:
    name: "4.20"
    namespace: ocp
    tag: cli
  tools:
    name: "4.20"
    namespace: ocp
    tag: tools
  upi-installer:
    name: "4.20"
    namespace: ocp
    tag: upi-installer
releases:
  latest:
    candidate:
      architecture: amd64
      product: ocp
      stream: nightly
      version: "4.20"
  target:
    candidate:
      architecture: amd64
      product: ocp
      stream: nightly
      version: "4.20"
resources:
  '*':
    limits:
      memory: 8Gi
    requests:
      cpu: "1"
      memory: 1Gi
tests:
- as: baremetal-3-plus-1-agent-ipv4-static-f28
  capabilities:
  - intranet
  cron: 25 16 2 * *
  reporter_config:
    channel: '#team-qe-agent-prow'
    job_states_to_report:
    - failure
    - error
    report_template: Job *{{.Spec.Job}}* ended with *{{.Status.State}}*. <{{.Status.URL}}|View
      logs> <!subteam^S07UT7GM17W> Please check
  steps:
    cluster_profile: equinix-ocp-metal-qe
    env:
      AUX_HOST: openshift-qe-metal-ci.arm.eng.rdu2.redhat.com
      RESERVE_BOOTSTRAP: "false"
      architecture: amd64
    test:
    - chain: cucushift-installer-check-cluster-health
    workflow: baremetal-lab-agent-install-network-static-3-plus-1
