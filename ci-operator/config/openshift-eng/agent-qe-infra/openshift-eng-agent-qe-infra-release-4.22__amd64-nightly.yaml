    namespace: ocp
    tag: tools
  upi-installer:
    name: "4.22"
    namespace: ocp
    tag: upi-installer
releases:
  latest:
    candidate:
      architecture: amd64
      product: ocp
      stream: nightly
      version: "4.22"
  target:
    candidate:
      architecture: amd64
      product: ocp
      stream: nightly
      version: "4.22"
