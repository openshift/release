base_images:
  cli:
    name: "5.0"
    namespace: ocp
    tag: cli
  tools:
    name: "5.0"
    namespace: ocp
    tag: tools
  upi-installer:
    name: "5.0"
    namespace: ocp
    tag: upi-installer
releases:
  latest:
    release:
      architecture: amd64
      channel: candidate
      version: "5.0"
  target:
    release:
      architecture: amd64
      channel: candidate
      version: "5.0"
resources:
  '*':
    limits:
      memory: 8Gi
    requests:
      cpu: "1"
      memory: 1Gi
tests:
- as: baremetal-pxe-sno-agent-ipv4-static-connected-fips-f14
  capabilities:
  - intranet
  cron: 2 2 6,20 * *
  reporter_config:
    channel: '#team-qe-agent-prow'
    job_states_to_report:
    - failure
    - error
    report_template: Job *{{.Spec.Job}}* ended with *{{.Status.State}}*. <{{.Status.URL}}|View
      logs> <!subteam^S07UT7GM17W> Please check
  steps:
    allow_skip_on_success: true
    cluster_profile: equinix-ocp-metal-qe
    env:
      AGENT_PLATFORM_TYPE: none
      AUX_HOST: openshift-qe-metal-ci.arm.eng.rdu2.redhat.com
      FIPS_ENABLED: "true"
      IMAGE_POLICY_DISABLED: "false"
      RESERVE_BOOTSTRAP: "false"
      architecture: amd64
      ipv4_enabled: "true"
      ipv6_enabled: "false"
      masters: "1"
      workers: "0"
    test:
    - chain: cucushift-installer-check-cluster-health
    workflow: baremetal-lab-agent-install-pxe
zz_generated_metadata:
  branch: release-5.0
  org: openshift-eng
  repo: agent-qe-infra
  variant: amd64-stable
