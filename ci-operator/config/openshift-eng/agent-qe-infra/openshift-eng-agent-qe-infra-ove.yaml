base_images:
  cli:
    name: "4.21"
    namespace: ocp
    tag: cli
  tools:
    name: "4.21"
    namespace: ocp
    tag: tools
  upi-installer:
    name: "4.21"
    namespace: ocp
    tag: upi-installer
releases:
  latest:
    prerelease:
      product: ocp
      version_bounds:
        lower: 4.21.0-0
        stream: 4-stable
        upper: 4.22.0-0
resources:
  '*':
    limits:
      memory: 8Gi
    requests:
      cpu: "1"
      memory: 1Gi
