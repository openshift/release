build_root:
  image_stream_tag:
    name: release
    namespace: openshift
    tag: rhel-9-release-golang-1.25-openshift-4.22
images:
  items:
  - dockerfile_path: images/Dockerfile
    from: src
    to: latest
promotion:
  to:
  - name: claude-ai-helpers
    namespace: ci
resources:
  '*':
    limits:
      memory: 2Gi
    requests:
      cpu: "1"
      memory: 2Gi
tests:
