base_images:
  ubi-python-312:
    name: ubi-python-312
    namespace: ocp
    tag: "10"
build_root:
  image_stream_tag:
    name: release
    namespace: openshift
    tag: rhel-9-release-golang-1.25-openshift-4.22
images:
  items:
  - dockerfile_path: images/Dockerfile
    from: src
    to: latest
  - dockerfile_literal: |
      FROM ubi-python-312
      COPY . /workspace/
      WORKDIR /workspace
    from: ubi-python-312
    inputs:
      src:
        paths:
        - destination_dir: .
          source_path: /go/src/github.com/openshift-eng/ai-helpers
    to: python-scanner
promotion:
  to:
  - name: claude-ai-helpers
    namespace: ci
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: security
  steps:
    test:
    - ref: openshift-harness-security-scan
zz_generated_metadata:
  branch: main
  org: openshift-eng
  repo: ai-helpers
