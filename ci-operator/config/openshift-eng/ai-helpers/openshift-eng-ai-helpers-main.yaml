build_root:
  image_stream_tag:
    name: release
    namespace: openshift
    tag: rhel-9-release-golang-1.25-openshift-4.22
images:
  items:
  - dockerfile_path: images/Dockerfile
    from: src
    to: latest
promotion:
  to:
  - name: claude-ai-helpers
    namespace: ci
resources:
  '*':
    limits:
      memory: 2Gi
    requests:
      cpu: "1"
      memory: 2Gi
tests:
- always_run: false
  as: eval-payload-analysis
  optional: true
  steps:
    env:
      EVAL_CONFIG: plugins/ci/evals/eval-payload-analysis.yaml
      EVAL_MAX_TURNS: "2500"
      EVAL_MODEL: claude-opus-4-6
      EVAL_PARALLELISM: "5"
      EVAL_SETUP_SCRIPT: plugins/ci/evals/scripts/extract-payload-analysis-snapshots.sh
    workflow: openshift-claude-agent-eval
- as: eval-payload-analysis-changed
  optional: true
  run_if_changed: ^plugins/ci/evals/cases/payload-analysis/
  steps:
    env:
      EVAL_CASES_DIR: plugins/ci/evals/cases/payload-analysis
      EVAL_CHANGED_ONLY: "true"
      EVAL_CONFIG: plugins/ci/evals/eval-payload-analysis.yaml
      EVAL_MAX_TURNS: "2500"
      EVAL_MODEL: claude-opus-4-6
      EVAL_PARALLELISM: "5"
      EVAL_SETUP_SCRIPT: plugins/ci/evals/scripts/extract-payload-analysis-snapshots.sh
    workflow: openshift-claude-agent-eval
- always_run: false
  as: eval-payload-analysis-minimal
  optional: true
  steps:
    env:
      EVAL_CASES: case-003
      EVAL_CONFIG: plugins/ci/evals/eval-payload-analysis.yaml
      EVAL_MAX_TURNS: "250"
      EVAL_MODEL: claude-opus-4-6
      EVAL_SETUP_SCRIPT: plugins/ci/evals/scripts/extract-payload-analysis-snapshots.sh
    workflow: openshift-claude-agent-eval
- always_run: false
  as: eval-classify-review-comment
  optional: true
  steps:
    env:
      EVAL_CONFIG: plugins/code-review/evals/eval-classify-review-comment.yaml
      EVAL_MODEL: claude-opus-4-6
      EVAL_PARALLELISM: "5"
    workflow: openshift-claude-agent-eval
- always_run: false
  as: eval-address-reviews
  optional: true
  steps:
    env:
      EVAL_CONFIG: plugins/utils/evals/eval-address-reviews.yaml
      EVAL_MODEL: claude-opus-4-6
      EVAL_PARALLELISM: "5"
    workflow: openshift-claude-agent-eval
zz_generated_metadata:
  branch: main
  org: openshift-eng
  repo: ai-helpers
