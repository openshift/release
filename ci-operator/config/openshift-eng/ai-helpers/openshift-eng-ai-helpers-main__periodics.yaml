base_images:
  claude-ai-helpers:
    name: claude-ai-helpers
    namespace: ci
    tag: latest
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: bulk-triage-dry-run
  cron: 0 6 * * *
  steps:
    env:
      TRIAGE_COMPONENTS: Installer Unknown
      TRIAGE_VIEW: ""
    test:
    - ref: openshift-claude-bulk-triage
- as: eval-payload-analysis
  cron: '@yearly'
  steps:
    env:
      EVAL_CONFIG: plugins/ci/evals/eval-payload-analysis.yaml
      EVAL_MAX_TURNS: "2500"
      EVAL_MODEL: claude-opus-4-6
      EVAL_PARALLELISM: "5"
      EVAL_SETUP_SCRIPT: plugins/ci/evals/scripts/extract-payload-analysis-snapshots.sh
    workflow: openshift-claude-agent-eval
- as: eval-ready-to-solve
  cron: '@yearly'
  steps:
    env:
      EVAL_CONFIG: plugins/jira/evals/eval-ready-to-solve.yaml
      EVAL_MODEL: claude-opus-4-6
      EVAL_PARALLELISM: "4"
    workflow: openshift-claude-agent-eval
zz_generated_metadata:
  branch: main
  org: openshift-eng
  repo: ai-helpers
  variant: periodics
