base_images:
  centos:
    name: centos
    namespace: openshift
    tag: stream9
releases:
  latest:
    candidate:
      product: ocp
      stream: ci
      version: "4.18"
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: baremetal-lab-agent-monitoring
  capabilities:
  - intranet
  cron: 0 */2 * * *
  reporter_config:
    channel: '#team-qe-agent-prow'
    job_states_to_report:
    - failure
    - error
    report_template: Job *{{.Spec.Job}}* ended with *{{.Status.State}}*. <{{.Status.URL}}|View
      logs> <!subteam^S09H79P1UMA> Please check
  steps:
    cluster_profile: equinix-ocp-metal-qe
    env:
      AUX_HOST: openshift-qe-metal-ci.arm.eng.rdu2.redhat.com
    workflow: baremetal-lab-agent-monitoring
zz_generated_metadata:
  branch: monitoring
  org: openshift-eng
  repo: baremetal-qe-infra
