base_images:
  shellcheck:
    name: shellcheck
    namespace: ci
    tag: latest
build_root:
  image_stream_tag:
    name: release
    namespace: openshift
    tag: rhel-9-release-golang-1.24-openshift-4.20
images:
  items:
  - dockerfile_path: images/Containerfile.ci
    from: root
    to: two-node-toolbox
promotion:
  to:
  - name: two-node-toolbox
    namespace: ci
releases:
  latest:
    integration:
      include_built_images: true
      name: "4.22"
      namespace: ocp
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: shellcheck
  commands: make shellcheck
  container:
    from: shellcheck
  run_if_changed: (^deploy/)|(\.sh$)|(^\.ci-operator\.yaml$)
- as: e2e-metal-ovn-two-node-fencing-assisted
  optional: true
  steps:
    cluster_profile: equinix-edge-enablement
    workflow: baremetalds-two-node-fencing-assisted
zz_generated_metadata:
  branch: main
  org: openshift-eng
  repo: two-node-toolbox
