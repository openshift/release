base_images:
  cyborg-python:
    name: cyborg-python
    namespace: continuous-release-jobs
    tag: latest
build_root:
  project_image:
    dockerfile_literal: |-
      FROM registry.ci.openshift.org/ocp/ubi-python-311:9
      USER 0
      RUN pip install --no-cache-dir ruff pip-audit
images:
  items:
  - dockerfile_path: Dockerfile
    from: src
    inputs:
      cyborg-python:
        as:
        - registry.access.redhat.com/ubi9/python-312
    to: ship-help-bot
promotion:
  to:
  - namespace: ci
    tag: latest
prowgen:
  expose: true
  private: true
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: lint
  commands: make lint
  container:
    from: src
zz_generated_metadata:
  branch: main
  org: openshift-eng
  repo: ship-help-bot
