build_root:
  project_image:
    dockerfile_literal: |-
      FROM registry.ci.openshift.org/ocp/ubi-python-311:9
      USER 0
      RUN pip install --no-cache-dir claudelint
prowgen:
  expose: true
  private: true
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: lint
  commands: claudelint -v --strict
  container:
    from: src
zz_generated_metadata:
  branch: main
  org: openshift-eng
  repo: olm-team-ai-helpers
