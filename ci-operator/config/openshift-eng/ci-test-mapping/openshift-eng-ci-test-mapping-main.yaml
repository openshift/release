build_root:
  project_image:
    dockerfile_path: Dockerfile.buildroot
resources:
  '*':
    limits:
      cpu: 100m
      memory: 200Mi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: lint
  commands: HOME=/tmp make lint
  container:
    from: src
- as: mapping
  commands: HOME=/tmp ./hack/ci-mapping.sh
  container:
    from: src
- as: unit
  commands: HOME=/tmp ./hack/ci-test.sh
  container:
    from: src
zz_generated_metadata:
  branch: main
  org: openshift-eng
  repo: ci-test-mapping
