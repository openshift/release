base_images:
  nested-podman:
    name: nested-podman
    namespace: ci
    tag: latest
build_root:
  project_image:
    dockerfile_literal: |-
      FROM registry.access.redhat.com/ubi9/python-312

      USER root

      ENV GO_VERSION=1.24.3
      ENV PATH="/usr/local/go/bin:$PATH"

      RUN dnf install -y tar gzip git make && \
          curl -Ls https://golang.org/dl/go${GO_VERSION}.linux-amd64.tar.gz | \
          tar -C /usr/local -zxvf - go/ && \
          python -m pip install uv

      # Prow expects to be able to check out a repo under /go
      RUN mkdir -p /go && \
      chown 1001:1001 /go && \
      chmod 755 /go

      WORKDIR /go
      USER 1001:1001
images:
  items:
  - dockerfile_literal: |
      FROM nested-podman
      USER root
      RUN dnf install -y git go make tar gzip gpgme gpgme-devel pkgconfig jq python3.12 python3.12-devel python3.12-pip && dnf clean all
      RUN ln -s /usr/bin/podman /usr/local/bin/docker
      COPY src/ /src/
      WORKDIR /src/rebasebot
      RUN python3.12 -m pip install --no-cache-dir uv yq && python3.12 -m pip install .
      WORKDIR /working
      RUN rm -rf /src && chmod -R a+rwX,o-w /working
      USER 1001:1001
    from: nested-podman
    inputs:
      src:
        paths:
        - destination_dir: src
          source_path: /go/src/github.com/openshift-eng/rebasebot
    to: rebasebot-podman
  - dockerfile_path: Containerfile
    to: rebasebot
promotion:
  to:
  - namespace: ci
    tag: latest
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
test_binary_build_commands: make deps
tests:
- as: unit
  commands: make deps && make unittests
  container:
    from: src
- as: lint
  commands: make deps && make lint
  container:
    from: src
zz_generated_metadata:
  branch: main
  org: openshift-eng
  repo: rebasebot
