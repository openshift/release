base_images:
  cerberus:
    name: cerberus
    namespace: chaos
    tag: cerberus-prow
  ocp-qe-perfscale-ci:
    name: ocp-qe-perfscale-ci
    namespace: ci
    tag: latest
build_root:
  image_stream_tag:
    name: ci-tools-build-root
    namespace: ci
    tag: latest
releases:
  latest:
    release:
      channel: stable
      version: "4.18"
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- always_run: false
  as: rhoso-self-sched
  capabilities:
  - intranet
  reporter_config:
    channel: '#forum-rhos-scale'
    job_states_to_report:
    - success
    - failure
    - error
    report_template: '{{if eq .Status.State "success"}} :white_check_mark: Job *{{.Spec.Job}}*
      ended with *{{.Status.State}}*. <{{.Status.URL}}|View logs> :white_check_mark:
      {{else}} :warning:  Job *{{.Spec.Job}}* ended with *{{.Status.State}}*. <{{.Status.URL}}|View
      logs> :warning: {{end}}'
  restrict_network_access: false
  steps:
    cluster_profile: metal-perfscale-osp-selfsched
    env:
      MODEL: R640
      NUM_SERVERS: "7"
      PUBLIC_VLAN: "false"
      WORKLOAD: keystone
    pre:
    - ref: openshift-qe-installer-bm-self-sched
    test:
    - ref: openshift-qe-installer-bm-ping
    - ref: openshift-qe-installer-bm-prereqs
    - ref: openshift-qe-installer-bm-deploy
    - ref: openshift-qe-cluster-health
    - ref: openshift-qe-rhoso-installer-pre-provisioned
    - ref: openshift-qe-rhoso-browbeat-install
    - ref: openshift-qe-rhoso-browbeat-run
    - ref: openshift-qe-rhoso-browbeat-results-backup
zz_generated_metadata:
  branch: main
  org: openshift-eng
  repo: ocp-qe-perfscale-ci
  variant: metal-rhoso-selfsched-x86
