build_root:
  image_stream_tag:
    name: ci-tools-build-root
    namespace: ci
    tag: latest
releases:
  initial:
    candidate:
      product: ocp
      relative: 1
      stream: nightly
      version: "4.22"
  latest:
    candidate:
      product: ocp
      stream: nightly
      version: "4.22"
  multi-latest:
    candidate:
      architecture: multi
      product: ocp
      stream: nightly
      version: "4.22"
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: ibmcloud-data-path-9nodes
  cron: 0 10 3,18 * *
  steps:
    allow_skip_on_success: true
    cluster_profile: ibmcloud-qe
    env:
      COMPUTE_NODE_TYPE: bx2-8x32
      OPENSHIFT_INFRA_NODE_INSTANCE_TYPE: bx2-16x64
      SET_ENV_BY_PLATFORM: custom
      WORKERS: "9"
    test:
    - ref: workers-scale
    - ref: openshift-qe-perfscale-ibm-data-path-sg
    - chain: openshift-qe-data-path-tests
    workflow: openshift-qe-installer-ibmcloud-ipi-ovn
- as: nutanix-data-path-9nodes
  capabilities:
  - sshd-bastion
  cron: 0 11 4,19 * *
  steps:
    allow_skip_on_success: true
    cluster_profile: nutanix-qe-zone
    env:
      COMPUTE_CPU: "8"
      COMPUTE_MEMORY: "32000"
      COMPUTE_REPLICAS: "3"
      OPENSHIFT_INFRA_NODE_INSTANCE_MEMORYSIZE: 64Gi
      OPENSHIFT_INFRA_NODE_INSTANCE_VCPU: "16"
      SET_ENV_BY_PLATFORM: custom
      WORKER_REPLICA_COUNT: "6"
    test:
    - chain: workers-scale
    - chain: create-infra-move-ingress-monitoring-registry
    - chain: openshift-qe-data-path-tests
    workflow: cucushift-installer-rehearse-nutanix-ipi-zones-customized-resource
- as: gcp-data-path-9nodes
  cron: 0 12 5,20 * *
  steps:
    allow_skip_on_success: true
    cluster_profile: gcp-perfscale-qe
    env:
      COMPUTE_NODE_REPLICAS: "9"
      COMPUTE_NODE_TYPE: n1-standard-8
      CONTROL_PLANE_NODE_TYPE: n1-standard-8
      OPENSHIFT_INFRA_NODE_INSTANCE_TYPE: n1-standard-16
    test:
    - ref: openshift-qe-perfscale-gcp-data-path-fw
    - chain: openshift-qe-data-path-tests
    workflow: openshift-qe-installer-gcp-ipi-ovn-etcd-encryption-fips
- always_run: false
  as: data-path-9nodes
  steps:
    allow_skip_on_success: true
    cluster_profile: vsphere-connected-2
    env:
      SET_ENV_BY_PLATFORM: custom
      WORKER_REPLICA_COUNT: "9"
    test:
    - chain: workers-scale
    - chain: openshift-qe-data-path-tests
    workflow: openshift-qe-installer-vsphere-ipi-ovn
  timeout: 8h0m0s
- as: data-path-multi-9nodes
  cron: 0 3 2 * *
  steps:
    cluster_profile: azure-qe
    dependencies:
      OPENSHIFT_INSTALL_RELEASE_IMAGE_OVERRIDE: release:multi-latest
    env:
      ADDITIONAL_WORKER_ARCHITECTURE: aarch64
      ADDITIONAL_WORKER_VM_TYPE: Standard_D8ps_v5
      ADDITIONAL_WORKERS: "3"
      BASE_DOMAIN: qe.azure.devcluster.openshift.com
      COMPUTE_NODE_REPLICAS: "3"
      COMPUTE_NODE_TYPE: Standard_D8s_v5
      CONTROL_PLANE_INSTANCE_TYPE: Standard_D4s_v5
      CUSTOM_AZURE_REGION: westus2
      OCP_ARCH: amd64
      OPENSHIFT_INFRA_NODE_INSTANCE_TYPE: Standard_E16s_v3
      SET_ENV_BY_PLATFORM: custom
      TOLERANCE: "99"
      WORKER_REPLICA_COUNT: "9"
    test:
    - ref: ipi-install-heterogeneous
    - chain: workers-scale
    - ref: openshift-qe-perfscale-azu-data-path-nsg
    - chain: openshift-qe-data-path-tests
    workflow: openshift-qe-installer-azure
  timeout: 8h0m0s
zz_generated_metadata:
  branch: main
  org: openshift-eng
  repo: ocp-qe-perfscale-ci
  variant: 4.22-nightly-datapath
