base_images:
  cerberus:
    name: cerberus
    namespace: chaos
    tag: cerberus-prow
  ocp-qe-perfscale-ci:
    name: ocp-qe-perfscale-ci
    namespace: ci
    tag: latest
build_root:
  image_stream_tag:
    name: ci-tools-build-root
    namespace: ci
    tag: latest
releases:
  latest:
    candidate:
      product: ocp
      stream: nightly
      version: "4.22"
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: daily-virt-6nodes
  capabilities:
  - intranet
  cron: 0 8 * * *
  restrict_network_access: false
  steps:
    allow_skip_on_success: true
    cluster_profile: metal-perfscale-cpt
    env:
      BOND: "true"
      CNV_VERSION: "4.22"
      CONFIG: config/standard-scalelab.yml
      INFRA: "true"
      PUBLIC_VLAN: "false"
      RUN_ORION: "true"
      VERSION: "4.22"
      VM: "true"
    post:
    - ref: openshift-qe-installer-bm-must-gather
    test:
    - ref: openshift-qe-installer-bm-day2-label
    - ref: openshift-qe-installer-bm-day2-cnv
    - chain: openshift-qe-data-path-tests
    - ref: openshift-qe-orion-data-path
    - ref: openshift-qe-orion-virt-data-path
    - ref: openshift-qe-virt-udn-density
    - ref: openshift-qe-orion-virt-udn-density
    - ref: openshift-qe-virt-density-nomount
    - ref: openshift-qe-orion-virt-density-nomount
    workflow: openshift-qe-installer-bm-deploy
- as: udn-bgp
  capabilities:
  - intranet
  cron: 0 17 * * 2
  restrict_network_access: false
  steps:
    cluster_profile: metal-perfscale-cpt
    env:
      INFRA: "false"
      NETWORK_WORKLOAD: udn-bgp
      NUM_NODES: "9"
      NUM_WORKER_NODES: "24"
      PUBLIC_VLAN: "false"
      STARTING_NODE: "1"
      TYPE: vmno
    post:
    - ref: openshift-qe-installer-bm-day2-network-workloads-post
    test:
    - ref: openshift-qe-installer-bm-ping
    - ref: openshift-qe-installer-bm-poweroff
    - ref: openshift-qe-installer-bm-foreman
    - ref: openshift-qe-installer-bm-prereqs
    - ref: openshift-qe-installer-bm-deploy
    - ref: openshift-qe-cluster-health
    - ref: openshift-qe-installer-bm-day2-label
    - ref: openshift-qe-installer-bm-day2-network-workloads
    - ref: openshift-qe-udn-bgp
- as: weekly-telco-core-cpt
  capabilities:
  - intranet
  cron: 0 17 * * 5
  restrict_network_access: false
  steps:
    cluster_profile: metal-perfscale-cpt
    env:
      CHURN_CYCLES: "2"
      CHURN_PERCENT: "50"
      EXTRA_FLAGS: --perf-profile=cpt-pao --gc-metrics=true --gc=true
      ITERATIONS: "15"
      LABEL: node-role.kubernetes.io/worker-dpdk,node-role.kubernetes.io/worker-metallb
      TELCO: "true"
    test:
    - ref: openshift-qe-installer-bm-day2-label
    - ref: openshift-qe-installer-bm-day2-sriov
    - ref: openshift-qe-installer-bm-day2-metallb
    - ref: openshift-qe-installer-bm-day2-perf-profile-rds-core
    - ref: openshift-qe-rds-core
    workflow: openshift-qe-installer-bm-deploy
zz_generated_metadata:
  branch: main
  org: openshift-eng
  repo: ocp-qe-perfscale-ci
  variant: metal-4.22-nightly-x86
