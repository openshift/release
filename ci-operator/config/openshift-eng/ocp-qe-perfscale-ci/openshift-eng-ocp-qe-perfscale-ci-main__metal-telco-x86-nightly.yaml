base_images:
  cerberus:
    name: cerberus
    namespace: chaos
    tag: cerberus-prow
  ocp-qe-perfscale-ci:
    name: ocp-qe-perfscale-ci
    namespace: ci
    tag: latest
build_root:
  image_stream_tag:
    name: ci-tools-build-root
    namespace: ci
    tag: latest
releases:
  latest:
    candidate:
      product: ocp
      stream: nightly
      version: "4.22"
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: regulus-jetlag
  capabilities:
  - intranet
  cron: 0 17 * * 0
  restrict_network_access: false
  steps:
    cluster_profile: metal-perfscale-jetlag
    env:
      CRUCIBLE: "true"
    test:
    - ref: openshift-qe-installer-bm-regulus
    workflow: openshift-qe-installer-bm-deploy
  timeout: 8h0m0s
zz_generated_metadata:
  branch: main
  org: openshift-eng
  repo: ocp-qe-perfscale-ci
  variant: metal-telco-x86-nightly
