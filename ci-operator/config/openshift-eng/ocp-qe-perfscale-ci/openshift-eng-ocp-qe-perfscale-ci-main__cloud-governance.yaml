base_images:
  latest:
    name: cloud-governance
    namespace: ci
    tag: latest
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: perfscale-tagging
  capabilities:
  - intranet
  optional: true
  reporter_config:
    channel: '#forum-cloud-governance-ci'
    job_states_to_report:
    - success
    - failure
    - error
    report_template: '{{if eq .Status.State "success"}} :white_check_mark: Job *{{.Spec.Job}}*
      ended with *{{.Status.State}}*. <{{.Status.URL}}|View logs> :white_check_mark:
      {{else}} :warning:  Job *{{.Spec.Job}}* ended with *{{.Status.State}}*. <{{.Status.URL}}|View
      logs> :warning: {{end}}'
  restrict_network_access: false
  steps:
    env:
      account_group: perfscale
    test:
    - ref: openshift-qe-cloud-governance-tagging
- as: ecoeng-01-tagging
  capabilities:
  - intranet
  optional: true
  reporter_config:
