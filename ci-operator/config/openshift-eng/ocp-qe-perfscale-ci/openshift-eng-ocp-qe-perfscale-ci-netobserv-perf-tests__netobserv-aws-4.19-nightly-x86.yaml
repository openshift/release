
build_root:
  image_stream_tag:
    name: ci-tools-build-root
    namespace: ci
    tag: latest
releases:
  latest:
    candidate:
      product: ocp
      stream: nightly
      version: "4.19"
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: node-density-heavy-25nodes
  cron: '@weekly'
  steps:
    allow_skip_on_success: true
    cluster_profile: aws-perfscale-qe
    env:
      BASE_DOMAIN: qe.devcluster.openshift.com
      COMPUTE_NODE_REPLICAS: "25"
      COMPUTE_NODE_TYPE: m6i.4xlarge
      ES_BENCHMARK_INDEX: prod-netobserv-datapoints*
      ES_METADATA_INDEX: perf_scale_ci*
      ES_TYPE: qe
      EXTRA_FLAGS: --es-index=prod-netobserv-datapoints --metrics-profile metrics-aggregated.yml,https://raw.githubusercontent.com/openshift-qe/ocp-qe-perfscale-ci/refs/heads/netobserv-perf-tests/scripts/queries/netobserv_prometheus_queries.yaml
      HUNTER_ANALYZE: "false"
      KAFKA_CONSUMER_REPLICAS: "6"
      LOKISTACK_SIZE: 1x.small
      LOOKBACK: "90"
      LOOKBACK_SIZE: "15"
      ORION_CONFIG: https://github.com/cloud-bulldozer/orion/blob/3ccfb0437810057c546656689b427373159fa4de/examples/netobserv-node-density-heavy.yaml
      ORION_ENVS: PLATFORM=AWS
      PODS_PER_NODE: "200"
      RUN_ORION: "true"
      VERSION: "4.19"
      ZONES_COUNT: "3"
    test:
    - ref: netobserv-perf-test-deploy
    - chain: openshift-qe-node-density-heavy
    # TODO: add a step to wait until ingress-perf observer finishes
    - ref: openshift-qe-orion
    - ref: netobserv-perf-test-cleanup
    observers:
      enable:
      - netobserv-perf-test-ingress-perf
      - redhat-chaos-cerberus
    workflow: openshift-qe-installer-aws
- as: cluster-density-v2-250nodes
  cron: '@monthly'
  steps:
    allow_skip_on_success: true
    cluster_profile: aws-perfscale-qe
    env:
      BASE_DOMAIN: qe.devcluster.openshift.com
      COMPUTE_NODE_REPLICAS: "250"
      COMPUTE_NODE_TYPE: m6i.4xlarge
      ES_BENCHMARK_INDEX: prod-netobserv-datapoints*
      ES_METADATA_INDEX: perf_scale_ci*
      ES_TYPE: qe
      EXTRA_FLAGS: --churn=true --churn-delay=60s --churn-duration=10m --churn-percent=10
        --timeout=5h --es-index=prod-netobserv-datapoints --metrics-profile metrics-aggregated.yml,https://raw.githubusercontent.com/openshift-qe/ocp-qe-perfscale-ci/refs/heads/netobserv-perf-tests/scripts/queries/netobserv_prometheus_queries.yaml
      HUNTER_ANALYZE: "false"
      ITERATION_MULTIPLIER_ENV: "4"
      KAFKA_CONSUMER_REPLICAS: "18"
      LOKISTACK_SIZE: 1x.medium
      LOOKBACK: "90"
      LOOKBACK_SIZE: "15"
      ORION_CONFIG: https://raw.githubusercontent.com/cloud-bulldozer/orion/3ccfb0437810057c546656689b427373159fa4de/examples/netobserv-cluster-density-v2.yaml
      ORION_ENVS: PLATFORM=AWS
      RUN_ORION: "true"
      VERSION: "4.19"
      ZONES_COUNT: "3"
    test:
    - ref: netobserv-perf-test-deploy
    - chain: openshift-qe-cluster-density-v2
    # TODO: add a step to wait until ingress-perf observer finishes
    - ref: openshift-qe-orion
    - ref: netobserv-perf-test-cleanup
    observers:
      enable:
      - netobserv-perf-test-ingress-perf
      - redhat-chaos-cerberus
    workflow: openshift-qe-installer-aws
  timeout: 5h0m0s
zz_generated_metadata:
  branch: netobserv-perf-tests
  org: openshift-eng
  repo: ocp-qe-perfscale-ci
  variant: netobserv-aws-4.19-nightly-x86
