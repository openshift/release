build_root:
  image_stream_tag:
    name: ci-tools-build-root
    namespace: ci
    tag: latest
images:
- dockerfile_path: Dockerfile.prow
  to: netobserv-perfscale
promotion:
  to:
  - namespace: netobserv
    tag: ci
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: test-deploy
  cluster_claim:
    architecture: amd64
    cloud: aws
    labels:
      region: us-east-1
    owner: obs-netobserv
    product: ocp
    timeout: 1h30m0s
    version: "4.18"
  run_if_changed: scripts/
  steps:
    post:
    - ref: netobserv-perf-test-cleanup
    test:
    - ref: netobserv-perf-test-deploy
    workflow: generic-claim
zz_generated_metadata:
  branch: netobserv-perf-tests
  org: openshift-eng
  repo: ocp-qe-perfscale-ci
