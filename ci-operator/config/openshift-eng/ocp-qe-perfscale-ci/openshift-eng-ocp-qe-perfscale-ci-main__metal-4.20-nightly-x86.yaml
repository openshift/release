base_images:
  cerberus:
    name: cerberus
    namespace: chaos
    tag: cerberus-prow
  ocp-qe-perfscale-ci:
    name: ocp-qe-perfscale-ci
    namespace: ci
    tag: latest
build_root:
  image_stream_tag:
    name: ci-tools-build-root
    namespace: ci
    tag: latest
releases:
  latest:
    candidate:
      product: ocp
      stream: nightly
      version: "4.20"
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: weekly-telco-core-cpt
  capabilities:
  - intranet
  cron: 0 17 * * 4
  reporter_config:
    channel: '#ocp-qe-scale-ci-results'
    job_states_to_report:
    - success
    - failure
    - error
    report_template: '{{if eq .Status.State "success"}} :white_check_mark: Job *{{.Spec.Job}}*
      ended with *{{.Status.State}}*. <{{.Status.URL}}|View logs> :white_check_mark:
      {{else}} :warning:  Job *{{.Spec.Job}}* ended with *{{.Status.State}}*. <{{.Status.URL}}|View
      logs> :warning: {{end}}'
  restrict_network_access: false
  steps:
    cluster_profile: metal-perfscale-cpt
    env:
      CHURN_CYCLES: "2"
      CHURN_PERCENT: "50"
      EXTRA_FLAGS: --perf-profile=cpt-pao --gc-metrics=false --gc=true
      ITERATIONS: "15"
      LABEL: node-role.kubernetes.io/worker-dpdk,node-role.kubernetes.io/worker-metallb
      ND_CNI_EXTRA_FLAGS: --churn-cycles 3 --selector="node-role.kubernetes.io/node-density-cni-workload="
        --churn-delay 2m --churn-percent 100 --num-sriovs=1 --sriov-networkname sriov-net-node-density
      NODE_DENSITY_CNI_WORKLOAD: "true"
      PODS_PER_NODE: "80"
      RUN_ORION: "true"
      TELCO: "true"
    test:
    - ref: openshift-qe-installer-bm-day2-label
    - ref: openshift-qe-installer-bm-day2-sriov
    - ref: openshift-qe-installer-bm-day2-metallb
    - ref: openshift-qe-installer-bm-day2-perf-profile-rds-core
    - ref: openshift-qe-node-density-cni
    - ref: openshift-qe-rds-core
    - ref: openshift-qe-orion-rds-core
    workflow: openshift-qe-installer-bm-deploy
- as: daily-node-density-cni-sriov-mlx
  capabilities:
  - intranet
  cron: 0 17 * * *
  restrict_network_access: false
  steps:
    cluster_profile: metal-perfscale-telco
    env:
      JETLAG_LATEST: "true"
      ND_CNI_EXTRA_FLAGS: --churn-cycles 3 --selector="node-role.kubernetes.io/worker="
        --churn-delay 2m --churn-percent 100 --num-sriovs=1 --sriov-networkname sriov-net-node-density
      NODE_DENSITY_CNI_WORKLOAD: "true"
      OCP_INVENTORY_OVERRIDE: "true"
      PODS_PER_NODE: "80"
      TYPE: sno
    test:
    - ref: openshift-qe-installer-bm-day2-sriov
    - ref: openshift-qe-installer-bm-day2-perf-profile-rds-core
    - ref: openshift-qe-node-density-cni
    workflow: openshift-qe-installer-bm-deploy
zz_generated_metadata:
  branch: main
  org: openshift-eng
  repo: ocp-qe-perfscale-ci
  variant: metal-4.20-nightly-x86
