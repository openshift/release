base_images:
  ubi:
    name: ubi-python-312
    namespace: ocp
    tag: "9"
build_root:
  from_repository: true
  use_build_cache: true
images:
  items:
  - dockerfile_path: org_tools/images/Dockerfile
    to: cyborg-cli
  - dockerfile_literal: |
      FROM registry.ci.openshift.org/ocp/ubi-python-312:9
      COPY --chown=1001:0 ./org_tools/orglib ./orglib
      RUN pip install --no-cache-dir "./orglib[full]" && rm -rf ./orglib
    from: ubi
    to: cyborg-python
promotion:
  to:
  - namespace: continuous-release-jobs
    tag: latest
prowgen:
  expose: true
  private: true
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: lint
  commands: |
    make ci-lint
  container:
    from: cyborg-cli
- as: typecheck
  commands: |
    make ci-typecheck
  container:
    from: cyborg-cli
- as: tests
  commands: |
    make ci-test
  container:
    from: cyborg-cli
- as: security
  optional: true
  steps:
    env:
      PROJECT_NAME: openshift-eng/cyborg
    workflow: openshift-ci-security
zz_generated_metadata:
  branch: master
  org: openshift-eng
  repo: cyborg
