binary_build_commands: cd go-server && go install .
build_root:
  image_stream_tag:
    name: release
    namespace: openshift
    tag: golang-1.23
images:
  items:
  - dockerfile_path: images/agent-worker.Dockerfile
    to: agent-worker
  - dockerfile_path: images/gh-token-minter.Dockerfile
    to: gh-token-minter
  - dockerfile_path: images/go-server.Dockerfile
    to: go-server
  - dockerfile_path: prow-workflow/input.Dockerfile
    to: workflow-input
promotion:
  to:
  - excluded_images:
    - workflow-input
    name: ai-e2e-agent
    namespace: oape
    tag_by_commit: true
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- always_run: false
  as: run-workflow
  run_if_changed: ^prow-workflow/
  steps:
    pre:
    - as: extract-params
      commands: |
        cp /params.env "${SHARED_DIR}/params.env"
        cat "${SHARED_DIR}/params.env"
      from: workflow-input
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
    - as: mint-gh-token
      commands: |
        set -euo pipefail
        export GH_APP_ID=$(cat /var/run/github-app/app-id)
        export GH_APP_PEM_FILE_PATH="/var/run/github-app/private-key.pem"
        set +x
        python /app/ghpat_server.py > "${SHARED_DIR}/gh-token"
      credentials:
      - mount_path: /var/run/github-app
        name: openshift-app-platform-shift-github-bot
        namespace: test-credentials
      from: gh-token-minter
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
    test:
    - as: agent-workflow
      commands: |
        set -euo pipefail
        source "${SHARED_DIR}/params.env"
        export EP_URL REPO_URL BASE_BRANCH

        set +x
        export GH_TOKEN
        GH_TOKEN=$(cat "${SHARED_DIR}/gh-token")

        export GOOGLE_APPLICATION_CREDENTIALS="/var/run/gcloud-adc/application_default_credentials.json"
        export CLAUDE_CODE_USE_VERTEX="1"
        export CLOUD_ML_REGION="global"
        export ANTHROPIC_VERTEX_PROJECT_ID="itpc-gcp-hcm-pe-eng-claude"
        export ANTHROPIC_MODEL="claude-opus-4-6"
        export PYTHONUNBUFFERED=1

        gh auth setup-git && python3.11 main.py
      credentials:
      - mount_path: /var/run/gcloud-adc
        name: oap-lts-claude-gcp-vertex-sa
        namespace: test-credentials
      from: agent-worker
      resources:
        requests:
          cpu: "1"
          memory: 500Mi
      timeout: 2h30m0s
zz_generated_metadata:
  branch: main
  org: openshift-eng
  repo: oape-ai-e2e
