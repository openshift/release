base_images:
  cli:
    name: "4.20"
    namespace: ocp
    tag: cli
  ubi-micro:
    name: ubi-micro
    namespace: ocp
    tag: "9"
build_root:
  image_stream_tag:
    name: release
    namespace: openshift
    tag: golang-1.24
releases:
  latest:
    candidate:
      product: ocp
      stream: nightly
      version: "4.20"
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: mytest
  cron: 8 8 29 2 *
  steps:
    allow_skip_on_success: true
    cluster_profile: aws
    env:
      TIMEOUT: +68 hours
    test:
    - ref: wait
    workflow: ipi-aws
zz_generated_metadata:
  branch: main
  org: liangxia
  repo: verification-tests
