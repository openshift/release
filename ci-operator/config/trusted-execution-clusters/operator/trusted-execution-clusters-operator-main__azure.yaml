base_images:
  cli:
    name: "4.21"
    namespace: ocp
    tag: cli
build_root:
  image_stream_tag:
    name: builder
    namespace: ocp
    tag: rhel-9-golang-1.25-openshift-4.21
images:
  items:
  - dockerfile_literal: |
      FROM src
      COPY oc /usr/bin/oc
      RUN dnf install -y jq perl-FindBin perl-core python3-pip && \
          dnf clean all
    from: src
    inputs:
      cli:
        paths:
        - destination_dir: .
          source_path: /usr/bin/oc
    to: azure-test-image
  - dockerfile_path: Containerfile
    build_args:
    - name: build_type
      value: release
    to: operator
  - dockerfile_path: compute-pcrs/Containerfile
    build_args:
    - name: build_type
      value: release
    to: compute-pcrs
  - dockerfile_path: register-server/Containerfile
    build_args:
    - name: build_type
      value: release
    to: register-server
  - dockerfile_path: attestation-key-register/Containerfile
    build_args:
    - name: build_type
      value: release
    to: attestation-key-register
releases:
  latest:
    candidate:
      architecture: amd64
      product: ocp
      stream: nightly
      version: "4.21"
resources:
  '*':
    limits:
      memory: 8Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- always_run: false
  as: integration-test
  optional: true
  skip_if_only_changed: ^(\.github|LICENSES|bundle|docs|examples)/|^(README\.md|\.gitignore)$
  steps:
    cluster_profile: openshift-org-aws
    test:
    - ref: trusted-execution-clusters-ref-azure-integration-test
    workflow: ipi-aws
zz_generated_metadata:
  branch: main
  org: trusted-execution-clusters
  repo: operator
  variant: azure
