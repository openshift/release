base_images:
  dev-scripts:
    name: test
    namespace: ocp-kni
    tag: dev-scripts
  osac-installer:
    name: latest
    namespace: osac-project
    tag: osac-installer
build_root:
  image_stream_tag:
    name: release
    namespace: openshift
    tag: rhel-9-release-golang-1.24-openshift-4.21
images:
  items:
  - dockerfile_path: Containerfile
    to: osac-test-infra
  - dockerfile_literal: FROM scratch
    to: component-image
promotion:
  to:
  - excluded_images:
    - component-image
    name: latest
    namespace: osac-project
releases:
  latest:
    candidate:
      product: ocp
      stream: nightly
      version: "4.20"
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: e2e-metal-vmaas-all
  capabilities:
  - intranet
  steps:
    workflow: osac-project-cluster-tool-vmaas
- as: e2e-metal-vmaas-all-periodic
  capabilities:
  - intranet
  cron: 0 2 * * 1
  steps:
    workflow: osac-project-cluster-tool-vmaas
zz_generated_metadata:
  branch: main
  org: osac-project
  repo: osac-test-infra
