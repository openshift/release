images:
  items:
  - dockerfile_path: Containerfile
    to: osac-test-infra
promotion:
  to:
  - name: latest
    namespace: osac-project
releases:
  latest:
    candidate:
      product: ocp
      stream: nightly
      version: "4.20"
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: e2e-metal-vmaas-compute-instance-creation-pr
  capabilities:
  - intranet
  steps:
    cluster_profile: packet-assisted
    env:
      ASSISTED_CONFIG: |
        OLM_OPERATORS=cnv,lvm
        NUM_MASTERS=1
        NUM_WORKERS=0
        MASTER_MEMORY=57344
        MASTER_DISK_COUNT=2
        MASTER_DISK=200000000000
        MASTER_CPU=24
        OPENSHIFT_VERSION=4.20
      TEST: test_compute_instance_creation.py
    workflow: osac-project-ofcir-baremetal
