build_root:
  image_stream_tag:
    name: release
    namespace: openshift
    tag: rhel-9-release-golang-1.24-openshift-4.21
images:
  items:
  - dockerfile_path: Containerfile
    to: osac-test-infra
  - dockerfile_literal: FROM scratch
    to: component-image
promotion:
  to:
  - excluded_images:
    - component-image
    name: latest
    namespace: osac-project
releases:
  latest:
    candidate:
      product: ocp
      stream: nightly
      version: "4.20"
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: e2e-netris-caas
  capabilities:
  - intranet
  cron: 0 */6 * * *
  steps:
    dependencies:
      FULFILLMENT_SERVICE_IMAGE: fulfillment-service-image
      OSAC_AAP_EE_IMAGE: osac-aap-ee-image
      OSAC_INSTALLER_IMAGE: osac-installer
      OSAC_OPERATOR_IMAGE: osac-operator-image
    workflow: osac-project-netris-caas
