base_images:
  assisted-image-service:
    name: backplane-5.0
    namespace: edge-infrastructure
    tag: assisted-image-service
  assisted-installer:
    name: backplane-5.0
    namespace: edge-infrastructure
    tag: assisted-installer
  assisted-installer-agent:
    name: backplane-5.0
    namespace: edge-infrastructure
    tag: assisted-installer-agent
  assisted-installer-controller:
    name: backplane-5.0
    namespace: edge-infrastructure
    tag: assisted-installer-controller
  assisted-service:
    name: backplane-5.0
    namespace: edge-infrastructure
    tag: assisted-service
  assisted-test-infra:
    name: backplane-5.0
    namespace: edge-infrastructure
    tag: assisted-test-infra
  dev-scripts:
    name: test
    namespace: ocp-kni
    tag: dev-scripts
  osac-installer:
    name: latest
    namespace: osac-project
    tag: osac-installer
build_root:
  image_stream_tag:
    name: release
    namespace: openshift
    tag: rhel-9-release-golang-1.24-openshift-4.21
images:
  items:
  - dockerfile_path: Containerfile
    to: osac-test-infra
promotion:
  to:
  - name: latest
    namespace: osac-project
releases:
  latest:
    candidate:
      product: ocp
      stream: nightly
      version: "4.20"
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
# Simple connectivity test against edge-04 dedicated server.
# Verifies SSH access and creates /tmp/i_am_here on the server.
- as: e2e-edge04-hello
  capabilities:
  - intranet
  optional: true
  steps:
    pre:
    - ref: osac-project-edge04-setup
    test:
    - ref: osac-project-edge04-hello
# Unified VMaaS job: deploys SNO+OSAC once, runs all vmaas tests sequentially.
# Replaces the 8 individual per-test jobs (kept below as optional for targeted re-runs).
- as: e2e-metal-vmaas-pr
  capabilities:
  - intranet
  steps:
    cluster_profile: packet-assisted
    env:
      ASSISTED_CONFIG: |
        OLM_OPERATORS=cnv,lvm
        NUM_MASTERS=1
        NUM_WORKERS=0
        MASTER_MEMORY=57344
        MASTER_DISK_COUNT=2
        MASTER_DISK=200000000000
        MASTER_CPU=24
        OPENSHIFT_VERSION=4.20
    test:
    - ref: osac-project-baremetal-test-vmaas
    workflow: osac-project-ofcir-baremetal
# Individual per-test jobs kept as optional targets for targeted debugging.
# Trigger with: /test e2e-metal-vmaas-compute-instance-creation-pr
