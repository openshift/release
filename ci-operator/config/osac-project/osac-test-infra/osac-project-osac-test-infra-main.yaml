base_images:
  assisted-image-service:
    name: backplane-5.0
    namespace: edge-infrastructure
    tag: assisted-image-service
  assisted-installer:
    name: backplane-5.0
    namespace: edge-infrastructure
    tag: assisted-installer
  assisted-installer-agent:
    name: backplane-5.0
    namespace: edge-infrastructure
    tag: assisted-installer-agent
  assisted-installer-controller:
    name: backplane-5.0
    namespace: edge-infrastructure
    tag: assisted-installer-controller
  assisted-service:
    name: backplane-5.0
    namespace: edge-infrastructure
    tag: assisted-service
  assisted-test-infra:
    name: backplane-5.0
    namespace: edge-infrastructure
    tag: assisted-test-infra
  dev-scripts:
    name: test
    namespace: ocp-kni
    tag: dev-scripts
  osac-installer:
    name: latest
    namespace: osac-project
    tag: osac-installer
build_root:
  image_stream_tag:
    name: release
    namespace: openshift
    tag: rhel-9-release-golang-1.24-openshift-4.21
images:
  items:
  - dockerfile_path: Containerfile
    to: osac-test-infra
  - dockerfile_literal: FROM scratch
    to: component-image
promotion:
  to:
  - excluded_images:
    - component-image
    name: latest
    namespace: osac-project
releases:
  latest:
    candidate:
      product: ocp
      stream: nightly
      version: "4.20"
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: e2e-vmaas-periodic
  capabilities:
  - intranet
  cron: 7 * * * *
  steps:
    workflow: osac-project-cluster-tool-vmaas
- as: e2e-vmaas-full-setup-helm
  capabilities:
  - intranet
  cron: 0 */4 * * *
  steps:
    cluster_profile: packet-osac
    env:
      ASSISTED_CONFIG: |
        OLM_OPERATORS=cnv,lvm
        NUM_MASTERS=1
        NUM_WORKERS=0
        MASTER_MEMORY=57344
        MASTER_DISK_COUNT=2
        MASTER_DISK=200000000000
        MASTER_CPU=24
        OPENSHIFT_VERSION=4.20
      DEPLOY_MODE: helm
      NOTIFY_LABEL: Full Setup vmaas (helm)
    workflow: osac-project-ofcir-baremetal
zz_generated_metadata:
  branch: main
  org: osac-project
  repo: osac-test-infra
