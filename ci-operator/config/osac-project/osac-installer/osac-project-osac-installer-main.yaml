base_images:
  dev-scripts:
    name: test
    namespace: ocp-kni
    tag: dev-scripts
  origin-cli:
    name: "4.20"
    namespace: ocp
    tag: cli
  osac-test-infra:
    name: latest
    namespace: osac-project
    tag: osac-test-infra
binary_build_commands: |
  git submodule update --init base/osac-fulfillment-service
  cd base/osac-fulfillment-service && GOFLAGS="-mod=readonly" go build -o /tmp/osac ./cmd/osac
build_root:
  image_stream_tag:
    name: release
    namespace: openshift
    tag: rhel-9-release-golang-1.26-openshift-5.0
images:
  items:
  - dockerfile_literal: |
      FROM src

      ADD . /installer
      WORKDIR /installer

      RUN dnf install -y git jq && \
          curl -fsSL https://get.helm.sh/helm-v3.17.3-linux-amd64.tar.gz | tar xz -C /tmp && \
          mv /tmp/linux-amd64/helm /usr/local/bin/helm && \
          curl -fsSL https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize/v5.6.0/kustomize_v5.6.0_linux_amd64.tar.gz | tar xz -C /usr/local/bin
      RUN git submodule update --init --recursive

      RUN cp oc /usr/local/bin/oc
      RUN cp osac /usr/local/bin/osac
    from: src
    inputs:
      bin:
        paths:
        - destination_dir: .
          source_path: /tmp/osac
      origin-cli:
        paths:
        - destination_dir: .
          source_path: /usr/bin/oc
    to: osac-installer
  - dockerfile_literal: FROM scratch
    to: component-image
promotion:
  to:
  - excluded_images:
    - component-image
    name: latest
    namespace: osac-project
releases:
  latest:
    candidate:
      product: ocp
      stream: nightly
      version: "4.20"
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: e2e-vmaas
  capabilities:
  - intranet
  run_if_changed: ^(base/|overlays/|scripts/|prerequisites/|charts/|values/)
  steps:
    dependencies:
      OSAC_INSTALLER_IMAGE: osac-installer
      OSAC_TEST_IMAGE: osac-test-infra
    workflow: osac-project-cluster-tool-vmaas
- always_run: false
  as: e2e-vmaas-full-setup-helm
  optional: true
  capabilities:
  - intranet
  steps:
    cluster_profile: packet-osac
    dependencies:
      OSAC_INSTALLER_IMAGE: osac-installer
    env:
      ASSISTED_CONFIG: |
        OLM_OPERATORS=cnv,lvm
        NUM_MASTERS=1
        NUM_WORKERS=0
        MASTER_MEMORY=57344
        MASTER_DISK_COUNT=2
        MASTER_DISK=200000000000
        MASTER_CPU=24
        OPENSHIFT_VERSION=4.20
      DEPLOY_MODE: helm
      VALUES_FILE: values/vmaas-ci/values.yaml
      NOTIFY_LABEL: Full Setup vmaas (helm)
    workflow: osac-project-ofcir-baremetal
zz_generated_metadata:
  branch: main
  org: osac-project
  repo: osac-installer
