base_images:
  assisted-image-service:
    name: backplane-5.0
    namespace: edge-infrastructure
    tag: assisted-image-service
  assisted-installer:
    name: backplane-5.0
    namespace: edge-infrastructure
    tag: assisted-installer
  assisted-installer-agent:
    name: backplane-5.0
    namespace: edge-infrastructure
    tag: assisted-installer-agent
  assisted-installer-controller:
    name: backplane-5.0
    namespace: edge-infrastructure
    tag: assisted-installer-controller
  assisted-service:
    name: backplane-5.0
    namespace: edge-infrastructure
    tag: assisted-service
  assisted-test-infra:
    name: backplane-5.0
    namespace: edge-infrastructure
    tag: assisted-test-infra
  dev-scripts:
    name: test
    namespace: ocp-kni
    tag: dev-scripts
  origin-cli:
    name: "4.20"
    namespace: ocp
    tag: cli
  osac-cli:
    name: latest
    namespace: osac-project
    tag: osac-cli
  osac-test-infra:
    name: latest
    namespace: osac-project
    tag: osac-test-infra
build_root:
  image_stream_tag:
    name: release
    namespace: openshift
    tag: rhel-9-release-golang-1.24-openshift-4.21
images:
  items:
  - dockerfile_literal: |
      FROM src

      ADD . /installer
      WORKDIR /installer

      RUN dnf install -y git jq
      RUN git submodule update --init --recursive

      RUN cp oc /usr/local/bin/oc
      RUN cp osac /usr/local/bin/osac
    from: src
    inputs:
      origin-cli:
        paths:
        - destination_dir: .
          source_path: /usr/bin/oc
      osac-cli:
        paths:
        - destination_dir: .
          source_path: /app/osac
    to: osac-installer
promotion:
  to:
  - name: latest
    namespace: osac-project
releases:
  latest:
    candidate:
      product: ocp
      stream: nightly
      version: "4.20"
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: e2e-metal-vmaas-compute-instance-creation
  capabilities:
  - intranet
  run_if_changed: ^(base/|overlays/|scripts/|prerequisites/)
  steps:
    cluster_profile: packet-assisted
    env:
      ASSISTED_CONFIG: |
        OLM_OPERATORS=cnv,lvm
        NUM_MASTERS=1
        NUM_WORKERS=0
        MASTER_MEMORY=57344
        MASTER_DISK_COUNT=2
        MASTER_DISK=200000000000
        MASTER_CPU=24
        OPENSHIFT_VERSION=4.20
      TEST: test_compute_instance_creation.py
    workflow: osac-project-ofcir-baremetal
