base_images:
  dev-scripts:
    name: test
    namespace: ocp-kni
    tag: dev-scripts
  origin-cli:
    name: "4.20"
    namespace: ocp
    tag: cli
  osac-cli:
    name: latest
    namespace: osac-project
    tag: osac-cli
  osac-test-infra:
    name: latest
    namespace: osac-project
    tag: osac-test-infra
build_root:
  image_stream_tag:
    name: release
    namespace: openshift
    tag: rhel-9-release-golang-1.24-openshift-4.21
images:
  items:
  - dockerfile_literal: |
      FROM src

      ADD . /installer
      WORKDIR /installer

      RUN dnf install -y git jq
      RUN git submodule update --init --recursive

      RUN cp oc /usr/local/bin/oc
      RUN cp osac /usr/local/bin/osac
    from: src
    inputs:
      origin-cli:
        paths:
        - destination_dir: .
          source_path: /usr/bin/oc
      osac-cli:
        paths:
        - destination_dir: .
          source_path: /app/osac
    to: osac-installer
  - dockerfile_literal: FROM scratch
    to: component-image
promotion:
  to:
  - excluded_images:
    - component-image
    name: latest
    namespace: osac-project
releases:
  latest:
    candidate:
      product: ocp
      stream: nightly
      version: "4.20"
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: e2e-vmaas
  capabilities:
  - intranet
  run_if_changed: ^(base/|overlays/|scripts/|prerequisites/)
  steps:
    dependencies:
      OSAC_INSTALLER_IMAGE: osac-installer
      OSAC_TEST_IMAGE: osac-test-infra
    workflow: osac-project-cluster-tool-vmaas
- as: e2e-metal-caas-cluster-order-lifecycle
  capabilities:
  - intranet
  run_if_changed: ^(base/|overlays/|scripts/|prerequisites/)
  steps:
    cluster_profile: packet-assisted
    env:
      ASSISTED_CONFIG: |
        OLM_OPERATORS=mce
        NUM_MASTERS=1
        NUM_WORKERS=0
        MASTER_MEMORY=57344
        MASTER_DISK_COUNT=2
        MASTER_DISK=200000000000
        MASTER_CPU=24
        OPENSHIFT_VERSION=4.20
      E2E_KUSTOMIZE_OVERLAY: caas-ci
      E2E_VM_TEMPLATE: ""
      INGRESS_SERVICE: "true"
      MCE_SERVICE: "true"
      OSAC_CLUSTER_TEMPLATE: osac.templates.ocp_ci_small
      STORAGE_SERVICE: "true"
      TEST: test_cluster_order_lifecycle
    workflow: osac-project-ofcir-caas
- as: e2e-metal-caas-cluster-order-api-fields
  capabilities:
  - intranet
  run_if_changed: ^(base/|overlays/|scripts/|prerequisites/)
  steps:
    cluster_profile: packet-assisted
    env:
      ASSISTED_CONFIG: |
        OLM_OPERATORS=mce
        NUM_MASTERS=1
        NUM_WORKERS=0
        MASTER_MEMORY=57344
        MASTER_DISK_COUNT=2
        MASTER_DISK=200000000000
        MASTER_CPU=24
        OPENSHIFT_VERSION=4.20
      E2E_KUSTOMIZE_OVERLAY: caas-ci
      E2E_VM_TEMPLATE: ""
      INGRESS_SERVICE: "true"
      MCE_SERVICE: "true"
      OSAC_CLUSTER_TEMPLATE: osac.templates.ocp_ci_small
      STORAGE_SERVICE: "true"
      TEST: test_cluster_order_api_fields
    workflow: osac-project-ofcir-caas
- as: e2e-metal-caas-order-delete-during-provision
  capabilities:
  - intranet
  run_if_changed: ^(base/|overlays/|scripts/|prerequisites/)
  steps:
    cluster_profile: packet-assisted
    env:
      ASSISTED_CONFIG: |
        OLM_OPERATORS=mce
        NUM_MASTERS=1
        NUM_WORKERS=0
        MASTER_MEMORY=57344
        MASTER_DISK_COUNT=2
        MASTER_DISK=200000000000
        MASTER_CPU=24
        OPENSHIFT_VERSION=4.20
      E2E_KUSTOMIZE_OVERLAY: caas-ci
      E2E_VM_TEMPLATE: ""
      INGRESS_SERVICE: "true"
      MCE_SERVICE: "true"
      OSAC_CLUSTER_TEMPLATE: osac.templates.ocp_ci_small
      STORAGE_SERVICE: "true"
      TEST: test_cluster_order_delete_during_provision
    workflow: osac-project-ofcir-caas
zz_generated_metadata:
  branch: main
  org: osac-project
  repo: osac-installer
