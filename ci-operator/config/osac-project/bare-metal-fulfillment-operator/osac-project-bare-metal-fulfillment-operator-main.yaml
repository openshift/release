build_root:
  image_stream_tag:
    name: release
    namespace: openshift
    tag: rhel-9-release-golang-1.24-openshift-4.21
images:
  items:
  - dockerfile_path: Containerfile
    to: bare-metal-fulfillment-operator
promotion:
  to:
  - excluded_images:
    - bare-metal-fulfillment-operator
    name: latest
    namespace: osac-project
releases:
  latest:
    candidate:
      product: ocp
      stream: nightly
      version: "4.20"
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
zz_generated_metadata:
  branch: main
  org: osac-project
  repo: bare-metal-fulfillment-operator
