base_images:
  assisted-image-service:
    name: backplane-5.0
    namespace: edge-infrastructure
    tag: assisted-image-service
  assisted-installer:
    name: backplane-5.0
    namespace: edge-infrastructure
    tag: assisted-installer
  assisted-installer-agent:
    name: backplane-5.0
    namespace: edge-infrastructure
    tag: assisted-installer-agent
  assisted-installer-controller:
    name: backplane-5.0
    namespace: edge-infrastructure
    tag: assisted-installer-controller
  assisted-service:
    name: backplane-5.0
    namespace: edge-infrastructure
    tag: assisted-service
  assisted-test-infra:
    name: backplane-5.0
    namespace: edge-infrastructure
    tag: assisted-test-infra
  dev-scripts:
    name: test
    namespace: ocp-kni
    tag: dev-scripts
  origin-cli:
    name: "4.20"
    namespace: ocp
    tag: cli
  osac-installer:
    name: latest
    namespace: osac-project
    tag: osac-installer
  osac-test-infra:
    name: latest
    namespace: osac-project
    tag: osac-test-infra
binary_build_commands: GOFLAGS="-mod=readonly" go build -o /tmp/osac ./cmd/osac
build_root:
  image_stream_tag:
    name: release
    namespace: openshift
    tag: rhel-9-release-golang-1.25-openshift-4.21
images:
  items:
  - dockerfile_literal: |
      FROM src
      WORKDIR /app
      COPY osac /app/osac
    from: src
    inputs:
      bin:
        paths:
        - destination_dir: .
          source_path: /tmp/osac
    to: osac-cli
  - dockerfile_path: Containerfile
    to: fulfillment-service-pr
  - dockerfile_literal: |
      FROM osac-installer
      COPY manifests/ /installer/base/osac-fulfillment-service/manifests/
      COPY osac /usr/local/bin/osac
    inputs:
      bin:
        paths:
        - destination_dir: .
          source_path: /tmp/osac
      osac-installer:
        as:
        - osac-installer
    to: osac-installer-with-pr
promotion:
  to:
  - excluded_images:
    - fulfillment-service-pr
    - osac-installer-with-pr
    name: latest
    namespace: osac-project
releases:
  latest:
    candidate:
      product: ocp
      stream: nightly
      version: "4.20"
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: unit
  commands: echo "Test"
  container:
    from: src
- as: e2e-metal-vmaas-compute-instance-creation
  capabilities:
  - intranet
  steps:
    cluster_profile: packet-assisted
    dependencies:
      COMPONENT_IMAGE: fulfillment-service-pr
      OSAC_INSTALLER_IMAGE: osac-installer-with-pr
    env:
      ASSISTED_CONFIG: |
        OLM_OPERATORS=cnv,lvm
        NUM_MASTERS=1
        NUM_WORKERS=0
        MASTER_MEMORY=57344
        MASTER_DISK_COUNT=2
        MASTER_DISK=200000000000
        MASTER_CPU=24
        OPENSHIFT_VERSION=4.20
      COMPONENT_IMAGE_NAME: ghcr.io/osac-project/fulfillment-service
      TEST: test_compute_instance_creation.py
    workflow: osac-project-ofcir-baremetal-component
