build_root:
  from_repository: true
canonical_go_repository: github.com/kubernetes-sigs/resource-state-metrics
images:
  items:
  - dockerfile_path: Dockerfile.ocp
    to: resource-state-metrics
promotion:
  to:
  - name: 5.1-priv
    namespace: ocp-private
prowgen:
  private: true
releases:
  initial:
    integration:
      name: 5.1-priv
      namespace: ocp-private
  latest:
    integration:
      include_built_images: true
      name: 5.1-priv
      namespace: ocp-private
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: vendor
  commands: go mod vendor && git diff --exit-code
  container:
    from: src
- as: test-unit
  commands: make test_unit
  container:
    from: src
- as: test-e2e
  commands: make test_e2e
  container:
    from: src
- as: e2e-aws-ovn
  steps:
    cluster_profile: openshift-org-aws
    workflow: openshift-e2e-aws
- as: e2e-aws-ovn-techpreview
  steps:
    cluster_profile: openshift-org-aws
    env:
      FEATURE_SET: TechPreviewNoUpgrade
    workflow: openshift-e2e-aws
- as: e2e-agnostic-cmo
  steps:
    cluster_profile: openshift-org-azure
    test:
    - as: test
      cli: latest
      commands: make test-e2e
      from: stable:cluster-monitoring-operator-src
      resources:
        requests:
          cpu: 100m
    workflow: ipi-azure
- as: ginkgo-tests-cmo
  steps:
    cluster_profile: openshift-org-azure
    test:
    - as: test
      cli: latest
      commands: make test-ginkgo
      from: stable:cluster-monitoring-operator-src
      resources:
        requests:
          cpu: 100m
    workflow: ipi-azure
- as: validate-modules
  commands: go mod verify && go mod tidy && git diff --exit-code -- go.sum go.mod
  container:
    from: src
- as: verify-deps
  steps:
    env:
      CHECK_MOD_LIST: "false"
    test:
    - ref: go-verify-deps
zz_generated_metadata:
  branch: release-5.1
  org: openshift-priv
  repo: kubernetes-sigs-resource-state-metrics
