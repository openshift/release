base_images:
  base:
    name: ubi-minimal
    namespace: ocp
    tag: "9"
  stolostron_builder_go1.24-linux:
    name: builder
    namespace: stolostron
    tag: go1.24-linux
build_root:
  from_repository: true
canonical_go_repository: github.com/stolostron/insights-metrics
images:
  items:
  - dockerfile_path: Dockerfile
    from: base
    to: insights-metrics
promotion:
  to:
  - disabled: true
    name: "5.0"
    namespace: stolostron
  - disabled: true
    name: "5.1"
    namespace: stolostron
prowgen:
  private: true
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: pr-image-mirror
  steps:
    dependencies:
      SOURCE_IMAGE_REF: insights-metrics
    env:
      IMAGE_REPO: insights-metrics
      REGISTRY_ORG: stolostron
    workflow: ocm-ci-image-mirror
- as: lint
  commands: |
    GOLANGCI_LINT_CACHE=/tmp/golangci-cache make -f Makefile.prow lint
  container:
    from: src
- as: test-unit
  commands: |
    export SELF="make -f Makefile.prow"
    make -f Makefile.prow unit-test
  container:
    from: src
- as: sonar-pre-submit
  commands: |
    export SELF="make -f Makefile.prow"
    make -f Makefile.prow sonar/go/prow
  container:
    from: src
  secrets:
  - mount_path: /etc/sonarcloud/
    name: acm-sonarcloud-token
zz_generated_metadata:
  branch: main
  org: openshift-priv
  repo: stolostron-insights-metrics
