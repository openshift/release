base_images:
  base:
    name: ubi-minimal
    namespace: ocp
    tag: "9"
  stolostron_builder_go1.25-linux:
    name: builder
    namespace: stolostron
    tag: go1.25-linux
build_root:
  from_repository: true
canonical_go_repository: github.com/stolostron/acm-cli
images:
  items:
  - additional_architectures:
    - arm64
    dockerfile_path: Dockerfile
    from: base
    inputs:
      stolostron_builder_go1.25-linux:
        as:
        - registry.ci.openshift.org/stolostron/builder:go1.25-linux
    optional: true
    to: acm-cli
promotion:
  to:
  - disabled: true
    name: "5.0"
    namespace: stolostron
prowgen:
  private: true
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
zz_generated_metadata:
  branch: release-5.0
  org: openshift-priv
  repo: stolostron-acm-cli
