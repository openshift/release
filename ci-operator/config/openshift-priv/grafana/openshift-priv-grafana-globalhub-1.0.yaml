base_images:
  base:
    name: 4.7-priv
    namespace: ocp-private
    tag: base
build_root:
  image_stream_tag:
    name: builder
    namespace: stolostron
    tag: go1.19-linux
canonical_go_repository: github.com/stolostron/grafana
images:
  items:
  - dockerfile_path: Dockerfile.ocp
    from: base
    to: grafana-global-hub
promotion:
  to:
  - disabled: true
    name: "1.0"
    namespace: stolostron
releases:
  initial:
    integration:
      name: 4.7-priv
      namespace: ocp-private
  latest:
    integration:
      include_built_images: true
      name: 4.7-priv
      namespace: ocp-private
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: ocm-ci-rbac
  steps:
    workflow: ocm-ci-rbac
- as: pr-image-mirror
  steps:
    dependencies:
      SOURCE_IMAGE_REF: grafana-global-hub
    env:
      IMAGE_REPO: grafana
      IMAGE_TAG: globalhub-1.0
      REGISTRY_ORG: stolostron
    workflow: ocm-ci-image-mirror
zz_generated_metadata:
  branch: globalhub-1.0
  org: openshift-priv
  repo: grafana
