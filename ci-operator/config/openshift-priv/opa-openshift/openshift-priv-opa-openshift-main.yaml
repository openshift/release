base_images:
  base:
    name: 4.22-priv
    namespace: ocp-private
    tag: base-rhel9
build_root:
  image_stream_tag:
    name: builder-priv
    namespace: ocp-private
    tag: rhel-9-golang-1.26-openshift-4.23
canonical_go_repository: github.com/ViaQ/opa-openshift
images:
  items:
  - additional_architectures:
    - arm64
    dockerfile_path: Dockerfile
    from: base
    to: opa-openshift
promotion:
  to:
  - disabled: true
    namespace: logging
    tag: main
prowgen:
  private: true
releases:
  latest:
    release:
      channel: stable
      version: "4.22"
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: test
  steps:
    test:
    - as: unit
      commands: GOFLAGS="" make test-unit
      from: src
      resources:
        requests:
          cpu: 100m
          memory: 200Mi
zz_generated_metadata:
  branch: main
  org: openshift-priv
  repo: opa-openshift
