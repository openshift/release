build_root:
  image_stream_tag:
    name: builder
    namespace: stolostron
    tag: go1.17-linux
canonical_go_repository: github.com/stolostron/observatorium
images:
  items:
  - dockerfile_path: Dockerfile
    to: observatorium
promotion:
  to:
  - disabled: true
    name: "2.5"
    namespace: stolostron
prowgen:
  private: true
releases:
  initial:
    integration:
      name: 4.8-priv
      namespace: ocp-private
  latest:
    integration:
      include_built_images: true
      name: 4.8-priv
      namespace: ocp-private
resources:
  '*':
    limits:
      memory: 6Gi
    requests:
      cpu: 100m
      memory: 1Gi
test_binary_build_commands: "true"
tests:
- as: lint
  commands: |
    GOLANGCI_LINT_CACHE=/tmp/golangci-cache make lint --always-make
  container:
    from: src
- as: test
  commands: |
    make test --always-make
  container:
    from: test-bin
- as: sonar-pre-submit
  commands: |
    export SELF="make -f /opt/build-harness/Makefile.prow"
    make -f /opt/build-harness/Makefile.prow sonar/go/prow
  container:
    from: src
  secrets:
  - mount_path: /etc/sonarcloud/
    name: acm-sonarcloud-token
zz_generated_metadata:
  branch: release-2.5
  org: openshift-priv
  repo: stolostron-observatorium
