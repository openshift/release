base_images:
  ansible_operator:
    name: 5.0-priv
    namespace: ocp-private
    tag: ansible-operator
build_root:
  project_image:
    dockerfile_path: build/custom-ci-build-root.Dockerfile
canonical_go_repository: github.com/openshift/template-service-broker-operator
images:
  items:
  - dockerfile_path: build/Dockerfile
    from: ansible_operator
    to: template-service-broker-operator
promotion:
  to:
  - disabled: true
    name: 5.0-priv
    namespace: ocp-private
prowgen:
  private: true
releases:
  initial:
    integration:
      name: 5.0-priv
      namespace: ocp-private
  latest:
    integration:
      include_built_images: true
      name: 5.0-priv
      namespace: ocp-private
resources:
  '*':
    requests:
      cpu: 200m
      memory: 200Mi
