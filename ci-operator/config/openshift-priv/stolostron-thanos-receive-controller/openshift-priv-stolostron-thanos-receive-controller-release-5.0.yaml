base_images:
  base:
    name: ubi-minimal
    namespace: ocp
    tag: "9"
  stolostron_builder_go1.25-linux:
    name: builder
    namespace: stolostron
    tag: go1.25-linux
build_root:
  image_stream_tag:
    name: builder
    namespace: stolostron
    tag: go1.25-linux
canonical_go_repository: github.com/stolostron/thanos-receive-controller
images:
  items:
  - dockerfile_path: Dockerfile.prow
    from: base
    inputs:
      stolostron_builder_go1.25-linux:
        as:
        - registry.ci.openshift.org/stolostron/builder:go1.25-linux
    to: thanos-receive-controller
promotion:
  to:
  - disabled: true
    name: "5.0"
    namespace: stolostron
prowgen:
  private: true
resources:
  '*':
    limits:
      memory: 6Gi
    requests:
      cpu: 100m
      memory: 1Gi
tests:
- as: pr-image-mirror
  steps:
    dependencies:
      SOURCE_IMAGE_REF: thanos-receive-controller
    env:
      IMAGE_REPO: thanos-receive-controller
      REGISTRY_ORG: stolostron
    workflow: ocm-ci-image-mirror
zz_generated_metadata:
  branch: release-5.0
  org: openshift-priv
  repo: stolostron-thanos-receive-controller
