build_root:
  from_repository: true
canonical_go_repository: github.com/openshift/secondary-scheduler-operator
images:
  items:
  - dockerfile_path: Dockerfile.rhel7
    to: secondary-scheduler-operator
promotion:
  to:
  - disabled: true
    name: 5.0-priv
    namespace: ocp-private
prowgen:
  private: true
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tag_specification:
  name: 5.0-priv
  namespace: ocp-private
tests:
- as: verify
  commands: make verify-gofmt
  container:
    from: src
- as: unit
  commands: make test-unit
  container:
    from: src
- as: e2e-aws-operator
  steps:
    cluster_profile: openshift-org-aws
    test:
    - as: test
      cli: latest
      commands: make test-e2e
      from: src
      resources:
        requests:
          cpu: 100m
    workflow: ipi-aws
- always_run: false
  as: e2e-aws-operator-serial-ote
  optional: true
  skip_if_only_changed: ^\.tekton/|^bundle\.Dockerfile$|\.md$|^(?:.*/)?(?:\.gitignore|LICENSE|OWNERS)$
  steps:
    cluster_profile: openshift-org-aws
    dependencies:
      EXTENSION_IMAGE: secondary-scheduler-operator
    env:
      EXTENSION_BINARY_PATH: /usr/bin/secondary-scheduler-operator-tests-ext.gz
      EXTENSION_COMPONENT_NAME: secondary-scheduler-operator
      FIPS_ENABLED: "true"
      TEST_SUITE: openshift/secondary-scheduler-operator/operator/serial
    pre:
    - chain: ipi-aws-pre
    - ref: fips-check
    test:
    - ref: openshift-tests-extension-setup-out-of-payload
    - ref: openshift-e2e-test
    workflow: ipi-aws
zz_generated_metadata:
  branch: release-5.0
  org: openshift-priv
  repo: secondary-scheduler-operator
