base_images:
  base:
    name: ubi-minimal
    namespace: ocp
    tag: "8"
build_root:
  image_stream_tag:
    name: builder
    namespace: stolostron
    tag: go1.16-linux
canonical_go_repository: github.com/stolostron/kube-rbac-proxy
images:
  items:
  - dockerfile_path: Dockerfile.prow
    from: base
    to: kube-rbac-proxy
promotion:
  to:
  - disabled: true
    name: "2.5"
    namespace: stolostron
prowgen:
  private: true
resources:
  '*':
    limits:
      memory: 6Gi
    requests:
      cpu: 100m
      memory: 1Gi
test_binary_build_commands: "true"
tests:
- as: vendor
  commands: go mod vendor && git diff --exit-code
  container:
    from: src
- as: test-unit
  commands: make test-unit
  container:
    from: src
- as: sonar-pre-submit
  commands: |
    export SELF="make -f /opt/build-harness/Makefile.prow"
    make -f /opt/build-harness/Makefile.prow sonar/go/prow
  container:
    from: src
  secrets:
  - mount_path: /etc/sonarcloud/
    name: acm-sonarcloud-token
zz_generated_metadata:
  branch: release-2.5
  org: openshift-priv
  repo: stolostron-kube-rbac-proxy
