base_images:
  stolostron_builder_go1.24-linux:
    name: builder
    namespace: stolostron
    tag: go1.24-linux
  stolostron_builder_go1.25-linux:
    name: builder
    namespace: stolostron
    tag: go1.25-linux
build_root:
  image_stream_tag:
    name: builder
    namespace: stolostron
    tag: go1.25-linux
canonical_go_repository: github.com/stolostron/provider-credential-controller
images:
  items:
  - dockerfile_path: Dockerfile.prow
    inputs:
      stolostron_builder_go1.25-linux:
        as:
        - registry.ci.openshift.org/stolostron/builder:go1.25-linux
    to: provider-credential-controller
promotion:
  to:
  - disabled: true
    name: "5.0"
    namespace: stolostron
prowgen:
  private: true
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: unit-tests
  commands: |
    export SELF="make -f Makefile.prow"
    make -f Makefile.prow unit-tests
  container:
    from: src
- as: pr-image-mirror
  steps:
    dependencies:
      SOURCE_IMAGE_REF: provider-credential-controller
    env:
      IMAGE_REPO: provider-credential-controller
      REGISTRY_ORG: stolostron
    workflow: ocm-ci-image-mirror
zz_generated_metadata:
  branch: backplane-5.0
  org: openshift-priv
  repo: stolostron-provider-credential-controller
