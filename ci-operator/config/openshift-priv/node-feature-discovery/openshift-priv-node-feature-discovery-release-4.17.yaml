build_root:
  from_repository: true
canonical_go_repository: github.com/openshift/node-feature-discovery
images:
  items:
  - dockerfile_path: Dockerfile
    to: node-feature-discovery
promotion:
  to:
  - name: "4.17"
    namespace: ocp-priv
prowgen:
  private: true
releases:
  initial:
    integration:
      name: "4.17"
      namespace: ocp-priv
  latest:
    integration:
      include_built_images: true
      name: "4.17"
      namespace: ocp-priv
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: unit
  commands: make test
  container:
    from: src
- as: verify
  commands: make verify
  container:
    from: src
zz_generated_metadata:
  branch: release-4.17
  org: openshift-priv
  repo: node-feature-discovery
