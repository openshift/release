build_root:
  from_repository: true
canonical_go_repository: github.com/openshift/openstack-networking-generic-switch
images:
  items:
  - dockerfile_path: openstack-ngs-tester.Dockerfile
    from: src
    optional: true
    to: ngs-tester
promotion:
  to:
  - name: 4.23-priv
    namespace: ocp-private
prowgen:
  private: true
releases:
  initial:
    integration:
      name: 4.23-priv
      namespace: ocp-private
  latest:
    integration:
      include_built_images: true
      name: 4.23-priv
      namespace: ocp-private
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: unit
  commands: HOME=`dirname .` tox -vv -e py3
  container:
    from: ngs-tester
- as: pep8
  commands: HOME=`dirname .` tox -vv -e pep8
  container:
    from: ngs-tester
zz_generated_metadata:
  branch: release-4.23
  org: openshift-priv
  repo: openstack-networking-generic-switch
