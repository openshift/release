base_images:
  dev-scripts:
    name: test
    namespace: ocp-kni
    tag: dev-scripts
  ocp_5.0_base-rhel9:
    name: "5.0"
    namespace: ocp-priv
    tag: base-rhel9
build_root:
  from_repository: true
canonical_go_repository: github.com/openshift/ironic-agent-image
images:
  items:
  - dockerfile_path: Dockerfile.ocp
    from: prevalidation-base
    inputs:
      prevalidation-base:
        as:
        - quay-proxy.ci.openshift.org/openshift/ci:ocp_4.22_base-rhel9
        - quay-proxy.ci.openshift.org/openshift/ci:ocp_5.0_base-rhel9
    to: ironic-agent
  run_if_changed: .*packages-list.*
promotion:
  to:
  - disabled: true
    name: "5.0"
    namespace: ocp-priv
prowgen:
  private: true
raw_steps:
- pipeline_image_cache_step:
    commands: |
      #NOTE(elfosardo): use ironic repos, cause we're special
      curl -f --retry 3 --retry-delay 5 --connect-timeout 10 \
        -o /etc/yum.repos.art/ci/base-5-0-rhel-9-ironic-prevalidation.repo \
        http://base-5-0-rhel-9-ironic-prevalidation.ocp.svc
    from: ocp_5.0_base-rhel9
    to: prevalidation-base
releases:
  initial:
    integration:
      name: "5.0"
      namespace: ocp-priv
  latest:
    integration:
      include_built_images: true
      name: "5.0"
      namespace: ocp-priv
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: e2e-metal-ipi-ovn-ipv4-prevalidation
  capabilities:
  - intranet
  run_if_changed: .*packages-list.*
  steps:
    cluster_profile: equinix-ocp-metal
    workflow: baremetalds-e2e-ovn-ipv4
- as: e2e-metal-ipi-serial-ipv4-prevalidation
  capabilities:
  - intranet
  run_if_changed: .*packages-list.*
  steps:
    cluster_profile: equinix-ocp-metal
    workflow: baremetalds-e2e-serial-ovn-ipv4
- as: e2e-metal-ipi-virtualmedia-prevalidation
  capabilities:
  - intranet
  run_if_changed: .*packages-list.*
  steps:
    cluster_profile: equinix-ocp-metal
    workflow: baremetalds-e2e-virtualmedia
- as: e2e-metal-ipi-ovn-ipv6-prevalidation
  capabilities:
  - intranet
  run_if_changed: .*packages-list.*
  steps:
    cluster_profile: equinix-ocp-metal
    workflow: baremetalds-e2e-ovn-ipv6
- always_run: false
  as: e2e-metal-ipi-ovn-dualstack-prevalidation
  capabilities:
  - intranet
  optional: true
  run_if_changed: .*packages-list.*
  steps:
    cluster_profile: equinix-ocp-metal
    workflow: baremetalds-e2e-ovn-dualstack
zz_generated_metadata:
  branch: main
  org: openshift-priv
  repo: ironic-agent-image
  variant: prevalidation
