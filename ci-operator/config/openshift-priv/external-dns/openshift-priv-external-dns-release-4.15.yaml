base_images:
  base:
    name: 4.15-priv
    namespace: ocp-private
    tag: base
build_root:
  from_repository: true
canonical_go_repository: github.com/openshift/external-dns
images:
  items:
  - dockerfile_path: Dockerfile.openshift
    from: base
    to: external-dns
promotion:
  to:
  - name: 4.15-priv
    namespace: ocp-private
prowgen:
  private: true
releases:
  initial:
    integration:
      name: 4.15-priv
      namespace: ocp-private
  latest:
    integration:
      include_built_images: true
      name: 4.15-priv
      namespace: ocp-private
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: unit
  commands: make test
  container:
    from: src
zz_generated_metadata:
  branch: release-4.15
  org: openshift-priv
  repo: external-dns
