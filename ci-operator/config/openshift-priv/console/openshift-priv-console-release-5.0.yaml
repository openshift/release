base_images:
  ocp_builder_rhel-9-base-nodejs-openshift-4.22:
    name: builder
    namespace: ocp
    tag: rhel-9-base-nodejs-openshift-4.22
  ocp_builder_rhel-9-golang-1.25-openshift-4.22:
    name: builder
    namespace: ocp
    tag: rhel-9-golang-1.25-openshift-4.22
build_root:
  from_repository: true
canonical_go_repository: github.com/openshift/console
images:
  items:
  - dockerfile_path: Dockerfile
    to: console
  - dockerfile_path: Dockerfile.plugins.demo
    from: ocp_builder_rhel-9-base-nodejs-openshift-4.22
    to: console-plugin-demo
promotion:
  to:
  - additional_images:
      console-tests: src
    disabled: true
    name: 5.0-priv
    namespace: ocp-private
releases:
  initial:
    integration:
      name: 5.0-priv
      namespace: ocp-private
  latest:
    integration:
      include_built_images: true
      name: 5.0-priv
      namespace: ocp-private
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
  analyze:
    requests:
      cpu: "1"
      memory: 14Gi
  console:
    requests:
      cpu: "2"
      memory: 10Gi
  frontend:
    requests:
      cpu: "2"
      memory: 10Gi
  test-bin:
    requests:
      cpu: "1"
      memory: 10Gi
test_binary_build_commands: |
  ./build-frontend.sh
  ./build-demos.sh
tests:
- as: backend
  commands: |
    export XDG_CACHE_HOME=/tmp/.cache
    mkdir -p ${ARTIFACT_DIR} ${XDG_CACHE_HOME}
    go install -mod= github.com/jstemmer/go-junit-report@latest
    /home/prow/go/src/github.com/openshift/console/test-backend.sh
  container:
    from: ocp_builder_rhel-9-golang-1.25-openshift-4.22
  skip_if_only_changed: \.md$|(?:^|/)(?:\.gitignore|OWNERS|LICENSE)$
- as: frontend
  commands: |
    git config --global --add safe.directory /go/src/github.com/openshift/console
    ./test-frontend.sh
  container:
    from: test-bin
  skip_if_only_changed: \.md$|(?:^|/)(?:\.gitignore|OWNERS|LICENSE)$
- as: analyze
  commands: ./analyze.sh
  container:
    from: test-bin
  skip_if_only_changed: \.md$|(?:^|/)(?:\.gitignore|OWNERS|LICENSE)$
- as: e2e-gcp-console
  skip_if_only_changed: \.md$|(?:^|/)(?:\.gitignore|OWNERS|LICENSE)$
  steps:
    cluster_profile: openshift-org-gcp
    test:
    - as: test
      cli: latest
      commands: |
        export CYPRESS_RECORD_KEY="$(cat /var/run/cypress-secrets/record-key)"
        ./test-prow-e2e.sh
      credentials:
      - mount_path: /var/run/cypress-secrets
        name: cypress-record-key
        namespace: test-credentials
      dependencies:
      - env: CYPRESS_PLUGIN_PULL_SPEC
        name: console-plugin-demo
      from: src
      resources:
        requests:
          cpu: "4"
          memory: 10Gi
      timeout: 6h0m0s
    workflow: ipi-gcp
zz_generated_metadata:
  branch: release-5.0
  org: openshift-priv
  repo: console
