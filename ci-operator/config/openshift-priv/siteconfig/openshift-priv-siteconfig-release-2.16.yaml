base_images:
  base:
    name: ubi-minimal
    namespace: ocp
    tag: "9"
  stolostron_builder_go1.24-linux:
    name: builder
    namespace: stolostron
    tag: go1.24-linux
binary_build_commands: make build
build_root:
  image_stream_tag:
    name: builder
    namespace: stolostron
    tag: go1.23-linux
canonical_go_repository: github.com/stolostron/siteconfig
images:
  items:
  - dockerfile_path: Dockerfile
    from: base
    to: siteconfig-operator
promotion:
  to:
  - disabled: true
    name: "2.16"
    namespace: stolostron
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: pr-image-mirror
  steps:
    dependencies:
      SOURCE_IMAGE_REF: siteconfig-operator
    env:
      IMAGE_REPO: siteconfig-operator
      REGISTRY_ORG: stolostron
    workflow: ocm-ci-image-mirror
- as: sonar-pre-submit
  commands: |
    export SELF="make -f /opt/build-harness/Makefile.prow"
    make -f /opt/build-harness/Makefile.prow sonar/go/prow
  container:
    from: src
  secrets:
  - mount_path: /etc/sonarcloud/
    name: acm-sonarcloud-token
zz_generated_metadata:
  branch: release-2.16
  org: openshift-priv
  repo: siteconfig
