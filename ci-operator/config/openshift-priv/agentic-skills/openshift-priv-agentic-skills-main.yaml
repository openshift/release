build_root:
  from_repository: true
canonical_go_repository: github.com/openshift/agentic-skills
images:
  items:
  - dockerfile_path: Containerfile
    to: agentic-skills
promotion:
  to:
  - name: 5.0-priv
    namespace: ocp-private
releases:
  latest:
    integration:
      include_built_images: true
      name: 5.0-priv
      namespace: ocp-private
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: eval
  commands: echo FIXME actual tests
  container:
    from: src
  skip_if_only_changed: ^(README\.md|OWNERS|LICENSE|AGENTS\.md|CLAUDE\.md|\.gitignore)$
zz_generated_metadata:
  branch: main
  org: openshift-priv
  repo: agentic-skills
