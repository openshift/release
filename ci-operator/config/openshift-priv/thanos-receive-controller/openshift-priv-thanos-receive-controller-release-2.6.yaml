base_images:
  base:
    name: ubi-minimal
    namespace: ocp
    tag: "8"
build_root:
  image_stream_tag:
    name: builder
    namespace: stolostron
    tag: go1.18-linux
canonical_go_repository: github.com/stolostron/thanos-receive-controller
images:
- dockerfile_path: Dockerfile.prow
  from: base
  to: thanos-receive-controller
promotion:
  to:
  - disabled: true
    name: "2.6"
    namespace: stolostron
resources:
  '*':
    limits:
      memory: 6Gi
    requests:
      cpu: 100m
      memory: 1Gi
tests:
- as: pr-image-mirror
  steps:
    dependencies:
      SOURCE_IMAGE_REF: thanos-receive-controller
    env:
      IMAGE_REPO: thanos-receive-controller
      REGISTRY_ORG: stolostron
    workflow: ocm-ci-image-mirror
- as: sonar-pre-submit
  commands: |
    export SELF="make -f /opt/build-harness/Makefile.prow"
    make -f /opt/build-harness/Makefile.prow sonar/go/prow
  container:
    from: src
  secrets:
  - mount_path: /etc/sonarcloud/
    name: acm-sonarcloud-token
zz_generated_metadata:
  branch: release-2.6
  org: openshift-priv
  repo: thanos-receive-controller
