binary_build_commands: make install
build_root:
  image_stream_tag:
    name: builder-priv
    namespace: ocp-private
    tag: rhel-9-golang-1.23-openshift-4.19
canonical_go_repository: github.com/openshift-online/access-transparency-service
promotion:
  to:
  - name: 4.20-priv
    namespace: ocp-private
releases:
  initial:
    integration:
      name: 4.20-priv
      namespace: ocp-private
  latest:
    integration:
      include_built_images: true
      name: 4.20-priv
      namespace: ocp-private
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
test_binary_build_commands: make install
tests:
- as: unit
  capabilities:
  - intranet
  commands: make test
  container:
    from: src
  optional: true
  restrict_network_access: false
zz_generated_metadata:
  branch: main
  org: openshift-priv
  repo: access-transparency-service
