build_root:
  image_stream_tag:
    name: builder
    namespace: konveyor
    tag: ubi9-v1.25
canonical_go_repository: github.com/openshift/oadp-operator
images:
  items:
  - dockerfile_path: Dockerfile
    to: oadp-operator-1.6
  - dockerfile_path: build/ci-Dockerfile
    to: test-oadp-operator-1.6
operator:
  bundles:
  - dockerfile_path: build/Dockerfile.bundle
  substitutions:
  - pullspec: quay.io/konveyor/oadp-operator:oadp-1.6
    with: oadp-operator-1.6
releases:
  latest:
    candidate:
      product: ocp
      stream: nightly
      version: "4.18"
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 1000m
      memory: 512Mi
zz_generated_metadata:
  branch: oadp-1.6
  org: openshift-priv
  repo: oadp-operator
  variant: "4.18"
