base_images:
  base:
    name: ubi-minimal
    namespace: ocp
    tag: "8"
build_root:
  image_stream_tag:
    name: builder
    namespace: stolostron
    tag: go1.20-linux
canonical_go_repository: github.com/stolostron/recommends
images:
  items:
  - dockerfile_path: Dockerfile
    from: base
    to: analytics-recommends
promotion:
  to:
  - disabled: true
    name: "2.10"
    namespace: stolostron
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: lint
  commands: |
    GOLANGCI_LINT_CACHE=/tmp/golangci-cache make -f Makefile lint
  container:
    from: src
- as: pr-image-mirror
  steps:
    dependencies:
      SOURCE_IMAGE_REF: analytics-recommends
    env:
      IMAGE_REPO: analytics-recommends
      REGISTRY_ORG: stolostron
    workflow: ocm-ci-image-mirror
- as: test-unit
  commands: |
    export SELF="make -f Makefile"
    make -f Makefile test
  container:
    from: src
zz_generated_metadata:
  branch: release-2.10
  org: openshift-priv
  repo: stolostron-recommends
