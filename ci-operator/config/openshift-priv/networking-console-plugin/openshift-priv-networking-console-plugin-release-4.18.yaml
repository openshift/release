build_root:
  image_stream_tag:
    name: release
    namespace: openshift
    tag: tectonic-console-builder-v29
canonical_go_repository: github.com/openshift/networking-console-plugin
images:
  items:
  - dockerfile_path: Dockerfile
    to: networking-console-plugin
promotion:
  to:
  - name: 4.18-priv
    namespace: ocp-private
prowgen:
  private: true
releases:
  initial:
    integration:
      name: 4.18-priv
      namespace: ocp-private
  latest:
    integration:
      include_built_images: true
      name: 4.18-priv
      namespace: ocp-private
resources:
  '*':
    limits:
      memory: 6Gi
    requests:
      cpu: 1000m
      memory: 6Gi
tests:
- as: lint
  steps:
    test:
    - as: lint
      commands: npm install && npm run lint && npm run build
      from: src
      resources:
        requests:
          cpu: 200m
          memory: 300Mi
    - as: i18n
      commands: |
        npm install && npm run i18n
        GIT_STATUS="$(git status --short --untracked-files locales)"
        if [ -n "$GIT_STATUS" ]; then
          echo "i18n files are not up to date. Commit them to fix."
          git diff
          exit 1
        fi
      from: src
      resources:
        requests:
          cpu: 200m
          memory: 300Mi
- as: e2e
  steps:
    cluster_profile: openshift-org-aws
    test:
    - as: test
      cli: latest
      commands: ./test-prow-e2e.sh
      dependencies:
      - env: CYPRESS_PLUGIN_TEMPLATE_PULL_SPEC
        name: networking-console-plugin
      from: src
      grace_period: 30m0s
      resources:
        requests:
          cpu: 1000m
          memory: 4Gi
      timeout: 3h0m0s
    workflow: openshift-e2e-aws
zz_generated_metadata:
  branch: release-4.18
  org: openshift-priv
  repo: networking-console-plugin
