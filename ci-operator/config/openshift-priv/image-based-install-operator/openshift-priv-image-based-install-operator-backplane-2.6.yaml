base_images:
  base:
    name: ubi-minimal
    namespace: ocp
    tag: "9"
build_root:
  image_stream_tag:
    name: release
    namespace: openshift
    tag: rhel-9-release-golang-1.25-openshift-4.21
canonical_go_repository: github.com/openshift/image-based-install-operator
images:
- dockerfile_path: Dockerfile
  from: base
  to: image-based-install-operator
promotion:
  to:
  - disabled: true
    name: "2.6"
    namespace: stolostron
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: build
  commands: |
    export GOLANGCI_LINT_CACHE=/tmp/.cache
    export GOPROXY=https://proxy.golang.org
    HOME=/tmp make build
  container:
    from: src
  skip_if_only_changed: (^(docs|config)/)|(\.md$)|((^|/)OWNERS$)
- as: unit-test
  commands: HOME=/tmp make test
  container:
    from: src
  skip_if_only_changed: (^docs/)|(\.md$)|((^|/)OWNERS$)
- as: integration
  cluster_claim:
    architecture: amd64
    cloud: aws
    owner: openshift-ci
    product: ocp
    timeout: 1h0m0s
    version: "4.14"
  skip_if_only_changed: (^docs/)|(\.md$)|((^|/)OWNERS$)
  steps:
    allow_best_effort_post_steps: true
    test:
    - as: integration-deploy-and-run
      cli: latest
      commands: |
        make run-integration-test
      dependencies:
      - env: IMG
        name: image-based-install-operator
      from: src
      resources:
        requests:
          cpu: 100m
          memory: 200Mi
    workflow: generic-claim
zz_generated_metadata:
  branch: backplane-2.6
  org: openshift-priv
  repo: image-based-install-operator
