build_root:
  image_stream_tag:
    name: release
    namespace: openshift
    tag: tectonic-console-builder-v29
canonical_go_repository: github.com/openshift/faas-console-plugin
images:
  items:
  - dockerfile_path: Dockerfile
    to: faas-console-plugin
promotion:
  to:
  - name: 5.0-priv
    namespace: ocp-private
prowgen:
  private: true
releases:
  initial:
    integration:
      name: 5.0-priv
      namespace: ocp-private
  latest:
    integration:
      include_built_images: true
      name: 5.0-priv
      namespace: ocp-private
resources:
  '*':
    limits:
      memory: 6Gi
    requests:
      cpu: 1000m
      memory: 6Gi
tests:
- as: lint
  steps:
    test:
    - as: lint
      commands: yarn install && yarn run lint && yarn run build
      from: src
      resources:
        requests:
          cpu: 200m
          memory: 300Mi
- as: unit
  steps:
    test:
    - as: unit
      commands: yarn install && yarn run test
      from: src
      resources:
        requests:
          cpu: 200m
          memory: 300Mi
zz_generated_metadata:
  branch: master
  org: openshift-priv
  repo: faas-console-plugin
