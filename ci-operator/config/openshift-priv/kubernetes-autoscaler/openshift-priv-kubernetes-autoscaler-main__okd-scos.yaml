base_images:
  ocp_builder_rhel-9-golang-1.25-openshift-5.0:
    name: builder
    namespace: ocp
    tag: rhel-9-golang-1.25-openshift-5.0
  origin_scos-5.0_base-stream9:
    name: scos-5.0
    namespace: origin
    tag: base-stream9
build_root:
  image_stream_tag:
    name: release
    namespace: openshift
    tag: rhel-9-release-golang-1.25-openshift-5.0
canonical_go_repository: github.com/openshift/kubernetes-autoscaler
images:
  items:
  - build_args:
    - name: TAGS
      value: scos
    dockerfile_path: images/cluster-autoscaler/Dockerfile.rhel
    from: origin_scos-5.0_base-stream9
    inputs:
      ocp_builder_rhel-9-golang-1.25-openshift-5.0:
        as:
        - builder
        - quay-proxy.ci.openshift.org/openshift/ci:ocp_builder_rhel-9-golang-1.25-openshift-4.22
    to: cluster-autoscaler
promotion:
  to:
  - disabled: true
    name: scos-5.0
    namespace: origin
prowgen:
  private: true
releases:
  latest:
    integration:
      include_built_images: true
      name: scos-5.0
      namespace: origin
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- always_run: false
  as: e2e-aws-ovn
  optional: true
  steps:
    cluster_profile: openshift-org-aws
    workflow: openshift-e2e-aws
zz_generated_metadata:
  branch: main
  org: openshift-priv
  repo: kubernetes-autoscaler
  variant: okd-scos
