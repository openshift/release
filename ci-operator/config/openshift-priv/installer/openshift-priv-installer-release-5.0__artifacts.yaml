build_root:
  from_repository: true
  use_build_cache: true
canonical_go_repository: github.com/openshift/installer
images:
  items:
  - dockerfile_path: images/installer-artifacts/Dockerfile.rhel
    to: installer-artifacts
promotion:
  to:
  - disabled: true
    name: "5.0"
    namespace: ocp-priv
prowgen:
  private: true
releases:
  initial:
    integration:
      name: "5.0"
      namespace: ocp-priv
  latest:
    integration:
      include_built_images: true
      name: "5.0"
      namespace: ocp-priv
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
  installer-artifacts:
    requests:
      cpu: "3"
      memory: 5Gi
zz_generated_metadata:
  branch: release-5.0
  org: openshift-priv
  repo: installer
  variant: artifacts
