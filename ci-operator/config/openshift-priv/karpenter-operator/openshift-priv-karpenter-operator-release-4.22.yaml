build_root:
  from_repository: true
canonical_go_repository: github.com/openshift/karpenter-operator
promotion:
  to:
  - name: "4.22"
    namespace: ocp-priv
prowgen:
  private: true
releases:
  initial:
    integration:
      name: "4.22"
      namespace: ocp-priv
  latest:
    integration:
      include_built_images: true
      name: "4.22"
      namespace: ocp-priv
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: e2e-aws
  steps:
    cluster_profile: openshift-org-aws
    workflow: openshift-e2e-aws
zz_generated_metadata:
  branch: release-4.22
  org: openshift-priv
  repo: karpenter-operator
