build_root:
  from_repository: true
  use_build_cache: true
canonical_go_repository: github.com/openshift/karpenter-operator
images:
  items:
  - dockerfile_path: Dockerfile
    to: karpenter-operator
promotion:
  to:
  - name: "5.0"
    namespace: ocp-priv
prowgen:
  private: true
releases:
  initial:
    integration:
      name: "5.0"
      namespace: ocp-priv
  latest:
    integration:
      include_built_images: true
      name: "5.0"
      namespace: ocp-priv
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
  karpenter-operator:
    limits:
      memory: 8Gi
    requests:
      cpu: 200m
      memory: 400Mi
  verify:
    limits:
      memory: 8Gi
    requests:
      cpu: 200m
      memory: 400Mi
tests:
- as: e2e-aws
  skip_if_only_changed: ^docs/|^\.github|\.md$|\.mdc$|^(?:.*/)?(?:\.gitignore|\.coderabbit\.yaml|OWNERS|OWNERS_ALIASES|PROJECT|LICENSE)$
  steps:
    cluster_profile: openshift-org-aws
    env:
      FEATURE_GATES: '["KarpenterOperator=true"]'
      FEATURE_SET: CustomNoUpgrade
    workflow: openshift-e2e-aws
- as: e2e-aws-operator
  skip_if_only_changed: ^docs/|^\.github|\.md$|\.mdc$|^(?:.*/)?(?:\.gitignore|\.coderabbit\.yaml|OWNERS|OWNERS_ALIASES|PROJECT|LICENSE)$
  steps:
    cluster_profile: openshift-org-aws
    env:
      FEATURE_GATES: '["KarpenterOperator=true"]'
      FEATURE_SET: CustomNoUpgrade
    test:
    - as: test
      cli: latest
      commands: make e2e
      from: src
      resources:
        requests:
          cpu: 100m
    workflow: ipi-aws
- as: verify
  commands: |
    export GOCACHE=/tmp/
    export GOLANGCI_LINT_CACHE=/tmp/.cache
    export GOPROXY=https://proxy.golang.org
    make verify
  container:
    from: src
  skip_if_only_changed: ^docs/|^\.github|\.md$|\.mdc$|^(?:.*/)?(?:\.gitignore|\.coderabbit\.yaml|OWNERS|OWNERS_ALIASES|PROJECT|LICENSE)$
zz_generated_metadata:
  branch: main
  org: openshift-priv
  repo: karpenter-operator
