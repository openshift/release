build_root:
  from_repository: true
canonical_go_repository: github.com/openshift/assisted-image-service
images:
  items:
  - dockerfile_path: Dockerfile.image-service
    to: assisted-image-service
promotion:
  to:
  - disabled: true
    name: "5.0"
    namespace: stolostron
prowgen:
  private: true
releases:
  latest:
    integration:
      name: 4.18-priv
      namespace: ocp-private
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
zz_generated_metadata:
  branch: main
  org: openshift-priv
  repo: assisted-image-service
  variant: mce
