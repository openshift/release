base_images:
  base:
    name: ubi
    namespace: ocp
    tag: "9"
  stolostron_builder_go1.25-linux:
    name: builder
    namespace: stolostron
    tag: go1.25-linux
build_root:
  image_stream_tag:
    name: builder
    namespace: stolostron
    tag: go1.25-linux
canonical_go_repository: github.com/stolostron/grafana
images:
  items:
  - dockerfile_path: Dockerfile.ocp
    from: base
    inputs:
      stolostron_builder_go1.25-linux:
        as:
        - registry.ci.openshift.org/stolostron/builder:go1.25-linux
    to: grafana
promotion:
  to:
  - disabled: true
    name: "5.0"
    namespace: stolostron
prowgen:
  private: true
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: ocm-ci-rbac
  steps:
    workflow: ocm-ci-rbac
- as: pr-image-mirror
  steps:
    dependencies:
      SOURCE_IMAGE_REF: grafana
    env:
      IMAGE_REPO: grafana
      REGISTRY_ORG: stolostron
    workflow: ocm-ci-image-mirror
zz_generated_metadata:
  branch: release-5.0
  org: openshift-priv
  repo: stolostron-grafana
