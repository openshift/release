base_images:
  hypershift-tests:
    name: hypershift-tests
    namespace: hypershift
    tag: latest
build_root:
  from_repository: true
canonical_go_repository: github.com/openshift/aws-encryption-provider
images:
  items:
  - dockerfile_path: Dockerfile.openshift
    to: aws-kms-encryption-provider
promotion:
  to:
  - disabled: true
    name: 5.0-priv
    namespace: ocp-private
prowgen:
  private: true
releases:
  initial:
    candidate:
      product: ocp
      relative: 1
      stream: ci
      version: "5.0"
  latest:
    integration:
      include_built_images: true
      name: 5.0-priv
      namespace: ocp-private
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: verify
  commands: mkdir /tmp/.cache && GOLANGCI_LINT_CACHE=/tmp/.cache GOCACHE=/tmp/.cache
    make lint
  container:
    from: src
- as: unit
  commands: make test
  container:
    from: src
- as: e2e-hypershift
  steps:
    cluster_profile: hypershift-aws
    workflow: hypershift-aws-e2e-external
- as: verify-deps
  steps:
    env:
      CHECK_MOD_LIST: "false"
    test:
    - ref: go-verify-deps
zz_generated_metadata:
  branch: release-5.0
  org: openshift-priv
  repo: aws-encryption-provider
