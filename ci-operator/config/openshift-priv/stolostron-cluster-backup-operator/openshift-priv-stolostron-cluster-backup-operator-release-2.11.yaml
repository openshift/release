build_root:
  image_stream_tag:
    name: builder
    namespace: stolostron
    tag: go1.24-linux
canonical_go_repository: github.com/stolostron/cluster-backup-operator
images:
  items:
  - dockerfile_path: Dockerfile
    to: cluster-backup-controller
promotion:
  to:
  - disabled: true
    name: "2.11"
    namespace: stolostron
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: unit-tests
  commands: make -f Makefile.prow unit-tests
  container:
    from: src
- as: sonar
  commands: |
    export SELF="make -f Makefile.prow"
    export HOME="/tmp"
    make -f Makefile.prow sonar/go/prow
  container:
    from: src
  secrets:
  - mount_path: /etc/sonarcloud/
    name: acm-sonarcloud-token
- as: pr-image-mirror
  steps:
    dependencies:
      SOURCE_IMAGE_REF: cluster-backup-controller
    env:
      IMAGE_REPO: cluster-backup-controller
      REGISTRY_ORG: stolostron
    workflow: ocm-ci-image-mirror
zz_generated_metadata:
  branch: release-2.11
  org: openshift-priv
  repo: stolostron-cluster-backup-operator
