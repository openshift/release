build_root:
  from_repository: true
canonical_go_repository: github.com/openshift/cluster-kube-descheduler-operator
images:
  items:
  - dockerfile_path: Dockerfile.rhel7
    to: cluster-kube-descheduler-operator
promotion:
  to:
  - disabled: true
    name: 5.0-priv
    namespace: ocp-private
prowgen:
  private: true
releases:
  initial:
    integration:
      name: 5.0-priv
      namespace: ocp-private
  latest:
    integration:
      include_built_images: true
      name: 5.0-priv
      namespace: ocp-private
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: verify
  commands: make verify-gofmt
  container:
    from: src
- as: unit
  commands: make test-unit
  container:
    from: src
- as: e2e-aws-operator
  steps:
    cluster_profile: openshift-org-aws
    test:
    - as: test
      cli: latest
      commands: make test-e2e
      from: src
      resources:
        requests:
          cpu: 100m
    workflow: ipi-aws
- always_run: false
  as: e2e-aws-operator-serial-ote
  optional: true
  skip_if_only_changed: ^\.tekton/|^bundle\.Dockerfile$|\.md$|^(?:.*/)?(?:\.gitignore|LICENSE|OWNERS)$
  steps:
    cluster_profile: openshift-org-aws
    dependencies:
      EXTENSION_IMAGE: cluster-kube-descheduler-operator
    env:
      EXTENSION_BINARY_PATH: /usr/bin/cluster-kube-descheduler-operator-tests-ext.gz
      EXTENSION_COMPONENT_NAME: cluster-kube-descheduler-operator
      FIPS_ENABLED: "true"
      TEST_SUITE: openshift/cluster-kube-descheduler-operator/operator/serial
    pre:
    - chain: ipi-aws-pre
    - ref: fips-check
    test:
    - ref: openshift-tests-extension-setup-out-of-payload
    - ref: openshift-e2e-test
    workflow: ipi-aws
zz_generated_metadata:
  branch: release-5.0
  org: openshift-priv
  repo: cluster-kube-descheduler-operator
