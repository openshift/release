base_images:
  hypershift-operator:
    name: hypershift-operator
    namespace: hypershift
    tag: latest
build_root:
  image_stream_tag:
    name: release
    namespace: openshift
    tag: rhel-8-release-golang-1.25-openshift-4.23
canonical_go_repository: github.com/openshift/monitoring-plugin
images:
- dockerfile_path: Dockerfile
  to: monitoring-plugin
- dockerfile_path: Dockerfile.test
  to: monitoring-plugin-test
- context_dir: .
  dockerfile_path: web/cypress/Dockerfile
  to: monitoring-ui-tests-runner
promotion:
  to:
  - excluded_images:
    - monitoring-plugin-test
    name: 4.18-priv
    namespace: ocp-private
releases:
  initial:
    integration:
      name: 4.18-priv
      namespace: ocp-private
  latest:
    integration:
      include_built_images: true
      name: 4.18-priv
      namespace: ocp-private
resources:
  '*':
    limits:
      memory: 8Gi
    requests:
      cpu: 1000m
      memory: 8Gi
tests:
- as: lint
  commands: |
    npm run lint
  container:
    from: monitoring-plugin-test
- as: e2e-aws-ovn
  steps:
    cluster_profile: openshift-org-aws
    workflow: openshift-e2e-aws
- as: e2e-aws-ovn-upgrade
  steps:
    cluster_profile: openshift-org-aws
    workflow: openshift-upgrade-aws
- as: e2e-hypershift-conformance
  steps:
    cluster_profile: hypershift-aws
    workflow: hypershift-aws-conformance
- always_run: false
  as: e2e-monitoring
  cluster_claim:
    architecture: amd64
    cloud: aws
    labels:
      region: us-east-1
    owner: openshift-ci
    product: ocp
    timeout: 2h0m0s
    version: "4.18"
  optional: true
  steps:
    test:
    - ref: monitoring-plugin-tests-monitoring-ui-pf5
    workflow: generic-claim
zz_generated_metadata:
  branch: release-4.18
  org: openshift-priv
  repo: monitoring-plugin
