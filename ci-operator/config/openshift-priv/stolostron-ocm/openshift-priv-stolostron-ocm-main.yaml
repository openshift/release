base_images:
  base:
    name: ubi-minimal
    namespace: ocp
    tag: "9"
binary_build_commands: make build --warn-undefined-variables
build_root:
  image_stream_tag:
    name: builder
    namespace: stolostron
    tag: go1.25-linux
canonical_go_repository: github.com/stolostron/ocm
images:
  items:
  - dockerfile_path: build/Dockerfile.registration-operator
    from: base
    to: registration-operator
  - dockerfile_path: build/Dockerfile.registration
    from: base
    to: registration
  - dockerfile_path: build/Dockerfile.work
    from: base
    to: work
  - dockerfile_path: build/Dockerfile.placement
    from: base
    to: placement
  - dockerfile_path: build/Dockerfile.addon
    from: base
    to: addon-manager
prowgen:
  private: true
releases:
  initial:
    integration:
      name: 4.22-priv
      namespace: ocp-private
  latest:
    integration:
      include_built_images: true
      name: 4.22-priv
      namespace: ocp-private
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
test_binary_build_commands: make build GO_BUILD_FLAGS:='-race' --warn-undefined-variables
zz_generated_metadata:
  branch: main
  org: openshift-priv
  repo: stolostron-ocm
