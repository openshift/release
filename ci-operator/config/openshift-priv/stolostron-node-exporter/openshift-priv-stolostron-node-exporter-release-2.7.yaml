base_images:
  base:
    name: ubi-minimal
    namespace: ocp
    tag: "8"
build_root:
  image_stream_tag:
    name: builder
    namespace: stolostron
    tag: go1.18-linux
canonical_go_repository: github.com/stolostron/node-exporter
images:
  items:
  - dockerfile_path: Dockerfile.ocp
    from: base
    to: node-exporter
promotion:
  to:
  - disabled: true
    name: "2.7"
    namespace: stolostron
releases:
  initial:
    integration:
      name: 4.9-priv
      namespace: ocp-private
  latest:
    integration:
      include_built_images: true
      name: 4.9-priv
      namespace: ocp-private
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: test-unit
  commands: make test
  container:
    from: src
- as: ocm-ci-rbac
  steps:
    workflow: ocm-ci-rbac
- as: pr-image-mirror
  steps:
    dependencies:
      SOURCE_IMAGE_REF: node-exporter
    env:
      IMAGE_REPO: node-exporter
      REGISTRY_ORG: stolostron
    workflow: ocm-ci-image-mirror
- as: test-e2e
  commands: make test
  container:
    from: src
- as: sonar-pre-submit
  commands: |
    export SELF="make -f /opt/build-harness/Makefile.prow"
    make -f /opt/build-harness/Makefile.prow sonar/go/prow
  container:
    from: src
  secrets:
  - mount_path: /etc/sonarcloud/
    name: acm-sonarcloud-token
zz_generated_metadata:
  branch: release-2.7
  org: openshift-priv
  repo: stolostron-node-exporter
