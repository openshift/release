base_images:
  base:
    name: ubi-minimal
    namespace: ocp
    tag: "9"
  stolostron_builder_go1.24-linux:
    name: builder
    namespace: stolostron
    tag: go1.25-linux
build_root:
  image_stream_tag:
    name: builder
    namespace: stolostron
    tag: go1.25-linux
canonical_go_repository: github.com/stolostron/node-exporter
images:
  items:
  - dockerfile_path: Dockerfile.ocp
    from: base
    inputs:
      stolostron_builder_go1.24-linux:
        as:
        - registry.ci.openshift.org/stolostron/builder:go1.24-linux
    to: node-exporter
promotion:
  to:
  - disabled: true
    name: "5.0"
    namespace: stolostron
prowgen:
  private: true
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: test-unit
  commands: make -f Makefile.prow test
  container:
    from: src
  skip_if_only_changed: ^(?:docs|\.github|\.tekton)|\.md$|^(?:\.gitignore|.golang-ci.yml|OWNERS|LICENSE)$
- as: ocm-ci-rbac
  steps:
    workflow: ocm-ci-rbac
- as: pr-image-mirror
  steps:
    dependencies:
      SOURCE_IMAGE_REF: node-exporter
    env:
      IMAGE_REPO: node-exporter
      REGISTRY_ORG: stolostron
    workflow: ocm-ci-image-mirror
- as: test-e2e
  commands: make -f Makefile.prow test
  container:
    from: src
  skip_if_only_changed: ^(?:docs|\.github|\.tekton)|\.md$|^(?:\.gitignore|.golang-ci.yml|OWNERS|LICENSE)$
zz_generated_metadata:
  branch: release-5.0
  org: openshift-priv
  repo: stolostron-node-exporter
