base_images:
  hypershift-operator:
    name: hypershift-operator
    namespace: hypershift
    tag: latest
  hypershift-tests:
    name: hypershift-tests
    namespace: hypershift
    tag: latest
binary_build_commands: GOFLAGS=-mod=readonly make build --warn-undefined-variables
build_root:
  from_repository: true
canonical_go_repository: go.etcd.io/etcd
images:
  items:
  - dockerfile_path: Dockerfile.rhel
    to: etcd
  - dockerfile_path: Dockerfile.installer
    to: installer-etcd-artifacts
promotion:
  to:
  - disabled: true
    name: 5.0-priv
    namespace: ocp-private
prowgen:
  private: true
releases:
  initial:
    integration:
      name: 5.0-priv
      namespace: ocp-private
  latest:
    integration:
      include_built_images: true
      name: 5.0-priv
      namespace: ocp-private
resources:
  '*':
    requests:
      cpu: "4"
      memory: 3Gi
tests:
- as: upstream-unit
  commands: CGO_ENABLED=1 make test-unit --warn-undefined-variables
  container:
    from: bin
- as: upstream-integration
  commands: CGO_ENABLED=1 make test-integration --warn-undefined-variables
  container:
    from: bin
  optional: true
- as: upstream-e2e
  commands: CGO_ENABLED=1 PASSES="e2e" ./scripts/test.sh
  container:
    from: bin
  optional: true
- as: upstream-release
  commands: CGO_ENABLED=1 PASSES="release" ./scripts/test.sh
  container:
    from: bin
  optional: true
- as: e2e-aws-ovn
  steps:
    cluster_profile: openshift-org-aws
    workflow: openshift-e2e-aws
- as: e2e-aws-ovn-serial
  steps:
    cluster_profile: openshift-org-aws
    workflow: openshift-e2e-aws-serial
- as: e2e-aws-ovn-upgrade
  steps:
    cluster_profile: openshift-org-aws
    workflow: openshift-upgrade-aws
- as: configmap-scale
  steps:
    cluster_profile: openshift-org-aws
    workflow: openshift-perfscale-e2e-configmap-scale
- always_run: false
  as: e2e-aws-etcd-recovery
  optional: true
  steps:
    cluster_profile: openshift-org-aws
    workflow: openshift-e2e-aws-etcd-recovery
- always_run: false
  as: e2e-hypershift
  optional: true
  steps:
    cluster_profile: hypershift-aws
    workflow: hypershift-aws-e2e-external
- always_run: false
  as: e2e-hypershift-conformance
  optional: true
  steps:
    cluster_profile: hypershift-aws
    workflow: hypershift-aws-conformance
- always_run: false
  as: perfscale-payload-control-plane-6nodes
  optional: true
  steps:
    cluster_profile: aws-perfscale-qe
    env:
      BASE_DOMAIN: qe.devcluster.openshift.com
      COMPUTE_NODE_REPLICAS: "6"
      ENABLE_LOCAL_INDEX: "true"
      EXTRA_FLAGS: --churn-duration=20m --pod-ready-threshold=20s
      ITERATION_MULTIPLIER_ENV: "15"
      ZONES_COUNT: "3"
    test:
    - chain: openshift-qe-control-plane
    workflow: openshift-qe-installer-aws
zz_generated_metadata:
  branch: release-5.0
  org: openshift-priv
  repo: etcd
