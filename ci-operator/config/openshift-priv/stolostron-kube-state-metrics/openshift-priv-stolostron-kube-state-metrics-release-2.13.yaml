base_images:
  base:
    name: ubi-minimal
    namespace: ocp
    tag: "9"
build_root:
  image_stream_tag:
    name: builder
    namespace: stolostron
    tag: go1.24-linux
canonical_go_repository: github.com/stolostron/kube-state-metrics
images:
  items:
  - dockerfile_path: Dockerfile.prow
    from: base
    to: kube-state-metrics
promotion:
  to:
  - disabled: true
    name: "2.13"
    namespace: stolostron
resources:
  '*':
    limits:
      memory: 6Gi
    requests:
      cpu: 100m
      memory: 1Gi
test_binary_build_commands: "true"
tests:
- as: test
  commands: |
    export SELF="make -f Makefile.prow"
    make -f Makefile.prow test-unit
  container:
    from: src
  skip_if_only_changed: ^(?:docs|\.github|\.tekton)|\.md$|^(?:\.gitignore|.golang-ci.yml|OWNERS|LICENSE)$
- as: ocm-ci-rbac
  steps:
    workflow: ocm-ci-rbac
- as: pr-image-mirror
  steps:
    dependencies:
      SOURCE_IMAGE_REF: kube-state-metrics
    env:
      IMAGE_REPO: kube-state-metrics
      REGISTRY_ORG: stolostron
    workflow: ocm-ci-image-mirror
zz_generated_metadata:
  branch: release-2.13
  org: openshift-priv
  repo: stolostron-kube-state-metrics
