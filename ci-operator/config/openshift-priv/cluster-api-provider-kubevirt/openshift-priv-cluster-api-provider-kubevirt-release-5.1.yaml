base_images:
  base:
    name: 5.1-priv
    namespace: ocp-private
    tag: base
  cli:
    name: 5.1-priv
    namespace: ocp-private
    tag: cli
  hypershift-operator:
    name: hypershift-operator
    namespace: hypershift
    tag: latest
  hypershift-tests:
    name: hypershift-tests
    namespace: hypershift
    tag: latest
binary_build_commands: make manager
build_root:
  image_stream_tag:
    name: release
    namespace: openshift
    tag: rhel-9-release-golang-1.25-openshift-4.22
canonical_go_repository: github.com/openshift/cluster-api-provider-kubevirt
images:
  items:
  - build_args:
    - name: ARCH
      value: amd64
    - name: ldflags
    dockerfile_literal: |-
      FROM registry.ci.openshift.org/openshift/release:rhel-9-release-golang-1.25-openshift-4.22 as toolchain

      # Run this with docker build --build_arg $(go env GOPROXY) to override the goproxy
      ARG goproxy=https://proxy.golang.org
      ENV GOPROXY=$goproxy
      ENV GOFLAGS="-mod=readonly"

      FROM toolchain as builder
      WORKDIR /workspace

      # Copy the sources
      COPY ./ ./
      RUN go mod download

      # Build
      ARG package=.
      ARG ARCH
      ARG LDFLAGS
      RUN CGO_ENABLED=0 GOOS=linux GOARCH=${ARCH} go build -ldflags "${LDFLAGS} -extldflags '-static'"  -o manager ${package}
      ENTRYPOINT [ "/start.sh", "/workspace/manager" ]

      # Copy the controller-manager into a thin image
      FROM gcr.io/distroless/static:nonroot
      WORKDIR /
      COPY --from=builder /workspace/manager .
      # Use uid of nonroot user (65532) because kubernetes expects numeric user when applying pod security policies
      USER 65532
      ENTRYPOINT ["/manager"]
    from: base
    to: cluster-api-provider-kubevirt
promotion:
  to:
  - name: 5.1-priv
    namespace: ocp-private
prowgen:
  private: true
releases:
  initial:
    integration:
      name: 5.1-priv
      namespace: ocp-private
  latest:
    integration:
      include_built_images: true
      name: 5.1-priv
      namespace: ocp-private
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: unit-tests
  commands: GOFLAGS="-mod=readonly" make test
  container:
    from: src
- as: e2e-hypershift-kubevirt
  skip_if_only_changed: ^\.tekton/|^docs/\^\.github|\.md$|^(?:.*/)?(?:\.gitignore|OWNERS|PROJECT|LICENSE)$
  steps:
    cluster_profile: aws-virtualization
    env:
      BASE_DOMAIN: cnv-ci.syseng.devcluster.openshift.com
      CNV_SUBSCRIPTION_SOURCE: redhat-operators
      COMPUTE_NODE_REPLICAS: "1"
      COMPUTE_NODE_TYPE: c5n.metal
      E2E_TEST_REGEX: ^TestCreateCluster$|TestAutoscaling
      ETCD_STORAGE_CLASS: gp3-csi
      KUBEVIRT_CSI_INFRA: gp3-csi
    pre:
    - chain: ipi-aws-ovn-pre
    - chain: ipi-install
    - ref: hypershift-kubevirt-install
    - ref: hypershift-install
    - chain: hypershift-kubevirt-custom-capk
    workflow: hypershift-kubevirt-e2e-aws-capk
  timeout: 5h0m0s
zz_generated_metadata:
  branch: release-5.1
  org: openshift-priv
  repo: cluster-api-provider-kubevirt
