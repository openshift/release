base_images:
  stolostron_builder_go1.25-linux:
    name: builder
    namespace: stolostron
    tag: go1.25-linux
build_root:
  image_stream_tag:
    name: builder
    namespace: stolostron
    tag: go1.25-linux
canonical_go_repository: github.com/stolostron/cluster-image-set-controller
images:
  items:
  - dockerfile_path: Dockerfile
    inputs:
      stolostron_builder_go1.25-linux:
        as:
        - registry.ci.openshift.org/stolostron/builder:go1.25-linux
    to: cluster-image-set-controller
promotion:
  to:
  - disabled: true
    name: "5.0"
    namespace: stolostron
prowgen:
  private: true
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: unit-tests
  commands: make test
  container:
    from: src
- as: sonar
  commands: |
    export SONAR_GO_TEST_ARGS="./..."
    export SELF="make -f /opt/build-harness/Makefile.prow"
    make -f /opt/build-harness/Makefile.prow sonar/go/prow
  container:
    from: src
  secrets:
  - mount_path: /etc/sonarcloud/
    name: acm-sonarcloud-token
- as: pr-image-mirror
  steps:
    dependencies:
      SOURCE_IMAGE_REF: cluster-image-set-controller
    env:
      IMAGE_REPO: cluster-image-set-controller
      REGISTRY_ORG: stolostron
    workflow: ocm-ci-image-mirror
zz_generated_metadata:
  branch: backplane-5.0
  org: openshift-priv
  repo: stolostron-cluster-image-set-controller
