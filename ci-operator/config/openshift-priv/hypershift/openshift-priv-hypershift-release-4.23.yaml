base_images:
  claude-ai-helpers:
    name: claude-ai-helpers
    namespace: ci
    tag: latest
  cli:
    name: 4.23-priv
    namespace: ocp-private
    tag: cli
  dev-scripts:
    name: test
    namespace: ocp-kni
    tag: dev-scripts
  hypershift-operator-init:
    name: hypershift-operator
    namespace: hypershift
    tag: latest
  manila-csi-driver-operator-test:
    name: 4.23-priv
    namespace: ocp-private
    tag: manila-csi-driver-operator-test
  openstack-cinder-csi-driver-operator-test:
    name: 4.23-priv
    namespace: ocp-private
    tag: openstack-cinder-csi-driver-operator-test
build_root:
  from_repository: true
  use_build_cache: true
canonical_go_repository: github.com/openshift/hypershift
images:
  items:
  - to: hypershift-operator
  - dockerfile_path: Dockerfile.control-plane
    to: hypershift
  - dockerfile_path: Dockerfile.e2e
    to: hypershift-tests
  - dockerfile_literal: |
      FROM hypershift-operator
      RUN yum install -y jq && yum clean all
    from: hypershift-operator
    to: hypershift-cli
promotion:
  to:
  - excluded_images:
    - hypershift-cli
    - hypershift-operator
    - hypershift-tests
    name: 4.23-priv
    namespace: ocp-private
prowgen:
  private: true
releases:
  initial:
    candidate:
      product: ocp
      relative: 1
      stream: ci
      version: "4.23"
  initial-422:
    candidate:
      product: ocp
      relative: 1
      stream: ci
      version: "4.23"
  latest:
    integration:
      include_built_images: true
      name: 4.23-priv
      namespace: ocp-private
  latest-421:
    candidate:
      product: ocp
      stream: ci
      version: "4.23"
  latest-422:
    candidate:
      product: ocp
      stream: ci
      version: "4.23"
  multi-initial:
    candidate:
      architecture: multi
      product: ocp
      relative: 1
      stream: nightly
      version: "4.23"
  multi-latest:
    candidate:
      architecture: multi
      product: ocp
      stream: nightly
      version: "4.23"
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- always_run: false
  as: agentic-qe-aws
  optional: true
  steps:
    cluster_profile: hypershift-aws
    env:
      TECH_PREVIEW_NO_UPGRADE: "true"
    workflow: hypershift-agentic-qe-aws
- always_run: false
  as: e2e-aks
  pipeline_skip_if_only_changed: (^(\.tekton|\.github|\.claude|docs|examples|enhancements|contrib|\.cursor|test/envtest)/)|(\.md$)|((^|/)OWNERS$)|(/overrides\.yaml$)|(^renovate\.json$)|(/\.testcoverage\.yml$)|(^\.gitlint$)|(^\.gitignore$)|(^\.coderabbit\.yaml$)|(^\.dockerignore$)|(^codecov\.yml$)|(^(?:[^t/][^/]*|t|t[^e/][^/]*|te|te[^s/][^/]*|tes|tes[^t/][^/]*|test[^/]+)/.*_test\.go$)
  steps:
    cluster_profile: hypershift-aks
    env:
      AUTH_THROUGH_CERTS: "true"
      ENABLE_HYPERSHIFT_CERT_ROTATION_SCALE: "true"
      HYPERSHIFT_AZURE_LOCATION: centralus
      HYPERSHIFT_AZURE_MARKETPLACE_IMAGE_OFFER: ""
      HYPERSHIFT_AZURE_MARKETPLACE_IMAGE_PUBLISHER: ""
      HYPERSHIFT_AZURE_MARKETPLACE_IMAGE_SKU: ""
      HYPERSHIFT_AZURE_MARKETPLACE_IMAGE_VERSION: ""
      NODEPOOL_N1_VERSION: "4.22"
      NODEPOOL_N2_VERSION: "4.21"
      NODEPOOL_N3_VERSION: "4.20"
      NODEPOOL_N4_VERSION: "4.19"
    post:
    - ref: hypershift-analyze-e2e-failure
    - chain: cucushift-installer-rehearse-azure-aks-deprovision
    workflow: hypershift-azure-aks-e2e
- always_run: false
  as: e2e-aks-4-22
  pipeline_run_if_changed: ^(test/e2e|hypershift-operator)
  steps:
    cluster_profile: hypershift-aks
    dependencies:
      OCP_IMAGE_LATEST: release:latest-422
      OCP_IMAGE_PREVIOUS: release:initial-422
    env:
      AUTH_THROUGH_CERTS: "true"
      ENABLE_HYPERSHIFT_CERT_ROTATION_SCALE: "true"
      HYPERSHIFT_AZURE_LOCATION: centralus
      NODEPOOL_N1_VERSION: "4.21"
      NODEPOOL_N2_VERSION: "4.20"
      NODEPOOL_N3_VERSION: "4.19"
      NODEPOOL_N4_VERSION: "4.18"
    workflow: hypershift-azure-aks-e2e
- as: e2e-aks-override
  run_if_changed: (/overrides\.yaml$)
  steps:
    cluster_profile: hypershift-aks
    env:
      AUTH_THROUGH_CERTS: "true"
      ENABLE_HYPERSHIFT_CERT_ROTATION_SCALE: "true"
      HYPERSHIFT_AZURE_LOCATION: centralus
      TEST_CPO_OVERRIDE: "1"
    workflow: hypershift-azure-aks-e2e
- always_run: false
  as: e2e-aws
  capabilities:
  - build-tmpfs
  pipeline_skip_if_only_changed: (^(\.tekton|\.github|\.claude|docs|examples|enhancements|contrib|\.cursor|test/envtest)/)|(\.md$)|((^|/)OWNERS$)|(/overrides\.yaml$)|(^renovate\.json$)|(/\.testcoverage\.yml$)|(^\.gitlint$)|(^\.gitignore$)|(^\.coderabbit\.yaml$)|(^\.dockerignore$)|(^codecov\.yml$)|(^(?:[^t/][^/]*|t|t[^e/][^/]*|te|te[^s/][^/]*|tes|tes[^t/][^/]*|test[^/]+)/.*_test\.go$)
  steps:
    cluster_profile: hypershift-aws
    env:
      ENABLE_HYPERSHIFT_CERT_ROTATION_SCALE: "true"
      NODEPOOL_N1_VERSION: "4.22"
      NODEPOOL_N2_VERSION: "4.21"
      NODEPOOL_N3_VERSION: "4.20"
      NODEPOOL_N4_VERSION: "4.19"
      REQUEST_SERVING_COMPONENT_TEST: "true"
    post:
    - ref: hypershift-analyze-e2e-failure
    - chain: hypershift-destroy-nested-management-cluster
    workflow: hypershift-aws-e2e-nested
- always_run: false
  as: e2e-v2-aws
  pipeline_skip_if_only_changed: (^(\.tekton|\.github|\.claude|docs|examples|enhancements|contrib|\.cursor|test/envtest)/)|(\.md$)|((^|/)OWNERS$)|(/overrides\.yaml$)|(^renovate\.json$)|(/\.testcoverage\.yml$)|(^\.gitlint$)|(^\.gitignore$)|(^\.coderabbit\.yaml$)|(^\.dockerignore$)|(^codecov\.yml$)|(^(?:[^t/][^/]*|t|t[^e/][^/]*|te|te[^s/][^/]*|tes|tes[^t/][^/]*|test[^/]+)/.*_test\.go$)
  steps:
    cluster_profile: hypershift-aws
    env:
      TECH_PREVIEW_NO_UPGRADE: "true"
    workflow: hypershift-aws-e2e-v2
- always_run: false
  as: e2e-v2-aws-backuprestore
  optional: true
  steps:
    cluster_profile: hypershift-aws
    env:
      TECH_PREVIEW_NO_UPGRADE: "true"
      TEST_SUITE: openshift/conformance/parallel/minimal
    workflow: hypershift-aws-e2e-backuprestore
- always_run: false
  as: e2e-kubevirt-metal-ovn-backuprestore
  capabilities:
  - intranet
  optional: true
  steps:
    cluster_profile: equinix-ocp-hcp
    env:
      KONFLUX_DEPLOY_CATALOG_SOURCE: "true"
      KONFLUX_DEPLOY_OPERATORS: "true"
      KONFLUX_DEPLOY_SUBSCRIPTION: "false"
      KONFLUX_TARGET_FBC_TAGS: ocp__4.22__metallb-rhel9-operator,ocp__4.22__ose-local-storage-rhel9-operator,oadp-operator-fbc-1.6.0-20260327171703
      KONFLUX_TARGET_OPERATORS: ""
      LOCAL_STORAGE_OPERATOR_SUB_SOURCE: ocp--4.22--ose-local-storage-rhel9-operator-konflux
      LVM_OPERATOR_SUB_CHANNEL: stable-4.22
      LVM_OPERATOR_SUB_SOURCE: lvm-catalogsource
      MCE_VERSION: "2.17"
      METALLB_OPERATOR_SUB_SOURCE: ocp--4.22--metallb-rhel9-operator-konflux
      OADP_OPERATOR_SUB_CHANNEL: stable
      OADP_OPERATOR_SUB_SOURCE: oadp-operator-fbc-1.6.0-20260327171703-konflux
      ODF_OPERATOR_SUB_CHANNEL: stable-4.21
      ODF_OPERATOR_SUB_SOURCE: redhat-operators-v4-21
      REDHAT_OPERATORS_INDEX_TAG: v4.21
    workflow: hypershift-mce-kubevirt-baremetalds-backuprestore
- always_run: false
  as: e2e-agent-connected-ovn-ipv4-metal-backuprestore
  capabilities:
  - intranet
  optional: true
  steps:
    cluster_profile: equinix-ocp-hcp
    env:
      KONFLUX_DEPLOY_CATALOG_SOURCE: "true"
      KONFLUX_DEPLOY_OPERATORS: "true"
      KONFLUX_DEPLOY_SUBSCRIPTION: "false"
      KONFLUX_TARGET_FBC_TAGS: ocp__4.22__metallb-rhel9-operator,oadp-operator-fbc-1.6.0-20260327171703
      KONFLUX_TARGET_OPERATORS: ""
      LVM_OPERATOR_SUB_CHANNEL: stable-4.22
      MCE_VERSION: "2.17"
      METALLB_OPERATOR_SUB_SOURCE: ocp--4.22--metallb-rhel9-operator-konflux
      OADP_OPERATOR_SUB_SOURCE: oadp-operator-fbc-1.6.0-20260327171703-konflux
    workflow: hypershift-mce-agent-metal3-backuprestore
- always_run: false
  as: e2e-azure-v2-self-managed
  pipeline_skip_if_only_changed: (^(\.tekton|\.github|\.claude|docs|examples|enhancements|contrib|\.cursor|test/envtest)/)|(\.md$)|((^|/)OWNERS$)|(/overrides\.yaml$)|(^renovate\.json$)|(/\.testcoverage\.yml$)|(^\.gitlint$)|(^\.gitignore$)|(^\.coderabbit\.yaml$)|(^\.dockerignore$)|(^codecov\.yml$)|(^(?:[^t/][^/]*|t|t[^e/][^/]*|te|te[^s/][^/]*|tes|tes[^t/][^/]*|test[^/]+)/.*_test\.go$)
  steps:
    cluster_profile: hypershift-azure
    env:
      ENABLE_HYPERSHIFT_CERT_ROTATION_SCALE: "true"
      HYPERSHIFT_AZURE_LOCATION: centralus
      NODEPOOL_N1_VERSION: "4.22"
    workflow: hypershift-azure-e2e-v2-self-managed
- always_run: false
  as: e2e-aws-minimal
  optional: true
  steps:
    cluster_profile: hypershift-aws
    env:
      CI_TESTS_RUN: (^(TestCreateCluster$|TestCreateClusterV2$))
      ENABLE_HYPERSHIFT_CERT_ROTATION_SCALE: "true"
      NODEPOOL_N1_VERSION: "4.22"
      NODEPOOL_N2_VERSION: "4.21"
      NODEPOOL_N3_VERSION: "4.20"
      NODEPOOL_N4_VERSION: "4.19"
      REQUEST_SERVING_COMPONENT_TEST: "true"
    workflow: hypershift-aws-e2e-nested
- always_run: false
  as: e2e-aws-techpreview
  optional: true
  steps:
    cluster_profile: hypershift-aws
    env:
      ENABLE_HYPERSHIFT_CERT_ROTATION_SCALE: "true"
      NODEPOOL_N1_VERSION: "4.22"
      NODEPOOL_N2_VERSION: "4.21"
      NODEPOOL_N3_VERSION: "4.20"
      NODEPOOL_N4_VERSION: "4.19"
      REQUEST_SERVING_COMPONENT_TEST: "true"
      TECH_PREVIEW_NO_UPGRADE: "true"
    workflow: hypershift-aws-e2e-nested
- always_run: false
  as: e2e-aws-upgrade-hypershift-operator
  capabilities:
  - build-tmpfs
  pipeline_skip_if_only_changed: (^(\.tekton|\.github|\.claude|docs|examples|enhancements|contrib|\.cursor|test/envtest)/)|(\.md$)|((^|/)OWNERS$)|(/overrides\.yaml$)|(^renovate\.json$)|(/\.testcoverage\.yml$)|(^\.gitlint$)|(^\.gitignore$)|(^\.coderabbit\.yaml$)|(^\.dockerignore$)|(^codecov\.yml$)|(^(?:[^t/][^/]*|t|t[^e/][^/]*|te|te[^s/][^/]*|tes|tes[^t/][^/]*|test[^/]+)/.*_test\.go$)
  steps:
    cluster_profile: hypershift-aws
    dependencies:
      HYPERSHIFT_RELEASE_LATEST: hypershift-operator-init
    env:
      CI_TESTS_RUN: ^TestUpgradeHyperShiftOperator$
      INSTALL_FROM_LATEST: "true"
      RUN_UPGRADE_TEST: "true"
    workflow: hypershift-aws-e2e-nested
- as: e2e-aws-override
  capabilities:
  - build-tmpfs
  run_if_changed: (/overrides\.yaml$)
  steps:
    cluster_profile: hypershift-aws
    env:
      ENABLE_HYPERSHIFT_CERT_ROTATION_SCALE: "true"
      REQUEST_SERVING_COMPONENT_TEST: "true"
      TEST_CPO_OVERRIDE: "1"
    workflow: hypershift-aws-e2e-nested
- always_run: false
  as: e2e-aws-4-22
  capabilities:
  - build-tmpfs
  pipeline_run_if_changed: ^(test/e2e|hypershift-operator)
  steps:
    cluster_profile: hypershift-aws
    dependencies:
      OCP_IMAGE_LATEST: release:latest-422
      OCP_IMAGE_PREVIOUS: release:initial-422
    env:
      ENABLE_HYPERSHIFT_CERT_ROTATION_SCALE: "true"
      NODEPOOL_N1_VERSION: "4.21"
      NODEPOOL_N2_VERSION: "4.20"
      NODEPOOL_N3_VERSION: "4.19"
      NODEPOOL_N4_VERSION: "4.18"
      REQUEST_SERVING_COMPONENT_TEST: "true"
      RUN_KARPENTER_TESTS: "true"
    workflow: hypershift-aws-e2e-nested
- always_run: false
  as: e2e-kubevirt-aws-ovn-reduced
  pipeline_skip_if_only_changed: (^(\.tekton|\.github|\.claude|docs|examples|enhancements|contrib|\.cursor|test/envtest)/)|(\.md$)|((^|/)OWNERS$)|(/overrides\.yaml$)|(^renovate\.json$)|(/\.testcoverage\.yml$)|(^\.gitlint$)|(^\.gitignore$)|(^\.coderabbit\.yaml$)|(^\.dockerignore$)|(^codecov\.yml$)|(^(?:[^t/][^/]*|t|t[^e/][^/]*|te|te[^s/][^/]*|tes|tes[^t/][^/]*|test[^/]+)/.*_test\.go$)
  steps:
    cluster_profile: openshift-org-aws
    env:
      COMPUTE_NODE_REPLICAS: "1"
      COMPUTE_NODE_TYPE: c5n.metal
      E2E_TEST_REGEX: ^TestCreateCluster$|TestAutoscaling
      ENABLE_HYPERSHIFT_CERT_ROTATION_SCALE: "true"
      ENABLE_HYPERSHIFT_OPERATOR_DEFAULTING_WEBHOOK: "true"
      ETCD_STORAGE_CLASS: gp3-csi
      KUBEVIRT_CSI_INFRA: gp3-csi
      RUN_EXTERNAL_INFRA_TEST: "false"
    pre:
    - chain: ipi-aws-ovn-pre
    - chain: ipi-install
    - ref: hypershift-kubevirt-install
    - ref: hypershift-install
    workflow: hypershift-kubevirt-e2e-aws
- always_run: false
  as: e2e-kubevirt-aws-ovn
  optional: true
  steps:
    cluster_profile: openshift-org-aws
    dependencies:
      OPENSHIFT_INSTALL_RELEASE_IMAGE_OVERRIDE: release:latest-422
    env:
      COMPUTE_NODE_REPLICAS: "1"
      COMPUTE_NODE_TYPE: c5n.metal
      ENABLE_HYPERSHIFT_CERT_ROTATION_SCALE: "true"
      ENABLE_HYPERSHIFT_OPERATOR_DEFAULTING_WEBHOOK: "true"
      ETCD_STORAGE_CLASS: gp3-csi
      KUBEVIRT_CSI_INFRA: gp3-csi
    workflow: hypershift-kubevirt-e2e-aws
- always_run: false
  as: e2e-kubevirt-azure-ovn
  optional: true
  steps:
    cluster_profile: openshift-org-azure
    dependencies:
      OPENSHIFT_INSTALL_RELEASE_IMAGE_OVERRIDE: release:latest-422
    env:
      COMPUTE_NODE_REPLICAS: "3"
      COMPUTE_NODE_TYPE: Standard_D16as_v5
      ENABLE_HYPERSHIFT_CERT_ROTATION_SCALE: "true"
      ENABLE_HYPERSHIFT_OPERATOR_DEFAULTING_WEBHOOK: "true"
      ETCD_STORAGE_CLASS: managed-csi
      KUBEVIRT_CSI_INFRA: managed-csi
      ODF_BACKEND_STORAGE_CLASS: managed-csi
    workflow: hypershift-kubevirt-e2e-azure
- always_run: false
  as: e2e-aws-metrics
  optional: true
  steps:
    cluster_profile: hypershift-aws
    workflow: hypershift-aws-e2e-metrics
- always_run: false
  as: e2e-conformance
  optional: true
  steps:
    cluster_profile: hypershift-aws
    env:
      PUBLIC_ONLY: "true"
    workflow: hypershift-aws-conformance
- always_run: false
  as: e2e-conformance-fips
  optional: true
  steps:
    cluster_profile: hypershift-aws
    env:
      EXTRA_ARGS: --fips
      PUBLIC_ONLY: "true"
      TEST_SUITE: openshift/conformance/parallel/minimal
    test:
    - ref: hypershift-hostedcluster-fips-check
    - chain: hypershift-conformance
    workflow: hypershift-aws-conformance
- always_run: false
  as: e2e-aws-ovn-conformance-techpreview
  optional: true
  steps:
    cluster_profile: hypershift-aws
    env:
      GUEST_FEATURE_SET: TechPreviewNoUpgrade
      PUBLIC_ONLY: "true"
    workflow: hypershift-aws-conformance
- always_run: false
  as: e2e-aws-ovn-conformance-ccm
  optional: true
  steps:
    cluster_profile: hypershift-aws
    env:
      PUBLIC_ONLY: "true"
      TEST_SKIPS: ""
    workflow: hypershift-aws-conformance
- always_run: false
  as: e2e-azure-kubevirt-ovn
  optional: true
  steps:
    cluster_profile: openshift-org-azure
    dependencies:
      OPENSHIFT_INSTALL_RELEASE_IMAGE_OVERRIDE: release:latest-422
    env:
      CNV_SUBSCRIPTION_SOURCE: redhat-operators
      HYPERSHIFT_NODE_COUNT: "2"
      ODF_OPERATOR_CHANNEL: stable-4.20
      TEST_INCLUDES: sig-kubevirt
      TEST_SUITE: openshift/conformance/parallel/minimal
    workflow: hypershift-kubevirt-azure-conformance
- always_run: false
  as: e2e-azure-aks-ovn-conformance
  optional: true
  steps:
    cluster_profile: hypershift-aks
    workflow: hypershift-azure-aks-conformance
- always_run: false
  as: e2e-azure-aks-ovn-conformance-fips
  optional: true
  steps:
    cluster_profile: hypershift-aks
    env:
      HYPERSHIFT_AZURE_FIPS: "true"
      TEST_SKIPS: 'etcd leader changes are not excessive\| In-tree Volumes \[Driver:
        azure-disk\]\| In-tree Volumes \[Driver: azure-file\]\| FIPS TestFIPS'
      TEST_SUITE: openshift/conformance/parallel/minimal
    test:
    - ref: hypershift-hostedcluster-fips-check
    - chain: hypershift-conformance
    workflow: hypershift-azure-aks-conformance
- as: security
  skip_if_only_changed: (^(\.tekton|\.github|\.claude|docs|examples|enhancements|contrib|\.cursor|test/envtest)/)|(\.md$)|((^|/)OWNERS$)|(/overrides\.yaml$)|(^renovate\.json$)|(/\.testcoverage\.yml$)|(^\.gitlint$)|(^\.gitignore$)|(^\.coderabbit\.yaml$)|(^\.dockerignore$)|(^codecov\.yml$)
  steps:
    env:
      SNYK_CODE_ADDITIONAL_ARGS: --severity-threshold=high
      SNYK_ENABLE_DEPS_SCAN: "false"
    workflow: openshift-ci-security
- always_run: false
  as: e2e-openstack-aws
  optional: true
  steps:
    cluster_profile: hypershift-aws
    env:
      CLUSTER_TYPE_OVERRIDE: openstack-vexxhost
      TECH_PREVIEW_NO_UPGRADE: "true"
    leases:
    - env: OPENSTACK_CLOUD
      resource_type: openstack-vexxhost-quota-slice
    post:
    - ref: hypershift-openstack-gather
    - chain: hypershift-destroy-nested-management-cluster
    test:
    - chain: hypershift-openstack-e2e
    workflow: hypershift-aws-e2e-nested
  timeout: 6h0m0s
- always_run: false
  as: e2e-openstack-aws-nfv
  optional: true
  steps:
    cluster_profile: hypershift-aws
    env:
      CLUSTER_TYPE_OVERRIDE: openstack-nfv
      NFV_NODEPOOLS: "true"
      TECH_PREVIEW_NO_UPGRADE: "true"
    leases:
    - env: OPENSTACK_CLOUD
      resource_type: openstack-nfv-quota-slice
    workflow: hypershift-openstack-aws-nfv
- always_run: false
  as: e2e-openstack-aws-conformance
  optional: true
  steps:
    cluster_profile: hypershift-aws
    env:
      CLUSTER_TYPE_OVERRIDE: openstack-vexxhost
      TECH_PREVIEW_NO_UPGRADE: "true"
    leases:
    - env: OPENSTACK_CLOUD
      resource_type: openstack-vexxhost-quota-slice
    workflow: hypershift-openstack-aws-conformance
- always_run: false
  as: e2e-openstack-aws-csi-cinder
  optional: true
  steps:
    cluster_profile: hypershift-aws
    env:
      CLUSTER_TYPE_OVERRIDE: openstack-vh-mecha-central
      TECH_PREVIEW_NO_UPGRADE: "true"
      TEST_CSI_DRIVER_MANIFEST: manifest-openstack-cinder.yaml
      TEST_SUITE: openshift/csi
    leases:
    - env: OPENSTACK_CLOUD
      resource_type: openstack-vh-mecha-central-quota-slice
    workflow: hypershift-openstack-aws-conformance
- always_run: false
  as: e2e-openstack-aws-csi-manila
  optional: true
  steps:
    cluster_profile: hypershift-aws
    env:
      CLUSTER_TYPE_OVERRIDE: openstack-vh-mecha-central
      TECH_PREVIEW_NO_UPGRADE: "true"
      TEST_CSI_DRIVER_MANIFEST: manifest-openstack-manila.yaml
      TEST_SUITE: openshift/csi
    leases:
    - env: OPENSTACK_CLOUD
      resource_type: openstack-vh-mecha-central-quota-slice
    workflow: hypershift-openstack-aws-conformance
- always_run: false
  as: e2e-aws-autonode
  optional: true
  steps:
    cluster_profile: hypershift-aws
    dependencies:
      OCP_IMAGE_LATEST: release:multi-latest
      OCP_IMAGE_PREVIOUS: release:multi-initial
    env:
      AWS_MULTI_ARCH: "true"
      CI_TESTS_RUN: ^TestKarpenter
      ENABLE_HYPERSHIFT_CERT_ROTATION_SCALE: "true"
      REQUEST_SERVING_COMPONENT_TEST: "true"
    workflow: hypershift-aws-e2e-nested
- as: verify-deps
  steps:
    env:
      CHECK_MOD_LIST: "false"
    test:
    - ref: go-verify-deps
- always_run: false
  as: reqserving-e2e-aws
  capabilities:
  - build-tmpfs
  optional: true
  steps:
    cluster_profile: openshift-org-aws
    dependencies:
      OPENSHIFT_INSTALL_RELEASE_IMAGE_OVERRIDE: release:latest-421
    workflow: hypershift-aws-reqserving-e2e
- always_run: false
  as: address-review-comments
  optional: true
  skip_if_only_changed: .*
  steps:
    workflow: hypershift-review-agent
- always_run: false
  as: e2e-v2-gke
  capabilities:
  - build-tmpfs
  pipeline_skip_if_only_changed: (^(\.tekton|\.github|\.claude|docs|examples|enhancements|contrib|\.cursor|test/envtest)/)|(\.md$)|((^|/)OWNERS$)|(/overrides\.yaml$)|(^renovate\.json$)|(/\.testcoverage\.yml$)|(^\.gitlint$)|(^\.gitignore$)|(^\.coderabbit\.yaml$)|(^\.dockerignore$)|(^codecov\.yml$)|(^(?:[^t/][^/]*|t|t[^e/][^/]*|te|te[^s/][^/]*|tes|tes[^t/][^/]*|test[^/]+)/.*_test\.go$)
  steps:
    cluster_profile: hypershift-gcp
    env:
