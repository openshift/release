base_images:
  base:
    name: builder
    namespace: ocp
    tag: rhel-8-base-openshift-4.6
build_root:
  from_repository: true
images:
  items:
  - dockerfile_path: Dockerfile.rhel
    from: base
    to: metering-hadoop
promotion:
  to:
  - name: "5.1"
    namespace: ocp
releases:
  initial:
    integration:
      name: "5.1"
      namespace: ocp
  latest:
    integration:
      include_built_images: true
      name: "5.1"
      namespace: ocp
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
zz_generated_metadata:
  branch: release-5.1
  org: kube-reporting
  repo: hadoop
