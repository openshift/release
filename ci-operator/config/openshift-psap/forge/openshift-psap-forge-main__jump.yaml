base_images:
  image_stream_tag:
    name: ci-tools-build-root
    namespace: ci
    tag: latest
resources:
  '*':
    limits:
      cpu: 2000m
    requests:
      cpu: 500m
      memory: 500Mi
tests:
- always_run: false
  as: ci
  capabilities:
  - intranet
  restrict_network_access: false
  steps:
    allow_skip_on_success: true
    post:
    - as: 006-unlock-cluster
      commands: |
        exec &> >(tee -a "$ARTIFACT_DIR/run.log")

        export PSAP_FORGE_JUMP_CI_SECRET_PATH=/var/run/psap-forge-jump-ci

        git -C $HOME fetch --quiet origin $PULL_PULL_SHA
        git -C $HOME reset --hard FETCH_HEAD

        exec ./bin/run_ci jump_ci ci unlock_cluster
      credentials:
      - mount_path: /var/run/psap-forge-jump-ci
        name: psap-forge-jump-ci
        namespace: test-credentials
      from_image:
        name: forge-light
        namespace: ci
        tag: latest
      resources:
        requests:
          cpu: 1000m
          memory: 500Mi
    pre:
    - as: 001-lock-cluster
      commands: |
        exec &> >(tee -a "$ARTIFACT_DIR/run.log")

        export PSAP_FORGE_JUMP_CI_SECRET_PATH=/var/run/psap-forge-jump-ci

        git -C $HOME fetch --quiet origin $PULL_PULL_SHA
        git -C $HOME reset --hard FETCH_HEAD

        exec ./bin/run_ci jump_ci ci lock_cluster
