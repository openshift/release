build_root:
  from_repository: true
images:
  items:
  - dockerfile_path: Dockerfile.ci
    to: mcp-lifecycle-operator
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: unit
  commands: GOFLAGS='-mod=readonly' make test
  container:
    from: src
zz_generated_metadata:
  branch: main
  org: red-hat-data-services
  repo: mcp-lifecycle-operator
