base_images:
  base:
    name: "4.17"
    namespace: ocp
    tag: cli
build_root:
  from_repository: true
images:
- dockerfile_literal: |
    FROM src
    RUN export VERSION="stable" && \
        URL="https://github.com/koalaman/shellcheck/releases/download" && \
        export URL="${URL}/${VERSION}/shellcheck-${VERSION}.linux.x86_64.tar.xz" && \
        wget -q -O - "${URL}" | tar -xJv && \
        cp "shellcheck-${VERSION}/shellcheck" /usr/local/bin/ && \
        rm -rf "shellcheck-${VERSION}"
    RUN mkdir /tmp/helm && \
        cd /tmp/helm && \
        curl https://get.helm.sh/helm-v3.6.0-linux-amd64.tar.gz -o helm.tar.gz && \
        tar xvfpz helm.tar.gz && \
        mv linux-amd64/helm /usr/local/bin && \
        chmod +x /usr/local/bin/helm && \
        rm -rf /tmp/helm
    RUN mkdir /tmp/oc && \
        cd /tmp/oc && \
        curl -L https://mirror.openshift.com/pub/openshift-v4/clients/oc/latest/linux/oc.tar.gz -o oc.tar.gz && \
        tar xzvf oc.tar.gz && \
        mv kubectl /usr/local/bin/ && \
        cd - && \
        rm -rf /tmp/oc
  to: ocp-qe-ci-dast
releases:
  latest:
    candidate:
      product: ocp
      stream: nightly
      version: "4.17"
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: security-first-half
  always_run: false
  steps:
    allow_skip_on_success: true
    cluster_profile: aws-perfscale-qe
    env:
      BASE_DOMAIN: qe.devcluster.openshift.com
      API_URL_LIST: admissionregistration.k8s.io/v1 apiextensions.k8s.io/v1 apiregistration.k8s.io/v1 apiserver.openshift.io/v1 apps.openshift.io/v1 apps/v1 authentication.k8s.io/v1 authorization.k8s.io/v1 authorization.openshift.io/v1 autoscaling.openshift.io/v1 autoscaling.openshift.io/v1beta1 autoscaling/v1 autoscaling/v2
    test:
    - ref: openshift-qe-ocpqe-security-tools-dast
    workflow: openshift-qe-installer-aws
  timeout: 3h0m0s
- as: security-test
  always_run: false
  steps:
    env:
      API_URL_LIST: admissionregistration.k8s.io/v1
    test:
    - ref: openshift-qe-ocpqe-security-tools-dast
  timeout: 1h0m0s    
zz_generated_metadata:
  branch: main
  org: openshift-qe
  repo: ocpqe-security-tools
  variant: dast
