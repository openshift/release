build_root:
  image_stream_tag:
    name: ci-tools-build-root
    namespace: ci
    tag: latest
images:
- dockerfile_path: prow/Dockerfile
  to: ocp-qe-perfscale-ci-nutanix-416
promotion:
  to:
  - namespace: ci
    tag: latest
releases:
  latest:
    candidate:
      product: ocp
      stream: nightly
      version: "4.16"
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- always_run: false
  as: control-plane-24nodes
  steps:
    allow_skip_on_success: true
    cluster_profile: nutanix-qe
    env:
      COMPUTE_REPLICAS: "3"
    test:
    - chain: openshift-qe-control-plane
    workflow: openshift-qe-installer-nutanix
- always_run: false
  as: data-path-9nodes
  steps:
    allow_skip_on_success: true
    cluster_profile: nutanix-qe-zone
    env:
      COMPUTE_REPLICAS: "9"
    test:
    - chain: openshift-qe-data-path-tests
    workflow: openshift-qe-installer-nutanix
  timeout: 6h0m0s
- always_run: false
  as: node-density-heavy-24nodes
  steps:
    allow_skip_on_success: true
    cluster_profile: nutanix-qe
    env:
      COMPUTE_REPLICAS: "9"
      PROFILE_TYPE: reporting
    test:
    - chain: openshift-qe-node-density-heavy
    workflow: openshift-qe-installer-nutanix
zz_generated_metadata:
  branch: main
  org: openshift-qe
  repo: ocp-qe-perfscale-ci
  variant: nutanix-4.16-nightly-x86
