build_root:
  image_stream_tag:
    name: ci-tools-build-root
    namespace: ci
    tag: latest
releases:
  latest:
    candidate:
      product: ocp
      stream: nightly
      version: "4.17"
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: payload-control-plane-120nodes
  steps:
    allow_skip_on_success: true
    cluster_profile: aws-perfscale-qe
    env:
      BASE_DOMAIN: qe.devcluster.openshift.com
      CHURN: "false"
      COMPUTE_NODE_REPLICAS: "120"
      GC: "false"
      ITERATION_MULTIPLIER_ENV: "9"
      ZONES_COUNT: "3"
    post:
    - ref: openshift-qe-kube-burner-index
    - chain: ipi-aws-post
    pre:
    - chain: ipi-conf-aws
    - ref: ovn-conf
    - chain: ipi-install
    test:
    - chain: openshift-qe-control-plane
    - chain: openshift-qe-orion-consolidated
  timeout: 8h0m0s
zz_generated_metadata:
  branch: main
  org: openshift-qe
  repo: ocp-qe-perfscale-ci
  variant: aws-ipsec-4.17-nightly-x86
