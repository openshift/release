build_root:
  from_repository: true
images:
  items:
  - dockerfile_path: dev-infrastructure/openshift-ci/Dockerfile
    from: src
    to: aro-hcp-e2e-base-ci
  run_if_changed: ^dev-infrastructure/openshift-ci/Dockerfile$
promotion:
  to:
  - name: aro-hcp-ci-images
    namespace: aro-hcp
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: "3"
      memory: 4Gi
  aro-hcp-e2e-tools:
    limits:
      memory: 10Gi
    requests:
      cpu: "8"
      memory: 8Gi
zz_generated_metadata:
  branch: main
  org: Azure
  repo: ARO-HCP
  variant: baseimage-generator
