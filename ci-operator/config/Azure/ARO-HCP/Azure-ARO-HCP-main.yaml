base_images:
  nested-podman:
    name: nested-podman
    namespace: ci
    tag: latest
binary_build_commands: make -C backend backend
build_root:
  image_stream_tag:
    name: aro-hcp-ci-images
    namespace: aro-hcp
    tag: aro-hcp-e2e-base-ci
images:
  items:
  - dockerfile_literal: |
      FROM nested-podman
      COPY /src /opt/app-root/src/github.com/Azure
      WORKDIR /opt/app-root/src/github.com/Azure/ARO-HCP
      USER root
      # allow anyone to create content in GOPATH so we can go install stuff
      RUN chmod 777 /opt/app-root
      RUN dnf install -y git go make
      RUN dnf install -y https://dl.fedoraproject.org/pub/epel/epel-release-latest-9.noarch.rpm
      RUN dnf install -y pass || true
      RUN dnf install -y qrencode || true
      RUN dnf install -y net-tools || true
      RUN dnf install -y https://rpmfind.net/linux/centos-stream/9-stream/BaseOS/x86_64/os/Packages/tree-1.8.0-10.el9.x86_64.rpm https://dl.fedoraproject.org/pub/epel/9/Everything/x86_64/Packages/q/qrencode-4.1.1-1.el9.x86_64.rpm https://dl.fedoraproject.org/pub/epel/9/Everything/x86_64/Packages/q/qrencode-libs-4.1.1-1.el9.x86_64.rpm https://dl.fedoraproject.org/pub/epel/9/Everything/x86_64/Packages/p/pass-1.7.4-16.el9.noarch.rpm || true
      RUN dnf clean all
    from: nested-podman
    inputs:
      src:
        paths:
        - destination_dir: src
          source_path: /go/src/github.com/Azure/ARO-HCP
    to: nested-podman-src
  - build_args:
    - name: PLATFORM
      value: linux/amd64
    - name: ARO_HCP_REVISION
      value: ci-sha
    - name: ARO_HCP_IMAGE_TAG
      value: ci-test-img
    dockerfile_path: backend/Dockerfile
    to: aro-hcp-backend
  - build_args:
    - name: PLATFORM
      value: linux/amd64
    - name: ARO_HCP_REVISION
      value: ci-sha
    - name: ARO_HCP_IMAGE_TAG
      value: ci-test-img
    dockerfile_path: frontend/Dockerfile
    to: aro-hcp-frontend
  - build_args:
    - name: PLATFORM
      value: linux/amd64
    - name: ARO_HCP_REVISION
      value: ci-sha
    - name: ARO_HCP_IMAGE_TAG
      value: ci-test-img
    dockerfile_path: admin/Dockerfile
    to: aro-hcp-admin-api
  - build_args:
    - name: PLATFORM
      value: linux/amd64
    - name: ARO_HCP_REVISION
      value: ci-sha
    - name: ARO_HCP_IMAGE_TAG
      value: ci-test-img
    dockerfile_path: sessiongate/Dockerfile
    to: aro-hcp-sessiongate
  - build_args:
    - name: PLATFORM
      value: linux/amd64
    - name: ARO_HCP_REVISION
      value: ci-sha
    - name: ARO_HCP_IMAGE_TAG
      value: ci-test-img
    dockerfile_path: hcp-recovery/Dockerfile
    from: src
    to: aro-hcp-hcp-recovery
  - context_dir: image-sync/oc-mirror
    dockerfile_path: Dockerfile
    to: aro-hcp-oc-mirror
  - build_args:
    - name: PLATFORM
      value: linux/amd64
    context_dir: tooling
    dockerfile_path: aro-hcp-exporter/Dockerfile
    to: aro-hcp-exporter
  - dockerfile_literal: |
      FROM src
      USER root
      COPY /src /opt/app-root/src/github.com/Azure
      WORKDIR /opt/app-root/src/github.com/Azure/ARO-HCP
      ENV GOFLAGS='-mod=readonly'
      RUN make -C tooling/templatize templatize && \
          go clean -cache -modcache && rm -f go.work.sum
      RUN chmod 777 /opt/app-root/src/github.com/Azure/ARO-HCP
    from: src
    inputs:
      src:
        paths:
        - destination_dir: src
          source_path: /go/src/github.com/Azure/ARO-HCP
    to: aro-hcp-e2e-tools
  - dockerfile_path: test/Containerfile.e2e
    from: src
    to: aro-hcp-e2e-tests
  - dockerfile_literal: |
      FROM src
      USER root
      COPY /src /opt/app-root/src/github.com/Azure
      WORKDIR /opt/app-root/src/github.com/Azure/ARO-HCP
      # Install official Node.js binary from nodejs.org (pinned version)
      RUN curl -fsSL https://nodejs.org/dist/v22.5.1/node-v22.5.1-linux-x64.tar.xz | \
          tar -xJ -C /usr/local --strip-components=1 && \
          node --version && npm --version
      # Install npm dependencies
      RUN cd api && npm ci --legacy-peer-deps
    from: src
    inputs:
      src:
        paths:
        - destination_dir: src
          source_path: /go/src/github.com/Azure/ARO-HCP
    to: aro-hcp-api-tools
promotion:
  to:
  - additional_images:
      aro-hcp-e2e-tests: aro-hcp-e2e-tests
    excluded_images:
    - '*'
    namespace: aro-hcp
    tag: latest
    tag_by_commit: true
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: "3"
      memory: 4Gi
  aro-hcp-e2e-tests:
    limits:
      cpu: "8"
      memory: 10Gi
    requests:
      cpu: "8"
      memory: 10Gi
  aro-hcp-e2e-tools:
    limits:
      cpu: "8"
      memory: 10Gi
    requests:
      cpu: "8"
      memory: 10Gi
test_binary_build_commands: make test-compile
tests:
- as: test-unit
  steps:
    test:
    - ref: aro-hcp-test-unit
- as: secrets-validation
  run_if_changed: ^(tooling/secret-sync|dev-infrastructure/data)/
  steps:
    test:
    - ref: aro-hcp-secrets-validation
- as: verify
  steps:
    test:
    - ref: aro-hcp-verify
- as: lint
  steps:
    test:
    - ref: aro-hcp-lint
- as: config-change-detection
  steps:
    test:
    - ref: aro-hcp-config-change-detection
- as: mega-linter
  capabilities:
  - nested-podman
  nested_podman: true
  steps:
    test:
    - ref: aro-hcp-mega-lint
- as: observability-verify
  run_if_changed: ^observability/
  steps:
    test:
    - ref: aro-hcp-observability-verify
- as: observability-prometheus
  run_if_changed: ^observability/(alerts|prometheus)/
  steps:
