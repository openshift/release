    - ref: aro-hcp-bicep-lint
- as: api-validation
  run_if_changed: ^api/
  steps:
    test:
    - ref: aro-hcp-api-validation
- always_run: true
  as: integration
  capabilities:
  - nested-podman
  nested_podman: true
  steps:
    test:
    - ref: aro-hcp-frontend-run-integration-tests
- always_run: false
