build_root:
  image_stream_tag:
    name: aro-hcp-ci-images
    namespace: aro-hcp
    tag: aro-hcp-e2e-base-ci
images:
  items:
  - dockerfile_path: test/Containerfile.e2e
    from: src
    to: aro-hcp-e2e-tests
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
  aro-hcp-e2e-tests:
    limits:
      cpu: "8"
      memory: 10Gi
    requests:
      cpu: "8"
      memory: 10Gi
tests:
- as: integration-e2e-parallel
  max_concurrency: 4
  postsubmit: true
  run_if_changed: ^$
  steps:
    env:
      ARO_HCP_CLOUD: public
      ARO_HCP_DEPLOY_ENV: int
      ARO_HCP_SUITE_NAME: integration/parallel
      LOCATION: uksouth
      VAULT_SECRET_PROFILE: int
    workflow: aro-hcp-e2e
- as: stage-e2e-parallel
  max_concurrency: 4
  postsubmit: true
  run_if_changed: ^$
  steps:
    env:
      ARO_HCP_CLOUD: public
      ARO_HCP_DEPLOY_ENV: stg
      ARO_HCP_SUITE_NAME: stage/parallel
      LOCATION: uksouth
      VAULT_SECRET_PROFILE: stg
    workflow: aro-hcp-e2e
- as: prod-e2e-parallel
  max_concurrency: 4
  postsubmit: true
  run_if_changed: ^$
  steps:
    env:
      ARO_HCP_CLOUD: public
      ARO_HCP_DEPLOY_ENV: prod
      ARO_HCP_SUITE_NAME: prod/parallel
      LOCATION: uksouth
      VAULT_SECRET_PROFILE: prod
    workflow: aro-hcp-e2e
zz_generated_metadata:
  branch: main
  org: Azure
  repo: ARO-HCP
  variant: e2e
