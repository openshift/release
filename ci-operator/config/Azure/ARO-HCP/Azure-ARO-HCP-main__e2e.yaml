build_root:
  image_stream_tag:
    name: aro-hcp-ci-images
    namespace: aro-hcp
    tag: aro-hcp-e2e-base-ci
images:
  items:
  - dockerfile_literal: |
      FROM src
      USER root
      COPY /src /opt/app-root/src/github.com/Azure
      WORKDIR /opt/app-root/src/github.com/Azure/ARO-HCP
      ENV GOBIN="/usr/local/bin"
      ENV PATH="$GOBIN:/usr/local/bin:/usr/bin:$PATH"
      # Install Python for grafana tests
      RUN dnf install -y python3 && curl -fsSL https://bootstrap.pypa.io/get-pip.py | python3
      RUN pip3 install black
      ENV GOFLAGS='-mod=readonly'
      RUN make install-tools && \
          make -C tooling/templatize templatize && \
          make -C test/ aro-hcp-tests prow-job-executor
      RUN mkdir -p "$(go env GOROOT)" && chmod -R 777 "$(go env GOROOT)"
      RUN mkdir -p "$(go env GOPATH)" && chmod -R 777 "$(go env GOPATH)"
      RUN mkdir -p "$(go env GOCACHE)" && chmod -R 777 "$(go env GOCACHE)"
      RUN mkdir -p "$(go env GOBIN)" && chmod -R 777 "$(go env GOBIN)"
      RUN chmod 777 /opt/app-root/src/github.com/Azure/ARO-HCP && rm -f go.work.sum
    from: src
    inputs:
      src:
        paths:
        - destination_dir: src
          source_path: /go/src/github.com/Azure/ARO-HCP
    to: aro-hcp-e2e-tools
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
  aro-hcp-e2e-tools:
    limits:
      cpu: "8"
      memory: 10Gi
    requests:
      cpu: "8"
      memory: 10Gi
tests:
- as: integration-e2e-parallel
  postsubmit: true
  run_if_changed: ^$
  steps:
    env:
      ARO_HCP_CLOUD: public
      ARO_HCP_DEPLOY_ENV: int
      ARO_HCP_SUITE_NAME: integration/parallel
      LOCATION: uksouth
      VAULT_SECRET_PROFILE: int
    leases:
    - count: 20
      env: LEASED_MSI_CONTAINERS
      resource_type: aro-hcp-test-msi-containers-int
    workflow: aro-hcp-e2e
- as: stage-e2e-parallel
  postsubmit: true
  run_if_changed: ^$
  steps:
    env:
      ARO_HCP_CLOUD: public
      ARO_HCP_DEPLOY_ENV: stg
      ARO_HCP_SUITE_NAME: stage/parallel
      LOCATION: uksouth
      VAULT_SECRET_PROFILE: stg
    leases:
    - count: 30
      env: LEASED_MSI_CONTAINERS
      resource_type: aro-hcp-test-msi-containers-stg
    workflow: aro-hcp-e2e
- as: prod-e2e-parallel
  postsubmit: true
  run_if_changed: ^$
  steps:
    env:
      ARO_HCP_CLOUD: public
      ARO_HCP_DEPLOY_ENV: prod
      ARO_HCP_SUITE_NAME: prod/parallel
      LOCATION: uksouth
      VAULT_SECRET_PROFILE: prod
    leases:
    - count: 15
      env: LEASED_MSI_CONTAINERS
      resource_type: aro-hcp-test-msi-containers-prod
    workflow: aro-hcp-e2e
zz_generated_metadata:
  branch: main
  org: Azure
  repo: ARO-HCP
  variant: e2e
