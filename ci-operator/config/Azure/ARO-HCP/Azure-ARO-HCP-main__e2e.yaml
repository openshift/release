base_images:
  aro-hcp-e2e-tests:
    name: aro-hcp-e2e-tests
    namespace: aro-hcp
    tag: latest
build_root:
  image_stream_tag:
    name: aro-hcp-ci-images
    namespace: aro-hcp
    tag: aro-hcp-e2e-base-ci
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: integration-e2e-parallel
  capabilities:
  - gcp
  max_concurrency: 4
  postsubmit: true
  reporter_config:
    channel: '#aro-hcp-failures-int'
    job_states_to_report:
    - failure
    - error
    report_template: ':failed: Job *{{.Spec.Job}}* ended with *{{.Status.State}}*.
      <{{.Status.URL}}|View logs>'
  run_if_changed: ^$
  steps:
    env:
      ARO_HCP_CLOUD: public
      ARO_HCP_DEPLOY_ENV: int
      ARO_HCP_SUITE_NAME: integration/parallel
      LOCATION: uksouth
      VAULT_SECRET_PROFILE: int-rh
    workflow: aro-hcp-persistent-e2e
- as: stage-e2e-parallel
  capabilities:
  - gcp
  max_concurrency: 4
  postsubmit: true
  reporter_config:
    channel: '#aro-hcp-failures-stg'
    job_states_to_report:
    - failure
    - error
    report_template: ':failed: Job *{{.Spec.Job}}* ended with *{{.Status.State}}*.
      <{{.Status.URL}}|View logs>'
  run_if_changed: ^$
  steps:
    env:
      ARO_HCP_CLOUD: public
      ARO_HCP_DEPLOY_ENV: stg
      ARO_HCP_SUITE_NAME: stage/parallel
      LOCATION: uksouth
      VAULT_SECRET_PROFILE: stg-rh
    workflow: aro-hcp-persistent-e2e
- as: prod-e2e-parallel
  capabilities:
  - gcp
  max_concurrency: 4
  postsubmit: true
  reporter_config:
    channel: '#aro-hcp-failures-prod'
    job_states_to_report:
    - failure
    - error
    report_template: ':failed: Job *{{.Spec.Job}}* ended with *{{.Status.State}}*.
      <{{.Status.URL}}|View logs>'
  run_if_changed: ^$
  steps:
    env:
      ARO_HCP_CLOUD: public
      ARO_HCP_DEPLOY_ENV: prod
      ARO_HCP_SUITE_NAME: prod/parallel
      LOCATION: uksouth
      VAULT_SECRET_PROFILE: prod
    leases:
    - count: 1
      env: ENV_QUOTA_LEASED_RESOURCE
      resource_type: aro-hcp-prod-quota-slice
    - count: 15
      env: LEASED_MSI_CONTAINERS
      resource_type: aro-hcp-test-msi-containers-prod
    workflow: aro-hcp-e2e
zz_generated_metadata:
  branch: main
  org: Azure
  repo: ARO-HCP
  variant: e2e
