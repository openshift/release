base_images:
  aro-hcp-e2e-tests:
    name: aro-hcp-e2e-tests
    namespace: aro-hcp
    tag: latest
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
  unit:
    requests:
      cpu: 1000m
      memory: 4Gi
tests:
- as: delete-expired-kusto-role-assignments
  cron: 35 * * * *
  reporter_config:
    channel: '#aro-hcp-failures-dev'
    job_states_to_report:
    - failure
    - error
    report_template: ':failed: Job *{{.Spec.Job}}* ended with *{{.Status.State}}*.
      <{{.Status.URL}}|View logs>'
  steps:
    test:
    - ref: aro-hcp-deprovision-kusto-role-assignments
- as: delete-expired-red-hat-tenant-app-registrations
  cron: 35 * * * *
  reporter_config:
    channel: '#aro-hcp-failures-dev'
    job_states_to_report:
    - failure
    - error
    report_template: ':failed: Job *{{.Spec.Job}}* ended with *{{.Status.State}}*.
      <{{.Status.URL}}|View logs>'
  steps:
    env:
      VAULT_SECRET_PROFILE: red-hat-tenant
    test:
    - ref: aro-hcp-deprovision-expired-app-registrations
- as: delete-expired-msft-test-tenant-app-registrations
  cron: 35 * * * *
  reporter_config:
    channel: '#aro-hcp-failures-dev'
    job_states_to_report:
    - failure
    - error
    report_template: ':failed: Job *{{.Spec.Job}}* ended with *{{.Status.State}}*.
      <{{.Status.URL}}|View logs>'
  steps:
    env:
      VAULT_SECRET_PROFILE: msft-test-tenant
    test:
    - ref: aro-hcp-deprovision-expired-app-registrations
- as: delete-expired-dev-prow-resource-groups
  cron: 35 * * * *
  reporter_config:
    channel: '#aro-hcp-failures-dev'
    job_states_to_report:
    - failure
    - error
    report_template: ':failed: Job *{{.Spec.Job}}* ended with *{{.Status.State}}*.
      <{{.Status.URL}}|View logs>'
  steps:
    env:
      CLEANUP_MODE: no-rp
      CUSTOMER_SUBSCRIPTION: ARO HCP E2E Hosted Clusters (EA Subscription)
    test:
    - ref: aro-hcp-deprovision-expired-resource-groups
- as: delete-expired-dev-pers-resource-groups
  cron: 35 * * * *
  reporter_config:
    channel: '#aro-hcp-failures-dev'
    job_states_to_report:
    - failure
    - error
    report_template: ':failed: Job *{{.Spec.Job}}* ended with *{{.Status.State}}*.
      <{{.Status.URL}}|View logs>'
  steps:
    env:
      CLEANUP_MODE: no-rp
      CUSTOMER_SUBSCRIPTION: ARO Hosted Control Planes (EA Subscription 1)
    test:
    - ref: aro-hcp-deprovision-expired-resource-groups
- as: delete-expired-integration-resource-groups
  cron: 35 * * * *
  reporter_config:
    channel: '#aro-hcp-failures-int'
    job_states_to_report:
    - failure
    - error
    report_template: ':failed: Job *{{.Spec.Job}}* ended with *{{.Status.State}}*.
      <{{.Status.URL}}|View logs>'
  steps:
    env:
      VAULT_SECRET_PROFILE: int
    test:
    - ref: aro-hcp-deprovision-expired-resource-groups
- as: delete-expired-stage-resource-groups
  cron: 35 * * * *
  reporter_config:
    channel: '#aro-hcp-failures-stg'
    job_states_to_report:
    - failure
    - error
    report_template: ':failed: Job *{{.Spec.Job}}* ended with *{{.Status.State}}*.
      <{{.Status.URL}}|View logs>'
  steps:
    env:
      VAULT_SECRET_PROFILE: stg
    test:
    - ref: aro-hcp-deprovision-expired-resource-groups
- as: delete-expired-prod-resource-groups
  cron: 35 * * * *
  reporter_config:
    channel: '#aro-hcp-failures-prod'
    job_states_to_report:
    - failure
    - error
    report_template: ':failed: Job *{{.Spec.Job}}* ended with *{{.Status.State}}*.
      <{{.Status.URL}}|View logs>'
  steps:
    env:
      VAULT_SECRET_PROFILE: prod
    test:
    - ref: aro-hcp-deprovision-expired-resource-groups
- as: sweeper-rg-ordered
  cron: 5 */4 * * *
  reporter_config:
    channel: '#aro-hcp-failures-dev'
    job_states_to_report:
    - failure
    - error
    report_template: ':failed: Job *{{.Spec.Job}}* ended with *{{.Status.State}}*.
      <{{.Status.URL}}|View logs>'
  steps:
    env:
      CLEANUP_SWEEPER_PARALLELISM: "1"
      CLEANUP_SWEEPER_POLICY: tooling/cleanup-sweeper/resourcegroups.policy.yaml
      CLEANUP_SWEEPER_WAIT: "false"
      CLEANUP_SWEEPER_WORKFLOW: rg-ordered
    test:
    - ref: aro-hcp-deprovision-cleanup-sweeper
- as: sweeper-shared-leftovers-dev
  cron: 35 * * * *
  reporter_config:
    channel: '#aro-hcp-failures-dev'
    job_states_to_report:
    - failure
    - error
    report_template: ':failed: Job *{{.Spec.Job}}* ended with *{{.Status.State}}*.
      <{{.Status.URL}}|View logs>'
  steps:
    env:
      CLEANUP_SWEEPER_PARALLELISM: "1"
      CLEANUP_SWEEPER_VERBOSITY: "1"
      CLEANUP_SWEEPER_WORKFLOW: shared-leftovers
    test:
    - ref: aro-hcp-deprovision-cleanup-sweeper
zz_generated_metadata:
  branch: main
  org: Azure
  repo: ARO-HCP
  variant: periodic-cleanup
