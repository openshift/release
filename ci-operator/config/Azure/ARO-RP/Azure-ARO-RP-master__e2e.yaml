base_images:
  ubi9-minimal:
    name: ubi-minimal
    namespace: ocp
    tag: "9"
build_root:
  image_stream_tag:
    name: release
    namespace: openshift
    tag: rhel-9-release-golang-1.25-openshift-4.22
images:
  items:
  - dockerfile_path: ./Dockerfile.aro-e2e
    from: ubi9-minimal
    inputs:
      src:
        as:
        - ${BUILDER_REGISTRY}/openshift-release-dev/golang-builder--partner-share:rhel-9-golang-1.25-openshift-4.21
        paths:
        - destination_dir: .
          source_path: /go/src/github.com/Azure/ARO-RP/.
    to: aro-classic-e2e
releases:
  latest:
    integration:
      name: "4.22"
      namespace: ocp
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: integration-e2e-parallel-miwi
  postsubmit: true
  run_if_changed: ^$
  steps:
    cluster_profile: aro-classic-int
    env:
      E2E_TYPE: miwi
      LOCATION: eastus
    workflow: aro-classic-e2e
- as: stage-e2e-parallel-miwi
  postsubmit: true
  run_if_changed: ^$
  steps:
    cluster_profile: aro-classic-stg
    env:
      E2E_TYPE: miwi
      LOCATION: westus2
    workflow: aro-classic-e2e
- as: prod-e2e-parallel-miwi
  postsubmit: true
  run_if_changed: ^$
  steps:
    cluster_profile: aro-classic-prod
    env:
      E2E_TYPE: miwi
      LOCATION: uksouth
    workflow: aro-classic-e2e
- as: integration-e2e-parallel-csp
  postsubmit: true
  run_if_changed: ^$
  steps:
    cluster_profile: aro-classic-int
    env:
      E2E_TYPE: csp
      LOCATION: eastus
    workflow: aro-classic-e2e
- as: stage-e2e-parallel-csp
  postsubmit: true
  run_if_changed: ^$
  steps:
    cluster_profile: aro-classic-stg
    env:
      E2E_TYPE: csp
      LOCATION: westus2
    workflow: aro-classic-e2e
- as: prod-e2e-parallel-csp
  postsubmit: true
  run_if_changed: ^$
  steps:
    cluster_profile: aro-classic-prod
    env:
      E2E_TYPE: csp
      LOCATION: uksouth
    workflow: aro-classic-e2e
- as: integration-e2e-parallel
  postsubmit: true
  run_if_changed: ^$
  steps:
    cluster_profile: aro-classic-int
    env:
      E2E_TYPE: both
      LOCATION: eastus
    workflow: aro-classic-e2e
- as: stage-e2e-parallel
  postsubmit: true
  run_if_changed: ^$
  steps:
    cluster_profile: aro-classic-stg
    env:
      E2E_TYPE: both
      LOCATION: westus2
    workflow: aro-classic-e2e
- as: prod-e2e-parallel
  postsubmit: true
  run_if_changed: ^$
  steps:
    cluster_profile: aro-classic-prod
    env:
      E2E_TYPE: both
      LOCATION: uksouth
    workflow: aro-classic-e2e
zz_generated_metadata:
  branch: master
  org: Azure
  repo: ARO-RP
  variant: e2e
