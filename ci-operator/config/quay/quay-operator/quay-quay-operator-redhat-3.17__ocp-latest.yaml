base_images:
  cli:
    name: "4.20"
    namespace: ocp
    tag: cli
  ubi:
    name: ubi
    namespace: ocp
    tag: "8"
build_root:
  image_stream_tag:
    name: builder
    namespace: ocp
    tag: rhel-9-golang-1.24-openshift-4.20
images:
- dockerfile_path: Dockerfile
  from: ubi
  to: quay-operator
- dockerfile_literal: |
    FROM src
    COPY oc /usr/bin/oc
  from: src
  inputs:
    cli:
      paths:
      - destination_dir: .
        source_path: /usr/bin/oc
  to: src-oc
operator:
  bundles:
  - as: quay
    context_dir: bundle/
  substitutions:
  - pullspec: quay.io/projectquay/quay-operator:v3.6.1
    with: quay-operator
promotion:
  to:
  - excluded_images:
    - src-oc
    namespace: quay
    tag: "3.17"
releases:
  latest:
    integration:
      name: "4.20"
      namespace: ocp
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: verify-deps
  skip_if_only_changed: ^docs/|\.md$|^(?:.*/)?(?:\.gitignore|OWNERS|LICENSE)$
  steps:
    test:
    - ref: go-verify-deps
- as: e2e
  skip_if_only_changed: ^docs/|\.md$|^(?:.*/)?(?:\.gitignore|OWNERS|LICENSE)$
  steps:
    cluster_profile: aws-3
    dependencies:
      OO_INDEX: ci-index-quay
    env:
      COMPUTE_NODE_TYPE: m5.4xlarge
      OO_CHANNEL: alpha
      OO_INSTALL_NAMESPACE: '!create'
      OO_PACKAGE: quay-operator
      OO_TARGET_NAMESPACES: '!all'
    post:
    - ref: quay-gather
    - chain: ipi-aws-post
    pre:
    - chain: ipi-aws-pre
    - ref: quay-install-odf-operator
    - ref: optional-operators-subscribe
    - ref: quay-install-quay
    - ref: quay-create-admin-user
    test:
    - ref: quay-test-mirror-image
    workflow: optional-operators-ci-aws
zz_generated_metadata:
  branch: redhat-3.17
  org: quay
  repo: quay-operator
  variant: ocp-latest
