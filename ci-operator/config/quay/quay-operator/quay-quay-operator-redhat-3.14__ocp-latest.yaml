base_images:
  cli:
    name: "4.20"
    namespace: ocp
    tag: cli
  operator-sdk:
    name: "4.18"
    namespace: origin
    tag: operator-sdk
  ubi:
    name: ubi
    namespace: ocp
    tag: "8"
build_root:
  image_stream_tag:
    name: builder
    namespace: ocp
    tag: rhel-9-golang-1.24-openshift-4.20
images:
- dockerfile_path: Dockerfile
  from: ubi
  to: quay-operator
- dockerfile_literal: |
    FROM src
    COPY oc /usr/bin/oc
  from: src
  inputs:
    cli:
      paths:
      - destination_dir: .
        source_path: /usr/bin/oc
  to: src-oc
operator:
  bundles:
  - as: quay
    context_dir: bundle/
    skip_building_index: true
  substitutions:
  - pullspec: quay.io/projectquay/quay-operator:v3.99.0-dev
    with: quay-operator
promotion:
  to:
  - excluded_images:
    - src-oc
    namespace: quay
    tag: "3.14"
releases:
  latest:
    integration:
      name: "4.20"
      namespace: ocp
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: verify-deps
  skip_if_only_changed: ^docs/|\.md$|^(?:.*/)?(?:\.gitignore|OWNERS|LICENSE)$
  steps:
    test:
    - ref: go-verify-deps
- as: e2e
  skip_if_only_changed: ^docs/|\.md$|^(?:.*/)?(?:\.gitignore|OWNERS|LICENSE)$
  steps:
    cluster_profile: openshift-org-aws
    env:
      COMPUTE_NODE_TYPE: m5.4xlarge
    post:
    - ref: quay-gather
    - chain: ipi-aws-post
    pre:
    - chain: ipi-aws-pre
    - ref: quay-install-odf-operator
    - ref: quay-install-operator-bundle
    - ref: quay-install-quay
    - ref: quay-create-admin-user
    test:
    - ref: quay-test-mirror-image
    workflow: ipi-aws
zz_generated_metadata:
  branch: redhat-3.14
  org: quay
  repo: quay-operator
  variant: ocp-latest
