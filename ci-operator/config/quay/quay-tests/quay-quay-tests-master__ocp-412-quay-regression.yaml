base_images:
  cli:
    name: "4.12"
    namespace: ocp
    tag: cli
  upi-installer:
    name: "4.12"
    namespace: ocp
    tag: upi-installer
build_root:
  image_stream_tag:
    name: release
    namespace: openshift
    tag: golang-1.18
releases:
  latest:
    candidate:
      architecture: amd64
      product: ocp
      stream: nightly
      version: "4.12"
resources:
  '*':
    limits:
      memory: 8Gi
    requests:
      cpu: 200m
      memory: 500Mi
tests:
- as: quay-acs-violations-check-quay39
  cron: 0 20 24 * *
  steps:
    cluster_profile: aws-sustaining-autorelease-412
    env:
      ACS_OPERATOR_CHANNEL: stable
      BASE_DOMAIN: sustaining-aws-412.devcluster.openshift.com
      COMPUTE_NODE_REPLICAS: "6"
      COMPUTE_NODE_TYPE: m6a.8xlarge
      ODF_OPERATOR_CHANNEL: stable-4.12
      QUAY_INDEX_IMAGE_BUILD: quay.io/redhat-user-workloads/quay-eng-tenant/stable-3-9-v4-12@sha256:dc5b4234cf1e0e8a8a59677a9273cd40d70cb8d1edf056af230ad80e3be8fbce
      QUAY_OPERATOR_CHANNEL: stable-3.9
      QUAY_OPERATOR_SOURCE: fbc-operator-catalog
      QUAY_VERSION: 3.9.19
    test:
    - ref: quay-tests-enable-quay-catalogsource
    - ref: quay-tests-resource-provisioning-storage-odf
    - ref: quay-tests-quay-deploy-operator
    - ref: quay-tests-quay-deploy-registry-noobaa
    - ref: quay-tests-quay-acs
    - ref: quay-tests-test-quay-api
    - ref: quay-tests-test-quay-e2e
    workflow: cucushift-installer-rehearse-aws-ipi
- as: quay-e2e-tests-quay39-ocp412-virtual-builder
  cron: '@yearly'
  steps:
    cluster_profile: aws-sustaining-autorelease-412
    env:
      BASE_DOMAIN: sustaining-aws-412.devcluster.openshift.com
      COMPUTE_NODE_TYPE: m5.8xlarge
      ODF_OPERATOR_CHANNEL: stable-4.12
      QUAY_BUILDER_IMAGE: quay.io/redhat-user-workloads/quay-eng-tenant/quay-builder-v3-9@sha256:5b89d0b39950a8317f82f3ec2ee9099f5c201f09abdffed66f4d639da0503403
      QUAY_INDEX_IMAGE_BUILD: quay.io/redhat-user-workloads/quay-eng-tenant/stable-3-9-v4-12@sha256:dc5b4234cf1e0e8a8a59677a9273cd40d70cb8d1edf056af230ad80e3be8fbce
      QUAY_OPERATOR_CHANNEL: stable-3.9
      QUAY_OPERATOR_SOURCE: fbc-operator-catalog
      QUAY_VERSION: 3.9.19
    test:
    - ref: quay-tests-enable-quay-catalogsource
    - ref: quay-tests-resource-provisioning-storage-odf
    - ref: quay-tests-resource-provisioning-tls
    - ref: quay-tests-resource-provisioning-builder
    - ref: quay-tests-quay-deploy-operator
    - ref: quay-tests-quay-deploy-registry-builder
    - ref: quay-tests-test-quay-api
    - ref: quay-tests-test-quay-e2e
    workflow: cucushift-installer-rehearse-aws-ipi
zz_generated_metadata:
  branch: master
  org: quay
  repo: quay-tests
  variant: ocp-412-quay-regression
