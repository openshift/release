base_images:
  cli:
    name: "4.21"
    namespace: ocp
    tag: cli
  upi-installer:
    name: "4.21"
    namespace: ocp
    tag: upi-installer
build_root:
  image_stream_tag:
    name: release
    namespace: openshift
    tag: rhel-9-release-golang-1.23-openshift-4.20
releases:
  latest:
    candidate:
      architecture: amd64
      product: ocp
      stream: nightly
      version: "4.21"
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: quay-dast-test-quay317
  cron: '@yearly'
  steps:
    cluster_profile: aws-quay-qe
    env:
      BASE_DOMAIN: quayqe.devcluster.openshift.com
      COMPUTE_NODE_TYPE: m5.4xlarge
      CSO_CHANNEL: stable-3.17
      ODF_OPERATOR_CHANNEL: stable-4.21
      QBO_CHANNEL: stable-3.17
      QUAY_OPERATOR_CHANNEL: stable-3.17
      QUAY_OPERATOR_SOURCE: redhat-operators
    test:
    - ref: quay-tests-deploy-quay-odf
    - ref: quay-tests-qbo-qe-test
    - ref: quay-tests-cso-qe-test
    workflow: cucushift-installer-rehearse-aws-ipi
  timeout: 8h0m0s
zz_generated_metadata:
  branch: master
  org: quay
  repo: quay-tests
  variant: quay-dast-317
