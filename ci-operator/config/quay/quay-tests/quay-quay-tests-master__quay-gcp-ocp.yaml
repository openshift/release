base_images:
  cli:
    name: "4.21"
    namespace: ocp
    tag: cli
  upi-installer:
    name: "4.21"
    namespace: ocp
    tag: upi-installer
build_root:
  image_stream_tag:
    name: release
    namespace: openshift
    tag: rhel-9-release-golang-1.25-openshift-4.21
prowgen:
  expose: true
  private: true
releases:
  latest:
    candidate:
      architecture: amd64
      product: ocp
      stream: nightly
      version: "4.21"
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: quay-e2e-tests-quay317-ocp421-gcp-ipi
  cron: '@yearly'
  reporter_config:
    channel: '#quay-qe'
    job_states_to_report:
    - success
    - failure
    - error
    report_template: '{{if eq .Status.State "success"}} :slack-green: Job *{{.Spec.Job}}*
      ended with *{{.Status.State}}*. <{{.Status.URL}}|View logs> {{else}} :failed:
      Job *{{.Spec.Job}}* ended with *{{.Status.State}}*. <{{.Status.URL}}|View logs>
      {{end}}'
  steps:
    cluster_profile: gcp-qe
    env:
      COMPUTE_NODE_REPLICAS: "6"
      COMPUTE_NODE_TYPE: n2-standard-8
      MULTISTAGE_PARAM_OVERRIDE_QUAY_INDEX_IMAGE: quay.io/redhat-user-workloads/quay-eng-tenant/stable-3-17-v4-21@sha256:c12ff3407a23401be0093f79bbd0005a58b23cb314bee1d3082abba70fd88f51
      QUAY_OPERATOR_CHANNEL: stable-3.17
      QUAY_OPERATOR_SOURCE: fbc-operator-catalog
      QUAY_STORAGE_PROVIDER: gcp
      QUAY_VERSION: "3.17"
    test:
    - ref: quay-tests-enable-quay-catalogsource
    - ref: quay-tests-deploy-quay-gcs
    - ref: quay-tests-test-quay-api
    - ref: quay-tests-test-quay-e2e
    - ref: quay-tests-deprovisioning-aws-gcp-azure-storage-buckets
    workflow: cucushift-installer-rehearse-gcp-ipi
- as: quay-e2e-tests-quay318-ocp421-gcp-ipi
