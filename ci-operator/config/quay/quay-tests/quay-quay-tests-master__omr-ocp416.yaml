base_images:
  upi-installer:
    name: "4.16"
    namespace: ocp
    tag: upi-installer
build_root:
  image_stream_tag:
    name: builder
    namespace: ocp
    tag: rhel-9-golang-1.25-openshift-4.21
images:
  items:
  - additional_architectures:
    - arm64
    dockerfile_literal: |
      FROM src
      RUN curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.4/install.sh | bash && \
          \. "$HOME/.nvm/nvm.sh" && \
          nvm install 24 && \
          npm install -g yarn && \
          PACKAGES="openssh-clients httpd-tools nodejs xorg-x11-server-Xvfb gtk2-devel gtk3-devel libnotify-devel dconf nss libXScrnSaver alsa-lib skopeo podman jq" && \
          yum install --setopt=tsflags=nodocs -y $PACKAGES && \
          yum install -y yum-utils && \
          yum-config-manager --add-repo https://rpm.releases.hashicorp.com/RHEL/hashicorp.repo && \
          cp /etc/yum.repos.d/hashicorp.repo /etc/yum.repos.art/ci/ 2>/dev/null || true && \
          yum -y install terraform && \
          jq --version && \
          yum clean all && rm -rf /var/cache/yum/*
      RUN ARCH=$(uname -m) && \
          curl -s "https://awscli.amazonaws.com/awscli-exe-linux-${ARCH}.zip" -o "awscliv2.zip" && \
          unzip -q awscliv2.zip && \
          ./aws/install && \
          rm -rf awscliv2.zip aws && \
          aws --version
      RUN ARCH=$(uname -m) && \
          if [ "$ARCH" = "x86_64" ]; then YQ_ARCH="amd64"; \
          elif [ "$ARCH" = "aarch64" ]; then YQ_ARCH="arm64"; \
          fi && \
          curl -Lk -o /usr/bin/yq "https://github.com/mikefarah/yq/releases/download/v4.18.1/yq_linux_${YQ_ARCH}" && \
          chmod +x /usr/bin/yq && \
          yq --version && \
          if [ "$ARCH" = "x86_64" ]; then \
            curl -Lk -o /usr/bin/roxctl "https://mirror.openshift.com/pub/rhacs/assets/latest/bin/Linux/roxctl"; \
          elif [ "$ARCH" = "aarch64" ]; then \
            curl -Lk -o /usr/bin/roxctl "https://mirror.openshift.com/pub/rhacs/assets/latest/bin/Linux/roxctl-arm64"; \
          fi && \
          chmod +x /usr/bin/roxctl
      ENV HOME="/tmp"
    from: src
    to: quay-test-omr
promotion:
  to:
  - namespace: ci
    tag: latest
prowgen:
  expose: true
  private: true
releases:
  latest:
    candidate:
      architecture: amd64
      product: ocp
      stream: nightly
      version: "4.16"
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: quay-omr-tests-omr-ocp416-disconnected
  cron: 0 12 * * 5
  steps:
    cluster_profile: aws-quay-qe
    env:
      OMR_RELEASE: "true"
    post:
    - chain: quay-tests-aws-ipi-disconnected-private-deprovision
    test:
    - chain: quay-tests-aws-ipi-disconnected-private-provision
zz_generated_metadata:
  branch: master
  org: quay
  repo: quay-tests
  variant: omr-ocp416
