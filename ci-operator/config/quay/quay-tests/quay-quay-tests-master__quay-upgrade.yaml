base_images:
  tools:
    name: "4.21"
    namespace: ocp
    tag: tools
build_root:
  image_stream_tag:
    name: release
    namespace: openshift
    tag: rhel-9-release-golang-1.25-openshift-4.21
images:
  items:
  - dockerfile_path: images/Dockerfile.upgrade
    from: tools
    to: quay-test-operator
promotion:
  to:
  - namespace: ci
    tag: latest
prowgen:
  expose: true
  private: true
releases:
  latest:
    candidate:
      architecture: amd64
      product: ocp
      stream: nightly
      version: "4.21"
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: quay-ocp421-upgrade
  cron: '@yearly'
  steps:
    cluster_profile: aws-quay-qe
    env:
      BASE_DOMAIN: quayqe.devcluster.openshift.com
      COMPUTE_NODE_REPLICAS: "6"
      COMPUTE_NODE_TYPE: m6a.8xlarge
      MULTISTAGE_PARAM_OVERRIDE_QUAY_INDEX_IMAGE: quay.io/redhat-user-workloads/quay-eng-tenant/stable-3-17-v4-21@sha256:ad9d78470dedf52a4bb139ead20814e3332f191c0f41c606f446ade14d2805bf
      ODF_OPERATOR_CHANNEL: stable-4.21
      QUAY_OPERATOR_CHANNEL: stable-3.17
      QUAY_OPERATOR_SOURCE: fbc-operator-catalog
      QUAY_UPGRADE_TESTCASE: Quay-Upgrade-High|Quay-Upgrade-Medium
      QUAY_VERSION: "3.17"
    test:
    - ref: quay-tests-enable-quay-catalogsource
    - ref: quay-tests-resource-provisioning-storage-odf
    - ref: quay-tests-test-quay-upgrade
    workflow: cucushift-installer-rehearse-aws-ipi
- as: cso-quay-ocp421-upgrade
  cron: '@yearly'
  steps:
    cluster_profile: aws-quay-qe
    env:
      BASE_DOMAIN: quayqe.devcluster.openshift.com
      COMPUTE_NODE_REPLICAS: "6"
      COMPUTE_NODE_TYPE: m6a.2xlarge
      MULTISTAGE_PARAM_OVERRIDE_QUAY_INDEX_IMAGE: quay.io/redhat-user-workloads/quay-eng-tenant/stable-3-17-v4-21@sha256:ad9d78470dedf52a4bb139ead20814e3332f191c0f41c606f446ade14d2805bf
      QUAY_OPERATOR_CHANNEL: stable-3.17
      QUAY_OPERATOR_SOURCE: fbc-operator-catalog
      QUAY_UPGRADE_TESTCASE: Quay-CSO-Upgrade-High
      QUAY_VERSION: "3.17"
    test:
    - ref: quay-tests-enable-quay-catalogsource
    - ref: quay-tests-test-quay-upgrade
    workflow: cucushift-installer-rehearse-aws-ipi
- as: qbo-quay-ocp421-upgrade
  cron: '@yearly'
  steps:
    cluster_profile: aws-quay-qe
    env:
      BASE_DOMAIN: quayqe.devcluster.openshift.com
      COMPUTE_NODE_REPLICAS: "6"
      COMPUTE_NODE_TYPE: m6a.8xlarge
      MULTISTAGE_PARAM_OVERRIDE_QUAY_INDEX_IMAGE: quay.io/redhat-user-workloads/quay-eng-tenant/stable-3-17-v4-21@sha256:ad9d78470dedf52a4bb139ead20814e3332f191c0f41c606f446ade14d2805bf
      ODF_OPERATOR_CHANNEL: stable-4.21
      QUAY_OPERATOR_CHANNEL: stable-3.17
      QUAY_OPERATOR_SOURCE: fbc-operator-catalog
      QUAY_UPGRADE_TESTCASE: Quay-QBO-Upgrade-High
      QUAY_VERSION: "3.17"
    test:
    - ref: quay-tests-enable-quay-catalogsource
    - ref: quay-tests-resource-provisioning-storage-odf
    - ref: quay-tests-quay-deploy-operator
    - ref: quay-tests-quay-deploy-registry-noobaa
    - ref: quay-tests-test-quay-upgrade
    workflow: cucushift-installer-rehearse-aws-ipi
zz_generated_metadata:
  branch: master
  org: quay
  repo: quay-tests
  variant: quay-upgrade
