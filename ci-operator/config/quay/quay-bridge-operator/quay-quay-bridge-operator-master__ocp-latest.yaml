base_images:
  cli:
    name: "4.16"
    namespace: ocp
    tag: cli
  ubi:
    name: ubi
    namespace: ocp
    tag: "9"
build_root:
  image_stream_tag:
    name: builder
    namespace: ocp
    tag: rhel-9-golang-1.22-openshift-4.17
images:
  items:
  - dockerfile_path: Dockerfile
    from: ubi
    to: quay-bridge-operator
  - dockerfile_literal: |
      FROM src
      COPY oc /usr/bin/oc
    from: src
    inputs:
      cli:
        paths:
        - destination_dir: .
          source_path: /usr/bin/oc
    to: src-oc
operator:
  bundles:
  - as: quay
    context_dir: bundle/downstream/
    dockerfile_path: Dockerfile
  substitutions:
  - pullspec: registry-proxy.engineering.redhat.com/rh-osbs/quay-quay-bridge-operator-rhel8:v3.6.0
    with: quay-bridge-operator
promotion:
  to:
  - namespace: quay
    tag: latest
releases:
  latest:
    integration:
      name: "4.16"
      namespace: ocp
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests: []
zz_generated_metadata:
  branch: master
  org: quay
  repo: quay-bridge-operator
  variant: ocp-latest
