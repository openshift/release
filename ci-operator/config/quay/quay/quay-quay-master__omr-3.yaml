base_images:
  cli:
    name: "4.22"
    namespace: ocp
    tag: cli
  upi-installer:
    name: "4.22"
    namespace: ocp
    tag: upi-installer
build_root:
  image_stream_tag:
    name: release
    namespace: openshift
    tag: rhel-9-release-golang-1.25-openshift-4.22
images:
  items:
  - dockerfile_path: Dockerfile.mirror
    optional: true
    to: quay-mirror
releases:
  latest:
    release:
      architecture: amd64
      channel: stable
      version: "4.22"
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- always_run: false
  as: omr-3-e2e
  optional: true
  steps:
    allow_best_effort_post_steps: true
    cluster_profile: aws-quay-qe
    dependencies:
      OMR_IMAGE: pipeline:quay-mirror
    env:
      ADD_INGRESS_RECORDS_MANUALLY: "yes"
      BASE_DOMAIN: quayqe.devcluster.openshift.com
      COMPUTE_NODE_TYPE: m5.xlarge
      CONTROL_PLANE_INSTANCE_TYPE: m6i.xlarge
      ENABLE_IDMS: "yes"
      MIRROR_IN_BASTION: "yes"
      MIRROR_RELEASE_SIGNATURES: "yes"
      PUBLISH: Internal
    post:
    - ref: quay-omr-3-gather
    - chain: ipi-aws-post-disconnected
    pre:
    - chain: quay-aws-ipi-disconnected-omr-3-provision
    test:
    - ref: quay-omr-3-validate
  timeout: 8h0m0s
zz_generated_metadata:
  branch: master
  org: quay
  repo: quay
  variant: omr-3
