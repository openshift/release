base_images:
  cli:
    name: "4.22"
    namespace: ocp
    tag: cli
  operator-sdk:
    name: cli-operator-sdk
    namespace: ocp
    tag: v1.39.2
  quay-operator-bundle:
    name: quay-operator-bundle
    namespace: quay
    tag: latest
  upi-installer:
    name: "4.22"
    namespace: ocp
    tag: upi-installer
build_root:
  image_stream_tag:
    name: release
    namespace: openshift
    tag: rhel-9-release-golang-1.25-openshift-4.22
images:
  items:
  - dockerfile_path: Dockerfile
    to: quay-server
  - dockerfile_path: web/playwright/Dockerfile
    from: src
    to: quay-playwright-runner
promotion:
  to:
  - namespace: quay
    tag: latest
    tag_by_commit: true
releases:
  latest:
    candidate:
      architecture: amd64
      product: ocp
      stream: nightly
      version: "4.22"
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- always_run: true
  as: pr-smoke
  optional: true
  skip_if_only_changed: ^docs/|\.md$|^(?:.*/)?(?:\.gitignore|OWNERS|LICENSE)$
  steps:
    cluster_profile: aws-quay-qe
    env:
      COMPUTE_NODE_TYPE: m5.4xlarge
    workflow: quay-pr-smoke
  timeout: 4h0m0s
zz_generated_metadata:
  branch: master
  org: quay
  repo: quay
