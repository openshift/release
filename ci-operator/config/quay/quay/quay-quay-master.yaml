base_images:
  cli:
    name: "4.21"
    namespace: ocp
    tag: cli
  ocm-cli:
    name: ocm-cli
    namespace: ci
    tag: latest
  rosa-aws-cli:
    name: rosa-aws-cli
    namespace: ci
    tag: latest
build_root:
  image_stream_tag:
    name: release
    namespace: openshift
    tag: rhel-9-release-golang-1.25-openshift-4.21
images:
  items:
  - dockerfile_path: Dockerfile
    to: quay-server
  - dockerfile_literal: |
      FROM src
      RUN dnf module enable -y nodejs:20 && \
          dnf install -y nodejs \
          alsa-lib atk at-spi2-atk cups-libs libdrm libXcomposite \
          libXdamage libXrandr mesa-libgbm pango nss nss-util nspr \
          libxkbcommon libXfixes libXcursor libXext libXi libXtst \
          libwayland-client && \
          dnf clean all
      WORKDIR /go/src/github.com/quay/quay/web
      RUN npm ci
      ENV PLAYWRIGHT_BROWSERS_PATH=/opt/playwright
      RUN npx playwright install chromium
    from: src
    to: quay-playwright-runner
releases:
  latest:
    candidate:
      architecture: amd64
      product: ocp
      stream: nightly
      version: "4.21"
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- always_run: false
  as: playwright-e2e
  steps:
    cluster_profile: aws-quay-qe
    dependencies:
      QUAY_CI_IMAGE: pipeline:quay-server
    env:
      COMPUTE_MACHINE_TYPE: m5.4xlarge
      OCM_LOGIN_ENV: production
      QUAY_EXTRA_CONFIG: |
        FEATURE_REPO_MIRROR: true
        FEATURE_USER_METADATA: true
        FEATURE_IMMUTABLE_TAGS: true
        SUPER_USERS:
          - admin
        GLOBAL_READONLY_SUPER_USERS:
          - readonly
      QUAY_OPERATOR_CHANNEL: stable-3.17
      QUAY_OPERATOR_SOURCE: redhat-operators
      REGION: us-east-1
      REPLICAS: "3"
    test:
    - ref: quay-tests-deploy-quay-aws-s3
    - ref: quay-tests-deploy-quay-custom-image
    - ref: quay-tests-test-quay-playwright
    workflow: rosa-aws-sts-hcp
  timeout: 4h0m0s
zz_generated_metadata:
  branch: master
  org: quay
  repo: quay
