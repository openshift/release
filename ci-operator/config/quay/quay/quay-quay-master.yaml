base_images:
  cli:
    name: "4.21"
    namespace: ocp
    tag: cli
  ocm-cli:
    name: ocm-cli
    namespace: ci
    tag: latest
  rosa-aws-cli:
    name: rosa-aws-cli
    namespace: ci
    tag: latest
build_root:
  image_stream_tag:
    name: release
    namespace: openshift
    tag: rhel-9-release-golang-1.25-openshift-4.21
images:
  items:
  - dockerfile_literal: |
      FROM registry.access.redhat.com/ubi9/nodejs-22:latest
      USER root
      RUN dnf install -y --setopt=install_weak_deps=0 --nodocs \
          nss nspr atk at-spi2-atk at-spi2-core alsa-lib cups-libs \
          libdrm libxcb libxkbcommon libX11 libXcomposite libXdamage \
          libXext libXfixes libXrandr mesa-libgbm pango cairo \
          git podman skopeo \
        && dnf clean all
    to: playwright-base
releases:
  latest:
    candidate:
      architecture: amd64
      product: ocp
      stream: nightly
      version: "4.21"
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- always_run: false
  as: e2e
  steps:
    cluster_profile: aws-quay-qe
    env:
      COMPUTE_MACHINE_TYPE: m5.4xlarge
      OCM_LOGIN_ENV: production
      QUAY_EXTRA_CONFIG: |
        FEATURE_REPO_MIRROR: true
        FEATURE_ORG_MIRROR: true
        FEATURE_USER_METADATA: true
        FEATURE_IMMUTABLE_TAGS: true
        FEATURE_MAILING: true
        FEATURE_USER_LOG_ACCESS: true
        FEATURE_QUOTA_MANAGEMENT: true
        FEATURE_AUTO_PRUNE: true
        FEATURE_IMAGE_EXPIRY_TRIGGER: true
        FEATURE_IMAGE_PULL_STATS: true
        SESSION_TIMEOUT: 2h
        MAIL_SERVER: mailpit.quay-enterprise.svc
        MAIL_PORT: 1025
        MAIL_USE_TLS: false
        MAIL_USE_AUTH: false
        MAIL_DEFAULT_SENDER: noreply@quay.io
        AUTOPRUNE_TASK_RUN_MINIMUM_INTERVAL_MINUTES: 1
        NOTIFICATION_TASK_RUN_MINIMUM_INTERVAL_MINUTES: 1
        SUPER_USERS:
          - admin
        GLOBAL_READONLY_SUPER_USERS:
          - readonly
      QUAY_OPERATOR_CHANNEL: stable-3.17
      QUAY_OPERATOR_SOURCE: redhat-operators
      REGION: us-east-1
      REPLICAS: "3"
    test:
    - ref: quay-deploy-test-services
    - ref: quay-tests-enable-quay-catalogsource
    - ref: quay-tests-deploy-quay-aws-s3
    - ref: quay-test-playwright
    workflow: rosa-aws-sts-hcp
  timeout: 5h0m0s
zz_generated_metadata:
  branch: master
  org: quay
  repo: quay
