base_images:
  nested-podman:
    name: nested-podman
    namespace: ci
    tag: latest
  ubi-python:
    name: ubi-python-311
    namespace: ocp
    tag: "9"
build_root:
  image_stream_tag:
    name: release
    namespace: openshift
    tag: rhel-9-release-golang-1.23-openshift-4.18
images:
  items:
  - dockerfile_literal: |
      FROM ubi-python
      USER 0
      COPY . /workspace/
      WORKDIR /workspace/rosa-boundary/lambda/create-investigation
      RUN pip install uv && uv sync
    from: ubi-python
    inputs:
      src:
        paths:
        - destination_dir: .
          source_path: /go/src/github.com/openshift-online/rosa-boundary
    to: lambda-test-runner
  - dockerfile_literal: |
      FROM nested-podman
      USER root
      # Install Python and test dependencies; LocalStack runs as a Podman container
      RUN dnf install -y --nodocs python3-pip && \
          dnf clean all && \
          pip3 install --no-cache-dir \
          pytest boto3 requests awscli-local
      COPY . /workspace/
    from: nested-podman
    inputs:
      src:
        paths:
        - destination_dir: .
          source_path: /go/src/github.com/openshift-online/rosa-boundary
    to: localstack-test-runner
prowgen:
  expose: true
  private: true
resources:
  '*':
    limits:
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: lambda-unit-tests
  commands: |
    export UV_CACHE_DIR=/tmp/uv-cache
    export AWS_DEFAULT_REGION=us-east-1
    cd /workspace/rosa-boundary/lambda/create-investigation
    uv run pytest test_handler.py -v
  container:
    from: lambda-test-runner
- as: localstack-integration-tests
  capabilities:
  - nested-podman
  commands: |
    set -euo pipefail
    export LOCALSTACK_AUTH_TOKEN=$(cat /etc/localstack-secret/localstack-token)
    export AWS_DEFAULT_REGION=us-east-2
    export AWS_ACCESS_KEY_ID=test
    export AWS_SECRET_ACCESS_KEY=test
    export LOCALSTACK_ENDPOINT=http://localhost:4566

    # Start LocalStack Pro as a container (mirrors compose.ci.yml)
    podman run -d \
      --name localstack \
      --user root \
      -p 4566:4566 \
      -e LOCALSTACK_AUTH_TOKEN="${LOCALSTACK_AUTH_TOKEN}" \
      -e SERVICES=s3,iam,lambda,logs,kms,sts,ec2,ecs,efs,ssm \
      -e LAMBDA_EXECUTOR=local \
      -e ECS_EXECUTOR=local \
      -e AWS_DEFAULT_REGION=us-east-2 \
      -e DISABLE_EVENTS=true \
      -v /workspace/rosa-boundary/tests/localstack/init-aws.sh:/etc/localstack/init/ready.d/init-aws.sh:z \
      localstack/localstack-pro:latest

    echo "Waiting for LocalStack ECS service (timeout: 180s)..."
    TIMEOUT=180; elapsed=0
    until curl -sf http://localhost:4566/_localstack/health 2>/dev/null | \
        python3 -c "import sys,json; h=json.load(sys.stdin); exit(0 if h['services'].get('ecs') in ('available','running') else 1)" 2>/dev/null; do
      [ $elapsed -ge $TIMEOUT ] && { echo "ERROR: LocalStack did not become ready"; exit 1; }
      printf "  waiting... (%ds)\n" "$elapsed"
      sleep 5; elapsed=$((elapsed + 5))
    done
    echo "LocalStack ready."

    cd /workspace/rosa-boundary/tests/localstack
    pytest integration/ -v -m "not slow" --tb=short --junit-xml="${ARTIFACT_DIR}/junit_localstack.xml"
  container:
    from: localstack-test-runner
  nested_podman: true
  run_if_changed: ^(lambda/|deploy/regional/|tests/localstack/)
  secret:
    mount_path: /etc/localstack-secret
    name: localstack-token
zz_generated_metadata:
  branch: main
  org: openshift-online
  repo: rosa-boundary
