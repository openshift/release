base_images:
  nested-podman:
    name: nested-podman
    namespace: ci
    tag: latest
  rosa-aws-cli:
    name: rosa-aws-cli
    namespace: ci
    tag: latest
build_root:
  image_stream_tag:
    name: builder
    namespace: ocp
    tag: rhel-9-golang-1.24-openshift-4.22
images:
  items:
  - dockerfile_path: Containerfile
    to: rosa-e2e
releases:
  latest:
    candidate:
      product: ocp
      stream: nightly
      version: "4.22"
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: unit
  commands: make unit-test
  container:
    from: src
- as: lint
  commands: |
    unset GOFLAGS
    make lint
  container:
    from: src
- as: rosa-ci-daily-status
  commands: |
    #!/bin/bash
    set -euo pipefail
    SIPPY_API="https://sippy.dptools.openshift.org/api/jobs"
    RELEASE="rosa-stage"
    echo "Querying Sippy for ${RELEASE} job results..."
    response=$(curl -sf "${SIPPY_API}?release=${RELEASE}&limit=100" 2>/dev/null) || {
      echo "Warning: Failed to fetch data from Sippy API"
      response="[]"
    }
    total=$(echo "${response}" | jq 'length')
    if [[ "${total}" == "0" ]]; then
      echo "No jobs found in Sippy for ${RELEASE}"
      exit 1
    fi
    passing=$(echo "${response}" | jq '[.[] | select(.current_pass_percentage >= 80)] | length')
    failing=$((total - passing))
    echo "ROSA CI Status: ${passing}/${total} jobs healthy, ${failing} failing"
    echo "${response}" | jq -r '.[] | "\(.name): \(.current_pass_percentage)%"' | sort
    if [[ "${failing}" -gt 0 ]]; then
      echo "Some jobs are below threshold"
      exit 1
    fi
  container:
    from: src
  cron: 0 14 * * *
- as: ocm-fvt-periodic-cs-rosa-hcp-ad-staging-main
  capabilities:
  - nested-podman
  commands: |
    env -i bash --norc --noprofile << 'EOF' > /tmp/podman.env
    export AWS_SHARED_CREDENTIALS_FILE=/credentials/aws-cred
    export AWS_SHARED_VPC_CREDENTIALS_FILE=/credentials/aws-shared-vpc-credentials
    source /usr/local/cs-qe-credentials/ocm-tokens
    env | grep -v '^_='
    EOF

    podman run \
    --authfile /usr/local/cs-qe-credentials/.dockerconfigjson \
    --env-file /tmp/podman.env \
    -v /usr/local/cs-qe-credentials:/credentials:ro,z \
    --rm \
    quay.io/redhat-services-prod/ocmci/ocmci:latest \
    ocmtest test --service cms --job cs-rosa-hcp-ad-staging-main
  container:
    from: nested-podman
    memory_backed_volume:
      size: 1Gi
  cron: 0 8 * * *
  nested_podman: true
  secrets:
  - mount_path: /usr/local/cs-qe-credentials
    name: cs-qe-credentials
zz_generated_metadata:
  branch: main
  org: openshift-online
  repo: rosa-e2e
