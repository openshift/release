build_root:
  image_stream_tag:
    name: builder
    namespace: ocp
    tag: rhel-9-golang-1.24-openshift-4.22
images:
- dockerfile_path: Containerfile
  to: rosa-e2e
- dockerfile_literal: |
    FROM quay.io/gbranco_openshift/ocmtest:latest
  to: ocm-fvt
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: unit
  commands: make unit-test
  container:
    from: src
- as: lint
  commands: |
    unset GOFLAGS
    make lint
  container:
    from: src
- as: ocm-fvt-periodic-cs-rosa-hcp-ad-staging-main
  commands: |
    export AWS_SHARED_CREDENTIALS_FILE=/usr/local/cs-qe-credentials/aws-cred
    export AWS_SHARED_VPC_CREDENTIALS_FILE=/usr/local/cs-qe-credentials/aws-shared-vpc-credentials
    source /usr/local/cs-qe-credentials/ocm-tokens
    ocmtest test --service cms --job cs-rosa-hcp-ad-staging-main
  container:
    from: ocm-fvt
    memory_backed_volume:
      size: 1Gi
  cron: 0 8 * * *
  secrets:
  - mount_path: /usr/local/cs-qe-credentials
    name: cs-qe-credentials
zz_generated_metadata:
  branch: main
  org: openshift-online
  repo: rosa-e2e
