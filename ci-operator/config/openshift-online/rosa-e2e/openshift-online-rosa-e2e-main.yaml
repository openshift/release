base_images:
  nested-podman:
    name: nested-podman
    namespace: ci
    tag: latest
  rosa-aws-cli:
    name: rosa-aws-cli
    namespace: ci
    tag: latest
build_root:
  image_stream_tag:
    name: builder
    namespace: ocp
    tag: rhel-9-golang-1.24-openshift-4.22
images:
  items:
  - dockerfile_path: Containerfile
    to: rosa-e2e
releases:
  latest:
    candidate:
      product: ocp
      stream: nightly
      version: "4.22"
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: unit
  commands: make unit-test
  container:
    from: src
- as: lint
  commands: |
    unset GOFLAGS
    make lint
  container:
    from: src
- as: rosa-ci-daily-status
  commands: scripts/ci-status-report.sh
  container:
    from: src
  cron: 0 14 * * *
zz_generated_metadata:
  branch: main
  org: openshift-online
  repo: rosa-e2e
