base_images:
  nested-podman:
    name: nested-podman
    namespace: ci
    tag: latest
  rosa-aws-cli:
    name: rosa-aws-cli
    namespace: ci
    tag: latest
build_root:
  image_stream_tag:
    name: builder
    namespace: ocp
    tag: rhel-9-golang-1.24-openshift-4.22
images:
  items:
  - dockerfile_path: Containerfile
    to: rosa-e2e
releases:
  latest:
    candidate:
      product: ocp
      stream: nightly
      version: "4.22"
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: unit
  commands: make unit-test
  container:
    from: src
- as: lint
  commands: |
    unset GOFLAGS
    make lint
  container:
    from: src
- as: rosa-ci-daily-status
  commands: scripts/ci-status-report.sh
  container:
    from: src
  cron: 0 14 * * *
- as: ocm-fvt-periodic-cs-rosa-hcp-ad-staging-main
  capabilities:
  - nested-podman
  commands: |
    JOB_URL="https://prow.ci.openshift.org/view/gs/test-platform-results/"

    if [ -n "${PULL_NUMBER:-}" ]; then
      JOB_URL="${JOB_URL}pr-logs/pull/openshift_release/${PULL_NUMBER}/${JOB_NAME}/${BUILD_ID}"
    else
      JOB_URL="${JOB_URL}logs/${JOB_NAME}/${BUILD_ID}"
    fi

    echo "JOB_URL=${JOB_URL}"
  container:
    from: nested-podman
    memory_backed_volume:
      size: 1Gi
  cron: 0 8 * * *
  nested_podman: true
  secrets:
  - mount_path: /usr/local/cs-qe-credentials
    name: cs-qe-credentials
zz_generated_metadata:
  branch: main
  org: openshift-online
  repo: rosa-e2e
