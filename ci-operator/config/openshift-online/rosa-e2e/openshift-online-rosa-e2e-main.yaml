build_root:
  image_stream_tag:
    name: builder
    namespace: ocp
    tag: rhel-9-golang-1.24-openshift-4.22
images:
- dockerfile_path: Containerfile
  to: rosa-e2e
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: unit
  commands: make unit-test
  container:
    from: src
- as: lint
  commands: |
    unset GOFLAGS
    make lint
  container:
    from: src
zz_generated_metadata:
  branch: main
  org: openshift-online
  repo: rosa-e2e
