base_images:
  nested-podman:
    name: nested-podman
    namespace: ci
    tag: latest
build_root:
  image_stream_tag:
    name: builder
    namespace: ocp
    tag: rhel-9-golang-1.26-openshift-4.23
releases:
  latest:
    candidate:
      product: ocp
      stream: nightly
      version: "4.22"
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: ocm-fvt-periodic-osdfm-basic-periodic-stage
  capabilities:
  - nested-podman
  cron: 0 9 * * 1
  nested_podman: true
  steps:
    env:
      OCM_FVT_JOB_NAME: osdfm-basic-periodic-stage
      OCM_FVT_OCM_ENV: stage
      OCM_FVT_REPORT_JIRA: "false"
      OCM_FVT_SERVICE: osdfm
    test:
    - ref: rosa-e2e-ocm-fvt-longrunning
  timeout: 10h0m0s
zz_generated_metadata:
  branch: main
  org: openshift-online
  repo: rosa-e2e
  variant: ocm-fvt-osdfm-staging
