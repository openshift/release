base_images:
  nested-podman:
    name: nested-podman
    namespace: ci
    tag: latest
build_root:
  image_stream_tag:
    name: builder
    namespace: ocp
    tag: rhel-9-golang-1.24-openshift-4.22
releases:
  latest:
    candidate:
      product: ocp
      stream: nightly
      version: "4.22"
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: ocm-fvt-periodic-cs-rosa-hcp-autonode-integration-main
  capabilities:
  - nested-podman
  cron: 0 8 * * *
  nested_podman: true
  steps:
    env:
      OCM_FVT_EXTRA_ENVS: DR_AWS_CREDENTIALS_FILE=/credentials/aws_dr_shared_cred
      OCM_FVT_JOB_NAME: cs-rosa-hcp-autonode-integration-main
      OCM_FVT_OCM_ENV: integration
    test:
    - ref: rosa-e2e-ocm-fvt
- as: ocm-fvt-periodic-cs-rosa-hcp-backup-restore-integration-main
  capabilities:
  - nested-podman
  cron: 0 8 * * *
  nested_podman: true
  steps:
    env:
      OCM_FVT_EXTRA_ENVS: DR_AWS_CREDENTIALS_FILE=/credentials/aws_dr_shared_cred
      OCM_FVT_JOB_NAME: cs-rosa-hcp-backup-restore-integration-main
      OCM_FVT_OCM_ENV: integration
    test:
    - ref: rosa-e2e-ocm-fvt
- as: ocm-fvt-periodic-cs-rosa-hcp-bkp-cp-upgrade-integration-main
  capabilities:
  - nested-podman
  cron: 0 8 * * *
  nested_podman: true
  steps:
    env:
      OCM_FVT_EXTRA_ENVS: DR_AWS_CREDENTIALS_FILE=/credentials/aws_dr_shared_cred
      OCM_FVT_GCP_CREDS: "true"
      OCM_FVT_JOB_NAME: cs-rosa-hcp-backup-cp-upgrade-integration-main
      OCM_FVT_OCM_ENV: integration
    test:
    - ref: rosa-e2e-ocm-fvt
zz_generated_metadata:
  branch: main
  org: openshift-online
  repo: rosa-e2e
  variant: ocm-fvt-rosa-hcp-integration
