base_images:
  nested-podman:
    name: nested-podman
    namespace: ci
    tag: latest
build_root:
  image_stream_tag:
    name: builder
    namespace: ocp
    tag: rhel-9-golang-1.24-openshift-4.22
releases:
  latest:
    candidate:
      product: ocp
      stream: nightly
      version: "4.22"
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: ocm-fvt-periodic-cs-rosa-hcp-ad-staging-main
  capabilities:
  - nested-podman
  cron: 0 3 * * *
  nested_podman: true
  steps:
    env:
      OCM_FVT_JOB_NAME: cs-rosa-hcp-ad-staging-main
    test:
    - ref: rosa-e2e-ocm-fvt
  timeout: 5h0m0s
- as: ocm-fvt-periodic-cs-rosa-hcp-amd64-upgrade-staging-main
