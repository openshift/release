base_images:
  nested-podman:
    name: nested-podman
    namespace: ci
    tag: latest
build_root:
  image_stream_tag:
    name: builder
    namespace: ocp
    tag: rhel-9-golang-1.24-openshift-4.22
releases:
  latest:
    candidate:
      product: ocp
      stream: nightly
      version: "4.22"
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: ocm-fvt-periodic-cs-rosa-hcp-ad-staging-main
  capabilities:
  - nested-podman
  commands: |
    JOB_LINK="https://prow.ci.openshift.org/view/gs/test-platform-results/"
    if [ -n "${PULL_NUMBER:-}" ]; then
      JOB_LINK="${JOB_LINK}pr-logs/pull/openshift_release/${PULL_NUMBER}/${JOB_NAME}/${BUILD_ID}"
    else
      JOB_LINK="${JOB_LINK}logs/${JOB_NAME}/${BUILD_ID}"
    fi

    env -i bash --norc --noprofile << EOF > /tmp/podman.env
    export AWS_SHARED_CREDENTIALS_FILE=/credentials/aws-cred
    export AWS_SHARED_VPC_CREDENTIALS_FILE=/credentials/aws-shared-vpc-credentials
    export ENABLE_JIRA_REPORTING=true
    export JOB_LINK="${JOB_LINK}"
    source /usr/local/cs-qe-credentials/ocm-tokens
    source /usr/local/cs-qe-credentials/jira-cred
    env | grep -v '^_='
    EOF

    podman run \
    --authfile /usr/local/cs-qe-credentials/.dockerconfigjson \
    --env-file /tmp/podman.env \
    -v /usr/local/cs-qe-credentials:/credentials:ro,z \
    --rm \
    quay.io/redhat-services-prod/ocmci/ocmci:latest \
    ocmtest test --service cms --job cs-rosa-hcp-ad-staging-main --reportJiraTicket
  container:
    from: nested-podman
    memory_backed_volume:
      size: 1Gi
  cron: 0 8 * * *
  nested_podman: true
  secrets:
  - mount_path: /usr/local/cs-qe-credentials
    name: cs-qe-credentials
- as: ocm-fvt-periodic-cs-rosa-hcp-zero-egress-upgrade-staging-main
  capabilities:
  - nested-podman
  commands: |
    JOB_LINK="https://prow.ci.openshift.org/view/gs/test-platform-results/"
    if [ -n "${PULL_NUMBER:-}" ]; then
      JOB_LINK="${JOB_LINK}pr-logs/pull/openshift_release/${PULL_NUMBER}/${JOB_NAME}/${BUILD_ID}"
    else
      JOB_LINK="${JOB_LINK}logs/${JOB_NAME}/${BUILD_ID}"
    fi

    env -i bash --norc --noprofile << EOF > /tmp/podman.env
    export AWS_SHARED_CREDENTIALS_FILE=/credentials/aws-cred
    export SHARED_VPC_AWS_SHARED_CREDENTIALS_FILE=/credentials/aws-shared-vpc-credentials
    export ENABLE_JIRA_REPORTING=true
    export JOB_LINK="${JOB_LINK}"
    source /usr/local/cs-qe-credentials/ocm-tokens
    source /usr/local/cs-qe-credentials/jira-cred
    env | grep -v '^_='
    EOF

    podman run \
    --authfile /usr/local/cs-qe-credentials/.dockerconfigjson \
    --env-file /tmp/podman.env \
    -v /usr/local/cs-qe-credentials:/credentials:ro,z \
    --rm \
    quay.io/redhat-services-prod/ocmci/ocmci:latest \
    ocmtest test --service cms --job cs-rosa-hcp-zero-egress-upgrade-staging-main --reportJiraTicket
  container:
    from: nested-podman
    memory_backed_volume:
      size: 1Gi
  cron: 0 8 * * *
  nested_podman: true
  secrets:
  - mount_path: /usr/local/cs-qe-credentials
    name: cs-qe-credentials
- as: ocm-fvt-test-job-link-envar
  capabilities:
  - nested-podman
  commands: |
    echo "========================================="
    echo "Testing JOB_LINK environment variable"
    echo "========================================="
    echo ""
    echo "Step 1: Constructing JOB_LINK outside env -i"
    JOB_LINK="https://prow.ci.openshift.org/view/gs/test-platform-results/"
    if [ -n "${PULL_NUMBER:-}" ]; then
      JOB_LINK="${JOB_LINK}pr-logs/pull/openshift_release/${PULL_NUMBER}/${JOB_NAME}/${BUILD_ID}"
    else
      JOB_LINK="${JOB_LINK}logs/${JOB_NAME}/${BUILD_ID}"
    fi
    echo "JOB_LINK constructed: ${JOB_LINK}"
    echo ""

    echo "Step 2: Creating podman env file"
    env -i bash --norc --noprofile << EOF > /tmp/podman.env
    export TEST_VAR="hello from env file"
    export JOB_LINK="${JOB_LINK}"
    env | grep -v '^_='
    EOF

    echo ""
    echo "Step 3: Contents of /tmp/podman.env:"
    cat /tmp/podman.env
    echo ""

    echo "Step 4: Running podman container with env file"
    podman run \
    --env-file /tmp/podman.env \
    --rm \
    quay.io/openshift/origin-cli:latest \
    bash -c 'echo ""; echo "=== Inside Podman Container ==="; echo "JOB_LINK value: ${JOB_LINK}"; echo "TEST_VAR value: ${TEST_VAR}"; echo "All env vars:"; env | sort; echo ""'

    echo ""
    echo "========================================="
    echo "Test completed"
    echo "========================================="
  container:
    from: nested-podman
    memory_backed_volume:
      size: 1Gi
  interval: 24h
  nested_podman: true
zz_generated_metadata:
  branch: main
  org: openshift-online
  repo: rosa-e2e
  variant: ocm-fvt-rosa-hcp-staging
