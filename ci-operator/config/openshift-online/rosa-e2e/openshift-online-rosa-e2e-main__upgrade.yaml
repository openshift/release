base_images:
  nested-podman:
    name: nested-podman
    namespace: ci
    tag: latest
  ocm-cli:
    name: ocm-cli
    namespace: ci
    tag: latest
  rosa-aws-cli:
    name: rosa-aws-cli
    namespace: ci
    tag: latest
build_root:
  image_stream_tag:
    name: builder
    namespace: ocp
    tag: rhel-9-golang-1.24-openshift-4.22
images:
  items:
  - dockerfile_path: Containerfile
    to: rosa-e2e
releases:
  latest:
    candidate:
      product: ocp
      stream: nightly
      version: "4.22"
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: rosa-classic-sts-upgrade-4-20-to-4-21
  cron: 0 2 * * 0
  steps:
    cluster_profile: rosa-e2e-01
    env:
      CHANNEL_GROUP: stable
      CLUSTER_TOPOLOGY: classic
      HOSTED_CP: "false"
      LABEL_FILTER: Platform:Classic
      MULTI_AZ: "false"
      OCM_LOGIN_ENV: staging
      OPENSHIFT_VERSION: "4.20"
      REPLICAS: "2"
      STS: "true"
      UPGRADE_CHANNEL: candidate-4.21
      UPGRADED_TO_VERSION: "4.21"
    test:
    - ref: rosa-cluster-upgrade-cluster
    - ref: rosa-e2e-test
    workflow: rosa-e2e-classic
zz_generated_metadata:
  branch: main
  org: openshift-online
  repo: rosa-e2e
  variant: upgrade
