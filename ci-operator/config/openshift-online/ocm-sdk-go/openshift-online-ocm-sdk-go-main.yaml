build_root:
  image_stream_tag:
    name: release
    namespace: openshift
    tag: golang-1.23
images:
- dockerfile_literal: |
    FROM src
    RUN dnf install -y pass && dnf clean all
  from: src
  to: golang-plus-pass
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: unit
  commands: |
    unset GOFLAGS
    make test
  container:
    from: golang-plus-pass
- as: verify
  commands: |
    unset GOFLAGS
    make verify
  container:
    from: src
zz_generated_metadata:
  branch: main
  org: openshift-online
  repo: ocm-sdk-go
