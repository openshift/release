binary_build_commands: make build
build_root:
  image_stream_tag:
    name: builder
    namespace: ocp
    tag: rhel-9-golang-1.26-openshift-4.23
prowgen:
  expose: true
  private: true
resources:
  '*':
    limits:
      memory: 8Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: check-migrations
  commands: |
    git remote add origin .
    git update-ref refs/remotes/origin/master HEAD
    ./check_migrations.sh
  container:
    from: src
- as: lint
  commands: unset GOFLAGS && make lint
  container:
    from: src
- as: pr-check
  steps:
    env:
      OFFERING: --rosa-hcp
    test:
    - ref: openshift-online-pr-check
- as: unit
  commands: unset GOFLAGS && make test
  container:
    from: src
zz_generated_metadata:
  branch: konflux-master
  org: openshift-online
  repo: rosa-clusters-service
