build_root:
  project_image:
    dockerfile_path: ci/Containerfile
images:
  items:
  - dockerfile_path: platform-api/Dockerfile
    to: platform-api
  - dockerfile_path: hyperfleet-operator/Dockerfile
    to: hyperfleet-operator
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: lint
  commands: ./ci/lint.sh
  container:
    from: src
- as: unit
  commands: ./ci/unit-tests.sh
  container:
    from: src
- as: verify
  commands: ./ci/verify.sh
  container:
    from: src
- as: push-api-image
  postsubmit: true
  steps:
    dependencies:
      CI_COMPONENT_IMAGE: platform-api
    env:
      ROSA_REGIONAL_QUAY_DEST_REPO: quay.io/rrp-dev-ci/platform-api-release
    test:
    - ref: rosa-hyperfleet-image-push
- as: push-operator-image
  postsubmit: true
  steps:
    dependencies:
      CI_COMPONENT_IMAGE: hyperfleet-operator
    env:
      ROSA_REGIONAL_QUAY_DEST_REPO: quay.io/rrp-dev-ci/hyperfleet-operator-release
    test:
    - ref: rosa-hyperfleet-image-push
- always_run: false
  as: on-demand-e2e
  steps:
    dependencies:
      CI_COMPONENT_IMAGE: platform-api
      CI_OPERATOR_IMAGE: hyperfleet-operator
    env:
      ROSA_REGIONAL_COMPONENT_NAME: platform-api
      ROSA_REGIONAL_HELM_OVERRIDE_YAML: |
        platformApi:
          app:
            image:
              repository: IMAGE_REPO
              tag: IMAGE_TAG
      ROSA_REGIONAL_HELM_VALUES_FILE: argocd/config/regional-cluster/platform-api/values.yaml
      ROSA_REGIONAL_QUAY_DEST_REPO: quay.io/rrp-dev-ci/platform-api
      ROSA_REGIONAL_EXTRA_COMPONENTS: |
        - env: CI_OPERATOR_IMAGE
          repo: quay.io/rrp-dev-ci/hyperfleet-operator
          target: argocd/config/regional-cluster/hyperfleet-operator/values.yaml
          override:
            hyperfleetOperator:
              image:
                repository: IMAGE_REPO
                tag: IMAGE_TAG
    workflow: rosa-hyperfleet-ephemeral-e2e
zz_generated_metadata:
  branch: main
  org: openshift-online
  repo: rosa-hyperfleet-api
