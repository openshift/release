build_root:
  image_stream_tag:
    name: release
    namespace: openshift
    tag: rhel-9-release-golang-1.25-openshift-4.22
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: unit
  commands: |
    unset GOFLAGS
    make test
  container:
    from: src
- as: lint
  commands: |
    unset GOFLAGS
    make lint
  container:
    from: src
- as: build
  commands: |
    unset GOFLAGS
    make build
  container:
    from: src
zz_generated_metadata:
  branch: main
  org: openshift-online
  repo: gcp-hcp-ctl
