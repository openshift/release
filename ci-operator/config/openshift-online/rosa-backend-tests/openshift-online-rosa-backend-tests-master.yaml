build_root:
  image_stream_tag:
    name: release
    namespace: openshift
    tag: rhel-9-release-golang-1.24-openshift-4.22
prowgen:
  expose: true
  private: true
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: lint
  commands: |
    # Only run checks that don't require fetching dependencies
    make shell-lint make-lint
  container:
    from: src
zz_generated_metadata:
  branch: master
  org: openshift-online
  repo: rosa-backend-tests
