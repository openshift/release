build_root:
  image_stream_tag:
    name: release
    namespace: openshift
    tag: rhel-9-release-golang-1.24-openshift-4.22
prowgen:
  expose: true
  private: true
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: lint
  commands: |
    unset GOFLAGS
    export HOME=/tmp
    git config --global url."https://$(cat /usr/local/ocm-github-credentials/token)@github.com/".insteadOf "https://github.com/"
    make lint
  container:
    from: src
  secrets:
  - mount_path: /usr/local/ocm-github-credentials
    name: ocm-github-credentials
zz_generated_metadata:
  branch: github-master
  org: openshift-online
  repo: rosa-backend-tests
