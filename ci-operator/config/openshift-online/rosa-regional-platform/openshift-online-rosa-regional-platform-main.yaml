build_root:
  project_image:
    dockerfile_path: ci/Containerfile
images:
  items:
  - dockerfile_path: ci/Containerfile
    to: rosa-regional-platform-ci
promotion:
  to:
  - namespace: ci
    tag: latest
releases:
  latest:
    release:
      channel: stable
      version: "4.21"
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: terraform-validate
  commands: ./ci/terraform-validate.sh
  container:
    from: src
- as: helm-lint
  commands: ./ci/helm-lint.sh
  container:
    from: src
- as: check-docs
  commands: ./ci/check-docs.sh
  container:
    from: src
- as: check-rendered-files
  commands: ./ci/check-rendered-files.sh
  container:
    from: src
- as: unit-tests
  commands: ./ci/run-unit-tests.sh
  container:
    from: src
- as: nightly-ephemeral
  cron: 0 4 * * *
  steps:
    allow_best_effort_post_steps: true
    env:
      ROSA_REGIONAL_TEARDOWN_FIRE_AND_FORGET: "false"
    post:
    - ref: rosa-regional-platform-teardown
    pre:
    - ref: rosa-regional-platform-provision
    test:
    - ref: rosa-regional-platform-e2e
- as: nightly-integration
  cron: 0 4 * * *
  steps:
    test:
    - as: e2e
      commands: |-
        export AWS_CONFIG_FILE=/var/run/rosa-credentials/aws_config
        ./ci/e2e-tests.sh
      credentials:
      - mount_path: /var/run/rosa-credentials
        name: rosa-regional-platform-integration-creds
        namespace: test-credentials
      from: src
      resources:
        requests:
          cpu: 100m
          memory: 200Mi
- always_run: false
  as: on-demand-e2e
  steps:
    post:
    - as: teardown-ephemeral
      commands: |-
        export REPOSITORY_URL=$(curl -s "https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/pulls/${PULL_NUMBER}" | jq -r '.head.repo.clone_url')
        export REPOSITORY_BRANCH="${PULL_HEAD_REF}"
        export AWS_CONFIG_FILE=/var/run/rosa-credentials/aws_config
        uv run --no-cache ci/ephemeral-provider/main.py --teardown-fire-and-forget
      credentials:
      - mount_path: /var/run/rosa-credentials
        name: rosa-regional-platform-ephemeral-creds
        namespace: test-credentials
      from: src
      resources:
        requests:
          cpu: 100m
          memory: 200Mi
    pre:
    - as: provision-ephemeral
      commands: |-
        export REPOSITORY_URL=$(curl -s "https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/pulls/${PULL_NUMBER}" | jq -r '.head.repo.clone_url')
        export REPOSITORY_BRANCH="${PULL_HEAD_REF}"
        export AWS_CONFIG_FILE=/var/run/rosa-credentials/aws_config
        uv run --no-cache ci/ephemeral-provider/main.py \
          --save-regional-state "${SHARED_DIR}/regional-terraform-outputs.json"
      credentials:
      - mount_path: /var/run/rosa-credentials
        name: rosa-regional-platform-ephemeral-creds
        namespace: test-credentials
      from: src
      resources:
        requests:
          cpu: 100m
          memory: 200Mi
    test:
    - as: e2e
      commands: |-
        export AWS_CONFIG_FILE=/var/run/rosa-credentials/aws_config
        ./ci/e2e-tests.sh
      credentials:
      - mount_path: /var/run/rosa-credentials
        name: rosa-regional-platform-ephemeral-creds
        namespace: test-credentials
      from: src
      resources:
        requests:
          cpu: 100m
          memory: 200Mi
zz_generated_metadata:
  branch: main
  org: openshift-online
  repo: rosa-regional-platform
