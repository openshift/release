build_root:
  project_image:
    dockerfile_path: ci/Containerfile
  use_build_cache: true
images:
  items:
  - dockerfile_path: ci/Containerfile
    to: rosa-gap-analysis
resources:
  '*':
    limits:
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: nightly-4-19
  cron: 0 6 * * *
  steps:
    test:
    - as: 4-19-gap-analysis
      commands: |-
        set -euo pipefail
        mkdir -p ${ARTIFACT_DIR}/rosa-gap-analysis-reports
        export REPORT_DIR=${ARTIFACT_DIR}/rosa-gap-analysis-reports
        export OPENSHIFT_VERSION=4.19
        export OCM_CLIENT_ID=$(cat /var/run/ocm-credentials/ocm-client-id)
        export OCM_CLIENT_SECRET=$(cat /var/run/ocm-credentials/ocm-client-secret)
        ./scripts/gap-all.sh
      credentials:
      - mount_path: /var/run/ocm-credentials
        name: rosa-e2e-prow-ci-01-osde2e
        namespace: test-credentials
      from: src
      resources:
        requests:
          cpu: 100m
          memory: 200Mi
