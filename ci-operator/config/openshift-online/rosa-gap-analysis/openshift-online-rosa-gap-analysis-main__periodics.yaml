build_root:
  project_image:
    dockerfile_path: ci/Containerfile
  use_build_cache: true
images:
  items:
  - dockerfile_path: ci/Containerfile
    to: rosa-gap-analysis
resources:
  '*':
    limits:
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: nightly-4-19
  commands: |
    set -euo pipefail
    mkdir -p ${ARTIFACT_DIR}/rosa-gap-analysis-reports
    export REPORT_DIR=${ARTIFACT_DIR}/rosa-gap-analysis-reports
    export OPENSHIFT_VERSION=4.19
    export OCM_CLIENT_ID=/var/run/ocm-credentials/sso-client-id
    export OCM_CLIENT_SECRET=/var/run/ocm-credentials/sso-client-secret
    ./scripts/gap-all.sh
  credentials:
  - mount_path: /var/run/ocm-credentials
    name: cluster-secrets-rosa-e2e-01
    namespace: test-credentials
  container:
    from: rosa-gap-analysis
  cron: 0 6 * * *
