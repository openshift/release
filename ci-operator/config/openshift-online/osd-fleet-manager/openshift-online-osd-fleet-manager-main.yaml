base_images:
  nested-podman:
    name: nested-podman
    namespace: ci
    tag: latest
build_root:
  image_stream_tag:
    name: builder
    namespace: ocp
    tag: rhel-9-golang-1.25-openshift-4.22
images:
  items:
  - dockerfile_literal: |
      FROM nested-podman
      COPY src/ /opt/app-root/src
      WORKDIR /opt/app-root/src/osd-fleet-manager
      USER root
      RUN dnf install -y git make gcc jq unzip curl podman-docker && dnf clean all
      RUN curl -LO https://go.dev/dl/go1.25.7.linux-amd64.tar.gz && \
          tar -C /usr/local -xzf go1.25.7.linux-amd64.tar.gz && \
          rm go1.25.7.linux-amd64.tar.gz
      ENV PATH="/usr/local/go/bin:${PATH}"
    from: nested-podman
    inputs:
      src:
        paths:
        - destination_dir: src
          source_path: /go/src/github.com/openshift-online/osd-fleet-manager
    to: golang-plus
prowgen:
  expose: true
  private: true
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: lint
  commands: |
    unset GOFLAGS
    echo "Go Version: $(go version)"
    make lint
  container:
    from: golang-plus
- as: unit-test
  capabilities:
  - nested-podman
  commands: |
    unset GOFLAGS
    echo "Go Version: $(go version)"
    go install gotest.tools/gotestsum@latest
    export PATH="$(go env GOPATH)/bin:${PATH}"
    make setup/secrets/empty
    make ocm/setup aws/setup
    export OCM_ENV=testing
    make db/setup
    sleep 5
    make test
  container:
    from: golang-plus
  nested_podman: true
- as: integration-test
  capabilities:
  - nested-podman
  commands: |
    unset GOFLAGS
    echo "Go Version: $(go version)"
    go install gotest.tools/gotestsum@latest
    export PATH="$(go env GOPATH)/bin:${PATH}"
    make setup/secrets/empty
    make ocm/setup aws/setup
    export OCM_ENV=integration
    make db/setup
    sleep 5
    make db/migrate
    make test/integration
  container:
    from: golang-plus
  nested_podman: true
zz_generated_metadata:
  branch: main
  org: openshift-online
  repo: osd-fleet-manager
