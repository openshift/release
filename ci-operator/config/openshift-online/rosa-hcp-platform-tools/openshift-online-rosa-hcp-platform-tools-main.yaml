base_images:
  shellcheck:
    name: shellcheck
    namespace: ci
    tag: latest
build_root:
  from_repository: true
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: build
  commands: |
    make build-all
  container:
    from: src
- as: test
  commands: |
    make test-all
  container:
    from: src
- as: vet
  commands: |
    make vet-all
  container:
    from: src
- as: lint-shell
  commands: |
    make lint-shell-all
  container:
    from: shellcheck
zz_generated_metadata:
  branch: main
  org: openshift-online
  repo: rosa-hcp-platform-tools
