build_root:
  project_image:
    dockerfile_path: ci/Containerfile
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: lint
  commands: ./ci/lint.sh
  container:
    from: src
- as: unit
  commands: ./ci/unit-tests.sh
  container:
    from: src
- as: verify
  commands: ./ci/verify.sh
  container:
    from: src
zz_generated_metadata:
  branch: main
  org: openshift-online
  repo: rosa-regional-platform-api
