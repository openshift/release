build_root:
  project_image:
    dockerfile_literal: |
      FROM registry.access.redhat.com/ubi9/go-toolset:1.21
      USER 0
      ENV GOCACHE=/tmp/go-cache
      ENV GOPATH=/go
images:
  items:
  - dockerfile_path: Dockerfile
    to: osci-workflow-validation
releases:
  latest:
    release:
      channel: stable
      version: "4.20"
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: unit
  commands: go test ./...
  container:
    from: src
- as: ephemeral-smoke
  steps:
    test:
    - ref: osci-workflow-validation-smoke
    workflow: ephemeral-namespace
zz_generated_metadata:
  branch: main
  org: openshift-online
  repo: osci-workflow-validation
