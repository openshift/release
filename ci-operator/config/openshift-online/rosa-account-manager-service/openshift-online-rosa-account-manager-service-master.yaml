build_root:
  image_stream_tag:
    name: ams-ci-v6
    namespace: ci
    tag: latest
prowgen:
  expose: true
  private: true
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: lint
  commands: |
    unset GOFLAGS
    echo "Go Version: $(go version)"
    make verify
    make lint
  container:
    from: src
- as: unit-test
  capabilities:
  - nested-podman
  commands: |
    unset GOFLAGS
    echo "Go Version: $(go version)"
    cp /opt/app-root/ams-secrets/rhsm.crt secrets/rhsm.crt
    cp /opt/app-root/ams-secrets/rbac.crt secrets/rbac.crt
    cp /opt/app-root/ams-secrets/rhsm.key secrets/rhsm.key
    cp /opt/app-root/ams-secrets/rbac.key secrets/rbac.key
    make db/setup
    sleep 5
    make test
  container:
    from: src
  nested_podman: true
  secrets:
  - mount_path: /opt/app-root/ams-secrets
    name: openshift-online-ams-secrets
- as: fedramp-test
  capabilities:
  - nested-podman
  commands: |
    unset GOFLAGS
    cp /opt/app-root/ams-secrets/rhsm.crt secrets/rhsm.crt
