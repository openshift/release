build_root:
  project_image:
    dockerfile_literal: |
      FROM registry.access.redhat.com/ubi9/nodejs-22:latest
      USER root
      RUN mkdir -p /go/src && chmod -R 777 /go
      USER 1001
prowgen:
  expose: true
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: validate-spec
  commands: HOME=/tmp make validate-spec
  container:
    from: src
zz_generated_metadata:
  branch: main
  org: openshift-online
  repo: rosa-trusted-actions
