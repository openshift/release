build_root:
  image_stream_tag:
    name: builder
    namespace: stolostron
    tag: go1.25-linux
images:
  items:
  - additional_architectures:
    - arm64
    dockerfile_path: Dockerfile
    to: fleetshift-server
  - additional_architectures:
    - arm64
    dockerfile_path: Dockerfile.local
    from: fleetshift-server
    to: fleetshift-server-local
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: pr-image-mirror
  capabilities:
  - arm64
  steps:
    dependencies:
      SOURCE_IMAGE_REF: fleetshift-server
    env:
      IMAGE_REPO: fleetshift-server
      REGISTRY_ORG: stolostron
    workflow: fleetshift-ci-image-mirror
- as: pr-image-mirror-local
  capabilities:
  - arm64
  steps:
    dependencies:
      SOURCE_IMAGE_REF: fleetshift-server-local
    env:
      IMAGE_REPO: fleetshift-server-local
      REGISTRY_ORG: stolostron
    workflow: fleetshift-ci-image-mirror
- as: pr-merge-image-mirror
  capabilities:
  - arm64
  postsubmit: true
  steps:
    dependencies:
      SOURCE_IMAGE_REF: fleetshift-server
    env:
      ALSO_TAG_LATEST: "true"
      IMAGE_REPO: fleetshift-server
      REGISTRY_ORG: stolostron
    workflow: fleetshift-ci-image-mirror
- as: pr-merge-image-mirror-local
  capabilities:
  - arm64
  postsubmit: true
  steps:
    dependencies:
      SOURCE_IMAGE_REF: fleetshift-server-local
    env:
      ALSO_TAG_LATEST: "true"
      IMAGE_REPO: fleetshift-server-local
      REGISTRY_ORG: stolostron
    workflow: fleetshift-ci-image-mirror
- as: republish-latest
  capabilities:
  - arm64
  cron: 30 2,8,14,20 * * *
  retry:
    attempts: 3
    interval: 1h
  steps:
    dependencies:
      SOURCE_IMAGE_REF: fleetshift-server
    env:
      IMAGE_REPO: fleetshift-server
      IMAGE_TAG: latest
      REGISTRY_ORG: stolostron
    workflow: fleetshift-ci-image-mirror
- as: republish-local-latest
  capabilities:
  - arm64
  cron: 0 3,9,15,21 * * *
  retry:
    attempts: 3
    interval: 1h
  steps:
    dependencies:
      SOURCE_IMAGE_REF: fleetshift-server-local
    env:
      IMAGE_REPO: fleetshift-server-local
      IMAGE_TAG: latest
      REGISTRY_ORG: stolostron
    workflow: fleetshift-ci-image-mirror
zz_generated_metadata:
  branch: main
  org: fleetshift
  repo: fleetshift-poc
