build_root:
  image_stream_tag:
    name: builder
    namespace: stolostron
    tag: go1.25-linux
images:
  items:
  - additional_architectures:
    - arm64
    dockerfile_path: Dockerfile
    to: fleetshift-server
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: pr-image-mirror
  capabilities:
  - arm64
  steps:
    dependencies:
      SOURCE_IMAGE_REF: fleetshift-server
    env:
      IMAGE_REPO: fleetshift-server
      REGISTRY_ORG: stolostron
    workflow: fleetshift-ci-image-mirror
- as: pr-merge-image-mirror-latest
  capabilities:
  - arm64
  postsubmit: true
  steps:
    dependencies:
      SOURCE_IMAGE_REF: fleetshift-server
    env:
      IMAGE_REPO: fleetshift-server
      IMAGE_TAG: latest
      REGISTRY_ORG: stolostron
    workflow: fleetshift-ci-image-mirror
- as: pr-merge-image-mirror-sha
  capabilities:
  - arm64
  postsubmit: true
  steps:
    dependencies:
      SOURCE_IMAGE_REF: fleetshift-server
    env:
      IMAGE_REPO: fleetshift-server
      REGISTRY_ORG: stolostron
    workflow: fleetshift-ci-image-mirror
zz_generated_metadata:
  branch: main
  org: fleetshift
  repo: fleetshift-poc
