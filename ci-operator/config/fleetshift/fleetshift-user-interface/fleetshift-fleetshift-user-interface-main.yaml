build_root:
  image_stream_tag:
    name: builder
    namespace: stolostron
    tag: nodejs20-linux
images:
  items:
  - additional_architectures:
    - arm64
    dockerfile_path: Dockerfile.web
    to: fleetshift-web
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: pr-image-mirror
  capabilities:
  - arm64
  steps:
    dependencies:
      SOURCE_IMAGE_REF: fleetshift-web
    env:
      IMAGE_REPO: fleetshift-web
      REGISTRY_ORG: stolostron
    workflow: fleetshift-ci-image-mirror
- as: pr-merge-image-mirror
  capabilities:
  - arm64
  postsubmit: true
  steps:
    dependencies:
      SOURCE_IMAGE_REF: fleetshift-web
    env:
      ALSO_TAG_LATEST: "true"
      IMAGE_REPO: fleetshift-web
      REGISTRY_ORG: stolostron
    workflow: fleetshift-ci-image-mirror
- as: republish-latest
  capabilities:
  - arm64
  cron: 0 2,8,14,20 * * *
  retry:
    attempts: 3
    interval: 1h
  steps:
    dependencies:
      SOURCE_IMAGE_REF: fleetshift-web
    env:
      IMAGE_REPO: fleetshift-web
      IMAGE_TAG: latest
      REGISTRY_ORG: stolostron
    workflow: fleetshift-ci-image-mirror
zz_generated_metadata:
  branch: main
  org: fleetshift
  repo: fleetshift-user-interface
