base_images:
  cli:
    name: "4.22"
    namespace: ocp
    tag: cli
  operator-sdk:
    name: "4.22"
    namespace: origin
    tag: operator-sdk
  upi-installer:
    name: "4.22"
    namespace: ocp
    tag: upi-installer
build_root:
  image_stream_tag:
    name: builder
    namespace: ocp
    tag: rhel-9-golang-1.24-openshift-4.22
images:
  items:
  - dockerfile_path: Dockerfile
    to: distributed-tracing-console-plugin
  - dockerfile_path: Dockerfile.test
    to: distributed-tracing-console-plugin-test
  - context_dir: .
    dockerfile_path: tests/Dockerfile
    to: tracing-ui-tests-runner
releases:
  latest:
    candidate:
      product: ocp
      stream: nightly
      version: "4.22"
resources:
  '*':
    limits:
      memory: 8Gi
    requests:
      cpu: 100m
      memory: 1Gi
tests:
- as: lint
  commands: make lint-frontend
  container:
    from: distributed-tracing-console-plugin-test
- as: fips-image-scan
  steps:
    dependencies:
      SCAN_IMAGE: distributed-tracing-console-plugin
    test:
    - ref: fips-check-image-scan
- as: e2e
  steps:
    cluster_profile: azure-observability
    env:
      BASE_DOMAIN: observability.azure.devcluster.openshift.com
    test:
    - ref: distributed-tracing-tests-tracing-ui-upstream
    workflow: cucushift-installer-rehearse-azure-ipi
zz_generated_metadata:
  branch: release-coo-ocp-4.22
  org: openshift
  repo: distributed-tracing-console-plugin
  variant: upstream-amd64-aws
