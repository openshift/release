base_images:
  govulncheck:
    name: govulncheck
    namespace: ci
    tag: latest
build_root:
  from_repository: true
releases:
  initial:
    integration:
      name: "4.21"
      namespace: ocp
  latest:
    integration:
      include_built_images: true
      name: "4.21"
      namespace: ocp
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: govulncheck
  cron: 0 6 * * 1,4
  reporter_config:
    channel: '#tmp-network-edge-alerts'
    job_states_to_report:
    - failure
    - error
    report_template: ':warning: *{{.Spec.Job}}* ended with *{{.Status.State}}*. <{{.Status.URL}}|View
      logs>'
  steps:
    test:
    - as: govulncheck
      commands: GOTOOLCHAIN=auto GOCACHE=$(mktemp -d) GOMODCACHE=$(mktemp -d) govulncheck
        ./...
      from: govulncheck
      resources:
        requests:
          cpu: 100m
          memory: 200Mi
zz_generated_metadata:
  branch: release-4.21
  org: openshift
  repo: cluster-ingress-operator
  variant: periodics
