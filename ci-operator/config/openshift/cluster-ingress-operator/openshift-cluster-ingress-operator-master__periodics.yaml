base_images:
  dev-scripts:
    name: test
    namespace: ocp-kni
    tag: dev-scripts
  govulncheck:
    name: govulncheck
    namespace: ci
    tag: latest
build_root:
  from_repository: true
releases:
  initial:
    candidate:
      product: ocp
      stream: ci
      version: "4.22"
  latest:
    candidate:
      product: ocp
      stream: ci
      version: "4.22"
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: e2e-aws-pre-release-ossm
  capabilities:
  - intranet
  cron: 0 4 * * *
  restrict_network_access: false
  steps:
    cluster_profile: openshift-org-aws
    test:
    - as: test
      cli: latest
      commands: |
        export TOKEN=$(cat /var/run/nid-ossm-token/secrets/konflux-cluster-token)
        export AUTHBREW=$(cat /var/run/nid-ossm-token/secrets/brew-secret)
        export AUTHSTAGE=$(cat /var/run/nid-ossm-token/secrets/stage-secret)
        make test-pre-release-ossm
      credentials:
      - mount_path: /var/run/nid-ossm-token/secrets
        name: secrets
        namespace: test-credentials
      from: src
      resources:
        requests:
          cpu: 100m
    workflow: ipi-aws
- as: govulncheck
  cron: 0 6 * * 1,4
  reporter_config:
    channel: '#tmp-network-edge-alerts'
    job_states_to_report:
    - failure
    - error
    report_template: ':warning: *{{.Spec.Job}}* ended with *{{.Status.State}}*. <{{.Status.URL}}|View
      logs>'
  steps:
    test:
    - as: govulncheck
      commands: GOTOOLCHAIN=auto GOCACHE=$(mktemp -d) GOMODCACHE=$(mktemp -d) govulncheck
        ./...
      from: govulncheck
      resources:
        requests:
          cpu: 100m
          memory: 200Mi
zz_generated_metadata:
  branch: master
  org: openshift
  repo: cluster-ingress-operator
  variant: periodics
