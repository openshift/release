build_root:
  from_repository: true
images:
- dockerfile_path: Dockerfile.ci
  to: cluster-api-actuator-pkg-test
promotion:
  to:
  - additional_images:
      cluster-api-actuator-pkg: src
    excluded_images:
    - cluster-api-actuator-pkg-test
    name: "4.22"
    namespace: ocp
releases:
  initial:
    integration:
      name: "4.22"
      namespace: ocp
  latest:
    integration:
      include_built_images: true
      name: "4.22"
      namespace: ocp
  multi-initial:
    candidate:
      architecture: multi
      product: ocp
      stream: nightly
      version: "4.22"
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: unit
  commands: make unit
  container:
    from: src
- as: lint
  commands: make lint
  container:
    from: src
zz_generated_metadata:
  branch: master
  org: openshift
  repo: cluster-api-actuator-pkg
