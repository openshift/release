base_images:
  openstack-installer:
    name: "5.0"
    namespace: ocp
    tag: openstack-installer
  upi-installer:
    name: "5.0"
    namespace: ocp
    tag: upi-installer
build_root:
  from_repository: true
images:
  items:
  - dockerfile_path: Dockerfile.ci
    to: cluster-api-actuator-pkg-test
releases:
  initial:
    candidate:
      product: ocp
      stream: nightly
      version: "5.0"
  latest:
    candidate:
      product: ocp
      stream: nightly
      version: "5.0"
  multi-initial:
    candidate:
      architecture: multi
      product: ocp
      stream: nightly
      version: "5.0"
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: e2e-aws-operator-periodic
  interval: 72h
  steps:
    cluster_profile: openshift-org-aws
    test:
    - as: test
      cli: latest
      commands: JUNIT_DIR=${ARTIFACT_DIR} make test-e2e-periodic
      from: src
      resources:
        requests:
          cpu: 100m
      timeout: 3h0m0s
    workflow: ipi-aws
- as: e2e-vsphere-operator-periodic
  cron: 40 4 * * 2,4,5
  steps:
    cluster_profile: vsphere-elastic
    test:
    - as: test
      cli: latest
      commands: JUNIT_DIR=${ARTIFACT_DIR} make test-e2e-periodic
      from: src
      resources:
        requests:
          cpu: 100m
      timeout: 3h0m0s
    workflow: openshift-e2e-vsphere
- as: e2e-azure-operator-periodic
  interval: 72h
  steps:
    cluster_profile: openshift-org-azure
    test:
    - as: test
      cli: latest
      commands: JUNIT_DIR=${ARTIFACT_DIR} make test-e2e-periodic
      from: src
      resources:
        requests:
          cpu: 100m
      timeout: 3h0m0s
    workflow: ipi-azure
- as: e2e-gcp-operator-periodic
  interval: 72h
  steps:
    cluster_profile: openshift-org-gcp
    test:
    - as: test
      cli: latest
      commands: JUNIT_DIR=${ARTIFACT_DIR} make test-e2e-periodic
      from: src
      resources:
        requests:
          cpu: 100m
      timeout: 3h0m0s
    workflow: ipi-gcp
- as: e2e-gcp-multi-operator-periodic
  interval: 72h
  steps:
    cluster_profile: openshift-org-gcp
    dependencies:
      OPENSHIFT_INSTALL_RELEASE_IMAGE_OVERRIDE: release:multi-initial
    env:
      ADDITIONAL_WORKER_VM_TYPE: t2a-standard-4
      ADDITIONAL_WORKERS: "1"
      COMPUTE_NODE_REPLICAS: "2"
    test:
    - ref: ipi-install-heterogeneous
    - as: test
      cli: latest
      commands: JUNIT_DIR=${ARTIFACT_DIR} make test-e2e-periodic
      from: src
      resources:
        requests:
          cpu: 100m
      timeout: 3h0m0s
    workflow: ipi-gcp
- as: e2e-openstack-operator-periodic
  minimum_interval: 72h
  steps:
    cluster_profile: openstack-vexxhost
    env:
      USE_RAMFS: "false"
      WORKER_REPLICAS: "0"
    test:
    - as: test
      cli: latest
      commands: JUNIT_DIR=${ARTIFACT_DIR} make test-e2e-periodic
      from: src
      resources:
        requests:
          cpu: 100m
      timeout: 3h0m0s
    workflow: openshift-e2e-openstack-ipi
zz_generated_metadata:
  branch: release-5.0
  org: openshift
  repo: cluster-api-actuator-pkg
  variant: periodics
