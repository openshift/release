build_root:
  from_repository: true
images:
  items:
  - dockerfile_path: Dockerfile.rhel
    to: cluster-version-operator
promotion:
  to:
  - disabled: true
    name: "5.0"
    namespace: ocp
releases:
  initial:
    integration:
      name: "5.0"
      namespace: ocp
  latest:
    integration:
      include_built_images: true
      name: "5.0"
      namespace: ocp
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: e2e-gcp-compact-install
  interval: 168h
  steps:
    cluster_profile: gcp-qe
    dependencies:
      OPENSHIFT_INSTALL_RELEASE_IMAGE_OVERRIDE: registry.build10.ci.openshift.org/ci-ln-llimy2k/release:latest
    workflow: cucushift-installer-rehearse-gcp-ipi-compact
zz_generated_metadata:
  branch: release-5.0
  org: openshift
  repo: cluster-version-operator
  variant: periodics
