base_images:
  openstack-installer:
    name: "4.22"
    namespace: ocp
    tag: openstack-installer
  upi-installer:
    name: "4.14"
    namespace: ocp
    tag: upi-installer
binary_build_commands: GO_COMPLIANCE_INFO=0 make build
build_root:
  image_stream_tag:
    name: release
    namespace: openshift
    tag: rhel-9-release-golang-1.25-openshift-4.22
images:
  items:
  - dockerfile_literal: |
      FROM ubi9-minimal
      RUN rm -rf /etc/yum.repos.d/*
      RUN curl http://base-4-22-rhel9.ocp.svc > /etc/yum.repos.d/base-4-22-rhel9.repo
    to: ubi9-minimal-entitled
  - build_args:
    - name: DNF
      value: microdnf
    dockerfile_path: Dockerfile
    from: ubi9-minimal-entitled
    to: hive
  skip_if_only_changed: ^(?:docs|\.tekton)/|\.md$|^(?:.*/)?(?:\.gitignore|OWNERS|PROJECT|LICENSE)$
releases:
  latest:
    candidate:
      product: ocp
      stream: nightly
      version: "4.22"
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
  unit:
    requests:
      cpu: 1000m
      memory: 4Gi
tests:
- as: e2e-weekly
  cluster_claim:
    architecture: amd64
    as: unused
    cloud: aws
    labels:
      region: us-east-1
    owner: openshift-ci
    product: ocp
    timeout: 1h0m0s
    version: "4.22"
  cron: 5 4 * * 1
  steps:
    test:
    - as: test
      cli: latest
      commands: |
        # Creds for the `ci` user in the cluster-control-plane cluster
        export AWS_ACCESS_KEY_ID=$(cat /tmp/secret/hiveci-aws-creds/AWS_ACCESS_KEY_ID)
        export AWS_SECRET_ACCESS_KEY=$(cat /tmp/secret/hiveci-aws-creds/AWS_SECRET_ACCESS_KEY)
        # Override default location for pull secret
        export PULL_SECRET_FILE=/tmp/secret/pull-secret/.dockerconfigjson
        # Configure a unique cluster name based on timestamp and the PR number.
        # Suffix with -0 to ensure it can't conflict with non-periodics,
        # which suffix with the PR number.
        export CLUSTER_NAME=$(printf "hiveci-%x-0" $(date +%s))
        CLOUD=aws make test-e2e
      credentials:
      - mount_path: /tmp/secret/hiveci-aws-creds
        name: hiveci-aws-creds
        namespace: test-credentials
      - mount_path: /tmp/secret/pull-secret
        name: ci-pull-credentials
        namespace: test-credentials
      dependencies:
      - env: HIVE_IMAGE
        name: hive
      - env: RELEASE_IMAGE
        name: release:latest
      from: src
      grace_period: 15m0s
      resources:
        requests:
          cpu: 100m
    workflow: generic-claim
- as: e2e-pool-weekly
  cluster_claim:
    architecture: amd64
    as: unused
    cloud: aws
    labels:
      region: us-east-1
    owner: openshift-ci
    product: ocp
    timeout: 1h0m0s
    version: "4.22"
  cron: 5 4 * * 2
  steps:
    test:
    - as: test
      cli: latest
      commands: |
        # Creds for the `ci` user in the cluster-control-plane cluster
        export AWS_ACCESS_KEY_ID=$(cat /tmp/secret/hiveci-aws-creds/AWS_ACCESS_KEY_ID)
        export AWS_SECRET_ACCESS_KEY=$(cat /tmp/secret/hiveci-aws-creds/AWS_SECRET_ACCESS_KEY)
        # Override default location for pull secret
        export PULL_SECRET_FILE=/tmp/secret/pull-secret/.dockerconfigjson
        # Configure a unique cluster name based on timestamp and the PR number.
        # Suffix with -0 to ensure it can't conflict with non-periodics,
        # which suffix with the PR number.
        export CLUSTER_NAME=$(printf "hiveci-%x-0" $(date +%s))
        # Disable managed DNS (on by default, and left on for the e2e test)
        export USE_MANAGED_DNS=false
        CLOUD=aws make test-e2e-pool
      credentials:
      - mount_path: /tmp/secret/hiveci-aws-creds
        name: hiveci-aws-creds
        namespace: test-credentials
      - mount_path: /tmp/secret/pull-secret
        name: ci-pull-credentials
        namespace: test-credentials
      dependencies:
      - env: HIVE_IMAGE
        name: hive
      - env: RELEASE_IMAGE
        name: release:latest
      from: src
      grace_period: 15m0s
      resources:
        requests:
          cpu: 100m
    workflow: generic-claim
- as: e2e-gcp-weekly
  cron: 5 4 * * 3
  steps:
    cluster_profile: openshift-org-gcp
    test:
    - as: test
      cli: latest
      commands: |
        export BASE_DOMAIN=$(< "${CLUSTER_PROFILE_DIR}/public_hosted_zone")
        CLOUD=gcp make test-e2e
      dependencies:
      - env: HIVE_IMAGE
        name: hive
      - env: RELEASE_IMAGE
        name: release:latest
      from: src
      resources:
        requests:
          cpu: 100m
    workflow: ipi-gcp
- as: e2e-azure-weekly
  cron: 5 4 * * 4
  steps:
    cluster_profile: openshift-org-azure
    test:
    - as: test
      cli: latest
      commands: |
        export BASE_DOMAIN=$(<"${SHARED_DIR}"/basedomain.txt)
        CLOUD=azure make test-e2e
      dependencies:
      - env: HIVE_IMAGE
        name: hive
      - env: RELEASE_IMAGE
        name: release:latest
      from: src
      resources:
        requests:
          cpu: 100m
    workflow: ipi-azure
- as: e2e-vsphere-weekly
  cron: 5 4 * * 5
  steps:
    cluster_profile: vsphere-elastic
    env:
      NETWORK_TYPE: single-tenant
      VSPHERE_ADDITIONAL_CLUSTER: "true"
    test:
    - as: test
      cli: latest
      commands: |
        source $SHARED_DIR/vsphere_context.sh
        source $SHARED_DIR/govc.sh
        source $SHARED_DIR/additional_cluster.sh

        export CLUSTER_NAME=$ADDITIONAL_CLUSTER_NAME
        export VSPHERE_API_VIP=$ADDITIONAL_CLUSTER_API_VIP
        export VSPHERE_INGRESS_VIP=$ADDITIONAL_CLUSTER_INGRESS_VIP
        export VSPHERE_MACHINE_NETWORK=$(<"${SHARED_DIR}"/machinecidr.txt)
        export BASE_DOMAIN=$(<"${SHARED_DIR}"/basedomain.txt)
        export VSPHERE_INSTALLER_PLATFORM_SPEC_JSON=$(<"${SHARED_DIR}"/platform.json)

        GO_COMPLIANCE_INFO=0 CLOUD=vsphere make test-e2e
      credentials:
      - mount_path: /var/run/vault/vsphere-ibmcloud-ci
        name: vsphere-ibmcloud-ci
        namespace: test-credentials
      dependencies:
      - env: HIVE_IMAGE
        name: hive
      - env: RELEASE_IMAGE
        name: release:latest
      from: src
      resources:
        requests:
          cpu: 100m
    workflow: ipi-vsphere
- as: e2e-openstack-weekly
  cron: 10 23 * * 0
  steps:
    cluster_profile: openstack-vexxhost
    env:
      BASE_DOMAIN: shiftstack.devcluster.openshift.com
      CONFIG_TYPE: minimal
      HIVE_OSP_RESOURCE: "true"
    test:
    - as: test
      cli: latest
      commands: |
        export OS_CLIENT_CONFIG_FILE=${SHARED_DIR}/clouds.yaml
        export API_FLOATING_IP=$(<"${SHARED_DIR}/HIVE_FIP_API")
        export INGRESS_FLOATING_IP=$(<"${SHARED_DIR}/HIVE_FIP_INGRESS")
        export EXTERNAL_NETWORK=$(<"${SHARED_DIR}/OPENSTACK_EXTERNAL_NETWORK")
        export COMPUTE_FLAVOR=$(<"${SHARED_DIR}/OPENSTACK_COMPUTE_FLAVOR")
        export CONTROLPLANE_FLAVOR=$(<"${SHARED_DIR}/OPENSTACK_CONTROLPLANE_FLAVOR")

        GO_COMPLIANCE_INFO=0 CLOUD=openstack make test-e2e
      dependencies:
      - env: HIVE_IMAGE
        name: hive
      - env: RELEASE_IMAGE
        name: release:latest
      from: src
      resources:
        requests:
          cpu: 100m
    workflow: ipi-openstack
zz_generated_metadata:
  branch: master
  org: openshift
  repo: hive
  variant: periodic
