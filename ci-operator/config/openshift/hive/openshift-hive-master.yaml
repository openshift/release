base_images:
  openstack-installer:
    name: "4.21"
    namespace: ocp
    tag: openstack-installer
  upi-installer:
    name: "4.14"
    namespace: ocp
    tag: upi-installer
binary_build_commands: GO_COMPLIANCE_INFO=0 make build
build_root:
  image_stream_tag:
    name: release
    namespace: openshift
    tag: rhel-9-release-golang-1.25-openshift-4.21
images:
  items:
  - dockerfile_literal: |
      FROM ubi9-minimal
      RUN rm -rf /etc/yum.repos.d/*
      RUN curl http://base-4-21-rhel9.ocp.svc > /etc/yum.repos.d/base-4-21-rhel9.repo
    to: ubi9-minimal-entitled
  - build_args:
    - name: DNF
      value: microdnf
    dockerfile_path: Dockerfile
    from: ubi9-minimal-entitled
    to: hive
  - dockerfile_literal: |
      FROM src
      RUN make -C test/ote build
      RUN dnf install -y gzip jq && dnf clean all
      RUN cp /go/src/github.com/openshift/hive/test/ote/bin/hive /usr/bin/openshift-tests-extension
      RUN gzip -f -k /usr/bin/openshift-tests-extension
      WORKDIR /tmp
    from: src
    to: hive-tests
  skip_if_only_changed: ^(?:docs|\.tekton)/|\.md$|^(?:.*/)?(?:\.gitignore|OWNERS|PROJECT|LICENSE)$
promotion:
  to:
  - name: hive-v4.0
    namespace: openshift
releases:
  initial:
    candidate:
      product: ocp
      stream: nightly
      version: "4.21"
  latest:
    candidate:
      product: ocp
      stream: nightly
      version: "4.21"
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
  unit:
    requests:
      cpu: 1000m
      memory: 4Gi
tests:
- as: unit
  commands: GO_COMPLIANCE_INFO=0 make test
  container:
    from: src
  skip_if_only_changed: ^(?:docs|\.tekton)/|\.md$|^(?:.*/)?(?:\.gitignore|.coderabbit.yaml|OWNERS|PROJECT|LICENSE)$
- as: verify
  commands: GO_COMPLIANCE_INFO=0 make verify
  container:
    from: src
  skip_if_only_changed: ^(?:docs|\.tekton)/|\.md$|^(?:.*/)?(?:\.gitignore|.coderabbit.yaml|OWNERS|PROJECT|LICENSE)$
- as: coverage
  commands: |
    export CODECOV_TOKEN=$(cat /tmp/secret/CODECOV_TOKEN)
    GO_COMPLIANCE_INFO=0 make coverage
  container:
    from: src
  run_if_changed: \.go$
  secret:
    mount_path: /tmp/secret
    name: hive-codecov-token
- as: publish-coverage
  commands: |
    export CODECOV_TOKEN=$(cat /tmp/secret/CODECOV_TOKEN)
    GO_COMPLIANCE_INFO=0 make coverage
  container:
    from: src
  postsubmit: true
  secret:
    mount_path: /tmp/secret
    name: hive-codecov-token
- as: security
  skip_if_only_changed: ^(?:docs|\.tekton)/|\.md$|^(?:.*/)?(?:\.gitignore|.coderabbit.yaml|OWNERS|PROJECT|LICENSE)$
  steps:
    env:
      SNYK_CODE_ADDITIONAL_ARGS: -d --severity-threshold=high
      SNYK_DEPS_ADDITIONAL_ARGS: -d
      SNYK_ENABLE_DEPS_SCAN: "true"
    workflow: openshift-ci-security
- as: e2e
  cluster_claim:
    architecture: amd64
    as: unused
    cloud: aws
    labels:
      region: us-east-1
    owner: openshift-ci
    product: ocp
    timeout: 1h0m0s
    version: "4.21"
  skip_if_only_changed: ^(?:docs|\.tekton)/|\.md$|^(?:.*/)?(?:\.gitignore|.coderabbit.yaml|OWNERS|PROJECT|LICENSE)$
  steps:
    test:
    - as: test
      cli: latest
      commands: |
        # Creds for the `ci` user in the cluster-control-plane cluster
        export AWS_ACCESS_KEY_ID=$(cat /tmp/secret/hiveci-aws-creds/AWS_ACCESS_KEY_ID)
        export AWS_SECRET_ACCESS_KEY=$(cat /tmp/secret/hiveci-aws-creds/AWS_SECRET_ACCESS_KEY)
        # Override default location for pull secret
        export PULL_SECRET_FILE=/tmp/secret/pull-secret/.dockerconfigjson
        # Configure a unique cluster name based on timestamp and the PR number.
        # We'll exceed the 21c cluster name cutoff at PR 1Mi or some
        # time in July of 4147, whichever comes first.
        export CLUSTER_NAME=$(printf "hiveci-%x-%x" $(date +%s) $PULL_NUMBER)
        GO_COMPLIANCE_INFO=0 CLOUD=aws make test-e2e
      credentials:
      - mount_path: /tmp/secret/hiveci-aws-creds
        name: hiveci-aws-creds
        namespace: test-credentials
      - mount_path: /tmp/secret/pull-secret
        name: ci-pull-credentials
        namespace: test-credentials
      dependencies:
      - env: HIVE_IMAGE
        name: hive
      - env: RELEASE_IMAGE
        name: release:latest
      from: src
      grace_period: 15m0s
      resources:
        requests:
          cpu: 100m
    workflow: generic-claim
- as: e2e-pool
  cluster_claim:
    architecture: amd64
    as: unused
    cloud: aws
    labels:
      region: us-east-1
    owner: openshift-ci
    product: ocp
    timeout: 1h0m0s
    version: "4.21"
  skip_if_only_changed: ^(?:docs|\.tekton)/|\.md$|^(?:.*/)?(?:\.gitignore|.coderabbit.yaml|OWNERS|PROJECT|LICENSE)$
  steps:
    test:
    - as: test
      cli: latest
      commands: |
        # Creds for the `ci` user in the cluster-control-plane cluster
        export AWS_ACCESS_KEY_ID=$(cat /tmp/secret/hiveci-aws-creds/AWS_ACCESS_KEY_ID)
        export AWS_SECRET_ACCESS_KEY=$(cat /tmp/secret/hiveci-aws-creds/AWS_SECRET_ACCESS_KEY)
        # Override default location for pull secret
        export PULL_SECRET_FILE=/tmp/secret/pull-secret/.dockerconfigjson
        # Configure a unique cluster name based on timestamp and the PR number.
        # We'll exceed the 21c cluster name cutoff at PR 1Mi or some
        # time in July of 4147, whichever comes first.
        export CLUSTER_NAME=$(printf "hiveci-%x-%x" $(date +%s) $PULL_NUMBER)
        # Disable managed DNS (on by default, and left on for the e2e test)
        export USE_MANAGED_DNS=false
        GO_COMPLIANCE_INFO=0 CLOUD=aws make test-e2e-pool
      credentials:
      - mount_path: /tmp/secret/hiveci-aws-creds
        name: hiveci-aws-creds
        namespace: test-credentials
      - mount_path: /tmp/secret/pull-secret
        name: ci-pull-credentials
        namespace: test-credentials
      dependencies:
      - env: HIVE_IMAGE
        name: hive
      - env: RELEASE_IMAGE
        name: release:latest
      from: src
      grace_period: 15m0s
      resources:
        requests:
          cpu: 100m
    workflow: generic-claim
- as: e2e-gcp
  run_if_changed: gcp
  steps:
    cluster_profile: openshift-org-gcp
    test:
    - as: test
      cli: latest
      commands: |
        export BASE_DOMAIN=$(< "${CLUSTER_PROFILE_DIR}/public_hosted_zone")
        GO_COMPLIANCE_INFO=0 CLOUD=gcp make test-e2e
      dependencies:
      - env: HIVE_IMAGE
        name: hive
      - env: RELEASE_IMAGE
        name: release:latest
      from: src
      resources:
        requests:
          cpu: 100m
    workflow: ipi-gcp
- as: e2e-azure
  run_if_changed: azure
  steps:
    cluster_profile: openshift-org-azure
    test:
    - as: test
      cli: latest
      commands: |
        export BASE_DOMAIN=$(<"${SHARED_DIR}"/basedomain.txt)
        GO_COMPLIANCE_INFO=0 CLOUD=azure make test-e2e
      dependencies:
      - env: HIVE_IMAGE
        name: hive
      - env: RELEASE_IMAGE
        name: release:latest
      from: src
      resources:
        requests:
          cpu: 100m
      timeout: 2h30m0s
    workflow: ipi-azure
  timeout: 4h30m0s
- as: e2e-vsphere
  run_if_changed: vsphere
  steps:
    cluster_profile: vsphere-elastic
    env:
      NETWORK_TYPE: single-tenant
      VSPHERE_ADDITIONAL_CLUSTER: "true"
    test:
    - as: test
      cli: latest
      commands: |
        source $SHARED_DIR/vsphere_context.sh
        source $SHARED_DIR/govc.sh
        source $SHARED_DIR/additional_cluster.sh

        export CLUSTER_NAME=$ADDITIONAL_CLUSTER_NAME
        export VSPHERE_API_VIP=$ADDITIONAL_CLUSTER_API_VIP
        export VSPHERE_INGRESS_VIP=$ADDITIONAL_CLUSTER_INGRESS_VIP
        export VSPHERE_MACHINE_NETWORK=$(<"${SHARED_DIR}"/machinecidr.txt)
        export BASE_DOMAIN=$(<"${SHARED_DIR}"/basedomain.txt)
        export VSPHERE_INSTALLER_PLATFORM_SPEC_JSON=$(<"${SHARED_DIR}"/platform.json)

        GO_COMPLIANCE_INFO=0 CLOUD=vsphere make test-e2e
      credentials:
      - mount_path: /var/run/vault/vsphere-ibmcloud-ci
        name: vsphere-ibmcloud-ci
        namespace: test-credentials
      dependencies:
      - env: HIVE_IMAGE
        name: hive
      - env: RELEASE_IMAGE
        name: release:latest
      from: src
      resources:
        requests:
          cpu: 100m
    workflow: ipi-vsphere
- as: e2e-openstack
  run_if_changed: openstack
  steps:
    cluster_profile: openstack-vexxhost
    env:
      BASE_DOMAIN: shiftstack.devcluster.openshift.com
      CONFIG_TYPE: minimal
      HIVE_OSP_RESOURCE: "true"
    test:
    - as: test
      cli: latest
      commands: |
        export OS_CLIENT_CONFIG_FILE=${SHARED_DIR}/clouds.yaml
        export API_FLOATING_IP=$(<"${SHARED_DIR}/HIVE_FIP_API")
        export INGRESS_FLOATING_IP=$(<"${SHARED_DIR}/HIVE_FIP_INGRESS")
        export EXTERNAL_NETWORK=$(<"${SHARED_DIR}/OPENSTACK_EXTERNAL_NETWORK")
        export COMPUTE_FLAVOR=$(<"${SHARED_DIR}/OPENSTACK_COMPUTE_FLAVOR")
        export CONTROLPLANE_FLAVOR=$(<"${SHARED_DIR}/OPENSTACK_CONTROLPLANE_FLAVOR")

        GO_COMPLIANCE_INFO=0 CLOUD=openstack make test-e2e
      dependencies:
      - env: HIVE_IMAGE
        name: hive
      - env: RELEASE_IMAGE
        name: release:latest
      from: src
      resources:
        requests:
          cpu: 100m
    workflow: ipi-openstack
- as: e2e-ote-a
  cluster_claim:
    architecture: amd64
    as: unused
    cloud: aws
    labels:
      region: us-east-1
    owner: openshift-ci
    product: ocp
    timeout: 1h0m0s
    version: "4.20"
  skip_if_only_changed: ^(?:docs|\.tekton)/|\.md$|^(?:.*/)?(?:\.gitignore|.coderabbit.yaml|OWNERS|PROJECT|LICENSE)$
  steps:
    test:
    - as: test
      cli: latest
      commands: |
        export AWS_ACCESS_KEY_ID=$(cat /tmp/secret/hiveci-aws-creds/AWS_ACCESS_KEY_ID)
        export AWS_SECRET_ACCESS_KEY=$(cat /tmp/secret/hiveci-aws-creds/AWS_SECRET_ACCESS_KEY)
        export PULL_SECRET_FILE=/tmp/secret/pull-secret/.dockerconfigjson
        export CLUSTER_NAME=$(printf "hiveci-%x-%x" $(date +%s) $PULL_NUMBER)
        export PLATFORM=aws
        export TEST_SHARD_INDEX=0
        export TEST_TOTAL_SHARDS=8
        /usr/bin/openshift-tests-extension run-suite -c 1 openshift/hive -j ${ARTIFACT_DIR}/junit_results.xml || true
        RESULT_JSON=$(ls ${ARTIFACT_DIR}/extension_test_result_*.json 2>/dev/null | head -1)
        if [[ -n "$RESULT_JSON" && -f "$RESULT_JSON" ]]; then
          jq -r '
            def pass:
              .result == "passed" or
              ((.output // "") | contains("SUCCESS! -- 1 Passed"));
            "<?xml version=\"1.0\" encoding=\"UTF-8\"?>",
            "<testsuite tests=\"\(length)\" failures=\"\([.[] | select(pass | not)] | length)\">",
            (.[] |
              if pass then
                "<testcase name=\"\(.name | @html)\"/>"
              else
                "<testcase name=\"\(.name | @html)\"><failure><![CDATA[\((.error // "")[0:500])]]></failure></testcase>"
              end
            ),
            "</testsuite>"
          ' "$RESULT_JSON" > "${ARTIFACT_DIR}/junit_results.xml"
          FAIL_COUNT=$(jq '
            def pass:
              .result == "passed" or
              ((.output // "") | contains("SUCCESS! -- 1 Passed"));
            [.[] | select(pass | not)] | length
          ' "$RESULT_JSON")
          TOTAL=$(jq length "$RESULT_JSON")
          echo "Results: $((TOTAL - FAIL_COUNT)) passed, ${FAIL_COUNT} failed"
          [[ $FAIL_COUNT -gt 0 ]] && exit 1
        fi
      credentials:
      - mount_path: /tmp/secret/hiveci-aws-creds
        name: hiveci-aws-creds
        namespace: test-credentials
      - mount_path: /tmp/secret/pull-secret
        name: ci-pull-credentials
        namespace: test-credentials
      dependencies:
      - env: HIVE_IMAGE
        name: hive
      - env: RELEASE_IMAGE
        name: release:latest
      from: hive-tests
      grace_period: 15m0s
      resources:
        requests:
          cpu: 100m
      timeout: 7h30m0s
    workflow: generic-claim
  timeout: 8h0m0s
