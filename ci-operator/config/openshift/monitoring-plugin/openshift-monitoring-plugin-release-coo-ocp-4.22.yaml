base_images:
  hypershift-operator:
    name: hypershift-operator
    namespace: hypershift
    tag: latest
build_root:
  from_repository: true
images:
  items:
  - dockerfile_path: Dockerfile
    to: monitoring-plugin
  - dockerfile_path: Dockerfile.test
    to: monitoring-plugin-test
  - dockerfile_path: Dockerfile.mcp
    to: monitoring-console-plugin
  - context_dir: .
    dockerfile_path: web/cypress/Dockerfile
    to: monitoring-ui-tests-runner
releases:
  initial:
    integration:
      name: "4.22"
      namespace: ocp
  latest:
    integration:
      include_built_images: true
      name: "4.22"
      namespace: ocp
resources:
  '*':
    limits:
      memory: 16Gi
    requests:
      cpu: 1000m
      memory: 16Gi
tests:
- as: lint
  commands: |
    make lint-frontend
  container:
    from: monitoring-plugin-test
- as: e2e-hypershift-conformance
  optional: true
  steps:
    cluster_profile: hypershift-aws
    workflow: hypershift-aws-conformance
- as: verify-deps
  steps:
    env:
      CHECK_MOD_LIST: "false"
    test:
    - ref: go-verify-deps
- always_run: false
  as: e2e-monitoring
  optional: true
  reporter_config:
    channel: '#observability-ui-qe'
    job_states_to_report:
    - success
    - failure
    - error
    report_template: '{{if eq .Status.State "success"}} :rainbow: Job *{{.Spec.Job}}*
      ended with *{{.Status.State}}*. <{{.Status.URL}}|View logs> :rainbow: {{else}}
      :volcano: Job *{{.Spec.Job}}* ended with *{{.Status.State}}*. <{{.Status.URL}}|View
      logs> :volcano: {{end}}'
  steps:
    cluster_profile: openshift-org-aws
    test:
    - ref: monitoring-plugin-tests-monitoring-ui
    workflow: ipi-aws
- always_run: false
  as: e2e-coo
  optional: true
  reporter_config:
    channel: '#observability-ui-qe'
