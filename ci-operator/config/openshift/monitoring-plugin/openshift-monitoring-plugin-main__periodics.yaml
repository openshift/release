base_images:
  observability-bundle:
    name: observability-bundle
    namespace: ci
    tag: latest
  operator-sdk:
    name: "4.18"
    namespace: origin
    tag: operator-sdk
build_root:
  from_repository: true
images:
  items:
  - dockerfile_path: Dockerfile
    to: monitoring-plugin
  - dockerfile_path: Dockerfile.mcp
    to: monitoring-console-plugin
  - dockerfile_path: Dockerfile.test
    to: monitoring-plugin-test
  - context_dir: .
    dockerfile_path: web/cypress/Dockerfile
    to: monitoring-ui-tests-runner
releases:
  initial:
    integration:
      name: "4.22"
      namespace: ocp
  latest:
    integration:
      include_built_images: true
      name: "4.22"
      namespace: ocp
resources:
  '*':
    limits:
      memory: 16Gi
    requests:
      cpu: 1000m
      memory: 16Gi
tests:
- as: e2e-monitoring
  cron: 0 5 * * *
  reporter_config:
    channel: '#observability-ui-qe'
    job_states_to_report:
    - success
    - failure
    - error
    report_template: '{{if eq .Status.State "success"}} :rainbow: Job *{{.Spec.Job}}*
      ended with *{{.Status.State}}*. <{{.Status.URL}}|View logs> :rainbow: {{else}}
      :volcano: Job *{{.Spec.Job}}* ended with *{{.Status.State}}*. <{{.Status.URL}}|View
      logs> :volcano: {{end}}'
  steps:
    cluster_profile: openshift-org-aws
    test:
    - ref: monitoring-plugin-tests-monitoring-ui-ci-bundle
    workflow: ipi-aws
- as: e2e-monitoring-dev
  cron: 0 5 * * *
  reporter_config:
    channel: '#observability-ui-qe'
    job_states_to_report:
    - success
    - failure
    - error
    report_template: '{{if eq .Status.State "success"}} :rainbow: Job *{{.Spec.Job}}*
      ended with *{{.Status.State}}*. <{{.Status.URL}}|View logs> :rainbow: {{else}}
      :volcano: Job *{{.Spec.Job}}* ended with *{{.Status.State}}*. <{{.Status.URL}}|View
      logs> :volcano: {{end}}'
  steps:
    cluster_profile: openshift-org-aws
    test:
    - ref: monitoring-plugin-tests-monitoring-dev-ui-ci-bundle
    workflow: ipi-aws
- as: e2e-coo
  cron: 0 5 * * *
  reporter_config:
    channel: '#observability-ui-qe'
    job_states_to_report:
    - success
    - failure
    - error
    report_template: '{{if eq .Status.State "success"}} :rainbow: Job *{{.Spec.Job}}*
      ended with *{{.Status.State}}*. <{{.Status.URL}}|View logs> :rainbow: {{else}}
      :volcano: Job *{{.Spec.Job}}* ended with *{{.Status.State}}*. <{{.Status.URL}}|View
      logs> :volcano: {{end}}'
  steps:
    cluster_profile: openshift-org-aws
    test:
    - ref: monitoring-plugin-tests-coo-ui-ci-bundle
    workflow: ipi-aws
- as: e2e-incidents
  cron: 0 5 * * *
  reporter_config:
    channel: '#observability-ui-qe'
    job_states_to_report:
    - success
    - failure
    - error
    report_template: '{{if eq .Status.State "success"}} :rainbow: Job *{{.Spec.Job}}*
      ended with *{{.Status.State}}*. <{{.Status.URL}}|View logs> :rainbow: {{else}}
      :volcano: Job *{{.Spec.Job}}* ended with *{{.Status.State}}*. <{{.Status.URL}}|View
      logs> :volcano: {{end}}'
  steps:
    cluster_profile: openshift-org-aws
    env:
      CYPRESS_SKIP_COO_INSTALL: "true"
    test:
    - as: install-coo-bundle
      cli: latest
      commands: |
        NAMESPACE="openshift-cluster-observability-operator"
        oc create namespace "${NAMESPACE}" || true
        oc label namespace "${NAMESPACE}" openshift.io/cluster-monitoring=true --overwrite
        operator-sdk run bundle \
          --timeout=20m \
          --install-mode=AllNamespaces \
          --namespace "${NAMESPACE}" \
          --verbose \
          "${OO_BUNDLE}"
      dependencies:
      - env: OO_BUNDLE
        name: observability-bundle
      from: operator-sdk
      resources:
        requests:
          cpu: 100m
          memory: 400Mi
    - ref: monitoring-plugin-tests-incidents-ui-ci-bundle
    workflow: ipi-aws
- as: e2e-virtualization
