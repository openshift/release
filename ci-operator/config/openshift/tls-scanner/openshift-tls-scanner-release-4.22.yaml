base_images:
  base:
    name: "4.22"
    namespace: ocp
    tag: base-rhel9
  hypershift-operator:
    name: hypershift-operator
    namespace: hypershift
    tag: latest
  hypershift-tests:
    name: hypershift-tests
    namespace: hypershift
    tag: latest
  ocp_builder_rhel-9-golang-1.25-openshift-4.22:
    name: builder
    namespace: ocp
    tag: rhel-9-golang-1.25-openshift-4.22
build_root:
  image_stream_tag:
    name: builder
    namespace: ocp
    tag: rhel-9-golang-1.25-openshift-4.22
images:
  items:
  - dockerfile_path: Dockerfile
    from: base
    inputs:
      ocp_builder_rhel-9-golang-1.25-openshift-4.22: {}
    to: tls-scanner-tool
promotion:
  to:
  - name: "4.22"
    namespace: ocp
releases:
  initial:
    integration:
      name: "4.22"
      namespace: ocp
  latest:
    integration:
      include_built_images: true
      name: "4.22"
      namespace: ocp
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
  tls-scanner-run:
    limits:
      cpu: "4"
      memory: 4Gi
    requests:
      cpu: "4"
      memory: 4Gi
tests:
- as: unit
  commands: make test
  container:
    from: src
- as: default-tls
  optional: true
  steps:
    cluster_profile: openshift-org-aws
    env:
      COMPUTE_NODE_TYPE: m5.4xlarge
    test:
    - ref: tls-scanner-run
    workflow: ipi-aws
- as: tls13-conformance
  optional: true
  steps:
    cluster_profile: openshift-org-aws
    env:
      COMPUTE_NODE_TYPE: m5.4xlarge
    test:
    - ref: tls-scanner-run
    - ref: openshift-e2e-test
    workflow: openshift-e2e-aws-ovn-tls-13
- always_run: false
  as: tls-observed-config
  optional: true
  steps:
    cluster_profile: openshift-org-aws
    env:
      COMPUTE_NODE_TYPE: m5.4xlarge
      TEST_SUITE: openshift/tls-observed-config
    test:
    - ref: openshift-e2e-test
    workflow: ipi-aws
- always_run: false
  as: tls-observed-config-hypershift
  optional: true
  steps:
    cluster_profile: hypershift-aws
    env:
      TEST_SUITE: openshift/tls-observed-config
    workflow: hypershift-aws-conformance
- as: periodic-default-tls
  interval: 72h
  steps:
    cluster_profile: openshift-org-aws
    env:
      COMPUTE_NODE_TYPE: m5.4xlarge
    test:
    - ref: tls-scanner-run
    workflow: ipi-aws
- as: periodic-tls13-conformance
  interval: 72h
  steps:
    cluster_profile: openshift-org-aws
    env:
      COMPUTE_NODE_TYPE: m5.4xlarge
    test:
    - ref: tls-scanner-run
    - ref: openshift-e2e-test
    workflow: openshift-e2e-aws-ovn-tls-13
- as: periodic-tls-observed-config
  interval: 72h
  steps:
    cluster_profile: openshift-org-aws
    env:
      COMPUTE_NODE_TYPE: m5.4xlarge
      TEST_SUITE: openshift/tls-observed-config
    test:
    - ref: openshift-e2e-test
    workflow: ipi-aws
- as: periodic-tls-observed-config-hypershift
  interval: 72h
  steps:
    cluster_profile: hypershift-aws
    env:
      TEST_SUITE: openshift/tls-observed-config
    workflow: hypershift-aws-conformance
zz_generated_metadata:
  branch: release-4.22
  org: openshift
  repo: tls-scanner
