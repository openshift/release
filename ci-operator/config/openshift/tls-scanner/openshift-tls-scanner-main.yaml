    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: run-scanner-on-cluster
  cluster_claim:
    architecture: amd64
    cloud: aws
    owner: openshift-ci
    product: ocp
    timeout: 5h0m0s
    version: "4.16"
  steps:
    test:
    - as: run-scanner
      cli: latest
      commands: "set -o nounset\nset -o errexit\nset -o pipefail\n\n# 1. Setup environment
        variables for the deployment script\nexport SCANNER_IMAGE=\"${PULL_SPEC_TLS_SCANNER_TOOL}\"\nexport
        NAMESPACE=tls-scanner-test\n\n# Manually apply nftables rules to all nodes
        to allow traffic on scanner ports\n# This is necessary because we are using
        a pre-provisioned cluster (cluster_claim)\n# and standard provision-time firewall
        overrides (EXTRA_NFTABLES_MASTER_FILE) do not apply.\necho \"--- Applying
        firewall rules to nodes ---\"\n# Get all nodes (masters and workers)\nNODES=$(oc
        get nodes -o name)\nfor node in $NODES; do\n  echo \"Updating firewall on
        $node...\"\n  # Use oc debug to run commands on the node host\n  # We try
        both nft and iptables to cover different OS versions (RHEL8 vs RHEL9)\n  oc
        debug \"$node\" -- image=image-registry.openshift-image-registry.svc:5000/openshift/tools:latest
        -- chroot /host bash -c \"\n    echo 'Applying rules...'\n    # Ports: 8443,
        2379, 10300, 10901, 29108 (TCP/UDP)\n    ports=(8443 2379 10300 10901 29108)\n
        \   for port in \\\"\\${ports[@]}\\\"; do\n        # Try nftables (RHEL9+)\n
        \       if command -v nft >/dev/null 2>&1; then\n            nft add rule
        inet filter input tcp dport \\$port accept || true\n            nft add rule
        inet filter input udp dport \\$port accept || true\n        fi\n        #
        Try iptables (RHEL8/Legacy) - using -I to insert at top\n        if command
        -v iptables >/dev/null 2>&1; then\n            iptables -I INPUT -p tcp --dport
        \\$port -j ACCEPT || true\n            iptables -I INPUT -p udp --dport \\$port
        -j ACCEPT || true\n        fi\n    done\n    echo 'Rules applied.'\n  \" 2>/dev/null
        || echo \"Failed to update $node\"\ndone\necho \"--- Firewall update complete
        ---\"\n\noc create namespace \"${NAMESPACE}\"\n\n# Use a trap to ensure cleanup
        happens even if there are errors.\ntrap './deploy.sh cleanup' EXIT\n\n# 2.
        Deploy the scanner Job to the ephemeral cluster\n./deploy.sh deploy\n\n# 3.
        Add immediate debugging to check the state of the Job right after creation.\necho
        \"--- Checking Job status immediately after deployment ---\"\nsleep 5 # Give
        the controllers a moment to react.\noc describe job \"tls-scanner-job\" -n
        \"${NAMESPACE}\" || echo \"Job description not available.\"\necho \"--- Checking
        for events in the namespace ---\"\noc get events -n \"${NAMESPACE}\" --sort-by='.metadata.creationTimestamp'\necho
        \"--- End of immediate debug ---\"\n\n# Start a background monitor to log
        status every 15 minutes\n(\n  while true; do\n    sleep 900\n    echo \"---
        Monitor [$(date)] ---\"\n    echo \"Job Status:\"\n    oc get job \"tls-scanner-job\"
        -n \"${NAMESPACE}\" -o wide || echo \"Job not found\"\n    echo \"Pod Status:\"\n
        \   oc get pods -n \"${NAMESPACE}\" -l job-name=tls-scanner-job -o wide ||
        echo \"No pods found\"\n    echo \"-------------------------\"\n  done\n)
        &\nMONITOR_PID=$!\n\n# 4. Stream logs and wait for completion\necho \"Waiting
        for tls-scanner-job to complete in namespace ${NAMESPACE}...\"\n\n# Get the
        pod name (retry a few times if not immediately available)\nfor i in {1..5};
        do\n  POD_NAME=$(oc get pods -n \"${NAMESPACE}\" -l job-name=tls-scanner-job
        -o jsonpath='{.items[0].metadata.name}')\n  if [ -n \"${POD_NAME}\" ]; then\n
        \   break\n  fi\n  sleep 2\ndone\n\nif [ -z \"${POD_NAME}\" ]; then\n  echo
        \"Error: Could not find a pod for the job.\"\n  oc describe job \"tls-scanner-job\"
        -n \"${NAMESPACE}\"\n  exit 1\nfi\n\necho \"Found pod: ${POD_NAME}\"\n\n#
        Describe the pod immediately to catch early issues\necho \"--- Describing
        scanner pod for more details ---\"\noc describe pod \"${POD_NAME}\" -n \"${NAMESPACE}\"\necho
        \"--- End of pod description ---\"\n\n# Wait for pod to actually start running
        (not just exist)\necho \"Waiting for pod to start running...\"\nPOD_RUNNING=false\nfor
        i in {1..60}; do  # Wait up to 10 minutes for pod to start\n  POD_PHASE=$(oc
        get pod \"${POD_NAME}\" -n \"${NAMESPACE}\" -o jsonpath='{.status.phase}'
        2>/dev/null || echo \"Unknown\")\n  if [ \"$POD_PHASE\" = \"Running\" ]; then\n
        \   echo \"Pod is now running.\"\n    POD_RUNNING=true\n    break\n  elif
        [ \"$POD_PHASE\" = \"Failed\" ]; then\n    echo \"ERROR: Pod failed. Phase:
        $POD_PHASE\"\n    echo \"=== Container Logs (current) ===\"\n    oc logs \"${POD_NAME}\"
        -n \"${NAMESPACE}\" --all-containers=true 2>&1 || echo \"No current logs available\"\n
        \   echo \"=== Container Logs (previous/terminated) ===\"\n    oc logs \"${POD_NAME}\"
        -n \"${NAMESPACE}\" --all-containers=true --previous 2>&1 || echo \"No previous
        logs available\"\n    echo \"=== End Container Logs ===\"\n    echo \"===
        Pod Description ===\"\n    oc describe pod \"${POD_NAME}\" -n \"${NAMESPACE}\"\n
        \   echo \"=== Namespace Events ===\"\n    oc get events -n \"${NAMESPACE}\"
        --sort-by='.metadata.creationTimestamp'\n    kill $MONITOR_PID || true\n    exit
        1\n  elif [ \"$POD_PHASE\" = \"Unknown\" ]; then\n    echo \"ERROR: Pod phase
        is Unknown\"\n    oc describe pod \"${POD_NAME}\" -n \"${NAMESPACE}\"\n    oc
        get events -n \"${NAMESPACE}\" --sort-by='.metadata.creationTimestamp'\n    kill
        $MONITOR_PID || true\n    exit 1\n  fi\n  echo \"Pod status: $POD_PHASE. Waiting...
        ($i/60)\"\n  sleep 10\ndone\n\nif [ \"$POD_RUNNING\" = \"false\" ]; then\n
        \ echo \"ERROR: Pod did not start running within 10 minutes\"\n  echo \"===
        Final Pod Status ===\"\n  oc get pod \"${POD_NAME}\" -n \"${NAMESPACE}\" -o
        yaml\n  echo \"=== Pod Description ===\"\n  oc describe pod \"${POD_NAME}\"
        -n \"${NAMESPACE}\"\n  echo \"=== Namespace Events ===\"\n  oc get events
        -n \"${NAMESPACE}\" --sort-by='.metadata.creationTimestamp'\n  kill $MONITOR_PID
        || true\n  exit 1\nfi\n\n# Start streaming logs immediately in the background.\n#
        We use a loop to retry 'oc logs' if it fails initially (e.g. container creating)\necho
        \"--- Start of Scanner Logs ---\"\n(\n  retries=0\n  while [ $retries -lt
        20 ]; do\n    if oc logs -f \"pod/${POD_NAME}\" -n \"${NAMESPACE}\"; then\n
        \     # If oc logs returns 0, it means it streamed successfully and finished.\n
        \     exit 0\n    else\n      # If it returns non-zero, it failed to attach
        or stream.\n      echo \"Log streaming interrupted or failed to start. Retrying
        in 10s...\"\n      sleep 10\n      retries=$((retries+1))\n    fi\n  done\n
        \ echo \"Gave up streaming logs after multiple retries.\"\n) &\nLOG_PID=$!\n\n#
        Monitor logs for completion signal \"Pausing for log collection...\" to trigger
        artifact copy\n# This ensures we copy artifacts while the pod is still running
        (during its 120s sleep)\necho \"Monitoring logs for scanner completion...\"\nSCANNER_ARTIFACT_DIR=\"${ARTIFACT_DIR}/tls-scanner\"\nmkdir
        -p \"${SCANNER_ARTIFACT_DIR}\"\n\nstart_wait=$(date +%s)\nwhile true; do\n
        \   current_time=$(date +%s)\n    if [ $((current_time - start_wait)) -gt
        12600 ]; then # 3.5h timeout\n        echo \"Timeout waiting for scanner completion.\"\n
        \       exit 1\n    fi\n\n    # Check for the specific log message indicating
        scanner finished\n    if oc logs \"${POD_NAME}\" -n \"${NAMESPACE}\" 2>&1
        | grep -q \"Pausing for log collection\"; then\n         echo \"Scanner finished
        (detected via logs). Copying artifacts...\"\n         \n         # Try to
        copy artifacts\n         if oc cp \"${NAMESPACE}/${POD_NAME}:/artifacts/.\"
        \"${SCANNER_ARTIFACT_DIR}/\"; then\n            echo \"Artifacts copied successfully.\"\n
        \        else\n            echo \"Warning: Failed to copy artifacts despite
        scanner being in pause mode.\"\n         fi\n         break\n    fi\n\n    #
        Check if job failed\n    if oc get job \"tls-scanner-job\" -n \"${NAMESPACE}\"
        -o jsonpath='{.status.conditions[?(@.type==\"Failed\")].status}' | grep -q
        \"True\"; then\n         echo \"Job failed.\"\n         exit 1\n    fi\n    \n
        \   # Check if job completed (we might have missed the window)\n    if oc
        get job \"tls-scanner-job\" -n \"${NAMESPACE}\" -o jsonpath='{.status.conditions[?(@.type==\"Complete\")].status}'
        | grep -q \"True\"; then\n         echo \"Job completed before we could detect
        pause message.\"\n         break\n    fi\n\n    sleep 10\ndone\n\n# Wait for
        the job to complete (it should be finishing soon if not already)\nif ! oc
        wait --for=condition=complete \"job/tls-scanner-job\" -n \"${NAMESPACE}\"
        --timeout=3h30m; then\n  echo \"Job did not complete in time (3h30m timeout).\"\n
        \ echo \"--- End of Scanner Logs (Timeout) ---\"\n  \n  echo \"--- Debugging
        Timeout ---\"\n  echo \"1. Describing Job:\"\n  oc describe job \"tls-scanner-job\"
        -n \"${NAMESPACE}\"\n  \n  echo \"2. Listing all Pods for the Job:\"\n  oc
        get pods -n \"${NAMESPACE}\" -l job-name=tls-scanner-job -o wide\n  \n  echo
        \"3. Describing Current Pods:\"\n  # Describe all pods currently associated
        with the job\n  oc describe pods -n \"${NAMESPACE}\" -l job-name=tls-scanner-job\n\n
        \ echo \"4. Namespace Events:\"\n  oc get events -n \"${NAMESPACE}\" --sort-by='.metadata.creationTimestamp'\n
        \ \n  echo \"--- End Debugging Timeout ---\"\n\n  # Kill the log streamer
        and monitor\n  kill $LOG_PID || true\n  kill $MONITOR_PID || true\n  exit
        1\nfi\n\necho \"Job completed successfully.\"\n\n# Wait for the log streamer
        to finish (it should exit when the pod terminates)\nwait $LOG_PID || true\n#
        Kill monitor\nkill $MONITOR_PID || true\necho \"--- End of Scanner Logs ---\"\n\necho
        \"Scan complete. Artifacts collected in ${SCANNER_ARTIFACT_DIR}.\"\n# The
        'trap' will execute ./deploy.sh cleanup on exit."
      dependencies:
      - env: PULL_SPEC_TLS_SCANNER_TOOL
        name: tls-scanner-tool
      from: src
      grace_period: 5m0s
      resources:
        requests:
          cpu: 100m
      timeout: 4h0m0s
    workflow: generic-claim
