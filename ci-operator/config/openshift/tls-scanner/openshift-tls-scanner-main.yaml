base_images:
  base:
    name: "5.0"
    namespace: ocp
    tag: base-rhel9
  ocp_builder_rhel-9-golang-1.25-openshift-4.22:
    name: builder
    namespace: ocp
    tag: rhel-9-golang-1.25-openshift-4.22
build_root:
  image_stream_tag:
    name: builder
    namespace: ocp
    tag: rhel-9-golang-1.25-openshift-4.22
images:
  items:
  - dockerfile_path: Dockerfile
    from: base
    inputs:
      ocp_builder_rhel-9-golang-1.25-openshift-4.22: {}
    to: tls-scanner-tool
promotion:
  to:
  - name: tls-scanner
    namespace: tls-scanner
releases:
  initial:
    integration:
      name: "5.0"
      namespace: ocp
  latest:
    integration:
      include_built_images: true
      name: "5.0"
      namespace: ocp
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
  tls-scanner-run:
    limits:
      cpu: "4"
      memory: 4Gi
    requests:
      cpu: "4"
      memory: 4Gi
tests:
- as: unit
  commands: make test
  container:
    from: src
- as: smoke-tls
  cluster_claim:
    architecture: amd64
    cloud: aws
    owner: openshift-ci
    product: ocp
    timeout: 1h0m0s
    version: "4.22"
  optional: true
  steps:
    env:
      PQC_CHECK: "true"
      SCAN_LIMIT_IPS: "10"
      SCANNER_CPU: "1"
      SCANNER_MEMORY: 1Gi
    test:
    - ref: tls-scanner-run
    workflow: generic-claim
- as: periodic-default-tls
  interval: 72h
  reporter_config:
    channel: '#forum-case'
    job_states_to_report:
    - success
    - failure
    - error
    report_template: '{{if eq .Status.State "success"}} :white_check_mark: Job *{{.Spec.Job}}*
      ended with *{{.Status.State}}*. <{{.Status.URL}}|View logs> {{else}} :warning:
      Job *{{.Spec.Job}}* ended with *{{.Status.State}}*. <{{.Status.URL}}|View logs>
      {{end}}'
  steps:
    cluster_profile: openshift-org-aws
    env:
      COMPUTE_NODE_TYPE: m5.4xlarge
    test:
    - ref: tls-scanner-run
    workflow: ipi-aws
- as: periodic-pqc-readiness
  interval: 72h
  reporter_config:
    channel: '#forum-case'
    job_states_to_report:
    - success
    - failure
    - error
    report_template: '{{if eq .Status.State "success"}} :white_check_mark: Job *{{.Spec.Job}}*
      ended with *{{.Status.State}}*. <{{.Status.URL}}|View logs> {{else}} :warning:
      Job *{{.Spec.Job}}* ended with *{{.Status.State}}*. <{{.Status.URL}}|View logs>
      {{end}}'
  steps:
    cluster_profile: openshift-org-aws
    env:
      COMPUTE_NODE_TYPE: m5.4xlarge
      PQC_CHECK: "true"
    test:
    - ref: tls-scanner-run
    workflow: openshift-e2e-aws-ovn-tls-13
- as: periodic-tls13-adherence
  interval: 72h
  reporter_config:
    channel: '#forum-case'
    job_states_to_report:
    - success
    - failure
    - error
    report_template: '{{if eq .Status.State "success"}} :white_check_mark: Job *{{.Spec.Job}}*
      ended with *{{.Status.State}}*. <{{.Status.URL}}|View logs> {{else}} :warning:
      Job *{{.Spec.Job}}* ended with *{{.Status.State}}*. <{{.Status.URL}}|View logs>
      {{end}}'
  steps:
    cluster_profile: openshift-org-aws
    env:
      COMPUTE_NODE_TYPE: m5.4xlarge
      PQC_CHECK: "false"
      TLS_13_ENABLE_TLS_ADHERENCE: "true"
      TLS_13_TLS_ADHERENCE_POLICY: StrictAllComponents
    test:
    - ref: tls-scanner-run
    workflow: openshift-e2e-aws-ovn-tls-13
zz_generated_metadata:
  branch: main
  org: openshift
  repo: tls-scanner
