base_images:
  base-rhel9:
    name: "4.18"
    namespace: ocp
    tag: base-rhel9
  cli-operator-sdk:
    name: cli-operator-sdk
    namespace: ocp
    tag: v1.30.0
  ocp_builder_rhel-9-golang-1.23-openshift-4.19:
    name: builder
    namespace: ocp
    tag: rhel-9-golang-1.23-openshift-4.19
  operator-sdk:
    name: "4.18"
    namespace: origin
    tag: operator-sdk
binary_build_commands: make build --warn-undefined-variables
build_root:
  from_repository: true
images:
- dockerfile_path: images/ci/Dockerfile
  from: base-rhel9
  inputs:
    ocp_builder_rhel-9-golang-1.23-openshift-4.19:
      as:
      - registry.ci.openshift.org/ocp/builder:rhel-9-golang-1.23-openshift-4.19
  to: cert-manager-operator
- dockerfile_path: images/ci/operand.Dockerfile
  from: base-rhel9
  inputs:
    ocp_builder_rhel-9-golang-1.23-openshift-4.19:
      as:
      - registry.ci.openshift.org/ocp/builder:rhel-9-golang-1.23-openshift-4.19
  to: cert-manager
operator:
  bundles:
  - as: cert-manager-operator-bundle
    dockerfile_path: bundle.Dockerfile
    skip_building_index: true
  substitutions:
  - pullspec: openshift.io/cert-manager-operator:latest
    with: pipeline:cert-manager-operator
  - pullspec: quay.io/jetstack/cert-manager-controller:latest
    with: pipeline:cert-manager
  - pullspec: quay.io/jetstack/cert-manager-webhook:latest
    with: pipeline:cert-manager
  - pullspec: quay.io/jetstack/cert-manager-cainjector:latest
    with: pipeline:cert-manager
releases:
  initial:
    integration:
      name: "4.18"
      namespace: ocp
  latest:
    integration:
      include_built_images: true
      name: "4.18"
      namespace: ocp
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: verify
  commands: |
    make verify -k --warn-undefined-variables
  container:
    from: src
- as: verify-deps
  commands: |
    make verify-deps -k --warn-undefined-variables
  container:
    from: src
- as: unit
  commands: |
    make test --warn-undefined-variables
  container:
    from: src
- as: fips-image-scan-operator
  steps:
    dependencies:
      SCAN_IMAGE: cert-manager-operator
    test:
    - ref: fips-check-image-scan
- as: fips-image-scan-cert-manager
  steps:
    dependencies:
      SCAN_IMAGE: cert-manager
    test:
    - ref: fips-check-image-scan
- as: e2e-operator
  steps:
    cluster_profile: aws-2
    dependencies:
      OO_BUNDLE: cert-manager-operator-bundle
    env:
      FIPS_ENABLED: "true"
      OO_INSTALL_MODE: AllNamespaces
      OO_INSTALL_NAMESPACE: cert-manager-operator
      OO_SECURITY_CONTEXT: restricted
    test:
    - as: install
      cli: latest
      commands: |
        oc -n cert-manager-operator rollout status deployment cert-manager-operator-controller-manager
      from: src
      resources:
        requests:
          cpu: 100m
    - ref: fips-check-fips-or-die
    - as: test
      cli: latest
      commands: |
        E2E_GINKGO_LABEL_FILTER='"Platform: isSubsetOf {AWS} && !TechPreview"' make test-e2e
      from: src
      resources:
        requests:
          cpu: 100m
    workflow: optional-operators-ci-operator-sdk-aws
- as: e2e-operator-tech-preview
  optional: true
  run_if_changed: ^(api/.*|pkg/operator/setup_manager\.go|pkg/operator/starter\.go|pkg/controller/.*|bindata/istio-csr|test/e2e/.*|Makefile)$
  steps:
    cluster_profile: aws-2
    dependencies:
      OO_BUNDLE: cert-manager-operator-bundle
    env:
      FIPS_ENABLED: "true"
      OO_INSTALL_MODE: AllNamespaces
      OO_INSTALL_NAMESPACE: cert-manager-operator
      OO_SECURITY_CONTEXT: restricted
    test:
    - ref: fips-check-fips-or-die
    - as: test
      cli: latest
      commands: make test-e2e
      from: src
      resources:
        requests:
          cpu: 100m
    workflow: optional-operators-ci-operator-sdk-aws
- as: e2e-operator-upgrade
  optional: true
  steps:
    cluster_profile: aws-2
    test:
    - as: install
      cli: latest
      commands: |
        # operator-sdk seemingly doesn't honor the REGISTRY_AUTH_FILE env var, workaround by using DOCKER_CONFIG
        export REGISTRY_AUTH_FILE=/var/run/secrets/ci.openshift.io/cluster-profile/pull-secret
        export DOCKER_CONFIG=/tmp/.docker && mkdir -p $DOCKER_CONFIG && cp $REGISTRY_AUTH_FILE $DOCKER_CONFIG/config.json

        oc create namespace cert-manager-operator
        operator-sdk run bundle --security-context-config=restricted --verbose -n cert-manager-operator quay.io/swghosh/cert-manager-operator:v1.15.1-swg-ec.1-bundle # registry.redhat.io/cert-manager/cert-manager-operator-bundle:v1.15.0
        oc wait --timeout=10m --for=condition=Available -n cert-manager-operator deployment cert-manager-operator-controller-manager

        for d in cert-manager cert-manager-cainjector cert-manager-webhook; do
          oc wait --timeout=2m --for=create -n cert-manager deployment "$d" || true
          oc wait --timeout=2m --for=condition=Available -n cert-manager deployment "$d" || true
        done
        oc get event -n cert-manager-operator
        oc get event -n cert-manager
      from: operator-sdk
      resources:
        requests:
          cpu: 100m
    - as: upgrade
      cli: latest
      commands: |
        operator-sdk run bundle-upgrade --security-context-config=restricted --verbose -n cert-manager-operator "$OO_BUNDLE"
        oc wait --timeout=10m --for=condition=Available -n cert-manager-operator deployment cert-manager-operator-controller-manager

        for d in cert-manager cert-manager-cainjector cert-manager-webhook; do
          oc wait --timeout=2m --for=create -n cert-manager deployment "$d" || true
          oc wait --timeout=2m --for=condition=Available -n cert-manager deployment "$d" || true
        done
        oc get event -n cert-manager-operator
        oc get event -n cert-manager
      dependencies:
      - env: OO_BUNDLE
        name: cert-manager-operator-bundle
      from: operator-sdk
      resources:
        requests:
          cpu: 100m
    - as: test
      cli: latest
      commands: make test-e2e
      from: src
      resources:
        requests:
          cpu: 100m
    workflow: ipi-aws
zz_generated_metadata:
  branch: master
  org: openshift
  repo: cert-manager-operator
