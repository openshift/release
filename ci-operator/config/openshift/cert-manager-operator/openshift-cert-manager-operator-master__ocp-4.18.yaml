base_images:
  cli:
    name: "4.18"
    namespace: ocp
    tag: cli
  tests-private:
    name: tests-private
    namespace: ci
    tag: "4.18"
  upi-installer:
    name: "4.18"
    namespace: ocp
    tag: upi-installer
build_root:
  image_stream_tag:
    name: release
    namespace: openshift
    tag: golang-1.22
  use_build_cache: true
releases:
  latest:
    candidate:
      architecture: amd64
      product: ocp
      stream: nightly
      version: "4.18"
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: vsphere-ipi-disc-f7
  cron: '@weekly'
  steps:
    cluster_profile: vsphere-dis-2
    env:
      DISCONNECTED: "true"
      INDEX_IMG: registry.redhat.io/redhat/redhat-operator-index:v4.18
      TEST_FILTERS: ~NonPreRelease&;~CPaasrunOnly&;~ConnectedOnly&;~62006&
      TEST_SCENARIOS: cert-manager
    leases:
    - env: VSPHERE_BASTION_LEASED_RESOURCE
      resource_type: vsphere-connected-2-quota-slice
    test:
    - chain: cert-manager-install
    - ref: openshift-extended-test
    - ref: openshift-e2e-test-qe-report
    workflow: cucushift-installer-rehearse-vsphere-ipi-disconnected
zz_generated_metadata:
  branch: master
  org: openshift
  repo: cert-manager-operator
  variant: ocp-4.18
