base_images:
  base:
    name: "4.17"
    namespace: ocp
    tag: base
  ocp_builder_rhel-9-golang-1.22-openshift-4.17:
    name: builder
    namespace: ocp
    tag: rhel-9-golang-1.22-openshift-4.17
binary_build_commands: make build --warn-undefined-variables
build_root:
  from_repository: true
images:
- dockerfile_path: Dockerfile.rhel9
  from: base
  inputs:
    ocp_builder_rhel-9-golang-1.22-openshift-4.17:
      as:
      - registry.ci.openshift.org/ocp/builder:rhel-9-golang-1.22-openshift-4.17
  to: cluster-etcd-operator
releases:
  initial:
    integration:
      name: "4.17"
      namespace: ocp
  latest:
    candidate:
      product: ocp
      stream: nightly
      version: "4.17"
resources:
  '*':
    requests:
      cpu: "3"
      memory: 1Gi
test_binary_build_commands: make build GO_BUILD_FLAGS:='-race' --warn-undefined-variables
tests:
- as: e2e-aws-etcd-recovery
  cron: 20 4 * * *
  steps:
    cluster_profile: aws
    env:
      FEATURE_SET: TechPreviewNoUpgrade
    workflow: openshift-e2e-aws-etcd-recovery
- as: e2e-aws-five-control-plane-replicas
  optional: true
  steps:
    cluster_profile: aws
    env:
      CONTROL_PLANE_REPLICAS: "5"
    workflow: openshift-e2e-aws-serial
- as: e2e-metal-assisted-five-control-plane-replicas
  optional: true
  steps:
    cluster_profile: packet-assisted
    env:
      CONTROL_PLANE_REPLICAS: "5"
    workflow: assisted-baremetal
zz_generated_metadata:
  branch: release-4.17
  org: openshift
  repo: cluster-etcd-operator
  variant: periodics
