base_images:
  golangci-lint:
    name: golangci-lint
    namespace: ci
    tag: v1.63.4
  ocp_4.19_base-rhel9:
    name: "4.19"
    namespace: ocp
    tag: base-rhel9
  ocp_builder_rhel-8-golang-1.23-openshift-4.19:
    name: builder
    namespace: ocp
    tag: rhel-8-golang-1.23-openshift-4.19
  ocp_builder_rhel-9-golang-1.23-openshift-4.19:
    name: builder
    namespace: ocp
    tag: rhel-9-golang-1.23-openshift-4.19
binary_build_commands: make build
build_root:
  from_repository: true
images:
- dockerfile_path: images/cli/Dockerfile.ci
  inputs:
    ocp_4.19_base-rhel9:
      as:
      - registry.ci.openshift.org/ocp/4.19:base-rhel9
    ocp_builder_rhel-8-golang-1.23-openshift-4.19:
      as:
      - registry.ci.openshift.org/ocp/builder:rhel-8-golang-1.23-openshift-4.19
    ocp_builder_rhel-9-golang-1.23-openshift-4.19:
      as:
      - registry.ci.openshift.org/ocp/builder:rhel-9-golang-1.23-openshift-4.19
  to: oc-mirror
- dockerfile_literal: |
    FROM quay.io/oc-mirror/integration-tests-artifacts:v0.0.1 as embed

    FROM registry.ci.openshift.org/ocp/builder:rhel-9-golang-1.23-openshift-4.19 AS builder
    WORKDIR /go/src/github.com/openshift/oc-mirror
    COPY . .
    # Statically link the binary so we can run it in any container image base
    RUN DISABLE_CGO=1 CGO_ENABLED=0 make build

    FROM registry.ci.openshift.org/ocp/4.19:base-rhel9
    WORKDIR /artifacts
    RUN mkdir -p /artifacts/{scripts,isc,workingdir} && chmod -R 777 /artifacts
    RUN mkdir -p /root/.docker /root/.oc-mirror/.cache
    COPY --from=embed artifacts/scripts /artifacts/scripts
    COPY --from=embed artifacts/isc /artifacts/isc
    COPY --from=embed artifacts/uid_entrypoint.sh /artifacts/
    COPY --from=builder /go/src/github.com/oc-mirror/bin/oc-mirror /bin/oc-mirror

    LABEL io.k8s.display-name="oc-mirror-integration-tests" \
        io.k8s.description="Integration tests for oc-mirror plugin." \
        io.openshift.tags="cli,mirror" \
        maintainer="luzuccar@redhat.com"

    ENTRYPOINT ["./uid_entrypoint.sh"]
  from: src
  inputs:
    ocp_4.19_base-rhel9:
      as:
      - registry.ci.openshift.org/ocp/4.19:base-rhel9
    ocp_builder_rhel-9-golang-1.23-openshift-4.19:
      as:
      - registry.ci.openshift.org/ocp/builder:rhel9-golang-1.23-openshift-4.19
  to: oc-mirror-tests
promotion:
  to:
  - excluded_images:
    - oc-mirror-tests
    name: "4.19"
    namespace: ocp
releases:
  initial:
    integration:
      name: "4.19"
      namespace: ocp
  latest:
    integration:
      include_built_images: true
      name: "4.19"
      namespace: ocp
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
test_binary_build_commands: make build
tests:
- as: sanity
  commands: make sanity
  container:
    from: src
- as: unit
  commands: make test-unit
  container:
    from: src
- as: e2e
  commands: make test-e2e
  container:
    from: src
- as: lint
  commands: |
    export GOCACHE=/tmp/
    export GOLANGCI_LINT_CACHE=/tmp/.cache
    export GOPROXY=https://proxy.golang.org
    cd v2
    golangci-lint version
    golangci-lint run --new-from-rev=HEAD~ --out-format colored-line-number --verbose --print-resources-usage --timeout=5m --build-tags "json1 exclude_graphdriver_btrfs exclude_graphdriver_devicemapper containers_image_openpgp"
  container:
    clone: true
    from: golangci-lint
- as: integration
  commands: |
    ./scripts/flow-controller.sh all_happy_path
  container:
    clone: true
    from: oc-mirror-tests
  skip_if_only_changed: (^docs/)|((^|/)OWNERS(_ALIASES)?$)|((^|/)[A-Z]+\.md$)
zz_generated_metadata:
  branch: main
  org: openshift
  repo: oc-mirror
