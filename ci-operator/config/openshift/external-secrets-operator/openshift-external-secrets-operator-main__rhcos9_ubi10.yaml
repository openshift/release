base_images:
  cli-operator-sdk:
    name: cli-operator-sdk
    namespace: ocp
    tag: v1.39.2
binary_build_commands: make build
build_root:
  from_repository: true
images:
- dockerfile_literal: |
    FROM registry.redhat.io/ubi10/go-toolset:10.1 AS builder

    ARG SRC_DIR=/go/src/github.com/openshift/external-secrets-operator
    ENV GO_BUILD_TAGS=strictfipsruntime,openssl
    ENV GOEXPERIMENT=strictfipsruntime
    ENV CGO_ENABLED=1
    ENV GOFLAGS=""

    WORKDIR $SRC_DIR

    # Copy the source
    COPY . .

    RUN go build -tags $GO_BUILD_TAGS -o external-secrets-operator cmd/external-secrets-operator/main.go

    FROM registry.access.redhat.com/ubi10-minimal:latest
    ARG SRC_DIR=/go/src/github.com/openshift/external-secrets-operator
    COPY --from=builder $SRC_DIR/external-secrets-operator /bin/external-secrets-operator
    USER 65534:65534

    ENTRYPOINT ["/bin/external-secrets-operator"]
  to: external-secrets-operator
- dockerfile_literal: |
    FROM registry.redhat.io/ubi10/go-toolset:10.1 AS builder

    ARG RELEASE_BRANCH=v0.20.4
    ARG GO_BUILD_TAGS=strictfipsruntime,openssl
    ARG SRC_DIR=/go/src/github.com/openshift/external-secrets

    ENV GOEXPERIMENT=strictfipsruntime
    ENV CGO_ENABLED=1

    WORKDIR $SRC_DIR
    RUN git clone --depth 1 --branch $RELEASE_BRANCH https://github.com/openshift/external-secrets.git $SRC_DIR
    RUN go mod vendor
    RUN go build -mod=vendor -tags $GO_BUILD_TAGS -o _output/external-secrets main.go

    FROM registry.access.redhat.com/ubi10-minimal:latest

    ARG SRC_DIR=/go/src/github.com/openshift/external-secrets
    COPY --from=builder $SRC_DIR/_output/external-secrets /bin/external-secrets

    USER 65534:65534

    ENTRYPOINT ["/bin/external-secrets"]
  to: external-secrets
operator:
  bundles:
  - as: external-secrets-operator-bundle
    dockerfile_path: bundle.Dockerfile
    skip_building_index: true
  substitutions:
  - pullspec: openshift.io/external-secrets-operator:latest
    with: pipeline:external-secrets-operator
  - pullspec: ghcr.io/external-secrets/external-secrets:.*
    with: pipeline:external-secrets
releases:
  latest:
    candidate:
      architecture: amd64
      product: ocp
      stream: nightly
      version: "4.21"
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: rhcos10-cluster-ubi9-e2e-operator
  steps:
    cluster_profile: openshift-org-aws
    dependencies:
      OO_BUNDLE: external-secrets-operator-bundle
    env:
      FIPS_ENABLED: "true"
      OO_INSTALL_MODE: AllNamespaces
      OO_INSTALL_NAMESPACE: external-secrets-operator
      OO_SECURITY_CONTEXT: restricted
      OSSTREAM: rhel-9
    test:
    - as: install
      cli: latest
      commands: |
        oc wait --for condition=Available -n external-secrets-operator deployment external-secrets-operator-controller-manager
      from: src
      resources:
        requests:
          cpu: 100m
    - as: test
      cli: latest
      commands: |
        E2E_GINKGO_LABEL_FILTER='"Platform: isSubsetOf {AWS} && !TechPreview"' make test-e2e
      from: src
      resources:
        requests:
          cpu: 100m
    workflow: optional-operators-ci-operator-sdk-aws
zz_generated_metadata:
  branch: main
  org: openshift
  repo: external-secrets-operator
  variant: rhcos9_ubi10
