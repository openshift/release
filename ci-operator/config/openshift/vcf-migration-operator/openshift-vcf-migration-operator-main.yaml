build_root:
  from_repository: true
images:
  items:
  - dockerfile_path: Dockerfile
    to: vcf-migration-operator
  - dockerfile_literal: |
      FROM quay.io/operator-framework/operator-sdk:v1.42.0 as osdk
      FROM src
      COPY --from=osdk /usr/local/bin/operator-sdk /usr/local/bin/
    from: src
    to: operator-sdk-vcf
promotion:
  to:
  - namespace: vcf
    tag: latest
releases:
  latest:
    candidate:
      product: ocp
      stream: nightly
      version: "5.0"
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: bundle
  commands: unset VERSION; NO_DOCKER=1 make bundle-verify
  container:
    from: operator-sdk-vcf
  skip_if_only_changed: (^docs/)|((^|/)OWNERS(_ALIASES)?$)|((^|/)[A-Za-z]+\.md$)|((^|/)\.github/)|((^|/)\.tekton/)
- as: fmt
  commands: NO_DOCKER=1 make fmt && make verify-diff
  container:
    from: src
  skip_if_only_changed: (^docs/)|((^|/)OWNERS(_ALIASES)?$)|((^|/)[A-Za-z]+\.md$)|((^|/)\.github/)|((^|/)\.tekton/)
- as: generate
  commands: NO_DOCKER=1 make generate && make verify-diff
  container:
    from: src
  skip_if_only_changed: (^docs/)|((^|/)OWNERS(_ALIASES)?$)|((^|/)[A-Za-z]+\.md$)|((^|/)\.github/)|((^|/)\.tekton/)
- as: lint
  commands: NO_DOCKER=1 make lint
  container:
    from: src
  skip_if_only_changed: (^docs/)|((^|/)OWNERS(_ALIASES)?$)|((^|/)[A-Za-z]+\.md$)|((^|/)\.github/)|((^|/)\.tekton/)
- as: manifests
  commands: NO_DOCKER=1 make manifests && make verify-diff
  container:
    from: src
  skip_if_only_changed: (^docs/)|((^|/)OWNERS(_ALIASES)?$)|((^|/)[A-Za-z]+\.md$)|((^|/)\.github/)|((^|/)\.tekton/)
- as: unit
  commands: make test
  container:
    from: src
- as: vendor
  commands: NO_DOCKER=1 make vendor && make verify-diff
  container:
    from: src
  skip_if_only_changed: (^docs/)|((^|/)OWNERS(_ALIASES)?$)|((^|/)[A-Za-z]+\.md$)|((^|/)\.github/)|((^|/)\.tekton/)
- as: vet
  commands: NO_DOCKER=1 make vet
  container:
    from: src
  skip_if_only_changed: (^docs/)|((^|/)OWNERS(_ALIASES)?$)|((^|/)[A-Za-z]+\.md$)|((^|/)\.github/)|((^|/)\.tekton/)
zz_generated_metadata:
  branch: main
  org: openshift
  repo: vcf-migration-operator
