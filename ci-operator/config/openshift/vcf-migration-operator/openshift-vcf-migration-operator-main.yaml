base_images:
  upi-installer:
    name: "4.22"
    namespace: ocp
    tag: upi-installer
build_root:
  from_repository: true
images:
  items:
  - dockerfile_path: Dockerfile
    to: vcf-migration-operator
  - dockerfile_literal: |
      FROM quay.io/operator-framework/operator-sdk:v1.33.0 as osdk
      FROM src
      COPY --from=osdk /usr/local/bin/operator-sdk /usr/local/bin/
    from: src
    to: operator-sdk-vcf
promotion:
  to:
  - namespace: vcf
    tag: latest
releases:
  latest:
    candidate:
      product: ocp
      stream: nightly
      version: "5.0"
resources:
  '*':
    limits:
      cpu: "2"
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: bundle
  commands: unset VERSION; NO_DOCKER=1 make bundle-verify
  container:
    from: operator-sdk-vcf
  skip_if_only_changed: (^docs/)|((^|/)OWNERS(_ALIASES)?$)|((^|/)[A-Za-z]+\.md$)|((^|/)\.github/)|((^|/)\.tekton/)
- as: unit
  commands: make test
  container:
    from: src
- as: e2e-vsphere-vcf-migration
  optional: true
  skip_if_only_changed: ^docs/|\.md$|^(?:.*/)?(?:\.gitignore|OWNERS|PROJECT|LICENSE)$
  steps:
    cluster_profile: vsphere-elastic
    dependencies:
      VCF_MIGRATION_OPERATOR_IMAGE: pipeline:vcf-migration-operator
    env:
      CSI_MANAGEMENT_REMOVED: "true"
      PERSISTENT_MONITORING: "false"
      SETUP_IMAGE_REGISTRY_WITH_PVC: "false"
    workflow: vcf-migration-e2e
- as: e2e-vsphere-vcf-migration-periodic
  cron: 0 6 * * 1,4
  steps:
    cluster_profile: vsphere-elastic
    dependencies:
      VCF_MIGRATION_OPERATOR_IMAGE: pipeline:vcf-migration-operator
    env:
      CSI_MANAGEMENT_REMOVED: "true"
      PERSISTENT_MONITORING: "false"
      SETUP_IMAGE_REGISTRY_WITH_PVC: "false"
    workflow: vcf-migration-e2e
zz_generated_metadata:
  branch: main
  org: openshift
  repo: vcf-migration-operator
