build_root:
  from_repository: true
images:
  items:
  - dockerfile_path: Dockerfile
    to: vcf-migration-operator
releases:
  latest:
    candidate:
      product: ocp
      stream: nightly
      version: "5.0"
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: unit
  commands: make test
  container:
    from: src
zz_generated_metadata:
  branch: main
  org: openshift
  repo: vcf-migration-operator
