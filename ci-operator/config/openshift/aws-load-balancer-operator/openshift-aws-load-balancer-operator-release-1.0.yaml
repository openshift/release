base_images:
  operator-sdk:
    name: "4.14"
    namespace: origin
    tag: operator-sdk
  rosa-aws-cli:
    name: rosa-aws-cli
    namespace: ci
    tag: latest
build_root:
  from_repository: true
images:
- dockerfile_path: Dockerfile
  to: aws-load-balancer-operator
operator:
  bundles:
  - as: aws-load-balancer-operator-bundle
    dockerfile_path: bundle.Dockerfile
    skip_building_index: true
  substitutions:
  - pullspec: openshift.io/aws-load-balancer-operator:latest
    with: pipeline:aws-load-balancer-operator
releases:
  initial:
    integration:
      name: "4.13"
      namespace: ocp
  latest:
    integration:
      include_built_images: true
      name: "4.13"
      namespace: ocp
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: verify
  commands: make verify
  container:
    from: src
- as: unit
  commands: |
    export XDG_CACHE_HOME=/tmp/.cache
    export ENVTEST_ASSETS_DIR=$(mktemp -d)
    make test
  container:
    from: src
- as: e2e-aws-operator
  steps:
    cluster_profile: aws
    env:
      OO_INSTALL_NAMESPACE: aws-load-balancer-operator
    test:
    - as: install
      cli: latest
      commands: |
        oc create ns aws-load-balancer-operator
        operator-sdk run bundle --timeout=10m -n aws-load-balancer-operator --security-context-config restricted --install-mode AllNamespaces "$OO_BUNDLE"
        oc -n aws-load-balancer-operator wait --for condition=Available deployment/aws-load-balancer-operator-controller-manager
      dependencies:
      - env: OO_BUNDLE
        name: aws-load-balancer-operator-bundle
      from: operator-sdk
      resources:
        requests:
          cpu: 100m
    - as: test
      cli: latest
      commands: make test-e2e
      from: src
      resources:
        requests:
          cpu: 100m
    workflow: aws-load-balancer-install
- as: e2e-aws-rosa-operator
  steps:
    cluster_profile: aws-qe
    env:
      OO_INSTALL_NAMESPACE: aws-load-balancer-operator
      OPENSHIFT_VERSION: "4.14"
    test:
    - as: install
      cli: latest
      commands: |
        oc create ns aws-load-balancer-operator
        operator-sdk run bundle --timeout=10m -n aws-load-balancer-operator --security-context-config restricted --install-mode AllNamespaces "$OO_BUNDLE"
        oc -n aws-load-balancer-operator set env deployment/aws-load-balancer-operator-controller-manager ROLEARN=$(cat ${SHARED_DIR}/operator-role-arn)
        oc -n aws-load-balancer-operator wait --for condition=Available deployment/aws-load-balancer-operator-controller-manager
      dependencies:
      - env: OO_BUNDLE
        name: aws-load-balancer-operator-bundle
      from: operator-sdk
      resources:
        requests:
          cpu: 100m
    - as: test
      cli: latest
      commands: |
        export ALBO_E2E_PLATFORM=ROSA
        export ALBO_E2E_WAFV2_WEBACL_ARN=$(cat ${SHARED_DIR}/wafv2-webacl)
        export ALBO_E2E_WAF_WEBACL_ID=$(cat ${SHARED_DIR}/waf-webacl | head -1)
        make test-e2e
      from: src
      resources:
        requests:
          cpu: 100m
    workflow: aws-load-balancer-install-rosa
zz_generated_metadata:
  branch: release-1.0
  org: openshift
  repo: aws-load-balancer-operator
