build_root:
  image_stream_tag:
    name: release
    namespace: openshift
    tag: rhel-9-release-golang-1.26-openshift-5.0
images:
  items:
  - dockerfile_path: Dockerfile.openshift
    to: kube-vip
promotion:
  to:
  - disabled: true
    name: "5.0"
    namespace: ocp
releases:
  initial:
    integration:
      name: "5.0"
      namespace: ocp
  latest:
    integration:
      include_built_images: true
      name: "5.0"
      namespace: ocp
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: unit-tests
  commands: make unit-tests
  container:
    from: src
- as: integration-tests
  commands: make integration-tests
  container:
    from: src
zz_generated_metadata:
  branch: release-5.0
  org: openshift
  repo: kube-vip
