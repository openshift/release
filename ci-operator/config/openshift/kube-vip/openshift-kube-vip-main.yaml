build_root:
  image_stream_tag:
    name: release
    namespace: openshift
    tag: rhel-9-release-golang-1.26-openshift-5.0
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
test_binary_build_commands: go test -race ./...
tests:
- as: unit-tests
  commands: make unit-tests
  container:
    from: src
- as: integration-tests
  commands: make integration-tests
  container:
    from: src
zz_generated_metadata:
  branch: main
  org: openshift
  repo: kube-vip
