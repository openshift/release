build_root:
  from_repository: true
images:
- dockerfile_path: Dockerfile.ci
  to: openshift-mcp-server
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tag_specification:
  name: "4.20"
  namespace: ocp
tests:
- as: mcp-gateway-aws-eval-weekly
  cron: '@weekly'
  steps:
    cluster_profile: openshift-org-aws
    dependencies:
      MCP_SERVER_IMAGE: openshift-mcp-server
    test:
    - as: eval
      cli: latest
      commands: |
        sleep 2h # for debugging
      from: src
      resources:
        requests:
          cpu: 100m
          memory: 200Mi
    workflow: openshift-mcp-server-aws-gateway
zz_generated_metadata:
  branch: release-4.20
  org: openshift
  repo: openshift-mcp-server
  variant: periodics
