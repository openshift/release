build_root:
  from_repository: true
images:
  items:
  - dockerfile_path: Dockerfile.ci
    to: openshift-mcp-server
promotion:
  to:
  - name: "5.0"
    namespace: ocp
resources:
  '*':
    requests:
      cpu: 500m
      memory: 200Mi
tag_specification:
  name: "5.0"
  namespace: ocp
tests:
- as: lint
  commands: GOLANGCI_LINT_CACHE=/tmp/.cache GOCACHE=/tmp/ GOFLAGS='-mod=readonly'
    make lint
  container:
    from: src
- as: test
  commands: GOFLAGS='-mod=readonly' XDG_DATA_HOME=/tmp/.local/share make test
  container:
    from: src
- as: fips-image-scan-openshift-mcp-server
  skip_if_only_changed: ^\.tekton/|\.md$|^(LICENSE|OWNERS)$
  steps:
    dependencies:
      SCAN_IMAGE: openshift-mcp-server
    test:
    - ref: fips-check-image-scan
- as: security
  optional: true
  skip_if_only_changed: ^\.tekton/|\.md$|^(LICENSE|OWNERS)$
  steps:
    workflow: openshift-ci-security
- as: mcpchecker-eval-google
  optional: true
  steps:
    cluster_profile: openshift-org-aws
    env:
      ANTHROPIC_USE_VERTEX: ""
      EVAL_CONFIG: evals/core-eval-testing/builtin-google/eval-core.yaml
      EVAL_LABEL_SELECTOR: suite=core
      GEMINI_USE_VERTEX: "1"
      GOOGLE_CLOUD_LOCATION: us-east5
      GOOGLE_CLOUD_PROJECT: ocp-mcp-server-team
    test:
    - chain: openshift-mcp-server-mcpchecker-eval-vertex
    workflow: ipi-aws
- as: mcpchecker-eval-anthropic
  optional: true
  steps:
    cluster_profile: openshift-org-aws
    env:
      ANTHROPIC_USE_VERTEX: "1"
      EVAL_CONFIG: evals/core-eval-testing/builtin-anthropic/eval-core.yaml
      EVAL_LABEL_SELECTOR: suite=core
      GEMINI_USE_VERTEX: ""
      GOOGLE_CLOUD_LOCATION: us-east5
      GOOGLE_CLOUD_PROJECT: ocp-mcp-server-team
    test:
    - chain: openshift-mcp-server-mcpchecker-eval-vertex
    workflow: ipi-aws
zz_generated_metadata:
  branch: main
  org: openshift
  repo: openshift-mcp-server
