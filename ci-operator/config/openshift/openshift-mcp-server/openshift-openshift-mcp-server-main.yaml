build_root:
  from_repository: true
images:
  items:
  - dockerfile_path: Dockerfile.ci
    to: openshift-mcp-server
promotion:
  to:
  - name: "5.0"
    namespace: ocp
resources:
  '*':
    requests:
      cpu: 500m
      memory: 200Mi
tag_specification:
  name: "5.0"
  namespace: ocp
tests:
- as: lint
  commands: GOLANGCI_LINT_CACHE=/tmp/.cache GOCACHE=/tmp/ GOFLAGS='-mod=readonly'
    make lint
  container:
    from: src
- as: test
  commands: GOFLAGS='-mod=readonly' XDG_DATA_HOME=/tmp/.local/share make test
  container:
    from: src
- as: fips-image-scan-openshift-mcp-server
  skip_if_only_changed: ^\.tekton/|\.md$|^(LICENSE|OWNERS)$
  steps:
    dependencies:
      SCAN_IMAGE: openshift-mcp-server
    test:
    - ref: fips-check-image-scan
- as: security
  optional: true
  skip_if_only_changed: ^\.tekton/|\.md$|^(LICENSE|OWNERS)$
  steps:
    workflow: openshift-ci-security
- as: mcpchecker-eval-google
  optional: true
  steps:
    test:
    - as: mcpchecker-eval-google
      commands: |
        set -euo pipefail

        export GOOGLE_APPLICATION_CREDENTIALS="/var/run/ocp-mcp/service-account.json"
        export GOOGLE_CLOUD_LOCATION="us-east1"
        export GEMINI_USE_VERTEX="1"

        # Extract project ID from service account JSON
        GOOGLE_CLOUD_PROJECT="$(python3 -c "import json; print(json.load(open('${GOOGLE_APPLICATION_CREDENTIALS}'))['project_id'])")"
        export GOOGLE_CLOUD_PROJECT

        # Build MCP server binary
        GOFLAGS='-mod=readonly' make build

        # Install mcpchecker (clear -mod=vendor set by CI environment)
        GOFLAGS='' make mcpchecker

        # Start MCP server in background
        make run-server TOOLSETS=core,config
        trap 'make stop-server || true' EXIT

        # Run mcpchecker evaluation with Google Gemini agent
        _output/tools/bin/mcpchecker check \
          evals/core-eval-testing/builtin-google/eval-core.yaml \
          --label-selector suite=core \
          --output json
      credentials:
      - mount_path: /var/run/ocp-mcp
        name: ocp-mcp
        namespace: test-credentials
      from: src
      grace_period: 1m0s
      resources:
        requests:
          cpu: 500m
          memory: 200Mi
- as: mcpchecker-eval-anthropic
  optional: true
  steps:
    test:
    - as: mcpchecker-eval-anthropic
      commands: |
        set -euo pipefail

        export GOOGLE_APPLICATION_CREDENTIALS="/var/run/ocp-mcp/service-account.json"
        export GOOGLE_CLOUD_LOCATION="us-east1"
        export ANTHROPIC_USE_VERTEX="1"

        # Extract project ID from service account JSON
        GOOGLE_CLOUD_PROJECT="$(python3 -c "import json; print(json.load(open('${GOOGLE_APPLICATION_CREDENTIALS}'))['project_id'])")"
        export GOOGLE_CLOUD_PROJECT

        # Build MCP server binary
        GOFLAGS='-mod=readonly' make build

        # Install mcpchecker (clear -mod=vendor set by CI environment)
        GOFLAGS='' make mcpchecker

        # Start MCP server in background
        make run-server TOOLSETS=core,config
        trap 'make stop-server || true' EXIT

        # Run mcpchecker evaluation with Anthropic Claude agent
        _output/tools/bin/mcpchecker check \
          evals/core-eval-testing/builtin-anthropic/eval-core.yaml \
          --label-selector suite=core \
          --output json
      credentials:
      - mount_path: /var/run/ocp-mcp
        name: ocp-mcp
        namespace: test-credentials
      from: src
      grace_period: 1m0s
      resources:
        requests:
          cpu: 500m
          memory: 200Mi
zz_generated_metadata:
  branch: main
  org: openshift
  repo: openshift-mcp-server
