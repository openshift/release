build_root:
  from_repository: true
images:
  items:
  - dockerfile_path: Dockerfile.ci
    to: openshift-mcp-server
promotion:
  to:
  - name: "5.0"
    namespace: ocp
resources:
  '*':
    requests:
      cpu: 500m
      memory: 200Mi
tag_specification:
  name: "5.0"
  namespace: ocp
tests:
- as: lint
  commands: GOLANGCI_LINT_CACHE=/tmp/.cache GOCACHE=/tmp/ GOFLAGS='-mod=readonly'
    make lint
  container:
    from: src
- as: test
  commands: GOFLAGS='-mod=readonly' XDG_DATA_HOME=/tmp/.local/share make test
  container:
    from: src
- as: fips-image-scan-openshift-mcp-server
  skip_if_only_changed: ^\.tekton/|\.md$|^(LICENSE|OWNERS)$
  steps:
    dependencies:
      SCAN_IMAGE: openshift-mcp-server
    test:
    - ref: fips-check-image-scan
- as: security
  optional: true
  skip_if_only_changed: ^\.tekton/|\.md$|^(LICENSE|OWNERS)$
  steps:
    workflow: openshift-ci-security
- as: mcpchecker-eval-google
  optional: true
  commands: |
    # Build MCP server binary
    GOFLAGS='-mod=readonly' make build

    # Install mcpchecker
    make mcpchecker

    # Start MCP server in background (no cluster needed for this step)
    make run-server TOOLSETS=core,config

    # Run mcpchecker evaluation with Google Gemini agent
    # NOTE: This will fail until Vault credentials are wired (follow-up PR)
    _output/tools/bin/mcpchecker check \
      evals/core-eval-testing/builtin-google/eval-kubernetes.yaml \
      --label-selector suite=kubernetes \
      --output json \
      || true

    # Cleanup
    make stop-server || true
  container:
    from: src
zz_generated_metadata:
  branch: main
  org: openshift
  repo: openshift-mcp-server
