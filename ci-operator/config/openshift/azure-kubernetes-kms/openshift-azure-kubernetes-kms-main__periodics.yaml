base_images:
  rebasebot:
    name: rebasebot
    namespace: ci
    tag: latest
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: rebasebot
  cron: 0 12 * * Mon,Thu
  steps:
    test:
    - as: rebasebot
      commands: |
        rebasebot --source https://github.com/Azure/kubernetes-kms:master \
                  --dest openshift/azure-kubernetes-kms:main \
                  --rebase openshift/azure-kubernetes-kms:rebase-bot-main \
                  --update-go-modules \
                  --github-app-key /secrets/rebasebot/hypershift-rebase-bot-key \
                  --github-cloner-key /secrets/rebasebot/hypershift-rebase-bot-key \
                  --github-app-id 3706026 \
                  --github-cloner-id 3706026 \
                  --git-username hypershift-rebase-bot \
                  --git-email hypershift-rebase-bot@redhat.com \
                  --bot-emails hypershift-rebase-bot@redhat.com openshift-bot@redhat.com openshift-ci-robot@redhat.com \
                  --tag-policy=strict
      credentials:
      - mount_path: /secrets/rebasebot
        name: hypershift-rebasebot-credentials
        namespace: test-credentials
      from_image:
        name: rebasebot
        namespace: ci
        tag: latest
      resources:
        limits:
          memory: 6Gi
        requests:
          cpu: 400m
          memory: 1Gi
zz_generated_metadata:
  branch: main
  org: openshift
  repo: azure-kubernetes-kms
  variant: periodics
