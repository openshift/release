base_images:
  commitchecker:
    name: commitchecker
    namespace: ci
    tag: latest
  hypershift-tests:
    name: hypershift-tests
    namespace: hypershift
    tag: latest
build_root:
  from_repository: true
images:
  items:
  - dockerfile_path: Dockerfile.openshift
    to: azure-kms-encryption-provider
promotion:
  to:
  - name: "5.1"
    namespace: ocp
releases:
  initial:
    candidate:
      product: ocp
      relative: 1
      stream: ci
      version: "5.1"
  latest:
    integration:
      include_built_images: true
      name: "5.1"
      namespace: ocp
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: verify-commits
  commands: |
    commitchecker --start ${PULL_BASE_SHA:-main}
  container:
    from: commitchecker
- as: unit
  commands: make unit-test
  container:
    from: src
- as: e2e-hypershift
  steps:
    cluster_profile: hypershift-aws
    workflow: hypershift-aws-e2e-external
- as: verify-deps
  steps:
    env:
      CHECK_MOD_LIST: "false"
    test:
    - ref: go-verify-deps
zz_generated_metadata:
  branch: release-5.1
  org: openshift
  repo: azure-kubernetes-kms
