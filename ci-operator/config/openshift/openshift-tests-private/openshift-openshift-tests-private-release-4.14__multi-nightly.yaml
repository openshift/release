base_images:
  aws-efs-csi-operator-create-efs:
    name: "4.14"
    namespace: ocp
    tag: aws-efs-csi-operator-create-efs
  cli:
    name: "4.14"
    namespace: ocp
    tag: cli
  cluster-api-actuator-pkg-test:
    name: cluster-api-actuator-pkg-test
    namespace: ci
    tag: "4.14"
  dev-scripts:
    name: test
    namespace: ocp-kni
    tag: dev-scripts
  tests-private:
    name: tests-private
    namespace: ci
    tag: "4.14"
  tests-private-ui:
    name: tests-private-ui
    namespace: ci
    tag: "4.14"
  tools:
    name: "4.14"
    namespace: ocp
    tag: tools
  upi-installer:
    name: "4.14"
    namespace: ocp
    tag: upi-installer
prowgen:
  expose: true
  private: true
releases:
  latest:
    candidate:
      architecture: multi
      product: ocp
      stream: nightly
      version: "4.14"
  target:
    candidate:
      architecture: multi
      product: ocp
      stream: nightly
      version: "4.14"
resources:
  '*':
    limits:
      memory: 8Gi
    requests:
      cpu: "1"
      memory: 4Gi
tests:
- always_run: false
  as: aws-ipi-amd-f60-netobserv
  reporter_config:
    channel: '#team-qe-netobserv'
    job_states_to_report:
    - aborted
    - error
    - failure
    - success
    report_template: '{{ if eq .Status.State "success" }} :green_jenkins_circle: {{
      else }} :red_jenkins_circle: {{ end }} Job *{{.Spec.Job}}* ended with *{{.Status.State}}*.
      <{{.Status.URL}}|View logs>'
  steps:
    cluster_profile: aws-qe
    env:
      BASE_DOMAIN: qe.devcluster.openshift.com
      COMPUTE_NODE_TYPE: m6i.2xlarge
    test:
    - chain: openshift-e2e-test-netobserv-qe-pf4
    workflow: cucushift-installer-rehearse-aws-ipi
- always_run: false
  as: aws-ipi-arm-f60-netobserv
