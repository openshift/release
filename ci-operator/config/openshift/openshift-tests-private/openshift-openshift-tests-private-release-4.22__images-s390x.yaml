base_images:
  ci_tests-private-base-s390x:
    name: tests-private-base-s390x
    namespace: ci
    tag: 4.22-s390x
  tools:
    name: "4.22"
    namespace: ocp
    tag: tools
binary_build_commands: |-
  make go-mod-tidy
  GOOS=linux GOARCH=s390x CGO_ENABLED=0 go build -mod=mod -o bin/extended-platform-tests ./cmd/extended-platform-tests
build_root:
  image_stream_tag:
    name: builder
    namespace: ocp
    tag: rhel-9-golang-1.25-openshift-4.22
images:
  items:
  - dockerfile_literal: |
      FROM src AS builder
      FROM this-is-ignored-and-not-used
      ENV ART_DNF_WRAPPER_POLICY=append
      COPY --from=builder /go/src/github.com/openshift/openshift-tests-private/pipeline/handleresult.py /usr/bin/
      RUN set -x && \
          yum update -y --disablerepo=ubi-9-appstream --disablerepo=ubi-9-baseos --disablerepo=ubi-9-codeready-builder && \
          PACKAGES="git gzip httpd-tools openssh-clients python3-pip skopeo util-linux zip" && \
          yum -y install --setopt=tsflags=nodocs --disablerepo=ubi-9-appstream --disablerepo=ubi-9-baseos --disablerepo=ubi-9-codeready-builder $PACKAGES && \
          git config --system user.name openshift-tests-private && \
          git config --system user.email openshift-tests-private@redhat.com && \
          pip3 uninstall PyYAML -y && yum -y remove python3-requests && pip3 install --upgrade setuptools pip && pip3 install dotmap minio python-openstackclient pyyaml requests && \
          chmod g+w /etc/passwd && \
          MIRRORURL=https://mirror2.openshift.com/pub/openshift-v4/s390x/clients && \
          CURL_FLAGS="--fail --show-error --location --retry 3 --retry-delay 5 --connect-timeout 30 --max-time 300" && \
          curl ${CURL_FLAGS} ${MIRRORURL}/ocp/candidate/opm-linux-s390x-rhel9.tar.gz -o opm-linux.tar.gz && \
          curl ${CURL_FLAGS} ${MIRRORURL}/ocp/candidate/sha256sum.txt -o opm-sha256sum.txt && \
          grep "opm-linux-s390x-rhel9.tar.gz" opm-sha256sum.txt | sha256sum -c - && \
          tar -C /usr/bin/ -xzvf opm-linux.tar.gz && mv /usr/bin/opm-rhel9 /usr/bin/opm && rm -f opm-linux.tar.gz opm-sha256sum.txt && \
          curl ${CURL_FLAGS} ${MIRRORURL}/ocp-dev-preview/latest/oc-mirror.rhel9.tar.gz -o oc-mirror.tar.gz && \
          curl ${CURL_FLAGS} ${MIRRORURL}/ocp-dev-preview/latest/sha256sum.txt -o oc-mirror-sha256sum.txt && \
          grep "oc-mirror.rhel9.tar.gz" oc-mirror-sha256sum.txt | sha256sum -c - && \
          tar -C /usr/bin/ -xzvf oc-mirror.tar.gz && chmod +x /usr/bin/oc-mirror && rm -f oc-mirror.tar.gz oc-mirror-sha256sum.txt && \
          curl ${CURL_FLAGS} ${MIRRORURL}/operator-sdk/latest/operator-sdk-linux-s390x.tar.gz -o opt-sdk.tar.gz && \
          curl ${CURL_FLAGS} ${MIRRORURL}/operator-sdk/latest/sha256sum.txt -o opt-sdk-sha256sum.txt && \
          grep "operator-sdk-linux-s390x.tar.gz" opt-sdk-sha256sum.txt | sha256sum -c - && \
          tar -C /usr/bin/ -xzvf opt-sdk.tar.gz && rm -f opt-sdk.tar.gz opt-sdk-sha256sum.txt && \
          KREW_ROOT="/usr/local/krew" && \
          ARCH="s390x" && \
          KREW_VERSION="v0.4.5" && \
          KREW="krew-linux_${ARCH}" && \
          pushd "$(mktemp -d)" && \
          curl -fsSLO "https://github.com/kubernetes-sigs/krew/releases/download/${KREW_VERSION}/${KREW}.tar.gz" && \
          tar zxvf "${KREW}.tar.gz" && ./"${KREW}" install krew && \
          popd && export PATH="$PATH:${KREW_ROOT}/bin:$HOME/.krew/bin" && \
          yum clean all && \
          rm -rf /usr/bin/oc /usr/bin/kubectl /var/cache/yum/* /tmp/*
    from: tools
    inputs:
      src:
        as:
        - src
    to: tests-private-base-s390x
  - dockerfile_literal: |
      FROM bin AS bin
      FROM this-is-ignored-and-not-used
      COPY --from=bin /go/src/github.com/openshift/openshift-tests-private/bin/extended-platform-tests /usr/bin/extended-platform-tests
      RUN chmod +x /usr/bin/extended-platform-tests && chmod g+w /etc/passwd
    from: ci_tests-private-base-s390x
    inputs:
      bin:
        as:
        - bin
    to: tests-private-s390x
promotion:
  to:
  - namespace: ci
    tag: 4.22-s390x
prowgen:
  expose: true
  private: true
resources:
  '*':
    limits:
      memory: 8Gi
    requests:
      cpu: "1"
      memory: 4Gi
  bin:
    requests:
      cpu: "2"
      memory: 8Gi
test_binary_build_commands: GOOS=linux GOARCH=s390x CGO_ENABLED=0 go build -mod=mod
  -o bin/extended-platform-tests ./cmd/extended-platform-tests
zz_generated_metadata:
  branch: release-4.22
  org: openshift
  repo: openshift-tests-private
  variant: images-s390x
