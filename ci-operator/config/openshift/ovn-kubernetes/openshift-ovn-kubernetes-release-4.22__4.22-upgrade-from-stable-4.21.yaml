build_root:
  from_repository: true
images:
  items:
  - dockerfile_path: Dockerfile.base
    to: ovn-kubernetes-base
  - dockerfile_path: Dockerfile
    from: ovn-kubernetes-base
    to: ovn-kubernetes
  - dockerfile_path: Dockerfile.microshift
    from: ovn-kubernetes-base
    to: ovn-kubernetes-microshift
releases:
  initial:
    candidate:
      product: ocp
      stream: nightly
      version: "4.21"
  latest:
    integration:
      include_built_images: true
      name: "4.22"
      namespace: ocp
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- always_run: false
  as: e2e-aws-ovn-upgrade
  pipeline_skip_if_only_changed: ^(docs|\.github|contrib|etc|helm)/|\.md$|^(\.gitignore|OWNERS|LICENSE|CODEOWNERS|\.coderabbit\.yml|crd-docs-config\.yaml|mkdocs\.yml|requirements\.txt)$
  steps:
    cluster_profile: openshift-org-aws
    env:
      EXTRA_MG_ARGS: --host-network
      TEST_TYPE: upgrade-conformance
    workflow: openshift-upgrade-aws-ovn
- always_run: false
  as: e2e-aws-ovn-upgrade-ipsec
  optional: true
  steps:
    cluster_profile: openshift-org-aws
    env:
      EXTRA_MG_ARGS: --host-network
    workflow: openshift-e2e-aws-ovn-upgrade-ipsec
- always_run: false
  as: e2e-gcp-ovn-rt-upgrade
  pipeline_skip_if_only_changed: ^(docs|\.github|contrib|etc|helm)/|\.md$|^(\.gitignore|OWNERS|LICENSE|CODEOWNERS|\.coderabbit\.yml|crd-docs-config\.yaml|mkdocs\.yml|requirements\.txt)$
  steps:
    cluster_profile: openshift-org-gcp
    env:
      EXTRA_MG_ARGS: --host-network
      TEST_TYPE: upgrade-conformance
    workflow: openshift-upgrade-gcp-ovn-rt
zz_generated_metadata:
  branch: release-4.22
  org: openshift
  repo: ovn-kubernetes
  variant: 4.22-upgrade-from-stable-4.21
