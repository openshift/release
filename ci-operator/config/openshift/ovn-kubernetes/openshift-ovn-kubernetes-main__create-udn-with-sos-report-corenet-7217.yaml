base_images:
  ocp-qe-perfscale-ci:
    name: ocp-qe-perfscale-ci
    namespace: ci
    tag: latest
build_root:
  from_repository: true
releases:
  initial:
    integration:
      name: "4.18"
      namespace: ocp
  latest:
    integration:
      include_built_images: true
      name: "4.18"
      namespace: ocp
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: corenet-7217-udn-medium-with-sos
  steps:
    cluster_profile: openshift-org-aws
    env:
      CUDN_ITERATION_MULTIPLIER: "6"
      EXTRA_MG_ARGS: --host-network
      MUST_GATHER_TIMEOUT: 35m
      NAMESPACES_PER_CUDN: "5"
      POD_READY_THRESHOLD: 1400s
      PPROF: "true"
      SOS_COLLECT_ALL_NODES: "true"
      SOS_MAX_PARALLEL: "10"
      SOS_PLUGIN_FILTER: ovs,openvswitch,ovn,process,systemd,cgroups
      SOS_TIMEOUT: 45m
    post:
    - ref: gather-must-gather
    test:
    - chain: openshift-qe-cudn-density-with-sos
    workflow: ipi-aws
  timeout: 7h0m0s
- as: corenet-7217-udn-high-with-sos
  steps:
    cluster_profile: openshift-org-aws
    env:
      CUDN_ITERATION_MULTIPLIER: "12"
      EXTRA_MG_ARGS: --host-network
      MUST_GATHER_TIMEOUT: 40m
      NAMESPACES_PER_CUDN: "5"
      POD_READY_THRESHOLD: 2000s
      PPROF: "true"
      SOS_COLLECT_ALL_NODES: "true"
      SOS_MAX_PARALLEL: "10"
      SOS_PLUGIN_FILTER: ovs,openvswitch,ovn,process,systemd,cgroups
      SOS_TIMEOUT: 60m
    post:
    - ref: gather-must-gather
    test:
    - chain: openshift-qe-cudn-density-with-sos
    workflow: ipi-aws
  timeout: 9h0m0s
- as: corenet-7217-udn-quick
  steps:
    cluster_profile: openshift-org-aws
    env:
      CUDN_ITERATION_MULTIPLIER: "3"
      EXTRA_MG_ARGS: --host-network
      MUST_GATHER_TIMEOUT: 25m
      NAMESPACES_PER_CUDN: "5"
      POD_READY_THRESHOLD: 1000s
      SOS_MAX_PARALLEL: "15"
      SOS_NODE_SELECTOR: node-role.kubernetes.io/worker=
      SOS_PLUGIN_FILTER: ovs,process
      SOS_TIMEOUT: 20m
    post:
    - ref: gather-must-gather
    test:
    - chain: openshift-qe-cudn-density-with-sos
    workflow: ipi-aws
  timeout: 5h0m0s
- as: corenet-7217-baseline-sos
  steps:
    cluster_profile: openshift-org-aws
    env:
      EXTRA_MG_ARGS: --host-network
      MUST_GATHER_TIMEOUT: 25m
      SOS_MAX_PARALLEL: "10"
      SOS_NODE_SELECTOR: node-role.kubernetes.io/worker=
      SOS_PLUGIN_FILTER: ovs,openvswitch,ovn,process,systemd
      SOS_TIMEOUT: 20m
    post:
    - ref: gather-must-gather
    test:
    - ref: openshift-qe-sosreport
    workflow: ipi-aws
  timeout: 2h0m0s
zz_generated_metadata:
  branch: main
  org: openshift
  repo: ovn-kubernetes
  variant: create-udn-with-sos-report-corenet-7217
