base_images:
  ocp_builder_rhel-9-base-nodejs-openshift-4.22:
    name: builder
    namespace: ocp
    tag: rhel-9-base-nodejs-openshift-4.22
  ocp_builder_rhel-9-golang-1.25-openshift-4.22:
    name: builder
    namespace: ocp
    tag: rhel-9-golang-1.25-openshift-4.22
build_root:
  from_repository: true
images:
- dockerfile_path: Dockerfile
  to: console
- dockerfile_path: Dockerfile.plugins.demo
  from: ocp_builder_rhel-9-base-nodejs-openshift-4.22
  to: console-plugin-demo
promotion:
  to:
  - additional_images:
      console-tests: src
    name: "4.22"
    namespace: ocp
releases:
  initial:
    integration:
      name: "4.22"
      namespace: ocp
  latest:
    integration:
      include_built_images: true
      name: "4.22"
      namespace: ocp
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
  analyze:
    requests:
      cpu: "1"
      memory: 14Gi
  console:
    requests:
      cpu: "2"
      memory: 10Gi
  frontend:
    requests:
      cpu: "2"
      memory: 10Gi
  test-bin:
    requests:
      cpu: "1"
      memory: 10Gi
test_binary_build_commands: |
  ./build-frontend.sh
  ./build-demos.sh
tests:
- as: backend
  commands: |
    export XDG_CACHE_HOME=/tmp/.cache
    mkdir -p ${ARTIFACT_DIR} ${XDG_CACHE_HOME}
    go install -mod= github.com/jstemmer/go-junit-report@latest
    /home/prow/go/src/github.com/openshift/console/test-backend.sh
  container:
    from: ocp_builder_rhel-9-golang-1.25-openshift-4.22
  skip_if_only_changed: \.md$|(?:^|/)(?:\.gitignore|OWNERS|LICENSE)$
- as: frontend
  commands: |
    git config --global --add safe.directory /go/src/github.com/openshift/console
    ./test-frontend.sh
  container:
    from: test-bin
  skip_if_only_changed: \.md$|(?:^|/)(?:\.gitignore|OWNERS|LICENSE)$
- as: analyze
  commands: ./analyze.sh
  container:
    from: test-bin
  skip_if_only_changed: \.md$|(?:^|/)(?:\.gitignore|OWNERS|LICENSE)$
- as: e2e-gcp-console
  skip_if_only_changed: \.md$|(?:^|/)(?:\.gitignore|OWNERS|LICENSE)$
  steps:
    cluster_profile: gcp-3
    test:
    - as: test
      cli: latest
      commands: ./test-prow-e2e.sh
      dependencies:
      - env: CYPRESS_PLUGIN_PULL_SPEC
        name: console-plugin-demo
      from: src
      resources:
        requests:
          cpu: "4"
          memory: 10Gi
      timeout: 6h0m0s
    workflow: ipi-gcp
- as: e2e-gcp-console-parallel
  skip_if_only_changed: \.md$|(?:^|/)(?:\.gitignore|OWNERS|LICENSE)$
  steps:
    cluster_profile: gcp-3
    test:
    - as: test
      cli: latest
      commands: |
        #!/bin/bash
        set -euo pipefail

        echo "Running Cypress tests - Shard $((MATRIX_INDEX + 1))/4"
        # SPLIT_TOTAL defaults to 4 in test-prow-e2e.sh
        export SPLIT_INDEX=${MATRIX_INDEX}

        # Run the test
        ./test-prow-e2e.sh e2e-parallel
      # Create 4 parallel pods
      matrix:
      - name: MATRIX_INDEX
        values: ["0", "1", "2", "3"]
      dependencies:
      - env: CYPRESS_PLUGIN_PULL_SPEC
        name: console-plugin-demo
      from: src
      resources:
        requests:
          cpu: "2"
          memory: 6Gi
      timeout: 3h0m0s
    workflow: ipi-gcp
zz_generated_metadata:
  branch: main
  org: openshift
  repo: console
