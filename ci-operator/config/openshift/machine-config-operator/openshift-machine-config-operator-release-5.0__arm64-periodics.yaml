base_images:
  dev-scripts:
    name: test
    namespace: ocp-kni
    tag: dev-scripts
  nested-podman:
    name: nested-podman
    namespace: ci
    tag: latest
  upi-installer:
    name: "5.0"
    namespace: ocp
    tag: upi-installer
build_root:
  from_repository: true
images:
  items:
  - dockerfile_path: Dockerfile.rhel7
    to: machine-config-operator
releases:
  arm64-latest:
    candidate:
      architecture: arm64
      product: ocp
      stream: nightly
      version: "5.0"
  latest:
    candidate:
      product: ocp
      stream: nightly
      version: "5.0"
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: e2e-aws-mco-disruptive
  interval: 72h
  reporter_config:
    channel: '#trt-alert-mco'
    job_states_to_report:
    - failure
    - error
    report_template: ':failed: Job *{{.Spec.Job}}* ended with *{{.Status.State}}*.
      <{{.Status.URL}}|View logs> {{end}}'
  shard_count: 2
  steps:
    cluster_profile: openshift-org-aws
    dependencies:
      OPENSHIFT_INSTALL_RELEASE_IMAGE_OVERRIDE: release:arm64-latest
    env:
      OCP_ARCH: arm64
      TEST_SUITE: openshift/machine-config-operator/disruptive
    test:
    - ref: mco-conf-day2-add-mcoqe-robot-to-pull-secret
    - ref: openshift-e2e-test
    workflow: openshift-e2e-aws
- as: e2e-aws-mco-disruptive-techpreview
  interval: 24h
  reporter_config:
    channel: '#trt-alert-mco'
    job_states_to_report:
    - failure
    - error
    report_template: ':failed: Job *{{.Spec.Job}}* ended with *{{.Status.State}}*.
      <{{.Status.URL}}|View logs> {{end}}'
  shard_count: 3
  steps:
    cluster_profile: openshift-org-aws
    dependencies:
      OPENSHIFT_INSTALL_RELEASE_IMAGE_OVERRIDE: release:arm64-latest
    env:
      FEATURE_SET: TechPreviewNoUpgrade
      OCP_ARCH: arm64
      TEST_SUITE: openshift/machine-config-operator/disruptive
    test:
    - ref: mco-conf-day2-add-mcoqe-robot-to-pull-secret
    - ref: openshift-e2e-test
    workflow: openshift-e2e-aws
zz_generated_metadata:
  branch: release-5.0
  org: openshift
  repo: machine-config-operator
  variant: arm64-periodics
