base_images:
  dev-scripts:
    name: test
    namespace: ocp-kni
    tag: dev-scripts
  upi-installer:
    name: "4.19"
    namespace: ocp
    tag: upi-installer
build_root:
  from_repository: true
releases:
  initial:
    candidate:
      product: ocp
      relative: 1
      stream: nightly
      version: "4.20"
  latest:
    candidate:
      product: ocp
      stream: nightly
      version: "4.20"
  target:
    candidate:
      product: ocp
      stream: nightly
      version: "4.20"
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- always_run: false
  as: e2e-aws-mco-disruptive
  cron: 14 14 * * 6
  reporter_config:
    channel: '#trt-alert-mco'
    job_states_to_report:
    - failure
    - error
    report_template: ':failed: Job *{{.Spec.Job}}* ended with *{{.Status.State}}*.
      <{{.Status.URL}}|View logs> {{end}}'
  steps:
    cluster_profile: openshift-org-aws
    env:
      TEST_ARGS: --disable-monitor=audit-log-analyzer
      TEST_SUITE: openshift/machine-config-operator/disruptive
    workflow: openshift-e2e-aws
- always_run: false
  as: e2e-azure-mco-disruptive
  cron: 6 8 * * 0
  reporter_config:
    channel: '#trt-alert-mco'
    job_states_to_report:
    - failure
    - error
    report_template: ':failed: Job *{{.Spec.Job}}* ended with *{{.Status.State}}*.
      <{{.Status.URL}}|View logs> {{end}}'
  steps:
    cluster_profile: openshift-org-azure
    env:
      TEST_ARGS: --disable-monitor=audit-log-analyzer
      TEST_SUITE: openshift/machine-config-operator/disruptive
    workflow: openshift-e2e-azure
- always_run: false
  as: e2e-gcp-mco-disruptive
  cron: 1 15 * * 6
  reporter_config:
    channel: '#trt-alert-mco'
    job_states_to_report:
    - failure
    - error
    report_template: ':failed: Job *{{.Spec.Job}}* ended with *{{.Status.State}}*.
      <{{.Status.URL}}|View logs> {{end}}'
  steps:
    cluster_profile: openshift-org-gcp
    env:
      TEST_ARGS: --disable-monitor=audit-log-analyzer
      TEST_SUITE: openshift/machine-config-operator/disruptive
    workflow: openshift-e2e-gcp
- always_run: false
  as: e2e-vsphere-mco-disruptive
  cron: 6 13 * * 5
  reporter_config:
    channel: '#trt-alert-mco'
    job_states_to_report:
    - failure
    - error
    report_template: ':failed: Job *{{.Spec.Job}}* ended with *{{.Status.State}}*.
      <{{.Status.URL}}|View logs> {{end}}'
  steps:
    cluster_profile: vsphere-elastic
    env:
      TEST_ARGS: --disable-monitor=audit-log-analyzer
      TEST_SUITE: openshift/machine-config-operator/disruptive
    workflow: openshift-e2e-vsphere
- always_run: false
  as: e2e-metal-ipi-ovn-ipv4-mco-disruptive
  capabilities:
  - intranet
  cron: 56 4 * * 6
  reporter_config:
    channel: '#trt-alert-mco'
    job_states_to_report:
    - failure
    - error
    report_template: ':failed: Job *{{.Spec.Job}}* ended with *{{.Status.State}}*.
      <{{.Status.URL}}|View logs> {{end}}'
  steps:
    cluster_profile: equinix-ocp-metal
    env:
      TEST_ARGS: --disable-monitor=audit-log-analyzer
      TEST_SUITE: openshift/machine-config-operator/disruptive
    workflow: baremetalds-e2e-ovn-ipv4
- always_run: false
  as: e2e-metal-ipi-ovn-ipv6-mco-disruptive
  capabilities:
  - intranet
  cron: 32 20 * * 6
  reporter_config:
    channel: '#trt-alert-mco'
    job_states_to_report:
    - failure
    - error
    report_template: ':failed: Job *{{.Spec.Job}}* ended with *{{.Status.State}}*.
      <{{.Status.URL}}|View logs> {{end}}'
  steps:
    cluster_profile: equinix-ocp-metal
    env:
      TEST_ARGS: --disable-monitor=audit-log-analyzer
      TEST_SUITE: openshift/machine-config-operator/disruptive
    workflow: baremetalds-e2e-ovn-ipv6
- always_run: false
  as: e2e-metal-ipi-ovn-dualstack-mco-disruptive
  capabilities:
  - intranet
  cron: 57 2 * * 0
  reporter_config:
    channel: '#trt-alert-mco'
    job_states_to_report:
    - failure
    - error
    report_template: ':failed: Job *{{.Spec.Job}}* ended with *{{.Status.State}}*.
      <{{.Status.URL}}|View logs> {{end}}'
  steps:
    cluster_profile: equinix-ocp-metal
    env:
      TEST_ARGS: --disable-monitor=audit-log-analyzer
      TEST_SUITE: openshift/machine-config-operator/disruptive
    workflow: baremetalds-e2e-ovn-dualstack
- always_run: false
  as: e2e-aws-ovn-ocl
  interval: 168h
  reporter_config:
    channel: '#trt-alert-mco'
    job_states_to_report:
    - failure
    - error
    report_template: ':failed: Job *{{.Spec.Job}}* ended with *{{.Status.State}}*.
      <{{.Status.URL}}|View logs> {{end}}'
  steps:
    cluster_profile: openshift-org-aws
    env:
      MCO_CONF_DAY2_OCL_POOLS: master worker
    test:
    - ref: mco-conf-day2-add-mcoqe-robot-to-pull-secret
    - ref: mco-conf-day2-enable-ocl
    - ref: openshift-e2e-test
    workflow: openshift-e2e-aws
- always_run: false
  as: e2e-aws-ovn-upgrade-ocl
  interval: 168h
  reporter_config:
    channel: '#trt-alert-mco'
    job_states_to_report:
    - failure
    - error
    report_template: ':failed: Job *{{.Spec.Job}}* ended with *{{.Status.State}}*.
      <{{.Status.URL}}|View logs> {{end}}'
  steps:
    cluster_profile: openshift-org-aws
    env:
      MCO_CONF_DAY2_OCL_POOLS: master worker
      TEST_TYPE: upgrade-conformance
    test:
    - ref: mco-conf-day2-add-mcoqe-robot-to-pull-secret
    - ref: mco-conf-day2-enable-ocl
    - ref: openshift-e2e-test
    workflow: openshift-e2e-aws-upgrade
- as: e2e-vsphere-mco-tp-disc-proxy-longduration
  cron: 30 6 * * 0
  shard_count: 2
  steps:
    cluster_profile: vsphere-dis-2
    env:
      COMPUTE_NODE_REPLICAS: "2"
      FEATURE_SET: TechPreviewNoUpgrade
      TEST_SUITE: openshift/machine-config-operator/longduration
    leases:
    - env: VSPHERE_BASTION_LEASED_RESOURCE
      resource_type: vsphere-connected-2-quota-slice
    test:
    - chain: mco-e2e-test
    workflow: cucushift-installer-rehearse-vsphere-ipi-disc-proxy
zz_generated_metadata:
  branch: release-4.20
  org: openshift
  repo: machine-config-operator
  variant: periodics
