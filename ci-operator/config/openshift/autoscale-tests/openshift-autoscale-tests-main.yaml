build_root:
  from_repository: true
promotion:
  to:
  - additional_images:
      autoscale-tests: src
    name: release
    namespace: openshift
releases:
  initial:
    integration:
      name: "4.21"
      namespace: ocp
  latest:
    integration:
      include_built_images: true
      name: "4.21"
      namespace: ocp
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: lint
  commands: |
    GOFLAGS="" go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.2.1
    # Now GOFLAGS=-mod=vendor is still active for everything else
    golangci-lint --timeout 10m run ./...
  container:
    from: src
zz_generated_metadata:
  branch: main
  org: openshift
  repo: autoscale-tests
