build_root:
  from_repository: true
promotion:
  to:
  - additional_images:
      autoscale-tests: src
    name: release
    namespace: openshift
releases:
  initial:
    integration:
      name: "4.21"
      namespace: ocp
  latest:
    integration:
      include_built_images: true
      name: "4.21"
      namespace: ocp
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: e2e-aws-autoscaler
  skip_if_only_changed: (?i)^cas/(readme\.md|makefile)$|^cas/vendor/
  steps:
    cluster_profile: openshift-org-aws
    test:
    - as: test
      cli: latest
      commands: JUNIT_DIR=${ARTIFACT_DIR} make test-e2e-cas
      from: src
      resources:
        requests:
          cpu: 100m
      timeout: 3h0m0s
    workflow: ipi-aws
- as: e2e-azure-autoscaler
  skip_if_only_changed: (?i)^cas/(readme\.md|makefile)$|^cas/vendor/
  steps:
    cluster_profile: openshift-org-azure
    test:
    - as: test
      cli: latest
      commands: JUNIT_DIR=${ARTIFACT_DIR} make test-e2e-cas
      from: src
      resources:
        requests:
          cpu: 100m
      timeout: 3h0m0s
    workflow: ipi-azure
- as: e2e-gcp-autoscaler
  skip_if_only_changed: (?i)^cas/(readme\.md|makefile)$|^cas/vendor/
  steps:
    cluster_profile: openshift-org-gcp
    test:
    - as: test
      cli: latest
      commands: JUNIT_DIR=${ARTIFACT_DIR} make test-e2e-cas
      from: src
      resources:
        requests:
          cpu: 100m
      timeout: 3h0m0s
    workflow: ipi-gcp
- as: e2e-vsphere-autoscaler
  skip_if_only_changed: (?i)^cas/(readme\.md|makefile)$|^cas/vendor/
  steps:
    cluster_profile: vsphere-elastic
    test:
    - as: test
      cli: latest
      commands: JUNIT_DIR=${ARTIFACT_DIR} make test-e2e-cas
      from: src
      resources:
        requests:
          cpu: 100m
      timeout: 3h0m0s
    workflow: openshift-e2e-vsphere
zz_generated_metadata:
  branch: main
  org: openshift
  repo: autoscale-tests
