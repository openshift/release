build_root:
  from_repository: true
promotion:
  to:
  - additional_images:
      autoscale-tests: src
    name: release
    namespace: openshift
releases:
  initial:
    integration:
      name: "4.21"
      namespace: ocp
  latest:
    integration:
      include_built_images: true
      name: "4.21"
      namespace: ocp
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: lint
  commands: make lint
  container:
    from: src
zz_generated_metadata:
  branch: main
  org: openshift
  repo: autoscale-tests
