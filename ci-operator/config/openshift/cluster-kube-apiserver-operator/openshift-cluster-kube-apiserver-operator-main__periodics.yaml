base_images:
  base:
    name: "5.0"
    namespace: ocp
    tag: base
  dev-scripts:
    name: test
    namespace: ocp-kni
    tag: dev-scripts
  upi-installer:
    name: "5.0"
    namespace: ocp
    tag: upi-installer
binary_build_commands: make build --warn-undefined-variables
build_root:
  from_repository: true
images:
  items:
  - dockerfile_path: Dockerfile.rhel7
    to: cluster-kube-apiserver-operator
releases:
  initial:
    integration:
      name: "5.0"
      namespace: ocp
  latest:
    candidate:
      product: ocp
      stream: ci
      version: "5.0"
resources:
  '*':
    requests:
      cpu: "3"
      memory: 3Gi
test_binary_build_commands: make build GO_BUILD_FLAGS:='-race' --warn-undefined-variables
tests:
- as: e2e-aws-event-ttl
  interval: 12h
  steps:
    cluster_profile: openshift-org-aws
    env:
      FEATURE_SET: TechPreviewNoUpgrade
      TEST_SUITE: openshift/cluster-kube-apiserver-operator/event-ttl
    workflow: openshift-e2e-aws
- as: e2e-azure-event-ttl
  interval: 12h
  steps:
    cluster_profile: openshift-org-azure
    env:
      FEATURE_SET: TechPreviewNoUpgrade
      TEST_SUITE: openshift/cluster-kube-apiserver-operator/event-ttl
    workflow: openshift-e2e-azure
- as: e2e-gcp-event-ttl
  interval: 12h
  steps:
    cluster_profile: openshift-org-gcp
    env:
      FEATURE_SET: TechPreviewNoUpgrade
      TEST_SUITE: openshift/cluster-kube-apiserver-operator/event-ttl
    workflow: openshift-e2e-gcp
- as: e2e-vsphere-event-ttl
  cron: 12 1 * * *
  steps:
    cluster_profile: vsphere-elastic
    env:
      FEATURE_SET: TechPreviewNoUpgrade
      TEST_SUITE: openshift/cluster-kube-apiserver-operator/event-ttl
    workflow: openshift-e2e-vsphere
- as: e2e-metal-event-ttl
  cron: 12 1 * * *
  steps:
    cluster_profile: equinix-ocp-metal
    env:
      DEVSCRIPTS_CONFIG: |
        NETWORK_TYPE=OVNKubernetes
        FEATURE_SET=TechPreviewNoUpgrade
      TEST_SUITE: openshift/cluster-kube-apiserver-operator/event-ttl
    workflow: baremetalds-e2e
- as: e2e-aws-encryption-kms
  interval: 12h
  steps:
    cluster_profile: openshift-org-aws
    env:
      FEATURE_SET: TechPreviewNoUpgrade
    test:
    - as: test
      cli: latest
      commands: |
        export VAULT_LICENSE=$(cat /var/run/vault/tests-private-account/kms-vault-license)
        make test-e2e-encryption-kms JUNITFILE=${ARTIFACT_DIR}/junit_report.xml --warn-undefined-variables
      credentials:
      - mount_path: /var/run/vault/tests-private-account
        name: tests-private-account
        namespace: test-credentials
      from: src
      resources:
        requests:
          cpu: 100m
      timeout: 4h0m0s
    workflow: ipi-aws
- as: e2e-azure-encryption-kms
  interval: 12h
  steps:
    cluster_profile: openshift-org-azure
    env:
      FEATURE_SET: TechPreviewNoUpgrade
    test:
    - as: test
      cli: latest
      commands: |
        export VAULT_LICENSE=$(cat /var/run/vault/tests-private-account/kms-vault-license)
        make test-e2e-encryption-kms JUNITFILE=${ARTIFACT_DIR}/junit_report.xml --warn-undefined-variables
      credentials:
      - mount_path: /var/run/vault/tests-private-account
        name: tests-private-account
        namespace: test-credentials
      from: src
      resources:
        requests:
          cpu: 100m
      timeout: 4h0m0s
    workflow: ipi-azure
- as: e2e-gcp-encryption-kms
  interval: 12h
  steps:
    cluster_profile: openshift-org-gcp
    env:
      FEATURE_SET: TechPreviewNoUpgrade
    test:
    - as: test
      cli: latest
      commands: |
        export VAULT_LICENSE=$(cat /var/run/vault/tests-private-account/kms-vault-license)
        make test-e2e-encryption-kms JUNITFILE=${ARTIFACT_DIR}/junit_report.xml --warn-undefined-variables
      credentials:
      - mount_path: /var/run/vault/tests-private-account
        name: tests-private-account
        namespace: test-credentials
      from: src
      resources:
        requests:
          cpu: 100m
      timeout: 4h0m0s
    workflow: ipi-gcp
- as: e2e-vsphere-encryption-kms
  cron: 12 7 * * *
  steps:
    cluster_profile: vsphere-elastic
    env:
      FEATURE_SET: TechPreviewNoUpgrade
    test:
    - as: test
      cli: latest
      commands: |
        export VAULT_LICENSE=$(cat /var/run/vault/tests-private-account/kms-vault-license)
        make test-e2e-encryption-kms JUNITFILE=${ARTIFACT_DIR}/junit_report.xml --warn-undefined-variables
      credentials:
      - mount_path: /var/run/vault/tests-private-account
        name: tests-private-account
        namespace: test-credentials
      from: src
      resources:
        requests:
          cpu: 100m
      timeout: 4h0m0s
    workflow: openshift-e2e-vsphere
- as: e2e-metal-encryption-kms
  capabilities:
  - intranet
  cron: 12 7 * * *
  steps:
    cluster_profile: equinix-ocp-metal-qe
    env:
      AUX_HOST: openshift-qe-metal-ci.arm.eng.rdu2.redhat.com
      FEATURE_SET: TechPreviewNoUpgrade
      RESERVE_BOOTSTRAP: "false"
      architecture: amd64
      masters: "3"
      workers: "2"
    test:
    - as: test
      cli: latest
      commands: |
        export VAULT_LICENSE=$(cat /var/run/vault/tests-private-account/kms-vault-license)
        make test-e2e-encryption-kms JUNITFILE=${ARTIFACT_DIR}/junit_report.xml --warn-undefined-variables
      credentials:
      - mount_path: /var/run/vault/tests-private-account
        name: tests-private-account
        namespace: test-credentials
      from: src
      resources:
        requests:
          cpu: 100m
      timeout: 4h0m0s
    workflow: baremetal-lab-ipi-virtual-media
zz_generated_metadata:
  branch: main
  org: openshift
  repo: cluster-kube-apiserver-operator
  variant: periodics
