base_images:
  base:
    name: "5.0"
    namespace: ocp
    tag: base
  dev-scripts:
    name: test
    namespace: ocp-kni
    tag: dev-scripts
  upi-installer:
    name: "5.0"
    namespace: ocp
    tag: upi-installer
  vault_kube_kms:
    name: vault-kube-kms
    namespace: control-plane_vault
    tag: 0.0.1
binary_build_commands: make build --warn-undefined-variables
build_root:
  from_repository: true
images:
  items:
  - dockerfile_path: Dockerfile.rhel7
    to: cluster-kube-apiserver-operator
releases:
  initial:
    integration:
      name: "5.0"
      namespace: ocp
  latest:
    candidate:
      product: ocp
      stream: ci
      version: "5.0"
resources:
  '*':
    requests:
      cpu: "3"
      memory: 3Gi
test_binary_build_commands: make build GO_BUILD_FLAGS:='-race' --warn-undefined-variables
tests:
- as: e2e-aws-event-ttl
  interval: 12h
  steps:
    cluster_profile: openshift-org-aws
    env:
      FEATURE_SET: TechPreviewNoUpgrade
      TEST_SUITE: openshift/cluster-kube-apiserver-operator/event-ttl
    workflow: openshift-e2e-aws
- as: e2e-azure-event-ttl
  interval: 12h
  steps:
    cluster_profile: openshift-org-azure
    env:
      FEATURE_SET: TechPreviewNoUpgrade
      TEST_SUITE: openshift/cluster-kube-apiserver-operator/event-ttl
    workflow: openshift-e2e-azure
- as: e2e-gcp-event-ttl
  interval: 12h
  steps:
    cluster_profile: openshift-org-gcp
    env:
      FEATURE_SET: TechPreviewNoUpgrade
      TEST_SUITE: openshift/cluster-kube-apiserver-operator/event-ttl
    workflow: openshift-e2e-gcp
- as: e2e-vsphere-event-ttl
  cron: 12 1 * * *
  steps:
    cluster_profile: vsphere-elastic
    env:
      FEATURE_SET: TechPreviewNoUpgrade
      TEST_SUITE: openshift/cluster-kube-apiserver-operator/event-ttl
    workflow: openshift-e2e-vsphere
- as: e2e-metal-event-ttl
  cron: 12 1 * * *
  steps:
    cluster_profile: equinix-ocp-metal
    env:
      DEVSCRIPTS_CONFIG: |
        NETWORK_TYPE=OVNKubernetes
        FEATURE_SET=TechPreviewNoUpgrade
      TEST_SUITE: openshift/cluster-kube-apiserver-operator/event-ttl
    workflow: baremetalds-e2e
- as: e2e-aws-encryption-kms
  interval: 12h
  steps:
    cluster_profile: openshift-org-aws
    env:
      FEATURE_SET: TechPreviewNoUpgrade
      TEST_SUITE: openshift/cluster-kube-apiserver-operator/encryption-kms
    test:
    - chain: etcd-encryption-vault-setup
    - ref: openshift-e2e-test
    workflow: ipi-aws
- as: e2e-azure-encryption-kms
  cron: 12 7 * * 1,4
  steps:
    cluster_profile: openshift-org-azure
    env:
      FEATURE_SET: TechPreviewNoUpgrade
      TEST_SUITE: openshift/cluster-kube-apiserver-operator/encryption-kms
    test:
    - chain: etcd-encryption-vault-setup
    - ref: openshift-e2e-test
    workflow: ipi-azure
- as: e2e-gcp-encryption-kms
  interval: 12h
  steps:
    cluster_profile: openshift-org-gcp
    env:
      FEATURE_SET: TechPreviewNoUpgrade
      TEST_SUITE: openshift/cluster-kube-apiserver-operator/encryption-kms
    test:
    - chain: etcd-encryption-vault-setup
    - ref: openshift-e2e-test
    workflow: ipi-gcp
- as: e2e-vsphere-encryption-kms
  cron: 30 16 * * 2,5
  steps:
    cluster_profile: vsphere-elastic
    env:
      FEATURE_SET: TechPreviewNoUpgrade
      TEST_SUITE: openshift/cluster-kube-apiserver-operator/encryption-kms
    test:
    - chain: etcd-encryption-vault-setup
    - ref: openshift-e2e-test
    workflow: openshift-e2e-vsphere
- as: e2e-metal-encryption-kms
  capabilities:
  - intranet
  cron: 12 0 * * 1,4
  steps:
    cluster_profile: equinix-ocp-metal-qe
    env:
      AUX_HOST: openshift-qe-metal-ci.arm.eng.rdu2.redhat.com
      FEATURE_SET: TechPreviewNoUpgrade
      RESERVE_BOOTSTRAP: "false"
      TEST_SUITE: openshift/cluster-kube-apiserver-operator/encryption-kms
      architecture: amd64
      masters: "3"
      workers: "2"
    test:
    - chain: etcd-encryption-vault-setup
    - ref: openshift-e2e-test
    workflow: baremetal-lab-ipi-virtual-media
- as: e2e-metal-encryption-kms-ipv6
  capabilities:
  - intranet
  cron: 12 8 * * 2,5
  steps:
    cluster_profile: equinix-ocp-metal-qe
    env:
      AUX_HOST: openshift-qe-metal-ci.arm.eng.rdu2.redhat.com
      FEATURE_SET: TechPreviewNoUpgrade
      RESERVE_BOOTSTRAP: "false"
      TEST_SUITE: openshift/cluster-kube-apiserver-operator/encryption-kms
      architecture: amd64
      masters: "3"
      workers: "2"
    test:
    - chain: etcd-encryption-vault-setup
    - ref: openshift-e2e-test
    workflow: baremetal-lab-ipi-virtual-media-ipv6-static
- as: e2e-metal-encryption-kms-dual
  capabilities:
  - intranet
  cron: 12 16 * * 3,6
  steps:
    cluster_profile: equinix-ocp-metal-qe
    env:
      AUX_HOST: openshift-qe-metal-ci.arm.eng.rdu2.redhat.com
      FEATURE_SET: TechPreviewNoUpgrade
      RESERVE_BOOTSTRAP: "false"
      TEST_SUITE: openshift/cluster-kube-apiserver-operator/encryption-kms
      architecture: amd64
      masters: "3"
      workers: "2"
    test:
    - chain: etcd-encryption-vault-setup
    - ref: openshift-e2e-test
    workflow: baremetal-lab-upi-dual-stack
- as: e2e-aws-encryption-kms-single-node
  interval: 12h
  steps:
    cluster_profile: openshift-org-aws
    env:
      FEATURE_SET: TechPreviewNoUpgrade
      TEST_SUITE: openshift/cluster-kube-apiserver-operator/encryption-kms
    test:
    - chain: etcd-encryption-vault-setup
    - ref: openshift-e2e-test
    workflow: openshift-e2e-aws-single-node
zz_generated_metadata:
  branch: main
  org: openshift
  repo: cluster-kube-apiserver-operator
  variant: periodics
