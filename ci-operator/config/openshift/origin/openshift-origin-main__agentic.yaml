base_images:
  claude-ai-helpers:
    name: claude-ai-helpers
    namespace: ci
    tag: latest
  nested-podman:
    name: nested-podman
    namespace: ci
    tag: latest
  origin-devcontainer:
    name: origin-devcontainer
    namespace: ci
    tag: origin-devcontainer
build_root:
  from_repository: true
images:
  items:
  - dockerfile_literal: |
      FROM claude-ai-helpers AS ai-helpers
      FROM nested-podman AS podman
      FROM src AS source
      FROM origin-devcontainer
      USER root
      RUN dnf install -y podman fuse-overlayfs shadow-utils openssl && dnf clean all
      COPY --from=podman /entrypoint.sh /entrypoint.sh
      RUN setcap cap_setuid+ep /usr/bin/newuidmap && \
          setcap cap_setgid+ep /usr/bin/newgidmap && \
          touch /etc/subgid /etc/subuid && \
          chmod -R g=u /etc/subuid /etc/subgid /etc/passwd /etc/group && \
          chmod +rx /entrypoint.sh
      COPY --from=source /go/src/github.com/openshift/origin /workspace
      RUN chgrp -R 0 /workspace && chmod -R g=u /workspace
      COPY --from=ai-helpers /opt/ai-helpers /opt/ai-helpers
      RUN mkdir -p /home/vscode/.claude/plugins
      COPY --from=ai-helpers /home/claude/.claude/plugins/known_marketplaces.json /home/vscode/.claude/plugins/known_marketplaces.json
      RUN chgrp -R 0 /opt/ai-helpers /home/vscode/.claude && chmod -R g=u /opt/ai-helpers /home/vscode/.claude
      ENV BUILDAH_ISOLATION=chroot
      USER vscode
      WORKDIR /workspace
      ENTRYPOINT ["/entrypoint.sh"]
      CMD ["bash"]
    from: origin-devcontainer
    inputs:
      claude-ai-helpers:
        as:
        - claude-ai-helpers
      nested-podman:
        as:
        - nested-podman
      src:
        as:
        - src
    to: agentic-dev
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: periodic-origin-jira-agent
  capabilities:
  - nested-podman
  cron: '@yearly'
  steps:
    env:
      ALLOWED_TOOLS: Bash Read Write Edit Grep Glob WebFetch WebSearch Agent LSP Skill
        TaskCreate TaskGet TaskList TaskOutput TaskStop TaskUpdate TodoWrite ToolSearch
      FORK_REPO: openshift-trt/origin
      SETUP_SCRIPT: hack/agentic_setup.sh
      UPSTREAM_REPO: openshift/origin
    workflow: openshift-agentic-trt-jira-solver
- as: periodic-origin-pr-followup-agent
  capabilities:
  - nested-podman
  cron: '@yearly'
  steps:
    env:
      ALLOWED_TOOLS: Bash Read Write Edit Grep Glob WebFetch WebSearch Agent LSP Skill
        TaskCreate TaskGet TaskList TaskOutput TaskStop TaskUpdate TodoWrite ToolSearch
      FORK_REPO: openshift-trt/origin
      SETUP_SCRIPT: hack/agentic_setup.sh
      UPSTREAM_REPO: openshift/origin
    workflow: openshift-agentic-trt-pr-followup
zz_generated_metadata:
  branch: main
  org: openshift
  repo: origin
  variant: agentic
