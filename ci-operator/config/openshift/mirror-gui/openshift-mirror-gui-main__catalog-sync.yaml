build_root:
  project_image:
    dockerfile_path: .ci-operator/build-root/Dockerfile
images:
  items:
  - dockerfile_path: Dockerfile
    inputs:
      synced-catalog-data:
        paths:
        - destination_dir: .
          source_path: /go/src/github.com/openshift/mirror-gui/catalog-data
    to: mirror-gui
promotion:
  to:
  - name: "5.0"
    namespace: ocp
raw_steps:
- pipeline_image_cache_step:
    commands: |
      set -euo pipefail

      cd /go/src/github.com/openshift/mirror-gui

      apt-get update
      apt-get install -y --no-install-recommends jq python3 python3-yaml wget tar ca-certificates
      rm -rf /var/lib/apt/lists/*

      PULL_SECRET_PATH=""
      for candidate in \
        /var/run/secrets/openshift.io/pull/.dockerconfigjson \
        /var/run/secrets/openshift.io/pull/config.json \
        /var/run/secrets/openshift.io/pull/.dockercfg; do
        if [ -s "$candidate" ]; then
          PULL_SECRET_PATH="$candidate"
          break
        fi
      done

      if [ -z "$PULL_SECRET_PATH" ]; then
        echo "ERROR: build pull secret not found under /var/run/secrets/openshift.io/pull"
        ls -al /var/run/secrets/openshift.io/pull || true
        exit 1
      fi

      if [ "${PULL_SECRET_PATH##*.}" = "dockercfg" ]; then
        jq '{auths: .}' "$PULL_SECRET_PATH" > /tmp/ci-pull-secret-dockerconfigjson
        PULL_SECRET_PATH=/tmp/ci-pull-secret-dockerconfigjson
      fi

      wget -qO /tmp/oc.tar.gz https://mirror.openshift.com/pub/openshift-v4/clients/ocp/stable/openshift-client-linux.tar.gz
      tar -xzf /tmp/oc.tar.gz -C /usr/local/bin oc
      rm -f /tmp/oc.tar.gz

      export PULL_SECRET_PATH
      export CATALOG_DATA_DIR=./catalog-data
      export MAX_PARALLEL_JOBS=3
      ./sync-catalogs.sh
    from: src
    to: synced-catalog-data
releases:
  initial:
    integration:
      name: "5.0"
      namespace: ocp
  latest:
    integration:
      include_built_images: true
      name: "5.0"
      namespace: ocp
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: catalog-sync-verify
  steps:
    test:
    - as: catalog-sync-verify
      commands: |
        set -euo pipefail
        export PULL_SECRET_PATH=/var/run/secrets/ci-pull-credentials/.dockerconfigjson
        export CATALOG_DATA_DIR=/tmp/catalog-data
        export MAX_PARALLEL_JOBS=3
        cd /app
        ./sync-catalogs.sh
        echo "--- Verification ---"
        cat /tmp/catalog-data/catalog-index.json
        CATALOG_COUNT=$(jq -r 'if (.catalogs | type) == "array" then (.catalogs | length) else 0 end' /tmp/catalog-data/catalog-index.json)
        echo "Synced catalog entries: $CATALOG_COUNT"
        if [ "$CATALOG_COUNT" -lt 1 ]; then
          echo "ERROR: No catalogs synced"
          exit 1
        fi
      credentials:
      - mount_path: /var/run/secrets/ci-pull-credentials
        name: ci-pull-credentials
        namespace: ci
      from: mirror-gui
      resources:
        requests:
          cpu: 100m
          memory: 200Mi
zz_generated_metadata:
  branch: main
  org: openshift
  repo: mirror-gui
  variant: catalog-sync
