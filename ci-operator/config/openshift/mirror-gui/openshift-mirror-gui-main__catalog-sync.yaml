build_root:
  project_image:
    dockerfile_path: .ci-operator/build-root/Dockerfile
images:
  items:
  - dockerfile_literal: |
      FROM registry.access.redhat.com/ubi9/ubi-minimal:latest
      RUN microdnf install -y jq 2>/dev/null || true && \
          echo "=== Auth file probe ===" && \
          find / -maxdepth 4 \( -name "auth.json" -o -name ".dockerconfigjson" -o -name "config.json" -o -name "pull-secret*" \) 2>/dev/null | while read f; do \
            echo "FOUND: $f"; \
            jq -r '.auths // {} | keys[]' "$f" 2>/dev/null || echo "not-json"; \
            echo "---"; \
          done && \
          for p in /run/containers/0/auth.json \
                   /var/run/secrets/openshift.io/pull/.dockerconfigjson \
                   /etc/containers/auth.json \
                   /tmp/auth.json \
                   /root/.docker/config.json; do \
            [ -f "$p" ] && echo "EXISTS: $p" || echo "MISSING: $p"; \
          done && \
          echo "=== End probe ==="
    to: auth-probe
  - build_args:
    - name: SYNC_CATALOGS
      value: "true"
    dockerfile_path: Dockerfile
    to: mirror-gui
promotion:
  to:
  - name: "5.0"
    namespace: ocp
releases:
  initial:
    integration:
      name: "5.0"
      namespace: ocp
  latest:
    integration:
      include_built_images: true
      name: "5.0"
      namespace: ocp
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: catalog-sync-verify
  steps:
    test:
    - as: catalog-sync-verify
      commands: |
        set -euo pipefail
        export PULL_SECRET_PATH=/var/run/secrets/ci-pull-credentials/.dockerconfigjson
        export CATALOG_DATA_DIR=/tmp/catalog-data
        export MAX_PARALLEL_JOBS=3
        cd /app
        ./sync-catalogs.sh
        echo "--- Verification ---"
        cat /tmp/catalog-data/catalog-index.json
        CATALOG_COUNT=$(jq -r 'if (.catalogs | type) == "array" then (.catalogs | length) else 0 end' /tmp/catalog-data/catalog-index.json)
        echo "Synced catalog entries: $CATALOG_COUNT"
        if [ "$CATALOG_COUNT" -lt 1 ]; then
          echo "ERROR: No catalogs synced"
          exit 1
        fi
      credentials:
      - mount_path: /var/run/secrets/ci-pull-credentials
        name: ci-pull-credentials
        namespace: ci
      from: mirror-gui
      resources:
        requests:
          cpu: 100m
          memory: 200Mi
zz_generated_metadata:
  branch: main
  org: openshift
  repo: mirror-gui
  variant: catalog-sync
