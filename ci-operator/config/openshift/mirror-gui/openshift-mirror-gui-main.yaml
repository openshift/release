build_root:
  from_repository: true
images:
  items:
  - dockerfile_path: Dockerfile
    to: mirror-gui
promotion:
  to:
  - name: "5.0"
    namespace: ocp
releases:
  initial:
    integration:
      name: "5.0"
      namespace: ocp
  latest:
    integration:
      include_built_images: true
      name: "5.0"
      namespace: ocp
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
test_binary_build_commands: npm ci && npm run build
tests:
- as: lint
  commands: npm run lint
  container:
    from: test-bin
  skip_if_only_changed: ^docs/|\.md$|^(?:.*/)?(?:\.gitignore|OWNERS|LICENSE)$
- as: unit
  commands: npm run test
  container:
    from: test-bin
  skip_if_only_changed: ^docs/|\.md$|^(?:.*/)?(?:\.gitignore|OWNERS|LICENSE)$
- as: audit-catalog
  commands: npx vitest run tests/scripts/auditFetchCatalogs.test.ts
  container:
    from: test-bin
  skip_if_only_changed: ^docs/|\.md$|^(?:.*/)?(?:\.gitignore|OWNERS|LICENSE)$
- as: catalog-integrity
  commands: npx vitest run tests/scripts/catalogDataIntegrity.test.ts
  container:
    from: test-bin
  skip_if_only_changed: ^docs/|\.md$|^(?:.*/)?(?:\.gitignore|OWNERS|LICENSE)$
zz_generated_metadata:
  branch: main
  org: openshift
  repo: mirror-gui
