base_images:
  assisted-image-service:
    name: backplane-5.0
    namespace: edge-infrastructure
    tag: assisted-image-service
  assisted-installer:
    name: backplane-5.0
    namespace: edge-infrastructure
    tag: assisted-installer
  assisted-installer-agent:
    name: backplane-5.0
    namespace: edge-infrastructure
    tag: assisted-installer-agent
  assisted-installer-controller:
    name: backplane-5.0
    namespace: edge-infrastructure
    tag: assisted-installer-controller
  assisted-test-infra:
    name: backplane-5.0
    namespace: edge-infrastructure
    tag: assisted-test-infra
  assisted-test-infra-internal:
    name: backplane-5.0
    namespace: edge-infrastructure
    tag: assisted-test-infra-internal
  dev-scripts:
    name: test
    namespace: ocp-kni
    tag: dev-scripts
build_root:
  from_repository: true
images:
  items:
  - dockerfile_path: ci-images/Dockerfile.base
    to: assisted-service-base
  - dockerfile_path: ci-images/Dockerfile.subsystem
    from: assisted-service-base
    to: assisted-service-subsystem
  - dockerfile_path: Dockerfile.assisted-service
    to: assisted-service
releases:
  latest:
    candidate:
      product: ocp
      stream: nightly
      version: "4.22"
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: subsystem-aws
  cluster_claim:
    architecture: amd64
    cloud: aws
    owner: openshift-ci
    product: ocp
    timeout: 1h0m0s
    version: "4.17"
  run_if_changed: ^(cmd/.*|deploy/.*|hack/.*|internal/.*|pkg/.*|tools/.*|subsystem/.*|Dockerfile\..*|Makefile|go\.mod|go\.sum|swagger.yaml)$
  steps:
    allow_best_effort_post_steps: true
    test:
    - as: subsystem-deploy-and-run
      cli: latest
      commands: |
        export BUILD_TYPE=CI
        export REPORTS=${ARTIFACT_DIR}
        export TARGET=oc
        export PERSISTENT_STORAGE="False"
        export GENERATE_CRD='false'
        unset GOFLAGS
        make ci-deploy-for-subsystem
        oc get pods
        make test
      dependencies:
      - env: SERVICE
        name: assisted-service
      - env: IMAGE_SERVICE
        name: assisted-image-service
      from: assisted-service-subsystem
      resources:
        requests:
          cpu: 100m
          memory: 200Mi
    workflow: generic-claim
- as: subsystem-aws-periodic
  cluster_claim:
    architecture: amd64
    cloud: aws
    owner: openshift-ci
    product: ocp
    timeout: 1h0m0s
    version: "4.17"
  cron: 0 22 * * 0-5
  steps:
    allow_best_effort_post_steps: true
    test:
    - as: subsystem-deploy-and-run
      cli: latest
      commands: |
        export BUILD_TYPE=CI
        export REPORTS=${ARTIFACT_DIR}
        export TARGET=oc
        export PERSISTENT_STORAGE="False"
        export GENERATE_CRD='false'
        unset GOFLAGS
        make ci-deploy-for-subsystem
        oc get pods
        make test
      dependencies:
      - env: SERVICE
        name: assisted-service
      - env: IMAGE_SERVICE
        name: assisted-image-service
      from: assisted-service-subsystem
      resources:
        requests:
          cpu: 100m
          memory: 200Mi
    workflow: generic-claim
- as: subsystem-kubeapi-aws
  cluster_claim:
    architecture: amd64
    cloud: aws
