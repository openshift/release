base_images:
  base-machine:
    name: centos
    namespace: openshift
    tag: stream9
  rhel-coreos-base:
    name: "5.0"
    namespace: ocp
    tag: rhel-coreos
  rhel-coreos-base-10:
    name: "5.0"
    namespace: ocp
    tag: rhel-coreos-10
build_root:
  image_stream_tag:
    name: release
    namespace: openshift
    tag: rhel-9-release-golang-1.25-openshift-4.23
images:
  items:
  - dockerfile_literal: |
      # We want to test the PR using the code from it. Now, this repo ships RPMs
      # which are normally part of RHCOS. We need to make sure that RHCOS itself
      # is updated with the freshly built RPMs from the PR run. To do this, we do a
      # multi-stage build: the first stage downloads the RPMs that were just built
      # (the `base-machine-with-rpms` contains the RPMs), and the second stage
      # installs the RPMs into RHCOS (this uses the fact that RHCOS is now a native
      # bootable container).
      # See also: https://github.com/openshift/enhancements/blob/master/enhancements/ocp-coreos-layering/ocp-coreos-layering.md
      FROM quay.io/centos/centos:stream9 as build
      # Sadly rpm-ostree in rhel8 right now doesn't support e.g. `rpm-ostree upgrade openshift-hyperkube`
      # in a container https://github.com/coreos/rpm-ostree/issues/4034
      RUN ls -al /etc/yum.repos.d && dnf -y install dnf-utils && dnf --disablerepo='*' --enablerepo=built download cri-o
      # See also https://issues.redhat.com/browse/ART-4352
      FROM registry.ci.openshift.org/rhcos-devel/rhel-coreos
      COPY --from=build /*.rpm /
      # Also delete leftover RPM files; see https://issues.redhat.com/browse/OCPBUGS-6505.
      RUN rpm -Uvh --oldpackage /*.rpm && rm -vf /*.rpm /usr/share/rpm/__db.* /usr/share/rpm/.*.lock
    inputs:
      base-machine-with-rpms:
        as:
        - quay.io/centos/centos:stream9
      rhel-coreos-base:
        as:
        - registry.ci.openshift.org/rhcos-devel/rhel-coreos
    to: rhel-coreos
  - dockerfile_literal: |
      FROM quay.io/centos/centos:stream9 as build
      # Sadly rpm-ostree in rhel8 right now doesn't support e.g. `rpm-ostree upgrade openshift-hyperkube`
      # in a container https://github.com/coreos/rpm-ostree/issues/4034
      RUN ls -al /etc/yum.repos.d && dnf -y install dnf-utils && dnf --disablerepo='*' --enablerepo=built download cri-o
      FROM registry.ci.openshift.org/rhcos-devel/rhel-coreos-10
      COPY --from=build /*.rpm /
      # Also delete leftover RPM files; see https://issues.redhat.com/browse/OCPBUGS-6505.
      RUN rpm -Uvh --oldpackage /*.rpm && rm -vf /*.rpm /usr/share/rpm/__db.* /usr/share/rpm/.*.lock
    inputs:
      base-machine-with-rpms:
        as:
        - quay.io/centos/centos:stream9
      rhel-coreos-base-10:
        as:
        - registry.ci.openshift.org/rhcos-devel/rhel-coreos-10
    to: rhel-coreos-10
promotion:
  to:
  - additional_images:
      cri-o-rpms: rpms
    excluded_images:
    - rhel-coreos
    - rhel-coreos-10
    name: "5.0"
    namespace: ocp
raw_steps:
- rpm_image_injection_step:
    from: base-machine
    to: base-machine-with-rpms
releases:
  initial:
    integration:
      name: "5.0"
      namespace: ocp
  latest:
    integration:
      include_built_images: true
      name: "5.0"
      namespace: ocp
resources:
  '*':
    requests:
      cpu: 100m
      memory: 4Gi
rpm_build_commands: hack/build-rpms.sh
rpm_build_location: _output/local/releases/rpms
tests:
- as: e2e-aws-ovn
  skip_if_only_changed: ^(?:docs|tutorials|logo|\.github)/|\.md$|^(?:\.gitignore|OWNERS|OWNERS_ALIASES|SECURITY_CONTACTS|PROJECT|LICENSE)$
  steps:
    cluster_profile: openshift-org-aws
    workflow: openshift-e2e-aws
- as: e2e-gcp-ovn
  skip_if_only_changed: ^(?:docs|tutorials|logo|\.github)/|\.md$|^(?:\.gitignore|OWNERS|OWNERS_ALIASES|SECURITY_CONTACTS|PROJECT|LICENSE)$
  steps:
    cluster_profile: openshift-org-gcp
    workflow: openshift-e2e-gcp
- as: perfscale-control-plane-6nodes
  optional: true
  skip_if_only_changed: ^(?:docs|tutorials|logo|test|contrib|scripts|\.github)/|\.md$|^(?:\.gitignore|OWNERS|OWNERS_ALIASES|SECURITY_CONTACTS|PROJECT|LICENSE)$
  steps:
    allow_skip_on_success: true
    cluster_profile: aws-perfscale-qe
    env:
      ADDITIONAL_WORKER_NODES: "3"
      BASE_DOMAIN: qe.devcluster.openshift.com
      CD_V2_EXTRA_FLAGS: --churn-duration=20m --pod-ready-threshold=20s --service-latency
      CDV2_ITERATION_MULTIPLIER: "15"
      ENABLE_LAYER_3: "false"
      ENABLE_LOCAL_INDEX: "true"
      ES_TYPE: qe
      IGNORE_JOB_ITERATIONS: "true"
      KB_FLAGS: --local-indexing
      ND_CNI_EXTRA_FLAGS: --churn-mode=objects --churn-delay=1m --churn-percent=50
        --churn-cycles=2
      ND_EXTRA_FLAGS: --churn-mode=objects --churn-delay=1m --churn-percent=50 --churn-cycles=2
      OUTPUT_FORMAT: JUNIT
      RUN_ORION: deferred
      UDN_ITERATION_MULTIPLIER: "12"
      VERSION: "5.0"
      ZONES_COUNT: "3"
    test:
    - ref: openshift-qe-workers-scale
    - chain: openshift-qe-control-plane
    - chain: openshift-qe-orion-consolidated
    workflow: openshift-qe-installer-aws
zz_generated_metadata:
  branch: main
  org: openshift
  repo: cri-o
