base_images:
  cli-operator-sdk:
    name: cli-operator-sdk
    namespace: ocp
    tag: v1.39.2
build_root:
  image_stream_tag:
    name: builder
    namespace: konveyor
    tag: ubi9-v1.23
images:
  items:
  - dockerfile_path: Dockerfile
    to: oadp-operator-1.3
  - dockerfile_path: build/ci-Dockerfile
    to: test-oadp-operator-1.3
operator:
  bundles:
  - as: oadp-operator-bundle
    dockerfile_path: build/Dockerfile.bundle
    skip_building_index: true
  substitutions:
  - pullspec: quay.io/konveyor/oadp-operator:oadp-1.3
    with: oadp-operator-1.3
releases:
  latest:
    release:
      channel: fast
      version: "4.15"
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 1000m
      memory: 512Mi
tests:
- always_run: false
  as: e2e-test-aws
  run_if_changed: .+\.go|go\.(\bmod\b|\bsum\b)|Makefile|Dockerfile|.dockerignore|.*\.ya{0,1}ml|build/.+|.sh
  steps:
    cluster_profile: openshift-org-aws
    dependencies:
      OO_BUNDLE: oadp-operator-bundle
    env:
      OO_INSTALL_MODE: OwnNamespace
      OO_INSTALL_NAMESPACE: openshift-adp
    test:
    - as: e2e
      cli: latest
      commands: make test-e2e
      credentials:
      - mount_path: /var/run/oadp-credentials
        name: oadp-credentials
        namespace: test-credentials
      from: test-oadp-operator-1.3
      resources:
        requests:
          cpu: 1000m
          memory: 512Mi
    workflow: optional-operators-ci-operator-sdk-aws
- as: e2e-test-aws-periodic
  cron: 0 4 * * *
  reporter_config:
    channel: '#oadp-cicd'
    job_states_to_report:
    - failure
    - error
    report_template: '{{if eq .Status.State "success"}} :rainbow: Job *{{.Spec.Job}}*
      ended with *{{.Status.State}}*. <{{.Status.URL}}|View logs> :rainbow: {{else}}
      :alert-siren: Job *{{.Spec.Job}}* ended with *{{.Status.State}}*. <{{.Status.URL}}|View
      logs> :alert-siren: {{end}}'
  steps:
    cluster_profile: openshift-org-aws
    dependencies:
      OO_BUNDLE: oadp-operator-bundle
    env:
      OO_INSTALL_MODE: OwnNamespace
      OO_INSTALL_NAMESPACE: openshift-adp
    test:
    - as: e2e
      cli: latest
      commands: make test-e2e
      credentials:
      - mount_path: /var/run/oadp-credentials
        name: oadp-credentials
        namespace: test-credentials
      from: test-oadp-operator-1.3
      resources:
        requests:
          cpu: 1000m
          memory: 512Mi
    workflow: optional-operators-ci-operator-sdk-aws
zz_generated_metadata:
  branch: oadp-1.3
  org: openshift
  repo: oadp-operator
  variant: "4.15"
