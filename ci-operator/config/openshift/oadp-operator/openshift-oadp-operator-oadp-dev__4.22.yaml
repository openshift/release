base_images:
  tls-scanner-tool:
    name: "4.22"
    namespace: ocp
    tag: tls-scanner-tool
build_root:
  image_stream_tag:
    name: builder
    namespace: konveyor
    tag: ubi9-v1.24
images:
  items:
  - dockerfile_literal: |
      FROM quay.io/operator-framework/upstream-opm-builder:latest AS builder
      COPY manifests/ /tmp/bundle/manifests/
      COPY metadata/ /tmp/bundle/metadata/
      RUN mkdir -p /configs/oadp-operator && \
          opm render /tmp/bundle -o yaml > /configs/oadp-operator/index.yaml && \
          opm validate /configs/oadp-operator
      FROM quay.io/operator-framework/opm:latest
      COPY --from=builder /configs /configs
      EXPOSE 50051
      ENTRYPOINT ["/bin/opm", "serve", "/configs"]
    inputs:
      oadp-operator-bundle:
        paths:
        - destination_dir: .
          source_path: /manifests
        - destination_dir: .
          source_path: /metadata
    to: oadp-operator-catalog
  - dockerfile_path: Dockerfile
    to: oadp-operator
  - dockerfile_path: build/ci-Dockerfile
    to: test-oadp-operator
operator:
  bundles:
  - as: oadp-operator-bundle
    dockerfile_path: build/Dockerfile.bundle
    skip_building_index: true
  substitutions:
  - pullspec: quay.io/konveyor/oadp-operator:latest
    with: oadp-operator
releases:
  latest:
    candidate:
      product: ocp
      stream: nightly
      version: "4.22"
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 1000m
      memory: 512Mi
tests:
- always_run: false
  as: e2e-test-cli-aws
  run_if_changed: .+\.go|go\.(\bmod\b|\bsum\b)|Makefile|Dockerfile|.dockerignore|.*\.ya{0,1}ml|build/.+|.sh
  steps:
    cluster_profile: openshift-org-aws
    dependencies:
      OO_INDEX: oadp-operator-catalog
    env:
      FEATURE_SET: TechPreviewNoUpgrade
      OO_CHANNEL: dev
      OO_INSTALL_NAMESPACE: openshift-adp
      OO_PACKAGE: oadp-operator
      OO_TARGET_NAMESPACES: '!install'
    test:
    - as: e2e
      cli: latest
      commands: make TEST_CLI=true test-e2e
      credentials:
      - mount_path: /var/run/oadp-credentials
        name: oadp-credentials
        namespace: test-credentials
      from: test-oadp-operator
      resources:
        requests:
          cpu: 1000m
          memory: 512Mi
    workflow: optional-operators-ci-aws
- always_run: false
  as: e2e-test-aws
  run_if_changed: .+\.go|go\.(\bmod\b|\bsum\b)|Makefile|Dockerfile|.dockerignore|.*\.ya{0,1}ml|build/.+|.sh
  steps:
    cluster_profile: openshift-org-aws
    dependencies:
      OO_INDEX: oadp-operator-catalog
    env:
      FEATURE_SET: TechPreviewNoUpgrade
      OO_CHANNEL: dev
      OO_INSTALL_NAMESPACE: openshift-adp
      OO_PACKAGE: oadp-operator
      OO_TARGET_NAMESPACES: '!install'
    test:
    - as: e2e
      cli: latest
      commands: make test-e2e
      credentials:
      - mount_path: /var/run/oadp-credentials
        name: oadp-credentials
        namespace: test-credentials
      from: test-oadp-operator
      resources:
        requests:
          cpu: 1000m
          memory: 512Mi
    workflow: optional-operators-ci-aws
- as: e2e-test-aws-periodic
  cron: 0 4 * * *
  reporter_config:
    channel: '#oadp-cicd'
    job_states_to_report:
    - failure
    - error
    report_template: '{{if eq .Status.State "success"}} :rainbow: Job *{{.Spec.Job}}*
      ended with *{{.Status.State}}*. <{{.Status.URL}}|View logs> :rainbow: {{else}}
      :alert-siren: Job *{{.Spec.Job}}* ended with *{{.Status.State}}*. <{{.Status.URL}}|View
      logs> :alert-siren: {{end}}'
  steps:
    cluster_profile: openshift-org-aws
    dependencies:
      OO_INDEX: oadp-operator-catalog
    env:
      FEATURE_SET: TechPreviewNoUpgrade
      OO_CHANNEL: dev
      OO_INSTALL_NAMESPACE: openshift-adp
      OO_PACKAGE: oadp-operator
      OO_TARGET_NAMESPACES: '!install'
    test:
    - as: e2e
      cli: latest
      commands: make test-e2e
      credentials:
      - mount_path: /var/run/oadp-credentials
        name: oadp-credentials
        namespace: test-credentials
      from: test-oadp-operator
      resources:
        requests:
          cpu: 1000m
          memory: 512Mi
    workflow: optional-operators-ci-aws
- as: e2e-test-cli-aws-periodic
  cron: 0 2 * * *
  steps:
    cluster_profile: openshift-org-aws
    dependencies:
      OO_INDEX: oadp-operator-catalog
    env:
      FEATURE_SET: TechPreviewNoUpgrade
      OO_CHANNEL: dev
      OO_INSTALL_NAMESPACE: openshift-adp
      OO_PACKAGE: oadp-operator
      OO_TARGET_NAMESPACES: '!install'
    test:
    - as: e2e
      cli: latest
      commands: make TEST_CLI=true test-e2e
      credentials:
      - mount_path: /var/run/oadp-credentials
        name: oadp-credentials
        namespace: test-credentials
      from: test-oadp-operator
      resources:
        requests:
          cpu: 1000m
          memory: 512Mi
    workflow: optional-operators-ci-aws
- always_run: false
  as: tls-pqc-readiness
  optional: true
  steps:
    cluster_profile: openshift-org-aws
    dependencies:
      OO_INDEX: ci-index
    env:
      OO_CHANNEL: dev
      OO_INSTALL_NAMESPACE: openshift-adp
      OO_PACKAGE: oadp-operator
      OO_TARGET_NAMESPACES: '!install'
      PQC_CHECK: "true"
      SCAN_NAMESPACE: openshift-adp
      SCANNER_CPU: "2"
    test:
    - ref: tls-13
    - ref: tls-scanner-run
    workflow: optional-operators-ci-aws
- as: tls-pqc-readiness-periodic
  cron: 0 6 * * 1
  steps:
    cluster_profile: openshift-org-aws
    dependencies:
      OO_INDEX: ci-index
    env:
      OO_CHANNEL: dev
      OO_INSTALL_NAMESPACE: openshift-adp
      OO_PACKAGE: oadp-operator
      OO_TARGET_NAMESPACES: '!install'
      PQC_CHECK: "true"
      SCAN_NAMESPACE: openshift-adp
      SCANNER_CPU: "2"
    test:
    - ref: tls-13
    - ref: tls-scanner-run
    workflow: optional-operators-ci-aws
- always_run: false
  as: tls13-adherence
  optional: true
  steps:
    cluster_profile: openshift-org-aws
    dependencies:
      OO_INDEX: ci-index
    env:
      OO_CHANNEL: dev
      OO_INSTALL_NAMESPACE: openshift-adp
      OO_PACKAGE: oadp-operator
      OO_TARGET_NAMESPACES: '!install'
      PQC_CHECK: "false"
      SCAN_NAMESPACE: openshift-adp
      SCANNER_CPU: "2"
      TLS_13_ENABLE_TLS_ADHERENCE: "true"
      TLS_13_TLS_ADHERENCE_POLICY: StrictAllComponents
    test:
    - ref: tls-13
    - ref: tls-scanner-run
    workflow: optional-operators-ci-aws
- as: tls13-adherence-periodic
  cron: 0 6 * * 1
  steps:
    cluster_profile: openshift-org-aws
    dependencies:
      OO_INDEX: ci-index
    env:
      OO_CHANNEL: dev
      OO_INSTALL_NAMESPACE: openshift-adp
      OO_PACKAGE: oadp-operator
      OO_TARGET_NAMESPACES: '!install'
      PQC_CHECK: "false"
      SCAN_NAMESPACE: openshift-adp
      SCANNER_CPU: "2"
      TLS_13_ENABLE_TLS_ADHERENCE: "true"
      TLS_13_TLS_ADHERENCE_POLICY: StrictAllComponents
    test:
    - ref: tls-13
    - ref: tls-scanner-run
    workflow: optional-operators-ci-aws
zz_generated_metadata:
  branch: oadp-dev
  org: openshift
  repo: oadp-operator
  variant: "4.22"
