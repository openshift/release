build_root:
  image_stream_tag:
    name: builder
    namespace: konveyor
    tag: ubi9-v1.25
images:
  items:
  - dockerfile_path: Dockerfile
    to: oadp-operator-1.6
  - dockerfile_path: build/ci-Dockerfile
    to: test-oadp-operator-1.6
operator:
  bundles:
  - dockerfile_path: build/Dockerfile.bundle
  substitutions:
  - pullspec: quay.io/konveyor/oadp-operator:oadp-1.6
    with: oadp-operator-1.6
releases:
  latest:
    candidate:
      product: ocp
      stream: nightly
      version: "4.18"
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 1000m
      memory: 512Mi
tests:
- as: e2e-test-hcp-aws-periodic
  cron: 0 5 * * *
  steps:
    cluster_profile: openshift-org-aws
    dependencies:
      OO_INDEX: ci-index
    env:
      OO_CHANNEL: stable
      OO_INSTALL_NAMESPACE: openshift-adp
      OO_PACKAGE: oadp-operator
      OO_TARGET_NAMESPACES: '!install'
    test:
    - as: e2e
      cli: latest
      commands: make TEST_HCP=true test-e2e
      credentials:
      - mount_path: /var/run/oadp-credentials
        name: oadp-credentials
        namespace: test-credentials
      from: test-oadp-operator-1.6
      resources:
        requests:
          cpu: 1000m
          memory: 512Mi
    workflow: optional-operators-ci-aws
zz_generated_metadata:
  branch: oadp-1.6
  org: openshift
  repo: oadp-operator
  variant: "4.18"
