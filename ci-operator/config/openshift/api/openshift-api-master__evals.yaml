base_images:
  claude-ai-helpers:
    name: claude-ai-helpers
    namespace: ci
    tag: latest
build_root:
  image_stream_tag:
    name: release
    namespace: openshift
    tag: rhel-9-release-golang-1.24-openshift-4.22
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- always_run: false
  as: eval
  optional: true
  run_if_changed: ^(\.claude/skills/api-review/|tests/eval/|tests/Makefile)
  steps:
    env:
      EVAL_GOLDEN_MODEL: claude-sonnet-4-6
      EVAL_INTEGRATION_MODEL: claude-opus-4-6
      EVAL_JUDGE_MODEL: claude-haiku-4-5
      EVAL_RUNS: "5"
      EVAL_SKIP_LINT: "1"
    workflow: openshift-api-eval
- as: eval-periodic
  cron: 17 8 * * *
  steps:
    env:
      EVAL_GOLDEN_MODEL: claude-sonnet-4-6
      EVAL_INTEGRATION_MODEL: claude-opus-4-6
      EVAL_JUDGE_MODEL: claude-haiku-4-5
      EVAL_RUNS: "5"
      EVAL_SKIP_LINT: "1"
    workflow: openshift-api-eval
zz_generated_metadata:
  branch: master
  org: openshift
  repo: api
  variant: evals
