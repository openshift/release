base_images:
  cli:
    name: "4.16"
    namespace: ocp
    tag: cli
  operator-sdk:
    name: cli-operator-sdk
    namespace: ocp
    tag: v1.39.2
build_root:
  image_stream_tag:
    name: builder
    namespace: ocp
    tag: rhel-9-golang-1.25-openshift-4.22
canonical_go_repository: github.com/open-telemetry/opentelemetry-operator
images:
  items:
  - context_dir: .
    dockerfile_path: ./tests/e2e-openshift/Dockerfile
    to: obs-tests-runner
releases:
  latest:
    release:
      channel: stable
      version: "4.16"
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: opentelemetry-stage-tests
  cron: 0 0 30 2 *
  reporter_config:
    channel: '#distributed-tracing-qe'
    job_states_to_report:
    - success
    - failure
    - error
    report_template: '{{if eq .Status.State "success"}} :slack-green: Job *{{.Spec.Job}}*
      ended with *{{.Status.State}}*. <{{.Status.URL}}|View logs> {{else}} :failed:
      Job *{{.Spec.Job}}* ended with *{{.Status.State}}*. <{{.Status.URL}}|View logs>
      {{end}}'
  steps:
    env:
      AGENT_SKILL_URL: https://raw.githubusercontent.com/openshift/distributed-tracing-qe/main/plugins/qe-agent/skills/SKILL.md
      MULTISTAGE_PARAM_OVERRIDE_OTEL_INDEX_IMAGE: quay.io/redhat-user-workloads/rhosdt-tenant/otel/opentelemetry-bundle@sha256:35ea32f1d12e6abfce4be19e3a69589ed8d777f6a606aa29a898a6c9c634b581
      MULTISTAGE_PARAM_OVERRIDE_OTEL_TESTS_BRANCH: rhosdt-3.10
      OPERATORS: |
        [
            {"name": "tempo-product", "source": "redhat-operators", "channel": "stable", "install_namespace": "openshift-tempo-operator", "target_namespaces": "", "operator_group": "openshift-tempo-operator"},
            {"name": "amq-streams", "source": "redhat-operators", "channel": "stable", "install_namespace": "openshift-operators", "target_namespaces": ""},
            {"name": "cluster-observability-operator", "source": "redhat-operators", "channel": "stable", "install_namespace": "openshift-operators", "target_namespaces": ""},
            {"name": "loki-operator", "source": "redhat-operators", "channel": "stable-6.1", "install_namespace": "openshift-operators-redhat","target_namespaces": "", "operator_group": "openshift-operators-redhat"},
            {"name": "cluster-logging", "source": "redhat-operators", "channel": "stable-6.1", "install_namespace": "openshift-logging","target_namespaces": "", "operator_group": "openshift-logging"}
        ]
      SKIP_TESTS: tests/e2e-targetallocator/targetallocator-features tests/e2e-multi-instrumentation/instrumentation-multi-multicontainer
        tests/e2e-instrumentation/instrumentation-nodejs* tests/e2e-instrumentation/instrumentation-nginx*
        tests/e2e-instrumentation/instrumentation-dotnet* tests/e2e-instrumentation/instrumentation-apache*
        tests/e2e-instrumentation/instrumentation-go tests/e2e-multi-instrumentation/instrumentation-single-instr-first-container
        tests/e2e-multi-instrumentation/instrumentation-multi-multicontainer tests/e2e-otel/oidcauthextension
        tests/e2e-openshift/route tests/e2e/smoke-ip-families tests/e2e-openshift/export-to-cluster-logging-lokistack
        tests/e2e-targetallocator/targetallocator-prometheuscr tests/e2e-otel/*aws*
        tests/e2e-openshift/must-gather tests/e2e-otel/google*
    post:
    - ref: openshift-observability-qe-agent
    - ref: openshift-observability-ibm-z-cluster-destroy
    test:
    - as: install-opentelemetry-operator
      cli: latest
      commands: |
        if [[ -z "${MULTISTAGE_PARAM_OVERRIDE_OTEL_INDEX_IMAGE:-}" ]]; then
          echo "ERROR: MULTISTAGE_PARAM_OVERRIDE_OTEL_INDEX_IMAGE is not set. Provide it via steps.env in the job config or via Gangway API pod_spec_options."
          exit 1
        fi
        oc create -f https://raw.githubusercontent.com/openshift/distributed-tracing-qe/refs/heads/main/resources/otel-icsp.yaml
        oc create namespace opentelemetry-operator-system
        oc label namespace opentelemetry-operator-system openshift.io/cluster-monitoring="true"
        cd /tmp && operator-sdk run bundle --timeout=5m --security-context-config restricted -n opentelemetry-operator-system "$MULTISTAGE_PARAM_OVERRIDE_OTEL_INDEX_IMAGE"
        oc wait --for condition=Available -n opentelemetry-operator-system deployment opentelemetry-operator-controller-manager
      env:
      - default: ""
        name: MULTISTAGE_PARAM_OVERRIDE_OTEL_INDEX_IMAGE
      from: operator-sdk
      resources:
        requests:
          cpu: 1000m
          memory: 400Mi
    - ref: install-operators
    - ref: distributed-tracing-tests-opentelemetry-stage
    workflow: openshift-observability-ibm-z
zz_generated_metadata:
  branch: main
  org: openshift
  repo: open-telemetry-opentelemetry-operator
  variant: opentelemetry-product-ocp-4.16-ibm-z-stage
