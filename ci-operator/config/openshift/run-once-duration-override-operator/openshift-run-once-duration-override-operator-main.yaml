build_root:
  from_repository: true
images:
  items:
  - dockerfile_path: Dockerfile.rhel7
    to: run-once-duration-override-operator
promotion:
  to:
  - name: "5.0"
    namespace: ocp
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tag_specification:
  name: "5.0"
  namespace: ocp
tests:
- as: verify
  commands: make verify-gofmt
  container:
    from: src
- as: unit
  commands: make test-unit
  container:
    from: src
- as: e2e-aws-operator
  steps:
    cluster_profile: openshift-org-aws
    test:
    - as: test
      cli: latest
      commands: make test-e2e
      from: src
      resources:
        requests:
          cpu: 100m
    workflow: ipi-aws
- always_run: false
  as: e2e-aws-operator-serial-ote
  optional: true
  skip_if_only_changed: ^\.tekton/|bundle.Dockerfile|\.md$|^(LICENSE|OWNERS)$
  steps:
    cluster_profile: openshift-org-aws
    dependencies:
      EXTENSION_IMAGE: run-once-duration-override-operator
    env:
      EXTENSION_BINARY_PATH: /usr/bin/run-once-duration-override-operator-tests-ext.gz
      EXTENSION_COMPONENT_NAME: run-once-duration-override-operator
      FIPS_ENABLED: "true"
      TEST_SUITE: openshift/run-once-duration-override-operator/operator/serial
    pre:
    - chain: ipi-aws-pre
    - ref: fips-check
    test:
    - ref: openshift-tests-extension-setup-out-of-payload
    - ref: openshift-e2e-test
    workflow: ipi-aws
zz_generated_metadata:
  branch: main
  org: openshift
  repo: run-once-duration-override-operator
