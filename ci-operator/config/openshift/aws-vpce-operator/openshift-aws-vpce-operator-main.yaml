build_root:
  from_repository: true
images:
  items:
  - dockerfile_path: build/Dockerfile
    to: aws-vpce-operator
  - dockerfile_path: test/e2e/Containerfile.prow
    to: operator-e2e
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: e2e-binary-build-success
  commands: |
    make e2e-binary-build
  container:
    from: src
  run_if_changed: ^(test/e2e/.*|go\.mod|go\.sum)$
- as: coverage
  commands: |
    export CODECOV_TOKEN=$(cat /tmp/secret/CODECOV_TOKEN)
    make coverage
  container:
    from: src
  secret:
    mount_path: /tmp/secret
    name: aws-vpce-operator-codecov-token
  skip_if_only_changed: ^(?:\.tekton|\.github)|\.md$|^(?:\.gitignore|OWNERS|LICENSE)$
- as: publish-coverage
  commands: |
    export CODECOV_TOKEN=$(cat /tmp/secret/CODECOV_TOKEN)
    make coverage
  container:
    from: src
  postsubmit: true
  secret:
    mount_path: /tmp/secret
    name: aws-vpce-operator-codecov-token
- as: lint
  commands: make lint
  container:
    from: src
  skip_if_only_changed: ^(?:\.tekton|\.github)|\.md$|^(?:\.gitignore|OWNERS|LICENSE)$
- as: test
  commands: make test
  container:
    from: src
  skip_if_only_changed: ^(?:\.tekton|\.github)|\.md$|^(?:\.gitignore|OWNERS|LICENSE)$
- as: validate
  commands: make validate
  container:
    from: src
  skip_if_only_changed: ^(?:\.tekton|\.github)|\.md$|^(?:\.gitignore|OWNERS|LICENSE)$
- as: avo-e2e-presubmit
  run_if_changed: ^(test/e2e/.*|pkg/.*|api/.*|cmd/.*|deploy/.*|go\.mod|go\.sum)$
  steps:
    cluster_profile: rosa-e2e-01
    env:
      CHANNEL_GROUP: stable
      OCM_LOGIN_ENV: staging
      OPERATOR_IMAGE: quay.io/redhat-services-prod/openshift/aws-vpce-operator:latest
      OPERATOR_NAME: aws-vpce-operator
      OPERATOR_PKO_IMAGE: quay.io/redhat-services-prod/openshift/aws-vpce-operator-pko:latest
    workflow: rosa-operator-e2e-workflow
- as: avo-e2e-postsubmit
  postsubmit: true
  steps:
    cluster_profile: rosa-e2e-01
    env:
      CHANNEL_GROUP: stable
      OCM_LOGIN_ENV: staging
      OPERATOR_IMAGE: quay.io/redhat-services-prod/openshift/aws-vpce-operator:latest
      OPERATOR_NAME: aws-vpce-operator
      OPERATOR_PKO_IMAGE: quay.io/redhat-services-prod/openshift/aws-vpce-operator-pko:latest
    workflow: rosa-operator-e2e-workflow
zz_generated_metadata:
  branch: main
  org: openshift
  repo: aws-vpce-operator
