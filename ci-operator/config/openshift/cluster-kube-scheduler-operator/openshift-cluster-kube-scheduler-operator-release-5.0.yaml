binary_build_commands: make build --warn-undefined-variables
build_root:
  from_repository: true
images:
  items:
  - dockerfile_path: Dockerfile.ocp
    to: cluster-kube-scheduler-operator
promotion:
  to:
  - disabled: true
    name: "5.0"
    namespace: ocp
releases:
  initial:
    integration:
      name: "5.0"
      namespace: ocp
  latest:
    integration:
      include_built_images: true
      name: "5.0"
      namespace: ocp
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
test_binary_build_commands: make build GO_BUILD_FLAGS:='-race' --warn-undefined-variables
tests:
- as: unit
  commands: make test-unit --warn-undefined-variables
  container:
    from: test-bin
- as: e2e-aws-ovn
  steps:
    cluster_profile: openshift-org-aws
    workflow: openshift-e2e-aws
- as: e2e-aws-operator
  steps:
    cluster_profile: openshift-org-aws
    test:
    - as: test
      cli: latest
      commands: make e2e
      from: src
      resources:
        requests:
          cpu: 100m
    workflow: ipi-aws
- as: e2e-aws-operator-preferred-host
  steps:
    cluster_profile: openshift-org-aws
    test:
    - as: test
      cli: latest
      commands: |
        make test-e2e-preferred-host JUNITFILE=${ARTIFACT_DIR}/junit_report.xml
      from: src
      resources:
        requests:
          cpu: 100m
    workflow: ipi-aws
- as: verify
  commands: |
    make verify -k --warn-undefined-variables
  container:
    from: src
- as: verify-deps
  commands: |
    make verify-deps -k --warn-undefined-variables
  container:
    from: src
- as: e2e-aws-ovn-serial
  shard_count: 2
  steps:
    cluster_profile: openshift-org-aws
    workflow: openshift-e2e-aws-serial
- as: e2e-aws-ovn-upgrade
  steps:
    cluster_profile: openshift-org-aws
    workflow: openshift-upgrade-aws
- as: security
  optional: true
  steps:
    workflow: openshift-ci-security
- as: e2e-aws-operator-ote
  steps:
    cluster_profile: openshift-org-aws
    test:
    - ref: cluster-kube-scheduler-operator-e2e-ote
    workflow: ipi-aws
  timeout: 8h0m0s
zz_generated_metadata:
  branch: release-5.0
  org: openshift
  repo: cluster-kube-scheduler-operator
