base_images:
  ocp_4.19_base-rhel9:
    name: "4.20"
    namespace: ocp
    tag: base-rhel9
  ocp_builder_rhel-9-golang-1.23-openshift-4.19:
    name: builder
    namespace: ocp
    tag: rhel-9-golang-1.23-openshift-4.19
build_root:
  from_repository: true
images:
- dockerfile_path: openshift/Dockerfile
  inputs:
    ocp_4.19_base-rhel9:
      as:
      - registry.ci.openshift.org/ocp/4.19:base-rhel9
    ocp_builder_rhel-9-golang-1.23-openshift-4.19:
      as:
      - registry.ci.openshift.org/ocp/builder:rhel-9-golang-1.23-openshift-4.19
  to: openshift-ansible-operator-plugins
- dockerfile_path: openshift/ci/dockerfiles/ansible-e2e.Dockerfile
  from: openshift-ansible-operator-plugins
  to: ansible-operator-e2e
- dockerfile_literal: |
    FROM registry.ci.openshift.org/ocp/4.19:base-rhel9

    RUN set -e && dnf clean all && rm -rf /var/cache/dnf/* \
      && dnf update -y \
      && dnf install -y python3.12-devel \
      && pushd /usr/local/bin && ln -sf ../../bin/python3.12 python3 && popd \
      && python3 -m ensurepip --upgrade

    COPY ./openshift/release/ansible/requirements.yml ./
    COPY ./openshift/release/ansible/update-collections.sh ./
    COPY ./images/ansible-operator/Pipfile* ./

    RUN python3 -m pip install --upgrade pip

    RUN python3 -m pip install pipenv==2023.11.15 \
        && python3 -m pip install pip-tools \
        && pipenv install --deploy \
        && pipenv run ./update-collections.sh
  to: build-collections
- dockerfile_literal: |
    FROM build-collections AS builder

    FROM src
    RUN rm -r openshift/release/ansible/ansible_collections
    COPY --from=builder ansible_collections/ openshift/release/ansible/ansible_collections/
  from: src
  inputs:
    build-collections:
      as:
      - build-collections
  to: get-collections
promotion:
  to:
  - name: "4.20"
    namespace: ocp
releases:
  initial:
    integration:
      name: "4.20"
      namespace: ocp
  latest:
    integration:
      include_built_images: true
      name: "4.20"
      namespace: ocp
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: unit
  commands: |
    # Set $HOME for sufficient permission
    HOME=/tmp make test-unit
  container:
    from: src
- as: sanity
  commands: |
    # Set $HOME for golangci-lint cache
    HOME=/tmp make test-sanity
  container:
    from: src
- as: e2e-ansible
  steps:
    cluster_profile: gcp
    test:
    - as: test
      cli: latest
      commands: make -f openshift/Makefile test-e2e-ansible
      dependencies:
      - env: IMAGE_FORMAT
        name: ansible-operator-e2e
      from: src
      resources:
        requests:
          cpu: 100m
    workflow: ipi-gcp
- as: verify-deps
  steps:
    env:
      CHECK_MOD_LIST: "false"
    test:
    - ref: go-verify-deps
- as: verify-collections
  commands: |
    git diff --exit-code
  container:
    from: get-collections
zz_generated_metadata:
  branch: main
  org: openshift
  repo: ansible-operator-plugins
