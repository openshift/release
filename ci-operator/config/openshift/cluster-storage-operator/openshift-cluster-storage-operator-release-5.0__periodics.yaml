base_images:
  cluster-storage-operator-test:
    name: "5.0"
    namespace: ocp
    tag: cluster-storage-operator-test
  dev-scripts:
    name: test
    namespace: ocp-kni
    tag: dev-scripts
  upi-installer:
    name: "5.0"
    namespace: ocp
    tag: upi-installer
  vsphere-ci-python:
    name: vsphere-python
    namespace: ci
    tag: latest
build_root:
  from_repository: true
releases:
  initial:
    candidate:
      product: ocp
      stream: nightly
      version: "4.21"
  latest:
    candidate:
      product: ocp
      stream: nightly
      version: "5.0"
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: periodic-e2e-vsphere-ovn-upgrade-check-dev-symlinks
  cron: 26 12 * * *
  reporter_config:
    channel: '#team-ocp-storage-triage'
    job_states_to_report:
    - failure
    - error
    report_template: |
      ':red_jenkins_circle: Job *{{.Spec.Job}}* ended with *{{.Status.State}}*. <{{.Status.URL}}|View logs>'
  steps:
    cluster_profile: vsphere-elastic
    workflow: openshift-upgrade-vsphere-storage-symlinks
- as: periodic-e2e-aws-ovn-upgrade-check-dev-symlinks
  cron: 18 2 * * *
  reporter_config:
    channel: '#team-ocp-storage-triage'
    job_states_to_report:
    - failure
    - error
    report_template: |
      ':red_jenkins_circle: Job *{{.Spec.Job}}* ended with *{{.Status.State}}*. <{{.Status.URL}}|View logs>'
  steps:
    cluster_profile: openshift-org-aws
    workflow: openshift-upgrade-aws-storage-symlinks
- as: periodic-e2e-gcp-ovn-upgrade-check-dev-symlinks
  cron: 33 14 * * *
  reporter_config:
    channel: '#team-ocp-storage-triage'
    job_states_to_report:
    - failure
    - error
    report_template: |
      ':red_jenkins_circle: Job *{{.Spec.Job}}* ended with *{{.Status.State}}*. <{{.Status.URL}}|View logs>'
  steps:
    cluster_profile: openshift-org-gcp
    workflow: openshift-upgrade-gcp-storage-symlinks
- as: periodic-e2e-azure-ovn-upgrade-check-dev-symlinks
  cron: 26 9 * * *
  reporter_config:
    channel: '#team-ocp-storage-triage'
    job_states_to_report:
    - failure
    - error
    report_template: |
      ':red_jenkins_circle: Job *{{.Spec.Job}}* ended with *{{.Status.State}}*. <{{.Status.URL}}|View logs>'
  steps:
    cluster_profile: openshift-org-azure
    env:
      BASE_DOMAIN: ci2.azure.devcluster.openshift.com
      TEST_TYPE: upgrade
    workflow: openshift-upgrade-azure-storage-symlinks
- as: periodic-e2e-baremetal-ipi-ovn-upgrade-check-dev-symlinks
  capabilities:
  - intranet
  cron: 25 3 * * *
  reporter_config:
    channel: '#team-ocp-storage-triage'
    job_states_to_report:
    - failure
    - error
    report_template: |
      ':red_jenkins_circle: Job *{{.Spec.Job}}* ended with *{{.Status.State}}*. <{{.Status.URL}}|View logs>'
  steps:
    cluster_profile: equinix-ocp-metal
    env:
      TEST_TYPE: upgrade
    workflow: baremetalds-e2e-upgrade-ovn-ipv4-storage-symlinks
zz_generated_metadata:
  branch: release-5.0
  org: openshift
  repo: cluster-storage-operator
  variant: periodics
