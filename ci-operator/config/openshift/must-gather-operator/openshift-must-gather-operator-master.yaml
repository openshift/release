base_images:
  base-rhel9:
    name: "5.0"
    namespace: ocp
    tag: base-rhel9
  cli-operator-sdk:
    name: cli-operator-sdk
    namespace: ocp
    tag: v1.39.2
binary_build_commands: make go-build
build_root:
  from_repository: true
images:
  items:
  - dockerfile_literal: |-
      FROM registry.access.redhat.com/ubi9/go-toolset
      USER 0
      RUN dnf install -y git make && \
          dnf install -y 'dnf-command(config-manager)' && \
          dnf config-manager --add-repo https://cli.github.com/packages/rpm/gh-cli.repo && \
          dnf install -y gh python3.11 python3.11-pip && \
          dnf clean all
      WORKDIR /app
      RUN git clone --depth 1 -b ci-monitor https://github.com/PillaiManish/oape-ai-e2e.git /tmp/oape && \
          cp /tmp/oape/agent/requirements.txt . && \
          python3.11 -m pip install --no-cache-dir -r requirements.txt && \
          cp /tmp/oape/agent/agent.py /tmp/oape/agent/main.py /tmp/oape/agent/ci_monitor.py . && \
          mkdir -p /config && \
          printf '{"claude_allowed_tools":["Bash(*)","Read","Write","Edit","Glob","Grep","WebFetch","Task"]}\n' > /config/config.json && \
          cp -r /tmp/oape/plugins /plugins && \
          rm -rf /tmp/oape
      RUN git config --global user.name "openshift-app-platform-shift-bot" && \
          git config --global user.email "267347085+openshift-app-platform-shift-bot@users.noreply.github.com"
      RUN chmod -R g=u /opt/app-root/src
      USER 1001
    to: ci-monitor-agent
  - dockerfile_path: Dockerfile.openshift
    from: base-rhel9
    to: must-gather-operator
operator:
  bundles:
  - as: must-gather-operator-bundle
    context_dir: bundle
    dockerfile_path: bundle.Dockerfile
    skip_building_index: true
  substitutions:
  - pullspec: quay.io/openshift/origin-support-log-gather-operator:latest
    with: pipeline:must-gather-operator
  - pullspec: quay.io/openshift/origin-must-gather:latest
    with: stable:must-gather
promotion:
  to:
  - excluded_images:
    - ci-monitor-agent
    name: "5.0"
    namespace: ocp
releases:
  initial:
    integration:
      name: "5.0"
      namespace: ocp
  latest:
    integration:
      include_built_images: true
      name: "5.0"
      namespace: ocp
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
test_binary_build_commands: make e2e-binary-build
tests:
- as: verify-deps
  steps:
    env:
      CHECK_MOD_LIST: "true"
    test:
    - ref: go-verify-deps
- as: coverage
  commands: |
    export CODECOV_TOKEN=$(cat /tmp/secret/CODECOV_TOKEN)
    make coverage
  container:
    from: src
  secret:
    mount_path: /tmp/secret
    name: must-gather-operator-codecov-token
  skip_if_only_changed: ^(?:\.tekton|\.github)|\.md$|^(?:\.gitignore|OWNERS|LICENSE)$
- as: publish-coverage
  commands: |
    export CODECOV_TOKEN=$(cat /tmp/secret/CODECOV_TOKEN)
    make coverage
  container:
    from: src
  postsubmit: true
  secret:
    mount_path: /tmp/secret
    name: must-gather-operator-codecov-token
- as: lint
  commands: make lint
  container:
    from: src
  skip_if_only_changed: ^(?:\.tekton|\.github)|\.md$|^(?:\.gitignore|OWNERS|LICENSE)$
- as: test
  commands: make test
  container:
    from: src
  skip_if_only_changed: ^(?:\.tekton|\.github)|\.md$|^(?:\.gitignore|OWNERS|LICENSE)$
- as: validate-boilerplate
  commands: make validate
  container:
    from: src
  optional: true
  skip_if_only_changed: ^(?:\.tekton|\.github)|\.md$|^(?:\.gitignore|OWNERS|LICENSE)$
- as: e2e-gcp-operator
  steps:
    cluster_profile: openshift-org-gcp
    dependencies:
      OO_BUNDLE: must-gather-operator-bundle
    env:
      OO_INSTALL_MODE: OwnNamespace
      OO_INSTALL_NAMESPACE: must-gather-operator
    test:
    - as: install
      cli: latest
      commands: |
        oc -n must-gather-operator rollout status deployment must-gather-operator
      dependencies:
      - env: OO_BUNDLE
        name: must-gather-operator-bundle
      from: src
      resources:
        requests:
          cpu: 100m
    - as: test
      cli: latest
      commands: |
        export CASE_MANAGEMENT_CREDS_CONFIG_DIR=/var/run/secrets/must-gather-operator/case-management-creds
        make test-e2e
      credentials:
      - mount_path: /var/run/secrets/must-gather-operator/case-management-creds
        name: case-management-creds
        namespace: test-credentials
      from: src
      resources:
        requests:
          cpu: 100m
    workflow: optional-operators-ci-operator-sdk-gcp
- always_run: false
  as: e2e-gcp-operator-rhcos10-fips
  optional: true
  steps:
    cluster_profile: openshift-org-gcp
    dependencies:
      OO_BUNDLE: must-gather-operator-bundle
    env:
      FEATURE_SET: TechPreviewNoUpgrade
      FIPS_ENABLED: "true"
      OO_INSTALL_MODE: OwnNamespace
      OO_INSTALL_NAMESPACE: must-gather-operator
      OSSTREAM: rhel-10
    test:
    - as: install
      cli: latest
      commands: |
        oc -n must-gather-operator rollout status deployment must-gather-operator
      from: src
      resources:
        requests:
          cpu: 100m
    - ref: fips-check-fips-or-die
    - as: test
      cli: latest
      commands: |
        export CASE_MANAGEMENT_CREDS_CONFIG_DIR=/var/run/secrets/must-gather-operator/case-management-creds
        make test-e2e
      credentials:
      - mount_path: /var/run/secrets/must-gather-operator/case-management-creds
        name: case-management-creds
        namespace: test-credentials
      from: src
      resources:
        requests:
          cpu: 100m
    workflow: optional-operators-ci-operator-sdk-gcp
- always_run: false
  as: e2e-gcp-operator-rhcos10
  optional: true
  steps:
    cluster_profile: openshift-org-gcp
    dependencies:
      OO_BUNDLE: must-gather-operator-bundle
    env:
      FEATURE_SET: TechPreviewNoUpgrade
      OO_INSTALL_MODE: OwnNamespace
      OO_INSTALL_NAMESPACE: must-gather-operator
      OSSTREAM: rhel-10
    test:
    - as: install
      cli: latest
      commands: |
        oc -n must-gather-operator rollout status deployment must-gather-operator
      from: src
      resources:
        requests:
          cpu: 100m
    - as: test
      cli: latest
      commands: |
        export CASE_MANAGEMENT_CREDS_CONFIG_DIR=/var/run/secrets/must-gather-operator/case-management-creds
        make test-e2e
      credentials:
      - mount_path: /var/run/secrets/must-gather-operator/case-management-creds
        name: case-management-creds
        namespace: test-credentials
      from: src
      resources:
        requests:
          cpu: 100m
    workflow: optional-operators-ci-operator-sdk-gcp
- always_run: true
  as: oape-ci-monitor
  optional: true
  steps:
    test:
    - as: monitor
      commands: |
        set -euo pipefail
        APP_ID=$(cat /var/run/github-app/app-id)
        PEM_PATH="/var/run/github-app/private-key.pem"
        HEADER=$(printf '{"alg":"RS256","typ":"JWT"}' | openssl base64 -e -A | tr '+/' '-_' | tr -d '=')
        NOW=$(date +%s); EXP=$((NOW + 300))
        PAYLOAD=$(printf '{"iat":%d,"exp":%d,"iss":"%s"}' "$NOW" "$EXP" "$APP_ID" | openssl base64 -e -A | tr '+/' '-_' | tr -d '=')
        SIGNATURE=$(printf '%s' "${HEADER}.${PAYLOAD}" | openssl dgst -sha256 -sign "$PEM_PATH" -binary | openssl base64 -e -A | tr '+/' '-_' | tr -d '=')
        JWT="${HEADER}.${PAYLOAD}.${SIGNATURE}"
        set +x
        INST_ID=$(curl -sf -H "Authorization: Bearer ${JWT}" -H "Accept: application/vnd.github+json" \
          https://api.github.com/app/installations | python3.11 -c "import sys,json; print(json.load(sys.stdin)[0]['id'])")
        export GH_TOKEN=$(curl -sf -X POST -H "Authorization: Bearer ${JWT}" -H "Accept: application/vnd.github+json" \
          "https://api.github.com/app/installations/${INST_ID}/access_tokens" | python3.11 -c "import sys,json; print(json.load(sys.stdin)['token'])")
        export GOOGLE_APPLICATION_CREDENTIALS="/var/run/gcloud-adc/application_default_credentials.json"
        export CLAUDE_CODE_USE_VERTEX="1"
        export CLOUD_ML_REGION="global"
        export ANTHROPIC_VERTEX_PROJECT_ID="itpc-gcp-hcm-pe-eng-claude"
        export ANTHROPIC_MODEL="claude-opus-4-6"
        export PYTHONUNBUFFERED=1
        export WORKFLOW_TYPE="ci-monitor"
        export PR_URLS="https://github.com/${REPO_OWNER}/${REPO_NAME}/pull/${PULL_NUMBER} --ignore-context oape-ci-monitor --post-comment --max-fix-rounds 0 --no-auto-retest"
        gh auth setup-git && python3.11 /app/main.py
      credentials:
      - mount_path: /var/run/gcloud-adc
        name: oap-lts-claude-gcp-vertex-sa
        namespace: test-credentials
      - mount_path: /var/run/github-app
        name: openshift-app-platform-shift-github-bot
        namespace: test-credentials
      from: ci-monitor-agent
      resources:
        requests:
          cpu: "1"
          memory: 500Mi
      timeout: 2h30m0s
zz_generated_metadata:
  branch: master
  org: openshift
  repo: must-gather-operator
