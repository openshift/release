base_images:
  base-rhel9:
    name: "5.0"
    namespace: ocp
    tag: base-rhel9
  cli-operator-sdk:
    name: cli-operator-sdk
    namespace: ocp
    tag: v1.39.2
binary_build_commands: make go-build
build_root:
  from_repository: true
images:
  items:
  - dockerfile_literal: |-
      FROM registry.access.redhat.com/ubi9/go-toolset
      USER 0
      RUN dnf install -y git make jq && \
          dnf install -y 'dnf-command(config-manager)' && \
          dnf config-manager --add-repo https://cli.github.com/packages/rpm/gh-cli.repo && \
          dnf install -y gh && \
          dnf clean all
      WORKDIR /app
      RUN git clone --depth 1 -b OAPE-752 https://github.com/neha037/oape-ai-e2e.git /tmp/oape && \
          cp -r /tmp/oape/scripts /app/scripts && \
          cp -r /tmp/oape/plugins /plugins && \
          mkdir -p /config && cp -r /tmp/oape/deploy/config/* /config/ && \
          rm -rf /tmp/oape
      RUN go install golang.org/x/tools/cmd/goimports@v0.33.0 && \
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/v2.1.6/install.sh | sh -s -- -b /usr/local/bin v2.1.6
      RUN git config --global user.name "openshift-app-platform-shift-bot" && \
          git config --global user.email "267347085+openshift-app-platform-shift-bot@users.noreply.github.com"
      RUN chmod -R g=u /opt/app-root/src
      USER 1001
    to: ci-monitor-agent
  - dockerfile_path: Dockerfile.openshift
    from: base-rhel9
    to: must-gather-operator
operator:
  bundles:
  - as: must-gather-operator-bundle
    context_dir: bundle
    dockerfile_path: bundle.Dockerfile
    skip_building_index: true
  substitutions:
  - pullspec: quay.io/openshift/origin-support-log-gather-operator:latest
    with: pipeline:must-gather-operator
  - pullspec: quay.io/openshift/origin-must-gather:latest
    with: stable:must-gather
promotion:
  to:
  - excluded_images:
    - ci-monitor-agent
    name: "5.0"
    namespace: ocp
releases:
  initial:
    integration:
      name: "5.0"
      namespace: ocp
  latest:
    integration:
      include_built_images: true
      name: "5.0"
      namespace: ocp
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
test_binary_build_commands: make e2e-binary-build
tests:
- as: verify-deps
  steps:
    env:
      CHECK_MOD_LIST: "true"
    test:
    - ref: go-verify-deps
- as: coverage
  commands: |
    export CODECOV_TOKEN=$(cat /tmp/secret/CODECOV_TOKEN)
    make coverage
  container:
    from: src
  secret:
    mount_path: /tmp/secret
    name: must-gather-operator-codecov-token
  skip_if_only_changed: ^(?:\.tekton|\.github)|\.md$|^(?:\.gitignore|OWNERS|LICENSE)$
- as: publish-coverage
  commands: |
    export CODECOV_TOKEN=$(cat /tmp/secret/CODECOV_TOKEN)
    make coverage
  container:
    from: src
  postsubmit: true
  secret:
    mount_path: /tmp/secret
    name: must-gather-operator-codecov-token
- as: lint
  commands: make lint
  container:
    from: src
  skip_if_only_changed: ^(?:\.tekton|\.github)|\.md$|^(?:\.gitignore|OWNERS|LICENSE)$
- as: test
  commands: make test
  container:
    from: src
  skip_if_only_changed: ^(?:\.tekton|\.github)|\.md$|^(?:\.gitignore|OWNERS|LICENSE)$
- as: validate-boilerplate
  commands: make validate
  container:
    from: src
  optional: true
  skip_if_only_changed: ^(?:\.tekton|\.github)|\.md$|^(?:\.gitignore|OWNERS|LICENSE)$
- as: e2e-gcp-operator
  steps:
    cluster_profile: openshift-org-gcp
    dependencies:
      OO_BUNDLE: must-gather-operator-bundle
    env:
      OO_INSTALL_MODE: AllNamespaces
      OO_INSTALL_NAMESPACE: must-gather-operator
    test:
    - as: install
      cli: latest
      commands: |
        oc -n must-gather-operator rollout status deployment must-gather-operator
      dependencies:
      - env: OO_BUNDLE
        name: must-gather-operator-bundle
      from: src
      resources:
        requests:
          cpu: 100m
    - as: test
      cli: latest
      commands: |
        export CASE_MANAGEMENT_CREDS_CONFIG_DIR=/var/run/secrets/must-gather-operator/case-management-creds
        make test-e2e
      credentials:
      - mount_path: /var/run/secrets/must-gather-operator/case-management-creds
        name: case-management-creds
        namespace: test-credentials
      from: src
      resources:
        requests:
          cpu: 100m
    workflow: optional-operators-ci-operator-sdk-gcp
- always_run: false
  as: e2e-gcp-operator-rhcos10-fips
  optional: true
  steps:
    cluster_profile: openshift-org-gcp
    dependencies:
      OO_BUNDLE: must-gather-operator-bundle
    env:
      FEATURE_SET: TechPreviewNoUpgrade
      FIPS_ENABLED: "true"
      OO_INSTALL_MODE: AllNamespaces
      OO_INSTALL_NAMESPACE: must-gather-operator
      OSSTREAM: rhel-10
    test:
    - as: install
      cli: latest
      commands: |
        oc -n must-gather-operator rollout status deployment must-gather-operator
      from: src
      resources:
        requests:
          cpu: 100m
    - ref: fips-check-fips-or-die
    - as: test
      cli: latest
      commands: |
        export CASE_MANAGEMENT_CREDS_CONFIG_DIR=/var/run/secrets/must-gather-operator/case-management-creds
        make test-e2e
      credentials:
      - mount_path: /var/run/secrets/must-gather-operator/case-management-creds
        name: case-management-creds
        namespace: test-credentials
      from: src
      resources:
        requests:
          cpu: 100m
    workflow: optional-operators-ci-operator-sdk-gcp
- always_run: false
  as: e2e-gcp-operator-rhcos10
  optional: true
  steps:
    cluster_profile: openshift-org-gcp
    dependencies:
      OO_BUNDLE: must-gather-operator-bundle
    env:
      FEATURE_SET: TechPreviewNoUpgrade
      OO_INSTALL_MODE: AllNamespaces
      OO_INSTALL_NAMESPACE: must-gather-operator
      OSSTREAM: rhel-10
    test:
    - as: install
      cli: latest
      commands: |
        oc -n must-gather-operator rollout status deployment must-gather-operator
      from: src
      resources:
        requests:
          cpu: 100m
    - as: test
      cli: latest
      commands: |
        export CASE_MANAGEMENT_CREDS_CONFIG_DIR=/var/run/secrets/must-gather-operator/case-management-creds
        make test-e2e
      credentials:
      - mount_path: /var/run/secrets/must-gather-operator/case-management-creds
        name: case-management-creds
        namespace: test-credentials
      from: src
      resources:
        requests:
          cpu: 100m
    workflow: optional-operators-ci-operator-sdk-gcp
- always_run: true
  as: oape-ci-monitor
  optional: true
  steps:
    test:
    - as: monitor
      commands: |
        set -euo pipefail

        echo "[setup] Starting oape-ci-monitor for ${REPO_OWNER}/${REPO_NAME} PR#${PULL_NUMBER}"

        # --- GitHub auth: try App token, fall back to GITHUB_TOKEN ---
        USE_APP_TOKEN="false"
        if [[ -f /var/run/github-app/app-id && -f /var/run/github-app/private-key.pem ]]; then
          echo "[auth] Attempting GitHub App token..."
          APP_ID=$(cat /var/run/github-app/app-id)
          PEM_PATH="/var/run/github-app/private-key.pem"
          HEADER=$(printf '{"alg":"RS256","typ":"JWT"}' | openssl base64 -e -A | tr '+/' '-_' | tr -d '=')
          NOW=$(date +%s); EXP=$((NOW + 300))
          PAYLOAD=$(printf '{"iat":%d,"exp":%d,"iss":"%s"}' "$NOW" "$EXP" "$APP_ID" | openssl base64 -e -A | tr '+/' '-_' | tr -d '=')
          SIGNATURE=$(printf '%s' "${HEADER}.${PAYLOAD}" | openssl dgst -sha256 -sign "$PEM_PATH" -binary | openssl base64 -e -A | tr '+/' '-_' | tr -d '=')
          JWT="${HEADER}.${PAYLOAD}.${SIGNATURE}"

          INSTALL_RESPONSE=$(curl -s -w "\n%{http_code}" -H "Authorization: Bearer ${JWT}" -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/installation")
          HTTP_CODE=$(echo "$INSTALL_RESPONSE" | tail -1)
          INSTALL_BODY=$(echo "$INSTALL_RESPONSE" | sed '$d')

          if [[ "$HTTP_CODE" -eq 200 ]]; then
            INST_ID=$(echo "$INSTALL_BODY" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
            TOKEN_RESPONSE=$(curl -s -w "\n%{http_code}" -X POST -H "Authorization: Bearer ${JWT}" -H "Accept: application/vnd.github+json" \
              "https://api.github.com/app/installations/${INST_ID}/access_tokens")
            T_CODE=$(echo "$TOKEN_RESPONSE" | tail -1)
            T_BODY=$(echo "$TOKEN_RESPONSE" | sed '$d')
            if [[ "$T_CODE" -eq 201 ]]; then
              export GH_TOKEN=$(echo "$T_BODY" | python3 -c "import sys,json; print(json.load(sys.stdin)['token'])")
              USE_APP_TOKEN="true"
              echo "[auth] GitHub App token generated successfully"
            else
              echo "[auth] WARN: App token creation failed (HTTP ${T_CODE}), falling back to GITHUB_TOKEN"
            fi
          else
            echo "[auth] WARN: App not installed on ${REPO_OWNER}/${REPO_NAME} (HTTP ${HTTP_CODE}), falling back to GITHUB_TOKEN"
          fi
        else
          echo "[auth] GitHub App credentials not mounted, using GITHUB_TOKEN"
        fi

        if [[ "$USE_APP_TOKEN" != "true" ]]; then
          if [[ -z "${GH_TOKEN:-}" && -z "${GITHUB_TOKEN:-}" ]]; then
            echo "[auth] ERROR: No GitHub token available (App token failed and GITHUB_TOKEN not set)" >&2
            exit 1
          fi
          export GH_TOKEN="${GH_TOKEN:-${GITHUB_TOKEN}}"
          echo "[auth] Using GITHUB_TOKEN (Phase 1 report-only — sufficient for read + comment)"
          echo "[auth] NOTE: Phase 2+ auto-fix pushes require the GitHub App to be installed on ${REPO_OWNER}/${REPO_NAME}"
        fi

        # --- GCP auth for Claude (Vertex AI) fallback ---
        export GOOGLE_APPLICATION_CREDENTIALS="/var/run/gcloud-adc/application_default_credentials.json"
        export CLAUDE_CODE_USE_VERTEX="1"
        export CLOUD_ML_REGION="global"
        export ANTHROPIC_VERTEX_PROJECT_ID="itpc-gcp-hcm-pe-eng-claude"

        # --- Run CI monitor ---
        export PR_URL="https://github.com/${REPO_OWNER}/${REPO_NAME}/pull/${PULL_NUMBER}"
        export SKIP_POLL="false"
        export SELF_JOB_NAME="oape-ci-monitor"
        export BUILD_ID="${BUILD_ID:-}"
        export OAPE_RUN_URL="${BUILD_LOG_URL:-}"

        gh auth setup-git
        /app/scripts/ci-monitor/monitor.sh
        /app/scripts/ci-monitor/dispatch.sh
      credentials:
      - mount_path: /var/run/gcloud-adc
        name: oap-lts-claude-gcp-vertex-sa
        namespace: test-credentials
      - mount_path: /var/run/github-app
        name: openshift-app-platform-shift-github-bot
        namespace: test-credentials
      from: ci-monitor-agent
      resources:
        requests:
          cpu: "1"
          memory: 500Mi
      timeout: 2h30m0s
zz_generated_metadata:
  branch: master
  org: openshift
  repo: must-gather-operator
