base_images:
  base-rhel9:
    name: "4.22"
    namespace: ocp
    tag: base-rhel9
  cli-operator-sdk:
    name: cli-operator-sdk
    namespace: ocp
    tag: v1.39.2
binary_build_commands: make go-build
build_root:
  from_repository: true
images:
  items:
  - dockerfile_path: Dockerfile.openshift
    from: base-rhel9
    to: must-gather-operator
operator:
  bundles:
  - as: must-gather-operator-bundle
    context_dir: bundle
    dockerfile_path: bundle.Dockerfile
    skip_building_index: true
  substitutions:
  - pullspec: quay.io/openshift/origin-support-log-gather-operator:latest
    with: pipeline:must-gather-operator
  - pullspec: quay.io/openshift/origin-must-gather:latest
    with: stable:must-gather
promotion:
  to:
  - name: "4.22"
    namespace: ocp
releases:
  initial:
    integration:
      name: "4.22"
      namespace: ocp
  latest:
    integration:
      include_built_images: true
      name: "4.22"
      namespace: ocp
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
test_binary_build_commands: make e2e-binary-build
tests:
- as: verify-deps
  steps:
    env:
      CHECK_MOD_LIST: "true"
    test:
    - ref: go-verify-deps
- as: coverage
  commands: |
    export CODECOV_TOKEN=$(cat /tmp/secret/CODECOV_TOKEN)
    make coverage
  container:
    from: src
  secret:
    mount_path: /tmp/secret
    name: must-gather-operator-codecov-token
  skip_if_only_changed: ^(?:\.tekton|\.github)|\.md$|^(?:\.gitignore|OWNERS|LICENSE)$
- as: publish-coverage
  commands: |
    export CODECOV_TOKEN=$(cat /tmp/secret/CODECOV_TOKEN)
    make coverage
  container:
    from: src
  postsubmit: true
  secret:
    mount_path: /tmp/secret
    name: must-gather-operator-codecov-token
- as: lint
  commands: make lint
  container:
    from: src
  skip_if_only_changed: ^(?:\.tekton|\.github)|\.md$|^(?:\.gitignore|OWNERS|LICENSE)$
- as: test
  commands: make test
  container:
    from: src
  skip_if_only_changed: ^(?:\.tekton|\.github)|\.md$|^(?:\.gitignore|OWNERS|LICENSE)$
- as: validate-boilerplate
  commands: make validate
  container:
    from: src
  optional: true
  skip_if_only_changed: ^(?:\.tekton|\.github)|\.md$|^(?:\.gitignore|OWNERS|LICENSE)$
- as: e2e-gcp-operator
  steps:
    cluster_profile: openshift-org-gcp
    dependencies:
      OO_BUNDLE: must-gather-operator-bundle
    env:
      OO_INSTALL_MODE: OwnNamespace
      OO_INSTALL_NAMESPACE: must-gather-operator
    test:
    - as: install
      cli: latest
      commands: |
        oc -n must-gather-operator rollout status deployment must-gather-operator
      from: src
      resources:
        requests:
          cpu: 100m
    - as: test
      cli: latest
      commands: |
        export CASE_MANAGEMENT_CREDS_CONFIG_DIR=/var/run/secrets/must-gather-operator/case-management-creds
        make test-e2e
      credentials:
      - mount_path: /var/run/secrets/must-gather-operator/case-management-creds
        name: case-management-creds
        namespace: test-credentials
      from: src
      resources:
        requests:
          cpu: 100m
    workflow: optional-operators-ci-operator-sdk-gcp
- as: e2e-gcp-operator-weekly
  cron: '@weekly'
  steps:
    cluster_profile: openshift-org-gcp
    dependency_overrides:
      OO_INDEX: quay.io/redhat-user-workloads/ocp-art-tenant/art-fbc:ocp__4.22__ose-support-log-gather-rhel9-operator
    env:
      OO_CHANNEL: tech-preview
      OO_INSTALL_NAMESPACE: must-gather-operator
      OO_PACKAGE: support-log-gather-operator
      OO_TARGET_NAMESPACES: '!all'
    test:
    - as: setup-konflux-image-access
      cli: latest
      commands: |
        oc extract secret/pull-secret -n openshift-config --confirm --to /tmp
        jq -s '.[0].auths += .[1].auths | .[0]' /tmp/.dockerconfigjson /var/run/secrets/pull-secret/.dockerconfigjson > /tmp/merged-pullsecret.json
        oc set data secret/pull-secret -n openshift-config --from-file=.dockerconfigjson=/tmp/merged-pullsecret.json
        cat <<'EOF' | oc apply -f -
        apiVersion: config.openshift.io/v1
        kind: ImageDigestMirrorSet
        metadata:
          name: idms
        spec:
          imageDigestMirrors:
          - mirrors:
            - quay.io/redhat-user-workloads/ocp-art-tenant/art-images-share
            source: registry.redhat.io/openshift4/ose-support-log-gather-rhel9-operator
          - mirrors:
            - quay.io/redhat-user-workloads/ocp-art-tenant/art-images-share
            source: registry.redhat.io/openshift4/ose-support-log-gather-operator-bundle
          - mirrors:
            - quay.io/redhat-user-workloads/ocp-art-tenant/art-images-share
            source: registry.redhat.io/openshift4/ose-must-gather-rhel9
        EOF
        sleep 60
        oc wait mcp/master --for condition=Updated --timeout=30m
        oc wait mcp/worker --for condition=Updated --timeout=30m
      credentials:
      - mount_path: /var/run/secrets/pull-secret
        name: deploy-konflux-operator-art-image-share
        namespace: test-credentials
      from: src
      resources:
        requests:
          cpu: 100m
    - ref: optional-operators-subscribe
    - as: verify-install
      cli: latest
      commands: |
        oc -n must-gather-operator rollout status deployment must-gather-operator --timeout=15m
      from: src
      resources:
        requests:
          cpu: 100m
    - as: test
      cli: latest
      commands: |
        export CASE_MANAGEMENT_CREDS_CONFIG_DIR=/var/run/secrets/must-gather-operator/case-management-creds
        make test-e2e
      credentials:
      - mount_path: /var/run/secrets/must-gather-operator/case-management-creds
        name: case-management-creds
        namespace: test-credentials
      from: src
      resources:
        requests:
          cpu: 100m
    workflow: ipi-gcp
- always_run: false
  as: e2e-gcp-operator-rhcos10-fips
  optional: true
  steps:
    cluster_profile: openshift-org-gcp
    dependencies:
      OO_BUNDLE: must-gather-operator-bundle
    env:
      FEATURE_SET: TechPreviewNoUpgrade
      FIPS_ENABLED: "true"
      OO_INSTALL_MODE: OwnNamespace
      OO_INSTALL_NAMESPACE: must-gather-operator
      OSSTREAM: rhel-10
    test:
    - as: install
      cli: latest
      commands: |
        oc -n must-gather-operator rollout status deployment must-gather-operator
      from: src
      resources:
        requests:
          cpu: 100m
    - ref: fips-check-fips-or-die
    - as: test
      cli: latest
      commands: |
        export CASE_MANAGEMENT_CREDS_CONFIG_DIR=/var/run/secrets/must-gather-operator/case-management-creds
        make test-e2e
      credentials:
      - mount_path: /var/run/secrets/must-gather-operator/case-management-creds
        name: case-management-creds
        namespace: test-credentials
      from: src
      resources:
        requests:
          cpu: 100m
    workflow: optional-operators-ci-operator-sdk-gcp
- always_run: false
  as: e2e-gcp-operator-rhcos10
  optional: true
  steps:
    cluster_profile: openshift-org-gcp
    dependencies:
      OO_BUNDLE: must-gather-operator-bundle
    env:
      FEATURE_SET: TechPreviewNoUpgrade
      OO_INSTALL_MODE: OwnNamespace
      OO_INSTALL_NAMESPACE: must-gather-operator
      OSSTREAM: rhel-10
    test:
    - as: install
      cli: latest
      commands: |
        oc -n must-gather-operator rollout status deployment must-gather-operator
      from: src
      resources:
        requests:
          cpu: 100m
    - as: test
      cli: latest
      commands: |
        export CASE_MANAGEMENT_CREDS_CONFIG_DIR=/var/run/secrets/must-gather-operator/case-management-creds
        make test-e2e
      credentials:
      - mount_path: /var/run/secrets/must-gather-operator/case-management-creds
        name: case-management-creds
        namespace: test-credentials
      from: src
      resources:
        requests:
          cpu: 100m
    workflow: optional-operators-ci-operator-sdk-gcp
zz_generated_metadata:
  branch: release-4.22
  org: openshift
  repo: must-gather-operator
