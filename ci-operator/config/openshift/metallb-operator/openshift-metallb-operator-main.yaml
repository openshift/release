base_images:
  dev-scripts:
    name: test
    namespace: ocp-kni
    tag: dev-scripts
  kube-rbac-proxy:
    name: "5.0"
    namespace: ocp
    tag: kube-rbac-proxy
  metallb:
    name: "5.0"
    namespace: ocp
    tag: metallb
  metallb-frr:
    name: "5.0"
    namespace: ocp
    tag: metallb-frr
  tls-scanner-tool:
    name: "5.0"
    namespace: ocp
    tag: tls-scanner-tool
build_root:
  from_repository: true
images:
  items:
  - dockerfile_path: Dockerfile.openshift
    to: metallb-operator
  - dockerfile_path: bundleci.Dockerfile
    to: metallb-operator-bundle
operator:
  bundles:
  - as: operatorbundle
    dockerfile_path: bundleci.Dockerfile
    skip_building_index: true
  substitutions:
  - pullspec: quay.io/openshift/origin-metallb:.*
    with: pipeline:metallb
  - pullspec: quay.io/openshift/origin-metallb-operator:.*
    with: pipeline:metallb-operator
  - pullspec: quay.io/openshift/origin-metallb-frr:.*
    with: pipeline:metallb-frr
  - pullspec: quay.io/openshift/origin-kube-rbac-proxy:.*
    with: pipeline:kube-rbac-proxy
promotion:
  to:
  - name: metallb-5.0
    namespace: origin
  - name: "5.0"
    namespace: ocp
releases:
  initial:
    integration:
      name: "5.0"
      namespace: ocp
  latest:
    integration:
      include_built_images: true
      name: "5.0"
      namespace: ocp
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: operator-e2e
  cluster_claim:
    architecture: amd64
    cloud: aws
    owner: openshift-ci
    product: ocp
    timeout: 1h0m0s
    version: "4.22"
  steps:
    test:
    - as: install
      cli: latest
      commands: |
        oc create namespace openshift-metallb-operator
        oc label --overwrite ns openshift-metallb-operator pod-security.kubernetes.io/enforce=privileged
        make operator-sdk
        ./_cache/operator-sdk version
        ./_cache/operator-sdk run bundle -n openshift-metallb-operator "$OO_BUNDLE" # install my-operator
        oc wait --for condition=Available -n openshift-metallb-operator deployment metallb-operator-controller-manager
        oc wait --for condition=Available -n openshift-metallb-operator deployment metallb-operator-webhook-server
      dependencies:
      - env: OO_BUNDLE
        name: operatorbundle
      from: src
      resources:
        requests:
          cpu: 100m
          memory: 200Mi
    - as: run-test
      cli: latest
      commands: |
        PATH=$PATH:$(pwd)/_cache hack/ocp_run_e2e.sh
      from: src
      resources:
        requests:
          cpu: 100m
          memory: 200Mi
    workflow: generic-claim
- always_run: false
  as: tls-scanner
  cluster_claim:
    architecture: amd64
    cloud: aws
    owner: openshift-ci
    product: ocp
    timeout: 1h0m0s
    version: "4.22"
  optional: true
  steps:
    env:
      SCAN_NAMESPACE: openshift-metallb-operator,openshift-frr-k8s
      SCANNER_CPU: "1"
      SCANNER_MEMORY: 1Gi
    test:
    - as: install
      cli: latest
      commands: |
        oc create namespace openshift-metallb-operator
        oc label --overwrite ns openshift-metallb-operator pod-security.kubernetes.io/enforce=privileged
        make operator-sdk
        ./_cache/operator-sdk run bundle -n openshift-metallb-operator "$OO_BUNDLE"
        oc wait --for condition=Available -n openshift-metallb-operator deployment metallb-operator-controller-manager
        oc wait --for condition=Available -n openshift-metallb-operator deployment metallb-operator-webhook-server
      dependencies:
      - env: OO_BUNDLE
        name: operatorbundle
      from: src
      resources:
        requests:
          cpu: 100m
          memory: 200Mi
    - as: deploy
      cli: latest
      commands: |
        cat <<EOF | oc apply -f -
        apiVersion: metallb.io/v1beta1
        kind: MetalLB
        metadata:
          name: metallb
          namespace: openshift-metallb-operator
        EOF
        echo "Waiting for MetalLB controller deployment to be available..."
        oc wait --for=create -n openshift-metallb-operator deployment/controller --timeout=5m
        oc wait --for=condition=Available -n openshift-metallb-operator deployment/controller --timeout=5m
        echo "Waiting for MetalLB speaker daemonset to be available..."
        oc wait --for=create -n openshift-metallb-operator daemonset/speaker --timeout=5m
        oc rollout status -n openshift-metallb-operator daemonset/speaker --timeout=5m
        echo "Waiting for openshift-frr-k8s namespace..."
        oc wait --for=create namespace/openshift-frr-k8s --timeout=5m
        echo "Waiting for frr-k8s-statuscleaner deployment to be available..."
        oc wait --for=create -n openshift-frr-k8s deployment/frr-k8s-statuscleaner --timeout=5m
        oc wait --for=condition=Available -n openshift-frr-k8s deployment/frr-k8s-statuscleaner --timeout=5m
        echo "Waiting for frr-k8s daemonset to be available..."
        oc wait --for=create -n openshift-frr-k8s daemonset/frr-k8s --timeout=5m
        oc rollout status -n openshift-frr-k8s daemonset/frr-k8s --timeout=5m
        echo "All MetalLB components deployed."
      from: src
      resources:
        requests:
          cpu: 100m
          memory: 200Mi
    - ref: tls-scanner-run
    workflow: generic-claim
- always_run: false
  as: tls-pqc-readiness
  cluster_claim:
    architecture: amd64
    cloud: aws
    owner: openshift-ci
    product: ocp
    timeout: 1h0m0s
    version: "4.22"
  optional: true
  steps:
    env:
      PQC_CHECK: "true"
      SCAN_NAMESPACE: openshift-metallb-operator,openshift-frr-k8s
      SCANNER_CPU: "1"
      SCANNER_MEMORY: 1Gi
    test:
    - as: install
      cli: latest
      commands: |
        oc create namespace openshift-metallb-operator
        oc label --overwrite ns openshift-metallb-operator pod-security.kubernetes.io/enforce=privileged
