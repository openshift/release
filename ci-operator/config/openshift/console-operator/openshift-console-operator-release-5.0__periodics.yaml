      FEATURE_SET: TechPreviewNoUpgrade
      TEST_SUITE: openshift/conformance/serial
    workflow: openshift-e2e-vsphere
- as: e2e-metal-ovn-ipv4-techpreview-ingress-component-route-labels
  capabilities:
