    cluster_profile: openshift-org-azure
    env:
      FEATURE_SET: TechPreviewNoUpgrade
      TEST_SUITE: openshift/conformance/serial
    workflow: openshift-e2e-azure
- as: e2e-gcp-techpreview-ingress-component-route-labels
  interval: 168h
