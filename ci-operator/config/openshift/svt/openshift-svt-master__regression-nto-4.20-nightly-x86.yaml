base_images:
  ci_tests-private-base:
    name: tests-private-base
    namespace: ci
    tag: latest
  ci_tests-private-baseui:
    name: tests-private-baseui
    namespace: ci
    tag: latest
  cli:
    name: "4.20"
    namespace: ocp
    tag: cli
  upi-installer:
    name: "4.20"
    namespace: ocp
    tag: upi-installer
binary_build_commands: make go-mod-tidy;make all
build_root:
  image_stream_tag:
    name: builder
    namespace: ocp
    tag: rhel-9-golang-1.24-openshift-4.20
images:
- dockerfile_literal: |
    FROM src AS builder
    FROM this-is-ignored-and-not-used
    WORKDIR /go/src/github.com/openshift/openshift-tests-private
    COPY --from=builder /go/src/github.com/openshift/openshift-tests-private /go/src/github.com/openshift/openshift-tests-private
  from: ci_tests-private-baseui
  inputs:
    src:
      as:
      - src
  to: tests-private-ui
- dockerfile_literal: |
    FROM bin AS builder
    FROM this-is-ignored-and-not-used
    WORKDIR /go/src/github.com/openshift/openshift-tests-private
    COPY --from=builder /go/src/github.com/openshift/openshift-tests-private /go/src/github.com/openshift/openshift-tests-private
    RUN chmod g+w /go/src/github.com/openshift/openshift-tests-private && \
        rm -rf /usr/bin/oc /usr/bin/kubectl
  from: ci_tests-private-base
  inputs:
    bin:
      as:
      - bin
  to: tests-private-pr
promotion:
  to:
  - disabled: true
    excluded_images:
    - tests-private-ui
    - tests-private-pr
    name: "4.20"
    namespace: ocp
releases:
  arm64-latest:
    candidate:
      architecture: arm64
      product: ocp
      stream: nightly
      version: "4.20"
  latest:
    candidate:
      product: ocp
      stream: nightly
      version: "4.20"
resources:
  '*':
    limits:
      memory: 8Gi
    requests:
      cpu: "1"
      memory: 4Gi
  bin:
    requests:
      cpu: "2"
      memory: 8Gi
test_binary_build_commands: make test
tests:
- always_run: false
  as: aws-ipi-disc-priv-amd-mixarch-f28-destructive
  steps:
    cluster_profile: aws-perfscale-qe
    env:
      ADDITIONAL_WORKERS: "1"
      BASE_DOMAIN: qe.devcluster.openshift.com
      COMPUTE_NODE_REPLICAS: "2"
      E2E_RUN_TAGS: '@disconnected'
      EXTRACT_MANIFEST_INCLUDED: "true"
      TEST_FILTERS: PSAP
    test:
    - ref: ipi-install-heterogeneous
    - chain: openshift-e2e-test-qe-destructive
    workflow: cucushift-installer-rehearse-aws-ipi-disconnected-private
zz_generated_metadata:
  branch: master
  org: openshift
  repo: svt
  variant: regression-nto-4.20-nightly-x86
