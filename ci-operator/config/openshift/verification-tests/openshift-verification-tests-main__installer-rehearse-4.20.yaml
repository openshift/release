base_images:
  ansible:
    name: "4.20"
    namespace: ocp
    tag: ansible
  aws-efs-csi-operator-create-efs:
    name: "4.20"
    namespace: ocp
    tag: aws-efs-csi-operator-create-efs
  dev-scripts:
    name: test
    namespace: ocp-kni
    tag: dev-scripts
  openstack-installer:
    name: "4.20"
    namespace: ocp
    tag: openstack-installer
  upi-installer:
    name: "4.20"
    namespace: ocp
    tag: upi-installer
  vsphere-ci-python:
    name: vsphere-python
    namespace: ci
    tag: latest
releases:
  latest:
    candidate:
      product: ocp
      stream: nightly
      version: "4.20"
  multi-latest:
    candidate:
      architecture: multi
      product: ocp
      stream: nightly
      version: "4.20"
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: installer-rehearse-aws
  cron: '@yearly'
  steps:
    cluster_profile: aws-qe
    env:
      IPSTACK: dualstack
      SLEEP_DURATION: 1h
      ZONES_COUNT: "3"
    post:
    - ref: aws-deprovision-stacks
    - ref: aws-deprovision-s3buckets
    pre:
    - ref: aws-provision-vpc-shared-dualstack
    - chain: aws-provision-bastionhost
    test:
    - ref: cucushift-installer-wait
- as: installer-rehearse-azure
  cron: '@yearly'
  steps:
    cluster_profile: azure-qe
    env:
      AZURE_INSTALL_USE_MINIMAL_PERMISSIONS: "yes"
      AZURE_VNET_ENABLE_ENCRYPTION: "true"
      BASE_DOMAIN: qe.azure.devcluster.openshift.com
      COMPUTE_NODE_TYPE: Standard_D4ls_v5
      CONTROL_PLANE_INSTANCE_TYPE: Standard_D8ls_v5
      CUSTOM_AZURE_REGION: uksouth
    workflow: cucushift-installer-rehearse-azure-ipi-sharednetwork
- as: installer-rehearse-azure-1
  cron: '@yearly'
  steps:
    cluster_profile: azure-qe
    env:
      AZURE_INSTALL_USE_MINIMAL_PERMISSIONS: "yes"
      AZURE_VNET_ENABLE_ENCRYPTION: "true"
      BASE_DOMAIN: qe.azure.devcluster.openshift.com
      COMPUTE_NODE_TYPE: Standard_D4ls_v5
      CONTROL_PLANE_INSTANCE_TYPE: Standard_D8ls_v5
      CUSTOM_AZURE_REGION: uaenorth
    workflow: cucushift-installer-rehearse-azure-ipi-sharednetwork
- as: installer-rehearse-azure-2
  cron: '@yearly'
  steps:
    cluster_profile: azure-qe
    env:
      AZURE_INSTALL_USE_MINIMAL_PERMISSIONS: "yes"
      AZURE_VNET_ENABLE_ENCRYPTION: "true"
      BASE_DOMAIN: qe.azure.devcluster.openshift.com
      COMPUTE_NODE_TYPE: Standard_D4ls_v5
      CONTROL_PLANE_INSTANCE_TYPE: Standard_D8ls_v5
      CUSTOM_AZURE_REGION: southindia
    workflow: cucushift-installer-rehearse-azure-ipi-sharednetwork
- as: installer-rehearse-azure-3
  cron: '@yearly'
  steps:
    cluster_profile: azure-qe
    env:
      AZURE_INSTALL_USE_MINIMAL_PERMISSIONS: "yes"
      AZURE_VNET_ENABLE_ENCRYPTION: "true"
      BASE_DOMAIN: qe.azure.devcluster.openshift.com
      COMPUTE_NODE_TYPE: Standard_D4ls_v5
      CONTROL_PLANE_INSTANCE_TYPE: Standard_D8ls_v5
      CUSTOM_AZURE_REGION: switzerlandnorth
    workflow: cucushift-installer-rehearse-azure-ipi-sharednetwork
- as: installer-rehearse-ibmcloud-dis
  cron: '@yearly'
  steps:
    cluster_profile: ibmcloud-qe-2
    env:
      MIRROR_BIN: oc-mirror
      SERVICE_ENDPOINT_COSConfig: DEFAULT_ENDPOINT
      SERVICE_ENDPOINT_GlobalCatalog: DEFAULT_ENDPOINT
      SLEEP_DURATION: 5h
    post:
    - ref: cucushift-installer-wait
    - chain: cucushift-installer-rehearse-ibmcloud-ipi-disconnected-private-deprovision
    test:
    - chain: cucushift-installer-check-cluster-health
    workflow: cucushift-installer-rehearse-ibmcloud-ipi-disconnected-private
zz_generated_metadata:
  branch: main
  org: openshift
  repo: verification-tests
  variant: installer-rehearse-4.20
