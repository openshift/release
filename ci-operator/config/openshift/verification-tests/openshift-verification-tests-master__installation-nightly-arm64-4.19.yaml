base_images:
  ansible:
    name: "4.19"
    namespace: ocp
    tag: ansible
  aws-efs-csi-operator-create-efs:
    name: "4.19"
    namespace: ocp
    tag: aws-efs-csi-operator-create-efs
  cli:
    name: "4.19"
    namespace: ocp
    tag: cli
  dev-scripts:
    name: test
    namespace: ocp-kni
    tag: dev-scripts
  tools:
    name: "4.19"
    namespace: ocp
    tag: tools
  upi-installer:
    name: "4.19"
    namespace: ocp
    tag: upi-installer
  vsphere-ci-python:
    name: vsphere-python
    namespace: ci
    tag: latest
releases:
  latest:
    candidate:
      architecture: arm64
      product: ocp
      stream: nightly
      version: "4.19"
resources:
  '*':
    limits:
      cpu: "1"
      memory: 4Gi
    requests:
      cpu: 400m
      memory: 800Mi
tests:
- as: aws-ipi-installer3-arm-f28
  cron: 15 9 5 * *
  node_architecture: arm64
  steps:
    cluster_profile: aws-qe
    env:
      AWS_INSTALL_USE_MINIMAL_PERMISSIONS: "yes"
      BASE_DOMAIN: qe.devcluster.openshift.com
      COMPUTE_NODE_TYPE: m6g.xlarge
      CONTROL_PLANE_INSTANCE_TYPE: m6g.xlarge
      OCP_ARCH: arm64
    test:
    - ref: cucushift-installer-check-cluster-health
    workflow: cucushift-installer-rehearse-aws-ipi
- as: aws-ipi-installer2-arm-f28
  cron: 15 9 5 * *
  steps:
    cluster_profile: aws-qe
    env:
      AWS_INSTALL_USE_MINIMAL_PERMISSIONS: "yes"
      BASE_DOMAIN: qe.devcluster.openshift.com
      COMPUTE_NODE_TYPE: m6g.xlarge
      CONTROL_PLANE_INSTANCE_TYPE: m6g.xlarge
      OCP_ARCH: arm64
    test:
    - ref: cucushift-installer-check-cluster-health
    workflow: cucushift-installer-rehearse-aws-ipi
- as: aws-ipi-installer1-arm-f28
  capabilities:
  - arm64
  cron: 15 9 5 * *
  steps:
    cluster_profile: aws-qe
    env:
      AWS_INSTALL_USE_MINIMAL_PERMISSIONS: "yes"
      BASE_DOMAIN: qe.devcluster.openshift.com
      COMPUTE_NODE_TYPE: m6g.xlarge
      CONTROL_PLANE_INSTANCE_TYPE: m6g.xlarge
      OCP_ARCH: arm64
    test:
    - ref: cucushift-installer-check-cluster-health
    workflow: cucushift-installer-rehearse-aws-ipi
- as: aws-ipi-installer-arm-f28
  cron: 15 9 5 * *
  node_architecture: arm64
  steps:
    cluster_profile: aws-qe
    env:
      AWS_INSTALL_USE_MINIMAL_PERMISSIONS: "yes"
      BASE_DOMAIN: qe.devcluster.openshift.com
      COMPUTE_NODE_TYPE: m6g.xlarge
      CONTROL_PLANE_INSTANCE_TYPE: m6g.xlarge
      OCP_ARCH: arm64
    post:
    - chain: cucushift-installer-rehearse-aws-ipi-deprovision
    pre:
    - chain: ipi-conf-aws
    - ref: ipi-conf-aws-usage-info
    - chain: aws-provision-iam-user-minimal-permission
    - ref: ipi-install-rbac
    - ref: openshift-cluster-bot-rbac
    - ref: ipi-install-hosted-loki
    - ref: ipi-install-install-run-on-arm
    - ref: ipi-install-times-collection
    - ref: nodes-readiness
    - ref: multiarch-validate-nodes
    - chain: cucushift-installer-check
    test:
    - ref: cucushift-installer-check-cluster-health
