images:
  items:
  - dockerfile_path: cerberus/Dockerfile_prow
    from: cerberus.prow
    to: cerberus-main-prow-50-up
  - dockerfile_literal: |-
      FROM prow-scripts.prow
      RUN ls
    from: prow-scripts.prow
    to: prow-scripts-422-up
  - dockerfile_literal: |-
      FROM ocp-qe-perfscale-ci
      RUN ls
      RUN cp oc /bin
    from: ocp-qe-perfscale-ci
    to: perfscale-observer
releases:
  latest:
    release:
      architecture: multi
      channel: candidate
      version: "4.22"
  target:
    release:
      architecture: multi
      channel: candidate
      version: "5.0"
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- always_run: false
  as: aws-ipi-amd-f28
  steps:
    allow_skip_on_success: true
    cluster_profile: aws-qe
    env:
      BASE_DOMAIN: qe.devcluster.openshift.com
      ENABLE_OTA_TEST: OCP-30087
      OPENSHIFT_INSTALL_EXPERIMENTAL_DISABLE_IMAGE_POLICY: ""
    observers:
      enable:
      - redhat-chaos-cerberus
      - redhat-chaos-pod-scenarios-random-system-pods-observer
    test:
    - chain: openshift-qe-cluster-density-v2
    - ref: redhat-chaos-start-krkn
    - ref: cucushift-ota-preupgrade
    workflow: cucushift-installer-rehearse-aws-ipi
- always_run: false
