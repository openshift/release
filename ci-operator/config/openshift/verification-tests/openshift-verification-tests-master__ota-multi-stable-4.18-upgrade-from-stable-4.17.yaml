releases:
  intermediate1:
    candidate:
      architecture: multi
      product: ocp
      stream: nightly
      version: "4.18"
  intermediate2:
    release:
      architecture: multi
      channel: candidate
      version: "4.19"
  latest:
    release:
      architecture: multi
      channel: fast
      version: "4.17"
  target:
    release:
      architecture: multi
      channel: candidate
      version: "4.18"
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: aws-ipi-amd-tolatest-f28
  cron: 31 23 3 * *
  steps:
    cluster_profile: aws-qe
    env:
      BASE_DOMAIN: qe.devcluster.openshift.com
      ENABLE_OTA_TEST: OCP-23799
    test:
    - ref: cucushift-upgrade-setchannel
    - ref: cucushift-ota-preupgrade
    - ref: cucushift-upgrade-toversion
    - ref: cucushift-ota-postupgrade
    - chain: cucushift-installer-check-cluster-health
    workflow: cucushift-installer-rehearse-aws-ipi
- as: azure-ipi-amd-mixarch-f28
  cron: 22 23 3 * *
  steps:
    cluster_profile: azure-qe
    env:
      ADDITIONAL_WORKER_VM_TYPE: Standard_D4ps_v5
      ADDITIONAL_WORKERS: "1"
      BASE_DOMAIN: qe.azure.devcluster.openshift.com
      COMPUTE_NODE_REPLICAS: "2"
      ENABLE_OTA_TEST: OCP-53907
    test:
    - ref: ipi-install-heterogeneous
    - chain: cucushift-installer-check-cluster-health
    - ref: cucushift-upgrade-setchannel
    - ref: cucushift-ota-preupgrade
    - ref: cucushift-upgrade-toversion
    - ref: cucushift-upgrade-healthcheck
    - ref: cucushift-ota-postupgrade
    workflow: cucushift-installer-rehearse-azure-ipi
- as: azure-ipi-fullyprivate-proxy-arm-f28
  cron: 21 5 2 * *
  steps:
    cluster_profile: azure-qe
    env:
      BASE_DOMAIN: qe.azure.devcluster.openshift.com
      COMPUTE_NODE_TYPE: Standard_D4ps_v5
      ENABLE_OTA_TEST: OCP-25473
      OCP_ARCH: arm64
    test:
    - as: set-upgrade-releases
      commands: echo "${INTERMEDIATE_RETARGET}" > ${SHARED_DIR}/upgrade-edge
      dependencies:
      - env: INTERMEDIATE_RETARGET
        name: release:intermediate2
      from: cli
      resources:
        requests:
          cpu: 100m
          memory: 200Mi
    - chain: openshift-upgrade-qe-test
    workflow: cucushift-installer-rehearse-azure-ipi-fullyprivate-proxy
- as: gcp-ipi-confidential-computing-fips-f28
  cron: 19 22 24 * *
  steps:
    cluster_profile: gcp-qe
    env:
      ENABLE_OTA_TEST: OCP-25473
      FIPS_ENABLED: "true"
    test:
    - as: set-upgrade-releases
      commands: echo "${INTERMEDIATE_RETARGET}" > ${SHARED_DIR}/upgrade-edge
      dependencies:
      - env: INTERMEDIATE_RETARGET
        name: release:intermediate1
      from: cli
      resources:
        requests:
          cpu: 100m
          memory: 200Mi
    - chain: openshift-upgrade-qe-test
    workflow: cucushift-installer-rehearse-gcp-ipi-confidential-computing
zz_generated_metadata:
  branch: master
  org: openshift
  repo: verification-tests
  variant: ota-multi-stable-4.18-upgrade-from-stable-4.17
