base_images:
  ansible:
    name: "4.21"
    namespace: ocp
    tag: ansible
  aws-efs-csi-operator-create-efs:
    name: "4.21"
    namespace: ocp
    tag: aws-efs-csi-operator-create-efs
  dev-scripts:
    name: test
    namespace: ocp-kni
    tag: dev-scripts
  openstack-installer:
    name: "4.21"
    namespace: ocp
    tag: openstack-installer
  upi-installer:
    name: "4.21"
    namespace: ocp
    tag: upi-installer
  vsphere-ci-python:
    name: vsphere-python
    namespace: ci
    tag: latest
releases:
  latest:
    candidate:
      product: ocp
      stream: nightly
      version: "4.21"
  multi-latest:
    candidate:
      architecture: multi
      product: ocp
      stream: nightly
      version: "4.21"
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: installer-rehearse-aws
  cron: '@yearly'
  steps:
    allow_skip_on_success: true
    cluster_profile: aws-qe
    env:
      AWS_INSTALL_USE_MINIMAL_PERMISSIONS: "yes"
      BASE_DOMAIN: qe.gcp.devcluster.openshift.com
      CUSTOM_OPENSHIFT_INSTALL_RELEASE_IMAGE_OVERRIDE: registry.build10.ci.openshift.org/ci-ln-3lp2yn2/release:latest
      FEATURE_SET: TechPreviewNoUpgrade
      SLEEP_DURATION: 10m
      USER_PROVISIONED_DNS: "yes"
    post:
    - chain: cucushift-installer-rehearse-aws-ipi-deprovision
    - ref: gcp-deprovision-public-dns-zone-record-sets
    pre:
    - chain: ipi-conf-aws
    - ref: ipi-conf-aws-usage-info
    - chain: aws-provision-iam-user-minimal-permission
    - ref: ipi-install-rbac
    - ref: openshift-cluster-bot-rbac
    - ref: ipi-install-hosted-loki
    - ref: ipi-install-install
    - ref: aws-provision-public-custom-dns
    - ref: gcp-provision-public-dns-zone-record-sets
    - ref: cucushift-installer-wait
    - ref: ipi-install-times-collection
    - ref: nodes-readiness
    - ref: multiarch-validate-nodes
    - ref: cucushift-installer-check-user-provisioned-dns
    - chain: cucushift-installer-check
    test:
    - ref: openshift-e2e-test
- as: installer-rehearse-azure
  cron: '@yearly'
  steps:
    allow_skip_on_success: true
    cluster_profile: azure-qe
    env:
      FEATURE_GATES: '["AzureClusterHostedDNSInstall=true"]'
      FEATURE_SET: CustomNoUpgrade
    workflow: cucushift-installer-rehearse-azure-ipi-custom-dns
- as: installer-rehearse-ibmcloud
  cron: '@yearly'
  steps:
    allow_skip_on_success: true
    cluster_profile: ibmcloud-qe
    env:
      CUSTOM_OPENSHIFT_INSTALL_RELEASE_IMAGE_OVERRIDE: registry.build06.ci.openshift.org/ci-ln-7d9xkg2/release:latest
    test:
    - chain: cucushift-installer-check-cluster-health
    workflow: cucushift-installer-rehearse-ibmcloud-ipi-sno
- as: installer-rehearse-gcp
  cron: '@yearly'
  steps:
    allow_skip_on_success: true
    cluster_profile: gcp-qe
    env:
      MINIMAL_PERMISSIONS_WITHOUT_FIREWALL_PROVISION: "yes"
      SLEEP_DURATION: 10m
    post:
    - ref: cucushift-installer-wait
    - chain: cucushift-installer-rehearse-gcp-ipi-byo-fw-deprovision
    pre:
    - chain: cucushift-installer-rehearse-gcp-ipi-byo-fw-provision
    test:
    - chain: cucushift-installer-check-cluster-health
- as: installer-rehearse-gcp-wif
  cron: '@yearly'
  steps:
    allow_skip_on_success: true
    cluster_profile: gcp-qe
    env:
      COMPUTE_SERVICE_ACCOUNT: jiwei-worker-sa
      CONTROL_PLANE_SERVICE_ACCOUNT: jiwei-control-plane-sa
      ENABLE_MIN_PERMISSION_FOR_STS: "true"
      EXTRACT_MANIFEST_INCLUDED: "true"
      MINIMAL_PERMISSIONS_CCO_MANUAL_WITHOUT_FIREWALL_PROVISION: "yes"
    workflow: cucushift-installer-rehearse-gcp-ipi-byo-fw-cco-manual-workload-identity
- as: installer-rehearse-ibmcloud-dis
  cron: '@yearly'
  steps:
    allow_skip_on_success: true
    cluster_profile: ibmcloud-qe-2
    env:
      MIRROR_BIN: oc-mirror
      SERVICE_ENDPOINT_COSConfig: DEFAULT_ENDPOINT
      SERVICE_ENDPOINT_GlobalCatalog: DEFAULT_ENDPOINT
      SLEEP_DURATION: 5h
    post:
    - ref: cucushift-installer-wait
    - chain: cucushift-installer-rehearse-ibmcloud-ipi-disconnected-private-deprovision
    test:
    - chain: cucushift-installer-check-cluster-health
    workflow: cucushift-installer-rehearse-ibmcloud-ipi-disconnected-private
- as: installer-rehearse-vsphere
  cron: '@yearly'
  steps:
    cluster_profile: vsphere-elastic
    env:
      MULTI_NIC_IPI: "true"
      SLEEP_DURATION: 24h
    post:
    - ref: cucushift-installer-wait
    - chain: cucushift-installer-rehearse-vsphere-ipi-deprovision
    pre:
    - chain: cucushift-installer-rehearse-vsphere-ipi-provision
- as: installer-rehearse-azurestack
  cluster: build01
  cron: '@yearly'
  steps:
    cluster_profile: azurestack-qe
    env:
      EXTRACT_MANIFEST_INCLUDED: "true"
    workflow: cucushift-installer-rehearse-azure-stack-upi
zz_generated_metadata:
  branch: main
  org: openshift
  repo: verification-tests
  variant: installer-rehearse-4.21
