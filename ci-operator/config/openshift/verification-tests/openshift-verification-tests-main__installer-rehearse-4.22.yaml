base_images:
  ansible:
    name: "4.22"
    namespace: ocp
    tag: ansible
  aws-efs-csi-operator-create-efs:
    name: "4.22"
    namespace: ocp
    tag: aws-efs-csi-operator-create-efs
  dev-scripts:
    name: test
    namespace: ocp-kni
    tag: dev-scripts
  openstack-installer:
    name: "4.22"
    namespace: ocp
    tag: openstack-installer
  tests-private:
    name: tests-private
    namespace: ci
    tag: "4.22"
  upi-installer:
    name: "4.22"
    namespace: ocp
    tag: upi-installer
  vsphere-ci-python:
    name: vsphere-python
    namespace: ci
    tag: latest
releases:
  arm64-latest:
    candidate:
      architecture: arm64
      product: ocp
      stream: nightly
      version: "4.22"
  latest:
    candidate:
      product: ocp
      stream: nightly
      version: "4.22"
  multi-latest:
    candidate:
      architecture: multi
      product: ocp
      stream: nightly
      version: "4.22"
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: installer-rehearse-vsphere
  cron: '@yearly'
  steps:
    cluster_profile: vsphere-elastic
    env:
      CUSTOM_OPENSHIFT_INSTALL_RELEASE_IMAGE_OVERRIDE: registry.ci.openshift.org/ocp/release:4.22.0-0.nightly-2026-03-04-084819
    post:
    - chain: upi-vsphere-post
    pre:
    - chain: upi-vsphere-pre
- as: installer-rehearse-gcp
  cron: '@yearly'
  steps:
    allow_skip_on_success: true
    cluster_profile: gcp-qe
    dependencies:
      OPENSHIFT_INSTALL_RELEASE_IMAGE_OVERRIDE: release:multi-latest
    env:
      MINIMAL_PERMISSIONS_WITHOUT_DNS: "yes"
    workflow: cucushift-installer-rehearse-gcp-ipi-custom-dns
- as: installer-rehearse-gcp-regions
  cron: '@yearly'
  steps:
    allow_skip_on_success: true
    cluster_profile: gcp-qe
    dependencies:
      OPENSHIFT_INSTALL_RELEASE_IMAGE_OVERRIDE: release:arm64-latest
    env:
      CLUSTER_PARAMETER_SELECT_CONDITIONS: |
        [
          [
              {"column": "Region", "value": "europe-west4", "operator": "equals"}
          ]
        ]
      TEST_FILTERS: "57148"
      TEST_OBJECT: Regions
    test:
    - ref: openshift-extended-test-longduration
    - ref: openshift-e2e-test-qe-report
    workflow: cucushift-installer-rehearse-gcp-cases-clusters
- as: installer-rehearse-azure
  cron: '@yearly'
  steps:
    allow_skip_on_success: true
    cluster_profile: azure-qe
    env:
      AZURE_MANAGED_IDENTITY_TYPE: system
      BASE_DOMAIN: qe.azure.devcluster.openshift.com
      EXTRACT_MANIFEST_INCLUDED: "true"
      CUSTOM_OPENSHIFT_INSTALL_RELEASE_IMAGE_OVERRIDE: registry.ci.openshift.org/ocp/release:4.22.0-0.nightly-2026-03-04-084819
    test: 
    - chain: cucushift-installer-check-cluster-health
    workflow: cucushift-installer-rehearse-azure-ipi-cco-manual-workload-identity-managed-identity
zz_generated_metadata:
  branch: main
  org: openshift
  repo: verification-tests
  variant: installer-rehearse-4.22
