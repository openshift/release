base_images:
  ansible:
    name: "4.22"
    namespace: ocp
    tag: ansible
  aws-efs-csi-operator-create-efs:
    name: "4.22"
    namespace: ocp
    tag: aws-efs-csi-operator-create-efs
  dev-scripts:
    name: test
    namespace: ocp-kni
    tag: dev-scripts
  openstack-installer:
    name: "4.22"
    namespace: ocp
    tag: openstack-installer
  tests-private:
    name: tests-private
    namespace: ci
    tag: "4.22"
  upi-installer:
    name: "4.22"
    namespace: ocp
    tag: upi-installer
  vsphere-ci-python:
    name: vsphere-python
    namespace: ci
    tag: latest
releases:
  arm64-latest:
    candidate:
      architecture: arm64
      product: ocp
      stream: nightly
      version: "4.22"
  latest:
    candidate:
      product: ocp
      stream: nightly
      version: "4.22"
  multi-latest:
    candidate:
      architecture: multi
      product: ocp
      stream: nightly
      version: "4.22"
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: installer-rehearse-azure
  cron: '@yearly'
  steps:
    allow_skip_on_success: true
    cluster_profile: azure-qe
    env:
      CUSTOM_OPENSHIFT_INSTALL_RELEASE_IMAGE_OVERRIDE: registry.build09.ci.openshift.org/ci-ln-3nm0ic2/release:latest
      FEATURE_SET: TechPreviewNoUpgrade
      TEST_SKIPS: DNS should provide DNS for the cluster \| Aggregator Should be able
        to support the 1.17 Sample API Server using the current Aggregator \| Ensure
        HTTPRoute object is created \| Ensure LB, service, and dnsRecord are created
        for a Gateway object \| The HAProxy router should pass the http2 tests \|
        The HAProxy router should pass the gRPC interoperability tests \| Services
        should fail health check node port if there are only terminating endpoints
      USER_PROVISIONED_DNS: "yes"
    workflow: openshift-e2e-azure-custom-dns
- as: installer-rehearse-vsphere
  cron: '@yearly'
  steps:
    cluster_profile: vsphere-elastic
    env:
      CUSTOM_OPENSHIFT_INSTALL_RELEASE_IMAGE_OVERRIDE: registry.ci.openshift.org/ocp/release:4.22.0-0.nightly-2026-03-04-084819
    post:
    - chain: upi-vsphere-post
    pre:
    - chain: upi-vsphere-pre
- as: installer-rehearse-gcp
  cron: '@yearly'
  steps:
    allow_skip_on_success: true
    cluster_profile: gcp-qe
    dependencies:
      OPENSHIFT_INSTALL_RELEASE_IMAGE_OVERRIDE: release:multi-latest
    env:
      MINIMAL_PERMISSIONS_WITHOUT_DNS: "yes"
    workflow: cucushift-installer-rehearse-gcp-ipi-custom-dns
- as: installer-rehearse-gcp-regions
  cron: '@yearly'
  steps:
    allow_skip_on_success: true
    cluster_profile: gcp-qe
    dependencies:
      OPENSHIFT_INSTALL_RELEASE_IMAGE_OVERRIDE: release:arm64-latest
    env:
      CLUSTER_PARAMETER_SELECT_CONDITIONS: |
        [
          [
              {"column": "Region", "value": "europe-west4", "operator": "equals"}
          ]
        ]
      TEST_FILTERS: "57148"
      TEST_OBJECT: Regions
    test:
    - ref: openshift-extended-test-longduration
    - ref: openshift-e2e-test-qe-report
    workflow: cucushift-installer-rehearse-gcp-cases-clusters
- as: installer-rehearse-ibmcloud
  cron: '@yearly'
  steps:
    allow_skip_on_success: true
    cluster_profile: ibmcloud-qe
    test:
    - chain: cucushift-installer-check-cluster-health
    workflow: cucushift-installer-rehearse-ibmcloud-ipi-default
- as: installer-rehearse-ibmcloud-mirror
  cron: '@yearly'
  steps:
    allow_skip_on_success: true
    cluster_profile: ibmcloud-qe-2
    env:
      CUSTOM_OPENSHIFT_INSTALL_RELEASE_IMAGE_OVERRIDE: quay.io/openshift-release-dev/ocp-release:4.22.0-ec.3-x86_64
      MIRROR_BIN: oc-mirror
      SERVICE_ENDPOINT_COSConfig: DEFAULT_ENDPOINT
      SERVICE_ENDPOINT_GlobalCatalog: DEFAULT_ENDPOINT
    test:
    - chain: cucushift-installer-check-cluster-health
    workflow: cucushift-installer-rehearse-ibmcloud-ipi-disconnected-private
zz_generated_metadata:
  branch: main
  org: openshift
  repo: verification-tests
  variant: installer-rehearse-4.22
