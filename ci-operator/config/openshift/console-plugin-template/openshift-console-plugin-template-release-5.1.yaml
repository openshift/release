build_root:
  from_repository: true
images:
  items:
  - dockerfile_path: Dockerfile
    to: console-plugin-template
promotion:
  to:
  - name: "5.1"
    namespace: ocp
releases:
  initial:
    integration:
      name: "5.1"
      namespace: ocp
  latest:
    integration:
      include_built_images: true
      name: "5.1"
      namespace: ocp
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: frontend
  commands: |
    git config --global --add safe.directory /go/src/github.com/openshift/console-plugin-template
    ./test-frontend.sh
  container:
    from: src
- as: e2e-aws-plugin-template
  steps:
    cluster_profile: openshift-org-aws
    test:
    - as: test
      cli: latest
      commands: ./test-prow-e2e.sh
      dependencies:
      - env: PLUGIN_TEMPLATE_PULL_SPEC
        name: console-plugin-template
      from: src
      grace_period: 30m0s
      resources:
        requests:
          cpu: 100m
      timeout: 3h0m0s
    workflow: openshift-e2e-aws
zz_generated_metadata:
  branch: release-5.1
  org: openshift
  repo: console-plugin-template
