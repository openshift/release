build_root:
  image_stream_tag:
    name: release
    namespace: openshift
    tag: rhel-9-release-golang-1.25-openshift-4.21
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: pr-check
  commands: hack/prow_pr_check.sh
  container:
    from: src
- as: e2e-binary-build-success
  commands: |
    make e2e-binary-build
  container:
    from: src
  run_if_changed: ^(test/e2e/.*|go\.mod|go\.sum)$
zz_generated_metadata:
  branch: master
  org: openshift
  repo: managed-cluster-validating-webhooks
