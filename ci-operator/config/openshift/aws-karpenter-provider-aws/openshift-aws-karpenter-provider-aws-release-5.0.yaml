base_images:
  hypershift-operator:
    name: hypershift-operator
    namespace: hypershift
    tag: latest
  hypershift-tests:
    name: hypershift-tests
    namespace: hypershift
    tag: latest
binary_build_commands: make binary
build_root:
  from_repository: true
images:
  items:
  - dockerfile_path: openshift/Containerfile.rhel
    to: aws-karpenter-provider-aws
promotion:
  to:
  - disabled: true
    name: "5.0"
    namespace: ocp
releases:
  initial:
    integration:
      name: "5.0"
      namespace: ocp
  latest:
    integration:
      include_built_images: true
      name: "5.0"
      namespace: ocp
  multi-initial:
    candidate:
      architecture: multi
      product: ocp
      relative: 1
      stream: nightly
      version: "5.0"
  multi-latest:
    candidate:
      architecture: multi
      product: ocp
      stream: nightly
      version: "5.0"
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: e2e-aws
  steps:
    cluster_profile: openshift-org-aws
    workflow: openshift-e2e-aws
- as: e2e-hypershift
  skip_if_only_changed: ^docs/|\.md$|^(?:.*/)?(?:\.gitignore|OWNERS|OWNERS_ALIASES|LICENSE)$
  steps:
    cluster_profile: hypershift-aws
    dependencies:
      OCP_IMAGE_LATEST: release:multi-latest
      OCP_IMAGE_PREVIOUS: release:multi-initial
    env:
      AWS_MULTI_ARCH: "true"
      CI_TESTS_RUN: ^TestKarpenter
    workflow: hypershift-aws-e2e-nested
- as: verify-deps
  steps:
    env:
      CHECK_MOD_LIST: "false"
    test:
    - ref: go-verify-deps
zz_generated_metadata:
  branch: release-5.0
  org: openshift
  repo: aws-karpenter-provider-aws
