base_images:
  nested-podman:
    name: nested-podman
    namespace: ci
    tag: latest
images:
  items:
  - dockerfile_literal: |
      FROM nested-podman
      USER root
      RUN dnf install -y git go make tar gzip gpgme gpgme-devel pkgconfig jq python3.12 python3.12-devel python3.12-pip && dnf clean all
      RUN ln -s /usr/bin/podman /usr/local/bin/docker
      RUN mkdir -p /opt/app-root/src/ && git -C /opt/app-root/src/ clone https://github.com/openshift-eng/rebasebot.git
      WORKDIR /opt/app-root/src/rebasebot
      RUN python3.12 -m pip install --no-cache-dir uv && python3.12 -m pip install .
    from: nested-podman
    to: rebasebot-podman
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: rebasebot
  capabilities:
  - nested-podman
  cron: 0 12 * * Mon,Thu
  steps:
    test:
    - as: rebasebot
      commands: |
        rebasebot --source-repo kubernetes-sigs/cluster-api-provider-aws \
                  --source-ref-hook _BUILTIN_/source-ref-hooks/latest-stable-release.sh \
                  --dest openshift/cluster-api-provider-aws:main \
                  --rebase openshift-cloud-team/cluster-api-provider-aws:rebase-bot-main \
                  --update-go-modules \
                  --post-rebase-hook git:https://github.com/openshift/cluster-capi-operator/main:hack/rebasebot-hook-scripts/update-ocp-manifests-gen.sh git:https://github.com/openshift/cluster-capi-operator/main:hack/rebasebot-hook-scripts/generate-ocp-manifests.sh \
                  --slack-webhook /secrets/rebasebot/pixaa-alerts-slack-webhook \
                  --github-app-key /secrets/rebasebot/cloud-team-rebase-bot-key \
                  --github-cloner-key /secrets/rebasebot/cloud-team-bot-key \
                  --git-username cloud-team-rebase-bot \
                  --git-email cloud-team-rebase-bot@redhat.com \
                  --tag-policy=strict
      credentials:
      - mount_path: /secrets/rebasebot
        name: rebasebot-credentials
        namespace: test-credentials
      from: rebasebot-podman
      nested_podman: true
      resources:
        limits:
          memory: 12Gi
        requests:
          cpu: 800m
          memory: 2Gi
zz_generated_metadata:
  branch: main
  org: openshift
  repo: cluster-api-provider-aws
  variant: periodics
