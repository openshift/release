base_images:
  golang:
    name: builder
    namespace: ocp
    tag: rhel-9-golang-1.23-openshift-4.19
build_root:
  image_stream_tag:
    name: console-plugin-test-cypress
    namespace: ci
    tag: node22
images:
  items:
  - dockerfile_path: Dockerfile
    to: ocp-secrets-management-console
  - dockerfile_path: images/ci/Dockerfile.coverage
    to: ocp-secrets-management-console-coverage
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: unit
  commands: |
    yarn install && LANG=en_US.UTF-8 yarn test
  container:
    from: src
- as: unit-with-coverage
  postsubmit: true
  steps:
    post:
    - as: collect-coverage
      best_effort: true
      cli: latest
      commands: |
        curl -Os https://uploader.codecov.io/latest/linux/codecov
        chmod +x codecov
        ./codecov upload-process --token=$(cat /var/run/secrets/codecov/token)
      credentials:
      - mount_path: /var/run/secrets/codecov
        name: ocp-secrets-management-console-codecov-token
        namespace: test-credentials
      from: src
      resources:
        requests:
          cpu: 100m
      timeout: 15m0s
    test:
    - as: test
      cli: latest
      commands: |
        yarn install && LANG=en_US.UTF-8 yarn coverage
      from: src
      resources:
        requests:
          cpu: 100m
- as: operator-unit
  commands: |
    unset GOFLAGS && cd operator && make test
  container:
    from: golang
zz_generated_metadata:
  branch: main
  org: openshift
  repo: ocp-secrets-management-console
