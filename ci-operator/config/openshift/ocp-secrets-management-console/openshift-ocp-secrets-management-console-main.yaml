base_images:
  golang:
    name: builder
    namespace: ocp
    tag: rhel-9-golang-1.23-openshift-4.19
build_root:
  from_repository: true
images:
  items:
  - dockerfile_path: Dockerfile
    to: ocp-secrets-management-console
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: unit
  commands: |
    yarn install && LANG=en_US.UTF-8 yarn test
  container:
    from: src
- as: operator-unit
  commands: |
    cd operator && make test
  container:
    from: golang
- as: lint
  commands: |
    yarn install && yarn lint
  container:
    from: src
- as: frontend
  commands: |
    git config --global --add safe.directory /go/src/github.com/openshift/ocp-secrets-management-console
    ./test-frontend.sh
  container:
    from: src
zz_generated_metadata:
  branch: main
  org: openshift
  repo: ocp-secrets-management-console
