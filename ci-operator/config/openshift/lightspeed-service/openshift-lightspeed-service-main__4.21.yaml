base_images:
  lightspeed-service-api:
    name: lightspeed-service-api
    namespace: ols
    tag: latest
build_root:
  project_image:
    dockerfile_literal: |
      FROM registry.ci.openshift.org/ocp/ubi-python-311:9
      USER 0
      RUN dnf install -y podman
releases:
  latest:
    release:
      architecture: amd64
      channel: candidate
      version: "4.21"
resources:
  '*':
    limits:
      memory: 8Gi
    requests:
      cpu: 100m
      memory: 4Gi
tests:
- as: e2e-ols-cluster-periodics
  cluster_claim:
    architecture: amd64
    cloud: aws
    labels:
      region: us-east-1
      variant: fips
    owner: obs
    product: ocp
    timeout: 1h30m0s
    version: "4.21"
  cron: 10 4 * * *
  steps:
    allow_skip_on_success: true
    post:
    - ref: gather-must-gather
    test:
    - as: e2e
      cli: latest
      commands: |
        export BAM_PROVIDER_KEY_PATH=/var/run/bam/token
        export AZUREOPENAI_PROVIDER_KEY_PATH=/var/run/azure_openai/token
        export AZUREOPENAI_ENTRA_ID_TENANT_ID=$(cat /var/run/azureopenai-entra-id/tenant_id)
        export AZUREOPENAI_ENTRA_ID_CLIENT_ID=$(cat /var/run/azureopenai-entra-id/client_id)
        export AZUREOPENAI_ENTRA_ID_CLIENT_SECRET=$(cat /var/run/azureopenai-entra-id/client_secret)
        export OPENAI_PROVIDER_KEY_PATH=/var/run/openai/token
        export WATSONX_PROVIDER_KEY_PATH=/var/run/watsonx/token
        export RHAIIS_PROVIDER_KEY_PATH=/var/run/rhaiis/token
        export VERTEX_PROVIDER_KEY_PATH=/var/run/vertex/token
        export BEDROCK_AWS_ACCESS_KEY_ID=$(cat /var/run/bedrock-iam/aws_access_key_id)
        export BEDROCK_AWS_SECRET_ACCESS_KEY=$(cat /var/run/bedrock-iam/aws_secret_access_key)
        export BEDROCK_ROLE_AWS_ACCESS_KEY_ID=$(cat /var/run/bedrock-iam-role/aws_access_key_id)
        export BEDROCK_ROLE_AWS_SECRET_ACCESS_KEY=$(cat /var/run/bedrock-iam-role/aws_secret_access_key)
        export BEDROCK_ROLE_ARN=arn:aws:iam::103138678430:role/BedrockAccessRole

        export PROVIDER_KEY_PATH=/var/run/openai/token
        export PROVIDER=openai
        export MODEL=gpt-4o-mini

        export CP_OFFLINE_TOKEN=$(cat /var/run/insights-stage-upload-offline-token/token)

        tests/scripts/test-e2e-cluster-periodics.sh
      credentials:
      - mount_path: /var/run/azure_openai
        name: azureopenai-apitoken
        namespace: test-credentials
      - mount_path: /var/run/azureopenai-entra-id
        name: azureopenai-entra-id
        namespace: test-credentials
      - mount_path: /var/run/bam
        name: bam-apitoken
        namespace: test-credentials
      - mount_path: /var/run/openai
        name: openai-apitoken
        namespace: test-credentials
      - mount_path: /var/run/watsonx
        name: watsonx-apitoken
        namespace: test-credentials
      - mount_path: /var/run/rhaiis
        name: rhaiis-apitoken
        namespace: test-credentials
      - mount_path: /var/run/vertex
        name: vertex-apitoken
        namespace: test-credentials
      - mount_path: /var/run/bedrock-iam
        name: bedrock-iam
        namespace: test-credentials
      - mount_path: /var/run/bedrock-iam-role
        name: bedrock-iam-role
        namespace: test-credentials
      - mount_path: /var/run/insights-stage-upload-offline-token
        name: insights-stage-upload-offline-token
        namespace: test-credentials
      dependencies:
      - env: OLS_IMAGE
        name: lightspeed-service-api
      from: src
      resources:
        requests:
          cpu: 100m
    workflow: generic-claim
- as: ols-evaluation-periodics
  cluster_claim:
    architecture: amd64
    cloud: aws
    labels:
      region: us-east-1
      variant: fips
    owner: obs
    product: ocp
    timeout: 1h30m0s
    version: "4.21"
  cron: 10 8 * * *
  steps:
    allow_skip_on_success: true
    post:
    - ref: gather-must-gather
    test:
    - as: e2e
      cli: latest
      commands: |
        export AZUREOPENAI_PROVIDER_KEY_PATH=/var/run/azure_openai/token
        export OPENAI_PROVIDER_KEY_PATH=/var/run/openai/token
        export WATSONX_PROVIDER_KEY_PATH=/var/run/watsonx/token
        export VERTEX_PROVIDER_KEY_PATH=/var/run/vertex/token

        tests/scripts/test-evaluation.sh
      credentials:
      - mount_path: /var/run/azure_openai
        name: azureopenai-apitoken
        namespace: test-credentials
      - mount_path: /var/run/openai
        name: openai-apitoken
        namespace: test-credentials
      - mount_path: /var/run/watsonx
        name: watsonx-apitoken
        namespace: test-credentials
      - mount_path: /var/run/vertex
        name: vertex-apitoken
        namespace: test-credentials
      dependencies:
      - env: OLS_IMAGE
        name: lightspeed-service-api
      from: src
      resources:
        requests:
          cpu: 100m
    workflow: generic-claim
- as: ols-cluster-updates-periodics
  cluster_claim:
    architecture: amd64
    cloud: aws
    owner: openshift-ci
    product: ocp
    timeout: 1h30m0s
    version: "4.21"
  cron: 10 14 * * *
  reporter_config:
    channel: '#forum-ocp-pixaa-interrupt'
    job_states_to_report:
    - failure
    - error
    report_template: |
      :red_jenkins_circle: Periodic job *{{.Spec.Job}}* ended with *{{.Status.State}}*.
      (<{{.Status.URL}}|View logs>)
      (<https://prow.ci.openshift.org/job-history/gs/test-platform-results/pr-logs/directory/{{.Spec.Job}}|View history>)
  steps:
    allow_skip_on_success: true
    post:
    - ref: gather-must-gather
    pre:
    - ref: ipi-install-rbac
    - ref: openshift-configure-cincinnati
    - ref: cucushift-installer-check-cluster-health
    test:
    - as: cluster-updates
      cli: latest
      commands: |
        export BAM_PROVIDER_KEY_PATH=/var/run/bam/token
        export AZUREOPENAI_PROVIDER_KEY_PATH=/var/run/azure_openai/token
        export OPENAI_PROVIDER_KEY_PATH=/var/run/openai/token
        export WATSONX_PROVIDER_KEY_PATH=/var/run/watsonx/token
        export VERTEX_PROVIDER_KEY_PATH=/var/run/vertex/token
        export PROVIDER_KEY_PATH=/var/run/openai/token
        export PROVIDER=openai
        export MODEL=gpt-4.1-mini

        export CP_OFFLINE_TOKEN=$(cat /var/run/insights-stage-upload-offline-token/token)

        tests/scripts/test-cluster-updates.sh
      credentials:
      - mount_path: /var/run/bam
        name: bam-apitoken
        namespace: test-credentials
      - mount_path: /var/run/azure_openai
        name: azureopenai-apitoken
        namespace: test-credentials
      - mount_path: /var/run/openai
        name: openai-apitoken
        namespace: test-credentials
      - mount_path: /var/run/watsonx
        name: watsonx-apitoken
        namespace: test-credentials
      - mount_path: /var/run/vertex
        name: vertex-apitoken
        namespace: test-credentials
      - mount_path: /var/run/insights-stage-upload-offline-token
        name: insights-stage-upload-offline-token
        namespace: test-credentials
      dependencies:
      - env: OLS_IMAGE
        name: lightspeed-service-api
      from: src
      resources:
        requests:
          cpu: 100m
    workflow: generic-claim
zz_generated_metadata:
  branch: main
  org: openshift
  repo: lightspeed-service
  variant: "4.21"
