base_images:
  rosa-aws-cli:
    name: rosa-aws-cli
    namespace: ci
    tag: latest
build_root:
  from_repository: true
images:
  items:
  - dockerfile_path: Dockerfile
    to: route-monitor-operator
  - dockerfile_literal: |
      FROM src
      RUN cp -r deploy_pko /package
    from: src
    to: operator-pko
  - dockerfile_literal: |
      FROM src
      RUN CGO_ENABLED=0 go test ./test/e2e -v -c --tags=osde2e -o /usr/local/bin/e2e.test
    from: src
    to: operator-e2e
releases:
  latest:
    candidate:
      product: ocp
      stream: ci
      version: "4.21"
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: e2e-binary-build-success
  commands: |
    make e2e-binary-build
  container:
    from: src
  run_if_changed: ^(test/e2e/.*|go\.mod|go\.sum)$
- as: generate
  commands: make generate --always-make && git diff --exit-code
  container:
    from: src
- as: coverage
  commands: |
    export CODECOV_TOKEN=$(cat /tmp/secret/CODECOV_TOKEN)
    make coverage
  container:
    from: src
  secret:
    mount_path: /tmp/secret
    name: route-monitor-operator-codecov-token
- as: publish-coverage
  commands: |
    export CODECOV_TOKEN=$(cat /tmp/secret/CODECOV_TOKEN)
    make coverage
  container:
    from: src
  postsubmit: true
  secret:
    mount_path: /tmp/secret
    name: route-monitor-operator-codecov-token
- as: lint
  commands: make lint
  container:
    from: src
- as: test
  commands: make test
  container:
    from: src
- as: rosa-sts-e2e
  optional: true
  run_if_changed: ^(test/e2e/.*|pkg/.*|api/.*|cmd/.*|deploy/.*|go\.mod|go\.sum)$
  steps:
    cluster_profile: rosa-e2e-01
    dependencies:
      OPERATOR_IMAGE: pipeline:route-monitor-operator
      OPERATOR_PKO_IMAGE: pipeline:operator-pko
    env:
      GINKGO_FOCUS: Route Monitor Operator
      OPERATOR_CRDS: routemonitors.monitoring.openshift.io,clusterurlmonitors.monitoring.openshift.io
      OPERATOR_DEPLOYMENT_NAME: route-monitor-operator-controller-manager
      OPERATOR_NAME: route-monitor-operator
    workflow: rosa-operator-e2e-workflow
- as: rosa-sts-e2e-promotion
  cron: 0 0 31 2 *
  steps:
    cluster_profile: rosa-e2e-01
    dependencies:
      OPERATOR_IMAGE: pipeline:route-monitor-operator
      OPERATOR_PKO_IMAGE: pipeline:operator-pko
    env:
      GINKGO_FOCUS: Route Monitor Operator
      OPERATOR_CRDS: routemonitors.monitoring.openshift.io,clusterurlmonitors.monitoring.openshift.io
      OPERATOR_DEPLOYMENT_NAME: route-monitor-operator-controller-manager
      OPERATOR_NAME: route-monitor-operator
    workflow: rosa-operator-e2e-workflow
zz_generated_metadata:
  branch: master
  org: openshift
  repo: route-monitor-operator
