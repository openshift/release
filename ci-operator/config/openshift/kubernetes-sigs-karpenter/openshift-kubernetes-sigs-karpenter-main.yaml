build_root:
  from_repository: true
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
test_binary_build_commands: GOFLAGS='-mod=readonly' make toolchain
tests:
- as: unit
  commands: make test
  container:
    from: test-bin
zz_generated_metadata:
  branch: main
  org: openshift
  repo: kubernetes-sigs-karpenter
