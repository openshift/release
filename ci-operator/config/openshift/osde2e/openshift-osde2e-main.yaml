base_images:
  base:
    name: ubi
    namespace: ocp
    tag: "8"
  osde2e:
    name: osde2e
    namespace: ci
    tag: latest
build_root:
  from_repository: true
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: code-quality-checks
  commands: |
    export GOFLAGS=""
    export HOME=$(mktemp -d)
    export REPORT_DIR="$ARTIFACT_DIR"

    make check
  container:
    from: src
  skip_if_only_changed: ^(?:docs|\.github|\.tekton|scripts|test)|(.*\.md)|^(?:\.gitignore|.golang-ci.yml|OWNERS|LICENSE)$
- always_run: false
  as: hypershift-pr-check
  commands: |
    # Check if there are changes in pkg/ or cmd/ directories
    if ! (git diff --name-only ${PULL_BASE_SHA} $(git merge-base FETCH_HEAD main) | grep -qE '^(pkg/|cmd/)'); then
    echo "No changes detected in pkg/ or cmd/ directories. Skipping test." && exit 0; fi

    export GOFLAGS=""
    export REPORT_DIR="$ARTIFACT_DIR"
    export SHARED_DIR="${ARTIFACT_DIR}/shared"
    export CONFIGS="hypershift,ephemeral-cluster"
    export CHANNEL="stable"
    export LOG_BUCKET="osde2e-logs"
    export SECRET_LOCATIONS="/usr/local/osde2e-common,/usr/local/osde2e-credentials,/usr/local/osde2e-hypershift-credentials"

    go mod tidy
    make build

    # shellcheck source=scripts/ephemeral-rosa-deploy.sh
    source scripts/ephemeral-rosa-deploy.sh
    trap ephemeral_rosa_release EXIT

    echo "Provisioning ephemeral ROSA HCP cluster via bonfire"
    ephemeral_rosa_deploy

    # krkn-ai PreProcess requires CLUSTER_ID (env or --cluster-id); set from deploy output.
    if [[ -z "${CLUSTER_ID:-}" && -f "${SHARED_DIR}/cluster-id" ]]; then
      export CLUSTER_ID="$(tr -d '[:space:]' < "${SHARED_DIR}/cluster-id")"
    fi
    if [[ -z "${CLUSTER_ID:-}" ]]; then
      echo "CLUSTER_ID is required but was not set after ephemeral deploy"
      exit 1
    fi
    echo "Using CLUSTER_ID=${CLUSTER_ID}"

    echo "Running osde2e hypershift tests against ephemeral cluster"
    out/osde2e test --secret-locations ${SECRET_LOCATIONS} --configs ${CONFIGS} --skip-destroy-cluster --skip-must-gather

    echo "Running krkn-ai (dry-run) with CLUSTER_ID"
    export DRY_RUN=true
    out/osde2e krkn-ai \
      --secret-locations "${SECRET_LOCATIONS}" \
      --configs "${CONFIGS}" \
      --cluster-id "${CLUSTER_ID}" \
      --skip-destroy-cluster \
      --skip-must-gather
    echo "Finished osde2e pr checks on ephemeral ROSA hypershift."

    trap - EXIT
    ephemeral_rosa_release
  container:
    from: src
  secrets:
  - mount_path: /usr/local/osde2e-common
    name: osde2e-common
  - mount_path: /usr/local/osde2e-credentials
    name: osde2e-credentials
  - mount_path: /usr/local/osde2e-hypershift-credentials
    name: osde2e-hypershift-credentials
  - mount_path: /usr/local/ci-secrets/ephemeral-cluster
    name: bonfire-ephemeral-osci-svc-account
- as: stage-clusters-cleanup
  commands: |
    export REPORT_DIR="$ARTIFACT_DIR"
    export CONFIGS="stage"
    export SECRET_LOCATIONS="/usr/local/osde2e-common,/usr/local/osde2e-credentials"

    /osde2e cleanup --secret-locations ${SECRET_LOCATIONS} --configs ${CONFIGS} --clusters --dry-run=false
  container:
    clone: true
    from: osde2e
  cron: 0 1 * * 0
  secrets:
  - mount_path: /usr/local/osde2e-common
    name: osde2e-common
  - mount_path: /usr/local/osde2e-credentials
    name: osde2e-credentials
- as: prod-clusters-cleanup
  commands: |
    export REPORT_DIR="$ARTIFACT_DIR"
    export CONFIGS="prod"
    export SECRET_LOCATIONS="/usr/local/osde2e-common,/usr/local/osde2e-credentials"

    /osde2e cleanup --secret-locations ${SECRET_LOCATIONS} --configs ${CONFIGS} --clusters --dry-run=false
  container:
    clone: true
    from: osde2e
  cron: 0 2 * * 0
  secrets:
  - mount_path: /usr/local/osde2e-common
    name: osde2e-common
  - mount_path: /usr/local/osde2e-credentials
    name: osde2e-credentials
- as: int-clusters-cleanup
  commands: |
    export REPORT_DIR="$ARTIFACT_DIR"
    export CONFIGS="int"
    export SECRET_LOCATIONS="/usr/local/osde2e-common,/usr/local/osde2e-credentials"

    /osde2e cleanup --secret-locations ${SECRET_LOCATIONS} --configs ${CONFIGS} --clusters --dry-run=false
  container:
    clone: true
    from: osde2e
  cron: 0 3 * * 0
  secrets:
  - mount_path: /usr/local/osde2e-common
    name: osde2e-common
  - mount_path: /usr/local/osde2e-credentials
    name: osde2e-credentials
- as: cleanup-tekton-aws
  commands: |
    export SECRET_LOCATIONS="/usr/local/osde2e-common,/usr/local/osde2e-tekton-copy,/usr/local/osde2e-credentials"

    /osde2e cleanup --secret-locations ${SECRET_LOCATIONS} --ec2 --iam --s3 --elastic-ip --security-group --vpc --dry-run=false --send-cleanup-summary
  container:
    clone: true
    from: osde2e
  cron: 0 8 * * *
  secrets:
  - mount_path: /usr/local/osde2e-tekton-copy
    name: osde2e-tekton-copy
  - mount_path: /usr/local/osde2e-common
    name: osde2e-common
  - mount_path: /usr/local/osde2e-credentials
    name: osde2e-credentials
- as: cleanup-selfservice-aws
  commands: |
    export SECRET_LOCATIONS="/usr/local/osde2e-common,/usr/local/osde2e-selfservice-copy,/usr/local/osde2e-credentials"

    /osde2e cleanup --secret-locations ${SECRET_LOCATIONS} --ec2 --iam --s3 --elastic-ip --security-group --vpc --dry-run=false --send-cleanup-summary
  container:
    clone: true
    from: osde2e
  cron: 0 8 * * *
  secrets:
  - mount_path: /usr/local/osde2e-selfservice-copy
    name: osde2e-selfservice-copy
  - mount_path: /usr/local/osde2e-common
    name: osde2e-common
  - mount_path: /usr/local/osde2e-credentials
    name: osde2e-credentials
- as: cleanup-hypershift-aws
  commands: |
    export SECRET_LOCATIONS="/usr/local/osde2e-common,/usr/local/osde2e-hypershift-credentials,/usr/local/osde2e-credentials"

    /osde2e cleanup --secret-locations ${SECRET_LOCATIONS} --ec2 --iam --s3 --elastic-ip --security-group --vpc --dry-run=false  --send-cleanup-summary
  container:
    clone: true
    from: osde2e
  cron: 0 8 * * *
  secrets:
  - mount_path: /usr/local/osde2e-hypershift-credentials
    name: osde2e-hypershift-credentials
  - mount_path: /usr/local/osde2e-common
    name: osde2e-common
  - mount_path: /usr/local/osde2e-credentials
    name: osde2e-credentials
- as: cleanup-trt-aws
  commands: |
    export SECRET_LOCATIONS="/usr/local/osde2e-common,/usr/local/osde2e-trt-credentials"

    /osde2e cleanup --secret-locations ${SECRET_LOCATIONS} --ec2 --iam --s3 --elastic-ip --security-group --vpc --dry-run=false  --send-cleanup-summary
  container:
    clone: true
    from: osde2e
  cron: 0 8 * * *
  secrets:
  - mount_path: /usr/local/osde2e-trt-credentials
    name: osde2e-trt-credentials
  - mount_path: /usr/local/osde2e-common
    name: osde2e-common
- as: cleanup-rosa-nightly
  commands: |
    export SECRET_LOCATIONS="/usr/local/rosa-e2e-prow-ci-01-osde2e"

    /osde2e cleanup --secret-locations ${SECRET_LOCATIONS} --ec2 --iam --s3 --elastic-ip --security-group --vpc --dry-run=false --send-cleanup-summary
  container:
    clone: true
    from: osde2e
  cron: 0 1 * * 5
  secrets:
  - mount_path: /usr/local/rosa-e2e-prow-ci-01-osde2e
    name: rosa-e2e-prow-ci-01-osde2e
zz_generated_metadata:
  branch: main
  org: openshift
  repo: osde2e
