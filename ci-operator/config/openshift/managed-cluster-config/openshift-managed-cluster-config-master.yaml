build_root:
  project_image:
    dockerfile_path: Dockerfile
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: pr-check
  commands: hack/app_sre_pr_check.sh
  container:
    from: src
- as: checklinks-pr
  commands: make checklinks
  container:
    from: src
  optional: true
- as: checklinks-weekly
  commands: make checklinks
  container:
    from: src
  cron: 0 0 * * 3
zz_generated_metadata:
  branch: master
  org: openshift
  repo: managed-cluster-config
