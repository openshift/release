base_images:
  python-311:
    name: ubi-python-311
    namespace: ocp
    tag: "9"
build_root:
  from_repository: true
images:
  items:
  - dockerfile_path: Containerfile
    to: agentic-skills
  - dockerfile_literal: |
      FROM python-311
      COPY . /src
      WORKDIR /src
      RUN pip install "cisco-ai-skill-scanner[vertex]" skillsaw
    from: python-311
    inputs:
      src:
        paths:
        - destination_dir: .
          source_path: /go/src/github.com/openshift/agentic-skills/.
    to: skill-tools
promotion:
  to:
  - name: "5.0"
    namespace: ocp
releases:
  latest:
    integration:
      include_built_images: true
      name: "5.0"
      namespace: ocp
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: lint
  skip_if_only_changed: ^(README\.md|OWNERS|LICENSE|\.gitignore)$
  steps:
    test:
    - ref: openshift-harness-lint
- as: security-scan
  skip_if_only_changed: ^(README\.md|OWNERS|LICENSE|\.gitignore)$
  steps:
    test:
    - ref: openshift-harness-security-scan
zz_generated_metadata:
  branch: main
  org: openshift
  repo: agentic-skills
