build_root:
  from_repository: true
images:
  items:
  - dockerfile_path: Containerfile
    to: agentic-skills
promotion:
  to:
  - name: "4.23"
    namespace: ocp
releases:
  latest:
    integration:
      include_built_images: true
      name: "4.23"
      namespace: ocp
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: eval
  commands: echo FIXME actual tests
  container:
    from: src
  skip_if_only_changed: ^(README\.md|OWNERS|LICENSE|AGENTS\.md|CLAUDE\.md|\.gitignore)$
zz_generated_metadata:
  branch: release-4.23
  org: openshift
  repo: agentic-skills
