base_images:
  cli-operator-sdk:
    name: cli-operator-sdk
    namespace: ocp
    tag: v1.31.0
  dev-scripts:
    name: test
    namespace: ocp-kni
    tag: dev-scripts
  must-gather:
    name: "4.22"
    namespace: ocp
    tag: must-gather
  ocp_4.22_base-rhel9:
    name: "4.22"
    namespace: ocp
    tag: base-rhel9
binary_build_commands: make build build-vgmanager
build_root:
  image_stream_tag:
    name: builder
    namespace: ocp
    tag: rhel-9-golang-1.25-openshift-4.22
images:
  items:
  - dockerfile_literal: |-
      FROM ocp_4.22_base-rhel9
      RUN dnf install -y make git python3 python3-pip patch
      RUN pip3 install pre-commit

      COPY --from=root:current /usr/lib/golang /usr/local/go
      ENV PATH=$PATH:/usr/local/go/bin

      ENV GOPATH=/tmp/go
      ENV GOTOOLCHAIN=auto
      ENV GOTOOLDIR=/tmp/gotools

      RUN mkdir /.cache ${GOPATH} && chmod 775 -R /.cache ${GOPATH}
      RUN mkdir /.local && chmod 777 /.local
      RUN mkdir /tmp/gotools && chmod 777 /tmp/gotools

      ENV PRE_COMMIT_HOME=/.cache/precommit
      ENV GOLANGCI_LINT_CACHE=/.cache/golangci

      # Snyk
      ENV SNYK_DIR=/tmp/snyk
      RUN mkdir -p ${SNYK_DIR}
      RUN curl https://static.snyk.io/cli/latest/snyk-linux -o ${SNYK_DIR}/snyk
      RUN chmod +x ${SNYK_DIR}/snyk
      ENV PATH=$PATH:${SNYK_DIR}
    from: ocp_4.22_base-rhel9
    inputs:
      root:
        as:
        - root:current
    to: lvms-pre-commit
  - dockerfile_path: Dockerfile
    inputs:
      ocp_4.22_base-rhel9:
        as:
        - fedora:latest
    to: lvm-operator
  - context_dir: must-gather/
    dockerfile_path: Dockerfile
    from: must-gather
    to: lvms-must-gather
  - context_dir: .
    dockerfile_path: test/integration/Dockerfile
    inputs:
      ocp_4.22_base-rhel9:
        as:
        - registry.access.redhat.com/ubi9/ubi-minimal:latest
    to: lvm-operator-integration-test
operator:
  bundles:
  - as: lvm-operator-bundle
    dockerfile_path: bundle.Dockerfile
  substitutions:
  - pullspec: quay.io/lvms_dev/lvms-operator:latest
    with: pipeline:lvm-operator
releases:
  initial:
    candidate:
      product: ocp
      stream: nightly
      version: "4.22"
  latest:
    candidate:
      product: ocp
      stream: nightly
      version: "4.22"
  multi-latest:
    candidate:
      architecture: multi
      product: ocp
      stream: nightly
      version: "4.22"
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
  precommit-check:
    requests:
      cpu: 100m
      memory: 4Gi
test_binary_build_commands: |
  go mod vendor
  mkdir /.cache && chmod 775 -R /.cache ${GOPATH}
  mkdir /.local && chmod 777 /.local
tests:
- as: e2e-aws-sno-qe-integration-tests
  cron: '@weekly'
  reporter_config:
    channel: '#lvms-release-coordination'
    job_states_to_report:
    - error
    - failure
    - success
    report_template: '{{if eq .Status.State "success"}} :large_green_circle: Job *{{.Spec.Job}}*
      ended with *{{.Status.State}}*. <{{.Status.URL}}|View logs> :large_green_circle:
      {{else}} :red_circle: Job *{{.Spec.Job}}* ended with *{{.Status.State}}*. <{{.Status.URL}}|View
      logs> :red_circle: {{end}}'
  steps:
    cluster_profile: openshift-org-aws
    env:
      LVM_OPERATOR_SUB_INSTALL_NAMESPACE: openshift-lvm-storage
      LVM_OPERATOR_SUB_SOURCE: lvm-catalogsource
    test:
    - as: lvms-sno-integration-test
      cli: latest
      commands: |
        ./integration-test run-suite -c 1 --junit-path ${ARTIFACT_DIR}/junit_results.xml openshift/lvm-operator/test/integration/qe_tests/sno
      from: lvm-operator-integration-test
      resources:
        requests:
          cpu: 100m
          memory: 200Mi
      timeout: 4h0m0s
    workflow: cucushift-installer-rehearse-aws-ipi-sno-lvms
- as: e2e-aws-sno-arm-qe-integration-tests
