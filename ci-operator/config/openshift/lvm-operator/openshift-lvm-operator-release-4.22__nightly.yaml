base_images:
  dev-scripts:
    name: test
    namespace: ocp-kni
    tag: dev-scripts
  ocp_4.22_base-rhel9:
    name: "4.22"
    namespace: ocp
    tag: base-rhel9
build_root:
  image_stream_tag:
    name: builder
    namespace: ocp
    tag: rhel-9-golang-1.25-openshift-4.22
images:
  items:
  - context_dir: .
    dockerfile_path: test/integration/Dockerfile
    inputs:
      ocp_4.22_base-rhel9:
        as:
        - registry.access.redhat.com/ubi9/ubi-minimal:latest
    to: lvm-operator-integration-test
releases:
  initial:
    candidate:
      product: ocp
      stream: nightly
      version: "4.22"
  latest:
    candidate:
      product: ocp
      stream: nightly
      version: "4.22"
  multi-latest:
    candidate:
      architecture: multi
      product: ocp
      stream: nightly
      version: "4.22"
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: e2e-aws-sno-qe-integration-tests
  cron: '@weekly'
  reporter_config:
    channel: '#lvms-release-coordination'
    job_states_to_report:
    - error
    - failure
    - success
    report_template: '{{if eq .Status.State "success"}} :large_green_circle: Job *{{.Spec.Job}}*
      ended with *{{.Status.State}}*. <{{.Status.URL}}|View logs> :large_green_circle:
      {{else}} :red_circle: Job *{{.Spec.Job}}* ended with *{{.Status.State}}*. <{{.Status.URL}}|View
      logs> :red_circle: {{end}}'
  steps:
    cluster_profile: openshift-org-aws
    env:
      LVM_OPERATOR_SUB_INSTALL_NAMESPACE: openshift-lvm-storage
      LVM_OPERATOR_SUB_SOURCE: lvm-catalogsource
    test:
    - as: lvms-sno-integration-test
      cli: latest
      commands: |
        ./integration-test run-suite -c 1 --junit-path ${ARTIFACT_DIR}/junit_results.xml openshift/lvm-operator/test/integration/qe_tests/sno
      from: lvm-operator-integration-test
      resources:
        requests:
          cpu: 100m
          memory: 200Mi
      timeout: 4h0m0s
    - as: e2e-gather
      cli: latest
      commands: |
        oc adm must-gather --image="${GATHER_IMG}" --dest-dir=${ARTIFACT_DIR}/lvms-must-gather
      dependencies:
      - env: GATHER_IMG
        name: lvms-must-gather
      from: lvm-operator-integration-test
      resources:
        requests:
          cpu: 100m
          memory: 200Mi
    workflow: cucushift-installer-rehearse-aws-ipi-sno-lvms
- as: e2e-aws-sno-arm-qe-integration-tests
  cron: '@weekly'
  reporter_config:
    channel: '#lvms-release-coordination'
    job_states_to_report:
    - error
    - failure
    - success
    report_template: '{{if eq .Status.State "success"}} :large_green_circle: Job *{{.Spec.Job}}*
      ended with *{{.Status.State}}*. <{{.Status.URL}}|View logs> :large_green_circle:
      {{else}} :red_circle: Job *{{.Spec.Job}}* ended with *{{.Status.State}}*. <{{.Status.URL}}|View
      logs> :red_circle: {{end}}'
  steps:
    cluster_profile: openshift-org-aws
    dependencies:
      OPENSHIFT_INSTALL_RELEASE_IMAGE_OVERRIDE: release:multi-latest
    env:
      COMPUTE_NODE_TYPE: m6g.4xlarge
      CONTROL_PLANE_INSTANCE_TYPE: m6g.4xlarge
      LVM_OPERATOR_SUB_INSTALL_NAMESPACE: openshift-lvm-storage
      LVM_OPERATOR_SUB_SOURCE: lvm-catalogsource
      OCP_ARCH: arm64
    test:
