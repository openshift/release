base_images:
  ocp_4.18_base-rhel9:
    name: "4.18"
    namespace: ocp
    tag: base-rhel9
build_root:
  image_stream_tag:
    name: builder
    namespace: ocp
    tag: rhel-9-golang-1.22-openshift-4.18
images:
  items:
  - dockerfile_literal: |-
      FROM golang:1.22 AS builder
      WORKDIR /workspace
      RUN git clone --depth 1 --branch release-4.18 https://github.com/openshift/lvm-operator.git /tmp/src && \
          cp -r /tmp/src/test/integration/* .
      RUN GO_COMPLIANCE_POLICY=exempt_all CGO_ENABLED=0 go build -o integration-test .
      FROM registry.access.redhat.com/ubi9/ubi-minimal:latest
      COPY --from=builder /workspace/integration-test /integration-test
      ENTRYPOINT ["/integration-test"]
    inputs:
      ocp_4.18_base-rhel9:
        as:
        - registry.access.redhat.com/ubi9/ubi-minimal:latest
      root:
        as:
        - golang:1.22
    to: lvm-operator-integration-test
releases:
  initial:
    candidate:
      product: ocp
      stream: nightly
      version: "4.18"
  latest:
    candidate:
      product: ocp
      stream: nightly
      version: "4.18"
  multi-latest:
    candidate:
      architecture: multi
      product: ocp
      stream: nightly
      version: "4.18"
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: e2e-aws-sno-qe-integration-tests
  run_if_changed: releases/lvm-operator-(catalog-4-18|rhba-v4\.18).*
  steps:
    cluster_profile: openshift-org-aws
    env:
      LVM_OPERATOR_SUB_INSTALL_NAMESPACE: openshift-lvm-storage
      LVM_OPERATOR_SUB_SOURCE: lvm-catalogsource
      ZSTREAM_VERSION: "4.18"
    test:
    - as: lvms-sno-integration-test
      cli: latest
      commands: |
        ./integration-test run-suite -c 1 --junit-path ${ARTIFACT_DIR}/junit_results.xml openshift/lvm-operator/test/integration/qe_tests/sno
      from: lvm-operator-integration-test
      resources:
        requests:
          cpu: "1"
          memory: 1Gi
      timeout: 4h0m0s
    workflow: cucushift-installer-rehearse-aws-ipi-sno-lvms
- as: e2e-aws-sno-arm-qe-integration-tests
  run_if_changed: releases/lvm-operator-(catalog-4-18|rhba-v4\.18).*
  steps:
    cluster_profile: openshift-org-aws
    dependencies:
      OPENSHIFT_INSTALL_RELEASE_IMAGE_OVERRIDE: release:multi-latest
    env:
      COMPUTE_NODE_TYPE: m6g.4xlarge
      CONTROL_PLANE_INSTANCE_TYPE: m6g.4xlarge
      LVM_OPERATOR_SUB_INSTALL_NAMESPACE: openshift-lvm-storage
      LVM_OPERATOR_SUB_SOURCE: lvm-catalogsource
      OCP_ARCH: arm64
      ZSTREAM_VERSION: "4.18"
    test:
