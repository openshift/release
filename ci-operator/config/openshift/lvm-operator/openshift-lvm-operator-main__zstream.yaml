releases:
  latest:
    candidate:
      product: ocp
      stream: nightly
      version: "4.21"
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: trigger
  cron: 0 6 * * *
  steps:
    env:
      LVMS_ZSTREAM_RELEASES: 4.14,4.16,4.18,4.19,4.20,4.21
    test:
    - ref: lvms-zstream-trigger
zz_generated_metadata:
  branch: main
  org: openshift
  repo: lvm-operator
  variant: zstream
