base_images:
  cli-operator-sdk:
    name: cli-operator-sdk
    namespace: ocp
    tag: v1.31.0
  must-gather:
    name: "4.21"
    namespace: ocp
    tag: must-gather
  ocp_4.21_base-rhel9:
    name: "4.21"
    namespace: ocp
    tag: base-rhel9
binary_build_commands: make build build-vgmanager
build_root:
  image_stream_tag:
    name: builder
    namespace: ocp
    tag: rhel-9-golang-1.24-openshift-4.21
images:
- dockerfile_literal: |-
    FROM ocp_4.21_base-rhel9
    RUN dnf install -y make git python3 python3-pip patch
    RUN pip3 install pre-commit

    COPY --from=root:current /usr/lib/golang /usr/local/go
    ENV PATH=$PATH:/usr/local/go/bin

    ENV GOPATH=/tmp/go
    ENV GOTOOLCHAIN=auto
    ENV GOTOOLDIR=/tmp/gotools

    RUN mkdir /.cache ${GOPATH} && chmod 775 -R /.cache ${GOPATH}
    RUN mkdir /.local && chmod 777 /.local
    RUN mkdir /tmp/gotools && chmod 777 /tmp/gotools

    ENV PRE_COMMIT_HOME=/.cache/precommit
    ENV GOLANGCI_LINT_CACHE=/.cache/golangci
  from: ocp_4.21_base-rhel9
  inputs:
    root:
      as:
      - root:current
  to: lvms-pre-commit
- dockerfile_path: Dockerfile
  inputs:
    ocp_4.21_base-rhel9:
      as:
      - fedora:latest
  to: lvm-operator
- context_dir: must-gather/
  dockerfile_path: Dockerfile
  from: must-gather
  to: lvms-must-gather
- context_dir: .
  dockerfile_path: test/integration/Dockerfile
  inputs:
    ocp_4.21_base-rhel9:
      as:
      - registry.access.redhat.com/ubi9/ubi-minimal:latest
  to: lvm-operator-integration-test
operator:
  bundles:
  - as: lvm-operator-bundle
    dockerfile_path: bundle.Dockerfile
  substitutions:
  - pullspec: quay.io/lvms_dev/lvms-operator:latest
    with: pipeline:lvm-operator
promotion:
  to:
  - additional_images:
      lvm-operator-bundle: lvm-operator-bundle
    excluded_images:
    - lvms-pre-commit
    - lvm-operator-integration-test
    namespace: lvms
    tag: latest
    tag_by_commit: true
releases:
  initial:
    integration:
      name: "4.21"
      namespace: ocp
  latest:
    integration:
      include_built_images: true
      name: "4.21"
      namespace: ocp
  multi-latest:
    candidate:
      architecture: multi
      product: ocp
      stream: nightly
      version: "4.21"
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
  precommit-check:
    requests:
      cpu: 100m
      memory: 4Gi
test_binary_build_commands: |
  go mod vendor
  mkdir /.cache && chmod 775 -R /.cache ${GOPATH}
  mkdir /.local && chmod 777 /.local
tests:
- as: precommit-check
  commands: |
    export SKIP=no-commit-to-branch
    pre-commit run --all-files --show-diff-on-failure
  container:
    clone: true
    from: lvms-pre-commit
  timeout: 15m0s
- as: unit-test
  commands: |
    export CODECOV_TOKEN=$(cat /tmp/secret/CODECOV_TOKEN)
    make test
  container:
    from: test-bin
  secret:
    mount_path: /tmp/secret
    name: lvm-operator-codecov-token
  skip_if_only_changed: \.md$|^(?:.*/)?(?:\.gitignore|.tekton/.*|release/.*|renovate.json|OWNERS|OWNERS_ALIASES|LICENSE|PROJECT)$
- as: post-unit-test
  commands: |
    export CODECOV_TOKEN=$(cat /tmp/secret/CODECOV_TOKEN)
    make test
  container:
    from: test-bin
  postsubmit: true
  secret:
    mount_path: /tmp/secret
    name: lvm-operator-codecov-token
  skip_if_only_changed: \.md$|^(?:.*/)?(?:\.gitignore|.tekton/.*|release/.*|renovate.json|OWNERS|OWNERS_ALIASES|LICENSE|PROJECT)$
- as: security
  optional: true
  skip_if_only_changed: \.md$|^(?:.*/)?(?:\.gitignore|.tekton/.*|release/.*|renovate.json|OWNERS|OWNERS_ALIASES|LICENSE|PROJECT)$
  steps:
    env:
      ORG_NAME: "81de31f3-6dff-46ff-af37-664e272a9fe3"
      PROJECT_NAME: "lvms"
      SNYK_ENABLE_CODE_SCAN: "true"
      SNYK_ENABLE_DEPS_SCAN: "true"
      SNYK_CODE_ADDITIONAL_ARGS: "--severity-threshold=medium"
      SNYK_DEPS_ADDITIONAL_ARGS: "--severity-threshold=medium --report"
      SNYK_PRE_EXECUTION_HOOK_CMD: "go mod vendor"
    workflow: openshift-ci-security
- as: e2e-aws-single-node
  cron: '@daily'
  presubmit: true
  skip_if_only_changed: \.md$|^(?:.*/)?(?:\.gitignore|.tekton/.*|release/.*|renovate.json|OWNERS|OWNERS_ALIASES|LICENSE|PROJECT)$
  steps:
    cluster_profile: aws-3
    dependencies:
      OO_BUNDLE: lvm-operator-bundle
    env:
      OO_INSTALL_MODE: OwnNamespace
      OO_INSTALL_NAMESPACE: openshift-lvm-storage
    test:
    - as: e2e-test
      cli: latest
      commands: DISK_INSTALL=true make e2e
      dependencies:
      - env: OO_BUNDLE
        name: lvm-operator-bundle
      from: test-bin
      resources:
        requests:
          cpu: 100m
          memory: 200Mi
    - as: e2e-gather
      cli: latest
      commands: |
        oc adm must-gather --image="${GATHER_IMG}" --dest-dir=${ARTIFACT_DIR}/lvms-must-gather
      dependencies:
      - env: GATHER_IMG
        name: lvms-must-gather
      from: test-bin
      resources:
        requests:
          cpu: 100m
          memory: 200Mi
    workflow: optional-operators-ci-operator-sdk-aws-sno
- as: e2e-aws
  cron: '@daily'
  presubmit: true
  skip_if_only_changed: \.md$|^(?:.*/)?(?:\.gitignore|.tekton/.*|release/.*|renovate.json|OWNERS|OWNERS_ALIASES|LICENSE|PROJECT)$
  steps:
    cluster_profile: aws-2
    dependencies:
      OO_BUNDLE: lvm-operator-bundle
    env:
      OO_INSTALL_MODE: OwnNamespace
      OO_INSTALL_NAMESPACE: openshift-lvm-storage
    test:
    - as: e2e-test
      cli: latest
      commands: DISK_INSTALL=true make e2e
      dependencies:
      - env: OO_BUNDLE
        name: lvm-operator-bundle
      from: test-bin
      resources:
        requests:
          cpu: 100m
          memory: 200Mi
    - as: e2e-gather
      cli: latest
      commands: |
        oc adm must-gather --image="${GATHER_IMG}" --dest-dir=${ARTIFACT_DIR}/lvms-must-gather
      dependencies:
      - env: GATHER_IMG
        name: lvms-must-gather
      from: test-bin
      resources:
        requests:
          cpu: 100m
          memory: 200Mi
    workflow: optional-operators-ci-operator-sdk-aws
- as: e2e-aws-hypershift
  skip_if_only_changed: \.md$|^(?:.*/)?(?:\.gitignore|.tekton/.*|release/.*|renovate.json|OWNERS|OWNERS_ALIASES|LICENSE|PROJECT)$
  steps:
    cluster_profile: aws-3
    dependencies:
      OO_BUNDLE: lvm-operator-bundle
      RELEASE_IMAGE_LATEST: release:multi-latest
    env:
      HYPERSHIFT_SKIP_VERSION_VALIDATION: "true"
      OO_INSTALL_MODE: OwnNamespace
      OO_INSTALL_NAMESPACE: openshift-lvm-storage
    test:
    - as: e2e-test
      cli: latest
      commands: DISK_INSTALL=true make e2e
      from: test-bin
      resources:
        requests:
          cpu: 100m
          memory: 200Mi
    - as: e2e-gather
      cli: latest
      commands: |
        oc adm must-gather --image="${GATHER_IMG}" --dest-dir=${ARTIFACT_DIR}/lvms-must-gather
      dependencies:
      - env: GATHER_IMG
        name: lvms-must-gather
      from: test-bin
      resources:
        requests:
          cpu: 100m
          memory: 200Mi
    workflow: optional-operators-ci-operator-sdk-hypershift
- as: e2e-aws-single-node-integration-tests
  cron: '@weekly'
  presubmit: true
  skip_if_only_changed: \.md$|^(?:.*/)?(?:\.gitignore|.tekton/.*|release/.*|renovate.json|OWNERS|OWNERS_ALIASES|LICENSE|PROJECT)$
  steps:
    cluster_profile: aws-3
    dependencies:
      OO_BUNDLE: lvm-operator-bundle
    env:
      OO_INSTALL_MODE: OwnNamespace
      OO_INSTALL_NAMESPACE: openshift-lvm-storage
    test:
    - as: lvms-sno-integration-test
      cli: latest
      commands: |
        ./integration-test run-suite openshift/lvm-operator/test/integration/single-node
      from: lvm-operator-integration-test
      resources:
        requests:
          cpu: 100m
          memory: 200Mi
    workflow: optional-operators-ci-operator-sdk-aws-sno
zz_generated_metadata:
  branch: main
  org: openshift
  repo: lvm-operator
