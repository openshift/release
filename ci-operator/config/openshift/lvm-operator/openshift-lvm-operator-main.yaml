      commands: DISK_INSTALL=true make e2e
      dependencies:
      - env: OO_BUNDLE
        name: lvm-operator-bundle
      from: test-bin
      resources:
        requests:
          cpu: 100m
          memory: 200Mi
    - as: e2e-gather
      cli: latest
      commands: |
        oc adm must-gather --image="${GATHER_IMG}" --dest-dir=${ARTIFACT_DIR}/lvms-must-gather
      dependencies:
      - env: GATHER_IMG
        name: lvms-must-gather
      from: test-bin
      resources:
        requests:
          cpu: 100m
          memory: 200Mi
    workflow: optional-operators-ci-operator-sdk-aws
- as: e2e-aws-hypershift
  skip_if_only_changed: \.md$|^(?:.*/)?(?:\.gitignore|.tekton/.*|release/.*|renovate.json|OWNERS|OWNERS_ALIASES|LICENSE|PROJECT)$
  steps:
    cluster_profile: openshift-org-aws
    dependencies:
      OO_BUNDLE: lvm-operator-bundle
      RELEASE_IMAGE_LATEST: release:multi-latest
    env:
      HYPERSHIFT_SKIP_VERSION_VALIDATION: "true"
      OO_INSTALL_MODE: OwnNamespace
      OO_INSTALL_NAMESPACE: openshift-lvm-storage
    test:
    - as: e2e-test
      cli: latest
      commands: DISK_INSTALL=true make e2e
      from: test-bin
      resources:
        requests:
          cpu: 100m
          memory: 200Mi
    - as: e2e-gather
      cli: latest
      commands: |
        oc adm must-gather --image="${GATHER_IMG}" --dest-dir=${ARTIFACT_DIR}/lvms-must-gather
      dependencies:
      - env: GATHER_IMG
        name: lvms-must-gather
      from: test-bin
      resources:
        requests:
          cpu: 100m
          memory: 200Mi
    workflow: optional-operators-ci-operator-sdk-hypershift
- as: e2e-aws-single-node-integration-tests
  cron: '@weekly'
  presubmit: true
  skip_if_only_changed: \.md$|^(?:.*/)?(?:\.gitignore|.tekton/.*|release/.*|renovate.json|OWNERS|OWNERS_ALIASES|LICENSE|PROJECT)$
  steps:
    cluster_profile: openshift-org-aws
    dependencies:
      OO_BUNDLE: lvm-operator-bundle
    env:
      OO_INSTALL_MODE: OwnNamespace
      OO_INSTALL_NAMESPACE: openshift-lvm-storage
    test:
    - as: lvms-sno-integration-test
      cli: latest
      commands: |
        ./integration-test run-suite openshift/lvm-operator/test/integration/qe_tests/sno
      from: lvm-operator-integration-test
      resources:
        requests:
          cpu: 100m
          memory: 200Mi
    workflow: optional-operators-ci-operator-sdk-aws-sno
- as: e2e-aws-sno-qe-integration-tests
  cron: '@weekly'
  steps:
    cluster_profile: openshift-org-aws
    env:
      LVM_OPERATOR_SUB_INSTALL_NAMESPACE: openshift-lvm-storage
      LVM_OPERATOR_SUB_SOURCE: lvm-catalogsource
    test:
    - as: lvms-sno-integration-test
      cli: latest
      commands: |
        ./integration-test run-suite -c 1 --junit-path ${ARTIFACT_DIR}/junit_results.xml openshift/lvm-operator/test/integration/qe_tests/sno
      from: lvm-operator-integration-test
      resources:
        requests:
          cpu: 100m
          memory: 200Mi
      timeout: 4h0m0s
    workflow: cucushift-installer-rehearse-aws-ipi-sno-lvms
- as: e2e-aws-sno-arm-qe-integration-tests
