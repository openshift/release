build_root:
  image_stream_tag:
    name: builder
    namespace: ocp
    tag: rhel-9-golang-1.24-openshift-4.21
releases:
  initial:
    candidate:
      product: ocp
      stream: nightly
      version: "4.21"
  latest:
    candidate:
      product: ocp
      stream: nightly
      version: "4.21"
  multi-latest:
    candidate:
      architecture: multi
      product: ocp
      stream: nightly
      version: "4.21"
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: e2e-aws-sno-qe-integration-tests
  run_if_changed: releases/lvm-operator-(catalog-4-21|rhba-v4\.21).*
  steps:
    cluster_profile: openshift-org-aws
    env:
      LVM_OPERATOR_SUB_INSTALL_NAMESPACE: openshift-lvm-storage
      LVM_OPERATOR_SUB_SOURCE: lvm-catalogsource
      ZSTREAM_VERSION: "4.21"
    test:
    - as: lvms-sno-integration-test
      cli: latest
      commands: |
        COMMIT=$(cat ${SHARED_DIR}/lvm_source_commit 2>/dev/null || true)
        if [[ -z "${COMMIT}" || "${COMMIT}" == "null" ]]; then
          FALLBACK_BRANCH="release-${ZSTREAM_VERSION}"
          echo "WARNING: No source commit found in catalog image labels, falling back to HEAD of ${FALLBACK_BRANCH}"
          COMMIT="${FALLBACK_BRANCH}"
        fi
        cd /tmp && git init src && cd src
        git remote add origin https://github.com/openshift/lvm-operator.git
        git fetch --depth 1 origin ${COMMIT} && git checkout FETCH_HEAD
        cd test/integration
        GO_COMPLIANCE_POLICY=exempt_all CGO_ENABLED=0 go build -o /tmp/integration-test .
        /tmp/integration-test run-suite -c 1 --junit-path ${ARTIFACT_DIR}/junit_results.xml openshift/lvm-operator/test/integration/qe_tests/sno
      from: root
      resources:
        requests:
          cpu: "1"
          memory: 1Gi
      timeout: 4h0m0s
    workflow: cucushift-installer-rehearse-aws-ipi-sno-lvms
- as: e2e-aws-sno-arm-qe-integration-tests
  run_if_changed: releases/lvm-operator-(catalog-4-21|rhba-v4\.21).*
  steps:
    cluster_profile: openshift-org-aws
    dependencies:
      OPENSHIFT_INSTALL_RELEASE_IMAGE_OVERRIDE: release:multi-latest
