promotion:
  to:
  - namespace: ci
    tag: latest
prowgen:
  enable_secrets_store_csi_driver: true
resources:
  '*':
    requests:
      cpu: "1"
      memory: 1Gi
  unit:
    requests:
      cpu: "4"
      memory: 4Gi
test_binary_build_commands: make race-install
tests:
- as: unit
  commands: make test TESTFLAGS='-count=25 -coverprofile=cover.out'
  container:
    from: src
  node_architecture: arm64
- as: codegen
  commands: make verify-gen
  container:
    from: src
  node_architecture: arm64
- as: format
  commands: make format
  container:
    from: src
  node_architecture: arm64
- as: integration
  commands: make integration
  container:
    from: bin
  node_architecture: arm64
- always_run: false
  as: e2e
  pipeline_run_if_changed: ^(cmd/(ci-operator|ci-operator-configresolver|pod-scaler|gsm-secret-sync|ci-secret-generator|ci-secret-bootstrap)/|pkg/|test/e2e/|Makefile|go\.(mod|sum)$)
  steps:
    test:
    - as: e2e
      commands: |
        GCS_CREDENTIALS_FILE=/tmp/gcs/service-account.json \
        REMOTE_REGISTRY_SECRET_DIR=/tmp/import-secret \
        LOCAL_REGISTRY_SECRET_DIR=/tmp/pull-secret \
        KUBECONFIG=/auth/kubeconfig \
        HIVE_KUBECONFIG=/tmp/hive/kubeconfig \
