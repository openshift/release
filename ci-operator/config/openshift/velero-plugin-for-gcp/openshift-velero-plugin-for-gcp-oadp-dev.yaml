build_root:
  image_stream_tag:
    name: builder
    namespace: konveyor
    tag: ubi9-v1.24
images:
  items:
  - additional_architectures:
    - arm64
    dockerfile_path: Dockerfile.ubi
    to: velero-plugin-for-gcp
promotion:
  to:
  - name: velero-plugin-for-gcp
    namespace: konveyor
releases:
