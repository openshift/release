base_images:
  ocp_builder_rhel-9-base-nodejs-openshift-4.22:
    name: builder
    namespace: ocp
    tag: rhel-9-base-nodejs-openshift-4.22
build_root:
  from_repository: true
images:
  items:
  - dockerfile_path: Dockerfile
    to: faas-console-plugin
  - dockerfile_literal: |
      FROM ocp_builder_rhel-9-base-nodejs-openshift-4.22
      USER root
      RUN dnf install -y --nodocs --setopt=install_weak_deps=False \
          alsa-lib atk at-spi2-atk cups-libs libdrm libXcomposite \
          libXdamage libXrandr mesa-libgbm pango nss \
          libxkbcommon libwayland-client && \
          dnf clean all && rm -rf /var/cache/dnf
      COPY . /go/src/github.com/openshift/faas-console-plugin/
      WORKDIR /go/src/github.com/openshift/faas-console-plugin
      RUN npm install -g corepack && corepack enable
    from: ocp_builder_rhel-9-base-nodejs-openshift-4.22
    inputs:
      src:
        paths:
        - destination_dir: .
          source_path: /go/src/github.com/openshift/faas-console-plugin/.
    to: faas-console-playwright-runner
promotion:
  to:
  - name: "5.0"
    namespace: ocp
releases:
  initial:
    integration:
      name: "5.0"
      namespace: ocp
  latest:
    integration:
      include_built_images: true
      name: "5.0"
      namespace: ocp
resources:
  '*':
    limits:
      memory: 6Gi
    requests:
      cpu: 1000m
      memory: 6Gi
tests:
- as: lint
  steps:
    test:
    - as: lint
      commands: yarn install && yarn run lint && yarn run build
      from: src
      resources:
        requests:
          cpu: 200m
          memory: 300Mi
- as: unit
  steps:
    test:
    - as: unit
      commands: yarn install && yarn run test
      from: src
      resources:
        requests:
          cpu: 200m
          memory: 300Mi
- as: e2e
  steps:
    cluster_profile: openshift-org-aws
    test:
    - as: test
      cli: latest
      commands: ./test-prow-e2e.sh
      from: faas-console-playwright-runner
      grace_period: 30m0s
      resources:
        limits:
          cpu: "4"
          memory: 10Gi
        requests:
          cpu: "4"
          memory: 10Gi
      timeout: 3h0m0s
    workflow: openshift-e2e-aws
zz_generated_metadata:
  branch: master
  org: openshift
  repo: faas-console-plugin
