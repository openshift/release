build_root:
  image_stream_tag:
    name: release
    namespace: openshift
    tag: tectonic-console-builder-v29
images:
  items:
  - dockerfile_path: Dockerfile
    to: faas-console-plugin
promotion:
  to:
  - name: "5.0"
    namespace: ocp
releases:
  initial:
    integration:
      name: "5.0"
      namespace: ocp
  latest:
    integration:
      include_built_images: true
      name: "5.0"
      namespace: ocp
resources:
  '*':
    limits:
      memory: 6Gi
    requests:
      cpu: 1000m
      memory: 6Gi
tests:
- as: lint
  steps:
    test:
    - as: lint
      commands: yarn install && yarn run lint && yarn run build
      from: src
      resources:
        requests:
          cpu: 200m
          memory: 300Mi
- as: e2e
  steps:
    cluster_profile: openshift-org-aws
    test:
    - as: test
      cli: latest
      commands: ./test-prow-e2e.sh
      dependencies:
      - env: FAAS_CONSOLE_PLUGIN_PULL_SPEC
        name: faas-console-plugin
      from: src
      grace_period: 30m0s
      resources:
        requests:
          cpu: 1000m
          memory: 4Gi
      timeout: 3h0m0s
    workflow: openshift-e2e-aws
zz_generated_metadata:
  branch: master
  org: openshift
  repo: faas-console-plugin
