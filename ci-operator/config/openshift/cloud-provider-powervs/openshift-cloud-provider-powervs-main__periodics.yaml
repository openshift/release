base_images:
  rebasebot:
    name: rebasebot
    namespace: ci
    tag: latest
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: rebasebot
  cron: 10 12 * * Mon,Thu
  steps:
    test:
    - as: rebasebot
      commands: |
        export BRANCH_NAME=$(git ls-remote --heads https://github.com/IBM-Cloud/cloud-provider-ibm 'refs/heads/release-*' | sed 's|.*refs/heads/||' | grep -E '^release-[0-9]+\.[0-9]+$' | sort -V | tail -n 1)
        rebasebot --source https://github.com/IBM-Cloud/cloud-provider-ibm:${BRANCH_NAME} \
                  --dest openshift/cloud-provider-powervs:main \
                  --rebase openshift-cloud-team/cloud-provider-powervs:rebase-bot-main \
                  --update-go-modules \
                  --github-app-key /secrets/rebasebot/cloud-team-rebase-bot-key \
                  --github-cloner-key /secrets/rebasebot/cloud-team-bot-key \
                  --git-username cloud-team-rebase-bot \
                  --git-email cloud-team-rebase-bot@redhat.com \
                  --bot-emails cloud-team-rebase-bot@redhat.com openshift-bot@redhat.com openshift-ci-robot@redhat.com \
                  --tag-policy=strict
      credentials:
      - mount_path: /secrets/rebasebot
        name: rebasebot-credentials
        namespace: test-credentials
      from_image:
        name: rebasebot
        namespace: ci
        tag: latest
      resources:
        limits:
          memory: 6Gi
        requests:
          cpu: 400m
          memory: 1Gi
zz_generated_metadata:
  branch: main
  org: openshift
  repo: cloud-provider-powervs
  variant: periodics
