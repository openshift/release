build_root:
  from_repository: true
images:
  items:
  - dockerfile_path: Dockerfile.clients
    to: rosa-clients
  skip_if_only_changed: ^(LICENSE|OWNERS|README\.md|\.gitignore|renovate\.json|\.ci-operator\.yaml)$|^(?:docs|\.github|\.tekton)(?:/|$)
prowgen:
  expose: true
  private: true
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: lint
  commands: |
    export GOLANGCI_LINT_CACHE=/tmp/.cache
    unset GOFLAGS
    make lint
  container:
    from: rosa-clients
  skip_if_only_changed: ^(LICENSE|OWNERS|README\.md|\.gitignore|renovate\.json|\.ci-operator\.yaml)$|^(?:docs|\.github|\.tekton)(?:/|$)
- as: build
  commands: |
    unset GOFLAGS
    make
  container:
    from: rosa-clients
  skip_if_only_changed: ^(LICENSE|OWNERS|README\.md|\.gitignore|renovate\.json|\.ci-operator\.yaml)$|^(?:docs|\.github|\.tekton)(?:/|$)
- as: test
  commands: |
    make test verify
  container:
    from: rosa-clients
  skip_if_only_changed: ^(LICENSE|OWNERS|README\.md|\.gitignore|renovate\.json|\.ci-operator\.yaml)$|^(?:docs|\.github|\.tekton)(?:/|$)
- as: commits
  commands: |
    make commits/check
  container:
    from: rosa-clients
  skip_if_only_changed: ^(LICENSE|OWNERS|README\.md|\.gitignore|renovate\.json|\.ci-operator\.yaml)$|^(?:docs|\.github|\.tekton)(?:/|$)
- as: coverage
  commands: |
    export CODECOV_TOKEN=$(cat /tmp/secret/CODECOV_TOKEN)
    make codecov
  container:
    from: rosa-clients
  secret:
    mount_path: /tmp/secret
    name: rosa-codecov-token
  skip_if_only_changed: ^(LICENSE|OWNERS|README\.md|\.gitignore|renovate\.json|\.ci-operator\.yaml)$|^(?:docs|\.github|\.tekton)(?:/|$)
- as: publish-coverage
  commands: |
    export CODECOV_TOKEN=$(cat /tmp/secret/CODECOV_TOKEN)
    make codecov
  container:
    from: rosa-clients
  postsubmit: true
  secret:
    mount_path: /tmp/secret
    name: rosa-codecov-token
- as: security
  optional: true
  skip_if_only_changed: ^(LICENSE|OWNERS|README\.md|\.gitignore|renovate\.json|\.ci-operator\.yaml)$|^(?:docs|\.github|\.tekton)(?:/|$)
  steps:
    env:
      PROJECT_NAME: rosa
      SNYK_ENABLE_DEPS_SCAN: "true"
    workflow: openshift-ci-security
- as: govulncheck
  commands: |
    unset GOFLAGS
    make govulncheck
  container:
    from: rosa-clients
  optional: true
  skip_if_only_changed: ^(LICENSE|OWNERS|README\.md|\.gitignore|renovate\.json|\.ci-operator\.yaml)$|^(?:docs|\.github|\.tekton)(?:/|$)
zz_generated_metadata:
  branch: master
  org: openshift
  repo: rosa
