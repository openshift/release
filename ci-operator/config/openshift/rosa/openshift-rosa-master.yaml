base_images:
  base:
    name: ubi
    namespace: ocp
    tag: "9"
build_root:
  image_stream_tag:
    name: builder
    namespace: ocp
    tag: rhel-9-golang-1.25-openshift-4.22
prowgen:
  expose: true
  private: true
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: lint
  commands: |
    export GOLANGCI_LINT_CACHE=/tmp/.cache
    unset GOFLAGS
    make lint
  container:
    from: src
- as: build
  commands: |
    unset GOFLAGS
    make
  container:
    from: src
- as: test
  commands: |
    make test verify
  container:
    from: src
- as: commits
  commands: |
    make commits/check
  container:
    from: src
- as: coverage
  commands: |
    export CODECOV_TOKEN=$(cat /tmp/secret/CODECOV_TOKEN)
    make codecov
  container:
    from: src
  secret:
    mount_path: /tmp/secret
    name: rosa-codecov-token
- as: publish-coverage
  commands: |
    export CODECOV_TOKEN=$(cat /tmp/secret/CODECOV_TOKEN)
    make codecov
  container:
    from: src
  postsubmit: true
  secret:
    mount_path: /tmp/secret
    name: rosa-codecov-token
- as: changelog-history
  commands: |
    unset GOFLAGS
    export GITHUB_TOKEN=$(cat /tmp/github/oauth)
    if ! command -v jq >/dev/null 2>&1; then
      echo "jq not found, installing..." >&2
      dnf install -y jq || { echo "ERROR: failed to install jq" >&2; exit 1; }
    fi
    make changelog-pr
  container:
    from: src
  postsubmit: true
  secret:
    mount_path: /tmp/github
    name: github-credentials-openshift-ci-robot-private-git-cloner
zz_generated_metadata:
  branch: master
  org: openshift
  repo: rosa
