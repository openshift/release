base_images:
  origin_4.22_cli:
    name: scos-4.22
    namespace: origin
    tag: cli
build_root:
  image_stream_tag:
    name: builder
    namespace: ocp
    tag: rhel-9-golang-1.25-openshift-4.22
images:
  items:
  - dockerfile_path: images/Dockerfile.e2e
    from: origin_4.22_cli
    to: rosa-aws-cli
promotion:
  to:
  - namespace: ci
    tag: latest
    tag_by_commit: true
prowgen:
  expose: true
  private: true
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
zz_generated_metadata:
  branch: master
  org: openshift
  repo: rosa
  variant: images
