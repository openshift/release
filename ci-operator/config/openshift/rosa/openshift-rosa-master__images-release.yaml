base_images:
  origin_4.22_cli:
    name: scos-4.22
    namespace: origin
    tag: cli
build_root:
  from_repository: true
images:
  items:
  - dockerfile_path: images/Dockerfile.release
    from: origin_4.22_cli
    to: rosa-aws-cli
promotion:
  to:
  - namespace: ci
    tag: release
prowgen:
  expose: true
  private: true
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
zz_generated_metadata:
  branch: master
  org: openshift
  repo: rosa
  variant: images-release
