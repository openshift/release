base_images:
  base:
    name: "4.11"
    namespace: ocp
    tag: base
build_root:
  from_repository: true
images:
  items:
  - dockerfile_path: Dockerfile.rhel7
    from: base
    to: ptp
promotion:
  to:
  - name: "4.11"
    namespace: ocp
releases:
  initial:
    integration:
      name: "4.11"
      namespace: ocp
  latest:
    integration:
      include_built_images: true
      name: "4.11"
      namespace: ocp
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: gofmt
  commands: make fmt
  container:
    from: src
zz_generated_metadata:
  branch: release-4.11
  org: openshift
  repo: linuxptp-daemon
