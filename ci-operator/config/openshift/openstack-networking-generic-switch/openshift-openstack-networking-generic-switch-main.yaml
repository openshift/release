build_root:
  from_repository: true
images:
  items:
  - dockerfile_path: openstack-ngs-tester.Dockerfile
    from: src
    optional: true
    to: ngs-tester
promotion:
  to:
  - name: "5.0"
    namespace: ocp
releases:
  initial:
    integration:
      name: "5.0"
      namespace: ocp
  latest:
    integration:
      include_built_images: true
      name: "5.0"
      namespace: ocp
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: unit
  commands: HOME=`dirname .` tox -vv -e py3
  container:
    from: ngs-tester
- as: pep8
  commands: HOME=`dirname .` tox -vv -e pep8
  container:
    from: ngs-tester
zz_generated_metadata:
  branch: main
  org: openshift
  repo: openstack-networking-generic-switch
