build_root:
  from_repository: true
images:
  items:
  - dockerfile_path: build/Dockerfile
    to: unused
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 100Mi
tests:
- as: coverage
  commands: |
    export CODECOV_TOKEN=$(cat /tmp/secret/CODECOV_TOKEN)
    make coverage
  container:
    from: src
  secret:
    mount_path: /tmp/secret
    name: ocm-agent-codecov-token
- as: publish-coverage
  commands: |
    export CODECOV_TOKEN=$(cat /tmp/secret/CODECOV_TOKEN)
    make coverage
  container:
    from: src
  postsubmit: true
  secret:
    mount_path: /tmp/secret
    name: ocm-agent-codecov-token
- as: lint
  commands: GOLANGCI_LINT_CACHE=/tmp make lint
  container:
    from: src
- as: test
  commands: make test
  container:
    from: src
- as: e2e-binary-build-success
  commands: |
    make e2e-binary-build
  container:
    from: src
zz_generated_metadata:
  branch: master
  org: openshift
  repo: ocm-agent
