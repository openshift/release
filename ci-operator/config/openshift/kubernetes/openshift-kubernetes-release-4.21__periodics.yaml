releases:
  latest:
    candidate:
      product: ocp
      stream: nightly
      version: "4.21"
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: e2e-aws-hpa
  interval: 48h
  steps:
    cluster_profile: openshift-org-aws
    env:
      TEST_SUITE: kubernetes/autoscaling/hpa
    workflow: openshift-e2e-aws
zz_generated_metadata:
  branch: release-4.21
  org: openshift
  repo: kubernetes
  variant: periodics
