base_images:
  ocp_builder_stream:
    name: builder
    namespace: ocp
    tag: stream10
  stream-coreos-base:
    name: stream-coreos-base
    namespace: coreos
    tag: "10"
build_root:
  image_stream_tag:
    name: coreos-assembler
    namespace: coreos
    tag: latest
images:
  items:
  - build_args:
    - name: OPENSHIFT_CI
      value: "1"
    - name: OPENSHIFT_VERSION
      value: "5.0"
    - name: YUM_REPO_NAMES
      value: c10s-baseos,c10s-appstream,c10s-sig-nfv,c10s-sig-cloud-okd,rhel-10.2-server-ose-5.0
    - name: STREAM_CLASS
      value: centos-10
    dockerfile_path: Containerfile
    inputs:
      stream-coreos-base:
        as:
        - ${IMAGE_FROM}
    to: os-image
  - build_args:
    - name: OPENSHIFT_CI
      value: "1"
    - name: STREAM_CLASS
      value: centos-10
    dockerfile_path: extensions/Containerfile
    inputs:
      ocp_builder_stream:
        as:
        - registry.access.redhat.com/ubi9/ubi:latest
      stream-coreos:
        as:
        - ${IMAGE_FROM}
    to: extensions-image
  - dockerfile_literal: |-
      FROM os-image
      LABEL io.openshift.os.streamclass=centos-10
    inputs:
      os-image:
        as:
        - os-image
    to: stream-coreos
  - dockerfile_literal: |-
      FROM extensions-image
      LABEL io.openshift.os.streamclass=centos-10
    inputs:
      extensions-image:
        as:
        - extensions-image
    to: stream-coreos-extensions
promotion:
  to:
  - excluded_images:
    - os-image
    - extensions-image
    name: scos-4.22
    namespace: origin
  - excluded_images:
    - os-image
    - extensions-image
    name: scos-4.22-art
    namespace: origin
  - excluded_images:
    - os-image
    - extensions-image
    name: scos-5.0-art
    namespace: origin
releases:
  latest:
    integration:
      include_built_images: true
      name: scos-4.22
      namespace: origin
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- always_run: false
  as: e2e-aws-ovn
  optional: true
  steps:
    cluster_profile: openshift-org-aws
    workflow: openshift-e2e-aws
zz_generated_metadata:
  branch: master
  org: openshift
  repo: os
  variant: okd-scos
