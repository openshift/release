base_images:
  rhel-coreos-base:
    name: rhel-coreos-base
    namespace: coreos
    tag: "9.8"
  rhel-coreos-base-10:
    name: rhel-coreos-base
    namespace: coreos
    tag: "10.2"
build_root:
  image_stream_tag:
    name: coreos-assembler
    namespace: coreos
    tag: latest
images:
  items:
  - build_args:
    - name: OPENSHIFT_CI
      value: "1"
    - name: IMAGE_NAME
      value: openshift/ose-rhel-coreos-9
    - name: IMAGE_CPE
      value: cpe:/a:redhat:openshift:4.22::el9
    dockerfile_path: Containerfile
    inputs:
      rhel-coreos-base:
        as:
        - quay.io/openshift-release-dev/ocp-v4.0-art-dev:c9s-coreos
        - ${IMAGE_FROM}
    to: rhel-coreos
  - build_args:
    - name: OPENSHIFT_CI
      value: "1"
    dockerfile_path: extensions/Containerfile
    inputs:
      rhel-coreos:
        as:
        - registry.ci.openshift.org/rhcos-devel/rhel-coreos:latest
    to: rhel-coreos-extensions
  - build_args:
    - name: OPENSHIFT_CI
      value: "1"
    - name: IMAGE_NAME
      value: openshift/ose-rhel-coreos-10
    - name: IMAGE_CPE
      value: cpe:/a:redhat:openshift:4.22::el10
    dockerfile_path: Containerfile
    inputs:
      rhel-coreos-base-10:
        as:
        - ${IMAGE_FROM}
    to: rhel-coreos-10
  - build_args:
    - name: OPENSHIFT_CI
      value: "1"
    dockerfile_path: extensions/Containerfile
    inputs:
      rhel-coreos-10:
        as:
        - registry.ci.openshift.org/rhcos-devel/rhel-coreos:latest
    to: rhel-coreos-10-extensions
  skip_if_only_changed: ^docs/|\.md$|^(?:.*/)?(?:\.gitignore|OWNERS|PROJECT|LICENSE)$
promotion:
  to:
  - excluded_images:
    - rhel-coreos
    - rhel-coreos-extensions
    - rhel-coreos-10
    - rhel-coreos-10-extensions
    name: "5.0"
    namespace: ocp
releases:
  initial:
    integration:
      name: "5.0"
      namespace: ocp
  latest:
    integration:
      include_built_images: true
      name: "5.0"
      namespace: ocp
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- always_run: false
  as: e2e-aws
  optional: true
  steps:
    cluster_profile: openshift-org-aws
    workflow: openshift-e2e-aws
zz_generated_metadata:
  branch: master
  org: openshift
  repo: os
