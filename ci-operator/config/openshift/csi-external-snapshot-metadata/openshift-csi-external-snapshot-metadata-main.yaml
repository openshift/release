base_images:
  commitchecker:
    name: commitchecker
    namespace: ci
    tag: latest
build_root:
  from_repository: true
canonical_go_repository: github.com/kubernetes-csi/external-snapshot-metadata
images:
  items:
  - dockerfile_path: Dockerfile.openshift
    to: csi-external-snapshot-metadata
promotion:
  to:
  - name: "5.0"
    namespace: ocp
releases:
  initial:
    integration:
      name: "5.0"
      namespace: ocp
  latest:
    integration:
      include_built_images: true
      name: "5.0"
      namespace: ocp
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: unit
  commands: make test-go test-vet test-fmt test-vendor test-shellcheck
  container:
    from: src
- as: verify-deps
  steps:
    test:
    - ref: go-verify-deps
- as: verify-commits
  commands: |
    commitchecker --start ${PULL_BASE_SHA:-main}
  container:
    from: commitchecker
- as: e2e-aws-ovn-techpreview
  steps:
    cluster_profile: openshift-org-aws
    env:
      CSI_PROW_ENABLE_SNAPSHOT_METADATA: "true"
      FEATURE_SET: TechPreviewNoUpgrade
    workflow: openshift-e2e-aws
zz_generated_metadata:
  branch: main
  org: openshift
  repo: csi-external-snapshot-metadata
