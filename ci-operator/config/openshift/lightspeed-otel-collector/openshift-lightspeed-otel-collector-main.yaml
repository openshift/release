build_root:
  image_stream_tag:
    name: release
    namespace: openshift
    tag: rhel-9-release-golang-1.25-openshift-4.23
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 2Gi
tests:
- as: fmt
  commands: GOFLAGS="-mod=readonly" GOMODCACHE=/tmp/gomodcache make fmt && git diff
    --exit-code
  container:
    from: src
  skip_if_only_changed: ^docs/|\.md$|^(?:.*/)?(?:\.gitignore|OWNERS|LICENSE)$
- as: unit
  commands: GOFLAGS="-mod=readonly" GOMODCACHE=/tmp/gomodcache make test
  container:
    from: src
  skip_if_only_changed: ^docs/|\.md$|^(?:.*/)?(?:\.gitignore|OWNERS|LICENSE)$
- as: vet
  commands: GOFLAGS="-mod=readonly" GOMODCACHE=/tmp/gomodcache make vet
  container:
    from: src
  skip_if_only_changed: ^docs/|\.md$|^(?:.*/)?(?:\.gitignore|OWNERS|LICENSE)$
zz_generated_metadata:
  branch: main
  org: openshift
  repo: lightspeed-otel-collector
