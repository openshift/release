base_images:
  dev-scripts:
    name: test
    namespace: ocp-kni
    tag: dev-scripts
  hypershift-operator:
    name: hypershift-operator
    namespace: hypershift
    tag: latest
  hypershift-tests:
    name: hypershift-tests
    namespace: hypershift
    tag: latest
  upi-installer:
    name: "4.20"
    namespace: ocp
    tag: upi-installer
releases:
  initial:
    candidate:
      product: ocp
      relative: 1
      stream: ci
      version: "4.20"
  latest:
    candidate:
      product: ocp
      stream: ci
      version: "4.20"
  latest-4-19:
    candidate:
      product: ocp
      stream: nightly
      version: "4.19"
  multi-initial:
    candidate:
      architecture: multi
      product: ocp
      relative: 1
      stream: nightly
      version: "4.20"
  multi-latest:
    candidate:
      architecture: multi
      product: ocp
      stream: nightly
      version: "4.20"
  multi-n1minor:
    candidate:
      architecture: multi
      product: ocp
      stream: nightly
      version: "4.19"
  multi-n2minor:
    candidate:
      architecture: multi
      product: ocp
      stream: nightly
      version: "4.18"
  multi-n3minor:
    candidate:
      architecture: multi
      product: ocp
      stream: nightly
      version: "4.17"
  multi-n4minor:
    candidate:
      architecture: multi
      product: ocp
      stream: nightly
      version: "4.16"
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: e2e-aws-multi
  cron: 0 2 * * *
  steps:
    cluster_profile: hypershift-aws
    dependencies:
      OCP_IMAGE_LATEST: release:multi-latest
      OCP_IMAGE_N1: release:multi-n1minor
      OCP_IMAGE_N2: release:multi-n2minor
      OCP_IMAGE_N3: release:multi-n3minor
      OCP_IMAGE_N4: release:multi-n4minor
      OCP_IMAGE_PREVIOUS: release:multi-initial
    env:
      AWS_MULTI_ARCH: "true"
    workflow: hypershift-aws-e2e-external
- as: e2e-aks
  cron: 42 3,15 * * *
  steps:
    cluster_profile: hypershift-aks
    env:
      AUTH_THROUGH_CERTS: "true"
    workflow: hypershift-azure-aks-e2e
- as: e2e-aks-multi-x-ax
  cron: 0 2 * * *
  steps:
    cluster_profile: hypershift-aks
    dependencies:
      OCP_IMAGE_LATEST: release:multi-latest
      OCP_IMAGE_N1: release:multi-n1minor
      OCP_IMAGE_N2: release:multi-n2minor
      OCP_IMAGE_N3: release:multi-n3minor
      OCP_IMAGE_N4: release:multi-n4minor
      OCP_IMAGE_PREVIOUS: release:multi-initial
    env:
      AUTH_THROUGH_CERTS: "true"
      AZURE_MULTI_ARCH: "true"
    workflow: hypershift-azure-aks-e2e
- as: e2e-aws-ovn
  capabilities:
  - build-tmpfs
  cron: 0 0 1 1 *
  steps:
    cluster_profile: hypershift-aws
    env:
      REQUEST_SERVING_COMPONENT_TEST: "true"
    workflow: hypershift-aws-e2e-metrics
- as: e2e-aws-ovn-conformance-serial
  cron: 0 1 * * *
  steps:
    cluster_profile: hypershift-aws
    env:
      HYPERSHIFT_INFRA_AVAILABILITY_POLICY: HighlyAvailable
      TEST_SUITE: openshift/conformance/serial
    workflow: hypershift-aws-conformance
- as: e2e-aws-ovn-conformance
  cron: 0 2 * * *
  steps:
    cluster_profile: hypershift-aws
    env:
      PUBLIC_ONLY: "true"
    workflow: hypershift-aws-conformance
- as: e2e-aws-ovn-conformance-fips
  cron: 0 5 1,15 * *
  steps:
    cluster_profile: hypershift-aws
    env:
      EXTRA_ARGS: --fips
      PUBLIC_ONLY: "true"
      TEST_SUITE: openshift/conformance/parallel/minimal
    test:
    - ref: hypershift-hostedcluster-fips-check
    - chain: hypershift-conformance
    workflow: hypershift-aws-conformance
- as: e2e-aws-ovn-proxy-conformance
  cron: 0 3 * * *
  steps:
    cluster_profile: hypershift-aws
    workflow: hypershift-aws-conformance-proxy
- as: e2e-aws-upgrade
  cron: 0 */12 * * *
  steps:
    cluster_profile: hypershift-aws
    dependencies:
      OCP_IMAGE_PREVIOUS: release:latest-4-19
    env:
      CI_TESTS_RUN: ^TestUpgradeControlPlane.*
      REQUEST_SERVING_COMPONENT_TEST: "true"
    workflow: hypershift-aws-e2e-external
- as: e2e-aws-conformance-cilium
  minimum_interval: 336h
  steps:
    cluster_profile: hypershift-aws
    workflow: hypershift-aws-conformance-cilium
- as: e2e-aws-conformance-cilium-private
  minimum_interval: 336h
  steps:
    cluster_profile: aws-qe
    env:
      BASE_DOMAIN: qe.devcluster.openshift.com
      TEST_ARGS: --disable-monitor=apiserver-incluster-availability,service-type-load-balancer-availability
    workflow: hypershift-aws-conformance-cilium-private
- as: e2e-kubevirt-metal-conformance-cilium
  capabilities:
  - intranet
  cron: 0 0 * * 0
  steps:
    cluster_profile: equinix-ocp-hcp
    env:
      LVM_OPERATOR_SUB_CHANNEL: stable-4.20
      ODF_OPERATOR_SUB_CHANNEL: stable-4.18
      ODF_OPERATOR_SUB_SOURCE: redhat-operators-v4-18
      REDHAT_OPERATORS_INDEX_TAG: v4.18
    workflow: hypershift-kubevirt-baremetalds-conformance-cilium
- as: e2e-aws-conformance-calico
  minimum_interval: 336h
  steps:
    cluster_profile: hypershift-aws
    workflow: hypershift-aws-conformance-calico
- as: e2e-aws-conformance-calico-private
  minimum_interval: 336h
  steps:
    cluster_profile: aws-qe
    env:
      BASE_DOMAIN: qe.devcluster.openshift.com
      HYPERSHIFT_GUEST_INFRA_OCP_ACCOUNT: "true"
      TEST_ARGS: --disable-monitor=apiserver-incluster-availability,service-type-load-balancer-availability
    workflow: hypershift-aws-conformance-calico-private
- as: e2e-kubevirt-metal-conformance-calico
  capabilities:
  - intranet
  cron: 0 0 * * 0
  steps:
    cluster_profile: equinix-ocp-hcp
    env:
      LVM_OPERATOR_SUB_CHANNEL: stable-4.20
      ODF_OPERATOR_SUB_CHANNEL: stable-4.18
      ODF_OPERATOR_SUB_SOURCE: redhat-operators-v4-18
      REDHAT_OPERATORS_INDEX_TAG: v4.18
    workflow: hypershift-kubevirt-baremetalds-conformance-calico
- as: e2e-aws-external-oidc
  minimum_interval: 8h
  steps:
    cluster_profile: hypershift-aws
    env:
      CI_TESTS_RUN: TestExternalOIDC
      OAUTH_EXTERNAL_OIDC_PROVIDER: keycloak
      TECH_PREVIEW_NO_UPGRADE: "true"
    workflow: hypershift-aws-e2e-external-oidc
- as: e2e-powervs-ovn
  cron: 0 8 * * *
  steps:
    cluster_profile: hypershift-powervs
    workflow: hypershift-powervs-e2e
- as: e2e-ibmcloud-ovn-iks
  cron: 0 4 * * *
  steps:
    env:
      BOM_VERSION: 4.10.26_openshift
      MANAGED_CLUSTER_TYPE: iks
      MANAGEMENT_CLUSTER_KUBECONFIG: /etc/ibmcloud/secrets/iks.kubeconfig
      TEST_TYPE: main
      VERIFY_COMPLIANCE_OPERATOR_SCAN: "false"
    workflow: hypershift-ibmcloud-e2e
- as: e2e-ibmcloud-ovn-roks
  cron: 0 4 * * *
  steps:
    env:
      BOM_VERSION: 4.11.0_openshift
      MANAGED_CLUSTER_TYPE: openshift
      MANAGEMENT_CLUSTER_KUBECONFIG: /etc/ibmcloud/secrets/roks.kubeconfig
      TEST_TYPE: main
      VERIFY_COMPLIANCE_OPERATOR_SCAN: "true"
    workflow: hypershift-ibmcloud-e2e
- as: e2e-kubevirt-aws-ovn-csi
  cron: 0 4 * * *
  steps:
    cluster_profile: openshift-org-aws
    workflow: hypershift-kubevirt-csi-e2e
- as: e2e-azure-aks-ovn-conformance
  cron: 0 */2 * * *
  steps:
    cluster_profile: hypershift-aks
    workflow: hypershift-azure-aks-conformance
- as: e2e-azure-aks-ovn-conformance-fips
  cron: 0 6 1,15 * *
  steps:
    cluster_profile: hypershift-aks
    env:
      HYPERSHIFT_AZURE_FIPS: "true"
      TEST_SKIPS: 'etcd leader changes are not excessive\| In-tree Volumes \[Driver:
        azure-disk\]\| In-tree Volumes \[Driver: azure-file\]\| FIPS TestFIPS'
      TEST_SUITE: openshift/conformance/parallel/minimal
    test:
    - ref: hypershift-hostedcluster-fips-check
    - chain: hypershift-conformance
    workflow: hypershift-azure-aks-conformance
- as: e2e-azure-aks-external-oidc
  cron: 0 10 * * *
  steps:
    cluster_profile: hypershift-aks
    env:
      AUTH_THROUGH_CERTS: "true"
      CI_TESTS_RUN: TestExternalOIDC
    workflow: hypershift-azure-aks-external-oidc
- as: e2e-azure-kubevirt-ovn
  cron: 0 4 * * *
  steps:
    cluster_profile: openshift-org-azure
    env:
      CNV_SUBSCRIPTION_SOURCE: redhat-operators
      ODF_OPERATOR_CHANNEL: stable-4.20
      TEST_INCLUDES: sig-kubevirt
      TEST_SUITE: openshift/conformance/parallel/minimal
    workflow: hypershift-kubevirt-azure-conformance
zz_generated_metadata:
  branch: release-4.20
  org: openshift
  repo: hypershift
  variant: periodics
