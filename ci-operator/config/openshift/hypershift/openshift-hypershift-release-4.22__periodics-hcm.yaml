base_images:
  hypershift-tests:
    name: hypershift-tests
    namespace: hypershift
    tag: latest
external_images:
  hypershift-operator:
    name: rhtap-hypershift-operator
    namespace: acm-d
    registry: quay.io
    tag: latest
releases:
  initial:
    release:
      channel: fast
      relative: 1
      version: "4.22"
  initial-minor:
    release:
      channel: fast
      version: "4.21"
  initial-zero:
    release:
      channel: fast
      version: 4.22.0
  latest:
    release:
      channel: fast
      version: "4.22"
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: e2e-aws
  cron: 0 0 * * *
  steps:
    cluster_profile: hypershift-aws
    workflow: hypershift-aws-e2e-external
- as: reqserving-e2e-aws
  cron: 0 4 * * *
  steps:
    cluster_profile: openshift-org-aws
    dependencies:
      OPENSHIFT_INSTALL_RELEASE_IMAGE_OVERRIDE: release:latest
    workflow: hypershift-aws-reqserving-e2e
- as: e2e-aws-upgrade-minor
  cron: 0 1 * * *
  steps:
    cluster_profile: hypershift-aws
    dependencies:
      OCP_IMAGE_PREVIOUS: release:initial-minor
    env:
      CI_TESTS_RUN: ^TestUpgradeControlPlane$
    workflow: hypershift-aws-e2e-external
- as: e2e-aws-upgrade-from-zero
  cron: 0 2 * * *
  steps:
    cluster_profile: hypershift-aws
    dependencies:
      OCP_IMAGE_PREVIOUS: release:initial-zero
    env:
      CI_TESTS_RUN: ^TestUpgradeControlPlane$
    workflow: hypershift-aws-e2e-external
zz_generated_metadata:
  branch: release-4.22
  org: openshift
  repo: hypershift
  variant: periodics-hcm
