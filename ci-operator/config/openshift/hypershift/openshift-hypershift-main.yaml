base_images:
  claude-ai-helpers:
    name: claude-ai-helpers
    namespace: ci
    tag: latest
  cli:
    name: "5.0"
    namespace: ocp
    tag: cli
  dev-scripts:
    name: test
    namespace: ocp-kni
    tag: dev-scripts
  hypershift-operator-init:
    name: hypershift-operator
    namespace: hypershift
    tag: latest
  manila-csi-driver-operator-test:
    name: "5.0"
    namespace: ocp
    tag: manila-csi-driver-operator-test
  openstack-cinder-csi-driver-operator-test:
    name: "5.0"
    namespace: ocp
    tag: openstack-cinder-csi-driver-operator-test
build_root:
  from_repository: true
  use_build_cache: true
images:
  items:
  - to: hypershift-operator
  - dockerfile_path: Dockerfile.control-plane
    to: hypershift
  - dockerfile_path: Dockerfile.e2e
    to: hypershift-tests
  - dockerfile_literal: |
      FROM hypershift-operator
      RUN yum install -y jq && yum clean all
    from: hypershift-operator
    to: hypershift-cli
promotion:
  to:
  - excluded_images:
    - hypershift-cli
    - hypershift-operator
    - hypershift-tests
    name: "5.0"
    namespace: ocp
  - additional_images:
      hypershift-operator: hypershift-operator
      hypershift-tests: hypershift-tests
    excluded_images:
    - '*'
    namespace: hypershift
    tag: latest
  - additional_images:
      hypershift-cli: hypershift-cli
    excluded_images:
    - '*'
    namespace: ci
    tag: latest
releases:
  initial:
    candidate:
      product: ocp
      relative: 1
      stream: ci
      version: "5.0"
  initial-422:
    candidate:
      product: ocp
      relative: 1
      stream: ci
      version: "4.22"
  latest:
    integration:
      include_built_images: true
      name: "5.0"
      namespace: ocp
  latest-418:
    candidate:
      product: ocp
      stream: ci
      version: "4.18"
  latest-419:
    candidate:
      product: ocp
      stream: ci
      version: "4.19"
  latest-420:
    candidate:
      product: ocp
      stream: ci
      version: "4.20"
  latest-421:
    candidate:
      product: ocp
      stream: ci
      version: "4.21"
  latest-422:
    candidate:
      product: ocp
      stream: ci
      version: "4.22"
  n1minor:
    candidate:
      product: ocp
      stream: ci
      version: "4.22"
  n2minor:
    candidate:
      product: ocp
      stream: ci
      version: "4.21"
  n3minor:
    candidate:
      product: ocp
      stream: ci
      version: "4.20"
  n4minor:
    candidate:
      product: ocp
      stream: ci
      version: "4.19"
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- always_run: false
  as: agentic-qe-aws
  optional: true
  steps:
    cluster_profile: hypershift-aws
    env:
      TECH_PREVIEW_NO_UPGRADE: "true"
    workflow: hypershift-agentic-qe-aws
- always_run: false
  as: e2e-aks
  pipeline_skip_if_only_changed: (^(\.tekton|\.github|\.claude|docs|examples|enhancements|contrib|\.cursor|test/envtest)/)|(^[A-Z]+\.md$)|((^|/)OWNERS$)|(/overrides\.yaml$)|(^renovate\.json$)|(/\.testcoverage\.yml$)|(^\.gitlint$)|(^\.gitignore$)|(^\.coderabbit\.yaml$)|(^\.dockerignore$)|(^codecov\.yml$)
  steps:
    cluster_profile: hypershift-aks
    dependencies:
      OCP_IMAGE_N1: release:n1minor
      OCP_IMAGE_N2: release:n2minor
      OCP_IMAGE_N3: release:n3minor
      OCP_IMAGE_N4: release:n4minor
    env:
      AUTH_THROUGH_CERTS: "true"
      ENABLE_HYPERSHIFT_CERT_ROTATION_SCALE: "true"
      HYPERSHIFT_AZURE_LOCATION: centralus
      HYPERSHIFT_AZURE_MARKETPLACE_IMAGE_OFFER: ""
      HYPERSHIFT_AZURE_MARKETPLACE_IMAGE_PUBLISHER: ""
      HYPERSHIFT_AZURE_MARKETPLACE_IMAGE_SKU: ""
      HYPERSHIFT_AZURE_MARKETPLACE_IMAGE_VERSION: ""
    post:
    - ref: hypershift-analyze-e2e-failure
    - chain: cucushift-installer-rehearse-azure-aks-deprovision
    workflow: hypershift-azure-aks-e2e
- always_run: false
  as: e2e-aks-4-22
  pipeline_run_if_changed: ^(test/e2e|hypershift-operator)
  steps:
    cluster_profile: hypershift-aks
    dependencies:
      OCP_IMAGE_LATEST: release:latest-422
      OCP_IMAGE_N1: release:latest-421
      OCP_IMAGE_N2: release:latest-420
      OCP_IMAGE_N3: release:latest-419
      OCP_IMAGE_N4: release:latest-418
      OCP_IMAGE_PREVIOUS: release:initial-422
    env:
      AUTH_THROUGH_CERTS: "true"
      ENABLE_HYPERSHIFT_CERT_ROTATION_SCALE: "true"
      HYPERSHIFT_AZURE_LOCATION: centralus
    workflow: hypershift-azure-aks-e2e
- as: e2e-aks-override
  run_if_changed: (/overrides\.yaml$)
  steps:
    cluster_profile: hypershift-aks
    env:
      AUTH_THROUGH_CERTS: "true"
      ENABLE_HYPERSHIFT_CERT_ROTATION_SCALE: "true"
      HYPERSHIFT_AZURE_LOCATION: centralus
      TEST_CPO_OVERRIDE: "1"
    workflow: hypershift-azure-aks-e2e
- always_run: false
  as: e2e-aws
  capabilities:
  - build-tmpfs
  pipeline_skip_if_only_changed: (^(\.tekton|\.github|\.claude|docs|examples|enhancements|contrib|\.cursor|test/envtest)/)|(^[A-Z]+\.md$)|((^|/)OWNERS$)|(/overrides\.yaml$)|(^renovate\.json$)|(/\.testcoverage\.yml$)|(^\.gitlint$)|(^\.gitignore$)|(^\.coderabbit\.yaml$)|(^\.dockerignore$)|(^codecov\.yml$)
  steps:
    cluster_profile: hypershift-aws
    dependencies:
      OCP_IMAGE_N1: release:n1minor
      OCP_IMAGE_N2: release:n2minor
      OCP_IMAGE_N3: release:n3minor
      OCP_IMAGE_N4: release:n4minor
    env:
      ENABLE_HYPERSHIFT_CERT_ROTATION_SCALE: "true"
      REQUEST_SERVING_COMPONENT_TEST: "true"
    post:
    - ref: hypershift-analyze-e2e-failure
    - chain: hypershift-destroy-nested-management-cluster
    workflow: hypershift-aws-e2e-nested
- always_run: false
  as: e2e-v2-aws
  pipeline_skip_if_only_changed: (^(\.tekton|\.github|\.claude|docs|examples|enhancements|contrib|\.cursor|test/envtest)/)|(^[A-Z]+\.md$)|((^|/)OWNERS$)|(/overrides\.yaml$)|(^renovate\.json$)|(/\.testcoverage\.yml$)|(^\.gitlint$)|(^\.gitignore$)|(^\.coderabbit\.yaml$)|(^\.dockerignore$)|(^codecov\.yml$)
  steps:
    cluster_profile: hypershift-aws
    env:
      TECH_PREVIEW_NO_UPGRADE: "true"
    workflow: hypershift-aws-e2e-v2
- always_run: false
  as: e2e-v2-aws-backuprestore
  optional: true
  steps:
    cluster_profile: hypershift-aws
    env:
      TECH_PREVIEW_NO_UPGRADE: "true"
      TEST_SUITE: openshift/conformance/parallel/minimal
    workflow: hypershift-aws-e2e-backuprestore
- always_run: false
  as: e2e-azure-self-managed
  pipeline_skip_if_only_changed: (^(\.tekton|\.github|\.claude|docs|examples|enhancements|contrib|\.cursor|test/envtest)/)|(^[A-Z]+\.md$)|((^|/)OWNERS$)|(/overrides\.yaml$)|(^renovate\.json$)|(/\.testcoverage\.yml$)|(^\.gitlint$)|(^\.gitignore$)|(^\.coderabbit\.yaml$)|(^\.dockerignore$)|(^codecov\.yml$)
  steps:
    cluster_profile: hypershift-azure
    dependencies:
      OCP_IMAGE_N1: release:n1minor
      OCP_IMAGE_N2: release:n2minor
    env:
      CI_TESTS_RUN: ^(TestCreateCluster$|TestAutoscaling|TestNodePool|TestUpgradeControlPlane|TestHAEtcdChaos|TestAzureOAuthLoadBalancer|TestAzurePrivateTopology)$
      E2E_RESOURCE_REQUEST_OVERRIDES: "1"
      ENABLE_HYPERSHIFT_CERT_ROTATION_SCALE: "true"
      HYPERSHIFT_AZURE_LOCATION: centralus
    post:
    - ref: hypershift-analyze-e2e-failure
    - chain: hypershift-destroy-nested-management-cluster
    workflow: hypershift-azure-e2e-self-managed
- always_run: false
  as: e2e-aws-minimal
  optional: true
  steps:
    cluster_profile: hypershift-aws
    dependencies:
      OCP_IMAGE_N1: release:n1minor
      OCP_IMAGE_N2: release:n2minor
      OCP_IMAGE_N3: release:n3minor
      OCP_IMAGE_N4: release:n4minor
    env:
      CI_TESTS_RUN: (^(TestCreateCluster$|TestCreateClusterV2$))
      ENABLE_HYPERSHIFT_CERT_ROTATION_SCALE: "true"
      REQUEST_SERVING_COMPONENT_TEST: "true"
    workflow: hypershift-aws-e2e-nested
- always_run: false
  as: e2e-aws-techpreview
  optional: true
  steps:
    cluster_profile: hypershift-aws
    dependencies:
      OCP_IMAGE_N1: release:n1minor
      OCP_IMAGE_N2: release:n2minor
      OCP_IMAGE_N3: release:n3minor
      OCP_IMAGE_N4: release:n4minor
    env:
      ENABLE_HYPERSHIFT_CERT_ROTATION_SCALE: "true"
      REQUEST_SERVING_COMPONENT_TEST: "true"
      TECH_PREVIEW_NO_UPGRADE: "true"
    workflow: hypershift-aws-e2e-nested
- always_run: false
  as: e2e-aws-upgrade-hypershift-operator
  capabilities:
  - build-tmpfs
  pipeline_skip_if_only_changed: (^(\.tekton|\.github|\.claude|docs|examples|enhancements|contrib|\.cursor|test/envtest)/)|(^[A-Z]+\.md$)|((^|/)OWNERS$)|(/overrides\.yaml$)|(^renovate\.json$)|(/\.testcoverage\.yml$)|(^\.gitlint$)|(^\.gitignore$)|(^\.coderabbit\.yaml$)|(^\.dockerignore$)|(^codecov\.yml$)
  steps:
    cluster_profile: hypershift-aws
    dependencies:
      HYPERSHIFT_RELEASE_LATEST: hypershift-operator-init
    env:
      CI_TESTS_RUN: ^TestUpgradeHyperShiftOperator$
      INSTALL_FROM_LATEST: "true"
      RUN_UPGRADE_TEST: "true"
    workflow: hypershift-aws-e2e-nested
- as: e2e-aws-override
  capabilities:
  - build-tmpfs
  run_if_changed: (/overrides\.yaml$)
  steps:
    cluster_profile: hypershift-aws
    env:
      ENABLE_HYPERSHIFT_CERT_ROTATION_SCALE: "true"
      REQUEST_SERVING_COMPONENT_TEST: "true"
      TEST_CPO_OVERRIDE: "1"
    workflow: hypershift-aws-e2e-nested
- always_run: false
  as: e2e-aws-4-22
  capabilities:
  - build-tmpfs
  pipeline_run_if_changed: ^(test/e2e|hypershift-operator)
  steps:
    cluster_profile: hypershift-aws
    dependencies:
      OCP_IMAGE_LATEST: release:latest-422
      OCP_IMAGE_N1: release:latest-421
      OCP_IMAGE_N2: release:latest-420
      OCP_IMAGE_N3: release:latest-419
      OCP_IMAGE_N4: release:latest-418
      OCP_IMAGE_PREVIOUS: release:initial-422
    env:
      ENABLE_HYPERSHIFT_CERT_ROTATION_SCALE: "true"
      REQUEST_SERVING_COMPONENT_TEST: "true"
    workflow: hypershift-aws-e2e-nested
- always_run: false
  as: e2e-kubevirt-aws-ovn-reduced
  pipeline_skip_if_only_changed: (^(\.tekton|\.github|\.claude|docs|examples|enhancements|contrib|\.cursor|test/envtest)/)|(^[A-Z]+\.md$)|((^|/)OWNERS$)|(/overrides\.yaml$)|(^renovate\.json$)|(/\.testcoverage\.yml$)|(^\.gitlint$)|(^\.gitignore$)|(^\.coderabbit\.yaml$)|(^\.dockerignore$)|(^codecov\.yml$)
  steps:
    cluster_profile: openshift-org-aws
    dependencies:
      OPENSHIFT_INSTALL_RELEASE_IMAGE_OVERRIDE: release:latest-422
    env:
      COMPUTE_NODE_REPLICAS: "1"
      COMPUTE_NODE_TYPE: c5n.metal
      E2E_TEST_REGEX: ^TestCreateCluster$|TestAutoscaling
      ENABLE_HYPERSHIFT_CERT_ROTATION_SCALE: "true"
      ENABLE_HYPERSHIFT_OPERATOR_DEFAULTING_WEBHOOK: "true"
      ETCD_STORAGE_CLASS: gp3-csi
      KUBEVIRT_CSI_INFRA: gp3-csi
      RUN_EXTERNAL_INFRA_TEST: "false"
    workflow: hypershift-kubevirt-e2e-aws
- always_run: false
  as: e2e-kubevirt-aws-ovn
  optional: true
  steps:
    cluster_profile: openshift-org-aws
    dependencies:
      OPENSHIFT_INSTALL_RELEASE_IMAGE_OVERRIDE: release:latest-422
    env:
      COMPUTE_NODE_REPLICAS: "1"
      COMPUTE_NODE_TYPE: c5n.metal
      ENABLE_HYPERSHIFT_CERT_ROTATION_SCALE: "true"
      ENABLE_HYPERSHIFT_OPERATOR_DEFAULTING_WEBHOOK: "true"
      ETCD_STORAGE_CLASS: gp3-csi
      KUBEVIRT_CSI_INFRA: gp3-csi
    workflow: hypershift-kubevirt-e2e-aws
- always_run: false
  as: e2e-kubevirt-azure-ovn
  optional: true
  steps:
    cluster_profile: openshift-org-azure
    dependencies:
      OPENSHIFT_INSTALL_RELEASE_IMAGE_OVERRIDE: release:latest-422
    env:
      COMPUTE_NODE_REPLICAS: "3"
      COMPUTE_NODE_TYPE: Standard_D16as_v5
      ENABLE_HYPERSHIFT_CERT_ROTATION_SCALE: "true"
      ENABLE_HYPERSHIFT_OPERATOR_DEFAULTING_WEBHOOK: "true"
      ETCD_STORAGE_CLASS: managed-csi
      KUBEVIRT_CSI_INFRA: managed-csi
      ODF_BACKEND_STORAGE_CLASS: managed-csi
    workflow: hypershift-kubevirt-e2e-azure
- always_run: false
  as: e2e-aws-metrics
  optional: true
  steps:
    cluster_profile: hypershift-aws
    workflow: hypershift-aws-e2e-metrics
- always_run: false
  as: e2e-conformance
  optional: true
  steps:
    cluster_profile: hypershift-aws
    env:
      PUBLIC_ONLY: "true"
    workflow: hypershift-aws-conformance
- always_run: false
  as: e2e-azure-kubevirt-ovn
  optional: true
  steps:
    cluster_profile: openshift-org-azure
    dependencies:
      OPENSHIFT_INSTALL_RELEASE_IMAGE_OVERRIDE: release:latest-422
    env:
      CNV_SUBSCRIPTION_SOURCE: redhat-operators
      HYPERSHIFT_NODE_COUNT: "2"
      ODF_OPERATOR_CHANNEL: stable-4.20
      TEST_INCLUDES: sig-kubevirt
      TEST_SUITE: openshift/conformance/parallel/minimal
    workflow: hypershift-kubevirt-azure-conformance
- always_run: false
  as: e2e-azure-aks-ovn-conformance
  optional: true
  steps:
    cluster_profile: hypershift-aks
    workflow: hypershift-azure-aks-conformance
- as: security
  skip_if_only_changed: (^(\.tekton|\.github|\.claude|docs|examples|enhancements|contrib|\.cursor|test/envtest)/)|(^[A-Z]+\.md$)|((^|/)OWNERS$)|(/overrides\.yaml$)|(^renovate\.json$)|(/\.testcoverage\.yml$)|(^\.gitlint$)|(^\.gitignore$)|(^\.coderabbit\.yaml$)|(^\.dockerignore$)|(^codecov\.yml$)
  steps:
    env:
      SNYK_CODE_ADDITIONAL_ARGS: --severity-threshold=high
      SNYK_ENABLE_DEPS_SCAN: "false"
    workflow: openshift-ci-security
- always_run: false
  as: e2e-openstack-aws
  optional: true
  steps:
    cluster_profile: hypershift-aws
    env:
      CLUSTER_TYPE_OVERRIDE: openstack-vexxhost
      TECH_PREVIEW_NO_UPGRADE: "true"
    leases:
    - env: OPENSTACK_CLOUD
      resource_type: openstack-vexxhost-quota-slice
    test:
    - chain: hypershift-openstack-e2e
    workflow: hypershift-aws-e2e-nested
- always_run: false
  as: e2e-openstack-aws-nfv
  optional: true
  steps:
    cluster_profile: hypershift-aws
    env:
      CLUSTER_TYPE_OVERRIDE: openstack-nfv
      NFV_NODEPOOLS: "true"
      TECH_PREVIEW_NO_UPGRADE: "true"
    leases:
    - env: OPENSTACK_CLOUD
      resource_type: openstack-nfv-quota-slice
    workflow: hypershift-openstack-aws-nfv
- always_run: false
  as: e2e-openstack-aws-conformance
  optional: true
  steps:
    cluster_profile: hypershift-aws
    env:
      CLUSTER_TYPE_OVERRIDE: openstack-vexxhost
      TECH_PREVIEW_NO_UPGRADE: "true"
    leases:
    - env: OPENSTACK_CLOUD
      resource_type: openstack-vexxhost-quota-slice
    workflow: hypershift-openstack-aws-conformance
- always_run: false
  as: e2e-openstack-aws-csi-cinder
  optional: true
  steps:
    cluster_profile: hypershift-aws
    env:
      CLUSTER_TYPE_OVERRIDE: openstack-vh-mecha-central
      TECH_PREVIEW_NO_UPGRADE: "true"
      TEST_CSI_DRIVER_MANIFEST: manifest-openstack-cinder.yaml
      TEST_SUITE: openshift/csi
    leases:
    - env: OPENSTACK_CLOUD
      resource_type: openstack-vh-mecha-central-quota-slice
    workflow: hypershift-openstack-aws-conformance
- always_run: false
  as: e2e-openstack-aws-csi-manila
  optional: true
  steps:
    cluster_profile: hypershift-aws
    env:
      CLUSTER_TYPE_OVERRIDE: openstack-vh-mecha-central
      TECH_PREVIEW_NO_UPGRADE: "true"
      TEST_CSI_DRIVER_MANIFEST: manifest-openstack-manila.yaml
      TEST_SUITE: openshift/csi
    leases:
    - env: OPENSTACK_CLOUD
      resource_type: openstack-vh-mecha-central-quota-slice
    workflow: hypershift-openstack-aws-conformance
- always_run: false
  as: e2e-aws-autonode
  optional: true
  steps:
    cluster_profile: hypershift-aws
    dependencies:
      OCP_IMAGE_N1: release:n1minor
      OCP_IMAGE_N2: release:n2minor
      OCP_IMAGE_N3: release:n3minor
      OCP_IMAGE_N4: release:n4minor
    env:
      CI_TESTS_RUN: ^TestKarpenter$
      ENABLE_HYPERSHIFT_CERT_ROTATION_SCALE: "true"
      REQUEST_SERVING_COMPONENT_TEST: "true"
      TECH_PREVIEW_NO_UPGRADE: "true"
    workflow: hypershift-aws-e2e-nested
- as: verify-deps
  steps:
    env:
      CHECK_MOD_LIST: "false"
    test:
    - ref: go-verify-deps
- always_run: false
  as: reqserving-e2e-aws
  capabilities:
  - build-tmpfs
  optional: true
  steps:
    cluster_profile: openshift-org-aws
    dependencies:
      OPENSHIFT_INSTALL_RELEASE_IMAGE_OVERRIDE: release:latest-421
    workflow: hypershift-aws-reqserving-e2e
- as: dependabot-triage
  cron: 0 12 * * 5
  steps:
    workflow: hypershift-dependabot-triage
- as: periodic-jira-agent
  cron: 30 8 * * 1
  steps:
    env:
      JIRA_AGENT_MAX_ISSUES: "1"
    workflow: hypershift-jira-agent
- as: periodic-review-agent
  cron: 0 8-23/3 * * 1-5
  steps:
    env:
      REVIEW_AGENT_BATCH_ONLY: "true"
      REVIEW_AGENT_MAX_PRS: "10"
    workflow: hypershift-review-agent
- always_run: false
  as: address-review-comments
  optional: true
  skip_if_only_changed: .*
  steps:
    workflow: hypershift-review-agent
- always_run: false
  as: e2e-gke
  capabilities:
  - build-tmpfs
  optional: true
  run_if_changed: ^(api/hypershift/v1beta1/gcp.*|hypershift-operator/controllers/.*/gcp.*|control-plane-operator/controllers/.*/gcp.*|cmd/cluster/gcp/.*|cmd/nodepool/gcp/.*)
  steps:
    cluster_profile: hypershift-gcp
    env:
      GKE_REGION: us-central1
      GKE_RELEASE_CHANNEL: stable
    workflow: hypershift-gcp-gke-e2e
- always_run: false
  as: e2e-v2-gke
  capabilities:
  - build-tmpfs
  optional: true
  run_if_changed: ^(api/hypershift/v1beta1/gcp.*|hypershift-operator/controllers/.*/gcp.*|control-plane-operator/controllers/.*/gcp.*|cmd/cluster/gcp/.*|cmd/nodepool/gcp/.*)
  steps:
    cluster_profile: hypershift-gcp
    env:
      GKE_REGION: us-central1
      GKE_RELEASE_CHANNEL: stable
    workflow: hypershift-gcp-gke-e2e-v2
zz_generated_metadata:
  branch: main
  org: openshift
  repo: hypershift
