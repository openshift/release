base_images:
  cli:
    name: "4.22"
    namespace: ocp
    tag: cli
build_root:
  from_repository: true
  use_build_cache: true
images:
  items:
  - to: hypershift-operator
  - dockerfile_path: Dockerfile.control-plane
    to: hypershift
  - dockerfile_path: Dockerfile.e2e
    to: hypershift-tests
releases:
  initial:
    candidate:
      product: ocp
      relative: 1
      stream: ci
      version: "4.22"
  latest:
    integration:
      name: "4.22"
      namespace: ocp
  n1minor:
    candidate:
      product: ocp
      stream: ci
      version: "4.21"
  n2minor:
    candidate:
      product: ocp
      stream: ci
      version: "4.20"
  n3minor:
    candidate:
      product: ocp
      stream: ci
      version: "4.19"
  n4minor:
    candidate:
      product: ocp
      stream: ci
      version: "4.18"
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- always_run: false
  as: e2e-aws
  capabilities:
  - build-tmpfs
  steps:
    cluster_profile: hypershift-aws
    dependencies:
      OCP_IMAGE_N1: release:n1minor
      OCP_IMAGE_N2: release:n2minor
      OCP_IMAGE_N3: release:n3minor
      OCP_IMAGE_N4: release:n4minor
    env:
      ENABLE_HYPERSHIFT_CERT_ROTATION_SCALE: "true"
      REQUEST_SERVING_COMPONENT_TEST: "true"
    post:
    - ref: hypershift-analyze-e2e-failure
    - chain: hypershift-destroy-nested-management-cluster
    workflow: hypershift-aws-e2e-nested
zz_generated_metadata:
  branch: fix-422-e2e
  org: openshift
  repo: hypershift
