base_images:
  dev-scripts:
    name: test
    namespace: ocp-kni
    tag: dev-scripts
  hypershift-operator:
    name: hypershift-operator
    namespace: hypershift
    tag: latest
  hypershift-tests:
    name: hypershift-tests
    namespace: hypershift
    tag: latest
  manila-csi-driver-operator-test:
    name: "5.0"
    namespace: ocp
    tag: manila-csi-driver-operator-test
  openstack-cinder-csi-driver-operator-test:
    name: "5.0"
    namespace: ocp
    tag: openstack-cinder-csi-driver-operator-test
  openstack-installer:
    name: "5.0"
    namespace: ocp
    tag: openstack-installer
  upi-installer:
    name: "5.0"
    namespace: ocp
    tag: upi-installer
releases:
  initial:
    candidate:
      product: ocp
      relative: 1
      stream: ci
      version: "5.0"
  latest:
    candidate:
      product: ocp
      stream: ci
      version: "5.0"
  latest-4-20:
    candidate:
      product: ocp
      stream: nightly
      version: "4.22"
  multi-initial:
    candidate:
      architecture: multi
      product: ocp
      relative: 1
      stream: nightly
      version: "5.0"
  multi-latest:
    candidate:
      architecture: multi
      product: ocp
      stream: nightly
      version: "5.0"
  multi-n1minor:
    candidate:
      architecture: multi
      product: ocp
      stream: nightly
      version: "4.22"
  multi-n2minor:
    candidate:
      architecture: multi
      product: ocp
      stream: nightly
      version: "4.21"
  multi-n3minor:
    candidate:
      architecture: multi
      product: ocp
      stream: nightly
      version: "4.20"
  multi-n4minor:
    candidate:
      architecture: multi
      product: ocp
      stream: nightly
      version: "4.19"
  n1minor:
    candidate:
      product: ocp
      stream: ci
      version: "4.22"
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: e2e-aws-autonode
  cron: 0 2 * * *
  steps:
    cluster_profile: hypershift-aws
    dependencies:
      OCP_IMAGE_LATEST: release:multi-latest
      OCP_IMAGE_PREVIOUS: release:multi-initial
    env:
      AWS_MULTI_ARCH: "true"
      CI_TESTS_RUN: ^TestKarpenter
      ENABLE_HYPERSHIFT_CERT_ROTATION_SCALE: "true"
      REQUEST_SERVING_COMPONENT_TEST: "true"
    workflow: hypershift-aws-e2e-nested
- as: e2e-aws-multi
  cron: 0 2 * * *
  steps:
    cluster_profile: hypershift-aws
    dependencies:
      OCP_IMAGE_LATEST: release:multi-latest
      OCP_IMAGE_N1: release:multi-n1minor
      OCP_IMAGE_N2: release:multi-n2minor
      OCP_IMAGE_N3: release:multi-n3minor
      OCP_IMAGE_N4: release:multi-n4minor
      OCP_IMAGE_PREVIOUS: release:multi-initial
    env:
      AWS_MULTI_ARCH: "true"
    workflow: hypershift-aws-e2e-external
- as: e2e-aks
  cron: 53 9,21 * * *
  steps:
    cluster_profile: hypershift-aks
    env:
      AUTH_THROUGH_CERTS: "true"
      HYPERSHIFT_AZURE_MARKETPLACE_IMAGE_OFFER: ""
      HYPERSHIFT_AZURE_MARKETPLACE_IMAGE_PUBLISHER: ""
      HYPERSHIFT_AZURE_MARKETPLACE_IMAGE_SKU: ""
      HYPERSHIFT_AZURE_MARKETPLACE_IMAGE_VERSION: ""
    workflow: hypershift-azure-aks-e2e
- as: e2e-aks-multi-x-ax
  cron: 0 2 * * *
  steps:
    cluster_profile: hypershift-aks
    dependencies:
      OCP_IMAGE_LATEST: release:multi-latest
      OCP_IMAGE_N1: release:multi-n1minor
      OCP_IMAGE_N2: release:multi-n2minor
      OCP_IMAGE_N3: release:multi-n3minor
      OCP_IMAGE_N4: release:multi-n4minor
      OCP_IMAGE_PREVIOUS: release:multi-initial
    env:
      AUTH_THROUGH_CERTS: "true"
      AZURE_MULTI_ARCH: "true"
      HYPERSHIFT_AZURE_MARKETPLACE_IMAGE_OFFER: ""
      HYPERSHIFT_AZURE_MARKETPLACE_IMAGE_PUBLISHER: ""
      HYPERSHIFT_AZURE_MARKETPLACE_IMAGE_SKU: ""
      HYPERSHIFT_AZURE_MARKETPLACE_IMAGE_VERSION: ""
    workflow: hypershift-azure-aks-e2e
- as: e2e-aws-ovn
  capabilities:
  - build-tmpfs
  cron: 0 0 1 1 *
  steps:
    cluster_profile: hypershift-aws
    env:
      REQUEST_SERVING_COMPONENT_TEST: "true"
    workflow: hypershift-aws-e2e-metrics
- as: e2e-aws-ovn-conformance-serial
  cron: 0 1 * * *
  steps:
    cluster_profile: hypershift-aws
    env:
      HYPERSHIFT_SEPARATE_INFRA_CREATE: "true"
      TEST_SUITE: openshift/conformance/serial
    workflow: hypershift-aws-conformance
- as: e2e-aws-ovn-conformance
  cron: 0 2 * * *
  steps:
    cluster_profile: hypershift-aws
    env:
      PUBLIC_ONLY: "true"
    workflow: hypershift-aws-conformance
- as: e2e-aws-ovn-proxy-conformance
  cron: 0 3 * * *
  steps:
    cluster_profile: hypershift-aws
    workflow: hypershift-aws-conformance-proxy
- as: e2e-aws-upgrade
  cron: 0 */12 * * *
  steps:
    cluster_profile: hypershift-aws
    dependencies:
      OCP_IMAGE_PREVIOUS: release:latest-4-20
    env:
      CI_TESTS_RUN: ^TestUpgradeControlPlane.*
      REQUEST_SERVING_COMPONENT_TEST: "true"
    workflow: hypershift-aws-e2e-external
- as: e2e-aws-conformance-cilium
  minimum_interval: 168h
  steps:
    cluster_profile: hypershift-aws
    workflow: hypershift-aws-conformance-cilium
- as: e2e-aws-external-oidc
  minimum_interval: 12h
  steps:
    cluster_profile: hypershift-aws
    env:
      CI_TESTS_RUN: TestExternalOIDC
      OAUTH_EXTERNAL_OIDC_PROVIDER: keycloak
    workflow: hypershift-aws-e2e-external-oidc
- as: e2e-aws-external-oidc-techpreview
  minimum_interval: 12h
  steps:
    cluster_profile: hypershift-aws
    env:
      CI_TESTS_RUN: TestExternalOIDC
      OAUTH_EXTERNAL_OIDC_PROVIDER: keycloak
      TECH_PREVIEW_NO_UPGRADE: "true"
    workflow: hypershift-aws-e2e-external-oidc
- as: e2e-powervs-ovn
  cron: 0 8 * * *
  steps:
    cluster_profile: hypershift-powervs
    workflow: hypershift-powervs-e2e
- as: e2e-ibmcloud-ovn-iks
  cron: 0 4 * * *
  steps:
    env:
      BOM_VERSION: 4.10.26_openshift
      MANAGED_CLUSTER_TYPE: iks
      MANAGEMENT_CLUSTER_KUBECONFIG: /etc/ibmcloud/secrets/iks.kubeconfig
      TEST_TYPE: main
      VERIFY_COMPLIANCE_OPERATOR_SCAN: "false"
    workflow: hypershift-ibmcloud-e2e
- as: e2e-ibmcloud-ovn-roks
  cron: 0 4 * * *
  steps:
    env:
      BOM_VERSION: 4.11.0_openshift
      MANAGED_CLUSTER_TYPE: openshift
      MANAGEMENT_CLUSTER_KUBECONFIG: /etc/ibmcloud/secrets/roks.kubeconfig
      TEST_TYPE: main
      VERIFY_COMPLIANCE_OPERATOR_SCAN: "true"
    workflow: hypershift-ibmcloud-e2e
- as: e2e-kubevirt-aws-ovn-csi
  cron: 0 4 * * *
  steps:
    cluster_profile: openshift-org-aws
    workflow: hypershift-kubevirt-csi-e2e
- as: e2e-azure-aks-ovn-conformance
  cron: 0 */2 * * *
  steps:
    cluster_profile: hypershift-aks
    env:
      HYPERSHIFT_AZURE_MARKETPLACE_IMAGE_OFFER: ""
      HYPERSHIFT_AZURE_MARKETPLACE_IMAGE_PUBLISHER: ""
      HYPERSHIFT_AZURE_MARKETPLACE_IMAGE_SKU: ""
      HYPERSHIFT_AZURE_MARKETPLACE_IMAGE_VERSION: ""
    workflow: hypershift-azure-aks-conformance
- as: e2e-azure-v2-self-managed
  cron: 30 1,7,13,19 * * *
  steps:
    cluster_profile: hypershift-azure
    dependencies:
      OCP_IMAGE_N1: release:n1minor
    env:
      ENABLE_HYPERSHIFT_CERT_ROTATION_SCALE: "true"
      HYPERSHIFT_AZURE_LOCATION: centralus
    workflow: hypershift-azure-e2e-v2-self-managed
- as: e2e-azure-kubevirt-ovn
  cron: 0 4 * * *
  steps:
    cluster_profile: openshift-org-azure
    env:
      CNV_SUBSCRIPTION_SOURCE: redhat-operators
      ODF_OPERATOR_CHANNEL: stable-4.20
      TEST_INCLUDES: sig-kubevirt
      TEST_SUITE: openshift/conformance/parallel/minimal
    workflow: hypershift-kubevirt-azure-conformance
- as: e2e-kubevirt-azure
  cron: 0 0 1 1 *
  steps:
    cluster_profile: openshift-org-azure
    workflow: hypershift-kubevirt-azure-conformance
- as: e2e-openstack-aws
  cron: 0 10 * * *
  steps:
    cluster_profile: hypershift-aws
    env:
      CLUSTER_TYPE_OVERRIDE: openstack-vexxhost
      TECH_PREVIEW_NO_UPGRADE: "true"
    leases:
    - env: OPENSTACK_CLOUD
      resource_type: openstack-vexxhost-quota-slice
    test:
    - chain: hypershift-openstack-e2e
    workflow: hypershift-aws-e2e-nested
- as: e2e-openstack-aws-nfv
  minimum_interval: 96h
  steps:
    cluster_profile: hypershift-aws
    env:
      CLUSTER_TYPE_OVERRIDE: openstack-nfv
      NFV_NODEPOOLS: "true"
      TECH_PREVIEW_NO_UPGRADE: "true"
    leases:
    - env: OPENSTACK_CLOUD
      resource_type: openstack-nfv-quota-slice
    workflow: hypershift-openstack-aws-nfv
- as: e2e-openstack-aws-conformance
  minimum_interval: 72h
  steps:
    cluster_profile: hypershift-aws
    env:
      CLUSTER_TYPE_OVERRIDE: openstack-vexxhost
      TECH_PREVIEW_NO_UPGRADE: "true"
    leases:
    - env: OPENSTACK_CLOUD
      resource_type: openstack-vexxhost-quota-slice
    workflow: hypershift-openstack-aws-conformance
- as: e2e-openstack-aws-csi-cinder
  minimum_interval: 72h
  steps:
    cluster_profile: hypershift-aws
    env:
      CLUSTER_TYPE_OVERRIDE: openstack-vh-mecha-central
      TECH_PREVIEW_NO_UPGRADE: "true"
      TEST_CSI_DRIVER_MANIFEST: manifest-openstack-cinder.yaml
      TEST_SUITE: openshift/csi
    leases:
    - env: OPENSTACK_CLOUD
      resource_type: openstack-vh-mecha-central-quota-slice
    workflow: hypershift-openstack-aws-conformance
- as: e2e-openstack-aws-csi-manila
  minimum_interval: 72h
  steps:
    cluster_profile: hypershift-aws
    env:
      CLUSTER_TYPE_OVERRIDE: openstack-vh-mecha-central
      TECH_PREVIEW_NO_UPGRADE: "true"
      TEST_CSI_DRIVER_MANIFEST: manifest-openstack-manila.yaml
      TEST_SUITE: openshift/csi
    leases:
    - env: OPENSTACK_CLOUD
      resource_type: openstack-vh-mecha-central-quota-slice
    workflow: hypershift-openstack-aws-conformance
- as: e2e-openstack-nested-conformance
  minimum_interval: 240h
  steps:
    cluster_profile: openstack-vexxhost
    env:
      LVM_OPERATOR_SUB_SOURCE: lvm-catalogsource
      TECH_PREVIEW_NO_UPGRADE: "true"
    workflow: hypershift-openstack-nested-conformance
- as: e2e-v2-gke
  capabilities:
  - build-tmpfs
  cron: 37 9,21 * * *
  steps:
    cluster_profile: hypershift-gcp
    env:
      GKE_REGION: us-central1
      GKE_RELEASE_CHANNEL: stable
    workflow: hypershift-gcp-gke-e2e-v2
zz_generated_metadata:
  branch: release-5.0
  org: openshift
  repo: hypershift
  variant: periodics
