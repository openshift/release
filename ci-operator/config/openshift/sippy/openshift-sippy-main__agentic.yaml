base_images:
  sippy-devcontainer:
    name: sippy
    namespace: ci
    tag: sippy-devcontainer
build_root:
  project_image:
    dockerfile_path: Dockerfile.buildroot
images:
  items:
  - dockerfile_literal: |
      FROM src AS source
      FROM sippy-devcontainer
      USER root
      RUN dnf install -y podman fuse-overlayfs shadow-utils && dnf clean all
      COPY --from=source /go/src/github.com/openshift/sippy /workspace
      RUN chgrp -R 0 /workspace && chmod -R g=u /workspace
      USER vscode
      WORKDIR /workspace
    from: sippy-devcontainer
    inputs:
      src:
        as:
        - src
    to: sippy-ci-dev
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: periodic-sippy-jira-agent
  capabilities:
  - nested-podman
  cron: '@yearly'
  steps:
    workflow: openshift-claude-sippy-jira-agent
zz_generated_metadata:
  branch: main
  org: openshift
  repo: sippy
  variant: agentic
