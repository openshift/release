base_images:
  base:
    name: ubi
    namespace: ocp
    tag: "9"
  yamllint:
    name: yamllint
    namespace: ci
    tag: latest
build_root:
  project_image:
    dockerfile_path: Dockerfile.buildroot
images:
  items:
  - dockerfile_path: Dockerfile
    from: base
    to: sippy
  - context_dir: chat
    dockerfile_path: Dockerfile
    to: sippy-chat
  - dockerfile_path: .devcontainer/Dockerfile
    to: sippy-devcontainer
  - dockerfile_literal: |
      FROM sippy AS binary
      FROM sippy-devcontainer
      COPY --from=binary /bin/sippy /workspace/bin/sippy
      WORKDIR /workspace
    inputs:
      sippy:
        as:
        - sippy
    to: sippy-staging-dev
promotion:
  to:
  - excluded_images:
    - sippy
    - sippy-chat
    - sippy-staging-dev
    name: sippy
    namespace: ci
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: unit
  commands: HOME=/tmp make test
  container:
    from: src
  skip_if_only_changed: ^docs/|\.md$|^(?:.*/)?(?:\.gitignore|OWNERS|PROJECT|LICENSE)$
- as: build
  commands: HOME=/tmp make build
  container:
    from: src
  skip_if_only_changed: ^docs/|\.md$|^(?:.*/)?(?:\.gitignore|OWNERS|PROJECT|LICENSE)$
- as: lint
  commands: HOME=/tmp make lint
  container:
    from: src
- as: yaml-lint
  commands: IS_CONTAINER=TRUE ./hack/yaml-lint.sh
  container:
    from: yamllint
  run_if_changed: \.ya?ml$
- always_run: false
  as: e2e
  cluster_claim:
    architecture: amd64
    as: latest
    cloud: aws
    owner: openshift-ci
    product: ocp
    timeout: 1h0m0s
    version: "4.18"
  steps:
    workflow: sippy-e2e
- always_run: false
  as: staging
  cluster_claim:
    architecture: amd64
    cloud: aws
    owner: openshift-ci
    product: ocp
    timeout: 2h0m0s
    version: "4.18"
  optional: true
  steps:
    env:
      TIMEOUT: +1 hour
    workflow: sippy-staging
- as: security
  steps:
    env:
      PROJECT_NAME: openshift/sippy
    workflow: openshift-ci-security
zz_generated_metadata:
  branch: main
  org: openshift
  repo: sippy
