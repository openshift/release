base_images:
  driver-operand:
    name: "5.0"
    namespace: ocp
    tag: secrets-store-csi-driver
  livenessprobe-operand:
    name: "5.0"
    namespace: ocp
    tag: csi-livenessprobe
  ocp_4.14_cli:
    name: "5.0"
    namespace: ocp
    tag: cli
  operator-index:
    name: redhat-operator-index
    namespace: ci
    tag: v4.10
  registrar-operand:
    name: "5.0"
    namespace: ocp
    tag: csi-node-driver-registrar
  secrets-store-csi-driver-e2eprovider:
    name: "5.0"
    namespace: ocp
    tag: secrets-store-csi-driver-e2eprovider
  secrets-store-csi-driver-test:
    name: "5.0"
    namespace: ocp
    tag: secrets-store-csi-driver-test
binary_build_commands: make
build_root:
  from_repository: true
images:
  items:
  - dockerfile_path: Dockerfile.openshift
    to: secrets-store-csi-driver-operator
  - dockerfile_path: Dockerfile.mustgather
    from: ocp_4.14_cli
    to: secrets-store-csi-mustgather
operator:
  bundles:
  - as: secrets-store-csi-driver-operator-bundle
    base_index: operator-index
    context_dir: config
    dockerfile_path: bundle.Dockerfile
    update_graph: replaces
  substitutions:
  - pullspec: quay.io/openshift/origin-secrets-store-csi-driver-operator:latest
    with: pipeline:secrets-store-csi-driver-operator
  - pullspec: quay.io/openshift/origin-secrets-store-csi-driver:latest
    with: pipeline:driver-operand
  - pullspec: quay.io/openshift/origin-csi-node-driver-registrar:latest
    with: pipeline:registrar-operand
  - pullspec: quay.io/openshift/origin-csi-livenessprobe:latest
    with: pipeline:livenessprobe-operand
promotion:
  to:
  - name: "5.0"
    namespace: ocp
releases:
  initial:
    integration:
      name: "5.0"
      namespace: ocp
  latest:
    integration:
      include_built_images: true
      name: "5.0"
      namespace: ocp
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
test_binary_build_commands: make test
tests:
- as: unit
  commands: make test-unit
  container:
    from: src
- as: verify
  commands: make verify
  container:
    from: src
- as: operator-e2e-fips
  steps:
    cluster_profile: openshift-org-azure
    dependencies:
      OO_INDEX: ci-index-secrets-store-csi-driver-operator-bundle
      SECRETS_STORE_E2E_PROVIDER_IMAGE: secrets-store-csi-driver-e2eprovider
    env:
      FIPS_ENABLED: "true"
      OO_CHANNEL: stable
      OO_INSTALL_NAMESPACE: openshift-cluster-csi-drivers
      OO_PACKAGE: secrets-store-csi-driver-operator
      OO_TARGET_NAMESPACES: '!all'
    test:
    - ref: fips-check-fips-or-die
    - ref: fips-check-node-scan
    - as: test-e2e
      cli: latest
      commands: make test-e2e
      from: src
      resources:
        requests:
          cpu: 50m
          memory: 100Mi
    workflow: openshift-e2e-azure-csi-secrets-store
- as: operator-e2e-vault-fips
  steps:
    cluster_profile: openshift-org-azure
    dependencies:
      OO_INDEX: ci-index-secrets-store-csi-driver-operator-bundle
      SECRETS_STORE_E2E_PROVIDER_IMAGE: secrets-store-csi-driver-e2eprovider
    env:
      FIPS_ENABLED: "true"
      OO_CHANNEL: stable
      OO_INSTALL_NAMESPACE: openshift-cluster-csi-drivers
      OO_PACKAGE: secrets-store-csi-driver-operator
      OO_TARGET_NAMESPACES: '!all'
    test:
    - ref: fips-check-fips-or-die
    - ref: fips-check-node-scan
    - as: test-e2e-vault
      cli: latest
      commands: |
        # the test assumes the default namespace is used
        oc project default
        make e2e-vault
      from: secrets-store-csi-driver-test
      resources:
        requests:
          cpu: 50m
          memory: 100Mi
    workflow: openshift-e2e-azure-csi-secrets-store-vault
- as: operator-e2e-aws
  steps:
    cluster_profile: openshift-org-aws
    dependencies:
      OO_INDEX: ci-index-secrets-store-csi-driver-operator-bundle
      SECRETS_STORE_E2E_PROVIDER_IMAGE: secrets-store-csi-driver-e2eprovider
    env:
      OO_CHANNEL: stable
      OO_INSTALL_NAMESPACE: openshift-cluster-csi-drivers
      OO_PACKAGE: secrets-store-csi-driver-operator
      OO_TARGET_NAMESPACES: '!all'
    workflow: openshift-e2e-aws-csi-secrets-store
- as: operator-e2e-azure
  steps:
    cluster_profile: openshift-org-azure
    dependencies:
      OO_INDEX: ci-index-secrets-store-csi-driver-operator-bundle
      SECRETS_STORE_E2E_PROVIDER_IMAGE: secrets-store-csi-driver-e2eprovider
    env:
      OO_CHANNEL: stable
      OO_INSTALL_NAMESPACE: openshift-cluster-csi-drivers
      OO_PACKAGE: secrets-store-csi-driver-operator
      OO_TARGET_NAMESPACES: '!all'
    workflow: openshift-e2e-azure-csi-secrets-store-azure
- as: operator-e2e-gcp
  steps:
    cluster_profile: openshift-org-gcp
    dependencies:
      OO_INDEX: ci-index-secrets-store-csi-driver-operator-bundle
      SECRETS_STORE_E2E_PROVIDER_IMAGE: secrets-store-csi-driver-e2eprovider
    env:
      OO_CHANNEL: stable
      OO_INSTALL_NAMESPACE: openshift-cluster-csi-drivers
      OO_PACKAGE: secrets-store-csi-driver-operator
      OO_TARGET_NAMESPACES: '!all'
    workflow: openshift-e2e-gcp-csi-secrets-store
- always_run: false
  as: operator-e2e-azure-rhcos10-fips
  optional: true
  steps:
    cluster_profile: openshift-org-azure
    dependencies:
      OO_INDEX: ci-index-secrets-store-csi-driver-operator-bundle
      SECRETS_STORE_E2E_PROVIDER_IMAGE: secrets-store-csi-driver-e2eprovider
    env:
      FEATURE_SET: TechPreviewNoUpgrade
      FIPS_ENABLED: "true"
      OO_CHANNEL: stable
      OO_INSTALL_NAMESPACE: openshift-cluster-csi-drivers
      OO_PACKAGE: secrets-store-csi-driver-operator
      OO_TARGET_NAMESPACES: '!all'
      OSSTREAM: rhel-10
    test:
    - as: test-e2e
      cli: latest
      commands: make test-e2e
      from: src
      resources:
        requests:
          cpu: 50m
          memory: 100Mi
    workflow: openshift-e2e-azure-csi-secrets-store
- always_run: false
  as: operator-e2e-azure-rhcos10
  optional: true
  steps:
    cluster_profile: openshift-org-azure
    dependencies:
      OO_INDEX: ci-index-secrets-store-csi-driver-operator-bundle
      SECRETS_STORE_E2E_PROVIDER_IMAGE: secrets-store-csi-driver-e2eprovider
    env:
      FEATURE_SET: TechPreviewNoUpgrade
      OO_CHANNEL: stable
      OO_INSTALL_NAMESPACE: openshift-cluster-csi-drivers
      OO_PACKAGE: secrets-store-csi-driver-operator
      OO_TARGET_NAMESPACES: '!all'
      OSSTREAM: rhel-10
    test:
    - as: test-e2e
      cli: latest
      commands: make test-e2e
      from: src
      resources:
        requests:
          cpu: 50m
          memory: 100Mi
    workflow: openshift-e2e-azure-csi-secrets-store
- as: operator-e2e-aws-weekly
  cron: '@weekly'
  steps:
    cluster_profile: openshift-org-aws
    dependencies:
      SECRETS_STORE_E2E_PROVIDER_IMAGE: secrets-store-csi-driver-e2eprovider
    dependency_overrides:
      OO_INDEX: quay.io/redhat-user-workloads/ocp-art-tenant/art-fbc:ocp__4.23__ose-secrets-store-csi-driver-rhel9-operator
    env:
      CLUSTERCSIDRIVER: secrets-store.csi.k8s.io
      OO_CHANNEL: stable
      OO_INSTALL_NAMESPACE: openshift-cluster-csi-drivers
      OO_PACKAGE: secrets-store-csi-driver-operator
      OO_TARGET_NAMESPACES: '!all'
      TRUECONDITIONS: SecretsStoreDriverNodeServiceControllerAvailable
    pre:
    - chain: ipi-aws-pre-manual-oidc-sts
    - as: setup-konflux-image-access
      cli: latest
      commands: |
        oc extract secret/pull-secret -n openshift-config --confirm --to /tmp
        jq -s '.[0].auths += .[1].auths | .[0]' /tmp/.dockerconfigjson /var/run/secrets/pull-secret/.dockerconfigjson > /tmp/merged-pullsecret.json
        oc set data secret/pull-secret -n openshift-config --from-file=.dockerconfigjson=/tmp/merged-pullsecret.json
        cat <<'EOF' | oc apply -f -
        apiVersion: config.openshift.io/v1
        kind: ImageDigestMirrorSet
        metadata:
          name: idms
        spec:
          imageDigestMirrors:
          - mirrors:
            - quay.io/redhat-user-workloads/ocp-art-tenant/art-images-share
            source: registry.redhat.io/openshift4/ose-secrets-store-csi-driver-rhel9-operator
          - mirrors:
            - quay.io/redhat-user-workloads/ocp-art-tenant/art-images-share
            source: registry.redhat.io/openshift4/ose-secrets-store-csi-driver-operator-bundle
          - mirrors:
            - quay.io/redhat-user-workloads/ocp-art-tenant/art-images-share
            source: registry.redhat.io/openshift4/ose-secrets-store-csi-driver-rhel9
          - mirrors:
            - quay.io/redhat-user-workloads/ocp-art-tenant/art-images-share
            source: registry.redhat.io/openshift4/ose-csi-node-driver-registrar-rhel9
          - mirrors:
            - quay.io/redhat-user-workloads/ocp-art-tenant/art-images-share
            source: registry.redhat.io/openshift4/ose-csi-livenessprobe-rhel9
        EOF
        sleep 60
        oc wait mcp/master --for condition=Updated --timeout=30m
        oc wait mcp/worker --for condition=Updated --timeout=30m
      credentials:
      - mount_path: /var/run/secrets/pull-secret
        name: deploy-konflux-operator-art-image-share
        namespace: test-credentials
      from: src
      resources:
        requests:
          cpu: 100m
    - ref: optional-operators-subscribe
    - ref: storage-create-csi-secrets-store
    - ref: storage-conf-wait-for-csi-driver
    - ref: storage-obj-save
    - ref: openshift-e2e-aws-csi-secrets-store-pre-iam-access
    test:
    - ref: openshift-e2e-aws-csi-secrets-store-test
    workflow: openshift-e2e-aws-csi-secrets-store
- as: verify-deps
  steps:
    test:
    - ref: go-verify-deps
- as: security
  optional: true
  steps:
    env:
      PROJECT_NAME: secrets-store-csi-driver-operator
    workflow: openshift-ci-security
- as: fips-image-scan-operator
  steps:
    dependencies:
      SCAN_IMAGE: secrets-store-csi-driver-operator
    test:
    - ref: fips-check-image-scan
- as: fips-image-scan-mustgather
  steps:
    dependencies:
      SCAN_IMAGE: secrets-store-csi-mustgather
    test:
    - ref: fips-check-image-scan
zz_generated_metadata:
  branch: main
  org: openshift
  repo: secrets-store-csi-driver-operator
