base_images:
  cli:
    name: "4.21"
    namespace: ocp
    tag: cli
  upi-installer:
    name: "4.20"
    namespace: ocp
    tag: upi-installer
build_root:
  from_repository: true
images:
  items:
  - dockerfile_path: Dockerfile.ci
    to: kueue-operator
  - dockerfile_literal: |
      FROM src
      RUN dnf install -y jq skopeo git && dnf clean all
    from: src
    to: kueue-operator-src
  - dockerfile_literal: |
      FROM src
      COPY oc /usr/bin/oc
      RUN ln -s /usr/bin/oc /usr/bin/kubectl
      RUN wget -qO /usr/local/bin/jq https://github.com/jqlang/jq/releases/latest/download/jq-linux64 && chmod +x /usr/local/bin/jq
      RUN dnf install -y skopeo git podman && dnf clean all
    from: src
    inputs:
      cli:
        paths:
        - destination_dir: .
          source_path: /usr/bin/oc
    to: src-with-oc-and-kubectl
prowgen:
  disable_sparse_checkout: true
releases:
  initial:
    candidate:
      product: ocp
      stream: nightly
      version: "4.20"
  latest:
    candidate:
      product: ocp
      stream: nightly
      version: "4.21"
resources:
  '*':
    requests:
      cpu: "4"
      memory: 4Gi
tests:
- always_run: false
  as: e2e-ocp-upgrade-4-20-to-4-21-kueue-1-4
  optional: true
  steps:
    allow_best_effort_post_steps: true
    cluster_profile: openshift-org-aws
    dependencies:
      OPENSHIFT_INSTALL_RELEASE_IMAGE_OVERRIDE: release:initial
      OPENSHIFT_UPGRADE_RELEASE_IMAGE_OVERRIDE: release:latest
    env:
      BUNDLE_COMPONENT: kueue-bundle-1-4
      OPERAND_COMPONENT: kueue-operand-1-4
      OPERATOR_COMPONENT: kueue-operator-1-4
    post:
    - as: kueue-must-gather
      best_effort: true
      cli: latest
      commands: |
        source "${SHARED_DIR}/env"
        make run-must
      from: kueue-operator-src
      resources:
        requests:
          cpu: 300m
          memory: 500Mi
      timeout: 20m0s
    - chain: ipi-aws-post
    pre:
    - chain: ipi-aws-pre-stableinitial
    - ref: kueue-operator-image-env-setup
    - ref: cert-manager-install-operator
    - ref: kueue-operator-test-upgrade-install-bundle
    - ref: kueue-operator-test-upgrade-setup-cr
    test:
    - chain: kueue-operator-test-ocp-upgrade
- always_run: false
  as: e2e-operator-upgrade-4-20-kueue-1-3-to-1-4
  optional: true
  steps:
    allow_best_effort_post_steps: true
    cluster_profile: openshift-org-aws
    dependencies:
      OPENSHIFT_INSTALL_RELEASE_IMAGE_OVERRIDE: release:initial
    env:
      BUNDLE_COMPONENT: kueue-bundle-1-4
      KUEUE_PREVIOUS_CHANNEL: stable-v1.3
      OPERAND_COMPONENT: kueue-operand-1-4
      OPERATOR_COMPONENT: kueue-operator-1-4
    post:
    - as: kueue-must-gather
      best_effort: true
      cli: latest
      commands: |
        source "${SHARED_DIR}/env"
        make run-must
      from: kueue-operator-src
      resources:
        requests:
          cpu: 300m
          memory: 500Mi
      timeout: 20m0s
    - chain: ipi-aws-post
    pre:
    - chain: ipi-aws-pre-stableinitial
    - ref: kueue-operator-image-env-setup
    - ref: cert-manager-install-operator
    - ref: jobset-install-operator
    - ref: leader-worker-set-install-operator
    - ref: kueue-operator-test-upgrade-install-previous
    test:
    - chain: kueue-operator-test-operator-upgrade
zz_generated_metadata:
  branch: release-1.4
  org: openshift
  repo: kueue-operator
  variant: upgrade-from-4.20
