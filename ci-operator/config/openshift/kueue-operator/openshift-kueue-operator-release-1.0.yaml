base_images:
  ocp_builder_rhel-9-base-openshift-4.19:
    name: builder
    namespace: ocp
    tag: rhel-9-base-openshift-4.19
  ocp_builder_rhel-9-golang-1.23-openshift-4.19:
    name: builder
    namespace: ocp
    tag: rhel-9-golang-1.23-openshift-4.19
  operator-sdk:
    name: "4.17"
    namespace: origin
    tag: operator-sdk
build_root:
  from_repository: true
images:
- dockerfile_path: Dockerfile.ci
  inputs:
    ocp_builder_rhel-9-base-openshift-4.19:
      as:
      - registry.ci.openshift.org/ocp/builder:rhel-9-base-openshift-4.19
    ocp_builder_rhel-9-golang-1.23-openshift-4.19:
      as:
      - registry.ci.openshift.org/ocp/builder:rhel-9-golang-1.23-openshift-4.19
  to: kueue-operator
- dockerfile_literal: |
    FROM src
    RUN dnf install -y skopeo git && dnf clean all
  from: src
  to: kueue-operator-src
- dockerfile_literal: |
    FROM operator-sdk
    USER 0
    RUN microdnf install -y skopeo git && microdnf clean all
  from: operator-sdk
  to: kueue-operator-sdk-tools
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: test
  commands: make test
  container:
    from: src
- as: test-generate
  commands: make generate manifests regen-crd
  container:
    from: src
- as: lint
  commands: |
    export GOCACHE=/tmp/
    export GOLANGCI_LINT_CACHE=/tmp/.cache
    export GOPROXY=https://proxy.golang.org
    make lint
  container:
    clone: true
    from: src
- as: fips-image-scan-kueue-operator
  skip_if_only_changed: ^\.tekton/|\.md$|^(LICENSE|OWNERS)$
  steps:
    dependencies:
      SCAN_IMAGE: kueue-operator
    test:
    - ref: fips-check-image-scan
- as: security
  optional: true
  skip_if_only_changed: ^\.tekton/|\.md$|^(LICENSE|OWNERS)$
  steps:
    workflow: openshift-ci-security
- as: test-e2e-4-17
  cluster_claim:
    architecture: amd64
    cloud: aws
    owner: openshift-ci
    product: ocp
    timeout: 1h0m0s
    version: "4.17"
  steps:
    test:
    - as: e2e-kueue
      cli: latest
      commands: |-
        echo "Current PWD: $(pwd)"
        echo "Listing directory contents:"
        ls -lah
        REVISION=$(git log --oneline -1 | awk '{print $4}' | tr -d "'")
        echo "Current Git branch:"
        git branch --show-current

        echo "Latest Git commits:"
        git log --oneline -5

        echo "Git status:"
        git status
        export OPERATOR_IMAGE=quay.io/redhat-user-workloads/kueue-operator-tenant/kueue-operator-1-0:on-pr-${REVISION}
        echo "Using Operator Image: ${OPERATOR_IMAGE}"
        make e2e-ci-test
      from: kueue-operator-src
      resources:
        requests:
          cpu: 300m
          memory: 500Mi
- as: test-e2e-upstream-4-17
  cluster_claim:
    architecture: amd64
    cloud: aws
    owner: openshift-ci
    product: ocp
    timeout: 1h0m0s
    version: "4.17"
  steps:
    test:
    - as: e2e-kueue
      cli: latest
      commands: |-
        echo "Current PWD: $(pwd)"
        echo "Listing directory contents:"
        ls -lah
        REVISION=$(git log --oneline -1 | awk '{print $4}' | tr -d "'")
        echo "Current Git branch:"
        git branch --show-current

        echo "Latest Git commits:"
        git log --oneline -5

        echo "Git status:"
        git status
        export OPERATOR_IMAGE=quay.io/redhat-user-workloads/kueue-operator-tenant/kueue-operator-1-0:on-pr-${REVISION}
        echo "Using Operator Image: ${OPERATOR_IMAGE}"
        make e2e-upstream-test
      from: kueue-operator-src
      resources:
        requests:
          cpu: 300m
          memory: 500Mi
- as: test-e2e-4-18
  cluster_claim:
    architecture: amd64
    cloud: aws
    owner: openshift-ci
    product: ocp
    timeout: 1h0m0s
    version: "4.18"
  optional: true
  steps:
    test:
    - as: install
      cli: latest
      commands: |-
        echo "Current PWD: $(pwd)"
        echo "Listing directory contents:"
        ls -lah
        dnf install -y git skopeo && dnf clean all
        REVISION=$(git log --oneline -1 | awk '{print $4}' | tr -d "'")
        echo "Current Git branch:"
        git branch --show-current

        echo "Latest Git commits:"
        git log --oneline -5

        echo "Git status:"
        git status
        export OPERATOR_IMAGE=quay.io/redhat-user-workloads/kueue-operator-tenant/kueue-operator-1-0:on-pr-${REVISION}
        echo "Using Operator Image: ${OPERATOR_IMAGE}"

        oc create namespace openshift-kueue-operator
        oc label ns openshift-kueue-operator openshift.io/cluster-monitoring=true

        BUNDLE_REPO=quay.io/redhat-user-workloads/kueue-operator-tenant/kueue-operator-bundle-1-0
        LATEST_TAG=$(for tag in $(skopeo list-tags docker://$BUNDLE_REPO | jq -r '.Tags[]' | grep -E '^[a-f0-9]{40}$' | tail -n 10); do \
          created=$(skopeo inspect docker://$BUNDLE_REPO:$tag 2>/dev/null | jq -r '.Created'); \
          if [ "$created" != "null" ] && [ -n "$created" ]; then echo "$created $tag"; fi; \
        done | sort | tail -n1 | awk '{print $2}')

        BUNDLE_IMAGE=$BUNDLE_REPO:$LATEST_TAG
        echo "Current PWD: $BUNDLE_IMAGE"
        operator-sdk run bundle --timeout=10m -n openshift-kueue-operator "$BUNDLE_IMAGE"

        CSV=$(oc get csv -n openshift-kueue-operator -o jsonpath='{.items[0].metadata.name}')
        oc patch csv -n openshift-kueue-operator $CSV --type=json -p="[{\"op\": \"replace\", \"path\": \"/spec/install/spec/deployments/0/spec/template/spec/containers/0/image\", \"value\": \"$OPERATOR_IMAGE\"}]"
      from: kueue-operator-sdk-tools
      resources:
        requests:
          cpu: 200m
          memory: 300Mi
    - as: e2e-kueue
      cli: latest
      commands: make e2e-ci-test
      from: kueue-operator-src
      resources:
        requests:
          cpu: 300m
          memory: 500Mi
- as: test-e2e-upstream-4-18
  cluster_claim:
    architecture: amd64
    cloud: aws
    owner: openshift-ci
    product: ocp
    timeout: 1h0m0s
    version: "4.18"
  optional: true
  steps:
    test:
    - as: e2e-kueue
      cli: latest
      commands: |-
        echo "Current PWD: $(pwd)"
        echo "Listing directory contents:"
        ls -lah
        REVISION=$(git log --oneline -1 | awk '{print $4}' | tr -d "'")
        echo "Current Git branch:"
        git branch --show-current

        echo "Latest Git commits:"
        git log --oneline -5

        echo "Git status:"
        git status
        export OPERATOR_IMAGE=quay.io/redhat-user-workloads/kueue-operator-tenant/kueue-operator-1-0:on-pr-${REVISION}
        echo "Using Operator Image: ${OPERATOR_IMAGE}"
        make e2e-upstream-test
      from: kueue-operator-src
      resources:
        requests:
          cpu: 300m
          memory: 500Mi
zz_generated_metadata:
  branch: release-1.0
  org: openshift
  repo: kueue-operator
