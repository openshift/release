- as: kueue-test-e2e-disconnected
  always_run: false
  steps:
    cluster_profile: gcp
    env:
      OPERTORS_TO_MIRROR: "kueue-operator"
      OPERATORS: |
        [
            {"name": "kueue-operator", "source": "qe-app-registry", "channel": "stable-1.0", "install_namespace": "openshift-kueue-operator","target_namespaces": "", "operator_group": "openshift-kueue-operator"}
        ]
      SELF_MANAGED_ADDITIONAL_CA: "true"
      SELF_MANAGED_REGISTRY_CERT: "true"
    test:
    - ref: install-operators
    - as: e2e-kueue
      cli: latest
      commands: |-
        echo "Current PWD: $(pwd)"
        echo "Listing directory contents:"
        ls -lah
        REVISION=$(git log --oneline -1 | awk '{print $4}' | tr -d "'")
        echo "Current Git branch:"
        git branch --show-current

        echo "Latest Git commits:"
        git log --oneline -5

        echo "Git status:"
        git status
        export OPERATOR_IMAGE=quay.io/redhat-user-workloads/kueue-operator-tenant/kueue-operator-1-0:on-pr-${REVISION}
        echo "Using Operator Image: ${OPERATOR_IMAGE}"
        make e2e-upstream-test
      from: kueue-operator-src
      resources:
        requests:
          cpu: 300m
          memory: 500Mi
    workflow: cucushift-installer-rehearse-gcp-ipi-disconnected
zz_generated_metadata:
  branch: release-1.0
  org: openshift
  repo: kueue-operator
