- as: test-e2e-4-18
  cluster_claim:
    architecture: amd64
    cloud: aws
    owner: openshift-ci
    product: ocp
    timeout: 1h0m0s
    version: "4.18"
  optional: true
  steps:
    test:
    - as: e2e-kueue
      cli: latest
      commands: |-
        echo "Current PWD: $(pwd)"
        echo "Listing directory contents:"
        ls -lah
        REVISION=$(git log --oneline -1 | awk '{print $4}' | tr -d "'")
        echo "Current Git branch:"
        git branch --show-current

        echo "Latest Git commits:"
        git log --oneline -5

        echo "Git status:"
        git status
        export OPERATOR_IMAGE=quay.io/rh-pbhojara/testrepo/kueue-operator:latest
        echo "Using Operator Image: ${OPERATOR_IMAGE}"

        mkdir -p bin
        export OPERATOR_SDK_VERSION="v1.37.0"
        OS=$(uname | tr '[:upper:]' '[:lower:]')
        ARCH=$(uname -m | sed 's/x86_64/amd64/' | sed 's/aarch64/arm64/')
        URL="https://github.com/operator-framework/operator-sdk/releases/download/${OPERATOR_SDK_VERSION}/operator-sdk_${OS}_${ARCH}"
        curl -sSL -o bin/operator-sdk "$URL"
        chmod +x bin/operator-sdk
        export OPERATOR_SDK="$(pwd)/bin/operator-sdk"
        $OPERATOR_SDK version

        make get-kueue-image
        export KUEUE_IMAGE=$(< .kueue_image)
        echo "Using KUEUE_IMAGE = ${KUEUE_IMAGE}"

        hack/update-deploy-files.sh ${OPERATOR_IMAGE} ${KUEUE_IMAGE}
        ${OPERATOR_SDK} generate bundle --input-dir deploy/ --version 0.1.0
        hack/revert-deploy-files.sh ${OPERATOR_IMAGE} ${KUEUE_IMAGE}
        buildah bud --isolation=chroot -f bundle.Dockerfile -t pipeline:kueue-operator-bundle .
        $OPERATOR_SDK run bundle --namespace openshift-kueue-operator pipeline:kueue-operator-bundle

        make e2e-ci-test
      from: kueue-operator-src
      resources:
        requests:
          cpu: 300m
          memory: 500Mi
