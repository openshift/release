base_images:
  cli:
    name: "4.20"
    namespace: ocp
    tag: cli
  operator-sdk:
    name: "4.17"
    namespace: origin
    tag: operator-sdk
  upi-installer:
    name: "4.19"
    namespace: ocp
    tag: upi-installer
build_root:
  from_repository: true
images:
  items:
  - additional_architectures:
    - arm64
    dockerfile_path: Dockerfile.ci
    to: kueue-operator
  - additional_architectures:
    - arm64
    dockerfile_literal: |
      FROM src
      RUN wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 && chmod +x /usr/local/bin/yq
      RUN dnf install -y jq skopeo git && dnf clean all
    from: src
    to: kueue-operator-src
  - dockerfile_literal: |
      FROM src
      COPY oc /usr/bin/oc
      RUN ln -s /usr/bin/oc /usr/bin/kubectl
      RUN wget -qO /usr/local/bin/jq https://github.com/jqlang/jq/releases/latest/download/jq-linux64 && chmod +x /usr/local/bin/jq
      RUN dnf install -y skopeo git podman && dnf clean all
    from: src
    inputs:
      cli:
        paths:
        - destination_dir: .
          source_path: /usr/bin/oc
    to: src-with-oc-and-kubectl
  - dockerfile_path: Dockerfile.ci.kueue
    to: kueue-operand
  - context_dir: .
    dockerfile_path: Dockerfile.ci.must-gather
    to: kueue-must-gather
operator:
  bundles:
  - as: kueue-bundle
    context_dir: .
    dockerfile_path: bundle.Dockerfile
    skip_building_index: true
  substitutions:
  - pullspec: registry.redhat.io/kueue/kueue-rhel9-operator:latest
    with: pipeline:kueue-operator
  - pullspec: registry.redhat.io/kueue/kueue-rhel9:latest
    with: pipeline:kueue-operand
  - pullspec: registry.redhat.io/kueue/kueue-must-gather-rhel9:latest
    with: pipeline:kueue-must-gather
releases:
  4-21-latest:
    candidate:
      product: ocp
      stream: nightly
      version: "4.21"
  arm64-4-20-latest:
    candidate:
      architecture: arm64
      product: ocp
      stream: nightly
      version: "4.20"
  latest:
    release:
      architecture: multi
      channel: stable
      version: "4.20"
resources:
  '*':
    requests:
      cpu: "4"
      memory: 4Gi
tests:
- as: test
  commands: make test
  container:
    from: src
- as: test-generate
  commands: make generate manifests regen-crd
  container:
    from: src
- as: lint
  commands: |
    export GOCACHE=/tmp/
    export GOLANGCI_LINT_CACHE=/tmp/.cache
    export GOPROXY=https://proxy.golang.org
    make lint
  container:
    clone: true
    from: kueue-operator-src
- as: fips-image-scan-kueue-operator
  skip_if_only_changed: ^\.tekton/|\.md$|^(LICENSE|OWNERS)$
  steps:
    dependencies:
      SCAN_IMAGE: kueue-operator
    test:
    - ref: fips-check-image-scan
- as: security
  optional: true
  skip_if_only_changed: ^\.tekton/|\.md$|^(LICENSE|OWNERS)$
  steps:
    workflow: openshift-ci-security
- as: test-e2e-ci-build-downstream-4-20
  steps:
    cluster_profile: openshift-org-aws
    post:
    - chain: kueue-operator-post
    test:
    - ref: cert-manager-install-operator
    - as: run-sdk
      cli: latest
      commands: |
        oc create namespace openshift-kueue-operator || true
        oc label ns openshift-kueue-operator openshift.io/cluster-monitoring=true --overwrite
        operator-sdk run bundle --timeout=10m -n openshift-kueue-operator "$OO_BUNDLE" --security-context-config=restricted
      dependencies:
      - env: OO_BUNDLE
        name: kueue-bundle
      from: operator-sdk
      resources:
        requests:
          cpu: 100m
    - ref: jobset-install-operator
    - ref: leader-worker-set-install-operator
    - as: e2e-kueue
      cli: latest
      commands: make e2e-ci-test
      from: kueue-operator-src
      resources:
        requests:
          cpu: "4"
          memory: 4Gi
    workflow: ipi-aws
- as: test-e2e-ci-build-upstream-4-20
  steps:
    cluster_profile: openshift-org-aws
    post:
    - chain: kueue-operator-post
    test:
    - ref: cert-manager-install-operator
    - as: run-sdk
      cli: latest
      commands: |
        oc create namespace openshift-kueue-operator || true
        oc label ns openshift-kueue-operator openshift.io/cluster-monitoring=true --overwrite
        operator-sdk run bundle --timeout=10m -n openshift-kueue-operator "$OO_BUNDLE" --security-context-config=restricted
      dependencies:
      - env: OO_BUNDLE
        name: kueue-bundle
      from: operator-sdk
      resources:
        requests:
          cpu: 100m
    - ref: jobset-install-operator
    - ref: leader-worker-set-install-operator
    - as: e2e-kueue-upstream
      cli: latest
      commands: make e2e-upstream-test
      from: kueue-operator-src
      resources:
        requests:
          cpu: "4"
          memory: 4Gi
    workflow: ipi-aws
- always_run: false
  as: test-e2e-ci-build-upstream-4-21
  optional: true
  steps:
    cluster_profile: openshift-org-aws
    dependencies:
      OPENSHIFT_INSTALL_RELEASE_IMAGE_OVERRIDE: release:4-21-latest
    post:
    - chain: kueue-operator-post
    test:
    - ref: cert-manager-install-operator
    - as: run-sdk
      cli: latest
      commands: |
        oc create namespace openshift-kueue-operator || true
        oc label ns openshift-kueue-operator openshift.io/cluster-monitoring=true --overwrite
        operator-sdk run bundle --timeout=10m -n openshift-kueue-operator "$OO_BUNDLE" --security-context-config=restricted
      dependencies:
      - env: OO_BUNDLE
        name: kueue-bundle
      from: operator-sdk
      resources:
        requests:
          cpu: 100m
    - ref: jobset-install-operator
    - ref: leader-worker-set-install-operator
    - ref: kueue-operator-test-e2e-dra-enable-feature-gate
    - ref: dra-example-driver-install
    - as: e2e-kueue-upstream
      cli: latest
      commands: make e2e-upstream-test
      env:
      - default: singlecluster certmanager dra
        name: E2E_TARGET_FOLDERS
      from: kueue-operator-src
      resources:
        requests:
          cpu: "4"
          memory: 4Gi
    workflow: ipi-aws
- as: test-e2e-4-18
