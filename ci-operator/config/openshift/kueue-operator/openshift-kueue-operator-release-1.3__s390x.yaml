base_images:
  cli:
    name: "4.20"
    namespace: ocp
    tag: cli
  operator-sdk:
    name: "4.17"
    namespace: origin
    tag: operator-sdk
  upi-installer:
    name: "4.19"
    namespace: ocp
    tag: upi-installer
build_root:
  from_repository: true
images:
  items:
  - additional_architectures:
    - s390x
    dockerfile_path: Dockerfile.ci
    to: kueue-operator
  - additional_architectures:
    - s390x
    dockerfile_literal: |
      FROM src
      RUN dnf install -y yq jq skopeo git && dnf clean all
    from: src
    to: kueue-operator-src
  - dockerfile_literal: |
      FROM src
      COPY oc /usr/bin/oc
      RUN ln -s /usr/bin/oc /usr/bin/kubectl
      RUN dnf install -y jq skopeo git podman && dnf clean all
    from: src
    inputs:
      cli:
        paths:
        - destination_dir: .
          source_path: /usr/bin/oc
    to: src-with-oc-and-kubectl
  - dockerfile_path: Dockerfile.ci.kueue
    to: kueue-operand
  - context_dir: .
    dockerfile_path: Dockerfile.ci.must-gather
    to: kueue-must-gather
operator:
  bundles:
  - as: kueue-bundle
    context_dir: .
    dockerfile_path: bundle.Dockerfile
    skip_building_index: true
  substitutions:
  - pullspec: registry.redhat.io/kueue/kueue-rhel9-operator:latest
    with: pipeline:kueue-operator
  - pullspec: registry.redhat.io/kueue/kueue-rhel9:latest
    with: pipeline:kueue-operand
  - pullspec: registry.redhat.io/kueue/kueue-must-gather-rhel9:latest
    with: pipeline:kueue-must-gather
releases:
  arm64-4-20-latest:
    candidate:
      architecture: arm64
      product: ocp
      stream: nightly
      version: "4.20"
  latest:
    release:
      architecture: multi
      channel: stable
      version: "4.20"
  s390x-latest:
    candidate:
      architecture: s390x
      product: ocp
      stream: nightly
      version: "4.20"
resources:
  '*':
    requests:
      cpu: "4"
      memory: 4Gi
tests:
- as: test
  commands: make test
  container:
    from: src
- as: test-generate
  commands: make generate manifests regen-crd
  container:
    from: src
- as: lint
  commands: |
    export GOCACHE=/tmp/
    export GOLANGCI_LINT_CACHE=/tmp/.cache
    export GOPROXY=https://proxy.golang.org
    make lint
  container:
    clone: true
    from: kueue-operator-src
- as: test-e2e-4-18-s390x
  cron: '@daily'
  reporter_config:
    channel: '#forum-node-jira'
    job_states_to_report:
    - failure
    - error
    report_template: ':failed: Job *{{.Spec.Job}}* ended with *{{.Status.State}}*. <{{.Status.URL}}|View logs>'
  steps:
    env:
      BUNDLE_COMPONENT: kueue-bundle-1-3
      OPERAND_COMPONENT: kueue-operand-1-3
      OPERATOR_COMPONENT: kueue-operator-1-3
    post:
    - chain: kueue-operator-post
    test:
    - chain: kueue-operator-test-e2e
    workflow: openshift-e2e-ibmz-eco-kueue-operator-e2e
