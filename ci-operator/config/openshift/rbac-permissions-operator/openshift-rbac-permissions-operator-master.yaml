build_root:
  from_repository: true
images:
  items:
  - dockerfile_path: build/Dockerfile
    to: unused
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: e2e-binary-build-success
  always_run: true
  commands: |
    make e2e-binary-build
  container:
    from: src
- as: coverage
  always_run: true
  commands: |
    export CODECOV_TOKEN=$(cat /tmp/secret/CODECOV_TOKEN)
    make coverage
  container:
    from: src
  secret:
    mount_path: /tmp/secret
    name: rbac-permissions-operator-codecov-token
- as: publish-coverage
  commands: |
    export CODECOV_TOKEN=$(cat /tmp/secret/CODECOV_TOKEN)
    make coverage
  container:
    from: src
  postsubmit: true
  secret:
    mount_path: /tmp/secret
    name: rbac-permissions-operator-codecov-token
- as: lint
  always_run: true
  commands: make lint
  container:
    from: src
- as: test
  always_run: true
  commands: make test
  container:
    from: src
- as: validate
  always_run: true
  commands: make validate
  container:
    from: src
zz_generated_metadata:
  branch: master
  org: openshift
  repo: rbac-permissions-operator
