base_images:
  cli:
    name: "4.22"
    namespace: ocp
    tag: cli
  operator-sdk:
    name: cli-operator-sdk
    namespace: ocp
    tag: v1.39.2
binary_build_commands: make build
build_root:
  image_stream_tag:
    name: builder
    namespace: ocp
    tag: rhel-8-golang-1.23-openshift-4.19
canonical_go_repository: github.com/grafana/tempo-operator
images:
  items:
  - context_dir: .
    dockerfile_path: Dockerfile
    to: tempo-operator
  - context_dir: .
    dockerfile_path: tests/Dockerfile
    to: obs-tests-runner
operator:
  bundles:
  - as: tempo-bundle
    context_dir: ./bundle/openshift
    dockerfile_path: bundle.Dockerfile
  substitutions:
  - pullspec: ghcr.io/grafana/tempo-operator/tempo-operator:.*
    with: pipeline:tempo-operator
releases:
  latest:
    candidate:
      product: ocp
      stream: nightly
      version: "4.22"
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: tempo-upstream-tests
  capabilities:
  - intranet
  steps:
    cluster_profile: equinix-ocp-metal-qe
    env:
      AGENT_SKILL: TEMPO
      AUX_HOST: openshift-qe-metal-ci.arm.eng.rdu2.redhat.com
      OPERATORS: |
        [
            {"name": "opentelemetry-product", "source": "redhat-operators", "channel": "stable", "install_namespace": "openshift-opentelemetry-operator", "target_namespaces": "", "operator_group": "openshift-opentelemetry-operator"},
            {"name": "servicemeshoperator", "source": "redhat-operators", "channel": "stable", "install_namespace": "openshift-operators", "target_namespaces": ""},
            {"name": "kiali-ossm", "source": "redhat-operators", "channel": "stable", "install_namespace": "openshift-operators", "target_namespaces": ""},
            {"name": "cluster-observability-operator", "source": "redhat-operators", "channel": "stable", "install_namespace": "openshift-cluster-observability-operator", "target_namespaces": "", "operator_group":"coo-og"},
            {"name": "lightspeed-operator", "source": "redhat-operators", "channel": "stable", "install_namespace": "openshift-lightspeed", "target_namespaces": "openshift-lightspeed", "operator_group": "openshift-lightspeed"},
            {"name": "serverless-operator", "source": "redhat-operators", "channel": "stable", "install_namespace": "openshift-serverless", "target_namespaces": "", "operator_group": "openshift-serverless"}
        ]
      RESERVE_BOOTSTRAP: "false"
      SKIP_TESTS: tests/e2e-openshift-object-stores/*
      architecture: amd64
      masters: "3"
      workers: "2"
    post:
    - ref: openshift-observability-qe-agent
    - chain: baremetal-lab-post
    test:
    - as: install
      cli: latest
      commands: |
        oc create namespace openshift-tempo-operator
        cd /tmp && operator-sdk run bundle --timeout=10m --security-context-config restricted -n openshift-tempo-operator "$OO_BUNDLE"
        oc wait --for condition=Available -n openshift-tempo-operator deployment tempo-operator-controller
      dependencies:
      - env: OO_BUNDLE
        name: tempo-bundle
      from: operator-sdk
      resources:
        requests:
          cpu: 1000m
          memory: 400Mi
    - ref: install-operators
    - ref: distributed-tracing-tests-tempo-upstream
    workflow: baremetal-lab-ipi
zz_generated_metadata:
  branch: main
  org: openshift
  repo: grafana-tempo-operator
  variant: upstream-ocp-4.22-amd64
