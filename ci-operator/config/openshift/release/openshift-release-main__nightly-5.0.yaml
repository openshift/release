      TEST_ARGS: --max-parallel-tests 10 --timeout 30m
      TEST_SKIPS: \[FeatureGate:PodLevelResources\]\|\[FeatureGate:InPlacePodVerticalScaling\]\|
        \[Feature:Builds\]\|\[OCPFeatureGate:GatewayAPIController\]\[Feature:Router\]\|\[apigroup:build.openshift.io\]
      TEST_TYPE: upgrade-conformance
    workflow: openshift-upgrade-aws-single-node
  timeout: 5h0m0s
