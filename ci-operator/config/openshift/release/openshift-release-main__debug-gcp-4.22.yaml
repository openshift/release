base_images:
  cli:
    name: "4.22"
    namespace: ocp
    tag: cli
build_root:
  image_stream_tag:
    name: release
    namespace: openshift
    tag: golang-1.23
releases:
  latest:
    candidate:
      architecture: amd64
      product: ocp
      stream: nightly
      version: "4.22"
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: gcp-ipi-debug
  optional: true
  run_if_changed: ^NEVER_MATCH_AUTO_RUN$
  steps:
    cluster_profile: gcp-qe
    pre:
    - ref: openshift-extended-test-read-debug-config
    test:
    - ref: openshift-extended-test-keep-alive
    workflow: cucushift-installer-rehearse-gcp-ipi
zz_generated_metadata:
  branch: main
  org: openshift
  repo: release
  variant: debug-gcp-4.22
