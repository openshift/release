base_images:
  upi-installer:
    name: "5.0"
    namespace: ocp
    tag: upi-installer
  vsphere-ci-python:
    name: vsphere-python
    namespace: ci
    tag: latest
releases:
  initial:
    candidate:
      product: ocp
      stream: ci
      version: "4.22"
  latest:
    candidate:
      product: ocp
      stream: ci
      version: "5.0"
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: e2e-aws-ovn-upgrade
  cron: '@yearly'
  steps:
    cluster_profile: openshift-org-aws
    env:
      FAIL_ON_CORE_DUMP: "true"
      TEST_TYPE: upgrade-conformance
    observers:
      enable:
      - observers-resource-watch
    workflow: openshift-upgrade-aws-ovn
zz_generated_metadata:
  branch: main
  org: openshift
  repo: release
  variant: dev-preview-5
