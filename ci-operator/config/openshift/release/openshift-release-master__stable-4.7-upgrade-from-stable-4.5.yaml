releases:
  initial:
    release:
      channel: stable
      version: "4.5"
  intermediate:
    release:
      channel: stable
      version: "4.6"
  latest:
    release:
      channel: stable
      version: "4.7"
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: e2e-aws-upgrade-paused
  interval: 72h
  steps:
    cluster_profile: aws
    env:
      TEST_UPGRADE_OPTIONS: ""
    workflow: openshift-upgrade-aws-pausedworkers
zz_generated_metadata:
  branch: master
  org: openshift
  repo: release
  variant: stable-4.7-upgrade-from-stable-4.5
