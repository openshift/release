releases:
  latest:
    candidate:
      architecture: multi
      product: ocp
      stream: nightly
      version: "4.22"
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: periodic-ci-openshift-hypershift-hosted
  cron: '@daily'
  steps:
    cluster_profile: openshift-org-aws
    env:
      HYPERSHIFT_SKIP_VERSION_VALIDATION: "true"
    workflow: hypershift-hostedcluster-workflow
- as: hypershift-conformance-aws-ccm-nlb-sg
  cron: '@daily'
  steps:
    cluster_profile: hypershift-aws
    env:
      PUBLIC_ONLY: "true"
      TEST_SKIPS: loadbalancer NLB should be reachable with target-node-labels\|loadbalancer
        NLB internal should be reachable with hairpinning traffic
    workflow: hypershift-aws-conformance
zz_generated_metadata:
  branch: main
  org: openshift
  repo: release
  variant: hypershift-4.22
