base_images:
  ansible:
    name: "5.0"
    namespace: ocp
    tag: ansible
  assisted-installer:
    name: assisted
    namespace: ocp-kni
    tag: assisted-installer
  assisted-installer-agent:
    name: assisted
    namespace: ocp-kni
    tag: assisted-installer-agent
  assisted-installer-controller:
    name: assisted
    namespace: ocp-kni
    tag: assisted-installer-controller
  assisted-service:
    name: assisted
    namespace: ocp-kni
    tag: assisted-service
  assisted-test-infra:
    name: assisted-test
    namespace: ocp-kni
    tag: assisted-test-infra
  base:
    name: "5.0"
    namespace: ocp
    tag: base
  dev-scripts:
    name: test
    namespace: ocp-kni
    tag: dev-scripts
  libvirt-installer:
    name: "5.0"
    namespace: ocp
    tag: libvirt-installer
  upi-installer:
    name: "5.0"
    namespace: ocp
    tag: upi-installer
  vsphere-ci-python:
    name: vsphere-python
    namespace: ci
    tag: latest
releases:
  initial:
    candidate:
      product: ocp
      stream: nightly
      version: "4.22"
  latest:
    candidate:
      product: ocp
      stream: nightly
      version: "5.0"
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: e2e-metal-ipi-ovn-upgrade
  capabilities:
  - intranet
  cron: 0 12 1 1 *
  steps:
    cluster_profile: equinix-ocp-metal
    env:
      TEST_TYPE: upgrade-conformance
    observers:
      enable:
      - observers-resource-watch
    workflow: baremetalds-e2e-upgrade-ovn-ipv4
- as: e2e-metal-ovn-two-node-arbiter-upgrade
  capabilities:
  - intranet
  cron: '@weekly'
  steps:
    cluster_profile: equinix-edge-enablement
    env:
      TEST_TYPE: upgrade-conformance
    workflow: baremetalds-two-node-arbiter-upgrade
- as: e2e-metal-ovn-two-node-arbiter-upgrade-workers
  capabilities:
  - intranet
  cron: '@weekly'
  steps:
    cluster_profile: equinix-edge-enablement
    env:
      TEST_TYPE: upgrade-conformance
    workflow: baremetalds-two-node-arbiter-upgrade-workers
  timeout: 5h0m0s
- as: e2e-metal-ovn-two-node-arbiter-upgrade-day-2-workers
  capabilities:
  - intranet
  cron: '@weekly'
  steps:
    cluster_profile: equinix-edge-enablement
    env:
      TEST_TYPE: upgrade-conformance
    workflow: baremetalds-two-node-arbiter-upgrade-day-2-workers
  timeout: 5h0m0s
- as: e2e-metal-ovn-two-node-fencing-techpreview-upgrade-os-rhel10
  capabilities:
  - intranet
  cron: '@weekly'
  steps:
    cluster_profile: equinix-edge-enablement
    env:
      DEVSCRIPTS_CONFIG: |
        IP_STACK=v4
        NUM_MASTERS=2
        MASTER_DISK=100
        MASTER_MEMORY=32768
        NUM_WORKERS=0
        BMC_DRIVER=redfish
        FEATURE_SET="TechPreviewNoUpgrade"
      MCO_CONF_DAY2_OS_IMAGE_STREAM_DEFAULT: rhel-10
      TEST_SUITE: ""
      TEST_TYPE: upgrade
    test:
    - chain: baremetalds-ipi-test
    - ref: mco-conf-day2-os-image-stream-default
    workflow: baremetalds-two-node-fencing-upgrade
- as: e2e-metal-ipi-ovn-upgrade-runc
  capabilities:
  - intranet
  cron: '@weekly'
  steps:
    cluster_profile: equinix-ocp-metal
    env:
      TEST_TYPE: upgrade-conformance
    observers:
      enable:
      - observers-resource-watch
    workflow: baremetalds-e2e-upgrade-ovn-ipv6-runc
- as: e2e-metal-ipi-upgrade-ovn-ipv6
  capabilities:
  - intranet
  cron: 0 12 1 1 *
  steps:
    cluster_profile: equinix-ocp-metal
    env:
      TEST_TYPE: upgrade-conformance
    observers:
      enable:
      - observers-resource-watch
    workflow: baremetalds-e2e-upgrade-ovn-ipv6
- as: e2e-aws-upgrade-ovn-single-node
  interval: 168h
  steps:
    cluster_profile: openshift-org-aws
    env:
      TEST_TYPE: upgrade-conformance
    observers:
      enable:
      - observers-resource-watch
    workflow: openshift-upgrade-aws-single-node
- as: e2e-aws-upgrade-ovn-single-node-techpreview-os-rhel10
  interval: 24h
  steps:
    cluster_profile: openshift-org-aws
    env:
      FEATURE_SET: TechPreviewNoUpgrade
      MCO_CONF_DAY2_OS_IMAGE_STREAM_DEFAULT: rhel-10
      TEST_ARGS: --disable-monitor=legacy-cvo-invariants,legacy-test-framework-invariants,legacy-test-framework-invariants-pathological
      TEST_TYPE: upgrade
      TEST_UPGRADE_SUITE: none
    observers:
      enable:
      - observers-resource-watch
    test:
    - ref: single-node-e2e-test
    - ref: mco-conf-day2-os-image-stream-default
    workflow: openshift-upgrade-aws-single-node
- as: e2e-metal-ovn-single-node-rt-upgrade
  interval: 168h
  steps:
    cluster_profile: openshift-org-aws
    env:
      SINGLE_NODE_AWS_INSTANCE_TYPE: c7i.metal-24xl
      TEST_TYPE: upgrade-conformance
    observers:
      enable:
      - observers-resource-watch
    workflow: openshift-upgrade-aws-single-node-realtime
- as: e2e-vsphere-upgrade
  cron: 49 2 * * 4
  steps:
    cluster_profile: vsphere-elastic
    workflow: openshift-upgrade-vsphere
- as: e2e-vsphere-zones-upgrade
  cron: 26 8 * * 3
  steps:
    cluster_profile: vsphere-elastic
    workflow: openshift-upgrade-vsphere-zones
- as: e2e-metal-ipi-ovn-upgrade-network-flow-matrix
  capabilities:
  - intranet
  cron: 0 19 * * 0,2,4,6
  steps:
    cluster_profile: equinix-ocp-metal
    env:
      SUITE: Nftables
      TEST_TYPE: upgrade-conformance
    observers:
      enable:
      - observers-resource-watch
    test:
    - ref: network-flow-matrix-tests
    - chain: baremetalds-ipi-test
    workflow: baremetalds-e2e-upgrade-ovn-ipv4
- as: e2e-aws-upgrade-ovn-single-node-network-flow-matrix
  cron: 0 19 * * 0,2,4,6
  steps:
    cluster_profile: openshift-org-aws
    env:
      SUITE: Nftables
      TEST_TYPE: upgrade-conformance
    observers:
      enable:
      - observers-resource-watch
    test:
    - ref: network-flow-matrix-tests
    - ref: single-node-e2e-test
    workflow: openshift-upgrade-aws-single-node
- as: e2e-platform-external-aws-upgrade
  cron: '@monthly'
  reporter_config:
    channel: '#forum-ocp-splat-alerts-aws'
    job_states_to_report:
    - failure
    - error
    report_template: |
      :red_jenkins_circle: :external-link::aws: Periodical job *{{.Spec.Job}}* ended with *{{.Status.State}}*. (<{{.Status.URL}}|View logs>) (<https://prow.ci.openshift.org/job-history/gs/test-platform-results/logs/{{.Spec.Job}}|View history>)
  steps:
    cluster_profile: openshift-org-aws
    env:
      TEST_TYPE: upgrade-conformance
    observers:
      enable:
      - observers-resource-watch
    workflow: openshift-e2e-external-aws
- as: e2e-platform-external-aws-ccm-upgrade
  cron: '@monthly'
  reporter_config:
    channel: '#forum-ocp-splat-alerts-aws'
    job_states_to_report:
    - failure
    - error
    report_template: |
      :red_jenkins_circle: :external-link::aws: Periodical job *{{.Spec.Job}}* ended with *{{.Status.State}}*. (<{{.Status.URL}}|View logs>) (<https://prow.ci.openshift.org/job-history/gs/test-platform-results/logs/{{.Spec.Job}}|View history>)
  steps:
    cluster_profile: openshift-org-aws
    env:
      PLATFORM_EXTERNAL_CCM_ENABLED: "yes"
      TEST_TYPE: upgrade-conformance
    observers:
      enable:
      - observers-resource-watch
    workflow: openshift-e2e-external-aws
zz_generated_metadata:
  branch: main
  org: openshift
  repo: release
  variant: nightly-5.0-upgrade-from-stable-4.22
