base_images:
  dev-scripts:
    name: test
    namespace: ocp-kni
    tag: dev-scripts
releases:
  initial:
    candidate:
      product: ocp
      stream: nightly
      version: "4.20"
  latest:
    candidate:
      product: ocp
      stream: nightly
      version: "5.0"
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: e2e-aws-ovn-upgrade-skip
  interval: 168h
  steps:
    cluster_profile: aws-3
    env:
      FAIL_ON_CORE_DUMP: "true"
      TEST_TYPE: upgrade-conformance
    observers:
      enable:
      - observers-resource-watch
    workflow: openshift-upgrade-aws-ovn
zz_generated_metadata:
  branch: main
  org: openshift
  repo: release
  variant: nightly-5.0-upgrade-from-stable-4.20
