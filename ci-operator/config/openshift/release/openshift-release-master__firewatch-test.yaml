base_images:
  cli:
    name: "4.18"
    namespace: ocp
    tag: cli
build_root:
  image_stream_tag:
    name: release
    namespace: openshift
    tag: golang-1.22
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: firewatch-jira-cloud-test
  cron: 0 0 31 2 *
  steps:
    env:
      FIREWATCH_CONFIG_FILE_PATH: https://raw.githubusercontent.com/CSPI-QE/cspi-utils/refs/heads/main/firewatch-base-configs/aws-ipi/lp-interop.json
      FIREWATCH_DEFAULT_JIRA_ADDITIONAL_LABELS: '["test-label", "firewatch-validation"]'
      FIREWATCH_DEFAULT_JIRA_ASSIGNEE: your-email@redhat.com
      FIREWATCH_DEFAULT_JIRA_PROJECT: LPINTEROP
      FIREWATCH_FAIL_WITH_TEST_FAILURES: "false"
    post:
    - ref: firewatch-report-issues
    test:
    - as: generate-test-failure
      commands: |
        #!/bin/bash
        set -o nounset
        set -o errexit
        set -o pipefail

        # Create a simple JUnit XML with a test failure for firewatch to report
        mkdir -p "${ARTIFACT_DIR}/junit"
        cat > "${ARTIFACT_DIR}/junit/test-results.xml" <<EOF
        <?xml version="1.0" encoding="UTF-8"?>
        <testsuite name="firewatch-validation" tests="2" failures="1" errors="0" time="1.0">
          <testcase name="test-passing" classname="firewatch.validation" time="0.5">
          </testcase>
          <testcase name="test-failing" classname="firewatch.validation" time="0.5">
            <failure message="This is a test failure for firewatch validation" type="AssertionError">
              Test failure details:
              Expected: true
              Actual: false

              This is intentionally created to test firewatch Jira Cloud authentication.
            </failure>
          </testcase>
        </testsuite>
        EOF

        echo "Test artifacts created in ${ARTIFACT_DIR}/junit/test-results.xml"
        cat "${ARTIFACT_DIR}/junit/test-results.xml"
      from: cli
      resources:
        requests:
          cpu: 100m
          memory: 200Mi
  timeout: 30m0s
zz_generated_metadata:
  branch: master
  org: openshift
  repo: release
  variant: firewatch-test
