releases:
  latest:
    candidate:
      architecture: multi
      product: ocp
      stream: nightly
      version: "4.20"
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: periodic-ci-openshift-hypershift-hosted
  cron: '@daily'
  reporter_config:
    channel: '#ops-testplatform'
    job_states_to_report:
    - failure
    - error
    report_template: |
      :warning: HyperShift daily sanity check ended with *{{.Status.State}}*.
      <{{.Status.URL}}|View logs>.
  steps:
    cluster_profile: openshift-org-aws
    env:
      HYPERSHIFT_SKIP_VERSION_VALIDATION: "true"
    workflow: hypershift-hostedcluster-workflow
zz_generated_metadata:
  branch: main
  org: openshift
  repo: release
  variant: hypershift-4.20
