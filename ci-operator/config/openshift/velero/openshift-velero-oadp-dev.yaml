build_root:
  image_stream_tag:
    name: builder
    namespace: konveyor
    tag: ubi9-v1.26
images:
  items:
  - additional_architectures:
    - arm64
    dockerfile_path: Dockerfile.ubi
    to: velero
promotion:
  to:
  - additional_images:
      velero: velero
    name: velero
    namespace: konveyor
releases:
  latest:
    release:
      channel: fast
      version: "4.11"
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
zz_generated_metadata:
  branch: oadp-dev
  org: openshift
  repo: velero
