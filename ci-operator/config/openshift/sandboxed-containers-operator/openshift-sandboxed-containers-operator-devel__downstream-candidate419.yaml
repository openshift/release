base_images:
  cli:
    name: "4.19"
    namespace: ocp
    tag: cli
  tests-private:
    name: tests-private
    namespace: ci
    tag: "4.22"
  upi-installer:
    name: "4.19"
    namespace: ocp
    tag: upi-installer
build_root:
  image_stream_tag:
    name: builder
    namespace: ocp
    tag: rhel-9-golang-1.25-openshift-4.21
images:
  items:
  - dockerfile_literal: |
      FROM registry.access.redhat.com/ubi9/ubi-minimal:latest
      RUN microdnf install -y git tar gzip && microdnf clean all
      RUN git clone --depth 1 --branch main \
          https://github.com/confidential-devhub/charts /charts && \
          rm -rf /charts/.git
    to: trustee-charts
  - dockerfile_literal: |
      FROM this-is-ignored
      USER root
      RUN dnf install -y tar gzip jq skopeo git && dnf clean all
      RUN curl -sL https://get.helm.sh/helm-v3.14.0-linux-amd64.tar.gz | tar xz && \
          mv linux-amd64/helm /usr/local/bin/helm && \
          rm -rf linux-amd64 && \
          chmod +x /usr/local/bin/helm && \
          helm version
      USER 1000
    from: cli
    to: tools-with-helm
prowgen:
  disable_sparse_checkout: true
releases:
  latest:
    release:
      architecture: amd64
      channel: fast
      version: "4.19"
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: azure-ipi-kata
  capabilities:
  - intranet
  cron: 0 0 31 2 1
  reporter_config:
    channel: '#kata-ocp-ci-reports'
    job_states_to_report:
    - success
    - failure
    - error
    report_template: '{{if eq .Status.State "success"}}SUCCESS{{else}}ERROR{{end}}
      {{trimPrefix "periodic-ci-openshift-sandboxed-containers-operator-" .Spec.Job}}
      <{{.Status.URL}}|View logs>'
  restrict_network_access: false
  steps:
    cluster_profile: azure-qe
    env:
      BASE_DOMAIN: qe.azure.devcluster.openshift.com
      CATALOG_SOURCE_IMAGE: quay.io/redhat-user-workloads/ose-osc-tenant/osc-test-fbc:latest
      CATALOG_SOURCE_NAME: brew-catalog
      CUSTOM_AZURE_REGION: eastus
      ENABLE_MUST_GATHER: "true"
      INITDATA: ""
      INSTALL_KATA_RPM: "true"
      KATA_RPM_VERSION: 3.31.0-1.rhaos4.19.el9
      MUST_GATHER_IMAGE: registry.redhat.io/openshift-sandboxed-containers/osc-must-gather-rhel9:latest
      MUST_GATHER_ON_FAILURE_ONLY: "false"
      SLEEP_DURATION: 0h
      TEST_FILTERS: ~DisconnectedOnly&;~Disruptive&
      TEST_RELEASE_TYPE: Pre-GA
      TEST_SCENARIOS: sig-kata.*Kata Author
      TEST_TIMEOUT: "90"
      TRUSTEE_URL: ""
    workflow: sandboxed-containers-operator-e2e-azure
  timeout: 24h0m0s
