      KATA_RPM_VERSION: 3.25.0-3.rhaos4.19.el9
      MUST_GATHER_IMAGE: registry.redhat.io/openshift-sandboxed-containers/osc-must-gather-rhel9:latest
      MUST_GATHER_ON_FAILURE_ONLY: "false"
      SLEEP_DURATION: 8h
      TEST_FILTERS: ~DisconnectedOnly&;~Disruptive&
      TEST_RELEASE_TYPE: Pre-GA
      TEST_SCENARIOS: sig-kata.*C00316
      TEST_TIMEOUT: "120"
      TRUSTEE_URL: http://kbs-service-trustee-operator-system.apps.tpb260317-trustee.azure.sandboxedcontainers.com
