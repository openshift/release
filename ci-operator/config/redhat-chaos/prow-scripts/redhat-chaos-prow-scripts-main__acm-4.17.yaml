base_images:
  cerberus.prow:
    name: cerberus
    namespace: chaos
    tag: cerberus-prow
  clc-ui-e2e:
    name: "2.9"
    namespace: acm-qe
    tag: clc-ui-e2e
  cli:
    name: "4.21"
    namespace: ocp
    tag: cli
  fetch-managed-clusters:
    name: autotest
    namespace: acm-qe
    tag: fetch-managed-clusters
  ocp-qe-perfscale-ci:
    name: ocp-qe-perfscale-ci
    namespace: ci
    tag: latest
build_root:
  from_repository: true
images:
  items:
  - dockerfile_path: cerberus/Dockerfile_prow
    from: cerberus.prow
    to: cerberus-acm-prow-421
releases:
  latest:
    candidate:
      product: ocp
      stream: nightly
      version: "4.21"
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: krkn-hub-acm
  cron: 0 6 * * *
  reporter_config:
    channel: '#chaos-ci-results'
    job_states_to_report:
    - success
    - failure
    - error
    report_template: '{{if eq .Status.State "success"}} :white_check_mark: Job *{{.Spec.Job}}*
      ended with *{{.Status.State}}*. <{{.Status.URL}}|View logs> :white_check_mark:
      {{else}} :warning:  Job *{{.Spec.Job}}* ended with *{{.Status.State}}*. <{{.Status.URL}}|View
      logs> :warning: {{end}}'
  steps:
    cluster_profile: aws-chaos
    env:
      BASE_DOMAIN: aws.rhperfscale.org
      COMPUTE_NODE_TYPE: m6i.xlarge
      FIREWATCH_DEFAULT_JIRA_PROJECT: ""
      OPERATORS: |
        [
          {"name": "advanced-cluster-management", "source": "redhat-operators", "channel": "!default", "install_namespace": "ocm", "target_namespaces": "ocm", "operator_group": "acm-operator-group"}
        ]
      SPOT_INSTANCES: "true"
      USER_TAGS: |
        TicketId 421
    test:
    - chain: acm-install
    - chain: redhat-chaos-krkn-operator
    workflow: acm-ipi-aws
zz_generated_metadata:
  branch: main
  org: redhat-chaos
  repo: prow-scripts
  variant: acm-4.17
