base_images:
  cerberus.prow:
    name: cerberus
    namespace: chaos
    tag: cerberus-prow
  cli:
    name: "4.16"
    namespace: ocp
    tag: cli
  krkn.prow:
    name: krkn
    namespace: chaos
    tag: latest
  ocp-qe-perfscale-ci:
    name: ocp-qe-perfscale-ci
    namespace: ci
    tag: latest
build_root:
  from_repository: true
images:
  items:
  - dockerfile_path: Dockerfile
    from: krkn.prow
    to: prow-scripts-416
  - dockerfile_path: cerberus/Dockerfile_prow
    from: cerberus.prow
    to: cerberus-main-prow-416
  - dockerfile_literal: |-
      FROM ocp-qe-perfscale-ci
      RUN ls
      RUN cp oc /bin
    from: ocp-qe-perfscale-ci
    to: perfscale-observer
releases:
  initial:
    integration:
      name: "4.16"
      namespace: ocp
  latest:
    candidate:
      product: ocp
      stream: nightly
      version: "4.16"
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- always_run: false
  as: krkn-hub-tests-416
  reporter_config:
    channel: '#chaos-ci-results'
    job_states_to_report:
    - success
    - failure
    - error
    report_template: '{{if eq .Status.State "success"}} :white_check_mark: Job *{{.Spec.Job}}*
      ended with *{{.Status.State}}*. <{{.Status.URL}}|View logs> :white_check_mark:
      {{else}} :warning:  Job *{{.Spec.Job}}* ended with *{{.Status.State}}*. <{{.Status.URL}}|View
      logs> :warning: {{end}}'
  steps:
    cluster_profile: aws-chaos
    env:
      BASE_DOMAIN: aws.rhperfscale.org
      CDV2_ITERATION_MULTIPLIER: "11"
      GC: "false"
      PROFILE_TYPE: reporting
      SPOT_INSTANCES: "true"
      TELEMETRY_GROUP: prow-ocp-4.16
      USER_TAGS: |
        TicketId 419
    observers:
      enable:
      - redhat-chaos-cerberus
    test:
    - chain: redhat-chaos-krkn-hub-tests
    workflow: redhat-chaos-installer-aws
- always_run: false
  as: krkn-hub-node-tests
  reporter_config:
    channel: '#chaos-ci-results'
    job_states_to_report:
