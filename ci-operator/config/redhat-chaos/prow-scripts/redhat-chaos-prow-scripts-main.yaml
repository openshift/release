base_images:
  prow-scripts:
    name: prow-scripts
    namespace: chaos
    tag: latest
releases:
  latest:
    candidate:
      product: ocp
      stream: nightly
      version: "4.12"
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: force-propagation-prow-scripts
  commands: |
    echo "dummy command"
  container:
    from: prow-scripts
  reporter_config:
    channel: '#chaos-ci-results'
    job_states_to_report:
    - success
    - failure
    - error
    report_template: '{{if eq .Status.State "success"}} :white_check_mark: Job *{{.Spec.Job}}*
      ended with *{{.Status.State}}*. <{{.Status.URL}}|View logs> :white_check_mark:
      {{else}} :warning:  Job *{{.Spec.Job}}* ended with *{{.Status.State}}*. <{{.Status.URL}}|View
      logs> :warning: {{end}}'
zz_generated_metadata:
  branch: main
  org: redhat-chaos
  repo: prow-scripts
