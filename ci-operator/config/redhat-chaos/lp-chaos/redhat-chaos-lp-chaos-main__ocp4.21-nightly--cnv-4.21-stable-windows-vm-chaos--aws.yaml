base_images:
  cli:
    name: "4.21"
    namespace: ocp
    tag: cli
build_root:
  image_stream_tag:
    name: release
    namespace: openshift
    tag: rhel-9-release-golang-1.24-openshift-4.21
releases:
  latest:
    candidate:
      product: ocp
      stream: nightly
      version: "4.21"
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- always_run: false
  as: windows-vm-chaos
  cron: 0 22 * * 0
  steps:
    cluster_profile: aws-lp-chaos
    env:
      BASE_DOMAIN: chaos.lp.devcluster.openshift.com
      CHAOS_TEAM_NAME: lp-chaos
      CNV_VERSION: "4.21"
      COMPUTE_NODE_TYPE: m5.metal
      OPERATORS: '[{"name": "odf-operator", "install_namespace": "openshift-storage",
        "channel": "stable-4.21", "target_namespaces": "!install", "operator_group":
        "openshift-storage-operator-group"}]'
      TARGET_NAMESPACE: benchmark-runner
      TELEMETRY_GROUP: ocp4.21-nightly--cnv-4.21-stable-windows-vm-chaos--aws
    test:
    - chain: redhat-lp-chaos-lp-cnv-odf-windows-vm-create
    - ref: redhat-chaos-kubevirt-outage
    workflow: redhat-lp-chaos-ocp-installer-aws-cnv
  timeout: 6h0m0s
zz_generated_metadata:
  branch: main
  org: redhat-chaos
  repo: lp-chaos
  variant: ocp4.21-nightly--cnv-4.21-stable-windows-vm-chaos--aws
