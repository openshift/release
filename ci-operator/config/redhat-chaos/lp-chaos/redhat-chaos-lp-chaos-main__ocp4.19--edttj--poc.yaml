build_root:
  image_stream_tag:
    name: release
    namespace: openshift
    tag: golang-1.23
releases:
  latest:
    candidate:
      product: ocp
      stream: nightly
      version: "4.19"
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: step-1
  steps:
    cluster_profile: metal-redhat-gs
    env:
      TIMEOUT: 8 hours
    test:
    - as: step-1-1
      commands: |
        set +eu
        shopt -s expand_aliases
        set -x
        printenv
        pwd
        edo=me
        typeset -p edo
        echo \$\$:$$$$:$CI:${CI}:"\$\$":"$$":"$CI":"${CI}":'\$\$':'$$':'$CI':'${CI}'
        ps faux
        ls -laF
        ls -laF "${SHARED_DIR}"
        ls -laF "${CLUSTER_PROFILE_DIR}"
        alias oc='oc --kubeconfig="${CLUSTER_PROFILE_DIR}/kubeconfig"'
        oc get Nodes,ClusterVersion
        true
      from: src
      resources:
        limits:
          memory: 4Gi
        requests:
          cpu: 100m
          memory: 200Mi
    - ref: wait
zz_generated_metadata:
  branch: main
  org: redhat-chaos
  repo: lp-chaos
  variant: ocp4.19--edttj--poc
