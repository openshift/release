base_images:
  cli:
    name: "4.21"
    namespace: ocp
    tag: cli
build_root:
  image_stream_tag:
    name: release
    namespace: openshift
    tag: rhel-9-release-golang-1.24-openshift-4.21
images:
  items:
  - context_dir: .
    dockerfile_path: image/container/ocp-test/Dockerfile.cli-plus-tools
    from: cli
    to: cli-plus-tools
promotion:
  to:
  - name: lp-chaos-images
    namespace: ci
releases:
  latest:
    candidate:
      product: ocp
      stream: nightly
      version: "4.21"
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: lp-chaos--cnv--node-outage
  cron: 0 8 * * 4
  steps:
    cluster_profile: aws-lp-chaos
    env:
      BASE_DOMAIN: chaos.lp.devcluster.openshift.com
      CNV_VERSION: "4.21"
      COMPUTE_NODE_TYPE: m5.metal
      LPC_LP_CNV__VM__REPLICA_COUNT: "1"
      LPC_LP_CNV__VM__WAIT_TIMEOUT: 30m
      TELEMETRY_GROUP: ocp4.21-nightly--cnv-4.21-stable--aws
    test:
    - chain: redhat-lp-chaos-lp-cnv-node-outage
    workflow: redhat-lp-chaos-ocp-installer-aws-cnv
  timeout: 6h0m0s
zz_generated_metadata:
  branch: main
  org: redhat-chaos
  repo: lp-chaos
  variant: ocp4.21-nightly--cnv-4.21-stable-cnvcases--aws
