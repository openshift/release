  as: e2e-aws-ocp4-high-node-rhcos10
  steps:
    cluster_profile: aws-stackrox
    dependencies:
      OPENSHIFT_INSTALL_RELEASE_IMAGE_OVERRIDE: release:nightly-latest
    env:
      BASE_DOMAIN: perfscale.rox.systems
      FEATURE_SET: TechPreviewNoUpgrade
      FIPS_ENABLED: "true"
      OSSTREAM: rhel-10
    pre:
    - chain: ipi-aws-pre-fips
    test:
    - as: wait-for-rhcos10-rollout
      cli: latest
      commands: |
        set -e
        echo "Waiting for master and worker MCPs to complete rhel-10 rollout..."
        oc wait machineconfigpool/master machineconfigpool/worker --for=condition=Updated=True --timeout=60m
        echo "Master and worker MCP rollout complete."
      from: cli
      resources:
        requests:
          cpu: 100m
