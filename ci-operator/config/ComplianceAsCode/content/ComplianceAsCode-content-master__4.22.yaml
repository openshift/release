base_images:
  cli:
    name: "4.22"
    namespace: ocp
    tag: cli
  dev-scripts:
    name: test
    namespace: ocp-kni
    tag: dev-scripts
  installer:
    name: "4.22"
    namespace: ocp
    tag: installer
  upi-installer:
    name: "4.22"
    namespace: ocp
    tag: upi-installer
build_root:
  image_stream_tag:
    name: release
    namespace: openshift
    tag: rhel-9-release-golang-1.24-openshift-4.22
images:
  items:
  - additional_architectures:
    - arm64
    dockerfile_path: Dockerfiles/ocp4_content
    to: ocp4-content-ds
releases:
  arm64-latest:
    candidate:
      architecture: arm64
      product: ocp
      stream: nightly
      version: "4.22"
  initial:
    integration:
      name: "4.22"
      namespace: ocp
  latest:
    candidate:
      product: ocp
      stream: ci
      version: "4.22"
  nightly-latest:
    candidate:
      product: ocp
      stream: nightly
      version: "4.22"
resources:
  '*':
    requests:
      cpu: 200m
      memory: 400Mi
tests:
- always_run: false
  as: e2e-aws-ocp4-bsi
  steps:
    cluster_profile: quay-aws
    env:
      BASE_DOMAIN: quay.devcluster.openshift.com
    test:
    - as: test
      cli: latest
      commands: |
        export PROFILE=bsi
        export PRODUCT=ocp4
        export CONTENT_DIRECTORY=$PWD
        export component=ocp4-content-ds
        git clone https://github.com/ComplianceAsCode/ocp4e2e.git ocp4e2e
        pushd ocp4e2e; make install-jq
        PATH=$PATH:/tmp/bin go test -v -timeout 240m . -run=^TestProfileRemediations$ -profile="$PROFILE" -product="$PRODUCT" -content-image="$CONTENT_IMAGE" -content-directory="$CONTENT_DIRECTORY"
      dependencies:
      - env: CONTENT_IMAGE
        name: ocp4-content-ds
      from: src
      resources:
        requests:
          cpu: 100m
    workflow: ipi-aws
- always_run: false
  as: e2e-aws-ocp4-bsi-node
  steps:
    cluster_profile: quay-aws
    env:
