base_images:
  base:
    name: ubi
    namespace: ocp
    tag: "9"
  ocm-cli:
    name: ocm-cli
    namespace: ci
    tag: latest
  rosa-aws-cli:
    name: rosa-aws-cli
    namespace: ci
    tag: release
build_root:
  image_stream_tag:
    name: builder
    namespace: ocp
    tag: rhel-9-golang-1.25-openshift-4.21
images:
  items:
  - additional_architectures:
    - arm64
    dockerfile_path: Dockerfile.ci
    from: base
    to: compliance-operator
  - additional_architectures:
    - arm64
    dockerfile_path: images/testcontent/Dockerfile.ci
    to: testcontent
  - additional_architectures:
    - arm64
    dockerfile_path: images/openscap/Dockerfile
    to: testopenscap
promotion:
  to:
  - excluded_images:
    - testcontent
    - testopenscap
    name: "4.18"
    namespace: ComplianceAsCode
releases:
  arm64-latest:
    candidate:
      architecture: arm64
      product: ocp
      stream: nightly
      version: "4.18"
  initial:
    integration:
      name: "4.18"
      namespace: ocp
  latest:
    integration:
      include_built_images: true
      name: "4.18"
      namespace: ocp
  latest-4-22:
    candidate:
      product: ocp
      stream: nightly
      version: "4.22"
resources:
  '*':
    requests:
      cpu: 200m
      memory: 400Mi
tests:
- as: go-build
  commands: make
  container:
    from: src
  skip_if_only_changed: ^.*(md|adoc)$|^LICENSE$
- as: verify
  commands: make verify
  container:
    from: src
  skip_if_only_changed: ^.*(md|adoc)$|^LICENSE$
- as: unit
  commands: make test-unit
  container:
    from: src
  skip_if_only_changed: ^.*(md|adoc)$|^LICENSE$
- as: e2e-aws-parallel
  skip_if_only_changed: ^.*(md|adoc)$|^LICENSE$|^.github/workflows/*|^renovate\.json$
  steps:
    cluster_profile: aws-stackrox
    env:
      BASE_DOMAIN: perfscale.rox.systems
    test:
    - as: test
      cli: latest
      commands: make e2e-parallel
      dependencies:
      - env: IMAGE_FROM_CI
        name: compliance-operator
      - env: CONTENT_IMAGE_FROM_CI
        name: testcontent
      - env: OPENSCAP_IMAGE_FROM_CI
        name: testopenscap
      from: src
      resources:
        requests:
          cpu: 100m
    workflow: ipi-aws
- as: e2e-aws-serial
  skip_if_only_changed: ^.*(md|adoc)$|^LICENSE$|^.github/workflows/*|^renovate\.json$
  steps:
    cluster_profile: aws-stackrox
    env:
      BASE_DOMAIN: perfscale.rox.systems
    test:
    - as: test
      cli: latest
      commands: make e2e-serial
      dependencies:
      - env: IMAGE_FROM_CI
        name: compliance-operator
      - env: CONTENT_IMAGE_FROM_CI
        name: testcontent
      - env: OPENSCAP_IMAGE_FROM_CI
        name: testopenscap
      from: src
      resources:
        requests:
          cpu: 100m
    workflow: ipi-aws
- always_run: false
  as: e2e-aws-deployment
  optional: true
  steps:
    cluster_profile: aws-stackrox
    dependencies:
      OPENSHIFT_INSTALL_RELEASE_IMAGE_OVERRIDE: release:latest-4-22
    env:
      BASE_DOMAIN: perfscale.rox.systems
    test:
    - as: test
