build_root:
  image_stream_tag:
    name: release
    namespace: openshift
    tag: rhel-9-release-golang-1.23-openshift-4.19
releases:
  arm64-latest:
    candidate:
      architecture: arm64
      product: ocp
      stream: nightly
      version: "4.18"
  initial:
    integration:
      name: "4.18"
      namespace: ocp
  latest:
    candidate:
      product: ocp
      stream: ci
      version: "4.18"
resources:
  '*':
