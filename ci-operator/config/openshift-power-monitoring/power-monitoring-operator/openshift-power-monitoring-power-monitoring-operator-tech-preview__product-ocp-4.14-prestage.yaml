base_images:
  cli:
    name: "4.14"
    namespace: ocp
    tag: cli
build_root:
  image_stream_tag:
    name: release
    namespace: openshift
    tag: golang-1.21
images:
- context_dir: .
  dockerfile_path: tests/Dockerfile
  to: power-monitoring-operator-tests-runner
releases:
  latest:
    candidate:
      product: ocp
      stream: nightly
      version: "4.14"
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: power-monitoring-operator-prestage-tests
  steps:
    cluster_profile: vsphere-8-vpn
    test:
    - ref: enable-qe-catalogsource
    - ref: openshift-power-monitoring-install-power-monitoring-operator-pre-stage
    - ref: openshift-power-monitoring-tests-power-monitoring-operator
    workflow: openshift-qe-installer-vsphere-ipi-ovn
zz_generated_metadata:
  branch: tech-preview
  org: openshift-power-monitoring
  repo: power-monitoring-operator
  variant: product-ocp-4.14-prestage
