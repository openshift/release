base_images:
  opendatahub-tests:
    name: opendatahub-tests
    namespace: ci
    tag: latest
  os:
    name: ubi
    namespace: ocp
    tag: "8"
build_root:
  project_image:
    dockerfile_literal: |
      FROM registry.access.redhat.com/ubi8/ubi
      RUN yum install -y --nodocs make git golang
      RUN ln -s /cli/oc /usr/bin/kubectl
images:
  items:
  - context_dir: tests/
    dockerfile_path: Dockerfile
    from: os
    to: trustyai-service-operator-ci-tests
releases:
  latest:
    release:
      architecture: multi
      channel: stable
      version: "4.22"
resources:
  '*':
    requests:
      cpu: 1000m
      memory: 1Gi
tests:
- always_run: false
  as: run-smoke-opendatahub-tests
  run_if_changed: ^(tests/*|config/*|controllers/*|hack/*|Dockerfile|main.go|go.mod|go.sum|api/*|.github/*)
  steps:
    cluster_profile: aws-opendatahub
    env:
      BASE_DOMAIN: openshift-ci-aws.rhaiseng.com
      HYPERSHIFT_AWS_REGION: us-west-2
      HYPERSHIFT_NODE_COUNT: "3"
      OPERATORS: |
        [
            {"name": "authorino-operator", "source": "redhat-operators", "channel": "tech-preview-v1", "install_namespace": "openshift-operators"},
            {"name": "servicemeshoperator", "source": "redhat-operators", "channel": "stable", "install_namespace": "openshift-operators"},
            {"name": "serverless-operator", "source": "redhat-operators", "channel": "stable", "install_namespace": "openshift-serverless", "operator_group": "serverless-operator"},
            {"name": "rhods-operator", "source": "redhat-operators", "channel": "stable", "install_namespace": "redhat-ods-operator", "operator_group": "rhods-ai-operator"}
        ]
      SET_AWS_ENV_VARS: "false"
    test:
    - ref: install-operators
    - ref: rhoai-deploy-dsc
    - ref: rhoai-opendatahub-tests
    workflow: hypershift-hostedcluster-workflow
zz_generated_metadata:
  branch: main
  org: trustyai-explainability
  repo: trustyai-service-operator
