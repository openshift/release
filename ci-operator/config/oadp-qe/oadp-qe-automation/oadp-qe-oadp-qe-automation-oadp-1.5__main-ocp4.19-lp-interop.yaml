images:
- context_dir: .
  dockerfile_path: dockerfiles/testing/interop/Dockerfile
  to: oadp-runner
operator:
  bundles:
  - dockerfile_path: build/Dockerfile.bundle
  substitutions:
  - pullspec: quay.io/konveyor/oadp-operator:latest
    with: oadp-operator
releases:
  latest:
    candidate:
      product: ocp
      stream: nightly
      version: "4.19"
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
zz_generated_metadata:
  branch: oadp-1.5
  org: oadp-qe
  repo: oadp-qe-automation
  variant: main-ocp4.19-lp-interop
