base_images:
  cli:
    name: "4.22"
    namespace: ocp
    tag: cli
  fetch-managed-clusters:
    name: autotest
    namespace: acm-qe
    tag: fetch-managed-clusters
  installer:
    name: "4.22"
    namespace: ocp
    tag: installer
build_root:
  image_stream_tag:
    name: release
    namespace: openshift
    tag: rhel-9-release-golang-1.25-openshift-4.22
images:
  items:
  - dockerfile_literal: |
      FROM this-is-ignored
      RUN <<run-EOF
      set -exo pipefail; shopt -s inherit_errexit
      dnf install -y git python39
      dnf clean all
      run-EOF
    from: cli
    optional: true
    to: cli-with-git
releases:
  initial:
    release:
      channel: stable
      version: "4.22"
  latest:
    release:
      channel: stable
      version: "4.22"
resources:
  '*':
    requests:
      cpu: 200m
      memory: 400Mi
tests:
- as: mtv-ocp-hybrid-cold
  cron: 0 23 31 2 *
  steps:
    cluster_profile: aws-cspi-qe
    dependencies:
      OPENSHIFT_INSTALL_RELEASE_IMAGE_OVERRIDE: release:initial
    env:
      ACM_VSPHERE_CLUSTER_INITIAL_VERSION: "4.22"
      ACM_VSPHERE_CLUSTER_NAME_PREFIX: acm-vs
      ACM_VSPHERE_CP_REPLICAS: "3"
      ACM_VSPHERE_INSTALL_TIMEOUT_MINUTES: "150"
      ACM_VSPHERE_NETWORK_TYPE: OVNKubernetes
      ACM_VSPHERE_SPOKE_INDEX: "1"
      ACM_VSPHERE_WORKER_REPLICAS: "3"
      BASE_DOMAIN: cspilp.interop.ccitredhat.com
      COMPUTE_NODE_TYPE: m6a.2xlarge
      CONTROL_PLANE_INSTANCE_TYPE: m6a.2xlarge
      FIREWATCH_CONFIG: |
        {
          "failure_rules":
            [
              {"step": "cucushift-*",                             "failure_type": "all", "classification": "Cluster Health Check",           "group": {"name": "cluster", "priority": 2}, "jira_additional_labels": ["!default"]},
              {"step": "acm-interop-p2p-cluster-install-vsphere", "failure_type": "all", "classification": "vSphere OCP Spoke Installation", "group": {"name": "cluster", "priority": 2}, "jira_additional_labels": ["!default"]},
              {"step": "acm-interop-p2p-cluster-uninstall",       "failure_type": "all", "classification": "Spoke cluster Un-Installation",  "group": {"name": "cluster", "priority": 2}, "jira_additional_labels": ["!default"]},
              {"step": "acm-fetch-managed-clusters",              "failure_type": "all", "classification": "ACM cluster failure",            "group": {"name": "cluster", "priority": 3}, "jira_additional_labels": ["!default"]},
              {"step": "acm-mch",                                 "failure_type": "all", "classification": "ACM MCH install",                "group": {"name": "cluster", "priority": 2}, "jira_additional_labels": ["!default"]}
            ]
        }
      FIREWATCH_CONFIG_FILE_PATH: https://raw.githubusercontent.com/CSPI-QE/cspi-utils/main/firewatch-base-configs/aws-ipi/lp-interop.json
      FIREWATCH_DEFAULT_JIRA_ADDITIONAL_LABELS: '["4.22-p2p","ipi-aws-p2p","acm-mtv-hybrid","mpiit_product2product","mpiit_virt"]'
      FIREWATCH_DEFAULT_JIRA_ASSIGNEE: vshakya@redhat.com
      FIREWATCH_DEFAULT_JIRA_COMPONENT: '["QA","mpiit_p2p"]'
      FIREWATCH_DEFAULT_JIRA_EPIC: INTEROP-8652
      FIREWATCH_DEFAULT_JIRA_PROJECT: LPINTEROP
      FIREWATCH_FAIL_WITH_TEST_FAILURES: "true"
      OPERATORS: |
        [
          {"name": "advanced-cluster-management", "source": "redhat-operators", "channel": "release-2.16", "install_namespace": "ocm", "target_namespaces": "ocm", "operator_group": "acm-operator-group"}
        ]
      USER_TAGS: |
        scenario acm-vsphere-spoke-poc
    leases:
    - count: 1
      env: LEASED_RESOURCE
      resource_type: aws-cspi-qe-quota-slice
    - count: 1
      env: VSPHERE_LEASED_RESOURCE
      resource_type: vsphere-connected-2-quota-slice
    post:
    - ref: acm-fetch-operator-versions
    - ref: acm-must-gather
    - ref: acm-inspector
    - ref: gather-aws-console
    - ref: acm-interop-p2p-cluster-uninstall
    - chain: ipi-deprovision
    - ref: firewatch-report-issues
    pre:
    - ref: ipi-conf
    - ref: ipi-conf-telemetry
    - ref: ipi-conf-aws-custom-az
    - ref: ipi-conf-aws
    - ref: ipi-install-monitoringpvc
    - chain: ipi-install
    test:
    - chain: cucushift-installer-check-cluster-health
    - ref: install-operators
    - ref: acm-mch
    - ref: acm-interop-p2p-cluster-install-vsphere
    - ref: acm-fetch-managed-clusters
  timeout: 6h0m0s
zz_generated_metadata:
  branch: master
  org: RedHatQE
  repo: interop-testing
  variant: acm-mtv-ocp-hybrid-migration
