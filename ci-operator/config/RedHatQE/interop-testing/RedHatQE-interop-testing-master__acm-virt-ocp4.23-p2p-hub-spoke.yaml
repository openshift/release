base_images:
  cli:
    name: "4.23"
    namespace: ocp
    tag: cli
  fetch-managed-clusters:
    name: autotest
    namespace: acm-qe
    tag: fetch-managed-clusters
  installer:
    name: "4.23"
    namespace: ocp
    tag: installer
build_root:
  image_stream_tag:
    name: release
    namespace: openshift
    tag: rhel-9-release-golang-1.25-openshift-4.23
images:
  items:
  - dockerfile_literal: |
      FROM this-is-ignored
      RUN <<run-EOF
      set -exo pipefail; shopt -s inherit_errexit
      dnf install -y git python39
      dnf clean all
      run-EOF
    from: cli
    optional: true
    to: cli-with-git
releases:
  initial:
    candidate:
      product: ocp
      stream: nightly
      version: "4.23"
  latest:
    candidate:
      product: ocp
      stream: nightly
      version: "4.23"
resources:
  '*':
    requests:
      cpu: 200m
      memory: 400Mi
tests:
- as: cclm-hub-spoke-aws-p2p-lp-interop
  cron: 0 1 28 2 *
  steps:
    cluster_profile: aws-cspi-qe
    dependencies:
      OPENSHIFT_INSTALL_RELEASE_IMAGE_OVERRIDE: release:initial
    env:
      ACM_SPOKE_CLUSTER_COUNT: "1"
      ACM_SPOKE_CLUSTER_INITIAL_VERSION: "4.23"
      ACM_SPOKE_CLUSTER_NAME_PREFIX: acm-spoke
      ACM_SPOKE_CP_TYPE: m6a.2xlarge
      ACM_SPOKE_WORKER_TYPE: c5n.metal
      BASE_DOMAIN: cspilp.interop.ccitredhat.com
      CNV_ENABLE_CCLM: "true"
      COMPUTE_NODE_TYPE: c5n.metal
      CONTROL_PLANE_INSTANCE_TYPE: m6a.2xlarge
      FIREWATCH_CONFIG: |
        {
          "failure_rules":
            [
              {"step": "cucushift-*", "failure_type": "all", "classification": "Cluster Health Check", "group": {"name": "cluster", "priority": 2}, "jira_additional_labels": ["!default"]},
              {"step": "acm-interop-p2p-cluster-install", "failure_type": "all", "classification": "Spoke cluster Installation", "group": {"name": "cluster", "priority": 2}, "jira_additional_labels": ["!default"]},
              {"step": "acm-interop-p2p-cluster-uninstall", "failure_type": "all", "classification": "Spoke cluster Un-Installation", "group": {"name": "cluster", "priority": 2}, "jira_additional_labels": ["!default"]},
              {"step": "p2p-install-odf-hub", "failure_type": "all", "classification": "ODF hub install failure", "group": {"name": "cluster", "priority": 2}, "jira_additional_labels": ["!default"]},
              {"step": "p2p-install-cnv-hub", "failure_type": "all", "classification": "CNV hub install (ACM local-cluster policy) failure", "group": {"name": "cluster", "priority": 2}, "jira_additional_labels": ["!default"]},
              {"step": "p2p-acm-cnv-install-policy", "failure_type": "all", "classification": "CNV spoke installation policy deploy failure", "group": {"name": "cluster", "priority": 2}, "jira_additional_labels": ["!default"]},
              {"step": "acm-fetch-managed-clusters", "failure_type": "all", "classification": "ACM cluster failure", "jira_project": "!default", "group": {"name": "opp-tests", "priority": 4}, "jira_epic": "!default", "jira_assignee": "!default", "jira_additional_labels": ["!default"]},
              {"step": "p2p-install-odf-spokes", "failure_type": "all", "classification": "ODF spoke cluster install failure", "group": {"name": "cluster", "priority": 2}, "jira_additional_labels": ["!default"]},
              {"step": "acm-interop-p2p-submariner-addon", "failure_type": "all", "classification": "Submariner ACM addon install failure", "group": {"name": "cluster", "priority": 2}, "jira_additional_labels": ["!default"]},
              {"step": "acm-interop-p2p-submariner-verify", "failure_type": "all", "classification": "Submariner connectivity verification failure", "group": {"name": "interop-p2p-tests", "priority": 4}, "jira_additional_labels": ["!default", "interop-tests"]},
              {"step": "p2p-mtv-additional-config", "failure_type": "all", "classification": "MTV ForkliftController / CCLM configuration failure", "group": {"name": "cluster", "priority": 2}, "jira_additional_labels": ["!default"]},
              {"step": "p2p-mtv-register-providers", "failure_type": "all", "classification": "MTV provider registration failure", "group": {"name": "cluster", "priority": 2}, "jira_additional_labels": ["!default"]},
              {"step": "p2p-create-hub-spoke-test-vms", "failure_type": "all", "classification": "Hub-spoke CCLM test VM creation failure", "group": {"name": "interop-p2p-tests", "priority": 5}, "jira_additional_labels": ["!default", "interop-tests"]},
              {"step": "p2p-mtv-create-hub-spoke-maps", "failure_type": "all", "classification": "Hub-spoke MTV migration maps failure", "group": {"name": "cluster", "priority": 2}, "jira_additional_labels": ["!default"]},
              {"step": "p2p-mtv-execute-hub-spoke-migration", "failure_type": "all", "classification": "Hub-spoke MTV CCLM live migration failure", "group": {"name": "interop-p2p-tests", "priority": 5}, "jira_additional_labels": ["!default", "interop-tests"]},
              {"step": "p2p-create-spoke-imageset", "failure_type": "all", "classification": "Spoke ClusterImageSet creation failure (nightly)", "group": {"name": "cluster", "priority": 2}, "jira_additional_labels": ["!default"]},
              {"step": "acm-mch", "failure_type": "all", "classification": "ACM MCH install", "group": {"name": "cluster", "priority": 2}, "jira_additional_labels": ["!default"]}
            ]
        }
      FIREWATCH_CONFIG_FILE_PATH: https://raw.githubusercontent.com/CSPI-QE/cspi-utils/main/firewatch-base-configs/aws-ipi/lp-interop.json
      FIREWATCH_DEFAULT_JIRA_ADDITIONAL_LABELS: '["4.23-p2p","ipi-aws-p2p","mpiit-acm-virt","mpiit_product2product","mpiit_virt","hub-spoke-cclm"]'
      FIREWATCH_DEFAULT_JIRA_ASSIGNEE: vshakya@redhat.com
      FIREWATCH_DEFAULT_JIRA_COMPONENT: '["QA","mpiit_p2p"]'
      FIREWATCH_DEFAULT_JIRA_EPIC: INTEROP-8652
      FIREWATCH_DEFAULT_JIRA_PROJECT: LPINTEROP
      FIREWATCH_FAIL_WITH_TEST_FAILURES: "true"
      MTV_HS_HUB_PROVIDER: host
      MTV_HS_HUB_TO_SPOKE_NETWORK_MAP: hub-to-spoke-net-map
      MTV_HS_HUB_TO_SPOKE_PLAN: hub-to-spoke-plan
      MTV_HS_HUB_TO_SPOKE_STORAGE_MAP: hub-to-spoke-storage-map
      MTV_HS_HUB_VM_NAMESPACE: hub-spoke-test
      MTV_HS_HUB_VM_PREFIX: hub-vm
      MTV_HS_SPOKE_PROVIDER: spoke-1
      MTV_HS_SPOKE_TO_HUB_NETWORK_MAP: spoke-to-hub-net-map
      MTV_HS_SPOKE_TO_HUB_PLAN: spoke-to-hub-plan
      MTV_HS_SPOKE_TO_HUB_STORAGE_MAP: spoke-to-hub-storage-map
      MTV_HS_SPOKE_VM_NAMESPACE: hub-spoke-test
      MTV_HS_SPOKE_VM_PREFIX: spoke-vm
      MTV_PROVIDER_NAMES: spoke-1
      MTV_SPOKE_CLUSTER_COUNT: "1"
      ODF_OPERATOR_CHANNEL: stable-4.22
      OPERATORS: |
        [
          {"name": "advanced-cluster-management", "source": "redhat-operators", "channel": "release-2.17", "install_namespace": "ocm", "target_namespaces": "ocm", "operator_group": "acm-operator-group"},
          {"name": "mtv-operator", "source": "redhat-operators", "channel": "!default", "install_namespace": "openshift-mtv", "target_namespaces": "openshift-mtv", "operator_group": "openshift-mtv-operatorgroup"}
        ]
      P2P_HS_HUB_STORAGE_CLASS: ocs-storagecluster-ceph-rbd-virtualization
      P2P_HS_HUB_VM_PREFIX: hub-vm
      P2P_HS_SPOKE_INDEX: "1"
      P2P_HS_SPOKE_STORAGE_CLASS: ocs-storagecluster-ceph-rbd-virtualization
      P2P_HS_SPOKE_VM_PREFIX: spoke-vm
      P2P_HS_VM_COUNT: "2"
      P2P_HS_VM_NAMESPACE: hub-spoke-test
      SUBMARINER_VERIFY_HUB_SPOKE: "true"
      USER_TAGS: |
        scenario acm-cnv-p2p-hub-spoke
    leases:
    - count: 1
      env: LEASED_RESOURCE
      resource_type: aws-cspi-qe-quota-slice
    - count: 1
      env: MANAGED_CLUSTER_LEASED_RESOURCE
      resource_type: aws-cspi-qe-quota-slice
    workflow: p2p-cclm-hub-spoke
  timeout: 9h0m0s
