base_images:
  cli:
    name: "4.23"
    namespace: ocp
    tag: cli
  ocs-ci-tests:
    name: ocs-ci-container
    namespace: ci
    tag: stable
  openshift-virtualization-tests:
    name: openshift-virtualization-tests
    namespace: ci
    tag: latest
build_root:
  image_stream_tag:
    name: release
    namespace: openshift
    tag: rhel-9-release-golang-1.21-openshift-4.18
images:
  items:
  - build_args:
    - name: OCP_VERSION
      value: "4.22"
    - name: OC_CLI_VERSION
      value: latest
    context_dir: cnv-ci
    dockerfile_path: Dockerfile
    to: cnv-ci
releases:
  latest:
    candidate:
      product: ocp
      stream: nightly
      version: "4.23"
resources:
  '*':
    requests:
      cpu: 200m
      memory: 400Mi
tests:
- as: cr-cnv-odf-aws
  cron: 0 23 31 2 *
  steps:
    cluster_profile: aws-cspi-qe
    env:
      BASE_DOMAIN: cspilp.interop.ccitredhat.com
      CNV_SUBSCRIPTION_CHANNEL: candidate
      CNV_WAIT_FOR_LIVE_DEBUG: "7200"
      COMPUTE_NODE_TYPE: c5n.metal
      FIREWATCH_CONFIG: |
        {
          "failure_rules":
            [
              {"step": "*deploy-odf"                     , "failure_type": "all" , "classification": "ODF Deployment"                     , "group": { "name" : "lp-tests", "priority" : 1}, "jira_additional_labels": ["!default"], "jira_project": "DFBUGS", "jira_assignee": "ebenahar@redhat.com" },
              {"step": "*ocs-tests"                      , "failure_type": "all" , "classification": "ODF Storage Tests Failure"          , "group": { "name" : "lp-tests", "priority" : 1}, "jira_additional_labels": ["!default", "interop-tests","test-initialization"], "jira_project": "DFBUGS", "jira_assignee": "ebenahar@redhat.com"},
              {"step": "*cnv-tests-e2e-deploy"           , "failure_type": "test_failure" , "classification": "CNV Tests Failure"         , "group": { "name" : "lp-tests", "priority" : 2}, "jira_additional_labels": ["!default", "interop-tests"], "jira_assignee": "!default"           , "jira_component": ["CNV QE DevOps"]},
              {"step": "*cnv-tests-e2e-deploy"           , "failure_type": "pod_failure"  , "classification": "CNV Tests Failure"         , "group": { "name" : "lp-tests", "priority" : 2}, "jira_additional_labels": ["!default"]                 , "jira_assignee": "!default"           , "jira_component": ["CNV QE DevOps"]},
              {"step": "*openshift-virtualization-tests" , "failure_type": "test_failure" , "classification": "CNV Tests Failure"         , "group": { "name" : "lp-tests", "priority" : 3}, "jira_additional_labels": ["!default", "interop-tests"], "jira_assignee": "kbidarka@redhat.com", "jira_component": ["CNV Virt-Cluster"]},
              {"step": "*openshift-virtualization-tests" , "failure_type": "pod_failure" , "classification": "CNV Tests Failure"          , "group": { "name" : "lp-tests", "priority" : 3}, "jira_additional_labels": ["!default"]                 , "jira_assignee": "!default"           , "jira_component": ["CNV Virt-Cluster"]}
            ]
        }
      FIREWATCH_DEFAULT_JIRA_ADDITIONAL_LABELS: '["4.22-lp", "self-managed-lp", "cnv-lp"]'
      FIREWATCH_DEFAULT_JIRA_ASSIGNEE: dkeler@redhat.com
      FIREWATCH_DEFAULT_JIRA_PROJECT: CNV
      MAP_TESTS: "true"
      OCP_VERSION: "4.23"
      ODF_OPERATOR_CHANNEL: stable-4.20
      ODF_VERSION_MAJOR_MINOR: "4.21"
      REPORTPORTAL_CMP: CNV-lp-interop
      USER_TAGS: |
        scenario cnv
    test:
    - chain: cucushift-installer-check-cluster-health
    - ref: interop-tests-deploy-odf
    - ref: interop-tests-cnv-tests-e2e-deploy
    - ref: interop-tests-openshift-virtualization-tests
    workflow: firewatch-ipi-aws-cr
- as: aws-fips
  cron: 0 23 31 2 *
  steps:
    cluster_profile: aws-cspi-qe
    env:
      BASE_DOMAIN: cspilp.interop.ccitredhat.com
      CNV_SUBSCRIPTION_CHANNEL: candidate
      CNV_WAIT_FOR_LIVE_DEBUG: "7200"
      COMPUTE_NODE_TYPE: c5n.metal
      FIPS_ENABLED: "true"
      FIREWATCH_CONFIG: |
        {
          "failure_rules":
            [
              {"step": "*deploy-odf"                     , "failure_type": "all" , "classification": "ODF Deployment"                     , "group": { "name" : "lp-tests", "priority" : 1}, "jira_additional_labels": ["!default"], "jira_project": "DFBUGS", "jira_assignee": "ebenahar@redhat.com" },
              {"step": "*ocs-tests"                      , "failure_type": "all" , "classification": "ODF Storage Tests Failure"          , "group": { "name" : "lp-tests", "priority" : 1}, "jira_additional_labels": ["!default", "interop-tests","test-initialization"], "jira_project": "DFBUGS", "jira_assignee": "ebenahar@redhat.com"},
              {"step": "*cnv-tests-e2e-deploy"           , "failure_type": "test_failure" , "classification": "CNV Tests Failure"         , "group": { "name" : "lp-tests", "priority" : 2}, "jira_additional_labels": ["!default", "interop-tests"], "jira_project": "CNV", "jira_assignee":"!default"            , "jira_component": ["CNV QE DevOps"]},
              {"step": "*cnv-tests-e2e-deploy"           , "failure_type": "pod_failure"  , "classification": "CNV Tests Failure"         , "group": { "name" : "lp-tests", "priority" : 2}, "jira_additional_labels": ["!default"]                 , "jira_project": "CNV", "jira_assignee":"!default"            , "jira_component": ["CNV QE DevOps"]},
              {"step": "*openshift-virtualization-tests" , "failure_type": "test_failure" , "classification": "CNV Tests Failure"         , "group": { "name" : "lp-tests", "priority" : 3}, "jira_additional_labels": ["!default", "interop-tests"], "jira_project": "CNV", "jira_assignee": "kbidarka@redhat.com", "jira_component": ["CNV Virt-Cluster"]},
              {"step": "*openshift-virtualization-tests" , "failure_type": "pod_failure" , "classification": "CNV Tests Failure"          , "group": { "name" : "lp-tests", "priority" : 3}, "jira_additional_labels": ["!default"]                 , "jira_project": "CNV", "jira_assignee": "!default"           , "jira_component": ["CNV Virt-Cluster"]}
            ]
        }
      FIREWATCH_CONFIG_FILE_PATH: https://raw.githubusercontent.com/CSPI-QE/cspi-utils/main/firewatch-base-configs/aws-ipi/lp-interop.json
      FIREWATCH_DEFAULT_JIRA_ADDITIONAL_LABELS: '["4.22-lp", "self-managed-lp","fips",
        "cnv-lp"]'
      FIREWATCH_DEFAULT_JIRA_ASSIGNEE: dkeler@redhat.com
      FIREWATCH_DEFAULT_JIRA_PROJECT: LPINTEROP
      FIREWATCH_FAIL_WITH_TEST_FAILURES: "true"
      MAP_TESTS: "true"
      OCP_VERSION: "4.23"
      ODF_OPERATOR_CHANNEL: stable-4.20
      ODF_VERSION_MAJOR_MINOR: "4.21"
      REPORT_TO_DR: "true"
      REPORTPORTAL_CMP: CNV-lp-interop
      USER_TAGS: |
        scenario cnv
    test:
    - chain: cucushift-installer-check-cluster-health
    - ref: interop-tests-deploy-odf
    - ref: interop-tests-cnv-tests-e2e-deploy
    - ref: interop-tests-openshift-virtualization-tests
    workflow: firewatch-ipi-aws-cr
zz_generated_metadata:
  branch: master
  org: RedHatQE
  repo: interop-testing
  variant: cnv-odf-ocp-4.23-lp-interop
