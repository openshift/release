base_images:
  ubi:
    name: ubi-minimal
    namespace: ocp
    tag: "9"
build_root:
  image_stream_tag:
    name: builder
    namespace: ocp
    tag: rhel-9-golang-1.24-openshift-4.20
images:
- dockerfile_path: Dockerfile
  from: ubi
  to: network-observability-cli
promotion:
  to:
  - namespace: netobserv
    tag: ci
releases:
  latest:
    candidate:
      product: ocp
      stream: nightly
      version: "4.20"
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: integration-tests
  steps:
    cluster_profile: aws
    test:
    - as: run-integration-tests
      cli: latest
      commands: |
        short_sha=$(git rev-parse --short HEAD)
        USER=netobserv VERSION=$short_sha make commands
        GINGKO_VERSION=$(go list -mod=readonly -m -f '{{ .Version }}'  github.com/onsi/ginkgo/v2)
        export tmphome="/tmp/home"
        mkdir -p $tmpHome
        export GOBIN=$PATH:$tmpHome
        export PATH=$PATH:$PWD/build:$tmpHome
        # download the ginkgo cli binary
        go install github.com/onsi/ginkgo/v2/ginkgo@$GINKGO_VERSION
        ginkgo version
        ginkgo e2e/integration-tests --junit-report="${ARTIFACT_DIR}/junit/report.xml"
      from: src
      resources:
        requests:
          cpu: 100m
          memory: 200Mi
    workflow: cucushift-installer-rehearse-aws-ipi
zz_generated_metadata:
  branch: main
  org: netobserv
  repo: network-observability-cli
