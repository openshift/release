base_images:
  ubi:
    name: ubi-minimal
    namespace: ocp
    tag: "9"
build_root:
  from_repository: true
images:
- dockerfile_path: Dockerfile
  from: ubi
  to: network-observability-cli
promotion:
  to:
  - namespace: netobserv
    tag: ci
releases:
  latest:
    candidate:
      product: ocp
      stream: nightly
      version: "4.19"
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: integration-tests
  optional: true
  steps:
    cluster_profile: aws
    test:
    - as: run-integration-tests
      cli: latest
      command: |
        short_sha=$(git rev-parse --short HEAD)
        USER=netobserv VERSION=$short_sha make commands
        #TODO: download ginkgo
        ginkgo e2e/integration-tests
      from: src
      resources:
        requests:
          cpu: 100m
          memory: 200Mi
    workflow: cucushift-installer-rehearse-aws-ipi
zz_generated_metadata:
  branch: main
  org: netobserv
  repo: network-observability-cli
