base_images:
  ocp-4:
    name: automation-flavors
    namespace: stackrox
    tag: openshift-4-stable
build_root:
  image_stream_tag:
    name: apollo-ci
    namespace: stackrox
    tag: stackrox-ui-test-0.5.2
releases:
  latest:
    release:
      channel: stable
      version: 4.20.8
resources:
  '*':
    requests:
      cpu: 2000m
      memory: 4000Mi
test_binary_build_commands: .openshift-ci/dispatch.sh test-binary-build-commands
tests:
- always_run: false
  as: 24nodes-scale-test
  optional: true
  steps:
    allow_skip_on_success: true
    cluster_profile: aws-stackrox
    env:
      ACS_IMAGE_TAG: 4.11.x-688-g405c8cf703
      BASE_DOMAIN: perfscale.rox.systems
      COMPUTE_NODE_REPLICAS: "5"
      CONNECTION_LOAD_REPLICAS: "2"
      ENDPOINT_LOAD_REPLICAS: "2"
      JOB_ITERATIONS: "2"
      PROCESS_LOAD_REPLICAS: "2"
      ROX_SCANNER_V4_ENABLED: "true"
      SCANNER_V4_MATCHER_READINESS: vulnerability
      SCANNER_V4_MATCHER_READINESS_MAX_WAIT: "3600"
      TEST_SUITE: ocp-perf-scale-tests
      USER_TAGS: |
        TicketId 382
        RoxProject PerfScale
      ZONES_COUNT: "1"
    post:
    - chain: gather-core-dump
    - chain: ipi-aws-post
    - ref: stackrox-stackrox-end
    pre:
    - ref: stackrox-stackrox-begin
    - ref: stackrox-stackrox-e2e-test
    - chain: ipi-conf-aws
    - chain: ipi-install
    - chain: create-infra-move-ingress-monitoring-registry
    - ref: stackrox-install-helm
    test:
    - chain: stackrox-perfscale-berserker-test
  timeout: 14h0m0s
zz_generated_metadata:
  branch: master
  org: stackrox
  repo: stackrox
  variant: perf-scale
