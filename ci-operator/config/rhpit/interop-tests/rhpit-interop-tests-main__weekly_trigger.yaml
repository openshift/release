        }
      FIREWATCH_DEFAULT_JIRA_PROJECT: LPINTEROP
      JT__POST_TASK_EXEC_FLGS: "0"
      JT__TRIG_COND_EXEC_FLGS: "1"
      JT__TRIG_JOB_LIST: self-managed-lp-interop--fips--422
    post:
    - ref: firewatch-report-issues
    pre:
    - ref: trigger-jobs-trig-time-eval
    test:
    - ref: trigger-jobs
