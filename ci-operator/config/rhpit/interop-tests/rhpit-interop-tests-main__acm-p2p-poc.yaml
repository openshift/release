base_images:
  cli:
    name: "4.20"
    namespace: ocp
    tag: cli
  ocp-addons-operators-cli:
    name: ocp-addons-operators-cli
    namespace: ci
    tag: latest
build_root:
  image_stream_tag:
    name: release
    namespace: openshift
    tag: golang-1.19
releases:
  latest:
    release:
      channel: candidate
      version: "4.20"
resources:
  '*':
    limits:
      memory: 8Gi
    requests:
      cpu: "1"
      memory: 4Gi
tests:
- as: acm-cnv-ipi-aws-420-rc
  cron: 0 23 31 2 *
  steps:
    cluster_profile: aws-cspi-qe
    env:
      FIREWATCH_CONFIG: |
        {
          "failure_rules":
              [
                {"step": "openshift-pipelines-tests", "failure_type": "all", "classification": "Product to Product Test Failure", "jira_project": "SRVKP", "group": {"name": "p2p-tests", "priority": 2}, "jira_additional_labels": ["!default"], "jira_epic": "!default"}
              ],
          "success_rules": [{"jira_epic": "INTEROP-7595", "jira_additional_labels": ["!default"]}]
        }
      FIREWATCH_CONFIG_FILE_PATH: https://raw.githubusercontent.com/CSPI-QE/cspi-utils/main/firewatch-base-configs/rosa/p2p-msi.json
      FIREWATCH_DEFAULT_JIRA_ADDITIONAL_LABELS: '["4.17-p2p","ipi-aws-p2p","pipelines-serverless-p2p"]'
      FIREWATCH_DEFAULT_JIRA_COMPONENT: '["QA"]'
      FIREWATCH_DEFAULT_JIRA_EPIC: INTEROP-7590
      FIREWATCH_DEFAULT_JIRA_PROJECT: INTEROP
      FIREWATCH_FAIL_WITH_TEST_FAILURES: "true"
      OPERATOR1_CONFIG: name=advanced-cluster-management;namespace=ocm;channel=release-2.13
    test:
    - ref: operator-install
    - ref: p2p-additional-labels
    workflow: firewatch-ipi-aws
zz_generated_metadata:
  branch: main
  org: rhpit
  repo: interop-tests
  variant: acm-p2p-poc
