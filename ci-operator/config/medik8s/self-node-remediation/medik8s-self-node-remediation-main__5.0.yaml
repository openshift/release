base_images:
  base:
    name: ubi-minimal
    namespace: ocp
    tag: "9"
  tls-scanner-tool:
    name: "5.0"
    namespace: ocp
    tag: tls-scanner-tool
binary_build_commands: make build
build_root:
  from_repository: true
images:
  items:
  - dockerfile_path: Dockerfile
    from: base
    to: self-node-remediation-operator
operator:
  bundles:
  - as: self-node-remediation-bundle
    dockerfile_path: bundle.Dockerfile
    skip_building_index: true
  substitutions:
  - pullspec: quay.io/medik8s/self-node-remediation-operator:.*
    with: pipeline:self-node-remediation-operator
releases:
  latest:
    candidate:
      product: ocp
      stream: nightly
      version: "5.0"
resources:
  '*':
    requests:
      cpu: 500m
      memory: 1000Mi
test_binary_build_commands: make test
tests:
- as: test
  commands: make test
  container:
    from: src
  skip_if_only_changed: ^docs/|\.md$|^(?:.*/)?(?:\.gitignore|OWNERS|PROJECT|LICENSE)$
- as: openshift-e2e
  skip_if_only_changed: ^docs/|\.md$|^(?:.*/)?(?:\.gitignore|OWNERS|PROJECT|LICENSE)$
  steps:
    cluster_profile: medik8s-aws
    env:
      BASE_DOMAIN: ocp-ci.medik8s-ci.devcluster.openshift.com
      OPERATOR_NAMESPACE: self-node-remediation
      OPERATOR_RELEASED_VERSION: 0.11.0
    test:
    - as: install-last-operator-version
      cli: latest
      commands: |
        make create-ns
        # workaround for OLM pod not running with restricted PSA
        oc label --overwrite ns "$OPERATOR_NAMESPACE" security.openshift.io/scc.podSecurityLabelSync=false
        oc label --overwrite ns "$OPERATOR_NAMESPACE" pod-security.kubernetes.io/enforce=privileged

        # OPERATOR_NAMESPACE variable is used by bundle-run and bundle-run-update
        BUNDLE_IMG=quay.io/medik8s/self-node-remediation-operator-bundle:v"$OPERATOR_RELEASED_VERSION" make bundle-run
      env:
      - name: OPERATOR_NAMESPACE
      - name: OPERATOR_RELEASED_VERSION
      from: src
      resources:
        requests:
          cpu: 100m
          memory: 200Mi
    - as: upgrade-operator-latest
      cli: latest
      commands: BUNDLE_IMG="$OO_BUNDLE" make bundle-run-update
      dependencies:
      - env: OO_BUNDLE
        name: self-node-remediation-bundle
      env:
      - name: OPERATOR_NAMESPACE
      from: src
      resources:
        requests:
          cpu: 100m
          memory: 200Mi
    - as: test-command
      cli: latest
      commands: |
        export SKIP_LOG_VERIFICATION="true" INSTALL_NAMESPACE="$OPERATOR_NAMESPACE"
        make e2e-test
      env:
      - name: OPERATOR_NAMESPACE
      from: src
      resources:
        requests:
          cpu: 100m
          memory: 200Mi
    workflow: ipi-aws
- always_run: false
  as: tls-pqc-readiness
  optional: true
  steps:
    cluster_profile: medik8s-aws
    env:
      BASE_DOMAIN: ocp-ci.medik8s-ci.devcluster.openshift.com
      OPERATOR_NAMESPACE: self-node-remediation
      PQC_CHECK: "true"
      SCAN_NAMESPACE: self-node-remediation
      SCANNER_CPU: "2"
    test:
    - as: install-operator
      cli: latest
      commands: |
        make create-ns
        oc label --overwrite ns "$OPERATOR_NAMESPACE" security.openshift.io/scc.podSecurityLabelSync=false
        oc label --overwrite ns "$OPERATOR_NAMESPACE" pod-security.kubernetes.io/enforce=privileged
        BUNDLE_IMG="$OO_BUNDLE" make bundle-run
      dependencies:
      - env: OO_BUNDLE
        name: self-node-remediation-bundle
      env:
      - name: OPERATOR_NAMESPACE
      from: src
      resources:
        requests:
          cpu: 100m
          memory: 200Mi
    - ref: tls-13
    - ref: tls-scanner-run
    workflow: ipi-aws
- as: tls-pqc-readiness-periodic
  cron: 0 6 * * 1
  steps:
    cluster_profile: medik8s-aws
    env:
      BASE_DOMAIN: ocp-ci.medik8s-ci.devcluster.openshift.com
      OPERATOR_NAMESPACE: self-node-remediation
      PQC_CHECK: "true"
      SCAN_NAMESPACE: self-node-remediation
      SCANNER_CPU: "2"
    test:
    - as: install-operator
      cli: latest
      commands: |
        make create-ns
        oc label --overwrite ns "$OPERATOR_NAMESPACE" security.openshift.io/scc.podSecurityLabelSync=false
        oc label --overwrite ns "$OPERATOR_NAMESPACE" pod-security.kubernetes.io/enforce=privileged
        BUNDLE_IMG="$OO_BUNDLE" make bundle-run
      dependencies:
      - env: OO_BUNDLE
        name: self-node-remediation-bundle
      env:
      - name: OPERATOR_NAMESPACE
      from: src
      resources:
        requests:
          cpu: 100m
          memory: 200Mi
    - ref: tls-13
    - ref: tls-scanner-run
    workflow: ipi-aws
- always_run: false
  as: tls13-adherence
  optional: true
  steps:
    cluster_profile: medik8s-aws
    env:
      BASE_DOMAIN: ocp-ci.medik8s-ci.devcluster.openshift.com
      OPERATOR_NAMESPACE: self-node-remediation
      PQC_CHECK: "false"
      SCAN_NAMESPACE: self-node-remediation
      SCANNER_CPU: "2"
      TLS_13_ENABLE_TLS_ADHERENCE: "true"
      TLS_13_TLS_ADHERENCE_POLICY: StrictAllComponents
    test:
    - as: install-operator
      cli: latest
      commands: |
        make create-ns
        oc label --overwrite ns "$OPERATOR_NAMESPACE" security.openshift.io/scc.podSecurityLabelSync=false
        oc label --overwrite ns "$OPERATOR_NAMESPACE" pod-security.kubernetes.io/enforce=privileged
        BUNDLE_IMG="$OO_BUNDLE" make bundle-run
      dependencies:
      - env: OO_BUNDLE
        name: self-node-remediation-bundle
      env:
      - name: OPERATOR_NAMESPACE
      from: src
      resources:
        requests:
          cpu: 100m
          memory: 200Mi
    - ref: tls-13
    - ref: tls-scanner-run
    workflow: ipi-aws
- as: tls13-adherence-periodic
  cron: 0 6 * * 1
  steps:
    cluster_profile: medik8s-aws
    env:
      BASE_DOMAIN: ocp-ci.medik8s-ci.devcluster.openshift.com
      OPERATOR_NAMESPACE: self-node-remediation
      PQC_CHECK: "false"
      SCAN_NAMESPACE: self-node-remediation
      SCANNER_CPU: "2"
      TLS_13_ENABLE_TLS_ADHERENCE: "true"
      TLS_13_TLS_ADHERENCE_POLICY: StrictAllComponents
    test:
    - as: install-operator
      cli: latest
      commands: |
        make create-ns
        oc label --overwrite ns "$OPERATOR_NAMESPACE" security.openshift.io/scc.podSecurityLabelSync=false
        oc label --overwrite ns "$OPERATOR_NAMESPACE" pod-security.kubernetes.io/enforce=privileged
        BUNDLE_IMG="$OO_BUNDLE" make bundle-run
      dependencies:
      - env: OO_BUNDLE
        name: self-node-remediation-bundle
      env:
      - name: OPERATOR_NAMESPACE
      from: src
      resources:
        requests:
          cpu: 100m
          memory: 200Mi
    - ref: tls-13
    - ref: tls-scanner-run
    workflow: ipi-aws
zz_generated_metadata:
  branch: main
  org: medik8s
  repo: self-node-remediation
  variant: "5.0"
