base_images:
  upi-installer:
    name: "4.22"
    namespace: ocp
    tag: upi-installer
build_root:
  from_repository: true
releases:
  latest:
    candidate:
      product: ocp
      stream: nightly
      version: "4.22"
resources:
  '*':
    requests:
      cpu: 500m
      memory: 1000Mi
tests:
- as: e2e-far-weekly-aws
  capabilities:
  - intranet
  cron: 0 4 * * 0
  steps:
    cluster_profile: medik8s-aws
    env:
      BASE_DOMAIN: ocp-ci.medik8s-ci.devcluster.openshift.com
      ECO_TEST_FEATURES: far-operator
      OCP_VERSION: "422"
      OO_CHANNEL: stable
      OPERATORS: fence-agents-remediation
    test:
    - ref: medik8s-catalogsource
    - ref: medik8s-operator-subscribe
    - as: e2e-test
      cli: latest
      commands: make run-tests
      env:
      - name: ECO_TEST_FEATURES
      from: src
      resources:
        requests:
          cpu: 100m
          memory: 200Mi
    workflow: ipi-aws
zz_generated_metadata:
  branch: main
  org: medik8s
  repo: system-tests
  variant: 4.22-konflux
