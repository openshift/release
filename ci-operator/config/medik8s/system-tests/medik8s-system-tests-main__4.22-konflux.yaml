      memory: 1000Mi
tests:
- always_run: false
  as: e2e-far-aws
  capabilities:
  - intranet
  optional: true
  steps:
    cluster_profile: medik8s-aws
    env:
      BASE_DOMAIN: ocp-ci.medik8s-ci.devcluster.openshift.com
      ECO_TEST_FEATURES: far-operator
      OCP_VERSION: "422"
      OO_CHANNEL: stable
      OPERATORS: fence-agents-remediation
    test:
    - chain: medik8s-setup
    - ref: medik8s-aws-credentials
    - as: e2e-test
      cli: latest
      commands: make run-tests
      env:
      - name: ECO_TEST_FEATURES
      from: src
      resources:
        requests:
          cpu: 100m
          memory: 1Gi
    workflow: ipi-aws
