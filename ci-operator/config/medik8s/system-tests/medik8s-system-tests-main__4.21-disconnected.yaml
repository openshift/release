base_images:
  upi-installer:
    name: "4.21"
    namespace: ocp
    tag: upi-installer
build_root:
  from_repository: true
releases:
  latest:
    release:
      channel: stable
      version: "4.21"
resources:
  '*':
    requests:
      cpu: 500m
      memory: 1000Mi
tests:
- as: e2e-sbr-weekly-aws-disconnected-nfs
  capabilities:
  - intranet
  cron: 0 12 * * 3
  steps:
    cluster_profile: medik8s-aws
    env:
      BASE_DOMAIN: ocp-ci.medik8s-ci.devcluster.openshift.com
      COMPUTE_NODE_TYPE: m6i.xlarge
      ECO_TEST_FEATURES: sbr-operator
      FBC_OCP_VERSION: "422"
      MEDIK8S_PACKAGES: storage-based-remediation
      OCP_VERSION: "421"
      OO_CHANNEL: stable
      OPERATORS: storage-based-remediation
      SBR_STORAGE_CLASS: nfs-sbr
    test:
    - ref: medik8s-lib
    - ref: medik8s-disconnected-catalogsource
    - ref: medik8s-operator-subscribe
    - ref: medik8s-sbr-nfs-bastion
    - as: e2e-test
      cli: latest
      commands: |
        [[ -f "${SHARED_DIR}/proxy-conf.sh" ]] && source "${SHARED_DIR}/proxy-conf.sh"
        [[ -f "${SHARED_DIR}/sbr_watchdog_debug_image" ]] && export SBR_WATCHDOG_DEBUG_IMAGE=$(cat "${SHARED_DIR}/sbr_watchdog_debug_image")
        # Exclude tests not yet validated in disconnected environments:
        # 88878 - watchdog device/softdog check: exec fails in disconnected (SPDY can't resolve external API hostname) — fix in medik8s/system-tests#41
        # 88737 - SBR CR lifecycle: agent DaemonSet never reaches ready when NFS port is blocked — test-side fix in medik8s/system-tests#41, infra fix (NFS SG rule) in this PR
        # 88734 - SBRC lifecycle: requires connected cluster for multi-instance reconciliation
        # 88880 - storage loss watchdog: depends on 88878 watchdog probe infra
        # 89200 - write-only storage loss: depends on storage loss test infra
        # 88877 - split-brain fencing: requires multi-node storage-isolation scenario not available disconnected
        # 88735 - transient storage failure: depends on storage loss test infra
        # 88738 - node hang/kernel panic: not yet validated in disconnected
        # 89202 - metrics endpoint check: SBR controller fails to create agent DaemonSet in disconnected
        # 88876 - detectOnlyMode: SBR controller fails to create agent DaemonSet in disconnected
        export ECO_TEST_LABELS='!test_id:88878 && !test_id:88737 && !test_id:88734 && !test_id:88880 && !test_id:89200 && !test_id:88877 && !test_id:88735 && !test_id:88738 && !test_id:89202 && !test_id:88876'
        make run-tests
      env:
      - name: ECO_TEST_FEATURES
      - name: SBR_STORAGE_CLASS
      from: src
      resources:
        requests:
          cpu: 100m
          memory: 200Mi
    workflow: openshift-e2e-aws-disconnected
zz_generated_metadata:
  branch: main
  org: medik8s
  repo: system-tests
  variant: 4.21-disconnected
