base_images:
  base:
    name: ubi
    namespace: ocp
    tag: "9"
  operator-sdk:
    name: "4.17"
    namespace: origin
    tag: operator-sdk
  tls-scanner-tool:
    name: "5.0"
    namespace: ocp
    tag: tls-scanner-tool
binary_build_commands: make manager
build_root:
  from_repository: true
images:
  items:
  - dockerfile_path: Dockerfile
    from: base
    to: node-healthcheck-operator
operator:
  bundles:
  - as: my-bundle
    dockerfile_path: bundle.ci.Dockerfile
    skip_building_index: true
  substitutions:
  - pullspec: quay.io/medik8s/node-healthcheck-operator:.*
    with: pipeline:node-healthcheck-operator
releases:
  latest:
    candidate:
      architecture: amd64
      product: ocp
      stream: nightly
      version: "5.0"
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: test
  commands: make test
  container:
    from: src
  skip_if_only_changed: ^docs/|\.md$|^(?:.*/)?(?:\.gitignore|OWNERS|PROJECT|LICENSE)$
- as: openshift-e2e
  skip_if_only_changed: ^docs/|\.md$|^(?:.*/)?(?:\.gitignore|OWNERS|PROJECT|LICENSE)$
  steps:
    cluster_profile: medik8s-aws
    env:
      BASE_DOMAIN: ocp-ci.medik8s-ci.devcluster.openshift.com
      INSTALL_NAMESPACE: nhc-install
    test:
    - as: e2e-install
      cli: latest
      commands: |
        oc create namespace "$INSTALL_NAMESPACE"

        # workaround for OLM pod not running with restricted PSA
        oc label --overwrite ns "$INSTALL_NAMESPACE" security.openshift.io/scc.podSecurityLabelSync=false
        oc label --overwrite ns "$INSTALL_NAMESPACE" pod-security.kubernetes.io/enforce=privileged

        operator-sdk run bundle -n "$INSTALL_NAMESPACE" quay.io/medik8s/self-node-remediation-operator-bundle:latest
        operator-sdk run bundle -n "$INSTALL_NAMESPACE" "$OO_BUNDLE"
        oc wait --for condition=Available -n "$INSTALL_NAMESPACE" deployment node-healthcheck-controller-manager
      dependencies:
      - env: OO_BUNDLE
        name: my-bundle
      env:
      - name: INSTALL_NAMESPACE
      from: operator-sdk
      resources:
        requests:
          cpu: 100m
          memory: 200Mi
    - as: e2e-test
      cli: latest
      commands: export OPERATOR_NS="$INSTALL_NAMESPACE" && make test-e2e
      env:
      - name: INSTALL_NAMESPACE
      from: src
      resources:
        requests:
          cpu: 100m
          memory: 200Mi
    workflow: ipi-aws
- always_run: false
  as: tls-pqc-readiness
  optional: true
  steps:
    cluster_profile: medik8s-aws
    env:
      BASE_DOMAIN: ocp-ci.medik8s-ci.devcluster.openshift.com
      INSTALL_NAMESPACE: nhc-install
      PQC_CHECK: "true"
      SCAN_NAMESPACE: nhc-install
      SCANNER_CPU: "2"
    test:
    - as: install-operator
      cli: latest
      commands: |
        oc create namespace "$INSTALL_NAMESPACE"
        oc label --overwrite ns "$INSTALL_NAMESPACE" security.openshift.io/scc.podSecurityLabelSync=false
        oc label --overwrite ns "$INSTALL_NAMESPACE" pod-security.kubernetes.io/enforce=privileged
        operator-sdk run bundle -n "$INSTALL_NAMESPACE" quay.io/medik8s/self-node-remediation-operator-bundle:latest
        operator-sdk run bundle -n "$INSTALL_NAMESPACE" "$OO_BUNDLE"
        oc wait --for condition=Available -n "$INSTALL_NAMESPACE" deployment node-healthcheck-controller-manager
      dependencies:
      - env: OO_BUNDLE
        name: my-bundle
      env:
      - name: INSTALL_NAMESPACE
      from: operator-sdk
      resources:
        requests:
          cpu: 100m
          memory: 200Mi
    - ref: tls-13
    - ref: tls-scanner-run
    workflow: ipi-aws
- as: tls-pqc-readiness-periodic
  cron: 0 6 * * 1
  steps:
    cluster_profile: medik8s-aws
    env:
      BASE_DOMAIN: ocp-ci.medik8s-ci.devcluster.openshift.com
      INSTALL_NAMESPACE: nhc-install
      PQC_CHECK: "true"
      SCAN_NAMESPACE: nhc-install
      SCANNER_CPU: "2"
    test:
    - as: install-operator
      cli: latest
      commands: |
        oc create namespace "$INSTALL_NAMESPACE"
        oc label --overwrite ns "$INSTALL_NAMESPACE" security.openshift.io/scc.podSecurityLabelSync=false
        oc label --overwrite ns "$INSTALL_NAMESPACE" pod-security.kubernetes.io/enforce=privileged
        operator-sdk run bundle -n "$INSTALL_NAMESPACE" quay.io/medik8s/self-node-remediation-operator-bundle:latest
        operator-sdk run bundle -n "$INSTALL_NAMESPACE" "$OO_BUNDLE"
        oc wait --for condition=Available -n "$INSTALL_NAMESPACE" deployment node-healthcheck-controller-manager
      dependencies:
      - env: OO_BUNDLE
        name: my-bundle
      env:
      - name: INSTALL_NAMESPACE
      from: operator-sdk
      resources:
        requests:
          cpu: 100m
          memory: 200Mi
    - ref: tls-13
    - ref: tls-scanner-run
    workflow: ipi-aws
- always_run: false
  as: tls13-adherence
  optional: true
  steps:
    cluster_profile: medik8s-aws
    env:
      BASE_DOMAIN: ocp-ci.medik8s-ci.devcluster.openshift.com
      INSTALL_NAMESPACE: nhc-install
      PQC_CHECK: "false"
      SCAN_NAMESPACE: nhc-install
      SCANNER_CPU: "2"
      TLS_13_ENABLE_TLS_ADHERENCE: "true"
      TLS_13_TLS_ADHERENCE_POLICY: StrictAllComponents
    test:
    - as: install-operator
