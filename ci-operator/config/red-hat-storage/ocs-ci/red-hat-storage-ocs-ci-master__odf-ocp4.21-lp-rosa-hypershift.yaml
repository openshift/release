base_images:
  cli:
    name: "4.21"
    namespace: ocp
    tag: cli
  ocm-cli:
    name: ocm-cli
    namespace: ci
    tag: latest
  ocs-ci-tests:
    name: ocs-ci-container
    namespace: ci
    tag: stable
  rosa-aws-cli:
    name: rosa-aws-cli
    namespace: ci
    tag: latest
  upi-installer:
    name: "4.21"
    namespace: ocp
    tag: upi-installer
build_root:
  image_stream_tag:
    name: release
    namespace: openshift
    tag: rhel-9-release-golang-1.24-openshift-4.21
releases:
  latest:
    candidate:
      product: ocp
      stream: nightly
      version: "4.21"
resources:
  '*':
    requests:
      cpu: 200m
      memory: 200Mi
tests:
- as: odf-aws-rosa-hypershift
  cron: 0 23 31 2 *
  steps:
    cluster_profile: aws-sd-qe
    env:
      CHANNEL_GROUP: candidate
      COMPUTE_MACHINE_TYPE: m5.4xlarge
      FIREWATCH_CONFIG: |
        {
        "failure_rules":
        [
          {"step": "odf-prepare-cluster", "failure_type": "all", "classification": "Infrastructure Provisioning - Operators", "group": {"name": "lp-tests", "priority": 1}, "jira_additional_labels": ["!default","test-initialization"]},
          {"step": "odf-apply-storage-cluster", "failure_type": "all", "classification": "Infrastructure Provisioning - Operators", "group": {"name": "lp-tests", "priority": 2}, "jira_additional_labels": ["!default","test-initialization"]},
          {"step": "interop-tests-ocs-tests", "failure_type": "all", "classification": "Test Failure", "jira_project": "!default", "jira_assignee": "!default", "group": {"name": "lp-tests", "priority": 3},"jira_additional_labels": ["!default","interop-tests"]}
        ]
        }
      FIREWATCH_CONFIG_FILE_PATH: https://raw.githubusercontent.com/CSPI-QE/cspi-utils/main/firewatch-base-configs/rosa/lp-interop.json
      FIREWATCH_DEFAULT_JIRA_ADDITIONAL_LABELS: '["4.21-lp","rosa-hypershift-lp","odf-lp"]'
      FIREWATCH_DEFAULT_JIRA_ASSIGNEE: ebenahar@redhat.com
      FIREWATCH_DEFAULT_JIRA_PROJECT: LPINTEROP
      FIREWATCH_FAIL_WITH_TEST_FAILURES: "true"
      FIREWATCH_JIRA_SERVER: https://issues.redhat.com
      NAME_PREFIX: ocpe2e
      OCM_LOGIN_ENV: staging
      ODF_VERSION_MAJOR_MINOR: "4.21"
      OPERATORS: |
        [
            {"name": "odf-operator", "install_namespace": "openshift-storage", "channel": "stable-4.21", "target_namespaces": "!install", "operator_group": "openshift-storage-operator-group"}
        ]
      ROSACLI_BUILD: latest
      TEST_PROFILE: ocpe2e-rosa-hcp-shared-vpc-advanced
      VERSION: "4.21"
    test:
    - ref: ipi-install-rbac
    - ref: cucushift-hypershift-extended-health-check
    - ref: odf-prepare-cluster
    - ref: install-operators
    - ref: odf-apply-storage-cluster
    - ref: interop-tests-ocs-tests
    - ref: firewatch-report-issues
    workflow: rosa-lifecycle-advanced
zz_generated_metadata:
  branch: master
  org: red-hat-storage
  repo: ocs-ci
  variant: odf-ocp4.21-lp-rosa-hypershift
