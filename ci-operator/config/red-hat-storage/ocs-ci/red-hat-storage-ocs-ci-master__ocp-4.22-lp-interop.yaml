base_images:
  cli:
    name: "4.22"
    namespace: ocp
    tag: cli
  ocs-ci-tests:
    name: ocs-ci-container
    namespace: ci
    tag: stable
build_root:
  image_stream_tag:
    name: release
    namespace: openshift
    tag: rhel-9-release-golang-1.23-openshift-4.21
releases:
  latest:
    candidate:
      product: ocp
      stream: nightly
      version: "4.22"
resources:
  '*':
    requests:
      cpu: 200m
      memory: 200Mi
tests:
- as: cr-odf-aws
  cron: 0 3,15 * * *
  steps:
    cluster_profile: aws-cspi-qe
    env:
      BASE_DOMAIN: cspilp.interop.ccitredhat.com
      COMPUTE_NODE_TYPE: m5.4xlarge
      FIREWATCH_CONFIG: |
        {
        "failure_rules":
        [
          {"step": "odf-prepare-cluster", "failure_type": "all", "classification": "Infrastructure Provisioning - Operators", "group": {"name": "lp-tests", "priority": 1}, "jira_additional_labels": ["!default","test-initialization"]},
          {"step": "odf-apply-storage-cluster", "failure_type": "all", "classification": "Infrastructure Provisioning - Operators", "group": {"name": "lp-tests", "priority": 2}, "jira_additional_labels": ["!default","test-initialization"]},
          {"step": "interop-tests-ocs-tests", "failure_type": "all", "classification": "Test Failure", "jira_project": "!default", "jira_assignee": "!default", "group": {"name": "lp-tests", "priority": 3},"jira_additional_labels": ["!default","interop-tests"]}
        ]
        }
      FIREWATCH_CONFIG_FILE_PATH: https://raw.githubusercontent.com/CSPI-QE/cspi-utils/main/firewatch-base-configs/cr/lp-interop.json
      FIREWATCH_DEFAULT_JIRA_ADDITIONAL_LABELS: '["4.22-lp","self-managed-lp","odf-lp"]'
      FIREWATCH_DEFAULT_JIRA_ASSIGNEE: ebenahar@redhat.com
      FIREWATCH_DEFAULT_JIRA_PROJECT: OCSQE
      FIREWATCH_FAIL_WITH_TEST_FAILURES: "true"
      MAP_TESTS: "true"
      OCP_VERSION: "4.22"
      ODF_VERSION_MAJOR_MINOR: "4.21"
      OPERATORS: |
        [
            {"name": "odf-operator", "install_namespace": "openshift-storage", "channel": "stable-4.21", "target_namespaces": "!install", "operator_group": "openshift-storage-operator-group"}
        ]
      REPORT_TO_DR: "true"
      REPORTPORTAL_CMP: ODF-lp-interop
      USER_TAGS: |
        scenario odf
      ZONES_COUNT: "3"
    test:
    - ref: odf-prepare-cluster
    - ref: install-operators
    - ref: odf-apply-storage-cluster
    - ref: interop-tests-ocs-tests
    workflow: firewatch-ipi-aws-cr
- as: odf-aws-fips
  cron: 0 23 31 2 *
  steps:
    cluster_profile: aws-cspi-qe
    env:
      BASE_DOMAIN: cspilp.interop.ccitredhat.com
      COMPUTE_NODE_TYPE: m5.4xlarge
      FIPS_ENABLED: "true"
      FIREWATCH_CONFIG: |
        {
        "failure_rules":
        [
          {"step": "odf-prepare-cluster", "failure_type": "all", "classification": "Infrastructure Provisioning - Operators", "group": {"name": "lp-tests", "priority": 1}, "jira_additional_labels": ["!default","test-initialization"]},
          {"step": "odf-apply-storage-cluster", "failure_type": "all", "classification": "Infrastructure Provisioning - Operators", "group": {"name": "lp-tests", "priority": 2}, "jira_additional_labels": ["!default","test-initialization"]},
          {"step": "interop-tests-ocs-tests", "failure_type": "all", "classification": "Test Failure", "jira_project": "OCSQE", "jira_assignee": "!default", "group": {"name": "lp-tests", "priority": 3},"jira_additional_labels": ["!default","interop-tests"]}
        ]
        }
      FIREWATCH_CONFIG_FILE_PATH: https://raw.githubusercontent.com/CSPI-QE/cspi-utils/refs/heads/main/firewatch-base-configs/aws-ipi/lp-interop.json
      FIREWATCH_DEFAULT_JIRA_ADDITIONAL_LABELS: '["4.22-lp","self-managed-lp","fips","odf-lp"]'
      FIREWATCH_DEFAULT_JIRA_ASSIGNEE: ebenahar@redhat.com
      FIREWATCH_DEFAULT_JIRA_PROJECT: LPINTEROP
      FIREWATCH_FAIL_WITH_TEST_FAILURES: "true"
      MAP_TESTS: "true"
      OCP_VERSION: "4.22"
      ODF_VERSION_MAJOR_MINOR: "4.21"
      OPERATORS: |
        [
            {"name": "odf-operator", "install_namespace": "openshift-storage", "channel": "stable-4.21","target_namespaces": "!install", "operator_group": "openshift-storage-operator-group"}
        ]
      REPORT_TO_DR: "true"
      REPORTPORTAL_CMP: ODF-lp-interop
      USER_TAGS: |
        scenario odf
      ZONES_COUNT: "3"
    test:
    - ref: odf-prepare-cluster
    - ref: install-operators
    - ref: odf-apply-storage-cluster
    - ref: interop-tests-ocs-tests
    workflow: firewatch-ipi-aws-cr
zz_generated_metadata:
  branch: master
  org: red-hat-storage
  repo: ocs-ci
  variant: ocp-4.22-lp-interop
