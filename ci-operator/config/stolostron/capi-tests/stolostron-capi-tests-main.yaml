build_root:
  project_image:
    dockerfile_path: Dockerfile.prow
images:
  items:
  - dockerfile_literal: |
      FROM quay.io/podman/stable
      ARG KIND_VERSION=v0.31.0
      ARG KUBECTL_VERSION=v1.35.2
      ARG HELM_VERSION=v3.16.0
      ARG CLUSTERCTL_VERSION=v1.12.3
      ARG CLUSTERCTL_SHA256=9b75287b15656a62ece65c8ad7491412cebfd30c78e085a9d61396a50df17349
      ARG OC_VERSION=latest
      RUN dnf install -y go git make jq gettext libxml2 bc && dnf clean all
      RUN curl -Lo /usr/local/bin/kind "https://kind.sigs.k8s.io/dl/${KIND_VERSION}/kind-linux-amd64" && chmod +x /usr/local/bin/kind
      RUN curl -fsSL "https://mirror.openshift.com/pub/openshift-v4/clients/ocp/${OC_VERSION}/openshift-client-linux.tar.gz" -o /tmp/oc.tar.gz && \
          tar xz -C /usr/local/bin -f /tmp/oc.tar.gz oc && chmod +x /usr/local/bin/oc && rm -f /tmp/oc.tar.gz
      RUN curl -Lo /usr/local/bin/kubectl "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl" && chmod +x /usr/local/bin/kubectl
      RUN curl -fsSL "https://get.helm.sh/helm-${HELM_VERSION}-linux-amd64.tar.gz" -o /tmp/helm.tar.gz && \
          tar xz -C /tmp -f /tmp/helm.tar.gz && mv /tmp/linux-amd64/helm /usr/local/bin/helm && chmod +x /usr/local/bin/helm && rm -rf /tmp/helm.tar.gz /tmp/linux-amd64
      RUN curl -Lo /usr/local/bin/clusterctl "https://github.com/kubernetes-sigs/cluster-api/releases/download/${CLUSTERCTL_VERSION}/clusterctl-linux-amd64" && \
          echo "${CLUSTERCTL_SHA256}  /usr/local/bin/clusterctl" | sha256sum -c && chmod +x /usr/local/bin/clusterctl
      RUN GOFLAGS='' GOBIN=/usr/local/bin go install gotest.tools/gotestsum@v1.13.0
      RUN sed -i 's/utsns=.*/utsns="private"/; s/cgroups=.*/cgroups="enabled"/' /etc/containers/containers.conf
      COPY /src /go/src/github.com/stolostron
      WORKDIR /go/src/github.com/stolostron/capi-tests
      ENV KIND_EXPERIMENTAL_PROVIDER=podman
    inputs:
      src:
        paths:
        - destination_dir: src
          source_path: /go/src/github.com/stolostron/capi-tests
    to: nested-podman-kind
releases:
  latest:
    integration:
      include_built_images: true
      name: "4.19"
      namespace: ocp
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: capz-kind-e2e
  capabilities:
  - nested-podman
  steps:
    cluster_profile: openshift-org-azure
    env:
      WORKLOAD_CLUSTER_NAMESPACE: capz-test-prow
    workflow: capz-test-kind-e2e
  timeout: 4h0m0s
zz_generated_metadata:
  branch: main
  org: stolostron
  repo: capi-tests
