build_root:
  project_image:
    dockerfile_path: Dockerfile.prow
releases:
  initial:
    integration:
      name: "4.19"
      namespace: ocp
  latest:
    integration:
      include_built_images: true
      name: "4.19"
      namespace: ocp
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: capz-k3s-e2e
  steps:
    cluster_profile: openshift-org-azure
    env:
      WORKLOAD_CLUSTER_NAMESPACE: capz-test-prow
    post:
    - ref: capz-test-summary
    test:
    - ref: capz-test-k3s-e2e
    workflow: capz-test-k3s-e2e
  timeout: 4h0m0s
zz_generated_metadata:
  branch: main
  org: stolostron
  repo: capi-tests
