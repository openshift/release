build_root:
  image_stream_tag:
    name: builder
    namespace: stolostron
    tag: go1.23-linux
images:
  items:
  - dockerfile_path: Dockerfile
    to: hypershift-addon-operator
  - dockerfile_path: Dockerfile.canary
    to: hypershift-addon-operator-canary-test
promotion:
  to:
  - name: "5.0"
    namespace: stolostron
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: unit-tests
  commands: make test
  container:
    from: src
- as: sonar
  commands: |
    export HOME="/tmp"
    # SonarQube Cloud requires Java 21+ (Java 17 dropped 2026-07-20). ACM-38055
    # Temporary bootstrap until stolostron/builder images ship java-21-openjdk-headless.
    if ! java -version 2>&1 | grep -qE 'version "2[1-9]'; then
      curl -fsSL "https://api.adoptium.net/v3/binary/latest/21/ga/linux/x64/jdk/hotspot/normal/eclipse" -o /tmp/jdk21.tar.gz
      mkdir -p /tmp/jdk-21
      tar -xzf /tmp/jdk21.tar.gz -C /tmp/jdk-21 --strip-components=1
      export JAVA_HOME=/tmp/jdk-21
      export PATH="${JAVA_HOME}/bin:${PATH}"
    fi
    java -version
    export SONAR_GO_TEST_ARGS="$(go list ./... | awk '!/e2e/ {printf $0" "}')"
    export SELF="make -f /opt/build-harness/Makefile.prow"
    make -f /opt/build-harness/Makefile.prow sonar/go/prow
  container:
    from: src
  secrets:
  - mount_path: /etc/sonarcloud/
    name: acm-sonarcloud-token
- as: sonar-post-submit
  commands: |
    export HOME="/tmp"
    # SonarQube Cloud requires Java 21+ (Java 17 dropped 2026-07-20). ACM-38055
    # Temporary bootstrap until stolostron/builder images ship java-21-openjdk-headless.
    if ! java -version 2>&1 | grep -qE 'version "2[1-9]'; then
      curl -fsSL "https://api.adoptium.net/v3/binary/latest/21/ga/linux/x64/jdk/hotspot/normal/eclipse" -o /tmp/jdk21.tar.gz
      mkdir -p /tmp/jdk-21
      tar -xzf /tmp/jdk21.tar.gz -C /tmp/jdk-21 --strip-components=1
      export JAVA_HOME=/tmp/jdk-21
      export PATH="${JAVA_HOME}/bin:${PATH}"
    fi
    java -version
    export SONAR_GO_TEST_ARGS="$(go list ./... | awk '!/e2e/ {printf $0" "}')"
    export SELF="make -f /opt/build-harness/Makefile.prow"
    make -f /opt/build-harness/Makefile.prow sonar/go/prow
  container:
    from: src
  postsubmit: true
  secrets:
  - mount_path: /etc/sonarcloud/
    name: acm-sonarcloud-token
- as: pr-image-mirror
  steps:
    dependencies:
      SOURCE_IMAGE_REF: hypershift-addon-operator
    env:
      IMAGE_REPO: hypershift-addon-operator
      REGISTRY_ORG: stolostron
    workflow: ocm-ci-image-mirror
- as: pr-merge-image-mirror
  postsubmit: true
  steps:
    dependencies:
      SOURCE_IMAGE_REF: hypershift-addon-operator
    env:
      IMAGE_REPO: hypershift-addon-operator
      IMAGE_TAG: latest
      REGISTRY_ORG: stolostron
    workflow: ocm-ci-image-mirror
zz_generated_metadata:
  branch: main
  org: stolostron
  repo: hypershift-addon-operator
