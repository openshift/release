base_images:
  stolostron_builder_go1.25-linux:
    name: builder
    namespace: stolostron
    tag: go1.25-linux
build_root:
  image_stream_tag:
    name: builder
    namespace: stolostron
    tag: go1.23-linux
images:
  items:
  - dockerfile_path: Dockerfile
    inputs:
      stolostron_builder_go1.25-linux:
        as:
        - registry.ci.openshift.org/stolostron/builder:go1.25-linux
    to: hypershift-addon-operator
  - dockerfile_path: Dockerfile.canary
    to: hypershift-addon-operator-canary-test
promotion:
  to:
  - disabled: true
    name: "2.17"
    namespace: stolostron
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: unit-tests
  commands: make test
  container:
    from: src
- as: sonar
  commands: |
    export HOME="/tmp"
    # SonarQube Cloud requires Java 21+ (Java 17 dropped 2026-07-20). ACM-38055
    # Temporary bootstrap until stolostron/builder images ship java-21-openjdk-headless.
    if ! java -version 2>&1 | grep -qE 'version "2[1-9]'; then
      curl -fsSL "https://api.adoptium.net/v3/binary/latest/21/ga/linux/x64/jdk/hotspot/normal/eclipse" -o /tmp/jdk21.tar.gz
      mkdir -p /tmp/jdk-21
      tar -xzf /tmp/jdk21.tar.gz -C /tmp/jdk-21 --strip-components=1
      export JAVA_HOME=/tmp/jdk-21
      export PATH="${JAVA_HOME}/bin:${PATH}"
    fi
    java -version
    export SONAR_GO_TEST_ARGS="$(go list ./... | awk '!/e2e/ {printf $0" "}')"
    export SELF="make -f /opt/build-harness/Makefile.prow"
    make -f /opt/build-harness/Makefile.prow sonar/go/prow
  container:
    from: src
  secrets:
  - mount_path: /etc/sonarcloud/
    name: acm-sonarcloud-token
- as: pr-image-mirror
  steps:
    dependencies:
      SOURCE_IMAGE_REF: hypershift-addon-operator
    env:
      IMAGE_REPO: hypershift-addon-operator
      REGISTRY_ORG: stolostron
    workflow: ocm-ci-image-mirror
- as: pr-merge-image-mirror
  postsubmit: true
  steps:
    dependencies:
      SOURCE_IMAGE_REF: hypershift-addon-operator
    env:
      IMAGE_REPO: hypershift-addon-operator
      IMAGE_TAG: latest
      REGISTRY_ORG: stolostron
    workflow: ocm-ci-image-mirror
- as: publish
  postsubmit: true
  steps:
    dependencies:
      SOURCE_IMAGE_REF: hypershift-addon-operator
    env:
      IMAGE_REPO: hypershift-addon-operator
      REGISTRY_ORG: stolostron
    test:
    - as: publish
      commands: |-
        export OSCI_COMPONENT_NAME=hypershift-addon-operator
        export OSCI_PIPELINE_PRODUCT_PREFIX=backplane
        export OSCI_PIPELINE_REPO=backplane-pipeline
        export SELF="make -f /opt/build-harness/Makefile.prow"
        export OSCI_PUBLISH_DELAY="0"
        make -f /opt/build-harness/Makefile.prow osci/publish
      credentials:
      - mount_path: /etc/github
        name: acm-cicd-github
        namespace: test-credentials
      from: src
      resources:
        requests:
          cpu: 100m
          memory: 200Mi
    workflow: ocm-ci-image-mirror
- as: publish-canary-test
  postsubmit: true
  steps:
    dependencies:
      SOURCE_IMAGE_REF: hypershift-addon-operator-canary-test
    env:
      IMAGE_REPO: hypershift-addon-operator-canary-test
      REGISTRY_ORG: stolostron
    test:
    - as: publish
      commands: |-
        export OSCI_COMPONENT_NAME="hypershift-addon-operator-canary-test"
        export OSCI_PIPELINE_PRODUCT_PREFIX=backplane
        export OSCI_PIPELINE_REPO=backplane-pipeline
        export SELF="make -f /opt/build-harness/Makefile.prow"
        export OSCI_PUBLISH_DELAY="0"
        make -f /opt/build-harness/Makefile.prow osci/publish
      credentials:
      - mount_path: /etc/github
        name: acm-cicd-github
        namespace: test-credentials
      from: src
      resources:
        requests:
          cpu: 100m
          memory: 200Mi
    workflow: ocm-ci-image-mirror
zz_generated_metadata:
  branch: backplane-2.17
  org: stolostron
  repo: hypershift-addon-operator
