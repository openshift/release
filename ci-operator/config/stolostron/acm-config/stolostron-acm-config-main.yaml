      DESTINATION_VERSIONS: 2.17 5.0
      REPO_MAP_PATH: product/component-registry.yaml
    workflow: ocm-ci-fastforward-multiple
zz_generated_metadata:
  branch: main
  org: stolostron
  repo: acm-config
