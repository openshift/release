build_root:
  image_stream_tag:
    name: builder
    namespace: stolostron
    tag: go1.25-linux
resources:
  '*':
    requests:
      cpu: 100m
      memory: 100Mi
tests:
- as: fast-forward
  interval: 2h
  steps:
    env:
      DESTINATION_VERSIONS: 5.0 5.1
      LAST_RELEASE_VERSION: "2.17"
      REPO_MAP_PATH: product/component-registry.yaml
    workflow: ocm-ci-fastforward-multiple
zz_generated_metadata:
  branch: main
  org: stolostron
  repo: acm-config
