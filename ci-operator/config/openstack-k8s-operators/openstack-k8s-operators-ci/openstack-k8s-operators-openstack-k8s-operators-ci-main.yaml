base_images:
  rhel-9-golang-1.21:
    name: release
    namespace: openshift
    tag: rhel-9-release-golang-1.21-openshift-4.16
  rhel-9-golang-1.24:
    name: release
    namespace: openshift
    tag: rhel-9-release-golang-1.24-openshift-4.20
  rhel-9-golang-1.26:
    name: release
    namespace: openshift
    tag: rhel-9-release-golang-1.26-openshift-4.23
build_root:
  image_stream_tag:
    name: release
    namespace: openshift
    tag: rhel-8-release-golang-1.18-openshift-4.12
images:
  items:
  - dockerfile_path: images/pre-commit/Dockerfile
    to: openstack-operator-ci-pre-commit
  - dockerfile_path: images/tempest-container/Dockerfile
    to: openstack-operator-tempest-container
  - build_args:
    - name: SDK_VERSION
      value: v1.26.0
    dockerfile_path: images/build-root/Dockerfile.custom
    to: ci-build-root-golang-1.19-sdk-1.26
  - build_args:
    - name: SDK_VERSION
      value: v1.31.0
    dockerfile_path: images/build-root/Dockerfile.rhel-9.custom
    inputs:
      rhel-9-golang-1.21:
        as:
        - quay-proxy.ci.openshift.org/openshift/ci:openshift_release_rhel-9-release-golang-1.24-openshift-4.21
    to: ci-build-root-golang-1.21-sdk-1.31
  - build_args:
    - name: SDK_VERSION
      value: v1.31.0
    dockerfile_path: images/build-root/Dockerfile.rhel-9.custom
    inputs:
      rhel-9-golang-1.24:
        as:
        - quay-proxy.ci.openshift.org/openshift/ci:openshift_release_rhel-9-release-golang-1.24-openshift-4.21
    to: ci-build-root-golang-1.24-sdk-1.31
  - build_args:
    - name: SDK_VERSION
      value: v1.41.1
    - name: KUSTOMIZE_VERSION
      value: v5.6.0
    dockerfile_path: images/build-root/Dockerfile.rhel-9.custom
    inputs:
      rhel-9-golang-1.24:
        as:
        - quay-proxy.ci.openshift.org/openshift/ci:openshift_release_rhel-9-release-golang-1.24-openshift-4.21
    to: ci-build-root-golang-1.24-sdk-1.41.1
  - build_args:
    - name: GOLANG_BASE
      value: quay-proxy.ci.openshift.org/openshift/ci:openshift_release_rhel-9-release-golang-1.26-openshift-4.23
    - name: SDK_VERSION
      value: v1.42.3
    - name: KUSTOMIZE_VERSION
      value: v5.6.0
    dockerfile_path: images/build-root/Dockerfile.rhel-9.custom
    inputs:
      rhel-9-golang-1.26:
        as:
        - quay-proxy.ci.openshift.org/openshift/ci:openshift_release_rhel-9-release-golang-1.24-openshift-4.21
    to: ci-build-root-golang-1.26-sdk-1.42.3
  skip_if_only_changed: ^renovate.json|^README.md
promotion:
  to:
  - name: tools
    namespace: openstack-k8s-operators
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
zz_generated_metadata:
  branch: main
  org: openstack-k8s-operators
  repo: openstack-k8s-operators-ci
