build_root:
  project_image:
    dockerfile_literal: |
      FROM registry.access.redhat.com/ubi9/ubi
      RUN yum install -y --nodocs make git golang
      RUN ln -s /cli/oc /usr/bin/kubectl
images:
- context_dir: infra/feast-operator
  dockerfile_path: Dockerfile
  to: feast-operator
- dockerfile_literal: |
    FROM registry.access.redhat.com/ubi9/ubi
    RUN yum install -y --nodocs make git golang
    RUN ln -s /cli/oc /usr/bin/kubectl
    ADD https://github.com/opendatahub-io/feast.git /
    RUN ls
    RUN pwd
    RUN make build-feature-server-docker REGISTRY=localhost/feastdev
  to: feast-feature-server
releases:
  latest:
    integration:
      name: "4.19"
      namespace: ocp
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: e2e-in-cluster
  steps:
    cluster_profile: aws-opendatahub
    env:
      BASE_DOMAIN: openshift-ci-aws.rhaiseng.com
      HYPERSHIFT_AWS_REGION: us-west-2
      HYPERSHIFT_NODE_COUNT: "1"
    test:
    - as: run tests
      cli: latest
      commands: |
        echo "Using feast server image ${FEAST_FEATURE_SERVER_IMAGE}"
        echo "Using feast image ${FEAST_OPERATOR_CONTROLLER_IMAGE}"
      dependencies:
      - env: FEAST_OPERATOR_CONTROLLER_IMAGE
        name: feast-operator
      - env: FEAST_FEATURE_SERVER_IMAGE
        name: feast-feature-server
      from: src
      resources:
        requests:
          cpu: 100m
          memory: 200Mi
    workflow: hypershift-hostedcluster-workflow
zz_generated_metadata:
  branch: dev
  org: opendatahub-io
  repo: feast
