build_root:
  image_stream_tag:
    name: release
    namespace: openshift
    tag: rhel-8-release-golang-1.25-openshift-4.23
images:
- build_args:
  - name: VLLM_GAUDI_COMMIT
    value: v0.16.0
  - name: VLLM_PROJECT_COMMIT
    value: v0.16.0
  dockerfile_path: Dockerfile.hpu.ubi
  to: vllm-gaudi-0.16.0-build
promotion:
  to:
  - namespace: opendatahub-io
    tag: latest
releases:
  latest:
    release:
      architecture: amd64
      channel: fast
      version: "4.12"
resources:
  '*':
    requests:
      cpu: 200m
      memory: 200Mi
  vllm-gaudi-0.16.0-build:
    limits:
      cpu: "12"
      memory: 24Gi
    requests:
      cpu: "4"
      memory: 6Gi
tests:
- as: vllm-gaudi-0-16-0-pr-image-mirror
  steps:
    dependencies:
      SOURCE_IMAGE_REF: vllm-gaudi-0.16.0-build
    env:
      IMAGE_REPO: vllm
      RELEASE_VERSION: gaudi-0.16.0
    workflow: opendatahub-io-ci-image-mirror
- as: vllm-gaudi-0-16-0-fast-image-mirror
  postsubmit: true
  steps:
    dependencies:
      SOURCE_IMAGE_REF: vllm-gaudi-0.16.0-build
    env:
      IMAGE_REPO: vllm
      RELEASE_VERSION: gaudi-0.16.0
    workflow: opendatahub-io-ci-image-mirror
zz_generated_metadata:
  branch: v0.16.0
  org: opendatahub-io
  repo: vllm-gaudi
