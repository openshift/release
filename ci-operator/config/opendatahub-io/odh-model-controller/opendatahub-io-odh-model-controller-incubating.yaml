base_images:
  ubi_minimal:
    name: ubi-minimal
    namespace: ocp
    tag: "9"
build_root:
  project_image:
    dockerfile_literal: |-
      FROM registry.access.redhat.com/ubi9/python-311:1

      # Prow expects to be able to check out a repo under /go
      USER 0:0
      WORKDIR /go

      RUN dnf install -y golang && dnf clean all
      RUN chown -R 1001:0 .

      USER 1001:0

      # The VENV that is activated by default conflicts with KServe
      # scripts. These variables are set to empty to not activate any
      # VENV by default.
      ENV BASH_ENV="" ENV="" PROMPT_COMMAND=""
images:
- context_dir: .
  dockerfile_path: Containerfile
  from: ubi_minimal
  to: odh-model-controller
- context_dir: .
  dockerfile_path: Containerfile.server
  from: ubi_minimal
  to: odh-model-serving-api
promotion:
  to:
  - namespace: opendatahub-io
    tag: latest
releases:
  latest:
    release:
      architecture: multi
      channel: fast
      version: "4.19"
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- always_run: false
  as: e2e-kserve-raw
  optional: true
  skip_if_only_changed: ^(?:config|\.github|hack)/|\.md$|^(?:\.*/)?(?:\.gitignore|\.pre-commit-config\.yaml|OWNERS|PROJECT|LICENSE|\.dockerignore|Makefile)$
  steps:
    allow_best_effort_post_steps: true
    cluster_profile: aws-opendatahub
    env:
      BASE_DOMAIN: openshift-ci-aws.rhaiseng.com
      COMPUTE_NODE_TYPE: m5.2xlarge
      HYPERSHIFT_AWS_REGION: us-west-2
      HYPERSHIFT_NODE_COUNT: "3"
    post:
    - as: testlog-gather
      best_effort: true
      cli: latest
      commands: |
        cp -v ${SHARED_DIR}/debuglog-*.log ${SHARED_DIR}/stdout-*.log ${SHARED_DIR}/stderr-*.log "${ARTIFACT_DIR}/" || true
      from: src
      resources:
        requests:
          cpu: 100m
      timeout: 1m0s
    - as: kserve-must-gather
      best_effort: true
      cli: latest
      commands: |
        oc adm must-gather \
          --image=quay.io/modh/must-gather:rhoai-2.24 \
          --dest-dir "${ARTIFACT_DIR}/gather-kserve" \
          -- "export COMPONENT=kserve; /usr/bin/gather"
      from: src
      resources:
        requests:
          cpu: 100m
      timeout: 20m0s
    - as: openshift-must-gather
      best_effort: true
      cli: latest
      commands: oc adm must-gather --dest-dir "${ARTIFACT_DIR}/gather-openshift"
      from: src
      resources:
        requests:
          cpu: 100m
      timeout: 20m0s
    - chain: hypershift-hostedcluster-destroy
    test:
    - as: kserve-raw
      cli: latest
      commands: |
        make test-e2e-kserve-ocp E2E_TEST_ARGS="raw 6 raw"
      dependencies:
      - env: ODH_MODEL_CONTROLLER_IMAGE
        name: odh-model-controller
      - env: IMG
        name: odh-model-controller
      - env: SERVER_IMG
        name: odh-model-serving-api
      from: src
      resources:
        requests:
          cpu: 100m
    workflow: hypershift-hostedcluster-workflow
- always_run: false
  as: e2e-kserve-llmisvc
  optional: true
  skip_if_only_changed: ^(?:config|\.github|hack)/|\.md$|^(?:\.*/)?(?:\.gitignore|\.pre-commit-config\.yaml|OWNERS|PROJECT|LICENSE|\.dockerignore|Makefile)$
  steps:
    allow_best_effort_post_steps: true
    cluster_profile: aws-opendatahub
    env:
      BASE_DOMAIN: openshift-ci-aws.rhaiseng.com
      COMPUTE_NODE_TYPE: m5.2xlarge
      HYPERSHIFT_AWS_REGION: us-west-2
      HYPERSHIFT_NODE_COUNT: "3"
    post:
    - as: testlog-gather
      best_effort: true
      cli: latest
      commands: |
        cp -v ${SHARED_DIR}/debuglog-*.log ${SHARED_DIR}/stdout-*.log ${SHARED_DIR}/stderr-*.log "${ARTIFACT_DIR}/" || true
      from: src
      resources:
        requests:
          cpu: 100m
      timeout: 1m0s
    - as: kserve-must-gather
      best_effort: true
      cli: latest
      commands: |
        oc adm must-gather \
          --image=quay.io/modh/must-gather:rhoai-2.24 \
          --dest-dir "${ARTIFACT_DIR}/gather-kserve" \
          -- "export COMPONENT=kserve; /usr/bin/gather"
      from: src
      resources:
        requests:
          cpu: 100m
      timeout: 20m0s
    - as: openshift-must-gather
      best_effort: true
      cli: latest
      commands: oc adm must-gather --dest-dir "${ARTIFACT_DIR}/gather-openshift"
      from: src
      resources:
        requests:
          cpu: 100m
      timeout: 20m0s
    - chain: hypershift-hostedcluster-destroy
    test:
    - as: kserve-llmisvc
      cli: latest
      commands: |
        make test-e2e-kserve-ocp E2E_TEST_ARGS="llminferenceservice and cluster_cpu" 2 "llm-d"
      dependencies:
      - env: ODH_MODEL_CONTROLLER_IMAGE
        name: odh-model-controller
      - env: IMG
        name: odh-model-controller
      - env: SERVER_IMG
        name: odh-model-serving-api
      from: src
      resources:
        requests:
          cpu: 100m
    workflow: hypershift-hostedcluster-workflow
- as: pr-image-mirror
  skip_if_only_changed: ^(?:config|\.github|hack)/|\.md$|^(?:\.gitignore|\.pre-commit-config\.yaml|OWNERS|PROJECT|LICENSE|\.dockerignore|Makefile)$
  steps:
    dependencies:
      SOURCE_IMAGE_REF: odh-model-controller
    env:
      IMAGE_REPO: odh-model-controller
    workflow: opendatahub-io-ci-image-mirror
- as: fast-image-mirror
  postsubmit: true
  skip_if_only_changed: ^(?:config|\.github|hack)/|\.md$|^(?:\.gitignore|\.pre-commit-config\.yaml|OWNERS|PROJECT|LICENSE|\.dockerignore|Makefile)$
  steps:
    dependencies:
      SOURCE_IMAGE_REF: odh-model-controller
    env:
      IMAGE_REPO: odh-model-controller
      RELEASE_VERSION: fast
    workflow: opendatahub-io-ci-image-mirror
- as: fast-server-image-mirror
  postsubmit: true
  skip_if_only_changed: ^(?:config|\.github|hack)/|\.md$|^(?:\.gitignore|\.pre-commit-config\.yaml|OWNERS|PROJECT|LICENSE|\.dockerignore|Makefile)$
  steps:
    dependencies:
      SOURCE_IMAGE_REF: odh-model-serving-api
    env:
      IMAGE_REPO: odh-model-serving-api
      RELEASE_VERSION: fast
    workflow: opendatahub-io-ci-image-mirror
zz_generated_metadata:
  branch: incubating
  org: opendatahub-io
  repo: odh-model-controller
