build_root:
  project_image:
    dockerfile_literal: |
      FROM registry.access.redhat.com/ubi9/nodejs-22:latest
      USER root
      RUN mkdir -p /go/src && chmod -R 777 /go
      USER 1001
resources:
  '*':
    requests:
      cpu: 200m
      memory: 400Mi
tests:
- as: lint
  commands: npm ci && npm run build && npm run lint
  container:
    from: src
- as: unit-tests
  commands: npm ci && npm run build && npm run test
  container:
    from: src
- as: build
  commands: npm ci && npm run build
  container:
    from: src
zz_generated_metadata:
  branch: main
  org: opendatahub-io
  repo: mod-arch-library
