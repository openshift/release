base_images:
  cli-operator-sdk:
    name: cli-operator-sdk
    namespace: ocp
    tag: v1.39.2
  ubi:
    name: ubi-minimal
    namespace: ocp
    tag: "9"
build_root:
  image_stream_tag:
    name: release
    namespace: openshift
    tag: golang-1.23
images:
- context_dir: .
  dockerfile_path: Dockerfiles/Dockerfile
  from: ubi
  to: opendatahub-operator
operator:
  bundles:
  - as: opendatahub-operator-bundle
    dockerfile_path: Dockerfiles/bundle.Dockerfile
    skip_building_index: true
  substitutions:
  - pullspec: REPLACE_IMAGE:latest
    with: pipeline:opendatahub-operator
releases:
  latest:
    release:
      # HyperShift requires multi-arch for cluster creation
      architecture: multi
      channel: stable
      version: "4.17"
# In openshift-ci, max_concurrency is set to 1. 
# It runs only one job at a time.
# So, we need slightly higher memory and cpu to boost the performance.
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 500m
      memory: 500Mi
tests:
- as: opendatahub-operator-pr-image-mirror
  steps:
    dependencies:
      SOURCE_IMAGE_REF: opendatahub-operator
    env:
      IMAGE_REPO: opendatahub-operator
    workflow: opendatahub-io-ci-image-mirror
- as: opendatahub-operator-image-mirror
  postsubmit: true
  steps:
    dependencies:
      SOURCE_IMAGE_REF: opendatahub-operator
    env:
      IMAGE_REPO: opendatahub-operator
      RELEASE_VERSION: main
    workflow: opendatahub-io-ci-image-mirror
- as: opendatahub-operator-e2e
  steps:
    cluster_profile: aws-opendatahub
    dependencies:
      OO_BUNDLE: opendatahub-operator-bundle
    env:
      OO_INSTALL_NAMESPACE: openshift-operators
      BASE_DOMAIN: openshift-ci-aws.rhaiseng.com
      HYPERSHIFT_AWS_REGION: us-west-2
      HYPERSHIFT_NODE_COUNT: "3"
    test:
    - as: e2e
      cli: latest
      commands: |
        unset GOFLAGS
        make e2e-test -e OPERATOR_NAMESPACE=openshift-operators
      from: src
      resources:
        requests:
          cpu: 2000m
          memory: 3Gi
    workflow: optional-operators-ci-operator-sdk-hypershift
zz_generated_metadata:
  branch: main
  org: opendatahub-io
  repo: opendatahub-operator
