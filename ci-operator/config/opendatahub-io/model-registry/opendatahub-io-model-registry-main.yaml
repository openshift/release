build_root:
  project_image:
    dockerfile_literal: |
      FROM registry.access.redhat.com/ubi8/ubi
      RUN dnf install -y --nodocs make git golang jq python3.9 python3-pip
      RUN pip3.9 install --upgrade pip
images:
  items:
  - dockerfile_path: Dockerfile
    to: model-registry
releases:
  latest:
    release:
      architecture: multi
      channel: stable
      version: "4.15"
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
zz_generated_metadata:
  branch: main
  org: opendatahub-io
  repo: model-registry
