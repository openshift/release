build_root:
  project_image:
    dockerfile_literal: |
      FROM registry.access.redhat.com/ubi8/ubi
      RUN curl -sL "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.6.0/kustomize_v5.6.0_linux_amd64.tar.gz" \
        | tar -xz -C /usr/local/bin
      RUN yum install -y --nodocs make git golang docker python3-pip python39 && \
        ln -s $(which pip3) /usr/bin/pip && \
        alternatives --set python3 /usr/bin/python3.9 && \
        ln -s /usr/bin/python3.9 /usr/bin/python
      RUN ln -s /cli/oc /usr/bin/kubectl
      RUN kustomize version
      
releases:
  latest:
    release:
      architecture: multi
      channel: stable
      version: "4.16"
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
images:
  - context_dir: .
    dockerfile_path: Dockerfile
    to: data-science-pipelines-operator

tests:
- as: integration-test-odh-dspo
  steps:
    cluster_profile: aws-opendatahub
    env:
      BASE_DOMAIN: openshift-ci-aws.rhaiseng.com
      HYPERSHIFT_AWS_REGION: us-west-2
      HYPERSHIFT_NODE_COUNT: "3"
    test:
    - as: integration-test-odh-dspo
      cli: latest
      commands: |
        export GIT_WORKSPACE=$(pwd)
        export DSPA_PATH=tests/resources/dspa-lite-tls.yaml
        export CONTAINER_CLI=podman
        export RUN_PKG_UPLOADER_IN_CONTAINER=false
        cd ${GIT_WORKSPACE}/.github/scripts/tests
        
        curl -O https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.6.0/kustomize_kustomize.v5.6.0_linux_amd64
        mv kustomize_kustomize.v5.6.0_linux_amd64 kustomize
        chmod +x kustomize
        export PATH=`pwd`:$PATH
        echo "Python version is:" 
        python --version
        sh tests.sh --openshift-ci
      from: src
      dependencies:
        - env: DSPO_IMAGE_REF
          name: data-science-pipelines-operator
      resources:
        requests:
          cpu: 8000m
          memory: 16Gi
    workflow: hypershift-hostedcluster-workflow
zz_generated_metadata:
  branch: main
  org: opendatahub-io
  repo: data-science-pipelines-operator
