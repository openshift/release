build_root:
  image_stream_tag:
    name: release
    namespace: openshift
    tag: rhel-8-release-golang-1.18-openshift-4.12
images:
- dockerfile_path: Containerfile
  to: nvidia-ci
releases:
  latest:
    prerelease:
      architecture: arm64
      product: ocp
      version_bounds:
        lower: 4.21.0-0
        stream: 4-stable
        upper: 4.22.0-0
  latest-4-14:
    prerelease:
      architecture: arm64
      product: ocp
      version_bounds:
        lower: 4.14.0-0
        stream: 4-stable
        upper: 4.15.0-0
