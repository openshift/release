      version_bounds:
        lower: 4.21.0-0
        stream: 4-stable
        upper: 4.22.0-0
resources:
  '*':
    limits:
      memory: 2Gi
    requests:
      cpu: 2000m
      memory: 2Gi
tests:
- always_run: false
  as: nvidia-gpu-operator-e2e-latest-4-14
  steps:
    cluster_profile: aws-edge-infra
    dependencies:
      OPENSHIFT_INSTALL_RELEASE_IMAGE_OVERRIDE: release:latest-4-14
    env:
      AWS_REGION_OVERWRITE: us-east-1
      BASE_DOMAIN: edge-sro.rhecoeng.com
      COMPUTE_NODE_TYPE: g5g.2xlarge
      CONTROL_PLANE_INSTANCE_TYPE: m6g.2xlarge
      OCP_ARCH: arm64
    workflow: nvidia-gpu-operator-e2e-aws
