build_root:
  image_stream_tag:
    name: release
    namespace: openshift
    tag: rhel-9-release-golang-1.21-openshift-4.18
images:
  items:
  - dockerfile_path: Containerfile
    to: dpf-ci
resources:
  '*':
    limits:
      memory: 8Gi
    requests:
      cpu: 500m
      memory: 1Gi
tests:
- always_run: false
  as: deploy-cluster
  capabilities:
  - intranet
  cluster: build05
  reporter_config:
    channel: '#wg-nvidia-dpf-ci'
    job_states_to_report:
    - success
    - failure
    - error
    - aborted
    report_template: |
      {{if eq .Status.State "success"}}
        :white_check_mark: Job *{{.Spec.Job}}* ended with *{{.Status.State}}*. <{{.Status.URL}}|View logs> :white_check_mark:
      {{else}}
        :warning: Job *{{.Spec.Job}}* ended with *{{.Status.State}}*. <{{.Status.URL}}|View logs> :warning:
        {{if eq .Status.State "aborted"}}
          The job was aborted, check for orphaned cloud resources.
        {{end}}
      {{end}}
  restrict_network_access: false
  steps:
    test:
    - ref: dpf-hypervisor-deploy-cluster
  timeout: 6h0m0s
- always_run: false
  as: sanity
  capabilities:
  - intranet
  cluster: build05
  reporter_config:
    channel: '#wg-nvidia-dpf-ci'
    job_states_to_report:
    - success
    - failure
    - error
    - aborted
    report_template: |
      {{if eq .Status.State "success"}}
        :white_check_mark: Job *{{.Spec.Job}}* ended with *{{.Status.State}}*. <{{.Status.URL}}|View logs> :white_check_mark:
      {{else}}
        :warning: Job *{{.Spec.Job}}* ended with *{{.Status.State}}*. <{{.Status.URL}}|View logs> :warning:
        {{if eq .Status.State "aborted"}}
          The job was aborted, check for orphaned cloud resources.
        {{end}}
      {{end}}
  restrict_network_access: false
  steps:
    test:
    - ref: dpf-hypervisor-sanity-existing
  timeout: 2h0m0s
- always_run: false
  as: network-tests
  capabilities:
  - intranet
  cluster: build05
  reporter_config:
    channel: '#wg-nvidia-dpf-ci'
    job_states_to_report:
    - success
    - failure
    - error
    - aborted
    report_template: |
      {{if eq .Status.State "success"}}
        :white_check_mark: Job *{{.Spec.Job}}* ended with *{{.Status.State}}*. <{{.Status.URL}}|View logs> :white_check_mark:
      {{else}}
        :warning: Job *{{.Spec.Job}}* ended with *{{.Status.State}}*. <{{.Status.URL}}|View logs> :warning:
        {{if eq .Status.State "aborted"}}
          The job was aborted, check for orphaned cloud resources.
        {{end}}
      {{end}}
  restrict_network_access: false
  steps:
    test:
    - ref: dpf-hypervisor-network-tests
  timeout: 2h0m0s
zz_generated_metadata:
  branch: main
  org: rh-ecosystem-edge
  repo: openshift-dpf
