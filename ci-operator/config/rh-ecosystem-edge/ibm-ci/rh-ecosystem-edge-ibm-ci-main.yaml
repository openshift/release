build_root:
  image_stream_tag:
    name: release
    namespace: openshift
    tag: rhel-8-release-golang-1.22-openshift-4.17
images:
  items:
  - dockerfile_path: Containerfile
    to: ibm-ci
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- always_run: false
  as: deploy-spyre-operator
  capabilities:
  - intranet
  restrict_network_access: false
  steps:
    test:
    - ref: ibm-ci-deploy
zz_generated_metadata:
  branch: main
  org: rh-ecosystem-edge
  repo: ibm-ci
