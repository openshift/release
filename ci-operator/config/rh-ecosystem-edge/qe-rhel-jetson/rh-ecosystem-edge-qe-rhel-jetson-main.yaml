base_images:
  ubi-python:
    name: ubi-python-312
    namespace: ocp
    tag: "9"
build_root:
  image_stream_tag:
    name: release
    namespace: openshift
    tag: rhel-9-release-golang-1.23-openshift-4.18
images:
  items:
  - dockerfile_literal: |
      FROM ubi-python
      USER 0
      RUN dnf install -y git && \
          ln -sf /usr/bin/python3.12 /usr/bin/python && \
          ln -sf /usr/bin/pip3.12 /usr/bin/pip && \
          pip install --no-cache-dir ruff pytest PyYAML requests paramiko && \
          dnf clean all
      COPY . /workspace/
      WORKDIR /workspace
    from: ubi-python
    inputs:
      src:
        paths:
        - destination_dir: .
          source_path: /go/src/github.com/rh-ecosystem-edge/qe-rhel-jetson
    to: qe-rhel-jetson
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: lint
  commands: |
    cd /workspace
    ruff check tests/
  container:
    from: qe-rhel-jetson
  skip_if_only_changed: ^docs/|\.md$|^(?:.*/)?(?:\.gitignore|OWNERS|OWNERS_ALIASES|PROJECT|LICENSE)$
zz_generated_metadata:
  branch: main
  org: rh-ecosystem-edge
  repo: qe-rhel-jetson
