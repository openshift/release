build_root:
  image_stream_tag:
    name: release
    namespace: openshift
    tag: rhel-8-release-golang-1.18-openshift-4.12
images:
- dockerfile_path: Containerfile
  to: amd-ci
- dockerfile_literal: |
    FROM quay.io/rh_ee_ggordani/eco-gotests:20260309-1214
    USER 0
    RUN chgrp -R 0 /home/testuser && chmod -R g=u /home/testuser
    RUN ln -sf /home/testuser/go/bin/ginkgo /usr/local/bin/ginkgo
    RUN dnf install -y openssh-clients && dnf clean all
  to: eco-gotests
releases:
  latest:
    prerelease:
      product: ocp
      version_bounds:
        lower: 4.22.0-0
        stream: 4-stable
        upper: 4.23.0-0
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- always_run: false
  as: e2e-amd-ci-1-3-x
  capabilities:
  - intranet
  restrict_network_access: false
  steps:
    cluster_profile: aws-edge-infra
    env:
      AMD_DRIVER_VERSION: 30.20.1
      GPU_OPERATOR_VERSION: "1.3"
      OCP_CLUSTER_VERSION: "4.22"
      PCI_DEVICES: 0000:b3:00.0
      REMOTE_HOST: 10.8.231.19
      SKIP_CLUSTER_DELETE: "false"
    workflow: amd-gpu-operator-e2e
- always_run: false
  as: e2e-amd-ci-1-4-x
  capabilities:
  - intranet
  restrict_network_access: false
  steps:
    cluster_profile: aws-edge-infra
    env:
      AMD_DRIVER_VERSION: 30.20.1
      GPU_OPERATOR_VERSION: "1.4"
      OCP_CLUSTER_VERSION: "4.22"
      PCI_DEVICES: 0000:b3:00.0
      REMOTE_HOST: 10.8.231.19
      SKIP_CLUSTER_DELETE: "false"
    workflow: amd-gpu-operator-e2e
zz_generated_metadata:
  branch: main
  org: rh-ecosystem-edge
  repo: amd-ci
  variant: 4.22-stable
