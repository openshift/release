build_root:
  image_stream_tag:
    name: release
    namespace: openshift
    tag: rhel-9-release-golang-1.24-openshift-4.22
images:
  items:
  - dockerfile_path: Containerfile
    to: amd-ci
  run_if_changed: ^x
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- always_run: false
  as: e2e-amd-ci-1-4-x
  capabilities:
  - intranet
  restrict_network_access: false
  steps:
    env:
      AMD_DRIVER_VERSION: "31.30"
      GPU_OPERATOR_VERSION: "1.4"
      OCP_CLUSTER_VERSION: "4.21"
      PCI_DEVICES: 0000:b3:00.0
      USE_SOURCE_IMAGE: "true"
    workflow: amd-gpu-operator-e2e
- always_run: false
  as: e2e-amd-ci-1-5-x
  capabilities:
  - intranet
  restrict_network_access: false
  steps:
    env:
      AMD_DRIVER_VERSION: "31.30"
      GPU_OPERATOR_VERSION: "1.5"
      OCP_CLUSTER_VERSION: "4.21"
      PCI_DEVICES: 0000:b3:00.0
    workflow: amd-gpu-operator-e2e
zz_generated_metadata:
  branch: main
  org: rh-ecosystem-edge
  repo: amd-ci
  variant: 4.21-stable
