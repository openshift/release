base_images:
  assisted-service-mcp:
    name: assisted-chat-img
    namespace: edge-infrastructure
    tag: assisted-service-mcp
  nested-podman:
    name: nested-podman
    namespace: ci
    tag: latest
build_root:
  image_stream_tag:
    name: release
    namespace: openshift
    tag: rhel-9-release-golang-1.21-openshift-4.17
images:
- dockerfile_path: Containerfile.assisted-chat
  to: rh-ecosystem-edge-assisted-chat-install
- dockerfile_path: test/prow/Dockerfile
  to: rh-ecosystem-edge-assisted-chat-test
- dockerfile_literal: |
    FROM nested-podman
    USER root
    RUN dnf install -y make git jq fzf python3.11 python3.11-pip && \
        ln -sf /usr/bin/python3.11 /usr/local/bin/python && \
        python3.11 -m pip install --no-cache-dir yq uv git+https://github.com/lightspeed-core/lightspeed-evaluation.git#subdirectory=lsc_agent_eval && \
        dnf clean all && \
        touch /etc/pki/consumer/cert.pem
    COPY . .
    USER 1000
  from: nested-podman
  to: assisted-chat-nested
promotion:
  to:
  - name: assisted-chat-img
    namespace: edge-infrastructure
releases:
  latest:
    integration:
      include_built_images: true
      name: "4.20"
      namespace: ocp
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- always_run: true
  as: eval-test
  cluster_claim:
    architecture: amd64
    cloud: aws
    owner: rh-ecosystem-edge
    product: ocp
    timeout: 1h0m0s
    version: "4.17"
  optional: true
  steps:
    allow_best_effort_post_steps: true
    dependencies:
      ASSISTED_CHAT_IMG: rh-ecosystem-edge-assisted-chat-install
      ASSISTED_CHAT_TEST: rh-ecosystem-edge-assisted-chat-test
      ASSISTED_MCP_IMG: assisted-service-mcp
    workflow: rh-ecosystem-edge-assisted-chat
- always_run: true
  as: eval-test-periodic
  cluster_claim:
    architecture: amd64
    cloud: aws
    owner: rh-ecosystem-edge
    product: ocp
    timeout: 1h0m0s
    version: "4.17"
  cron: 0 2 * * *
  steps:
    allow_best_effort_post_steps: true
    dependencies:
      ASSISTED_CHAT_IMG: rh-ecosystem-edge-assisted-chat-install
      ASSISTED_CHAT_TEST: rh-ecosystem-edge-assisted-chat-test
      ASSISTED_MCP_IMG: assisted-service-mcp
    workflow: rh-ecosystem-edge-assisted-chat
- as: local-development
  capabilities:
  - nested-podman
  nested_podman: true
  optional: true
  steps:
    workflow: rh-ecosystem-edge-assisted-chat-local-development
zz_generated_metadata:
  branch: main
  org: rh-ecosystem-edge
  repo: assisted-chat
