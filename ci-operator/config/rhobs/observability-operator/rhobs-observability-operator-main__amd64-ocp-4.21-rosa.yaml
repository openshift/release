base_images:
  cli:
    name: "4.21"
    namespace: ocp
    tag: cli
  ocm-cli:
    name: ocm-cli
    namespace: ci
    tag: latest
  rosa-aws-cli:
    name: rosa-aws-cli
    namespace: ci
    tag: latest
  tests-private:
    name: tests-private
    namespace: ci
    tag: "4.21"
build_root:
  image_stream_tag:
    name: builder
    namespace: ocp
    tag: rhel-9-release-golang-1.24-openshift-4.20
releases:
  latest:
    candidate:
      product: ocp
      stream: nightly
      version: "4.21"
resources:
  '*':
    limits:
      memory: 4G
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: rosa-sts-sleep
  optional: true
  run_if_changed: ^$
  steps:
    cluster_profile: aws-perfscale-qe
    env:
      CHANNEL_GROUP: candidate
      OPENSHIFT_VERSION: "4.21"
      SLEEP_DURATION: 6h
      USER_COUNT: "10"
    test:
    - ref: cucushift-installer-wait
    workflow: rosa-aws-sts
zz_generated_metadata:
  branch: main
  org: rhobs
  repo: observability-operator
  variant: amd64-ocp-4.21-rosa
