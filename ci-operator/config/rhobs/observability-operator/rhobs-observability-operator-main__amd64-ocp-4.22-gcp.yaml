base_images:
  cli:
    name: "4.22"
    namespace: ocp
    tag: cli
  observability-operator-test-harness:
    name: observability-operator-test-harness
    namespace: ci
    tag: latest
  upi-installer:
    name: "4.22"
    namespace: ocp
    tag: upi-installer
build_root:
  from_repository: true
releases:
  latest:
    candidate:
      product: ocp
      stream: nightly
      version: "4.22"
resources:
  '*':
    limits:
      memory: 4G
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: coo-stage
  cron: 30 0 * * 5
  reporter_config:
    channel: '#observability-operator-cicd'
    job_states_to_report:
    - success
    - failure
    - error
    report_template: |-
      *COO image source:* FBC from Konflux
      *OCP Version:* 4.22
      *Environment:* GCP

      {{if eq .Status.State "success"}} :slack-green: {{else}} :failed: {{end}}Job *{{.Spec.Job}}* with *{{.Status.State}}*. <{{.Status.URL}}|View logs>
  steps:
    cluster_profile: gcp-observability
    env:
      CYPRESS_COO_NAMESPACE: coo
      MULTISTAGE_PARAM_OVERRIDE_COO_INDEX_IMAGE: quay.io/redhat-user-workloads/cluster-observabilit-tenant/cluster-observability-operator/coo-fbc-v4-22@sha256:90b3ecec832f249b2810c99e50c2e0b405f771b99c8cd4699cc6c3fe658d340b
      OPERATORS: |
        [
            {"name": "cluster-observability-operator", "source": "coo-catalogsource", "channel": "stable", "install_namespace": "coo", "target_namespaces": "", "operator_group":"coo-og"},
            {"name": "tempo-product", "source": "redhat-operators", "channel": "stable", "install_namespace": "openshift-tempo-operator","target_namespace": "", "operator_group": "openshift-tempo-operator"},
            {"name": "opentelemetry-product", "source": "redhat-operators", "channel": "stable", "install_namespace": "openshift-opentelemetry-operator", "target_namespace": "", "operator_group": "openshift-opentelemetry-operator"},
            {"name": "lightspeed-operator", "source": "redhat-operators", "channel": "stable", "install_namespace": "openshift-lightspeed", "target_namespaces": "openshift-lightspeed", "operator_group": "openshift-lightspeed"}
        ]
    test:
    - ref: rhobs-konflux-catalogsource
    - ref: install-operators
    - ref: rhobs-wait-for-coo-ready
    - ref: distributed-tracing-tests-tracing-ui-integration
    - ref: monitoring-plugin-tests-monitoring-incidents-ui-integration
    - ref: troubleshooting-panel-tests-ui
    - ref: rhobs-obo-test-harness
    workflow: cucushift-installer-rehearse-gcp-ipi
zz_generated_metadata:
  branch: main
  org: rhobs
  repo: observability-operator
  variant: amd64-ocp-4.22-gcp
