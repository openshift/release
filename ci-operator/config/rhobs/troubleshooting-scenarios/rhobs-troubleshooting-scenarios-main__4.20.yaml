build_root:
  project_image:
    dockerfile_literal: |
      FROM registry.ci.openshift.org/ocp/ubi-python-311:9
      USER 0
releases:
  latest:
    candidate:
      product: ocp
      stream: nightly
      version: "4.20"
resources:
  '*':
    limits:
      memory: 8Gi
    requests:
      cpu: 100m
      memory: 4Gi
tests:
- as: gpu-cluster-on-demand
  cluster_claim:
    architecture: amd64
    cloud: aws
    labels:
      region: us-east-2
      variant: gpu
    owner: obs
    product: ocp
    timeout: 8h0m0s
    version: "4.20"
  cron: 0 10 * * 0
  steps:
    allow_skip_on_success: true
    env:
      TIMEOUT: +6 hours
    post:
    - ref: gather-must-gather
    test:
    - ref: wait
- as: troubleshooting-rhoai-periodic
  cluster_claim:
    architecture: amd64
    cloud: aws
    labels:
      region: us-east-2
      variant: gpu
    owner: obs
    product: ocp
    timeout: 2h0m0s
    version: "4.20"
  cron: 10 8 * * 0
  steps:
    allow_skip_on_success: true
    post:
    - ref: gather-must-gather
    test:
    - as: rhoai-test
      cli: latest
      commands: |
        export OPENAI_PROVIDER_KEY_PATH=/var/run/openai/token
        export HUGGING_FACE_HUB_TOKEN=$(cat /var/run/huggingface/token)
        export VLLM_API_KEY=$(cat /var/run/vllm/key)
        export RHOAI_PROVISION=true

        tests/scripts/test-troubleshooting-scenarios-rhoai.sh
      credentials:
      - mount_path: /var/run/openai
        name: obsinta-openai-apitoken
        namespace: test-credentials
      - mount_path: /var/run/huggingface
        name: obsinta-huggingface-token
        namespace: test-credentials
      - mount_path: /var/run/vllm
        name: obsinta-vllm-api-key
        namespace: test-credentials
      from: src
      resources:
        requests:
          cpu: 100m
    workflow: generic-claim
zz_generated_metadata:
  branch: main
  org: rhobs
  repo: troubleshooting-scenarios
  variant: "4.20"
