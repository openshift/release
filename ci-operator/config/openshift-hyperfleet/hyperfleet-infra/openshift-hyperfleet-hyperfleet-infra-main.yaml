build_root:
  project_image:
    dockerfile_literal: |-
      FROM registry.access.redhat.com/ubi9/ubi
      RUN yum install -y git make && yum clean all
images:
- dockerfile_path: Dockerfile.ci
  from: src
  to: infra-tools
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: validate
  commands: |
    make ci-dry-run
  container:
    from: infra-tools
zz_generated_metadata:
  branch: main
  org: openshift-hyperfleet
  repo: hyperfleet-infra
