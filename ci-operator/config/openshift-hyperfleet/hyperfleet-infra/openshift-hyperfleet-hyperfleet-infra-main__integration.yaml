build_root:
  image_stream_tag:
    name: builder
    namespace: ocp
    tag: rhel-9-golang-1.25-openshift-4.22
images:
- dockerfile_literal: |
    FROM src
    COPY src/ /opt/app-root/src
    WORKDIR /opt/app-root/src/hyperfleet-infra
    USER root
    RUN yum -y install --setopt=skip_missing_names_on_install=False \
      jq \
      unzip \
      && yum clean all
    RUN curl -fsSL -o /tmp/get_helm.sh https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 \
      && chmod +x /tmp/get_helm.sh && /tmp/get_helm.sh && rm /tmp/get_helm.sh
    RUN TERRAFORM_VERSION=1.9.8 \
      && curl -fsSL -o /tmp/terraform.zip "https://releases.hashicorp.com/terraform/${TERRAFORM_VERSION}/terraform_${TERRAFORM_VERSION}_linux_amd64.zip" \
      && unzip -o /tmp/terraform.zip -d /usr/local/bin/ && rm /tmp/terraform.zip
    RUN curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl" \
      && chmod 755 kubectl && mv kubectl /usr/local/bin/
  from: src
  inputs:
    src:
      paths:
      - destination_dir: src
        source_path: /go/src/github.com/openshift-hyperfleet/hyperfleet-infra
  to: infra-tools
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: integration
  steps:
    post:
    - as: cleanup
      best_effort: true
      commands: |
        set -euo pipefail

        # --- GCP Auth ---
        GCP_CREDENTIALS_FILE="/var/run/hyperfleet-e2e/hcm-hyperfleet-e2e.json"
        PROJECT_ID=$(jq -r .project_id "$GCP_CREDENTIALS_FILE")

        if ! which gcloud &>/dev/null; then
          GCLOUD_TAR="google-cloud-cli-linux-x86_64.tar.gz"
          curl -sSL -o "/tmp/$GCLOUD_TAR" "https://dl.google.com/dl/cloudsdk/channels/rapid/downloads/$GCLOUD_TAR"
          tar -xzf "/tmp/$GCLOUD_TAR" -C "$HOME"
          export PATH="$HOME/google-cloud-sdk/bin:$PATH"
          rm "/tmp/$GCLOUD_TAR"
        fi
        gcloud components install gke-gcloud-auth-plugin --quiet
        export USE_GKE_GCLOUD_AUTH_PLUGIN=True
        gcloud auth activate-service-account --key-file="$GCP_CREDENTIALS_FILE"
        gcloud config set project "$PROJECT_ID"

        # --- Install helm-git plugin ---
        helm plugin install https://github.com/aslafy-z/helm-git || true

        # --- Cleanup ---
        CI_ID=$(cat "${SHARED_DIR}/ci_id" 2>/dev/null || echo "unknown")

        if [ "$CI_ID" != "unknown" ]; then
          TF_DIR="terraform"

          # Regenerate config files from template (not shared across containers)
          cp "${TF_DIR}/envs/gke/dev-prow.tfbackend" "${TF_DIR}/envs/gke/ci-${CI_ID}.tfbackend"
          sed -i "s|^prefix.*|prefix = \"ci/infra/${CI_ID}\"|" "${TF_DIR}/envs/gke/ci-${CI_ID}.tfbackend"

          cp "${TF_DIR}/envs/gke/dev-prow.tfvars" "${TF_DIR}/envs/gke/ci-${CI_ID}.tfvars"
          sed -i "s|^developer_name.*|developer_name = \"ci-infra-${CI_ID}\"|" "${TF_DIR}/envs/gke/ci-${CI_ID}.tfvars"
          sed -i "s|^kubernetes_suffix.*|kubernetes_suffix = \"default\"|" "${TF_DIR}/envs/gke/ci-${CI_ID}.tfvars"
          sed -i "s|^enable_deletion_protection.*|enable_deletion_protection = false|" "${TF_DIR}/envs/gke/ci-${CI_ID}.tfvars"

          # Retrieve cluster credentials for uninstall
          (cd "$TF_DIR" && terraform init -backend-config="envs/gke/ci-${CI_ID}.tfbackend") || true
          eval $(cd "$TF_DIR" && terraform output -raw connect_command) || true

          make ci-cleanup \
            TF_ENV="ci-${CI_ID}" \
            AUTO_APPROVE=-auto-approve || true

          # Clean up GCS state
          gsutil rm -r "gs://hyperfleet-terraform-state/ci/infra/${CI_ID}" || true
        fi
      credentials:
      - mount_path: /var/run/hyperfleet-e2e
        name: hyperfleet-e2e
        namespace: test-credentials
      from: infra-tools
      resources:
        requests:
          cpu: 100m
          memory: 300Mi
      timeout: 15m0s
    test:
    - as: deploy-and-test
      commands: |
        set -euo pipefail

        # --- GCP Auth ---
        GCP_CREDENTIALS_FILE="/var/run/hyperfleet-e2e/hcm-hyperfleet-e2e.json"
        PROJECT_ID=$(jq -r .project_id "$GCP_CREDENTIALS_FILE")

        if ! which gcloud &>/dev/null; then
          GCLOUD_TAR="google-cloud-cli-linux-x86_64.tar.gz"
          curl -sSL -o "/tmp/$GCLOUD_TAR" "https://dl.google.com/dl/cloudsdk/channels/rapid/downloads/$GCLOUD_TAR"
          tar -xzf "/tmp/$GCLOUD_TAR" -C "$HOME"
          export PATH="$HOME/google-cloud-sdk/bin:$PATH"
          rm "/tmp/$GCLOUD_TAR"
        fi
        gcloud components install gke-gcloud-auth-plugin --quiet
        export USE_GKE_GCLOUD_AUTH_PLUGIN=True
        gcloud auth activate-service-account --key-file="$GCP_CREDENTIALS_FILE"
        gcloud config set project "$PROJECT_ID"

        # --- Install helm-git plugin ---
        helm plugin install https://github.com/aslafy-z/helm-git

        # --- Generate ephemeral cluster config ---
        CI_ID="${BUILD_ID:-$(date +%s)}"
        CI_NAME="ci-infra-${CI_ID}"
        TF_DIR="terraform"

        # Copy from existing template and override CI-specific values
        cp "${TF_DIR}/envs/gke/dev-prow.tfbackend" "${TF_DIR}/envs/gke/ci-${CI_ID}.tfbackend"
        sed -i "s|^prefix.*|prefix = \"ci/infra/${CI_ID}\"|" "${TF_DIR}/envs/gke/ci-${CI_ID}.tfbackend"

        cp "${TF_DIR}/envs/gke/dev-prow.tfvars" "${TF_DIR}/envs/gke/ci-${CI_ID}.tfvars"
        sed -i "s|^developer_name.*|developer_name = \"${CI_NAME}\"|" "${TF_DIR}/envs/gke/ci-${CI_ID}.tfvars"
        sed -i "s|^kubernetes_suffix.*|kubernetes_suffix = \"default\"|" "${TF_DIR}/envs/gke/ci-${CI_ID}.tfvars"
        sed -i "s|^enable_deletion_protection.*|enable_deletion_protection = false|" "${TF_DIR}/envs/gke/ci-${CI_ID}.tfvars"

        # Store CI_ID for cleanup step
        echo "${CI_ID}" > "${SHARED_DIR}/ci_id"

        # --- Run integration test ---
        make ci-test \
          TF_ENV="ci-${CI_ID}" \
          AUTO_APPROVE=-auto-approve
      credentials:
      - mount_path: /var/run/hyperfleet-e2e
        name: hyperfleet-e2e
        namespace: test-credentials
      from: infra-tools
      resources:
        requests:
          cpu: 100m
          memory: 300Mi
      timeout: 30m0s
zz_generated_metadata:
  branch: main
  org: openshift-hyperfleet
  repo: hyperfleet-infra
  variant: integration
