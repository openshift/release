build_root:
  image_stream_tag:
    name: builder
    namespace: ocp
    tag: rhel-9-golang-1.25-openshift-4.21
images:
- build_args:
  - name: GIT_SHA
    value: ${OPENSHIFT_BUILD_COMMIT}
  - name: BUILD_DATE
    value: $(date -u +'%Y-%m-%dT%H:%M:%SZ')
  - name: APP_VERSION
    value: release-0.2
  dockerfile_path: Dockerfile
  to: hyperfleet-sentinel
promotion:
  to:
  - namespace: ci
    tag: release-0.2
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: verify-version
  commands: /app/hyperfleet-sentinel --version
  container:
    from: hyperfleet-sentinel
zz_generated_metadata:
  branch: release-0.2
  org: openshift-hyperfleet
  repo: hyperfleet-sentinel
  variant: images
