base_images:
  nested-podman:
    name: nested-podman
    namespace: ci
    tag: latest
build_root:
  image_stream_tag:
    name: openshift-build
    namespace: jasee
    tag: rhel-9-golang-1.25
images:
- dockerfile_literal: |
    FROM nested-podman
    COPY src/ /opt/app-root/src
    WORKDIR /opt/app-root/src/hyperfleet-sentinel
    USER root
    RUN dnf install -y make go
    RUN dnf clean all
  from: nested-podman
  inputs:
    src:
      paths:
      - destination_dir: src
        source_path: /go/src/github.com/openshift-hyperfleet/hyperfleet-sentinel
  to: podman-test
resources:
  '*':
    requests:
      cpu: "1"
      memory: 1Gi
tests:
- as: integration
  capabilities:
  - nested-podman
  commands: |
    set -euo pipefail
    export DOCKER_HOST=$(podman info --format 'unix://{{.Host.RemoteSocket.Path}}')
    PODMAN_PID=""
    cleanup() {
        if [[ -n "$PODMAN_PID" ]]; then
            kill "$PODMAN_PID" 2>/dev/null || true
            wait "$PODMAN_PID" 2>/dev/null || true
        fi
    }
    trap cleanup EXIT

    podman system service --time=0 &
    PODMAN_PID=$!

    # Wait for the podman socket to be available
    SOCKET_PATH=$(podman info --format '{{.Host.RemoteSocket.Path}}')
    for i in $(seq 1 30); do
        [ -S "$SOCKET_PATH" ] && break
        sleep 1
    done

    export TESTCONTAINERS_RYUK_DISABLED=true
    export PATH=$PATH:$(go env GOPATH)/bin

    # Run integration tests
    make generate
    make test-integration
  container:
    from: podman-test
  nested_podman: true
zz_generated_metadata:
  branch: main
  org: openshift-hyperfleet
  repo: hyperfleet-sentinel
  variant: presubmits
