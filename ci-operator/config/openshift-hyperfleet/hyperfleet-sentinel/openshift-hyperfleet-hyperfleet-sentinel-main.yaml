base_images:
  nested-podman:
    name: nested-podman
    namespace: ci
    tag: latest
build_root:
  image_stream_tag:
    name: builder
    namespace: ocp
    tag: rhel-9-golang-1.25-openshift-4.21
images:
  items:
  - dockerfile_literal: |
      FROM nested-podman
      COPY src/ /opt/app-root/src
      WORKDIR /opt/app-root/src/hyperfleet-sentinel
      USER root
      RUN dnf install -y make go
      RUN dnf clean all
    from: nested-podman
    inputs:
      src:
        paths:
        - destination_dir: src
          source_path: /go/src/github.com/openshift-hyperfleet/hyperfleet-sentinel
    to: podman-test
prowgen:
  expose: true
  private: true
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: validate-commits
  steps:
    test:
    - ref: hyperfleet-commitlint
- as: lint
  capabilities:
  - nested-podman
  commands: |
    make generate
    export HOME=/tmp
    export GOCACHE=/tmp/go-build
    export GOMODCACHE=/tmp/go-mod
    export GOLANGCI_LINT_CACHE=/tmp/.cache
    export PATH="$(go env GOPATH)/bin:$PATH"
    unset GOFLAGS
    go install -mod=mod github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest
    make lint
  container:
    from: podman-test
  nested_podman: true
- as: unit
  capabilities:
  - nested-podman
  commands: |
    make generate
    make test-unit
  container:
    from: podman-test
  nested_podman: true
- as: helm-test
  commands: |
    curl -fsSL https://get.helm.sh/helm-v3.17.2-linux-amd64.tar.gz | tar xz
    export PATH=$PWD/linux-amd64:$PATH
    make test-helm
  container:
    from: src
  run_if_changed: ^(charts/|Makefile)
zz_generated_metadata:
  branch: main
  org: openshift-hyperfleet
  repo: hyperfleet-sentinel
