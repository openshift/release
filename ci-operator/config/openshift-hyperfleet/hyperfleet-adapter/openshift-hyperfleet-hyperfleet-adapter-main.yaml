base_images:
  base:
    name: ubi
    namespace: ocp
    tag: "9"
  ocp_builder_rhel-9-golang-1.25-openshift-4.21:
    name: builder
    namespace: ocp
    tag: rhel-9-golang-1.25-openshift-4.21
build_root:
  image_stream_tag:
    name: builder
    namespace: ocp
    tag: rhel-9-golang-1.25-openshift-4.21
prowgen:
  expose: true
  private: true
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: validate-commits
  steps:
    test:
    - ref: hyperfleet-commitlint
- as: lint
  commands: |
    export HOME=/tmp
    export GOCACHE=/tmp/go-build
    export GOMODCACHE=/tmp/go-mod
    export GOLANGCI_LINT_CACHE=/tmp/.cache
    export PATH="$(go env GOPATH)/bin:$PATH"
    unset GOFLAGS
    go install -mod=mod github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest
    make lint
  container:
    from: src
- as: unit
  commands: |
    unset GOFLAGS
    go mod tidy
    make test
  container:
    from: src
- as: helm-test
  commands: |
    curl -fsSL https://get.helm.sh/helm-v3.17.2-linux-amd64.tar.gz | tar xz
    export PATH=$PWD/linux-amd64:$PATH
    make test-helm
  container:
    from: src
  run_if_changed: ^(charts/|Makefile)
zz_generated_metadata:
  branch: main
  org: openshift-hyperfleet
  repo: hyperfleet-adapter
