base_images:
  ci_hyperfleet-credential-provider_latest:
    name: hyperfleet-credential-provider
    namespace: ci
    tag: latest
build_root:
  image_stream_tag:
    name: builder
    namespace: ocp
    tag: rhel-9-golang-1.26-openshift-4.23
images:
  items:
  - dockerfile_path: Dockerfile
    inputs:
      ci_hyperfleet-credential-provider_latest:
        as:
        - quay-proxy.ci.openshift.org/openshift/ci:ci_hyperfleet-credential-provider_latest
