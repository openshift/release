base_images:
  ci_hyperfleet-credential-provider_latest:
    name: hyperfleet-credential-provider
    namespace: ci
    tag: latest
build_root:
  image_stream_tag:
    name: builder
    namespace: ocp
    tag: rhel-9-golang-1.25-openshift-4.22
images:
- build_args:
  - name: GIT_SHA
    value: ${OPENSHIFT_BUILD_COMMIT}
  - name: BUILD_DATE
    value: $(date -u +'%Y-%m-%dT%H:%M:%SZ')
  - name: APP_VERSION
    value: release-0.2
  dockerfile_path: Dockerfile
  inputs:
    ci_hyperfleet-credential-provider_latest:
      as:
      - registry.ci.openshift.org/ci/hyperfleet-credential-provider:latest
  to: hyperfleet-e2e
promotion:
  to:
  - namespace: ci
    tag: release-0.2
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
zz_generated_metadata:
  branch: release-0.2
  org: openshift-hyperfleet
  repo: hyperfleet-e2e
  variant: images
