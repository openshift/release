base_images:
  ci_hyperfleet-credential-provider_latest:
    name: hyperfleet-credential-provider
    namespace: ci
    tag: latest
build_root:
  image_stream_tag:
    name: builder
    namespace: ocp
    tag: rhel-8-golang-1.25-openshift-4.22
images:
  items:
  - dockerfile_path: Dockerfile
    inputs:
      ci_hyperfleet-credential-provider_latest:
        as:
        - registry.ci.openshift.org/ci/hyperfleet-credential-provider:latest
    to: hyperfleet-e2e
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: tier0-nightly
  cron: 30 9 * * *
  reporter_config:
    channel: '#hyperfleet-e2e-status'
    job_states_to_report:
    - success
    - failure
    - error
    report_template: |-
      {{if eq .Status.State "success"}}:white_check_mark:{{else}}:x:{{end}} *{{.Spec.Job}}* ended with *{{.Status.State}}*.
      Build: #{{.Status.BuildID}}
      Details: <{{.Status.URL}}|View logs> · <https://prow.ci.openshift.org/job-history/gs/test-platform-results/logs/{{.Spec.Job}}|View history>
  steps:
    env:
      CLUSTER_NAME: hyperfleet-dev-prow
      LABEL_FILTER: tier0
      NAMESPACE_PREFIX: e2e
      REGION: us-central1-a
    workflow: openshift-hyperfleet-e2e
- as: tier1-nightly
  cron: 30 11 * * *
  reporter_config:
    channel: '#hyperfleet-e2e-status'
    job_states_to_report:
    - success
    - failure
    - error
    report_template: |-
      {{if eq .Status.State "success"}}:white_check_mark:{{else}}:x:{{end}} *{{.Spec.Job}}* ended with *{{.Status.State}}*.
      Build: #{{.Status.BuildID}}
      Details: <{{.Status.URL}}|View logs> · <https://prow.ci.openshift.org/job-history/gs/test-platform-results/logs/{{.Spec.Job}}|View history>
  steps:
    env:
      CLUSTER_NAME: hyperfleet-dev-prow
      LABEL_FILTER: tier1
      NAMESPACE_PREFIX: e2e
      REGION: us-central1-a
    workflow: openshift-hyperfleet-e2e
- as: tier2-nightly
  cron: 30 13 * * *
  steps:
    env:
      CLUSTER_NAME: hyperfleet-dev-prow
      LABEL_FILTER: tier2
      NAMESPACE_PREFIX: e2e
      REGION: us-central1-a
    workflow: openshift-hyperfleet-e2e
zz_generated_metadata:
  branch: main
  org: openshift-hyperfleet
  repo: hyperfleet-e2e
  variant: e2e
