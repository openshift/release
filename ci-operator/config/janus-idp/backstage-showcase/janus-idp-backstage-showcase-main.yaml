base_images:
  mapt:
    name: mapt
    namespace: ci
    tag: v0.7.0
build_root:
  image_stream_tag:
    name: release
    namespace: openshift
    tag: golang-1.20
  use_build_cache: true
images:
- context_dir: .ibm/images
  dockerfile_path: Dockerfile
  to: showcase-e2e-runner
releases:
  latest:
    release:
      architecture: amd64
      channel: fast
      version: "4.15"
resources:
  '*':
    limits:
      memory: 5Gi
    requests:
      cpu: 500m
      memory: 2Gi
tests:
- as: e2e-tests
  skip_if_only_changed: ^docs/|showcase-docs/|^\.changeset/|CONTRIBUTING\.md|OWNERS|README\.md|USAGE_DATA\.md|^scripts/|^\.github/|\.threatmodel/|^ui/|\.md$
  steps:
    test:
    - ref: janus-idp-backstage-showcase
- as: e2e-tests-nightly
  cron: 0 1 * * *
  steps:
    test:
    - ref: janus-idp-backstage-showcase-nightly
- as: e2e-tests-nightly-ocp-v4-16
  cron: 0 2 * * *
  steps:
    env:
      OC_CLIENT_VERSION: stable-4.16
    test:
    - ref: janus-idp-backstage-showcase-nightly
- as: e2e-tests-nightly-ocp-v4-15
  cron: 0 3 * * *
  steps:
    env:
      OC_CLIENT_VERSION: stable-4.15
    test:
    - ref: janus-idp-backstage-showcase-nightly
- as: e2e-tests-nightly-aks
  cron: 0 7 * * *
  steps:
    post:
    - as: janus-idp-backstage-showcase-helm-aks-mapt-destroy
      commands: |
        export HOME="${SHARED_DIR}/mapt"
        cd $HOME
        azure aks destroy \
          --project-name "aks" \
          --backed-url "file:///workspace"
      credentials:
      - mount_path: /tmp/secrets
        name: rhdh
        namespace: test-credentials
      from: mapt
      resources:
        limits:
          cpu: "2"
          memory: 6Gi
        requests:
          cpu: "2"
          memory: 6Gi
    pre:
    - as: janus-idp-backstage-showcase-helm-aks-mapt-create
      commands: |
        export HOME="${SHARED_DIR}/mapt"
        cd $HOME
        azure aks create \
          --project-name "aks" \
          --backed-url "file:///workspace" \
          --conn-details-output "/workspace" \
          --spot \
          --enable-app-routing
      credentials:
      - mount_path: /tmp/secrets
        name: rhdh
        namespace: test-credentials
      from: mapt
      resources:
        limits:
          cpu: "2"
          memory: 6Gi
        requests:
          cpu: "2"
          memory: 6Gi
    test:
    - ref: janus-idp-backstage-showcase-helm-aks-nightly
- as: e2e-tests-nightly-gke
  cron: 0 8 * * *
  steps:
    test:
    - ref: janus-idp-backstage-showcase-helm-gke-nightly
zz_generated_metadata:
  branch: main
  org: janus-idp
  repo: backstage-showcase
