build_root:
  image_stream_tag:
    name: release
    namespace: openshift
    tag: rhel-9-release-golang-1.22-openshift-4.19
  use_build_cache: true
releases:
  latest:
    release:
      architecture: amd64
      channel: fast
      version: "4.20"
resources:
  '*':
    limits:
      cpu: "2"
      memory: 5Gi
    requests:
      cpu: "2"
      memory: 2Gi
tests:
- as: e2e-ocp-helm
  cluster_claim:
    architecture: amd64
    cloud: aws
    labels:
      region: us-east-2
    owner: rhdh
    product: ocp
    timeout: 1h0m0s
    version: "4.18"
  skip_if_only_changed: ^docs/|rpms\.lock\.yaml|showcase-docs/|^\.changeset/|CONTRIBUTING\.md|OWNERS|README\.md|USAGE_DATA\.md|^scripts/|^\.github/|\.threatmodel/|^ui/|\.md|\\.mdc|\\.toml$
  steps:
    allow_skip_on_success: true
    post:
    - ref: redhat-developer-rhdh-send-data-router
    - chain: gather
    test:
    - ref: redhat-developer-rhdh-ocp-helm
    workflow: generic-claim
- always_run: false
  as: e2e-ocp-helm-nightly
  cluster_claim:
    architecture: amd64
    cloud: aws
    labels:
      region: us-east-2
    owner: rhdh
    product: ocp
    timeout: 1h0m0s
    version: "4.18"
  cron: 0 4 * * TUE,THU
  optional: true
  presubmit: true
  reporter_config:
    channel: '#rhdh-e2e-alerts-1-8'
    job_states_to_report:
    - error
    report_template: '<!subteam^S07BMJ56R8S> <@U08UP0REWG1> :failed: `{{.Spec.Job}}`
      ended with *{{.Status.State}}*, :scroll: <{{.Status.URL}}| logs>'
  steps:
    allow_skip_on_success: true
    post:
    - ref: redhat-developer-rhdh-send-data-router
    - ref: redhat-developer-rhdh-send-alert
    - chain: gather
    test:
    - ref: redhat-developer-rhdh-ocp-helm-nightly
    workflow: generic-claim
- always_run: false
  as: e2e-ocp-operator-nightly
  cluster_claim:
    architecture: amd64
    cloud: aws
    labels:
      region: us-east-2
    owner: rhdh
    product: ocp
    timeout: 1h0m0s
    version: "4.18"
  cron: 0 5 * * TUE,THU
  optional: true
  presubmit: true
  reporter_config:
    channel: '#rhdh-e2e-alerts-1-8'
    job_states_to_report:
    - error
    report_template: '<!subteam^S07BMJ56R8S> <@U08UP0REWG1> :failed: `{{.Spec.Job}}`
      ended with *{{.Status.State}}*, :scroll: <{{.Status.URL}}| logs>'
  steps:
    allow_skip_on_success: true
    post:
    - ref: redhat-developer-rhdh-send-data-router
    - ref: redhat-developer-rhdh-send-alert
    - chain: gather
    test:
    - ref: redhat-developer-rhdh-ocp-operator-nightly
    workflow: generic-claim
- always_run: false
  as: e2e-ocp-operator-auth-providers-nightly
  cluster_claim:
    architecture: amd64
    cloud: aws
    labels:
      region: us-east-2
    owner: rhdh
    product: ocp
    timeout: 1h0m0s
    version: "4.18"
  cron: 0 2 * * TUE,THU
  max_concurrency: 1
  optional: true
  presubmit: true
  reporter_config:
    channel: '#rhdh-e2e-alerts-1-8'
    job_states_to_report:
    - success
    - failure
    - error
    report_template: '{{if eq .Status.State "success"}} :done-circle-check: {{else}}<!subteam^S07BMJ56R8S>
      <@U08UP0REWG1> :failed: {{end}} Job *`{{.Spec.Job}}`* ended with *{{.Status.State}}*.
      Open Report: <https://gcsweb-ci.apps.ci.l2s4.p1.openshiftapps.com/gcs/test-platform-results/logs/{{.Spec.Job}}/{{.Status.BuildID}}/artifacts/e2e-ocp-operator-auth-providers-nightly/redhat-developer-rhdh-ocp-operator-nightly/artifacts/showcase-auth-providers/index.html|nightly>
      | <https://gcsweb-ci.apps.ci.l2s4.p1.openshiftapps.com/gcs/test-platform-results/logs/{{.Spec.Job}}/{{.Status.BuildID}}/artifacts/e2e-ocp-operator-auth-providers-nightly/redhat-developer-rhdh-ocp-operator-nightly/artifacts/|Open
      artifacts> | <{{.Status.URL}}|View logs>'
  steps:
    allow_skip_on_success: true
    post:
    - ref: redhat-developer-rhdh-send-data-router
    - chain: gather
    test:
    - ref: redhat-developer-rhdh-ocp-operator-nightly
    workflow: generic-claim
zz_generated_metadata:
  branch: release-1.8
  org: redhat-developer
  repo: rhdh
