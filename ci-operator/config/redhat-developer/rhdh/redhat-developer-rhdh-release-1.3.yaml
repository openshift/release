build_root:
  project_image:
    dockerfile_literal: |
      FROM registry.ci.openshift.org/ocp/builder:rhel-8-golang-1.20-openshift-4.16
      RUN yum -y install make wget gcc git httpd-tools
images:
  - from: quay.io/rhdh-community/showcase-e2e-runner:latest
releases:
  initial:
    integration:
      name: "4.13"
      namespace: ocp
  latest:
    integration:
      include_built_images: true
      name: "4.13"
      namespace: ocp
resources:
  '*':
    limits:
      memory: 5Gi
    requests:
      cpu: 500m
      memory: 2Gi
tests:
- as: e2e-tests
  skip_if_only_changed: ^docs/|showcase-docs/|^\.changeset/|CONTRIBUTING\.md|OWNERS|README\.md|USAGE_DATA\.md|^scripts/|^\.github/|\.threatmodel/|^ui/|\.md$
  steps:
    test:
    - ref: redhat-developer-rhdh-release-1.3
- as: e2e-tests-nightly
  cron: 0 6 * * *
  steps:
    test:
    - ref: redhat-developer-rhdh-release-1.3-nightly
- as: post-merge-image-push
  postsubmit: true
  steps:
    test:
      - ref: post-merge-push
zz_generated_metadata:
  branch: release-1.3
  org: redhat-developer
  repo: rhdh
