build_root:
  image_stream_tag:
    name: release
    namespace: openshift
    tag: golang-1.22
  use_build_cache: true
releases:
  latest:
    release:
      architecture: amd64
      channel: fast
      version: "4.15"
resources:
  '*':
    limits:
      cpu: "2"
      memory: 5Gi
    requests:
      cpu: "2"
      memory: 2Gi
tests:
- as: e2e-tests
  cluster_claim:
    architecture: amd64
    cloud: aws
    labels:
      region: us-east-2
    owner: rhdh
    product: ocp
    timeout: 1h0m0s
    version: "4.18"
  skip_if_only_changed: ^docs/|showcase-docs/|^\.changeset/|CONTRIBUTING\.md|OWNERS|README\.md|USAGE_DATA\.md|^scripts/|^\.github/|\.threatmodel/|^ui/|\.md|\\.mdc$
  steps:
    test:
    - ref: redhat-developer-rhdh
    workflow: generic-claim
- always_run: false
  as: e2e-tests-nightly
  cluster_claim:
    architecture: amd64
    cloud: aws
    labels:
      region: us-east-2
    owner: rhdh
    product: ocp
    timeout: 1h0m0s
    version: "4.18"
  cron: 45 0 6 12 *
  optional: true
  presubmit: true
  steps:
    post:
    - ref: redhat-developer-rhdh-send-alert
    - chain: gather
    test:
    - ref: redhat-developer-rhdh-nightly
    workflow: generic-claim
