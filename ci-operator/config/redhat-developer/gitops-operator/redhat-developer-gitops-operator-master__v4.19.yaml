base_images:
  cli:
    name: "4.14"
    namespace: ocp
    tag: cli
  operator-sdk:
    name: "4.19"
    namespace: origin
    tag: operator-sdk
build_root:
  from_repository: true
images:
  items:
  - context_dir: openshift-ci/build-root/source-image
    from: src
    inputs:
      cli:
        paths:
        - destination_dir: .
          source_path: /usr/bin/oc
    to: oc-bin-image
  - dockerfile_path: openshift-ci/build-root/Dockerfile
    from: oc-bin-image
    to: dependencies
  - additional_architectures:
  - arm64
  context_dir: .
    from: src
    to: gitops-operator
operator:
  bundles:
  - as: gitops-operator-bundle
    capabilities:
    - arm64
    context_dir: bundle/
    dockerfile_path: bundle.Dockerfile
  substitutions:
  - pullspec: quay.io/redhat-developer/gitops-operator:latest
    with: pipeline:gitops-operator
releases:
  arm64-latest:
    candidate:
      architecture: arm64
      product: ocp
      stream: nightly
      version: "4.19"
  initial:
    integration:
      name: "4.19"
      namespace: ocp
  latest:
    integration:
      include_built_images: true
      name: "4.19"
      namespace: ocp
resources:
  '*':
    requests:
      cpu: 800m
      memory: 6Gi
tests:
- as: kuttl-sequential
  capabilities:
  - arm64
  skip_if_only_changed: ^docs/|\.(md|adoc)$|^(README|LICENSE|OWNERS)$
  steps:
    cluster_profile: gitops-aws
    dependencies:
      OPENSHIFT_INSTALL_RELEASE_IMAGE_OVERRIDE: release:arm64-latest
    env:
      BASE_DOMAIN: ocp-gitops-qe.com
      OCP_ARCH: arm64
    test:
    - as: install
      cli: latest
      commands: |
        oc create namespace openshift-gitops-operator
        oc get ns openshift-gitops-operator -o yaml
        if ! operator-sdk run bundle --security-context-config restricted -n openshift-gitops-operator "$OO_BUNDLE" --timeout 10m; then
          echo "=== Operator installation failed, gathering diagnostics ==="
          echo "=== Cluster Architecture Info ==="
          oc get nodes -o wide || true
          echo "=== Node Architecture Details ==="
          for node in $(oc get nodes -o jsonpath='{.items[*].metadata.name}'); do
            echo "Node: $node"
            oc get node "$node" -o jsonpath='{.status.nodeInfo.architecture}' && echo || true
            oc get node "$node" -o jsonpath='{.status.nodeInfo.operatingSystem}' && echo || true
            oc get node "$node" -o jsonpath='{.status.nodeInfo.kubeletVersion}' && echo || true
          done
          echo "=== CSV Status ==="
          oc get csv -n openshift-gitops-operator -o yaml || true
          echo "=== CSV Describe ==="
          oc describe csv -n openshift-gitops-operator || true
          echo "=== Operator Pods ==="
          oc get pods -n openshift-gitops-operator -o wide || true
          echo "=== Operator Pod Describe (Detailed) ==="
          oc describe pods -n openshift-gitops-operator || true
          echo "=== Manager Container Logs (Current) ==="
          oc logs -n openshift-gitops-operator -l control-plane=gitops-operator -c manager --tail=200 || true
          echo "=== Manager Container Logs (Previous - if crashed) ==="
          oc logs -n openshift-gitops-operator -l control-plane=gitops-operator -c manager --previous --tail=200 || true
          echo "=== Kube-RBAC-Proxy Container Logs ==="
          oc logs -n openshift-gitops-operator -l control-plane=gitops-operator -c kube-rbac-proxy --tail=100 || true
          echo "=== All Container Logs ==="
          oc logs -n openshift-gitops-operator -l control-plane=gitops-operator --all-containers=true --tail=100 || true
          echo "=== Pod Status Details ==="
          oc get pods -n openshift-gitops-operator -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}{"  Phase: "}{.status.phase}{"\n"}{"  Node: "}{.spec.nodeName}{"\n"}{range .status.containerStatuses[*]}{"  Container: "}{.name}{" - Ready: "}{.ready}{" - Restarts: "}{.restartCount}{"\n"}{"    State: "}{.state}{"\n"}{"    Last State: "}{.lastState}{"\n"}{end}{end}' || true
          echo "=== Container Exit Codes ==="
          oc get pods -n openshift-gitops-operator -o json | jq -r '.items[] | select(.metadata.labels."control-plane"=="controller-manager") | .status.containerStatuses[]? | "\(.name): exitCode=\(.lastState.terminated.exitCode // .state.terminated.exitCode // "N/A"), reason=\(.lastState.terminated.reason // .state.terminated.reason // "N/A")"' || true
          echo "=== Events (All) ==="
          oc get events -n openshift-gitops-operator --sort-by='.lastTimestamp' || true
          echo "=== Events (Recent, Sorted) ==="
          oc get events -n openshift-gitops-operator --sort-by='.lastTimestamp' | tail -50 || true
          echo "=== Deployment Status ==="
          oc get deployment -n openshift-gitops-operator -o yaml || true
          echo "=== Deployment Conditions ==="
          oc get deployment openshift-gitops-operator-controller-manager -n openshift-gitops-operator -o jsonpath='{.status.conditions}' | jq '.' || true
          echo "=== Images being used ==="
          echo "Manager image:"
          oc get deployment openshift-gitops-operator-controller-manager -n openshift-gitops-operator -o jsonpath='{.spec.template.spec.containers[?(@.name=="manager")].image}' && echo || true
          echo "Kube-rbac-proxy image:"
          oc get deployment openshift-gitops-operator-controller-manager -n openshift-gitops-operator -o jsonpath='{.spec.template.spec.containers[?(@.name=="kube-rbac-proxy")].image}' && echo || true
          echo "=== Pod Node Assignment ==="
          MANAGER_POD=$(oc get pod -n openshift-gitops-operator -l control-plane=gitops-operator -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || echo "")
          if [ -n "$MANAGER_POD" ]; then
            echo "Manager pod: $MANAGER_POD"
            NODE_NAME=$(oc get pod "$MANAGER_POD" -n openshift-gitops-operator -o jsonpath='{.spec.nodeName}' 2>/dev/null || echo "")
            if [ -n "$NODE_NAME" ]; then
              echo "Scheduled on node: $NODE_NAME"
              echo "Node architecture: $(oc get node "$NODE_NAME" -o jsonpath='{.status.nodeInfo.architecture}' 2>/dev/null || echo 'unknown')"
              echo "Node OS: $(oc get node "$NODE_NAME" -o jsonpath='{.status.nodeInfo.operatingSystem}' 2>/dev/null || echo 'unknown')"
              echo "Node labels:"
              oc get node "$NODE_NAME" --show-labels || true
            fi
          fi
          echo "=== Security Context ==="
          oc get deployment openshift-gitops-operator-controller-manager -n openshift-gitops-operator -o jsonpath='{.spec.template.spec.securityContext}' | jq '.' || true
          oc get deployment openshift-gitops-operator-controller-manager -n openshift-gitops-operator -o jsonpath='{.spec.template.spec.containers[?(@.name=="manager")].securityContext}' | jq '.' || true
          echo "=== Resource Limits/Requests ==="
          oc get deployment openshift-gitops-operator-controller-manager -n openshift-gitops-operator -o jsonpath='{.spec.template.spec.containers[?(@.name=="manager")].resources}' | jq '.' || true
          exit 1
        fi
        oc wait --for condition=Available -n openshift-gitops-operator deployment openshift-gitops-operator-controller-manager
      dependencies:
      - env: OO_BUNDLE
        name: gitops-operator-bundle
      from: operator-sdk
      resources:
        requests:
          cpu: "2"
          memory: 6Gi
    - as: sequential-e2e-steps
      commands: |
        scripts/openshift-CI-kuttl-tests.sh
        make e2e-tests-sequential
      from: dependencies
      resources:
        requests:
          cpu: "2"
          memory: 6Gi
      timeout: 3h30m0s
    workflow: ipi-aws
