base_images:
  cli:
    name: "4.14"
    namespace: ocp
    tag: cli
  operator-sdk:
    name: "4.19"
    namespace: origin
    tag: operator-sdk
build_root:
  from_repository: true
images:
  items:
  - context_dir: openshift-ci/build-root/source-image
    from: src
    inputs:
      cli:
        paths:
        - destination_dir: .
          source_path: /usr/bin/oc
    to: oc-bin-image
  - dockerfile_path: openshift-ci/build-root/Dockerfile
    from: oc-bin-image
    to: dependencies
  - additional_architectures:
    - arm64
    context_dir: .
    from: src
    to: gitops-operator
operator:
  bundles:
  - as: gitops-operator-bundle
    capabilities:
    - arm64
    context_dir: bundle/
    dockerfile_path: bundle.Dockerfile
  substitutions:
  - pullspec: quay.io/redhat-developer/gitops-operator:latest
    with: pipeline:gitops-operator
releases:
  arm64-latest:
    candidate:
      architecture: arm64
      product: ocp
      stream: nightly
      version: "4.19"
  initial:
    integration:
      name: "4.19"
      namespace: ocp
  latest:
    integration:
      include_built_images: true
      name: "4.19"
      namespace: ocp
resources:
  '*':
    requests:
      cpu: 800m
      memory: 6Gi
tests:
- as: kuttl-sequential
  capabilities:
  - arm64
  skip_if_only_changed: ^docs/|\.(md|adoc)$|^(README|LICENSE|OWNERS)$
  steps:
    cluster_profile: gitops-aws
    dependencies:
      OPENSHIFT_INSTALL_RELEASE_IMAGE_OVERRIDE: release:arm64-latest
    env:
      BASE_DOMAIN: ocp-gitops-qe.com
      OCP_ARCH: arm64
    test:
    - as: install
      cli: latest
      commands: |
        oc create namespace openshift-gitops-operator
        oc get ns openshift-gitops-operator -o yaml
        if ! operator-sdk run bundle --security-context-config restricted -n openshift-gitops-operator "$OO_BUNDLE" --timeout 10m; then
          echo "=== Operator installation failed, gathering diagnostics ==="
          echo "=== CSV Status ==="
          oc get csv -n openshift-gitops-operator -o yaml || true
          echo "=== Operator Pods ==="
          oc get pods -n openshift-gitops-operator -o wide || true
          echo "=== Operator Pod Describe ==="
          oc describe pods -n openshift-gitops-operator || true
          echo "=== Operator Logs ==="
          oc logs -n openshift-gitops-operator -l control-plane=gitops-operator --all-containers=true --tail=100 || true
          echo "=== Events ==="
          oc get events -n openshift-gitops-operator --sort-by='.lastTimestamp' | tail -30 || true
          exit 1
        fi
        oc wait --for condition=Available -n openshift-gitops-operator deployment openshift-gitops-operator-controller-manager
      dependencies:
      - env: OO_BUNDLE
        name: gitops-operator-bundle
      from: operator-sdk
      resources:
        requests:
          cpu: "2"
          memory: 6Gi
    - as: sequential-e2e-steps
      commands: |
        echo "=== Manager pod is up, checking if operator is reconciling default instance ==="
        sleep 10s
        echo "=== Check openshift-gitops namespace ==="
        oc get namespace openshift-gitops || echo "Namespace openshift-gitops does not exist yet"
        echo "=== GitOpsService CR (should be created automatically) ==="
        oc get gitopsservices -A -o yaml || echo "No GitOpsService CR found"
        echo "=== ArgoCD CRs ==="
        oc get argocds -A -o yaml || echo "No ArgoCD CRs found"
        echo "=== All resources in openshift-gitops namespace ==="
        oc get all -n openshift-gitops 2>/dev/null || echo "No resources in openshift-gitops namespace"
        echo "=== Operator Manager Logs (checking for reconciliation activity) ==="
        oc logs -n openshift-gitops-operator -l control-plane=gitops-operator -c manager --tail=100 || true
        echo "=== Events in openshift-gitops-operator namespace ==="
        oc get events -n openshift-gitops-operator --sort-by='.lastTimestamp' | tail -20 || true
        echo "=== Events in openshift-gitops namespace (if exists) ==="
        oc get events -n openshift-gitops --sort-by='.lastTimestamp' 2>/dev/null | tail -20 || echo "No events in openshift-gitops namespace"
        echo "=== Pod Status with Wide Output ==="
        oc get pods -n openshift-gitops -o wide || true
        echo "=== Detailed Pod Status (Phase and Ready Condition) ==="
        oc get pods -n openshift-gitops -o jsonpath='{range .items[*]}{.metadata.name}{"\t"}Phase={.status.phase}{"\t"}Ready={.status.conditions[?(@.type=="Ready")].status}{"\t"}Reason={.status.conditions[?(@.type=="Ready")].reason}{"\t"}Message={.status.conditions[?(@.type=="Ready")].message}{"\n"}{end}' || true
        echo "=== All Pod Conditions (to see why pods aren't Ready) ==="
        for pod in $(oc get pods -n openshift-gitops -o jsonpath='{.items[*].metadata.name}'); do
          echo "--- Conditions for pod: $pod ---"
          oc get pod -n openshift-gitops $pod -o jsonpath='{range .status.conditions[*]}{.type}{": "}{.status}{" (Reason: "}{.reason}{", Message: "}{.message}{")\n"}{end}' || true
        done
        echo "=== Logs from ALL Pods (to identify why Running pods aren't Ready) ==="
        for pod in $(oc get pods -n openshift-gitops -o jsonpath='{.items[*].metadata.name}'); do
          pod_phase=$(oc get pod -n openshift-gitops $pod -o jsonpath='{.status.phase}' 2>/dev/null || echo "Unknown")
          ready_status=$(oc get pod -n openshift-gitops $pod -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}' 2>/dev/null || echo "Unknown")
          echo "--- Logs from pod: $pod (Phase: $pod_phase, Ready: $ready_status) ---"
          oc logs -n openshift-gitops $pod --all-containers=true --tail=100 || true
          echo ""
        done
        echo "=== Checking ALL Pods for Issues (CrashLoopBackOff, Not Ready, or Error states) ==="
        for pod in $(oc get pods -n openshift-gitops -o jsonpath='{.items[*].metadata.name}'); do
          pod_phase=$(oc get pod -n openshift-gitops $pod -o jsonpath='{.status.phase}' 2>/dev/null || echo "Unknown")
          ready_status=$(oc get pod -n openshift-gitops $pod -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}' 2>/dev/null || echo "Unknown")
          container_state=$(oc get pod -n openshift-gitops $pod -o jsonpath='{.status.containerStatuses[0].state}' 2>/dev/null || echo "Unknown")
          restart_count=$(oc get pod -n openshift-gitops $pod -o jsonpath='{.status.containerStatuses[0].restartCount}' 2>/dev/null || echo "0")
          echo "--- Checking pod: $pod (Phase: $pod_phase, Ready: $ready_status, Restarts: $restart_count) ---"
          if [ "$pod_phase" = "CrashLoopBackOff" ] || [ "$pod_phase" = "Error" ] || [ "$ready_status" != "True" ] || [ "$restart_count" != "0" ]; then
            echo ">>> Pod $pod has issues - gathering detailed diagnostics <<<"
            echo "=== Full pod status (JSON) ==="
            oc get pod -n openshift-gitops $pod -o json || true
            echo "=== Describe pod: $pod ==="
            oc describe pod -n openshift-gitops $pod || true
            echo "=== Container Statuses with Detailed State for pod: $pod ==="
            oc get pod -n openshift-gitops $pod -o jsonpath='{range .status.containerStatuses[*]}{.name}{":\n"}{"  ready="}{.ready}{"\n"}{"  restartCount="}{.restartCount}{"\n"}{"  state="}{.state}{"\n"}{"  lastState="}{.lastState}{"\n"}{end}' || true
            echo "=== Container Waiting States (if any containers are waiting) ==="
            oc get pod -n openshift-gitops $pod -o jsonpath='{range .status.containerStatuses[?(@.state.waiting)]}{.name}{": waiting - reason="}{.state.waiting.reason}{" message="}{.state.waiting.message}{"\n"}{end}' || echo "No containers in waiting state"
            echo "=== Readiness Probe Status ==="
            oc get pod -n openshift-gitops $pod -o jsonpath='{range .status.containerStatuses[*]}{.name}{": started="}{.started}{" ready="}{.ready}{"\n"}{end}' || true
            echo "=== Init Container Statuses for pod: $pod ==="
            oc get pod -n openshift-gitops $pod -o jsonpath='{range .status.initContainerStatuses[*]}{.name}{": "}{"ready="}{.ready}{" state="}{.state}{"\n"}{end}' || true
            echo "=== Current Logs from pod: $pod (all containers) ==="
            oc logs -n openshift-gitops $pod --all-containers=true --tail=200 || true
            echo "=== Previous container logs (if crashed): $pod ==="
            oc logs -n openshift-gitops $pod --all-containers=true --previous --tail=200 2>/dev/null || echo "No previous logs available"
            echo ""
          fi
        done
        scripts/openshift-CI-kuttl-tests.sh
        make e2e-tests-sequential
      from: dependencies
      resources:
        requests:
          cpu: "2"
          memory: 6Gi
      timeout: 3h30m0s
    workflow: ipi-aws
