build_root:
  project_image:
    dockerfile_literal: |
      FROM registry.access.redhat.com/ubi9/python-311:latest
      USER 0:0
images:
- dockerfile_path: Dockerfile
  to: assisted-image-mcp
releases:
  latest:
    integration:
      include_built_images: true
      name: "4.20"
      namespace: ocp
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: unit
  commands: |
    pip install uv
    make test
  container:
    from: src
- as: eval-test
  cluster_claim:
    architecture: amd64
    cloud: aws
    owner: openshift-assisted
    product: ocp
    timeout: 1h0m0s
    version: "4.17"
  steps:
    allow_best_effort_post_steps: true
    dependencies:
      ASSISTED_CHAT_IMG: ""
      ASSISTED_CHAT_TEST: ""
      ASSISTED_MCP_IMG: assisted-image-mcp
    workflow: rh-ecosystem-edge-assisted-chat
zz_generated_metadata:
  branch: master
  org: openshift-assisted
  repo: assisted-service-mcp
