build_root:
  image_stream_tag:
    name: release
    namespace: openshift
    tag: rhel-9-release-golang-1.24-openshift-4.21
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
test_binary_build_commands: make install-uv
tests:
- as: test-ci
  commands: export PATH="$HOME/.local/bin:$PATH" && make test-ci
  container:
    from: test-bin
zz_generated_metadata:
  branch: main
  org: openshift-kni
  repo: ai-sandbox
