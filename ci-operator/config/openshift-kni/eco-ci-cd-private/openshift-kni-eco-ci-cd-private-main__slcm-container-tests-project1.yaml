base_images:
  base:
    name: "4.18"
    namespace: ocp
    tag: base
build_root:
  project_image:
    dockerfile_literal: |-
      FROM registry.ci.openshift.org/ci/telco-runner
      RUN dnf install -y rsync
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: eco-ci-cd
  capabilities:
  - intranet
  cron: 00 10 * * 2
  reporter_config:
    channel: '#eco-ci-cd-notifications'
    job_states_to_report:
    - failure
    - error
    - success
    - aborted
    report_template: '{{if eq .Status.State "success"}} :slack-green: Job *{{.Spec.Job}}*
      ended with *{{.Status.State}}*. <{{.Status.URL}}|View logs> {{else}} :failed:
      Job *{{.Spec.Job}}* ended with *{{.Status.State}}*. <{{.Status.URL}}|View logs>
      {{end}}'
  steps:
    test:
    - ref: telcov10n-slcm-slcm-project-01-container-tests
zz_generated_metadata:
  branch: main
  org: openshift-kni
  repo: eco-ci-cd-private
  variant: slcm-container-tests-project1
