base_images:
  base:
    name: "4.16"
    namespace: ocp
    tag: base
build_root:
  image_stream_tag:
    name: telco-bastion
    namespace: ci
    tag: latest
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: slcm-lab
  capabilities:
  - intranet
  cron: 00 13 * * 1
  reporter_config:
    channel: '#eco-ci-cd-notifications'
    job_states_to_report:
    - failure
    - error
    - success
    - aborted
    report_template: '{{if eq .Status.State "success"}} :slack-green: Job *{{.Spec.Job}}*
      ended with *{{.Status.State}}*. <{{.Status.URL}}|View logs> {{else}} :failed:
      Job *{{.Spec.Job}}* ended with *{{.Status.State}}*. <{{.Status.URL}}|View logs>
      {{end}}'
  steps:
    test:
    - ref: telcov10n-slcm-lab-ping
zz_generated_metadata:
  branch: main
  org: openshift-kni
  repo: eco-ci-cd-private
  variant: slcm-lab
