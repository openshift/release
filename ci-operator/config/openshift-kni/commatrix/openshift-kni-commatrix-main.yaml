base_images:
  cli:
    name: "4.20"
    namespace: ocp
    tag: cli
  ocp_builder_rhel-9-golang-1.23-openshift-4.20:
    name: builder
    namespace: ocp
    tag: rhel-9-golang-1.23-openshift-4.20
build_root:
  from_repository: true
images:
- dockerfile_literal: |
    FROM this-is-ignored
    WORKDIR /go/src/github.com/openshift-kni/commatrix
    RUN chmod -R a+w /go/src/github.com/openshift-kni/commatrix

    COPY oc /usr/bin/oc
    COPY app/ .

    # Build the commatrix binary
    RUN go mod vendor && \
        make build && \
        make install INSTALL_DIR=/usr/bin/
  from: ocp_builder_rhel-9-golang-1.23-openshift-4.20
  inputs:
    cli:
      paths:
      - destination_dir: .
        source_path: /usr/bin/oc
    src:
      paths:
      - destination_dir: app
        source_path: /go/src/github.com/openshift-kni/commatrix/.
  optional: true
  to: commatrix-binary
promotion:
  to:
  - name: "4.20"
    namespace: ocp
releases:
  initial:
    integration:
      name: "4.20"
      namespace: ocp
  latest:
    candidate:
      product: ocp
      stream: ci
      version: "4.20"
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: unit-test
  commands: make test
  container:
    from: src
- as: lint
  commands: make lint
  container:
    from: src
- as: commatrix-e2e-tests
  steps:
    cluster_profile: aws-telco
    env:
      BASE_DOMAIN: telco5g-ci.devcluster.openshift.com
      USER_TAGS: |
        ci-job-source prowci
        ci-job-branch main
        ci-job-fullname openshift-kni-commatrix-e2e-tests-main
        ci-job-type commatrix-e2e-tests
        ci-repo-name commatrix
        ci-org-name openshift-kni
    test:
    - as: commatrix-e2e-tests
      commands: |
        # Change to the directory where vendor was created during build
        cd /go/src/github.com/openshift-kni/commatrix
        # Verify the binary is available
        oc-commatrix --help
        # Use the pre-built commatrix binary from the image
        PATH="/usr/bin:$PATH" GOCACHE=/tmp/go-cache make e2e-test
      from: commatrix-binary
      resources:
        requests:
          cpu: 100m
          memory: 200Mi
    - ref: openshift-e2e-test
    workflow: openshift-e2e-aws-ovn-serial
- as: security
  optional: true
  steps:
    env:
      PROJECT_NAME: commatrix
      SNYK_CODE_ADDITIONAL_ARGS: --severity-threshold=high --policy-path=.snyk
    workflow: openshift-ci-security
zz_generated_metadata:
  branch: main
  org: openshift-kni
  repo: commatrix
