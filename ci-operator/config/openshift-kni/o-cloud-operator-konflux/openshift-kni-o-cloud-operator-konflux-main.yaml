build_root:
  project_image:
    dockerfile_literal: |
      FROM quay-proxy.ci.openshift.org/openshift/ci:ocp_ubi-python-311_9
      USER 0
      RUN dnf -y install git python3 python3-pip && python3 -m pip install yamllint
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: yamllint
  commands: yamllint -c .yamllint.yaml .
  container:
    from: src
zz_generated_metadata:
  branch: main
  org: openshift-kni
  repo: o-cloud-operator-konflux
