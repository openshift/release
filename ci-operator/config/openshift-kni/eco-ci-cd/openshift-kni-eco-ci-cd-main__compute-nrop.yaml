      CLUSTER_NAME: helix47
      OPERATORS: |
        [
            {"name":"numaresources-operator","catalog":"redhat-operators","nsname":"openshift-numaresources","deploy_default_config":false,"channel":"4.21"}
        ]
      TEST_ENV: prod
      VERSION: "4.21"
    workflow: telcov10n-functional-compute-nrop-nrop-testing
