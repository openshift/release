build_root:
  image_stream_tag:
    name: eco-ci-cd
    namespace: telcov10n-ci
    tag: eco-ci-cd
releases:
  latest:
    candidate:
      product: ocp
      stream: nightly
      version: "5.0"
resources:
  '*':
    limits:
      cpu: 500m
      memory: 4Gi
    requests:
      cpu: 500m
      memory: 200Mi
tests:
- as: e2e-telcov10n-nrop-tests-5-0-nightly
  capabilities:
  - intranet
  cron: 0 12 * * 0
  steps:
    env:
      CLUSTER_NAME: helix47
      OCP_VERSION_RELEASE_TYPE: nightly
      OPERATORS: |
        [
          { "name": "numaresources-operator", "catalog": "numaresources-operator-fbc", "og_name": "numaresources-operator", "nsname": "openshift-numaresources", "deploy_default_config": false, "fbc_iib_repo": "latest", "channel": "5.0", "ocp_operator_mirror_fbc_image_base": "quay.io/redhat-user-workloads/telco-5g-tenant/numaresources-operator-fbc-5-0" }
        ]
      TEST_ENV: stage
      VERSION: "5.0"
    workflow: telcov10n-functional-cnf-compute-nrop-testing
- as: e2e-telcov10n-nrop-tests-compact-5-0-nightly
  capabilities:
  - intranet
  cron: 0 12 * * 0
  steps:
    env:
      CLUSTER_NAME: kni-qe-52
      OCP_VERSION_RELEASE_TYPE: nightly
      OPERATORS: |
        [
          { "name": "numaresources-operator", "catalog": "numaresources-operator-fbc", "og_name": "numaresources-operator", "nsname": "openshift-numaresources", "deploy_default_config": false, "fbc_iib_repo": "latest", "channel": "5.0", "ocp_operator_mirror_fbc_image_base": "quay.io/redhat-user-workloads/telco-5g-tenant/numaresources-operator-fbc-5-0" }
        ]
      TEST_ENV: stage
      VERSION: "5.0"
      WORKLOAD_PARTITIONING: "true"
    workflow: telcov10n-functional-cnf-compute-nrop-testing
zz_generated_metadata:
  branch: main
  org: openshift-kni
  repo: eco-ci-cd
  variant: cnf-compute-nrop-nightly
