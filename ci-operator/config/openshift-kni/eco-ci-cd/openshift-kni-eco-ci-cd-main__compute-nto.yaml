build_root:
  image_stream_tag:
    name: eco-ci-cd
    namespace: telcov10n-ci
    tag: eco-ci-cd
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: e2e-telcov10n-nto-tests-v2-t0-crun-bm-4-21
  capabilities:
  - intranet
  cron: 59 23 * * 0
  reporter_config:
    channel: '#eco-ci-cd-notifications'
    job_states_to_report:
    - failure
    - error
    - success
    - aborted
    report_template: '{{if eq .Status.State "success"}} :slack-green: Job *{{.Spec.Job}}*
      ended with *{{.Status.State}}*. <{{.Status.URL}}|View logs> {{else}} :failed:
      Job *{{.Spec.Job}}* ended with *{{.Status.State}}*. <{{.Status.URL}}|View logs>
      {{end}}'
  steps:
    env:
      CGROUP_VERSION: v2
      CLUSTER_NAME: hlxcl15
      CONTAINER_RUNTIME: crun
      FEATURES: compute
      HUGEPAGES_DEFAULT_SIZE: 1G
      HUGEPAGES_PAGES: '[{"count": 1, "size": "1G"}, {"count": 128, "size": "2M"}]'
      LABEL_FILTER: tier-0
      LABELS: nto
      RT_KERNEL: "true"
      VERSION: "4.21"
    test:
    - ref: telcov10n-functional-compute-nto-eco-gotests
    workflow: telcov10n-functional-compute-nto-ocp-setup
