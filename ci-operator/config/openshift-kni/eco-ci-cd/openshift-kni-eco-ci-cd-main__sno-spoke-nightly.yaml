build_root:
  project_image:
    dockerfile_literal: |
      FROM registry.ci.openshift.org/ci/telco-runner
      RUN \
        curl -fsSL -o /tmp/get_helm.sh https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 && \
        chmod 700 /tmp/get_helm.sh && \
        /tmp/get_helm.sh && \
        rm -f /tmp/get_helm.sh
