build_root:
  project_image:
    dockerfile_literal: |
      FROM quay.io/multi-arch/yq:4.30.5 as yq4
      FROM registry.redhat.io/openshift4/ztp-site-generate-rhel8:v4.15 AS ztp-gen
      WORKDIR /home/ztp
      FROM registry.ci.openshift.org/ci/telco-runner
      COPY --from=yq4 /usr/bin/yq /usr/bin/yq
      COPY --from=ztp-gen /home/ztp /output/ztp
      RUN \
        curl -fsSL -o /tmp/get_helm.sh https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 && \
        chmod 700 /tmp/get_helm.sh && \
        /tmp/get_helm.sh && \
        rm -f /tmp/get_helm.sh
releases:
  latest:
    candidate:
      product: ocp
      stream: nightly
      version: "4.15"
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
