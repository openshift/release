build_root:
  image_stream_tag:
    name: eco-ci-cd
    namespace: telcov10n-ci
    tag: eco-ci-cd
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: cnf-ran-ztp-tests
  capabilities:
  - intranet
  cron: 0 6 * * 0
  steps:
    env:
      CLUSTER_NAME: kni-qe-111
      DISABLE_INSIGHTS: "true"
      ECO_GOTESTS_LABELS: '!no-container'
      HUB_OPERATORS: |
        [
          {"name":"local-storage-operator","catalog":"redhat-operators-storage-art","fbc_iib_repo":"ose-local-storage-rhel9-operator","nsname":"openshift-local-storage","channel":"stable","og_name":"local-operator-group","subscription_name":"local-storage-operator","deploy_default_config":false,"ns_labels":{"workload.openshift.io/allowed":"management"}},
          {"name":"openshift-gitops-operator","catalog":"redhat-operators","nsname":"openshift-gitops-operator","channel":"latest","catalog_version_override":"4.22","og_name":"openshift-gitops-operator","subscription_name":"openshift-gitops-operator","deploy_default_config":false,"og_spec":{"targetNamespaces":[]}},
          {"name":"advanced-cluster-management","catalog":"redhat-operators-acm-fbc","fbc_iib_repo":"latest-2.17","bundle_version":"v2.17","ocp_operator_mirror_fbc_image_base":"quay.io:443/acm-d/acm-dev-catalog","nsname":"open-cluster-management","channel":"release-2.17","og_name":"open-cluster-management","subscription_name":"acm-operator-subscription","deploy_default_config":false,"multifile_catalog":true,"og_spec":{"targetNamespaces":["open-cluster-management"]}},
          {"name":"multicluster-engine","catalog":"redhat-operators-mce-fbc","nsname":"multicluster-engine","fbc_iib_repo":"latest-2.17","bundle_version":"v2.17","ocp_operator_mirror_fbc_image_base":"quay.io:443/acm-d/mce-dev-catalog","channel":"stable-2.17","og_name":"multicluster-engine","subscription_name":"multicluster-engine","deploy_default_config":true,"multifile_catalog":true,"og_spec":{}},
          {"name":"topology-aware-lifecycle-manager","catalog":"topology-aware-lifecycle-manager-fbc","og_name":"global-operators","nsname":"openshift-operators","fbc_iib_repo":"latest","channel":"stable","deploy_default_config":false,"ocp_operator_mirror_fbc_image_base":"quay.io/redhat-user-workloads/telco-5g-tenant/topology-aware-lifecycle-manager-fbc-5-0"}
        ]
      METRICS_LIST: spoke_general_ocp,hub_general_ocp,sriov,sriov_fec,ptp,acm,talm,gitops,local_storage,logging
      PTP_CYCLE_CONFIGS: '[{"name": "ntpfailover", "urls": [ "https://gitlab.cee.redhat.com/telcov10n/ztp-site-configs-ci/-/raw/ptp_gm/policygentemplates/5.0/ptp-test/PtpConfigGmWpcNtpCustom.yaml",
        "https://gitlab.cee.redhat.com/telcov10n/ztp-site-configs-ci/-/raw/ptp_gm/policygentemplates/5.0/ptp-test/PtpConfigSlaveNtpCustom.yaml"
        ]}]'
      REPORTER_LAUNCH_NAME: telco-ft-ran-ptp-gm
      REPORTER_TEMPLATE_NAME: Telco 5G RAN Regression 5_0 - Telco 5G RAN Regression
        - <build> - 5.0
      REPORTPORTAL_FILES: .reportportal_url_PTP_GM
      SPOKE_CLUSTER: '[''helix48'']'
      SPOKE_CLUSTER_LABEL_SELECTOR: sites=helix48
      SPOKE_OPERATORS: |
        [
          {"name":"sriov-fec","catalog":"certified-operators","catalog_version_override":"4.22","nsname":"vran-acceleration-operators","channel":"stable"},
          {"name":"ptp-operator","catalog":"redhat-operators-ptp-art","fbc_iib_repo":"ose-ptp-rhel9-operator","nsname":"openshift-ptp","channel":"stable","ns_labels":{"workload.openshift.io/allowed":"management","name":"openshift-ptp"}},
          {"name":"sriov-network-operator","catalog":"redhat-operators-sriov-art","fbc_iib_repo":"ose-sriov-network-rhel9-operator","nsname":"openshift-sriov-network-operator","channel":"stable","og_name":"sriov-network-operators","subscription_name":"sriov-network-operator-subscription"},
          {"name":"cluster-logging","catalog":"redhat-operators-logging-fbc","og_name":"cluster-logging","nsname":"openshift-logging","fbc_iib_repo":"logging-6.6__v4.22__cluster-logging-rhel9-operator","channel":"stable-6.6","subscription_name":"cluster-logging","og_spec":{"targetNamespaces":[]},"ocp_operator_mirror_fbc_image_base":"quay.io/redhat-user-workloads/ocp-art-tenant/art-fbc"},
          {"name":"local-storage-operator","fbc_iib_repo":"ose-local-storage-rhel9-operator","catalog":"redhat-operators-storage-art","nsname":"openshift-local-storage","channel":"stable","og_name":"local-operator-group","subscription_name":"local-storage-operator","deploy_default_config":false,"ns_labels":{"workload.openshift.io/allowed":"management"}}
        ]
      VERSION: "5.0"
      ZTP_GIT_BRANCH: ptp_gm
      ZTP_GIT_REPO: https://gitlab.cee.redhat.com/telcov10n/ztp-site-configs-ci.git
    workflow: telcov10n-functional-cnf-ran-ptp-gm-ztp
