base_images:
  cli:
    name: "4.18"
    namespace: ocp
    tag: cli
build_root:
  image_stream_tag:
    name: release
    namespace: openshift
    tag: rhel-8-release-golang-1.22-openshift-4.18
images:
- dockerfile_literal: |
    FROM golang:1.21
    WORKDIR /tmp
    ENV GOPATH=/tmp/go
    ENV GOBIN=/tmp/go/bin
    ENV GOCACHE=/tmp/.cache/go-build
    ENV PATH=$PATH:$GOBIN
    RUN mkdir -p /tmp/go/bin $GOCACHE \
        && chmod -R 777 /tmp/go/bin $GOPATH $GOCACHE
    RUN apt-get update && apt-get install -y jq vim libreadline-dev podman awscli
    RUN go install github.com/kyverno/chainsaw@v0.2.0
    RUN curl -LO https://mirror.openshift.com/pub/openshift-v4/x86_64/clients/ocp/latest/openshift-client-linux.tar.gz \
        && tar -xzf openshift-client-linux.tar.gz \
        && chmod +x oc kubectl \
        && mv oc kubectl /usr/local/bin/
    RUN mkdir -p /.local \
        && useradd podman \
        && chown podman:podman -R /.local \
        && chmod 777 /.local \
        && echo podman:10000:1000 > /etc/subuid \
        && echo podman:10000:1000 > /etc/subgid \
        && mkdir -p /home/podman \
        && chown podman:podman -R /home/podman
    USER podman
  to: distributed-tracing-tests-runner-telco
releases:
  latest:
    candidate:
      product: ocp
      stream: nightly
      version: "4.18"
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: telco-dast-ci
  capabilities:
  - intranet
  cron: 00 13 * * 1
  steps:
    cluster_profile: equinix-ocp-metal-qe
    env:
      ADDITIONAL_WORKER_ARCHITECTURE: x86_64
      ADDITIONAL_WORKERS: "0"
      ADDITIONAL_WORKERS_DAY2: "false"
      AGENT_PLATFORM_TYPE: none
      AUX_HOST: openshift-qe-metal-ci.arm.eng.rdu2.redhat.com
      DAST_TEST_BRANCH: fix-dast-emptydir
      DAST_TEST_REPO: https://github.com/oblau/eco-ci-cd.git
      DISCONNECTED: "false"
      OPERATORS: |
        [
          {"name": "lifecycle-agent", "source": "redhat-operators", "channel": "stable", "install_namespace": "openshift-lifecycle-agent","target_namespaces": "openshift-lifecycle-agent", "operator_group": "lifecycle-agent"},
          {"name": "ptp-operator", "source": "redhat-operators", "channel": "stable", "install_namespace": "openshift-ptp","target_namespaces": "openshift-ptp", "operator_group": "ptp-operators"},
          {"name": "numaresources-operator", "source": "redhat-operators", "channel": "4.18", "install_namespace": "openshift-numaresources","target_namespaces": "openshift-numaresources", "operator_group": "numaresources-operator"}
        ]
      RESERVE_BOOTSTRAP: "false"
      architecture: amd64
      ipv4_enabled: "true"
      ipv6_enabled: "true"
      masters: "1"
      workers: "0"
    test:
    - ref: telcov10n-functional-dast-tests
    workflow: telcov10n-functional-dast-setup
zz_generated_metadata:
  branch: main
  org: openshift-kni
  repo: eco-ci-cd
  variant: telco-operators-dast-4.18
