base_images:
  ansible:
    name: "4.21"
    namespace: ocp
    tag: ansible
  base:
    name: "4.21"
    namespace: ocp
    tag: base
releases:
  latest:
    release:
      channel: stable
      version: "4.21"
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: e2e-telcov10n-functional-cnf-compute-llc-stable
  capabilities:
  - intranet
  cron: 00 08 * * 0
  reporter_config:
    channel: '#eco-ci-cd-notifications'
    job_states_to_report:
    - failure
    - error
    - success
    - aborted
    report_template: '{{if eq .Status.State "success"}} :slack-green: Job *{{.Spec.Job}}*
      ended with *{{.Status.State}}*. <{{.Status.URL}}|View logs> {{else}} :failed:
      Job *{{.Spec.Job}}* ended with *{{.Status.State}}*. <{{.Status.URL}}|View logs>
      {{end}}'
  steps:
    env:
      T5CI_JOB_TYPE: stable
      T5CI_VERSION: "4.21"
    observers:
      enable:
      - observers-resource-watch
    workflow: telcov10n-functional-cnf-compute-llc
zz_generated_metadata:
  branch: main
  org: openshift-kni
  repo: eco-ci-cd
  variant: cnf-compute-llc-4.21
