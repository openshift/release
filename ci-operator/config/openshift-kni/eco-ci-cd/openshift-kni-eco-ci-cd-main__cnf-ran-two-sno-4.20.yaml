build_root:
  image_stream_tag:
    name: eco-ci-cd
    namespace: telcov10n-ci
    tag: eco-ci-cd
releases:
  latest:
    candidate:
      product: ocp
      stream: nightly
      version: "4.20"
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: cnf-ran-ztp-tests
  capabilities:
  - intranet
  cron: 0 23 31 2 *
  steps:
    env:
      CLUSTER_NAME: fthub-01
      VERSION: "4.20"
    pre:
    - ref: telcov10n-functional-cnf-ran-hub-deploy
zz_generated_metadata:
  branch: main
  org: openshift-kni
  repo: eco-ci-cd
  variant: cnf-ran-two-sno-4.20
