base_images:
  base:
    name: "4.17"
    namespace: ocp
    tag: ansible
  cli:
    name: "4.17"
    namespace: ocp
    tag: cli
build_root:
  project_image:
    dockerfile_literal: |-
      FROM registry.ci.openshift.org/ci/telco-runner
      RUN pip3 install --no-cache-dir \
            "pytest==8.2.2" \
            "pytest-shell==0.3.2" \
            "requests[socks]==2.32.3" \
            "netaddr==1.3.0"
releases:
  latest:
    release:
      architecture: amd64
      channel: candidate
      version: "4.17"
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: telcov10n-virtualised-single-node-hub-ztp
  cluster: build05
  cron: '* 1 * * *'
  steps:
    cluster_profile: equinix-ocp-metal-qe
    env:
      AUX_HOST: 10.6.132.34
      MCH_NAMESPACE: open-cluster-management
      OCP_HUB_VERSION: "4.17"
      OPERATORS: |
        # - local-storage-operator
        - lvms-operator
        - openshift-gitops-operator
        - advanced-cluster-management
        - topology-aware-lifecycle-manager
        # - multicluster-engine
      SHARED_HUB_CLUSTER_PROFILE: ztp-hub-preserved-prod-cluster_profile_dir
      SOCKS5_PROXY: socks5h://10.6.132.34:3124
    test:
    - ref: install-operators-verify
    - ref: telcov10n-sno-hub-ztp-verify-hub
    workflow: telcov10n-virtualised-single-node-hub-ztp
zz_generated_metadata:
  branch: ztp-left-shifting-kpi
  org: openshift-kni
  repo: eco-ci-cd
  variant: ci-4.17
