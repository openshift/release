build_root:
  project_image:
    dockerfile_literal: |
      FROM quay.io/ccardenosa/eco-ci-cd:latest
      RUN chmod -R g+w /eco-ci-cd/inventories
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 200m
      memory: 300Mi
tests:
- as: deploy-ztp-infra
  capabilities:
  - intranet
  cron: 0 6 31 2 *
  reporter_config:
    channel: '#eco-ci-cd-notifications'
    job_states_to_report:
    - failure
    - error
    - success
    - aborted
    report_template: '{{if eq .Status.State "success"}} :slack-green: Job *{{.Spec.Job}}*
      ended with *{{.Status.State}}*. <{{.Status.URL}}|View logs> {{else}} :failed:
      Job *{{.Spec.Job}}* ended with *{{.Status.State}}*. <{{.Status.URL}}|View logs>
      {{end}}'
  steps:
    env:
      HUB_CLUSTER: kni-qe-71
      INFRA_SETTINGS: |-
        {
          "deploy_vm_bastion": {
            "skip": true,
            "debug_on_fail": true
          },
          "deploy_sno_hub": {
            "skip": true,
            "debug_on_fail": true,
            "hub_lockdown_uri": "https://gitlab.cee.redhat.com/ran/dev-kpi-pipeline/-/raw/prow-lockdowns/hub/defaults/lockdown-hub-4.22-x86_64.json"
          },
          "install_hub_operators": {
            "skip": true,
            "debug_on_fail": true,
            "hub_lockdown_uri": "https://gitlab.cee.redhat.com/ran/dev-kpi-pipeline/-/raw/prow-lockdowns/hub/defaults/lockdown-hub-4.22-x86_64.json"
          },
          "hub_config": {
            "skip": true,
            "debug_on_fail": true,
            "debug_timeout": "+11 min"
          },
          "mirror_spoke_operators": {
            "skip": true,
            "debug_on_fail": true,
            "version": "4.22",
            "spoke_lockdown_uri": "https://gitlab.cee.redhat.com/ran/dev-kpi-pipeline/-/raw/prow-lockdowns/spoke/defaults/lockdown-spoke-4.22-x86_64.json"
          },
          "mirror_ran_test_images": {
            "skip": true,
            "debug_on_fail": true,
            "ran_images": {
              "images": [
                "quay.io/telcov10n-ci/oslat:latest",
                "quay.io/telcov10n-ci/cyclictest:latest",
                "quay.io/telcov10n-ci/cnf-tests:4.8",
                "quay.io/telcov10n-ci/stress-ng:latest",
                "quay.io/telcov10n-ci/cnf-gotests-client:latest",
                "quay.io/telcov10n-ci/dpdk-testpmd:latest",
                "quay.io/telcov10n-ci/process-exporter:ppid-2",
                "quay.io/telcov10n-ci/fedora-stress-ng:latest",
                "quay.io/telcov10n-ci/curl:latest",
                "quay.io/telcov10n-ci/sampleapp:latest",
                "quay.io/telcov10n-ci/kubectl:latest",
                "quay.io/telcov10n-ci/rtla:latest",
                "quay.io/telcov10n-ci/oran-subscriber:latest"
              ]
            }
          },
          "deploy_spoke_ztp": {
            "skip": false,
            "debug_on_fail": true,
            "lockdown_uri": "https://gitlab.cee.redhat.com/ran/dev-kpi-pipeline/-/raw/prow-lockdowns/spoke/defaults/lockdown-spoke-4.22-x86_64.json",
            "ztp_git_branch": "spree-02-kpi-4.22-prow"
          }
        }
      SPOKE_CLUSTER: spree-02
    test:
    - as: infra-complete
      commands: echo "ZTP infrastructure deployment completed successfully"
      from: root
      resources:
        requests:
          cpu: 100m
          memory: 100Mi
    workflow: telcov10n-system-telco-kpis-deploy-ztp-infra
- as: run-1hr-tests
  capabilities:
  - intranet
  cron: 0 6 31 2 *
  reporter_config:
    channel: '#eco-ci-cd-notifications'
    job_states_to_report:
    - failure
    - error
    - success
    - aborted
    report_template: '{{if eq .Status.State "success"}} :slack-green: Job *{{.Spec.Job}}*
      ended with *{{.Status.State}}*. <{{.Status.URL}}|View logs> {{else}} :failed:
      Job *{{.Spec.Job}}* ended with *{{.Status.State}}*. <{{.Status.URL}}|View logs>
      {{end}}'
  steps:
    env:
      HUB_CLUSTER: kni-qe-71
      INFRA_SETTINGS: |-
        {
          "deploy_vm_bastion": {
            "skip": false,
            "debug_on_fail": true
          },
          "deploy_sno_hub": {
            "skip": false,
            "debug_on_fail": true,
            "hub_lockdown_uri": "https://gitlab.cee.redhat.com/ran/dev-kpi-pipeline/-/raw/prow-lockdowns/hub/defaults/lockdown-hub-4.22-x86_64.json"
          },
          "install_hub_operators": {
            "skip": false,
            "debug_on_fail": true,
            "hub_lockdown_uri": "https://gitlab.cee.redhat.com/ran/dev-kpi-pipeline/-/raw/prow-lockdowns/hub/defaults/lockdown-hub-4.22-x86_64.json"
          },
          "hub_config": {
            "skip": false,
            "debug_on_fail": true,
            "debug_timeout": "+11 min"
          },
          "mirror_spoke_operators": {
            "skip": false,
            "debug_on_fail": true,
            "spoke_lockdown_uri": "https://gitlab.cee.redhat.com/ran/dev-kpi-pipeline/-/raw/prow-lockdowns/spoke/defaults/lockdown-spoke-4.22-x86_64.json"
          },
          "mirror_ran_test_images": {
            "skip": false,
            "debug_on_fail": true,
            "ran_images": {
              "images": [
                "quay.io/telcov10n-ci/oslat:latest",
                "quay.io/telcov10n-ci/cyclictest:latest",
                "quay.io/telcov10n-ci/cnf-tests:4.8",
                "quay.io/telcov10n-ci/stress-ng:latest",
                "quay.io/telcov10n-ci/cnf-gotests-client:latest",
                "quay.io/telcov10n-ci/dpdk-testpmd:latest",
                "quay.io/telcov10n-ci/process-exporter:ppid-2",
                "quay.io/telcov10n-ci/fedora-stress-ng:latest",
                "quay.io/telcov10n-ci/curl:latest",
                "quay.io/telcov10n-ci/sampleapp:latest",
                "quay.io/telcov10n-ci/kubectl:latest",
                "quay.io/telcov10n-ci/rtla:latest",
                "quay.io/telcov10n-ci/oran-subscriber:latest"
              ]
            }
          },
          "deploy_spoke_ztp": {
            "skip": false,
            "debug_on_fail": true,
            "lockdown_uri": "https://gitlab.cee.redhat.com/ran/dev-kpi-pipeline/-/raw/prow-lockdowns/spoke/defaults/lockdown-spoke-4.22-x86_64.json",
            "ztp_git_branch": "spree-02-kpi-4.22-prow"
          }
        }
      REPORTING_SETTINGS: |-
        {
          "generate_report": {
            "skip": false,
            "development_mode": true
          }
        }
      SPOKE_CLUSTER: spree-02
      TEST_SETTINGS: |-
        {
          "collect_node_info": {
            "skip": false
          },
          "bios_validation": {
            "skip": false,
            "continue_on_fail": true,
            "bios_profile_url": "https://gitlab.cee.redhat.com/ocp-edge-qe/ztp-site-configs/-/raw/spree-02-kpi-4.22-prow/siteconfig/bios/kpi.profile"
          },
          "oslat": {
            "skip": false,
            "duration": "1h"
          },
          "cyclictest": {
            "skip": false,
            "duration": "1h"
          },
          "ptp": {
            "skip": false,
            "duration": "1h"
          },
          "cpu_util": {
            "skip": false,
            "duration": "1h"
          },
          "rfc2544": {
            "skip": false,
            "duration": "1h"
          },
          "reboot": {
            "skip": false,
            "reboot_count": "6"
          },
          "rds_compare": {
            "skip": false,
            "continue_on_fail": true
          }
        }
    workflow: telcov10n-system-telco-kpis-tests
zz_generated_metadata:
  branch: main
  org: openshift-kni
  repo: eco-ci-cd
  variant: telco-kpis
