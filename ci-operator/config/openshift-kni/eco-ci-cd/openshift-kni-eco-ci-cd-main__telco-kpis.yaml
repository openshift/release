build_root:
  project_image:
    dockerfile_literal: |
      FROM quay.io/ccardenosa/eco-ci-cd:latest
      RUN chmod -R g+w /eco-ci-cd/inventories
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 200m
      memory: 300Mi
tests:
- as: telco-kpis-ztp-tests
  capabilities:
  - intranet
  cron: 0 6 31 2 *
  reporter_config:
    channel: '#telco-kpis-ci-notifications'
    job_states_to_report:
    - failure
    - error
    - success
    - aborted
    report_template: '{{if eq .Status.State "success"}} :slack-green: Job *{{.Spec.Job}}*
      ended with *{{.Status.State}}*. <{{.Status.URL}}|View logs> {{else}} :failed:
      Job *{{.Spec.Job}}* ended with *{{.Status.State}}*. <{{.Status.URL}}|View logs>
      {{end}}'
  steps:
    env:
      HUB_CLUSTER: kni-qe-70
      INFRA_SETTINGS: |-
        {
          "deploy_sno_hub": {
            "version": "4.21"
          },
          "install_hub_operators": {
            "hub_lockdown_uri": "https://gitlab.cee.redhat.com/ran/dev-kpi-pipeline/-/raw/prow-lockdowns/hub/defaults/lockdown-hub-x86_64.json"
          },
          "mirror_spoke_operators": {
            "version": "4.21",
            "spoke_lockdown_uri": "https://gitlab.cee.redhat.com/ran/dev-kpi-pipeline/-/raw/prow-lockdowns/spoke/defaults/lockdown-spoke-x86_64.json"
          },
          "mirror_ran_test_images": {
            "ran_images": {
              "images": [
                "quay.io/telcov10n-ci/oslat:latest",
                "quay.io/telcov10n-ci/cyclictest:latest",
                "quay.io/telcov10n-ci/cnf-tests:4.8",
                "quay.io/telcov10n-ci/stress-ng:latest",
                "quay.io/telcov10n-ci/cnf-gotests-client:latest",
                "quay.io/telcov10n-ci/dpdk-testpmd:latest",
                "quay.io/telcov10n-ci/process-exporter:ppid-2",
                "quay.io/telcov10n-ci/fedora-stress-ng:latest",
                "quay.io/telcov10n-ci/curl:latest",
                "quay.io/telcov10n-ci/sampleapp:latest",
                "quay.io/telcov10n-ci/kubectl:latest",
                "quay.io/telcov10n-ci/rtla:latest",
                "quay.io/telcov10n-ci/oran-subscriber:latest"
              ]
            }
          }
        }
      PR_ONLY: "true"
      REPORTING_SETTINGS: |-
        {
          "generate_report": { "development_mode": true }
        }
      SPOKE: spree-02
      SPOKE_CLUSTER: spree-02
      TEST_SETTINGS: |-
        {
          "collect_node_info": { "skip": true },
          "bios_validation": { "continue_on_fail": true },
          "oslat": { "duration": "10m" },
          "cyclictest": { "duration": "10m" },
          "ptp": { "duration": "10m" },
          "cpu_util": { "duration": "10m" },
          "rfc2544": { "duration": "10m" },
          "reboot": { "reboot_count": "1" },
          "rds_compare": { "continue_on_fail": true }
        }
      TIMEOUT: +10 min
      VERSION: "4.21"
      ZTP_CLUSTERS_PATH: siteconfig
      ZTP_GIT_BRANCH: ""
      ZTP_GIT_REPO: https://gitlab.cee.redhat.com/ocp-edge-qe/ztp-site-configs.git
      ZTP_POLICIES_PATH: policygentemplates
    post:
    - ref: telcov10n-system-telco-kpis-wait-to-debug
    - chain: telcov10n-system-telco-kpis-reporting
    pre:
    - ref: telcov10n-system-telco-kpis-common-functions-generator
    - chain: telcov10n-system-telco-kpis-hub-deployment
    - chain: telcov10n-system-telco-kpis-spoke-deployment
    - ref: telcov10n-system-telco-kpis-mirror-ran-test-images
    test:
    - ref: telcov10n-system-telco-kpis-collect-node-info
    - ref: telcov10n-system-telco-kpis-tests-run-ztp-ai-deployment-time-test
    - ref: telcov10n-system-telco-kpis-tests-run-bios-validation-test
    - ref: telcov10n-system-telco-kpis-tests-run-oslat-test
    - ref: telcov10n-system-telco-kpis-tests-run-cyclictest-test
    - ref: telcov10n-system-telco-kpis-tests-run-ptp-test
    - ref: telcov10n-system-telco-kpis-tests-run-cpu-util-test
    - ref: telcov10n-system-telco-kpis-tests-run-reboot-test
    - ref: telcov10n-system-telco-kpis-tests-run-rfc2544-test
    - ref: telcov10n-system-telco-kpis-tests-run-rds-compare-test
zz_generated_metadata:
  branch: main
  org: openshift-kni
  repo: eco-ci-cd
  variant: telco-kpis
