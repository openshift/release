build_root:
  project_image:
    dockerfile_literal: |
      FROM quay.io/multi-arch/yq:4.30.5 as yq4
      FROM registry.redhat.io/openshift4/ztp-site-generate-rhel8 AS ztp-gen
      WORKDIR /home/ztp
      FROM registry.ci.openshift.org/ci/telco-runner
      COPY --from=yq4 /usr/bin/yq /usr/bin/yq
      COPY --from=ztp-gen /home/ztp /output/ztp
      RUN \
        curl -fsSL -o /tmp/get_helm.sh https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 && \
        chmod 700 /tmp/get_helm.sh && \
        /tmp/get_helm.sh && \
        rm -f /tmp/get_helm.sh
releases:
  latest:
    candidate:
      product: ocp
      stream: nightly
      version: "4.18"
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: telcov10n-single-node-spoke-kpis
  cluster: build05
  cron: '* 4 * * *'
  steps:
    cluster_profile: equinix-ocp-metal-qe
    env:
      AUX_HOST: 10.6.132.34
      DU_PROFILE: v4.18
      GITEA_NAMESPACE: ztp-gitea
      GLOBAL_IGNITION_CONF_OVERRIDE: '{\"ignition\": {\"version\": \"3.2.0\"}, \"storage\":
        {\"files\": [{\"overwrite\": true, \"path\": \"/etc/containers/policy.json\",
        \"contents\": {\"source\":\"data:text/plain;base64,\"}}]}}'
      INSTALL_CONFIG_OVERRIDES: |-
        {
          "capabilities": {
            "baselineCapabilitySet": "None",
            "additionalEnabledCapabilities": [
              "marketplace",
              "NodeTuning",
              "OperatorLifecycleManager",
              "Ingress"
            ]
          }
        }
      OCP_SPOKE_VERSION: "4.18"
      SHARED_HUB_CLUSTER_PROFILE: ztp-hub-preserved-prod-cluster_profile_dir
    test:
    - ref: telcov10n-single-node-spoke-kpis-tests
    workflow: telcov10n-single-node-spoke-kpis
zz_generated_metadata:
  branch: main
  org: openshift-kni
  repo: eco-ci-cd
  variant: nightly-4.18-ztp-kpis
