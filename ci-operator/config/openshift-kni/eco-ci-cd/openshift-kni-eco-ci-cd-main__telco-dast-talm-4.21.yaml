base_images:
  cli:
    name: "4.21"
    namespace: ocp
    tag: cli
releases:
  latest:
    candidate:
      product: ocp
      stream: nightly
      version: "4.21"
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: telco-dast-talm-ci
  capabilities:
  - intranet
  cron: 00 17 * * 1
  steps:
    cluster_profile: equinix-ocp-metal-qe
    env:
      AGENT_PLATFORM_TYPE: none
      AUX_HOST: openshift-qe-metal-ci.arm.eng.rdu2.redhat.com
      OPERATOR_API_PATH: openapi/v3/apis/ran.openshift.io/v1alpha1
      OPERATOR_NAME: talm
      OPERATORS: |
        [{"name": "topology-aware-lifecycle-manager", "source": "redhat-operators", "channel": "stable", "install_namespace": "","target_namespaces": "", "operator_group": ""}]
      RESERVE_BOOTSTRAP: "false"
      architecture: amd64
      ipv4_enabled: "true"
      ipv6_enabled: "true"
      masters: "1"
      workers: "0"
    test:
    - ref: telcov10n-functional-dast-test-new
    workflow: telcov10n-functional-dast-setup-new-talm
zz_generated_metadata:
  branch: main
  org: openshift-kni
  repo: eco-ci-cd
  variant: telco-dast-talm-4.21
