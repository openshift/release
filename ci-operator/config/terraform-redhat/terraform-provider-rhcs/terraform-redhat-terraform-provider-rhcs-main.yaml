binary_build_commands: make install
build_root:
  from_repository: true
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: unit
  commands: |-
    go install -mod=mod github.com/onsi/ginkgo/v2/ginkgo@v2.20.1
    unset GOFLAGS
    make unit-test
  container:
    from: src
zz_generated_metadata:
  branch: main
  org: terraform-redhat
  repo: terraform-provider-rhcs
