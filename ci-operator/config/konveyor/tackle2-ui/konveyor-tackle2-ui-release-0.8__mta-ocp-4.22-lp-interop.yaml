base_images:
  cli:
    name: "4.22"
    namespace: ocp
    tag: cli
build_root:
  image_stream_tag:
    name: release
    namespace: openshift
    tag: golang-1.20
images:
  items:
  - context_dir: cypress
    dockerfile_path: dockerfiles/interop/Dockerfile
    to: mta-runner
releases:
  latest:
    candidate:
      product: ocp
      stream: nightly
      version: "4.22"
resources:
  '*':
    requests:
      cpu: 200m
      memory: 2Gi
tests:
- as: cr-mta-aws
  cron: 0 3,15 * * *
  steps:
    cluster_profile: aws-cspi-qe
    env:
      BASE_DOMAIN: cspilp.interop.ccitredhat.com
      FIREWATCH_CONFIG: |
        {
          "failure_rules":
            [
              {"step": "mta-deploy-tackle", "failure_type": "all", "classification":  "Infrastructure Provisioning - Deploy Tackle", "group": {"name": "lp-tests", "priority": 2}, "jira_additional_labels": ["!default","interop-tests","test-initialization"]},
              {"step": "mta-tests-ui", "failure_type": "pod_failure", "classification": "Test Execution", "group": {"name": "lp-tests", "priority": 3}, "jira_additional_labels": ["!default","interop-tests"]},
              {"step": "mta-tests-ui", "failure_type": "test_failure", "classification": "Test Failure", "jira_project": "MTA", "jira_assignee": "!default", "group": {"name": "lp-tests", "priority": 3}, "jira_additional_labels": ["!default","interop-tests"]}
            ]
        }
      FIREWATCH_CONFIG_FILE_PATH: https://raw.githubusercontent.com/CSPI-QE/cspi-utils/main/firewatch-base-configs/cr/lp-interop.json
      FIREWATCH_DEFAULT_JIRA_ADDITIONAL_LABELS: '["4.22-lp","self-managed-lp","mta-lp"]'
      FIREWATCH_DEFAULT_JIRA_ASSIGNEE: sshveta@redhat.com
      FIREWATCH_DEFAULT_JIRA_PROJECT: MTA
      FIREWATCH_FAIL_WITH_TEST_FAILURES: "true"
      MAP_TESTS: "true"
      OCP_VERSION: "4.22"
      OPERATORS: |
        [
            {"name": "mta-operator", "source": "mta-421-test-catalog", "channel": "stable-v8.0", "install_namespace": "mta", "operator_group":"mta-operator-group", "target_namespaces": "mta"}
        ]
      REPORTPORTAL_CMP: MTA-lp-interop
      USER_TAGS: |
        scenario mta
    test:
    - as: mta-prepare-operator-catalog
      commands: |
        set -euo pipefail
        shopt -s inherit_errexit
        # MTA depends on RHBK (Red Hat Build of Keycloak), which is not available on the
        # OCP 4.22 redhat-operators catalog. Operator channel guidance: point OLM at
        # redhat-operator-index:v4.21 for those dependencies on OCP 4.22 clusters.
        cat <<'EOF' | oc apply -f -
        apiVersion: operators.coreos.com/v1alpha1
        kind: CatalogSource
        metadata:
          name: mta-421-test-catalog
          namespace: openshift-marketplace
        spec:
          sourceType: grpc
          image: registry.redhat.io/redhat/redhat-operator-index:v4.21
          displayName: "RHOI v4.21 for MTA deps (e.g. RHBK) on OCP 4.22"
          publisher: Red Hat
          grpcPodConfig:
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 2Gi
        EOF
        oc wait catalogsource/mta-421-test-catalog -n openshift-marketplace --for=condition=Ready --timeout=1200s
      from: cli
      resources:
        requests:
          cpu: 100m
          memory: 100Mi
    - ref: install-operators
    - ref: mta-deploy-tackle
    - ref: mta-tests-ui
    workflow: firewatch-ipi-aws-cr
- as: mta-aws-fips
  cron: 0 23 31 2 *
  steps:
    cluster_profile: aws-cspi-qe
    env:
      BASE_DOMAIN: cspilp.interop.ccitredhat.com
      FIPS_ENABLED: "true"
      FIREWATCH_CONFIG: |
        {
          "failure_rules":
            [
              {"step": "mta-deploy-tackle", "failure_type": "all", "classification":  "Infrastructure Provisioning - Deploy Tackle", "group": {"name": "lp-tests", "priority": 2}, "jira_additional_labels": ["!default","interop-tests","test-initialization"]},
              {"step": "mta-tests-ui", "failure_type": "pod_failure", "classification": "Test Execution", "group": {"name": "lp-tests", "priority": 3}, "jira_additional_labels": ["!default","interop-tests"]},
              {"step": "mta-tests-ui", "failure_type": "test_failure", "classification": "Test Failure", "jira_project": "MTA", "jira_assignee": "!default", "group": {"name": "lp-tests", "priority": 3}, "jira_additional_labels": ["!default","interop-tests"]}
            ]
        }
      FIREWATCH_CONFIG_FILE_PATH: https://raw.githubusercontent.com/CSPI-QE/cspi-utils/main/firewatch-base-configs/cr/lp-interop.json
      FIREWATCH_DEFAULT_JIRA_ADDITIONAL_LABELS: '["4.22-lp","self-managed-lp","mta-lp","fips"]'
      FIREWATCH_DEFAULT_JIRA_ASSIGNEE: sshveta@redhat.com
      FIREWATCH_DEFAULT_JIRA_PROJECT: MTA
      FIREWATCH_FAIL_WITH_TEST_FAILURES: "true"
      OPERATORS: |
        [
            {"name": "mta-operator", "source": "mta-421-test-catalog", "channel": "stable-v8.0", "install_namespace": "mta", "operator_group":"mta-operator-group", "target_namespaces": "mta"}
        ]
      USER_TAGS: |
        scenario mta
    test:
    - as: mta-prepare-operator-catalog
      commands: |
        set -euo pipefail
        shopt -s inherit_errexit
        # MTA depends on RHBK (Red Hat Build of Keycloak), which is not available on the
        # OCP 4.22 redhat-operators catalog. Operator channel guidance: point OLM at
        # redhat-operator-index:v4.21 for those dependencies on OCP 4.22 clusters.
        cat <<'EOF' | oc apply -f -
        apiVersion: operators.coreos.com/v1alpha1
        kind: CatalogSource
        metadata:
          name: mta-421-test-catalog
          namespace: openshift-marketplace
        spec:
          sourceType: grpc
          image: registry.redhat.io/redhat/redhat-operator-index:v4.21
          displayName: "RHOI v4.21 for MTA deps (e.g. RHBK) on OCP 4.22"
          publisher: Red Hat
          grpcPodConfig:
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 2Gi
        EOF
        oc wait catalogsource/mta-421-test-catalog -n openshift-marketplace --for=condition=Ready --timeout=1200s
      from: cli
      resources:
        requests:
          cpu: 100m
          memory: 100Mi
    - ref: install-operators
    - ref: mta-deploy-tackle
    - ref: mta-tests-ui
    workflow: firewatch-ipi-aws
zz_generated_metadata:
  branch: release-0.8
  org: konveyor
  repo: tackle2-ui
  variant: mta-ocp-4.22-lp-interop
