base_images:
  cli:
    name: "5.0"
    namespace: ocp
    tag: cli
  hypershift-operator-init:
    name: hypershift-operator
    namespace: hypershift
    tag: latest
build_root:
  from_repository: true
  use_build_cache: true
images:
  items:
  - to: hypershift-operator
  - dockerfile_path: Dockerfile.control-plane
    to: hypershift
  - dockerfile_path: Dockerfile.e2e
    to: hypershift-tests
  - dockerfile_literal: |
      FROM hypershift-operator
      RUN yum install -y jq && yum clean all
    from: hypershift-operator
    to: hypershift-cli
releases:
  initial:
    candidate:
      product: ocp
      relative: 1
      stream: ci
      version: "5.0"
  latest:
    integration:
      include_built_images: true
      name: "5.0"
      namespace: ocp
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- always_run: false
  as: e2e-v2-aws
  optional: true
  steps:
    cluster_profile: hypershift-aws
    env:
      TECH_PREVIEW_NO_UPGRADE: "true"
    workflow: hypershift-aws-e2e-v2
zz_generated_metadata:
  branch: CNTRLPLANE-3568_user_define_tags
  org: mgencur
  repo: hypershift
