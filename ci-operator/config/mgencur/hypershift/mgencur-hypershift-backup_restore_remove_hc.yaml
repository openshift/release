base_images:
  cli:
    name: "4.21"
    namespace: ocp
    tag: cli
  hypershift-operator:
    name: hypershift-operator
    namespace: hypershift
    tag: latest
  hypershift-tests:
    name: hypershift-tests
    namespace: hypershift
    tag: latest
build_root:
  from_repository: true
images:
- dockerfile_path: Dockerfile.control-plane
  to: hypershift
releases:
  latest:
    integration:
      include_built_images: true
      name: "4.21"
      namespace: ocp
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- always_run: false
  as: e2e-v2-aws-backuprestore
  optional: true
  steps:
    cluster_profile: hypershift-aws
    env:
      KONFLUX_DEPLOY_CATALOG_SOURCE: "true"
      KONFLUX_DEPLOY_OPERATORS: "true"
      KONFLUX_DEPLOY_SUBSCRIPTION: "false"
      KONFLUX_TARGET_FBC_TAGS: oadp-operator-fbc-1.6.0-20260327171703
      KONFLUX_TARGET_OPERATORS: ""
      OADP_OPERATOR_SUB_CHANNEL: stable
      OADP_OPERATOR_SUB_SOURCE: oadp-operator-fbc-1.6.0-20260327171703
      TEST_SUITE: openshift/conformance/parallel/minimal
    workflow: hypershift-aws-e2e-backuprestore
zz_generated_metadata:
  branch: backup_restore_remove_hc
  org: mgencur
  repo: hypershift
