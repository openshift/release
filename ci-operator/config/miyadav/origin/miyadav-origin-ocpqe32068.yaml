base_images:
  assisted-test-infra:
    name: backplane-5.0
    namespace: edge-infrastructure
    tag: assisted-test-infra
  dev-scripts:
    name: test
    namespace: ocp-kni
    tag: dev-scripts
  golangci-lint:
    name: golangci-lint
    namespace: ci
    tag: v2.10.1
  hypershift-operator:
    name: hypershift-operator
    namespace: hypershift
    tag: latest
  nested-podman:
    name: nested-podman
    namespace: ci
    tag: latest
  tools:
    name: "5.0"
    namespace: ocp
    tag: tools
binary_build_commands: make build
build_root:
  from_repository: true
images:
  items:
  - dockerfile_path: images/tests/Dockerfile.rhel
    from: tools-openstack
    to: tests
  - dockerfile_path: images/hello-openshift/Dockerfile.rhel
    to: hello-openshift
raw_steps:
- pipeline_image_cache_step:
    commands: |
      dnf install -y python3.12 && dnf clean all
      alternatives --install /usr/bin/python3 python3 /usr/bin/python3.12 1 && alternatives --set python3 /usr/bin/python3.12
      curl -LsSf https://astral.sh/uv/0.7.19/install.sh | env INSTALLER_NO_MODIFY_PATH=1 UV_INSTALL_DIR=/usr/local/bin sh
    from: bin
    to: bin-uv
- pipeline_image_cache_step:
    commands: |
      curl http://base-openstack-4-22.ocp.svc > /etc/yum.repos.art/ci/base-openstack-4-22.repo
    from: tools
    to: tools-openstack
releases:
  initial:
    integration:
      name: "5.0"
      namespace: ocp
  latest:
    integration:
      include_built_images: true
      name: "5.0"
      namespace: ocp
resources:
  '*':
    requests:
      cpu: 100m
      memory: 4Gi
  bin:
    requests:
      cpu: "3"
      memory: 7Gi
  tests:
    requests:
      cpu: "3"
      memory: 7Gi
tests:
- as: e2e-gcp-ovn-stable
  cron: 0 6 * * *
  steps:
    cluster_profile: openshift-org-gcp
    env:
      TEST_SUITE: openshift/stable
    observers:
      enable:
      - observers-resource-watch
    workflow: openshift-e2e-gcp
zz_generated_metadata:
  branch: ocpqe32068
  org: miyadav
  repo: origin
