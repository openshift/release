base_images:
  cli:
    name: "5.0"
    namespace: ocp
    tag: cli
build_root:
  image_stream_tag:
    name: release
    namespace: openshift
    tag: rhel-9-release-golang-1.24-openshift-4.21
images:
  items:
  - dockerfile_path: Containerfile
    to: virt-cluster-validate
releases:
  initial:
    candidate:
      product: ocp
      relative: 1
      stream: nightly
      version: "5.0"
  latest:
    candidate:
      product: ocp
      stream: nightly
      version: "5.0"
resources:
  '*':
    requests:
      cpu: 500m
      memory: 1Gi
tests:
- as: e2e-azure
  steps:
    cluster_profile: azure-virtualization
    env:
      BASE_DOMAIN: cnv-devel.azure.devcluster.openshift.com
      COMPUTE_NODE_TYPE: Standard_D4s_v5
      NMSTATE_OPERATOR_CREATE_CUSTOM_RESOURCE: "true"
      NMSTATE_OPERATOR_SUB_SOURCE: redhat-operators-v4-22
      NMSTATE_OPERATOR_SUB_SOURCE_IMAGE: registry.redhat.io/redhat/redhat-operator-index:v4.22
    test:
    - as: install-cnv
      cli: latest
      commands: |
        set -euo pipefail
        curl -L https://github.com/openshift-cnv/cnv-ci/tarball/master -o /tmp/cnv-ci.tgz
        mkdir -p /tmp/cnv-ci
        tar -xvzf /tmp/cnv-ci.tgz -C /tmp/cnv-ci --strip-components=1
        cd /tmp/cnv-ci
        make update_pull_secret set_imagedigestmirrorset deploy_cnv
        oc patch hco kubevirt-hyperconverged -n openshift-cnv --type=json -p='[{"op": "add", "path": "/spec/defaultCPUModel", "value": "Broadwell"}]'
      credentials:
      - mount_path: /var/run/cnv-ci-brew-pull-secret
        name: cnv-ci-brew-pull-secret
        namespace: test-credentials
      - mount_path: /var/run/cnv-ci-konflux-pull-secret
        name: konflux-pull-secret
        namespace: test-credentials
      env:
      - default: '|7820aea2-0d75-11e7-9259-28d244ea5a6d.hhav.f63e13'
        name: BREW_IMAGE_REGISTRY_USERNAME
      - default: /var/run/cnv-ci-brew-pull-secret/token
        name: BREW_IMAGE_REGISTRY_TOKEN_PATH
      - default: openshift-virtualization+konflux_ro_bot
        name: KONFLUX_REGISTRY_USERNAME
      - default: /var/run/cnv-ci-konflux-pull-secret/token
        name: KONFLUX_REGISTRY_TOKEN_PATH
      - default: "5.0"
        name: OCP_VERSION
      - default: "5.0"
        name: CNV_VERSION
      - default: openshift-cnv
        name: TARGET_NAMESPACE
      - default: "false"
        name: PRODUCTION_RELEASE
      from: src
      resources:
        requests:
          cpu: 100m
          memory: 600Mi
      timeout: 1h0m0s
    - ref: operatorhub-subscribe-nmstate-operator
    - as: validate
      cli: latest
      commands: |
        set -e
        # CI-specific exclusions (these checks detect real issues on customer clusters):
        # 20-bare-metal: CI clusters are cloud-hosted, bare-metal detection always fails
        # 70-live-migration: CI default StorageClass is RWO, live migration needs RWX
        # 75-snapshots: CI StorageClass has no VolumeSnapshotClass configured
        # 80-high-performance: CI nodes lack dedicated CPU manager configuration
        SKIP_CHECKS="20-bare-metal,70-live-migration,75-snapshots,80-high-performance"
        oc adm must-gather --image="${VCV_IMAGE}" --dest-dir=${ARTIFACT_DIR}/must-gather-output -- SKIP_CHECKS=${SKIP_CHECKS} /usr/bin/gather
        MG_SUBDIR=$(find ${ARTIFACT_DIR}/must-gather-output -path "*/virt-cluster-validate" -type d | head -1)
        if [[ -z "${MG_SUBDIR}" ]]; then
          echo "ERROR: virt-cluster-validate output directory not found in must-gather output"
          exit 1
        fi
        cp "${MG_SUBDIR}/ctrf-results.json" ${ARTIFACT_DIR}/
        cp -r "${MG_SUBDIR}/logs" ${ARTIFACT_DIR}/check-logs
        cp "${MG_SUBDIR}/runner.log" ${ARTIFACT_DIR}/
        python3 -c "
        import json, sys
        r = json.load(open('${ARTIFACT_DIR}/ctrf-results.json'))['results']['summary']
        print(f'Passed: {r[\"passed\"]}, Failed: {r[\"failed\"]}, Total: {r[\"tests\"]}')
        sys.exit(1 if r['failed'] > 0 else 0)
        "
      dependencies:
      - env: VCV_IMAGE
        name: virt-cluster-validate
      from: src
      resources:
        requests:
          cpu: 100m
    workflow: ipi-azure
- as: e2e-gcp
  steps:
    cluster_profile: gcp-virtualization
    env:
      COMPUTE_NODE_TYPE: n2-standard-4
      NMSTATE_OPERATOR_CREATE_CUSTOM_RESOURCE: "true"
