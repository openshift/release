base_images:
  cli:
    name: "4.22"
    namespace: ocp
    tag: cli
  openshift-virtualization-tests:
    name: openshift-virtualization-tests
    namespace: ci
    tag: latest
build_root:
  image_stream_tag:
    name: release
    namespace: openshift
    tag: rhel-9-release-golang-1.21-openshift-4.18
images:
  items:
  - build_args:
    - name: OCP_VERSION
      value: "4.22"
    - name: OC_CLI_VERSION
      value: latest
    context_dir: hack
    dockerfile_path: Dockerfile.test.src.ci
    to: cnv-ci
releases:
  latest:
    candidate:
      product: ocp
      stream: nightly
      version: "4.22"
resources:
  '*':
    requests:
      cpu: 200m
      memory: 400Mi
tests:
- as: smoke
  cron: 0 23 31 2 *
  reporter_config:
    channel: '#cnv-release-4-99-z'
    job_states_to_report:
    - success
    - failure
    - error
    report_template: '{{if eq .Status.State "success"}} :slack-green: Job *{{.Spec.Job}}*
      ended with *{{.Status.State}}*. <{{.Status.URL}}|View logs> {{else}} :failed:
      Job *{{.Spec.Job}}* ended with *{{.Status.State}}*. <{{.Status.URL}}|View logs>
      {{end}}'
  steps:
    cluster_profile: aws-interop-qe
    env:
      BASE_DOMAIN: release-ci.cnv-qe.rhood.us
      CNV_CATALOG_SOURCE: cnv-iib-catalog
      CNV_OPERATOR_CHANNEL: dev-preview
      CNV_VERSION: "4.99"
      COMPUTE_NODE_TYPE: m8i.4xlarge
      OCP_VERSION: "4.22"
      ODF_OPERATOR_CHANNEL: stable-4.22
      ODF_VERSION_MAJOR_MINOR: "4.22"
      USER_TAGS: |
        scenario cnv
        tests-tier smoke
    test:
    - chain: cucushift-installer-check-cluster-health
    - ref: cnv-enable-nested-virtualization-aws
    - ref: interop-tests-deploy-odf
    - ref: cnv-deploy-cnv
    - ref: cnv-openshift-virtualization-tests
    workflow: ipi-aws
zz_generated_metadata:
  branch: master
  org: openshift-cnv
  repo: cnv-ci
  variant: cnv-dev-preview-konflux
