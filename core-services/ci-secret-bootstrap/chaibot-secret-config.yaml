# Secret configuration for Chaibot using ship-help MCP
# Add this to core-services/ci-secret-bootstrap/_config.yaml

# Ship-help MCP token for Chai Bot access
- from:
    ship-help-token:
      # Store the token in Vault at this path
      # Token value from ~/.claude/.claude.json (mcpServers.ship-help.headers.Authorization)
      # Format: "Bearer <token>" -> extract just the token part
      path: selfservice/cspi-qe/ship-help-mcp-token
      field: token
  to:
    - cluster: app.ci
      namespace: ci
      name: cluster-secrets-chaibot-ship-help

---
# Instructions for setting up the secret:

# 1. Get ship-help MCP token
#    The token is in ~/.claude/.claude.json under:
#    mcpServers.ship-help.headers.Authorization: "Bearer <token>"
#
#    Example token format (DO NOT USE REAL TOKEN HERE):
#    eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiJVMDFCVz...REDACTED...c2xlY2tfdXNlcm5hbWUiOiJ1c2VybmFtZSJ9.SIGNATURE_REDACTED

# 2. Store in Vault
#    Use the DPTP team's process to store the token in Vault
#    Path: selfservice/cspi-qe/ship-help-mcp-token
#    Field: token
#    Value: <token-from-step-1>
#
#    Reference: https://docs.ci.openshift.org/docs/how-tos/adding-a-new-secret-to-ci/

# 3. The secret will be synced to Kubernetes as:
#    Name: cluster-secrets-chaibot-ship-help
#    Namespace: ci
#    Key: ship-help-token

# 4. Alternative: Get a team-shared token
#    Contact ship-help team in #ship-users to get a team-specific token
#    This is better than using a personal token for production

# NOTE: Unlike OpenAI API keys, ship-help tokens:
# - Don't cost money (free shared service)
# - Are tied to Red Hat infrastructure (not external vendor)
# - Can be generated per-user or per-team via ship-help portal
# - Don't expire (but can be rotated if needed)
