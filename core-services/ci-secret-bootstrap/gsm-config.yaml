        - auth_field: auth
          group: quayio-ci-read-only-robot
          registry_url: qci-pull-through-cache-us-east-1-ci.apps.ci.l2s4.p1.openshiftapps.com
    sync_to_cluster: true
    targets:
      - cluster: build01
        namespace: ci
        type: kubernetes.io/dockerconfigjson
      - cluster: build01
        namespace: test-credentials
        type: kubernetes.io/dockerconfigjson
      - cluster: build01
        namespace: keel
        type: kubernetes.io/dockerconfigjson
      - cluster: build01
