# GSM Configuration File for Secret Management
# This file defines how secrets from Google Secret Manager are bundled and consumed in our CI.
# See docs for further info: [TODO docs link]

cluster_groups:
  build_farm:
    - app.ci
    - build01
    - build02
    - build03
    - build04
    - build05
    - build06
    - build07
    - build08
    - build09
    - build10
    - build11
    - core-ci
    - vsphere02
  managed_clusters:
    - app.ci
    - build01
    - build02
    - build03
    - build04
    - build05
    - build06
    - build07
    - build08
    - build09
    - build10
    - build11
    - core-ci
    - hosted-mgmt
  non_app_ci:
    - build01
    - build02
    - build03
    - build04
    - build05
    - build06
    - build07
    - build08
    - build09
    - build10
    - build11
    - core-ci
    - vsphere02

bundles:
  - name: psalajova-test-bundle
    gsm_secrets:
      - collection: psalajova-first-secret
        group: group1
    sync_to_cluster: true
    targets:
      - cluster: build01
        namespace: ci

  - name: registry-pull-credentials-psalajov-test
    dockerconfig:
      registries:
        - auth_field: token_image-puller_build01_reg_auth_value--dot--txt
          collection: test-platform-infra
          group: build_farm
          registry_url: image-registry.openshift-image-registry.svc.cluster.local:5000
        - auth_field: token_image-puller_build01_reg_auth_value--dot--txt
          collection: test-platform-infra
          group: build_farm
          registry_url: image-registry.openshift-image-registry.svc:5000
        - auth_field: token_image-puller_build01_reg_auth_value--dot--txt
          collection: test-platform-infra
          group: build_farm
          registry_url: registry.build01.ci.openshift.org
        - auth_field: token_image-puller_app--dot--ci_reg_auth_value--dot--txt
          collection: test-platform-infra
          group: build_farm
          registry_url: registry.ci.openshift.org
        - auth_field: auth
          email_field: email
          collection: test-platform-infra
          group: quay--dot--io-pull-secret
          registry_url: quay.io
        - auth_field: auth
          collection: test-platform-infra
          group: quayio-ci-read-only-robot
          registry_url: quay-proxy.ci.openshift.org
        - auth_field: auth
          collection: test-platform-infra
          group: quayio-ci-read-only-robot
          registry_url: quay.io/openshift/ci
        - auth_field: auth
          collection: test-platform-infra
          group: quayio-ci-read-only-robot
          registry_url: quay.io/openshift/network-edge-testing
        - auth_field: auth
          collection: test-platform-infra
          group: quayio-ci-read-only-robot
          registry_url: qci-pull-through-cache-us-east-1-ci.apps.ci.l2s4.p1.openshiftapps.com
    sync_to_cluster: true
    targets:
      - cluster: build01
        namespace: ci
        type: kubernetes.io/dockerconfigjson
      - cluster: build01
        namespace: test-credentials
        type: kubernetes.io/dockerconfigjson
      - cluster: build01
        namespace: keel
        type: kubernetes.io/dockerconfigjson
      - cluster: build01
        namespace: ocp
        type: kubernetes.io/dockerconfigjson
