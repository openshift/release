    - app.ci
    - build01
    - build02
    - build03
    - build04
    - build05
    - build06
    - build07
    - build08
    - build09
    - build10
    - build11
    - build12
    - build13
    - core-ci
    - hosted-mgmt
    - vsphere02

dptp_collection: test-platform-infra

bundles:
  - name: gce-sa-credentials-gcs-publisher
    gsm_secrets:
      - collection: test-platform-infra
        group: gcs-publisher
        fields:
          - name: credentials--dot--json
            as: service-account.json
    sync_to_cluster: true
    targets:
      - cluster_groups: [build_farm]
        namespace: ci
      - cluster_groups: [build_farm]
        namespace: test-credentials
      - cluster: hosted-mgmt
        namespace: ci

  - name: hive-hive-credentials
    gsm_secrets:
      - collection: test-platform-infra
        group: build_farm
        fields:
          - name: sa--dot--hive--dot--hosted-mgmt--dot--config
            as: kubeconfig
          - name: sa--dot--hive--dot--hosted-mgmt--dot--token--dot--txt
    sync_to_cluster: true
    targets:
      - cluster_groups: [non_app_ci]
        namespace: ci
      - cluster_groups: [ non_app_ci ]
        namespace: test-credentials

  - name: cluster-init
    gsm_secrets:
      - collection: test-platform-infra
        group: build_farm
        fields:
          - sa--dot--cluster-init--dot--build01--dot--config
          - sa--dot--cluster-init--dot--build01--dot--token--dot--txt
          - sa--dot--cluster-init--dot--build02--dot--config
          - sa--dot--cluster-init--dot--build02--dot--token--dot--txt
          - sa--dot--cluster-init--dot--build03--dot--config
          - sa--dot--cluster-init--dot--build03--dot--token--dot--txt
          - sa--dot--cluster-init--dot--build04--dot--config
          - sa--dot--cluster-init--dot--build04--dot--token--dot--txt
          - sa--dot--cluster-init--dot--build05--dot--config
          - sa--dot--cluster-init--dot--build05--dot--token--dot--txt
          - sa--dot--cluster-init--dot--build06--dot--config
          - sa--dot--cluster-init--dot--build06--dot--token--dot--txt
          - sa--dot--cluster-init--dot--build07--dot--config
          - sa--dot--cluster-init--dot--build07--dot--token--dot--txt
          - sa--dot--cluster-init--dot--build08--dot--config
          - sa--dot--cluster-init--dot--build08--dot--token--dot--txt
          - sa--dot--cluster-init--dot--build09--dot--config
          - sa--dot--cluster-init--dot--build09--dot--token--dot--txt
          - sa--dot--cluster-init--dot--build10--dot--config
          - sa--dot--cluster-init--dot--build10--dot--token--dot--txt
          - sa--dot--cluster-init--dot--build11--dot--config
          - sa--dot--cluster-init--dot--build11--dot--token--dot--txt
          - sa--dot--cluster-init--dot--build12--dot--config
          - sa--dot--cluster-init--dot--build12--dot--token--dot--txt
          - sa--dot--cluster-init--dot--build13--dot--config
          - sa--dot--cluster-init--dot--build13--dot--token--dot--txt
          - sa--dot--cluster-init--dot--core-ci--dot--config
          - sa--dot--cluster-init--dot--core-ci--dot--token--dot--txt
          - sa--dot--cluster-init--dot--vsphere02--dot--config
          - sa--dot--cluster-init--dot--vsphere02--dot--token--dot--txt
    sync_to_cluster: true
    targets:
      - cluster_groups:
          - build_farm
        namespace: ci

  - name: ci-operator
    gsm_secrets:
      - collection: test-platform-infra
        group: build_farm
        fields:
          - name: sa--dot--ci-operator--dot--${CLUSTER}--dot--token--dot--txt
          - name: sa--dot--ci-operator--dot--${CLUSTER}--dot--config
            as: kubeconfig
    sync_to_cluster: true
    targets:
      - cluster_groups: [non_app_ci]
        namespace: test-credentials

  - name: registry-pull-credentials
    dockerconfig:
      registries:
        - auth_field: token_image-puller_build01_reg_auth_value--dot--txt
          group: build_farm
          registry_url: image-registry.openshift-image-registry.svc.cluster.local:5000
        - auth_field: token_image-puller_build01_reg_auth_value--dot--txt
