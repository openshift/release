    - build03
    - build04
    - build05
    - build06
    - build07
    - build08
    - build09
    - build10
    - build11
    - build12
    - build13
    - core-ci
    - hosted-mgmt
  non_app_ci:
    - build01
    - build02
    - build03
    - build04
    - build05
    - build06
    - build07
    - build08
    - build09
    - build10
    - build11
    - build12
    - build13
    - core-ci
    - vsphere02
  standard_build_clusters:
    - build01
    - build02
    - build03
    - build04
    - build05
    - build06
    - build07
    - build08
    - build09
    - build10
    - build11
    - build12
    - build13
