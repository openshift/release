frequency: 5m
components:
  - component_slug: "prow"
    sub_component_slug: "deck"
    http_monitor:
      url: "https://prow.ci.openshift.org/"
      code: 200
      retry_after: 4m
      severity: "Down"
    prometheus_monitor:
      prometheus_location:
        cluster: "app.ci"
        namespace: "openshift-monitoring"
        route: "thanos-querier"
      queries:
        - query: "max(up{job=\"deck\"}) > 0"
          duration: "5m"
          step: "30s"
          severity: "Down"
  - component_slug: "prow"
    sub_component_slug: "deck-internal"
