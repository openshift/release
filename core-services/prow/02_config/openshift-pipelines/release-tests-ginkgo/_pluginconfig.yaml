external_plugins:
  openshift-pipelines/release-tests-ginkgo:
  - endpoint: http://cherrypick
    events:
    - issue_comment
    - pull_request
    name: cherrypick
plugins:
  openshift-pipelines/release-tests-ginkgo:
    plugins:
    - trigger
triggers:
- repos:
  - openshift-pipelines/release-tests-ginkgo
  trusted_apps:
  - openshift-merge-bot
