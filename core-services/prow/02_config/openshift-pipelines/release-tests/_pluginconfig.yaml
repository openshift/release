external_plugins:
  openshift-pipelines/release-tests:
  - endpoint: http://cherrypick
    events:
    - issue_comment
    - pull_request
    name: cherrypick
plugins:
  openshift-pipelines/release-tests:
    plugins:
    - trigger
triggers:
- org_invite:
    prominent: {}
  repos:
  - openshift-pipelines/release-tests
  trusted_apps:
  - openshift-merge-bot
