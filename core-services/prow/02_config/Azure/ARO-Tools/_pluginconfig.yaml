external_plugins:
  Azure/ARO-Tools:
  - endpoint: http://refresh
    events:
    - issue_comment
    name: refresh
  - endpoint: http://needs-rebase
    events:
    - issue_comment
    - pull_request
    name: needs-rebase
plugins:
  Azure/ARO-Tools:
    plugins:
    - assign
    - approve
    - blunderbuss
    - help
    - hold
    - label
    - lgtm
    - lifecycle
    - override
    - retitle
    - shrug
    - skip
    - trigger
    - verify-owners
    - owners-label
    - wip
triggers:
- org_invite:
    prominent: {}
  repos:
  - Azure/ARO-Tools
  trusted_apps:
  - openshift-merge-bot
