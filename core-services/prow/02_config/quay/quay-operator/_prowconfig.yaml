tide:
  merge_method:
    quay/quay-operator: rebase
  queries:
  - includedBranches:
    - master
    - redhat-3.14
    - redhat-3.15
    - redhat-3.16
    - redhat-3.17
    missingLabels:
    - do-not-merge/hold
    - do-not-merge/invalid-owners-file
    - do-not-merge/work-in-progress
    - needs-ok-to-test
    - needs-rebase
    repos:
    - quay/quay-operator
    reviewApprovedRequired: true
