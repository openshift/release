branch-protection:
  orgs:
    redhat-developer:
      repos:
        rhdh-operator:
          branches:
            main:
              allow_deletions: false
              allow_force_pushes: false
              enforce_admins: true
              protect: true
              required_status_checks:
                contexts:
                - PR Validate
                - Validate Dockerfile
                - Validate Bundle Manifests
tide:
  merge_method:
    redhat-developer/rhdh-operator: squash
  queries:
  - labels:
    - lgtm
    missingLabels:
    - backports/unvalidated-commits
    - do-not-merge/hold
    - do-not-merge/invalid-owners-file
    - do-not-merge/work-in-progress
    - jira/invalid-bug
    - needs-rebase
    repos:
    - redhat-developer/rhdh-operator
