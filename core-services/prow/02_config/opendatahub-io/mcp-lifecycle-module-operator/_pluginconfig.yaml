approve:
- repos:
  - opendatahub-io/mcp-lifecycle-module-operator
  require_self_approval: false
external_plugins:
  opendatahub-io/mcp-lifecycle-module-operator:
  - endpoint: http://refresh
    events:
    - issue_comment
    name: refresh
  - endpoint: http://needs-rebase
    events:
    - issue_comment
    - pull_request
    name: needs-rebase
lgtm:
- repos:
  - opendatahub-io/mcp-lifecycle-module-operator
  review_acts_as_lgtm: true
plugins:
  opendatahub-io/mcp-lifecycle-module-operator:
    plugins:
    - approve
    - assign
    - blunderbuss
    - help
    - hold
    - jira
    - label
    - lgtm
    - lifecycle
    - override
    - owners-label
    - retitle
    - skip
    - trigger
    - transfer-issue
    - verify-owners
    - wip
triggers:
- org_invite:
    prominent: {}
  repos:
  - opendatahub-io/mcp-lifecycle-module-operator
  trusted_apps:
  - openshift-merge-bot
  - dependabot
  - red-hat-konflux
