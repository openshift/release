branch-protection:
  orgs:
    opendatahub-io:
      repos:
        mcp-lifecycle-module-operator:
          unmanaged: true
tide:
  merge_method:
    opendatahub-io/mcp-lifecycle-module-operator: squash
  queries:
  - labels:
    - approved
    - lgtm
    missingLabels:
    - do-not-merge/hold
    - do-not-merge/invalid-owners-file
    - do-not-merge/work-in-progress
    - needs-rebase
    repos:
    - opendatahub-io/mcp-lifecycle-module-operator
