approve:
- repos:
  - opendatahub-io/mod-arch-library
  require_self_approval: true
external_plugins:
  opendatahub-io/mod-arch-library:
  - endpoint: http://refresh
    events:
    - issue_comment
    name: refresh
  - endpoint: http://needs-rebase
    events:
    - issue_comment
    - pull_request
    name: needs-rebase
lgtm:
- repos:
  - opendatahub-io/mod-arch-library
  review_acts_as_lgtm: true
plugins:
  opendatahub-io/mod-arch-library:
    plugins:
    - approve
    - assign
    - blunderbuss
    - help
    - hold
    - jira
    - label
    - lgtm
    - lifecycle
    - override
    - owners-label
    - retitle
    - skip
    - trigger
    - transfer-issue
    - verify-owners
    - wip
triggers:
- repos:
  - opendatahub-io/mod-arch-library
  trusted_apps:
  - openshift-merge-bot
