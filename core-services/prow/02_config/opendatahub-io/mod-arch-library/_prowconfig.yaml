branch-protection:
  orgs:
    opendatahub-io:
      repos:
        mod-arch-library:
          unmanaged: true
tide:
  merge_method:
    opendatahub-io/mod-arch-library: squash
  queries:
  - labels:
    - approved
    - lgtm
    missingLabels:
    - do-not-merge/hold
    - do-not-merge/invalid-owners-file
    - do-not-merge/work-in-progress
    - needs-rebase
    repos:
    - opendatahub-io/mod-arch-library
