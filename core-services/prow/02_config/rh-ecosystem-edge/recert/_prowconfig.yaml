branch-protection:
  orgs:
    rh-ecosystem-edge:
      repos:
        recert:
          branches:
            main:
              allow_deletions: false
              allow_force_pushes: false
              enforce_admins: true
              protect: true
            master:
              allow_deletions: false
              allow_force_pushes: false
              enforce_admins: true
              protect: true
            release-*:
              allow_deletions: false
              allow_force_pushes: false
              enforce_admins: true
              protect: true
tide:
  queries:
  - labels:
    - approved
    - lgtm
    missingLabels:
    - backports/unvalidated-commits
    - do-not-merge/hold
    - do-not-merge/invalid-owners-file
    - do-not-merge/work-in-progress
    - jira/invalid-bug
    - needs-rebase
    repos:
    - rh-ecosystem-edge/recert
