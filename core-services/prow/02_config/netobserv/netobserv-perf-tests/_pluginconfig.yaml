approve:
- commandHelpLink: https://go.k8s.io/bot-commands
  lgtm_acts_as_approve: true
  repos:
  - netobserv/netobserv-perf-tests
  require_self_approval: false
external_plugins:
  netobserv/netobserv-perf-tests:
  - endpoint: http://refresh
    events:
    - issue_comment
    name: refresh
  - endpoint: http://cherrypick
    events:
    - issue_comment
    - pull_request
    name: cherrypick
  - endpoint: http://needs-rebase
    events:
    - pull_request
    name: needs-rebase
  - endpoint: http://jira-lifecycle-plugin
    events:
    - issue_comment
    - pull_request
    name: jira-lifecycle-plugin
plugins:
  netobserv/netobserv-perf-tests:
    plugins:
    - assign
    - approve
    - blunderbuss
    - cat
    - dog
    - heart
    - help
    - hold
    - jira
    - label
    - lgtm
    - retitle
    - shrug
    - skip
    - trigger
    - verify-owners
    - wip
    - yuks
triggers:
- org_invite:
    prominent: {}
  repos:
  - netobserv/netobserv-perf-tests
  trusted_apps:
  - openshift-merge-bot
