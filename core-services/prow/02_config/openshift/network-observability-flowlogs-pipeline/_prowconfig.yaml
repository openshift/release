tide:
  merge_method:
    openshift/network-observability-flowlogs-pipeline: squash
  queries:
  - author: red-hat-konflux[bot]
    labels:
    - konflux-nudge
    missingLabels:
    - do-not-merge/hold
    - do-not-merge/invalid-owners-file
    - do-not-merge/work-in-progress
    - needs-rebase
    repos:
    - openshift/network-observability-flowlogs-pipeline
  - labels:
    - approved
    - lgtm
    missingLabels:
    - do-not-merge/hold
    - do-not-merge/invalid-owners-file
    - do-not-merge/work-in-progress
    - needs-rebase
    repos:
    - openshift/network-observability-flowlogs-pipeline
