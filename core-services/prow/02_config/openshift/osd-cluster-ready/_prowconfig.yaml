branch-protection:
  orgs:
    openshift:
      repos:
        osd-cluster-ready:
          branches:
            master:
              protect: true
              required_status_checks:
                contexts:
                - Red Hat Konflux / osd-cluster-ready-master-on-pull-request
                - ci/prow/images
tide:
  queries:
  - labels:
    - approved
    - lgtm
    missingLabels:
    - backports/unvalidated-commits
    - do-not-merge/hold
    - do-not-merge/invalid-owners-file
    - do-not-merge/work-in-progress
    - jira/invalid-bug
    - needs-rebase
    repos:
    - openshift/osd-cluster-ready
