branch-protection:
  orgs:
    openshift:
      repos:
        backplane-cli:
          branches:
            main:
              protect: true
              required_status_checks:
                contexts:
                - ci/prow/build
                - ci/prow/coverage
                - ci/prow/images
                - ci/prow/lint
                - ci/prow/scan-optional
                - ci/prow/test
tide:
  queries:
  - labels:
    - approved
    - lgtm
    missingLabels:
    - backports/unvalidated-commits
    - do-not-merge/hold
    - do-not-merge/invalid-owners-file
    - do-not-merge/work-in-progress
    - jira/invalid-bug
    - needs-rebase
    repos:
    - openshift/backplane-cli
