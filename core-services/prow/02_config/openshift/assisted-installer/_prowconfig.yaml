branch-protection:
  orgs:
    openshift:
      repos:
        assisted-installer:
          include:
          - ^master$
          - ^release-[0-9.]+$
          - ^release-ocm-[0-9.]+$
          - ^v[0-9.]+$
slack_reporter_configs:
  openshift/assisted-installer:
    channel: '#assisted-deployment-ci'
    job_states_to_report:
    - failure
    - error
    job_types_to_report:
    - periodic
    report_template: ':red_jenkins_circle: Job *{{.Spec.Job}}* ended with *{{.Status.State}}*.
      <{{.Status.URL}}|View logs>'
tide:
  queries:
  - includedBranches:
    - openshift-4.21
    - release-4.12
    - release-4.13
    - release-4.14
    - release-4.15
    - release-4.16
    - release-4.17
    - release-4.18
    - release-4.19
    - release-4.20
    - release-4.21
    labels:
    - approved
    - backport-risk-assessed
    - jira/valid-bug
    - jira/valid-reference
    - lgtm
    - verified
    missingLabels:
    - backports/unvalidated-commits
    - do-not-merge/hold
    - do-not-merge/invalid-owners-file
    - do-not-merge/work-in-progress
    - jira/invalid-bug
    - needs-rebase
    repos:
    - openshift/assisted-installer
  - includedBranches:
    - openshift-4.22
    - release-4.22
    labels:
    - approved
    - backport-risk-assessed
    - jira/valid-bug
    - jira/valid-reference
    - lgtm
    - verified
    missingLabels:
    - backports/unvalidated-commits
    - do-not-merge/hold
    - do-not-merge/invalid-owners-file
    - do-not-merge/work-in-progress
    - jira/invalid-bug
    - needs-rebase
    repos:
    - openshift/assisted-installer
  - excludedBranches:
    - release-4.12
    - release-4.13
    - release-4.14
    - release-4.15
    - release-4.16
    - release-4.17
    - release-4.18
    - release-4.19
    - release-4.20
    - release-4.21
    - release-4.22
    labels:
    - approved
    - jira/valid-reference
    - lgtm
    missingLabels:
    - backports/unvalidated-commits
    - do-not-merge/hold
    - do-not-merge/invalid-owners-file
    - do-not-merge/work-in-progress
    - jira/invalid-bug
    - needs-rebase
    repos:
    - openshift/assisted-installer
