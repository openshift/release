branch-protection:
  orgs:
    openshift:
      repos:
        addon-operator:
          branches:
            main:
              protect: true
              required_status_checks:
                contexts:
                - Konflux kflux-prd-rh03 / addon-operator-on-pull-request
                - ci/prow/coverage
                - ci/prow/images
                - ci/prow/lint
                - ci/prow/precommit-check
                - ci/prow/unit
tide:
  queries:
  - labels:
    - approved
    - lgtm
    missingLabels:
    - backports/unvalidated-commits
    - do-not-merge/hold
    - do-not-merge/invalid-owners-file
    - do-not-merge/work-in-progress
    - jira/invalid-bug
    repos:
    - openshift/addon-operator
