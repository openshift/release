approve:
- ignore_review_state: true
  repos:
  - openshift/lightspeed-otel-collector
  require_self_approval: true
lgtm:
- repos:
  - openshift/lightspeed-otel-collector
plugins:
  openshift/lightspeed-otel-collector:
    plugins:
    - approve
triggers:
- repos:
  - openshift/lightspeed-otel-collector
  trusted_apps:
  - dependabot
  - red-hat-konflux
  - openshift-merge-bot
