approve:
- ignore_review_state: true
  repos:
  - openshift/lightspeed-agentic-sandbox
  require_self_approval: true
lgtm:
- repos:
  - openshift/lightspeed-agentic-sandbox
plugins:
  openshift/lightspeed-agentic-sandbox:
    plugins:
    - approve
triggers:
- repos:
  - openshift/lightspeed-agentic-sandbox
  trusted_apps:
  - dependabot
  - red-hat-konflux
  - openshift-merge-bot
