branch-protection:
  orgs:
    openshift:
      repos:
        sandboxed-containers-operator:
          branches:
            devel:
              protect: true
            osc-release-v1.10:
              protect: true
            osc-release-v1.11:
              protect: true
tide:
  merge_method:
    openshift/sandboxed-containers-operator: merge
  queries:
  - labels:
    - approved
    - lgtm
    missingLabels:
    - backports/unvalidated-commits
    - do-not-merge/hold
    - do-not-merge/invalid-owners-file
    - do-not-merge/work-in-progress
    - jira/invalid-bug
    - needs-rebase
    repos:
    - openshift/sandboxed-containers-operator
