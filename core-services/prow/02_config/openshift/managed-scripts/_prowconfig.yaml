branch-protection:
  orgs:
    openshift:
      repos:
        managed-scripts:
          required_status_checks:
            contexts:
            - Konflux kflux-prd-rh02 / managed-scripts-on-pull-request
            - Red Hat Konflux / managed-scripts-pr-check / managed-scripts
            - Red Hat Konflux / managed-scripts-main-enterprise-contract / managed-scripts
tide:
  queries:
  - labels:
    - approved
    - lgtm
    missingLabels:
    - backports/unvalidated-commits
    - do-not-merge/hold
    - do-not-merge/invalid-owners-file
    - do-not-merge/work-in-progress
    - jira/invalid-bug
    - needs-rebase
    repos:
    - openshift/managed-scripts
