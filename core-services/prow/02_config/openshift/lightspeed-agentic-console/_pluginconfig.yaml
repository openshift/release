approve:
- ignore_review_state: true
  repos:
  - openshift/lightspeed-agentic-console
  require_self_approval: true
lgtm:
- repos:
  - openshift/lightspeed-agentic-console
plugins:
  openshift/lightspeed-agentic-console:
    plugins:
    - approve
triggers:
- repos:
  - openshift/lightspeed-agentic-console
  trusted_apps:
  - dependabot
  - red-hat-konflux
  - openshift-merge-bot
