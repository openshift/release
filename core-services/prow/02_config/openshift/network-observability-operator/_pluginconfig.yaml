approve:
- ignore_review_state: true
  repos:
  - openshift/network-observability-operator
  require_self_approval: true
lgtm:
- repos:
  - openshift/network-observability-operator
  review_acts_as_lgtm: true
plugins:
  openshift/network-observability-operator:
    plugins:
    - approve
triggers:
- repos:
  - openshift/network-observability-operator
  trusted_apps:
  - openshift-merge-bot
  - red-hat-konflux
