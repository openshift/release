branch-protection:
  orgs:
    openshift:
      repos:
        certman-operator:
          branches:
            master:
              protect: true
              required_status_checks:
                contexts:
                - Konflux kflux-prd-rh03 / certman-operator-on-pull-request
                - ci/prow/images
                - ci/prow/coverage
                - ci/prow/lint
                - ci/prow/test
                - ci/prow/validate
                - ci/prow/e2e-binary-build-success
tide:
  queries:
  - labels:
    - approved
    - lgtm
    missingLabels:
    - backports/unvalidated-commits
    - do-not-merge/hold
    - do-not-merge/invalid-owners-file
    - do-not-merge/work-in-progress
    - jira/invalid-bug
    - needs-rebase
    repos:
    - openshift/certman-operator
