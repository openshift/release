branch-protection:
  orgs:
    openshift:
      repos:
        deadmanssnitch-operator:
          branches:
            master:
              protect: true
              required_status_checks:
                contexts:
                - Konflux kflux-prd-rh03 / deadmanssnitch-operator-on-pull-request
                - ci/prow/images
tide:
  queries:
  - labels:
    - approved
    - lgtm
    missingLabels:
    - backports/unvalidated-commits
    - do-not-merge/hold
    - do-not-merge/invalid-owners-file
    - do-not-merge/work-in-progress
    - jira/invalid-bug
    - needs-rebase
    repos:
    - openshift/deadmanssnitch-operator
