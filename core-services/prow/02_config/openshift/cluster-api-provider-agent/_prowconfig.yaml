branch-protection:
  orgs:
    openshift:
      repos:
        cluster-api-provider-agent:
          include:
          - ^backplane-[0-9.]+$
          - ^master$
          - ^release-ocm-[0-9.]+$
slack_reporter_configs:
  openshift/cluster-api-provider-agent:
    channel: '#capi-agent-infrastructure-provider-ci'
    job_states_to_report:
    - failure
    - error
    job_types_to_report:
    - periodic
    report_template: ':red_jenkins_circle: Job *{{.Spec.Job}}* ended with *{{.Status.State}}*.
      <{{.Status.URL}}|View logs>'
tide:
  merge_method:
    openshift/cluster-api-provider-agent: squash
  queries:
  - labels:
    - approved
    - lgtm
    missingLabels:
    - backports/unvalidated-commits
    - do-not-merge/hold
    - do-not-merge/invalid-owners-file
    - do-not-merge/work-in-progress
    - jira/invalid-bug
    - needs-rebase
    repos:
    - openshift/cluster-api-provider-agent
