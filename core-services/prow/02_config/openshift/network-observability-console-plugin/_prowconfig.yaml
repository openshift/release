tide:
  merge_method:
    openshift/network-observability-console-plugin: squash
  queries:
  - author: red-hat-konflux
    labels:
    - konflux-nudge
    missingLabels:
    - do-not-merge/hold
    - do-not-merge/invalid-owners-file
    - do-not-merge/work-in-progress
    - needs-rebase
    repos:
    - openshift/network-observability-console-plugin
  - labels:
    - approved
    - lgtm
    missingLabels:
    - do-not-merge/hold
    - do-not-merge/invalid-owners-file
    - do-not-merge/work-in-progress
    - needs-rebase
    repos:
    - openshift/network-observability-console-plugin
