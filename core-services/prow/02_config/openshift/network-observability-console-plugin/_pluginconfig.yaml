approve:
- ignore_review_state: true
  repos:
  - openshift/network-observability-console-plugin
  require_self_approval: true
lgtm:
- repos:
  - openshift/network-observability-console-plugin
  review_acts_as_lgtm: true
plugins:
  openshift/network-observability-console-plugin:
    plugins:
    - approve
triggers:
- org_invite:
    prominent: {}
  repos:
  - openshift/network-observability-console-plugin
  trusted_apps:
  - openshift-merge-bot
  - red-hat-konflux
