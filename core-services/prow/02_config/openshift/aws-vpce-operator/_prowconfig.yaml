branch-protection:
  orgs:
    openshift:
      repos:
        aws-vpce-operator:
          branches:
            main:
              protect: true
              required_status_checks:
                contexts:
                - Konflux kflux-prd-rh03 / aws-vpce-operator-on-pull-request
tide:
  queries:
  - labels:
    - approved
    - lgtm
    missingLabels:
    - backports/unvalidated-commits
    - do-not-merge/hold
    - do-not-merge/invalid-owners-file
    - do-not-merge/work-in-progress
    - jira/invalid-bug
    - needs-rebase
    repos:
    - openshift/aws-vpce-operator
