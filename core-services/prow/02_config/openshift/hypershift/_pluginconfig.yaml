approve:
- repos:
  - openshift/hypershift
  require_self_approval: false
lgtm:
- repos:
  - openshift/hypershift
  review_acts_as_lgtm: true
plugins:
  openshift/hypershift:
    plugins:
    - approve
    - require-matching-label
triggers:
- org_invite:
    prominent: {}
  repos:
  - openshift/hypershift
  trigger_github_workflows: true
  trusted_apps:
  - hypershift-jira-solve-ci
  - openshift-merge-bot
