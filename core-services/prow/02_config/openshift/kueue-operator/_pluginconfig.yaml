approve:
- repos:
  - openshift/kueue-operator
  require_self_approval: false
lgtm:
- repos:
  - openshift/kueue-operator
  review_acts_as_lgtm: true
plugins:
  openshift/kueue-operator:
    plugins:
    - approve
    - assign
    - cat
    - dog
    - heart
    - golint
    - goose
    - help
    - hold
    - jira
    - label
    - lgtm
    - lifecycle
    - override
    - pony
    - retitle
    - shrug
    - sigmention
    - skip
    - trigger
    - verify-owners
    - owners-label
    - wip
    - yuks
triggers:
- repos:
  - openshift/kueue-operator
  trusted_apps:
  - red-hat-konflux
  - openshift-merge-bot
