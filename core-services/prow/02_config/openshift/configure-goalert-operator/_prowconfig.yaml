branch-protection:
  orgs:
    openshift:
      repos:
        configure-goalert-operator:
          branches:
            main:
              protect: true
              required_status_checks:
                contexts:
                - Konflux kflux-prd-rh02 / configure-goalert-operator-on-pull-request
                - ci/prow/coverage
                - ci/prow/images
                - ci/prow/lint
                - ci/prow/test
                - ci/prow/validate
tide:
  queries:
  - labels:
    - approved
    - lgtm
    missingLabels:
    - backports/unvalidated-commits
    - do-not-merge/hold
    - do-not-merge/invalid-owners-file
    - do-not-merge/work-in-progress
    - jira/invalid-bug
    - needs-rebase
    repos:
    - openshift/configure-goalert-operator
