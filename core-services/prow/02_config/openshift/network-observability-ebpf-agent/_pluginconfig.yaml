approve:
- ignore_review_state: true
  repos:
  - openshift/network-observability-ebpf-agent
  require_self_approval: true
lgtm:
- repos:
  - openshift/network-observability-ebpf-agent
  review_acts_as_lgtm: true
plugins:
  openshift/network-observability-ebpf-agent:
    plugins:
    - approve
triggers:
- org_invite:
    prominent: {}
  repos:
  - openshift/network-observability-ebpf-agent
  trusted_apps:
  - openshift-merge-bot
  - red-hat-konflux
