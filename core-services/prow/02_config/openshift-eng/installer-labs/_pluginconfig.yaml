approve:
- repos:
  - openshift-eng/installer-labs
  require_self_approval: false
external_plugins:
  openshift-eng/installer-labs:
  - endpoint: http://refresh
    events:
    - issue_comment
    name: refresh
  - endpoint: http://cherrypick
    events:
    - issue_comment
    - pull_request
    name: cherrypick
  - endpoint: http://needs-rebase
    events:
    - issue_comment
    - pull_request
    name: needs-rebase
  - endpoint: http://jira-lifecycle-plugin
    events:
    - issue_comment
    - pull_request
    - pull_request_review
    name: jira-lifecycle-plugin
lgtm:
- repos:
  - openshift-eng/installer-labs
  review_acts_as_lgtm: true
plugins:
  openshift-eng/installer-labs:
    plugins:
    - assign
    - blunderbuss
    - cat
    - dog
    - heart
    - golint
    - goose
    - help
    - hold
    - jira
    - label
    - lgtm
    - lifecycle
    - override
    - pony
    - retitle
    - shrug
    - sigmention
    - skip
    - trigger
    - verify-owners
    - owners-label
    - wip
    - yuks
    - approve
triggers:
- repos:
  - openshift-eng/installer-labs
  trusted_apps:
  - openshift-merge-bot
