approve:
- repos:
  - openshift-eng/edge-tooling
  require_self_approval: false
lgtm:
- repos:
  - openshift-eng/edge-tooling
  review_acts_as_lgtm: true
plugins:
  openshift-eng/edge-tooling:
    plugins:
    - approve
    - hold
    - label
    - lgtm
    - trigger
    - verify-owners
    - wip
    - jira
triggers:
- org_invite:
    prominent: {}
  repos:
  - openshift-eng/edge-tooling
  trusted_apps:
  - openshift-merge-bot
