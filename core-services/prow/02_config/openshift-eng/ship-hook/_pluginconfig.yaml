approve:
- lgtm_acts_as_approve: true
  repos:
  - openshift-eng/ship-hook
  require_self_approval: false
external_plugins:
  openshift-eng/ship-hook:
  - endpoint: http://refresh
    events:
    - issue_comment
    name: refresh
  - endpoint: http://needs-rebase
    events:
    - issue_comment
    - pull_request
    name: needs-rebase
  - endpoint: http://pipeline-controller
    events:
    - pull_request
    - issue_comment
    name: pipeline-controller
lgtm:
- repos:
  - openshift-eng/ship-hook
  review_acts_as_lgtm: true
plugins:
  openshift-eng/ship-hook:
    plugins:
    - assign
    - cat
    - dog
    - heart
    - help
    - hold
    - jira
    - label
    - lgtm
    - lifecycle
    - override
    - pony
    - retitle
    - shrug
    - skip
    - trigger
    - verify-owners
    - owners-label
    - wip
    - yuks
    - approve
triggers:
- org_invite:
    prominent: {}
  repos:
  - openshift-eng/ship-hook
  trusted_apps:
  - openshift-merge-bot
