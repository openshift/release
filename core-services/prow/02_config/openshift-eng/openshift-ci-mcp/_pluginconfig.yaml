approve:
- repos:
  - openshift-eng/openshift-ci-mcp
  require_self_approval: false
lgtm:
- repos:
  - openshift-eng/openshift-ci-mcp
  review_acts_as_lgtm: true
plugins:
  openshift-eng/openshift-ci-mcp:
    plugins:
    - approve
    - hold
    - label
    - lgtm
    - trigger
    - verify-owners
    - wip
    - jira
triggers:
- repos:
  - openshift-eng/openshift-ci-mcp
  trusted_apps:
  - openshift-merge-bot
