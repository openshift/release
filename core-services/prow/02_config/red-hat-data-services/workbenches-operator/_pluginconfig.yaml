approve:
- repos:
  - red-hat-data-services/workbenches-operator
  require_self_approval: true
external_plugins:
  red-hat-data-services/workbenches-operator:
  - endpoint: http://refresh
    events:
    - issue_comment
    name: refresh
  - endpoint: http://cherrypick
    events:
    - issue_comment
    - pull_request
    name: cherrypick
  - endpoint: http://needs-rebase
    events:
    - issue_comment
    name: needs-rebase
  - endpoint: http://backport-verifier
    events:
    - issue_comment
    - pull_request
    name: backport-verifier
lgtm:
- repos:
  - red-hat-data-services/workbenches-operator
  review_acts_as_lgtm: true
plugins:
  red-hat-data-services/workbenches-operator:
    plugins:
    - approve
    - assign
    - blunderbuss
    - help
    - hold
    - jira
    - label
    - lgtm
    - lifecycle
    - override
    - retitle
    - size
    - skip
    - trigger
    - transfer-issue
    - verify-owners
    - wip
triggers:
- repos:
  - red-hat-data-services/workbenches-operator
  trusted_apps:
  - openshift-merge-bot
