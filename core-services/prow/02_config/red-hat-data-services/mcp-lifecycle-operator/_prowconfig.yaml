branch-protection:
  orgs:
    red-hat-data-services:
      repos:
        mcp-lifecycle-operator:
          unmanaged: true
tide:
  merge_method:
    red-hat-data-services/mcp-lifecycle-operator: squash
  queries:
  - labels:
    - approved
    - lgtm
    missingLabels:
    - do-not-merge/hold
    - do-not-merge/invalid-owners-file
    - do-not-merge/work-in-progress
    - needs-rebase
    repos:
    - red-hat-data-services/mcp-lifecycle-operator
