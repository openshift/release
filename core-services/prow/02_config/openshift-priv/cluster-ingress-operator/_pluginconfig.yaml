approve:
- commandHelpLink: https://go.k8s.io/bot-commands
  ignore_review_state: true
  repos:
  - openshift-priv/cluster-ingress-operator
  require_self_approval: true
plugins:
  openshift-priv/cluster-ingress-operator:
    plugins:
    - approve
    - golint
    - goose
    - jira
    - owners-label
    - pony
    - sigmention
triggers:
- repos:
  - openshift-priv/cluster-ingress-operator
  trusted_apps:
  - openshift-merge-bot
