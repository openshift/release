approve:
- commandHelpLink: ""
  repos:
  - openshift-priv/crd-schema-checker
  require_self_approval: false
lgtm:
- repos:
  - openshift-priv/crd-schema-checker
  review_acts_as_lgtm: true
plugins:
  openshift-priv/crd-schema-checker:
    plugins:
    - approve
    - golint
    - goose
    - jira
    - owners-label
    - pony
    - sigmention
triggers:
- repos:
  - openshift-priv/crd-schema-checker
  trusted_apps:
  - openshift-merge-bot
