approve:
- commandHelpLink: ""
  repos:
  - openshift-priv/hypershift
  require_self_approval: false
lgtm:
- repos:
  - openshift-priv/hypershift
  review_acts_as_lgtm: true
plugins:
  openshift-priv/hypershift:
    plugins:
    - approve
    - golint
    - goose
    - jira
    - owners-label
    - pony
    - require-matching-label
    - sigmention
triggers:
- repos:
  - openshift-priv/hypershift
  trusted_apps:
  - openshift-merge-bot
