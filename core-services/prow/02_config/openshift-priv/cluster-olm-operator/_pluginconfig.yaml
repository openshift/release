approve:
- commandHelpLink: https://go.k8s.io/bot-commands
  repos:
  - openshift-priv/cluster-olm-operator
  require_self_approval: false
lgtm:
- repos:
  - openshift-priv/cluster-olm-operator
  review_acts_as_lgtm: true
plugins:
  openshift-priv/cluster-olm-operator:
    plugins:
    - approve
    - golint
    - goose
    - jira
    - owners-label
    - pony
    - sigmention
