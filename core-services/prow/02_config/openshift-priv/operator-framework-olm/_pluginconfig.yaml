approve:
- commandHelpLink: https://go.k8s.io/bot-commands
  repos:
  - openshift-priv/operator-framework-olm
  require_self_approval: false
lgtm:
- repos:
  - openshift-priv/operator-framework-olm
  review_acts_as_lgtm: true
plugins:
  openshift-priv/operator-framework-olm:
    plugins:
    - approve
    - golint
    - goose
    - jira
    - owners-label
    - pony
    - sigmention
triggers:
- repos:
  - openshift-priv/operator-framework-olm
  trusted_apps:
  - openshift-merge-bot
