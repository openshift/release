approve:
- commandHelpLink: https://go.k8s.io/bot-commands
  ignore_review_state: true
  repos:
  - openshift-priv/kubernetes-autoscaler
  require_self_approval: true
plugins:
  openshift-priv/kubernetes-autoscaler:
    plugins:
    - approve
    - assign
    - blunderbuss
    - cat
    - dog
    - golint
    - goose
    - heart
    - help
    - hold
    - jira
    - label
    - lgtm
    - lifecycle
    - override
    - owners-label
    - pony
    - retitle
    - shrug
    - sigmention
    - skip
    - trigger
    - verify-owners
    - wip
    - yuks
triggers:
- repos:
  - openshift-priv/kubernetes-autoscaler
  trusted_apps:
  - openshift-merge-bot
