approve:
- commandHelpLink: https://go.k8s.io/bot-commands
  repos:
  - openshift-priv/operator-marketplace
  require_self_approval: true
lgtm:
- repos:
  - openshift-priv/operator-marketplace
  review_acts_as_lgtm: true
plugins:
  openshift-priv/operator-marketplace:
    plugins:
    - approve
    - golint
    - sigmention
triggers:
- repos:
  - openshift-priv/operator-marketplace
  trusted_apps:
  - openshift-merge-bot
