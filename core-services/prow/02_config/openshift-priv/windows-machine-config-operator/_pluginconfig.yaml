approve:
- commandHelpLink: https://go.k8s.io/bot-commands
  repos:
  - openshift-priv/windows-machine-config-operator
  require_self_approval: false
plugins:
  openshift-priv/windows-machine-config-operator:
    plugins:
    - approve
    - golint
    - goose
    - jira
    - owners-label
    - pony
    - sigmention
triggers:
- repos:
  - openshift-priv/windows-machine-config-operator
  trusted_apps:
  - openshift-merge-bot
