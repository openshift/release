approve:
- commandHelpLink: https://go.k8s.io/bot-commands
  repos:
  - openshift-priv/operator-registry
  require_self_approval: true
lgtm:
- repos:
  - openshift-priv/operator-registry
  review_acts_as_lgtm: true
plugins:
  openshift-priv/operator-registry:
    plugins:
    - approve
    - assign
    - blunderbuss
    - cat
    - dog
    - golint
    - heart
    - help
    - hold
    - label
    - lgtm
    - lifecycle
    - override
    - retitle
    - shrug
    - sigmention
    - skip
    - trigger
    - verify-owners
    - wip
    - yuks
