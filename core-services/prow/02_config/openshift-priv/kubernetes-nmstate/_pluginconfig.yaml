approve:
- commandHelpLink: https://go.k8s.io/bot-commands
  repos:
  - openshift-priv/kubernetes-nmstate
  require_self_approval: false
lgtm:
- repos:
  - openshift-priv/kubernetes-nmstate
  review_acts_as_lgtm: true
plugins:
  openshift-priv/kubernetes-nmstate:
    plugins:
    - approve
    - golint
    - goose
    - jira
    - owners-label
    - pony
    - sigmention
triggers:
- repos:
  - openshift-priv/kubernetes-nmstate
  trusted_apps:
  - openshift-merge-bot
