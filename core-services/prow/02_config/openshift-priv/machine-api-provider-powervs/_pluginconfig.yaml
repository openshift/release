approve:
- lgtm_acts_as_approve: true
  repos:
  - openshift-priv/machine-api-provider-powervs
  require_self_approval: false
lgtm:
- repos:
  - openshift-priv/machine-api-provider-powervs
  review_acts_as_lgtm: true
plugins:
  openshift-priv/machine-api-provider-powervs:
    plugins:
    - approve
    - assign
    - blunderbuss
    - cat
    - dog
    - golint
    - goose
    - heart
    - help
    - hold
    - jira
    - label
    - lgtm
    - lifecycle
    - override
    - owners-label
    - pony
    - retitle
    - shrug
    - sigmention
    - skip
    - trigger
    - verify-owners
    - wip
    - yuks
triggers:
- org_invite:
    prominent: {}
  repos:
  - openshift-priv/machine-api-provider-powervs
  trusted_apps:
  - openshift-merge-bot
