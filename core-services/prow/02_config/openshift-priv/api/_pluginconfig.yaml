approve:
- lgtm_acts_as_approve: true
  repos:
  - openshift-priv/api
  require_self_approval: true
plugins:
  openshift-priv/api:
    plugins:
    - approve
    - assign
    - blunderbuss
    - cat
    - dog
    - golint
    - goose
    - heart
    - help
    - hold
    - jira
    - label
    - lgtm
    - lifecycle
    - override
    - owners-label
    - pony
    - retitle
    - shrug
    - sigmention
    - size
    - skip
    - trigger
    - verify-owners
    - welcome
    - wip
    - yuks
triggers:
- org_invite:
    prominent: {}
  repos:
  - openshift-priv/api
  trusted_apps:
  - openshift-merge-bot
