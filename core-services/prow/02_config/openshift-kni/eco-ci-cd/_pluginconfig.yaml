approve:
- commandHelpLink: ""
  repos:
  - openshift-kni/eco-ci-cd
  require_self_approval: true
external_plugins:
  openshift-kni/eco-ci-cd:
  - endpoint: http://backport-verifier
    events:
    - issue_comment
    - pull_request
    name: backport-verifier
  - endpoint: http://payload-testing-prow-plugin
    events:
    - issue_comment
    name: payload-testing-prow-plugin
lgtm:
- repos:
  - openshift-kni/eco-ci-cd
  review_acts_as_lgtm: true
triggers:
- repos:
  - openshift-kni/eco-ci-cd
  trusted_apps:
  - red-hat-konflux
  - openshift-merge-bot
