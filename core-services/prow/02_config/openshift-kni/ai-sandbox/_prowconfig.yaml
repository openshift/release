branch-protection:
  orgs:
    openshift-kni:
      repos:
        ai-sandbox:
          branches:
            main:
              allow_deletions: false
              allow_force_pushes: false
              enforce_admins: true
              protect: true
              required_pull_request_reviews:
                require_code_owner_reviews: true
                required_approving_review_count: 1
            master:
              allow_deletions: false
              allow_force_pushes: false
              enforce_admins: true
              protect: true
              required_pull_request_reviews:
                require_code_owner_reviews: true
                required_approving_review_count: 1
            release-*:
              allow_deletions: false
              allow_force_pushes: false
              enforce_admins: true
              protect: true
              required_pull_request_reviews:
                require_code_owner_reviews: true
                required_approving_review_count: 1
tide:
  queries:
  - labels:
    - approved
    - lgtm
    missingLabels:
    - backports/unvalidated-commits
    - do-not-merge/hold
    - do-not-merge/invalid-owners-file
    - do-not-merge/work-in-progress
    - jira/invalid-bug
    - needs-rebase
    repos:
    - openshift-kni/ai-sandbox
