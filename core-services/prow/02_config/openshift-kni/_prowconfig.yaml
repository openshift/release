branch-protection:
  orgs:
    openshift-kni:
      allow_deletions: false
      allow_force_pushes: false
      enforce_admins: true
      include:
      - ^main$
      - ^master$
      - ^release-.*
      protect: true
tide:
  queries:
  - labels:
    - approved
    - lgtm
    missingLabels:
    - backports/unvalidated-commits
    - do-not-merge/hold
    - do-not-merge/invalid-owners-file
    - do-not-merge/work-in-progress
    - jira/invalid-bug
    - needs-rebase
    orgs:
    - openshift-kni
