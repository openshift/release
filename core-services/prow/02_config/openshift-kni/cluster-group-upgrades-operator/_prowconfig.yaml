tide:
  merge_method:
    openshift-kni/cluster-group-upgrades-operator: squash
  queries:
  - author: red-hat-konflux[bot]
    labels:
    - allow-automatic-merge
    missingLabels:
    - do-not-merge
    - do-not-merge/hold
    - do-not-merge/work-in-progress
