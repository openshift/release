approve:
- commandHelpLink: ""
  repos:
  - openshift-kni/cluster-group-upgrades-operator
  require_self_approval: true
external_plugins:
  openshift-kni/cluster-group-upgrades-operator:
  - endpoint: http://backport-verifier
    events:
    - issue_comment
    - pull_request
    name: backport-verifier
lgtm:
- repos:
  - openshift-kni/cluster-group-upgrades-operator
  review_acts_as_lgtm: true
triggers:
- repos:
  - openshift-kni/cluster-group-upgrades-operator
  trusted_apps:
  - red-hat-konflux
  - openshift-merge-bot
