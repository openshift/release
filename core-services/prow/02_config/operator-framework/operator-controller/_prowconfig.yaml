branch-protection:
  orgs:
    operator-framework:
      repos:
        operator-controller:
          branches:
            main:
              protect: true
              required_status_checks:
                contexts:
                - build
                - verify
                - unit
                - e2e
                - upgrade-e2e
tide:
  merge_method:
    operator-framework/operator-controller: squash
  queries:
  - includedBranches:
    - main
    labels:
    - approved
    - lgtm
    missingLabels:
    - backports/unvalidated-commits
    - do-not-merge/hold
    - do-not-merge/invalid-owners-file
    - do-not-merge/work-in-progress
    - jira/invalid-bug
    - needs-rebase
    repos:
    - operator-framework/operator-controller
