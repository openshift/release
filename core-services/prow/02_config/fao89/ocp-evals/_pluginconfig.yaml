approve:
- ignore_review_state: true
  repos:
  - fao89/ocp-evals
  require_self_approval: true
external_plugins:
  fao89/ocp-evals:
  - endpoint: http://needs-rebase
    events:
    - pull_request
    name: needs-rebase
lgtm:
- repos:
  - fao89/ocp-evals
plugins:
  fao89/ocp-evals:
    plugins:
    - approve
    - hold
    - lgtm
    - verify-owners
    - wip
triggers:
- repos:
  - fao89/ocp-evals
  trusted_apps:
  - openshift-merge-bot
