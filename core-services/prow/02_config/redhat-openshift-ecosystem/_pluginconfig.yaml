external_plugins:
  redhat-openshift-ecosystem:
  - endpoint: http://refresh
    events:
    - issue_comment
    name: refresh
  - endpoint: http://cherrypick
    events:
    - issue_comment
    - pull_request
    name: cherrypick
  - endpoint: http://needs-rebase
    events:
    - pull_request
    name: needs-rebase
  - endpoint: http://repo-brancher-controller
    events:
    - push
    name: repo-brancher-controller
plugins:
  redhat-openshift-ecosystem:
    plugins:
    - assign
    - blunderbuss
    - cat
    - dog
    - heart
    - golint
    - help
    - hold
    - label
    - lgtm
    - lifecycle
    - override
    - retitle
    - shrug
    - skip
    - trigger
    - verify-owners
    - wip
    - yuks
triggers:
- repos:
  - redhat-openshift-ecosystem
  trusted_apps:
  - openshift-merge-bot
