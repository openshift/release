approve:
- commandHelpLink: https://go.k8s.io/bot-commands
  ignore_review_state: true
  repos:
  - openshift-virtualization/virt-platform-autopilot
  require_self_approval: true
external_plugins:
  openshift-virtualization/virt-platform-autopilot:
  - endpoint: http://cherrypick
    events:
    - issue_comment
    - pull_request
    name: cherrypick
  - endpoint: http://needs-rebase
    events:
    - issue_comment
    - pull_request
    name: needs-rebase
lgtm:
- repos:
  - openshift-virtualization/virt-platform-autopilot
  review_acts_as_lgtm: true
plugins:
  openshift-virtualization/virt-platform-autopilot:
    plugins:
    - assign
    - golint
    - help
    - hold
    - label
    - lgtm
    - trigger
    - owners-label
    - approve
    - wip
    - verify-owners
triggers:
- org_invite:
    prominent: {}
  repos:
  - openshift-virtualization/virt-platform-autopilot
  trusted_apps:
  - openshift-merge-bot
