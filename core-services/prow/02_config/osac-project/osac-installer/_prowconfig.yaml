branch-protection:
  orgs:
    osac-project:
      repos:
        osac-installer:
          branches:
            main:
              protect: true
              required_status_checks:
                strict: true
tide:
  queries:
  - labels:
    - approved
    - lgtm
    missingLabels:
    - backports/unvalidated-commits
    - do-not-merge/hold
    - do-not-merge/invalid-owners-file
    - do-not-merge/work-in-progress
    - jira/invalid-bug
    - needs-rebase
    repos:
    - osac-project/osac-installer
