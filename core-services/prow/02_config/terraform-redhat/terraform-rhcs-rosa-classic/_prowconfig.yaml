branch-protection:
  orgs:
    terraform-redhat:
      repos:
        terraform-rhcs-rosa-classic:
          branches:
            main:
              protect: true
              required_status_checks:
                contexts:
                - ci/prow/images
                - ci/prow/pre-push-checks
                - ci/prow/security-check
                - ci/prow/rosa-classic-private-with-autoscaler-unmanaged-oidc-byo-vpc
                - ci/prow/rosa-classic-public
          protect: false
tide:
  queries:
  - labels:
    - approved
    - lgtm
    missingLabels:
    - backports/unvalidated-commits
    - do-not-merge/hold
    - do-not-merge/invalid-owners-file
    - do-not-merge/work-in-progress
    - jira/invalid-bug
    - needs-rebase
    repos:
    - terraform-redhat/terraform-rhcs-rosa-classic
