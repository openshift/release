branch-protection:
  orgs:
    terraform-redhat:
      repos:
        terraform-provider-rhcs:
          branches:
            main:
              protect: true
              required_status_checks:
                contexts:
                - ci/prow/pre-push-checks
                - ci/prow/images
                - ci/prow/e2e-images
                - ci/prow/e2e-presubmits-images
                - ci/prow/e2e-presubmits-rosa-hcp-advanced-critical-high-presubmit
                - ci/prow/e2e-presubmits-rosa-hcp-private-critical-high-presubmit
                - ci/prow/e2e-presubmits-rosa-sts-advanced-critical-high-presubmit
                - ci/prow/e2e-presubmits-rosa-sts-private-critical-high-presubmit
          protect: false
tide:
  merge_method:
    terraform-redhat/terraform-provider-rhcs: rebase
  queries:
  - labels:
    - approved
    - lgtm
    missingLabels:
    - backports/unvalidated-commits
    - do-not-merge/hold
    - do-not-merge/invalid-owners-file
    - do-not-merge/work-in-progress
    - jira/invalid-bug
    - needs-rebase
    repos:
    - terraform-redhat/terraform-provider-rhcs
