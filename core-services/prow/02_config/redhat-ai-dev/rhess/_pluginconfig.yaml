approve:
- commandHelpLink: https://go.k8s.io/bot-commands
  repos:
  - redhat-ai-dev/rhess
  require_self_approval: false
lgtm:
- repos:
  - redhat-ai-dev/rhess
  review_acts_as_lgtm: true
plugins:
  redhat-ai-dev/rhess:
    plugins:
    - approve
    - assign
    - blunderbuss
    - help
    - hold
    - label
    - lgtm
    - lifecycle
    - override
    - retitle
    - skip
    - trigger
    - verify-owners
    - wip
triggers:
- repos:
  - redhat-ai-dev/rhess
  trusted_apps:
  - openshift-merge-bot
