tide:
  queries:
  - labels:
    - approved
    - lgtm
    - okay to merge
    missingLabels:
    - 'dco-signoff: no'
    - do-not-merge/hold
    - do-not-merge/invalid-owners-file
    - do-not-merge/work-in-progress
