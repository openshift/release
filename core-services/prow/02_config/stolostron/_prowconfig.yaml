tide:
  merge_method:
    stolostron: squash
  queries:
  - excludedRepos:
    - stolostron/multicluster-mesh-addon
    labels:
    - approved
    - lgtm
    missingLabels:
    - 'dco-signoff: no'
    - do-not-merge/hold
    - do-not-merge/invalid-owners-file
    - do-not-merge/work-in-progress
    - needs-rebase
    orgs:
    - stolostron
