branch-protection:
  orgs:
    stolostron:
      repos:
        search-mcp-server:
          branches:
            main:
              protect: true
              required_pull_request_reviews:
                required_approving_review_count: 1
          required_pull_request_reviews:
            dismiss_stale_reviews: false
            required_approving_review_count: 1
tide:
  merge_method:
    stolostron/search-mcp-server: squash
