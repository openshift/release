branch-protection:
  orgs:
    outrigger-project:
      repos:
        multiarch-tuning-operator:
          branches:
            main:
              protect: true
              required_pull_request_reviews:
                required_approving_review_count: 1
              required_status_checks:
                contexts:
                - ci/prow/bundle
                - ci/prow/ci-bundle-multiarch-tuning-operator-bundle
                - ci/prow/fmt
                - ci/prow/generate
                - ci/prow/goimports
                - ci/prow/images
                - ci/prow/lint
                - ci/prow/manifests
                - ci/prow/sast
                - ci/prow/unit
                - ci/prow/vendor
                - ci/prow/vet
            v1.x:
              unmanaged: true
tide:
  queries:
  - labels:
    - approved
    - lgtm
    missingLabels:
    - backports/unvalidated-commits
    - do-not-merge/hold
    - do-not-merge/invalid-owners-file
    - do-not-merge/work-in-progress
    - jira/invalid-bug
    - needs-rebase
    repos:
    - outrigger-project/multiarch-tuning-operator
