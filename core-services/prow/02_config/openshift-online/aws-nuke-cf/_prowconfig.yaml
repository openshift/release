branch-protection:
  orgs:
    openshift-online:
      repos:
        aws-nuke-cf:
          branches:
            main:
              protect: true
              required_status_checks:
                contexts:
                - Konflux kflux-prd-rh02 / aws-nuke-cf-on-pull-request
                - ci/prow/images
tide:
  queries:
  - labels:
    - approved
    - jira/valid-reference
    - lgtm
    missingLabels:
    - backports/unvalidated-commits
    - do-not-merge/hold
    - do-not-merge/invalid-owners-file
    - do-not-merge/work-in-progress
    - jira/invalid-bug
    - needs-rebase
    repos:
    - openshift-online/aws-nuke-cf
