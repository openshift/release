branch-protection:
  orgs:
    openshift-online:
      repos:
        finops-tools:
          branches:
            main:
              protect: true
              enforce_admins: true
              required_pull_request_reviews:
                dismiss_stale_reviews: true
                required_approving_review_count: 1
          restrictions:
            teams:
            - openshift-bots
tide:
  merge_method:
    openshift-online/finops-tools: squash
  queries:
  - includedBranches:
    - main
    labels:
    - approved
    - lgtm
    missingLabels:
    - backports/unvalidated-commits
    - do-not-merge/hold
    - do-not-merge/invalid-owners-file
    - do-not-merge/work-in-progress
    - jira/invalid-bug
    - needs-rebase
    repos:
    - openshift-online/finops-tools
