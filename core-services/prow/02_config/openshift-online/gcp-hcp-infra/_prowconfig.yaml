branch-protection:
  orgs:
    openshift-online:
      repos:
        gcp-hcp-infra:
          branches:
            environment/global-integration:
              protect: true
              restrictions:
                apps:
                - gcp-hcp-gitops-promoter
            environment/global-stage:
              protect: true
              restrictions:
                apps:
                - gcp-hcp-gitops-promoter
            main:
              protect: true
              required_status_checks:
                contexts:
                - atlantis-int/plan
                - atlantis-int/apply
                - atlantis-stg/plan
                - atlantis-stg/apply
          restrictions:
            teams:
            - openshift-bots
tide:
  queries:
  - labels:
    - approved
    - lgtm
    missingLabels:
    - backports/unvalidated-commits
    - do-not-merge/hold
    - do-not-merge/invalid-owners-file
    - do-not-merge/work-in-progress
    - jira/invalid-bug
    - needs-rebase
    repos:
    - openshift-online/gcp-hcp-infra
