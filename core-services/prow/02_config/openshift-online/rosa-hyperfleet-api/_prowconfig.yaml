branch-protection:
  orgs:
    openshift-online:
      repos:
        rosa-hyperfleet-api:
          branches:
            main:
              protect: true
              required_status_checks:
                contexts:
                - Konflux kflux-prd-rh02 / rosa-hyperfleet-api-on-pull-request
                - ci/prow/images
                - ci/prow/lint
                - ci/prow/unit
                - ci/prow/verify
tide:
  queries:
  - labels:
    - approved
    - jira/valid-reference
    - lgtm
    missingLabels:
    - backports/unvalidated-commits
    - do-not-merge/hold
    - do-not-merge/invalid-owners-file
    - do-not-merge/work-in-progress
    - jira/invalid-bug
    - needs-rebase
    repos:
    - openshift-online/rosa-hyperfleet-api
