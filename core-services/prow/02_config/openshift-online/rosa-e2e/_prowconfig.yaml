branch-protection:
  orgs:
    openshift-online:
      repos:
        rosa-e2e:
          required_status_checks:
            contexts:
            - ci/prow/e2e-rosa-classic-smoke
            - ci/prow/e2e-rosa-hcp-smoke
slack_reporter_configs:
  openshift-online/rosa-e2e:
    channel: '#ocm-fvt-prow'
    job_states_to_report:
    - success
    - failure
    - error
    job_types_to_report:
    - periodic
    report_template: '{{if eq .Status.State "success"}} :green_jenkins_circle: Job
      *{{.Spec.Job}}* ended with *{{.Status.State}}*. <{{.Status.URL}}|View logs>
      :rainbow: {{else}} <!subteam^S06F39XKT6K> :red_jenkins_circle: Job *{{.Spec.Job}}*
      ended with *{{.Status.State}}*. <{{.Status.URL}}|View logs> :volcano: {{end}}'
tide:
  queries:
  - labels:
    - approved
    - lgtm
    missingLabels:
    - do-not-merge/hold
    - do-not-merge/invalid-owners-file
    - do-not-merge/work-in-progress
    - needs-rebase
    repos:
    - openshift-online/rosa-e2e
