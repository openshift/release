approve:
- commandHelpLink: ""
  repos:
  - openshift-online/rosa-e2e
  require_self_approval: false
external_plugins:
  openshift-online/rosa-e2e:
  - endpoint: http://refresh
    events:
    - issue_comment
    name: refresh
  - endpoint: http://cherrypick
    events:
    - issue_comment
    - pull_request
    name: cherrypick
  - endpoint: http://needs-rebase
    events:
    - issue_comment
    - pull_request
    name: needs-rebase
  - endpoint: http://jira-lifecycle-plugin
    events:
    - issue_comment
    - pull_request
    name: jira-lifecycle-plugin
lgtm:
- repos:
  - openshift-online/rosa-e2e
  review_acts_as_lgtm: true
plugins:
  openshift-online/rosa-e2e:
    plugins:
    - assign
    - blunderbuss
    - help
    - hold
    - jira
    - label
    - lgtm
    - lifecycle
    - override
    - retitle
    - skip
    - trigger
    - verify-owners
    - owners-label
    - wip
    - approve
