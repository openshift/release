approve:
- lgtm_acts_as_approve: true
  repos:
  - openshift-online/coderabbit
  require_self_approval: false
external_plugins:
  openshift-online/coderabbit:
  - endpoint: http://needs-rebase
    events:
    - issue_comment
    - pull_request
    name: needs-rebase
plugins:
  openshift-online/coderabbit:
    plugins:
    - approve
    - hold
    - lgtm
    - verify-owners
    - wip
