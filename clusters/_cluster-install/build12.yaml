clusterName: build12
onboard:
  machineSet:
    patches:
    - type: json-patch
      matches:
      - kind: MachineSet
        name: '.+worker.+'
      inline: [{"op": "add", "path": "/spec/template/spec/providerSpec/value/blockDevices/-", "value": {"ebs": {"encrypted": true, "volumeSize": 100, "volumeType": "gp3"}, "deviceName": "/dev/xvdb"}}]
