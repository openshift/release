additionalTrustBundlePolicy: Proxyonly
apiVersion: v1
baseDomain: gcp.ci.openshift.org
compute:
- architecture: amd64
  hyperthreading: Enabled
  name: worker
  platform:
    gcp:
      type: n1-standard-16
  replicas: 3
controlPlane:
  architecture: amd64
  hyperthreading: Enabled
  name: master
  platform:
    gcp:
      type: n1-standard-8
  replicas: 3
metadata:
  creationTimestamp: null
  name: build08
networking:
  clusterNetwork:
  - cidr: 10.128.0.0/14
    hostPrefix: 23
  machineNetwork:
  - cidr: 10.0.0.0/16
  networkType: OVNKubernetes
  serviceNetwork:
  - 172.30.0.0/16
platform:
  gcp:
    projectID: openshift-ci-build-farm
    region: us-east1
publish: External
pullSecret: '{{ pull_secret }}'
sshKey: '{{ ssh_key }}'
