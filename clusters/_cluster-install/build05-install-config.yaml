additionalTrustBundlePolicy: Proxyonly
apiVersion: v1
baseDomain: ci.devcluster.openshift.com
compute:
- architecture: arm64
  hyperthreading: Enabled
  name: worker
  platform:
    aws:
      type: m6g.4xlarge
      zones:
      - us-east-2a
      - us-east-2b
      - us-east-2c
  replicas: 3
controlPlane:
  architecture: arm64
  hyperthreading: Enabled
  name: master
  platform:
    aws:
      type: m7g.4xlarge
      zones:
      - us-east-2a
      - us-east-2b
      - us-east-2c
  replicas: 3
credentialsMode: Manual
metadata:
  creationTimestamp: null
  name: build05
networking:
  clusterNetwork:
  - cidr: 172.24.0.0/16
    hostPrefix: 23
  machineNetwork:
  - cidr: 10.28.69.0/24
  - cidr: 10.28.70.0/24
  - cidr: 10.28.71.0/24
  networkType: OVNKubernetes
  serviceNetwork:
  - 172.30.0.0/16
platform:
  aws:
    region: us-east-2
    subnets:
    - subnet-008b42df93e2652ff
    - subnet-0a2011a60426d13dd
    - subnet-0d48f7ba45b10d519
publish: External
pullSecret: '{{ pull_secret }}'
sshKey: '{{ ssh_key }}'
