additionalTrustBundlePolicy: Proxyonly
apiVersion: v1
baseDomain: ci.devcluster.openshift.com
compute:
- architecture: arm64
  hyperthreading: Enabled
  name: worker
  platform:
    aws:
      type: m6g.4xlarge
      zones:
      - us-east-2a
      - us-east-2b
      - us-east-2c
  replicas: 3
controlPlane:
  architecture: arm64
  hyperthreading: Enabled
  name: master
  platform:
    aws:
      type: m7g.4xlarge
      zones:
      - us-east-2a
      - us-east-2b
      - us-east-2c
  replicas: 3
credentialsMode: Manual
metadata:
  creationTimestamp: null
  name: build09
networking:
  clusterNetwork:
  - cidr: 172.24.0.0/16
    hostPrefix: 23
  machineNetwork:
  - cidr: 10.28.68.0/26
  - cidr: 10.28.68.64/26
  - cidr: 10.28.68.128/26
  networkType: OVNKubernetes
  serviceNetwork:
  - 172.30.0.0/16
platform:
  aws:
    region: us-east-2
    subnets:
    - subnet-00e575577e663ce65
    - subnet-012f18fd204246496
    - subnet-0cf4d535eccda6361
publish: External
pullSecret: '{{ pull_secret }}'
sshKey: '{{ ssh_key }}'
