clusterName: build06
credentialsMode: Manual
provision:
  aws:
    cloudFormationTemplates:
    - stackName: build06-iam
      templateBody: https://raw.githubusercontent.com/bear-redhat/tools/refs/heads/master/cluster-onboarding/iam.cf
      parameters:
      - key: BaseDomain
        value: ci.devcluster.openshift.com
      - key: ProvisionUserName
        value: build06-robot-provision
      - key: GroupName
        value: ci-robot-provision
      capabilities: ['CAPABILITY_NAMED_IAM']
    - stackName: build06-vpc
      templateBody: https://raw.githubusercontent.com/bear-redhat/tools/refs/heads/master/cluster-onboarding/vpc.yaml
      parameters:
      - key: BaseName
        value: build06
      capabilities: ['CAPABILITY_IAM']
onboard:
  osd: false
  hosted: false
  unmanaged: false
  useTokenFileInKubeconfig: true
  multiarch: true
  multiarchBuilderController:
    skip: true
  certificate:
    imageRegistryPublicHost: registry.build06.ci.openshift.org
  cloudCredential:
    aws: {}
  ciSchedulingWebhook:
    patches:
    - type: json-patch
      matches:
      - kind: MachineSet
        name: '.+aarch64.+'
      inline: [{"op": "add", "path": "/spec/template/spec/providerSpec/value/ami/id", "value": "ami-02e527f3ccc13508b"}]
    - type: json-patch
      matches:
      - kind: MachineSet
        name: '.+amd64.+'
      inline: [{"op": "add", "path": "/spec/template/spec/providerSpec/value/ami/id", "value": "ami-0e79bb8acc37d2696"}]
    # instanceType aarch64
    - type: json-patch
      matches:
      - kind: MachineSet
        name: ci-(builds|longtests|prowjobs|tests)-worker-aarch64
      inline: [{"op": "add", "path": "/spec/template/spec/providerSpec/value/instanceType", "value": "c6g.4xlarge"}]
    # instanceType amd64
    - type: json-patch
      matches:
      - kind: MachineSet
        name: ci-(builds|longtests|prowjobs|tests)-worker-amd64
      inline: [{"op": "add", "path": "/spec/template/spec/providerSpec/value/instanceType", "value": "c6a.4xlarge"}]
  machineSet:
    patches:
    - type: json-patch
      matches:
      - kind: MachineSet
        name: '.+aarch64.+'
      inline: [{"op": "add", "path": "/spec/template/spec/providerSpec/value/ami/id", "value": "ami-02e527f3ccc13508b"}]
    - type: json-patch
      matches:
      - kind: MachineSet
        name: '.+amd64.+'
      inline: [{"op": "add", "path": "/spec/template/spec/providerSpec/value/ami/id", "value": "ami-0e79bb8acc37d2696"}]
  openshiftMonitoring:
    patches:
    - matches:
      - kind: ConfigMap
        name: cluster-monitoring-config
        namespace: openshift-monitoring
      inline:
        data:
          config.yaml: |
            alertmanagerMain:
              nodeSelector:
                node-role.kubernetes.io/infra: ""
              tolerations:
              - key: node-role.kubernetes.io/infra
                operator: Exists
                effect: NoSchedule
              - key: node-role.kubernetes.io/infra
                operator: Exists
                effect: NoExecute
              volumeClaimTemplate:
                spec:
                  storageClassName: gp2
                  resources:
                    requests:
                      storage: 10Gi
            prometheusK8s:
              externalLabels:
                clusterName: build06
              remoteWrite:
                - url: "https://thanos-receive.core.ci.devcluster.openshift.com:19291/api/v1/receive"
                  tlsConfig:
                    ca:
                      secret:
                        name: thanos-remote-write-tls
                        key: ca.crt
                    cert:
                      secret:
                        name: thanos-remote-write-tls
                        key: client.crt
                    keySecret:
                      name: thanos-remote-write-tls
                      key: client.key
              nodeSelector:
                node-role.kubernetes.io/infra: ""
              tolerations:
              - key: node-role.kubernetes.io/infra
                operator: Exists
                effect: NoSchedule
              - key: node-role.kubernetes.io/infra
                operator: Exists
                effect: NoExecute
              volumeClaimTemplate:
                spec:
                  storageClassName: gp2
                  resources:
                    requests:
                      storage: 250Gi
            prometheusOperator:
              nodeSelector:
                node-role.kubernetes.io/infra: ""
              tolerations:
              - key: node-role.kubernetes.io/infra
                operator: Exists
                effect: NoSchedule
              - key: node-role.kubernetes.io/infra
                operator: Exists
                effect: NoExecute
            metricsServer:
              nodeSelector:
                node-role.kubernetes.io/infra: ""
              tolerations:
              - key: node-role.kubernetes.io/infra
                operator: Exists
                effect: NoSchedule
              - key: node-role.kubernetes.io/infra
                operator: Exists
                effect: NoExecute
            kubeStateMetrics:
              nodeSelector:
                node-role.kubernetes.io/infra: ""
              tolerations:
              - key: node-role.kubernetes.io/infra
                operator: Exists
                effect: NoSchedule
              - key: node-role.kubernetes.io/infra
                operator: Exists
                effect: NoExecute
            telemeterClient:
              nodeSelector:
                node-role.kubernetes.io/infra: ""
              tolerations:
              - key: node-role.kubernetes.io/infra
                operator: Exists
                effect: NoSchedule
              - key: node-role.kubernetes.io/infra
                operator: Exists
                effect: NoExecute
            openshiftStateMetrics:
              nodeSelector:
                node-role.kubernetes.io/infra: ""
              tolerations:
              - key: node-role.kubernetes.io/infra
                operator: Exists
                effect: NoSchedule
              - key: node-role.kubernetes.io/infra
                operator: Exists
                effect: NoExecute
            thanosQuerier:
              nodeSelector:
                node-role.kubernetes.io/infra: ""
              tolerations:
              - key: node-role.kubernetes.io/infra
                operator: Exists
                effect: NoSchedule
              - key: node-role.kubernetes.io/infra
                operator: Exists
                effect: NoExecute
