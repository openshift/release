apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  annotations:
    argocd.argoproj.io/manifest-generate-paths: .
  name: ofcir-system
  namespace: openshift-gitops
spec:
  destination:
    name: core-ci
  project: core-ci
  source:
    directory:
      exclude: '{OWNERS,*.md}'
      include: '{*.yaml,*.yml}'
      recurse: true
    path: clusters/core-ci/ofcir-system
    repoURL: https://github.com/openshift/release.git
    targetRevision: main
  syncPolicy:
    automated:
      enabled: true
      prune: false
      selfHeal: true
    preserveResourcesOnDeletion: true
    syncOptions:
      - ApplyOutOfSyncOnly=true
      - CreateNamespace=true
      - PruneLast=true
      - RespectIgnoreDifferences=true
      - ServerSideApply=true
