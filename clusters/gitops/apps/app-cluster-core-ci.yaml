apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  annotations:
    argocd.argoproj.io/manifest-generate-paths: .
  name: app-cluster-core-ci
  namespace: openshift-gitops
spec:
  destination:
    name: core-ci
    namespace: openshift-gitops
  ignoreDifferences:
    - group: machine.openshift.io
      jqPathExpressions:
        - .spec.template.spec.providerSpec.value.ami
      kind: MachineSet
  project: default
  source:
    directory:
      exclude: '{OWNERS,*.md}'
      include: '{*.yaml,*.yml}'
      recurse: true
    path: clusters/core-ci/
    repoURL: https://github.com/openshift/release.git
    targetRevision: main
  syncPolicy:
    automated:
      enabled: true
      prune: false
      selfHeal: true
    syncOptions:
      - ApplyOutOfSyncOnly=true
      - CreateNamespace=true
      - PruneLast=true
      - RespectIgnoreDifferences=true
      - ServerSideApply=true
