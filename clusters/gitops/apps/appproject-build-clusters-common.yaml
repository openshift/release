apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: build-clusters-common
  namespace: openshift-gitops
spec:
  sourceRepos:
  - https://github.com/openshift/release.git
  destinations:
  - name: build01
    namespace: '*'
  - name: build02
    namespace: '*'
  - name: build03
    namespace: '*'
  - name: build04
    namespace: '*'
  - name: build05
    namespace: '*'
  - name: build06
    namespace: '*'
  - name: build07
    namespace: '*'
  - name: build08
    namespace: '*'
  - name: build09
    namespace: '*'
  - name: build10
    namespace: '*'
  - name: build11
    namespace: '*'
  clusterResourceWhitelist:
  - group: ''
    kind: Namespace
  - group: rbac.authorization.k8s.io
    kind: ClusterRole
  - group: rbac.authorization.k8s.io
    kind: ClusterRoleBinding
  - group: admissionregistration.k8s.io
    kind: MutatingWebhookConfiguration
  - group: cert-manager.io
    kind: ClusterIssuer
  - group: config.openshift.io
    kind: ImageDigestMirrorSet
  - group: machineconfiguration.openshift.io
    kind: MachineConfig
  - group: machineconfiguration.openshift.io
    kind: MachineConfigPool
  - group: machineconfiguration.openshift.io
    kind: KubeletConfig
  - group: node.k8s.io
    kind: RuntimeClass
  - group: nvidia.com
    kind: ClusterPolicy
  - group: security.openshift.io
    kind: SecurityContextConstraints
  namespaceResourceWhitelist:
  - group: apps
    kind: Deployment
  - group: machine.openshift.io
    kind: MachineHealthCheck
  - group: operators.coreos.com
    kind: OperatorGroup
  - group: operators.coreos.com
    kind: Subscription
  - group: policy
    kind: PodDisruptionBudget
  - group: rbac.authorization.k8s.io
    kind: Role
  - group: rbac.authorization.k8s.io
    kind: RoleBinding
  - group: ''
    kind: Secret
  - group: ''
    kind: Service
  - group: ''
    kind: ServiceAccount
