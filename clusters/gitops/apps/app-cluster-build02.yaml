apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  annotations:
    argocd.argoproj.io/manifest-generate-paths: .
  name: app-cluster-build02
  namespace: openshift-gitops
spec:
  destination:
    name: build02
    namespace: openshift-gitops
  # DPTP-4410: ignore GCP MachineSet boot disk image (MCO); Argo selfHeal must not revert it.
  ignoreDifferences:
    - group: machine.openshift.io
      kind: MachineSet
      jqPathExpressions:
        - .spec.template.spec.providerSpec.value.disks[]?.image
  project: default
  source:
    directory:
      exclude: '{OWNERS,*.md}'
      include: '{*.yaml,*.yml}'
      recurse: true
    path: clusters/build-clusters/build02/
    repoURL: https://github.com/openshift/release.git
    targetRevision: main
  sources:
    - directory:
        exclude: '{OWNERS,*.md}'
        include: '{*.yaml,*.yml}'
        recurse: true
      path: clusters/build-clusters/build02/
      repoURL: https://github.com/openshift/release.git
      targetRevision: main
    - directory:
        exclude: '{OWNERS,*.md}'
        include: '{*.yaml,*.yml}'
        recurse: true
      path: clusters/build-clusters/common_except_app.ci/
      repoURL: https://github.com/openshift/release.git
      targetRevision: main
    - directory:
        exclude: '{OWNERS,*.md}'
        include: '{*.yaml,*.yml}'
        recurse: true
      path: clusters/build-clusters/common_except_hosted/
      repoURL: https://github.com/openshift/release.git
      targetRevision: main
  syncPolicy:
    automated:
      enabled: true
      prune: false
      selfHeal: true
    syncOptions:
      - ApplyOutOfSyncOnly=true
      - CreateNamespace=true
      - PruneLast=true
      - RespectIgnoreDifferences=true
      - ServerSideApply=true
