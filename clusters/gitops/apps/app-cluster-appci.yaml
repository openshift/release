apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  annotations:
    argocd.argoproj.io/manifest-generate-paths: .
  name: app-cluster-app.ci
  namespace: openshift-gitops
spec:
  destination:
    name: app.ci
    namespace: openshift-gitops
  ignoreDifferences:
    - group: apps
      kind: DaemonSet
      name: webhook-server
      namespace: crt-admission-webhooks
      jqPathExpressions:
        - '.spec.template.spec.containers[].image'
    - group: apps
      kind: Deployment
      jqPathExpressions:
        - '.spec.template.spec.containers[].image'
    - group: apps
      kind: StatefulSet
      name: vault
      namespace: vault
      jqPathExpressions:
        - '.spec.template.spec.containers[].image'
  project: default
  source:
    directory:
      exclude: '{OWNERS,*.md}'
      include: '{*.yaml,*.yml}'
      recurse: true
    path: clusters/app.ci/
    repoURL: https://github.com/openshift/release.git
    targetRevision: main
  syncPolicy:
    automated:
      enabled: true
      prune: false
      selfHeal: false
    syncOptions:
      - ApplyOutOfSyncOnly=true
      - CreateNamespace=true
      - PruneLast=true
      - RespectIgnoreDifferences=true
      - ServerSideApply=true
