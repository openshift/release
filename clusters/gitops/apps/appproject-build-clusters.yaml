apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: build-clusters
  namespace: openshift-gitops
spec:
  sourceRepos:
  - https://github.com/openshift/release.git
  destinations:
  - name: build01
    namespace: '*'
  - name: build02
    namespace: '*'
  - name: build03
    namespace: '*'
  - name: build04
    namespace: '*'
  - name: build05
    namespace: '*'
  - name: build06
    namespace: '*'
  - name: build07
    namespace: '*'
  - name: build08
    namespace: '*'
  - name: build09
    namespace: '*'
  - name: build10
    namespace: '*'
  - name: build11
    namespace: '*'
  - name: build12
    namespace: '*'
  - name: build13
    namespace: '*'
