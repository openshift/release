apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: build-clusters
  namespace: openshift-gitops
spec:
  sourceRepos:
  - https://github.com/openshift/release.git
  destinations:
  - name: build01
    namespace: '*'
  - name: build02
    namespace: '*'
  - name: build03
    namespace: '*'
  - name: build04
    namespace: '*'
  - name: build05
    namespace: '*'
  - name: build06
    namespace: '*'
  - name: build07
    namespace: '*'
  - name: build08
    namespace: '*'
  - name: build09
    namespace: '*'
  - name: build10
    namespace: '*'
  - name: build11
    namespace: '*'
  clusterResourceWhitelist:
  - group: ''
    kind: Namespace
  - group: rbac.authorization.k8s.io
    kind: ClusterRole
  - group: rbac.authorization.k8s.io
    kind: ClusterRoleBinding
  - group: machineconfiguration.openshift.io
    kind: KubeletConfig
  - group: machineconfiguration.openshift.io
    kind: ContainerRuntimeConfig
  namespaceResourceWhitelist:
  - group: apps
    kind: Deployment
  - group: apps
    kind: DaemonSet
  - group: ''
    kind: ConfigMap
  - group: ''
    kind: Service
  - group: ''
    kind: ServiceAccount
  - group: rbac.authorization.k8s.io
    kind: Role
  - group: rbac.authorization.k8s.io
    kind: RoleBinding
  - group: machine.openshift.io
    kind: MachineSet
  - group: autoscaling.openshift.io
    kind: MachineAutoscaler
  - group: monitoring.coreos.com
    kind: ServiceMonitor
  - group: operators.coreos.com
    kind: OperatorGroup
  - group: operators.coreos.com
    kind: Subscription
  - group: cert-manager.io
    kind: Certificate
