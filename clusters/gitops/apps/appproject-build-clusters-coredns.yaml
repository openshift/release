apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: build-clusters-coredns
  namespace: openshift-gitops
spec:
  sourceRepos:
  - https://github.com/openshift/release.git
  destinations:
  - name: build05
    namespace: '*'
  - name: build09
    namespace: '*'
  - name: build10
    namespace: '*'
  - name: build11
    namespace: '*'
  clusterResourceWhitelist:
  - group: ''
    kind: Namespace
  namespaceResourceWhitelist:
  - group: ''
    kind: ConfigMap
  - group: ''
    kind: Service
  - group: ''
    kind: ServiceAccount
  - group: apps
    kind: Deployment
  - group: rbac.authorization.k8s.io
    kind: Role
  - group: rbac.authorization.k8s.io
    kind: RoleBinding
