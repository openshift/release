# Secrets and ConfigMaps inventory for ci-staging on core-ci
#
# All secrets below must be created out-of-band (not stored in git).
# ConfigMaps marked as "gitops" are managed by manifests in this directory
# or by config-updater; they do not need manual creation.
#
# ============================================================
# SECRETS (must be created manually in ci-staging namespace)
# ============================================================
#
# openshift-prow-github-app
#   contents : appid (GitHub App ID), cert (GitHub App private key PEM)
#   used by  : hook, horologium, tide, prow-controller-manager,
#              statusreconciler, crier, deck
#   source   : copy from app.ci:ci-staging or create new GitHub App
#
# openshift-ci-staging-prow-app
#   contents : appid (GitHub App ID), cert (GitHub App private key PEM),
#              hmac (webhook HMAC token)
#   used by  : hook (staging-specific app for webhook validation)
#   source   : copy from app.ci:ci-staging or create new GitHub App
#
# ci-staging-github-app-credentials
#   contents : config.json (GitHub OAuth app client ID + secret for deck login)
#   used by  : deck (--github-oauth-config-file)
#   source   : copy from app.ci:ci-staging or create new GitHub OAuth App
#
# gce-sa-credentials-gcs-private
#   contents : service-account.json (GCS service account with read access)
#   used by  : deck, tide, crier, statusreconciler
#   source   : copy from app.ci:ci-staging or create new GCS SA key
#
# gce-sa-credentials-gcs-publisher
#   contents : service-account.json (GCS service account with write access)
#   used by  : crier (--gcs-credentials-file for publishing artifacts)
#   source   : copy from app.ci:ci-staging or create new GCS SA key
#
# cookie
#   contents : cookie (32-byte random session secret)
#   used by  : deck (--cookie-secret)
#   source   : generate with: openssl rand -base64 32 | head -c 32
#              oc -n ci-staging create secret generic cookie --from-literal=cookie=<value>
#
# prow-controller-manager
#   contents : <cluster>.config kubeconfig files for each build farm cluster
#   used by  : prow-controller-manager (--kubeconfig-dir)
#   source   : copy from app.ci:ci-staging or generate new kubeconfigs
#
# deck
#   contents : sa.deck.<cluster>.config kubeconfig files for each build farm cluster
#   used by  : deck (--kubeconfig-dir)
#   source   : copy from app.ci:ci-staging or generate new kubeconfigs
#
# result-aggregator
#   contents : username, password (basic auth for result-aggregator endpoint)
#   used by  : prow components reporting results
#   source   : copy from app.ci:ci-staging
#
# prow-tls
#   contents : tls.crt, tls.key (TLS certificate for prow routes)
#   used by  : ingress / OpenShift Routes
#   source   : copy from app.ci:ci-staging or provision new cert
#
# gangway-tls
#   contents : tls.crt, tls.key (TLS certificate for gangway)
#   used by  : gangway
#   source   : copy from app.ci:ci-staging or provision new cert
#
# gangway-session-secret
#   contents : session-secret (random session key for gangway)
#   used by  : gangway
#   source   : copy from app.ci:ci-staging or generate new
#
# ============================================================
# CONFIGMAPS (managed automatically — do not create manually)
# ============================================================
#
# config          [gitops] clusters/core-ci/prow/staging/prow-config.yaml
# plugins         [gitops] clusters/core-ci/prow/staging/plugins.yaml
# deck-extensions [config-updater] core-services/prow/02_config/deck-extensions/*
#                 → pushed to core-ci:ci-staging by config-updater on merge
#
# ============================================================
# EFS CSI DRIVER SECRET (in openshift-cluster-csi-drivers namespace)
# ============================================================
#
# aws-efs-cloud-credentials
#   contents : credentials (AWS credentials file with IRSA role_arn)
#   used by  : aws-efs-csi-driver-controller (init container)
#   IAM role : arn:aws:iam::484907503916:role/master-efs-csi-driver
#   managed  : clusters/core-ci/aws-efs-csi-driver/credentials-secret.yaml
#              (role ARN is not sensitive — stored in git)
