    lookupPolicy:
      local: false
    tags:
      - annotations: null
        from:
          kind: DockerImage
          name: quay-proxy.ci.openshift.org/openshift/ci:hypershift_hypershift-operator_latest
        importPolicy:
          scheduled: true
        name: latest
        referencePolicy:
          type: Source
