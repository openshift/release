apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: ci-secret-bootstrap
  namespace: ci
spec:
  provider: gcp
  parameters:
    auth: provider-adc
    secrets: |-
      - resourceName: "projects/openshift-ci-secrets/secrets/test-platform-infra__test-credentials__ci-secret-bootstrap-sa-key/versions/latest"
        fileName: "key.json"
---
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: ci-secret-generator
  namespace: ci
spec:
  provider: gcp
  parameters:
    auth: provider-adc
    secrets: |-
      - resourceName: "projects/openshift-ci-secrets/secrets/test-platform-infra__test-credentials__ci-secret-generator-sa-key/versions/latest"
        fileName: "key.json"
