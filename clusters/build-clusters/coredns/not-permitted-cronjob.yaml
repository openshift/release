apiVersion: batch/v1
kind: CronJob
metadata:
  name: not-permitted-test
  namespace: coredns
spec:
  schedule: "0 */6 * * *"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: test
            image: registry.access.redhat.com/ubi9/ubi-minimal:latest
            command: ["echo", "this should be rejected by AppProject"]
          restartPolicy: Never
