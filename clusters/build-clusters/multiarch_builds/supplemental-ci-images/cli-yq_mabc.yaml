apiVersion: ci.openshift.io/v1
kind: MultiArchBuildConfig
metadata:
  name: cli-yq
  namespace: ocp
spec:
  external_registries:
  - quay.io/openshift/ci
  build_spec:
    successfulBuildsHistoryLimit: 1
    failedBuildsHistoryLimit: 2
    output:
      pushSecret:
        name: registry-push-credentials-ci-images-mirror
      to:
        kind: ImageStreamTag
        namespace: ocp
        name: cli-yq:latest
    source:
      dockerfile: |
        FROM ocp/4.12:cli
        RUN ARCH=$(uname -m) && \
            case "$ARCH" in \
                x86_64*) ARCH='amd64' ;; \
                aarch64*) ARCH='arm64' ;; \
                *) echo "Unsupported architecture: $ARCH" && exit 1 ;; \
            esac && \
            curl -L "https://github.com/mikefarah/yq/releases/latest/download/yq_linux_${ARCH}" -o /tmp/yq && \
            chmod +x /tmp/yq
        RUN yum install -y jq
      type: Dockerfile
    strategy:
      dockerStrategy:
        from:
          kind: ImageStreamTag
          name: 4.12:cli
          namespace: ocp
        imageOptimizationPolicy: SkipLayers
      type: Docker
