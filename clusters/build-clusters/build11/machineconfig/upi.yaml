apiVersion: machineconfiguration.openshift.io/v1
kind: MachineConfigPool
metadata:
  annotations:
  labels:
    pools.operator.machineconfiguration.openshift.io/worker-upi: ''
  name: worker-upi
spec:
  machineConfigSelector:
    matchExpressions:
      - key: machineconfiguration.openshift.io/role
        operator: In
        values:
          - worker
          - worker-upi
  maxUnavailable: 2
  nodeSelector:
    matchLabels:
      node-role.kubernetes.io/worker: ''
    matchExpressions:
      - key: kubernetes.io/arch
        operator: In
        values:
          - s390x
  paused: false
