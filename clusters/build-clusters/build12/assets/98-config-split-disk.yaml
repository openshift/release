apiVersion: machineconfiguration.openshift.io/v1
kind: MachineConfig
metadata:
  labels:
    machineconfiguration.openshift.io/role: worker
  name: 98-config-split-disk
spec:
  config:
    ignition:
      version: 3.2.0
    storage:
      files:
      - contents:
          source: data:text/plain;charset=utf-8;base64,
        mode: 0755
        path: /etc/find-secondary-device
        overwrite: true
      - contents:
          source: data:text/plain;charset=utf-8;base64,Q1JJT19DT05GSUdfT1BUSU9OUz0tLWltYWdlc3RvcmU9L3Zhci9saWIvc3BsaXRkaXNraW1hZ2VzCg==
        mode: 0644
        path: /etc/sysconfig/crio
        overwrite: true
      - contents:
          source: data:text/plain;charset=utf-8;base64,W1VuaXRdCkFmdGVyPXJlc3RvcmVjb24tdmFyLWxpYi1zcGxpdGRpc2suc2VydmljZQpSZXF1aXJlcz1yZXN0b3JlY29uLXZhci1saWItc3BsaXRkaXNrLnNlcnZpY2UgdmFyLWxpYi1zcGxpdGRpc2tpbWFnZXMubW91bnQK
        mode: 0644
        path: /etc/systemd/system/crio.service.d/99-wait-for-splitdisk.conf
        overwrite: true
    systemd:
      units:
      - name: find-secondary-device.service
        enabled: true
        contents: |
          [Unit]
          Description=Find secondary device
          DefaultDependencies=false
          After=systemd-udev-settle.service
          Before=local-fs-pre.target
          ConditionPathExists=!/etc/var-lib-split-disk-mount

          [Service]
          Type=oneshot
          RemainAfterExit=yes
          ExecStart=/etc/find-secondary-device

          [Install]
          WantedBy=multi-user.target
      - name: var-lib-splitdiskimages.mount
        enabled: true
        contents: |
          [Unit]
          Description=Mount /var/lib/splitdiskimages
          Requires=find-secondary-device.service
          After=find-secondary-device.service
          Before=local-fs.target

          [Mount]
          What=/dev/disk/by-label/splitdisk
          Where=/var/lib/splitdiskimages
          Type=xfs
          Options=defaults
          TimeoutSec=120s

          [Install]
          WantedBy=local-fs.target
      - name: selinux-splitdisk-policy.service
        enabled: true
        contents: |
          [Unit]
          Description=Set SELinux file context rules for splitdisk
          DefaultDependencies=no
          After=var-lib-splitdiskimages.mount
          Before=restorecon-var-lib-splitdisk.service
          ConditionPathExists=!/var/lib/splitdisk-selinux-configured

          [Service]
          Type=oneshot
          RemainAfterExit=yes
          ExecStart=/bin/bash -c '/usr/sbin/semanage fcontext -a -e /var/lib/containers /var/lib/splitdiskimages && touch /var/lib/splitdisk-selinux-configured'
          TimeoutSec=0

          [Install]
          WantedBy=multi-user.target
      - name: restorecon-var-lib-splitdisk.service
        enabled: true
        contents: |
          [Unit]
          Description=Restore recursive SELinux security contexts
          DefaultDependencies=no
          After=selinux-splitdisk-policy.service var-lib-splitdiskimages.mount
          Requires=selinux-splitdisk-policy.service
          Before=crio.service

          [Service]
          Type=oneshot
          RemainAfterExit=yes
          ExecStart=/sbin/restorecon -R /var/lib/splitdiskimages
          TimeoutSec=0

          [Install]
          WantedBy=multi-user.target graphical.target
