---
kind: ServiceAccount
apiVersion: v1
metadata:
  name: chai-bot-cluster-reader
  namespace: ci
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: chai-bot-cluster-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-reader
subjects:
- kind: ServiceAccount
  name: chai-bot-cluster-reader
  namespace: ci
---
apiVersion: v1
kind: Secret
type: kubernetes.io/service-account-token
metadata:
  name: chai-bot-cluster-reader-token
  namespace: ci
  annotations:
    kubernetes.io/service-account.name: chai-bot-cluster-reader
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: chai-bot-cluster-reader-monitoring-read
  namespace: openshift-monitoring
rules:
- apiGroups: ["monitoring.coreos.com"]
  resources:
  - prometheusrules
  verbs: ["get", "list", "watch"]
- apiGroups: ["monitoring.coreos.com"]
  resourceNames: ["main"]
  resources: ["alertmanagers/api"]
  verbs: ["get", "list"]
- apiGroups: [""]
  resources: ["services/proxy"]
  resourceNames: ["alertmanager-main", "thanos-querier"]
  verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: chai-bot-cluster-reader-monitoring-read
  namespace: openshift-monitoring
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: chai-bot-cluster-reader-monitoring-read
subjects:
- kind: ServiceAccount
  name: chai-bot-cluster-reader
  namespace: ci
