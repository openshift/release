#We put only the customized fields in git
apiVersion: imageregistry.operator.openshift.io/v1
kind: Config
metadata:
  name: cluster
spec:
  logLevel: Normal
  managementState: Managed
  operatorLogLevel: Normal
  replicas: 2
  storage:
    managementState: Managed
    s3:
      bucket: hypershift-konflux-image-registry
      encrypt: true
      region: us-east-1
      regionEndpoint: https://2209d6dda25891dee55b086a469130de.r2.cloudflarestorage.com
      trustedCA:
        name: ""
      virtualHostedStyle: false
  tolerations:
  - effect: NoSchedule
    key: node-role.kubernetes.io/infra
    operator: Exists
