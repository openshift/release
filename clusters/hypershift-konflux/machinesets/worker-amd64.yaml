apiVersion: machine.openshift.io/v1beta1
kind: MachineSet
metadata:
  annotations:
    capacity.cluster-autoscaler.kubernetes.io/labels: kubernetes.io/arch=amd64
    machine.openshift.io/GPU: "0"
    machine.openshift.io/memoryMb: "65536"
    machine.openshift.io/vCPU: "16"
  labels:
    machine.openshift.io/cluster-api-cluster: hypershift-konflux-nt7sd
  name: hypershift-konflux-nt7sd-worker-amd64-us-east-2a
  namespace: openshift-machine-api
spec:
  replicas: 1
  selector:
    matchLabels:
      machine.openshift.io/cluster-api-cluster: hypershift-konflux-nt7sd
      machine.openshift.io/cluster-api-machineset: hypershift-konflux-nt7sd-worker-amd64-us-east-2a
  template:
    metadata:
      labels:
        machine.openshift.io/cluster-api-cluster: hypershift-konflux-nt7sd
        machine.openshift.io/cluster-api-machine-role: worker
        machine.openshift.io/cluster-api-machine-type: worker
        machine.openshift.io/cluster-api-machineset: hypershift-konflux-nt7sd-worker-amd64-us-east-2a
    spec:
      lifecycleHooks: {}
      metadata: {}
      providerSpec:
        value:
          ami:
            id: ami-017020cb8aeeda203
          apiVersion: machine.openshift.io/v1beta1
          blockDevices:
          - ebs:
              encrypted: true
              iops: 0
              kmsKey:
                arn: ""
              volumeSize: 120
              volumeType: gp3
          capacityReservationId: ""
          credentialsSecret:
            name: aws-cloud-credentials
          deviceIndex: 0
          iamInstanceProfile:
            id: hypershift-konflux-nt7sd-worker-profile
          instanceType: m6a.4xlarge
          kind: AWSMachineProviderConfig
          placement:
            availabilityZone: us-east-2a
            region: us-east-2
          publicIp: true
          securityGroups:
          - filters:
            - name: tag:Name
              values:
              - hypershift-konflux-nt7sd-node
          - filters:
            - name: tag:Name
              values:
              - hypershift-konflux-nt7sd-lb
          subnet:
            id: subnet-000843c319a82a467
          tags:
          - name: kubernetes.io/cluster/hypershift-konflux-nt7sd
            value: owned
          userDataSecret:
            name: worker-user-data
