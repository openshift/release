apiVersion: machine.openshift.io/v1beta1
kind: MachineSet
metadata:
  name: hypershift-konflux-nt7sd-infra-us-east-2a
  namespace: openshift-machine-api
  labels:
    machine.openshift.io/cluster-api-cluster: hypershift-konflux-nt7sd
spec:
  replicas: 1
  selector:
    matchLabels:
      machine.openshift.io/cluster-api-cluster: hypershift-konflux-nt7sd
      machine.openshift.io/cluster-api-machineset: hypershift-konflux-nt7sd-infra-us-east-2a
  template:
    metadata:
      labels:
        machine.openshift.io/cluster-api-cluster: hypershift-konflux-nt7sd
        machine.openshift.io/cluster-api-machine-role: infra
        machine.openshift.io/cluster-api-machine-type: infra
        machine.openshift.io/cluster-api-machineset: hypershift-konflux-nt7sd-infra-us-east-2a
    spec:
      lifecycleHooks: {}
      metadata:
        labels:
          node-role.kubernetes.io: infra
          node-role.kubernetes.io/infra: ""
      taints:
      - effect: NoSchedule
        key: node-role.kubernetes.io/infra
        value: reserved
      providerSpec:
        value:
          userDataSecret:
            name: worker-user-data
          placement:
            availabilityZone: us-east-2a
            region: us-east-2
          credentialsSecret:
            name: aws-cloud-credentials
          instanceType: m6g.xlarge
          metadata:
            creationTimestamp: null
          publicIp: true
          blockDevices:
            - ebs:
                encrypted: true
                iops: 2000
                kmsKey:
                  arn: ''
                volumeSize: 120
                volumeType: gp3
          securityGroups:
            - filters:
                - name: 'tag:Name'
                  values:
                    - hypershift-konflux-nt7sd-worker-sg
          kind: AWSMachineProviderConfig
          metadataServiceOptions: {}
          tags:
            - name: kubernetes.io/cluster/hypershift-konflux-nt7sd
              value: owned
          deviceIndex: 0
          ami:
            id: ami-0370f9f9a754c8649
          subnet:
            id: subnet-000843c319a82a467
          apiVersion: machine.openshift.io/v1beta1
          iamInstanceProfile:
            id: hypershift-konflux-nt7sd-worker-profile
---
