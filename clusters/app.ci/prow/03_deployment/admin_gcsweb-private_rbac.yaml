---
kind: ServiceAccount
apiVersion: v1
metadata:
  name: gcsweb-private
  namespace: ci
  annotations:
    serviceaccounts.openshift.io/oauth-redirectreference.deck-internal: '{"kind":"OAuthRedirectReference","apiVersion":"v1","reference":{"kind":"Route","name":"gcsweb-private"}}'
    serviceaccounts.openshift.io/oauth-redirecturi.prow-internal-ingress: https://gcsweb-private-ci.apps.ci.l2s4.p1.openshiftapps.com
---
kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: gcsweb-private-oauth
rules:
  - apiGroups:
    - authentication.k8s.io
    resources:
    - tokenreviews
    verbs:
    - create
  - apiGroups:
    - authorization.k8s.io
    resources:
    - subjectaccessreviews
    verbs:
    - create
---
kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: gcsweb-private-oauth
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: gcsweb-private-oauth
subjects:
- kind: ServiceAccount
  name: gcsweb-private
  namespace: ci
