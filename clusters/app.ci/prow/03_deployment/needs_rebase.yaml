---
apiVersion: v1
kind: Service
metadata:
  namespace: ci
  name: needs-rebase
spec:
  selector:
    app: prow
    component: needs-rebase
  ports:
  - port: 80
    targetPort: 8888
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: ci
  name: needs-rebase
  labels:
    app: prow
    component: needs-rebase
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: prow
      component: needs-rebase
  template:
    metadata:
      labels:
        app: prow
        component: needs-rebase
    spec:
      initContainers:
      - name: git-sync-init
        command:
        - /git-sync
        args:
        - --repo=https://github.com/openshift/release.git
        - --ref=main
        - --root=/tmp/git-sync
        - --one-time=true
        - --depth=1
        - --link=release
        image: quay-proxy.ci.openshift.org/openshift/ci:ci_git-sync_v4.3.0
        volumeMounts:
        - name: release
          mountPath: /tmp/git-sync
      containers:
      - name: needs-rebase
        image: us-docker.pkg.dev/k8s-infra-prow/images/needs-rebase:v20260429-8f72e9c5a
        args:
        - --github-app-id=$(GITHUB_APP_ID)
        - --github-app-private-key-path=/etc/github/cert
        - --hmac-secret-file=/etc/webhook/hmac.yaml
        - --plugin-config=/var/repo/release/core-services/prow/02_config/_plugins.yaml
        - --supplemental-plugin-config-dir=/var/repo/release/core-services/prow/02_config
        - --dry-run=false
        - --github-endpoint=http://ghproxy
        - --github-endpoint=https://api.github.com
        - --github-graphql-endpoint=http://ghproxy/graphql
        - --github-hourly-tokens=0
        - --cache-valid-time=3600
        env:
        - name: GITHUB_APP_ID
          valueFrom:
            secretKeyRef:
              name: openshift-prow-github-app
              key: appid
        ports:
          - name: http
            containerPort: 8888
        volumeMounts:
        - name: hmac
          mountPath: /etc/webhook
          readOnly: true
        - name: github-app-credentials
          mountPath: /etc/github
          readOnly: true
        - name: release
          mountPath: /var/repo
        resources:
          requests:
            memory: "75Mi"
            cpu: "30m"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 20
          periodSeconds: 3
        readinessProbe:
          httpGet:
            path: /healthz/ready
            port: 8081
      - name: git-sync
        command:
        - /git-sync
        args:
        - --repo=https://github.com/openshift/release.git
        - --ref=main
        - --period=30s
        - --root=/tmp/git-sync
        - --max-failures=3
        - --link=release
        image: quay-proxy.ci.openshift.org/openshift/ci:ci_git-sync_v4.3.0
        volumeMounts:
        - name: release
          mountPath: /tmp/git-sync
        resources:
          requests:
            memory: "1Gi"
            cpu: "0.5"
      volumes:
      - name: hmac
        secret:
          secretName: github-webhook-credentials
      - name: github-app-credentials
        secret:
          secretName: openshift-prow-github-app
      - name: release
        emptyDir: {}
