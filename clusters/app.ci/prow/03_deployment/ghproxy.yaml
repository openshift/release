---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  labels:
    app: prow
    component: ghproxy
  name: ghproxy
  namespace: ci
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 30Gi
  storageClassName: gp2
  volumeMode: Filesystem
  volumeName: pvc-1ca14d89-cd6b-45c2-a0f9-f23d8aadab87
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: prow
    component: ghproxy
  name: ghproxy
  namespace: ci
spec:
  ports:
  - name: main
    port: 80
    protocol: TCP
    targetPort: 8888
  - name: metrics
    port: 9090
    protocol: TCP
    targetPort: 9090
  selector:
    app: prow
    component: ghproxy
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ghproxy
  labels:
    app: prow
    component: ghproxy
  namespace: ci
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: prow
      component: ghproxy
  template:
    metadata:
      labels:
        app: prow
        component: ghproxy
    spec:
      containers:
      - name: ghproxy
        image: us-docker.pkg.dev/k8s-infra-prow/images/ghproxy:v20260429-8f72e9c5a
        imagePullPolicy: IfNotPresent
        args:
        - --cache-dir=/cache
        - --cache-sizeGB=19
        - --legacy-disable-disk-cache-partitions-by-auth-header=false
        - --get-throttling-time-ms=150
        - --throttling-time-ms=400
        - --throttling-time-v4-ms=550
        - --throttling-max-delay-duration-seconds=51
        - --throttling-max-delay-duration-v4-seconds=150
        - --request-timeout=151
        - --concurrency=1000
        ports:
        - name: main
          containerPort: 8888
        - name: metrics
          containerPort: 9090
        volumeMounts:
        - name: cache
          mountPath: /cache
        resources:
          requests:
            memory: "250Mi"
            cpu: "100m"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 20
          periodSeconds: 3
        readinessProbe:
          httpGet:
            path: /healthz/ready
            port: 8081
      volumes:
      - name: cache
        persistentVolumeClaim:
          claimName: ghproxy
