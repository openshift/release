kind: ImageStream
apiVersion: image.openshift.io/v1
metadata:
  name: nginx-unprivileged
  namespace: ci
spec:
  tags:
    - annotations: null
      from:
        kind: DockerImage
        name: docker.io/nginxinc/nginx-unprivileged:1.18-alpine
      importPolicy:
        importMode: Legacy
      name: 1.18-alpine
      referencePolicy:
        type: Source
    - annotations: null
      from:
        kind: DockerImage
        name: docker.io/nginxinc/nginx-unprivileged:1.29-alpine
      importPolicy:
        importMode: Legacy
      name: 1.29-alpine
      referencePolicy:
        type: Source
    - annotations: null
      from:
        kind: DockerImage
        name: docker.io/nginxinc/nginx-unprivileged:stable
      importPolicy:
        importMode: Legacy
      name: stable
      referencePolicy:
        type: Source
    - annotations: null
      from:
        kind: DockerImage
        name: docker.io/nginxinc/nginx-unprivileged:stable-alpine
      importPolicy:
        importMode: Legacy
      name: stable-alpine
      referencePolicy:
        type: Source
