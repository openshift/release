kind: BuildConfig
apiVersion: build.openshift.io/v1
metadata:
  namespace: ci
  name: ams-ci
spec:
  successfulBuildsHistoryLimit: 1
  failedBuildsHistoryLimit: 2
  output:
    pushSecret:
      name: registry-push-credentials-ci-images-mirror
    to:
      kind: DockerImage
      name: quay.io/openshift/ci:ci_ams-ci_latest
  source:
    dockerfile: |
      FROM quay-proxy.ci.openshift.org/openshift/ci:ci_nested-podman_latest
      USER root
      RUN dnf install -y git make gcc jq && dnf clean all
      RUN curl -LO https://go.dev/dl/go1.26.3.linux-amd64.tar.gz && \
          tar -C /usr/local -xzf go1.26.3.linux-amd64.tar.gz && \
          rm go1.26.3.linux-amd64.tar.gz
      ENV PATH="/usr/local/go/bin:${PATH}"
      RUN GOBIN=/usr/local/bin go install gotest.tools/gotestsum@latest
    type: Dockerfile
  strategy:
    dockerStrategy:
      imageOptimizationPolicy: SkipLayers
    type: Docker
  triggers:
  - type: ConfigChange