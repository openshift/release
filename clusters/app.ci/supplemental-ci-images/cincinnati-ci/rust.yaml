apiVersion: v1
kind: List
items:
- kind: ImageStream
  apiVersion: image.openshift.io/v1
  metadata:
    namespace: cincinnati-ci-public
    name: rust
- kind: BuildConfig
  apiVersion: build.openshift.io/v1
  metadata:
    namespace: cincinnati-ci-public
    name: rust-ubi9
  spec:
    successfulBuildsHistoryLimit: 1
    failedBuildsHistoryLimit: 2
    output:
      to:
        kind: ImageStreamTag
        name: rust:ubi9
    source:
      dockerfile: |
        FROM registry.access.redhat.com/ubi9/ubi:latest
        RUN dnf update -y \
          && dnf install -y jq rust cargo \
          && dnf install -y openssl-devel \
          && dnf clean all
      type: Dockerfile
    strategy:
      dockerStrategy:
        from:
          kind: ImageStreamTag
          name: ubi:9
          namespace: ocp
        imageOptimizationPolicy: SkipLayers
      type: Docker
    triggers:
      - type: ConfigChange
