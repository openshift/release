apiVersion: v1
kind: Namespace
metadata:
  name: hp-sre-rosa-ci
  annotations:
    openshift.io/description: Service Accounts for hp-sre-rosa-ci
    openshift.io/display-name: hp-sre-rosa-ci CI
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: periodic-job-bot
  namespace: hp-sre-rosa-ci
---
apiVersion: v1
kind: Secret
metadata:
  name: api-token-secret
  namespace: hp-sre-rosa-ci
  annotations:
    kubernetes.io/service-account.name: periodic-job-bot
type: kubernetes.io/service-account-token
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: secret-owner
  namespace: hp-sre-rosa-ci
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["api-token-secret"]
    verbs:
      - get
      - create
      - update
      - patch
      - delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: secret-owner-hp-sre-rosa-ci
  namespace: hp-sre-rosa-ci
subjects:
  - kind: Group
    apiGroup: rbac.authorization.k8s.io
    name: hp-sre-rosa-ci
roleRef:
  kind: Role
  apiGroup: rbac.authorization.k8s.io
  name: secret-owner
