apiVersion: v1
kind: Namespace
metadata:
  name: hypershift-automation
  annotations:
    openshift.io/description: Service Accounts for hypershift-automation
    openshift.io/display-name: hypershift-automation CI
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: periodic-job-bot
  namespace: hypershift-automation
---
apiVersion: v1
kind: Secret
metadata:
  name: api-token-secret
  namespace: hypershift-automation
  annotations:
    kubernetes.io/service-account.name: periodic-job-bot
type: kubernetes.io/service-account-token
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: secret-owner
  namespace: hypershift-automation
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["api-token-secret"]
    verbs:
      - get
      - create
      - update
      - patch
      - delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: secret-owner-hypershift-automation
  namespace: hypershift-automation
subjects:
  - kind: Group
    apiGroup: rbac.authorization.k8s.io
    name: hypershift-automation
roleRef:
  kind: Role
  apiGroup: rbac.authorization.k8s.io
  name: secret-owner
