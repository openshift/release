apiVersion: v1
kind: Namespace
metadata:
  name: medik8s-qe-gpc
  annotations:
    openshift.io/description: Service Accounts for medik8s-qe-gpc
    openshift.io/display-name: medik8s-qe-gpc CI
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: periodic-job-bot
  namespace: medik8s-qe-gpc
---
apiVersion: v1
kind: Secret
metadata:
  name: api-token-secret
  namespace: medik8s-qe-gpc
  annotations:
    kubernetes.io/service-account.name: periodic-job-bot
type: kubernetes.io/service-account-token
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: secret-owner
  namespace: medik8s-qe-gpc
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["api-token-secret"]
    verbs:
      - get
      - create
      - update
      - patch
      - delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: secret-owner-medik8s-qe-gpc
  namespace: medik8s-qe-gpc
subjects:
  - kind: Group
    apiGroup: rbac.authorization.k8s.io
    name: medik8s-qe-gpc
roleRef:
  kind: Role
  apiGroup: rbac.authorization.k8s.io
  name: secret-owner
