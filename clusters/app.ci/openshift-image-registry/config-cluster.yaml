apiVersion: imageregistry.operator.openshift.io/v1
kind: Config
metadata:
  name: cluster
spec:
  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
      - preference:
          matchExpressions:
          - key: node-role.kubernetes.io/infra
            operator: Exists
        weight: 1
  defaultRoute: true
  logLevel: Normal
  # we do not customize managementState
  # managementState is here to pass the validation
  managementState: Managed
  operatorLogLevel: Normal
  replicas: 3
  routes:
  - hostname: registry.ci.openshift.org
    name: registry-ci-openshift-org
    secretName: registry-ci-openshift-org-tls
  storage:
    managementState: Managed
    s3:
      bucket: app-ci-image-registry
      region: us-east-1
      regionEndpoint: https://2209d6dda25891dee55b086a469130de.r2.cloudflarestorage.com
      trustedCA:
        name: ""
      virtualHostedStyle: false
  tolerations:
  - effect: NoSchedule
    key: node-role.kubernetes.io/infra
    operator: Exists
