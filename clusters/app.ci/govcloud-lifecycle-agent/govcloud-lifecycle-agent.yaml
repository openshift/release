apiVersion: v1
kind: ServiceAccount
metadata:
  name: govcloud-lifecycle-agent
  namespace: ci
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: govcloud-lifecycle-agent
rules:
  - apiGroups:
      - prow.k8s.io
    resources:
      - prowjobs
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: govcloud-lifecycle-agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: govcloud-lifecycle-agent
subjects:
  - kind: ServiceAccount
    name: govcloud-lifecycle-agent
    namespace: ci
