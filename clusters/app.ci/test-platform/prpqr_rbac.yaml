apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: payload-testing-test-platform
rules:
- apiGroups:
  - ci.openshift.io
  resources:
  - pullrequestpayloadqualificationruns
  verbs:
  - get
  - create
  - list
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: payload-testing-test-platform
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: payload-testing-test-platform
subjects:
- apiGroup: rbac.authorization.k8s.io
  kind: Group
  name: test-platform-ci-admins
