apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  namespace: ship-status
  labels:
    app: dashboard
  annotations:
    keel.sh/policy: force
    keel.sh/matchTag: "true"
    keel.sh/trigger: poll
    keel.sh/pollSchedule: "@every 5m"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard
  template:
    metadata:
      labels:
        app: dashboard
    spec:
      serviceAccountName: ship-status
      initContainers:
      - name: git-sync-init
        command:
        - /git-sync
        args:
        - --repo=https://github.com/openshift/release.git
        - --ref=main
        - --root=/tmp/git-sync
        - --one-time=true
        - --depth=1
        - --link=release
        - --sparse-checkout-file=/etc/git-sync/sparse-checkout
        image: quay-proxy.ci.openshift.org/openshift/ci:ci_git-sync_v4.3.0
        volumeMounts:
        - name: release
          mountPath: /tmp/git-sync
        - name: sparse-checkout
          mountPath: /etc/git-sync
          readOnly: true
      - name: db-migration
        image: quay-proxy.ci.openshift.org/openshift/ci:ship-status-dash_migrate_latest
        imagePullPolicy: Always
        command: ["./migrate"]
        args:
          - "--dsn=$(DATABASE_DSN)"
        env:
          - name: DATABASE_DSN
            valueFrom:
              secretKeyRef:
                name: postgres
                key: dsn
      containers:
      - name: git-sync
        command:
        - /git-sync
        args:
        - --repo=https://github.com/openshift/release.git
        - --ref=main
        - --period=30s
        - --root=/tmp/git-sync
        - --max-failures=3
        - --link=release
        - --sparse-checkout-file=/etc/git-sync/sparse-checkout
        image: quay-proxy.ci.openshift.org/openshift/ci:ci_git-sync_v4.3.0
        volumeMounts:
        - name: release
          mountPath: /tmp/git-sync
        - name: sparse-checkout
          mountPath: /etc/git-sync
          readOnly: true
        resources:
          requests:
            memory: "1Gi"
            cpu: "0.5"
      - name: oauth-proxy
        image: quay.io/openshift/origin-oauth-proxy:4.20
        args:
          - -provider=openshift
          - -http-address=:8443
          - -https-address=
          - -upstream=http://localhost:8080
          - -openshift-ca=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          - --cookie-secret-file=/etc/secrets/session_secret
          - --cookie-samesite=none
          - --cookie-secure=true
          - --cookie-domain=ship-status.ci.openshift.org
          - --skip-auth-preflight
          - --redirect-url=https://protected.ship-status.ci.openshift.org/oauth/callback
          - --client-id=system:serviceaccount:ship-status:ship-status
          - --client-secret-file=/var/run/secrets/kubernetes.io/serviceaccount/token
          - '--openshift-sar={"resource": "namespaces", "verb": "get"}'
          - '--openshift-delegate-urls={"/": {"resource": "namespaces", "verb": "get"}}'
          - --signature-key=sha256:$(HMAC_SECRET)
        ports:
        - containerPort: 8443
          name: http
        env:
        - name: HMAC_SECRET
          valueFrom:
            secretKeyRef:
              name: dashboard-hmac
              key: hmac
        readinessProbe:
          tcpSocket:
            port: 8443
        volumeMounts:
        - name: oauth-proxy-cookie-secret
          mountPath: /etc/secrets
          readOnly: true
        - name: hmac-secret
          mountPath: /etc/secrets/hmac-secret
          readOnly: true
      - name: dashboard
        image: quay-proxy.ci.openshift.org/openshift/ci:ship-status-dash_dashboard_latest
        imagePullPolicy: Always
        command: ["./dashboard"]
        args:
          - "--config=/var/repo/release/core-services/ship-status/dashboard-config.yaml"
          - "--dsn=$(DATABASE_DSN)"
          - "--port=8080"
          - "--hmac-secret-file=/etc/secrets/hmac-secret/hmac"
          - "--cors-origin=https://ship-status.ci.openshift.org"
          - "--slack-base-url=https://ship-status.ci.openshift.org/"
          - "--slack-workspace-url=https://redhat-internal.slack.com/"
        ports:
          - containerPort: 8080
            protocol: TCP
        env:
          - name: DATABASE_DSN
            valueFrom:
              secretKeyRef:
                name: postgres
                key: dsn
          - name: SLACK_BOT_TOKEN
            valueFrom:
              secretKeyRef:
                #TODO(sgoeddel): replace with custom SHIP Status bot when available
                name: slack-credentials-dptp-bot
                key: oauth_token
        volumeMounts:
          - name: release
            mountPath: /var/repo
            readOnly: true
          - name: hmac-secret
            mountPath: /etc/secrets/hmac-secret
            readOnly: true
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
      - name: ship-status-mcp
        image: quay-proxy.ci.openshift.org/openshift/ci:ship-status-dash_mcp_latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8090
          name: mcp
          protocol: TCP
        env:
        - name: MCP_TRANSPORT
          value: streamable-http
        - name: MCP_HTTP_PORT
          value: "8090"
        - name: SHIP_STATUS_PUBLIC_API_URL
          value: http://127.0.0.1:8080/api
        - name: SHIP_STATUS_DASHBOARD_URL
          value: http://127.0.0.1:8080/
        - name: SHIP_STATUS_REQUEST_TIMEOUT
          value: "10"
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        readinessProbe:
          tcpSocket:
            port: 8090
          initialDelaySeconds: 10
          periodSeconds: 10
          failureThreshold: 3
        livenessProbe:
          tcpSocket:
            port: 8090
          initialDelaySeconds: 15
          periodSeconds: 15
          failureThreshold: 3
      - name: ship-status-mcp-auth
        image: quay-proxy.ci.openshift.org/openshift/ci:ship-status-dash_mcp-auth_latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8091
          name: mcp-auth
          protocol: TCP
        env:
        - name: MCP_TRANSPORT
          value: streamable-http
        - name: MCP_HTTP_PORT
          value: "8091"
        - name: SHIP_STATUS_PUBLIC_API_URL
          value: http://127.0.0.1:8080/api
        - name: SHIP_STATUS_PROTECTED_API_URL
          value: http://127.0.0.1:8443/api
        - name: SHIP_STATUS_DASHBOARD_URL
          value: http://127.0.0.1:8080/
        - name: SHIP_STATUS_AUTH_TOKEN_FILE
          value: /var/run/secrets/mcp-server/token
        - name: SHIP_STATUS_REQUEST_TIMEOUT
          value: "10"
        volumeMounts:
        - name: mcp-server-token
          mountPath: /var/run/secrets/mcp-server
          readOnly: true
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        readinessProbe:
          tcpSocket:
            port: 8091
          initialDelaySeconds: 10
          periodSeconds: 10
          failureThreshold: 3
        livenessProbe:
          tcpSocket:
            port: 8091
          initialDelaySeconds: 15
          periodSeconds: 15
          failureThreshold: 3
      - name: oauth-proxy-mcp
        image: quay.io/openshift/origin-oauth-proxy:4.20
        args:
          - -provider=openshift
          - -http-address=:9443
          - -https-address=
          - -upstream=http://localhost:8091
          - -openshift-ca=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          - --cookie-secret-file=/etc/secrets/session_secret
          - --cookie-samesite=none
          - --cookie-secure=true
          - --cookie-domain=protected-mcp.ship-status.ci.openshift.org
          - --skip-auth-preflight
          - --redirect-url=https://protected-mcp.ship-status.ci.openshift.org/oauth/callback
          - --client-id=system:serviceaccount:ship-status:mcp-server
          - --client-secret-file=/var/run/secrets/mcp-server/token
          - '--openshift-sar={"resource": "namespaces", "verb": "get"}'
          - '--openshift-delegate-urls={"/": {"resource": "namespaces", "verb": "get"}}'
        ports:
        - containerPort: 9443
          name: protected-mcp
        readinessProbe:
          tcpSocket:
            port: 9443
        volumeMounts:
        - name: oauth-proxy-cookie-secret
          mountPath: /etc/secrets
          readOnly: true
        - name: mcp-server-token
          mountPath: /var/run/secrets/mcp-server
          readOnly: true
      volumes:
        - name: release
          emptyDir: {}
        - name: sparse-checkout
          configMap:
            name: git-sync-sparse-checkout
            items:
            - key: ship-status
              path: sparse-checkout
        - name: oauth-proxy-cookie-secret
          secret:
            secretName: oauth-proxy-cookie-secret
        - name: hmac-secret
          secret:
            secretName: dashboard-hmac
            items:
              - key: hmac
                path: hmac
        - name: mcp-server-token
          secret:
            secretName: mcp-server-token
